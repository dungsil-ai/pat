name: Weekly Codex Refactor

on:
  schedule:
    - cron: '0 1 * * 1' # 매주 월요일 UTC 01:00 (KST 10:00)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  codex-refactor:
    runs-on: ubuntu-latest
    env:
      LOG_LEVEL: "${{ vars.LOG_LEVEL }}"
      CODEX_HOME: "${{ github.workspace }}/.codex-home"
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: pnpm 설치
        uses: pnpm/action-setup@v4

      - name: Node.js 설정
        uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version-file: .node-version

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: Git 사용자 설정
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Codex로 주간 리팩토링 수행
        uses: ./.github/actions/run-codex-cli
        with:
          codex-auth-json: ${{ secrets.CODEX_AUTH_JSON }}
          codex-home: ${{ env.CODEX_HOME }}
          prompt: |
            당신은 이 저장소의 유지보수 담당 엔지니어입니다.

            목표:
            1) 보안, 성능, 유지보수성 개선 여지를 점검한다.
            2) 위험도가 낮고 가치가 높은 리팩토링을 적용한다.
            3) 변경 후 반드시 아래 검증을 실행하고 통과시킨다.
               - pnpm exec tsc --noEmit
               - pnpm test

            작업 규칙:
            - 변경 범위는 작고 안전하게 유지한다.
            - 한국어 주석/문서 규칙을 준수한다.
            - 불필요한 파일은 생성하지 않는다.
            - 개선 사항이 없으면 파일을 수정하지 않는다.

            Git 및 PR 작업 규칙:
            - 변경 사항이 있는 경우에만 아래 Git 작업을 수행한다.
            - 변경 내용을 설명하는 영문 브랜치 이름을 만든다 (예: chore/codex-refactor/improve-error-handling).
              브랜치 이름은 반드시 'chore/codex-refactor/' 접두사로 시작해야 한다.
            - 변경 사항을 커밋한다. 커밋 메시지는 conventional commit 형식을 따른다.
            - 브랜치를 origin에 push한다.
            - PR 메타데이터를 아래 파일에 작성한다:
              * /tmp/codex-pr-title.txt — PR 제목 (한 줄, 한국어)
              * /tmp/codex-pr-body.md — PR 본문 (마크다운 형식, 한국어)
                본문에는 변경 개요, 변경 사항 목록, 검증 결과를 포함한다.
            - 개선 사항이 없으면 Git 작업을 수행하지 않고, PR 메타데이터 파일도 생성하지 않는다.

      - name: 자동 리팩토링 PR 생성
        id: create_pr
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.CI_GITHUB_TOKEN != '' && secrets.CI_GITHUB_TOKEN || github.token }}
        run: |
          if [ ! -f /tmp/codex-pr-title.txt ] || [ ! -f /tmp/codex-pr-body.md ]; then
            echo "PR 메타데이터 파일이 없습니다. 변경 사항이 없는 것으로 판단합니다."
            exit 0
          fi

          BRANCH=$(git branch --show-current)

          if [ "$BRANCH" = "main" ]; then
            echo "브랜치가 main입니다. 변경 사항이 없는 것으로 판단합니다."
            exit 0
          fi

          PR_TITLE=$(cat /tmp/codex-pr-title.txt | xargs)
          if [ -z "$PR_TITLE" ]; then
            echo "::error::PR 제목이 비어 있습니다."
            exit 1
          fi

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$PR_TITLE" \
            --body-file /tmp/codex-pr-body.md \
            --label "automation" \
            --label "codex"

      - name: PR 생성 실패 안내
        if: steps.create_pr.outcome != 'success'
        run: |
          echo "::warning::자동 PR 생성에 실패했습니다. 저장소 설정에서 'Allow GitHub Actions to create and approve pull requests'를 켜거나 CI_GITHUB_TOKEN 시크릿(PAT, repo 권한)을 설정하세요."
