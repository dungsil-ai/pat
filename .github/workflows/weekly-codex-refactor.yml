name: Weekly Codex Refactor

on:
  schedule:
    - cron: '0 1 * * 1' # 매주 월요일 UTC 01:00 (KST 10:00)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  codex-refactor:
    runs-on: ubuntu-latest
    env:
      LOG_LEVEL: "${{ vars.LOG_LEVEL }}"
      CODEX_HOME: "${{ github.workspace }}/.codex-home"
      CODEX_SANDBOX_MODE: "${{ vars.CODEX_SANDBOX_MODE || 'danger-full-access' }}"
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: pnpm 설치
        uses: pnpm/action-setup@v4

      - name: Node.js 설정
        uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version-file: .node-version

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: Codex 인증 파일 구성
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          mkdir -p "$CODEX_HOME"
          if [ -z "$CODEX_AUTH_JSON" ]; then
            echo "CODEX_AUTH_JSON 시크릿이 비어 있습니다." >&2
            exit 1
          fi
          printf '%s' "$CODEX_AUTH_JSON" > "$CODEX_HOME/auth.json"
          chmod 600 "$CODEX_HOME/auth.json"

      - name: Codex CLI 설치
        run: npm install -g @openai/codex

      - name: Codex로 주간 리팩토링 수행
        run: |
          PROMPT=$(cat <<'EOF'
          당신은 이 저장소의 유지보수 담당 엔지니어입니다.

          목표:
          1) 보안, 성능, 유지보수성 개선 여지를 점검한다.
          2) 위험도가 낮고 가치가 높은 리팩토링을 적용한다.
          3) 변경 후 반드시 아래 검증을 실행하고 통과시킨다.
             - pnpm exec tsc --noEmit
             - pnpm test

          작업 규칙:
          - 변경 범위는 작고 안전하게 유지한다.
          - 한국어 주석/문서 규칙을 준수한다.
          - 불필요한 파일은 생성하지 않는다.
          - 개선 사항이 없으면 파일을 수정하지 않는다.
          EOF
          )

          LOG_FILE="$(mktemp)"
          set +e
          codex exec \
            --cd "$GITHUB_WORKSPACE" \
            --sandbox "$CODEX_SANDBOX_MODE" \
            "$PROMPT" 2>&1 | tee "$LOG_FILE"
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [ "$EXIT_CODE" -eq 0 ]; then
            exit 0
          fi

          if grep -q "bwrap: loopback: Failed RTM_NEWADDR: Operation not permitted" "$LOG_FILE"; then
            echo "::warning::기본 샌드박스($CODEX_SANDBOX_MODE)에서 bwrap 오류가 발생해 danger-full-access로 1회 재시도합니다."
            codex exec \
              --cd "$GITHUB_WORKSPACE" \
              --sandbox danger-full-access \
              "$PROMPT"
            exit 0
          fi

          echo "::error::Codex 실행에 실패했습니다. 로그를 확인하세요."
          exit "$EXIT_CODE"

      - name: 변경사항 린트 검증
        run: pnpm exec tsc --noEmit

      - name: 변경사항 테스트 검증
        run: pnpm test

      - name: Codex 인증 파일 정리
        if: always()
        run: rm -f "$CODEX_HOME/auth.json"

      - name: 자동 리팩토링 PR 생성
        id: create_pr
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.CI_GITHUB_TOKEN != '' && secrets.CI_GITHUB_TOKEN || github.token }}
          branch: chore/weekly-codex-refactor
          delete-branch: true
          commit-message: "chore: 주간 Codex 자동 리팩토링"
          title: "chore: 주간 Codex 자동 리팩토링"
          body: |
            ## 개요
            - Codex Actions가 주간 보안/성능/개선점을 점검하고 자동 리팩토링을 적용했습니다.

            ## 검증
            - pnpm exec tsc --noEmit
            - pnpm test

            > 이 PR은 GitHub Actions 워크플로우(`Weekly Codex Refactor`)에서 자동 생성되었습니다.
          labels: |
            automation
            codex

      - name: PR 생성 실패 안내
        if: steps.create_pr.outcome != 'success'
        run: |
          echo "::warning::자동 PR 생성에 실패했습니다. 저장소 설정에서 'Allow GitHub Actions to create and approve pull requests'를 켜거나 CI_GITHUB_TOKEN 시크릿(PAT, repo 권한)을 설정하세요."
