  district_alderson_logistics: "물류 하이퍼세그먼트" # 18342811295276406087
  district_alderson_logistics_desc: "알더슨 슬라이스의 프레임과 벽체 내부에 자리 잡은 이 물류 구역은 구조물의 관리 시스템 대부분을 수용하며, 내부 및 외부 작동을 감독하고 최적화합니다." # 6811425490609796584
  district_alderson_logistics_plural: "물류 하이퍼세그먼트" # 9489491722722851262
  district_alderson_gaia: "가이아 하이퍼세그먼트" # 5026813664307938630
  district_alderson_gaia_desc: "태양계 전체 크기에 달하는 목가적인 자연의 경이로운 광활함으로, 가벼운 도시화나 산업 개발을 위한 준비가 되어 있습니다." # 12077431549881876991
  district_alderson_gaia_plural: "가이아 하이퍼세그먼트" # 8731485011507025304
  district_alderson_hive: "군집 하이퍼세그먼트" # 18345275536012437547
  district_alderson_hive_desc: "태양계 전체 크기에 달하는 군집화된 지형의 경이로운 광활함으로, 가벼운 도시화나 산업 개발을 위한 준비가 되어 있습니다." # 14692660956364488874
  district_alderson_hive_plural: "군집 하이퍼세그먼트" # 3845704596084183601
  district_alderson_machine: "기계 하이퍼세그먼트" # 233070400485480339
  district_alderson_machine_desc: "태양계 전체 크기에 달하는 기계화된 지형의 경이로운 광활함으로, 가벼운 도시화나 산업 개발을 위한 준비가 되어 있습니다." # 2039679772698996798
  district_alderson_machine_plural: "기계 하이퍼세그먼트" # 1227840110361116186
  district_alderson_ecu: "에큐메노폴리스 하이퍼세그먼트" # 5621229354906411167
  district_alderson_ecu_desc: "태양계 전체를 능가하는 생산력을 발휘할 수 있는, 도시-산업 지대로 뒤덮인 천문학적 규모의 면적입니다." # 6332702614395479692
  district_alderson_ecu_plural: "에큐메노폴리스 하이퍼세그먼트" # 720135407801393331
  district_alderson_pcc: "컴퓨팅 하이퍼세그먼트" # 17364153369111043692
  district_alderson_pcc_desc: "행성 규모의 컴퓨팅 단지와 유사하지만, 알더슨 슬라이스 전체에 걸쳐 확장된 거대한 컴퓨팅 복합체입니다. 측정할 수 없는 처리 능력을 갖추고 있으며 연구에 엄청난 버프를 제공합니다. 여전히 크라이시스는 실행할 수 없습니다." # 8865357390370119193
  district_alderson_pcc_plural: "컴퓨팅 하이퍼세그먼트" # 7985721161375217346
  zone_alderson_energy: "테라스케일 커패시터" # 13598979444772834375
  zone_alderson_energy_desc: "물리학이 허용하는 범위 내에서 마지막 에너지 한 조각까지 쥐어짜 냅니다." # 12383106340618172017
  zone_alderson_food: "알더슨 하이퍼팜" # 13323558448780408471
  zone_alderson_food_desc: "각각 행성을 몇 번이고 집어삼킬 수 있는 거대한 밭이 일렁이는 태양 아래 평화롭게 자라납니다." # 15367766300992020919
  zone_alderson_housing: "거주 넥서스" # 4522945371726331687
  zone_alderson_housing_desc: "은하계의 모든 지성체를 수용할 수 있는 끝없이 넓은 주거지입니다. 이곳을 천 년 동안 걸어도 여전히 같은 거리에 머물러 있을 것입니다." # 12899387908413455032
  zone_alderson_minerals: "벌크 물질 합성기" # 3284264296006026792
  zone_alderson_minerals_desc: "질량-에너지 등가 원리를 아낌없이 적용하여 달 전체 분량의 물질을 실체화합니다." # 13152159180965390117
  zone_alderson_alloys: "초중량 제련소" # 16725134414556066863
  zone_alderson_alloys_desc: "전함 전체를 단 하나의 조각으로 주조할 수 있을 만큼 거대하고 웅장한 제련소입니다." # 10524365125660345178
  zone_alderson_cg: "초중량 제작소" # 11922684158259065011
  zone_alderson_cg_desc: "수십억 제곱킬로미터에 달하는 면적이 오직 소비재 생산만을 위해 할당되었습니다. 현대의 유행을 따라잡기에 거의 충분할 정도로 빠릅니다." # 5500510553098530092
  zone_alderson_factory: "메가스프롤 제조소" # 9750775227818596251
  zone_alderson_factory_desc: "지성체가 설계한 모든 고체 물체는 수백억 개의 우뚝 솟은 배기 굴뚝 사이 어딘가에서 찾을 수 있습니다. 어디에 있는지는 묻지 마십시오." # 1180699567114142134
  zone_alderson_fortress: "태양 방벽" # 1432919507780804367
  zone_alderson_fortress_desc: "행성 전체보다 더 많은 인구를 유지하는 군대를 수용하는 난공불락의 요새와 병영 네트워크입니다." # 5492976412051605717
  zone_alderson_research_physics: "항성 입자 가속기" # 2362348614216431349
  zone_alderson_research_physics_desc: "입자를 더욱 빠르게 가속할 수 있는 더 나은 방법을 끊임없이 연구합니다." # 3011360829211886967
  zone_alderson_research_society: "사회적 슈퍼 시뮬레이터" # 6208055005361914488
  zone_alderson_research_society_desc: "지성체가 자신의 세척 장치에서 수행하는 것보다 16조 배 더 빠르게 사회적, 생물학적 상호작용을 시뮬레이션합니다." # 14669968712177590432
  zone_alderson_research_engineering: "기가엔지니어링 연구 노드" # 10104080268079839330
  zone_alderson_research_engineering_desc: "더 거대한 것을 건설하는 방법을 알아내기 위해 거대한 것들을 활용합니다." # 11758377144242595775
  zone_alderson_research: "태양 컴퓨팅 복합체" # 5225950319713801010
  zone_alderson_research_desc: "크라이시스를 실행하려는 헛된 시도." # 15608707890723667571
  zone_alderson_unity: "관료적 기가프로세서" # 11572750452700190370
  zone_alderson_unity_desc: "디지털 서류 작업을 처리하기 위해서만 존재하는 끝없는 프로세서 열." # 471217140253263991
  zone_alderson_unity_spiritualist: "성스러운 기가사원" # 705662594281140202
  zone_alderson_unity_spiritualist_desc: "지평선까지 뻗어 있는 순례자와 숭배자들의 행렬, 그리고 그곳을 가득 채운 끝없는 숭배의 건물들." # 15879802194641809310
  zone_alderson_unity_servitor: "유기체 기가안식처" # 7972131420964334034
  zone_alderson_unity_servitor_desc: "완벽한 환경 속에서 필요한 모든 사치를 누리는 지성 유기체들로 가득 찬 끝없는 마천루 열." # 10282630891910881299
  zone_alderson_trade: "생태물류 예측기" # 16593199805750336375
  zone_alderson_trade_desc: "우리 제국 전체의 물류 및 경제 예측을 처리하느라 과부하가 걸린 프로세서들." # 7663888530269292838
  zone_alderson_housing_optimization: "주거 최적화" # 17281964765564154582
  zone_alderson_housing_optimization_desc: "이토록 거대한 구조물에서 주거지가 할당되는 방식의 불가피한 비효율성을 시민 한 명 한 명을 위해 해결합니다." # 5493733408050723115
  zone_alderson_infrastructure_optimization: "인프라 최적화" # 17244838281406312146
  zone_alderson_infrastructure_optimization_desc: "테라미터 너머로 테라톤을 이동시키는 데 테라초가 걸리지 않도록 하는 방법을 고안합니다." # 17672183595439286682
  zone_alderson_pop_growth: "인구 최적화" # 11123128788788122165
  zone_alderson_pop_growth_desc: "행동, 사회적, 생물학적 패턴을 감독하고 최적화합니다." # 16634117030145745501
