  giga_qso.008.desc: "여기에서 준항성체(Q.S.O.) 자체의 에너지 출력/소비를 관리할 수 있습니다.\n\nQ.S.O.의 §Y충전율§!을 높이면 £energy£ §Y$energy$§! 유지비가 증가하는 대신 £giga_sr_quasaric_energy£ §Y$giga_sr_quasaric_energy$§! 출력이 증가합니다.\n\n충전율을 낮추면 £giga_sr_quasaric_energy£ §Y$giga_sr_quasaric_energy$§! 출력이 감소하지만, 그 대가로 Q.S.O.의 £energy£ §Y$energy$§! 유지비가 감소하거나, 아예 없어지거나, 심지어 £energy£ §Y$energy$§! 생산으로 전환될 수도 있습니다.\n\n또한 아래의 블랙홀에 £minerals£§Y$minerals$§!, £food£§Y$food$§!, £consumer_goods£ §Y$consumer_goods$§!, £alloys£ §Y$alloys$§!, £giga_sr_bulk_matter£ §Y$giga_sr_bulk_matter$§! 및 §R기타...§!와 같은 다양한 자원을 투입하여 소량의 £giga_sr_quasaric_energy£ §Y$giga_sr_quasaric_energy$§!를 즉시 획득할 수 있습니다." # 2970057395400279144
  giga_qso.009.name: "$name_quasistellar$: 자원 투입" # 9023221167383889673
  giga_qso.009.desc: "여기에서 £minerals£§Y$minerals$§!, £food£§Y$food$§!, £consumer_goods£ §Y$consumer_goods$§!, £alloys£ §Y$alloys$§!, £giga_sr_bulk_matter£ §Y$giga_sr_bulk_matter$§! 및 §R기타...§!와 같은 다양한 자원을 아래의 블랙홀에 투입하여 소량의 £giga_sr_quasaric_energy£ §Y$giga_sr_quasaric_energy$§!를 즉시 획득할 수 있습니다. 부디 " # 17238608122282463145
