  qso_intensity_minimal: "Q.S.O: 최소 충전" # 935699675805144283
  qso_intensity_minimal_desc: "Q.S.O.가 매우 느리게 충전되고 있으며, 출력의 상당 부분이 에너지로 변환되고 있습니다." # 15140244959589849421
  qso_intensity_low: "Q.S.O: 낮은 충전" # 13204046800113972625
  qso_intensity_low_desc: "Q.S.O.가 느리게 충전되고 있으며, 출력의 일부가 에너지로 변환되고 있습니다." # 13022173057981040762
  qso_intensity_med: "Q.S.O: 일반 충전" # 18247932281377689423
  qso_intensity_med_desc: "Q.S.O.가 정상 속도로 충전되고 있으며, 출력의 일부가 에너지로 변환되고 있습니다." # 4446276973115968353
  qso_intensity_high: "Q.S.O: 높은 충전" # 9909175128496469753
  qso_intensity_high_desc: "Q.S.O.가 약간 과충전되고 있으며, 일부 에너지가 출력 증폭을 위해 소모되고 있습니다." # 8563124927753586905
  qso_intensity_maximum: "Q.S.O: 최대 충전" # 4570755250272218368
