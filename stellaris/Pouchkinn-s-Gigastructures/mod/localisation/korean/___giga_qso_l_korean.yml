  giga_qso.002.m: "대상 행성 폐기" # 14373470191135682156
  giga_qso.003.desc: "대상 국가를 선택하십시오." # 2463575877225687523
  giga_qso.004.desc: "대상 항성 등급을 선택하십시오." # 1514489718637953795
  giga_qso.005.desc: "목표로 삼을 성계를 선택하십시오." # 5109726626475672217
  giga_qso.006.desc: "Q.S.O.의 조준 모드를 선택하십시오.\n\n§Y성단§!을 조준하면 해당 성계와 인접한 모든 성계가 파괴 대상으로 지정됩니다. $giga_fe_shield$나 $d_maginot_subspace_disruptor$로 보호받는 인접 성계는 영향을 받지 않습니다.\n\n§Y항성계§!를 조준하면 해당 성계만 파괴 대상으로 지정되며, 주변 성계는 온전하게 유지됩니다.\n§T현재 조준된 성계:§! §Y[root.giga_qso_targeted_systems]/4§!\n\n§Y행성§!을 조준하면 선택한 행성만 파괴 대상으로 지정되며, 성계는 온전하게 유지됩니다. 여러 성계나 제국에 걸쳐 최대 §Y10§!개의 행성을 동시에 조준할 수 있습니다.\n§T현재 조준된 행성:§! §Y[root.giga_qso_targeted_planets]/10§!" # 9414456758831653117
  giga_qso.006.a: "성단 조준" # 2885656833343784381
  giga_qso.006.b: "항성계 조준" # 17637140173343638329
  giga_qso.006.c: "행성 조준" # 3079138097042216317
  giga_qso.007.desc: "최대 §Y10§!개의 행성을 선택하십시오. 이 행성들은 같은 성계나 같은 제국 소속일 필요는 없습니다.\n\n§T현재 조준된 행성:§! §Y[root.giga_qso_targeted_planets]/10§!" # 12854255544439945829
  giga_qso.0070.desc: "지정된 성단에 발사할 것인지 확인하십시오. 이 시점 이후로는 되돌릴 수 없으며 §R지정된 성단은 파괴될 것입니다.§!" # 15498026870447805817
  giga_qso.0071.desc: "지정된 성계들에 발사할 것인지 확인하십시오. 이 시점 이후로는 되돌릴 수 없으며 §R지정된 성계들은 파괴될 것입니다.§!\n\n§T현재 조준된 성계:§! §Y[root.giga_qso_targeted_systems]/4§!" # 12618813661817138380
  giga_qso.0072.desc: "조준을 해제할 성계들을 선택하십시오.\n\n§T현재 조준된 성계:§! §Y[root.giga_qso_targeted_systems]/4§!" # 10428073192018033190
  giga_qso.0073.desc: "지정된 행성들에 발사할 것인지 확인하십시오. 이 시점 이후로는 되돌릴 수 없으며 §R지정된 행성들은 파괴될 것입니다.§!\n\n§T현재 조준된 행성:§! §Y[root.giga_qso_targeted_planets]/10§!" # 13679043567022238237
  giga_qso.0074.desc: "조준을 해제할 행성들을 선택하십시오.\n\n§T현재 조준된 행성:§! §Y[root.giga_qso_targeted_planets]/10§!" # 5859921823247316666
