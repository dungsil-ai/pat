  giga_qso.100.yes: "진행하도록 하죠." # 10508287875752728947
  giga_qso.100.no: "다시 생각해보니..." # 800586801252134794
  giga_birch.300.name: "하이퍼퀘이사" # 10981417733557943253
  giga_birch.300.desc: "고된 여정 끝에, 우리 과학선이 마침내 은하 중심부에 도달했습니다.\n성계에 진입하자마자, 승무원들은 거대한 §Y활동성 초대질량 퀘이사§!, 즉 하이퍼퀘이사의 광경에 경악을 금치 못했습니다.\n\n이 거대한 천체는 수억 개의 항성 질량을 지니고 있으며, 지름은 수백 천문단위에 달합니다. 현재로서는 추측에 불과하지만, 과학계의 일부 급진적인 인물들은 이 퀘이사 주위에 거대한 하이퍼웨폰을 건설하여 그 파멸적인 에너지를 이용해 상상할 수 없는 파괴력을 지닌 광선을 발사할 수 있을 것이라는 이론을 제기하고 있습니다." # 8017460021263681983
  giga_birch.300.a: "믿을 수 없군!" # 11826258457890550173
  giga_qso.110.name: "기계 행성 소멸" # 7664338443016884309
  giga_qso.110.desc: "웜홀이 상공에 나타난 순간, $name_quasistellar$의 기계 행성은 이미 끝장난 것이나 다름없었습니다. 잠시 후, 은하 전체의 에너지 출력과 맞먹는 거대한 에너지 흐름이 웜홀에서 뿜어져 나왔습니다. 광선이 행성을 완전히 소멸시키는 데는 단 몇 초밖에 걸리지 않았습니다.\n\n이전의 로봇 행성은 흔적도 없이 사라졌으며, 그 결과 고스트 신호도 심각하게 약화되었습니다." # 9062670973478491109
  giga_qso.110.a: "본때를 보여줬군." # 15434868374470104590
  giga_qso.112.name: "컨틴전시의 종말" # 15506281177460152470
  giga_qso.112.desc: "컨틴전시는 실패했습니다. 마지막 기계 행성이 파괴됨으로써, 적어도 컨틴전시로부터의 조직적인 대량 멸종 위협은 은하계에서 사라졌습니다. 살아남은 모든 컨틴전시 전투 형태는 전원이 꺼지거나 자폭했으며, 고스트 신호도 더 이상 송출되지 않습니다.\n\n주 넥서스는 $name_quasistellar$의 강력한 레이저에 의해 단 몇 초 만에 완전히 소멸되어 아무것도 남지 않았습니다.\n\n컨틴전시는 더 이상 존재하지 않지만, [quasistellar_owner.GetName]가 이 하이퍼웨폰을 다른 목표를 향해 겨눌지 여부는 지켜봐야 할 것입니다..." # 4614566760760267071
  giga_qso.112.a: "조 단위 태양의 위력 앞에서 그들이 무엇을 할 수 있겠는가?" # 13530594081540161860
