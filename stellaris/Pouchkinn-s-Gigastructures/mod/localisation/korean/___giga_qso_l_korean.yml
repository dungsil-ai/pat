  quasi_stellar_gateway_off: "Q.S.O. 게이트웨이" # 2860197549443855913
  quasi_stellar_gateway_off_DESC: "원리상 $name_ndb$의 게이트웨이와 유사한 이 아공간 통로는 막대한 양의 에너지를 즉각적으로 전송할 수 있게 해줍니다." # 2413805339561659425
  quasi_stellar_gateway_off_MEGASTRUCTURE_DETAILS: "$quasi_stellar_gateway_off_DESC$" # 5823537751485805448
  quasi_stellar_gateway_on: "활성화된 Q.S.O. 게이트웨이" # 17995934021731284211
  quasi_stellar_gateway_on_DESC: "원리상 $name_ndb$의 게이트웨이와 유사한 이 아공간 통로는 막대한 양의 에너지를 즉각적으로 전송할 수 있게 해줍니다." # 2413805339561659425
  quasi_stellar_obliterator_5: "$name_quasistellar$" # 17601144298919610965
  quasi_stellar_obliterator_5_DESC: "완성되어 완전히 작동하는 $name_quasistellar$입니다. 퀘이사의 극 제트와 강착 원반, 그리고 펜로즈 과정을 통해 에너지를 추출하는 이 거대한 초병기는 은하계 전체의 항성 에너지에 달하는 분노를 불운한 표적에게 쏟아부을 수 있습니다." # 18168820498654206907
  quasi_stellar_obliterator_6: "Q.S.O. 제어판" # 15082956059104287166
  quasi_stellar_obliterator_6_DESC: "초병기의 제어판을 열어 발사하거나 설정합니다." # 3035834581145372669
  quasi_stellar_marker_star_firing: "Q.S.O. 웜홀" # 16133938208756191055
  quasi_stellar_marker_star_firing_DESC: "$name_quasistellar$가 이 웜홀을 통해 발사되고 있습니다." # 15275602615273064437
  quasi_stellar_marker_planet_firing: "Q.S.O. 웜홀" # 16133938208756191055
  quasi_stellar_marker_planet_firing_DESC: "$name_quasistellar$가 이 웜홀을 통해 발사되고 있습니다." # 15275602615273064437
  giga_qso.3000.name: "콰사리아의 평화" # 14516309440491175786
  giga_qso.3000.desc: "§R경악스러운 소식!§!\n\n우리 $name_quasistellar$의 중요한 부분이 완성됨에 따라, 은하계는 우리를 은하계의 안전에 대한 보편적인 위협으로 간주하기 시작한 듯합니다. 실제로, 대량 학살을 자행하지 않는 모든 제국은 오늘 '콰사리아의 평화'라 불리는 상호 불가침 조약과 함께 기한 없는 휴전에 합의했습니다. 그들은 적어도 지금은 우리의 하이퍼무기로 은하계의 안전을 위협하지 못하도록 사소한 다툼을 잠시 접어두기로 결정했습니다..." # 9789629933934543932
  giga_qso.3000.a: "그게 도움이 될 거라 생각하나?" # 6328228696513221900
  giga_fed.3012.name: "§R선전포고!§!" # 3828935067342864944
  giga_fed.3012.desc: "[root.GetName], 우리는 너의 사악한 행위를 더 이상 좌시할 수 없다.\n\n이는 공식적인 선전포고이다. 지금 즉시 항복하라. 그러면 너희 문명을 파괴로부터 구원해 줄지도 모르지." # 1504776468670246963
  giga_fed.3012.a: "가련하군." # 6581342902351992097
  giga_fed.3006.name: "은하 방위 조약" # 5678889983941079066
  giga_fed.3006.desc: "[root.GetName]은 우리가 아는 문명을 위협할 수 있는 하이퍼무기 건설에 착수했다.\n\n이에 따라, [giga_galactic_pact_president.GetName]의 주도하에 우리는 은하계의 미래를 수호하고 [root.GetName]의 사악한 활동을 종식하기 위한 연방인 §B은하 방위 조약§!의 창설을 공식적으로 선포한다.\n\n우리는 너의 끊임없이 커지는 과대망상적 성향에 휩쓸려 사라지지 않을 것이다, [root.GetName]." # 13975257344278230211
  giga_fed.3006.a: "짖기만 할 뿐, 물지는 못하겠지." # 14957839096961128538
  giga_fed.3006.b: "흥." # 17104357171569901828
  giga_fed.3006.c: "고작 생각해 낸 게 이거인가?" # 8816587624461172892
  giga_fed.3006.d: "훌륭하군, 우리의 작업을 훨씬 더 쉽게 만들어 주겠어." # 11235401702886444927
  giga_fed.3005.name: "§B은하 방위 조약§!" # 12692431250970762699
  giga_fed.3005.desc: "은하계의 수많은 성간 국가들이 공통의 목적을 위해 협력하는 것은 종종 어려운 일이다. 그러나 [root.GetName]이 거대한 하이퍼무기를 건설함에 따라, 외교적 기적이라 불릴 만한 일이 일어났다. 은하계에 남은 대부분의 제국이 기한 없는 휴전에 합의했고, 그간의 차이를 뒤로한 채 §B은하 방위 조약§!이라 불리는 은하 규모의 연방으로 뭉쳤다!\n\n[giga_galactic_pact_president.GetName]이 이끄는 이 거대 연방은 [root.GetName]의 파괴적인 하이퍼무기로부터 은하계를 보호하는 것을 목표로 하고 있으며, 그들이 공격적인 행동을 개시하는 것은 시간문제일 뿐이다..." # 10112105913542581969
  giga_fed.3005.a: "궁지에 몰린 쥐새끼들처럼 뭉치는군." # 6093639556935623489
  giga_fed.4012.name: "§R선전포고!§!" # 3828935067342864944
  giga_fed.4012.desc: "[root.GetName], 우리는 너의 광기 어린 은하계 파괴를 더 이상 좌시할 수 없다.\n\n이는 공식적인 선전포고이다. 대가가 무엇이든 너를 쓰러뜨리겠다!" # 15505596981073885339
  giga_fed.4012.a: "가련한 바보들." # 588694096543972253
  giga_fed.4011.name: "은하 방위 연맹" # 113481490741535293
  giga_fed.4011.desc: "은하계의 거주자들이여!\n\n[root.GetName]은(는) 완성될 경우 우리가 아는 은하계의 모든 생명을 끝낼 수 있는 무기를 건설하기 시작했습니다. 이에 따라, 우리는 이 은하계의 미래를 수호하기 위해 공식적으로 은하 방위 연맹의 창설을 선포하며, [root.GetName]의 사악한 계획이 현실이 되지 않도록 모든 힘을 다할 것입니다.\n\n우리는 순순히 어둠 속으로 사라지지 않을 것임을 명심하라, [root.GetName]!" # 12205699127541482998
  giga_fed.4011.a: "바보들! 너희는... 우리를 막을 수 없다!" # 11463041376154843915
  giga_fed.4010.name: "§B은하 방위 연맹§!의 탄생" # 2928271786429322040
  giga_fed.4010.desc: "은하계는 항상 위험한 곳이었으며, 작은 국경 분쟁부터 전면적인 은하 전쟁에 이르기까지 모든 규모의 전쟁은 은하 역사 전반에 걸쳐 매우 흔했습니다.\n\n그러나 [root.GetName]은(는) 최근 이전의 그 어떤 것보다 압도적인 규모와 범위를 가진 초병기를 건설하기 시작했습니다. 그리고 찰나의 명료함 속에서, 은하계의 모든 이는 깨달았습니다. 그들의 사소한 갈등과 다툼은 이 무기가 완성되었을 때 불러올 파괴에 비하면 아무것도 아니라는 것을 말입니다.\n\n그리하여 [giga_galactic_pact_president.GetName]의 주도하에, 은하계의 잔존 세력은 차이를 제쳐두고 [root.GetName]이(가) 은하계에 위협이 되는 동안만이라도 §B은하 방위 연맹§!이라는 단일 은하 통합 국가로 뭉치기로 했습니다.\n\n이 거대한 제국이 [root.GetName]의 파괴적인 시도를 막는 데 성공할까요, 아니면 오히려 은하계의 종말을 앞당기게 될까요? 이제 곧 알게 될 것입니다...\n\n§R은하 연방이 완전히 형성되기까지 몇 분 정도 소요될 수 있습니다.§!" # 15140415086801196023
  giga_fed.4010.a: "이... 이것으로 우리를 막을 수는 없다!" # 921641037135418177
  giga_qso.2000.name: "$name_quasistellar$ 건설 현장 완료!" # 18235813554945423337
  giga_qso.2000.desc: "우리 $name_quasistellar$를 위한 건설 현장이 은하 중심부에 완료되었습니다! 초대질량 퀘이사 옆에 떠 있는 이 플랫폼은 전례 없는 규모의 무기를 조립하기 위한 기지로 사용될 것이며, 그 막대한 파괴력은 $name_ndb$조차 이 거대한 괴물에 비하면 단순한 폭죽에 불과하게 만들 것입니다. 첫 번째 단계는 실제 초병기 자체에 대한 작업을 시작하기 위해 퀘이사의 강착 원반을 압축하는 것입니다." # 6321047931978620018
  giga_qso.2000.a: "확인됨." # 3536622398024101432
  giga_qso.2001.name: "$name_quasistellar$ 강착 응축기 완료!" # 17298620200471963003
  giga_qso.2001.desc: "초병기 건설의 첫 단계가 완료되었습니다. 퀘이사 주위에 거대한 부분 고리가 조립되었으며, 이는 에너지 강착 원반에 막대한 중력 압력을 가해 크기를 줄이고 있습니다. 이를 통해 원반의 방해 없이 초병기의 나머지 부분을 완성할 수 있게 될 것입니다." # 11172255650419196975
  giga_qso.2001.a: "무한한 힘을 얻기 위해 치러야 할 작은 대가일 뿐." # 8612020314941151788
  giga_qso.2002.name: "$name_quasistellar$ 상대론적 편향기 완료!" # 16934827206617693978
  giga_qso.2002.desc: "우리의 $name_quasistellar$ 가동을 향한 또 다른 단계가 완료되었습니다. 거대한 커패시터와 연료 공급 파이프 네트워크로 구조물의 나머지 부분과 연결된 두 개의 거대한 수집기가 퀘이사의 극제트를 수집하여 그 에너지를 구조물의 주 무기로 재지향할 것입니다. 이제 이 거대한 초병기를 관리하는 데 필요한 거대한 컴퓨팅 배열을 건설하기 시작해야 합니다." # 13622545675013662410
  giga_qso.2002.a: "좋다." # 843958112380023394
  giga_qso.2003.name: "$name_quasistellar$ 하이퍼컴퓨터 완료!" # 12979157238422646118
  giga_qso.2003.desc: "우리 $name_quasistellar$의 하이퍼컴퓨터가 이제 완성되었습니다. 이 거대한 컴퓨팅 기계 세트는 구조물을 유지하고 발사 과정이 원활하게 진행되도록 보장하는 역할을 합니다. 또한 무기로 전달될 막대한 양의 에너지를 관리할 수 있습니다. 이제 이 에너지를 무기 자체로 전달하는 데 사용될 커패시터 작업을 시작해야 합니다." # 6902960591062578163
  giga_qso.2003.a: "매우 좋군." # 2006367686461631787
  giga_qso.2004.name: "$name_quasistellar$ 테라커패시터 완료!" # 6049395420370817101
  giga_qso.2004.desc: "우리 하이퍼웨폰의 테라 커패시터 조립이 완료되었습니다. 거대한 수렴 고리 세트인 이 장치는 퀘이사에서 수집된 막대한 에너지를 전달하고 저장하며, 발사 시퀀스가 시작될 때마다 이를 하이퍼웨폰으로 재전송합니다. 이제 마지막 단계인 하이퍼웨폰의 가장 중요한 부분, 즉 거대한 포신을 건설하는 일만 남았습니다." # 2879495079903529356
  giga_qso.2004.a: "훌륭하군. 머지않아 우리는 무한한 힘을 손에 넣게 될 것이다." # 13166256092087810052
  giga_qso.2005.name: "$name_quasistellar$ 완료!" # 14384915908562526579
  giga_qso.2005.desc: "드디어 끝났다. 은하 중심부의 초대질량 퀘이사 근처에서 수십 년 동안 위험하고 고통스러운 작업을 수행한 끝에, 우리의 역작이 마침내 완성되었다.\n\n$name_quasistellar$는 $name_ndb$조차 왜소하게 만들 만큼 전례 없는 규모의 무기이다. 그 에너지 출력은 약 20조 개의 항성과 맞먹는다. 이 무기는 불운한 표적에게 상상할 수 없는 파괴력을 쏟아부을 수 있다. 이는 우주에 대한 우리의 궁극적인 지배력과 하늘 그 자체를 우리의 의지대로 굴복시킬 수 있는 우리의 능력을 증명하는 것이다.\n\n수백 천문 단위에 달하는 이 거대한 하이퍼웨폰이 완성됨에 따라, 이제 적들이 할 수 있는 것이라곤 자비를 구하며 기도하는 것뿐이다." # 14223772209930321852
  giga_qso.2005.a: "마침내, 가장 거대한 포가 우리의 것이 되었다!" # 169486935539146796
  giga_qso.001.name: "$name_quasistellar$ 제어판" # 16897782324585522277
  giga_qso.001.desc: "$name_quasistellar$ 제어판에 오신 것을 환영합니다.\n\n여기에서 하이퍼웨폰의 표적을 선택하거나 매개변수를 구성할 수 있습니다.\n\n표적을 선택하면 항성, 행성 또는 함대를 조준할 수 있습니다. Q.S.O.를 발사하려면 거대 구조물 자체에서 생성되는 £giga_sr_quasaric_energy£§Y퀘이사 에너지§!가 필요하다는 점을 명심하십시오.\n\n매개변수를 확인하면 무기의 충전 속도를 변경하여 Q.S.O.가 축적하는 £giga_sr_quasaric_energy£§Y퀘이사 에너지§!의 양을 늘리거나 줄일 수 있습니다.\n\n§B이 메뉴는 칙령을 통해 직접 접근할 수도 있습니다.§!" # 8326747904656568251
  giga_qso.001.fire: "표적 관리" # 3826777246671886861
  giga_qso.001.power_management: "전력 관리" # 10486500561386924134
  giga_qso.001.quit: "제어판 종료" # 8654791386900170573
  giga_qso.001.menu: "메뉴로 돌아가기" # 13647656362209151972
  giga_qso.001.panel: "제어판으로 돌아가기" # 6651052307512494948
  giga_qso.001.confirmdestruction: "§R확인§!" # 9299268119519788885
  giga.qso.novalidtargets: "유효한 표적이 없습니다." # 1423307057521109207
  giga.qso.maxtargetedplanets: "최대 행성 수만큼 표적을 지정했습니다. 더 많은 표적을 선택하려면 최소 하나 이상의 표적을 선택 해제하십시오." # 1407183206215411355
  giga.qso.maxtargetedsystems: "최대 성계 수만큼 표적을 지정했습니다. 더 많은 표적을 선택하려면 최소 하나 이상의 표적을 선택 해제하십시오." # 4637335107535194861
  giga.qso.canttargetsystemtwice: "같은 성계를 두 번 표적으로 지정할 수 없습니다." # 12388486815127684782
