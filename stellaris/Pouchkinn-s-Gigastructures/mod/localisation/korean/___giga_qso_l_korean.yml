  giga.qso.noplanetstoremove: "폐기할 대상 행성이 없습니다." # 11018026724297253175
  giga_qso.002.name: "준항성 말살기" # 893512981405224180
  giga_qso.002.desc: "이곳은 $name_quasistellar$ §E대상 관리 메뉴§!입니다. §Y[root.GetName]§!에 대한 충성도를 기준으로 대상을 지정할 국가를 선택할 수 있습니다.\n\n§R적대적§! 대상에는 일반적으로 ['concept_marauder_empires'], ['concept_endgame_crises'] 및 현재 전쟁 중인 제국이 포함됩니다.\n\n§Y중립§! 대상에는 일반적으로 ['concept_preftl_civilizations'], 평화 상태이지만 ['concept_subject_agreement'], ['concept_federation'] 또는 특정 ['concept_diplomatic_pacts']를 맺지 않은 제국이 포함됩니다.\n\n§G우호적§! 대상에는 우리 국경 내에 소유한 성계가 포함됩니다." # 23233079823769071
  giga_qso.002.a: "§E대상 선택§!" # 5382854002271206064
