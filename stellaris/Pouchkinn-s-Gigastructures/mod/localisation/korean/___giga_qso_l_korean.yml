l_korean:
  giga_tech_quasi_stellar_1: "초차원 차폐막" # 3622568926778927844
  giga_tech_quasi_stellar_1_desc: "퀘이사는 믿을 수 없을 정도로 강력한 에너지를 지닌 천체입니다. 우리가 퀘이사 근처에서 어떠한 공학 프로젝트를 수행하고자 한다면, 퀘이사의 중력과 방사선으로부터 구조물을 보호할 수 있는 고급 차폐 기술을 개발해야 합니다." # 5514774345782180608
  giga_tech_quasi_stellar_2: "중력 강착 압축" # 864695781273542985
  giga_tech_quasi_stellar_2_desc: "은하 중심부의 하이퍼퀘이사는 거대하고 극도로 에너지가 넘치는 강착 원반으로 둘러싸여 있습니다. 이 원반 때문에 퀘이사 근처에 무언가를 건설하는 것은 불가능에 가깝습니다. 하지만 퀘이사 근처의 중력 상수를 변경함으로써, 우리는 퀘이사의 질량이 증가한 것과 같은 효과를 유도하여 원반의 크기를 강제로 축소할 수 있습니다. 이는 에너지 잠재력을 높이는 동시에 퀘이사 근처에 구조물을 건설할 수 있게 해 줄 것입니다." # 12031738003499589842
  giga_tech_quasi_stellar_3: "상대론적 제트 편향" # 12704555158193140394
  giga_tech_quasi_stellar_3_desc: "초대질량 퀘이사의 가장 두드러진 특징 중 하나는 양극에서 상대론적 속도로 뿜어져 나오는 이온화 물질의 초가속 제트입니다. 이 제트는 극도로 강력하며, 이 파멸적인 에너지를 수확하고 방향을 전환하는 능력은 우리의 미래 하이퍼웨폰에 동력을 공급하는 데 매우 유용할 것입니다." # 14140903192834696694
  giga_tech_quasi_stellar_4: "테라급 연산 기기" # 14982419815788547012
  giga_tech_quasi_stellar_4_desc: "우리가 이 구조물을 적절히 유지 관리하고 하이퍼웨폰이 사용하는 엄청난 양의 에너지를 관리하려면 $name_quasistellar$만큼이나 거대한 컴퓨터가 필요할 것입니다." # 5077959020191311235
  giga_tech_quasi_stellar_5: "퀘이사 에너지 조작" # 14364204078181905524
  giga_tech_quasi_stellar_5_desc: "초대질량 퀘이사에서 방출되는 순수한 에너지를 수확하고 저장하며 재전송하는 일은 초차원 커패시터에서 초중력장 변조에 이르는 여러 극도로 진보된 기술을 결합해야만 가능합니다." # 10587827122266018049
  giga_tech_quasi_stellar_6: "$name_quasistellar$" # 7708089865714462726
  giga_tech_quasi_stellar_6_desc: "$name_quasistellar$는 은하계에서 가장 에너지가 넘치는 천체를 무기로 만들기 위해 우리가 알고 있는 거의 모든 유형의 기술을 동원한 무기입니다. 이 가공할 구조물은 진정한 초거대 무기의 정점으로, $name_ndb$나 시스템크래프트조차 몇 자릿수나 능가하는 위력을 자랑합니다." # 17868450430287186069
  quasi_stellar_obliterator_0: "$gc_tera$$name_quasistellar$ 건설 현장" # 3523350457925351363
  quasi_stellar_obliterator_0_DESC: "거대한 초대질량 퀘이사 옆을 떠다니는 미래의 $name_quasistellar$ 건설 현장입니다. 이 비교적 작은 플랫폼은 이 은하계의 지적 생명체가 조립한 것 중 가장 웅장하고 터무니없는 하이퍼웨폰을 건설하기 위한 기지로 사용될 것입니다." # 17992613508047090473
  quasi_stellar_obliterator_0_MEGASTRUCTURE_DETAILS: "$giga_list_category_terastructure$ - $giga_list_category_weaponry$\n§Y하이퍼퀘이사§! 주변에 하이퍼웨폰을 건설하여 §Y성단§! 전체를 파괴할 수 있습니다.\n§L퀘이사를 중심으로 건설된 터무니없을 정도로 거대한 하이퍼웨폰으로, 헤아릴 수 없는 파괴력을 지니고 있습니다.§!" # 14919933773327760639
  quasi_stellar_obliterator_0_CONSTRUCTION_INFO_DELAYED: "$giga_list_additional_data$ - §Y준항성 소멸기§!는 단일 §Y행성§!, §Y항성계§! 또는 §Y성단§! 전체를 파괴할 수 있습니다." # 906583417055065754
  quasi_stellar_obliterator_1: "$name_quasistellar$ 강착 응축기" # 2086872243095236247
  quasi_stellar_obliterator_1_DESC: "이 거대한 부분 고리는 퀘이사를 둘러싸고 있으며, 초차원 초중력 압축기를 사용하여 국소적으로 중력 상수를 변경함으로써 퀘이사의 격렬한 강착 원반을 효과적으로 응축시킵니다." # 1473729824939020723
  quasi_stellar_obliterator_2: "$name_quasistellar$ 상대론적 편향기" # 1133536013085814218
  quasi_stellar_obliterator_2_DESC: "복잡하게 설계된 전력 도관과 초고효율 편향기 세트를 사용하여 퀘이사의 극 제트를 조심스럽게 수집하고 방향을 전환함으로써, 하이퍼웨폰에 사용할 막대한 양의 에너지를 확보합니다." # 8821884000490579832
  quasi_stellar_obliterator_3: "$name_quasistellar$ 하이퍼컴퓨터" # 9103608465548324615
  quasi_stellar_obliterator_3_DESC: "퀘이사에서 수확한 막대한 에너지 흐름을 적절히 제어 및 조정하고 구조물 전체를 안정화하기 위해 하이퍼웨폰의 거대한 프레임 내부에 통합된 초거대 컴퓨터입니다." # 9360411431675941934
  quasi_stellar_obliterator_4: "$name_quasistellar$ 테라커패시터" # 18175279392198144455
  quasi_stellar_obliterator_4_DESC: "퀘이사를 둘러싼 이 거대한 고리는 강착 원반과 펜로즈 과정 모두에서 에너지를 수확하고, 이를 거대한 저장 장치나 무기 자체 등 필요한 곳으로 재전송하는 데 사용됩니다." # 5661766406974303886
  quasi_stellar_obliterator_firing_1: "$name_quasistellar$" # 17601144298919610965
  quasi_stellar_obliterator_firing_1_DESC: "이 $name_quasistellar$이(가) 현재 발사 중입니다." # 2366320521614065473
