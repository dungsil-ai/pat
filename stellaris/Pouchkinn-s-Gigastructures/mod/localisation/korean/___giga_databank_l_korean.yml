l_korean:
  concept_giga_sr_amb_megaconstruction: "$giga_sr_amb_megaconstruction$" # 10656267218600674638
  concept_giga_sr_amb_megaconstruction_desc: "£giga_sr_amb_megaconstruction£ §H$giga_sr_amb_megaconstruction$§!은 엄청난 수준의 인장 응력을 견딜 수 있는 첨단 소재로, 가장 거대한 우주 구조물 건설에 필수적입니다.\n\n이 소재의 수입이 높을수록 ['concept_megastructures']가 더 빨리 건설될 수 있습니다. 이 소재는 진행 중인 모든 메가스트럭처에 §H분할§!되므로, 여러 메가스트럭처를 동시에 건설하면 전체 건설 속도가 §H느려집니다§!. 따라서 이는 병렬 메가스트럭처 건설 능력에 대한 '소프트' 상한선 역할을 합니다.\n\n또한, 대부분의 메가스트럭처는 이 소재에 대한 §H유지 비용§!을 가지며, 더 큰 구조물일수록 유지 비용이 더 높습니다.\n\n증가시키려면:\n- £building£ ['building:building_giga_megaworkshop_hub'] 또는 £building£ ['building:building_giga_megaworkshop'] 건설\n- 초인장(Supertensile) 매장량이 있는 ['concept_celestial_objects']에 £mining_station£ ['concept_mining_stations'] 건설" # 2827306055790404558
  concept_giga_sr_bulk_matter: "$giga_sr_bulk_matter$" # 6800225078457907568
  concept_giga_sr_bulk_matter_desc: "£giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!는 천체에서 채굴된 대량의 저가치 미정제 물질을 의미하며, 극도로 거대한 ['concept_megastructures']나 행성 환경을 복제하려는 구조물의 충전재로 사용됩니다.\n\n이 물질은 §HAsteroids§!, §HRocky Planets§!, §HGas Giants§!에서 ['concept_planet_size']당 §Y1§! £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!의 비율로 채굴할 수 있습니다.\n\n이 자원은 §HRingworld§!, §HMatrioskha Brain§!, §H$name_alderson$§!, §HBirch World§!, §HQuasi-Stellar Obliterator§!, §HSupermassive E.H.O.F.§!, §HNicoll-Dyson Beam§!을 건설하는 데 필요합니다.\n\n또한 §HLunar Macrofabricator§!와 §HBehemoth Assembly Plant§!에서 각각 §HAttack Moons§!와 §HBehemoth Planetcrafts§!를 제작하는 데 사용됩니다.\n\n거대 구조물 건설 과정에서 §H행성이 제거§!되는 경우, 해당 성계 행성들의 £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! 함유량은 초기 건설 단계 비용에서 §H차감§!됩니다. 남은 물질은 성계 항성 위의 §HBulk Matter Cache§!에 저장되며, 이를 채굴하여 회수할 수 있습니다.\n\n예를 들어, 성계에 §Y75§! £giga_sr_bulk_matter£가 포함되어 있고 일반적인 §HRingworld Frame§! 건설에 §Y100§! £giga_sr_bulk_matter£가 필요하다면, 실제로는 §Y25§! £giga_sr_bulk_matter£만 필요하게 됩니다. 하지만 성계에 §Y150§! £giga_sr_bulk_matter£가 있다면, 거대 구조물의 초기 단계 비용은 £giga_sr_bulk_matter£가 들지 않으며 §HCache§!에는 채굴 가능한 §Y50§! £giga_sr_bulk_matter£가 남게 됩니다. 이후의 건설 단계는 이 메커니즘의 영향을 받지 않으며 저장된 £giga_sr_bulk_matter£를 필요로 합니다.\n\n증가 방법:\n- 항성이 아닌 ['concept_celestial_object']에 §H$decision_harvest_matter_for_planetary_printing$§! ['concept_decision']을 사용하여 §H$moon_printer_orbital_mass_harvester_1$§!을 건설하고 행성을 해체하면, §Y6§!개월마다 §Y1§! £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!를 얻을 수 있습니다. 이 과정은 중단할 수 없으며 결국 행성을 완전히 §R제거§!하게 됩니다.\n- 성계의 ['concept_star']에서 해당 결정을 선택하면 성계 내 모든 행성에 대해 이 과정을 시작할 수 있습니다." # 17489910698640715561
  concept_giga_sr_iodizium: "$giga_sr_iodizium$" # 4298955922627907122
  concept_giga_sr_iodizium_desc: "£giga_sr_iodizium£ §H$giga_sr_iodizium$§!은 §H$name_fusion_suppressor$§! 초신성이 방출한 막대한 양의 이질적 입자가 상대론적 속도로 행성에 충돌할 때 생성되는 기이한 결정입니다. 이 결정은 여러 흥미로운 방식으로 물리학 법칙을 거스르는 듯 보입니다.\n\n이 자원은 ['concept_giga_sr_iodizium_buildings']을 건설하는 데 사용됩니다.\n\n획득 방법:\n- ['concept_star']에 §H$name_fusion_suppressor$§! 거대 구조물을 건설하고 선택지가 나타나면 §Y$fusion_suppressor_6b$§!를 선택하십시오. 이 과정에서 성계 내의 모든 것이 §R심각하게 손상§!될 수 있으니 신중하게 배치하십시오!" # 10723477479204931130
  concept_giga_sr_iodizium_buildings: "아이오디지움 건물" # 1468184120640559425
  concept_giga_sr_iodizium_buildings_desc: "['concept_giga_sr_iodizium']은 우리의 과학 및 에너지 생산을 증대할 유용한 건물을 다수 건설하는 데 사용할 수 있습니다.\n이 건물들은 다음을 포함합니다:\n- $concept_building_giga_iodizium_plant$\n- $concept_building_giga_iodizium_research$" # 12778744168052400415
