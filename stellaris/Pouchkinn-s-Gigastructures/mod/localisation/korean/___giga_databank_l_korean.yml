  concept_giga_character_dofus_desc: "도푸스 테케닉 마치나는 19 AKA부터 카테일의 십자군 원정까지 로퀄리아의 감독 대통령을 역임했습니다. 그는 때때로 다소 순진한 면모를 보입니다." # 186643460287926750
