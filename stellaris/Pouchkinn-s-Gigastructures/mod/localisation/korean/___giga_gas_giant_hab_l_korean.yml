l_korean:
  giga_gas_giant_home_system_NAME: "가스 거대 행성 거주지" # 89457324416555851
  giga_gas_giant_home_system_DESC: "원래 모성이 파괴된 상태로, 거주 가능한 가스 거성에서 시작합니다." # 15302570524985492496
  origin_gas_giant: "가스 행성 이륙" # 3819782646386391227
  origin_gas_giant_desc: "이 제국이 우주 시대를 막 시작했을 무렵, 그들의 모성(母星)이 떠돌이 혜성에 명중당했습니다. 이미 일시적으로 생존할 수 있는 우주 기반 시설을 갖추고 있었기에, 가스 행성 채굴 기지가 그들의 새로운 거주지가 되었습니다. 수년 동안 그 가스 행성은 그들의 필요를 여러 번 충족시켰으며, 은하계에 존재하는 다양한 가스에 대한 새로운 통찰력을 가져다주었습니다. 이 제국의 발전 과정에서 이국적인 가스가 풍부하게 공급되었기 때문에, 이러한 가스를 이용한 산업 기술이 정교하게 다듬어졌지만, 가장 기본적인 산업조차도 이 가스에 의존하게 되었습니다." # 4714346663545385351
  origin_gas_giant_robot: "가스 행성 이륙" # 3819782646386391227
  origin_gas_giant_robot_desc: "이 제국이 우주 시대를 막 시작했을 무렵, 그들의 모성(母星)이 떠돌이 혜성에 명중당했습니다. 이미 일시적으로 생존할 수 있는 우주 기반 시설을 갖추고 있었기에, 가스 행성 채굴 기지가 그들의 새로운 거주지가 되었습니다. 수년 동안 그 가스 행성은 그들의 필요를 여러 번 충족시켰으며, 은하계에 존재하는 다양한 가스에 대한 새로운 통찰력을 가져다주었습니다. 이 제국의 발전 과정에서 이국적인 가스가 풍부하게 공급되었기 때문에, 이러한 가스를 이용한 산업 기술이 정교하게 다듬어졌지만, 가장 기본적인 산업조차도 이 가스에 의존하게 되었습니다." # 4714346663545385351
