  compound_invincible_2: "$compound_invincible$" # 10699147631879002396
  compound_invincible_3: "$compound_invincible$" # 10699147631879002396
  compound_invincible_desc: "$ehof_the_compound_text$은 파괴가 거의 불가능합니다." # 16410791317410393452
  compound_invincible_2_desc: "$compound_invincible_desc$ $tech_qnm_utilities$의 발견으로 그들은 취약해졌습니다." # 7600020833693179884
  compound_invincible_3_desc: "$compound_invincible_2_desc$" # 8042133019942867377
  repair_annihilator: "$ehof_the_stellar_annihilator$ 수리 중" # 12817943335143030462
  repair_annihilator2: "$repair_annihilator$" # 12520732647830335017
  pc_ehof_cplanet: "$ehof_the_sphere$" # 7723666680795059261
  pc_ehof_cplanet_desc: "이 거대한 구체는 고도로 에너지화된 지성 금속으로 구성되어 있습니다." # 4003670874413999481
  pc_ehof_planet: "암흑 물질 구체" # 588508086871769349
  pc_ehof_planet_desc: "거대한 암흑 물질 구체입니다. $ehof_the_compound_text$는 이를 사용하여 함대를 강화합니다." # 13537086910313976122
  decision_compound_cleanse_planet: "암흑 물질 결어긋나기" # 917461202031300620
  decision_compound_cleanse_planet_desc: "행성에 음질량 광선을 조사하여 컴파운드의 잔류 물질을 파괴하고 행성을 바리온 상태로 복구하십시오." # 14572872350330326651
  decision_compound_cleanse_planet_tooltip: "§Y행성이 정상 상태로 복구됩니다. $pc_ehof_terraforming_candidate$ 수정자가 있는 경우, 고유 매장량이 포함된 $pc_nuked$로 변환됩니다.§!\n\n§R $i_dark_matter$ 궤도 매장량이 제거됩니다.§!" # 11288051447673481501
  pc_ehof_terraforming_candidate: "잠재적 응집력" # 15558648901453872991
  pc_ehof_terraforming_candidate_desc: "이 행성은 거주 가능한 세계와 일치하는 여러 흔적을 가지고 있으며, 이를 완전히 복구할 수 있을지도 모릅니다." # 14685808674228142495
  pc_ehof_terraforming_candidate_tooltip: "이 행성에 §Y$decision_compound_cleanse_planet$§! 결정을 사용하면 고유 매장량이 포함된 $pc_nuked$로 변환됩니다." # 11175357357178833364
  decision_compound_cleanse_planet_available_tooltip: "이제 $pc_ehof_planet$에 §Y$decision_compound_cleanse_planet$§! 결정을 사용하여 정상 상태로 되돌릴 수 있습니다. 이전에 거주 가능했던 세계는 고유 매장량과 함께 다시 거주 가능해질 것입니다." # 5752682438809896895
  d_compound_blocker_1: "변환 본능" # 11074580027274021455
  d_compound_blocker_1_desc: "이 지역의 야생 동물은 외계 생명체를 \"변환\"하여 암흑 물질로 만들려는 본능을 가지고 있는 듯합니다. 물리적으로는 불가능하지만, 그럼에도 불구하고 우리 보안군을 과도하게 긴장시키고 있습니다." # 3733670575270766203
  d_compound_blocker_2: "중력 황무지" # 13715277320853157414
  d_compound_blocker_2_desc: "지역 지형이 특정 기본 힘과 불규칙하게 상호작용하여 개발 노력을 크게 방해하는 지형을 형성합니다." # 4174237585398289125
  d_compound_blocker_3: "물질 응집 불량" # 9720630237956723445
  d_compound_blocker_3_desc: "이 지역의 물질은 결어긋남 이후 제대로 안정되지 않았으며, 부적절하고 때로는 위험한 상태 변화를 겪습니다." # 13813001376058932485
  d_compound_blocker_4: "이질적 방사능 오염" # 767006807706158102
  d_compound_blocker_4_desc: "이 행성의 잘못 조정된 결어긋남으로 발생한 잉여 에너지가 무생물과 생물 물질에 피해를 줍니다." # 639824928873150933
  d_compound_blocker_5: "자발적 변환" # 4547996881168223839
  d_compound_blocker_5_desc: "거의 보이지 않는 준바이러스성 암흑 물질 구조의 유행병이 언제든 변환을 일으킬 위험을 내포하고 있습니다." # 7288756748970766653
  d_compound_boon_1: "결어긋남 간헐천" # 7613743802284406657
  d_compound_boon_1_desc: "잔류 암흑 물질 맥이 유사하게 잔류하는 음의 질량과 접촉하며 에너지를 방출하며 결어긋납니다." # 12171909228883217599
  d_compound_boon_2: "초중입자 지질학" # 11774113872694238025
  d_compound_boon_2_desc: "비중입자 물질의 불완전한 결어긋남과 재형성의 부산물로 독특하고 가치 있는 복합체가 형성되었습니다." # 14016555283261838855
  d_compound_boon_3: "테네브로 축적기" # 8589717803046202845
  d_compound_boon_3_desc: "놀라운 적응력을 갖춘 현지 식물 종이 특정 형태의 암흑 물질을 안전하게 흡수하고 농축합니다." # 9384718305977041887
  d_compound_boon_4: "잔류물 보호구역" # 9613350966432229975
  d_compound_boon_4_desc: "통제된 환경에서 보존되는 복합체 형태의 암흑 물질 현상이 지속 가능한 실험 공급원을 제공합니다." # 7241522675532518951
  d_compound_boon_5: "비중입자 동물군" # 14113857095597149595
  d_compound_boon_5_desc: "이 지역에는 놀라울 정도로 파격적인 생명체 군집이 서식하고 있습니다. 이 불완전한 형태의 유기체는 비교 진화학 분야의 보고입니다." # 12585732743194819866
  d_compound_boon_6: "지구 중력 변칙" # 17180606280093851360
  d_compound_boon_6_desc: "반쯤 예측 가능한 질량 변동에 대한 끊임없는 적응이 구조 공학 분야의 혁신을 강제합니다." # 12800842679979441828
  d_compound_boon_7: "풍토성 미세웜홀" # 4667517280140109367
  d_compound_boon_7_desc: "이곳의 시공간은 거시적 규모의 양자 거품과 다를 바 없이 요동칩니다. 이는 특정 이질적 에너지 변환 과정을 촉매할 수 있습니다." # 17576478063565328286
  d_compound_boon_8: "지각 있는 금속 도가니" # 17554395617127423866
  d_compound_boon_8_desc: "지각 있는 금속 호수의 빙하 같은 물결이 주변 지형을 한가롭게 흡수하고 재흡수합니다." # 10999567068387013289
  d_compound_boon_10: "원시 지성 생태계" # 9808961000485466789
  d_compound_boon_10_desc: "복합체(Compound) 집단지성의 절반쯤 태어난 접목체가 이곳의 미생물군집에 스며들어 있습니다. 지속적인 훈련을 통해, 이는 눈에 띄지 않는 자애로운 의지로 빚어질 수 있습니다." # 15071219878431383803
