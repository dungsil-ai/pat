l_korean:
  ehof_anomaly.14.name: "황폐해진 성계" # 18274405162251195830
  ehof_anomaly.14.desc: "우리 함선이 §H[root.solar_system.GetName]§! 성계에 도착한 순간, 성계의 항성에서 발신된 것으로 보이는 아공간 통신을 수신했습니다. 이 신호는 $ehof_the_compound_text$에 관한 은하계 전역의 방송과 암호학적으로 유사했습니다.\n\n하지만 이 성계에서 발견한 것은 신호뿐만이 아닙니다. 성계의 모든 행성은 산산조각이 났거나 불타버렸으며, 가장 안쪽에 있던 행성은 몇 개의 암석 덩어리와 그 뒤를 따르는 소행성대를 제외하고는 흔적도 없이 사라졌습니다.\n\n이 파괴의 원인은 아직 밝혀지지 않았으나, 우리의 [Owner.GetScientistPlural]는 그 원인이 항성에 있다고 의심하고 있습니다. 항성은 비정상적인 에너지 분포를 보이며 표면과 층에서 특이한 변화가 관측되고 있습니다. 이러한 파괴는 초신성 폭발과 같은 거대한 에너지 방출로만 가능할 텐데, 항성이 여전히 존재하고 있다는 점에서 이는 모순됩니다.\n\n§H[root.solar_system.GetName]§!에는 무시무시한 일이 벌어졌으며, 항성이 메시지의 발신원인 것으로 보이는 만큼 이러한 미스터리를 조사하는 것이 무엇보다 중요합니다." # 470120471484732026
  ehof_anomaly.14.a: "이 미스터리를 해결해야만 합니다." # 3974824451655364113
  INVESTIGATE_WOUNDED_STAR: "황폐해진 성계" # 18274405162251195830
  INVESTIGATE_WOUNDED_STAR_DESC: "우리 과학선이 §H[root.solar_system.GetName]§!을 조사하기 위해 이동 중입니다.\n\n그 비밀이 마침내 $ehof_the_compound_text$에 대한 해결책을 제시해 줄지도 모릅니다. 그렇지 않더라도, 적어도 우리에게 전송된 메시지의 기원은 찾아낼 수 있을 것입니다." # 5819111839277148841
  ehof_anomaly.10021.name: "상처 입은 항성" # 11888826087845315060
  ehof_anomaly.10021.desc: "§H[root.solar_system.GetName]§!에 대한 조사 결과, 항성 표면에 거대한 이상 현상이 발견되었습니다. 항성의 광구 아래로 약 330만 킬로미터에 달하는 직경의 대략적인 원형 함몰 지점이 확인되었습니다. 이는 적색 거성 크기의 32분의 1에 불과하지만, 그럼에도 실로 엄청난 규모입니다.\n\n이 함몰 지점은 매우 강력한 충돌체에 의해 생긴 크레이터로 추정됩니다. 무엇이 구체적인 원인인지는 알 수 없으나, 우리의 [Owner.GetScientistPlural]는 현재 두 가지 가설을 놓고 대립하고 있습니다. 충돌체가 엄청나게 거대했거나, 혹은 믿을 수 없을 정도로 빨랐다는 것입니다.\n\n충돌 자체로 인해 막대한 양의 항성 플라즈마가 성계 전역으로 방출되었고, 마치 소형 초신성처럼 성계의 모든 행성을 녹이고 부수며 가열했습니다.\n\n항성 내부의 격렬한 힘에도 불구하고 충돌체는 여전히 식별 가능할 수 있으며, 더 나아가 우리가 수신한 메시지와도 관련이 있을 수 있습니다.\n\n충돌체의 흔적을 찾기 위해서는 항성의 외층과 내층에 대한 정밀 조사가 필요할 것입니다." # 281711514292068789
  ehof_anomaly.10021.a: "이 항성을 샅샅이 뒤져라!" # 12610358419383505916
  INVESTIGATE_STELLAR_WOUND: "상처 입은 항성" # 11888826087845315060
  INVESTIGATE_STELLAR_WOUND_DESC: "우리의 [Owner.GetScientistPlural]는 충돌체에 대한 더 많은 정보를 얻기 위해 고강도 스캐너와 우리가 제작할 수 있는 가장 강력한 열 차폐 장치를 갖춘 여러 함선을 준비하고 있습니다.\n\n항성 표면과 내부의 유동적인 특성으로 인해 충돌체는 원래 충돌 지점에서 멀리 표류했을 수 있습니다.\n\n따라서 충돌체를 찾기 위해서는 §H[root.solar_system.GetName]§!에 대한 전면적인 스캔이 필요합니다." # 12936733658437298104
  ehof_anomaly.10022.name: "침몰한 레비아탄" # 3376953820222966273
  ehof_anomaly.10022.desc: "마침내 §H[root.solar_system.GetName]§!의 외층 조사를 마쳤으며, 그 결과는 실로 놀라웠습니다.\n\n항성과 충돌한 것은 거대한 행성이나 상대론적 발사체가 아니었습니다. 충돌체는 수천 년 전 항성과 충돌한 거대한 인공 구조물이었습니다. 우리가 확인한 바로는 여전히 온전한 상태이며, 어쩌면 메시지 그 자체의 발신원일지도 모릅니다!\n\n이 구조물의 크기는 함선이라고 하기엔 상상조차 할 수 없을 정도입니다. 가장 긴 부분이 거의 2300킬로미터에 달하며, 약 98경 미터톤의 행성급 질량을 가지고 있습니다. 충돌 모델링 결과, 이 함선은 §H[root.solar_system.GetName]§!과 충돌할 당시 초당 5000킬로미터가 넘는 엄청난 속도로 이동하고 있었던 것으로 보입니다.\n\n이 놀라운 발견에 대응하여, 우리의 [Owner.GetScientistPlural]는 이제 해당 함선에 대한 직접적인 탐사를 요청하고 있습니다. 함선이 항성 광구 아래 약 800만 킬로미터 지점, 즉 대류층 깊숙이 위치하고 있어 탐사에는 막대한 노력이 필요할 것입니다. 항성 중심부의 힘과 충돌하고 그 이후로도 노출되었음에도 함선이 온전하다는 점을 고려할 때, 우리는 이 함선이 메시지의 발신원이며 비콘 이상의 기능을 여전히 수행하고 있을지도 모른다고 추측합니다." # 1604373315121535895
  ehof_anomaly.10022.a: "반드시 저곳으로 내려가야 합니다. 어떤 대가를 치르더라도 말입니다!" # 8935798558458520421
  INVESTIGATE_DORMANT_LEVIATHAN: "침몰한 레비아탄" # 3376953820222966273
  INVESTIGATE_DORMANT_LEVIATHAN_DESC: "§H[root.solar_system.GetName]§! 깊숙이 침몰한 거대한 구조물을 조사하기 위해서는 막대한 자원과 우리 제국의 가장 진보된 기술이 필요할 것입니다.\n\n프로젝트에 필요한 장비를 설계하고 조립하기 위해 제국 전역에서 [Owner.GetResearchers]와 [Owner.GetEngineerPlural]가 해당 성계로 모여들고 있습니다." # 17329305460899384636
  ehof_anomaly.10023.name: "레비아탄에 도달" # 17214467185241329500
  ehof_anomaly.10023.desc: "해냈습니다! §H[root.solar_system.GetName]§! 내부에 잠들어 있던 구조물에 도달했으며, 이것이 우주선임을 확인했습니다.\n\n우리 [Owner.GetScientistPlural]와 [Owner.GetEngineerPlural]는 거의 무한한 자원을 공급받아 이른바 \"항성 반-엘리베이터\"라고 부르는 구조물을 건설할 수 있었습니다. 이 구조물은 항성의 광구 너머 안전한 지점에서 시작하여 대류층을 통과해 구조물까지 이어지는 거대한 케이블-터널 하이브리드입니다. 구조물의 양 끝에는 중앙 터널을 중심으로 인공 중력 우물 생성기가 설치되어 있습니다. 먼 쪽 끝에는 구조물을 우주 공간에 고정하기 위해, 항성 내부에는 구조물을 확보하고 항성 대류층의 흐름에 의해 구조물이 밀려나지 않도록 하기 위해 설치되었습니다.\n\n탐사선을 반-엘리베이터 아래로 내려보낸 결과, 우주선은 온전한 상태이며 몰락 제국의 기술력을 훨씬 뛰어넘는다는 사실을 직접 확인했습니다.\n\n그 어떤 스캐너로도 우주선의 선체를 투과할 수 없으며, 선체가 무엇으로 만들어졌는지조차 파악할 수 없습니다. 현재 우리 [Owner.GetScientistPlural]의 추측에 따르면 표면 재질은 일종의 초고체, 즉 고체와 유체의 성질을 동시에 지닌 물질일 가능성이 있습니다. 만약 우주선의 외벽이 실제로 끊임없이 변화하는 준초고체로 만들어졌다면, 항성 내부에서의 충돌과 수천 년의 세월을 어떻게 견뎌냈는지 설명이 됩니다.\n\n우리 [Owner.GetScientistPlural]는 우주선 내부로 진입할 방법을 찾고 있으나, 승인을 기다리고 있습니다." # 3085512077077153449
  ehof_anomaly.10023.a: "긍정. 우주선 내부로 진입하라!" # 10389400736461619668
  ENTERING_LEVIATHAN: "레비아탄 진입" # 9556001575202633560
  ENTERING_LEVIATHAN_DESC: "우리 [Owner.GetScientistPlural]는 이제 잠들어 있는 우주선 내부로 진입할 방법을 찾고 있습니다.\n\n이 수수께끼 같은 거대 구조물 내부에 어떤 기술적 경이로움이 기다리고 있을지는 아무도 모릅니다.\n\n부디 이것이 메시지의 근원지임을 확인할 수 있기를 바랍니다. 어쩌면 $ehof_the_compound_text$ 자체에 맞설 방법이 그 안에 들어있을지도 모릅니다!" # 17816051424285169268
  ehof_anomaly.10024.name: "각성" # 6909432408575633525
  ehof_anomaly.10024.desc: "이런 일이 벌어질 줄은 예상하지 못했습니다! 함선의 선체를 절단하려던 순간, 원정대 주변으로 커다란 구멍이 열리며 내부로 이어지는 복도가 나타났습니다.\n\n함선 내부는 끊임없이 일렁이며 형태를 바꾸는 순백의 표면으로 이루어진 듯합니다. 몇 분간 안쪽으로 이동한 끝에, 원정대는 복도와 같은 기묘한 물질로 만들어진 거대한 홀에 도착했습니다.\n\n처음에는 홀이 비어 있었지만, 상황은 금세 바뀌었습니다. 액체와 같은 벽에서 셀 수 없이 많은 존재가 솟아나와 홀 중앙으로 몰려들었고, 그곳에서 거대한 팔면체 형태로 결합했습니다. 이 형체는 원정대와 텔레파시로 접촉하여 자신을 이 함선의 중앙 의식이라고 소개하며, 우리가 이곳에 도달한 것을 기쁘게 생각한다고 전했습니다.\n\n그것은 은하의 운명이 걸려 있다며 즉시 우리 지도부와의 접촉을 강력히 요구하고 있습니다." # 17931553607086536569
  ehof_anomaly.10024.a: "어떤 상황에도 대비하라. 그 존재를 화면에 띄워라!" # 11001696083147042379
  REPAIR_ANNIHILATOR: "리바이어던 복구" # 10959959898479365515
  REPAIR_ANNIHILATOR_DESC: "우리는 $ehof_the_stellar_annihilator$가 오래전 추락했던 항성에서 탈출할 수 있도록 동력 핵을 수리하는 데 필요한 자원을 제공하기로 합의했습니다." # 10165336690764544473
  annihilator_dialog.006.desc: "모든 수리가 완료되었습니다.\n\n$ehof_shroud_ftl$을 가동합니다.\n\n목적지: §H[root.Capital.GetName]§!.\n\n당분간은 당신을 보호하겠지만, $ehof_preservation_sphere$를 파괴하는 것이 급선무입니다.\n\n§G($ehof_the_stellar_annihilators$의 명령을 변경하려면 아래 UI를 사용하십시오)§!" # 18075267578103768193
  annihilator_dialog.006.tooltip: "$ehof_the_stellar_annihilator$가 §H[annihilator_spawn_here.GetName]§!(을)를 떠나 $ehof_shroud_ftl$을 통해 §H[root.Capital.GetName]§!(으)로 이동 중입니다." # 18046810451310256385
