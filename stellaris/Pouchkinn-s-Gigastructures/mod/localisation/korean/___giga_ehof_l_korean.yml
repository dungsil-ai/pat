  annihilator_dialog.013.name: "$ehof_the_stellar_annihilator$의 몰락" # 14967004769862365294
  annihilator_dialog.013.desc: "$ehof_preservation_sphere$를 파괴하는 동안 $ehof_the_compounds_text$ 함대로부터 $ehof_the_stellar_annihilator$를 지켜내는 데 실패했습니다!" # 4838829566333053987
  annihilator_dialog.013.response: "이것은 대재앙입니다!" # 10047924496155239454
  annihilator_returning: "$ehof_the_stellar_annihilator$: $ehof_shroud_ftl$ 가동" # 2018209713193306490
  annihilator_returned: "$ehof_the_stellar_annihilator$: $ehof_shroud_ftl$ 재사용 대기 중" # 7562590415628213590
  annihilator_dialog.011.desc: "..." # 184889789328169143
  annihilator_dialog.011.response: "???" # 15273894291384665822
  annihilator_dialog.012.name: "희생" # 11421588474970910012
  annihilator_dialog.012.desc: "$ehof_the_compounds_text$의 기원 성계에서 거대한 에너지 급증이 감지되어 센서가 한계치에 도달했습니다.\n\n$ehof_preservation_sphere$가 파괴되면서, 그 안에 담겨 있던 화이트 홀의 막대한 에너지가 방출되었습니다.\n\n몇 시간 지나지 않아 성계 전체가 $giga_sr_negative_mass$로 가득 찼고, 중력 우물 내부의 모든 형태의 암흑 물질이 결맞음 상태를 잃었습니다.\n\n$ehof_the_compound_text$는 이제 존재하지 않습니다!\n\n불행히도 이 승리에는 대가가 따랐습니다. 이번 분쟁에서 우리의 가장 위대한 동맹이었던 $ehof_the_stellar_annihilator$는 $ehof_preservation_sphere$를 파괴하고 결과적으로 $ehof_the_compound_text$를 소멸시키기 위해 스스로를 희생하며 마침내 자신의 운명을 완수했습니다." # 4828434114921046814
  annihilator_dialog.012.response: "우리는 그 희생을 영원히 기릴 것입니다!" # 9623487129711036945
  compound_dialog.20.name: "승리!" # 13613147057738569147
  compound_dialog.20.desc: "우리의 센서가 $ehof_the_compounds_text$ 기원 성계 전역에 울려 퍼지는 거대한 에너지 급증을 감지하며 한계치를 돌파합니다.\n\n$ehof_preservation_sphere$가 파괴되면서, 그 안에 담겨 있던 화이트홀의 막대한 에너지가 방출되었습니다.\n\n몇 시간 지나지 않아 성계 전체가 $giga_sr_negative_mass$로 포화되었고, 중력 우물 내의 모든 암흑 물질이 결맞음을 잃었습니다.\n\n$ehof_the_compound_text$는 이제 존재하지 않습니다!\n\n$ehof_preservation_sphere$가 파괴된 직후, $ehof_the_stellar_annihilator$는 알 수 없는 궤적을 그리며 $ehof_shroud_ftl$로 사라졌습니다. 그 이후로 어떠한 연락도 닿지 않고 있습니다." # 6808785211385318881
  compound_dialog.20.a: "은하계에 좋은 날입니다." # 10633891394167548568
  annihilator_dialog.017.name: "구체의 비밀" # 5639693539842181336
  annihilator_dialog.017.desc: "파괴된 $ehof_preservation_sphere$의 잔해 속에서 $PGATE_GALACTIC$이 발견되었습니다.\n\n이곳에 이것이 존재한다는 것은 놀라운 사실을 시사하며, 어쩌면 예상했던 결과일지도 모릅니다. $ehof_the_compound_text$, $ehof_the_stellar_annihilator$, 그리고 $ehof_preservation_sphere$를 만든 장본인인 $ehof_the_creators$가 바로 $PGATE_GALACTICS$와 $ehof_the_sphere_named$를 건설한 주체이기도 합니다.\n\n이러한 공통된 기원에도 불구하고, 이 둘은 단순히 별개의 실험이었을 가능성이 큽니다. 우리는 $ehof_cohesive$ 성계에서 암흑 물질을 관측한 적이 없으며, $ehof_the_compound_text$가 점령했던 성계에서 $ehof_ep$를 탐지한 적도 없습니다." # 16419011485830329445
  annihilator_dialog.018.name: "구체의 비밀" # 5639693539842181336
  annihilator_dialog.018.desc: "$PGATE_GALACTIC$이 $ehof_preservation_sphere$의 잔해 속에서 발견되었습니다.\n\n이곳에 이것이 있다는 것은 예상치 못한 혼란스러운 일입니다. $ehof_preservation_sphere$가 파괴될 때 튕겨 나왔을 가능성이 높지만, 애초에 왜 거대 구조물 안에 있었는지는 확실하지 않습니다. 이는 $ehof_the_compound_text$, $ehof_the_stellar_annihilator$, $ehof_preservation_sphere$를 만든 $ehof_the_creators$가 $PGATE_GALACTICS$를 건설하고 $ehof_ep$를 전파한 장본인임을 시사할지도 모릅니다. 만약 사실이라면, 이는 은하계 역사상 가장 거대한 발견 중 하나가 될 것이며, $ehof_the_creators$가 우리 은하계 주변에서 얼마나 활발히 활동했는지 명확히 보여줍니다.\n\n이 발견은 $ehof_preservation_sphere$와 $PGATE_GALACTICS$ 사이의 관계에 의문을 제기합니다. 다행히 우리의 [Owner.GetScientistPlural]는 $ehof_preservation_sphere$가 파괴되었을 때 송신기와 $PGATE_GALACTICS$가 반응하지 않은 점으로 미루어 볼 때, $ehof_preservation_sphere$가 $ehof_ep$의 기원은 아니라고 확신하고 있습니다.\n\n이 가설을 검증하기 위해 우리는 $ehof_cohesive$ 성계를 추가로 탐사하고 $ehof_ep$의 진정한 기원을 추적해야 합니다." # 5013521569008229153
  annihilator_dialog.019.name: "관문인가?" # 14925877158860760005
  annihilator_dialog.019.desc: "알 수 없는 구조물이 $ehof_preservation_sphere$의 잔해 속에 놓여 있습니다. 이는 은하계와 $ehof_cohesive$ 성계 곳곳에서 발견된 몇몇 $PGATE_UNKNOWNS$와 동일하지만, 이것이 무엇인지 이해하는 데는 아무런 도움이 되지 않습니다.\n\n현재로서는 그 어떤 것과도 연결되지 않은 것처럼 보여 접근할 수 없습니다. $ehof_the_compound_text$와 $ehof_preservation_sphere$가 파괴된 지금, 우리는 영원히 그 목적을 알 수 없을지도 모릅니다." # 13888397498714158496
  gateway_ehof: "§H추상 물리학 경로§!\n§E이 기술은 물리학 연구 및 $ehof_wormhole_text$ 생성에 관한 추가적인 발전을 이끌어낼 것입니다.§!" # 5776645080343207489
  tech_abstract_1: "추상 물리학 이론" # 4817573748346732624
  tech_abstract_1_desc: "일부 이질적인 물리 현상은 양자 이론이나 끈 이론적 접근만으로는 설명할 수 없을지도 모릅니다. 극도로 파격적인 방법과 접근 방식을 사용하는 '추상 물리학'이라는 새로운 물리학 분야는 우주와 그 너머의 가장 터무니없는 현상에 대한 해답을 제시할 수 있을 것입니다." # 10223309914487176089
  tech_abstract_2: "응용 추상 물리학" # 13298907409437129733
  tech_abstract_2_desc: "추상 물리학의 매우 효율적인 접근 방식은 우주의 가장 기이한 현상조차 설명하는 데 큰 도움을 주고 있습니다. 이러한 접근 방식을 사용하여 새로운 돌파구를 찾으면 독특하고 강력한 기술에 접근할 수 있게 될 것입니다." # 14659444193209797008
  tech_abstract_3: "쿼드로플리언 형식주의" # 13286653008522158341
  tech_abstract_3_desc: "추상 물리학은 다른 물리학 분야와 매우 다르기 때문에 이를 효율적으로 표현하기 위한 맞춤형 수학적 형식주의가 필요합니다. 이 '쿼드로플리언 형식주의'는 고전적인 수학의 세계에는 맞지 않으며 현실에는 완전히 부적합하고 부적절하다고 여겨졌던 진정으로 외계적인 수학적 프레임워크와 정리를 사용합니다." # 1603844568015063358
  tech_abstract_4: "비역설적 정보 초인과성" # 9092752335740697874
  tech_abstract_4_desc: "비추상 물리학에서 정보, 물질, 에너지의 이동은 인과율의 속도에 엄격히 구속되며, 이는 우주의 크기에 비하면 제한적이고 상대적으로 느립니다. 인과율을 초월한 전송은 정보가 전송되지 않거나 시공간이 휘어진 상황에서만 달성할 수 있습니다. 그러나 추상 물리학에서는 고정된 규칙과 고정되지 않은 잠재성 사이의 경계 자체가 유동적이고 변화합니다. 이러한 규칙을 우회하거나 변경하거나, 단순히 무시하는 방법들이 존재합니다. 아무리 터무니없어 보일지라도 말입니다." # 263893271606033404
  tech_photonic_m: "광자 물질 활용" # 15081958087344744554
  tech_photonic_m_desc: "전자기파 간섭 패턴을 정밀하게 조작할 수 있게 됨에 따라, 우리는 일상적인 물질과 유사한 방식으로 물리적 세계와 상호작용할 수 있는 안정적인 정상파를 구축할 수 있게 되었습니다. 이러한 \"광자\" 물질은 마이크로 단위의 조작 작업에서 큰 가능성을 보여주며, 방어막 조화 분야에서 귀중한 자산이 될 것입니다." # 4551882634836976340
  tech_negative_pressure: "음압 적용" # 3431743178690007750
  tech_negative_pressure_desc: "음압은 카시미르 효과의 형태로 양자 수준에서 이미 관찰된 현상입니다. 그곳에서는 진공 요동의 형태로 나타나지만, 통제할 수 없었습니다. 응용 추상 물리학은 음압을 생성하고 제어하는 더 효율적이고 적용 가능한 방법을 발견하는 길을 열었습니다." # 18051253458693834877
  tech_negative_e_s: "음의 에너지 연구" # 14846084666592822455
  tech_negative_e_s_desc: "음의 에너지는 오랫동안 순수하게 가설적이고 논쟁적이며 매우 추상적인 주제였습니다... 적어도 이해할 수 없는 음의 질량이 발견되기 전까지는 말입니다. 추상 물리학은 우리가 이 불가능해 보이지만 부정할 수 없는 현실적인 현상을 더 깊이 연구할 수 있게 해 줄 것입니다." # 12516219168317745936
  tech_hardlight_c_u: "경질광 구조물 활용" # 7768190262006220993
  tech_hardlight_c_u_desc: "전자기장에 대한 지배력은 순수한 경질광 구조물을 생성할 수 있는 능력을 부여할 것이며, 이는 광자 물질의 진보되고 강력한 확장 형태입니다. 이러한 구조물은 기본 입자를 직접 조작할 수 있어 물질과 에너지에 대한 더 정밀한 제어를 제공할 것입니다." # 17755610564718439660
  tech_ssn_det: "멸균 초중성미자 탐지" # 7368712933398935649
  tech_ssn_det_desc: "초공간에서 기원하는 이국적인 암흑 물질의 독특한 형태인 멸균 초중성미자는 $ehof_wormholes_text$가 열릴 때 방출됩니다. 이들은 $ehof_wormholes_text$가 연결되는 위치와 관련된 고유한 주파수를 가지고 있습니다. 이러한 주파수를 분석함으로써 우리는 $ehof_wormhole_text$의 목적지를 훨씬 더 높은 정밀도로 예측할 수 있으며, $ehof_ehof$의 정확도를 높일 수 있습니다." # 16329779494415960041
  tech_nm_utilization_1: "음의 질량 유틸리티 프로토타입" # 8500726094543686652
  tech_nm_utilization_1_desc: "음의 질량을 활용하는 장치, 공정 및 방법의 1세대입니다. 아직 실험적인 프로토타입 단계이며 음의 질량의 잠재력을 완전히 활용하지는 못하지만, 그럼에도 불구하고 매우 강력합니다." # 9648454074259494143
  tech_nm_utilization_2: "고급 음의 질량 유틸리티" # 11278934354341894748
  tech_nm_utilization_2_desc: "음의 질량이 가진 잠재력은 방대합니다. 이 기이한 자원에 대한 더 깊은 이해는 훨씬 더 진보되고 강력한 음의 질량 자산을 개발하고 생성할 수 있게 합니다." # 241318891510129851
  tech_nm_utilization: "음의 질량 활용" # 12747475497179958798
  tech_nm_utilization_desc: "독특하고 이국적인 음의 질량을 활용하면 수많은 기술적 기회가 열립니다. 천체 공학 및 행성 건설의 엄청난 개선, 항성계 내 여행을 위한 초광속 추진기, 항성체의 극단적인 조작 등이 가능해집니다. 음의 질량은 믿을 수 없을 정도로 강력한 자산입니다." # 9199412403779450299
  tech_prob_c: "$ehof_wormhole$ 목적지 예지" # 13940016606265930303
  tech_prob_c_desc: "지성체 금속 군집 지성의 놀라운 능력에 기반하고 그 도움을 받는 상상할 수 없을 정도로 민감한 타키온 센서는 $ehof_wormhole_text$가 실제 공간에 나타나기도 전에 그 목적지를 결정합니다. 이러한 웜홀 목적지 예측은 $ehof_ehof$ 이동의 정밀도를 불가능해 보일 정도로 높입니다. 이 기술을 통해 우리의 $ehof_ehof$는 은하계의 어떤 목적지와도 연결되는 $ehof_wormhole_text$를 형성할 수 있게 될 것입니다." # 9679288147347823490
  tech_condensed_ews: "전약 준장 물질화" # 13734678880690862359
  tech_condensed_ews_desc: "극도로 높은 에너지 상태는 전자기력과 약력을 초기 힘인 전약력으로 통합합니다. $ehof_the_sphere_named$의 비밀은 물리적인 \"전약 준장\"을 구현하는 방법을 밝혀냈으며, 이는 양자 거품 수준에 이르기까지 극도로 정밀한 장 및 시공간 조작의 가능성을 열어줍니다." # 8143034260337468092
  allow_ehof_p1: "§H거대 구조물 잠금 해제:§! $ehof_ehofp1$" # 14960747095958721771
  tech_ehof_phase_01: "$ehof_ehofp1$" # 10555176999901826074
  tech_ehof_phase_01_desc: "$r_arcane_manipulator_1$과 압축된 전자기장을 활용하여 $ehof_wormholes_text$를 팽창시키고 안정화합니다. 비결정론적 특성으로 인해 목적지는 대부분 우리 통제 범위를 벗어나 있습니다." # 8779703633649293568
  tech_ehof_phase_01_nomad: "$ehof_ehofp1$" # 10555176999901826074
  tech_ehof_phase_01_nomad_desc: "우리는 은하계를 탐험하고 싶지만, 갇혀 있는 신세입니다. 다행히도 더 휴대하기 쉬운 해결책이 나올 때까지 $ehof_megastructure_ruined_origin$을 활용할 수 있습니다. 우리의 수리 작업은 $r_arcane_manipulator_1$과 압축된 전자기장을 사용하여 $ehof_wormholes_text$를 팽창시키고 안정화합니다. 비결정론적 특성으로 인해 목적지는 대부분 우리 통제 범위를 벗어나 있습니다." # 15171615996265626896
  allow_ehof_p2: "§H거대 구조물 잠금 해제:§! $ehof_ehofp2$" # 3526948236655346027
  tech_ehof_phase_02: "$ehof_ehofp2$" # 15739164507705496133
  tech_ehof_phase_02_desc: "$r_arcane_manipulator_1$, 광자 물질, 그리고 음압을 활용하여 $ehof_wormholes_text$를 팽창시키고 안정화합니다. 광자 물질과 음압은 전체 과정을 강화하여 $ehof_ehofs$의 정밀도를 높이고 목적지 범위를 확장합니다." # 6444106774127897856
  tech_ehof_spinal: "호라이즌 드라이브" # 8393424112578111805
  tech_ehof_spinal_desc: "아크십의 척추에 장착된 이 장치는 $r_arcane_manipulator_1$, 압축된 전자기장, 광자 물질 및 음압을 활용하여 $ehof_wormholes_text$를 팽창시키고 안정화합니다." # 10901094612169331483
  allow_ehof_p3: "§H거대 구조물 잠금 해제:§! $ehof_ehofp3$" # 5201095303296244765
  tech_ehof_phase_03: "$ehof_ehofp3$" # 7423420965175169430
  tech_ehof_phase_03_desc: "$r_arcane_manipulator_1$, 경질 광선 구조물, 무균 아중성미자 탐지기, 음의 질량을 활용하여 $ehof_wormholes_text$를 조작하고 팽창시킵니다. 음의 질량을 사용하면 웜홀이 완전히 안정화되어, 팽창된 $ehof_wormholes_text$를 원하는 만큼 오랫동안 열어둘 수 있습니다. 무균 아중성미자 탐지기는 $ehof_wormholes_text$가 도달할 수 있는 목적지의 범위를 더욱 확장합니다." # 5711155335584726138
  tech_ehof_phase_03_nomad: "$tech_ehof_spinal$ 오메가" # 15539558052828316717
  tech_ehof_phase_03_nomad_desc: "$tech_ehof_spinal$을 경질광 구조물, 멸균 아중성미자 탐지기, 그리고 음의 질량으로 증강합니다. 음의 질량을 활용하면 웜홀이 완전히 안정화되어, 팽창된 $ehof_wormholes_text$를 우리가 원하는 만큼 오랫동안 열어둘 수 있습니다. 멸균 아중성미자 탐지기는 $ehof_wormholes_text$가 도달할 수 있는 목적지의 범위를 더욱 확장합니다." # 10596380060589322203
  allow_ehof_p4: "§H거대 구조물 잠금 해제:§! $ehof_ehofp4$" # 8170879607908196454
  tech_ehof_phase_04: "$ehof_ehofp4$" # 6020415423555414790
  tech_ehof_phase_04_desc: "$ehof_the_sphere_named$의 신비를 활용하는 $ehof_ehofp4$는 $ehof_ehof$의 완벽한 형태로, 제한이나 위험 없이 우리가 선택한 모든 위치로 이동할 수 있습니다. 무한한 가능성이 기다리고 있습니다." # 14351995739332104747
  tech_ehof_phase_04_nomad: "$tech_ehof_spinal$ 울티마" # 5416523108635497997
  tech_ehof_phase_04_nomad_desc: "$ehof_the_sphere_named$의 신비를 활용하는 울티마 모델은 $tech_ehof_spinal$의 완벽한 형태이며, 제한이나 위험 없이 우리가 선택한 모든 장소로 이동할 수 있습니다. 무한한 가능성이 기다리고 있습니다." # 10363753172269309779
  tech_ehof_phase_04_partial_custom: "§H미래의 엿보기:§! $tech_ehof_phase_04$" # 15356166668198077763
  tech_ehof_phase_04_partial_custom_desc: "$ehof_the_sphere_named$에서 얻은 지식으로, 우리는 웜홀 여행의 새로운 시대라는 문턱에 서 있습니다.\n\n아직 이러한 이론의 복잡한 세부 사항을 완전히 파악하지는 못했지만, 이 원리들을 마스터할 수 있다면 $ehof_ehof$를 완성하는 것이 가능할지도 모릅니다." # 5113118936391020921
  tech_l_conductor: "광전도 분배 시스템" # 361945874234028021
  tech_l_conductor_desc: "고에너지 레이저 전도 에너지 분배기를 통해 행성 간 에너지 수송 및 교환이 가능해지며, 우리 제국의 전력 분배 효율이 향상됩니다." # 5205478296443737581
  tech_hyperlane_p_t: "하이퍼레인 전력 전송" # 8425116029792035321
  tech_hyperlane_p_t_desc: "추상 물리학의 발전으로 초고용량 하이퍼레인 전력 송신기를 개발할 수 있게 되었으며, 이를 통해 빠르고 효율적인 성간 에너지 전송이 가능해집니다." # 4548919734132060473
  tech_field_e_e_t: "장 얽힘 에너지 전조절" # 8380310570513806495
  tech_field_e_e_t_desc: "비역설적 초인과율의 발견은 매우 효율적이고 강력한 에너지 분배기 개발로 이어졌습니다. 이 시스템은 필드 얽힘 에너지 상호 조절을 활용하여 어디에서나 어디로든 엄청난 양의 에너지를 전송합니다." # 17727882946062021714
  tech_u_r_e_t: "비정통적 현실 검증 기술" # 3993380862587197825
  tech_u_r_e_t_desc: "추상 물리학의 파격적인 접근 방식과 원리는 현실을 이해하기 위한 대안적 조사 방법을 개발할 새로운 연구 시설 건설을 요구합니다." # 11480931516874056033
  tech_non_local_r_i: "초인과적 연구 이니셔티브" # 897543111273428008
  tech_non_local_r_i_desc: "추상 물리학의 초인과적 현상은 그에 걸맞은 고급스럽고 복잡하며 강력한 연구 시설을 필요로 합니다." # 7603780118159060769
  tech_giga_power_plant_1: "붕괴 입자 운동 에너지 추출" # 7532511919612828130
  tech_giga_power_plant_1_desc: "고에너지 쌍소멸 과정은 100% 효율적이지 않습니다. 소멸된 입자 쌍의 질량이 클수록 광자보다는 질량이 작은 입자가 생성될 가능성이 높습니다. 차세대 발전소는 추상 물리학을 사용하여 이러한 붕괴 입자의 운동 에너지를 추출함으로써 반물질-물질 소멸 에너지 생성 과정의 효율을 더욱 높입니다." # 7569608141389330287
  tech_giga_power_plant_2: "수동적 영점 에너지 사이펀" # 15108180136839080710
  tech_giga_power_plant_2_desc: "원자로에서 활용되는 능동적 영점 에너지 사이펀을 통한 전력 생산 외에도, 특수 발전소에서 수동적 사이펀 방식을 사용할 수 있습니다. 이를 통해 일반 발전소에서도 영점 에너지를 추출할 수 있게 되어 효율을 100% 이상으로 높일 수 있습니다." # 13532322452875513247
  tech_giga_power_plant_3: "중력파 에너지 추출" # 4844620340447772518
  tech_giga_power_plant_3_desc: "중력파는 탐지하기 매우 어렵지만 엄청난 양의 에너지를 포함하고 있습니다. 작은 질량조차도 이러한 파동의 형태로 막대한 양의 중력 에너지를 방출합니다. 고급 추상 물리학 기술을 통해 중력파에서 직접 에너지를 추출할 수 있게 되었으며, 이는 차세대 원자로와 발전소의 등장을 가능하게 합니다." # 7910462147057819005
  tech_giga_planetary_shield_generator_2: "음질량 보호막" # 12306783922903218827
  tech_giga_planetary_shield_generator_2_desc: "£giga_sr_negative_mass£ §Y음질량§!을 활용하여 행성 대기 주변에 질량-에너지 척력 층을 생성함으로써, 이 구조물은 가장 강력한 궤도 폭격으로부터 행성을 보호합니다. 장기간의 폭격과 극도로 높은 에너지 빔만이 시간이 흐른 뒤 이 척력 층을 관통할 수 있습니다." # 4066441766876897520
  tech_giga_planetary_shield_generator_2_nomad: "음질량 보호" # 14335451737428422112
  tech_giga_planetary_shield_generator_2_nomad_desc: "£giga_sr_negative_mass£ §Y음질량§!을 활용하여 함선 선체 주위에 질량-에너지 반발 층을 생성함으로써, 이 기술은 함대 방어막을 더욱 강화합니다." # 5955707960892896255
  tech_quasi_neural_net: "준신경망" # 3147298734437777866
  tech_quasi_neural_net_desc: "행성-식물 뇌 연구를 통해 이루어진 발견은 인공 준신경망의 개발로 이어졌습니다. 이를 통해 다양한 응용 분야에서 대체적이고 알려지지 않은 데이터 전송 및 데이터 관리 방식을 수행할 수 있습니다." # 16745958009931866370
  tech_scourge_deployment: "스커지 배치" # 975403283586698603
  tech_scourge_deployment_desc: "스칼렛 스커지는 원래 의도대로 테라포밍제로 사용하거나, 모든 생명체를 파괴할 수 있는 행성 포괄 화학 무기로 사용할 수 있는 고급 합성 독소입니다. 사용 여부는 우리에게 달려 있습니다." # 2428581636723756751
  tech_ehof_sentient_tier_1: "지각 있는 금속 1단계" # 8996712397990784009
  tech_ehof_sentient_tier_1_desc: "지각 있는 금속 기술의 1세대는 $ehof_ep$ 송신기와 $PGATE_GALACTICS$에 대한 집중적인 연구를 통해 개발되었습니다. 이는 $giga_sr_sentient_metal$을 복제할 산업 구조에 중점을 둡니다." # 17227031090826266314
  tech_ehof_sentient_tier_2: "지각 있는 금속 2단계" # 16301658279726634836
  tech_ehof_sentient_tier_2_desc: "2세대 지각 금속 기술은 이 물질을 활용하여 우주선급 장갑을 제작하는 것과, 물질의 네트워크화된 지능을 사용하여 날아오는 발사체를 효과적으로 조준하고 무력화하는 새로운 유형의 대공 포탑을 만드는 것에 중점을 둡니다." # 5357350867243180817
  tech_ehof_sentient_tier_3: "지각 금속 3단계" # 14393337590194219445
  tech_ehof_sentient_tier_3_desc: "3세대 지각 금속 기술은 기존 장갑 설계를 더욱 정교하게 다듬었으며, 물질을 활용하여 적 함선을 조준하고 타격하는 새로운 유형의 레일건 설계를 가능하게 했습니다." # 10819317295633088172
  tech_ehof_sentient_tier_4: "지각 금속 4단계" # 738254817326907702
  tech_ehof_sentient_tier_4_desc: "4세대 지각 금속 기술은 이 물질을 활용하는 새로운 유형의 포병 시스템과, 물질의 네트워크화된 지능을 기반으로 하는 함선 컴퓨터를 포함합니다." # 2442877576097278162
  tech_ehof_sentient_tier_5: "지각 금속 5단계" # 18266055106812632668
  tech_ehof_sentient_tier_5_desc: "5세대 지각 금속 기술은 새로운 유형의 자동포와 더 많은 물질을 생산할 수 있는 개선된 제조 연구소를 포함합니다." # 4406378761202671403
  tech_ehof_sentient_tier_6: "지각 금속 6단계" # 13394364264309621395
  tech_ehof_sentient_tier_6_desc: "6세대 지각 금속 기술은 새로운 유형의 척추 장착형 캐논, 장갑 설계의 추가적인 수정, 그리고 $PGATE_GALACTICS$의 에너지원을 활용하여 막대한 에너지를 공급하는 동력원으로 구성됩니다." # 5161103563013217180
  tech_ehof_sentient_tier_7: "지각 금속 7단계" # 1137634828546467327
  tech_ehof_sentient_tier_7_desc: "끊임없이 변화하는 자들의 비밀을 연구한 결과로 개발된 7세대 지각 금속 기술입니다. 이 기술은 지각 금속을 사용하여 대상을 조준, 추적 및 타격하는 새로운 유형의 타이탄급 포탑 기술과, 더욱 진보된 형태의 지각 금속 장갑으로 구성됩니다." # 94945387749151672
  tech_sm_megastructure: "지각 금속 제련소" # 3186343405345444769
  tech_sm_megastructure_desc: "£gigastructural£ $giga_list_category_megastructure$ - $giga_list_category_strategic_resource_production$\n§Y$tech_sm_megastructure$§!은(는) $ehof_the_sphere_named$에서 물질을 추출하여 막대한 양의 $ehof_sm$와(과) $ehof_qnm$을(를) 생성하며, 제국의 $job_ehof_cultivator_swap_plural_with_icon$ 생산성을 향상시킵니다." # 9582851632075494525
  allow_sm_megastructure: "§H거대 구조물 잠금 해제:§! $tech_sm_megastructure$" # 7166574061462700726
  ehof_sm_megastructure_DESC: "$tech_sm_megastructure_desc$" # 4190140620092992545
  ehof_sm_forge_phase0: "$gc_mega$$tech_sm_megastructure$ 조립" # 14692616163391471805
  ehof_sm_forge_phase0_DESC: "$tech_sm_megastructure_desc$" # 4190140620092992545
  ehof_sm_forge_phase0_MEGASTRUCTURE_DETAILS: "$tech_sm_megastructure_desc$" # 4190140620092992545
  ehof_sm_forge_phase00: "$ehof_sm_forge_phase0$" # 3811051183480592445
  ehof_sm_forge_phase00_DESC: "$ehof_sm_forge_phase0_DESC$" # 12593518124257179318
  ehof_sm_forge_phase00_MEGASTRUCTURE_DETAILS: "$tech_sm_megastructure_desc$" # 4190140620092992545
  ehof_sm_forge_phase1: "$tech_sm_megastructure$ 거주 구역" # 2396506402562784534
  ehof_sm_forge_phase1_DESC: "$tech_sm_megastructure_desc$" # 4190140620092992545
  ehof_sm_forge_phase2: "$tech_sm_megastructure$ 추출 시설" # 11651514884659103387
  ehof_sm_forge_phase2_DESC: "$tech_sm_megastructure_desc$" # 4190140620092992545
  ehof_sm_forge_phase3: "$tech_sm_megastructure$ 이중 추출 시설" # 16048983993831547810
  ehof_sm_forge_phase3_DESC: "$tech_sm_megastructure_desc$" # 4190140620092992545
