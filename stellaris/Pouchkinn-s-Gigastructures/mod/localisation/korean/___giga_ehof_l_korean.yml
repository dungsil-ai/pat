  origin_incohesive: "섬에서의 격리" # 643882715838262424
  origin_incohesive_desc: "이 문명은 우주와는 동떨어진 공간의 고립된 행성에서 완전히 발전했습니다." # 10167754531548605975
  origin_incohesive_effect_desc: "- §L웜홀 응집 성단§!에서 시작하며, 인근에는 파괴된 §LEHOF Alpha§! 블랙홀 성계가 존재합니다.\n- 또한 EHOF 기술에 대한 약간의 진척도가 부여되어, EHOF를 조기에 복구할 수 있습니다.\n\n§R인근 행성이나 자원 매장량이 부족하여 시작이 느립니다. 멀티플레이어용으로 밸런스가 조정되지 않았습니다.§!" # 14419698536380965206
  ehof_origin_init_NAME: "코헤시브 클러스터" # 8967869700289969864
  ehof_origin_init_DESC: "모성계가 $ehof_cohesive$ 성단 내에서 무작위로 생성됩니다." # 1367811301719710916
  sm_giga_arkship_ehof: "$tech_ehof_spinal$" # 16596124813815211088
  sm_giga_arkship_ehof_desc: "$tech_ehof_spinal$은 양자 거품에서 미세 웜홀을 팽창시켜 통행 가능한 은하 내 경로를 형성합니다." # 6184048172861754610
  sm_giga_arkship_ehof_tt: "§Y블랙홀 궤도에 있는 동안 먼 별들로 향하는 웜홀을 열 수 있습니다.§!\n§L기능과 유지비는 $tech_ehof_phase_03$ 및 $tech_ehof_phase_04$ 기술에 따라 증가합니다.§!" # 9475041522434739455
