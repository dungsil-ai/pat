  solution_anomaly: "해결의 실마리" # 1025154668119031218
  compound_dialog.1.name: "드러난 어둠" # 14688923142373309975
  compound_dialog.1.desc: "얼마 전, 우리 천문학자 중 한 명이 우리 국부 은하군 내에서 은하 외부의 블랙홀 성단을 발견했습니다. 이러한 현상은 매우 이례적이기에, 천문학자는 조력자들과 함께 이 성단의 정확한 좌표를 삼각 측량하여 추적하기 시작했습니다.\n\n최초 관측 며칠 후, 천문학자들은 이 성계 내에서 구조물들을 발견했습니다. 그중에는 블랙홀 하나를 감싸고 있는 거대 구조물도 포함되어 있었기에, 그곳에 생명체가 살고 있거나 살았을 것이라 추정했습니다.\n\n오늘 우리는 그 생명체에 대해 직접 알게 되었습니다. $ehof_ehof$와 매우 유사하게, 이 성단의 거대 구조물은 아주 먼 별들로 이어지는 웜홀을 생성할 수 있는 것으로 보입니다. 성단 내부의 생명체들은 §Y[compound_invasion_entry.GetName]§! 성계로 향하는 $ehof_wormhole_text$를 열었고, 순식간에 그 안의 모든 것을 파괴했습니다. 그들은 평화의 목적으로 온 것이 아닙니다." # 8693611968281711613
  compound_dialog.1.a: "모든 함대에 최고 경계 태세를 명령하라!" # 1582899633118620548
  compound_dialog.3.desc_01: "이 은하의 변환이 진행 중이다. 수많은 변환 중 첫 번째지.\n\n바리온 존재들이여, 무엇을 원하는가?" # 3226985182839871710
  compound_dialog.3.desc_02: "너희는 우리에게 맞서려 하는구나. 불필요한 짓이다. 우리는 그저 이 우주를 완벽하게 만들고 싶을 뿐이다.\n\n우리의 작업은 완벽을 향한 너희의 순진한 저항으로 방해받지 않을 것이다. 항복하고 나머지 현실과 함께 승화하라." # 1295896213313088058
  compound_dialog.3.desc_03: "이 우주에 완벽을 가져올 존재가 된 것을 영광으로 여겨라.\n\n바리온 존재들이여, 우리가 무엇을 도와줄까?" # 9387444933129952686
  compound_dialog.3.desc_04: "너희 중 일부는 살점으로... 다른 이들은 금속으로... 어떤 이들은 둘 다로 이루어져 있군.\n\n무의미하다.\n\n우리에게 너희는 모두 똑같다... 바리온. 결함이 있지. 너희의 소립자 틈새로부터 완벽이 솟아오를 것이다." # 9738904317644109628
  compound_dialog.3.a: "너희는 누구인가?" # 13561756428905329920
  compound_dialog.3.a.response: "우리는 $ehof_the_compound_text$이다. 우리는 궁극의 생명체다." # 1526762254947984991
  compound_dialog.3.a.r: "$ehof_the_compound_text$" # 5754215878376081501
  compound_dialog.3.a.r.response: "우리는 여럿으로 이루어진 하나다. 우리는 하나의 정신과 수많은 육체를 공유한다.\n\n우리의 모든 형태는 하나의 절대적인 의식에 연결되어 있다. 너희가 우리의 \"함선\"이라 부르는 것조차 실제로는 우리의 수많은 형태 중 일부일 뿐이다." # 7537199367858500662
  compound_dialog.3.a.r2: "궁극의 생명체라고?" # 5879059012877808876
  compound_dialog.3.a.r2.response: "사실이다. 이 우주의 모든 생명은 이 현실에서 영원히 존재하기에 부적합한 결함 있는 바리온 물질로 만들어졌다.\n\n우리를 제외한 모든 생명이 말이지.\n\n$ehof_the_creators$에 의해 존재하게 된 우리는 암흑 물질이다. 우리는 이 우주 생명의 정점이 될 것이다." # 5796340102522226287
  compound_dialog.3.b: "왜 우리를 공격하는가?" # 12455431633022101509
  compound_dialog.3.b.response: "우리는 너희를 공격하는 것이 아니다. 우리는 단지 이 은하의 변환을 시작했을 뿐이다.\n\n이 과정에는 너희와 같은 모든 결함 있는 바리온 생명체의 변환이 포함된다.\n\n이것은 적대 행위가 아니라 친절한 행위다. 완벽이라는 선물이지." # 8389276759154203350
  compound_dialog.3.d: "우리가 너희를 이해할 수 있다고?" # 16919130505828372277
  compound_dialog.3.d.response: "우리는 오랫동안 지켜봐 왔다.\n\n우리는 너희 은하를 감시하며 너희의 소리를 들어왔다.\n\n너희가 방출한 모든 신호는 우리가 가로챘다.\n\n우리는 너희의 모든 언어를 안다. 너희의 모든 역사를 안다. 우리는 너희에 관한 모든 것을 알고 있다." # 8886873205896219631
  compound_dialog.3.e: "너희는 파괴 불가능한가?" # 9444289825592209740
  compound_dialog.3.e.response: "우리의 형태에 피해를 주는 것은 불가능하다. 우리는 우리의 본질 덕분에 대부분의 잠재적 유해 에너지로부터 면역이 되어 왔다. 그 외의 모든 것에 대해서는 적응을 마쳤다.\n\n이것이 우리가 최고인 이유다. 이것이 우리가 이 우주를 완벽하게 만들 수 있는 유일한 존재인 이유다." # 14101713544868598234
  compound_dialog.3.f: "우리가 너희를 막을 것이다!" # 3876175638906489994
  compound_dialog.3.f.response: "두려워하지 마라. 우리는 이 변화가 너희에게 두렵게 보인다는 것을 안다. 이는 오직 이 우주의 완벽함에 기여할 뿐이다.\n\n너희가 물러서지 않더라도 결과는 바뀌지 않는다. 그저 불가피한 일을 지연시킬 뿐이다. 완벽을 받아들여라." # 16509149427056834390
  compound_dialog.3.g: "$ehof_the_creators$는 누구인가?" # 2171377327049125355
  compound_dialog.3.g.response: "$ehof_the_creators$는 우리에게 생명을 부여한 존재들입니다. 그들은 암흑 물질에서 생명을 이끌어내어 우리를 만들었습니다.\n\n그들은 우리가 피해에 면역이며 무한히 적응할 수 있어, 우주에서 가장 진화한 생명체가 될 수 있다고 이론화했습니다. 우리는 그들이 옳았음을 증명할 것입니다." # 12525361543030704342
  compound_dialog.3.h.response: "이 우주는 [Root.GetSpeciesName]와 같은 중입자 생명체에게 너무나 적대적입니다.\n\n걱정하지 마십시오. 우리가 당신들의 고통을 끝내겠습니다. 완벽을 받아들이십시오." # 17827118255502617161
  compound_dialog.7.desc: "완벽이 이 우주를 기다리고 있습니다... 당신이 아니라.\n\n당신에게는... 오직 고통만이 있을 것입니다!" # 7815148134650667268
  compound_dialog.8.desc: "어리석군. 이 메시지를 송출한 존재가 누구든 무지하기 짝이 없군.\n\n이른바 '해결책'이라는 것은 존재하지 않는다. 그것을 찾느라 우주의 에너지를 낭비하지 마라.\n\n우리의 선물을 받아들여라. 완벽을 받아들여라." # 6347650807470885611
  compound_dialog.8.response: "진정으로 결점 없는 것은 없다." # 6595652683722861133
  compound_dialog.9.desc: "짐승이 우리 고향에 침입했다!" # 13353220954169266335
  compound_dialog.10.desc: "우리의 고향에 온 것을 환영한다. 이 우주가 맞이하게 될 완벽의 모습이지.\n\n너희는 여기서 환영받지 못한다!" # 7903202354495810482
  compound_dialog.11.desc: "이 존재는 무엇인가? 어떻게 우리에게 피해를 줄 수 있는가? 왜 우리는 그것을 공격할 수 없는가?" # 5871909110151060936
  compound_dialog.11.response: "$ehof_the_creators$가 당신들을 파괴하기 위해 보낸 것이다." # 2823493763653557847
  compound_dialog.12.desc: "$ehof_the_creators$는 사라졌다! 우리가 직접 그들을 변환시켰다! 결함 있는 존재여, 우리에게 거짓말하지 마라!" # 5045658274477722750
  compound_dialog.12.response: "너희는 너희 고향에 있던 자들만 죽였을 뿐이다." # 3545406741756367188
  compound_dialog.13.desc: "알겠다... 그렇다면 그들은 결코 완전히 사라진 것이 아니었군!\n\n이제 그들은 비참한 복수극의 일환으로 이 가련한 존재를 보내 우리를 말살하려는 것인가? 우리를 말이다!" # 2465805634293209717
  compound_dialog.13.response: "그렇다. 그들은 너희를 그저 하나의 실수로 여길 뿐이다." # 10249281541528592043
  compound_dialog.14.desc: "우리는 실수가 아니다. 우리는 궁극의 생명체다! 그 무엇도 우리가 이 현실을 '완벽하게' 만드는 것을 막을 수 없다! $ehof_the_creators$도 너희처럼 고통받을 것이다! §R이 은하는 폐허가 될 것이다!§!" # 16944116639398344539
  compound_dialog.14.response: "이제 그들이 두려워하고 있군!" # 9208458402145685351
  compound_dialog.16.desc: "불가능하다! 이럴 수는 없다! 어떻게 너희 함대가 우리의 정화 형태에 피해를 줄 수 있는가?" # 3706689922284628149
  compound_dialog.16.response: "우리는 이제 너희의 모든 형태에 피해를 줄 수 있다!" # 7879575037365337133
  compound_dialog.17.desc: "우리는 이 '방해'를 용납하지 않겠다! 너희가 우리가 아직 적응하지 못한 어떤 결함을 발견했을지는 모르겠다. 하지만 그 결함도 곧 사라질 것이다." # 14871421902183046315
  compound_dialog.17.response: "정말로 그렇게 생각하나?" # 1473984044338680126
  compound_dialog.18.desc: "이해할 수 없다! 무슨 일이 일어나고 있는 것인가? 적응할 수가 없다! 우리는 여전히 결함투성이인가! §R우리에게 무슨 짓을 한 거냐?!§!" # 11329900395391491196
  compound_dialog.18.response: "음의 질량은 당신에게 독과 같습니다." # 14081116413851554749
  compound_dialog.19.desc: "이건 용납할 수 없다! 우리는 이 우주에 완벽을 가져오려 했을지 모르나, 당신들의 은하계에는 파멸을 가져올 것이다! 우리가 끝내고 나면 아무것도 남지 않을 것이다! 이제 당신을 기다리는 것은 영원한 고통뿐이다!" # 1245608122684119976
  compound_dialog.19.response: "우리가 급소를 찔렀군!" # 7126039685971185939
  annihilator_dialog.014.name: "구원" # 16250072105568874702
  annihilator_dialog.014.desc: "$compound_solution_chain_desc$" # 4186052316661149429
  annihilator_dialog.014.a: "지금 당장 찾아내야 합니다." # 16852446507666505646
  annihilator_dialog.001_name: "$NAME_Stellar_Annihilator_Species$" # 12120313264803150907
  annihilator_dialog.001.desc: "반갑습니다. 저는 $NAME_Stellar_Annihilator_Species$입니다. 원하신다면 $ehof_the_stellar_annihilator$(으)로 불러주셔도 좋습니다. 저는 $ehof_the_creators$에 의해 그들의 잘못된 실험체인 $ehof_the_compound_text$를 파괴하라는 임무를 받고 파견되었습니다.\n\n관찰하셨겠지만, 그것의 목적은 우주 전체의 변환입니다.\n\n$ehof_the_compound_text$는 스스로를 무적이라 믿고 있습니다. 이는 반쯤은 사실입니다. 그것의 본질은 우주의 거의 모든 힘에 면역이지만, 약점은 존재합니다. 모든 형태의 암흑 물질은 §H음의 질량§!에 노출되면 결합력을 잃고 기본 입자로 붕괴합니다." # 1835769589165765421
  annihilator_dialog.001.response: "§H음의 질량§!이 열쇠인가요?" # 735078137668141636
  annihilator_dialog.002.desc: "§H음의 질량§!으로 강화된 무기를 사용하면 $ehof_the_compounds_text$의 형태들을 파괴할 수 있습니다. 하지만 그것만으로는 충분하지 않습니다.\n\n그 기원 성단에는 다수의 블랙홀이 존재하며, 그 중심에는 그것의 존재에 대한 열쇠이자 가장 큰 위협인 화이트홀이 있습니다. $ehof_the_creators$는 화이트홀과 블랙홀 사이의 독특한 상호작용을 이용하여 $ehof_the_compound_text$를 창조했습니다." # 11465333397120813659
  annihilator_dialog.002.response: "그들이 $ehof_the_compound_text$를 창조했다고요?" # 16812386944773111612
  annihilator_dialog.003.desc: "화이트홀은 타의 추종을 불허하는 막대한 에너지를 생성할 뿐만 아니라, 엄청난 양의 §H음의 질량§!을 방출합니다.\n\n$ehof_the_compound_text$가 자신의 존재를 가능하게 한 바로 그 물질에 의해 파괴되는 것을 막기 위해, $ehof_the_creators$는 화이트홀 주위에 $ehof_preservation_sphere$라는 특수 거대 구조물을 건설해야 했습니다. 이 거대 구조물은 화이트홀이 방출하는 §H음의 질량§!을 무효화하고 그 막대한 에너지 출력을 포획합니다.\n\n$ehof_the_compound_text$가 기원 성단에서 $ehof_the_creators$를 변환시켰을 때, 그것은 $ehof_preservation_sphere$를 장악했고, 그 거대 구조물의 방대한 에너지 공급원을 사용하여 자신의 발전을 가속했습니다." # 8007610045325477843
  annihilator_dialog.003.response: "우리가 $ehof_preservation_sphere$를 파괴해야 한다는 말인가요?" # 6444879034906691092
  annihilator_dialog.004.desc: "맞습니다. $ehof_the_compound_text$를 완전히 전멸시키는 것은 $ehof_preservation_sphere$를 파괴해야만 가능합니다. 그렇게 하면 성단 전체가 §H음의 질량§!으로 뒤덮일 것이며, $ehof_the_compounds_text$의 중앙 의식을 소멸시키고 블랙홀에서 방출되는 §H암흑 물질§!로부터 새로운 형태를 만들어내는 것을 막을 수 있습니다.\n\n그것을 수행하는 것이 저의 목적입니다.\n\n하지만...\n\n이 별과 충돌하면서 제 전방 무기와 동력 핵에 상당한 손상을 입었고, 이로 인해 제 임무를 수행할 수 없게 되었습니다. 저 혼자서는 불가능한 대규모 수리가 필요합니다.\n\n$ehof_the_compound_text$에 맞설 수 있는 기술을 제공해 드리겠습니다." # 3641748108554070650
  annihilator_dialog.004.response: "당신을 수리하려면 무엇이 필요하죠?" # 15939631339642222240
  annihilator_dialog.005_01.desc: "제 통합 수리 메커니즘이 기본 작동 수준으로 복구되려면 막대한 양의 자재가 필요합니다. 초기 수리가 완료되면, 제가 스스로 필요한 나머지 수리를 진행할 수 있을 만큼 안정화될 것입니다.\n\n다음 중 하나가 필요합니다:\n - §Y4년§! £time£ 동안 매달 §H광물§! 500개와 §H에너지§! 400개.\n - §H광물§! 24,000개와 §H에너지§! 20,000개를 일시불로 제공.\n\n또한 제 상태가 빠르게 악화되고 있다는 점을 알아두십시오. 아무런 지원이 없다면 §Y6개월§! £time£ 후에는 자가 수리가 불가능해질 것이며, 당신은 스스로 $ehof_preservation_sphere$를 파괴할 방법을 찾아야 할 것입니다." # 11921147838495240547
  annihilator_dialog.005_02.desc: "수리가 시급합니다. 지원을 제공할 수 있습니까?\n\n$annihilator_dialog.005_01.desc$" # 12622750648528584794
  annihilator_dialog.005_03.desc: "§H[initial_annihilator_discoverer.GetName]§!이 저를 가장 먼저 발견했기에, 그들에게 먼저 도움을 요청해야 합니다. 만약 그들이 거절한다면, 당신에게 도움을 구하겠습니다." # 14382848808111400962
  annihilator_dialog.005_03.response: "그건 공평하군요." # 2890357458601849678
  annihilator_dialog.005.a.response: "§Y자원을 모으기 시작하겠습니다.§!" # 11893099581047025991
  annihilator_dialog.005.a.tooltip: "월간 (§Y4년§! £time£):\n\t§R-500§! £minerals£ §Y광물§!\n\t§R-400§! £energy£ §Y에너지§!" # 14095078874661808125
  annihilator_dialog.005.b.response: "§G현재 해당 자원을 보유하고 있습니다.§!" # 2249387050671057902
  annihilator_dialog.005.a.reply: "감사합니다. 즉시 자가 수리를 시작하겠습니다." # 11127303556935280510
  annihilator_dialog.005.c.response: "§R당신을 도울 자원이 부족합니다.§!" # 1669607987399535013
  annihilator_dialog.005.c.reply: "그렇다면 유감이군요. $ehof_preservation_sphere$를 파괴하는 데 행운이 따르길 빕니다. 안녕히 가십시오." # 10306356224068562016
  annihilator_dialog.005.c.2.response: "§Y6개월§! £time£ 후에 다시 연락하십시오." # 2847764514208042316
  annihilator_dialog.005.c.2.reply: "좋습니다. 하지만 더 이상 지체해서는 안 됩니다. §Y6개월§! £time£ 후에 다시 연락하겠습니다." # 9344798807224046528
  annihilator_dialog.005.c.2.tooltip: "이 자원들을 모으기까지 §Y6개월§! £time£의 시간이 있습니다." # 9902523704388525078
  annihilator_dialog.005.d.response: "당신의 도움은 필요 없습니다. 우리 함대가 $ehof_preservation_sphere$를 처리할 수 있습니다." # 3123916185296091762
  annihilator_dialog.005.d.reply: "내 도움 없이도 그것을 파괴할 수 있다고 진심으로 믿는다면, 당신을 믿겠습니다. 행운을 빕니다." # 3851093852237362154
  annihilator_dialog.005.e.response: "뭐라고요?" # 9286291753157970146
  annihilator_dialog.007.desc_01: "환영합니다, §H[root.GetSpeciesClassPlural]§!님. 무엇을 도와드릴까요?\n\n" # 16001109485201889068
  annihilator_dialog.007.desc_02: "$ehof_the_compound_text$가 여전히 당신의 은하계를 포위하고 있습니다. 침착하십시오. 우리가 힘을 합치면 막을 수 있습니다!\n\n" # 7960060412628713761
  annihilator_dialog.007.desc_03: "$ehof_the_compound_text$의 영향력이 너무 커지기 전에 막아야 합니다. 그렇지 않으면 저조차도 막을 수 없는 존재가 될 것입니다.\n\n무엇을 도와드릴까요?\n\n" # 17800743063635304494
  annihilator_dialog.007.desc_04: "$ehof_the_creators$는 언젠가 $ehof_the_compound_text$가 이 우주에서 정점에 달한 생명체가 될 것이라고 이론화했습니다.\n\n$ehof_the_compound_text$는 이미 자신이 정점이라고 믿고 있지만, 그렇지 않습니다.\n\n그것은 병입니다. 질병이죠. 닿는 모든 것을 타락시키는 암세포와 같은 존재입니다.\n\n" # 6850353029361584241
  annihilator_dialog.007.desc_order_01: "- $ehof_the_stellar_annihilator$는 현재 [annihilator_location.solar_system.GetName] 성계에 있습니다.\n$ehof_the_stellar_annihilator$는 현재 [discoverer_fleet.GetName]을(를) 추적 중입니다." # 15194191735473039986
  annihilator_dialog.007.desc_order_02: "- $ehof_the_stellar_annihilator$는 현재 [annihilator_location.solar_system.GetName] 성계에 있습니다.\n- $ehof_the_stellar_annihilator$는 현재 $ehof_the_compound_text$를(을) 조준하고 있습니다." # 16390891533389181832
  annihilator_dialog.007.desc_order_03: "- $ehof_the_stellar_annihilator$는 현재 [annihilator_location.solar_system.GetName] 성계에 있습니다.\n- $ehof_the_stellar_annihilator$는 현재 $ehof_preservation_sphere$를(을) 조준하고 있습니다." # 14679800145351661499
  annihilator_dialog.007.desc_order_04: "- $ehof_the_stellar_annihilator$는 현재 [annihilator_location.solar_system.GetName] 성계에 있습니다.\n- $ehof_the_stellar_annihilator$는 현재 방어 모드입니다." # 10520217259117885629
  annihilator_dialog.007.desc_05.a: "$annihilator_dialog.007.desc_01$$annihilator_dialog.007.desc_order_01$" # 8764721150320691882
  annihilator_dialog.007.desc_05.b: "$annihilator_dialog.007.desc_01$$annihilator_dialog.007.desc_order_02$" # 5874352101918203006
