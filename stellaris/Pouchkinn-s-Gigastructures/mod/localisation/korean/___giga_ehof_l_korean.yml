  ehof_reply_not_good: "좋지 않군요..." # 12707931092244359731
  ehof_megastructure.008.desc: "현재 사용 중인 것보다 더 발전된 $ehof_ehof$를 포획했습니다. 더 나은 $ehof_ehof$로 운영을 이전하시겠습니까?\n\n이전하지 않기로 결정하시면, 현재 $ehof_ehof$가 전략적으로 배치된 것으로 간주하고 다시는 이전에 대해 묻지 않겠습니다." # 3502139456519483670
  ehof_megastructure.008.a: "아니요" # 3846534607940335394
  ehof_megastructure.008.b: "네" # 3389992145996609386
  ehof_megastructure.410.desc: "분명한 이유가 있으시겠지만, $ehof_ehof$를 해체하시겠다는 것을 100% 확신하십니까?\n\n§R이 작업은 되돌릴 수 없습니다§!" # 13139087803909679688
  ehof_megastructure.410.a: "100% 확신합니다" # 16502658522276693926
  ehof_megastructure.101_name: "$ehof_ehof$" # 3695260684128632650
  ehof_megastructure.101_desc_0: "계획된 $ehof_ehof$의 건설 부지가 완성되었으며, 프로젝트가 다음 단계로 넘어갈 준비가 되었습니다. 필요한 자원을 확보하면 시설 건설을 시작할 수 있습니다." # 16138520744147352294
  ehof_megastructure.101_desc_1: "$ehof_ehofp1$이(가) 완성되었습니다!\n\n이 거대 구조물은 우리 사회의 가장 위대한 업적 중 하나입니다. 이제 이것으로 우주의 구조 자체를 뒤틀어 은하계 어디로든 $ehof_wormhole_text$를 생성할 수 있습니다." # 12141375540144747196
  ehof_megastructure.101_desc_2: "$ehof_ehofp2$가(이) 완성되었습니다!\n\n거대 구조물을 추가로 업그레이드하여 새로운 이동 능력과 $ehof_wormhole_text$ 안정화 과정에 대한 더 많은 지식을 습득했습니다." # 65000868775579288
  ehof_megastructure.101_desc_3: "$ehof_ehofp3$가(이) 완성되었습니다!\n\n거대 구조물을 추가로 업그레이드하여 $ehof_wormhole_text$ 안정화 과정의 효율성을 높이고 시설의 잠재적 목표 지점을 확장했습니다." # 14635374312706258045
  ehof_megastructure.101_desc_4: "놀라운 성과입니다. 시설의 마지막 추가 설비로 $ehof_wormhole_text$ 이동에 대한 완전한 지배력을 확보했습니다!\n\n이제 $ehof_wormhole_text$ 안정화 효율이 100%에 도달했으며, 터널을 연결할 수 있는 목적지에 제한이 없습니다." # 7406072565113388119
  ehof_megastructure.101_desc_restored: "§H[ehof_recently_built_system.GetName]§!의 $ehof_ehofp2$가(이) 이전의 영광을 되찾았습니다.\n\n이제 이것으로 우주의 구조 자체를 뒤틀어 은하계 어디로든 $ehof_wormholes_text$를 생성할 수 있습니다." # 16352519174727653498
  ehof_redo_prefix: "§G마지막으로 지정된 성계 유형에 연결 시도§!\n--------------------------------" # 9571015544348284906
  ehof_redo_notready_tooltip: "$TRIGGER_FAIL$§R$ehof_ehof$를 사용할 준비가 되지 않았습니다§!\n\n" # 9909283948541793050
  ehof_p1_desc: "§H$ehof_ehofp1$§!\n이 시설은 매우 제한된 종류의 항성으로만 터널을 연결할 수 있습니다. 비전 균열 조작기는 여전히 우리에게 큰 수수께끼이며, 매우 제한적인 수준으로만 활용할 수 있습니다. 시설의 단점을 알고는 있지만, 현재로서는 정확도와 능력을 향상할 기술이나 통찰력이 부족합니다." # 11625578197121722029
  ehof_p2_desc: "§H$ehof_ehofp2$§!\n이전 모델보다 약간 개선된 이 시설은 더 다양한 종류의 항성으로 터널을 연결할 수 있습니다." # 10372590387980095253
  ehof_p2_nomad_desc: "§H$tech_ehof_spinal$§!\n이 척추 마운트는 제한된 종류의 항성으로만 터널링할 수 있습니다. 우리의 항성 항법 경험은 매우 유용하지만, 아케인 균열 조작기가 여전히 미지의 영역으로 남아 있어 도달 범위에 한계가 있습니다." # 14866156126645381168
  ehof_p3_desc: "§H$ehof_ehofp3$§!\n완벽하게 장비를 갖춘 이 시설은 이전 모델보다 크게 개선되었으며, 모든 종류의 항성으로 터널을 연결할 수 있습니다." # 5550493150972073710
  ehof_p3_nomad_desc: "§H$tech_ehof_phase_03_nomad$§!\n완벽하게 장비를 갖춘 이 척추 마운트는 이전 모델보다 크게 향상되었으며, 모든 유형의 항성으로 터널링할 수 있습니다." # 11649061896585688245
  ehof_p4_desc: "§H$ehof_ehofp4$§!\n오메가가 정점이라고 확신했지만, 틀렸습니다. 이 시설은 모든 항성으로 터널을 연결할 수 있을 뿐만 아니라, 이제 연결을 무기한으로 유지할 수 있는 능력도 갖추었습니다. 또한, 이동하고자 하는 정확한 항성을 선택할 수 있습니다." # 2403765646958723957
  ehof_p4_nomad_desc: "§H$tech_ehof_phase_04_nomad$§!\n우리는 오메가가 정점이라고 확신했지만, 틀렸습니다. 이 척추 마운트는 모든 항성 유형으로 터널링할 수 있을 뿐만 아니라, 이제 연결을 무기한으로 유지할 수 있습니다. 또한, 원하는 정확한 항성을 선택하여 이동할 수 있습니다." # 14345897690403648217
  ehof_cohesive_desc: "$ehof_cohesive$ 성계: $ehof_ehof$의 예비 테스트 중, 비전 균열 조작기의 표적화 메커니즘을 통해서만 접근할 수 있는 은하 하이퍼레인 네트워크 외부의 항성들을 발견했습니다. 하지만 현재로서는 돌아올 방법이 없으므로, 이 성계에는 과학선과 건설선만 보내는 것이 현명할 것입니다." # 6031198988963836649
  ehof_cohesive_nomad_desc: "$ehof_cohesive$ 성계: $tech_ehof_spinal$의 예비 테스트 중, 아케인 균열 조작기의 표적화 메커니즘을 통해서만 접근할 수 있는 은하 하이퍼레인 네트워크 외부의 항성들을 발견했습니다. 현재 $tech_ehof_spinal$이 장착된 방주선을 보내지 않는 한 귀환할 방법이 없으므로, 이 성계들로 군사 함대를 보내지 않는 것이 현명할 것입니다." # 15634984859030016588
  ehof_travel.001.title: "[ehof_travel_menu_title]" # 14927855029364535540
  ehof_travel.001_01_desc: "$ehof_p1_desc$\n\n$ehof_cohesive_desc$\n\n$ehof_mega_phase.10041_response_2_p1$" # 17974010075731144227
  ehof_travel.001_02_desc: "$ehof_p2_desc$\n\n$ehof_cohesive_desc$\n\n$ehof_mega_phase.10041_response_2_p2$" # 12478522902250098033
  ehof_travel.001_02_nomad_desc: "$ehof_p2_nomad_desc$\n\n$ehof_cohesive_nomad_desc$\n\n$ehof_mega_phase.10041_response_2_p2_nomad$" # 583738696328418297
  ehof_travel.001_03_desc: "$ehof_p3_desc$\n\n$ehof_cohesive_desc$\n\n$ehof_mega_phase.10041_response_2_p3$" # 17764973384036502192
  ehof_travel.001_03_nomad_desc: "$ehof_p3_nomad_desc$\n\n$ehof_cohesive_nomad_desc$\n\n$ehof_mega_phase.10041_response_2_p3_nomad$" # 7335216348931834498
  ehof_travel.001_04_desc: "$ehof_p4_desc$\n\n$ehof_cohesive_desc$\n\n$ehof_mega_phase.10041_response_2_p4$" # 3996224553365151713
  ehof_travel.001_04_nomad_desc: "$ehof_p4_nomad_desc$\n\n$ehof_cohesive_nomad_desc$\n\n$ehof_mega_phase.10041_response_2_p4_nomad$" # 7375198577112124574
  ehof_cause: "§H원리§!: 찰나의 순간마다 우주의 모든 지점에서 양자 요동으로 인해 수많은 가상 입자-반입자 쌍이 생성됩니다. 이러한 요동은 양자 거품이라 알려진 공간의 미시적 구조를 형성합니다. 이 양자 거품 속에서는 극히 짧은 시간 동안만 존재하는 가상 미세 블랙홀이 나타날 수 있습니다. 이러한 블랙홀은 양자 터널링을 통해 실제 $ehof_wormholes_text$로 변할 수 있습니다. 비록 지속 시간은 여전히 매우 짧지만, 비전 균열 조작기(Arcane Rift Manipulator)를 이용해 이를 안정화하고 팽창시킴으로써 지점 간 즉각적인 우주 항행이 가능해질 잠재력이 있습니다." # 2043459091424878007
  ehof_effect: "§H이론§!: 회전하는 블랙홀의 에르고스피어 내부에서 가장 높은 밀도의 양자 요동을 발견할 수 있습니다. 거대한 회전력과 중력에 의해 이미 공간이 극도로 뒤틀린 그곳에서는 양자 거품이 매우 강하게 자극되어, 생성되는 미세 블랙홀의 수가 일반적인 공간보다 수십 배 더 많습니다. 따라서 잠재적인 $ehof_wormholes_text$의 수가 실용적인 용도로 활용하기에 충분합니다." # 2110281137409211272
  ehof_mega_phase.10041_response_2_p1: "$ehof_cause$\n\n$ehof_effect$\n\n§H응용§!: $ehof_ehofp1$은 압축 및 응축된 전자기장과 비전 균열 조작기를 활용하여 $ehof_wormholes_text$를 팽창시키고 안정화합니다.\n\n이 시설은 아직 매우 실험적인 단계에 있으며, 팽창 및 안정화 과정의 신뢰성이 매우 낮습니다. 따라서 $ehof_ehofp1$의 가능한 대상은 다음과 같습니다:\n - §E무작위 목적지§!\n - $ehof_category_01$\n - $ehof_category_02$\n - $ehof_category_03$" # 1900378975621978505
  ehof_mega_phase.10041_response_2_p2: "$ehof_cause$\n\n$ehof_effect$\n\n§H응용§!: $ehof_ehofp2$는 압축 및 응축된 전자기장, 비전 균열 조작기, 그리고 블랙홀의 사건의 지평선에 가해지는 음압을 활용하여 $ehof_wormholes_text$를 팽창시키고 안정화합니다.\n\n우리 승무원들이 장치에 대한 추가적인 접근 권한을 확보함에 따라 비전 균열 조작기의 확률적 대상 선정 루틴이 확장되었습니다.\n\n$ehof_ehofp2$의 대상은 다음과 같습니다:\n - §E무작위 목적지§!\n - $ehof_category_01$\n - $ehof_category_02$\n - $ehof_category_03$\n - $ehof_category_04$\n - $ehof_category_05$" # 15320134821199244957
  ehof_mega_phase.10041_response_2_p2_nomad: "$ehof_cause$\n\n$ehof_effect$\n\n§H적용§!: $tech_ehof_spinal$은 압축 및 응축된 전자기장, 비전 균열 조작기, 그리고 블랙홀의 사건의 지평선에 가해지는 음압을 활용하여 $ehof_wormholes_text$를 팽창시키고 안정화합니다.\n\n비전 균열 조작기의 확률적 목표 설정 루틴은 우리 승무원들이 장치에 대한 접근 권한을 추가로 확보함에 따라 확장되었습니다.\n\n$tech_ehof_spinal$ 목표 포함 항목:\n - §E무작위 목적지§!\n - $ehof_category_01$\n - $ehof_category_02$\n - $ehof_category_03$\n - $ehof_category_04$\n - $ehof_category_05$" # 1056314309093066496
  ehof_mega_phase.10041_response_2_p3: "$ehof_cause$\n\n$ehof_effect$\n\n§H응용§!: $ehof_ehofp3$는 추상 물리학의 돌파구와 $giga_sr_negative_mass$를 이용한 실험을 활용합니다. 고도로 발달한 경질광 구조물 투사기와 멸균 하이퍼 중성미자 탐지기는 $ehof_wormholes_text$ 팽창 기제의 정밀도와 효율을 100%까지 높여줍니다. 경질광 구조물 투사기는 전자기장 투사기를 대체하여 비전 균열 조작기를 보조합니다. 멸균 하이퍼 중성미자 탐지기를 통해 $ehof_ehofp3$는 $ehof_wormhole_text$가 터널링을 시작하기도 전에 그 대상을 결정할 수 있게 되며, 이를 통해 우리가 원하는 대상으로 선택적으로 웜홀을 열어 모든 유형의 천체로 이동할 수 있습니다.\n\n$giga_sr_negative_mass$ 주입기가 거대 구조물에 통합되어 열린 웜홀을 더욱 안정화합니다.\n\n$ehof_ehofp3$의 대상은 다음과 같습니다:\n - §E무작위 목적지§!\n - $ehof_category_01$\n - $ehof_category_02$\n - $ehof_category_03$\n - $ehof_category_04$\n - $ehof_category_05$\n - $ehof_category_06$\n - $ehof_category_07$" # 8487102286991834841
  ehof_mega_phase.10041_response_2_p3_nomad: "$ehof_cause$\n\n$ehof_effect$\n\n§H적용§!: $tech_ehof_phase_03_nomad$는 추상 물리학의 돌파구와 $giga_sr_negative_mass$를 이용한 실험을 활용합니다. 고도로 발달한 경질광 구조체 투영기와 멸균 하이퍼 중성미자 탐지기는 $ehof_wormholes_text$ 팽창 메커니즘의 정밀도와 효율을 100%까지 높입니다. 경질광 구조체 투영기는 전자기장 투영기를 대체하며 비전 균열 조작기를 보조합니다. 멸균 하이퍼 중성미자 탐지기는 $tech_ehof_phase_03_nomad$가 $ehof_wormhole_text$를 생성하기 전에 목표를 결정할 수 있게 해주며, 이를 통해 우리가 원하는 목표로 웜홀을 선택적으로 열어 모든 유형의 천체로 이동할 수 있게 합니다.\n\n$giga_sr_negative_mass$ 주입기가 장치에 통합되어 개방된 웜홀을 더욱 안정화합니다.\n\n$tech_ehof_phase_03_nomad$ 목표 포함 항목:\n - §E무작위 목적지§!\n - $ehof_category_01$\n - $ehof_category_02$\n - $ehof_category_03$\n - $ehof_category_04$\n - $ehof_category_05$\n - $ehof_category_06$\n - $ehof_category_07$" # 2930343207177453092
  ehof_mega_phase.10041_response_2_p4: "$ehof_cause$\n\n$ehof_effect$\n\n§H응용§!: $ehof_ehofp4$는 $ehof_the_sphere_named$에서 얻은 지식을 통해 완전히 복구된 비전 균열 조작기를 활용합니다. 완전한 상태의 이 유물은 우리가 정밀한 정확도로 성계를 표적으로 삼고 $ehof_wormholes_text$를 무기한 유지할 수 있게 해줍니다.\n\n$ehof_ehofp4$는 진정한 성간 여행의 정점입니다!" # 5948755440056783059
  ehof_mega_phase.10041_response_2_p4_nomad: "$ehof_cause$\n\n$ehof_effect$\n\n§H적용§!: $tech_ehof_phase_04_nomad$는 $ehof_the_sphere_named$에서 얻은 지식을 통해 완전히 복구된 비전 균열 조작기를 활용합니다. 완성된 상태의 이 유물은 우리가 정밀한 정확도로 성계를 목표로 삼고 $ehof_wormholes_text$를 무기한 유지할 수 있게 합니다.\n\n$tech_ehof_phase_04_nomad$는 진정한 성간 여행의 정점입니다!" # 18364828479970668229
  ehof_cooldown: "\n\n$ehof_ehof$가 §Y[root.ehof_cooldown_days]일§! 동안 재사용 대기 중입니다. £time£" # 13883115938049225368
  ehof_mega_check_desc: "§H[ehof_megastructure_system.GetName]§!에 있는 $ehof_ehof$에서 $ehof_wormhole_text$를 성공적으로 통과한 후, 시스템 기술자들은 우리 함선이 [ehof_destination_system.GetName]에 성공적으로 도착했다고 보고했습니다.\n\n$ehof_cooldown$" # 4866334090558889718
