  INVESTIGATE_CORE_ANOMALY: "핵심 이상 현상" # 959092719188967513
  INVESTIGATE_CORE_ANOMALY_DESC: "§H[from.GetName]§!에서 발견된 핵심 이상 현상에 대한 탐사 프로젝트가 승인되었습니다. 우리의 최고 [Owner.GetScientistPlural]와 [Owner.GetEngineerPlural]들이 핵심 이상 현상에 도달할 수 있는 기계를 개발하여 그 비밀을 밝혀내기 위해 노력하고 있습니다." # 15078933999713055793
  ehof_anomaly.10001.name: "핵심 시설" # 10608000121330233178
  ehof_anomaly.10001.desc: "§H[fromfrom.GetName]§! 중심부에 대한 탐사가 성공했습니다. 탐사팀은 §H[fromfrom.GetName]§! 내의 핵심 이상 현상이 사실은 미지의 고등 문명이 건설한 거대한 버려진 연구 시설임을 밝혀냈습니다.\n\n핵심 시설은 완전히 작동하는 것으로 보이나, 알 수 없는 사건으로 인해 약간의 손상을 입었습니다.\n\n탐사 결과에 따르면, 이 시설은 §H[fromfrom.GetName]§! 중심부의 이질적인 환경을 연구하기 위해 건설되었습니다. 시설을 건설한 이들에게 무슨 일이 일어났는지는 알 수 없습니다.\n\n사건으로 인한 손상을 조사한 결과, 시설의 상부 구조는 손상되지 않았으며 이곳에서 과거에 수행되었던 연구를 안전하게 계속할 수 있을 것으로 보입니다. 우리의 [Owner.GetScientistPlural]는 우리의 이익을 위해 시설을 사용할 것을 요청하며, 이것이 우리 연구에 매우 귀중한 자산이 될 것이라고 말합니다." # 9088721336461290088
  ehof_anomaly.10001.a: "놀랍군. 핵심 시설을 재가동할 준비를 하라." # 6979189330362034298
  ehof_anomaly.10001.b: "가장 가치 있는 기술을 해체하고 시설을 떠나라." # 14213602056548156733
  EXPLORE_LARGE_STATION: "손상된 우주 정거장" # 7958584112673081198
  EXPLORE_LARGE_STATION_DESC: "우리 정부는 §H[from.GetName]§! 궤도에 있는 파손된 우주 정거장에 대한 탐사 프로젝트를 승인했으며, 현재 우리 [Owner.GetScientistPlural]는 정거장을 조사하기 위해 무장 탐사대를 준비하고 있습니다." # 6302761575229965226
  ehof_anomaly.10002.name: "버려진 정부 청사" # 4531447725566339160
  ehof_anomaly.10002.desc: "§H[fromfrom.GetName]§! 궤도에 있는 거대한 우주 정거장을 탐사한 탐사대는 정거장의 초기 목적을 밝혀냈습니다.\n\n팀이 수집한 데이터에 따르면, 이 거대한 우주 정거장은 §H[fromfrom.GetName]§!의 이전 문명에서 중앙 정부 청사 역할을 했습니다.\n\n§H[fromfrom.GetName]§!의 문명은 초국가적 정부의 회원국들 간의 긴장으로 인해 전 지구적 갈등 직전에 놓여 있었으며, 이는 결국 열핵전쟁으로 이어져 §H[fromfrom.GetName]§!을 황폐화했습니다. 이러한 긴장은 §H[fromfrom.GetName]§!에 존재하는 중요한 자원의 부족으로 인해 발생했으며, 이전 거주자들은 이를 \"곤바(Gonva)\"라고 불렀던 것으로 보입니다.\n\n우리 [Owner.GetScientistPlural]는 정거장의 기록만으로는 해당 자원을 식별할 수 없었지만, 기록에 따르면 그 자원은 그들 사회의 거의 모든 수준에서 기능하는 데 필수적이었음을 나타냅니다." # 8861994336492859256
  ehof_anomaly.10002.a: "끔찍하군! 또 다른 문명이 자신의 탐욕으로 파괴되었어." # 17534454709147220647
  STUDY_NATURAL_NETWORK: "상호 연결된 식물 속(屬)" # 3709401099374224107
  STUDY_NATURAL_NETWORK_DESC: "우리 [Owner.GetScientistPlural]는 §H[from.GetName]§!의 숲으로 진입할 준비를 하고 있으며, 그곳에서 행성 표면 전체에 걸쳐 네트워크를 형성하고 있는 독특한 식물 속(屬)에 대해 더 많은 정보를 얻기를 기대하고 있습니다." # 1937653596022025258
  ehof_anomaly.10003.name: "행성 식물 두뇌" # 12466017348378303171
  ehof_anomaly.10003.desc: "§H[fromfrom.GetName]§!에 있는 상호 연결된 식물 속(屬)에 대한 장기 연구는 놀라운 사실을 밝혀냈습니다.\n\n이 식물들은 사실 지구 전체에 걸쳐 뻗어 있는 거대한 두뇌처럼 행동하고 있습니다. 개별 식물들은 뉴런이나 시냅스처럼 기능하는 군집을 형성합니다. 이 \"행성 식물 두뇌\"는 심지어 원시적인 형태의 의식까지 가지고 있는 것으로 보입니다!\n\n안타깝게도 이 두뇌와 소통하려는 시도는 실패했습니다. 우리 [Owner.GetScientistPlural]는 이 두뇌가 사고와 같은 논리적 연산을 수행할 만큼 충분히 발달하지 않았거나, 아예 소통할 수 없는 상태라고 판단하고 있습니다.\n\n두뇌의 의식 여부와 관계없이, 그 기능은 우리에게 고급 네트워크 메커니즘에 대한 통찰력을 제공했으며, 이를 통해 우리 네트워크에 도움이 되는 기술을 더욱 발전시킬 수 있을 것입니다." # 17594756522423864235
  ehof_anomaly.10003.a: "정말 흥미로운 발견이군!" # 18219180067391400293
  EXPLORE_ABANDONED_STATION: "소행성 정거장" # 7212012581874380480
  EXPLORE_ABANDONED_STATION_DESC: "버려진 것으로 보이는 소행성 정거장을 탐사하기 위해 여러 무장 탐사대가 파견되었습니다.\n\n그들은 정거장의 초기 목적을 밝히고 우리 센서가 놓쳤을지도 모를 생명체의 흔적을 찾아야 합니다." # 14862884492784744218
  ehof_anomaly.10004.name: "수수께끼의 버려진 식민지" # 10058032002692125042
  ehof_anomaly.10004.desc: "연결된 소행성 정거장에 대한 우리의 조사는 아직 완전히 이해되지 않은 우려스러운 발견으로 이어졌습니다.\n\n조사 결과에 따르면, 이 정거장은 원래 수십만 명의 거주자를 수용하고 부양할 수 있는 완전한 자급자족형 식민지였습니다.\n\n컴퓨터 시스템 내에서 발견된 기록에 따르면 이곳은 엄청난 지각 변동으로 인해 행성이 파괴된 문명의 피난처 역할을 했습니다.\n\n우려스럽게도, 이 정거장은 우리 탐사대를 제외하고는 그 어떤 생명체도 없는 완전히 텅 빈 상태로 보입니다. 인공 대기 속의 미생물조차 발견되지 않았습니다. 우리가 도착하기 전 어느 시점에 알 수 없는 사건으로 인해 식민지 내의 모든 생명체가 완전히 제거된 것으로 보입니다.\n\n식민지 컴퓨터 코어에 대한 추가 조사 결과, 32년 121일 전에 기록된 17분 동안의 기록이 복구 불가능하게 손상되었음이 확인되었습니다. 정거장의 모든 생명체가 사라지게 된 사건이 바로 그 17분 사이에 발생했을 가능성이 있습니다.\n\n우리 [Owner.GetScientistPlural]는 정거장에서 복구 가능한 기술을 회수하고 떠나는 것이 좋을지, 아니면 우리 국민을 위한 귀중한 식민지로 활용하는 것이 좋을지 논의 중입니다." # 17530347293434990812
  ehof_anomaly.10004.a: "이 정거장은 그냥 버리기엔 너무 유용해." # 12116172091277466610
  ehof_anomaly.10004.b: "이곳은 저주받은 것 같군. 떠나는 게 좋겠어!" # 18078253331537906082
  ehof_anomaly.16.name: "실종" # 5707995093353543662
  ehof_anomaly.16.desc: "끔찍한 일입니다! §H[fromfrom.GetName]§!로부터 우리 식민지 개척자들에게 갑작스럽고 기이하며 격렬한 정신 붕괴가 발생했다는 보고를 받았습니다. 주민들이 이러한 붕괴를 겪는 속도는 보고가 갑자기 중단될 때까지 계속 증가했습니다.\n\n우리는 해당 식민지에 조사팀을 파견했으나, §H[fromfrom.GetName]§!의 원래 주민들과 마찬가지로 우리 식민지 개척자들도 알 수 없는 이유로 사라졌다는 사실을 발견했습니다.\n\n정거장 기록에 따르면 마지막 보고가 전송된 직후 17분 동안 동일한 데이터 손상이 발생했습니다.\n\n§H[fromfrom.getName]§!에서 발생한 이러한 비정상적인 사건의 원인은 여전히 미스터리로 남아 있습니다." # 15674381638088811853
  ehof_anomaly.16.a: "진작 알았어야 했는데..." # 18062235983557345358
  STUDY_PLASMATIC_LIFE: "플라즈마 생명체 연구" # 8475886277929536985
  STUDY_PLASMATIC_LIFE_DESC: "우리 정부는 플라즈마 생명체에 대한 직접적인 연구를 승인했습니다.\n\n최대 485°C에 달하는 지표면 온도를 가진 §H[from.GetName]§!의 치명적인 환경에 배치될 수 있도록 강화 및 보호된 장비들이 준비되고 있습니다." # 470706634994409419
  ehof_anomaly.10005.name: "무기질 플라스마 생명체" # 6649771347087280644
  ehof_anomaly.10005.desc: "플라스마 생명체를 연구하고 그들의 생태계를 관찰한 결과 놀라운 사실을 발견했습니다! 이들의 의사 유전적 기반을 분석한 결과, 이 생명체들이 진정한 무기질 생명체라는 사실이 밝혀졌습니다.\n\n무기질 생명체가 발생하기 위한 조건은 극도로 복잡하고 희귀하기 때문에, 지금까지 거의 발견된 적이 없었습니다.\n\n이들의 세포는 독특한 생물학적 구성을 지니고 있으며, 대사 과정을 운영하기 위해 고온 산화 메커니즘과 단순하지만 강력한 액체 금속을 '혈액'으로 사용합니다.\n\n이러한 특성 덕분에 이들은 이 극한 환경에서 생존하고 번성할 수 있습니다.\n\n단세포 및 다세포 생물들이 발견되었으며, 모두 무성 생식이 가능합니다. 아직 유성 생식 형태는 발견되지 않았지만, 우리 [Owner.GetScientistPlural]는 더 복잡한 생물체, 어쩌면 사회적 상호작용이 가능한 고등 생명체를 찾기 위해 2차 조사를 시작하고자 합니다." # 12688669435167962435
  ehof_anomaly.10005.a: "놀라운 생명체들이군. 연구를 확장하라." # 9144446529151008535
  ehof_anomaly.10005.b: "이 독특한 생태계를 훼손되지 않은 상태로 두어야 한다." # 8652254999388301443
  INVESTIGATE_INTELLIGENT_PLASMATICS: "고등 플라스마 생명체 탐색" # 4750758047802559376
  INVESTIGATE_INTELLIGENT_PLASMATICS_DESC: "정부의 승인에 따라, 우리 [Owner.GetResearchers]는 §H[from.GetName]§!의 플라스마 생태계에 대한 강도 높고 야심 찬 탐사를 시작하여 사회적 상호작용이 가능한 지능형 플라스마 생명체를 찾기로 했습니다." # 5330848656489915824
  ehof_anomaly.10006.name: "플라스마 사회" # 15705413176275509284
  ehof_anomaly.10006.desc: "§H[fromfrom.GetName]§!의 플라스마 생태계 탐사에서 놀라운 돌파구를 마련했습니다!\n\n§H[fromfrom.GetName]§!의 남극 근처에서 우리 [Owner.GetResearchers]는 사회적 플라스마 존재들을 마주했습니다. 이 생명체들은 신체를 도구로 사용하여 간단한 구조물을 만들 수 있고, 서로 의사소통하며 작은 무리를 형성할 수 있는 것으로 보입니다. 이러한 무리 생활은 개체의 생존율을 높여줍니다. 분석된 관찰 데이터에 따르면, 이들은 수렵 채집 이전 단계의 발달 수준에 머물러 있습니다. 아직 고등 사회적 생명체와는 거리가 멀지만, 그럼에도 불구하고 놀라운 발견입니다.\n\n지속적인 관찰은 진화 생물학 및 외계 생물학 연구에 매우 유용할 것입니다." # 1051205756894001313
  ehof_anomaly.10006.a: "언젠가 이런 생명체들을 더 많이 발견할 수 있기를!" # 8745652079059472672
  ehof_red_toxic_digsite: "진홍빛 재앙" # 8469710027953039068
  ehof_red_toxic_digsite_desc: "두꺼운 대기를 뚫고 표면을 스캔하기 위해 엑스선을 사용하는 고강도 스캐너가 준비되고 있습니다. 우리 [Owner.GetScientistPlural]는 이 스캔을 통해 행성을 뒤덮은 붉은 안개의 기원이 밝혀지기를 기대하고 있으며, 이것이 자연적인 기원이 아닐 것이라고 추측하고 있습니다." # 1917628577400533709
  ehof_red_toxin.41.name: "독성 낙원" # 13093273972782829445
  ehof_red_toxin.41.desc: "§H[from.Planet.GetName]§!에 대한 X선 스캔 시도는 성공적이었습니다.\n\n우리 시스템은 표면의 82,844제곱킬로미터 영역을 매핑했습니다. 행성 표면에는 숲과 도시, 혹은 적어도 그 잔해들이 위치해 있습니다. 이를 통해 우리는 §H[from.Planet.GetName]§!에 한때 문명이 존재했었으며, 적어도 식물 생명체가 한때 행성 생태계의 일부였음을 확인할 수 있습니다.\n\n건물의 건축 양식과 크기로 보아 문명은 상당히 발달했었으나, 상당한 양의 궤도 파편이 없는 것으로 보아 행성 밖으로 영구적인 진출은 이루지 못했던 것으로 보입니다.\n\n이 문명이 붉은 안개에 책임이 있는지는 여전히 알 수 없습니다.\n\n불행히도 행성에 무슨 일이 일어났는지 자세히 알아내려면 표면 탐사가 필요할 것입니다. 멸망한 문명의 기록과 표면 및 환경 샘플을 찾아내야만 붉은 안개와 그 기원에 대해 더 많은 것을 알 수 있을 것입니다.\n\n붉은 안개는 유기 생명체에게 매우 위험합니다. 원정대에 가해질 위험 때문에, 부식 방지 장갑과 에너지 보호막을 갖춘 첨단 로봇 탐사 유닛이 대신 투입될 것입니다." # 15154943787111254753
  ehof_red_toxin.41.a: "탐사 팀을 준비하라." # 1520565455437719966
  ehof_red_toxin.42.name: "진홍빛 재앙" # 8469710027953039068
  ehof_red_toxin.42.desc: "§H[from.Planet.GetName]§!의 표면 탐사는 성공적이었으며, 우리는 붉은 안개의 본질을 밝혀냈습니다.\n\n§H[from.Planet.GetName]§!의 이전 거주자들에 의해 \"진홍빛 재앙(The Scarlet Scourge)\"이라 불린 이것은, §H[from.Planet.GetName]§!의 이전 문명 구성원들이 만들어낸 고도로 발달한 합성 독소입니다.\n\n누가, 왜 이 독소를 만들었는지는 행성의 일반 대중에게 알려지지 않았으며, 정부 및 과학 기관의 기밀 기록을 조사해도 진홍빛 재앙의 기원은 밝혀지지 않았습니다.\n\n현재 우리가 아는 사실은, 이 독소가 321 은하 표준년 전 북반구의 \"ORIGIN 사이트\"라 불리는 장소에 갑자기 나타났으며, 1년 안에 행성 전체를 뒤덮어 생물권을 완전히 파괴했다는 것뿐입니다.\n\n이 독소는 직경 0.1에서 100미크론 사이의 입자로 구성되어 있습니다. 이러한 크기의 다양성 때문에 봉쇄하거나 걸러내기가 극도로 어려우며, 대기의 모든 층에 침투할 수 있게 합니다. 가장 우려되는 점은 이 독소가 아직 밝혀지지 않은 수단으로 스스로 복제할 수 있는 것으로 보인다는 것입니다.\n\n우리 [Owner.GetScientistPlural]는 §H[from.Planet.GetName]§!의 ORIGIN 사이트를 추가로 탐사하면 재앙에 대해 남은 의문들이 풀릴 것이라고 믿고 있습니다." # 12461891215399096135
  ehof_red_toxin.42.a: "진홍빛 재앙이 어디서 왔는지 알아내야 한다." # 3303299112783119506
  ehof_red_toxin.421.name: "ORIGIN 사이트 원정" # 7977308974686634105
  ehof_red_toxin.421.desc: "우리의 로봇 탐사 유닛들이 교체되고 ORIGIN 사이트 탐사를 위해 준비되고 있습니다. 이 장소는 진홍빛 재앙의 근원지일 뿐만 아니라, 원래 만들어진 장소일 가능성도 있습니다." # 4494200680418636747
  ehof_red_toxin.43.name: "이노베이션 포지의 화합물 23RCA" # 5092582455868401100
  ehof_red_toxin.43.desc: "ORIGIN 유적지에 대한 조사는 우리가 예상했던 것보다 훨씬 더 많은 '진홍빛 재앙(Scarlet Scourge)'에 관한 비밀을 밝혀냈습니다.\n\n내부적으로 '위험물 시험장 Y-173'이라 명명된 ORIGIN 유적지는 진홍빛 재앙이 탄생한 곳이 아니라, 독소 개발을 담당한 기관이 사용하던 시험장이었습니다. 이 유적지는 거대한 돔의 꼭대기에 박혀 있는 관측소로 구성되어 있으며, 돔 내부에는 한때 작은 마을과 숲이 있었습니다. 이곳은 원래 §H[from.Planet.GetName]§!의 지배 종족인 피험자들이 거주하던 곳이었으나, 화석 증거를 통해 다른 동물들도 존재했음을 알 수 있습니다.\n\n첨단 절연 물질로 구성된 이 돔은 재앙이 대기 중으로 유출되는 것을 막기 위한 것이었습니다. 불행히도 독소의 창조자들조차 그 효과를 과소평가했습니다. 재앙은 돔의 재질을 부식시키고 대기 중으로 퍼져나가, §H[from.Planet.GetName]§!의 모든 생명체에게 종말의 서막을 알렸습니다.\n\n현장의 손상된 시스템에서 추출 및 복구된 데이터에 따르면, 이곳은 '이노베이션 포지(Innovation Forge)'라는 민간 연구 개발 조직이 운영했던 것으로 밝혀졌습니다.\n\n진홍빛 재앙(내부적으로는 '화합물 23RCA'로 지칭됨)은 현실적인 환경에서 유기물과 무기물에 미치는 영향을 연구하기 위해 ORIGIN 유적지에서 시험되었습니다. 시험에 참여한 종족 구성원들은 자신들이 기후 조절 실험에 참여하고 있다고 믿었습니다.\n\n기록을 통해 이노베이션 포지의 원래 본부였던 '저장소(the Repository)'라는 장소도 밝혀졌습니다. 이곳은 재앙이 처음 만들어진 곳일 뿐만 아니라, 이노베이션 포지의 다른 위대한 창조물들이 배양되던 곳이기도 합니다.\n\n우리 [Owner.GetScientistPlural]들은 진홍빛 재앙이 어떻게 합성되었는지 알아내고, 유용하게 활용될 수 있는 이노베이션 포지의 다른 연구 성과들을 찾기 위해 저장소를 탐사하고자 합니다." # 1462431718137516638
  ehof_red_toxin.43.a: "저장소 내의 데이터는 정말 유용할 것입니다!" # 9834234162802520956
  ehof_red_toxin.431.name: "저장소" # 9256298749913665725
  ehof_red_toxin.431.desc: "저장소는 §H[from.Planet.GetName]§!에서 진행할 마지막 탐사의 목표입니다. 이번 임무를 위해 무장 로봇 탐사대가 배치되고 있습니다.\n\n만약 저장소가 진정으로 이노베이션 포지의 가장 위대한 창조물들이 탄생한 곳이라면, 우리가 아직 예측할 수 없는 위험이 도사리고 있을지도 모릅니다." # 4458585085827435060
  ehof_red_toxin.44.name: "근원과 해결책" # 8306735293090087805
  ehof_red_toxin.44.desc: "저장소 탐사는 완전히 성공적이었습니다.\n\n저장소는 거대한 산맥 아래에 건설된 거대 시설이었습니다.\n\nORIGIN 유적지에서 복구한 데이터가 시사한 대로, 이곳은 행성의 다른 어떤 곳보다 훨씬 뛰어난 기술력을 보유한 기술 혁신의 보고였습니다.\n\n저장소는 내부 보안 시스템으로 보호받고 있었고, 우리 부대에게도 까다로운 상대였지만, 보안을 돌파한 후에는 시설을 자유롭게 조사할 수 있었습니다.\n\n우리는 진홍빛 재앙이 처음 만들어진 연구소를 찾아냈고, 그곳에서 재앙에 대해 알아야 할 모든 정보를 얻을 수 있었습니다.\n\n그것은 이노베이션 포지가 만든 일련의 테라포밍 작용제 중 최초의 완전한 기능을 갖춘 프로토타입이었습니다. 이 작용제들은 거주 가능성이 있는 적대적인 행성에 우주선을 통해 배치되어, 생물학적 물질을 포함한 유해 물질로부터 대기를 정화하기 위한 것이었습니다.\n\n하지만 이 작용제는 예상과는 다르게 작동했고, 결국 의도했던 목적보다 너무나 강력한 효과를 발휘하고 말았습니다.\n\n시설의 중심부에서 우리는 진홍빛 재앙을 피해 의식을 업로드하여 살아남은 이노베이션 포지의 가장 위대한 [Owner.GetScientistPlural]들의 집합체인 고등 지능을 발견했습니다. 그들은 우리에게 저장소와 §H[from.Planet.GetName]§!의 문명, 진홍빛 재앙, 그리고 재앙을 해결하기 위한 그들의 방안에 대해 더 많은 정보를 제공했습니다.\n\n재앙이 행성을 휩쓸자, 그들은 남극 근처에 '촉매(the Catalyst)'라는 거대한 탑을 건설했습니다. 그것은 진홍빛 재앙으로부터 대기를 정화하기 위한 것이었습니다. 그들의 초기 시도는 재앙의 자기 복제를 막을 방법을 찾지 못해 실패했고, 두 번째 시도를 하기에는 자원이 부족했습니다.\n\n그 집합체는 우리의 뛰어난 기술이라면 재앙의 자기 복제를 무력화하고 대기를 정화할 방법을 찾아낼 수 있을 것이라고 말했습니다.\n\n이제 우리는 이 행성을 정화하여 다시 거주 가능하게 만들거나, 진홍빛 재앙을 우리 자신의 목적을 위해 이용할 수 있습니다." # 888243183069134697
  ehof_red_toxin.44.a: "재앙은 괴물일 뿐입니다. 행성을 재앙으로부터 해방하십시오!" # 17348374536849168797
  ehof_red_toxin.44.b: "재앙은 정말 유용하게 쓰일 수 있을지도 모릅니다..." # 3393473142379798393
  INVESTIGATE_ONE_ORBIT: "하나의 궤도" # 7592249578805366527
  INVESTIGATE_ONE_ORBIT_DESC: "§H[root.solar_system.GetName]§! 성계에 도착한 지 얼마 지나지 않아, 우리 센서가 이상한 행성 배치를 감지하기 시작했습니다.\n\n이 성계에는 같은 궤도를 공유하는 두 개의 행성이 있는 것으로 보입니다. 항성으로부터의 거리가 거의 정확히 일치하여, 완벽한 항성 대척점을 이루고 있습니다.\n\n우리 [Owner.GetScientistPlural]들은 이 두 행성과 이 기이한 배치에 대해 더 자세히 알아보기 위해 추가 조사를 원하고 있습니다." # 12713215372510720071
  ehof_anomaly.10011.name: "하나의 낙원" # 4207146950219621276
  ehof_anomaly.10011.desc: "§H[root.solar_system.GetName]§! 성계의 첫 번째 행성인 §H[fromfrom.GetName]§!을 조사한 결과, 우리는 이곳이 매우 드물고 거주하기 적합한 가이아 행성임을 밝혀냈습니다.\n\n평균보다 높은 질량을 가지고 있지만, 밀도는 암석 행성으로서는 일반적인 수준입니다. 행성의 생태계는 놀라울 정도로 다양합니다.\n\n이 행성을 연구하는 것은 우리의 생물학 연구에 가치가 있겠지만, 우리의 초점은 §H[fromfrom.GetName]§!의 쌍둥이 행성을 연구하는 데 맞춰져 있습니다." # 4606314496775243502
  ehof_anomaly.10011.a: "다음 행성으로!" # 10831093105035718801
  INVESTIGATE_ONE_ORBIT_2: "하나의 궤도 II" # 6814867703308176370
  INVESTIGATE_ONE_ORBIT_2_DESC: "§H[fromfrom.GetName]§!에 대한 조사는 이 기이한 행성 배치가 어떻게 형성되었는지 보여줄 것입니다." # 1870386232129442916
  ehof_anomaly.10012.name: "낙원 쌍둥이" # 11024923988455252695
  ehof_anomaly.10012.desc: "§H[root.solar_system.GetName]§! 성계의 두 번째 행성인 §H[fromfrom.GetName]§!에 대한 조사 결과, 믿을 수 없는 사실이 밝혀졌습니다.\n\n§H[fromfrom.GetName]§!은 형제 행성과 동일한 특성을 지니고 있습니다. 이 행성 역시 가이아 행성이었던 것입니다!\n\n두 행성 모두 가이아 행성으로, 질량, 밀도, 자전축 기울기, 궤도, 자전 속도 및 공전 속도가 동일합니다. 서로를 구별할 수 있는 유일한 차이점은 생태계와 위치뿐입니다.\n\n이 성계 전체가 너무나 비현실적으로 보이지만, 분명히 실재합니다. 이러한 행성 배치가 자연적으로 형성될 확률은 사실상 0에 가깝습니다. 분명 인공적인 기원일 것이나, 이 성계의 창조주에 대한 흔적은 어디에서도 발견되지 않았습니다..." # 17719862298538298282
  INVESTIGATE_SCARRED_PLANET: "흉터" # 3196944242841307307
  INVESTIGATE_SCARRED_PLANET_DESC: "우리 [Owner.GetScientistPlural]은 흉터의 지질 구조와 물질 구성을 연구하여 그것이 어떻게 형성되었는지에 대한 세부 정보를 찾고자 합니다. 또한 스캐너를 통해 주변 지역을 분석하여 비정상적인 물질을 탐지하고 있습니다.\n\n현재 우리는 이 흉터가 일종의 초병기 사용으로 인해 발생했을 가능성을 의심하고 있습니다." # 17675335000569919795
  ehof_anomaly.10013.name: "거대한 틈" # 5095213984604968168
  ehof_anomaly.10013.desc: "흉터에 대한 조사를 완료한 결과 우리의 가설이 옳았음이 증명되었습니다. 흉터는 사실 거대한 무기에 의해 생성된 것이었습니다.\n\n이 정도 규모의 무기는 이전에도 본 적이 있지만, 이곳에 사용된 무기의 세부 사항은 이 사례를 매우 흥미롭게 만듭니다. 흉터의 지질학적 구조, 행성 표면으로 파고든 각도, 60km에 달하는 깊이, 그리고 그 내부에 존재하는 비자연적인 물질들은 모두 흉터가 거대한 운동 에너지 무기에 의해 생성되었다는 믿음을 뒷받침합니다.\n\n우리 센서는 또한 협곡 전체에 걸쳐 굽이치는 불규칙한 방사선 경로를 탐지했습니다. 그러나 이 방사성 오염은 플루토늄처럼 그 자체로 방사능을 띠는 물질의 결과가 아니라, 강렬한 감마선에 노출된 결과입니다. 이는 행성 표면에 충돌하여 흉터를 만든 운동 에너지 발사체가 적어도 부분적으로는 반물질로 구성되어 있었음을 시사합니다. 발사체는 물질-반물질 반응으로 완전히 소멸한 것으로 보이며, 따라서 우리는 그 구성 성분에 대해 더 이상의 결론을 내릴 수 없었습니다.\n\n더 나아가, 우리의 [Owner.GetScientistPlural]는 흉터의 연대를 약 125만 년 전으로 추정했습니다. 그 엄청난 세월 때문에, 우리는 이 무기를 만든 주체가 누구인지, 혹은 애초에 왜 발사되었는지에 대해 더 알 수 있을 것이라고 기대하지 않습니다." # 12450348576704949781
  ehof_megastructure.016.name: "신비로운 돌" # 15703688995948561794
  ehof_megastructure.016.desc: "우리 과학선 중 하나가 §H[root.solar_system.GetName]§! 성계의 중력 중심 근처에서 거대하고 매우 밝은 물체를 발견했습니다. 물체에서 방출되는 에너지가 너무나 강렬하여 성계 전역의 보호막과 센서를 방해하기 때문에, 우리는 처음에 그것을 중성자별로 생각했습니다.\n\n더 자세히 조사한 결과, 이 물체는 현재 설계, 목적, 기원을 알 수 없는 구조물임이 밝혀졌습니다. 그것은 행성 크기의 납작한 원통형으로, 상단과 하단 표면에 거대하고 수수께끼 같은 문자가 새겨져 있으며, 두 표면 모두에서 극도로 강렬한 푸른 빛을 내뿜고 있습니다.\n\n물체에 대한 정밀 스캔 결과, 센서가 반환하는 값들이 기이하고 이해할 수 없어서 아무것도 알아낼 수 없었습니다. 센서가 보고하는 방출 에너지가 너무나 막대하여, 근처의 온도가 최소 500만 켈빈에서 문자 부분에서는 최대 1조 켈빈에 달하기 때문에 이 구조물에 대한 직접적인 조사는 불가능합니다.\n\n당분간은 이 구조물을 그대로 두어야 할 것 같습니다." # 12470128813872876678
  ehof_megastructure.016.a: "엄청나군!" # 12595353619285624141
  ehof_megastructure.017.name: "태고의 기둥" # 12901500042959786105
  ehof_megastructure.017.desc: "우리 과학선 중 하나가 수수께끼의 $PGATE_GALACTICS$! 중 하나를 발견했습니다. 이 구조물은 §H[root.solar_system.GetName]§! 성계 내부에 위치해 있습니다.\n\n이런 구조물에 대한 소문만 들어봤을 뿐인데, 은하계 외부 성계로 이동할 수 있는 초고등 관문이라고 합니다." # 3619946813680853103
  ehof_megastructure.017.a: "매혹적이군!" # 17415844975249834567
  ehof_megastructure.018.name: "블랙홀 구조물" # 5495193574817233907
  ehof_megastructure.018.desc: "§H[root.solar_system.GetName]§!의 중심부에는 중앙 블랙홀을 감싸고 있는 것으로 보이는 손상된 궤도 구조물이 있습니다. 초기 조사에 따르면 이 구조물은 작동하지 않으며 방치된 것으로 보입니다. 목적을 확인하기 위해서는 구조물을 탐사해야 합니다." # 11290980196199734422
  ehof_megastructure.018.a: "흥미롭군!" # 1067396349237925418
  EXPLORE_RUINED_EHOF: "블랙홀 구조물 탐사" # 8947800365143544705
  EXPLORE_RUINED_EHOF_DESC: "§H[root.solar_system.GetName]§! 성계 내의 손상된 블랙홀 구조물에 대한 탐사 프로젝트가 진행 중입니다. 목적을 확인하기 위해, 우리는 탐사 부대에 진공 상태와 강한 중력을 견딜 수 있는 장비를 갖추게 한 뒤 구조물의 잔해 속으로 보낼 것입니다." # 16997904594557439793
  INVESTIGATE_ENIGMATIC_PATTERN: "수수께끼의 패턴" # 6741575570172482906
  INVESTIGATE_ENIGMATIC_PATTERN_DESC: "§H[ehof_code_fleet.GetName]§!의 승무원만이 그 이상한 통신을 기억하고 있습니다. 다행히도 그들은 휴대용 장치에 그 일부를 기록할 수 있었지만, 이것이 포괄적인 분석이 될 수는 없습니다. 그들의 보고서를 더 자세히 조사해야 합니다.\n\n§H[ehof_code_fleet.GetName]§!를 강타한 에너지 섬광이 어디서 기원했는지는 아무도 모르지만, 이미 이상한 $ehof_cohesive$ 성계 중 하나에서 발생했습니다. 우리 과학선들은 $ehof_cohesive$ 성계를 연구하는 동안 이 수수께끼 같은 패턴의 투영을 계속 주시하라는 권고를 받았습니다." # 14151820374158469079
  ehof_reality_code.002.name: "코드 시퀀스인가?" # 13612513213280881526
  ehof_reality_code.002.desc: "우리는 $ehof_ep$ 연구에서 첫 번째 돌파구를 마련했습니다.\n\n그것은 불특정 위치에서 발신되어 우리 함선을 향한 고에너지 정보 통신입니다. 또한, 우리가 관찰한 이상한 행동과 전력 손실을 유발하는 것으로 보아 전자 시스템을 방해할 능력이 있음이 분명합니다.\n\n더 자세히 알아보기 위해, 우리는 과학선에 두 가지 새로운 기술을 장착했습니다. $ehof_ep$에서 발견된 주파수에 맞춘 스캐너와 $ehof_closed_modular$입니다. $ehof_ep$ 스캐너는 강화되었으며, $ehof_ep$ 통신으로 인한 전력 급증과 버퍼 오버플로를 견디도록 특별히 설계된 실험용 정보 처리 장치를 갖추고 있습니다. $ehof_closed_modular$는 함선 내 비활성화된 시스템을 신속하게 재활성화하기 위해 설계된 수동 활성화 방식의 독립 전원 시스템입니다.\n\n이 업그레이드를 통해 우리 과학선은 $ehof_ep$ 통신을 안전하게 수신하고 분석할 수 있습니다." # 8242289999969088643
  EXPLORE_CREATOR_PLANET: "$ehof_the_sphere$ 탐사" # 18346076593997709758
  EXPLORE_CREATOR_PLANET_DESC: "이제 $ehof_the_sphere$ 내부로 접근할 수 있게 되었으니, 드디어 그 비밀을 밝혀낼 수 있게 되었습니다. 그 안에서 우리가 어떤 경이로움과 미스터리를 발견하게 될지 누가 알겠습니까!" # 10640717370399092931
  ehof_anomaly.10417.name: "껍데기 속의 마이크로버스" # 13553694665847981117
  ehof_anomaly.10417.desc: "마침내 우리는 $ehof_the_sphere_named$의 비밀을 밝혀냈습니다!\n\n그 안에는 소우주라고밖에 설명할 수 없는 것이 들어있습니다. 더욱 놀라운 점은 이 \"미시 우주\"의 시공간 부피가 외부 공간과 반대로 접혀 있어, 내부 부피가 외부 표면적이 암시하는 것보다 수천 배는 더 크다는 사실입니다.\n\n이 미시 우주는 외부 부피와 내부 부피로 나뉩니다. 외부 부피의 진공 에너지 밀도는 외부 우주와 동일합니다. 이곳은 수백 개의 항성과 함께 항성 복사, 진공 에너지, 심지어 난해한 차원 간 힘을 수확하는 수많은 구조물로 가득 차 있습니다. 내부 부피는 외부 부피보다 훨씬 높은 진공 에너지 밀도를 가진 빈 공간으로 보입니다. 우리는 더 이상 분석할 수 없습니다.\n\n우리 [Owner.GetScientistPlural]는 이 부피들이 엄청난 양의 에너지를 생성하도록 구조화되어 있다고 결론지었습니다. 이 에너지는 먼저 외부 부피에서 추출된 다음 내부 부피로 전달됩니다. 내부 부피에는 최소 10^49 줄의 에너지가 포함되어 있는데, 이는 항성 천 개 이상의 총 질량 에너지와 맞먹는 양입니다." # 16032663591940750404
  ehof_anomaly.10417.a: "역사상 가장 위대한 과학적 발견입니다!" # 9392645371884428568
  ehof_anomaly.10418.desc: "우리는 $ehof_epcs$를 추적하는 동안 마주쳤던 $ehof_ep$ 송신기와 $PGATE_GALACTICS$가 모두 $ehof_the_sphere$의 부속물이라는 사실을 추가로 확인했습니다. 이 구조물들은 미세 웜홀을 통해 $ehof_the_sphere_named$로부터 에너지와 데이터 방송을 전송받습니다. 물론 그 데이터는 $ehof_ep$이며, 이는 다시 $ehof_ep$ 송신기와 $PGATE_GALACTIC$ 네트워크를 제어합니다.\n\n이 전송의 목적지를 추적한 결과, 은하계 외부에는 우리가 예상했던 것보다 훨씬 더 많은 $ehof_cohesive$ 시스템이 존재한다는 사실을 발견했습니다! 가장 놀라운 사실은 $ehof_the_sphere_named$만이 이러한 전송의 유일한 근원이 아니며, 우리 은하 너머에 더 많은 근원이 존재한다는 점입니다.\n\n불행히도 우리는 $ehof_the_sphere$와 그 네트워크의 원래 목적이나 이를 누가 만들었는지에 대한 정보는 여전히 알아낼 수 없었습니다. 그 목적이 무엇이었든, 수천 개의 항성이 일생 동안 생성할 수 있는 에너지보다 더 많은 에너지가 필요했던 것만은 분명합니다!" # 16813517783339726838
  tremendous_ring_system_category: "이상 현상이 있는 가스 거인" # 14166782649630703283
  tremendous_ring_system_category_desc: "§H[root.solar_system.GetName]§! 성계의 가스 거인 §H[from.GetName]§!에서 흔치 않은 질량 분포와 규모 특성이 관측되었습니다.\n\n우리 과학자들은 이 행성 이상 현상에 대해 더 자세히 알아보기 위해 행성을 조사하고자 합니다." # 745782164849666015
  ehof_anomaly.01.name: "거대한 고리 시스템" # 4929795067312007070
  ehof_anomaly.01.desc: "우리는 가스 거인 §H[from.GetName]§!이 평균적인 고리계보다 훨씬 거대한 고리계를 가지고 있음을 발견했습니다.\n\n이 고리계의 추정 지름은 약 378만 킬로미터로, 행성 자체의 지름인 171,557 킬로미터보다 몇 배나 더 큽니다.\n\n이렇게 인상적인 고리계가 어떻게 형성되었는지는 현재 분석 우주론적 계산 연구와 천체 수학의 주제입니다." # 2447328456482162147
  ehof_anomaly.01.a: "매혹적이군." # 5327791794968998368
  methane_oceans_category: "\"불모지가 아닌\" 행성" # 5960261694820896036
  methane_oceans_category_desc: "우리 과학선의 스캐너가 §H[root.solar_system.GetName]§! 성계의 불모 행성 §H[from.GetName]§! 표면에서 이상한 특성을 감지했습니다.\n\n우리 과학자들은 이 행성 이상 현상에 대해 더 자세히 알아보기 위해 행성을 조사하고자 합니다." # 13518224241696535262
  ehof_anomaly.02.name: "메탄 바다" # 10626513513807947963
  ehof_anomaly.02.desc: "우리 과학자들은 겉보기에 불모지인 행성 §H[from.GetName]§!이 완전히 불모지는 아니라는 사실을 발견했습니다.\n\n§H[from.GetName]§!의 거대한 소행성 충돌 분화구에는 액체 메탄으로 이루어진 작은 바다가 있습니다. 이 바다는 분화구의 표면 온도가 행성의 낮/밤 주기에 따라 섭씨 -193도에서 -143도 사이를 유지하기 때문에 존재할 수 있습니다.\n\n§H[from.GetName]§!의 메탄 바다에는 단순한 형태의 무기 생명체가 존재할지도 모릅니다.\n\n메탄 바다에 어떠한 형태의 생명체가 존재하는지 여부는 외계 생물학 연구 커뮤니티 내에서 논쟁의 대상입니다." # 2402486718806533048
  ehof_anomaly.02.a: "흥미롭군." # 12003619283974786775
  nanite_deserts_category: "이상한 사막" # 11340575835153977719
  nanite_deserts_category_desc: "§H[root.solar_system.GetName]§! 성계의 사막 행성 §H[from.GetName]§!의 표면에서 이상한 특성이 나타나고 있습니다.\n\n과학선의 스캔 결과에 따라, 우리 과학자들은 이 행성 이상 현상에 대해 더 자세히 알아보기 위해 탐사대를 파견하고자 합니다." # 18091741342726413708
  ehof_anomaly.03.name: "나이트 사막" # 15313491196035338418
  ehof_anomaly.03.desc: "§H[from.GetName]§! 사막의 절반이 모래 입자를 모방하는 나노머신으로 구성되어 있음을 발견했습니다.\n\n나머지 절반의 사막은 은하계의 다른 행성에 있는 대부분의 사막과 마찬가지로 자연적인 입자 물질로 구성되어 있습니다.\n\n채취한 \"나이트 모래\"를 직접 분석한 결과, 이 나노머신들은 어떠한 고차원적 기능도 보유하고 있지 않은 것으로 보입니다.\n\n이 나이트 모래는 다른 자연 사막에서 발견되는 '일반' 모래와 동일해 보이며 현미경 분석을 통해서만 구별할 수 있습니다.\n\n이 나노머신들의 용도와 왜 §H[from.GetName]§! 사막의 절반만이 이것으로 이루어져 있는지는 여전히 미스터리로 남아 있습니다." # 17167555321839522403
  ehof_anomaly.03.a: "놀랍군!" # 6784546666338679051
  coreless_planet_category: "핵이 없는 행성" # 208878303810501397
  coreless_planet_category_desc: "§H[root.solar_system.GetName]§! 성계의 불모 행성 §H[from.GetName]§!은 내부 구성 및 구조와 관련하여 이상한 특성을 보입니다.\n\n이 행성 이상 현상에 대해 더 자세히 알아보기 위해 추가 조사가 필요합니다." # 17210840330894861851
  ehof_anomaly.04.name: "핵심 이상 현상" # 959092719188967513
  ehof_anomaly.04.desc: "우리 과학자들은 §H[from.GetName]§! 행성에 실제 핵이 없다는 사실을 발견했습니다.\n\n이 행성에는 철질 핵이 전혀 없으며, 핵이 있어야 할 위치까지 암석 맨틀이 완전히 채워져 있습니다. 행성 중심부에는 변칙적인 구조물이 위치해 있습니다.\n\n우리 과학자들은 이것이 이질적인 물질로 구성된 것인지, 아니면 인공적인 구조물인지 확신하지 못하고 있습니다.\n\n그들은 이 변칙 현상에 대해 더 자세히 알아보기 위해 행성 내부로 탐사대를 보내기를 원하지만, 시설에 도달하기까지 시간과 자원이 소요될 것입니다." # 11017795170434416655
  ehof_anomaly.04.a: "인상적이군, 탐사대를 파견하라." # 14762360147827236903
  ehof_anomaly.04.b: "그렇게 해서는 안 된다." # 9745122198583287415
  cataclysmic_star_category: "강렬한 항성" # 4799146347927284607
  cataclysmic_star_category_desc: "§H[from.GetName]§! 항성이 강렬하고 불규칙한 에너지 신호를 방출하며 변칙적인 질량 분포를 보이고 있습니다.\n\n이 항성 변칙 현상에 대해 더 자세히 알아보기 위해서는 추가 조사가 필요합니다." # 3995761068932092681
  ehof_anomaly.05.name: "격변 변광성" # 4743463082688342359
  ehof_anomaly.05.desc: "우리는 §H[from.GetName]§! 항성의 핵 안에 §HD급§! 항성, 즉 §H백색 왜성§! 잔해가 포함되어 있다는 사실을 발견했습니다.\n\n백색 왜성은 항성의 질량을 1.2배 증가시켰으며, 항성의 방사능 구역인 \"맨틀\" 내부에 위치해 있습니다.\n\n이 §H백색 왜성§!은 §H[from.GetName]§!의 핵에 극심한 불안정을 초래하고 있으며, 이것이 수십억 톤의 항성 질량을 우주로 방출하는 강렬하고 빈번하며 불규칙한 플라즈마 폭발의 원인으로 보입니다.\n\n이 §HD급§! 항성은 아마도 수백만 년 전에 §H[from.GetName]§!과 충돌하여 완전히 흡수된 것으로 보입니다.\n\n§H[from.GetName]§!의 불안정성은 항성의 수명을 훨씬 단축시켜, 향후 10만 년 이내에 죽음을 맞이하게 할 가능성이 큽니다." # 18365881181374310276
  ehof_anomaly.05.a: "끔찍하군!" # 984421576440339909
  oxygen_world_category: "변칙적인 얼음 행성" # 12288982997799504667
  oxygen_world_category_desc: "우리 과학선이 §H[root.solar_system.GetName]§! 성계의 §H[from.GetName]§! 표면 얼음에서 변칙적인 특성을 감지했습니다.\n\n우리 과학자들은 이 행성 변칙 현상에 대해 더 자세히 알아보기 위해 행성으로 탐사대를 보내기를 원합니다." # 4700807730103733456
  ehof_anomaly.06.name: "결정화된 산소 세계" # 10833799387289464353
  ehof_anomaly.06.desc: "우리 과학자들은 §H[from.GetName]§!의 표면 얼음이 물 얼음이나 드라이아이스가 아니라, 결정화된 산소라는 사실을 발견했습니다.\n\n§H[from.GetName]§!의 평균 표면 온도는 극도로 낮으며, 산소의 녹는점보다 51켈빈 더 낮습니다.\n\n성계 내에 안정적인 고체 산소가 존재하기 위한 조건은 달성하기가 매우 어렵습니다.\n\n§H[from.GetName]§!은 진정으로 독특한 세계입니다. §H[from.GetName]§!은 향후 저온 물리학 프로젝트의 핵심 연구지가 될 것입니다." # 10584382366697988193
  ehof_anomaly.06.a: "놀랍군!" # 15073011395286629751
  abandoned_seat_category: "황폐화된 세계" # 4224444282316771424
  abandoned_seat_category_desc: "우리 과학선 중 하나가 §H[from.GetName]§!이라는 툼 월드를 발견했습니다.\n\n이 행성은 §H[root.solar_system.GetName]§!에 위치하며, 과거 위성과 우주 정거장의 잔해로 보이는 우주 파편으로 구성된 작은 고리를 가지고 있습니다.\n\n우리의 [Owner.GetScientistPlural]들은 §H[from.GetName]§!의 표면을 황폐화시킨 바로 그 사건이 위성과 우주 정거장의 파괴에도 책임이 있다고 믿고 있습니다.\n\n그들은 이 세계에 무슨 일이 일어났는지 더 자세히 알아보기 위해 파편 고리와 행성 자체를 탐사하고 싶어 합니다." # 8959388913760890712
  ehof_anomaly.07.name: "손상된 우주 정거장" # 7958584112673081198
  ehof_anomaly.07.desc: "§H[from.GetName]§! 주변의 파편 고리 안에서, 우리의 [Owner.GetScientistPlural]들은 거대한 우주 정거장을 발견했습니다.\n\n과학선의 스캔 결과, 이 우주 정거장은 적당한 구조적 손상을 입은 흔적이 있으며 버려진 것으로 보입니다.\n\n정거장의 손상되지 않은 구조물들은 나머지 우주 파편들과 비교했을 때 독특한 미적 특징을 보여줍니다.\n\n우리의 [Owner.GetScientistPlural]들은 이 정거장이 한때 파괴된 세계에 거주했던 문명에게 매우 중요했을 것이라고 추정합니다.\n\n그들은 §H[from.GetName]§!에 무슨 일이 일어났는지 밝혀내길 바라며 정거장을 추가로 조사하고자 합니다." # 5530168762278429507
  ehof_anomaly.07.a: "흥미롭군, 정거장을 조사하라!" # 14930220797506683652
  ehof_anomaly.07.b: "모든 비밀을 밝혀낼 필요는 없다." # 5575700153355588711
  natural_network_category: "사고하는 행성?" # 6156911369569912141
  natural_network_category_desc: "§H[from.GetName]§! 거주 가능 행성 전역에서 이상 신호가 감지되었습니다! §H[root.solar_system.GetName]§! 성계에 위치한 이 행성은 동물의 뇌파와 유사한 신호를 보내고 있으며, 우리 [Owner.GetScientistPlural]들은 이 행성이 실제로 '살아있는' 것인지, 아니면 장비가 간섭을 받고 있는 것인지 확신하지 못하고 있습니다.\n\n이 행성 변칙 현상에 대해 더 많은 정보를 얻기 위해서는 추가 조사가 필요합니다." # 7695205789006409832
  ehof_anomaly.08.name: "자연적 지구 네트워크" # 15870972861245957605
  ehof_anomaly.08.desc: "§H[from.GetName]§! 행성 전체가 거대한 식물 군집 네트워크로 뒤덮여 있다는 사실을 발견했습니다.\n\n이 네트워크는 단일 속의 식물로 구성되어 있으며, 각 개체는 뿌리를 통해 서로 연결되는 능력을 갖춘 것으로 보입니다. 이 속의 식물들은 행성 전체 식물상의 절반 이상을 차지하며 행성을 지배하고 있습니다. 이들이 바로 우리 과학선이 감지했던 이상 신호의 근원입니다.\n\n우리 [Owner.GetScientistPlural]들은 이 네트워크가 적어도 미약한 형태의 준신경학적 활동을 하고 있다고 추정하지만, 그 본질상 동물의 신경 패턴과는 구별되어야 한다고 보고 있습니다.\n\n우리 [Owner.GetScientistPlural]들은 이 식물들과 지구 네트워크에 대해 더 자세히 알아보기 위해 연구를 확장하기를 원합니다." # 12590588785793578295
  ehof_anomaly.08.a: "매혹적이군, 식물 연구를 확장하라!" # 5416232019155281230
  ehof_anomaly.08.b: "식물은 그냥 식물로 내버려 두어라." # 6456566393214324158
  connected_asteroid_category: "소행성 정거장" # 7212012581874380480
  connected_asteroid_category_desc: "우리 조사관들이 §H[root.solar_system.GetName]§! 성계 주변에 퍼져 있는 거대한 소행성대에서 비정상적인 질량 분포와 구성을 가진 인공적인 구조물을 발견했습니다.\n\n우리 [Owner.GetScientistPlural]들은 이 변칙 현상에 대해 더 자세히 알아보기 위해 조사를 원합니다." # 14472660846835742764
  ehof_anomaly.09.name: "연결된 소행성 정거장" # 13508196090811211624
  ehof_anomaly.09.desc: "§H[root.solar_system.GetName]§! 성계 소행성대의 비정상적인 구조물은 거대한 지지대와 이동 통로로 여러 소행성을 하나로 묶어 만든 거대한 우주 정거장임이 밝혀졌습니다.\n\n최신 스캔 결과, 이 정거장은 버려진 상태이며 손상되지 않은 것으로 보입니다. 이 관측을 확인하기 위해 추가 조사가 필요합니다. 우리 [Owner.GetScientistPlural]들은 정거장 내부를 탐사하여 더 많은 정보를 얻기를 요청하고 있습니다." # 6523982347695773028
  ehof_anomaly.09.a: "진행하라, 하지만 조심하도록." # 15333367870290048483
  ehof_anomaly.09.b: "정거장은 그냥 무시해라." # 18395339978133496795
  hot_society_category: "거주 중인 용암 행성" # 11526232232552068992
  hot_society_category_desc: "용암 행성 §H[from.GetName]§!의 표면에서 생명 활동의 징후가 감지되었습니다.\n\n유기 생명체는 일반적으로 이렇게 극도로 적대적인 환경에서 생존할 수 없으며, 자연적으로 발생할 수도 없습니다.\n\n이 용암 행성에서 감지된 변칙적인 활동에 대해 더 자세히 알아보기 위해 추가 조사가 필요합니다." # 10297762622061249573
  ehof_anomaly.10.name: "플라스마 생명체" # 2035596517422870175
  ehof_anomaly.10.desc: "§H[from.GetName]§!의 변칙 활동에 대한 원격 조사 결과는 매우 흥미롭습니다.\n\n이 행성에는 우리 외계생물학자들이 '플라스마 생명체'라고 명명한 독특한 형태의 생명체가 실제로 살고 있었습니다. 이들은 유기 생명체의 신체와 유사하게 기능하는 의사 유기 플라스마로 구성된 것으로 보입니다. 만약 이들이 탄소 기반이라면 이론적으로 유기 생명체로 간주할 수 있으며, 그렇지 않다면 극히 희귀한 무기 생명체의 일종일 수도 있습니다.\n\n이 행성에는 다양한 종류의 플라스마 생명체가 살고 있습니다. 행성의 치명적인 환경 때문에 위험하겠지만, 행성의 플라스마 생물권을 직접 연구할 필요가 있습니다." # 9643962833388963033
  ehof_anomaly.10.a: "매혹적이군! 이 생명체들에 대한 연구를 확장하라." # 470412753253614477
  ehof_anomaly.10.b: "[Owner.GetScientistPlural]의 목숨과 자원을 그런 일에 낭비해서는 안 된다." # 7252700301390791904
  intoxicated_world_category: "붉은 행성" # 3342022883523436188
  intoxicated_world_category_desc: "§H[root.solar_system.GetName]§! 성계에서 아직 확인되지 않은 유형의 행성이 발견되었습니다.\n\n초기 원거리 분석에 따르면 독성 행성일 가능성이 높지만, 정확한 행성 유형을 판별하려면 직접적인 조사가 필요합니다." # 11733303397224575033
  ehof_anomaly.11.name: "붉은 독성 행성" # 14516333743430938885
  ehof_anomaly.11.desc: "§H[from.GetName]§!의 대기를 직접 조사한 결과, 이 행성이 사실은 독성 행성임을 발견했습니다. 행성, 더 구체적으로는 대기의 색깔은 공기 중의 미립자로 인해 나타나는 현상입니다.\n\n입자에 대한 화학적 분석 결과, 구리, 다수의 복합 탄소 화합물, 인, 황, 코발트, 심지어 악티늄족 원소까지 포함되어 있음이 밝혀졌습니다. 이 물질은 방사성을 띠고 부식성이 강하며, 대부분의 다른 물질에 공격적으로 달라붙습니다.\n\n유기 생명체에게 치명적일 뿐만 아니라, 매우 밀도가 높고 불투명하여 빛과 저에너지 방사선이 행성 표면에 도달하는 것을 차단합니다. 이러한 요인들 때문에 행성 표면을 상세히 분석하기가 매우 어렵습니다.\n\n우리 [Owner.GetResearchers]들은 행성을 분석하기 위해 고강도 스캐너 사용을 요청했습니다." # 11091050455487630837
  ehof_anomaly.11.a: "정말 끔찍하면서도 매혹적이군! 대기를 뚫고 조사해 보라." # 13347941691170763600
  ehof_anomaly.11.b: "안개 뒤에 무엇이 있는지 모르는 편이 나을 것이다." # 17702404840360198054
  scarred_planet_category: "흉터" # 3196944242841307307
  scarred_planet_category_desc: "§H[root.solar_system.GetName]§! 성계의 불모 행성에서 비정상적인 지질 구조가 발견되었습니다. 행성 표면에 거대한 협곡이 하나 존재합니다. 사실, 이 행성 표면에는 그 협곡 하나뿐입니다. 다른 골짜기가 없다는 점으로 보아 이 협곡이 자연적인 과정이나 운석 충돌로 형성되었을 가능성은 희박합니다.\n\n우리 지질학자들이 추가 데이터를 요청하고 있습니다." # 7963446943795972952
  ehof_anomaly.12.name: "흉터" # 3196944242841307307
  ehof_anomaly.12.desc: "우리는 §H[from.GetName]§!의 협곡이 자연적인 지형이 아님을 확인했습니다. 협곡 자체의 구조를 볼 때 자연적으로 형성될 수 없으며, 행성 표면의 6분의 1을 가로질러 상부 맨틀까지 뻗어 있습니다. 우리의 [Owner.GetResearchers]가 제시한 주요 이론이 맞다면, 행성의 고리는 원래 협곡을 채우고 있던 물질로 이루어졌을 것입니다.\n\n아직 원인은 밝혀내지 못했지만, 흉터가 남은 행성 물질과 행성 고리를 더 깊이 분석하면 무엇이 이런 결과를 초래했는지 단서를 얻을 수 있을 것입니다." # 16832978725081746374
  ehof_anomaly.12.a: "무엇이 이렇게 거대한 협곡을 형성했을까?" # 2927172382628432021
  ehof_anomaly.12.b: "지질학 연구를 할 시간이 없다. 떠나자." # 17816359767428648945
  ehof_anomaly.13.name: "하나의 궤도" # 7592249578805366527
  ehof_anomaly.13.desc: "§H[root.solar_system.GetName]§! 성계에 도착한 직후, 우리 센서가 이상한 행성 배열을 포착했습니다. 이 성계에는 같은 궤도를 공유하는 두 개의 행성이 존재하는 것으로 보입니다.\n\n우리의 [Owner.GetScientistPlural]는 이 이상한 궤도 배열이 어떻게 형성되었는지 이해하기 위해 두 행성을 조사하고자 합니다." # 15165453822723295475
  reality_code: "현실 코드" # 7370359693290128252
  ehof_closed_modular: "폐쇄형 모듈 시스템" # 3514519767760556175
  ehof_the_sphere: "§B구체§!" # 12252187705355439983
  ehof_the_spheres: "§B구체의§!" # 7342553421999994830
  ehof_the_sphere_named: "끊임없이 변화하는" # 1209076008893848850
  ehof_the_sphere_nameds: "끊임없이 변화하는 것의" # 5447491299176202038
  ehof_ep: "수수께끼의 패턴" # 6404044330649451553
  ehof_eps: "$ehof_ep$들" # 10276835119371850069
  ehof_epcs: "$ehof_ep$ 코드 시퀀스" # 14592962460621220414
  ehof_reality_code.1.name: "수수께끼의 패턴" # 6741575570172482906
  ehof_reality_code.1.desc: "§H[ehof_code_fleet.GetName]§!로부터 이상한 보고를 받았습니다.\n\n§H[ehof_code_fleet.solar_system.GetName]§! 내부에서 일상적인 조사를 수행하던 중, 해당 함선이 강력한 에너지 펄스에 피격되었습니다. 함선의 주 동력원이 차단되었고, 함선은 6시간 동안 정지 상태에 빠졌습니다.\n\n다행히 보조 동력원은 손상되지 않았으며, 승무원들은 이를 가동해 주 시스템이 복구될 때까지 생명 유지 장치를 작동시킬 수 있었습니다.\n\n함선이 완전한 기능을 되찾은 직후, 함내에서 기이한 사건들이 발생하기 시작했습니다. 보고에 따르면 모든 시스템이 마치 함선에 빙의라도 된 듯 제멋대로 재가동되어 통제 불능 상태로 작동했다고 합니다. 모니터에는 수수께끼 같지만 질서 정연한 패턴이 표시되기 시작했습니다. 자동문은 모니터의 표시와 동기화되어 열리고 닫혔으며, 내부 통신망에서는 반복적인 소음이 울려 퍼졌습니다.\n\n함선에 탑승한 [Owner.GetScientistPlural]들이 이 현상을 $ehof_ep$(이)라고 명명했으나, 이후로는 다시 나타나지 않았습니다. 우리는 이 미스터리를 더 깊이 조사해야 합니다." # 16095466516543683144
  ehof_p4_chain_title: "$reality_code$" # 10109598277311197263
  ehof_p4_chain_desc: "필요한 기술을 갖춘 우리의 과학선은 이제 $ehof_eps$의 신호를 안전하게 수신하고 처리할 수 있습니다.\n\n우리는 $ehof_ep$의 추가 신호를 찾기 위해 $ehof_cohesive$ 성계들을 계속 탐사해야 합니다." # 18216576562170059834
  ehof_mega_chain_1_poi: "기원" # 1311799818814428195
  ehof_mega_chain_1_poi_desc: "이 위치에서 $ehof_ep$가 발신된 것으로 보입니다." # 1315449859896906728
  code_1_cat: "현실 코드 - 독성 행성" # 5605462947525385495
  code_01_category_desc: "§H[this.GetName]§!에서 §H[from.solar_system.GetName]§! 성계로부터 발신된 신호를 탐지했습니다. 이전의 신호와 마찬가지로 함선의 주 시스템이 마비되었으나, 이번에는 함선의 $ehof_closed_modular$가 짧은 시간 내에 기능을 완전히 복구해냈습니다. 함선의 [Owner.GetScientistPlural]는 이 현상을 $ehof_epcs$(으)로 명명했습니다.\n\n함선이 다시 가동된 후, $ehof_ep$ 스캐너를 통해 신호의 발신지를 추적한 결과, 우리 조사관들이 §H[from.GetName]§!(이)라고 명명한 독성 행성임이 밝혀졌습니다.\n\n$ehof_ep$ 스캐너를 활용한 추가 조사를 진행하면 신호의 발신원을 더 정확하게 특정할 수 있을 것입니다. 신호가 매우 짧았고 반복되지 않았기에, 이를 수행하는 데는 다소 시간이 걸릴 수 있습니다." # 2136240062214672359
  ehof_reality_code.101.name: "현실 코드 - 독성 행성" # 5605462947525385495
  ehof_reality_code.101.desc: "§H[this.GetName]§!은(는) §H[from.planet.GetName]§!에서 발신된 $ehof_ep$ 신호의 발신지를 찾아냈습니다. 해당 신호는 행성 남반구 지각 내부의 한 지점에서 전송되었습니다.\n\n발신지에 도달하려면 발굴 작업이 필요합니다. 높은 온도와 유독한 대기가 작업을 어렵게 만들겠지만, 적절한 장비가 있다면 큰 문제는 아닐 것입니다.\n\n우리가 찾는 해답을 얻기 위해서는 이 프로젝트에 필요한 시간과 자원을 투입해야 할 것입니다." # 3445263182680524783
  code1_digsite: "현실 코드 - 독성 발굴" # 3813559777938937925
  code1_digsite_desc: "§H[this.GetName]§!은(는) §H[from.planet.GetName]§!에서 발신된 $ehof_ep$ 신호의 발신지를 찾아냈습니다. 해당 신호는 행성 남반구 지각 내부의 한 지점에서 전송되었습니다.\n\n발신지에 도달하려면 발굴 작업이 필요합니다. 높은 온도와 유독한 대기가 작업을 어렵게 만들겠지만, 적절한 장비가 있다면 큰 문제는 아닐 것입니다.\n\n우리가 찾는 해답을 얻기 위해서는 이 프로젝트에 필요한 시간과 자원을 투입해야 할 것입니다." # 3445263182680524783
  ehof_reality_code.111.name: "현실 코드 - 독성 발굴 I" # 12168318807849396565
  ehof_reality_code.111.desc: "§H[from.planet.GetName]§!의 위험한 대기로부터 발굴 현장을 보호하기 위해, 부식과 열에 강한 재질로 만들어진 격리 돔이 예정된 시추공 부지 주변에 건설되었습니다.\n\n근원지가 지표면 아래 불과 수십 킬로미터 지점에 위치해 있으므로, 일반적인 굴착기를 사용하여 그곳까지 터널을 뚫을 수 있습니다. 구멍이 뚫리면 유인 연구팀이 구멍 아래로 내려가 근원지를 조사할 것입니다.\n\n이제 발굴을 시작할 수 있습니다." # 15439864153626568530
  ehof_reality_code.111.a: "출발합시다." # 16197633612238117050
  ehof_reality_code.112.name: "현실 코드 - 독성 발굴 II" # 2428620620461262746
  ehof_reality_code.112.desc: "굴착기가 송신기 위치까지 터널을 뚫는 작업을 마쳤습니다. 굴착기가 돌아온 후, 현장 팀이 직접 내려가 근원지를 조사했습니다.\n\n그 장소는 매우 기이합니다. 근원지 근처에서 지각 물질이 사라지고, 중앙에 팔면체 구조물이 있는 빈 공간이 나타났습니다.\n\n이 구조물은 일종의 뚫을 수 없는 보호막을 투사하고 있는 것으로 보입니다. 추가 탐사가 중단된 상태에서 물체의 표면을 초기 조사한 결과, 절대 영도에 가까운 온도의 미지의 물질로 구성되어 있음이 밝혀졌습니다. 이렇게 낮은 온도에서는 물체의 상태가 거의 시간 속에 얼어붙은 것으로 간주할 수 있습니다. 이 구조물이 어떻게, 그리고 왜 이런 온도에 도달할 수 있는지는 알 수 없습니다.\n\n스캐너는 구조물의 표면을 투과하지 못하며, 일반적인 장 여기 수준을 넘어서는 방사선이나 $ehof_ep$ 신호 이외의 징후는 감지되지 않습니다. 더 많은 정보를 얻을 수 있는 유일한 방법은 보호막을 뚫고 물체 내부로 들어가는 길을 찾는 것뿐입니다." # 14853179264858709638
  ehof_reality_code.113.name: "현실 코드 - 독성 발굴 III" # 5301653893011790444
  ehof_reality_code.113.desc: "대상에 접근하는 데 꽤 오랜 시간이 걸렸지만, 기다린 보람이 있었습니다.\n\n내부로 들어갈 방법을 찾기 위한 여러 번의 시도 끝에, 연구팀은 $ehof_ep$를 모방한 주파수와 진폭의 중력 전자기파를 조합하여 대상이 반응하도록 유도했고, 마침내 성공했습니다!\n\n보호막이 해제되자 대상 표면 중 한 곳에 입구가 나타났습니다. 팔면체 내부에서 연구팀은 믿을 수 없을 정도로 복잡한 메커니즘을 발견했습니다.\n\n집중적인 연구 끝에 그들은 이 구조물의 전체적인 기능을 밝혀냈습니다. 이것은 $ehof_ep$의 근원이 아니라, 증폭기이자 중계기였습니다. 신호는 중력 전자기파를 통해 같은 성계 내의 $PGATE_GALACTIC$로 전송된 후 완전히 소멸하는 것으로 보입니다.\n\n연구팀은 이 구조물의 데이터뱅크에서 $ehof_epcs$의 파편을 성공적으로 추출했습니다.\n\n또한, 그들은 팔면체의 재질 구성에 관해 놀라운 발견을 했습니다. 이것은 주로 §H생체 금속§! 및 §H나노머신§!과 여러 특성을 공유하는 새로운 자기 복제 및 자기 재생 물질로 이루어져 있습니다!\n\n전자와 마찬가지로 급격하게 변화하는 환경 조건에서도 구조를 유지할 수 있고, 후자와 마찬가지로 에너지와 물질을 흡수하여 스스로를 복제할 수 있습니다. 흥미롭게도 이 물질은 환경을 어느 정도 인식하는 것처럼 보이지만, 구체적으로 어떻게, 어느 정도까지인지는 아직 정량화하지 못했습니다. 또한 §H암흑 물질§!과 $giga_sr_negative_mass$에는 반응하지 않으며 이를 활용할 수도 없는 것으로 보입니다.\n\n이러한 특성을 바탕으로 볼 때, 이 물질은 여러 분야에서 엄청난 잠재력을 가지고 있습니다." # 10506124524157344119
  code_2_cat: "현실 코드 - 산산조각 난 행성" # 10149176659039637786
  code_02_category_desc: "§H[from.solar_system.GetName]§! 성계에서 §H[this.GetName]§!(으)로 $ehof_epcs$의 또 다른 송신이 수신되었습니다! 이전 두 번의 사례와 마찬가지로, 이 송신은 함선의 기능을 마비시켰습니다. 하지만 이번에는 개선된 $ehof_closed_modular$ 덕분에 몇 분 안에 함선의 기능을 복구할 수 있었습니다.\n\n$ehof_ep$ 스캐너는 성계 내부의 송신원을 식별해냈습니다. 바로 산산조각 난 행성 §H[from.GetName]§!입니다. §H[this.GetName]§!에 탑재된 $ehof_ep$ 스캐너가 행성 위(또는 내부)의 정확한 위치를 찾아낼 것이지만, 시간이 조금 걸릴 것입니다." # 8261208515848895851
  ehof_reality_code.201.name: "현실 코드 - 산산조각 난 행성" # 10149176659039637786
  ehof_reality_code.201.desc: "우리 팀은 행성 §H[from.planet.GetName]§!에서 전송된 $ehof_ep$ 신호의 근원을 찾아냈습니다. 행성 잔해 중 가장 큰 덩어리 깊은 곳에 위치해 있습니다.\n\n이번 발굴은 첫 번째보다 더 어려울 것으로 예상됩니다. 신호원이 더 깊은 곳에 위치했을 뿐만 아니라, 행성의 중력권 내의 위험하고 불안정한 상태 때문입니다. 우리가 발굴 작업을 진행할 파편이 쪼개지거나 다른 파편과 충돌할 수 있습니다.\n\n주의가 필요합니다." # 2955483963883422861
  code2_digsite: "현실 코드 - 산산조각 난 발굴" # 14087758834093772574
  code2_digsite_desc: "우리 팀은 행성 §H[from.planet.GetName]§!에서 전송된 $ehof_ep$ 신호의 근원을 찾아냈습니다. 이전 행성의 잔해 중 가장 큰 덩어리 깊은 곳에 위치해 있습니다.\n\n이번 발굴은 첫 번째보다 더 어려울 것으로 예상됩니다. 신호원이 더 깊은 곳에 위치했을 뿐만 아니라, 이전 행성의 중력권 내의 위험하고 불안정한 상태 때문입니다. 우리가 발굴 작업을 진행할 파편이 예고 없이 쪼개지거나 다른 파편과 충돌할 수 있습니다.\n\n주의가 필요합니다." # 12287787531499568397
  ehof_reality_code.211.name: "현실 코드 - 산산조각 난 발굴 I" # 5139763452287206140
  ehof_reality_code.211.desc: "소행성 충돌과 지진으로부터 현장을 보호하기 위해, 발굴 팀은 보호막 생성기를 설치하고 주변 지각에 상부 구조물을 고정했습니다.\n\n현장이 확보되자, 팀은 유인 시추 장치를 배치할 준비를 마쳤습니다." # 4001408685421137872
  ehof_reality_code.212.name: "현실 코드 - 산산조각 난 발굴 II" # 5243676816880517197
  ehof_reality_code.212.desc: "유인 시추 장치가 $ehof_ep$ 송신의 기원에 도달했습니다. 이전 발굴과 마찬가지로, 이 현장은 팔면체 물체를 둘러싼 구조적 공허입니다. 이는 이 팔면체가 다른 다면체와는 다른 미지의 목적을 수행하며, 이후의 모든 현장도 같은 방식으로 구성될 것이라는 가정을 뒷받침합니다.\n\n송신원에 대한 스캔 결과 첫 번째와 동일한 것으로 나타났으므로, 우리 팀은 이전에 사용했던 \"암호\"를 사용하여 개방을 시도할 것입니다." # 17561525418513244974
  ehof_reality_code.213.name: "현실 코드 - 산산조각 난 발굴 III" # 697896181721208603
  ehof_reality_code.213.desc: "팔면체에 진입하는 단계는 동일했지만, 실제로 접근 권한을 얻기까지는 상당한 시간이 걸렸습니다.\n\n이전 송신원에서 사용했던 중력전자기 파장에는 반응하지 않았습니다. 하지만 새로운 주파수와 진폭으로 추가 파장을 조정하자, 팀은 올바른 열쇠를 찾아냈습니다.\n\n내부에 진입한 팀은 또 다른 $ehof_epcs$ 파편을 추출했습니다. 이를 앞선 두 파편과 결합하여, 팔면체의 데이터베이스에 제한적으로 접근할 수 있게 되었고 $ehof_ep$, $PGATE_GALACTICS$, 그리고 $giga_sr_sentient_metal$에 관한 정보를 일부 회수했습니다.\n\n$PGATE_GALACTICS$는 $ehof_epcs$를 위한 성간 송신기 역할을 합니다. 알려진 모든 $PGATE_GALACTICS$가 휴면 상태인 것으로 보아, $ehof_ep$의 특정 속성이 이들을 활성화한다고 추정할 수 있습니다.\n\n또한 팀은 $giga_sr_sentient_metal$에 관한 정보를 발견했습니다. 이 물질은 놀라운 적응력과 인지력을 담당하는 고도로 분산된 지능에 의해 제어되는 것으로 보입니다. 그들은 지역 지능 네트워크에 새로운 명령을 제공하여 팔면체가 동일한 질량의 삼각뿔 형태로 재결합하도록 만들었습니다.\n\n이 발견은 자가 치유 함선 장갑이나 초강력 건축 자재와 같은 특수 $giga_sr_sentient_metal$ 부품 개발로 이어질 수 있으며, 이는 잠재적 응용 분야의 빙산의 일각일 뿐입니다.\n\n이제 팀은 지표면으로 복귀할 준비가 되었습니다." # 18437903134669259623
  code_3_cat: "현실 코드 - 얼어붙은 세계" # 15979795262090649232
  code_03_category_desc: "§H[this.GetName]§!이 §H[from.solar_system.GetName]§! 성계 내부에서 $ehof_epcs$의 또 다른 송신을 기록했습니다. 탑승 중인 [Owner.GetScientistPlural]은 이 송신이 §H[from.GetName]§!(이)라는 얼어붙은 행성에서 발신되었다고 판단했습니다.\n\n행성 위나 내부의 정확한 위치는 추가 조사를 통해 결정되어야 합니다." # 15461701845000196575
  ehof_reality_code.301.name: "현실 코드 - 얼어붙은 세계" # 15979795262090649232
  ehof_reality_code.301.desc: "§H[root.GetName]§!이 §H[from.planet.GetName]§!에 있는 $ehof_ep$ 송신기의 위치를 확인했습니다.\n\n이전 두 번의 사례와 마찬가지로, 이번에도 송신기는 북극의 얼음 캡과 그 아래 행성 지각 속에 묻혀 있으며, 송신기가 위치한 깊이는 계속해서 깊어지고 있습니다. 이 행성의 얼어붙은 표면을 뚫기 위해서는 특수 장비가 필요할 것입니다." # 12668206211340836162
  code3_digsite: "현실 코드 - 얼어붙은 발굴" # 10090010816246674340
  code3_digsite_desc: "우리 팀은 §H[from.planet.GetName]§!에 있는 $ehof_ep$ 송신기의 위치를 확인했습니다.\n\n이전 두 번의 사례와 마찬가지로, 이번에도 송신기는 북극의 얼음 캡과 그 아래 행성 지각 속에 묻혀 있으며, 송신기가 위치한 깊이는 계속해서 깊어지고 있습니다. 이 행성의 얼어붙은 표면을 뚫기 위해서는 특수 장비가 필요할 것입니다." # 13781841260550702071
  ehof_reality_code.311.name: "현실 코드 - 얼어붙은 발굴 I" # 1758139519412705660
  ehof_reality_code.311.desc: "행성의 강풍과 혹한으로부터 발굴 현장을 보호하기 위해 대형 보온 돔을 건설하고 내부에 여러 열원을 설치했습니다. 팀은 이전 발굴에 배치되었던 유인 시추 장치를 이러한 가혹한 환경에서 작동하도록 조정했으며, 이제 배치 준비가 완료되었습니다." # 18221938745582416212
  ehof_reality_code.312.name: "현실 코드 - 얼어붙은 발굴 II" # 5226528936896985452
  ehof_reality_code.312.desc: "연구팀이 송신기에 도달했습니다. 예상대로 모든 것이 이전 두 곳과 동일합니다. 우주의 공허함 속에 팔면체가 중앙에 위치해 있습니다.\n\n연구팀은 이 팔면체의 잠금을 해제하기 위해 중력 전자기파 투사기를 설치하고 있습니다." # 13730609351260740449
  ehof_reality_code.313.name: "현실 코드 - 동결된 발굴 III" # 3705384783269784998
  ehof_reality_code.313.desc: "연구팀은 어려움 없이 팔면체 내부에 진입하여 $ehof_ep$의 또 다른 파편을 추출하는 데 성공했습니다.\n\n이 파편을 사용하여 그들은 송신기의 시스템에 더 깊이 접근할 수 있었고, $PGATE_GALACTICS$에 대한 정보, 특히 이를 활성화하는 방법을 발견했습니다!\n\n놀랍지 않게도 $ehof_epcs$가 이 기묘한 구조물을 활용하는 열쇠였습니다. $ehof_ep$를 전송하는 중력 전자기파는 $PGATE_GALACTIC$을 활성화하기 위해 특정 진폭과 주파수를 가져야 합니다. 허용 가능한 매개변수에서 조금이라도 벗어나면 $PGATE_GALACTIC$은 들어오는 $ehof_ep$ 전송을 무시하게 되는데, 이는 아마도 다른 우주 현상이 실수로 $PGATE_GALACTICS$를 활성화하는 것을 방지하기 위함일 것입니다.\n\n연구팀은 또한 $giga_sr_sentient_metal$에 대한 더 발전된 제어 체계를 발견했습니다. 그들은 이제 일치하는 물질의 저장소만 제공된다면, $giga_sr_sentient_metal$을 사용하여 다른 재료로 만들어진 구조물을 건설하거나 수리하는 것이 가능할지도 모른다고 믿고 있습니다.\n\n연구팀은 지표면으로 돌아갈 준비를 하고 있습니다." # 1071084818950206818
  code_4_cat: "현실 코드 - 용암 행성" # 5353664272904064328
  code_04_category_desc: "우리의 센서가 §H[from.solar_system.GetName]§! 성계에서 또 다른 $ehof_epcs$ 전송을 감지했습니다. 이전 전송들과 마찬가지로, 이번에도 거주 불가능한 암석 행성, 즉 §H[from.GetName]§!이라는 이름의 용암 행성에서 전송되었습니다.\n\n조사 및 발굴 팀을 급파해야 합니다." # 8825159644032434222
  ehof_reality_code.401.name: "현실 코드 - 용암 행성" # 5353664272904064328
  ehof_reality_code.401.desc: "§H[root.GetName]§!에 탑승한 [Owner.GetScientistPlural]는 §H[from.planet.GetName]§! 내부에 $ehof_ep$ 송신기가 위치한 곳을 확인했습니다.\n\n이번에도 행성 깊숙이 박혀 있는데, 초기 지질학적 스캔 결과 이번에는 맨틀 층에 위치한 것으로 나타났습니다. 물론 §H[from.planet.GetName]§!과 같은 용암 행성의 경우 \"맨틀\"과 \"지각\" 사이에 명확한 경계는 없습니다. 초고온 대기와 액체 암석 지표면 때문에, 송신기로 접근하기 전에 발굴 현장을 안정화해야 합니다." # 3361281458040189618
  code4_digsite: "현실 코드 - 용암 발굴" # 1706031918669017212
  code4_digsite_desc: "우리 조사선에 탑승한 [Owner.GetScientistPlural]는 §H[from.planet.GetName]§! 내부에 $ehof_ep$ 송신기가 위치한 곳을 확인했습니다.\n\n이번에도 행성 깊숙이 박혀 있는데, 초기 지질학적 스캔 결과 이번에는 맨틀 층에 위치한 것으로 나타났습니다. 물론 §H[from.planet.GetName]§!과 같은 용암 행성의 경우 \"맨틀\"과 \"지각\" 사이에 명확한 경계는 없습니다. 초고온 대기와 액체 암석 지표면 때문에, 송신기로 접근하기 전에 발굴 현장을 안정화해야 합니다." # 14874432072358708427
  ehof_reality_code.411.name: "현실 코드 - 용암 발굴 I" # 8916398109332369596
  ehof_reality_code.411.desc: "§H[from.planet.GetName]§!의 행성 역학으로부터 발굴 현장을 보호하기 위해, 연구팀은 먼저 작은 얼음 소행성을 지표면에 떨어뜨린 뒤 에너지 장벽과 용암 펌프를 설치하여 만들어진 섬을 추가로 격리했습니다. 이러한 조치에도 불구하고 현장은 여전히 위험합니다.\n\n행성의 특성상 $ehof_ep$ 송신기에 도달하려면 이전 탐사와는 다른 방법론이 필요합니다. 녹아내린 암석으로 이루어져 있어 굴착기(굴착할 대상이 없음), 유인 차량(너무 위험함), 원격 장비(신호 간섭이 너무 심함)를 사용할 수 없습니다.\n\n연구팀의 현재 제안은 고도로 차폐된 반자율 드론을 송신기로 내려보내는 것입니다. 이 드론은 먼저 송신기의 보호막을 해제할 중력 전자기 \"암호\"를 찾아낸 다음, 송신기의 로컬 네트워크에 명령을 보내 지표면으로 떠오르게 할 것입니다.\n\n이러한 접근 방식은 불과 몇 년 전만 해도 실행 불가능했겠지만, $giga_sr_sentient_metal$(드론 도금용), $giga_sr_negative_mass$(차폐용), 그리고 $ehof_ep$(제어용)에 대한 우리의 진화하는 이해 덕분에 충분히 실현 가능해졌습니다." # 10425167036683636510
  ehof_reality_code.412.name: "현실 코드 - 용암 발굴 II" # 17534080625297926737
  ehof_reality_code.412.desc: "연구팀은 자율 드론 구성을 마쳤으며 §H[from.planet.GetName]§!의 용암 바다에 배치할 준비를 마쳤습니다." # 8253175197654606586
  ehof_reality_code.413.name: "현실 코드 - 용암 발굴 III" # 768496684993657215
  ehof_reality_code.413.desc: "현장 스캔 결과 드론이 도착했음을 나타냅니다. 연구팀은 모든 것이 순조롭게 진행된다면 며칠 내로 증폭기가 떠오를 것으로 예상하고 있습니다." # 11332132340703656711
  ehof_reality_code.414.name: "현실 코드 - 용암 발굴 IV" # 3149210937609878000
  ehof_reality_code.414.desc: "모든 것이 계획대로 진행되었습니다! 증폭기는 예상대로 떠올랐고, 연구팀은 그것을 섬 기지에 고정했습니다. 일단 확보되자 연구팀은 내부에 진입하여 별다른 사고 없이 $ehof_epcs$의 또 다른 파편을 추출했습니다.\n\n분석 결과 이 파편들은 $PGATE_GALACTICS$를 단순히 활성화하는 다른 전송들과는 달리, $ehof_ep$의 특정하고 고유한 발현의 일부임이 밝혀졌습니다. 안타깝게도 이 시퀀스는 아직 완성되지 않은 것으로 보이며, 우리의 [Owner.GetScientistPlural]는 이것이 완성되었을 때 어떤 기능을 할지조차 확신하지 못하고 있습니다.\n\n우리는 또한 $giga_sr_sentient_metal$에 대해 더 많은 사실을 알아냈습니다. 특히 이 물질을 지배하는 분산된 지능이 어떻게 외부 입력을 수용하는지에 대한 것입니다.\n\n이제 우리는 이 물질의 구성 입자가 신경, 눈, 손의 역할을 한다는 것을 알게 되었습니다. 즉, 지능이 물질 자체에 내장되어 있는 것입니다. 지금까지 우리가 관찰한 $giga_sr_sentient_metal$의 양과 그 적응 능력을 고려할 때, 이 군집 지능의 연산 능력은 우리가 가진 가장 거대한 컴퓨터 네트워크조차 압도할 것입니다.\n\n이 새로운 지식을 바탕으로, 우리는 분산된 지능이 직접 관리하고 우리가 $ehof_ep$를 통해 제공하는 고차원적인 지시를 간접적으로만 제어하는 시스템을 만들 수 있을지도 모릅니다. 초복잡한 군집 지능에 의해 제어되는 무기, 함선, 구조물은 우리가 현재 가지고 있거나 앞으로 가질 그 어떤 것보다 훨씬 빠르게 반응하고 적응할 수 있을 것입니다." # 16463451063351389708
  code_5_cat: "현실 코드 - 가스 거인" # 6776926941497482476
  code_05_category_desc: "§H[this.GetName]§!은(는) §H[from.solar_system.GetName]§! 성계의 가스 거인 §H[from.GetName]§!에서 발신되는 $ehof_ep$ 신호를 감지했습니다. 송신기의 위치를 파악하기 위해 탐사팀을 배치해야 합니다." # 5961436246816037423
  ehof_reality_code.501.name: "현실 코드 - 가스 거인" # 6776926941497482476
  ehof_reality_code.501.desc: "우리가 이전에 마주쳤던 모든 $ehof_ep$ 송신기와 마찬가지로, 이번 송신기도 행성 내부 어딘가에 위치해 있습니다. 이번에는 북극 저 멀리 아래의 금속성 수소층에 박혀 있습니다.\n\n하지만 가스 거대 행성의 특성상, 이 송신기에 도달하는 것은 이전의 발굴 작업보다 훨씬 더 큰 도전이 됩니다. 이전의 암석 행성들과 비교했을 때, §H[from.planet.GetName]§!의 크기만으로도 송신기에 도달하기 위해 이동해야 할 거리가 10배는 더 깁니다. 게다가 행성의 가스층과 액체층을 통과해야 한다는 사실은 상황을 더욱 복잡하게 만듭니다." # 4136130684160588569
  code5_digsite: "현실 코드 - 가스 거대 행성 발굴" # 9568751742294466878
  code5_digsite_desc: "우리가 이전에 마주쳤던 모든 $ehof_ep$ 송신기와 마찬가지로, 이번 송신기도 행성 내부 어딘가에 위치해 있습니다. 이번에는 북극 저 멀리 아래의 금속성 수소층에 박혀 있습니다.\n\n하지만 가스 거대 행성의 특성상, 이 송신기에 도달하는 것은 이전의 발굴 작업보다 훨씬 더 큰 도전이 됩니다. 이전의 암석 행성들과 비교했을 때, §H[from.planet.GetName]§!의 크기만으로도 송신기에 도달하기 위해 이동해야 할 거리가 10배는 더 깁니다. 게다가 행성의 가스층과 액체층을 통과해야 한다는 사실은 상황을 더욱 복잡하게 만듭니다." # 4136130684160588569
  ehof_reality_code.511.name: "현실 코드 - 가스 거대 행성 발굴 I" # 6964669188224717940
  ehof_reality_code.511.desc: "송신기에 도달하기 위해 우리 팀은 먼저 작전 기지를 건설했습니다. 본질적으로 이는 사방에 추진기가 장착된 우주 정거장과 같습니다. 현재 §H[from.solar_system.GetName]§!의 본 기지에서 §H[from.planet.GetName]§!(으)로 이동 중입니다.\n\n행성의 외부 대기권에 진입하면, 송신기 상공의 지점으로 이동하여 이전 발굴 작업에서 사용했던 것과 유사한 반자동 드론을 배치할 것입니다." # 3758939607081757760
  ehof_reality_code.512.name: "현실 코드 - 가스 거대 행성 발굴 II" # 5044969667398973369
  ehof_reality_code.512.desc: "연구팀은 드론이 발사 준비를 마쳤다고 보고했습니다. 우리의 [Owner.GetEngineerPlural]들은 실험적인 $giga_sr_negative_mass$ 추진기를 추가하기로 결정했습니다. 이를 통해 드론은 아래쪽의 수 킬로미터에 달하는 가스와 액체 속을 더 빠르게 이동할 수 있으며, §H[from.planet.GetName]§!의 조석 현상으로 인해 경로를 벗어나더라도 즉시 수정할 수 있게 될 것입니다." # 5274498205831563506
  ehof_reality_code.513.name: "현실 코드 - 가스 거대 행성 발굴 III" # 17276952143400972163
  ehof_reality_code.513.desc: "드론이 별다른 사고 없이 $ehof_ep$ 송신기에 도착했습니다. 이전 송신기들과 마찬가지로, 이 송신기도 주변에 진공 공간을 유지하는 보호막으로 보호받고 있습니다. 이 경우에는 지각 물질이 팔면체를 매몰시키는 것을 막는 대신, §H[from.planet.GetName]§! 대기의 엄청난 압력이 수천 년 동안 그곳에 잠겨 있던 송신기를 짓누르는 것을 막고 있습니다.\n\n드론은 이제 송신기의 보호막이 해제될 때까지 중력 전자기파를 테스트하기 시작할 것이며, 보호막이 해제되면 노출된 송신기에 동일한 부상 명령을 전달할 것입니다." # 10557318190126259645
  ehof_reality_code.514.name: "현실 코드 - 가스 거대 행성 발굴 IV" # 9975280040387254235
  ehof_reality_code.514.desc: "표면으로 부상하자 현장 팀은 증폭기에 접근하여 $ehof_epcs$의 또 다른 파편을 추출할 수 있었습니다. 지금까지 수집한 것으로 보아, 우리 [Owner.GetScientistPlural]는 거의 완성 단계에 이르렀다고 판단하고 있습니다!\n\n송신기의 데이터뱅크에 접근함으로써, 팀은 마침내 전체 시퀀스의 목적을 파악할 수 있었습니다. $PGATE_GALACTIC$에 완전한 $ehof_epcs$가 전송되면, 이는 차례로 $ehof_ep$의 원래 출처에 연락을 시도할 것입니다. 우리는 그 전송 신호를 사용하여 출처의 위치를 확인할 수 있습니다!\n\n또한 팀은 $giga_sr_sentient_metal$ 집단 지성과 우리가 마주친 고대 구조물들이 어떻게 동력을 얻는지에 대한 정보를 발견했습니다. $ehof_ep$ 송신기, 특히 $PGATE_GALACTIC$이 엄청난 양의 에너지를 소비한다는 것은 명확하지만, 그 에너지가 어디서 오는지 결코 알아낼 수 없었습니다. 여전히 확실하지는 않지만, 둘 다 어떠한 형태의 내부 에너지 저장 장치나 생산 시설도 갖추고 있지 않다는 점을 확인했습니다. 그들이 사용하는 에너지는 단순히 어디선가 나타나는 것으로 보입니다. 이는 그들이 거시적 규모의 비국소성을 사용하고 있음을 증명할 수도 있는데, 이는 우리 [Owner.GetScientistPlural]가 오랫동안 불가능하다고 믿어왔던 것입니다." # 861644218279063855
  code_6_cat: "현실 코드 - 갈색 왜성" # 7294249560715132165
  code_06_category_desc: "§H[root.solar_system.GetName]§! 성계에 진입하자, §H[this.GetName]§!(은)는 $ehof_ep$ 전송 신호를 감지했습니다. 이상하게도 이번에는 성계 중심부에 있는 놀라울 정도로 거대한 갈색 왜성에서 신호가 오고 있었습니다.\n\n이처럼 거의 항성에 가까운 천체의 내부를 조사하는 것은 벅찬 일이지만, 우리는 그럼에도 불구하고 출처를 찾아 $ehof_epcs$를 완성해야 합니다." # 5735959075034384159
  ehof_reality_code.601.name: "현실 코드 - 갈색 왜성" # 7294249560715132165
  ehof_reality_code.601.desc: "우리는 송신기의 정확한 위치를 파악했지만, 실제로 그곳에 도달하는 것은 완전히 별개의 문제입니다. 갈색 왜성의 엄청난 크기와 그 내부의 믿을 수 없는 밀도 및 온도는 이 프로젝트를 극도로 어렵게 만들 것입니다. 이 프로젝트에 예상되는 시간과 자원 비용은 엄청나지만, $ehof_epcs$를 완성하고 그 기원을 찾는 것은 어떤 비용을 치르더라도 가치가 있습니다." # 14241978437261011074
  code6_digsite: "현실 코드 - 아항성 발굴" # 11446416283496658480
  code6_digsite_desc: "우리는 송신기의 정확한 위치를 파악했지만, 실제로 그곳에 도달하는 것은 완전히 별개의 문제입니다. 갈색 왜성의 엄청난 크기와 그 내부의 믿을 수 없는 밀도 및 온도는 이 프로젝트를 극도로 어렵게 만들 것입니다. 이 프로젝트에 예상되는 시간과 자원 비용은 엄청나지만, $ehof_epcs$를 완성하고 그 기원을 찾는 것은 어떤 비용을 치르더라도 가치가 있습니다." # 14241978437261011074
  ehof_reality_code.611.name: "현실 코드 - 아항성 발굴 I" # 5957187841976458362
  ehof_reality_code.611.desc: "이전의 가스 거대 행성 발굴과 마찬가지로, 우리는 §H[from.planet.GetName]§!의 광구에 작전 플랫폼을 배치했습니다. 그곳에서 유인 선박을 배치할 것인데, 이는 본질적으로 내부 대부분을 동력 생성 장치로 채운 송신기의 복제품입니다. 초기 제안은 이전 두 번의 발굴에서 사용했던 것과 동일한 종류의 무인 드론을 활용하려 했으나, 우리의 중력전자기 투사 기술은 이곳의 거리에 걸쳐 $ehof_ep$ 제어 코드를 송출할 만큼 강력하지 않습니다... 특히 그 거리가 고밀도의 분자 수프로 가득 차 있을 때는 더욱 그렇습니다.\n\n우리의 재료 과학은 여전히 $ehof_ep$ 송신기에서 사용된 기술과는 거리가 멀지만, 바로 그 송신기들로부터 배운 지식 덕분에 격차를 충분히 좁힐 수 있었습니다. 따라서 이 잠재적 항성의 심연을 탐사하는 동안 우리의 장비는 손상되지 않을 것이며, 우리 [Owner.GetScientistPlural]도 안전할 것입니다." # 11219937510028869076
  ehof_reality_code.612.name: "현실 코드 - 아항성 발굴 II" # 4405703059497335936
  ehof_reality_code.612.desc: "감시 팀의 스캔 결과, 우리 탐사선이 마침내 송신기에 도달했습니다. 이제 탐사선은 보호막 조화 주파수를 구조물과 동기화하여, 잠수 팀이 구조물을 개방하고 진입할 수 있도록 시도할 것입니다." # 18256586147365126394
  ehof_reality_code.613.name: "현실 코드 - 아항성 발굴 III" # 9009136420964947451
  ehof_reality_code.613.desc: "모든 것이 계획대로 진행된다면, 잠수 팀은 현재 송신기의 중력-전자기 잠금 해제 코드를 확인하고 있을 것입니다. 저 깊은 심연에서 그들이 작업을 마칠 때까지 이제 우리가 할 수 있는 일은 기다리는 것뿐입니다." # 9695193319041289689
  ehof_reality_code.614.name: "현실 코드 - 아항성 발굴 IV" # 4924098050762757192
  ehof_reality_code.614.desc: "잠수 팀이 무사히 귀환했습니다! 그들은 증폭기에 접근하여 $ehof_epcs$의 마지막 파편을 추출하는 데 성공했습니다.\n\n이제 그것을 손에 넣었으니, 마침내 $ehof_epcs$를 조립하고 그 진정한 기원을 밝혀낼 수 있을 것입니다." # 15503814934852040553
  ehof_reality_code.1000.name: "현실 코드 - 기원" # 5976083087471098497
  ehof_reality_code.1000.desc: "$ehof_epcs$의 모든 파편을 찾아내는 데 수년을 보낸 끝에, 마침내 이를 조립하는 데 성공했습니다. 이 완성된 시퀀스를 $PGATE_GALACTIC$으로 송출하자, 우리가 이전에는 본 적 없던 방식으로 반응했습니다. 이것은 불분명한 방향으로 새로운 \"응답\" 시퀀스를 전송했습니다.\n\n그러나 이 송출 직후, 마지막 $ehof_ep$ 발굴 현장을 정리하던 우리 팀은 갈색 왜성 깊은 곳에서 경고 수준의 에너지 급증이 발생했다고 보고했습니다. 그로부터 잠시 후, 갈색 왜성 중앙의 구름 일부가 갈라지더니 주황색 섬광이 튀어 나갔습니다. 아주 오래전 우리가 보았던 것과 마찬가지로, 이 섬광은 엄청난 속도로 성계 가장자리를 향해 날아갔습니다. 우리 과학선들이 그 궤적을 뒤쫓아 도착했을 때, 그들은 섬광의 격렬한 에너지에 의해 노출된 것으로 보이는 하이퍼레인이 남겨진 것을 발견했습니다.\n\n이 하이퍼레인 너머에 무엇이 있는지는 알 수 없으나, 우리는 그곳이 $ehof_ep$의 기원일 것이라고 강력하게 추측하고 있습니다." # 10623621240483184466
  ehof_reality_code.10001.name: "항성 말살자" # 12423012298545034734
  ehof_reality_code.10001.desc: "마침내 $ehof_ep$의 기원 성계인 §H[root.GetStarName]§!에 도달했습니다.\n\n이 성계는 거대한 블랙홀 하나와 그 주위를 공전하는 단 하나의 천체로 이루어져 있습니다. 그 천체는 지름이 수백만 킬로미터에 달하는 거대한 구형 거대 구조물입니다. 이 구조물은 확실히 자연적으로 생성된 것이 아니며, 우리가 이전에 마주한 적 없는 함선이 방어하고 있는 것으로 보입니다.\n\n이 \"항성 말살자(Stellar Eradicator)\"는 중무장한 것으로 보이니, 신중하게 접근해야 합니다!" # 15563780339252424358
  ehof_reality_code.10002.name: "말살자 말살 완료!" # 14754663796188535952
  ehof_reality_code.10002.desc: "성계 말살기를 파괴하려던 찰나, 그것은 비상 하이퍼점프를 실행하여 흔적도 없이 사라졌습니다. 이제 방해물이 제거되었으니 임무를 재개할 수 있습니다.\n\n거대 구조물 표면에 대한 간략한 분석 결과, 표면을 가로질러 불규칙하고 거대한 파동이 끊임없이 일렁이고 있으며, 수명이 짧은 고에너지 입자가 지속적으로 방출되고 있음이 확인되었습니다. $ehof_cohesive$ 성계 내에서 마주했던 다른 구조물들과 마찬가지로, 이 거대 구조물의 표면은 상상을 초월하는 양의 $giga_sr_sentient_metal$(으)로 이루어져 있을 가능성이 높습니다. 하지만 격렬한 에너지 방출로 인해 스캐너가 교란되어 이 가설을 검증하려는 시도는 안타깝게도 수포로 돌아갔습니다.\n\n$ehof_the_sphere$의 양쪽 \"극점\"에는 주 표면과는 구별되는 두 개의 원형 구역이 존재합니다. 나머지 표면과는 달리 이 구역들은 정지 상태입니다. 이 두 구역의 중심부에는 $PGATE_GALACTICS$에서 보았던 것과 동일한 거대한 문양이 새겨져 있습니다.\n\n영감을 얻은 [Owner.GetScientist](은)는 이 구조물을 \"$ehof_the_sphere_named$\"(이)라고 부르기로 했습니다." # 11104635521471960352
  ehof_reality_code.10002.a: "정말 놀랍군요!" # 3110721002210884061
  code_final_digsite: "현실 코드 - $ehof_the_sphere_named$" # 6662268845628491049
  code_final_digsite_desc: " $ehof_the_sphere$ 내부로 들어갈 방법을 찾는 것은 불가능해 보입니다.\n\n단순히 강제로 진입하려는 시도는 무의미할 것입니다. 전체적으로 표면 온도가 정의되어 있지는 않지만, 표면을 가로지르는 파동과 일치하는 개별 영역은 온도가 존재합니다. 그 온도는 절대영도에 가까운 온도부터 섭씨 수십만 도까지 불규칙하게 변합니다. 표면에 닿는 모든 장비는 즉시 파괴될 것입니다.\n\n대신, 우리 [Owner.GetResearchers]들은 $ehof_epcs$를 사용할 것을 제안합니다. 이것이 송신기와 $PGATE_GALACTIC$에 접근하는 열쇠였으므로, $ehof_the_sphere$와 상호작용하는 데도 사용할 수 있을 것입니다.\n\n현재 계획은 더 진행하기 전에 이 접근 방식이 유효한지 확인하기 위해 $ehof_the_sphere$ 상단 캡스톤 위에 $ehof_epcs$ 송신기 파일런 하나를 건설하는 것입니다." # 17342572473656061049
  ehof_reality_code.1001.name: "현실 코드 - $ehof_the_sphere_named$ I" # 15878095308646353344
  ehof_reality_code.1001.desc: "송신탑은 $ehof_the_sphere$를 여는 데 부분적으로 성공했습니다.\n\n중력 전자기 반송파를 통해 $ehof_epcs$를 송출하자 $ehof_the_sphere$가 반응했습니다. 아래쪽 극지방에서 1미터 크기의 미세한 틈이 잠시 펼쳐졌지만, 단 1초 만에 닫히고 말았습니다. 계속해서 송출을 시도했음에도 입구는 굳게 닫혔고, $ehof_epcs$를 재송출해도 다시 나타나지 않았습니다.\n\n이제 우리는 우리의 접근 방식이 가장 일반적인 의미에서 작동한다는 것을 알게 되었지만, $ehof_the_sphere$로의 입구를 안정화하기 위해서는 추가적인 탑을 건설해야 한다는 사실도 깨달았습니다." # 4113756811090771489
  ehof_reality_code.1002.name: "현실 코드 - $ehof_the_sphere_named$ II" # 1035444097079430008
  ehof_reality_code.1002.desc: "$ehof_the_sphere$를 돌파하려는 우리의 시도가 진척을 보이고 있습니다. 추가적인 방사탑을 다수 배치하고 $ehof_epcs$ 방송을 순환시킨 결과, 구조물 상단에 위치한 구멍의 크기가 커졌습니다.\n\n개구부의 크기는 전송원의 수와 상관관계에 따라 지수 함수적으로 증가하는 것으로 보입니다. 두 번째 탑을 추가하자 입구의 반지름이 16미터로 늘어나고 16초 동안 유지되었으며, 세 번째 탑을 추가하자 반지름이 81미터로 늘어나며 같은 시간 동안 유지되었습니다. 네 번째 탑에서는 256미터에 256초가 지속되었습니다.\n\n이러한 결과로 미루어 볼 때, 우리의 [Owner.GetScientistPlural]는 이 입구가 초입방체 방식으로 확장된다고 판단하고 있습니다. 성장률을 바탕으로 계산하면, $ehof_the_sphere$를 완전히 개방하기 위해서는 32개의 탑이 필요할 것입니다." # 2239417624994097333
  ehof_reality_code.1003.name: "현실 코드 - $ehof_the_sphere_named$ III" # 6099326608980947272
  ehof_reality_code.1003.desc: "[Owner.GetScientistPlural]의 가설이 옳았음이 증명되었습니다.\n\n32개의 파일런이 모두 합창하듯 $ehof_epcs$를 노래하며 캡스톤의 표면을 완전히 벗겨냈습니다. 근간이 되는 규칙이 변하지 않았다고 가정하면, 이곳은 12 은하 표준일이 조금 넘는 시간 동안 열려 있을 것입니다.\n\n$ehof_the_spheres$ 캡스톤 너머에는 $giga_sr_sentient_metal$로 이루어진 구분 없는 평원이 펼쳐져 있습니다. 이것은 일종의 최종 시험인 듯합니다. 우리는 이 물질의 네트워크 지능에 대한 지식을 활용하여, 그것이 길을 비켜주고 캡스톤을 계속 열어두도록 재프로그래밍해야 할 것입니다." # 15801837130467517196
  ehof_reality_code.1004.name: "현실 코드 - $ehof_the_sphere_named$ IV" # 6110030122641056319
  ehof_reality_code.1004.desc: "지능형 금속인 $giga_sr_sentient_metal$을 제어하려는 초기 시도는 실패로 돌아갔습니다. 겉보기에는 안정적인 표면임에도 불구하고, 내부 층은 본질적으로 현재 취하고 있는 형태로 끊임없이 활발하게 재구성되고 있습니다. 이것은 단순한 재생 특성이 작용하는 것이 아닙니다. 그랬다면 우리가 전송한 명령이 통했을 것입니다. 오히려 하이브 마인드의 로컬 네트워크 자체가 끊임없이 변화하고 있습니다. 우리가 보낸 어떤 명령이든 밀리초 단위로 덮어쓰여지며, 그들이 구조에 가한 조정은 즉시 취소됩니다.\n\n캡스톤이 닫히고 이 기회를 영원히 잃을 때까지 이제 10일밖에 남지 않았습니다." # 10194240380643997025
  ehof_reality_code.1005.name: "현실 코드 - $ehof_the_sphere_named$ V" # 5233479450076547831
  ehof_reality_code.1005.desc: "며칠 남지 않은 상황에서, 연구팀은 실험용 슈퍼컴퓨터를 설계하고 배치했습니다. 그 핵심에는 우리가 보유한 기술과 결합한 고밀도의 $giga_sr_sentient_metal$ 네트워크가 자리 잡고 있습니다. 이는 우리가 만들 수 있는 가장 이상적인 컴퓨트로늄에 가깝습니다. $giga_sr_sentient_metal$이 가진 전반적인 범용성은 부족하지만, 그 순수한 연산 능력은 이 물질의 지원받지 않는 하이브 마인드를 기하급수적으로 능가합니다.\n\n이 시스템은 현재 $ehof_the_spheres$의 극지 캡스톤에 배치되고 있습니다. 운이 좋다면, 이 시스템이 로컬 네트워크의 재계산을 앞질러 $giga_sr_sentient_metal$ 봉인을 보다 영구적인 방식으로 재구성할 수 있을 것입니다." # 9231316634566538894
  ehof_reality_code.1006.name: "현실 코드 - $ehof_the_sphere_named$ VI" # 11846871116589846526
  ehof_reality_code.1006.desc: "완료되었습니다. $ehof_the_sphere$가 열렸습니다.\n\n시인을 보냈어야 했어..." # 13067333975255332208
  ehof_reality_code.005.name: "현실 코드 - $giga_sr_sentient_metal$" # 15200891148304812451
  ehof_reality_code.005.desc: "우리의 [Owner.GetScientistPlural]는 우리가 발견한 물질을 $giga_sr_sentient_metal$이라 명명했습니다. 그들이 밝혀낸 정보에 따르면, 우리 과학계는 이 물질이 상상할 수 없는 잠재력을 지니고 있다고 확신합니다.\n\n하지만 현재로서는 그 용도가 우리가 이해하는 만큼 제한적입니다. 우리의 [Owner.GetEngineerPlural]는 §H합금§!과 §H에너지§!를 공급하여 기존 $giga_sr_sentient_metal$ 샘플을 복제할 특수 증식 시설의 예비 설계를 마쳤습니다.\n\n또한, $PGATE_GALACTIC$을 재조사하는 프로젝트가 제안되었습니다. 우리의 [Owner.GetScientistPlural]는 이 신비로운 구조물들이 $giga_sr_sentient_metal$로 구성되어 있을지도 모른다고 믿고 있기 때문입니다." # 13116624517856035426
  ehof_reality_code.004.name: "현실 코드 - 활성화" # 11866760440404398873
  ehof_reality_code.004.desc: "우리의 [Owner.GetResearchers]가 $ehof_ep$ 송신기에서 수집한 지식 덕분에, 이제 우리는 $PGATE_GALACTIC$을 활성화하는 방법을 알게 되었습니다. 우리의 [Owner.GetResearchers]는 이미 함선 송신기에 필요한 증폭 장치를 개발하기 시작했습니다. $PGATE_GALACTIC$이 활성화될 때 정확히 무슨 일이 일어나는지는 알 수 없습니다. 우리가 아는 것은 오직 그 방법을 수행하는 것뿐입니다!" # 5358040491728087456
  ehof_megastructure.602.name: "수수께끼의 지상화" # 6230274282160197445
  ehof_megastructure.602.desc: "스캐너 데이터를 일상적으로 검토하던 중, 행성 표면에 새겨진 거대한 지상화가 예기치 않게 발견되었습니다. 반복되는 요소와 기호의 전반적인 추상성은 이것이 생명체를 묘사한 것이라기보다는 일종의 문자일 가능성이 높음을 시사합니다.\n\n분명히 조사할 가치가 있는 대상입니다." # 11885257061442293268
  ehof_megastructure.602.a: "그것들은 심지어 지평선 너머까지 뻗어 있었습니다..." # 9439935606600395461
  ehof_precursor: "신비로운 지오글리프" # 6230274282160197445
  ehof_precursor_digsite_desc: "§H[from.Planet.GetName]§!의 표면에는 거대한 지오글리프가 새겨져 있습니다. 반복되는 요소와 기호의 전반적인 추상성은 이것이 생명체를 묘사한 것이라기보다는 일종의 기록일 가능성이 높음을 시사합니다.\n\n분명히 조사할 가치가 있는 대상입니다." # 14784611650772664483
  ehof_megastructure.0051.name: "신비로운 지오글리프 I" # 17291185795630436728
  ehof_megastructure.0051.desc: "§H[this.GetName]§!의 승무원들은 행성의 북극을 감싸고 있는 산맥 바로 남쪽에 위치한 가장 큰 지오글리프 주변에 착륙하여 캠프를 설치했습니다.\n\n즉각적으로 이 지오글리프가 무엇인지, 누가 이곳에 남겼는지를 밝혀내는 데 관심이 집중되었습니다. 숙고 끝에 [Owner.GetScientistPlural]는 대기와 지표 샘플을 채취하고 지오글리프 자체의 표면 스캔을 수행하는 작업에 착수했습니다." # 10777177249282482772
  ehof_megastructure.0052.name: "신비로운 지오글리프 II" # 7911443801679528809
  ehof_megastructure.0052.desc: "§H[from.Planet.GetName]§!에서 [Owner.GetScientistPlural]가 표면을 뒤덮은 지오글리프를 조사하기 시작한 지 얼마간의 시간이 흘렀지만, 의미 있는 진전은 없었습니다.\n\n연구팀은 당혹감을 감추지 못하며 임무 실패를 선언했습니다. 그들은 극지 연구소를 정리하고 함선에 탑승하기 시작했습니다.\n\n§H[this.leader.GetName]§!이 행성을 떠날 것을 명령했고, §H[this.GetName]§!이 궤도를 향해 상승하기 시작했습니다. 하지만 상승 도중, 과학팀은 수주 동안 함선이 착륙해 있던 바로 그 문양만이 희미한 주황색으로 빛나고 있다는 사실을 발견했습니다. 다른 문양들은 빛나지 않았습니다." # 9416416317100722269
  ehof_megastructure.0053.name: "신비로운 지오글리프 III" # 13542429751020398727
  ehof_megastructure.0053.desc: "§H[this.leader.GetName]§!은(는) 상승을 멈추고 지상으로 돌아왔습니다. §H[this.GetName]§!이(가) 하강함에 따라, 함선이 가까워질수록 문양의 주황색 빛은 점점 더 강렬해졌습니다.\n\n이러한 현상에 당황한 연구팀은 행성을 한 바퀴 돌며 모든 문양 위를 저고도로 비행했고, 그 위를 지날 때마다 각각의 문양이 빛나는 것을 확인했습니다.\n\n결국 모든 문양에 불이 들어와 유지되었지만, 승무원들은 이것이 무엇을 의미하는지 여전히 알지 못합니다. §H[this.leader.GetName]§!은(는) 극지 연구 기지에 다시 착륙하여 지상 문양을 직접 재조사하기로 결정했습니다." # 10885443984426597965
  ehof_megastructure.00531.name: "신비로운 지오글리프 IV" # 11298217034207996003
  ehof_megastructure.00531.desc: "§H[from.Planet.GetName]§!의 표면으로 돌아온 직후, 과학팀의 센서가 잠시 동안 거대한 지진 활동을 감지했고, 모든 문양이 동시에 빛을 멈췄습니다.\n\n승무원들의 안전을 우려한 그들은 급히 §H[this.GetName]§!에 탑승하여 다시 궤도로 올라갔습니다.\n\n§H[from.Planet.GetName]§!의 대기권을 벗어나자마자, 함선의 센서는 엄청난 지각 활동의 증가를 감지했습니다. §H[from.Planet.GetName]§!의 표면이 터져 나오기 시작했고, 내부에서 거대한 주황색 빛의 줄기가 우리가 지금까지 달성했던 그 어떤 속도보다 훨씬 빠른 속도로 발사되었습니다.\n\n빛은 곧 가시 범위를 벗어났지만, 승무원들은 그 항로를 통해 빛이 향하는 목적지를 파악할 수 있었습니다. 빛이 돌진하고 있는 것으로 보이는 성계를 조사해야 합니다." # 17144614553730790429
  EXPLORE_EHOF_PRECURSOR_NO_RUINED: "오렌지색 섬광" # 7426505216622115263
  EXPLORE_EHOF_PRECURSOR_NO_RUINED_DESC: "함선의 센서가 우리가 도달할 수 있는 그 어떤 속도보다 훨씬 빠르게 이동하는 거대한 오렌지색 빛의 섬광을 포착했습니다.\n\n빛은 곧 가시거리 밖으로 사라졌지만, 승무원들은 그 항로를 통해 목적지를 파악할 수 있었습니다. 해당 빛이 향하고 있는 성계를 조사해야 합니다." # 5829839488840431829
  EXPLORE_EHOF_PRECURSOR_RUINED: "$EXPLORE_EHOF_PRECURSOR_NO_RUINED$" # 1606671620481478733
  EXPLORE_EHOF_PRECURSOR_RUINED_DESC: "$EXPLORE_EHOF_PRECURSOR_NO_RUINED_DESC$" # 17188071205850794760
  ehof_megastructure.0054_name: "데드 엔드" # 5714969982687867293
  ehof_megastructure.0054_desc: "오렌지색 섬광이 도달한 후 성계에 도착했지만, 그 흔적은 어디에도 보이지 않습니다...\n\n이 이상 현상에 많은 시간을 할애했음에도 불구하고, 지상화의 용도나 제작자, 제작 이유, 혹은 그 오렌지색 섬광의 정체에 대해 밝혀낸 것은 없습니다.\n\n하지만 성계 곳곳에 흩어진 기묘한 잔해를 조사한 결과, 한때 이곳에 일종의 거대 구조물이 존재했었으며 아마도 블랙홀에 의해 오랜 시간 동안 파괴된 것으로 보입니다.\n\n잔해 속에서 [Owner.GetScientistPlural]는 웜홀 안정화와 관련된 고급 기술과 지식이 담긴 대형 데이터 캐시를 발견했습니다.\n\n하지만 가장 중요한 발견은 지극히 외계적이고 초자연적인 유물입니다. 이 유물을 연구하는 것은 분명 가치가 있을 것입니다." # 9057209770672398585
  ehof_megastructure.0055_name: "더 머신" # 16153630494751447017
  ehof_megastructure.0055_desc: "오렌지색 섬광이 도달한 후 성계에 도착했지만, 그 흔적은 어디에도 보이지 않습니다. 대신 성계 중심부의 블랙홀을 감싸고 있는 손상된 구조물이 있습니다. 구조물 내부에서 복구된 데이터에 따르면, 이 구조물은 가동 당시 웜홀을 열고 안정화하기 위해 블랙홀을 조작할 수 있었습니다. [Owner.GetScientistPlural]는 이 구조물을 $ehof_ehof$, 줄여서 $ehof_ehof_abr$이라 명명했습니다.\n\n노후화되어 버려진 것처럼 보임에도 불구하고, 승무원들은 생명체의 징후나 이곳으로 이끌린 단서를 찾기 위해 조사를 시작했습니다.\n\n구조물을 스캔하고 테스트하며 고찰한 결과, 지상화의 용도나 제작자, 제작 이유, 혹은 그 오렌지색 섬광의 정체에 대해 명확히 밝혀진 것은 없습니다.\n\n하지만 구조물에 대한 조사 결과 웜홀 안정화와 관련된 방대한 고급 지식을 얻을 수 있었습니다. 더 중요한 점은 시설 내 눈에 띄는 장소에 설치되어 있던, 용도와 기원을 알 수 없는 신비한 유물을 발견했다는 것입니다. [Owner.GetScientistPlural]는 이 유물을 더 깊이 연구해야 한다고 확신하고 있습니다." # 11760695961483461693
  STUDY_ARCANE_ARTIFACT_1: "§B신비한 유물§! 연구" # 14181905090558135307
  STUDY_ARCANE_ARTIFACT_1_DESC: "우리가 발견한 신비한 유물은 오렌지색 섬광과 연관되어 있을 가능성이 있으므로, 그 정체를 밝히는 데 도움이 될지도 모릅니다.\n\n이 유물에는 아직 밝혀지지 않은 놀라운 비밀들이 잠들어 있을지도 모릅니다.\n\n§R($ehof_ehof$를 잠금 해제하려면 이 프로젝트가 필수입니다!)§!" # 12453452521513521715
  STUDY_ARCANE_ARTIFACT_2: "§B신비한 유물§! 연구" # 14181905090558135307
  STUDY_ARCANE_ARTIFACT_2_DESC: "파괴된 $ehof_ehof$에서 발견한 신비한 유물에는 거대 구조물에 관한 놀라운 비밀이 잠들어 있을지도 모릅니다.\n\n§B($ehof_ehof$를 잠금 해제하려면 이 프로젝트가 필수입니다!)§!" # 1945377049680146000
  STUDY_ARCANE_ARTIFACT_3: "§B신비한 유물§! 연구" # 14181905090558135307
  STUDY_ARCANE_ARTIFACT_3_DESC: "손상된 $ehof_ehof$에서 발견한 신비한 유물은 거대 구조물이 정확히 어떻게 작동했는지 밝혀줄지도 모릅니다.\n\n§B($ehof_ehof$를 복구하려면 이 프로젝트가 필수입니다!)§!" # 845557013485655552
  ehof_anomaly.4321.name: "$r_arcane_manipulator_1$" # 11961113353933686203
  ehof_anomaly.4321.desc: "비전 유물에 대한 우리의 장기적인 연구는 매우 유익했지만, 대부분의 시간은 유물의 기이한 특성을 마주하는 데 소요되었습니다.\n\n이 유물은 팔면체의 기본 형태를 유지하고 있지만, 그 크기와 질량은 독립적으로 극단적인 수치까지 요동칩니다. 우리의 [Owner.GetResearchers]들은 데이터패드만큼 작은 크기부터 현대 순양함만큼 큰 크기까지, 그리고 표준 합금 1단위부터 표준 암석 행성 질량의 약 8분의 1에 이르는 질량까지 기록했습니다. 유물의 불투명도와 고체 상태 역시 마찬가지로 불규칙하게 변화합니다.\n\n이러한 요소들로 인해 우리의 [Owner.GetScientistPlural]들은 이 유물이 사실 우리 현실에 부분적으로 고정된 고차원 물체이며, 그 차원을 넘나드는 회전이 우리가 관찰하는 3+1차원 내의 모든 기이한 효과의 원인이라고 믿고 있습니다." # 2341122819547861200
  ehof_anomaly.4322.name: "$r_arcane_manipulator_1$" # 11961113353933686203
  ehof_anomaly.4322.desc: "우리는 유물의 기능 중 최소 하나를 밝혀냈습니다. 바로 웜홀을 안정화하고 조작하는 능력입니다.\n\n이 유물은 시공간 자체의 양자 요동에서 발생하는 아원자 규모의 단기 가상 $ehof_wormholes_text$를 포함하여 우주에 존재하는 모든 종류의 웜홀을 안정화하고 조작할 잠재력을 가지고 있습니다.\n\n아마도 $ehof_ehof$에서 거대 구조물의 웜홀 조작을 구동하기 위해 사용되었을 것입니다.\n\n유물은 다른 기능을 가지고 있을 수도 있지만, 그 수수께끼 같은 본질 때문에 파악하기 어려울 것입니다. [Owner.GetResearchers]는 유물의 불규칙한 행동이 의도적인 것인지, 아니면 어떤 방식으로든 손상된 것인지조차 확신하지 못하고 있습니다.\n\n어쨌든 [Owner.GetScientistPlural]는 이 유물을 $ehof_wormhole_text$의 안정화, 조작, 그리고 궁극적으로는 이동을 위해 활용하는 것이 가능할 것이라고 믿고 있습니다. 파괴된 $ehof_ehof$는 그 목적을 위해 복구 및 재건될 잠재력을 가지고 있습니다." # 86818618664839634
  ehof_anomaly.4323.name: "$r_arcane_manipulator_1$" # 11961113353933686203
  ehof_anomaly.4323.desc: "$ehof_anomaly.4321.desc$" # 2153810097942214130
  ehof_anomaly.4324.name: "$r_arcane_manipulator_1$" # 11961113353933686203
  ehof_anomaly.4324.desc: "우리는 유물의 기능 중 최소 하나를 밝혀냈습니다. 바로 웜홀을 안정화하고 조작하는 능력입니다.\n\n이 유물은 시공간 자체의 양자 요동에서 발생하는 아원자 규모의 단기 가상 $ehof_wormholes_text$를 포함하여 우주에 존재하는 모든 종류의 웜홀을 안정화하고 조작할 잠재력을 가지고 있습니다.\n\n아마도 $ehof_ehof$에서 거대 구조물의 웜홀 조작을 구동하기 위해 사용되었을 것입니다.\n\n유물은 다른 기능을 가지고 있을 수도 있지만, 그 수수께끼 같은 본질 때문에 파악하기 어려울 것입니다. [Owner.GetResearchers]는 유물의 불규칙한 행동이 의도적인 것인지, 아니면 어떤 방식으로든 손상된 것인지조차 확신하지 못하고 있습니다.\n\n어쨌든 [Owner.GetScientistPlural]는 이 유물을 $ehof_wormhole_text$의 안정화, 조작, 그리고 궁극적으로는 이동을 위해 활용하는 것이 가능할 것이라고 믿고 있습니다. 파괴된 $ehof_ehof$는 그 목적을 위해 복구 및 재건될 잠재력을 가지고 있습니다." # 86818618664839634
  r_arcane_manipulator_1: "§B비전 균열 조작기§!" # 16510659322237924824
  r_arcane_manipulator_1_desc: "현실 그 자체를 통과하는 것처럼 보이는 이 타세계적 구조물은 가상 $ehof_wormholes_text$를 포함한 모든 종류의 웜홀을 안정화하고 조작할 수 있습니다." # 15367614800508978176
  giga_relic_no_active: "이 유물은 순수하게 수집용이며 활성화 효과는 없습니다." # 1224346722379911575
  ehof_megastructure.0056_name: "이벤트 호라이즌" # 3671300031237015643
  ehof_megastructure.0056_desc: "손상된 블랙홀 구조를 탐사한 결과, 우리는 이것이 원래 독특한 형태의 성간 여행을 촉진했다는 사실을 확인했습니다.\n\n이른바 \"$ehof_ehof$\"($ehof_ehof_abr$) 내부에서 회수된 데이터는 이것이 고대의 웜홀 생성기이자 안정기임을 밝혀냈습니다. 거대 구조물 내부와 주변에서 우리는 웜홀 안정화와 관련된 방대한 고급 지식을 발견했습니다.\n\n더 중요한 것은, 시설 내 눈에 띄는 곳에 설치되어 있던 목적과 기원을 알 수 없는 비전 유물을 발견했다는 점입니다. 우리의 [Owner.GetScientistPlural]는 이를 더 연구해야 한다고 확신하고 있습니다." # 3462115928925572758
  bombardment_redtoxin: "진홍빛 재앙" # 11379665241562585508
  bombardment_redtoxin_desc: "$bombardment_redtoxin$ 포격은 진홍빛 재앙을 사용하여 궤도 폭격으로 행성을 독살하고 행성의 모든 생명체를 말살합니다.\n- §R막대한§! §H군대§! 피해\n- §R막대한§! §H행성§! 피해\n- §R막대한§! §H팝§! 피해\n- 방어되지 않은 행성 폭격 가능\n- 행성을 거주 불가능하지만 테라포밍 가능한 붉은 독성 행성으로 변환 가능" # 9337119590888943068
  opinion_policy_orbital_bombardment_redtoxin: "진홍빛 재앙으로 행성을 폭격함" # 18156552586081631732
  orbital_bombardment_redtoxin: "진홍빛 재앙" # 11379665241562585508
  orbital_bombardment_redtoxin_name: "스칼렛 스커지 궤도 폭격" # 1123451490160952943
  orbital_bombardment_redtoxin_desc: "궤도 폭격을 통해 진홍빛 재앙을 배치할 수 있습니다.\n\n§E'진홍빛 재앙' 궤도 폭격 태세를 허용합니다.§!" # 9832499284125225421
  ehof_red_toxin.2.name: "행성이 붉은 독성 행성으로 폭격당함" # 16440895987297962247
  ehof_red_toxin.2.desc: "우리 행성 중 하나가 붉은 독성 행성으로 폭격당했습니다" # 5292445338015954374
  ehof_red_toxin.2.a: "끔찍하군!" # 11537992217471999499
  bombed_to_red_toxic: "행성은 이제 거주할 수 없게 되었지만, 빠르게 테라포밍할 수 있습니다." # 17270533946871646766
  ehof_red_toxin.3.desc: "우리 함대가 진홍빛 재앙 폭격을 통해 적 행성을 붉은 독성 행성으로 만들었습니다." # 11472257708947773951
  ehof_red_toxic_world: "테라포밍 효율 증가" # 6770324977025167474
  ehof_red_toxic_world_desc: "진홍빛 재앙은 테라포밍 과정의 효율성을 높여줍니다." # 5267972199076240465
  building_ehof_sm_forge_1: "지성 금속 주조소" # 5563531211653015028
  building_ehof_sm_forge_1_desc: "$building_ehof_sm_forge_1$은 £alloys£ §Y합금§!과 £energy£ §Y에너지§!를 투입하여 £giga_sr_sentient_metal£ §Y지성 금속§!을 축적하고, 이를 통해 더 많은 £giga_sr_sentient_metal£ §Y지성 금속§!을 복제하는 특수 시설입니다." # 16960345270634886436
  building_ehof_sm_forge_2: "지성 금속 주조 복합체" # 8262916368255922234
  building_ehof_sm_forge_2_desc: "$building_ehof_sm_forge_2$는 이전 모델보다 더 크고 효율적인 변형 시설입니다. 확장된 £giga_sr_sentient_metal£ §Y지성 금속§! 지식을 활용하여 더 짧은 시간 안에 더 많은 물질을 생성합니다." # 5989084678454765226
  building_giga_research_lab_1: "추상 조사 연구소" # 708565365105051527
  building_giga_research_lab_1_desc: "추상 물리학 분야의 현상 연구 및 실험을 위한 전문 연구소입니다. 매우 많은 연구 인력을 수용할 수 있습니다." # 6008472351674407536
  building_giga_research_lab_2: "비국소성 연구 시설" # 16108560750437666
  building_giga_research_lab_2_desc: "추상 물리학 분야의 연구 및 실험을 위한 전문 연구소로, 매우 많은 연구 인력을 수용할 수 있습니다." # 13680953133316562664
  building_giga_institute_1: "비정통 싱크탱크" # 13375167898625181726
  building_giga_institute_1_desc: "$building_giga_institute_1$은 추상 물리학 연구에 전념하는 거대한 시설입니다. 행성의 연구 산출량이 증가합니다." # 10471587720212773081
  building_giga_supercomputer_1: "추상 슈퍼컴퓨터" # 11986848106509553638
  building_giga_supercomputer_1_desc: "$building_giga_supercomputer_1$은 행성의 추상 물리학 연구 및 중앙 처리 시설 역할을 수행하도록 설계된 거대한 시설입니다. 이 놀라운 시설 덕분에 행성의 연구 산출량이 크게 증가합니다." # 17400092937717234777
  building_giga_supercomputer_2: "추상 하이퍼컴퓨터" # 8504044796319588432
  building_giga_supercomputer_2_desc: "이 고도로 발전된 특수 시설은 양자 비국소성 현상에 대한 연구와 실험을 가능하게 합니다." # 11678095774972423498
  building_giga_institute_2: "초인과 과학 넥서스" # 8314588573895088162
  building_giga_institute_2_desc: "초인과 과학 넥서스는 추상 물리학 내의 비국소적 및 초인과적 현상과 관련된 가장 진보되고 거대한 연구 프로젝트와 실험을 수행하는 엄청난 시설입니다." # 17046639987148433280
  building_giga_energy_nexus_1: "레이저 전도 에너지 분배기" # 13707185415711379730
  building_giga_energy_nexus_1_desc: "이 거대한 복합체는 강력한 고에너지 전도체를 사용하여 해당 행성과 같은 성계 내의 다른 행성들 사이에 에너지를 전송합니다." # 805444209584366343
  building_giga_energy_nexus_2: "하이퍼레인 전력 송신기" # 3600300722738736796
  building_giga_energy_nexus_2_desc: "이 초고용량 에너지 송신기는 성계 간에 에너지를 전송하고 제국 내의 전력을 더욱 효율적으로 분배할 수 있습니다." # 1241367973195373393
  building_giga_energy_nexus_3: "성간 장 장치" # 7984795447239964954
  building_giga_energy_nexus_3_desc: "이 거대한 구조물은 양자 역학을 활용하여 은하계의 서로 다른 지점을 직접 얽힘 상태로 만들어, 우리 제국 내에서 즉각적인 에너지 전송을 가능하게 합니다." # 10426013099111299475
  building_giga_planetary_shield_generator_2: "음질량 보호막" # 12306783922903218827
  building_giga_planetary_shield_generator_2_desc: "£giga_sr_negative_mass£ §Y음질량§!을 활용하여 행성 대기 주변에 질량-에너지 척력 층을 생성함으로써, 이 구조물은 가장 강력한 궤도 폭격으로부터 행성을 보호합니다. 장기간의 폭격과 극도로 높은 에너지 빔만이 시간이 흐른 뒤 이 척력 층을 관통할 수 있습니다." # 4066441766876897520
  building_negative_mass_factory_1: "원형 에너지 역변환기" # 8680607070750914315
  building_negative_mass_factory_1_desc: "추상 물리학의 발전으로 £giga_sr_negative_mass£ §Y음질량§!을 생성하기 위한 실험 시설을 개발하고 건설할 수 있게 되었습니다. $building_negative_mass_factory_1$에서 사용하는 시스템은 아직 완벽하지 않아 생산 효율과 수율이 매우 낮습니다." # 13705606040559987382
  building_negative_mass_factory_2: "음질량 변환기" # 451446888848878226
  building_negative_mass_factory_2_desc: "£giga_sr_negative_mass£ §Y음질량§! 생산의 다음 단계인 $building_negative_mass_factory_2$는 $building_negative_mass_factory_1$의 완성형으로, 효율과 수율이 향상되었습니다. 하지만 에너지에서 음에너지로의 변환은 여전히 효율적이지 않으며, 두 상태를 완벽하게 전환하는 방법을 알아내기 전까지는 계속될 것입니다." # 469900767098007035
  edict_giga_photonic_matter_sb: "광자 물질 보호막 강화" # 267258200899780973
  edict_giga_photonic_matter_sb_desc: "광자 물질을 사용하여 함선의 보호막 재생 효율을 일시적으로 높일 수 있습니다." # 10257508445184973175
  edict_giga_negative_pressure_ti: "부압 추진력 증폭" # 66834224135248547
  edict_giga_negative_pressure_ti_desc: "기존 추진기에 정밀하게 부압을 가함으로써 효율을 높일 수 있습니다." # 13585052197807693840
  edict_giga_negative_mass_build: "음질량 건설 가속" # 998167720998142202
  edict_giga_negative_mass_build_desc: "건설 과정에 음질량을 활용하여 건설 프로젝트 완료 속도를 향상할 수 있습니다." # 5882748339765982457
  edict_giga_sterile_hyper_neutrino_d_s: "불임 초중성미자 탐지기 지원" # 2706364718438763016
  edict_giga_sterile_hyper_neutrino_d_s_desc: "일반적으로 EHOF 오메가에 사용되는 우리의 불임 초중성미자 탐지기는 암흑 물질원으로부터 더 많은 암흑 물질을 탐지하고 추출하는 데에도 활용될 수 있습니다." # 11526477740959913488
  pc_red_toxic: "붉은 독성 행성" # 14516333743430938885
  pc_red_toxic_desc: "대기가 찬란한 진홍빛으로 물든 기묘한 독성 입자로 완전히 오염된 독특한 유형의 독성 행성입니다." # 14150291103816552241
  pc_ehof_habitat: "소행성 거주지" # 515475648855473974
  pc_ehof_habitat_desc: "여러 소행성으로 구성된 거대 거주구로, 잃어버린 멸종 문명에 의해 건설되었습니다. 제작자들에게 무슨 일이 일어났는지는 알 수 없습니다." # 11892617783267467198
  pc_ehof_unhabitat: "$pc_ehof_habitat$" # 17975912170571675622
  pc_ehof_unhabitat_desc: "$pc_ehof_habitat_desc$" # 13494709813152209685
  sc_ehof_black_hole: "$pc_ehof_black_hole$" # 14036950681241537793
  sc_ehof_black_hole_desc: "$pc_ehof_black_hole_desc$" # 8909570353860901975
  sc_annihilator: "격변의 항성" # 15782329028599714460
  sc_annihilator_desc: "공식적으로는 M형 거성으로 분류되지만, 이 항성에는 무언가 다른 점이 있습니다..." # 16524864216689929675
  sc_white_hole: "$pc_wh_star$" # 8005020709454280466
  sc_white_hole_desc: "$pc_wh_star_desc$" # 6319718160760986148
  giga_dialog.4201.name: "초거대 E.H.O.F. 건설 현장 완공" # 15565339529999325974
  giga_dialog.4201.desc: "동물이 끄는 조잡한 마차에서 증기 및 핵 추진 차량으로, 초광속 여행을 거쳐 하이퍼 릴레이와 관문에 이르기까지, 모든 문명의 발전과 성장은 끊임없는 교통 기술의 개선에 달려 있으며, 이는 우리가 야망을 더욱 멀리 투사할 수 있게 해줍니다.\n\n이제 은하 중심부 주변에 미래의 §Y초거대 E.H.O.F.§! 건설 현장이 완공됨에 따라, 우리는 또 다른, 어쩌면 가장 위대한 교통 혁명의 문턱에 서 있습니다.\n\n이 플랫폼은 은하계의 초대질량 블랙홀 주변에 건설될 초대형 사건 지평선 오프셋 시설(Event Horizon Offset Facility)의 물류 허브 역할을 할 것이며, 이는 머지않아 우리의 초광속 능력을 전례 없는 수준으로 강화하고 수많은 미세 웜홀 네트워크를 통해 우리 제국의 모든 구석을 하나로 연결할 것입니다." # 1295300137713215935
  giga_dialog.4201.a: "놀랍군." # 11372186741735424273
  giga_dialog.4202.name: "초거대 E.H.O.F. 약전자기 하이퍼프레임 완공" # 11814267560241449056
  giga_dialog.4202.desc: "초대질량 E.H.O.F.의 §Y전약 초구조체§!가 이제 제자리에 설치되었습니다. 이 거대한 구조물은 초대질량 블랙홀의 사건의 지평선 주변에 거대한 전약장을 생성할 것이며, 아직 건설되지 않은 두 개의 준장 조작기를 통해 은하계 전역에서 확률적 웜홀을 '추출'하고 팽창시킬 것입니다." # 11695170611579261216
  giga_dialog.4202.a: "말이 되는 것 같군... 아마도." # 15245311957526503726
  giga_dialog.4203.name: "초거대 E.H.O.F. 준장 조작기 완공" # 320902893605719768
  giga_dialog.4203.desc: "§Y준장 조작기§!의 완공으로 초거대 E.H.O.F.의 구조가 사실상 완성되었습니다. 이 조작기들은 하이퍼프레임에 의해 생성된 약전자기장을 조작하여 주변 시공간을 비틀고, 조작기에서 뿜어져 나오는 두 개의 거대한 소용돌이를 형성할 것입니다.\n\n이론적으로 이는 미세 웜홀을 생성할 수 있는 범위를 은하계 전체와 그 너머까지 확장하며, 동시에 웜홀을 무기한으로 안정적으로 유지할 수 있게 해줄 것입니다.\n\n이제 남은 것은 장치를 가동하는 것뿐입니다." # 12856326540673401929
  giga_dialog.4203.a: "'이론적으로'라니, 그게 무슨 뜻이지?" # 1026853258956738328
  giga_dialog.4204.name: "초거대 E.H.O.F. 가동" # 13189493381336765796
  giga_dialog.4204.desc: "막대한 에너지와 준음질량의 주입 덕분에 우리의 경이로운 §Y초거대 E.H.O.F.§!가 웅장하게 가동을 시작했습니다. 시공간을 마치 진흙처럼 비틀고 굽히는 이 장치의 거대한 힘은 우리에게 은하계의 근간이 되는 준공간에 대한 거의 완전한 통제권을 부여합니다.\n\n이미 우리 제국 전역에 미세 웜홀이 생성되어 한때 분리되었던 세계들을 하나처럼 연결하고 이동 시간을 거의 제로에 가깝게 단축하고 있으며, 우리 전함들은 웜홀을 통해 그 어느 때보다 빠르게 공허를 횡단하며 전례 없는 기동성을 누리고 있습니다.\n\n이 거대한 장치가 완전히 가동됨에 따라, 제국의 규모로 인해 발생했던 물류 및 관료적 문제들은 머지않아 먼 과거의 기억이 될 것이며, 우리는 전례 없는 결속과 은하적 조정의 시대로 접어들게 될 것입니다." # 17027848043940858715
  giga_dialog.4204.a: "이제 은하계는 진정으로 우리의 영역이다!" # 10895714810048591841
  name_supermassive_ehof: "초거대 E.H.O.F." # 12897575598172801503
  supermassive_ehof_0: "$gc_tera$$name_supermassive_ehof$ 건설 현장" # 12451332283996264796
  supermassive_ehof_0_DESC: "$name_supermassive_ehof$ 건설을 위한 현장입니다. 이 비교적 작은 플랫폼은 은하 전역에 걸쳐 거의 완벽한 기동성과 결속력을 부여하는 기계를 건설하기 위한 기지로 사용될 것입니다." # 9061339132906657276
  supermassive_ehof_0_MEGASTRUCTURE_DETAILS: "$giga_list_category_terastructure$ - $giga_list_category_transportation$\n§YFTL 속도§!, £unity£ §Y통합§!, £trade_value£ §Y무역 가치§!를 대폭 강화하고 §Y제국 규모§!를 감소시킵니다.\n§L은하 어디에서나 즉석으로 미세 웜홀을 생성하도록 설계된 확장형 E.H.O.F. 시설입니다.§!" # 17368919714326009920
  supermassive_ehof_0_CONSTRUCTION_INFO_DELAYED: "$giga_list_additional_data$ - §Y초거대 E.H.O.F.§!는 시공간을 조작하고 은하 어디에서나 즉석으로 미세 웜홀을 생성하여 기존의 FTL 이동 방식을 보강할 수 있으며, 효과적으로 §Y하이퍼드라이브 재사용 대기시간§!을 거의 0으로 줄이고 §Y점프 드라이브§!에 무한한 사거리를 부여합니다.\n\n이 웜홀들은 또한 우리 제국의 모든 부분을 더 가깝게 연결하여 §Y통합§!과 §Y무역 가치§!를 높이는 동시에 §Y제국 규모§!와 §Y이주 비용§!을 감소시킵니다.\n\n또한 무한한 사거리와 거의 완벽한 정확도를 가진 §Y양자 투석기§!로 기능할 수 있으며(§YOverlord§! DLC 필요), 기회가 주어진다면 §Y은하 간 공간§!을 탐사할 수 있게 해줄지도 모릅니다.\n\n하지만 웜홀 생성은 무료가 아니며, 현재 §Y팝§! 수(팝당 §Y4§! £energy£ 및 §Y0.04§! £giga_sr_negative_mass£), §Y행성§! 수(행성당 §Y100§! £energy£ 및 §Y1§! £giga_sr_negative_mass£) 그리고 §Y함선§! 수(함선당 §Y2§! £energy£)에 따라 §Y에너지§! 및 §Y준-음질량§! 유지비가 발생합니다. " # 1781937833159824593
  supermassive_ehof_1: "초거대 E.H.O.F. 전기약력 하이퍼프레임" # 10157045203566015958
  supermassive_ehof_1_DESC: "전기약력 하이퍼프레임은 사건의 지평선 주위에 전기약력 장을 생성하여 그로부터 확률적 미세 웜홀을 추출하는 결정적인 역할을 합니다." # 15806900646183185361
  supermassive_ehof_2: "초거대 E.H.O.F. 준-장 조작기" # 10395475289404426601
  supermassive_ehof_2_DESC: "준-장 조작기는 하이퍼프레임의 전기약력 장을 구부리고 비틀어 은하 전역의 준-공간을 거의 완벽하게 제어할 수 있게 합니다." # 1251199429987167952
  supermassive_ehof_3: "초거대 E.H.O.F." # 12897575598172801503
  supermassive_ehof_3_DESC: "초거대 E.H.O.F.는 은하 내 어디에서나 거의 무한한 양의 미세 웜홀을 생성하여 전례 없는 기동성과 결속력을 가능하게 합니다. 따라서 유지비는 팝, 행성 및 함선 수에 따라 직접적으로 증가합니다." # 15661872503033152516
  supermassive_ehof_3_no_catapult: "초거대 E.H.O.F." # 12897575598172801503
  supermassive_ehof_3_no_catapult_DESC: "$supermassive_ehof_3_DESC$² " # 2973700659287168050
  requires_ehof_phase_04: "$TRIGGER_FAIL$£engineering_research£ §Y$tech_ehof_phase_04$§! 기술이 필요합니다." # 7167828724092412218
  ap_supermassive_ehof: "해방된 이동" # 13697835498768518896
  ap_supermassive_ehof_desc: "너무나 오랫동안 은하의 거대한 크기는 우리의 은하적 야망에 항상 존재하는 장애물이었습니다. 이제는 아닙니다! 은하 핵을 중심으로 구축된 확장형 사건의 지평선 오프셋 시설은 제국의 가장 먼 곳까지 연결할 수 있게 해주며, 우리의 강력한 전함들이 극도의 용이함으로 공허를 가로지를 수 있게 할 것입니다." # 15534685181223440999
  giga_tech_supermassive_ehof: "사건의 지평선 오프셋 시설 하이퍼스케일링" # 17693151137606778942
  giga_tech_supermassive_ehof_desc: "E.H.O.F. 개발의 정점이자 거대 구조물 공학의 최신 발전이 결합된 결과물입니다. 가장 거대한 블랙홀 주위에 건설된 이 괴물 같은 구조물은 이론적으로 은하 내 어디에서나 거의 무한한 양의 미세 웜홀을 생성할 수 있으며, 우리 함대에 전례 없는 기동성을 제공하고 제국 크기에 내재된 대부분의 거리 관련 물류 문제를 획기적으로 억제합니다." # 16120422712423629256
  allow_supermassive_ehof: "§H거대 구조물 잠금 해제:§! $name_supermassive_ehof$" # 10839999729097557234
  desc_supermassive_ehof: "초거대 E.H.O.F.는 타의 추종을 불허하는 FTL 이동과 제국 결속력을 제공합니다." # 14356265996212288018
  requires_no_existing_supermassive_ehof: "$name_supermassive_ehof$은 하나만 건설할 수 있습니다." # 1575860910591119049
  giga_blokkat.10021.name: "은하 간 탐사 제안" # 4289551875553710976
  giga_blokkat.10021.desc: "중력 이상 현상이 놀라운 속도로 우리 은하를 향해 돌진함에 따라, 단순히 대상이 도착하기를 기다리기보다는 선제적으로 행동하여 우리의 §Y초거대 E.H.O.F.§!를 이용해 은하 간 공간에 있는 접근 중인 이상 현상을 향해 탐사선을 직접 발사하자는 제안이 나오고 있습니다.\n\n성공한다면, 이는 의심할 여지 없이 해당 물체의 본질에 관한 귀중한 데이터를 얻을 수 있겠지만, 물론 우리는 무엇이든 대비해야 합니다. 이 계획을 진행하기 위해 몇 가지 다른 선택지가 제시되었습니다.\n\n첫째, 안전하게 무인 과학선을 보내 이상 현상을 조사하고 가능한 한 많은 데이터를 수집하는 방법입니다. 만약 이상 현상이 적대적이거나 위험한 것으로 밝혀지더라도 우리는 큰 손실을 보지 않을 것이며, 그것이 도착했을 때 어떻게 최선으로 대비할지에 대한 귀중한 통찰력을 얻을 수 있을 것입니다.\n\n대안으로, 더 대담한 선택지는 함대를 보내 이상 현상을 요격하고 그것이 우리에게 도달하기 전에 파괴하는 것이지만, 실제 위력이 어느 정도인지 전혀 알 수 없기에 성공을 보장할 수 없습니다.\n\n마지막으로, 비싼 함대를 보내는 것은 자원 낭비에 불과하다고 주장하며, 대신 강력한 폭발 장치를 보내 이상 현상을 파괴하거나 최소한 궤도를 수정하여 밀어내는 위험 부담 없는 방법을 선호하는 이들도 있습니다." # 11554701698786848238
  giga_blokkat.10021.a: "무인 과학 탐사선을 보냅시다." # 7210807392347538437
  giga_blokkat.10021.b: "우리 함대라면 그게 무엇이든 금방 처리할 수 있을 것입니다!" # 14764330029235173058
  giga_blokkat.10021.c: "강력한 폭발 장치로 궤도를 벗어나게 할 수 있기를 바랍니다." # 12203229195901653783
  giga_blokkat.10021.d: "거부합니다. 위험과 비용을 감수할 가치가 없습니다." # 7350391982259612100
  EHOF_PROBE_BLOKKATS: "은하 간 이상 현상 탐사" # 3575591300246401503
  EHOF_PROBE_BLOKKATS_DESC: "은하 간 이상 현상에 무인 과학선을 보내면 그 본질을 파악하는 데 도움이 될 수 있습니다. 함선을 회수할 가능성이 낮으므로, 지도자를 탑승시키지 말아야 합니다." # 645340078379250875
  EHOF_FIGHT_BLOKKATS: "은하 간 이상 현상 교전" # 4891036435312234715
  EHOF_FIGHT_BLOKKATS_DESC: "우리는 전투 함대를 보내 이상 현상을 요격하고 도착하기 전에 파괴할 것입니다. 하지만 성공을 보장할 수 없으므로, 실패할 경우를 대비해 너무 큰 함대를 투입해서는 안 됩니다.\n§R이 프로젝트를 연구하는 데 사용되는 모든 함대가 투입됩니다!§!" # 1914626373189514409
  giga_blokkat.10022.name: "은하 간 이상 현상 탐사 보고서" # 16511270208337582688
  giga_blokkat.10022.desc: "우리 §Y초거대 E.H.O.F.§!의 인력들이... 불길한 소식을 가져왔습니다.\n\n무인 과학선이 이상 현상에 성공적으로 도달했지만, 파괴적인 에너지에 의해 파괴되기 전까지 단 몇 초 동안만 조사할 수 있었습니다. 그리고 과학선이 보내온 데이터는 우리 제국의 최악의 두려움을 확인시켜 주었습니다. 그 물체는 자연적인 것이 아닙니다.\n\n그것은 함선입니다! 더 정확히 말하자면, 일종의 고에너지 핵 주위에 배열된 거대한 동심원 고리로 구성된 완전히 외계적인 설계의 거대 함선입니다.\n\n불행히도 그 구성 요소들이 어떤 목적을 가지고 있는지 이해할 시간이 부족했고, 전송된 데이터 대부분은 문맥이 부족하여 현재로서는 사용할 수 없습니다. 다행히 우리 과학자들은 이상 현상이 실제로 도착하면 분석을 완료할 수 있을 것이라 믿고 있지만, 지금은 최악의 상황에 대비해야 합니다." # 11885526933684184403
  giga_blokkat.10023.name: "은하 간 이상 현상 전투 보고서" # 8608274491749948638
  giga_blokkat.10023.desc: "[Root.GetSpeciesName]이 한 번도 가본 적 없는 곳으로, 우리 전투 함대가 §Y초거대 E.H.O.F.§!가 직조한 무한히 뒤틀린 공간의 주머니를 타고 전례 없는 속도로 은하 간 공간을 가로질러 나아갑니다.\n\n며칠 만에 이상 현상이 시야에 들어왔고, 모두의 당혹감과 놀라움 속에서 그것은... 작았습니다? 수백 킬로미터도 채 되지 않는 크기라 우리 전투 함대의 너비 안에 몇 번이고 담길 수 있을 정도였습니다. 어쨌든 함대가 발포를 시작하자 크고 작은 대포들이 [ROOT.Capital.GetName]의 대부분을 평지로 만들 만큼 강력한 포탄을 이상 현상에 쏟아부었습니다.\n\n하지만 아무 일도 일어나지 않았습니다. 우리의 개입에 전혀 동요하지 않은 이상 현상은 계속 나아갔고, 우리 함대는 뒤처지지 않으려 애썼습니다. 그래서 우리는 다시 한번 발포했지만, 이번에는 이상 현상이 갑자기 멈추면서 반응이 있었습니다. 순식간에 에너지 수치가 치솟았고... 모든 것이 조용해졌습니다.\n\n우리 사령부는 연락을 재개하려 애썼지만 침묵만이 돌아왔습니다. 결론은 분명합니다. 그 물체가 무엇이든, 누구든, 그것이 마침내 도착했을 때 우리가 가진 모든 것을 동원하여 맞설 준비를 해야 합니다." # 2410522629059690200
  giga_blokkat.10023.a: "우리는 극복할 것이다. 전투를 준비하라." # 13850198832739011586
  giga_blokkat.10023.b: "우리의 거대 프로젝트들이 제때 준비되도록 하라." # 3738103376359697782
  giga_blokkat.10023.c: "기술적 진보에 더 많은 투자를 하라." # 10399228674224529856
  giga_blokkat.10023.d: "지켜보며 기다리겠다." # 4315002008752281807
  giga_blokkat.10024.name: "은하 간 이상 현상 폭격 보고서" # 6952212043985572577
  giga_blokkat.10024.desc: "우리의 §Y초대질량 E.H.O.F.§! 연구진이 은하 간 공간의 이상 현상을 향해 폭발 장치를 성공적으로 발사했으나, 결과는... 기대에 미치지 못했습니다.\n\n이상 현상은 우리 은하에서 밀어낼 수 있을 만큼의 충격을 받았음에도 불구하고 그 궤도가 전혀 변하지 않았습니다. 다만 속도가 다소 감소하여, 이상 현상의 도래에 대비할 시간을 조금 더 벌 수 있게 되었습니다.\n\n흥미로운 점은 이러한 감속이 충격 직후가 아닌 일정 시간이 지난 후에 발생했다는 것입니다. 이는 이상 현상이 충격으로 인해 강제로 감속된 것이 아니라, 그 내부의 무언가, 혹은 누군가가 충격에 반응한 결과일지도 모른다는 의문을 불러일으킵니다.\n\n어쨌든, 우리는 이로 인해 도래에 대비할 시간을 §Y5년§! 더 확보했다고 추정합니다." # 1877218907945819096
  giga_blokkat.10024.a: "훌륭하군." # 1642978515096943077
  preparing_to_fight_blokkats: "은하 간 이상 현상 - 군사적 대비" # 11372029399244542856
  preparing_to_tech_blokkats: "은하 간 이상 현상 - 기술적 대비" # 5713523298192604551
  preparing_to_mega_blokkats: "은하 간 이상 현상 - 공학적 대비" # 721567838156753046
  probed_blokkats_early: "블록캣 탐사 데이터" # 13730350841244207801
  fought_blokkats_early: "블록캣 전투 데이터" # 10068436393654629927
  giga_blokkat.10025.name: "은하 간 이상 현상 전투 데이터 분석 완료" # 9794643257492051700
  giga_blokkat.10025.desc: "블록캣이 우리 은하에 도착한 이후, 우리 연구국은 은하 간 공간에서 블록캣-베스터와 짧은 전투를 벌이며 획득한 소량의 데이터를 분석하는 데 매진해 왔습니다.\n\n현재 진행 중인 블록캣 연구에서 쏟아져 나오는 방대한 데이터와 이를 교차 검증함으로써, 블록캣 함선을 상대로 약간의 군사적 우위를 점할 수 있을 것입니다." # 16756810860960518735
  giga_blokkat.10025.a: "훌륭해. 모든 게 헛수고는 아니었군." # 13386458054316582926
  giga_blokkat.10026.name: "은하 간 이상 현상 탐사 데이터 분석 완료" # 9031749215245464519
  giga_blokkat.10026.desc: "블록캣이 우리 은하에 도착한 이후, 우리 연구국은 탐사선이 은하 간 이상 현상과 접촉했을 때 획득한 데이터를 분석하는 데 매진해 왔습니다.\n\n현재 진행 중인 블록캣 연구에서 쏟아져 나오는 방대한 데이터와 이를 교차 검증함으로써, 블록캣에 대해 조금이나마 더 깊이 이해할 수 있게 될 것입니다." # 1521346350748917722
  giga_blokkat.10026.a: "기쁘군!" # 6115787588398213199
  tremendous_ring: "거대한 고리 시스템" # 4929795067312007070
  tremendous_ring_desc: "이 가스 거대 행성은 지름이 약 378만 킬로미터에 달하는 거대한 고리 체계를 가지고 있습니다." # 5954234408391548933
  methane_oceans: "메탄 바다" # 10626513513807947963
  methane_oceans_desc: "이 춥고 척박한 행성에는 가장 큰 소행성 충돌구 내부에 액체 메탄으로 이루어진 작은 바다가 있습니다." # 12153040791372431265
  nanite_deserts: "나이트 사막" # 15313491196035338418
  nanite_deserts_desc: "이 행성 사막의 50%는 모래를 모방하는 나노 머신으로 구성되어 있습니다." # 13132289441250892469
  coreless_planet: "핵이 없는 행성" # 208878303810501397
  coreless_planet_desc: "이 행성은 철 핵이 완전히 결여되어 있어 물리학 연구에 매우 가치가 높습니다." # 9731816129350527177
  core_facility: "핵심 시설" # 10608000121330233178
  core_facility_desc: "이 행성은 철 핵이 완전히 결여되어 있지만, 지표면 아래에 거대한 연구 시설이 존재하여 고급 연구에 활용될 수 있습니다." # 9443337483163463158
  cataclysmic_star: "격변 변광성" # 4743463082688342359
  cataclysmic_star_desc: "이 항성에는 백색 왜성이 포함되어 있어 항성 자체 내부에 극심한 불안정성을 유발합니다." # 13499121257313601512
  oxygen_world: "결정화된 산소 세계" # 10833799387289464353
  oxygen_world_desc: "이 행성의 표면은 결정화된 산소로 구성되어 있어 과학적으로 매우 가치가 높습니다." # 6090212292368685320
  natural_network: "자연적 지구 네트워크" # 15870972861245957605
  natural_network_desc: "독특한 식물 속이 행성 주위에 거대한 네트워크를 형성하고 있어 과학적으로 매우 가치가 높습니다." # 12536739788894632577
  fire_life: "플라스마 생명체" # 10292236173177886259
  fire_life_desc: "이 행성에는 독특한 플라스마 생명체가 거주하고 있어 유기 생명체에게는 매우 적대적인 환경입니다." # 285396526130381274
  red_toxic: "붉은 독성 행성" # 14516333743430938885
  red_toxic_desc: "최근 발견된 독성 행성으로, 대기가 알려지지 않은 붉은색의 유독 물질로 가득 차 있습니다." # 16457906082222168186
  scarlet_scourge: "붉은 독성 행성" # 14516333743430938885
  scarlet_scourge_desc: "통제 불능 상태로 보이는 고급 합성 독소의 붉은 입자로 대기가 가득 찬 매우 적대적인 행성입니다." # 13108169573539631392
  remnants_civ: "문명의 잔재" # 9366304023446438680
  remnants_civ_desc: "한때 위대했던 문명의 잔재가 이 행성에 남아 있으며, 스칼렛 스커지의 영향으로 손상되었습니다." # 2315684509377736451
  the_repository1: "저장소" # 9256298749913665725
  the_repository1_desc: "혁신 용광로의 광대한 연구 시설은 이 행성에서 고도의 연구 및 개발 활동을 가능하게 합니다." # 15586434702470150256
  the_repository2: "저장소" # 9256298749913665725
  the_repository2_desc: "혁신 용광로의 거대한 연구 시설은 스커지가 더 이상 존재하지 않더라도 이 행성에서 고도의 연구 및 개발 활동을 가능하게 합니다." # 10268323742676689825
  urmazin_utopia: "우르마진 유토피아" # 3988486328030993175
  urmazin_utopia_desc: "우르마진은 은하계의 나머지 지역으로부터 격리된 낙원에서 살고 있는데, 불행할 이유가 무엇이겠습니까?" # 2216364586174037165
  giga_compound_immunity: "피해 면역" # 4116835015203271324
  weapon_type_anticompound: "§Y반화합물§!" # 17362246255562386059
  mod_weapon_type_anticompound_weapon_damage_mult: "반화합물 무기" # 960430628707797824
  compound_situation: "§H$ehof_the_compound$§! 파괴" # 8738236191104554729
  compound_situation_type: "§H$ehof_the_compound$§! 파괴" # 8738236191104554729
  compound_situation_desc: "우리가 살아남으려면 $ehof_the_compound$에 피해를 줄 방법을 조사해야 합니다. 해결책을 찾을 시간이 충분하기를 바랄 뿐입니다." # 15686858417651505393
  compound_situation_monthly_change_tooltip: "생존이 최우선이다" # 14357536943491226931
  compound_situation_desc_1: "$ehof_the_compound_text$를 관찰하고 진행 방안을 수립하십시오.\n\n§R우리의 선택은 §! §Y1년§! £time£ §R후에 확정됩니다.§!" # 12474791436674885229
  compound_situation_desc_2: "상대를 분석할 기회를 항상 주시하십시오." # 6986895459661971679
  compound_situation_desc_2_a: "지금 의지를 꺾는다면 다시 시도하기엔 너무 늦을 것입니다. 우리 제국이 살아남기 위해서는 실험을 완료해야 합니다." # 9295917051087060645
  compound_situation_desc_3: "해결책을 기다릴 것입니다... 희망을 품는 것 외에는 할 수 있는 일이 없습니다." # 5895059826660779094
  compound_situation_desc_3_a: "기본적인 $giga_sr_negative_mass$ 무기를 확보했지만, 작고 약합니다. 적어도 시간을 벌 수는 있을 것입니다." # 17766338634529008046
  compound_situation_desc_3_b: "실험에 실패했습니다. 이제 너무 늦지 않았기를 바랄 뿐입니다." # 11093009844430298375
  compound_situation_finisher: "적절한 해결책은 시간이 지나면 드러나겠지만, 너무 오래 걸릴 수도 있습니다.\n\n기다려야 할까요, 아니면 행동에 나서야 할까요?\n무엇을 선택하든, 신속해야 합니다." # 1658729390734904962
  compound_situation_stage_1_tooltip: "관찰 단계" # 15808178256612255833
  compound_situation_stage_2_tooltip: "실험 단계" # 15624436943381380277
  compound_situation_stage_3_tooltip: "적용 단계" # 5145880841169228045
  compound_approach_wait: "데이터 수집" # 12699404137130234868
  compound_approach_wait_tooltip: "더 많은 정보를 수집할 때까지 기다리며 관찰할 여유가 있습니다." # 18153896189036312759
  compound_approach_qnm1: "신속한 해결책" # 8235463137416044998
  compound_approach_qnm1_tooltip: "급진적인 접근 방식을 시도하여 신속한 해결책을 찾아볼 수 있습니다." # 18115165719305659944
  compound_approach_qnm2: "시제품 함선" # 14805868944463077863
  compound_approach_qnm2_tooltip: "우리는 $ehof_the_compounds_text$ 함대에서 샘플을 얻을 수 없으므로, 효과적인 기술을 찾길 바라며 실험적인 기술을 현장에서 시험해야 합니다." # 2352663500743922085
  compound_approach_qnm3: "음질량 무기" # 983476491358444768
  compound_approach_qnm3_tooltip: "$giga_sr_negative_mass$가 $ehof_the_compound_text$에게 피해를 줄 수 있다는 사실을 알아냈습니다. 아직 그 진정한 잠재력을 해제하지는 못했지만, 최소한 이 물질을 활용하는 소형 무기는 제작할 수 있습니다." # 2436763060670226052
  compound_approach_blokkat: "블록캣 무기" # 4117717574313459833
  compound_approach_blokkat_tooltip: "블록캣 무기는 근본적인 수준에서 현실을 찢어발깁니다. 이 생명체들에게 피해를 줄 수 있을지도 모릅니다." # 8043375461104510382
  compound_approach_DEBUG: "§P디버그§!" # 9366164875197389936
  compound_approach_DEBUG_tooltip: "§P이것은 디버그 명령어로 일반적인 상황에서는 보이지 않아야 합니다§!\n\n\n" # 12938442791021154036
  compound_approach_DEBUG_ADD: "§P추가 (디버그)§!" # 3902280943710411506
  compound_approach_DEBUG_SUB: "§P제거 (디버그)§!" # 7078644763653147700
  compound_approach_DEBUG_VAR: "$compound_approach_DEBUG_tooltip$VAR owner.compound_protoships_eaten: [owner.compound_protoships_eaten]\n\n\n" # 17972694187305013698
  compound_gimmeyaships: "$ehof_the_compound$ 시험" # 15684218164983295830
  compound_gimmeyaships_type: "$ehof_the_compound$ 시험" # 15684218164983295830
  compound_gimmeyaships_desc: "그들에게 피해를 줄 방법이 없더라도, 우리는 $ehof_the_compound_text$에 함선을 투입하여 어떤 종류의 약점이라도 찾아내려 할 것입니다.\n\n§W$compound_situation$ 상황의 타이머가 종료되기 전에 §!§Y[owner.compound_protoships_tobeeaten]§!§W척의 함선을 그들의 세력에게 공급해야 합니다.§!" # 11300773866293046268
  compound_gimmeyaships_monthly_change_tooltip: "우주선 뷔페" # 8504237864511026273
  compound_gimmeyaships_approach: "우주선 뷔페" # 8504237864511026273
  compound_gimmeyaships_approach_tooltip: "우리의 [Owner.GetEngineerPlural]는 함대에 무엇이든 시험해 볼 수 있는 무작위 프로토타입 기술들을 장착했습니다. $ehof_the_compound_text$를 향해 이들을 투입하여 어떤 일이 벌어지는지 확인하십시오." # 6925458303806031184
  compound_gimmeyaships_finisher: "$ehof_the_compound_text$의 본질에 대한 통찰을 얻기 위해 희생 함선에 장착했던 실험적 기술들이 마침내 결실을 맺었습니다.\n" # 17591667978233531010
  compound_situation.1.title: "블록캣 무기" # 4117717574313459833
  compound_situation.1.desc: "$ehof_the_compound_text$를 분쇄하는 데 필요한 모든 것은 이미 갖추었습니다. 어리석은 프로젝트에 시간을 낭비할 필요는 없습니다." # 5934816863423647402
  compound_situation.1.a: "§R우리가 무엇을 가졌는지 보여주겠다!§!" # 8024845257866350791
  compound_situation.1.a.tooltip: "§R상황 취소§!" # 17328091079217466470
  compound_situation.1.b: "어쨌든 조사하는 것이 현명할 것이다." # 5590706101525943207
  compound_situation.2.title: "기다리며 지켜보기" # 6475278960520568826
  compound_situation.2.desc: "우리는 $ehof_the_compound_text$가 우리에게 당장 위협이 되지 않는다고 판단했습니다. 다음 행동을 결정하기 전에 그들을 지켜볼 여유가 있습니다." # 7620976952276044958
  compound_situation.2.a: "그저 또 다른 위기일 뿐이다." # 14970797647654374398
  compound_situation.3.title: "해결책 탐색" # 7771842880529144191
  compound_situation.3.desc: "$ehof_the_compound_text$는 멈출 수 없는 위협처럼 보이지만, 우리는 이 우주에서 어떤 방식으로든 항상 답이 존재한다는 것을 충분히 보아왔습니다. 그들에게도 분명 약점이 있을 것입니다.\n\n우리는 다양한 실험적 무기를 장착한 함선을 다수 건조하여, 무언가 효과가 나타날 때까지 싸울 것입니다." # 6833157352350766521
  compound_situation.3.a: "실험실이 아닌 총기로 연구하라!" # 6419236513785170458
  compound_situation.4.title: "약점 발견" # 17056576688170576208
  compound_situation.4.desc: "해냈습니다! 우리는 $ehof_the_compound_text$의 파악하기 힘든 약점을 찾아내는 데 성공했습니다. 심지어 그들조차 인지하지 못했을지도 모르는 약점입니다. $giga_sr_negative_mass$가 그들에게 피해를 줄 수 있다는 사실이 밝혀졌습니다! 불행히도 이 기술에 대한 우리의 숙련도는 제한적이라, 소형 무기 설계밖에 할 수 없었습니다. 하지만 최소한 시간을 벌기에는 충분할 것입니다." # 13523052403497296936
  compound_situation.4.a: "이 정도면 충분하군, 다들 수고했다." # 17944843350908240133
  compound_situation.5.title: "약점 발견 실패" # 4931829519843175537
  compound_situation.5.desc: "최선을 다했음에도 불구하고, 우리는 $ehof_the_compound_text$의 유의미한 약점을 찾아내어 활용하는 데 실패했습니다. 남은 시간이 많지 않으며, 우리 제국의 지도자들은 이 위기를 극복할 희망을 잃어가고 있습니다." # 478338589107887463
  compound_situation.5.a: "희망이란 참으로 덧없는 것이지, 그렇지 않나?" # 6469243526071939009
  compound_situation.6.title: "여전히 대기 중" # 2119747116810097975
  compound_situation.6.desc: "우리는 무언가 일어나기를 기다리는 동안, 은하계는 우리 주변에서 불타고 있습니다.\n\n그저 $ehof_the_compound_text$를 무시하면 괜찮을 것입니다.\n\n무지는 곧 행복, 그렇지 않나요?" # 2620362389630121175
  compound_situation.6.a: "이 정도면 괜찮아." # 10401776523460982552
  compound_situation.9.title: "프로젝트 중단" # 15635889732107206309
  compound_situation.9.desc: "우리는 $ehof_the_compound_text$를 처리할 더 나은 해결책에 대한 소식을 접했으며, 현재 진행 중인 프로젝트를 중단했습니다." # 13265934159799402559
  compound_situation.9.a: "뭐, 적어도 이제는 그들과 싸울 수 있겠군." # 16590076119733834983
  compound_situation.10.title: "데이터 수집 완료" # 9033555603731547193
  compound_situation.10.desc: "우리는 $ehof_the_compounds_text$ 함선들이 우리의 공격에 반응하는 방식에 대한 방대한 양의 데이터를 기록했습니다. 이제 전문가들이 이를 분석하여 해결책을 내놓기를 기다립니다." # 12149768329020011449
  compound_situation.10.a: "이럴 가치가 있었기를 바란다." # 2194311659350233085
  compound_situation.10.a.tooltip: "$compound_situation$ 상황이 §G+20 포인트§만큼 진행되었습니다!" # 17243828266391883166
  compound_situation_already_open: "대화창이 이미 열려 있습니다. 먼저 닫으십시오." # 18195632456151816171
  compound_situation_no_qnm_tech: "\n§R어쩌면 우리가 찾는 해답은 $ehof_ehof_abr$이 생성한 웜홀 너머에 있을지도 모릅니다...§!" # 15554797680053375077
  compound_situation_chosen_route: "우리는 이미 경로를 선택했습니다." # 17607412236781312667
  compound_situation_qnm2_failed: "우리는 그들의 약점을 발견하는 데 실패했습니다." # 6367386550554296228
