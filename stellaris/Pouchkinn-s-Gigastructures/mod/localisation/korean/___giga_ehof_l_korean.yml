  tech_ehof_origin_sensorrange_debug: "zDEBUG - 사용되지 않는 기술" # 18157272791075388475
  tech_ehof_origin_sensorrange_debug_desc: "이 기술의 효과는 숨겨진 수정자에 의해 무효화됩니다. 이것은 정사상 정보가 전혀 없어야 하는 국가와의 조우를 차단하기 위해 존재합니다." # 11763893369182260472
  mod_ehof_origin_sensorrange_debug: "EHOF 불일치 디버그" # 12219223339398230012
