  giga_sr_sentient_metal_desc: "$giga_sr_sentient_metal$은(는) 극도로 진보된 초적응형 나노 물질입니다." # 15687945173234644538
  giga_sr_sentient_metal_discovery: "§H[from.GetName]§!(을)를 탐사하던 중, §H[root.GetName]§!(은)는 §H$giga_sr_sentient_metal$§! 매장지를 발견했습니다.\n\n$giga_sr_sentient_metal_desc$" # 13131466323180214088
  giga_sr_sentient_metal.tooltip: "£giga_sr_sentient_metal£ §H$giga_sr_sentient_metal$§!\n§E$giga_sr_sentient_metal_desc$§!" # 438072114701470526
  ehof_sm_deficit: "$giga_sr_sentient_metal$ 부족" # 14027552914099037386
  job_ehof_cultivator: "경작자" # 16293012514335036087
  job_ehof_cultivator_plural: "$job_ehof_cultivator$" # 1055407730279152808
  job_ehof_cultivator_desc: "재배자들은 지각 있는 금속이 스스로 복제하는 데 필요한 합금 원료와 에너지 투입의 균형을 최적화합니다." # 16502915615266626198
  job_ehof_cultivator_effect_desc: "$job_ehof_cultivator_swap_plural_with_icon$은(는) £alloys£ §Y$alloys$§!와(과) £energy£ §Y$energy$§!(을)를 £giga_sr_sentient_metal£ §Y지성 금속§!(으)로 변환합니다." # 14791216072130862651
  job_ehof_cultivator_swap_plural_with_icon: "[ehof_cultivator.GetIcon] [ehof_cultivator.GetNamePlural]" # 13656089368318945568
