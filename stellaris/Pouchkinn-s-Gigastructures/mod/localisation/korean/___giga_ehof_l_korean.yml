  job_ehof_cultivation_drone: "배양 드론" # 13522345752700369144
  ehof_cultivation_drone_wilderness: "금속공생체" # 15002323575998752868
  job_ehof_cultivation_drone_wilderness: "$ehof_cultivation_drone_wilderness$" # 5117467191946750513
  job_ehof_cultivation_drone_plural: "$job_ehof_cultivation_drone$들" # 13260146454257808017
  ehof_cultivation_drone_wilderness_plural: "$ehof_cultivation_drone_wilderness$" # 1774029043527358081
  job_ehof_cultivation_drone_wilderness_plural: "$ehof_cultivation_drone_wilderness_plural$" # 1638028074413023679
  job_ehof_cultivation_drone_desc: "재배 드론은 지각 있는 금속의 자가 복제에 필요한 합금 원료와 에너지 투입의 균형을 최적화합니다." # 12542842578267603271
  ehof_cultivation_drone_wilderness_desc: "호르몬 에너지 변환기는 지각 있는 금속의 복제 과정을 생태계의 광범위한 성장 체계에 통합할 수 있습니다." # 14875972826682076351
  job_ehof_cultivation_drone_wilderness_desc: "$ehof_cultivation_drone_wilderness_desc$" # 10901485341703853219
  job_ehof_cultivation_drone_effect_desc: "$job_ehof_cultivation_drone_swap_plural_with_icon$은(는) £alloys£ §Y$alloys$§!와(과) £energy£ §Y$energy$§!(을)를 £giga_sr_sentient_metal£ §Y지성 금속§!(으)로 변환합니다." # 1403790686258251896
  job_ehof_cultivation_drone_swap_plural_with_icon: "[ehof_cultivation_drone.GetIcon] [ehof_cultivation_drone.GetNamePlural]" # 6746229412193201882
  mod_job_ehof_cultivation_drone_add: "[ehof_cultivation_drone.GetName] 직업" # 11532617659692967060
