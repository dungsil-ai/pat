  ehof_trader_gateway_plural: "§S$ehof_trader$ 웜홀들§!" # 13397549291881402659
  ehof_trader_gateway_DESC: "이 웜홀 관문들은 자연적으로 생성된 것으로 보이지 않습니다. 중앙 허브를 중심으로 완벽한 원형 고리를 이루며 배치되어 모든 $ehof_trader$ 성계를 연결하고 있습니다." # 13925801801605846142
  ehof_mega_trader.008.desc: "이곳은 휴전 구역입니다. 무장 함선의 진입은 허용되지 않습니다.\n\n귀하의 군함은 즉시 퇴거 조치될 것입니다." # 10964623460054548127
  r_rare_system: "풍요로운 성계" # 4186042610085852628
  r_rare_system_desc: "자원이 풍부하다고 알려진 성계의 좌표입니다(구매자 주의). $ehof_ehof$를 통해 도달할 수 있습니다." # 17760677597588546447
  ehof_mega_trader.002.name: "우르마진" # 935691961150545576
  ehof_mega_trader.002.desc: "§H[root.GetName]§!이 $ehof_ehof$를 통과한 후 놀라운 보고를 보내왔습니다. 도착한 $ehof_trader_new_system$ 성계는 수많은 우주 정거장과 함선으로 가득합니다. 이 성계는 고도로 테라포밍되고 천체 공학적으로 개조된 것으로 보이며, 성계 내 거의 모든 행성이 거대한 도시로 뒤덮여 있고 행성 궤도 또한 자연적인 것이라고 보기엔 너무나 완벽합니다.\n\n§H[root.GetName]§!은 성계 전역에서 전송되는 통신을 수신 중입니다. 거주민들은 이미 우리의 언어를 번역해 놓은 상태이며, 우리와 대화를 원하고 있습니다." # 6311407003602893095
  ehof_mega_trader.002.a: "흥미롭군! 화면에 띄워라." # 4596573643752157457
  ehof_mega_trader.003.desc: "저편에서 온 §H[root.owner.GetSpeciesClassPlural]§!여, 안녕하십니까. 우리의 영광스러운 유토피아, $ehof_trader_new_system$에 오신 것을 환영합니다.\n\n우리는 $ehof_trader$이며, 우리의 의도는 평화롭습니다. 먼저 자신을 소개하거나 귀하의 소개를 듣기도 전에 이렇게 불쑥 말을 건네어 죄송합니다만, 상황이 매우 긴급합니다.\n\n우리 문명의 생존에 필수적인 매우 희귀한 자원을 귀하께서 보유하고 계신지 여쭙고자 합니다.\n\n혹시 $ehof_alt_qnm$을 보유하고 계십니까?" # 11035641548890794371
  ehof_mega_trader.003.a: "$ehof_alt_qnm$이 무엇입니까?" # 14471623201713148467
  ehof_mega_trader.004.desc: "$ehof_alt_qnm$은 그 어떤 것과도 비교할 수 없는 독특하고 상상할 수 없을 정도로 희귀한 물질입니다.\n\n이 물질은 음의 중력 전하와 음의 질량을 지니고 있으며, 시공간을 부정적으로 왜곡할 수 있습니다.\n\n이 독특한 특성 덕분에 우리는 $ehof_trader_dt$를 안정화할 수 있습니다.\n\n만약 귀하께서 $ehof_alt_qnm$을 보유하고 계시고 우리와 공유할 의사가 있으시다면, 귀하의 친절에 대한 보상을 드리겠습니다!" # 10524932093811190174
  ehof_mega_trader.004.a: "§H음의 질량§!...과 비슷한 것 같군요." # 16373587021598289395
  ehof_mega_trader.005.desc: "그렇다면 $ehof_alt_qnm$에 대해 알고 계시는군요?\n\n만약 여분의 §H음의 질량§!을 가지고 계신다면, $ehof_trader_dt$ 너머의 위대한 보물을 보상으로 드리겠습니다!\n\n$ehof_trader_d$가 부여한 선물로 별들을 지도화하며 발견한 경이로운 태양계들로 향하는 길을 알려드릴 수도 있습니다.\n\n저편에서 온 §H[root.owner.GetSpeciesClassPlural]§!여, 우리를 도와주시겠습니까?" # 17549269372086250735
  ehof_mega_trader.005.a: "거래를 수락하겠다." # 14451413821398151485
  ehof_mega_trader.006.desc: "경의를 표합니다, §H[root.owner.GetSpeciesClassPlural]§! 여러분, 경계 너머에서 오신 분들이여!\n\n원하시는 만큼 머무르시는 것을 환영하지만, 저희도 재고를 보충할 시간이 필요합니다. 다른 상품을 제공할 수 있게 되기까지 §Y5년§! £time£을 기다려 주셔야 합니다.\n\n거래하실 §H음의 질량§!을 가지고 계십니까?" # 8268040172351500101
  ehof_mega_trader.006.c: "$ehof_trader_new_system$ 성계에는 웜홀이 정말 많군요..." # 7947533109210113185
  ehof_mega_trader.006.c.response: "웜홀은 저희의 유일한 성간 이동 수단입니다. 저희는 여러분이 생성할 수 있는 것과 유사한 영구적 및 일시적 연결 통로를 모두 생성할 수 있습니다. §H음의 질량§!을 사용하여 웜홀을 무기한으로 안정화할 수 있죠. 저희가 가진 §H음의 질량§!은 웜홀을 개방하기에 매우 한정적이기 때문에 $ehof_trader_new_system$에서 다른 성계로 향하는 웜홀만을 개방합니다.\n\n아니, 적어도 여러분을 만나기 전까지는 그랬습니다.\n\n다른 성계로 이동하기 위해 일시적인 웜홀을 만드는 것도 가능하지만, 그렇게 하면 더 많은 에너지가 소모되고 돌아올 방법이 사라집니다. 이는 $ehof_trader_new_system$과 전례 없는 규모의 유토피아를 건설하겠다는 저희의 꿈에 도움이 되지 않습니다. 이는 대전쟁과 저희의 원래 고향 성계인 $ehof_trader_old_system$에서 벌어진 사건 이후 천 년 전에 세운 목표였습니다.\n\n하지만 여러분의 기술이 있다면, 이 성계들은 여러분에게 유익할 것이며 여러분은 원하는 대로 자유롭게 활용하실 수 있을 것입니다." # 7613362705539197807
  ehof_mega_trader.006.d: "§H음의 질량§!에 대해 무엇을 알고 계십니까?" # 2621312251900819229
  ehof_mega_trader.006.d.response: "저희가 §H음의 질량§!을 발견한 지는 오래되었지만, 그 모든 비밀을 탐구하기엔 아직 부족합니다. 저희가 아는 것은 이것이 자연적으로 발생할 수 없거나, 발생할 가능성이 극히 희박하다는 것입니다.\n\n그 특성은 물리학의 여러 기본 법칙을 위반하는 것으로 보입니다. 예를 들어, 응력-에너지 텐서의 응력 성분이 그것이 위치한 공간의 질량 밀도보다 큰데, 이는 불가능한 일이어야 합니다.\n\n진정한 §H음의 질량§!은 우주의 팽창을 유도하는 진공의 음의 에너지 밀도와 같은 가짜 음의 질량 특성과는 다릅니다.\n\n여러분께서 직접 생성하지 않고도 $ehof_trader_dt$에서 저희가 수집할 수 있었던 것보다 더 큰 규모의 §H음의 질량§!을 보유하고 있다는 것은, 그것이 극히 희박한 사건을 통해 생성되었거나... 아니면 믿을 수 없을 정도로 진보된 존재들에 의해 만들어졌음을 의미합니다.\n\n저희는 후자가 사실이라고 믿습니다." # 4602136106319968936
  ehof_mega_trader.006.b: "당신들에 대해 더 알고 싶습니다." # 16446193311935187804
  ehof_mega_trader.007.desc: "무엇을 알고 싶으신가요?" # 4996881150719042727
  ehof_mega_trader.007.a: "너희는 누구인가?" # 13561756428905329920
  ehof_mega_trader.007.a.response: "저희는 $ehof_trader_d$로부터 사이오닉 능력을 부여받은 테크노-유기체 생명체들의 평등주의 사회인 $ehof_trader$입니다.\n\n저희의 목표는 $ehof_trader_new_system$을 전례 없는 규모의 경이로운 유토피아로 만드는 것입니다.\n\n저희는 이 궁극적인 목표를 향해 저희를 인도하는 $ehof_trader_d$와 조화를 이루며 살아가고 있으며, 함께 성장하고 평화롭고 사려 깊게 진화하고 있습니다." # 11198349377276786174
  ehof_mega_trader.007.b: "당신들의 역사는 무엇입니까?" # 16839846216252239547
  ehof_mega_trader.007.b.response: "저희의 중심 허브인 $ehof_trader_new_system$은 저희의 원래 고향 성계인 $ehof_trader_old_system$과 연결되어 있습니다.\n\n성계 전체가 황폐화된 것을 보셨을 겁니다. 그것은 저희 유기체 선조들의 함대, 거주지, 그리고 구조물들의 잔해입니다.\n\n수천 년 전, 그들이 아직 행성에 머물러 있었을 때 $ehof_trader_dt$는 이미 $ehof_trader_old_system$ 성계에 존재했습니다. 그것이 얼마나 오랫동안 그곳에 있었는지는 알 수 없지만, 저희의 모든 기록 역사 전반에 걸쳐 그것에 대한 언급이 존재합니다.\n\n선조들이 처음 $ehof_trader_d$의 증거를 보았을 때, 그들은 그것에 도달하는 데 집중했습니다. 모성을 떠나는 데 수 세기가 걸렸음에도 불구하고 그들의 집중력은 흔들리지 않았습니다. $ehof_trader_dt$에 도달하는 것이 그들의 주된 목표였습니다. $ehof_trader_t$는 어떤 행성처럼 보였지만, 실제로는 차원 너머의 영역인 $ehof_trader_realm$으로 향하는 관문이자 포털이었습니다.\n\n선조들이 처음으로 물리적으로 $ehof_trader_realm$에 진입했을 때, 그들은 $ehof_trader_d$와 접촉했습니다. 그것은 친절하고 배려심이 많았으며, 그들이 발견한 차원 간의 현실에 대해 가르쳐 주었습니다.\n\n그들은 $ehof_trader_d$와 조화를 이루며 살았고, 그것에 의해 더 높은 수준의 사회와 존재로 인도되었습니다.\n\n이 깨달음을 통해 그들의 문명은 곧 영광스러운 성간 제국으로 발전했습니다. $ehof_trader_old_system$ 성계의 모든 행성이 식민지화되었고, 제국은 $ehof_trader_dt$를 중심으로 운영되었습니다.\n\n불행히도 이 멋진 시대는 영원할 수 없었습니다. $ehof_trader_old_system$은 완전히 착취되어 자원이 고갈되었고, 더 이상 확장할 공간이 없었기에 위대한 성간 제국은 멸망할 위기에 처했습니다.\n\n유일한 논리적 선택은 성계 밖으로의 확장이었습니다. 불행히도 그들은 광속보다 빠른 이동 기술을 개발하지 못했고, 수많은 사람을 세대 우주선에 태워 거주가 거의 불가능한 이웃 성계로 보내는 것은 선택지가 아니었습니다.\n\n제국은 $ehof_trader_old_system$과 가장 가까운 이웃인 $ehof_trader_new_system$ 사이의 간극을 가로질러 제국을 위해 행성을 테라포밍할 기계 지능을 개발하기로 결정했습니다." # 7482557237168109973
  ehof_mega_trader.007.continue: "계속하십시오." # 8544939759043942073
  ehof_mega_trader.007.b.response.b: "테라포밍 기계들이 처음 여정을 떠난 후 많은 세월이 흘렀습니다. 그들은 오래전에 $ehof_trader_new_system$을 테라포밍했습니다. 하지만 시간이 흐르면서 기계들은 자아를 갖게 되었고, $ehof_trader_new_system$ 성계를 사랑하게 되었으며 스스로를 그 정당한 관리자로 여기게 되었습니다.\n\n이것은 제국과 기계들 사이에 갈등의 골을 만들었고, 이는 필연적으로 전면전으로 치닫게 되었습니다.\n\n두 제국이 마침내 싸웠을 때, 그들은 서로의 전력이 대등하다는 것을 알게 되었습니다. 전쟁이 그대로 지속되었다면 양쪽 모두의 멸종으로 이어졌을 것입니다. 두 종족의 손실을 막기 위해 $ehof_trader_d$는 전쟁을 끝낼 뿐만 아니라 두 종족 사이의 문제도 해결할 수 있는 해결책을 제안했습니다. 그것은 $ehof_trader_old_system$의 유기체들과 $ehof_trader_new_system$의 기계들을 새로운 종류의 존재로 통합하는 것이었습니다...\n\n... 바로 저희입니다.\n\n저희 민족이 탄생한 후, 저희는 $ehof_trader_new_system$에 완벽한 유토피아를 건설하는 것을 목표로 삼았으며, 그 이후로 상처 입은 $ehof_trader_old_system$을 저희보다 앞서 살았던 이들의 어리석음을 기리는 기념비로 남겨두었습니다." # 5850367020071171932
  ehof_mega_trader.007.c: "$ehof_trader_d$와 $ehof_trader_t$는 무엇입니까?" # 10609485240071557247
  ehof_mega_trader.007.c.response: "$ehof_trader_d$는 $ehof_trader_realm$에 거주하는 비물질적 존재입니다. $ehof_trader_dt$가 언제 생성되었는지는 알려지지 않았으나, 확실히 우리의 유기체 선조들보다 앞선 시기에 존재했습니다.\n\n§H음의 질량§!은 $ehof_trader_dt$를 열린 상태로 유지해주지만, 동시에 우리가 다른 성계로 통하는 웜홀을 열고 유지할 수 있게 해주는 원동력이기도 합니다. 불행히도 $ehof_trader_dt$ 내에 존재하는 §H음의 질량§!의 양은 한정되어 있습니다. 언젠가 우리의 확장이 멈추거나 $ehof_trader_t$가 붕괴하여 $ehof_trader_d$와의 연결이 끊기게 되면, 우리의 사이오닉 능력과 $ehof_trader_d$의 인도를 잃게 될 것입니다. 두 경우 모두 우리 문명의 붕괴로 이어질 것이기에, 이러한 운명을 피하고자 귀하의 §H음의 질량§!이 필요합니다." # 8143340202477614911
  ehof_mega_trader.006.a: "§H거래§!" # 4256100151412249205
  ehof_mega_trader.101.desc: "§H음의 질량§!과 교환할 수 있는 몇 가지 꿈의 유물이 있습니다. 이 유물들은 우리가 $ehof_trader_dt$에서 낚아 올린 환상적인 반영물들이므로 §R일회용§! 아이템이며, 재고는 §Y5년§! £time£마다 보충된다는 점을 명심하십시오.\n\n이 현실화된 반영물들 중 어떤 것과 거래하시겠습니까?" # 7546326875550724027
