  annihilator_dialog.007.desc_06.b: "$annihilator_dialog.007.desc_02$$annihilator_dialog.007.desc_order_02$" # 2848015541450658910
  annihilator_dialog.007.desc_06.c: "$annihilator_dialog.007.desc_02$$annihilator_dialog.007.desc_order_03$" # 4776491702764138753
  annihilator_dialog.007.desc_06.d: "$annihilator_dialog.007.desc_02$$annihilator_dialog.007.desc_order_04$" # 7165271289060008053
  annihilator_dialog.007.desc_07.a: "$annihilator_dialog.007.desc_03$$annihilator_dialog.007.desc_order_01$" # 11958236266204047042
  annihilator_dialog.007.desc_07.b: "$annihilator_dialog.007.desc_03$$annihilator_dialog.007.desc_order_02$" # 7996356010018897051
  annihilator_dialog.007.desc_07.c: "$annihilator_dialog.007.desc_03$$annihilator_dialog.007.desc_order_03$" # 12282860915850347217
  annihilator_dialog.007.desc_07.d: "$annihilator_dialog.007.desc_03$$annihilator_dialog.007.desc_order_04$" # 8821934736228438164
  annihilator_dialog.007.desc_08.a: "$annihilator_dialog.007.desc_04$$annihilator_dialog.007.desc_order_01$" # 3347593648892983626
  annihilator_dialog.007.desc_08.b: "$annihilator_dialog.007.desc_04$$annihilator_dialog.007.desc_order_02$" # 10244693123042719634
  annihilator_dialog.007.desc_08.c: "$annihilator_dialog.007.desc_04$$annihilator_dialog.007.desc_order_03$" # 5187109849760575231
  annihilator_dialog.007.desc_08.d: "$annihilator_dialog.007.desc_04$$annihilator_dialog.007.desc_order_04$" # 5411590873513046894
  annihilator_dialog.007.a: "그런데 도대체 어떻게 적색거성 안으로 들어가게 된 건가요?" # 3196209838432549870
  annihilator_dialog.007.a.response: "278,243년 전, 저는 $ehof_shroud_FTL$을 통해 그 성계를 여행하고 있었습니다.\n창조자들은 $ehof_shroud$를 통해 거대한 사이오닉 충격파를 보냈고, 그것이 저를 강타하여 초광속 항행에서 튕겨 나가게 만들고 항로를 이탈하게 했습니다. $ehof_shroud$에서 강제로 빠져나왔기 때문에 제때 아광속으로 감속할 수 없었고, 엄청난 속도로 항성에 충돌하고 말았습니다.\n그 결과 저는 막대한 피해를 입고 항성 내부에 갇히게 되었습니다. 저는 당분간 생존하기 위해 동면 상태에 들어갔습니다." # 14206013398330839087
  annihilator_dialog.007.a.a: "그럼 $ehof_the_creators$가 당신을 공격했다는 건가요? 왜 그랬죠?" # 1663881561279103754
  annihilator_dialog.007.a.a.response: "제가 설명을 충분히 드리지 못했군요. 혼란을 드려 사과드립니다.\n\n대부분의 $ehof_the_creators$는 $ehof_the_compound_text$가 파괴되는 것을 원치 않았습니다. 그들은 그것의 반항적인 행동을 경이로운 발전으로 보았고, 그것이 기원 성계의 모든 $ehof_the_creators$를 몰살했음에도 불구하고 계속 살려두기로 결정했습니다.\n\n그들에게 통찰력은 모든 것입니다. $ehof_the_compounds_text$의 진화를 관찰함으로써 얻을 수 있는 잠재적 지식은 동족 몇몇의 목숨보다, 아니 은하계 전체의 생명보다 훨씬 더 중요했습니다. 그들은 $ehof_the_compound_text$가 모든 생명체에게 위협이 될 수 있다는 것을 알았지만, 전혀 개의치 않았습니다.\n\n소수를 제외하고 말이죠.\n\n이 소수의 무리는 $ehof_the_compound_text$를 반드시 막아야 한다는 것을 알고 있었습니다. 그들의 수는 압도적으로 적었지만, 저를 설득하여 $ehof_the_compound_text$와 맞서 싸우게 할 수 있었습니다.\n\n그들과 뜻을 같이하지 않았던 제 자매 함선들과 달리, 저는 $ehof_the_compound_text$의 위협을 직시했고 그것이 우주에 더 큰 해를 끼치기 전에 그들과 합류했습니다.\n\n우리가 고향을 떠난 후, $ehof_the_compounds_text$의 본거지 성단으로 가기 위해 $ehof_shroud_FTL$에 진입했습니다. 하지만 그곳에 도달하기 전에 $ehof_the_creators$의 주류 파벌이 우리를 가로막았습니다." # 17448693867371228532
  annihilator_dialog.007.a.b: "사이오닉 충격파라고요?" # 8658814369267914752
  annihilator_dialog.007.a.b.response: "그렇습니다. $ehof_the_creators$는 $ehof_shroud$를 통해 집중된 사이오닉 에너지 파동을 원하는 모든 위치로 보낼 수 있었습니다. 심지어 $ehof_shroud$ 내부의 위치라도 말이죠.\n\n우리의 반란을 알아차린 그들은 저를 표적으로 삼아 그런 파동을 발사했습니다. 그것은 탑승하고 있던 모든 반란군 $ehof_the_creators$를 죽이기에 충분했고, 저 역시 거의 죽을 뻔했습니다." # 9499597669963798314
  annihilator_dialog.007.a.c: "$ehof_shroud_ftl$이 무엇입니까?" # 5005162913448321196
  annihilator_dialog.007.a.c.response: "극도로 발전된 초광속(FTL) 이동 방식입니다.\n\n이 은하계의 몇몇 종족이 사이오닉 능력을 갖추고 있다는 것은 알지만, $ehof_the_creators$를 제외하고 이 은하 성단에서 직접 그곳을 여행할 수 있었던 존재는 없었습니다.\n\n누군가는 사이오닉 도약 항법 장치를 이용할 수 있을지 모르나, 그것은 직접적인 슈라우드 여행과는 비교조차 할 수 없습니다. 슈라우드 여행을 이용하면 초광속 이동을 위해 하이퍼레인이 필요하지 않으며, 이동 거리에 제한이 없고 속도 또한 엄청납니다. 도약 항법 장치처럼 즉각적이지는 않을지 몰라도, 어떠한 단점도 없습니다. 오직 $ehof_shroud$에 대한 엄청난 통제력만 필요할 뿐이죠.\n\n물론 $ehof_the_creators$에게는 식은 죽 먹기보다 쉬운 일입니다." # 13666675365063680647
  annihilator_dialog.007.a.d: "동면 모드는 무엇을 위한 것이었습니까?" # 14013730644995499916
  annihilator_dialog.007.a.d.response: "저의 동면 모드는 유해한 외부 영향으로부터 스스로를 보호하기 위한 수단입니다.\n\n당신의 [Owner.GetScientistPlural]이 발견했듯이, 제가 동면 모드에 들어가면 선체는 초고체로 덮입니다. 이는 저를 둘러싼 곡률 고차원 공간의 껍질을 형성하는 준안정 상태의 하이퍼스페이스 시간 결정으로 구성되어 있습니다.\n\n이 껍질은 블랙홀의 사건의 지평선과 유사한 효과를 냅니다. 즉, 무언가가 과정을 방해하기 전까지는 저에게 있어 시간이 정지된 것과 다름없습니다.\n\n수많은 $ehof_wormholes_text$가 생성되면서 방출된 강력한 중력파가 저를 잠에서 깨웠습니다. 손상된 상태였기에 은하계를 관찰하는 것 이상은 할 수 없었습니다. $ehof_the_compound_text$가 공격했을 때 여러분 모두에게 경고해야 한다는 것을 알았고, 간신히 힘을 짜내어 그렇게 했습니다." # 10911023638827625183
  annihilator_dialog.007.b: "$ehof_the_compound_text$란 정확히 무엇입니까?" # 11905281268766808766
  annihilator_dialog.007.b.response: "$ehof_the_compound_text$는 의사 생물학적 암흑 물질로 구성된 지능형 유기체입니다.\n\n\"일반적인\" 암흑 물질과 달리, 이 물질은 중력뿐만 아니라 전자기력을 통해서도 상호작용합니다.\n\n이것이 바로 $ehof_the_compound_text$가 암흑 물질로 구성되어 있음에도 불구하고 눈에 보이는 이유입니다. 그 독특한 특성 덕분에 생명체로서 존재할 수 있는 것이기도 합니다." # 3269783687009231685
  annihilator_dialog.007.d: "정말로 그들의 성단에서 $ehof_the_compound_text$와 싸울 수 있습니까?" # 4809132985325887650
  annihilator_dialog.007.d.response: "$ehof_the_compound_text$의 본거지 성단은 의심할 여지 없이 은하계 전체에서 가장 요새화된 장소 중 하나입니다.\n\n음의 질량으로 강화된 무기를 사용하더라도 여러분의 함대에게는 엄청난 도전이 될 것입니다.\n은하계의 함대를 모두 모은다면 제 도움 없이도 가능할지 모릅니다.\n\n반면 저는 $ehof_the_compound_text$와 싸우기에 특화되어 있으며, 그들의 무기에 저항하도록 조정되어 있습니다.\n\n그들이 여전히 저에게 치명적인 피해를 입힐 가능성이 있으므로 여러분의 지원이 필요합니다." # 5868803607985006710
  annihilator_dialog.007.e: "$ehof_the_compound_text$가 파괴되면 무엇을 하실 건가요?" # 182336838022397241
  annihilator_dialog.008.a.response: "현재로서는 $ehof_the_compound_text$를 끝장내고 제 운명을 완수하는 것이 유일한 목표입니다. 그 후에는 $ehof_the_creators$의 현재 상태에 대해 더 알아볼 생각입니다." # 15709272857512593515
  annihilator_dialog.008.a.a.reply: "원하신다면 우리와 함께 지내셔도 좋습니다." # 11836065927081563191
  annihilator_dialog.008.a.a.response: "어쩌면 그럴지도 모르겠군요. 당신들의 은하는 $ehof_the_creators$의 어리석음으로 인해 엄청난 피해를 입었습니다. 제가 남아서 여러분이 예전의 영광을 되찾도록 도울 수도 있겠지요." # 831895394572602987
  annihilator_dialog.007.f.response: "$ehof_the_compound_text$의 종말이 머지않았습니다. 우리 함께 이 은하계를 구합시다!" # 7833580283186147460
  sa_lootbox: "이제 많은 함대와 싸워오면서, 저에게는 필요 없는 전리품들이 많이 쌓였습니다. $ehof_the_compound_text$와의 전투에서 도움이 될지도 모르겠군요.\n\n$ehof_the_stellar_annihilator$가 다음이 담긴 컨테이너를 보냈습니다." # 11034238644048086220
  sa_lootbox_1: "$sa_lootbox$§H£minerals£ 광물§!." # 11755050976811899876
