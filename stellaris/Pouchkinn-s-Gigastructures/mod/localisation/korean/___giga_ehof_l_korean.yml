  ehof_ai_energy_30_month: "EHOF 시작 비용" # 7555781999679344804
  ehof_ai_energy_25_month: "EHOF 시작 비용" # 7555781999679344804
  ehof_ai_darkmatter_1_month: "EHOF 시작 비용" # 7555781999679344804
  ehof_ai_alloys_10_month: "EHOF 탐사 비용" # 4952541147705394470
  ehof_ai_minerals_10_month: "EHOF 확장 비용" # 3741857654501673014
  ehof_ai_influence_1_month: "EHOF 정착 비용" # 14512435340685605252
  tech_qnm_utilities: "음질량 강화" # 16331461144032559127
  tech_qnm_utilities_desc: "$ehof_the_compound_text$는 은하계의 모든 생명체, 그리고 어쩌면 그 너머까지 위협하는 존재입니다. 우리의 실험 결과, 음질량만이 그들에게 피해를 줄 수 있는 유일한 물질임이 밝혀졌습니다. 이 단서를 바탕으로 우리는 마침내 반격을 가할 수 있도록 음질량을 활용한 에너지 무기를 개발하기 시작했습니다." # 7549104233630235746
  tech_qnm_thrusters: "음질량 추진기" # 5094177754200883362
  tech_qnm_thrusters_desc: "음질량에 대한 연구를 통해 우리 제국 내에서 그 활용 범위를 넓힐 수 있게 되었습니다. 이 물질의 이질적인 특성은 이론적으로 초공간 도약 항법을 사용하지 않는 FTL 여행을 가능하게 하지만, 우리 함선 구조의 평범한 특성상 단순히 매우 빠른 속도를 내는 추진기에 만족해야 합니다." # 16596883432153954429
  TECH_UNLOCK_QNM_THRUSTER_TITLE: "§H부품 잠금 해제:§! $tech_qnm_thrusters$" # 2700932153463127023
  TECH_UNLOCK_QNM_THRUSTER_2_DESC: "§H$tech_qnm_thrusters$§!\n은하계 역사상 가장 빠른 추진기!" # 13051450429549101948
  tech_qnm_sensors: "음질량 센서" # 12392920494686420580
  tech_qnm_sensors_desc: "음질량은 훨씬 더 정밀한 신호 필터를 생성하여 기존 센서를 보강할 수 있게 해주며, 그 결과 스캔 해상도와 함대 탐지 능력이 향상됩니다." # 2504075616566022903
  TECH_UNLOCK_QNM_SENSOR_TITLE: "§H부품 잠금 해제:§! $tech_qnm_sensors$" # 12789919942336917464
  TECH_UNLOCK_QNM_SENSOR_DESC: "§H$tech_qnm_sensors$§!\n$tech_qnm_sensors_desc$" # 728522671193967662
  tech_qnm_shields: "음질량 보호막" # 6246054308319762599
  tech_qnm_shields_desc: "음질량 보호막은 충돌 지점에서 에너지를 단순히 분산시키는 대신, 자신을 타격하는 물질과 에너지를 능동적으로 밀어냅니다." # 2667805383832558487
  tech_qnm_reactors: "음질량 반응로" # 9350651870558055257
  tech_qnm_reactors_desc: "음질량 반응로는 이 물질과 \"일반\" 에너지의 편극된 흐름을 활용하여 거의 완벽한 쌍소멸을 달성하고, 그에 상응하는 막대한 전력을 생산합니다." # 13009538567621533618
  TECH_UNLOCK_QNM_REACTORS_TITLE: "§H부품 잠금 해제:§! $tech_qnm_reactors$" # 1105491894124136464
  TECH_UNLOCK_QNM_REACTORS_DESC: "§H$tech_qnm_reactors$§!\n$tech_qnm_reactors_desc$" # 8178018119265229568
  tech_qnm_jumpdrive: "음질량 도약 항법 장치 강화" # 16885861479244732000
  tech_qnm_jumpdrive_desc: "도약 항법 장치는 그 자체로도 믿을 수 없는 발명품이지만, 음질량의 독특한 특성을 결합하여 더욱 발전시킬 수 있었습니다! 도약 순간에 함선에 이 물질을 주입함으로써 함선의 질량을 대폭 줄일 수 있고, 결과적으로 공간을 가로질러 이동하는 데 필요한 에너지양을 감소시킬 수 있습니다. 이를 통해 동일한 기본 도약 항법 장치 설계로 더 먼 거리를 더 자주 이동할 수 있게 되었습니다." # 6124626901287936891
  TECH_UNLOCK_QNM_E_JUMP_DRIVE_TITLE: "§H부품 잠금 해제:§! $tech_qnm_jumpdrive$" # 3649647717310839274
  TECH_UNLOCK_QNM_E_JUMP_DRIVE_TITLE_DESC: "§H$tech_qnm_jumpdrive$§!\n$tech_qnm_jumpdrive_desc$" # 1417084731605853784
  tech_sm_armor: "지성 금속 장갑" # 6314050253277895891
  tech_sm_armor_desc: "지각이 있는 금속은 손상 시 재구성 및 복제되며, 환경적 요인에 역동적으로 적응합니다. 이는 장갑을 위한 완벽한 물질입니다." # 11147885599834737406
  tech_sm_auto_repair: "지각 금속 선체 재생" # 5597379759129276362
  tech_sm_auto_repair_desc: "지각 금속의 흔적과 물질 저장소가 포함된 재료로 함선 선체를 건조함으로써, 우리 함선은 극도의 효율로 스스로 수리할 수 있습니다." # 7125706210144190872
  tech_sm_computers: "지각 금속 지능" # 3790456741990652866
  tech_sm_computers_desc: "지각 금속 군집 지능의 역량은 엄청나며, 우리가 가진 가장 강력한 정보 처리 네트워크를 훨씬 능가합니다. 이를 우리 함선과 구조물의 시스템에 직접 연결함으로써, 이전의 어떤 함선 컴퓨터도 구현하지 못한 방식으로 함선과 정거장을 제어할 상위 명령을 실행할 수 있습니다." # 10666103523342483457
  TECH_UNLOCK_SM_COMPUTERS_TITLE: "§H부품 잠금 해제:§! $tech_sm_computers$" # 3759147289735240450
  TECH_UNLOCK_SM_COMPUTERS_DESC: "§H$tech_sm_computers$§!\n$tech_sm_computers_desc$" # 18275889974270090855
  tech_sm_flak_batteries: "지각 금속 대공포" # 14064268143270259759
  tech_sm_flak_batteries_desc: "$tech_sm_flak_batteries$는 물질의 로컬 네트워크 지능을 활용하여 이전보다 훨씬 정밀하고 정확하게 들어오는 발사체를 조준합니다." # 9289573247714518777
  tech_sm_autocannons: "지각 금속 리퍼" # 14120345306890423627
  tech_sm_autocannons_desc: "$tech_sm_autocannons$는 수많은 작은 지각 금속 스파이크를 발사합니다. 각각의 스파이크는 접촉하는 모든 형태의 물질을 동화하도록 프로그래밍되어 있으며, 이후 구체로 응축되어 접촉 지점에서 분리됩니다." # 4548883528215019095
  tech_sm_mass_drivers: "지각 금속 레일건" # 18299618960507153943
  tech_sm_mass_drivers_desc: "$tech_sm_mass_drivers$는 접촉하는 모든 형태의 물질을 흡수하도록 프로그래밍된 작은 지각 금속 스파이크를 결합한 뒤 발사합니다. 발사체가 특정 임계치의 물질을 흡수하면 구체로 응축되어 분리됩니다." # 11541811748208665748
  tech_sm_kinetic_artillery: "지각 금속 포병" # 5260822783396922936
  tech_sm_kinetic_artillery_desc: "$tech_sm_kinetic_artillery$는 접촉하는 모든 형태의 물질을 흡수하도록 프로그래밍된 거대한 $giga_sr_sentient_metal$ 스파이크를 결합한 뒤 발사합니다. 전투기와 소형 함선은 즉시 동화되며, 대형 함선은 지각 금속이 선체를 뜯어내면서 막대한 피해를 입습니다." # 10351611228590450625
  tech_sm_mass_accelerator: "지각 금속 흡수기" # 5313058112388826674
  tech_sm_mass_accelerator_desc: "$giga_sr_sentient_metal$ 흡수기는 거대한 $giga_sr_sentient_metal$ 스파이크를 발사하며, 종종 단 한 발로 소형 함선을 완전히 동화할 만큼 큽니다." # 17317547630618799036
  tech_sm_titanic: "지각 금속 포식자" # 8030598526653422111
  tech_sm_titanic_desc: "$tech_sm_titanic$은 지각 금속을 직접 사용하여 목표물에 피해를 주지 않습니다. 대신, 이 물질이 $ehof_the_sphere_named$ 및 $ehof_ep$와 맺고 있는 연결을 이용하여 $ehof_the_sphere_named$가 에너지 전송 $ehof_wormhole_text$을 열도록 합니다. 그리고 그 결과로 발생하는 거대한 에너지 분출을 적 함선으로 향하게 합니다." # 5315134583590619984
  tech_qnm_pd_tracking: "음질량 점 방어" # 4928005270639365679
  tech_qnm_pd_tracking_desc: "$tech_qnm_pd_tracking$은 다가오는 발사체를 향해 팽창하는 음질량 파동을 발사하여 궤도를 이탈시킵니다." # 4481122049437697024
  tech_qnm_lasers: "음질량 레이저" # 17672695629948190951
  tech_qnm_lasers_desc: "$tech_qnm_lasers$는 집중된 음질량 도관을 사용하여 중입자나 그 외 형태의 모든 물질을 결합 해제합니다." # 11947296331081705426
  tech_qnm_plasma: "음질량 유사 플라즈마 발사기" # 8237420278767035587
  tech_qnm_plasma_desc: "$tech_qnm_plasma$는 충돌하는 모든 형태의 물질을 폭발적으로 붕괴시키는 응집된 음질량 구체를 발사합니다." # 17533827554673439114
  tech_qnm_disruptors: "음질량 디스럽터" # 13347119013099898789
  tech_qnm_disruptors_desc: "$tech_qnm_disruptors$는 엄청나게 파괴적인 음질량 파동을 발사하여 넓은 범위의 물질을 결합 해제합니다. 안타깝게도 이 파동은 짧은 거리에서 소산됩니다." # 1844279779911089704
  tech_qnm_energy_torpedoes: "음질량 어뢰" # 13467259645817773471
  tech_qnm_energy_torpedoes_desc: "$tech_qnm_energy_torpedoes$는 음질량의 척력을 사용하여 압축된 중성자 탄두의 파괴력을 증폭합니다." # 9590907909148671414
  tech_qnm_energy_lance: "음질량 랜스" # 13621283908123930590
  tech_qnm_energy_lance_desc: "$tech_qnm_energy_lance$는 연속적인 음질량 광선을 발사하여 아원자(또는 그에 상응하는) 수준에서 가장 강력하게 보강된 물질 방어 체계조차 찢어발깁니다." # 3412353419014794510
  tech_qnm_arc_emitter: "음의 질량 방출기" # 15378507253784943126
  tech_qnm_arc_emitter_desc: "무작위로 편극되고 회전하는 음질량 광선을 산탄 형태로 발사하며, 전용 방어 장치는 그저 추가적인 선체일 뿐입니다." # 10409434705348346375
  tech_qnm_titanic: "음질량 빔" # 14913672624627434546
