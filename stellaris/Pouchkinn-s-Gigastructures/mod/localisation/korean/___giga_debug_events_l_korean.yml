  giga_log.500.title: "선택적 데이터 기록" # 5946171530843741738
  giga_log.500.desc: "Gigastructural Engineering & More를 플레이해주셔서 감사합니다!\n\n과거에 저희는 사용자 피드백을 바탕으로 변경 사항을 적용해 왔습니다. 모드를 최상의 상태로 개발하기 위해 노력하는 과정에서, 플레이어로부터 데이터를 수집하는 것이 균형 조정 결정에 매우 귀중한 자료가 될 것이라고 판단했습니다.\n\n원하신다면 Gigastructures와 함께 플레이하는 동안 은하계의 상태를 추적하는 기록 기능을 활성화하여 저희를 도울 수 있습니다. 세션이 끝난 후 game.log 파일과 모드 목록을 <SOMEWHERE> 링크에 있는 설문조사에 업로드하실 수 있습니다. 기록 기능으로 인해 매년 초에 약간의 지연이 발생할 수 있습니다. 불편을 드려 죄송합니다.\n\n§H주의§!: 로그 파일의 작동 방식상, Stellaris를 실행할 때마다 로그 파일이 초기화됩니다. 이전 세션의 로그 파일을 보내거나 확인할 수 없습니다.\n\n§LGigastructures를 포함한 모든 Stellaris 모드는 귀하의 데이터를 저장하거나 원격 측정 데이터를 어디론가 전송할 기능이 없습니다. Gigastructure 또는 개발팀 구성원에게 전송되는 유일한 데이터는 귀하가 자발적으로 제공하는 데이터뿐입니다. Stellaris 로그 파일에는 귀하가 자발적으로 입력하지 않는 한 식별 가능한 데이터가 포함되어 있지 않습니다.§!" # 9023069639389972620
  giga_log.500.a: "네, 기록 기능을 활성화하겠습니다." # 398520383052062731
  giga_log.500.b: "아니요, 기록 기능을 활성화하고 싶지 않습니다." # 9163125931355397926
