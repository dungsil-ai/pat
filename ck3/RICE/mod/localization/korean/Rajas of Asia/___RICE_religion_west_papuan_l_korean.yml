  biak_pagan_desc: "오래전, 구원자 마나르마케리와 동정녀 탄생으로 태어난 평화의 왕자이자 그의 아들 코노르 마나르뷰가 비아크 민족의 섬을 떠나며, 재앙을 피하기 위해 백성들이 따라야 할 신성한 율법을 남겼습니다. 그들은 세대가 지난 후 그가 돌아와 파푸아에 끝없는 기쁨과 번영, 평화의 시대인 코레리를 열어줄 것을 기다립니다. 이 신앙의 신도들은 또한 #italic 워#! 의식을 통해 먼 땅으로의 야심 찬 항해와 같은 노력에 도움을 주고 명성과 영광, 부를 가져다주는 조상 영혼인 #italic 코르와르#!의 힘을 믿습니다." # 941378183345355969
