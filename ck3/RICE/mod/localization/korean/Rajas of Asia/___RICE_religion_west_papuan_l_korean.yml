  fakfak_pagan_desc: "오래전, 우리는 #italic 마투투#!라 불리는 강력한 변신 정령들과 계약을 맺었다. 그들은 인간과 도마뱀의 형상을 반씩 지닌 우리의 조상이다. 우리가 물고기와 같은 제물을 바치면, 그들은 우리에게 언제나 풍요를 보장할 것이다. 이 마투투들 중 가장 강력한 존재는 물고기의 왕으로 알려져 있다." # 9063311595938388214
