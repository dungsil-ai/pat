  abui_pagan_desc: "수많은 신과 조상신은 주로 라몰링과 라하탈라라는 두 주신을 섬긴다. 만물의 창조주이자 신들의 위계 서열 정점에 있는 라몰링은 종종 동물이나 인간의 형상을 빌려 물질세계와 소통하지만, 때로는 장난꾸러기 같은 행동을 보이기도 한다. 비교적 최근에 등장한 신 라하탈라는 하늘에 거주하며 좀처럼 물리적인 형상을 취하지 않는다. 대신 사람의 몸에 빙의하여 그들과 소통한다." # 4171853739072795374
