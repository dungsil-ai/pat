  tehit_pagan_desc: "우온은 자비로운 비밀 결사의 이름이자 그들이 인류에게 가져다주는 유익한 지식을 뜻한다. 우온은 의식 물품을 교환하고 세계의 기원, 하늘의 존재들과 소통하는 법, 그리고 우온의 사악한 대척점인 라이트와 맞서 싸우는 방법을 전수하는 엄선된 남성 집단으로 구성된다. 우온의 지식과 달리 라이트의 지식은 사악한데, 이는 인신공양과 살생을 요구하며 흔히 무지한 여성들에 의해 행해지기 때문이다. 라이트에게 오염되지 않도록 무슨 수를 써서라도 피해야 한다." # 2724790931058849460
