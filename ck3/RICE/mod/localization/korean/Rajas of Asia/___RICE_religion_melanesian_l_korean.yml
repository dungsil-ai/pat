  vanuatu_pagan_desc: "많은 오세아니아 사회와 마찬가지로, 바누아투의 토착민들은 타부(신성한 법과 금기)를 준수하며 마나(우주에 스며든 초자연적인 생명력)를 믿습니다. 이들의 신앙 중심에는 #italic 타마테#!라고 알려진 조상 숭배가 있습니다." # 6965134076000432418
