  manus_pagan_desc: "마누스의 토착민들 사이에서 종교적 숭배는 죽은 부계 조상, 특히 #italic 모엔 팔리트#! 혹은 “유령 경”이라 불리는 아버지에 대한 숭배를 중심으로 이루어집니다. 조언과 행운을 구하고 해악과 질병으로부터 보호받기 위해 아버지(혹은 선조)의 두개골을 집안의 안전한 장소에 보관합니다." # 4853399156689383899
