  tolai_pagan_desc: "덕덕 비밀 결사는 영적인 춤을 추며 #italic 덕덕#!이라 불리는 남성 영혼과 #italic 투부안#!이라 불리는 여성 영혼의 의상과 가면을 착용하여 정의를 집행하고 공동체를 관리합니다. 이들의 삶의 목표는 (조개 화폐 등을 통해) 최대한 많은 부를 축적하는 것입니다. 죽을 때 많은 재산을 베풀 수 있는 자는 사후에 안식을 얻지만, 상속인에게 물려줄 것이 없는 자는 영원히 비참하게 떠도는 운명에 처하게 됩니다." # 2079147333515178520
