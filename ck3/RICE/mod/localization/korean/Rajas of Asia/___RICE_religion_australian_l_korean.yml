  tiwi_pagan_desc: "꿈의 시대, 혹은 팔라네리 동안, 세상과 그 안의 모든 식물, 동물, 그리고 사람들은 원래 늙고 눈먼 여인이었던 조상 무둥칼라에 의해 창조되었습니다. 비록 사람들은 본래 불멸의 존재였으나, 무둥칼라의 푸루카팔리의 아들 자파라가 죽은 후, 그는 죽음이 온 세상에 찾아오리라 선포하였습니다." # 820467401380132135
