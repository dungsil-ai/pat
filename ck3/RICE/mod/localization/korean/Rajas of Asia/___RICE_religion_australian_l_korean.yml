  yolngu_pagan_desc: "드림타임, 즉 왕가르에서 금성, 혹은 바눔비르는 최초의 인간인 장가울 자매를 욜응족의 조상 대대로 내려오는 땅으로 인도했습니다. 그 후 바눔비르는 날아가며 다른 동물, 식물, 지형의 이름을 부르고 창조하는 노래의 길(songline)을 불렀습니다. 그녀의 노래의 길은 신성한 법의 기초를 형성하기도 합니다." # 5173873690349000214
