  bininj_pagan_desc: "모든 존재의 첫 어머니인 인가르나에게서 태어난 무지개 뱀 응알요드는 바다에서 올라와 인간을 창조하고, 갈증을 해소할 물웅덩이와 스스로를 보호할 무기, 그리고 숭배할 성지를 비롯한 여러 것들을 만들었습니다. 응알요드는 자비로워 적절한 의식을 치르는 이들에게 생명을 주는 단비를 내리기도 하지만, 신성한 법을 어기는 자들을 집어삼키는 가혹하고 분노에 찬 존재가 되기도 합니다." # 800542637250730029
