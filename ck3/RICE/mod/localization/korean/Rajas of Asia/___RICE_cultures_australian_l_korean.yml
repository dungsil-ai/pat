  innovation_RICE_songlines: "송라인" # 11823870874233626324
  innovation_RICE_songlines_desc: "송라인은 노래 주기, 이야기, 춤, 예술, 종교 의식을 통해 표현되며, 호주 원주민의 전통 지식에서 필수적인 부분으로 유용한 정보가 담긴 구전 백과사전과 같은 기능을 합니다. 송라인은 종종 조상적 존재가 땅, 동물, 식물, 인간을 창조하며 이동한 여정을 추적하며, 송라인의 서로 다른 부분은 다른 언어로 되어 있어 서로 다른 집단을 연결하기도 합니다." # 8091106932755761389
  innovation_RICE_fire_stick_farming: "파이어 스틱 파밍" # 14594542388237561099
  innovation_RICE_fire_stick_farming_desc: "불을 단순히 파괴적인 힘으로만 생각하는 것은 한계가 있습니다. 호주 원주민은 신중하게 통제된 불을 영리하게 사용하여 사냥을 촉진하고, 위험을 줄이며, 지역 생태계의 식물과 동물 구성을 변화시킬 수도 있습니다." # 13308368828018944095
