  culture_parameter_rice_better_meeting_houses: "#V $RICE_oceania_meeting_houses_decision_palauan$#!을 위한 [decision|E]는 추가 [gold_i|E] [gold|E]를 지불할 필요 없이 더 나은 결과를 제공하며, 대신 남성 또는 여성 [Glossary( '랭크 클럽', 'CHELDEBECHEL_GLOSS' )]을 지원하기 위한 다양한 선택지를 제공합니다" # 5908740726553189308
  culture_parameter_unlock_rice_biak_mechanics: "#V 비아크 모험가 접촉#! [decision|E]은(는) 더 나은 보너스를 제공하며 어디서나 수행할 수 있습니다" # 12708843656707677391
