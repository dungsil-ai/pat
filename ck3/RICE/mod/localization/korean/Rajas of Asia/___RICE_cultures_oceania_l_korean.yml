  innovation_RICE_sasi: "사시" # 10136745899258921808
  innovation_RICE_sasi_desc: "사시 의식은 특정 지역이나 자원 유형을 일정 기간 동안 폐쇄하여 과도한 착취로부터 보호하고 환경을 보존하기 위해 사용됩니다." # 6234593500375287766
  innovation_RICE_pacific_navigation: "태평양 항해" # 5401397602574345967
  innovation_RICE_pacific_navigation_desc: "태평양에서의 장거리 항해는 어렵지만 불가능하지는 않습니다. 거대한 바다를 항해하려면 용기, 의지력, 운뿐만 아니라 별, 해수면의 팽창, 바람과 날씨 패턴에 대한 방대한 지식, 그리고 새나 물고기 같은 동물에 대한 관찰이 필요합니다." # 8693631892274274532
  innovation_RICE_sweet_potato_cultivation: "고구마 재배" # 4093472137080801166
  innovation_RICE_sweet_potato_cultivation_desc: "이 전분이 많은 달콤한 뿌리채소는 좋은 영양 공급원이자 효율적인 주식 작물로, 남아메리카와 오세아니아 전역에 퍼져 있습니다." # 12237096242638103905
