  oceania.0045.t: "사시 개회" # 17980274443626342152
  oceania.0045.desc: "얼마 전, 지역 지도자들의 지도하에 [sasi_open_county.GetNameNoTier]에서 수생 [Glossary( 'sasi', 'SASI_GLOSS' )]가 시행되었습니다. 사람들은 #italic 사시#!의 영향을 받는 수생 자원을 착취하는 것이 금지되었습니다. 오늘까지 말이죠.\n\n오늘, #italic 사시#!의 개회를 알리는 의식이 거행되었습니다. 그동안 손대지 않고 남겨두었던 자원들은 그사이 크게 번성했습니다." # 9247214757921018401
  oceania.0045.a: "인내심이 모두에게 큰 번영을 가져다주었습니다!" # 4821100319813540762
  oceania.0046.t: "xxxxx" # 1951045980481827005
  oceania.0046.desc: "xxxxx" # 1951045980481827005
  oceania.0046.a: "xxxxx" # 1951045980481827005
  oceania.0047.t: "$oceania.0045.t$" # 10504598906174801743
  oceania.0047.desc: "얼마 전, 지역 지도자들의 지침에 따라 [sasi_open_county.GetNameNoTier]에 [Glossary( 'sasi', 'SASI_GLOSS' )]가 시행되었습니다. 사람들은 #italic sasi#!의 영향을 받는 토지 자원을 이용하는 것이 금지되었으나, 이제 그 제한이 풀렸습니다.\n\n오늘 #italic sasi#!의 해제를 알리는 의식이 거행되었습니다. 그동안 손대지 않고 남겨두었던 자원들이 그사이 크게 번성하였습니다." # 15090394204329655461
