  RICE_oceania_ties_with_biak_warriors: "비아크 전사들과의 유대" # 7211233684207499017
  RICE_oceania_ties_with_biak_warriors_desc: "이 인물은 파푸아 북서부 군도 출신인 비아크 부족, 특히 날렵한 [Glossary( 'wairon', 'WAIRON_GLOSS' )] 배를 타고 나가 적들을 공포에 떨게 하는 부족 전사들과 관계를 맺었습니다." # 8688433537290046002
  RICE_oceania_ties_with_biak_traders: "비아크 상인들과의 유대" # 14212992690140537430
  RICE_oceania_ties_with_biak_traders_desc: "이 인물은 파푸아 북서부 군도 출신인 비아크 부족, 특히 거대한 [Glossary( 'waimansusu', 'WAIMANSUSU_GLOSS' )] 배를 타고 나가 무역과 외교에 종사하는 부족 상인들과 관계를 맺었습니다." # 2703900217364682448
  RICE_oceania_settled_biak_warriors: "정착한 비아크 전사들" # 1370235493658552193
  RICE_oceania_settled_biak_warriors_desc: "이 지역은 파푸아 북서부 군도에서 온 비아크인들의 거주지입니다. 이 공동체는 날렵한 [Glossary( 'wairon', 'WAIRON_GLOSS' )] 배를 타고 나가 적들을 공포에 떨게 하는 무시무시한 전사들이 주도하고 있습니다." # 13753688614224063598
  RICE_oceania_settled_biak_traders: "정착한 비아크 상인들" # 16068493013973937995
  RICE_oceania_settled_biak_traders_desc: "이 지역은 파푸아 북서부 군도에서 온 비아크인들의 거주지입니다. 이 공동체는 거대한 [Glossary( 'waimansusu', 'WAIMANSUSU_GLOSS' )] 배를 타고 나가 무역과 외교에 종사하는 용감한 상인들이 주도하고 있습니다." # 10288567661048786455
  RICE_oceania_biak_piracy_modifier: "비아크 해적질" # 14756704604795836976
  RICE_oceania_biak_piracy_modifier_desc: "이 지역은 최근 파푸아 북서부 고향 군도에서 날렵한 [Glossary( 'wairon', 'WAIRON_GLOSS' )] 배를 타고 온 비아크 해적들의 무자비한 약탈로 고통받았습니다." # 7324495177157707070
