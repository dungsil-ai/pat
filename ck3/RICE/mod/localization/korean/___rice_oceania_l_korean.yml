  oceania.0080.t: "거북 사냥꾼" # 16741675714563763141
  oceania.0080.desc: "[local_culture.GetName] 출신의 젊은 [hunter.GetWomanMan] [hunter.GetFirstName]이 최근 바다로 나갔을 때 직접 사냥한 거북을 가지고 제 앞에 나타났습니다.\n\n[local_culture.GetCollectiveNounNoTooltip]들은 이 장엄한 생명체를 귀하게 여기며, 용감하고 가치 있는 자만이 이를 쓰러뜨려 그 고기와 등껍질을 모두와 나눌 수 있습니다.\n\n[hunter.GetFirstNameNoTooltip]이 이것을 제게 바친 것은 큰 선물이며, [hunter.GetSheHe]가 자신의 업적을 인정받고 싶어 함이 분명합니다." # 6118268120916028254
  oceania.0080.a: "좋은 선물이긴 하나, 거북을 사냥했다고 해서 인정받을 자격까지 있는 것은 아니다." # 1474833589469081633
  oceania.0080.b: "고맙구나. 너의 대담한 용기를 널리 칭송하리라!" # 7234210581701894591
  oceania.0080.c: "너와 같은 용감한 [hunter.GetWomenMen]의 봉사가 필요하구나." # 6194598456264870695
  oceania.0080.info: "#emphasis 역사적 배경:#! 거북 사냥은 전통적으로 전 세계에서 행해졌으며, 사냥의 난이도와 고기가 진미로 여겨지는 특성 때문에 종종 중요한 의례적 또는 사회적 기능을 수행합니다. 예를 들어 많은 오세아니아 공동체에서 거북 사냥은 관대함(다른 이들에게 고기를 나누는 것)의 표시이자 용기와 남성다움을 보여주는 것으로 여겨질 수 있습니다." # 8642548892004514295
  oceania.0081.t: "노래하고 춤추거나, 아니면 죽거나" # 9717141794586149971
  oceania.0081.desc: "우리 [ROOT.Char.GetCulture.GetName] 사람들 사이에는 이런 옛말이 있습니다. \"노래하고 춤추지 않으면 죽는다.\"\n\n물론 문자 그대로의 의미는 아닙니다. 오히려 중요한 의식에서 노래하고 춤을 추는 것이야말로 인간성의 본질, 즉 다른 이들과 공동체를 이루며 살아가는 본질이 아니겠습니까?" # 17573349498536955896
  oceania.0081.a: "정말 그렇군. 실로 그렇소." # 12101107218310168660
  oceania.0081.b: "대체로 그렇지만, 항상 그런 것은 아닙니다." # 5070217541514869235
  oceania.0082.t: "사고 진주" # 8879557725809122512
  oceania.0082.desc: "하인들이 코코넛 밀크와 설탕을 섞은 [Glossary( '사고 펄', 'SAGO_GLOSS' )] 한 그릇을 새로 준비해 왔군. 이곳 [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTier]의 따뜻한 하루를 보내는 동안 나를 위한 상쾌한 곁들임이 되어줄 것이다!" # 15105248080708606041
  oceania.0082.a: "아! 정말 상쾌하군!" # 14247057335420130251
  oceania.0083.t: "사고 공물" # 1473863763147636852
  oceania.0083.desc: "나의 [chaplain.GetCouncilTitle]인 [chaplain.GetFirstName]께서 지역의 영혼들과 관련된 중요한 문제를 보고했습니다. [chaplain.GetSheHe]는 [county.GetNameNoTier]의 숲이 우거진 야생 지역에 머무는 여러 영혼을 달랠 수 있다고 판단했습니다. 우리가 그들에게 [Glossary( 'sago', 'SAGO_GLOSS' )]와 다른 음식들을 전통적인 [ROOT.Char.GetFaith.GetAdjective] 방식으로 제물로 바친다면 말입니다.\n\n[chaplain.GetFirstNameNoTooltip]의 말에 따르면, 만약 영혼들이 #italic 사고#!에 만족한다면 우리를 보이지 않는 다양한 방식으로 도와줄지도 모른다고 합니다." # 233911542227043526
  oceania.0083.a: "좋은 생각이군! 그렇게 하지." # 7430579562581538585
  oceania.0083.b: "우리는 정령들의 도움이 필요 없다." # 1251757343989979911
  oceania.0084.t: "코카투새" # 9030728678457884359
  oceania.0084.desc: "얼마 전, 내 영지의 경제 상황을 더 정확히 파악하고자 [county.GetNameNoTier] 인근에서 활동하는 상인들에게 상업 활동과 수입 및 수출 품목에 대한 보고를 요청한 바 있다.\n\n흥미롭게도 [county.GetNameNoTierNoTooltip]에서 코카투를 수출하는 것이 꽤 인기 있는 모양이다. 그 이유를 더 자세히 물어보니, 상인들은 코카투의 수출량은 적지만, 그 다정한 성격과 사람의 말을 흉내 내는 능력 덕분에 타지의 부유한 엘리트 계층 사이에서 엄청난 인기를 끌고 있다고 답했다." # 16742072123672726798
  oceania.0084.a: "정말 흥미롭군! 그 소식을 들으니 기쁘네." # 10825463329964694656
  oceania.0084.b: "그들은 더 많이 잡아 팔려고 노력해야 한다." # 8054220306710012856
  oceania.0084.info: "#emphasis 역사적 배경:#! 코카투는 수 세기 동안 원산지 밖으로 수출되어 이국적인 새로 사랑받아 왔습니다. 유럽에서 코카투를 묘사한 가장 오래된 기록은 13세기 신성 로마 제국의 황제 프리드리히 2세가 저술한 매사냥 서적 #italic De arte venandi cum avibus#!에서 찾아볼 수 있습니다. 또 다른 예로, 근세 일본에서는 불교 종교화에 코카투가 묘사되기도 했습니다." # 3061078819879109397
  oceania.0085.t: "극락조" # 5117220102434242007
  oceania.0085.desc: "극락조의 깃털은 수 세기, 아니 그보다 훨씬 오래전부터 수익성 높은 수출품이었습니다. 최근 [county.GetNameNoTier]에서 사냥한 새의 깃털 품질이 명성을 얻으면서, 평소보다 더 높은 가격에 거래되고 있습니다." # 1027011307031950815
  oceania.0085.a: "아주 좋군!" # 13834086310292164085
  oceania.0085.info: "#emphasis 역사적 배경:#! 극락조의 깃털을 얻기 위한 사냥은 유구한 역사를 지니고 있습니다. 이 새들은 뉴기니, 몰루카 제도, 그리고 호주에서만 서식하지만, 그 깃털은 중국에서 중동, 유럽에 이르기까지 구대륙 전역에서 널리 거래되었습니다. 예를 들어, 중세 유럽의 기사들이 투구에 이 깃털을 장식했다는 기록이 남아있습니다." # 4748449345463212044
  oceania.0086.t: "$travel_event_prefix$ 화식조" # 11496467686784190619
  oceania.0086.desc: "\"조심해!\" [traveler.GetTitledFirstName]가 외칩니다. \"저 녀석한테 너무 가까이 가지 마!\"\n\n[ROOT.Char.GetCurrentLocation.GetName]에서 우리의 여정은 깃털이 검고 얼굴은 알록달록하며, 강철처럼 진지한 눈빛을 한 날지 못하는 새와 마주치면서 멈춰 섰습니다. 작은 인간만 한 그 덩치는 멀리서도 분명하게 보였습니다.\n\n\"화식조는 위험한 새야.\" [traveler.GetFirstNameNoTooltip]가 우리에게 동물로부터 떨어지라는 손짓을 하며 말합니다. \"저 발톱이면 목을 단번에 찢어버릴 수 있어. 우회해서 가야겠어.\"" # 6303258462241270348
  oceania.0086.a: "그렇게 무서운 건 아니야. 우리에겐 무기도 있다고!" # 17406672283470977345
  oceania.0086.b: "돌다리도 두들겨 보고 건너는 법이지. 우회해서 가자." # 1380701910631700591
  oceania.0087.t: "메가포드 알" # 8386777302280634443
  oceania.0087.desc: "[county.GetNameNoTier] 전역에서 다양한 종류의 [Glossary( 'megapode', 'MEGAPODE_GLOSS' )] 새를 발견할 수 있습니다.\n\n이 새의 알은 현지 [county_culture.GetCollectiveNoun]에게 진미이자 지위의 상징이기에, 둥지는 전통적으로 보호받아 왔습니다. 사람들은 알을 지속적이고 장기적으로 공급받기 위해 특정 의식 조건 하에서만 알을 채집할 수 있습니다.\n\n하지만 최근 현지인들 사이에서 알을 얼마나 #italic 채집할 수 있는지#!에 대해 논쟁이 벌어지고 있습니다. 누군가는 식량이나 관계 구축을 위한 선물로 더 많은 알을 채집해야 한다고 주장합니다. 반면 다른 이들은 그러한 탐욕은 수치스러운 일이며, 이 알과 관련된 의식 관습에 어긋나는 행동이라고 말합니다." # 7238991383365296642
  oceania.0087.a: "알을 더 채집하라!" # 1511595253978356527
  oceania.0087.b: "우린 알이 더 필요하지 않아." # 7978718163687977611
