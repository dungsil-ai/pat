  setting_RICE_oceania_frequency_uncommon_desc: "[RICE_oceanic|E] [courtiers|E]가 지도 남동쪽 끝에서 훨씬 더 자주 등장하지만, 여전히 꽤 흔치 않습니다." # 14913852909223287604
  setting_RICE_oceania_frequency_common: "#high 보통#!" # 15893048163373345471
  setting_RICE_oceania_frequency_common_desc: "[RICE_oceanic|E] [courtiers|E]가 지도 남동쪽 끝에서 더 자주 나타나지만, 여전히 흔하지는 않습니다." # 4472117395132776686
  setting_RICE_oceania_frequency_off: "#high 끄기#!" # 2019327670389252092
  setting_RICE_oceania_frequency_off_desc: "[RICE_oceanic|E] [courtiers|E]가 역사적으로 타당한 경우를 포함하여 전혀 나타나지 않습니다. 이 설정은 다른 관련 게임 규칙보다 우선합니다." # 13906611735973268299
  rule_RICE_remote_oceania: "RICE 원거리 [RICE_oceanic|E] [courtiers|E]" # 5915835319805586635
  setting_RICE_remote_oceania_off: "비활성화 (기본값)" # 15033156197842132344
  setting_RICE_remote_oceania_off_desc: "[RICE_polynesian|E] 및 동부 [RICE_melanesian|E] [courtiers|E]가 지도 남동쪽 끝에서 전혀 나타나지 않습니다." # 8151557430956189990
  setting_RICE_remote_oceania_on: "#high 켜기#!" # 16563998167892487632
  setting_RICE_remote_oceania_on_desc: "다른 [RICE_oceanic|E] [courtiers|E]보다 드물지만, 동부 [RICE_melanesian|E] 및 [RICE_polynesian|E] [courtiers|E]가 지도 남동쪽 끝에서 [Glossary( 'ahistorically', 'POLYNESIA_HISTORY_GLOSS' )] 나타날 수 있습니다." # 9410710995218571171
