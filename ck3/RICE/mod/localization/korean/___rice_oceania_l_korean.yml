  oceania.0010.t: "세상 끝 너머" # 13509969133688976529
  oceania.0010.desc: "동쪽의 거대한 바다는 소금물로 가득한 황량한 불모지가 아닙니다. 세상 끝 너머에는 섬들과 사람들이 존재합니다. 우리는 이 사실을 알고 있습니다. 이 사람들이 가끔 서쪽으로 찾아오기 때문입니다.\n\n우리는 동쪽 바다에서 온 이 여행자와 모험가들을 이 땅에서 환영한다는 소식을 널리 알리기 위해 최선을 다할 것입니다. 우리와 교역하고 지식을 나누고자 하는 이들은 [ROOT.Char.GetPrimaryTitle.GetBaseName]에서 친구를 만나게 될 것입니다!" # 238596030884280328
  oceania.0010.a: "그들이 우리 해안에 도착하는 것은 언제이며, 과연 도착하기는 할 것인가?" # 5391550018373067370
