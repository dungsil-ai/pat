  oceania.0030.t: "[courtier.GetCulture.GetNameNoTooltip] 여행자" # 3400931350172156800
  oceania.0030.desc: "바다 건너 먼 곳에서 여행을 왔다고 주장하는 낯선 이의 등장이 [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTier]에 작은 소동을 일으켰습니다.\n\n저는 [courtier.GetCulture.GetName] 사람이라고 주장하는 [courtier.GetFirstName]라는 이름의 이 흥미로운 인물을 만났습니다. 그들의 말에 따르면, [courtier.GetHerHis] 민족은 조상 대대로 내려오는 지식을 보유하고 있으며, 이는 우리에게 큰 도움이 될 수 있다고 합니다…." # 16760061808504318354
  oceania.0030.a: "부디, 당신이 아는 것을 우리에게 가르쳐 주시오!" # 17702377036773541467
  oceania.0030.b: "혹시 나를 위해 일해보지 않겠소?" # 10778490671586807025
  oceania.0030.c: "재미있는 이야기군, 하지만 관심 없소." # 3333803374055700485
