  setting_RICE_south_america_off: "비활성화 (기본값)" # 15033156197842132344
  setting_RICE_south_america_off_desc: "[RICE_south_american|E] [courtiers|E]가 지도 남동쪽 끝에서 전혀 나타나지 않습니다." # 11871549305890960125
  setting_RICE_south_america_on: "#high 켜기#!" # 16563998167892487632
  setting_RICE_south_america_on_desc: "[RICE_oceanic|E] [courtiers|E]보다 드물지만, [RICE_south_american|E] [courtiers|E]가 지도 남동쪽 끝에서 [Glossary( 'ahistorically', 'SOUTH_AMERICA_HISTORY_GLOSS' )] 나타날 수 있습니다." # 16174719941640374770
  building_type_RICE_oceania_caves_of_fakfak: "팍팍의 동굴" # 4618307370409639249
  building_type_RICE_oceania_caves_of_fakfak_desc: "봄베라이 반도 서쪽 끝에 위치한 팍팍 지역 해안선의 수많은 동굴과 절벽은 동물, 인간 형상 및 손바닥 자국이 새겨진 고대 암각화로 장식되어 있습니다. 이 예술 작품에 사용된 붉은 물감 때문에 '피의 그림'이라 불리며, 지역 주민들은 이를 먼 조상들이 숭배하는 영혼을 기리고 죽은 자를 매장하기 위해 표시해 둔 장소라고 믿습니다." # 10975789217511686314
  building_RICE_oceania_caves_of_fakfak: "$building_type_RICE_oceania_caves_of_fakfak$" # 2648616892102288731
  building_RICE_oceania_caves_of_fakfak_desc: "$building_type_RICE_oceania_caves_of_fakfak_desc$" # 14358046699978101739
  building_type_RICE_oceania_kabui_bay: "카부이 만" # 2102568642551223831
  building_type_RICE_oceania_kabui_bay_desc: "라자 암팟 제도는 카부이 만을 포함하여 시각적으로 놀라운 장소들을 많이 품고 있습니다. 숨 막힐 듯 아름다운 카르스트 섬들로 가득한 이곳은 와이게오 섬과 감 섬을 갈라놓습니다. 선명한 녹색과 푸른색, 다채로운 잎과 산호가 어우러진 이 청정 구역은 민간 전설과 연관되어 있으며, 현지인들의 기원으로 알려져 있습니다. 때때로 만을 둘러싼 환경은 매장지로 사용되기도 했습니다." # 12936006464859429355
  building_RICE_oceania_kabui_bay: "$building_type_RICE_oceania_kabui_bay$" # 5254843561104822174
  building_RICE_oceania_kabui_bay_desc: "$building_type_RICE_oceania_kabui_bay_desc$" # 12708001776003161187
  trait_RICE_stone_money: "라이 스톤 소유자" # 17932425414935543473
  trait_RICE_stone_money_desc: "이 인물은 구전 전통에 기록된 바와 같이, 적당한 가치를 지닌 [Glossary( 'rai stone', 'YAP_STONE_MONEY_GLOSS' )]을 최소 하나 이상 소유하고 있습니다." # 8806823970208296078
  trait_RICE_stone_money_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip]은(는) 구전 전통에 기록된 바와 같이, 적당한 가치를 지닌 [Glossary( 'rai stone', 'YAP_STONE_MONEY_GLOSS' )]을 최소 하나 이상 소유하고 있습니다." # 4190359456721131231
  trait_RICE_stone_money_2: "라이 스톤 영주" # 6325282393175927356
  trait_RICE_stone_money_2_desc: "이 인물은 구전 전통에 기록된 바와 같이, 상당한 가치를 지닌 [Glossary( 'rai stones', 'YAP_STONE_MONEY_GLOSS' )]을 소유하고 있습니다." # 14479184193944188463
  trait_RICE_stone_money_2_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip]은(는) 구전 전통에 기록된 바와 같이, 상당한 가치를 지닌 [Glossary( 'rai stones', 'YAP_STONE_MONEY_GLOSS' )]을 소유하고 있습니다." # 8234204379620455798
