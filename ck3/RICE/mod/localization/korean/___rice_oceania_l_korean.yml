  oceania.0050.t: "라이 스톤" # 15883017135455067330
  oceania.0050.desc: "[Glossary( 'rai stones', 'YAP_STONE_MONEY_GLOSS' )]의 소유는 [yap_culture.GetCollectiveNoun]가 [ROOT.Char.Custom('WomanManPossessive')] 부와 가치를 측정하는 척도입니다. 하지만 특정 종류의 석회암으로 조각된 이 돌을 어떻게 얻을 수 있을까요?\n\n물론 그러한 석회암을 찾을 수 있는 다른 섬들, 특히 #italic 팔라우#!에서 가져오는 것입니다. 이제 저는 직접 라이 스톤 하나를 얻기 위해 동쪽 바다로 원정대를 보냅니다.\n\n이 섬들로 항해하여 현지인의 허락을 얻고, 돌을 구한 뒤 다시 돌아오는 원정은 아주 오래전부터 이어져 왔습니다. 이는 사람들이 다치거나 심지어 목숨을 잃기도 하는 위험한 모험입니다. 하지만 돌의 가치는 단순히 크기에 의해서만 결정되는 것이 아니라, 그것을 얻기 위한 노력을 포함한 그 뒤에 숨겨진 이야기에 의해서도 결정됩니다." # 5418450074985690245
  oceania.0050.a: "원정대원들에게 행운이 있기를 빕니다." # 8778227637558269272
  oceania.0050.b: "원정대에 더 많은 자원이 필요할 수 있습니다." # 4963246436851165543
  oceania.0050.b.tooltip: "#bold 소폭#! #P 증가#!하여 획득할 수 있는 [gold_i|E] [gold|E]의 양이 늘어나고 #bold 소폭#! #V 감소#!하여 사망할 선원들의 수가 줄어듭니다." # 4805689132507338884
  oceania.0050.c: "원정대에 #italic 훨씬#! 더 많은 자원이 필요할 수 있습니다." # 1966185391400775282
  oceania.0050.c.tooltip: "#bold 대폭#! #P 증가#!하여 획득할 수 있는 [gold_i|E] [gold|E]의 양이 늘어나고 #bold 대폭#! #V 감소#!하여 사망할 선원들의 수가 줄어듭니다." # 988121141799680800
  oceania.0051.t: "$oceania.0050.t$" # 9504805667802095441
  oceania.0051.desc.success: "[Glossary( 'rai stone', 'YAP_STONE_MONEY_GLOSS' )]을 획득하기 위해 동쪽 바다로 떠났던 나의 원정대가 #P 성공적으로#! 돌아왔다. 아름답고 거대한 원반 모양의 돌을 싣고 말이다!\n\n선원들이 돌아오며 우리는 그들의 여정과 바다를 건너며 겪었던 고난, 그리고 돌을 얻기 위해 현지인들과 어떻게 협상했는지에 대해 전해 들었다.\n\n" # 3476846458054859805
  oceania.0051.desc.failure: "며칠 동안 나를 위해 [Glossary( 'rai stone', 'YAP_STONE_MONEY_GLOSS' )]을 구하러 떠난 원정대에 대해 불안한 마음을 떨칠 수 없었다. 왜 아직도 돌아오지 않는 것인가?\n\n오늘, 현지 선원들이 내 원정대가 #N 결코#! 돌아오지 못했다는 증거를 발견했다는 보고를 받았다.\n\n정말 안타까운 일이다! 여정 중에 무슨 일이 있었는지 확실히 알 수는 없겠지만, 적어도 어떤 일이 벌어졌는지는 알게 되었다." # 18201057050162006383
  oceania.0051.desc.low: "손실은 비교적 적었고, 대부분의 선원이 무사히 돌아왔다. 이야깃거리가 부족한 탓에 #italic 라이 스톤#!의 가치는 그만큼 낮게 평가된다.\n\n그럼에도 #italic 라이 스톤#!의 구전 역사가 소유자들에 대한 흥미로운 이야기들로 채워짐에 따라 시간이 흐를수록 가치가 상승할 가능성은 여전히 존재한다." # 1453133714887518405
  oceania.0051.desc.medium: "선원들 사이에서 적당한 수준의 손실이 있었다. 사망자와 부상자가 과도하게 많지는 않았으며, 이러한 원정에서 예상되는 범위 내였기에 #italic 라이 스톤#!의 가치에 반영되었다.\n\n어쨌든 #italic 라이 스톤#!의 장기적인 가치는 여전히 변할 수 있다. 구전 역사가 소유자들에 대한 흥미로운 이야기들로 채워질 것이기 때문이다." # 5786876026950259816
  oceania.0051.desc.high: "선원들 사이의 손실이 막대했다. 몇 명이라도 살아 돌아온 것이 기적일 정도다. 적어도 이것은 #italic 라이 스톤#!을 획득하기까지의 극적인 이야기 덕분에 그 가치가 매우 높다는 것을 의미한다.\n\n그럼에도 #italic 라이 스톤#!의 장기적인 가치가 어떻게 될지는 누가 알겠는가? 획득 과정의 극적인 이야기로 시작하여, 앞으로 소유자들의 구전 역사가 그만큼 매혹적일지 지켜봐야 할 것이다." # 385161183514762666
  oceania.0051.a.failure: "[ROOT.Char.GetFaith.DeathDeityName]께서 그들의 영혼을 자비롭게 보살피시길…." # 3708778372319646900
  oceania.0051.a.success: "훌륭하군! 선원들은 정말 용감하고 영웅적이었다." # 11825680796492831936
