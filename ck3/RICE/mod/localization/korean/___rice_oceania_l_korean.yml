  oceania.0020.t: "빈랑 씹기" # 12814036636506005298
  oceania.0020.desc: "빈랑을 씹는 것보다 더 즐거운 일이 있을까? 씹고, 뱉고 나면 몸과 마음이 편안해지니…." # 9415915177890469584
  oceania.0020.a: "이것 때문에 입이 너무 붉게 물들지 않았으면 좋겠군." # 10545994277449804171
  oceania.0021.t: "빈랑 중독자" # 18285210937584256102
  oceania.0021.desc: "붉게 물들어 썩어가는 치아…. 잇몸의 손상…. 그리고 몸 어딘가가 더 이상 예전 같지 않다는 느낌….\n\n사람들은 내가 빈랑을 너무 많이 씹어서 그렇다고들 한다. 하지만 그럴 리가 없다. 빈랑을 씹으면 기분이 한결 나아지니까." # 6117199666893098967
  oceania.0021.a: "어떻게 이게 나쁠 수가 있지?" # 2533429101058546805
  oceania.0021.liege.message: "새로운 빈랑 중독자" # 14788824463399630189
  oceania.0022.t: "카바 마시기" # 5963982215062334803
  oceania.0022.desc: "우리와 우리 조상들이 늘 그래왔듯, 우리는 함께 모여 모두가 즐길 수 있도록 카바를 잔에 가득 채웁니다. 우리는 가장 높은 지위에 있는 사람부터 시작하여 모두가 충분히 마실 때까지 차례대로 돌아가며 마십니다." # 17189562605017799593
  oceania.0022.desc.ceremonial: "\n\n모두가 중요한 행사를 기념하는 이와 같은 카바 의식의 중요성을 잘 알고 있습니다. 조상님과 [ROOT.Char.GetFaith.PantheonTerm]을 기리기 위해 따라야 할 올바른 의식과 몸짓, 절차가 있습니다." # 15940742021585649173
  oceania.0022.desc.medicinal: "\n\n우리 선조들은 카바의 치유 효능을 알고 있었고, 이를 우리에게 물려주었습니다. 이렇게 함께 카바를 마심으로써 우리는 그 의학적 효능을 공동으로 누릴 수 있습니다." # 12056065467649644552
  oceania.0022.desc.social: "\n\n우리는 그렇게 카바를 마시며 삶의 기쁨과 슬픔을 서로 나누며 온갖 이야기를 나눕니다. 우리를 이토록 하나로 묶어주는 것은 카바 외에는 없습니다!" # 14832549788747400148
  oceania.0022.a: "카바는 참으로 훌륭한 것입니다." # 137766162486732461
  oceania.0023.t: "$oceania.0022.t$" # 2003575422909131437
  oceania.0023.desc: "나는 카바를 마시는 데 열정적이고 적극적인 사람으로 알려지게 되었습니다. 모두가 내가 우리의 이 고대 음료를 소중히 여긴다는 사실을 알아주니 기쁘군요!" # 13440975892229465225
  oceania.0023.a: "오시오! 함께 카바를 마십시다!" # 5660057679111175023
  oceania.0023.liege.message: "저명한 카바 애호가" # 6780246251939237389
  oceania.0024.t: "[ROOT.Char.GetCulture.GetNameNoTooltip] 회관" # 3910478750369062032
  oceania.0024.t.palauan: "[ROOT.Char.GetCulture.GetNameNoTooltip] 첼데베첼" # 615870460306626657
  oceania.0024.desc.intro: "공동 회관은 대대로 [ROOT.Char.GetCulture.GetName] 사회에서 핵심적인 역할을 해왔습니다." # 1504237306307508702
  oceania.0024.desc.normal: "\n\n[GetPlayer.GetTitleAsNameNoTooltip]로서, 다양한 방식으로 이러한 회관을 계속 지원하는 것이 나의 의무입니다. 종교적 의례 모임이나 연회, 기타 정치적 행사를 위해 자원을 기부하거나, 이러한 구조물의 건축물과 예술품을 유지하고 재건하기 위한 재료를 제공할 수 있습니다." # 10390935066324112498
  oceania.0024.desc.palauan: "이곳은 종종 [Glossary( 'cheldebechel', 'CHELDEBECHEL_GLOSS' )]의 구성원들이 교류하거나 업무를 처리하는 만남의 장소 역할을 합니다.\n\n[GetPlayer.GetTitleAsNameNoTooltip]로서, 나는 이 #italic 첼데베첼#!을 지원할 수 있는 수단을 가지고 있습니다. 남성과 여성의 등급별 클럽은 우리 공동체에서 중요한 역할을 합니다." # 2009181976816876763
  oceania.0024.a: "종교적 의례 모임 지원" # 12885826505975766367
  oceania.0024.b: "연회 및 기타 정치적 행사 지원" # 4901069449608798739
  oceania.0024.c: "이러한 회관의 유지 및 건설 지원" # 8743277690259974628
