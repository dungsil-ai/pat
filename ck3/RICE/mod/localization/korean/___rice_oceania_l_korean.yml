  activity_RICE_oceania_sasi_ceremony_host_desc: "\n$BULLET_WITH_TAB$ [piety_i] [piety|E] 획득\n$BULLET_WITH_TAB$ [prestige_i|E][prestige|E] 획득\n$BULLET_WITH_TAB$ [county|E]의 [development_i|E] [development|E]에 따라 [legitimacy_i|E][legitimacy|E] 획득\n$BULLET_WITH_TAB$이 [activity|E]가 진행되는 [county|E]는 [GetModifier('RICE_oceania_sasi_closed_modifier').GetNameWithTooltip] [modifier|E]를 얻으며, 이는 #V 1-3#!년 후 더 유익한 [GetModifier('RICE_oceania_sasi_open_modifier').GetNameWithTooltip] [modifier|E]로 #V 10#!년간 교체됩니다\"" # 1087137773395670307
