  trait_RICE_stone_money_3_desc: "이 인물은 구전 전통에 기록된 바와 같이, 주목할 만한 큰 가치를 지닌 [Glossary( 'rai stones', 'YAP_STONE_MONEY_GLOSS' )]을 소유하고 있습니다." # 8550818546345650103
  trait_RICE_stone_money_3_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip]은(는) 구전 전통에 기록된 바와 같이, 주목할 만한 큰 가치를 지닌 [Glossary( 'rai stones', 'YAP_STONE_MONEY_GLOSS' )]을 소유하고 있습니다." # 12831060028500372768
  trait_RICE_stone_money_4: "라이 스톤 대군주" # 16601966836963663396
  trait_RICE_stone_money_4_desc: "이 인물은 구전 전통에 기록된 바와 같이, 살아있는 그 누구보다도 가장 가치 있는 [Glossary( 'rai stones', 'YAP_STONE_MONEY_GLOSS' )] 컬렉션을 축적했습니다." # 6323284577239858145
  trait_RICE_stone_money_4_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip]은(는) 구전 전통에 기록된 바와 같이, 살아있는 그 누구보다도 가장 가치 있는 [Glossary( 'rai stones', 'YAP_STONE_MONEY_GLOSS' )] 컬렉션을 축적했습니다." # 8898271193839583210
  trait_track_RICE_stone_money: "$trait_RICE_stone_money$" # 433589546780517486
  trait_track_RICE_stone_money_desc: "모든 [Glossary( 'rai stone', 'YAP_STONE_MONEY_GLOSS' )]의 가치는 돌의 크기와 수량뿐만 아니라, 소유자의 지위와 그 역사, 즉 처음 획득할 때 감수했던 위험과 이전 소유자들에 의해 결정됩니다." # 9841987561516592795
  trait_betel_chewer: "빈랑 씹는 사람" # 7632270885311165406
  trait_betel_chewer_desc: "이 인물은 빈랑 열매를 씹는 것 외에는 아무것도 하지 않으며, 중독으로 인해 치아가 자주 붉게 물들어 있습니다." # 12610672568183964525
  trait_betel_chewer_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip]은(는) 빈랑 열매를 씹는 것 외에는 아무것도 하지 않으며, 중독으로 인해 [ROOT.GetCharacter.GetHerHis] 치아가 자주 붉게 물들어 있습니다." # 3606418301884753162
  trait_RICE_kava_drinker: "카바 음용자" # 5303270681104242316
  trait_RICE_kava_drinker_desc: "이 인물은 때와 장소를 가리지 않고 카바를 즐기는 것으로 유명합니다. 가족이나 친구, 혹은 낯선 이들과 함께하든 상관없이 마음껏 술을 마십니다." # 1496326172273420906
  trait_RICE_kava_drinker_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip]은 때와 장소를 가리지 않고 카바를 즐기는 것으로 유명합니다. [ROOT.GetCharacter.GetSheHe|U]는 가족이나 친구, 혹은 낯선 이들과 함께하든 상관없이 마음껏 술을 마실 것입니다." # 12380396250491858343
  activity_RICE_oceania_sasi_ceremony_host_an_a: "$host_activity_a$" # 13713790857143020716
  activity_RICE_oceania_sasi_ceremony: "사시 의식" # 12340823993186834088
  activity_RICE_oceania_sasi_ceremony_desc: "지정된 구역 내 천연자원 채취를 금지함으로써 우리의 천연자원을 보호할 수 있습니다. 이 명령을 어기는 자는 벌금을 물게 될 뿐만 아니라, 조상들의 노여움을 사 벌을 받게 될 것입니다." # 4861417240147893540
