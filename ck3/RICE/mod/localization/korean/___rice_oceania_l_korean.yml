  activity_RICE_oceania_sasi_ceremony_conclusion_desc: "[GetActivityType( 'activity_RICE_oceania_sasi_ceremony' ).GetName]이 완료되었으며, 사시가 시행 중입니다." # 10657023006204325425
  RICE_oceania_sasi_ceremony_type: "사시 의식 유형" # 13257924711937580922
  RICE_oceania_sasi_ceremony_type_water: "수자원 사시" # 7002014559779875138
  RICE_oceania_sasi_ceremony_type_water_desc: "1-3년 후 [Glossary( 'sasi', 'SASI_GLOSS' )]가 해제되면, 해당 [county|E]의 [ruler|E]는 다음을 얻습니다:\n\n$EFFECT_LIST_BULLET$추가 [prestige_i|E|E] [prestige|E]\n$EFFECT_LIST_BULLET$ [county|E]에 [GetModifier('RICE_oceania_sasi_water_modifier').GetNameWithTooltip] [modifier|E] 부여\n\n#weak 바다에서 오든, 강에서 오든, 빗물에서 오든 물은 생명을 기르는 근원이니, 우리는 그것을 어떻게 사용할지 신중하게 관리해야 합니다.#!" # 15922205500239224203
  RICE_oceania_sasi_ceremony_type_land: "토지 사시" # 11148496071715088390
  RICE_oceania_sasi_ceremony_type_land_desc: "1-3년 후 [Glossary( 'sasi', 'SASI_GLOSS' )]가 해제되면, 해당 [county|E]의 [ruler|E]는 다음을 얻습니다:\n\n$EFFECT_LIST_BULLET$추가 [piety_i|E|E] [piety|E]\n$EFFECT_LIST_BULLET$ [county|E]에 [GetModifier('RICE_oceania_sasi_land_modifier').GetNameWithTooltip] [modifier|E] 부여\n\n#weak 우리는 땅의 동식물을 여러 용도로 요긴하게 사용하므로, 이러한 자원을 얼마나 소비할지 신중해야 합니다.#!" # 16205545852591230247
  RICE_oceania_sasi_ceremony_prohibition_phase: "금지" # 17414024483460321421
  RICE_oceania_sasi_ceremony_prohibition_phase_desc: "[Glossary( 'sasi', 'SASI_GLOSS' )] 의식이 진행 중입니다." # 7137879006654528052
  RICE_oceania_sasi_ceremony_conservation_intent_header: "보존:" # 6244243459909816353
  RICE_oceania_sasi_ceremony_conservation_intent: "보존" # 2731763928344566036
  RICE_oceania_sasi_ceremony_conservation_intent_desc: "영혼의 가호 아래 자원을 보존하는 것의 중요성을 모든 참여자에게 강조합니다. 추가 [prestige_i|E] [prestige|E]를 획득합니다. [GetTrait('temperate').GetName( GetNullCharacter )|U], [GetTrait('patient').GetName( GetNullCharacter )|U], 그리고 [GetTrait('diligent').GetName( GetNullCharacter )] 특성을 가진 인물은 추가 [stress_loss_i|E] [stress|E]를 감소시킵니다." # 18007377958736427329
  RICE_oceania_sasi_ceremony_ritual_intent_header: "의례:" # 13781907821707693583
  RICE_oceania_sasi_ceremony_ritual_intent: "의례" # 15674658978138415862
  RICE_oceania_sasi_ceremony_ritual_intent_desc: "이 의식의 절차를 통해 지역의 영혼들과 존중과 화합을 다지는 데 집중합니다. 추가 [piety_i|E] [piety|E]를 획득합니다. [GetTrait('zealous').GetName( GetNullCharacter )|U], [GetTrait('just').GetName( GetNullCharacter )|U], 그리고 [GetTrait('humble').GetName( GetNullCharacter )] 특성을 가진 인물은 추가 [stress_loss_i|E] [stress|E]를 감소시킵니다." # 9022767303075342506
  RICE_oceania_sasi_ceremony_completed_log_title: "사시 폐막 의식 완료" # 4330085256015642673
  RICE_oceania_sasi_ceremony_completed_log: "[CHARACTER.GetShortUIName|U] 님이 [Glossary( 'sasi', 'SASI_GLOSS' )]를 마무리하는 의식을 성공적으로 이끌었습니다." # 14120268308355481777
  TRAVEL_NAME_FOR_activity_RICE_oceania_sasi_ceremony: "[Character.GetFirstNamePossessiveNoTooltip] $activity_RICE_oceania_sasi_ceremony$" # 982224593662479062
  RICE_SASI_COUNTY_LABEL: "이곳에 사시 제한이 적용되었습니다" # 7922707389532225777
  RICE_sasi_ceremony_story: "사시 폐쇄" # 6644574359491814921
  RICE_sasi_ceremony_story_desc: "[Glossary( 'sasi', 'SASI_GLOSS' )] 폐쇄가 시행되었습니다. 제한 구역 내의 자원을 착취하는 자들은 현세와 영계 모두에서 처벌받을 것입니다. 제한은 최소 1년 후 사시 개막 의식이 거행되면 해제될 것입니다." # 6476154731261643999
  RICE_oceania_sasi_modifier: "사시" # 10136745899258921808
  RICE_oceania_sasi_closed_modifier: "폐쇄된 사시" # 719659039614628887
  RICE_oceania_sasi_closed_modifier_desc: "최근 이곳에서 [Glossary( 'sasi', 'SASI_GLOSS' )] 폐막 의식이 거행되었습니다. #italic 사시#!가 발효 중이므로 사람들은 특정 자원을 채취할 수 없습니다." # 15637509100291442927
  RICE_oceania_sasi_open_modifier: "개방된 사시" # 4094004764466552643
  RICE_opinion_drank_kava_together: "함께 카바를 마심" # 4457724294000333863
  RICE_opinion_chewed_betel_nuts_together: "함께 빈랑을 씹음" # 10031310146249045183
  RICE_oceania_sasi_water_modifier: "물 사시 의식" # 4121079233747477425
  RICE_oceania_sasi_water_modifier_desc: "최근 이곳에서 수중 [Glossary( 'sasi', 'SASI_GLOSS' )] 개방 의식이 거행되었습니다. #italic sasi#!가 다시 열리기 전까지 사람들이 특정 수중 자원을 채취하는 것이 금지되었기에, 그동안 자원이 충분히 보충되었습니다." # 2200683992662890553
  RICE_oceania_sasi_land_modifier: "육상 Sasi 의식" # 15464345600961522463
  RICE_oceania_sasi_land_modifier_desc: "최근 이곳에서 육상 [Glossary( 'sasi', 'SASI_GLOSS' )] 개방 의식이 거행되었습니다. #italic sasi#!가 다시 열리기 전까지 사람들이 특정 육상 자원을 채취하는 것이 금지되었기에, 그동안 자원이 충분히 보충되었습니다." # 10656703317705717445
  RICE_oceania_pacific_connections: "태평양 연계" # 7200649108183394746
  RICE_oceania_pacific_connections_desc: "이 인물은 오세아니아에 거주하는 사람들과 연계를 맺고 있거나, 이를 유지하려 노력하고 있습니다." # 17341080820698088914
  RICE_oceania_palau_male_clubs_modifier: "남성 위계 클럽 지원" # 17859176641097417260
  RICE_oceania_palau_male_clubs_modifier_desc: "이 인물은 자신의 공동체 내 남성 [Glossary( 'cheldebechel', 'CHELDEBECHEL_GLOSS' )]에게 상당한 지원을 제공했습니다." # 3427779306980507723
  RICE_oceania_palau_female_clubs_modifier: "여성 위계 클럽 지원" # 4282823100354710905
