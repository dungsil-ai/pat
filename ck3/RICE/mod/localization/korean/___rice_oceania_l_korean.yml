  RICE_oceania_sago_offerings_desc: "친절한 영혼들의 도움을 구하기 위해 다양한 음식, 특히 [Glossary( 'sago', 'SAGO_GLOSS' )]를 여러 곳에 공물로 바쳤습니다." # 17468561016819217847
  RICE_oceania_cockatoo_modifier: "인기 있는 코카투" # 7495075690876210057
  RICE_oceania_cockatoo_modifier_desc: "이 지역에서 수출되는 코카투 새들은 다른 지역에서 인기가 많습니다." # 611783412205808450
  RICE_oceania_supports_cockatoo_trade: "코카투 무역 지원" # 8298267657045246755
  RICE_oceania_harvesting_more_megapode_eggs: "대규모 메가포드 알 채집" # 672429965569248430
  RICE_oceania_harvesting_more_megapode_eggs_desc: "전통적인 채집 제한 의식에도 불구하고 이곳에서 [Glossary( 'megapode', 'MEGAPODE_GLOSS' )]의 알 채집이 증가했습니다." # 250840837005821410
  RICE_oceania_restrained_harvest_of_megapode_eggs: "절제된 메가포드 알 채집" # 15449115155969780808
  RICE_oceania_restrained_harvest_of_megapode_eggs_desc: "이곳에서 [Glossary( 'megapode', 'MEGAPODE_GLOSS' )]의 알 채집을 늘려야 한다는 요구에도 불구하고, 공동체 지도자들은 채집량을 제한하는 전통 의식을 따르기로 합의했습니다." # 17663781002778706732
