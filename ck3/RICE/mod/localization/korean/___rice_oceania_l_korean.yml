  game_concept_RICE_oceanic: "오세아니아의" # 4703747637741233131
  game_concept_RICE_oceania: "오세아니아" # 77874904389657804
  game_concept_RICE_oceania_desc: "오세아니아는 해양 동남아시아 너머 태평양의 다양한 육지와 섬들을 아우릅니다.\n\n게임 내에서는 대부분 지도 밖의 영역이지만, 역사적으로 이 지역들이 동남아시아와 가졌던 산발적인 관계를 반영하여 다양한 오세아니아 [cultures|E] 및 [faiths|E]를 가진 [courtiers|E]가 지도 남동쪽 끝에서 등장할 수 있습니다. 이러한 이벤트는 또한 이들의 지식을 유용한 [modifiers|E]의 형태로 활용할 기회를 제공합니다. #bold $RICE_welcome_visitors_from_oceania$#! [decision|E]을 선택하면 이러한 만남의 확률이 증가합니다.\n\n기본적으로 등장하는 오세아니아 [courtiers|E]의 유형은 게임 규칙에 따라 달라지며, 다음을 포함합니다:\n\n$EFFECT_LIST_BULLET$가끔: 서부 [RICE_papuan|E] 및 서부 [RICE_micronesian|E]\n$EFFECT_LIST_BULLET$드묾: 중앙 [RICE_papuan|E] 및 중앙 [RICE_micronesian|E]\n$EFFECT_LIST_BULLET$매우 드묾: 동부 [RICE_micronesian|E], 동부 [RICE_papuan|E], [RICE_indigenous_australian|E] 및 서부 [RICE_melanesian|E]\n$EFFECT_LIST_BULLET$게임 규칙 적용 시 매우 드묾: [RICE_polynesian|E] 및 동부 [RICE_melanesian|E]\n$EFFECT_LIST_BULLET$게임 규칙 적용 시 극히 드묾: [RICE_south_american|E]" # 15004655171942912814
