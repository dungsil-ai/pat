  RICE_oceania_courtier_modifier_oceanic_stargazing_desc: "태평양의 육지와 바다를 항해하는 데 유용한 이들의 천문학적 지식에 대한 것입니다." # 723316161090959921
  RICE_oceania_courtier_modifier_artwork: "$RICE_oceania_courtier_modifier_island$ (예술 작품)" # 865174106330614559
  RICE_oceania_courtier_modifier_artwork_desc: "이들이 전통적으로 생산하는 다양한 종류의 예술과 공예품에 대한 것입니다." # 7219903041921516420
  RICE_oceania_quarry_stone_money: "채석장 돌 화폐" # 5806921559639588122
  RICE_oceania_quarry_stone_money_tooltip: "[Glossary( '라이 돌', 'YAP_STONE_MONEY_GLOSS' )]은 사회에서 자신의 가치와 지위를 증명하는 수단입니다." # 13399837151254117659
  RICE_oceania_quarry_stone_money_desc: "우리 사회에서 사용되는 [Glossary( '라이 돌', 'YAP_STONE_MONEY_GLOSS' )]은 해상 원정을 통해 특정 섬이나 땅에서 얻어집니다. 그 여정이 위험하고 험난할수록 돌의 가치는 더욱 높아집니다." # 11738338308534569301
  RICE_oceania_quarry_stone_money_effect_tooltip_1: "귀하는 #V [GetPlayer.MakeScope.ScriptValue('RICE_oceania_stone_money_success_chance')|0]%#!의 성공 확률을 가지며, 이는 귀하의 [traits|E] 및 [skills|E], 특히 [diplomacy_i|E] [diplomacy|E]와 [stewardship_i|E] [stewardship|E]에 의해 영향을 받습니다." # 8133378666378114073
  RICE_oceania_quarry_stone_money_effect_tooltip_2: "귀하는 #N 선원 일부를 잃을#! 수도 있으며, 이는 귀하의 [traits|E] 및 [skills|E], 특히 [martial_i|E] [martial|E]와 [learning_i|E] [learning|E]에 의해 영향을 받습니다." # 2856147732716427374
  RICE_oceania_quarry_stone_money_effect_tooltip_3: "원정 시작 시, 추가 [gold_i|E] [gold|E]를 지불하여 선원들의 성공 및 생존 확률을 높일 수 있습니다." # 3889994373939192621
  RICE_oceania_quarry_stone_money_effect_tooltip_4: "성공한다면, 무작위 양의 [prestige_i|E|E] [prestige|E](최대 #V [prestige_i|E] [GetPlayer.MakeScope.ScriptValue('RICE_oceania_stone_money_max_prestige_gain_value')|0]#!), [gold_i|E] [gold|E](최대 #V [gold_i|E] [GetPlayer.MakeScope.ScriptValue('RICE_oceania_stone_money_max_gold_gain_display_value')|0]#!), 그리고 [GetTrait('RICE_stone_money').GetName( GetNullCharacter )|U] [trait|E]의 [trait_level_track_xp|E](최대 #V [GetPlayer.MakeScope.ScriptValue('RICE_oceania_stone_money_large_trait_xp_gain_value')|0]#!)를 획득합니다." # 7411581487930934849
  RICE_oceania_quarry_stone_money_effect_tooltip_5: "사망한 선원의 수는 [piety_i|E] [piety|E]를 #N 대가#!로 치르며 획득하는 [gold_i|E] [gold|E], [prestige_i|E] [prestige|E], 그리고 [GetTrait('RICE_stone_money').GetName( GetNullCharacter )|U] [trait|E]의 [trait_level_track_xp|E] 양에 영향을 줍니다." # 13718675098214397135
  RICE_oceania_quarry_stone_money_confirm: "몇 명은 죽을 수도 있겠지만, 감수할 만한 희생이다!" # 14474197864204472729
  RICE_oceania_quarry_stone_money_context_tooltip: "#emphasis 역사적 배경:#! $YAP_STONE_MONEY_GLOSS$" # 15661815325117217362
  RICE_stress_loss_chew_betel_nuts_decision: "빈랑 씹기" # 17096706432924455335
  RICE_stress_loss_chew_betel_nuts_decision_tooltip: "빈랑을 씹는 것은 [stress_loss_i|E] [stress|E]를 해소하는 한 가지 방법입니다..." # 9516416259046109875
  RICE_stress_loss_chew_betel_nuts_decision_desc: "빈랑을 씹기만 하면 활력이 돌고 기분이 좋아지며 따스한 위안을 느낄 수 있을 것이다. 다만 침을 어디에 뱉을지는 조심해야겠다." # 10010062947698903821
  RICE_stress_loss_chew_betel_nuts_decision_effect_tooltip_1: "낮은 확률로 [GetTrait('betel_chewer').GetName( GetNullCharacter )|U] [trait|E]를 획득할 수 있습니다. 이 확률은 이 [decision|E]을 수행할 때마다 증가합니다." # 16418341710742702286
  RICE_stress_loss_chew_betel_nuts_decision_confirm: "빈랑을 씹을 시간이다!" # 11305812214173298350
  RICE_stress_loss_chew_betel_nuts_decision_context_tooltip: "#emphasis 역사적 배경:#! 자극제 및 마취 효과가 있는 빈랑을 씹는 관습은 수천 년 동안 아시아와 오세아니아 전역에 널리 퍼져 있었습니다. 이는 중독성과 건강상의 위험으로 잘 알려져 있으며, 치아의 붉은 얼룩(빈랑이 인기 있는 지역에서도 종종 비위생적인 것으로 간주됨)부터 각종 암에 이르기까지 다양한 부작용이 있습니다." # 10761262902380479882
  RICE_stress_loss_drink_kava_decision: "카바 마시기" # 7866445285971207223
  RICE_stress_loss_drink_kava_decision_tooltip: "카바를 마시는 것은 [stress_loss_i|E] [stress|E]를 해소하고 사람들과 어울리기에 아주 좋은 방법입니다." # 8641325318249194123
  RICE_stress_loss_drink_kava_decision_desc: "카바는 정신을 자극하며 많은 이들에게 큰 존경을 받는 훌륭한 음료입니다. 우리 [ROOT.Char.GetCulture.GetCollectiveNoun]는 대대로 이를 마셔왔습니다." # 14663898851170929445
  RICE_stress_loss_drink_kava_decision_effect_tooltip_1: "낮은 확률로 [GetTrait('RICE_kava_drinker').GetName( GetNullCharacter )|U] [trait|E]를 획득할 수 있습니다. 이 확률은 이 [decision|E]을 수행할 때마다 증가합니다." # 2730017927927866542
  RICE_stress_loss_drink_kava_decision_confirm: "모여서 카바를 즐기자!" # 4116959134957675481
  RICE_stress_loss_drink_kava_decision_context_tooltip: "#emphasis 역사적 배경:#! 카바는 오세아니아, 특히 폴리네시아, 미크로네시아, 멜라네시아 대부분 지역의 전통적인 향정신성 음료로, 집단마다 역할은 다르지만 이들 민족에게 중요한 사회적, 정치적, 종교적 역할을 해왔습니다." # 8534956121297871533
  RICE_oceania_recruit_biak_adventurers: "비아크 모험가들과 연계" # 14015207552566834636
  RICE_oceania_recruit_biak_adventurers_tooltip: "[RICE_biak|E] 모험가들과 협력하여 상호 이익을 도모하십시오." # 7169728780347079431
  RICE_oceania_recruit_biak_adventurers_desc: "호기로운 [RICE_biaks|E]들은 때때로 모험을 찾아 [GetGeographicalRegion('RICE_eastern_southeast_asia_region').GetName]의 해안과 섬으로 항해합니다. 그들의 노력을 지원하고 협력하는 것은 양측 모두에게 유리할 수 있습니다." # 6730119596051620585
  RICE_oceania_recruit_biak_adventurers_desc_biak: "우리와 같은 모험심 강한 [RICE_biaks|E]들은 때때로 모험을 찾아 고향을 떠나 먼 바다를 항해하곤 한다. 뜻이 맞는 [RICE_biak|E] 친구들을 찾아 함께 일하는 것은 양측 모두에게 이득이 될 것이다." # 11906948369028320745
  RICE_oceania_recruit_biak_adventurers_effect_warriors_tooltip_1: "[GetModifier('RICE_oceania_ties_with_biak_warriors').GetNameWithTooltip] [modifier|E]를 획득하고, (추가로 지불할 [gold_i|E] [gold|E]의 양에 따라) 약간의 [soldier_i] [special_troops|E]를 얻는다." # 13475415728943294565
  RICE_oceania_recruit_biak_adventurers_effect_warriors_tooltip_2: "[modifiers|E]가 활성화되어 있는 동안 [gold_i|E] [gold|E], [soldier_i] [special_troops|E], [control_i|E] [control|E], [courtiers|E] 등 다양한 보너스를 주는 무작위 이벤트를 받을 수 있다!" # 5421541539795845726
  RICE_oceania_recruit_biak_adventurers_effect_traders_tooltip_1: "[GetModifier('RICE_oceania_ties_with_biak_traders').GetNameWithTooltip] [modifier|E]를 획득하고, (귀하의 [government|E]와 추가로 지불할 [gold_i|E] [gold|E]의 양에 따라) [legitimacy_i|E] [legitimacy|E], [barter_goods_i] [barter_goods|E], [provisions_i|E] [provisions|E] 또는 [prestige_i|E] [prestige|E]를 얻는다." # 8308472781205243045
  RICE_oceania_recruit_biak_adventurers_effect_traders_tooltip_2: "[modifiers|E]가 활성화되어 있는 동안 [gold_i|E] [gold|E], [prestige_i|E] [prestige|E], [development_i|E] [development|E], [courtiers|E] 등 다양한 보너스를 주는 무작위 이벤트를 받을 수 있다!" # 7159610819539726789
  RICE_oceania_recruit_biak_adventurers_effect_general_tooltip_1: "[RICE_biaks|E]는 추가 [gold|E]나 심지어 [titles|E]를 요구할 수 있으며, 협상이 결렬될 경우 나쁘게 반응할 것이다!" # 17610074670254538494
  RICE_oceania_recruit_biak_adventurers_confirm: "이 모험가들에게 연락하라!" # 2512712864391590131
  RICE_oceania_recruit_biak_adventurers_context_tooltip: "#emphasis 역사적 배경:#! 비아크족은 파푸아 북서부의 군도 출신이다. 근대 초기, 그리고 네덜란드 식민 시대에 이르기까지 그들은 인도네시아 동부 역사에서 중요한 역할을 했으며, 중세 시대 혹은 그 이전부터도 비슷한 활동을 했을 가능성이 높다. 비아크족은 위대한 항해사들이었으며, 평화로운 무역, 몰루카 술탄국들과의 외교 관계 유지, 무자비한 약탈, 새로운 사상 습득, 머나먼 섬의 식민지화 등 모험을 찾아 항해하는 이들을 높이 평가했다." # 961287899833014509
  RICE_oceania_recruit_biak_adventurers_type: "고용할 [RICE_biak|E] 모험가의 유형을 선택하라" # 13464517882658643981
  RICE_oceania_recruit_biak_adventurers_type_gui: "$RICE_oceania_recruit_biak_adventurers_type$" # 11588565560734539075
  RICE_oceania_recruit_biak_adventurers_warriors_option: "#Bold 전사들#!" # 16500414586287220693
  RICE_oceania_recruit_biak_adventurers_warriors_option_desc: "군사 모험가들을 초대하라" # 12764632423230306009
  RICE_oceania_recruit_biak_adventurers_warriors_option_tooltip: "#italic 날렵한 [Glossary( 'wairon', 'WAIRON_GLOSS' )] 배를 타고 항해하는 [RICE_biak|E] 전사들은 수 세기 동안 해적, 머리 사냥꾼, 그리고 맹렬한 투사로서 적들의 심장에 공포를 심어주었다. 그러나 그들 중 일부는 이익이나 명예를 위해 다른 이들을 위해 일할 의향이 있다.#!" # 16144076479317355394
  RICE_oceania_recruit_biak_adventurers_traders_option: "#Bold 상인들#!" # 5753171935078978313
  RICE_oceania_recruit_biak_adventurers_traders_option_desc: "군사 모험가들을 초대하라" # 12764632423230306009
  RICE_oceania_recruit_biak_adventurers_traders_option_tooltip: "#italic 거대한 [Glossary( 'waimansusu', 'WAIMANSUSU_GLOSS' )] 배를 타고 항해하는 [RICE_biak|E] 상인들은 수 세기 동안 바다 건너 인상적인 양의 교역품을 운송해 왔다. 그렇게 함으로써 그들은 정치적, 사회적 네트워크를 형성했고, 심지어 머나먼 땅에 식민지를 건설하기도 했다.#!" # 11741876601604060353
  RICE_welcome_visitors_from_oceania: "오세아니아에서 온 방문객을 환영하라" # 7209863373206537627
  RICE_welcome_visitors_from_oceania_tooltip: "xxxxx" # 1951045980481827005
  RICE_welcome_visitors_from_oceania_desc: "광활한 바다 건너 동쪽에는 땅과 섬들이 있다. 비록 멀지만 그곳에 사는 사람들이 있다. 그들의 지혜와 지식이 우리에게 도움이 될 수 있을까?" # 16851807408476776806
  RICE_welcome_visitors_from_oceania_effect_tooltip_1: "[modifier|E]가 활성화되어 있는 동안 [RICE_oceanic|E] [courtiers|E]가 생성될 확률이 증가한다." # 6050461317918834616
  RICE_welcome_visitors_from_oceania_effect_tooltip_2: "[RICE_oceania|E] [courtier|E]가 등장하는 이벤트를 확정적으로 발생시킬 작은 확률이 있습니다." # 4944654996674530830
  RICE_welcome_visitors_from_oceania_confirm: "그들에게 손을 내밀어 봅시다!" # 7461234064667484113
  RICE_welcome_visitors_from_oceania_context_tooltip: "#emphasis 역사적 배경:#! 식민지 시대 이전 오세아니아 민족들과 구대륙의 나머지 지역들 사이에 제한적인 접촉이 있었다는 증거가 일부 존재하며, 야프나 비아크 같은 섬들과 파푸아 내륙 및 인도네시아 나머지 지역들 사이의 산발적인 교역이 그 예입니다. 심지어 북부 호주의 일부 원주민들과 인도네시아인들 사이에 간헐적인 접촉이 있었음을 시사하는 점점 더 유망한 증거들이 발견되고 있으나, 그 접촉의 범위에 대해서는 학계에서 논쟁이 이어지고 있습니다." # 1548557717984645366
  RICE_oceania_meeting_houses_decision: "공동체 회관 지원" # 17024522336641664487
  RICE_oceania_meeting_houses_decision_palauan: "계급 클럽 지원" # 12713533073418820357
  RICE_oceania_meeting_houses_decision_tooltip: "우리 사회의 근간을 지원합시다." # 2091570133009339835
  RICE_oceania_meeting_houses_decision_desc: "수 세대 동안 [GetPlayer.GetCulture.GetCollectiveNoun]은 의례적, 사회적, 경제적, 정치적 중요성으로 우리 민족 삶의 중심이 된 공동체 회관을 건설해 왔습니다. 이러한 회관과 그곳을 이용하는 이들을 지원하면 [GetPlayer.GetTitleAsNameNoTooltip]로서 나의 인기와 권위가 높아질 것입니다." # 2553829699392931973
  RICE_oceania_meeting_houses_decision_palauan_desc: "수 세대 동안 [GetPlayer.GetCulture.GetCollectiveNoun]은 [Glossary( 'cheldebechel', 'CHELDEBECHEL_GLOSS' )] 또는 계급 클럽을 통해 공동체를 조직해 왔습니다. 이러한 클럽과 그 활동을 지원하면 [GetPlayer.GetTitleAsNameNoTooltip]로서 나의 인기와 권위가 높아질 것입니다." # 3914435203646372600
  RICE_oceania_meeting_houses_decision_effect_tooltip_1: "지원 수준을 선택하면 그에 따라 획득하는 [prestige_i|E] [prestige|E]와 [legitimacy_i|E] [legitimacy|E]의 양, 그리고 얻게 될 [character_modifier|E]의 지속 기간이 결정됩니다 #weak (최소 비용: @gold_icon! #V [GetPlayer.MakeScope.ScriptValue('RICE_oceania_meeting_houses_cost_small')]#!)#!" # 12755840882251605059
  RICE_oceania_meeting_houses_decision_effect_tooltip_2: "당신은 $tradition_RICE_palau_clubs_name$ [tradition|E]을 보유하고 있으므로, 일반적인 경우보다 이 [decision|E]로부터 최대치의 [prestige_i|E] [prestige|E], [legitimacy_i|E] [legitimacy|E] 및 [modifier|E] 지속 기간을 받게 됩니다. 또한 남성 혹은 여성 [Glossary( 'cheldebechel', 'CHELDEBECHEL_GLOSS' )] 중 어느 쪽을 지원할지 결정하게 됩니다." # 17496603786523213820
  RICE_oceania_meeting_houses_decision_effect_tooltip_3: "당신의 [culture_possessive|E] [ethos|E]가 얻게 될 [modifier|E]의 효과를 결정합니다." # 67117699374780369
  RICE_oceania_meeting_houses_decision_confirm: "우리는 하나 된 민족, 하나 된 공동체입니다!" # 12969489266068835768
  RICE_oceania_meeting_houses_decision_context_tooltip: "#emphasis 역사적 배경:#! 인도네시아부터 폴리네시아에 이르는 많은 오스트로네시아어족 문화권에서 공동체 회관은 건축 양식과 예술성은 서로 다르지만, 종교, 의례, 사회, 정치 활동 및 교류의 중심지로서 전통적인 삶에서 중요한 역할을 합니다." # 2788468695972106414
