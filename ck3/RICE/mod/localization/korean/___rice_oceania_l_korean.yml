  RICE_oceania_courtier_modifier_kava: "$RICE_oceania_courtier_modifier_island$ (카바 의식)" # 3165919590300512240
  RICE_oceania_courtier_modifier_kava_desc: "$RICE_oceania_courtier_modifier_island_desc$ 카바 음용의 의례적이고 영적인 중요성.\n\n#Emp [heritage|E]와 관계없이 #V $RICE_stress_loss_drink_kava_decision$#! [decision|E]을 실행할 수 있으며, [GetTrait('RICE_kava_drinker').GetName( GetNullCharacter )|U] [trait|E]를 획득할 가능성이 있습니다#!" # 4304706316604564494
