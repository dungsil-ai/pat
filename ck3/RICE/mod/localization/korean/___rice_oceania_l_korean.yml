  oceania.0061.t: "[biak_culture.GetNameNoTooltip] 전사들" # 13975653366109380905
  oceania.0061.desc.intro.peaceful: "[biak_culture.GetName] 전사들은 [Glossary( 'wairon', 'WAIRON_GLOSS' )] 배를 타고 왔습니다. 겉보기에는 가늘고 매끄러워 보이지만, 나무에 새겨진 무시무시한 형상은 그 주인들의 모험심과 용기를 증명하는 듯했습니다." # 3116805865797065678
  oceania.0061.desc.intro.tense: "다행히도 [biak_leader.GetFirstName]은 그리 탐욕스럽지 않았고, 우리가 다시 제안한 조건에 동의했습니다.\n\n시작은 삐걱거렸고 그들을 완전히 신뢰할 수는 없지만, 일단은 말입니다." # 11634694113896654568
  oceania.0061.desc.peaceful: "$oceania.0061.desc.intro.peaceful$\n\n다행히도 [biak_leader.GetFirstName]이라는 자가 이끄는 전사들은 우호적이었으며, 우리 같은 이방인을 위해 기꺼이 싸우려 합니다. 그들은 보상을 받는 대가로 고향에 있는 자신들의 부족에게 영광과 명예를 가져다줄 것입니다." # 13564626799930476296
  oceania.0061.desc.biak: "$oceania.0061.desc.intro.peaceful$\n\n같은 [biak_culture.GetCollectiveNoun]로서, 우리는 전사가 모험에서 성공하기 위해 어떤 힘과 교활함, 용기가 필요한지 잘 알고 있습니다. [biak_leader.GetFirstName]이 이끄는 전사들은 이러한 자격 요건을 충분히 갖추었으며, 전리품을 나눌 수만 있다면 기꺼이 나와 협력할 것입니다." # 7029298525830471494
  oceania.0061.desc.tense: "$oceania.0061.desc.intro.tense$ 그들은 나를 위해 기꺼이 싸우려는 듯합니다. 그들은 보상을 받는 대가로 고향에 있는 자신들의 부족에게 영광과 명예를 가져다줄 것입니다." # 2699414340279434618
  oceania.0061.a: "좋군. 함께 협력해보도록 하지." # 13456972482516526726
  oceania.0061.b: "그대들 중 일부는 우리 영지에 정착해도 좋소." # 11466611810444884458
  oceania.0061.c: "그대 자신도 우리와 함께 일할 수 있겠소?" # 1801838305193508716
  oceania.0061.d: "그대 같은 이를 동료로 삼고 싶군." # 4580936030685872090
  oceania.0062.t: "[biak_culture.GetNameNoTooltip] 상인들" # 15220055166441304220
  oceania.0062.desc.intro.peaceful: "[biak_culture.GetName] 상인들이 [Glossary( 'waimansusu', 'WAIMANSUSU_GLOSS' )] 배를 타고 왔소. 크고 많은 화물을 실을 수 있는 이 배는 그 주인들의 대담한 상업 정신을 증명하는 증거였지." # 12839162852211594426
  oceania.0062.desc.intro.tense: "$oceania.0061.desc.intro.tense$" # 16302866147351407742
  oceania.0062.desc.peaceful: "$oceania.0062.desc.intro.peaceful$\n\n내가 접촉한 상인 무리는 [biak_leader.GetFirstName]라는 자가 이끌고 있었소. 그는 내 지원이 있다면 그들이 멀리까지 무역을 넓혀 내가 통치하는 항구로 부를 가져다줄 것이라 장담했지. 그렇게 함으로써 그들은 고향의 씨족들에게도 영광과 명예를 가져다줄 것이오." # 12493692835593248371
  oceania.0062.desc.biak: "$oceania.0062.desc.intro.peaceful$\n\n같은 [biak_culture.GetCollectiveNoun]로서, 우리는 성공적인 모험이 단순히 전투에서 기개를 시험하는 것만이 아님을 잘 알고 있소. 무역과 외교에서의 성취 또한 그만큼 인상적인 법이며, [biak_leader.GetFirstName]가 이끄는 상인들은 그 방면에 경험이 많은 듯하오. 그들은 우리가 서로 돕기만 한다면 기꺼이 나와 협력하겠다고 했소." # 15049619580718764207
  oceania.0062.desc.tense: "$oceania.0061.desc.intro.tense$ 그들은 무역으로 상호 이익을 얻기 위해 우리와 협력하기로 합의했소. 그렇게 함으로써 그들은 고향의 씨족들에게도 영광과 명예를 가져다줄 것이오." # 13722021101455515919
  oceania.0062.a: "$oceania.0061.a$" # 15754769548379573889
  oceania.0062.b: "$oceania.0061.b$" # 2629040756826761965
  oceania.0062.c: "$oceania.0061.c$" # 11056342356380252329
  oceania.0062.d: "$oceania.0061.d$" # 9577533732111321956
  oceania.0063.t: "[biak_culture.GetNameNoTooltip]의 요구" # 14777232184085159779
  oceania.0063.desc.warriors: "$oceania.0061.desc.intro.peaceful$\n\n불행히도, 그들이 내 깃발 아래서 싸우도록 협상하려던 시도는 무산되고 있소. 그들은 내게 더 많은 금을 요구하며, 따르지 않으면 내 영지를 약탈하겠다고 위협하고 있소.\n\n아아, 그들은 해적질에도 능숙하기로 #italic 유명하니#!, 우리는 신중하게 행동해야 하오…." # 13172858845592671123
  oceania.0063.desc.traders: "$oceania.0062.desc.intro.peaceful$\n\n불행히도, 상호 이익을 위해 협력하고자 했던 협상은 무산되고 있소. 그들은 내게 더 많은 금을 요구하며, 따르지 않으면 내 영지를 약탈하겠다고 위협하고 있소.\n\n아아, 그들이 위대한 상인이자 외교관이기는 하나, 해적질 #italic 역시#! 그들에게는 전통적인 수익원 중 하나이니, 우리는 신중하게 행동해야 하오…." # 17163672939412823438
  oceania.0063.desc.fallback: "[biak_culture.GetCollectiveNoun] 모험가들과 협상하려던 우리의 시도는 실패했소.\n\n그들은 우리가 더 많은 금을 주지 않으면 약탈하겠다고 위협하고 있소." # 9345853881815217111
  oceania.0063.a: "좋소. 추가 보상을 주겠소." # 12095652808128706259
  oceania.0063.b: "아니. 그대들은 우리의 원래 제안을 #italic 받아들여야#! 할 것이오." # 5087427241079669376
  oceania.0063.b.failure: "그들은 거절하고 해적질을 시작합니다" # 6037666138101120905
  oceania.0063.b.success: "그들은 물러나고 원래 제안에 동의합니다" # 17378491585786755841
  oceania.0064.t: "[biak_culture.GetNameNoTooltip] 해적들" # 16001331032419314569
  oceania.0064.desc.original: "[biak_leader.GetFirstName]가 이끄는 [biak_culture.GetName] 무리와 협상하려는 우리의 시도는 실패로 돌아갔습니다.\n\n[biak_leader.GetFirstNameNoTooltip]와 그 일행은 이제 [target_duchy.GetNameNoTier]의 수로를 거슬러 올라가며 보이는 모든 것을 공격하고 약탈하고 있습니다. 그들이 입힐 수 있는 피해는 제한적이지만, 그들의 약탈 행위는 저에게 결코 좋게 비치지 않습니다." # 7169814499104362774
  oceania.0064.desc: "[original_negotiator.GetTitledFirstName]께서 최근 [biak_leader.GetFirstName]라는 자가 이끄는 [biak_culture.GetName] 모험가들을 고용하려 하셨습니다.\n\n하지만 협상은 결렬되었고, 그 결과 [biak_leader.GetFirstNameNoTooltip]와 그 일행은 이제 [target_duchy.GetNameNoTier]의 수로를 거슬러 올라가며 보이는 모든 것을 공격하고 약탈하고 있습니다. 그들이 입힐 수 있는 피해는 제한적이지만, 애초에 이 일과 아무런 상관이 없던 제 영지까지 그들의 약탈 대상이 되고 말았습니다!" # 10371532494709392380
  oceania.0064.a: "이런..." # 14649465176237329903
  oceania.0064.b: "[original_negotiator.GetFirstNameNoTooltip], 이 멍청한 자! 도대체 무슨 짓을 저지른 건가?!" # 1160169951448739772
