  RICE_oceania_ancestor_bonus_mystical: "$RICE_oceania_ancestor_bonus_naval$" # 9685891586474930695
  RICE_oceania_ancestor_bonus_mystical_desc: "이 인물의 조상들이 적의 음모로부터 보호하기 위해 축복했다고 여겨집니다." # 13998759247905825438
  RICE_oceania_ancestor_bonus_prosperity: "$RICE_oceania_ancestor_bonus_naval$" # 9685891586474930695
  RICE_oceania_ancestor_bonus_prosperity_desc: "지역 통치자나 공동체 지도자들의 조상이 이 땅에 비옥함과 풍요로움을 내려 축복했다고 여겨집니다." # 5242396618178624283
  RICE_oceania_courtier_modifier_island: "태평양의 유대와 지식" # 12324743417396219104
  RICE_oceania_courtier_modifier_island_desc: "이 인물은 태평양의 일부 민족과 교류하고 있습니다. 그들로부터 다음을 접했습니다." # 10968054065888012962
