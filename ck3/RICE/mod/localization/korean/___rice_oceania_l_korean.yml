  oceania.0040.t: "또 다른 사시 의식" # 11175046787624582833
  oceania.0040.desc: "[Glossary( 'sasi', 'SASI_GLOSS' )]는 [ROOT.Char.GetCulture.GetName]로서 우리가 가진 전통으로, 미래를 위해 자원을 보존하고자 일정 기간 동안 채집할 수 없는 자원을 주기적으로 지정하는 것입니다. 물론 #italic 사시#!는 그에 걸맞은 [ROOT.Char.GetFaith.GetReligion.GetAdjective] 의식을 동반합니다.\n\n" # 8939840594612814763
  oceania.0040.desc.land: "곧 [location.GetName]에 #italic 육지 사시#!를 시행할 것이며, 나는 그 의식에 참석하여 #italic 사시#!를 선포할 것입니다. 그 후로 한동안 사람들은 그곳의 황무지에서 자원을 채취하거나 이용하는 것이 금지될 것입니다." # 2869744386902369344
  oceania.0040.desc.water: "곧 [location.GetName]에 #italic 물 사시#!를 시행할 것이며, 나는 그 의식에 참석하여 #italic 사시#!를 선포할 것입니다. 그 후로 한동안 사람들은 그곳의 특정 수역에서 자원을 채취하거나 이용하는 것이 금지될 것입니다." # 1478253723190634630
  oceania.0040.a: "시작해보지!" # 6759702823134892919
  oceania.0041.t: "도착" # 4877148824439775158
  oceania.0041.desc: "[Glossary( 'sasi', 'SASI_GLOSS' )] 폐회식이 열릴 [location.GetName]의 마을에 도착하자, 현지인들이 성대한 환영과 기쁨으로 우리를 맞이했습니다.\n\n식은 머지않아 며칠 내로 거행될 것입니다. 하지만 그동안 무언가로 주의를 돌릴 수 있을지도 모르겠군요…." # 2051709026719168230
  oceania.0041.a: "[ROOT.Char.GetFaith.HighGodName]께 기도하며 시간 보내기" # 18076096021052895063
  oceania.0041.b: "지역 지도자들과 현안 논의하기" # 5750606446680419183
  oceania.0041.c: "휴식을 취하며 이 지역의 아름다운 풍경 감상하기" # 9453286509240391525
  oceania.0042.t: "사시 폐회" # 15163658847584331220
  oceania.0042.desc: "오늘의 의식이 끝나면, 저와 다른 지역 지도자들이 합의한 조건에 따라 [Glossary( 'sasi', 'SASI_GLOSS' )]가 폐회될 것입니다.\n\n우리는 [ROOT.Char.GetFaith.PantheonTerm]께서 우리와 우리가 보호하는 자원을 보살펴 주시기를 기도합니다." # 3981541066216427986
  oceania.0042.desc.land: "마을 근처 [ROOT.Char.GetCurrentLocation.Custom('GetRandomAppropriateTree')] 나무 아래 모였습니다. 동물, 식물, 광물을 포함하여 #italic 사시#!의 영향을 받는 지역에서 발견되는 모든 자원은 누구도 손댈 수 없습니다." # 1095036177849711970
  oceania.0042.desc.water: "마을 근처 [ROOT.Char.Custom('IndefiniteBodyOfWater')] 가장자리에 모였습니다. 물고기와 산호부터 다른 수생 동물, 식물, 광물에 이르기까지, 누구도 #italic 사시#!의 조건에 따라 영향을 받는 자원을 채취할 수 없습니다." # 4074552439651009019
  oceania.0042.desc.conclusion: "\n\n의식은 기도와 함께 많은 춤과 노래로 마무리되었고, 현지인들은 저의 지원에 감사를 표했습니다." # 3142118569431916525
  oceania.0042.a: "우리의 자원은 오랫동안 보존될 것입니다." # 11271573783024862646
