  innovation_RICE_quipu: "키푸" # 674132781331134326
  innovation_RICE_quipu_desc: "매듭이 달린 끈을 사용하는 기록 보관 체계는 안데스 산맥 고지대의 일부 문명 전반에 걸쳐 흔히 사용됩니다. 이 끈들은 매듭의 색상, 순서, 개수를 포함한 다양한 요소에 따라 정보를 분류합니다." # 15896786535010803581
  innovation_RICE_andean_roads: "안데스 도로" # 17434953489878016034
  innovation_RICE_andean_roads_desc: "험준한 안데스 산맥도 도로, 역참, 전령으로 구성된 복잡한 네트워크를 구축하기 위해 시간과 자원을 기꺼이 투자한다면 장애물이 되지 않습니다." # 14271792140492987851
