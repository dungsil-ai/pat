  nguillatun_desc: "마푸체 민족의 전통 신앙으로, 신도들은 세상이 형성되기 전부터 응겐, 필란, 왕굴렌이라 불리는 다양한 원초적 영혼들이 우주적 영혼인 푸암으로부터 나타나 그들의 갈등과 이야기를 통해 모든 창조물의 형태를 빚어냈다고 믿습니다. 이제 영혼들은 휴식 중이지만 여전히 세상에 영향을 미치고 있으며, 인류의 지배 영혼인 응게네첸은 응기야툰, 즉 '탄원' 의식에서 제물을 바쳐 자신을 만족시킨 자들에게 축복을 내리고, 합당한 제물을 바치지 못한 자들을 벌합니다. 응기야툰 신도들은 주로 여성으로 구성된 마치에 의해 인도받는데, 마치는 응기야툰과 마치툰 의식을 주관하고 조언을 제공하는 지혜로운 영적 지도자들입니다." # 7136339579288931284
