  mapuche_religion_desc: "마푸체와 마푸둥군을 사용하는 원주민들의 전통 신앙인 페옌툰, 즉 '믿음'은 좋은 삶을 유지하기 위해 자연의 순환 속에서 물질 세계와 평화롭게 공존하는 것을 지향하는 세계관을 특징으로 합니다. 세상을 다스리는 신성한 영혼인 응엔을 숭배하고 존중함으로써 번영을 얻을 수 있습니다." # 6573767857412441163
