  inkarri_religion_desc: "인카리의 예언을 믿는 자들은 [Concept('the_event_ate','사건')|E] 이전 타완틴수유의 마지막 황제 아타왈파가 죽음 이후 돌아와 지상의 폭군들을 멸하고 우미냐와 단절된 백성들의 연결을 회복하겠다는 맹세를 남겼다고 주장한다. 이 맹세가 결코 이루어지지 않게 하려고 정복자들은 그의 신체를 훼손하여 그가 다스리던 궁전과 도시의 폐허 아래에 묻어버렸다. 그러나 그의 신체 파편들은 각각 마법의 황금으로 변하여 불멸의 존재가 되었으나 서로 떨어지게 되었다. 그 사건 이후, 인카리 신봉자들은 폐허를 뒤지는 것이 일상이 되었다. 그들은 마지막 사파 잉카의 신체를 찾아 다시 조립하면 그가 불멸의 신과 같은 존재로 깨어나 영원히 지상에서 모든 악을 몰아낼 것이라 믿기 때문이다." # 12157070279181390872
