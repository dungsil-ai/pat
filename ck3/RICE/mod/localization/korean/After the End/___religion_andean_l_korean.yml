  manteno_religion_desc: "여신 우미냐는 한때 필멸의 여성이었으나, 살해당하거나 풍요의 신에게 자신을 제물로 바치며 피비린내 나는 죽음을 맞이했습니다. 그러나 그녀의 상처에서는 피가 흐르는 대신 몸에서 나비가 쏟아져 나왔고, 심장이 있어야 할 자리에는 에메랄드가 발견되었습니다. 타조 알만큼이나 큰 이 에메랄드는 엄청난 신성한 힘을 지니고 있으며, 우미냐를 기리기 위해 많은 사원이 세워졌습니다. 태양신께서 이 에메랄드가 사악한 자의 손에 넘어가면 우주가 멸망할 것이라고 예언하셨기에, 그녀의 숭배자들은 이 에메랄드를 열렬히 수호합니다." # 11810289417685848697
