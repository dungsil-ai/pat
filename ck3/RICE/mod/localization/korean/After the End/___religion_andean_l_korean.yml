  embera_religion_desc: "세상은 자이 영혼들로 가득하다. 그들은 형체가 없는 존재가 아니라 물질세계에 깊이 뿌리내리고 있으며, 불과 물, 공기, 대지, 돌, 그리고 식물 속에 거주한다. 자이바나들은 이러한 영혼들과 소통하여 사람들을 치유하고 보호하는 방법을 아는 전문가들이다. 영적으로 특히 중요한 것은 나무인데, 나무는 긴 세월 동안 많은 것을 지켜보았기에 조상들의 지식이 담긴 저장소로 여겨진다. 강 또한 중요한데, 이는 사람들이 죽은 뒤 종종 카누에 실려 매장되기 때문이다." # 14787780101190448615
