  chiminigagua_desc: "보지치 이에, 즉 보지카의 길은 무이스카 인들의 전통 신앙입니다. 무이스카 인들은 치미니가과와 그가 창조한 신들을 숭배하며, 그중에서도 태양의 신 수아와 달의 신 치에 부부가 가장 으뜸입니다. 이 신들과 조상들에 관한 전설은 콜롬비아의 고원 지대에서 번성하고 있습니다." # 11017152568755048819
