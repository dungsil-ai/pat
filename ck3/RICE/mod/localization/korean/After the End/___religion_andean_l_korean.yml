  inca_religion_desc: "홍수 이전 타완틴수유 치하에서 살았던 사람들의 전통 신앙으로, 그들의 세계관과 우주론은 이제 사파 잉카와 인티에게 본질적으로 결속되어 있습니다. 이 종교의 신자들은 안데스의 다른 모든 신념보다 우선하여 그들에게 신앙을 집중하며, 영적인 것과 세속적인 것의 완벽한 결합으로서 사파 잉카가 통치하는 제국을 열망합니다." # 11545277923388686778
