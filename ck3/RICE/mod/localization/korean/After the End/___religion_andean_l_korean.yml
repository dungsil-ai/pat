  andean_religion_desc: "고대 제국 시대부터 이어져 내려온 안데스 민족의 고대 신들과 신앙을 숭배하는 안데스 종교의 추종자들은 자연 세계와 그 요소들이 인간이 건설할 수 있는 그 이상의 신성한 존재임을 받아들입니다. 자연이 주는 모든 것에 충분한 감사를 표하며 종교적 삶과 세속적 삶이 완벽하게 결합할 때만 인류는 평화와 조화를 찾을 수 있습니다. 이 진리를 고수함으로써 인류는 숭고한 신들을 경배하는 동시에 서로 간의 관계를 형성하는 유대를 강화합니다." # 17317562923109317517
  pachamama_religion: "파차마마교" # 1801633150170909963
  pachamama_religion_adherent: "파차마마교도" # 18323497221787477096
  pachamama_religion_adherent_plural: "파차마마교도들" # 8405083049036881452
  pachamama_religion_desc: "안데스 원주민들 사이의 종교적 다양성에도 불구하고, 군사적, 경제적, 문화적 영향력을 통해 널리 퍼진 공통의 신념과 관습이 존재합니다. 여기에는 신성한 산과 호수 유적에 대한 숭배, 지팡이를 든 신과 같은 예술적 모티프, 그리고 대지뿐만 아니라 모든 공간과 시간의 화신인 파차마마를 비롯한 여러 신들의 중요성이 포함됩니다." # 13006707985903422449
