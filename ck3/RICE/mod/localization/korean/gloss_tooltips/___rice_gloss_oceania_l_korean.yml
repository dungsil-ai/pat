l_korean:
  CHELDEBECHEL_GLOSS: "전통적으로 팔라우의 #bold 첼데베첼#!은 미크로네시아 국가인 팔라우에서 중요한 사회적 역할을 수행하던 공식적인 클럽이었습니다. 이들은 연령과 성별에 따라 조직되었으며, 젊은 세대에게 사회적 역할을 교육하고, 공공 사업을 위한 노동력을 징발하며, 법을 집행하고 공동체의 경제적, 군사적 이익을 보호하는 등 다양한 기능을 수행했습니다." # 1230026413827138563
  BITANG_ME_A_BITANG_GLOSS: "“절반과 절반” 또는 “이쪽과 저쪽”을 의미하는 #bold 비탕 메 아 비탕#!의 원칙은 팔라우의 이원론적 개념으로, 모든 존재는 개념적으로 두 개의 반대되지만 상호 보완적이고 연결된 측면 사이에서 균형을 이룬다는 것입니다. 예를 들어, 사람은 선하지도 악하지도 않은 양면적인 존재로 간주됩니다. 더 실질적인 측면에서, 이는 팔라우의 전통 문화에 많은 영향을 미쳤습니다. 씨족 계보는 두 그룹으로 나뉘었고, 마을은 지리적으로 두 부분으로 구분되었으며, 정치적 상호작용 또한 이 원칙에 기반했습니다." # 11385412977521379099
  KWARAAE_WARRIOR_GHOSTS_GLOSS: "솔로몬 제도의 말라이타 섬에서 가장 큰 토착 집단인 크와라아에족은 전통적으로 유령을 크게 숭배했습니다. “유령을 위해 살아가는” 올바른 규칙을 따르는 이들은 유령에게 기도를 올려 도움을 구할 수 있었습니다. 전사들은 자신의 부족이나 씨족 간의 불화와 갈등 속에서 도움을 받기 위해, 한때 유명한 전사였던 전쟁 유령(#italic 아칼로 라모아#!), 즉 전쟁의 유령(#italic 아칼로 니 마에#!)을 소환하기도 했습니다. 이러한 힘을 사용하는 동안에는 힘을 무력화할 수 있는 여성의 존재를 피해야 한다고 믿었습니다." # 12542964683201443591
  SASI_GLOSS: "인도네시아 동부와 파푸아 일부 지역에는 #bold 사시#!라고 알려진 전통적인 자원 보존 관습이 있습니다(다양한 언어로 여러 이름이 있지만, 편의상 말루쿠 제도에서 유래한 사시라는 용어가 자주 사용됩니다). 특정 지역이나 자원 유형을 1년과 같은 일정 기간 동안 “폐쇄”하며, 이 기간 동안 사람들은 금지된 자원을 채취할 수 없습니다. 예를 들어 해안선 일부가 폐쇄되면 낚시가 금지되거나, 특정 식물의 채집이 금지될 수 있습니다. 사시를 어기는 것은 영혼이나 조상을 노하게 한다고 믿었기 때문에 심각한 결과를 초래했습니다. 사시 기간이 지나면 의식을 통해 다시 개방되었습니다." # 15654021781110627472
  MEGAPODE_GLOSS: "#bold 메가포드#!는 서태평양, 오스트레일리아, 뉴기니, 인도네시아 동부, 안다만 및 니코바르 제도에 서식하는 야생 닭과 유사한 여러 종의 새입니다. 이들은 작고 밀집된 둥지 지역에 알을 부화시키는 습성이 있습니다. 이 지역의 여러 토착 집단에게 이 새의 알은 주요 식량원이며, 충성심, 우정, 존경의 표시로 자주 선물되기도 합니다. 전통적으로 이 지역의 의례 관습은 이러한 알의 채취를 제한합니다." # 16100578319823286056
  YAP_STONE_MONEY_GLOSS: "20세기 후반까지도 야프족은 중앙에 구멍이 뚫린 원반 모양의 석회암을 얻기 위해 멀리 팔라우 섬까지 항해했습니다. 몇 인치에서 수 피트에 달할 정도로 크기가 큰 #bold 라이 석재#! 때문에 돌아오는 항해는 위험했으며, 여행 도중 목숨을 잃는 이들도 있었습니다. 이 돌들은 화폐로 사용되었으며, 그 가치는 크기나 모양뿐만 아니라 과거에 누가 소유했는지, 야프로 운반하는 과정에서 몇 명이 사망했는지와 같은 돌에 얽힌 구전 역사에서 비롯되었습니다. 이러한 이야기는 세대를 거쳐 전해지며 돌의 가치를 확증했고, 모든 사람이 각 돌의 주인을 알고 있었기 때문에 돌을 훔치는 것은 매우 어려웠습니다." # 17327096898002450818
