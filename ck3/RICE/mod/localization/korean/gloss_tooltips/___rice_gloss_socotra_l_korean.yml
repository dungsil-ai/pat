l_korean:
  SEVEN_SEAS_GLOSS: "비록 해적의 황금시대의 전형적인 해적과 연관되는 경향이 있지만, 전 세계 바다 전체를 비유하는 표현으로서의 #Bold 일곱 바다#!는 고대로 거슬러 올라갑니다. 고대 및 중세 시대에 “일곱 바다”의 목록은 누구에게 묻느냐에 따라 달랐습니다. 예를 들어, 중세 아랍 문학에서는 일곱 바다를 페르시아만, 아라비아해, 벵골만, 말라카 해협, 싱가포르 해협, 태국만, 남중국해로 정의했습니다." # 7126948937658819934
  ERYTHRAEAN_SEA_GLOSS: "고대 그리스인들은 아덴만(예멘과 아프리카의 뿔 사이)의 바다를 묘사하기 위해 #Bold 에리트레아 해#!라는 용어를 사용했으며, 때로는 홍해, 페르시아만, 아라비아해, 인도양의 일부를 포함하여 그 너머까지 지칭하기도 했습니다." # 3613699128269672990
