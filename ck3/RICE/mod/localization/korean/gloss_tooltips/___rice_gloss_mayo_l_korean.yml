l_korean:
  SCOTTI_GLOSS: "현대 아일랜드인의 조상을 포함하여 게일어를 사용하는 민족들은 고대 후기와 중세 초기에는 #bold 스코티#!라고 불렸습니다. 이 시기 아일랜드는 #italic 스코티아 마이오르#!로 알려졌으며, 스코틀랜드는 #italic 스코티아 미노르#!라고 불렸습니다. 스코트라는 단어가 게일인 전체나 아일랜드인이 아닌 스코틀랜드와 연관된 것은 중세 후기의 발전 과정이었습니다." # 18043252631962122944
  PERIPHYSEON_GLOSS: "'고대 철학의 최종적 성취'라 불리는 #bold 페리피세온#!은 9세기의 가장 뛰어난 기독교 지식인 중 한 명인 요하네스 스코투스 에리우게나의 역작으로 간주됩니다. 이 책은 기독교적 맥락에서 고대의 여러 다양한 사상들을 통합하고 발전시켰으며, 에리우게나 스스로는 자신을 이단에 대항하는 정통주의자로 여겼음에도 불구하고, 지나치게 범신론적이고 신플라톤주의적인 이상을 조장한다는 이유로 후대의 일부 기독교 신학 당국으로부터 비난을 받기도 했습니다. 이 책은 또한 #italic 자연의 분할에 관하여#!라는 제목으로도 알려져 있는데, 이는 17세기 잉글랜드의 고고학자 토머스 게일이 최초의 인쇄본을 출간하며 붙인 라틴어 이름입니다." # 16690466972582338326
  PANTHEISM_GLOSS: "#bold 범신론#!은 신이 우주와 동일하다는 종교적 또는 철학적 사상으로, 일반적으로 신을 인격적인 존재나 별개의 실체로 보지 않습니다." # 10417415173641182183
  LORDS_OF_THE_WOOD_GLOSS: "중세 초기 아일랜드에서는 섬에서 발견되는 28종의 나무를 경제적, 문화적 중요성에 따라 법적으로 7개씩 4개 그룹으로 나누었습니다. #bold 숲의 군주들#!은 이 네 그룹 중 가장 중요한 7종으로 간주되었으며, 참나무, 개암나무, 호랑가시나무, 주목, 물푸레나무, 스코틀랜드 소나무, 야생 사과나무로 구성되었습니다." # 16922056480103555601
  NISI_FORTE_GLOSS: "#bold 니시 포르테#!는 '혹시 ~가 아니라면'을 뜻하는 라틴어 구절입니다. 이 구절의 유명한 용례는 로마의 정치가이자 법률가인 키케로에게서 유래했습니다. 선거 뇌물 수수 혐의로 재판을 받게 된 집정관 루키우스 리키니우스 무레나를 변호하던 중, 키케로는 연설에서 “Nemo enim fere saltat sobrius, #italic nisi forte#! insanit.” (“제정신인 사람은 술에 취하지 않고서는 춤을 추지 않는다, #italic 혹시 그가#! 미치지 않았다면 말이다.”)라고 말했습니다." # 17085562108804189423
  SAINT_PATRICKS_CHAIR_GLOSS: "보헤 스톤이라고도 불리는 #bold 성 패트릭의 의자#!는 아일랜드의 오래된 산이자 성지인 크로 패트릭 근처에 위치한 거대한 바위로, 다양한 암각화와 인공적인 상징들이 새겨져 있습니다. 이는 신석기 시대에 조각되었을 가능성이 있으며, 산 주변 경관에 흩어져 있는 선사 시대 또는 고대 유적 중에서도 특히 주목할 만한 사례 중 하나로, 아일랜드가 기독교화되기 훨씬 전부터 이 지역이 영적으로 중요했음을 증명합니다. 일 년에 두 번, 성 패트릭의 의자 옆에 서면 해가 질 때 산등성이를 따라 굴러 내려가는 것처럼 보이는데, 이것이 바위가 원래 조각되었거나 현재 위치에 놓인 이유를 설명해 줄 수도 있습니다." # 8255373958090818226
  SAINT_PATRICKS_BREASTPLATE_GLOSS: "#bold 성 패트릭의 흉갑#!은 전통적으로 성 패트릭의 것으로 여겨지는 아일랜드의 기도문이지만, 실제 기록은 그가 죽은 지 수 세기 후에 처음 나타납니다. 이 기도문의 유명한 대목은 예수 그리스도를 반복해서 부르는 부분입니다:#italic \n\n내 곁의 그리스도, 내 앞의 그리스도,\n내 뒤의 그리스도, 내 안의 그리스도,\n내 아래의 그리스도, 내 위의 그리스도,\n내 오른편의 그리스도, 내 왼편의 그리스도.#!" # 4912341490889470997
