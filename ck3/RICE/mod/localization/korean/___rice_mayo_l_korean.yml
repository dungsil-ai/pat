  nick_RICE_scottus: "스코투스" # 6387783942928263776
  nick_RICE_scottus_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat]는 본래 라틴어로 [Glossary( 'Scotti', 'SCOTTI_GLOSS' )]라 불리는 민족이 거주하는 아일랜드섬 출신입니다. 그리하여 그[CHARACTER.GetSheHe]는 라틴어로 아일랜드인을 뜻하는 #italic Scottus#!라 알려져 있습니다." # 296026369222845923
  Wulfad: "울파드" # 15083744659238246702
  Winibert: "위니베르트" # 12629037775302956326
  RICE_nick_butterlord: "버터 군주" # 7053556120426120132
  RICE_nick_butterlord_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharHaveHas(CHARACTER)]께서는 갓 만든 신선한 버터부터 독특한 풍미의 늪지 버터에 이르기까지, 최고급의 가장 맛있는 버터들을 내놓는 호화로운 연회를 베풀며 버터를 진심으로 좋아한다는 평판을 얻었습니다." # 12537251563037222168
  RICE_anglo_norman_mercenaries_event_troops: "앵글로노르만 모험가들" # 15713907434732981395
  RICE_irish_event_troops: "아일랜드 군대" # 16643179737642137900
  RICE_irish_high_king_message_tooltip: "[GetGeographicalRegion('custom_ireland').GetName] 내의 [independent|E] [dukes|E]와 [counts|E]들은 당신의 [vassal|E] 혹은 [tributary|E]이 되는 것 중 하나를 선택할 것입니다." # 11011613754081304111
  Bega: "베가" # 11864014380290442897
  game_concept_bog_butter_bog: "습지" # 14060218799529751213
  game_concept_bog_butter_short: "버터" # 11522961092526878050
  game_concept_bog_butter: "보그 버터" # 18372596822692348552
  game_concept_bog_butter_desc: "$game_concept_bog_butter$은 고대와 중세 시대 브리튼 제도의 일부 지역에서 버터를 보존하던 전통적인 방식입니다. 이는 #bold $RICE_mayo_bury_bog_butter$#!와 #bold $RICE_mayo_retrieve_bog_butter$#!라는 두 가지 [decisions|E]을 통해 구현됩니다.\n\n이 두 [decisions|E]은 #V $game_concept_bog_butter$#! [innovation|E]을 보유한 모든 [culture|E]이 사용할 수 있습니다. 첫 번째 [decision|E]을 실행한 후, 두 번째 [decision|E]을 실행하려면 최소 1년을 기다려야 합니다." # 2409945853527325011
  game_concept_gift_of_luxury_butter: "고급 버터 선물" # 12240443616960694480
  game_concept_gift_luxury_butter_gift: "선물" # 2606541427898960113
  game_concept_gift_luxury_butter_short: "버터" # 11522961092526878050
  game_concept_gift_luxury_butter: "고급 버터 선물하기" # 2527254947855768159
  game_concept_gift_luxury_butter_desc: "[cultures|E] with the #bold $tradition_RICE_brehon_law_name$#! [tradition|E]을 보유한 [cultures|E]는 #V $RICE_mayo_butter_interaction$#! [character_interaction|E]을 사용할 수 있습니다. 이는 전근대 아일랜드에서 가축과 버터가 신분과 부의 중요한 상징이었음을 나타냅니다. 버터는 전통적으로 환대의 표시로서 손님에게 제공되었으며, 사회적 계급에 따라 받아야 할 버터의 양이 정해져 있었습니다.\n\n이 [interaction|E]은 상대방의 당신에 대한 [opinion_i|E] [opinion|E]을 높이고 긍정적인 [modifier|E]를 부여합니다. 양측의 [rank|E]가 높을수록(본인, [close_family|E], 혹은 [spouse|E]가 [title|E]를 보유하고 있는지와 그 [title_tier|E]에 따라 결정됨), 양측이 돌려받는 [prestige_i|E] [prestige|E]가 많아집니다. 받는 사람이 [duchy|E] [title_tier|E] 이상일 경우, 주는 사람 또한 받는 사람의 [title_tier|E]에 따라 약간의 [legitimacy_i|E] [legitimacy|E]를 얻습니다." # 8951467536526190161
  RICE_mayo_butter_interaction: "고급 버터 선물하기" # 2527254947855768159
  RICE_mayo_butter_interaction_desc: "\"[recipient.GetShortUINamePossessiveNoTooltip]에게 질 좋은 [gift_luxury_butter_short|E]를 선물합니\"" # 14011800011850718115
  RICE_mayo_butter_interaction_notification: "\"부디 경의의 표시로, 저희 가문에서 보낸 진하고 고소한 [gift_luxury_butter_short|E] 선물을 받아주십시오. 속담에도 있듯이, 버터로 고칠 수 없는 것에는 약도 없는 법입니다\"" # 4487930071823854594
  RICE_mayo_periphyseon_name: "페리피세온" # 15675987470687695461
  RICE_mayo_periphyseon_desc: "\"이 문헌, [Glossary( '페리피세온', 'PERIPHYSEON_GLOSS' )]은 [ROOT.Char.GetFirstName](이)가 익명의 [ROOT.Char.GetCulture.GetName] 필사생의 도움을 받아 수년에 걸쳐 집필한 것입니다. [ROOT.Char.GetFirstNamePossessiveNoTooltip] 친구인 [wulfad.GetTitledFirstName]에게 헌정된 이 저작은 신학과 철학에 관한 스승과 제자 사이의 길고 깊은 대화로 구성되어 있으며, 특히 [ROOT.Char.GetFirstNameNoTooltip](이)가 생각하는 실재의 네 가지 '종'에 대해 다루고 있습니다:\n\n$BULLET_WITH_TAB$창조하되 창조되지 않는 것\n$BULLET_WITH_TAB$창조되기도 하고 창조하기도 하는 것\n$BULLET_WITH_TAB$창조되되 창조하지 않는 것\n$BULLET_WITH_TAB$창조되지도 않고 창조하지도 않는 것\n\n이 책의 논거는 일부 [GetReligionByKey('christianity_religion').GetAdjective] 사상가들로부터 [Glossary( '범신론', 'PANTHEISM_GLOSS' )] 및 신플라톤주의 이교 신앙에 너무 가깝다는 비판을 받기도 했으나, 다른 이들은 이 책의 지적 엄밀함과 대담한 관점, 그리고 고대 철학을 [GetReligionByKey('christianity_religion').GetAdjectiveNoTooltip] 세계관에 통합시킨 능력을 높이 평가합니다\"" # 4180345709465480818
  building_type_RICE_mayo_mayo_of_the_saxons_01: "\"작센의 마\"" # 13981641814830717018
  building_type_RICE_mayo_mayo_of_the_saxons_01_desc: "[\n \"린디스판의 성 콜만이 설립한 이래로 수 세대 동안, 마요 수도원은 브리튼 제도에서 학문과 예배의 중요한 중심지 역할을 해왔습니다. 이 기관은 아일랜드와 잉글랜드의 성직자 및 지식인들 사이의 유대를 독려하는 역할을 수행합니다\"\n]" # 14589824710083609201
  building_RICE_mayo_mayo_of_the_saxons_01: "$building_type_RICE_mayo_mayo_of_the_saxons_01$" # 2139556008433387215
  building_RICE_mayo_mayo_of_the_saxons_01_desc: "$building_type_RICE_mayo_mayo_of_the_saxons_01_desc$" # 2793035788849104612
  building_type_RICE_mayo_croagh_patrick: "\"크로 패트\"" # 17479531779650956256
  building_type_RICE_mayo_croagh_patrick_desc: "\"성 패트릭은 시나이산의 모세처럼 대서양이 내려다보이는 이 산의 정상에서 40일 동안 금식하며 지냈다고 전해집니다. 그 후로 아일랜드 전역의 기독교인들은 성 패트릭의 발자취를 되짚어보기 위해 이 신성한 산으로 순례를 떠났습니다. 산 주변에는 수많은 제단과 고대 암각화, 그리고 거대한 의례적 경관을 형성하는 여러 유적들이 자리하고 있습니다\"" # 1460450947154834396
  building_RICE_mayo_croagh_patrick: "$building_type_RICE_mayo_croagh_patrick$" # 491991552862384691
  building_RICE_mayo_croagh_patrick_desc: "$building_type_RICE_mayo_croagh_patrick_desc$" # 7260155742677287026
  building_type_RICE_mayo_giants_causeway: "\"자이언츠 코즈웨\"" # 7321222096429345241
  building_type_RICE_mayo_giants_causeway_desc: "{\n \"translatio\":\"수천 개의 서로 맞물린 주상절리 기둥이 이곳 해안의 일부를 따라 모여 있습니다. 현지 민담에 따르면, 이 장엄한 천연 구조물은 전설적인 피온 맥 쿨이 건설한 둑길의 잔해라고 전해집니다\"\n}" # 12858240586512796336
  building_RICE_mayo_giants_causeway: "$building_type_RICE_mayo_giants_causeway$" # 17859687336046596034
  building_RICE_mayo_giants_causeway_desc: "$building_type_RICE_mayo_giants_causeway_desc$" # 16125813740577946437
  building_type_RICE_mayo_abbey_of_kells: "\"켈스 수도\"" # 1909806302139783436
  building_type_RICE_mayo_abbey_of_kells_desc: "\"이오나 수도원 출신의 성 콜룸바가 설립한 이 수도원은 아일랜드 학문의 중심지입니다. 이곳은 특히 수 세기 동안 경건한 기독교인들을 매료시키고 영감을 준, 비할 데 없는 예술적 아름다움을 간직한 복음서인 켈스의 서를 보관하고 있는 것으로 유명합니다\"" # 15822969890647641893
  building_RICE_mayo_abbey_of_kells: "$building_type_RICE_mayo_abbey_of_kells$" # 13750852247911758002
  building_RICE_mayo_abbey_of_kells_desc: "$building_type_RICE_mayo_abbey_of_kells_desc$" # 8353185683805979703
  building_type_RICE_mayo_rock_of_cashel_01: "\"카셸의 바\"" # 3906320027566694615
  building_type_RICE_mayo_rock_of_cashel_01_desc: "\"넓은 평원이 내려다보이는 카셸의 거대한 요새는 성 패트릭이 먼스터의 왕을 기독교로 개종시킨 장소라고 전해집니다. 이곳은 수 세기 동안 먼스터 왕들의 거처였습니다\"" # 15779623335146533486
  building_RICE_mayo_rock_of_cashel_01: "\"카셸의 바\"" # 3906320027566694615
  building_RICE_mayo_rock_of_cashel_01_desc: "$building_type_RICE_mayo_rock_of_cashel_01_desc$" # 431337429287438726
  building_RICE_mayo_rock_of_cashel_02: "\"신성화된 카셸의 바\"" # 9078621866347935475
  building_RICE_mayo_rock_of_cashel_02_desc: "[\n \"$building_type_RICE_mayo_rock_of_cashel_01_desc$ 최근의 통치자들은 이 건물 복합단지의 상당 부분을 지역 종교 기관에 기부했습니다. 종교 기관들은 이곳에 대단히 장엄하고 신성한 건축물들을 추가로 건설했으며, 값을 매길 수 없는 방대한 예술품들을 수집해 왔습니다\"\n]" # 13667851353361257804
  building_type_RICE_mayo_hill_of_tara: "타라의 언덕" # 6026372457862560458
  building_type_RICE_mayo_hill_of_tara_desc: "옛 시절, 타라는 아일랜드에서 가장 중요한 의례 및 매장지였으며, 이곳의 운명의 돌인 #italic 리아 팔#!에서 아일랜드의 고왕들이 신성한 의식을 통해 즉위하곤 했습니다." # 9167230861763016028
  building_RICE_mayo_hill_of_tara: "$building_type_RICE_mayo_hill_of_tara$" # 5134632932118422425
  building_RICE_mayo_hill_of_tara_desc: "$building_type_RICE_mayo_hill_of_tara_desc$" # 14663254609463231589
  RICE_mayo_aspiration_ruaidri_o_connor_desc: "\n\n#bold [historical_aspiration_main_objectives|E]#! (@warning_icon! [historical_aspiration_routes|E]는 상호 배타적입니다)\n#bold #italic #N 잉글랜드 봉신 [historical_aspiration_route|E]#!#!#!\n$EFFECT_LIST_BULLET$ [GetTitleByKey('k_england').GetNameNoTier]의 [vassal|E] 또는 [tributary|E]가 되십시오\n$EFFECT_LIST_BULLET$ [completely_control|E], 직간접적으로 [vassals|E]를 통해, [GetGeographicalRegion('custom_ireland').GetName] 내 최소 #V 6#! 개의 [counties|E]를 소유하십시오\n$EFFECT_LIST_BULLET$ [prestige_level|E]가 [GetModifier( 'prestige_level_3' ).GetNameWithTooltip|L] 이상이어야 합니다\n#bold #italic #P 독립 통치자 [historical_aspiration_route|E]#!#!#!\n$EFFECT_LIST_BULLET$ [independent|E], 비 [tributary|E] 상태의 $heritage_goidelic_name$ [ruler|E]로 남으십시오\n$EFFECT_LIST_BULLET$ [completely_control|E], 직간접적으로 [vassals|E]를 통해, [GetGeographicalRegion('custom_ireland').GetName] 내 최소 #V 9#! 개의 [counties|E]를 소유하십시오\n$EFFECT_LIST_BULLET$ [GetGeographicalRegion('custom_ireland').GetName] 내 [counties|E] 중 $heritage_goidelic_name$ [culture|E]가 아닌 [rulers|E]가 직접 소유한 곳은 최대 #V 2#! 개여야 합니다\n$EFFECT_LIST_BULLET$ [prestige_level|E]가 [GetModifier( 'prestige_level_3' ).GetNameWithTooltip|L] 이상이어야 합니다\n\n#bold 보상#!\n$EFFECT_LIST_BULLET$명성 @prestige_icon! #V [EmptyScope.ScriptValue('RICE_aspiration_medium_resource_bonus')]#! [prestige|E] 획득\n#italic #bold #N 잉글랜드 봉신 [historical_aspiration_route|E]#!#!#!\n$EFFECT_LIST_BULLET$재물 @gold_icon! #V [EmptyScope.ScriptValue('RICE_aspiration_medium_resource_bonus')]#! [gold|E] 획득\n$EFFECT_LIST_BULLET$잉글랜드 [special_troops|E] #V 1000#!개, [men_at_arms|E] 포함 수령\n$EFFECT_LIST_BULLET$귀하의 [culture|E]와 노르만 및 잉글랜드 [cultures|E] 간의 [cultural_acceptance|E] 증가\n#italic #bold #P 독립 통치자 [historical_aspiration_route|E]#!#!#!\n$EFFECT_LIST_BULLET$가문 명성 @dynasty_prestige_icon! #V [EmptyScope.ScriptValue('RICE_aspiration_large_resource_bonus')]#! [dynasty_prestige|E] 획득\n$EFFECT_LIST_BULLET$아일랜드 [special_troops|E] #V 2000#!개, [men_at_arms|E] 포함 수령\n$EFFECT_LIST_BULLET$아직 없다면 [GetTitleByKey('k_ireland').GetNameNoTier] 획득\n$EFFECT_LIST_BULLET$$RICE_irish_high_king_message_tooltip$\n\n#bold [historical_aspiration_bonus_objectives|E]#! (두 [historical_aspiration_routes|E] 모두에 적용 가능)\n$EFFECT_LIST_BULLET$ [piety_level|E]가 [GetModifier( 'piety_level_3' ).GetNameWithTooltip|L] 이상이어야 합니다 (보상: [diplomacy_lifestyle|E] [perk|E] 획득)\n$EFFECT_LIST_BULLET$ [GetActivityType( 'activity_RICE_mayo_croagh_patrick_pilgrimage' ).GetName] [activity|E]를 최소 한 번 수행하십시오 (보상: 신앙심 @piety_icon! #V [EmptyScope.ScriptValue('RICE_aspiration_medium_resource_bonus')]#! [piety|E] 획득)" # 555759754330437734
  RICE_mayo_historical_aspiration_action_ruaidri_o_connor: "#italic 나는 수십 년 동안 아일랜드의 고왕으로서 나의 권위를 주장하기 위해 노력해왔다. 거만한 경쟁 아일랜드 통치자들, 교활한 친척들, 그리고 의도가 의심스러운 새로 온 앵글로-노르만 모험가들을 상대로 말이다. 나는 이제 늙어가고 있으며, 성 패트릭의 전설적인 섬에 대한 통제력을 어느 정도 되찾기를 희망한다.#!$RICE_mayo_aspiration_ruaidri_o_connor_desc$" # 15189859633963436541
  RICE_mayo_historical_aspiration_modifier_desc_ruaidri_o_connor: "[GetModifier('RICE_mayo_aspiration_maintain_authority_in_ireland').GetNameWithTooltip]" # 16262052046527987026
  RICE_mayo_aspiration_maintain_authority_in_ireland: "[RICE_aspiration|E]: 아일랜드 내 권위 유지" # 3236514506166508969
  RICE_mayo_aspiration_maintain_authority_in_ireland_desc: "#italic 루아드리 우아 콘초바르(Ruaidrí Ua Conchobair)는 수십 년 동안 아일랜드의 고왕으로서 자신의 권위를 주장하기 위해 노력해왔다. 거만한 경쟁 아일랜드 통치자들, 교활한 친척들, 그리고 의도가 의심스러운 새로 온 앵글로-노르만 모험가들을 상대로 말이다. 그는 이제 늙어가고 있으며, 성 패트릭의 전설적인 섬에 대한 통제력을 어느 정도 되찾기를 희망한다.#!$RICE_mayo_aspiration_ruaidri_o_connor_desc$\n\n" # 16266014069983062837
  activity_RICE_mayo_croagh_patrick_pilgrimage_host_an_a: "$host_activity_a$" # 13713790857143020716
  activity_RICE_mayo_croagh_patrick_pilgrimage: "크로아흐 파트리크 성지 순례" # 8375507955542513023
  activity_RICE_mayo_croagh_patrick_pilgrimage_desc: "크로아흐 파트리크 산은 아일랜드의 수호성인인 성 패트릭과 연관되어 있어 아일랜드에서 가장 인기 있는 성지 순례지 중 하나입니다." # 15181441315509524855
  RICE_mayo_croagh_patrick_pilgrimage_context_tooltip: "#emphasis 역사적 배경:#! 크로아흐 파트리크는 신석기 시대부터 신성한 장소로 여겨졌을 가능성이 높습니다. 기독교화된 이후에는 아일랜드의 유명한 성 패트릭과 강하게 연관되었는데, 그는 시나이 산에서 모세처럼 정상에서 40일 동안 금식했다고 전해집니다. 오늘날에도 매년 많은 순례자들이 이곳을 찾아, 특히 '성지 일요일(Reek Sunday)'에 산을 오르려고 합니다." # 14541169104615346046
