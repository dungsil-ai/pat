  mayo.0040.t: "버터를 묻다" # 8330718582111849950
  mayo.0040.desc: "나는 내 하인들에게 내 거처 근처의 늪지에 상당한 양의 [bog_butter_short|E]를 보관하도록 명령했다.\n\n시간이 지나면 이 버터는 잘 보존될 뿐만 아니라, 독특한 맛을 지닌 맛있는 무언가로 변모할 것이다." # 14784005996534842718
  mayo.0040.a: "기다릴 수가 없군!" # 12382765414218653345
  mayo.0041.t: "버터 수거하기" # 7519664244621079475
  mayo.0041.desc: "얼마 전, 나는 하인들에게 근처 늪지 중 한 곳에 [bog_butter_short|E]를 묻으라고 명령했다. 충분한 시간이 지났으니, 이 늪지 버터는 잘 숙성되었을 것이다.\n\n그래서 나는 하인들에게 우리가 묻어둔 버터를 가져오라고 명령한다. 이제 연회에서든 나 개인적인 소비를 위해서든 즐길 때이다." # 3007172780657962541
  mayo.0041.a: "음... 늪지 버터!" # 4143618900269762066
  mayo.0042.t: "버터의 군주" # 17678986603386541983
  mayo.0042.desc: "나의 [bog_butter_short|E]에 대한 사랑은 이 땅 전체에 잘 알려져 있다. 이 때문에 몇몇 사람들이 나를 그 결과 #V '$RICE_nick_butterlord|U$'#라고 부르기 시작한 것 같다.\n\n그 별명이 가장 듣기 좋은 것은 아니지만, 그것이 모욕을 주려는 의도는 아니며, 내가 수년간 버터를 얼마나 많이 사용하고 소비했는지에 대한 익살스러운 증명에 가깝다." # 1238519754574379352
  mayo.0042.a: "재미있는 별명이군. 마음에 들어!" # 11738682307195571312
  mayo.0042.b: "쳇! 전혀 나에게 어울리지 않아!" # 3988326108350613142
  mayo.0042.b.tooltip: "이 [nickname|E]를 받을 기회는 이후로는 없을 것이다." # 11234521952333061427
  mayo.0043.t: "버터 선물" # 9169691401070034129
  mayo.0043.desc: "[bog_butter_short|E]는 [actor.GetCulture.GetCollectiveNoun] 사이에서 높이 평가받는데, 그럴 만한 이유가 있다. 가축은 헤아릴 수 없을 정도로 귀중하며, 버터와 같은 그들이 제공하는 산물 역시 그만큼 귀중하다.\n\n나는 [recipient.GetTitledFirstName]에게 선의와 우정의 표시로 [recipient.GetHerHis]의 사회적 지위에 걸맞은 적절한 양의 버터를 선물했다." # 12288207198827927242
  mayo.0043.a: "버터가 맛있고 즐겁기를 바라오!" # 9811464910944459655
  mayo.0044.t: "$mayo.0043.t$" # 7461438948770806365
  mayo.0044.desc: "[bog_butter_short|E]는 [recipient.GetCulture.GetCollectiveNoun] 사이에서 높이 평가받고 있으며, 그럴 만도 합니다. 소는 헤아릴 수 없이 귀중하며, 버터와 같은 그 산물들 역시 마찬가지로 귀하기 때문입니다.\n\n[actor.GetTitledFirstName]께서 저의 사회적 지위에 걸맞은 적절한 양의 버터를 선물로 주셨는데, 이는 호의와 우정의 표시입니다." # 12121281879399374541
  mayo.0044.a: "맛있고 매우 고마운 선물이로군!" # 17321954526450540581
