  activity_RICE_visit_holy_well_desc: "근처에 현지인들 사이에서 숭배의 장소로 인기 있는 성스러운 샘이 있습니다. 그곳에서 [GetPlayer.GetFaith.PantheonTerm]께 기도하고 헌금을 드릴 수 있습니다." # 9922647038454835562
