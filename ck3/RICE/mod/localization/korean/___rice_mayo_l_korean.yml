  mayo.0020.t: "성스러운 샘을 축성하며" # 9180516932562439453
  mayo.0020.desc: "기억이 닿는 한, 신성한 샘과 성수는 [ROOT.Char.GetCulture.GetName] 사람들의 설화와 일상생활에서 중요한 역할을 해왔습니다.\n\n저의 지휘 아래, [ROOT.Char.GetFaith.GetAdjective] [ROOT.Char.Custom('DefaultPriestTitlePlural')]들이 [county.GetNameNoTier]에서 지역적으로 숭배받는 성스러운 샘을 발견했는데, 이 샘은 숭배와 기도의 장소로서 더 많은 인정을 받을 자격이 있습니다. 우리가 이 성스러운 샘을 축성하기 위한 여러 의식을 거행한 후, 그곳의 영적 및 치유적 특성에 대한 소문이 지역에 빠르게 퍼지고 있습니다.\n\n이 성스러운 샘이 앞으로 수년간 지역 [ROOT.Char.GetFaith.GetAdjective] 종교 활동의 중요한 초점이 될 것이라는 점에는 의심의 여지가 없습니다." # 1128643386841831578
  mayo.0020.a: "기쁜 소식이군!" # 2285397353523959189
  mayo.0020.tooltip: "$RICE_consecrate_holy_well_effect_tooltip_3$" # 6667963458681588657
  mayo.0021.t: "성스러운 샘 방문" # 16134636294484092417
  mayo.0021.desc: "기억이 닿는 한, 신성한 샘과 성수는 [ROOT.Char.GetCulture.GetName] 사람들의 설화와 일상생활에서 중요한 역할을 해왔습니다. 많은 사람이 종교적인 이유로 땅에 흩어져 있는 이 샘이나 작은 물웅덩이를 찾습니다. 저도 마찬가지로, 저는 [county.GetNameNoTier]에 있는 지역적으로 명성이 높은 성스러운 샘을 방문하기로 결정했습니다.\n\n현장에 도착하니, 비록 규모는 작지만 고요하고 겸허해지는 기분이 듭니다. 저는 오랫동안 느끼지 못했던 영적, 육체적 평화를 느낍니다. 저는 [ROOT.Char.GetFaith.PantheonTerm]께 [ROOT.Char.GetFaith.GetAdjective] 방식으로 기도하고 떠나기 전에 헌금을 남깁니다." # 3121193954454149928
  mayo.0021.a: "전반적으로 훌륭한 경험이었다." # 9587808954024855152
  mayo.0021.toast: "성스러운 샘의 물이 당신에게 축복을 내리기를" # 9916947762810761958
  mayo.0022.t: "성스러운 샘" # 8021000777811039461
  mayo.0022.desc: "[ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName]의 성스러운 샘들은 최근 그 영적인 힘으로 명성을 얻었습니다. 저조차도, [ROOT.Char.GetTitleAsNameNoTooltip]인 저조차도 그 힘의 혜택을 받을 수 있습니다. 다른 많은 이들처럼, 저도 [ROOT.Char.GetFaith.PantheonTerm]께 축복을 구하기 위해 그곳으로 순례할 것입니다." # 18247011210615826164
  mayo.0022.a: "자, 이제 성스러운 샘으로!" # 740397689180217655
  mayo.0023.t: "한때 [old_culture.GetNameNoTooltip]이었으나, 이제 [gaelic_culture.GetNameNoTooltip]" # 5477376666015427743
  mayo.0023.desc: "우리는 오랫동안 [gaelic_culture.GetCollectiveNoun]들 사이에서 살아왔으며, 시간이 흐르면서 그들의 음식이나 옷과 같은 피상적인 모습뿐만 아니라 그들의 언어와 사고방식까지 받아들였습니다. 심지어 동족인 [old_culture.GetCollectiveNoun]들 중 다수는 [gaelic_culture.GetNameNoTooltip] 씨족과 혼인 관계를 맺기도 했습니다.\n\n심지어 [gaelic_culture.GetCollectiveNounNoTooltip]들조차도 가끔 내가 [gaelic_culture.GetCollectiveNounNoTooltip]들보다 더 [gaelic_culture.GetNameNoTooltip]다워졌다고 말하곤 합니다! 이는 내가 이 땅과 그 백성들을 혈육처럼 여기게 되었기에 자랑스럽게 생각하는 칭찬입니다." # 11966111963335370830
  mayo.0023.a: "나는 영원히 [gaelic_culture.GetNameNoTooltip]이다!" # 16697333333658793860
