  mayo.0010.desc: "[norman.GetCollectiveNoun]이 용병과 모험가로서 우리 섬에 처음 왔을 때, 나는 [GetTitleByKey('k_ireland').GetNameNoTier]의 고왕으로서 권위를 가져야 할 정치적 다툼에 그들이 개입했소. 섬의 [irish.GetName] 통치자들은 수년 동안 너무나도 무질서해져서 내 뜻에 굽히기를 거부했지.\n\n[henry_ii.GetTitledFirstName]는 교회의 지지를 받아 이 [norman.GetCollectiveNounNoTooltip]들에게 제재를 가하는 것이 옳다고 여겼지만, 우리는 몇 년 전 윈저 조약을 통해 합의에 이르렀소. 그것은 내가 매년 [henry_ii.GetHerHim]에게 공물을 바치는 조건으로 섬을 내 영향권과 [henry_ii.GetFirstNamePossessiveNoTooltip]의 영역으로 나누는 용인할 만한 타협이었으며, 고왕으로서의 권위를 재확인하기 위한 보잘것없는 희생이었지.\n\n그러나 [henry_ii.GetFirstNamePossessiveNoTooltip]의 부하들은 기만적임이 드러났소. 그들은 끊임없이 내 영향권으로 침범하며 조약을 깨고 있소. 나는 이 [norman.GetCollectiveNounNoTooltip]들을 거의 믿지 않소... 하지만 아직 또 다른 합의에 도달할 수 있다고 생각하는 이들도 있소." # 892754460338294510
  mayo.0010.a: "나는 고왕의 자리를 지키기 위해 너무나 오랫동안 고군분투했소…." # 16096305422794636056
  mayo.0010.info: "#emphasis 역사적 배경:#! 아일랜드의 마지막으로 널리 인정받은 고왕은 루아이드리 우아 콘초바일(Ruaidrí Ua Conchobair, 영어식으로 로리 오코너Rory O'Connor)이었습니다. 루아이드리는 고왕으로서의 권위를 주장하기 위해 평생을 보냈지만 결과는 엇갈렸습니다. 상황을 더욱 복잡하게 만든 것은 지역 아일랜드 분쟁에 앵글로노르만 용병들이 개입한 것이었고, 이는 잉글랜드의 헨리 2세 왕이 승인한 이들 앵글로노르만족의 침공으로 걷잡을 수 없이 번졌습니다. 루아이드리와 헨리는 1175년에 윈저 조약에 서명했고, 이 조약으로 헨리와 루아이드리는 아일랜드 내의 영향권을 나누었으며, 루아이드리는 헨리에게 충성을 맹세했습니다. 하지만 이 합의는 각 왕의 노르만 및 아일랜드 봉신들이 조약을 무시하고 서로 공개적으로 전쟁을 벌이면서 빠르게 무너졌습니다. 1198년 루아이드리가 사망한 후, 그 칭호를 주장하는 몇몇 인물들(14세기에는 더 유명한 로버트 브루스의 동생인 에드워드 브루스 포함)이 있었지만, 그 누구도 광범위한 지지를 얻지 못했습니다." # 9651500108344103924
  mayo.0011.t: "xxxxx" # 1951045980481827005
  mayo.0011.desc: "xxxxx" # 1951045980481827005
  mayo.0011.a: "xxxxx" # 1951045980481827005
  mayo.0012.t: "자연에 대하여" # 9323754980140272046
  mayo.0012.desc: "수년간의 노력 끝에, 나는 나의 소중한 친구이자 동료 학자인 [wulfad.GetTitledFirstName]에게 헌정하는 [Glossary( 'Periphyseon', 'PERIPHYSEON_GLOSS' )]를 마침내 완성했소. 이것은 우주의 본질에 대한 철학과 [ROOT.Char.GetFaith.HighGodName]과 창조 간의 관계를 탐구하는 내 평생의 역작이오.\n\n나는 나를 [GetGeographicalRegion('custom_ireland').GetName] 출신의 교양 없는 속물이라고 비난하는 지적인 경쟁자들이 이 저작을 이단이라고 외치며, 내 주장이 [Glossary( 'pantheism', 'PANTHEISM_GLOSS' )]에 너무 가깝다고 주장할 것이라 확신하오.\n\n하지만 그 경쟁자들조차도 나 같은 '야만인'이 [greek.GetLanguage.GetName]과 신학적 문제에 대해 해박한 지식을 가지고 있으며, [GetGeographicalRegion('world_europe_west_francia').GetName]에서 나의 경력을 도왔던 위대한 [charles.GetTitledFirstName]의 후원을 반복적으로 받았다는 것을 인정하오. 그들은 나의 신학적 입장에 동의하지 않을 수 있지만, 내가 적어도 그들의 지적 동등자라는 사실은 부인할 수 없을 것이오." # 16521251244692075949
  mayo.0012.a: "그리고 이 모든 것을 내가 평신도로서 해냈소!" # 14674140659658060686
  mayo.0012.b: "[GetGeographicalRegion('custom_ireland').GetNameNoTooltip]에서 수도사로 훈련받은 것이 보람이 있었소." # 7171020620010650936
  mayo.0012.info: "#emphasis 역사적 배경:#! 요하네스 스코투스 에리우게나는 9세기 최고의 기독교 사상가 중 한 명으로 여겨지는 아일랜드 신학자로, 카롤루스 대제의 르네상스 시기 궁정 학교의 수장으로도 봉사했습니다. 그는 자신의 역작인 [Glossary( 'Periphyseon', 'PERIPHYSEON_GLOSS' )]의 집필을 866년에 마쳤습니다. 그의 높은 교육 수준(그리스어와 같은 여러 언어 지식 포함)으로 인해 그가 성직자나 수도사였을 가능성이 더 높았지만, 그가 평신도였는지 성직자였는지는 단정하기 어렵습니다. 비록 그가 나중에 알프레드 대왕의 초청으로 잉글랜드로 건너가 제자들에게 스타일러스로 찔려 죽었다는 위작 이야기가 있지만, 그는 말년에 프랑스에 머물렀을 가능성이 더 큽니다." # 15074378013074979849
  mayo.0013.t: "조교" # 9458052525165679421
  mayo.0013.desc: "[Glossary( 'Periphyseon', 'PERIPHYSEON_GLOSS' )]를 집필하는 데 나의 소중한 제자 [nisifortinus.GetFirstName]가 큰 도움을 주었소. 비록 [nisifortinus.GetSheHe]가 나의 가장 신랄한 비판과 공격적인 주장의 일부를 완화해야 했지만 말이오. [nisifortinus.GetSheHe]가 얼마나 자주 [Glossary( 'nisi forte', 'NISI_FORTE_GLOSS' )]를 다시 써넣으며 개입했는지!\n\n그럼에도 불구하고, [nisifortinus.GetFirstNameNoTooltip]가 내 저작을 덜 논란이 되게 하기 위해 필요하다고 믿었던 이러한 개입에도 불구하고, 나는 [nisifortinus.GetHerHis]의 노고에 감사하오. 이제 인생의 여정을 계속하고 다음에 어디로 가서 무엇을 할지 결정하면서, 우리가 이 파트너십을 계속해야 할지 궁금하오." # 12594186681654217342
  mayo.0013.a: "우리의 길은 이제 갈라지지만, 언젠가 다시 만날지도 모르지." # 22001255382274638
  mayo.0013.b: "[ROOT.Char.GetFaith.HighGodName]께서 우리가 한 가지 이유로 함께 일하도록 이끄셨소." # 7349759211660541177
  mayo.0013.info: "#emphasis 역사적 배경:#! 요하네스 스코투스 에리우게나는 그의 역작인 [Glossary( 'Periphyseon', 'PERIPHYSEON_GLOSS' )] 등을 집필하는 데 도움을 준 조교이자 제자가 있었습니다. 그 제자의 이름은 역사 속에서 사라졌지만, 현대 학자들은 그가 말을 완화하고 좀 더 재치 있고 덜 논란이 되도록 만들 때마다 [Glossary( 'nisi forte', 'NISI_FORTE_GLOSS' )]를 썼던 습관 때문에 그에게 #italic 니시포르티누스#!라는 별명을 붙였습니다." # 14399234236769671791
  mayo.0014.t: "$RICE_historical_aspiration_fulfilled_title$" # 6312590152546762382
  mayo.0014.desc: "한때는 지금의 제 위치가 탐탁지 않았을지도 모릅니다. 하지만 $k_england$의 [GetTitleByKey('k_england').GetNameNoTier]에 신하로서 충성을 맹세하는 것이 장점만 있는 것은 아닙니다.\n\n저는 더 이상 명백하게 독립적인 $k_ireland$의 고왕은 아니지만, 이 섬이 서로 사소한 땅 조각과 몇 안 되는 가축을 두고 치열하게 다투던 하찮은 [irish.GetName] 족장들과 왕들의 약탈로 황폐해졌을 때보다 섬에 대한 더 많은 권위를 휘두르고 있습니다.\n\n[norman.GetCollectiveNoun]은 재앙이지만, 저는 그 재앙을 교활하게 이용하여 이 섬에 질서와 번영의 일말을 회복했습니다. 그들과의 관계조차도 꽤나 모호하며, 언젠가 저나 제 후손들이 그들과 다시 싸워야 할 날이 올 수도 있겠지만, 지금으로서는 평화가 있을 것입니다." # 17896763685778962761
  mayo.0014.a: "제 삶이 곧 끝날 것 같습니다…." # 2150317433481490776
  mayo.0015.t: "$RICE_historical_aspiration_fulfilled_title$" # 6312590152546762382
  mayo.0015.desc: "수십 년은 고통과 눈물로 점철되었으며, 나는 [GetTitleByKey('k_ireland').GetNameNoTier]의 #bold 고왕# 자리를 되찾기 위해 고군분투했다. 심지어 배신적인 [norman.GetCollectiveNoun]조차도 지역 [irish.GetName]의 다툼에 개입하려 했으며, 그들은 배신과 무자비함을 통해 영향력을 확산시키려 했다.\n\n하지만 세월이 흘렀고, 우리는 군사적, 외교적 수단을 통해 나를 고왕으로 하는 새로운 [GetTitleByKey('k_ireland').GetNameNoTierNoTooltip]를 세웠다. 분쟁과 무질서의 세월 이후 힘을 재건하고 요새화하는 데는 시간이 걸릴 것이며, 우리는 섬 건너편 이웃들을 항상 경계해야 한다. 그들은 윈저 조약을 파기했을 때 나를 배신했으며, 기회만 된다면 또다시 배신할 것이라 의심치 않는다.\n\n하지만 지금은, 오랫동안 분열되어 있던 통일된 [GetTitleByKey('k_ireland').GetNameNoTierNoTooltip]의 첫 번째 무혈의 #bold 고왕#으로서 잠시나마 쉴 수 있겠구나." # 10905835704314919384
  mayo.0015.a: "$mayo.0014.a$" # 10447615665692955161
  mayo.0016.t: "고왕의 귀환" # 9921594219182606473
  mayo.0016.desc: "비록 [rory_o_connor.GetFirstName] 께서는 수십 년 동안 [GetTitleByKey('k_ireland').GetNameNoTier]의 “#bold 고왕#” 칭호를 주장해 오셨지만, 그저 주장만 했을 뿐 실제로 그분의 권위를 행사하신 것은 최근 들어서야 가능해졌습니다. 기만적인 [norman.GetCollectiveNoun] 족의 수명이 짧았던 침공과, [rory_o_connor.GetFirstNameNoTooltip] 께서 처음에 그들과 맺었던 윈저 조약을 그들이 배신하고 파기한 사건이 진정한 고왕이 되기 위한 [rory_o_connor.GetHerHis] 여정의 촉매제가 된 듯합니다.\n\n[rory_o_connor.GetFirstNameNoTooltip] 께서는 이제 [GetTitleByKey('k_ireland').GetNameNoTierNoTooltip]에서 가장 강력한 영주로 우뚝 섰습니다." # 16976387767441363931
  mayo.0016.desc.irish: "일부 사람들은 내가 $k_ireland$의 [GetTitleByKey('k_ireland').GetNameNoTierNoTooltip]의 통치자로서 [rory_o_connor.GetHerHim]에게 신하의 예를 표하거나 적어도 조공을 바쳐야 한다고 믿습니다. 하지만 다른 이들은 [rory_o_connor.GetFirstNamePossessive]의 기만적인 무력 과시에 위축될 필요가 없다고 말합니다. 왜냐하면 [rory_o_connor.GetHerHis]의 권세는 오래가지 못할 수도 있고, 저 늙은 [rory_o_connor.GetWomanMan]이 죽으면 고왕국이 와해될 수도 있기 때문입니다." # 186087432626436154
  mayo.0016.a: "이 상황이 얼마나 오래갈지 두고 보지." # 12540942274355641573
  mayo.0016.b: "나는 이 건방진 놈에게 결코 충성을 맹세하지 않을 것이다!" # 4497970019094109292
  mayo.0016.c: "우리는 소와 버터 같은 공물을 조심스럽게 바칠 것이다." # 10518340909134014330
  mayo.0016.d: "선택의 여지가 있나? 나는 충성을 맹세하겠다." # 14797265646077264674
