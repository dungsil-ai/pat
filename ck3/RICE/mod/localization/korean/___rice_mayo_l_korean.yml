  mayo.0050.intro: "성 콜만이 668년에 위대한 [GetReligionByKey('christianity_religion').GetAdjective] 마요 학파를 설립한 후, 이 학파는 오랫동안 번성했습니다. 이는 [GetTitleByKey('c_mayo').GetNameNoTier]로 유학 오기 위해 [GetGeographicalRegion('custom_england').GetName]에서 찾아온 열성적인 [anglo_saxon_culture.GetName] 수도사들이 대거 포진했기 때문이었습니다. 비록 여전히 중요한 학문적 중심지이긴 하지만, 최근 이 학파의 명성은 다소 쇠퇴했습니다.\n\n이제, [GetTitleByKey('c_mayo').GetNameNoTierNoTooltip]의 통치자인 [mayo_leader.GetTitledFirstName]의 최근 행보로 인해 이 학파의 역사가 흥미로운 국면을 맞이하게 되었습니다." # 8686670480500051594
  mayo.0050.t: "마요 학파" # 12192286237698162864
  mayo.0050.desc: "$mayo.0050.intro$세월이 흐르면서 이 학파는 본래의 [anglo_saxon_culture.GetNameNoTooltip] 정체성을 많이 잃었고, 점차 $heritage_goidelic_name$의 격식을 더 많이 받아들였습니다.\n\n[mayo_leader.GetFirstNameNoTooltip]은 이러한 변화에 저항하는 대신, 마요 학파가 [GetGeographicalRegion('custom_ireland').GetName] 내 다른 [GetReligionByKey('christianity_religion').GetAdjectiveNoTooltip] 기관들과 더욱 긴밀한 관계를 맺도록 장려했습니다. [mayo_leader.GetHerHis|U]의 목표는 마요 학파가 이 섬의 선도적인 기관이 되도록 돕는 것입니다." # 8967583545655800983
  mayo.0050.a: "이것은 [GetTitleByKey('c_mayo').GetNameNoTierNoTooltip] 역사의 새로운 장이다...." # 8098314302490635579
  mayo.0051.t: "$mayo.0050.t$" # 6965975144621717601
  mayo.0051.desc: "$mayo.0050.intro$ [mayo_leader.GetSheHe|U]는 이 학파가 원래 힘의 원천이었던 잉글랜드의 [GetGeographicalRegion('custom_england').GetNameNoTooltip]와의 오래된 관계를 되살려야 한다고 믿는다. 그것은 영국 제도의 여러 부분 간의 관계를 구축하는 핵심 연결고리였다.\n\n따라서 [mayo_leader.GetFirstNameNoTooltip]는 이 학파가 잉글랜드의 [GetGeographicalRegion('custom_england').GetNameNoTooltip]에 있는 다른 종교 기관들과 공식적인 관계를 재확장하는 데 도움을 주었다. [mayo_leader.GetHerHis|U]의 희망은 그렇게 함으로써 학파의 운명을 회복시키고 그 영향력을 다시 한번 확장하는 것이다." # 2100652953112547802
  mayo.0051.a: "$mayo.0050.a$" # 12458101469435081628
  mayo.0052.t: "$mayo.0050.t$" # 6965975144621717601
  mayo.0052.desc: "$mayo.0050.intro$사실, [mayo_leader.GetFirstNamePossessiveNoTooltip]의 행동 덕분에 이 학파는 예전의 영광으로 #italic 결코#! 돌아가지 못할 것이다.\n\n학파의 거주자들에게 여러 가지 죄목을 뒤집어씌운 후, [mayo_leader.GetFirstNameNoTooltip]는 학파에 대한 지지를 철회했다. 그뿐만 아니라, 토지부터 서적과 성물에 이르기까지 학파의 일부 자산이 [mayo_leader.GetHerselfHimself]를 위해 압수되었다. 일부는 이 행위 뒤에 정치적 또는 재정적 이유가 있었는지 의문을 제기한다.\n\n학파는 남아 있지만, 예전의 영광에 가려져 있다." # 10040678367020192648
  mayo.0052.a: "$mayo.0050.a$" # 12458101469435081628
  mayo.0053.t: "잉글랜드의 [GetGeographicalRegion('custom_england').GetNameNoTooltip]에서 온 [saxon_monk.Custom('NunMonk')|U]" # 8193834488153551128
  mayo.0053.desc: "#bold 마요 학파#가 재건된 이래로, [GetReligionByKey('christianity_religion').GetAdjective]의 중요한 중심지인 [GetGeographicalRegion('custom_ireland').GetName]은 [GetGeographicalRegion('custom_england').GetName]과 다시 관계를 맺었습니다. 이는 학파가 처음 두각을 나타내게 했던 바로 그 관계였죠. 그 후 [GetGeographicalRegion('custom_england').GetNameNoTooltip]의 많은 학자들이 에메랄드 섬으로 건너와 [GetTitleByKey('c_mayo').GetNameNoTier]에서 공부하고 있습니다.\n\n이 학자들 중 한 명이 바로 [saxon_monk.GetCulture.GetName] 출신의 [saxon_monk.Custom('NunMonk')]인 [saxon_monk.GetFirstName]입니다. [saxon_monk.GetSheHe|U]는 마요 학파에서 많은 시간을 보내며 그곳에서 인맥을 쌓았지만, 이제 [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTier]에 정착하여 종교 문제를 돕고 [saxon_monk.GetHerHis] 인맥을 통해 저를 돕겠다고 제안했습니다." # 9649014611368033402
  mayo.0053.a: "환영하오! 당신 같은 사람이 필요했소." # 13266687503991842115
  mayo.0053.b: "[saxon_monk.GetSheHe|U]는 나를 감동시키지 못하는군." # 14488751042129520186
