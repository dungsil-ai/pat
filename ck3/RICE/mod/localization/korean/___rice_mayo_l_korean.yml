  mayo.0030.t: "산으로" # 363996708916726920
  mayo.0030.desc: "[GetGeographicalRegion('custom_ireland').GetName]은 많은 성지가 있는 섬이지만, 가장 인기 있는 곳 중 하나는 성 패트릭이 정상에서 40일 동안 단식했던 산인 크로아 파트릭입니다.\n\n순례자들은 그들이 직면하는 위험에도 불구하고 수세기 동안 맨발로 산을 오르기도 했습니다. 오늘, 저도 그곳으로 여정을 시작합니다." # 12743098895988016997
  mayo.0030.a: "성 패트릭께서 저를 보호해 주시기를!" # 2995543123805517940
  mayo.0031.t: "산맥의 기슭" # 13535441135132487717
  mayo.0031.desc: "[ROOT.Char.GetFaith.HighGodName]께 찬미를!\n\n나 이전의 많은 이들처럼, 나 역시 마침내 위대한 크로아 패트릭의 기슭에 도달했소. 성 패트릭께서 시나이 산에서 모세처럼 이곳 정상에서 사십 일 동안 금식하셨던 곳이지.\n\n오늘 밤은 이곳 아래에서 쉬겠지만, 내일이면 험난한 산행을 시작할 것이오. 전통적으로 많은 순례자들이 자신의 강인함과 열심을 시험하고 죄를 속죄하는 행위로 맨발로 산을 올랐다고 하오." # 2499101148803984084
  mayo.0031.a: "맨발로 산을 오르겠습니다." # 10144378303287578648
  mayo.0031.b: "발이 피곤하여 맨발로는 걸을 수 없소." # 13749454579727029188
  mayo.0032.t: "고된 오르막길" # 4788070611201259178
  mayo.0032.desc.intro: "내 발은 몇 시간이나 되는 듯한 크로아 패트릭의 바위투성이 오르막을 오르느라 지쳤다. 하지만 나만 그런 것은 아니다. 내 주위의 수많은 순례자들도 똑같이 오르고 있다." # 2219635626916263946
  mayo.0032.desc.injury_you: "아아, 올라가는 길에 부상을 입었소. 다행히 심각한 정도는 아니지만, 험준한 산을 오를 때 감수해야 할 위험이 이런 것이겠지. 이제는 고통스러울지라도 다른 이들의 도움을 받아 나아가야 하겠소." # 7337660702300143565
  mayo.0032.desc.injury_other: "아, 오르는 도중 [injured_person.GetTitledFirstName]께서 [injured_person.GetHerselfHimself]를 다치셨습니다. 다행히 심각하지는 않지만, 험준한 산을 오를 때 감수해야 할 위험이 바로 이런 고통이지요. 이제 [injured_person.GetSheHe|U]는 고통스러울지라도 다른 이들의 도움을 받아 계속 나아가야 할 것입니다." # 12071841869324067367
  mayo.0032.desc: "그럼에도 불구하고, 올라가는 길에 우리는 [Glossary( '성 패트릭의 의자', 'SAINT_PATRICKS_CHAIR_GLOSS' )]와 같은 수많은 고대의 돌과 돌무덤을 지나치는데, 일부에는 우리보다 먼저 이곳에 왔던 이들이 새긴 조각들이 남아있습니다. 나는 그중 한 돌 옆에 멈춰 휴식을 취하며 성 패트릭께 기도를 올립니다." # 2967054594038036120
  mayo.0032.a: "계속 가자! 조금만 더 하면 돼!" # 566680328399186665
  mayo.0033.t: "정상회담" # 11741898939309316035
  mayo.0033.desc: "우리의 발은 쉴 틈 없이 고통스러웠으나, 마침내 크로아 패트릭 산 정상에 도착하니 안도감이 밀려온다. 성 패트릭을 기리기 위해 세워진 소박한 예배당을 보니 마음이 놓인다.\n\n예배당에서 우리는 우리의 죄를 용서해 주시기를 기도하며, [ROOT.Char.GetFaith.HighGodName]와 창조의 영광에 대해 묵상한다. 또한, 성 패트릭께서 시나이 산의 모세처럼 산 정상에서 사십 일간 단식하며 [GetGeographicalRegion('custom_ireland').GetName]의 모든 악마와 뱀을 추방했다는 이야기도 되새긴다. 그가 단식을 마쳤을 때, [ROOT.Char.GetFaith.HighGodName]께서 그에게 [GetGeographicalRegion('custom_ireland').GetNameNoTooltip]의 모든 백성을 최후의 심판에서 심판할 권리를 주셨다고 전해진다." # 14376287005420447356
  mayo.0033.a: "우리는 이곳에서 밤을 지새우며 기도할 것입니다." # 15120131959200109082
  mayo.0034.t: "화염의 무도회" # 9570893818286374885
  mayo.0034.desc: "저녁이 깊어지자, 칠흑 같은 하늘 저편에서 천둥이 울려 퍼졌고 바람이 거세졌습니다. 이 위험한 산에서는 이런 날씨가 드물지 않으며, 성 파트리치오께서 이곳에서 40일간 단식하실 때도 이런 위험에 맞서셨습니다. [ROOT.Char.GetFaith.HighGodNameAlternate]를 믿으며, 저희는 밤샘 단식과 철야를 계속했습니다.\n\n그때, 세상의 모든 소리보다 더 크게, 마치 지옥 자체가 우리에게 내려온 듯한 굉음이 들렸습니다.\n\n우리 중 누구도 반응할 새도 없이, 불덩이가 우리에게 곤두박질쳤습니다. 번개가 그 역할을 하는 동안, 비명과 절규가 뒤섞인 대혼란이 벌어졌습니다. 순식간에 몇몇 순례자들이 쓰러져 죽었습니다." # 2537911721482870607
  mayo.0034.a: "[ROOT.Char.GetFaith.HighGodName]께서 우리를 지켜주시길! [ROOT.Char.GetFaith.HighGodName]께서 우리를 보호해주시길!" # 15932956688813726002
  mayo.0034.info: "#emphasis 역사적 배경:#! 크로 패트릭 산은 지리적 위치 때문에 위험한 날씨에 노출되기 쉬운 지역에 자리 잡고 있습니다. 수 세기 동안 이 산을 찾은 순례자들은 그러한 날씨와 저체온증으로 인해 부상을 입거나 심지어 사망하기도 했습니다. 1113년에 있었던 주목할 만한 중세 사례가 있는데, #italic 얼스터 연대기#!에 따르면 성 패트릭 축일(3월 17일)에 산 정상에 모였던 순례자 서른 명이 밤에 번개를 맞아 사망했다고 합니다." # 13071239317459490116
  mayo.0035.t: "경사면을 따라 내려가기" # 10789429252368797369
  mayo.0035.desc: "산 아래로 내려오는 여정은 올라갈 때보다 수월하게 느껴졌다. 크로아 파트릭 성지 순례의 고난은 심약한 자들을 위한 것이 아니지만, 태고에 성 패트릭께서 정상에 오르셨을 때 인내하셨으니, 우리가 할 수 있는 최소한의 일은 그분의 모범을 따르려 노력하는 것이다.\n\n우리는 변화된 모습으로 산기슭으로 돌아온다." # 15855110256104908138
  mayo.0035.a: "성 패트릭이 말했듯이: [Glossary( '그리스도와 함께', '그리스도 앞에', 'SAINT_PATRICKS_BREASTPLATE_GLOSS' )]." # 10424219129833328625
