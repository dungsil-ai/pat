  mayo.0080.t: "성 마크다라 섬" # 17876420491382336483
  mayo.0080.desc: "[GetTitleByKey('b_galway').GetNameNoTier] 해안에는 전설적인 성 마크다라의 섬이 있습니다. 이곳에서 동명의 성인이 6세기에 작은 교회를 짓고 은둔자로 살았다고 전해집니다. 현지인들은 그를 선원과 어부들의 수호성인으로 공경하며, 때로는 용감하게 바다로 나가 섬으로 작은 순례를 떠나기도 합니다.\n\n[GetTitleByKey('c_connacht').GetNameNoTier]를 다스리는 [ROOT.Char.GetTitleAsNameNoTooltip]인 저는 지역 지도자들로부터 섬의 작은 교회와 순례자들을 돕기 위해 자원을 할애하는 것에 관심이 있는지에 대해 문의를 받았습니다. 비록 이 성인이 지역 밖에서는 거의 알려지지 않았을지라도, 이곳 해안에 사는 선원들 사이에서 저의 이미지를 높이는 데 큰 도움이 될 것입니다." # 5361989446620588163
  mayo.0080.a: "성 마크다라의 이름으로 기꺼이 돕겠습니다!" # 14718897173860150816
  mayo.0080.info: "#emphasis 역사적 배경:#! 골웨이 해안에 위치한 성 마크다라 섬은 오랫동안 6세기 지역 성인인 성 마크다라와 관련이 있었습니다. (실제로 성인전 자료에는 거의 언급되지 않아) 지역 밖에서는 거의 알려져 있지 않지만, 그는 오늘날까지도 선원들의 수호성인으로서 그 지역에서 매우 인기가 높습니다. 선원이나 어부들이 섬을 지날 때 돛을 세 번 내리거나 현지인들이 정기적으로 순례를 가는 등 성 마크다라와 관련된 여러 해양 풍습과 영적 관습이 있습니다." # 4921255587567351146
  mayo.0080.b: "이 일에 자금을 댈 여유가 없습니다." # 4484584319802405844
  mayo.0081.t: "숲의 영주, 헤이즐" # 17675757913331796259
  mayo.0081.desc: "[ROOT.Char.GetCulture.GetCollectiveNoun]의 고대 법률에는 우리에게 중요한 자원을 제공한다는 이유로 [Glossary( '숲의 영주', 'LORDS_OF_THE_WOOD_GLOSS' )]로 여겨지는 일곱 그루의 나무가 있습니다.\n\n그중 하나인 헤이즐 나무는 올해 [county.GetNameNoTier]에서 상당히 풍성한 수확을 안겨주었습니다. 심지어 헤이즐넛 작황이 너무 많아서 작은 강 일부가 막힐 정도였다는 보고까지 받았습니다!\n\n고대 법률에 따라, 저는 [ROOT.Char.GetTitleAsNameNoTooltip]로서 이 수확물에서 얻은 헤이즐 가지 일부를 받을 자격이 있으며, 평민들이 수레 한 짐을 보내왔습니다." # 1257057082610456188
  mayo.0081.a: "이것이 매우 유용할 것이오!" # 14024222595988033859
  mayo.0081.info: "#emphasis 역사적 배경:#! 중세 아일랜드에서는 일곱 그루의 나무가 너무 중요하여 소위 [Glossary( '숲의 영주', 'LORDS_OF_THE_WOOD_GLOSS' )]로 분류되었고, 그 용도와 관련하여 수많은 법률이 부과되었습니다. 헤이즐 나무는 목재는 다양한 건축에 사용되었고 헤이즐넛은 식량 공급원으로 귀중하게 여겨져 그러한 나무 중 하나였습니다. 중세 아일랜드 법에 따라 영주들은 헤이즐 수확물의 일부를 받을 권리가 있었습니다. 헤이즐 나무는 너무나 중요해서 아일랜드 연대기들은 좋은 견과류 해였을 때를 기록할 정도였습니다. 중요한 1차 사료인 #italic 얼스터 연대기#!는 예를 들어 836년과 1066년에 헤이즐넛 작황이 너무 풍부하여 강을 막았다고 재미있게 기록하고 있습니다." # 13715930570808626073
  mayo.0082.t: "무단 침입자" # 2230209190028105300
  mayo.0082.desc: "[trespasser.GetTitledFirstName]가 돈을 건네며 멋쩍은 듯 저를 쳐다봅니다. “저의 [ROOT.Char.GetLadyLord]님, 무단 침입에 대해 사과드립니다만, 제 성미를 이기지 못했습니다.”\n\n우리 모두 [ROOT.Char.GetCulture.GetName]의 법률이 무단 침입에 대한 벌금에 대해 명확하다는 것을 알고 있습니다. 누구든 벌칙 없이 밖에서 문을 열어 안에 사람이 있는지 확인할 수는 있지만, 허락 없이 들어오는 사람은 벌금을 내야 합니다. 특히 집의 문을 열었다면 더욱 그렇습니다.\n\n[trespasser.GetFirstNameNoTooltip]는 불법적인 일을 하려던 것은 아니었겠지만, 며칠 전 저와 중요한 용무로 이야기하기 위해 들어오려던 것이 너무 조급하고 불안했던 모양입니다. [trespasser.GetSheHe]는 제가 하인들을 시켜 [trespasser.GetHerHim]를 들여보내기를 기다리지 않고 그렇게 했습니다." # 10400696955878524052
  mayo.0082.a: "좋소. 변상금은 받겠소." # 15191052119674564523
  mayo.0082.b: "돈은 가지되, 다음에는 교훈을 얻으시오." # 17593448424635496034
  mayo.0082.info: "#emphasis 역사적 배경:#! 이 사건은 8세기 법률 텍스트인 #italic 크리스 가블라크#!('갈라진 구매'라는 뜻)에서 논의된 초기 중세 아일랜드의 무단 침입 관련 법률에 기반하고 있습니다. 이 텍스트는 지위와 중세 아일랜드의 다양한 사회 계층 간의 차이점에 초점을 맞추고 있습니다. 당시 아일랜드는 고도로 계층화된 사회였으며, 피해자와 가해자의 지위에 따라 법적 처벌이 크게 달라질 수 있었습니다." # 11161993927378707914
  mayo.0083.t: "천한 빗살깎이 장인들" # 1457791218283036479
  mayo.0083.desc: "“[arrogant.GetTitledFirstName]가 콧방귀를 뀌며 말합니다. ‘빗살깎이 장인들(Combmakers)이라니. 며칠 전에 한 명을 보았는데, 정말 역겹더군요? 그들은 개나 똥더미와 같아서, 그들이 재료를 얻는 곳이 그렇죠.’\n\n저는 단지 [arrogant.GetFirstNameNoTooltip]에게 며칠 전 시내에 다녀온 일에 대해 물었을 뿐인데, [arrogant.GetSheHe]가 보고 싶지 않은 천한 장인들을 보았고 그 일로 꽤나 불쾌해하는 것 같습니다." # 14655370777036605238
  mayo.0083.a: "그들은 신분이 낮지만, 너무 심하게 조롱해서는 안 되오." # 17806134436426326544
  mayo.0083.b: "그 빗살깎이 장인들은 참으로 역겨운 사람들이지, 나도 동의하오!" # 15266675449967431765
  mayo.0083.info: "#emphasis 역사적 배경:#! 중세 아일랜드는 고도로 계층화된 사회였으며, 사람들은 자신의 지위와 직업에 따라 다양한 특권과 지위를 부여받았습니다. 목수, 구리 세공인, 대장장이와 같은 특정 장인들은 높은 지위로 여겨졌으며 때로는 낮은 계급 귀족과 비슷한 명예 가격을 가지기도 했습니다. 반면에 빗살깎이 장인과 같은 다른 장인들은 낮은 사회적 지위로 간주되었습니다. 예를 들어, 법률 텍스트에서는 빗살깎이 장인들을 그들이 원재료를 얻는 개나 똥더미와 연관지었습니다." # 5105045599465455397
  mayo.0084.t: "희귀한 아일랜드 소나무" # 2603209739305852016
  mayo.0084.desc: "놀라운 발견이었습니다. [county.GetNameNoTier]의 먼 숲속에 숨겨진 큰 소나무 숲이었죠.\n\n저의 [councilor.GetCouncilTitle]인 [councilor.GetTitledFirstName]는 이 희귀한 나무들을 수지 생산이나 건축에 사용할 수 있다고 말합니다. 어쨌든 그들은 [ROOT.Char.GetCulture.GetCollectiveNoun]의 [Glossary( '숲의 영주', 'LORDS_OF_THE_WOOD_GLOSS' )] 중 하나로 여겨지니, 소나무를 발견하는 것 자체가 기적과도 같습니다." # 15496323035444248211
  mayo.0084.a: "그 소나무들은 매우 유용할 것이오!" # 2579276982884601675
  mayo.0084.b: "그럴 가치가 없다고 생각하오." # 17479641005779795776
  mayo.0084.info: "#emphasis 역사적 배경:#! 역사적으로 소나무(#italic Pinus Sylvestris#!), 즉 잣나무의 일종은 아일랜드에서 발견되었으나 중세 시대 동안 개체 수가 크게 줄어들어 멸종에 이르렀습니다. 이 나무는 18세기에 이르러서야 섬에 재도입되었습니다. 그럼에도 불구하고 목재와 송진 때문에 [Glossary( '삼림의 지배자', 'LORDS_OF_THE_WOOD_GLOSS' )] 중 하나로서 매우 중요했습니다. 이 나무의 희귀성은 소나무로 식당을 지으려 했던 한 수도원에 얽힌 중세 전설에 잘 반영되어 있습니다. 그들은 며칠 동안 숲을 샅샅이 뒤졌음에도 소나무의 흔적을 전혀 찾지 못했고, 8세기 전설적인 아일랜드의 수녀원장이자 아바스였던 성 삼탄(Saint Samthann)의 기적적인 개입을 통해서야 비로소 소나무를 찾을 수 있었다고 합니다." # 2000505754665025906
  mayo.0085.t: "케시 동굴" # 15684814769520358025
  mayo.0085.desc: "[GetTitleByKey('b_sligo').GetNameNoTier]에 있는 케시 동굴은 그 주변에 얽힌 전설들 덕분에 오랫동안 왕족과 연관되어 왔습니다. 오늘날 저의 음유시인들은 케시 동굴과 관련된 가장 두드러진 전설에 대한 이야기를 들려주고 있습니다.\n\n오래전, 위대한 명예, 관대함, 지혜, 자비심을 지녔던 전설적인 [GetGeographicalRegion('custom_ireland').GetName]의 고왕 코르막 막 아르트(Cormac Mac Airt)에 대한 이야기가 전해집니다. 그의 아버지가 친척과의 전투에서 살해당하고 그 친척이 왕좌를 찬탈하자, 어린 코르막은 암늑대에게 납치되어 케시 동굴에서 길러졌고, 몇 년 후 그는 고왕으로서 마땅한 정당한 상속권을 되찾았습니다." # 2443747573205330422
  mayo.0085.a: "훌륭한 이야기로군 – 하지만 허구야." # 8617939153277146489
  mayo.0085.b: "동굴에서 왕족의 기운이 느껴지는 데는 이유가 있지." # 8962449884933241076
  mayo.0086.t: "수상한 [ROOT.Char.GetCulture.GetNameNoTooltip] 법률가" # 13930191310624886577
  mayo.0086.desc: "[ROOT.Char.GetCulture.GetName] 법률가가 자신이 조언하는 법적 사건의 세부 사항과 뉘앙스를 설명하며 계속해서 지루하게 떠들어대는 동안, 모든 이들이 그것을 알아차렸습니다. 그의 뺨에 희미하지만 분명하게 보이는 이상한 붉은빛이 나타난 것입니다.\n\n현장에 있던 모든 이들이 이를 보고 흥분하여 속삭였습니다. 설마? 이 법률가가 진실에서 벗어나고 있는 것일까? 뺨의 반점은 그런 일의 명백한 징후입니다.\n\n결국, 모여 있던 신하들 중 누군가가 모두가 생각하고 있던 바를 목소리 높여 지적했습니다. 법률가의 목소리는 순식간에 지루한 단조로움에서 당황한 어조로 바뀌었고, 그는 자신이 오직 진실만을 말하고 있으며 단지 긴장해서 얼굴이 붉어진 것뿐이라고 우리를 안심시켰습니다." # 3361547864938257385
  mayo.0086.a: "법률가의 말을 믿는다" # 1440780585459251425
  mayo.0086.b: "거짓말한 법률가를 처벌한다" # 18433763221966875170
  mayo.0086.c: "법률가의 법률 자문의 결함을 지적한다" # 5698375444924277930
  mayo.0086.info: "#emphasis 역사적 배경:#! 법률가들은 초기 중세 아일랜드 사회에서 아일랜드 시인들과 비견될 만한 초자연적인 신비감과 존경을 받으며 중요한 역할을 했습니다. 그들의 직무 표장은 토크(torc)였으며, 만약 법률가가 거짓을 말하면 토크가 목을 조여 질식시킬 것이라고 믿어졌습니다. 따라서 8세기 다양한 아일랜드 법률 문헌을 집대성한 #italic 센차스 마르(Senchas Már)#!에는 법률가가 진실에서 벗어날 때 목에 반점이 생긴다고 언급되어 있습니다." # 1270380198726233546
  mayo.0087.t: "[ROOT.Char.GetCulture.GetNameNoTooltip] 문화의 세 가지 바위" # 1618232352808073719
  mayo.0087.desc: "나는 [ROOT.Char.GetCulture.GetName] 법의 기초이자 올바른 행동의 근간은 종교, 군주, 그리고 가문이라는 '세 가지 바위'라고 들었소. 이들의 영향력은 우리의 삶에 스며들어 우리를 인도하지. 하지만 나는 궁금하오… 적어도 법적인 문제에 있어서 가장 중요한 것은 무엇일까?" # 7621231392766140536
  mayo.0087.a: "[ROOT.Char.GetFaith.HighGodName] 없는 법이 무슨 소용인가?" # 4138706843099151049
  mayo.0087.b: "정의를 실현하는 열쇠는 통치자에게 있다." # 13392406611674424836
  mayo.0087.c: "우리는 혈족을 통해 올바른 행동을 배우고 실천한다." # 12919857389948005164
  mayo.0087.info: "#emphasis 역사적 배경:#! 이 이벤트는 8세기에 법, 예절, 지리 등 다양한 주제를 다루는 문헌 모음인 #italic 아일랜드의 삼중주(Triads of Ireland)#!의 발췌문에서 영감을 받았습니다. 그 발췌문에는 '올바른 행동이 묶여 있는 세 가지 바위: 수도원, 군주, 혈족'이라고 명시되어 있습니다. 이 진술은 초기 아일랜드 문화의 이상과 가치, 그리고 법과 올바른 행동이 종교, 왕권, 그리고 자신의 가족과 얼마나 밀접하게 연결되어 있었는지를 반영합니다." # 15792176944180552386
