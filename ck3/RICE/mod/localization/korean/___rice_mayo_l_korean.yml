  innovation_RICE_bog_butter: "늪지 버터" # 18372596822692348552
  innovation_RICE_bog_butter_desc: "영국 제도의 여러 지역에서는 버터를 늪에 묻어 보관하는 경우가 많습니다. 이는 음식부터 화장품, 연고 등 다양한 용도로 쓰이는 버터의 중요성 때문에 수천 년 동안 이어져 온 고대 관습입니다." # 16474668304569110651
  innovation_RICE_crannogs: "크래노그" # 18194875858486500383
  innovation_RICE_crannogs_desc: "영국 제도, 특히 켈트 지역에서 볼 수 있는 크래노그는 호수나 늪지 위에 인공 섬을 만들어 세운 특수한 형태의 목조 구조물입니다." # 356117870098542820
