  RICE_opinion_butter_gift: "고급 버터 선물" # 12240443616960694480
  RICE_mayo_butter_gift_modifier: "$RICE_opinion_butter_gift$" # 1193779955371918972
  RICE_mayo_butter_gift_modifier_desc: "이 인물은 최근 다른 [ruler|E]로부터 [gift_luxury_butter|E]를 받았는데, 이는 그 인물의 중요성과 사회적 지위를 잘 보여줍니다." # 13126119199985539056
  TFE_holy_well_level_1: "작은 성수가 최근 축성됨" # 15448720014000972441
  TFE_holy_well_level_1_desc: "이 지역의 종교 당국이 최근 명망 있는 성수를 축성했습니다. 신도들이 근처 지역에서 기도하고 헌금을 하기 위해 이 장소로 모여들고 있습니다.\n\n#italic 이 [county|E]를 소유하거나 이곳에 [domicile|E]를 가진 [rulers|E]의 [culture|E]가 $heritage_goidelic_name$, $heritage_brythonic_name$, 또는 $heritage_west_germanic_name$ [heritage|E]일 경우 [GetActivityType( 'activity_RICE_visit_holy_well' ).GetName] [activity|E]의 보너스를 향상시킵니다. 작은 성수는 이 [decision|E]를 수행할 때 주요 성수나 대성수에 비해 보너스가 적습니다.#!" # 9649216319391730425
  TFE_holy_well_level_2: "주요 성수가 최근 축성됨" # 247926406848953253
  TFE_holy_well_level_2_desc: "이 지역의 종교 당국이 최근 명망 있는 성수를 축성했습니다. 신도들이 기도하고 헌금을 하기 위해 주변 지역에서 이 장소로 모여들고 있습니다.\n\n#italic 이 [county|E]를 소유하거나 이곳에 [domicile|E]를 가진 [rulers|E]의 [culture|E]가 $heritage_goidelic_name$, $heritage_brythonic_name$, 또는 $heritage_west_germanic_name$ [heritage|E]일 경우 [GetActivityType( 'activity_RICE_visit_holy_well' ).GetName] [activity|E]의 보너스를 향상시킵니다. 주요 성수는 이 [decision|E]를 수행할 때 작은 성수보다 보너스가 많지만, 대성수보다는 적습니다.#!" # 1424718837699912153
  TFE_holy_well_level_3: "대성수가 최근 축성됨" # 12350263683158842008
  TFE_holy_well_level_3_desc: "이 지역의 종교 당국이 최근 명망 있는 성수를 축성했습니다. 신도들이 기도하고 헌금을 하기 위해 근처 지역에서 이 장소로 모여들고 있습니다.\n\n#italic 이 [county|E]를 소유하거나 이곳에 [domicile|E]를 가진 [rulers|E]의 [culture|E]가 $heritage_goidelic_name$, $heritage_brythonic_name$, 또는 $heritage_west_germanic_name$ [heritage|E]일 경우 [GetActivityType( 'activity_RICE_visit_holy_well' ).GetName] [activity|E]의 보너스를 향상시킵니다. 대성수는 이 [decision|E]를 수행할 때 작은 성수와 주요 성수보다 더 많은 보너스를 제공합니다.#!" # 1774874072484054721
  TFE_healing_waters_of_a_holy_well: "성수의 치유수" # 9656134553255166610
  TFE_healing_waters_of_a_holy_well_desc: "이 인물은 최근 성수를 방문하여 기도하고 종교적 헌금을 바쳤습니다. 그 후, 이 인물은 영적 및 육체적으로 재활되는 느낌을 받았습니다." # 14077028460429621138
  RICE_recently_gaelicized: "최근 게일화됨" # 15375985740793715645
  RICE_rulers_recently_gaelicized: "최근 게일화된 통치자들" # 8783345868964178152
  RICE_mayo_supported_galway_bay_seafarers: "골웨이 만의 해양 종사자 지원" # 17009411423859521515
  RICE_mayo_supported_galway_bay_seafarers_desc: "이 인물은 자신의 높은 지위를 이용하여 골웨이 만의 해안 지역 사회에 여러 방면으로 아낌없이 도움을 주어 그들의 감사와 지지를 얻었습니다." # 17624871354358707985
  RICE_mayo_saint_macdara_support: "성 마크다라 섬을 위한 기부금" # 17682615125252096016
  RICE_mayo_saint_macdara_support_desc: "골웨이 해안에 있는 한 섬은 오랫동안 선원들의 수호자로 여겨지는 지역 성인인 성 마크다라와 연관되어 왔습니다. 최근 통치자들이 섬으로 향하는 지역 순례와 그들의 전통적인 종교 의식을 돕기 위해 자원과 자금을 제공했습니다." # 6129499967409276099
  RICE_mayo_hazelnut_tribute: "개암 열매 공물" # 2637358758421424181
  RICE_mayo_hazelnut_tribute_desc: "고대 아일랜드 법에서 개암나무는 [Glossary( '삼림의 군주', 'LORDS_OF_THE_WOOD_GLOSS' )] 중 하나로 여겨지며, 군주는 매년 고객들로부터 개암나무 가지의 일부를 받을 권리가 있습니다. 최근 이 인물의 부하들이 울타리, 우리, 집 벽 건설에 사용할 개암나무 가지와 식용으로 먹을 열매를 꽤 많이 수확했습니다." # 16706214337403864087
  RICE_mayo_bountiful_hazelnut_harvest: "풍성한 개암 열매 수확" # 3055611371912708002
  RICE_mayo_pine_trees: "아일랜드 소나무" # 16595568020359913781
  RICE_mayo_school_irish_modifier: "마요의 꽃피는 학파" # 16809871915517285147
  RICE_mayo_school_irish_modifier_desc: "지역 통치자들이 과거 앵글로색슨이 지배했던 오래된 기관인 마요 학파가 아일랜드 문화와 학문의 중심지로 변모하는 것을 지원했습니다." # 8384878352344449039
  RICE_mayo_school_irish_character_modifier: "마요 학파 지원" # 14952318522003578896
  RICE_mayo_school_irish_character_modifier_desc: "이 인물의 재정적, 정치적 지원 덕분에 마요 학파는 아일랜드 문화와 학문의 주요 중심지로 성공적으로 전환되었습니다." # 6688887610600943835
  RICE_mayo_school_english_modifier: "마요 학파 부흥" # 7739344935086445904
  RICE_mayo_school_english_modifier_desc: "지역 통치자들이 과거 앵글로색슨이 지배했던 마요 학파를 지원하여 잉글랜드와의 관계를 부흥시켰습니다." # 11193264299183701634
  RICE_mayo_school_english_character_modifier: "마요 학파 부흥시키기" # 15224908458552700981
  RICE_mayo_school_english_character_modifier_desc: "이 인물의 재정적, 정치적 지원 덕분에 마요 학파는 잉글랜드 교회와의 관계를 성공적으로 부흥시켰고, 다시 한번 아일랜드와 잉글랜드 사이의 주요 연결고리라는 명성을 되찾았습니다." # 16474334188974304702
  RICE_mayo_school_destroy_character_modifier: "마요 학파에 대한 지원 철회" # 12532915281598251613
  RICE_mayo_school_destroy_character_modifier_desc: "진정한 신념 때문이든, 혹은 더 냉소적인 물질적 이유 때문이든, 이 인물은 과거 앵글로색슨이 지배했던 오래된 기관인 마요 학파를 비난했습니다." # 14793253410335859638
  RICE_mayo_school_of_mayo_decision: "색슨족의 마요 학파 방향에 영향 미치기" # 4704318195929592975
  RICE_mayo_school_of_mayo_decision_tooltip: "마요 학파가 우리 눈앞에서 변화하고 있으며, 이제 그 방향에 영향을 미칠 때입니다." # 15053347921443716815
  RICE_mayo_school_of_mayo_decision_desc: "색슨족의 마요 학파, 또는 마요 학파는 아일랜드의 위대한 학문 중심지 중 하나로 자리매김해 왔는데, 이는 아일랜드인과 앵글로색슨 모두의 열렬한 지지 덕분이기도 합니다. 하지만 학교가 앵글로색슨 뿌리와의 관계가 약해지면서 그 운명은 어떻게 될까요?" # 18001236672759923552
  RICE_mayo_school_of_mayo_decision_effect_tooltip_1: "[GetReligionByKey('christianity_religion').GetAdjective] 수도사나 수녀들이 $heritage_west_germanic_name$ [heritage|E]에 속한 자들이 [GetGeographicalRegion('custom_ireland').GetName]에서 간혹 나타날 수 있으며, 특히 [county_modifier|E]가 아직 유효한 동안 그러합니다." # 1691260540272334442
  RICE_mayo_school_of_mayo_decision_confirm: "우리는 마요 학파의 미래에 영향을 미칠 것입니다" # 14386300564870783300
  RICE_mayo_school_of_mayo_decision_context_tooltip: "#emphasis 역사적 배경:#! 우리가 아는 마요의 정착지는 서기 668년경 잉글랜드에서 열린 휘트비 시노드(Synod of Whitby)의 결과에 대해 이견을 가진 앵글로색슨 수도사들과 동맹을 맺은 아일랜드 수도사들이 세운 색슨족의 마요라는 수도원에서 유래했습니다. 시간이 지나면서 마요 학파는 아일랜드와 앵글로색슨 세계를 잇는 중요한 종교적 중심지이자, 아일랜드에서 공부하고자 하는 앵글로색슨들을 위한 주요 교육 중심지가 되었습니다. 색슨족의 마요의 전성기는 8세기와 9세기 초였으며, 이후 몇 세기 동안 아일랜드의 주요 기독교 중심지로 남아 있었지만, 점차 고유한 앵글로색슨적 특성을 잃어갔고, 종교개혁 때까지 잊혀지게 되었습니다." # 8586997934818362316
  RICE_mayo_school_of_mayo_decision_PICK_TYPE: "$RICE_mayo_school_of_mayo_decision_confirm$" # 1146835126610086078
  RICE_mayo_school_of_mayo_decision_select_text: "색슨족의 메이오에게 미래에 무엇이 기다리고 있을까요?\n$select_one_of_the_available_option_step_one_top_text$" # 4840936806597464162
  RICE_mayo_school_of_mayo_decision_irish_name: "#Bold 아일랜드 학습 포용#!" # 14984485177733472299
  RICE_mayo_school_of_mayo_decision_irish_desc: "$RICE_mayo_school_of_mayo_decision_irish_name$" # 16359572552698983843
  RICE_mayo_school_of_mayo_decision_irish_tooltip: "#italic 메이오 학파는 오랫동안 아일랜드와 잉글랜드 간의 긴밀한 종교적 유대의 증거였으며, 이 유대는 이전보다 훨씬 더 강화될 수 있습니다.#!" # 16652068565143928886
  RICE_mayo_school_of_mayo_decision_english_name: "#Bold 잉글랜드 연결 활성화#!" # 16556136889632545882
  RICE_mayo_school_of_mayo_decision_english_desc: "$RICE_mayo_school_of_mayo_decision_english_name$" # 11024865520959725020
  RICE_mayo_school_of_mayo_decision_english_tooltip: "#italic 메이오 학파의 오래된 앵글로색슨 영향력은 사라지고 있으며, 이제 아일랜드 문화권에서 온 새로운 세대의 학자들과 수도사들을 지원해야 할 때입니다.#!" # 2359437454255748556
  RICE_mayo_school_of_mayo_decision_destroy_name: "#Bold 학교 지원 철회#!" # 232426135509788450
  RICE_mayo_school_of_mayo_decision_destroy_desc: "$RICE_mayo_school_of_mayo_decision_destroy_name$" # 10976656152083946457
  RICE_mayo_school_of_mayo_decision_destroy_tooltip: "#italic 메이오 학파는 수년간 잉글랜드와 아일랜드 사이의 가교이자 학문의 중심지로서의 역할을 다한 쇠퇴하는 기관입니다. 우리는 지원을 철회하고 일부 자산을 몰수해야 합니다.#!" # 7045731935023305184
  RICE_mayo_bury_bog_butter: "늪지 버터 묻기" # 3360189678772697572
  RICE_mayo_bury_bog_butter_tooltip: "[bog_butter_short|E]를 늪지에 묻는 것은 그것을 보존하는 훌륭한 방법입니다." # 14840331721499032613
  RICE_mayo_bury_bog_butter_desc: "[bog_butter_short|E]를 늪지에 묻는 것은 장기적으로 보존하는 전통적인 방식입니다. 제 버터를 묻을 만한 근처 늪지가 있어야 할 것입니다." # 16095825576609317012
  RICE_mayo_bury_bog_butter_effect_tooltip_1: "#bold $RICE_mayo_retrieve_bog_butter$#! [decision|E]는 #V 1#!년 후에 취할 수 있으며, 다른 보너스들 외에도 [GetModifier('RICE_mayo_bog_butter_modifier').GetNameWithTooltip] [character_modifier|E]를 얻을 수 있습니다." # 3701206357348885104
  RICE_mayo_bury_bog_butter_effect_tooltip_2: "#bold $tradition_RICE_brehon_law_name$#! [tradition|E]는 이 [decision|E]의 보너스를 증가시킵니다." # 13387541622108493873
  RICE_mayo_bury_bog_butter_confirm: "나는 버터를 정말 좋아해!" # 11015091902063115439
  RICE_mayo_bury_bog_butter_context_tooltip: "#emphasis 역사적 배경:#! 버터는 식량, 화장품, 연고 등 다양한 용도로 사용되었기 때문에 역사적으로 영국 제도 내 여러 사회에서 귀중하게 여겨졌습니다. 고대와 중세 시대에는 아일랜드와 스코틀랜드에서 늪지에 묻어 보존하기도 했습니다. 이는 일반 신선한 버터와 다른 독특한 풍미를 주기도 했습니다." # 2902249934971400133
  RICE_mayo_retrieve_bog_butter: "늪지 버터 되찾기" # 11373770511386633904
  RICE_mayo_retrieve_bog_butter_tooltip: "예전에 늪지에 묻어 두었던 버터를 찾을 때가 왔습니다." # 1889233404116597024
  RICE_mayo_retrieve_bog_butter_desc: "저는 보존을 위해 [bog_butter_short|E]를 늪지에 묻어 두었습니다. 지금이 그것을 파내어 어떻게 변했는지 맛볼 좋은 시기일지도 모르겠군요?" # 13075442635282819907
  RICE_mayo_retrieve_bog_butter_effect_tooltip_1: "xxxxxxxxxxx" # 151847500354160245
  RICE_mayo_retrieve_bog_butter_confirm: "버터 수확 철이다!" # 8521173655614124208
  RICE_mayo_retrieve_bog_butter_context_tooltip: "$RICE_mayo_bury_bog_butter_context_tooltip$" # 3676405434837984020
  RICE_consecrate_holy_well: "성스러운 샘 축성하기" # 8181880229544146116
  RICE_consecrate_holy_well_tooltip: "이 땅은 신성한 수원으로 가득 차 있으며, 이를 축성할 수 있습니다." # 143745332949061816
  RICE_consecrate_holy_well_desc: "신성한 샘과 성스러운 우물은 [ROOT.Char.GetCulture.GetName]의 민속에서 중요한 역할을 하며, 제 영토 곳곳에 그러한 장소가 많지만, 저는 [capital|E] 근처의 우물 하나를 축성하여 모든 신실한 [ROOT.Char.GetFaith.GetAdherentNamePlural]의 눈에 그 중요성을 높이고 싶습니다." # 15968674978565886935
  RICE_consecrate_holy_well_effect_tooltip_1: "이 [decision|E]는 평생 #V 단 한 번#!만 내릴 수 있습니다." # 3084338753079845342
  RICE_consecrate_holy_well_effect_tooltip_2: "귀하의 [capital|E]는 [county_opinion|E]와 [control|E]를 증가시키는 #V 20#!년간의 [county_modifier|E]를 받게 됩니다. 이 보너스의 강도는 무작위이지만 [piety_level|E]의 영향을 받습니다." # 7392602172812408202
  RICE_consecrate_holy_well_effect_tooltip_3: "이 [county_modifier|E]가 활성화되어 있는 동안, 그것이 있는 [county|E]를 소유하거나 그곳에 [domicile|E]를 둔 [rulers|E]는 [activity|E]인 [GetActivityType( 'activity_RICE_visit_holy_well' ).GetName]에 접근할 수 있습니다." # 12392514196711925059
  RICE_consecrate_holy_well_confirm: "적절한 성스러운 우물을 찾자!" # 13041218207830383622
  RICE_consecrate_holy_well_context_tooltip: "#emphasis 역사적 배경:#! 신석기 시대 이래로 우물과 샘은 민족이나 종교에 관계없이 영국 제도의 사람들에게 큰 중요성을 지녀왔습니다. 최근 일부 학자들이 영국 '성스러운 우물'이 일관된 개념인지에 대해 의문을 제기하기도 했습니다. 예를 들어, 이교도와 기독교 관행 사이에 성스러운 우물에서 어떤 연관성이 있는지에 대해 의문을 제기하는 등, 물을 중심으로 이루어진다는 사실 외에는 말입니다. 하지만 그러한 우물들이 여러 세대에 걸쳐 영성의 장소였음은 분명합니다." # 16429710139185066715
  RICE_no_holy_well_county: "성스러운 우물 [county_modifier|E]가 있는 [county|E]를 소유하고 있지 않습니다" # 16243585553357762708
  RICE_yes_holy_well_county: "성스러운 우물 [county_modifier|E]가 있는 [county|E]를 소유하고 있습니다" # 95239671090385615
  RICE_embrace_gaelicization: "게일화 수용" # 6074008505414559117
  RICE_embrace_gaelicization_tooltip: "게일 민족의 관습과 세계관이 그대를 부릅니다." # 6320845183685542807
  RICE_embrace_gaelicization_desc: "나의 기원이 어떻든, 나는 [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTier]의 [ROOT.Char.GetCapitalLocation.GetCulture.GetCollectiveNoun]들 사이에서 더 편안함을 느끼기 시작한다. 그들의 언어, 음악, 음식, 패션, 예절.... 이 모든 것이 내 영혼 깊은 곳에 자리 잡고 있다." # 11605883861930550058
  RICE_embrace_gaelicization_effect_tooltip_1: "xxxxxxxxxxx" # 151847500354160245
  RICE_embrace_gaelicization_confirm: "우리는 [ROOT.Char.GetCapitalLocation.GetCulture.GetCollectiveNounNoTooltip]보다 더 [ROOT.Char.GetCapitalLocation.GetCulture.GetNameNoTooltip]해질 것이다!" # 15181452586852193555
  RICE_embrace_gaelicization_context_tooltip: "#emphasis Historical Context:#! 아일랜드에 정착한 앵글로-노르만인의 후손들은 토착 게일 문화에 너무나 잘 동화되어, 후대의 평론가들은 이 앵글로-노르만인들이 “아일랜드인보다 더 아일랜드인”이 되었다고 낭만적으로 주장하기도 했다. 후기 잉글랜드 군주들이 근세 초기에 아일랜드를 보다 직접적으로 통제하고 정복하려 했을 때, “토착” 아일랜드 가문의 후손들과 “구(舊) 잉글랜드인”이라고도 불렸던 이 히베르노-노르만인들은 서로 심하게 혼인했으며, 때로는 잉글랜드의 지배에 저항하기 위해 함께 협력했다." # 3468111891191772703
