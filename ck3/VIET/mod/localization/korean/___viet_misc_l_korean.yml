  VIETtest.0008.t: "#bold 사막의 왕중왕#" # 15750732628996040242
  VIETtest.0008.desc: "저는 [ROOT.Char.GetFaith.GetName]에서 알려진 가장 위대한 성유물인 [VIET_baklava_test.GetName]을 발견했습니다!" # 9206399394406557921
  VIETtest.0008.a: "이 바클라바를 숭배할 수는 있지만 먹을 수는 없다니, 참 아이러니하군...." # 334796864753170837
  VIETtest.0009.t: "전설적인 스위트롤" # 15434679957722601894
  VIETtest.0009.desc: "제가 다른 차원에서 온, 분명 강력한 마법의 힘이 가득 찬 페이스트리인 [VIET_sweetroll_test.GetName]을 발견했습니다!" # 11499133861744326175
