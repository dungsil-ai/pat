  VIETintro.0011.desc: "이제 [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName]으로 향하는 [ROOT.Char.GetInvolvedActivity.GetShortName] 여정을 시작할 시간입니다. 이 여행을 준비하는 두통과 번거로움이 목적지에 도착했을 때 그만한 가치가 있기를 바랍니다... 아니, 그렇지 않다면 이 모든 여행 준비로 인한 스트레스가 헛수고가 될 테니, 그렇게 되기를 바랄 수밖에 없겠지요." # 7414818866934797355
