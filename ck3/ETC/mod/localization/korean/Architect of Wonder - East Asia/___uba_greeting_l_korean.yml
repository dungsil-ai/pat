l_korean:
  uba_greeting.0001.t: "건축가 길드" # 4960705424678709567
  uba_greeting.0001.desc.noblesopenning: "망토를 두른 방문자가 조용히 내 서재로 들어와 가볍게 고개를 숙입니다.\n\n수수께끼의 방문자가 차분한 목소리로 말합니다. \"당황하지 마십시오, 나의 [ROOT.Char.GetTitleAsNameNoTooltip]님. 저는 그저 건축가 길드에서 온 인사를 전하러 왔을 뿐입니다...\"\n\n" # 2724008396306084518
  uba_greeting.0001.desc.wanderersopenning: "외딴 구석에서 조용히 술을 마시며 평온한 한때를 즐기고 있는데, 망토를 두른 인물이 내 곁에 앉습니다.\n\n수수께끼의 방문자가 차분한 목소리로 말합니다. \"당황하지 마십시오, 나의 [ROOT.Char.GetTitleAsNameNoTooltip]님. 저는 그저 건축가 길드에서 온 인사를 전하러 왔을 뿐입니다...\"\n\n" # 9984035757292409174
  uba_greeting.0001.desc.modlist: "전령이 잠시 말을 멈추고 말합니다. \"현재 귀하께서 이용하실 수 있는 항목은 다음과 같습니다:" # 12983911799924365408
  uba_greeting.0001.desc.uba: "#high 경이로운 건축가 #!" # 936244055544573970
  uba_greeting.0001.desc.ubahbp: "#high 경이로운 건축가 - 아시아 특수 건물 팩#!" # 10037407921599972555
  uba_greeting.0001.desc.rba: "#high 왕국의 건축가 #!" # 3393655153810977323
  uba_greeting.0001.desc.hba: "#high 영지의 건축가 #!" # 6937509968893910295
  uba_greeting.0001.desc.eba: "#high 사유지의 건축가 #!" # 13151316916491258644
  uba_greeting.0001.desc.aba: "#high 자동화 건축가 #!" # 5562757195519034327
  uba_greeting.0001.desc.ending: "!\"\n\n전령이 당신의 눈을 똑바로 쳐다보며 말합니다. \"건축가 길드는 후원자 명단을 관리하고 있습니다. 언젠가 귀하의 이름이 그 명단에 오르기를 바랍니다. 관심이 있으십니까?\"" # 16299831343702102445
  uba_greeting.0001.a: "\"그것으로 충분합니다, 고맙소.\"" # 12529192001910921860
  uba_greeting.0001.a_tt: "당신이 눈을 깜빡이는 사이, 전령은 마치 처음부터 없었던 것처럼 사라져 버립니다." # 5929657740916820363
  uba_greeting.0001.thanks: "\"어디, 명단을 한번 보도록 하지.\"" # 17978358093454217358
  uba_greeting.0001.thanks_tt: "전령이 약간 낡은 두루마리를 꺼내 보입니다." # 5179274647886458212
  uba_greeting.0002.t: "후원자 명단" # 2154732685594516261
  uba_greeting.0002.desc.openning: "전령의 눈에 빛이 반짝이는 듯합니다. \"저희 길드는 물질적인 지원 여부와 상관없이 모든 후원자분께 감사하고 있습니다—\"\n\n" # 16166200582829722594
  uba_greeting.0002.desc.ending: "이분들은 건축가 길드에 막대한 지원을 해주신 분들입니다.\"\n\n\"또한 귀하께도 감사드려야겠군요, 나의 [ROOT.Char.GetTitleAsNameNoTooltip]님. 귀하의 지원은 저희에게 큰 원동력이 될 것입니다.\"\n\n무언가 더 말하려던 찰나, 수수께끼의 방문자는 작은 동전 주머니와 쪽지만을 남긴 채 사라져 버렸습니다." # 11115315510614428438
  uba_greeting.0002.a: "우연한 만남." # 6179017464008767407
  uba_greeting.0002.a_tt: "\"고맙습니다, 친애하는 플레이어님.\"" # 8899655902995606350
  uba_greeting.0002.desc.thanks: "\"감사의 인사를 전합니다:\nDCDAA\n윈지(云纪)\n위쯔한(郁梓涵)\n무이(木易)\n자오쯔(饺子)\n주이(住已)\nBloodlineCain\nsunny\n에이파뎬(爱发电) 사용자_2926a\n예밍(叶铭)\n에이파뎬(爱发电) 사용자_hvy6\n란상치헤이서더즈후이관(染上漆黑色的指挥官)\n스선머자오주러이즈주(是什么造就了一只猪)\n에이파뎬(爱发电) 사용자_wHgQ\nEvilCrayfish\n\"" # 1810593865040768753
