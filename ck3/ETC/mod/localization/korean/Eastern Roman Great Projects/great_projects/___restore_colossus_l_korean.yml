l_korean:
  great_project_type_restore_colossus: "로도스의 거상 복원" # 6013131868312511151
  great_project_type_restore_colossus_desc: "고대 세계 7대 불가사의 중 로도스의 거상만큼 창조자의 압도적인 힘과 영광을 널리 알린 것은 없었습니다. 반세기 동안 태양신 헬리오스의 거대한 청동상은 항구를 굽어보며 바다를 응시하는 인간이 만든 신으로 군림했습니다. 지진으로 무너지고 수 세기 전 그 값비싼 청동마저 고철로 팔려 나간 뒤로, 그것은 그저 전설로만 남았습니다.\n\n이제 역사를 다시 쓸 때가 왔습니다. 우리는 단순히 기념비를 세우는 것이 아니라, 기억의 심연 속에서 전설을 부활시킬 것입니다. 이 기념비적인 오만을 실현하기 위해서는 청동의 산과 철의 숲, 그리고 천 명의 장인들이 필요할 것입니다. 우리는 헬리오스를 다시 일으켜 우리 항구의 수호자로 삼고, 우리가 고대의 위대함을 계승한 진정한 후계자임을 세상에 선포할 것입니다. 우리는 세상에 잃어버린 불가사의를 되돌려주고, 그 과정에서 우리 자신의 이름으로 영원한 유산을 새길 것입니다." # 5212850635398335117
  great_project_type_tooltip_restore_colossus: "" # 17241709254077376921
  great_project_name_possessive_restore_colossus: "" # 17241709254077376921
  great_project_name_restore_colossus: "" # 17241709254077376921
  great_project_type_restore_colossus_contribution_foundations: "기초를 재발견하다" # 2653741888388352875
  great_project_type_restore_colossus_contribution_foundations_desc: "거의 천 년 동안 로도스의 거상은 기억 속에만 존재했고, 그 잔해는 약탈당하거나 사라졌습니다. 돌 하나를 놓기 전에 우리는 항구 입구를 발굴하고, 고대 기록을 검토하며, 최고의 측량사들을 고용하여 원래 기초가 있던 정확한 위치를 다시 찾아내야 합니다. 이 정도 규모의 기념비는 반드시 그 역사의 기반 위에 세워져야 합니다." # 7783022003194130867
  great_project_type_restore_colossus_contribution_name_foundations: "" # 17241709254077376921
  great_project_type_restore_colossus_contribution_skeleton: "철제 골격을 주조하다" # 8285004079204035313
  great_project_type_restore_colossus_contribution_skeleton_desc: "신의 뼈대를 만들기 위해서는 철의 강물이 필요합니다. 이 기여금은 거상의 내부 골격을 주조하는 거대한 작업의 자금이 될 것입니다. 수천 개의 철제 막대를 우리 최고의 대장장이들이 두드리고 리벳으로 고정하여, 항구 위로 솟아올라 청동 피부를 씌울 핵심 구조가 될 우뚝 솟은 골격을 만들어야 합니다." # 6281969729662252104
  great_project_type_restore_colossus_contribution_name_skeleton: "" # 17241709254077376921
  great_project_type_restore_colossus_contribution_skin: "청동 피부를 입히다" # 12210116713208873126
  great_project_type_restore_colossus_contribution_skin_desc: "건설의 마지막이자 가장 영광스럽고 비용이 많이 드는 단계입니다. 우리는 거상의 피부를 형성할 수백 개의 빛나는 판을 주조하기 위해 산더미 같은 청동을 확보해야 합니다. 이를 위해서는 거대한 새로운 주조소를 건설하고 영지 내 모든 금속 공학 장인을 모아 신에게 찬란하고 태양과 같은 형상을 부여해야 합니다." # 1002227784088833494
  great_project_type_restore_colossus_contribution_name_skin: "" # 17241709254077376921
  great_project_type_restore_colossus_contribution_beacon: "헬리오스의 봉화를 밝히다" # 12180030115568607416
  great_project_type_restore_colossus_contribution_beacon_desc: "거상은 서 있지만 그 눈은 어둡습니다. 이 작업은 거상의 머리나 치켜든 손 안에 거대한 반사판과 화로를 설치할 것입니다. 사제들이 관리하는 영원한 불꽃은 이 동상을 훌륭한 등대로 바꾸어, 우호적인 배들을 항구로 인도하고 우리에게 신의 은총이 깃들었다는 상징이 될 것입니다." # 1375523417929983394
  great_project_type_restore_colossus_contribution_name_beacon: "" # 17241709254077376921
  restore_colossus.0001.t: "기초를 재발견하다" # 9461177151213160960
  restore_colossus.0001.desc: "주군이시여, 수석 측량사가 로도스에서 승전보를 보내왔습니다! 수개월에 걸친 고된 발굴과 연구 끝에, 그들은 원래의 거상이 서 있었던 거대한 대리석 주춧돌을 찾아냈습니다. 이 기초의 압도적인 크기에 모든 회의론자가 침묵했습니다. 이제 우리는 신이 한때 어디에 서 있었고, 다시 어디에 서게 될지 알게 되었습니다." # 15116967193383358806
  restore_colossus.0001.a: "희망차고 역사적인 시작입니다!" # 4229671248183578495
  restore_colossus.0002.t: "골격이 완성되다" # 230229132798125721
  restore_colossus.0002.desc: "주군이시여, 로도스에서 끊이지 않던 망치 소리가 잦아들었습니다. 수석 대장장이가 거대한 철제 골격이 완성되었으며, 그 거대한 형상이 이미 스카이라인을 압도하고 있다고 보고했습니다. 그것은 앞으로 다가올 미래에 대한 앙상하지만 강렬한 약속처럼, 철제 팔을 하늘로 뻗고 있습니다. 이제 신의 육신을 입힐 뼈대가 준비되었습니다." # 15240860639829941172
  restore_colossus.0002.a: "신에게 어울리는 골격입니다!" # 13708083432382288796
  restore_colossus.0003.t: "거상이 완성되다!" # 7360537570628332527
  restore_colossus.0003.desc: "주군이시여, 해냈습니다. 마지막 청동 판이 들어 올려져 제자리에 고정되었습니다. 로도스의 거상은 더 이상 철제 골격이 아닌, 빛나는 청동으로 이루어진 웅장하고 거대한 모습으로 다시 온전해졌습니다. 태양이 그 매끄러운 표면에 반사되자 마치 스스로 빛을 내뿜는 듯하며, 우리의 힘과 경건함을 보여주는 눈부신 봉화가 되었습니다. 로도스의 항구는 다시 한번 영원한 수호자를 얻었습니다." # 14041100043622559046
  restore_colossus.0003.a: "세계의 불가사의가 다시 태어났습니다!" # 7367423007699290822
  restore_colossus.0004.t: "봉화가 밝혀지다!" # 13204805546415648180
  restore_colossus.0004.desc: "주군이시여, 지난밤 대사제가 의식을 거행했고 거상의 거대한 봉화가 처음으로 밝혀졌습니다. 그 강력한 빛이 바다를 가로질러 뻗어 나갔고, 인간이 만든 별처럼 멀리서도 보였습니다. 선원들은 벌써 이것을 기적이라 부르고 있으며, 사제들은 헬리오스께서 동상의 타오르는 시선을 통해 우리 항구를 굽어보고 계신다고 말합니다." # 11553828783585549924
  restore_colossus.0004.a: "우리 친구들에게는 빛을, 적들에게는 경고를 보내는군요." # 12843412639089150297
  restore_colossus.0005.t: "태양신이 다시 솟아오르다" # 1363092895956334652
  restore_colossus.0005.desc: "오늘, 거대한 비계가 마지막으로 철거되자 로도스 항구에는 경외감 어린 침묵이 흘렀고, 곧이어 수천 명의 입에서 터져 나온 귀청이 떨어질 듯한 환호성이 그 침묵을 깨뜨렸습니다. 작업은 끝났습니다. 거상이 다시 살아났습니다.\n\n빛나는 청동의 산에서 벼려낸 헬리오스의 거대한 모습이 스카이라인을 지배하고, 매끄러운 피부는 태양 빛을 받아 마치 하늘에서 내려온 별처럼 찬란하게 빛납니다. 한때는 그렇게 위대해 보이던 배들도 거상의 시선 아래를 지나갈 때는 마치 어린아이의 장난감처럼 보입니다. 이것은 단순한 동상이 아닙니다. 우리의 야망과 의지로 구현된 신이자, 힘의 선포입니다.\n\n전설을 부활시키기 위해 수 세대에 걸친 노력과 국고에 맞먹는 금이 소비되었습니다. 내 이름은 우리가 세상에 불가사의 중 하나를 되돌려준 날과 영원히 기억될 것이며, 나의 유산은 이제 우리 해안을 지키는 청동 신만큼이나 높고 변치 않을 것입니다." # 17384613618971458280
  restore_colossus.0005.a: "세상이 우리의 업적을 바라보고 경탄하게 하라!" # 521848162082422719
  restore_colossus.0006.t: "청동의 눈물" # 11192404318552374257
  restore_colossus.0006.desc: "로도스의 공사 감독관에게서 다급한 보고가 도착했습니다. 공사가 엄청난 무게를 이기지 못하고 무너져 내렸습니다. 청동과 임금으로 지불할 은의 강물은 말라버렸고, 오랫동안 임금을 받지 못한 숙련공들은 폭동을 일으켜 대장간을 파괴한 뒤 군중 속으로 사라졌습니다.\n\n현장은 그야말로 참담한 낭비의 현장입니다. 거대한 철제 골격은 일부만 덮인 채 앙상하고 녹슨 모습으로 하늘을 향해 서 있습니다. 막대한 비용을 들여 정교하게 주조한 거대한 청동 판들은 진흙 속에 반쯤 파묻힌 채 다시는 세워지지 못할 운명이 되었습니다. 우리는 태양을 쫓았으나, 우리의 야망은 너무나 큰 대가를 치르고 말았습니다.\n\n이 거대한 노력의 결과로 남은 것은 텅 빈 국고와 세상에서 가장 비싼 고철들로 가득 찬 항구뿐입니다. 이것은 우리의 영광을 기리는 기념비가 아니라, 우리의 어리석음을 증명하는 비석이 되었습니다." # 84182773259020942
  restore_colossus.0006.a: "야망의 시대가 녹의 시대로 저물다." # 10895233001354127611
  RHODES_LOCATION_2_TOOLTIP: "그대는 로도스를 보유하고 있다" # 9121771999423026013
  colossus_of_rhodos_modifier_desc: "웅장한 청동 거상이 로도스의 항구를 가로지르며 다시 우뚝 섰습니다. 그 압도적인 규모와 전설적인 위상은 알려진 세계 곳곳에서 상인과 선원, 순례자들을 불러 모아 섬을 막대한 부와 명예의 중심지로 탈바꿈시켰습니다. 빛나는 거상의 모습은 우리의 권력을 상징하는 강력한 표상이자, 우호적인 함대에게는 환영의 길잡이가, 침략자에게는 위협적인 경고가 됩니다. 로도스는 이제 단순한 섬이 아닙니다. 세계의 진정한 불가사의가 자리한 곳입니다." # 17015698158605775070
  colossus_of_rhodos_modifier: "로도스의 거상" # 122953829202470892
  maritime_benefactor_modifier_desc: "로도스의 위대한 항구 수호자를 복원하는 데 기여한 나의 공로는 바다를 누비는 모든 이들 사이에서 명성을 떨치게 했습니다. 세계 각지의 항구에서 선원과 상인, 선장들은 나를 무역의 위대한 후원자이자 안전한 항해를 보장하는 인물로 여기며 내 이름을 들어 건배합니다. 그들은 내가 거상에 투자한 것이 곧 이 지역 전체의 해상 번영을 위한 투자였음을 알고 있습니다." # 13323981551407867998
  maritime_benefactor_modifier: "해상 후원자" # 9306919896101779011
  dynasty_legacy_of_the_colossus_modifier_desc: "우리 가문의 이름은 이제 고대 세계 7대 불가사의 중 하나와 함께 역사에 영원히 새겨졌습니다. 먼 훗날 우리의 후손들은 기억의 먼지 속에서 청동의 신을 일으켜 세운 혈통으로 기억될 것입니다. 이 전설적인 업적은 우리 가문에 하찮은 가문들이 감히 범접할 수 없는 영원하고 기념비적인 명성을 가져다주었습니다." # 4989381491966720473
  dynasty_legacy_of_the_colossus_modifier: "거상의 유산" # 11494389761609832505
