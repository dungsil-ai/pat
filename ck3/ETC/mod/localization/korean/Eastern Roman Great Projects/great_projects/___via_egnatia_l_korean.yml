l_korean:
  great_project_type_via_egnatia_restoration: "비아 에그나티아 복구" # 4772042607213702806
  great_project_type_via_egnatia_restoration_desc: "비아 에그나티아는 한때 발칸 반도에서 로마 권력의 거대한 동맥이었으며, 아드리아해 연안과 콘스탄티노폴리스를 잇는 공학의 경이였습니다. 수세기에 걸친 방치로 인해 도로의 일부는 무너졌고, 다리는 붕괴되었으며, 도로의 전 구간은 이제 산적들의 소굴이 되었습니다. 이러한 쇠퇴는 단순히 상징적인 문제가 아닙니다. 이는 동부와 서부 속주 사이의 무역을 억제하고, 우리 주둔군의 보급을 방해하며, 산악 내륙 지역에 대한 제국 권위의 투사를 약화시킵니다. 이제 이 중요한 가도를 복구할 때가 왔습니다. 이 기념비적인 사업에는 막대한 금화와 수년에 걸친 조직적인 노력이 필요할 것입니다. 복구가 완료되면, 이 도로는 상업의 새로운 황금기를 자극하고, 국경 요새에 항상 보급이 이루어지도록 보장하며, 효율적인 세금 징수를 가능하게 하여 발칸 반도를 수도와 끊어지지 않는 돌과 강철의 사슬로 묶어줄 것입니다." # 17790827601912958409
  great_project_type_via_egnatia_restoration_contribution_imperial_survey: "제국 조사" # 17970156955724799681
