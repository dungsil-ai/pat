l_korean:
  great_project_type_reinforce_sicily: "시칠리아 보강" # 15637093248048909070
  great_project_type_reinforce_sicily_desc: "시칠리아가 붕괴 직전에 처했습니다. 수십 년간 이어진 간헐적인 전쟁으로 우리의 권위는 산산조각 났으며, 이제 적의 무리가 우리의 마지막 남은 거점마저 집어삼키려 위협하고 있습니다. 지중해의 핵심적인 징검다리인 이 섬을 영원히 잃게 될 위기입니다.\n\n이것은 확장의 문제가 아니라 생존의 문제입니다. 이 비상 칙령을 통해 우리는 금화, 함선, 베테랑 병사 등 가용한 모든 자원을 총동원하여 포위된 수비대를 보강하고, 우리 해안에서 적을 몰아내며, 정당한 우리의 영토를 되찾을 것입니다. 지금 실패하는 것은 중앙해 그 자체를 포기하는 것과 같습니다." # 11036877693158206550
  great_project_type_reinforce_sicily_contribution_syracuse_fort: "헥사필론 요새" # 16627541276260945263
  great_project_type_reinforce_sicily_contribution_syracuse_fort_desc: "시라쿠사는 섬 전체 방어의 거점이 되어야 합니다. 이 기부금은 고대 헥사필론 요새를 최첨단 성채로 재건하는 기념비적인 과업을 위해 자금을 지원하고 기술자를 제공합니다." # 12295773187394002615
  great_project_type_reinforce_sicily_contribution_sicily_troops: "원정군" # 9019348299265827403
  great_project_type_reinforce_sicily_contribution_sicily_troops_desc: "병사가 없는 요새는 무의미합니다. 이는 시칠리아로 파견될 대규모 베테랑 병력을 제공하며, 이들은 적의 잔당을 소탕하고 주요 마을을 수비하며 현지 민병대를 훈련시키는 임무를 맡습니다." # 5765546343414751830
  great_project_type_reinforce_sicily_contribution_sicily_navy: "해협 확보" # 16015598691059585258
  great_project_type_reinforce_sicily_contribution_sicily_navy_desc: "시칠리아는 섬입니다. 이곳을 차지한다는 것은 그 해역을 지배한다는 뜻입니다. 이 기여를 통해 메시나 해협을 순찰하고 해적을 소탕하며, 우리 군대가 바다를 통해 보급을 유지할 수 있도록 함대를 파견합니다." # 15324450971672894943
  great_project_type_reinforce_sicily_contribution_sicily_war_chest: "시칠리아 군자금" # 17450768137512290997
  great_project_type_reinforce_sicily_contribution_sicily_war_chest_desc: "전쟁은 금으로 움직입니다. 이 재정적 지원은 전체 작전의 중추 역할을 할 것이며, 용병 고용, 군량미 구입, 수비대를 위한 무기와 갑옷 제작에 사용될 것입니다." # 15502516532972729151
  syracuse_reinforced_modifier: "시라쿠사 보강됨" # 6245527029215378561
  syracuse_reinforced_modifier_desc: "시라쿠사의 고대 헥사필론 요새가 재건 및 확장되었습니다. 이제 이 도시는 시칠리아에서 벌어지는 우리 전략 작전의 난공불락의 심장부 역할을 수행합니다." # 6846404078718695354
  reinforce_sicily.0001.t: "시칠리아 보강 - 관대한 기부" # 11549469346896739996
  reinforce_sicily.0001.desc: "수도에서 온 서신을 통해 시칠리아 전쟁을 위한 지원이 접수되었음을 확인했습니다. 제국 조정은 전선으로 파견된 숙련된 인재들의 기여에 대해 공식적인 감사 선언을 발표했습니다. 공식 문서에서는 이러한 전문 지식이 앞으로의 험난한 원정에 필수적인 것으로 간주된다고 인정했습니다. 기록에 따르면 이러한 충성심의 표현은 옥좌에 의해 정식으로 기록되었습니다." # 10588437122291961989
  reinforce_sicily.0001.a: "왕국을 위하여." # 1576633549038102324
  reinforce_sicily.0002.t: "시칠리아 보강 - 무력의 노력" # 12255429299898862956
  reinforce_sicily.0002.desc: "시칠리아 전쟁에 관한 새로운 항목이 제국 연대기에 기록되었습니다. 기록에는 전선으로 파견된 증원군의 도착이 명시되어 있습니다. 이와 함께 발표된 칙령은 이 기여에 대해 왕실의 공식적인 감사를 표하며, 이를 충성의 핵심적인 표현이라 칭했습니다. 또한 이 전사들을 제공함으로써 보여준 헌신은 옥좌에 의해 정당하게 기억될 것임을 명시하고 있습니다." # 600100755719957982
  reinforce_sicily.0002.a: "그들이 우리에게 승리를 가져다주기를." # 12250295011645840726
  reinforce_sicily.0003.t: "시칠리아 보강 - 전쟁 노력을 위하여" # 11014887516624431426
  reinforce_sicily.0003.desc: "새로운 궁중 회보가 시칠리아 원정의 진행 상황을 보고하며, 특히 해군 세력의 역할을 언급했습니다. 이 문서는 전쟁 노력을 위해 기여한 해군 자산에 대해 공개적으로 감사를 표하고 있습니다. 또한 이러한 지원은 해상 통제권을 유지하는 데 결정적이며, 이것 없이는 지상군이 유지될 수 없음을 상세히 설명합니다. 이 행위는 지혜와 충직한 지원의 표본으로서 공식적으로 칭송받았습니다." # 4216030355443679855
  reinforce_sicily.0003.a: "섬길 수 있어 영광입니다." # 9804015535767584492
  reinforce_sicily.0004.t: "시칠리아 증원 - 충성스러운 기부" # 2741782957120002494
  reinforce_sicily.0004.desc: "제국 재무부로부터 시칠리아 전쟁을 위한 나의 재정 지원을 확인했다는 전령이 도착했습니다. 서신에는 나의 금화가 '전쟁의 근육' 역할을 하며 군대에 보급을 유지해 줄 것이라는 공식적인 감사가 담겨 있었습니다. 나의 관대함은 헛되지 않았습니다." # 14240311734313485911
  reinforce_sicily.0004.a: "나의 부는 제국을 위해 쓰일 뿐이다." # 8552036907561723661
  reinforce_sicily.0005.t: "시칠리아 증원 - 시칠리아의 꿈이 시들다" # 13966682149111645050
  reinforce_sicily.0005.desc: "어려운 결정이 내려졌습니다. 시칠리아에서의 거대한 계획은 포기될 것입니다. 금의 흐름은 끊겼고, 원정군은 소환되고 있으며, 새로 지어지던 요새의 반쯤 완성된 성벽은 비바람에 방치될 것입니다.\n\n비용은 너무 컸고, 도전은 너무나 많았습니다. 시칠리아가 다시 혼돈에 빠지게 두는 것은 뼈아픈 일이며, 우리의 능력이 한계에 도달했다는 명확한 신호를 적들에게 보내는 꼴입니다. 그 섬은 여전히 우리의 골칫거리로 남을 것입니다." # 278274725435744442
  reinforce_sicily.0005.a: "언젠가 후회하게 될 전략적 실패로군." # 18148343566262764469
  reinforce_sicily.0006.t: "시칠리아 증원 - 시칠리아 확보!" # 7896863482865661472
  reinforce_sicily.0006.desc: "최종 보고가 도착했습니다. 시칠리아에서의 위대한 과업이 완수되었습니다! 한때 전쟁으로 얼룩진 변방이었던 이 섬은 이제 나의 권력을 상징하는 보루가 되었습니다. 적들은 격퇴되었고, 들판은 안전하며, 새로운 요새들은 지중해를 굽어보는 침묵하는 석조 파수꾼처럼 서 있습니다.\n\n시라쿠사의 강력한 헥사필론부터 해안을 순찰하는 경계 함대에 이르기까지, 시칠리아는 더 이상 취약점이 아니라 적들의 심장을 겨누는 단검입니다. 오늘부터 이 섬에 안보와 번영의 새로운 시대가 시작됩니다." # 6934933886313245425
  reinforce_sicily.0006.a: "왕국을 위한 정의롭고도 완벽한 승리로다!" # 6944122366672056238
  reinforce_sicily.0007.t: "시칠리아 증원 - 시칠리아의 최후의 항전" # 194968289313699908
  reinforce_sicily.0007.desc: "적의 봉쇄망을 뚫고 달려오느라 돛이 갈기갈기 찢어진 쾌속 갤리선 한 척이 절박한 전갈을 싣고 도착했습니다. 시칠리아를 담당하는 스트라테고스의 인장이 깨지며 암울한 소식이 드러났습니다.\n\n이미 시칠리아의 거의 전역을 집어삼킨 사라센의 물결이 마지막 압도적인 공격을 위해 집결하고 있습니다. 그들의 목표는 섬에 남은 우리의 마지막 유의미한 거점인 시라쿠사의 거대 항구입니다. 수비대는 지쳤고, 성벽은 부서졌으며, 백성들은 피할 수 없는 공성전의 공포 속에 살고 있습니다.\n\n스트라테고스의 간청은 간단합니다. 시라쿠사가 함락되면 이 섬에서 우리의 존재는 영원히 사라질 것입니다. 옛 제국의 곡창지대를 잃게 될 것이며, 침략자들은 본토를 마음껏 습격할 수 있는 불침의 요새를 갖게 될 것입니다.\n\n지금이 마지막 순간입니다. 시칠리아를 구하기 위해 우리는 단순히 원조를 보내는 것에 그쳐서는 안 됩니다. 섬을 되찾기 위한 전면적인 작전을 개시해야 합니다." # 7216568369732874991
  reinforce_sicily.0007.a: "그들은 전쟁을 겪게 될 것이다! 우리는 시칠리아를 포기하지 않겠다!" # 18312326590015987415
  SICILY_LOCATION_1_TOOLTIP: "시라쿠사가 귀하의 영역 내에 있습니다." # 13515809872843035805
