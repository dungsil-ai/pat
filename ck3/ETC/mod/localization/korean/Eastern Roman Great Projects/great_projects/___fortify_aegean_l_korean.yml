l_korean:
  great_project_type_fortify_aegean: "에게해 연안 요새화" # 13188890383719395020
  great_project_type_fortify_aegean_desc: "크레타 에미르국이 우리의 군도해를 그들의 사냥터로 만들었습니다. 그들이 후원하는 해적들은 우리의 해상 무역을 억제하고, 연안 지역에 상처를 남기며, 우리 백성들을 노예로 잡아갑니다. 이를 방치할 수는 없습니다.\n\n이 거대한 과업은 제국의 응답입니다. 우리 해안을 방어할 깨지지 않는 방패를 만드는 것입니다. 우리는 해안 요새(`kastrons`)의 포괄적인 연결망을 구축하고, 우리의 검이 될 신속한 드로몬 전문 함대를 재건하며, 다가오는 위협을 경고할 고대의 봉수 체계를 복구할 것입니다.\n\n이 프로젝트는 해적들을 저지하는 데 그치지 않고, 그들을 분쇄할 것입니다. 이는 막대하고 비용이 많이 드는 노력이지만, 제국을 위해 바다를 되찾고 우리 해안의 번영과 안보를 회복할 것입니다." # 1727632950321232207
  great_project_type_fortify_aegean_contribution_aegean_forts: "카스트론 연결망 자금 지원" # 615123068716290696
  great_project_type_fortify_aegean_contribution_aegean_forts_desc: "우리의 주된 노력은 '카스트론'이라 불리는 수많은 해안 요새와 감시탑의 건설이어야 합니다. 이 석조 요새들은 지역 수비대의 방어 거점이자, 약탈자가 발견되었을 때 민간인들의 안전한 피난처 역할을 할 것입니다." # 14606626174002368760
  great_project_type_fortify_aegean_contribution_aegean_fleet: "드로몬 함대 재건" # 13941118766907937366
  great_project_type_fortify_aegean_contribution_aegean_fleet_desc: "적이 단순히 우회해서 항해할 수 있다면 성벽은 무용지물입니다. 우리는 수도의 조선소와 해군 테마에 자금을 지원하여 차세대 고속 드로몬을 건조해야 합니다. 액체 불을 뿜는 사이펀을 장착한 이 군함들은 해적을 추적하고 그들의 함대를 잿더미로 만들어버릴 검입니다." # 15272446786198092815
  great_project_type_fortify_aegean_contribution_aegean_militia: "비글라 순찰대 창설" # 11312816075328233887
  great_project_type_fortify_aegean_contribution_aegean_militia_desc: "요새에는 병사가 필요합니다. 이 계획은 전문 지역 민병대인 '비글라'의 훈련과 무장을 지원할 것입니다. 징집된 농민들과 달리, 이들은 전담 해안 파수꾼으로서 카스트론의 성벽을 지키고, 공성 장비를 운용하며, 테마 함대가 도착할 때까지 약탈자들과 교전하도록 훈련받을 것입니다." # 7211247473804231443
  great_project_type_fortify_aegean_contribution_aegean_arsenals: "해군 병기창 설립" # 12330539618794984037
  great_project_type_fortify_aegean_contribution_aegean_arsenals_desc: "함대와 요새는 목재, 역청, 철, 무기를 끊임없이 요구하는 굶주린 짐승과 같습니다. 우리는 주요 항구에 전용 요새화된 해군 병기창을 설립할 것입니다. 이 보급창들은 우리 함선이 수리되고 수비대가 신속하게 재보급받을 수 있도록 보장하여, 장기적인 투쟁에 대비한 태세를 유지하게 해줄 것입니다." # 13238961744701553211
  great_project_type_fortify_aegean_contribution_aegean_beacons: "봉수 체계 복구" # 3761843464623573494
  great_project_type_fortify_aegean_contribution_aegean_beacons_desc: "속도는 약탈자의 가장 큰 무기이지만, 지식은 우리의 무기가 될 것입니다. 모든 주요 섬과 곶에 고대의 신호 화환 체계를 복구함으로써, 남쪽에서 피어오른 경고는 단 몇 시간 만에 수도에 도달할 수 있습니다. 이 연결망은 우리 함대와 수비대가 대응할 귀중한 시간을 제공하여, 매복을 함정으로 바꿀 것입니다." # 3502190883185756323
  cretan_raid_devastation_modifier: "해적에게 유린당함" # 723435604465421476
  cretan_raid_devastation_modifier_desc: "이 백작령은 최근 크레타 에미르국에서 온 약탈자들에게 유린당했습니다. 마을은 불탔고, 수확물은 도난당하거나 소각되었으며, 많은 시민이 노예로 끌려갔습니다. 지역 경제는 파탄 났고, 남겨진 사람들은 끊임없는 공포 속에 살고 있습니다." # 17615956555294285554
  imperial_aegis_modifier: "제국의 방패" # 7973553157215331009
  imperial_aegis_modifier_desc: "이 백작령은 요새, 봉수, 해군 순찰망인 제국의 방패로 보호받고 있습니다. 해적의 위협은 무력화되었으며, 무역이 번창하고 지역 주민들이 안전하게 살 수 있게 되었습니다. 바다는 다시 한번 해적의 사냥터가 아닌 상업의 통로가 되었습니다." # 1330854393963764680
  fortify_aegean.0001.t: "첫 번째 카스트론의 주둔" # 2406800665106067348
  fortify_aegean.0001.desc: "해안에서 반가운 소식이 전해졌습니다. 거대한 '카스트론' 중 첫 번째 요새가 완공되었습니다. 그 석조 성벽은 제국의 결의를 상징하며 바다 위로 당당히 솟아 있습니다. 크레타 약탈자들에 대한 두려움으로 내륙으로 피신했던 지역 가족들은 이미 요새의 보호 아래 마을로 돌아오고 있습니다.\n\n한 세대 만에 처음으로, 이 해안의 사람들은 두려움 대신 희망을 품고 바다를 바라볼 수 있게 되었습니다. 이 요새는 단순한 돌과 모르타르 그 이상입니다. 그것은 안식처이자 앞으로 다가올 안전에 대한 약속입니다." # 819081724680766914
  fortify_aegean.0001.a: "우리 백성을 위한 돌의 방패." # 5564124573661893486
  fortify_aegean.0002.t: "드로몬이 바다로 나아가다" # 16270265696229385371
  fortify_aegean.0002.desc: "새로 취역한 에게해 함대의 제독이 해군 조선소로부터 소식을 보내왔습니다. 매끄러운 선체에 위협적인 그리스 불 방사기를 장착하고 연마를 마친 첫 번째 드로몬들이 해상 시운전을 위해 진수되었습니다. 기량과 공격성을 보고 엄선된 승조원들은 이 함선들을 단순한 열병식용 전시물이 아닌 해적 사냥꾼으로 탈바꿈시키고 싶어 안달이 나 있습니다.\n\n조선공들은 제 할 일을 다 마쳤습니다. 이제 선원들이 나설 차례입니다. 이 함대는 단순한 우리의 방패가 아닙니다. 크레타의 위협이라는 심장을 꿰뚫기 위해 우리가 던질 창입니다." # 8459980464733755869
  fortify_aegean.0002.a: "그들이 사냥하게 하라. 그들이 불태우게 하라." # 5800903795219667361
  fortify_aegean.0003.t: "비글라의 감시" # 16500595533025441296
  fortify_aegean.0003.desc: "훈련이 완료되었습니다. 새로운 지역 민병대 훈련을 담당하는 스트라테고스가 '비글라'의 첫 번째 부대들이 이제 활동을 시작했다고 보고했습니다. 이들은 밭에서 끌려온 흔한 징집병들이 아닙니다. 오로지 해안 방어에만 전념하는 전문적이고 잘 무장된 군인들입니다.\n\n한때 공포에 질린 마을 사람들만 있던 곳에, 이제는 우리의 새로운 요새 성벽 위에서 규율 잡힌 파수꾼들이 서 있습니다. 그들은 자기 공동체의 눈과 귀, 그리고 검이며, 드로몬 함대가 적을 섬멸하기 위해 접근할 때까지 전선을 유지할 준비가 되어 있습니다." # 16299010504447752703
  fortify_aegean.0003.a: "그들은 우리 성벽의 살아있는 심장이다." # 10302635702742040046
  fortify_aegean.0004.t: "전쟁의 혈맥" # 722708479647276971
  fortify_aegean.0004.desc: "나의 로고테테스가 새로운 해군 병기창들이 가동을 시작했으며 물자도 완전히 비축되었음을 확인했습니다. 주요 항구의 요새화된 저장고에는 수리를 위한 목재, 방수를 위한 역청, 그리고 함대를 위한 화살과 그리스 불이 막대하게 비축되어 있습니다.\n\n이전에는 파손된 함선이 수리를 위해 수도까지 절뚝거리며 돌아가야 했기에 몇 달 동안 전투에서 제외되었습니다. 이제 우리 함대들은 초계 경로 근처에서 수리, 재무장, 보급을 받을 수 있게 되어, 전투 준비 태세와 해상 체류 시간이 비약적으로 향상되었습니다. 이러한 병참의 중추는 우리의 방패에 결코 금이 가지 않고 우리의 검이 결코 무뎌지지 않도록 보장할 것입니다." # 241362996714935468
  fortify_aegean.0004.a: "화려하진 않으나, 지극히 중대한 승리로다." # 3027233246659632136
  fortify_aegean.0005.t: "빛의 사슬" # 5809715934248437943
  fortify_aegean.0005.desc: "나의 명령에 따라, 어젯밤 거대한 봉수 체계의 마지막 구간에 대한 시험이 이루어졌습니다. 남쪽 섬에서 피어오른 신호의 불길은 봉우리에서 봉우리로 전달되어, 어둠 속에서 에게해를 가로지르는 빛의 강을 이루었습니다. 경보는 가장 빠른 배가 항해할 수 있는 시간보다 훨씬 더 일찍 수도에 도착했습니다.\n\n해적들의 가장 큰 무기는 언제나 기습이었습니다. 텅 빈 수평선에서 나타나 대응이 이루어지기도 전에 사라지는 능력 말입니다. 우리는 그들에게서 그 이점을 빼앗았습니다. 이제 정보는 우리의 것이며, 주도권 또한 그러합니다." # 6100258127908709755
  fortify_aegean.0005.a: "지식은 우리의 가장 날카로운 무기다." # 5460186871019671426
  fortify_aegean.0006.t: "에게해를 확보하다!" # 7638984470609348747
  fortify_aegean.0006.desc: "해안에서 온 전령이 자부심 가득한 얼굴로 도착했습니다. 마지막 돌이 놓였고, 마지막 봉화가 타올랐으며, 마지막 드로몬이 새로 창설된 테마 함대에 합류했습니다. 대업이 완수된 것입니다.\n\n벌써 첫 보고들이 들어오고 있습니다. 곡물과 비단을 가득 실은 상단들이 이제 우리 초계함의 감시 아래 항해하고 있습니다. 어부들은 최근까지 해적들이 지배하던 바다에 그물을 던집니다. 수평선에 보이는 연기는 이제 불타는 마을이 아니라 번영하는 항구의 가마솥에서 피어오르는 것입니다.\n\n이것은 단 한 번의 돌격이 아니라 수년간의 노동, 산더미 같은 황금, 그리고 굴하지 않는 제국의 의지로 일구어낸 것이기에 그 어떤 전투보다도 위대한 승리입니다. 해적들의 즐겨 찾던 사냥터는 이제 그들의 감옥이 되었습니다. 섬들의 바다는 다시 한번 제국의 것이 되었습니다." # 16398497074219701237
  fortify_aegean.0006.a: "제국의 인내와 의지의 증거로다." # 16904639823414467334
  fortify_aegean.0007.t: "해안의 잿더미" # 14468592406754385965
  fortify_aegean.0007.desc: "처참한 소식이 도착했습니다. 전례 없는 대담함으로, 거대한 크레타 함대가 우리 초계망을 뚫고 에게해 방어 프로젝트의 본부를 습격했습니다. 해적들은 노예나 황금을 약탈하러 온 것이 아니라, 우리의 야망의 심장을 타격하러 온 것이었습니다.\n\n그들은 새로운 조선소에 불을 지르고, 거의 완공된 신호탑들을 무너뜨렸으며, 작업을 감독하던 수석 기술자들을 학살했습니다. 수년간의 끊임없는 노력, 수많은 생명, 그리고 산더미 같은 보물들이 단 몇 시간 만에 연기와 잔해로 변해버렸습니다.\n\n바다의 안전에 대한 희망은 꺼졌습니다. 해적들은 분명한 메시지를 보냈습니다. 그들은 단순히 우리 해안을 약탈하는 것이 아니라, 우리가 그들의 해상 지배력에 도전하는 것을 허용하지 않을 것입니다." # 9396713628277856894
  fortify_aegean.0007.a: "그들은 이 오만함에 대해 피와 불로 대가를 치르게 될 것이다!" # 8293281621084118671
  ACHAIA_LOCATION_TOOLTIP: "아카이아가 귀하의 영역 내에 있음" # 13509475949112172412
  ATHENS_LOCATION_TOOLTIP: "아테네가 귀하의 영역 내에 있음" # 14078922971017787015
  THESSALY_LOCATION_TOOLTIP: "테살리아가 귀하의 영역 내에 있음" # 16424971386654349709
  THESSALONIKA_LOCATION_TOOLTIP: "테살로니카가 귀하의 영역 내에 있습니다" # 6677009263641808391
  STRYMON_LOCATION_TOOLTIP: "스트리몬이 귀하의 영역 내에 있습니다" # 12762410998930488277
  AEGEAN_ISLANDS_LOCATION_TOOLTIP: "에게해 제도가 귀하의 영역 내에 있습니다" # 7468968395372378807
  EPHESE_LOCATION_TOOLTIP: "에페소스가 귀하의 영역 내에 있습니다" # 16642642145120087996
  fortify_aegean.0008.t: "파도 위의 불꽃" # 6396272925009172530
  fortify_aegean.0008.desc: "침울한 표정의 드룬가리오스가, 자신의 배조차 간신히 항해할 수 있는 상태로 남부 에게해에서 비극적인 소식을 가져왔습니다. 크레타 에미르국이 유례없는 대담함을 보이며 우리 섬 전역에 조직적인 화염과 공포의 폭풍을 일으켰습니다.\n\n그들의 함대는 단일 목표를 타격하지 않고 여러 섬을 동시에 덮쳤습니다. #bold 로도스#!에서 그들은 주요 요새를 우회하여 무방비 상태의 시골을 불태우고, 수백 명의 마을 주민과 제철 곡물 수확물을 약탈해 갔습니다. #bold 낙소스#!에서는 대리석 채석장을 습격하여 노동자들을 학살하고 항구에 불을 질렀습니다. 무엇보다 최악인 것은, #bold 키오스#!에서 그들이 제국 국고에 직접적인 타격을 주기 위해 대체 불가능한 유향나무 숲을 체계적으로 파괴했다는 점입니다.\n\n이것은 단순히 약탈을 위한 습격이 아니었습니다. 이것은 우리 섬의 바다 전역에 불과 피로 쓰인 메시지였습니다. 그들은 어떤 해안도 안전하지 않으며, 어떤 섬도 그들의 손길이 닿지 않는 곳은 없음을 증명하고 있습니다. 생존자들의 비명 소리가 수도에 울려 퍼지며 대응을 요구하고 있습니다." # 2148525783120169570
  fortify_aegean.0008.a: "그들은 우리의 눈물바다 위를 항해하고 있다. 그들 자신의 피바다 속에서 익사하게 될 것이다!" # 10718453205986678591
  fortify_aegean.0010.t: "헬라스의 유린" # 13755731747664738348
  fortify_aegean.0010.desc: "펠로폰네소스의 스트라테고스가 보낸 숨 가쁜 전령이 우리의 최악의 공포를 확인해주었습니다. 크레타 해적들이 상상 이상으로 대담해졌습니다. 그들은 우리 제국의 고대 심장부인 헬라스 본토의 동쪽 해안에 상륙했습니다.\n\n#bold 모넴바시아#!의 암벽을 직접 공격하는 것이 어리석은 짓임을 알고, 그들의 배는 대신 해안을 따라 상륙하여 선원들이 무방비 상태의 배후지로 떼 지어 몰려들었습니다. 그들은 요새에 물자를 공급하는 귀중한 올리브 숲과 포도원을 불태워, 수십 년간의 정성 어린 경작지를 검은 연기 기둥으로 바꾸어 놓았습니다. 더 북쪽에서는 다른 약탈 부대가 코린토스 외곽을 타격하여 비단 작업장을 약탈하고 장인들을 학살했습니다.\n\n이것은 우리의 경제와 자부심에 대한 계산된 타격이었습니다. 그들은 고대 속주조차 안전하지 않다는 것을 보여주었습니다. 그들은 영웅과 철학자들을 탄생시킨 해안을 자신들의 개인 금고로 만들며, 우리 자신의 땅을 보호하지 못하는 우리의 무능함을 조롱하고 있습니다." # 11574007976438125022
  fortify_aegean.0010.a: "이런 일이 다시는 일어나서는 안 된다. 헬라스의 해안을 요새로 만들어야 한다." # 11749175133112053521
  fortify_aegean.0012.t: "역사에 새겨진 상처" # 2940385690725987511
  fortify_aegean.0012.desc: "트라케시아 테마의 스트라테고스로부터 서신이 도착했는데, 양피지는 바다 소금과 재로 얼룩진 듯 보입니다. 크레타인들이 다시 한번 타격을 가했으며, 이번에는 아나톨리아 서부 해안을 따라 파괴의 경로를 개척했습니다.\n\n그들의 목표는 전략적인 만큼이나 상징적이었습니다. 그들은 고대 도시 #bold 에페소스#! 주변 땅을 덮쳤습니다. 도시의 현대적 수비대가 아크로폴리스를 지키는 동안, 해적들은 그 아래의 역사적 유적지로 떼 지어 몰려갔습니다. 그들은 오래된 신전에서 대리석을 약탈하고, 사도 바울이 한때 설교했던 초기 교회들을 훼손했으며, 외곽 정착지의 남은 시설들에 불을 질렀습니다. 보고에 따르면 그들은 단순히 약탈을 위해서가 아니라, 마치 우리의 영광스러운 과거의 기억 그 자체를 조롱하려는 듯 신성한 땅을 파헤쳤다고 합니다.\n\n이것은 심각한 모독 행위였습니다. 그들은 단순히 우리 백성들의 물건을 훔친 것이 아니라, 우리의 역사를 훔쳤으며 결코 완전히 되찾을 수 없는 유산을 불태웠습니다. 메시지는 분명합니다. 우리의 신앙과 문명의 신성한 기념물조차 그들의 탐욕스러운 손길에서 벗어날 수 없다는 것입니다." # 5027762621768254610
  fortify_aegean.0012.a: "그들이 성지를 더럽혔다! 하느님에 대한 이 모욕을 묵과할 수 없다!" # 15053433243919476546
  fortify_aegean.0014.t: "파르테논의 흉터" # 8765912433660320632
  fortify_aegean.0014.desc: "헬라스에서 온 최신 보고는 교육받은 모든 로마인의 심장에 비수를 꽂는 소식이었습니다. 크레타 해적들이 옛 야만인들처럼 아티카를 덮쳤습니다.\n\n고대의 긴 성벽은 오래전에 사라졌지만, #bold 아테네#!의 아크로폴리스는 여전히 강력한 요새로 서 있습니다. 이를 알고 있는 해적들은 공성전을 시도하지 않았습니다. 대신 그들은 아티카 평원의 올리브 숲과 마을들을 불태운 뒤, 암벽에 전격적인 공격을 가했습니다. 그들은 소수의 수비대를 제압했으며, 그들의 목표는 정복이 아니라 약탈과 신성 모독이었습니다.\n\n그들은 더 이상 이교도 신전이 아닌 파나기아 아테니오티사의 대성당인 파르테논으로 난입했습니다. 그들은 제단에서 은을 벗겨내고, 벽에서 성상을 떼어냈으며, 귀중한 등불들을 산산조각 냈습니다. 그들은 세계에서 가장 유명한 언덕 위에서 우리의 유산과 신앙을 조롱하며 도시의 영혼에 상처를 입혔습니다. 페리클레스와 플라톤의 도시가 유린당했습니다." # 11059311024758316320
  fortify_aegean.0014.a: "그들이 우리의 금은 훔칠 수 있어도, 유산은 훔칠 수 없다. 노력을 배가하겠다." # 15027866251529535289
  fortify_aegean.0016.t: "약탈당한 곡창지대" # 3938744077429924178
  fortify_aegean.0016.desc: "말이 거품을 물고 죽기 직전인 상태로 초췌한 전령이 헬라디코 테마에서 도착했습니다. 그의 소식은 크레타의 위협이 그 어느 때보다 깊숙이 침투했음을 확인해주었습니다. 파가세틱만에 배를 정박시킨 후, 그들의 약탈 부대는 데메트리아스 항구를 포위하는 대신 테살리아의 비옥한 평원으로 흩어졌습니다.\n\n그들은 메뚜기 떼처럼 빠르게 움직이며 우리의 순찰대를 피하고 무방비 상태의 시골을 습격했습니다. 그들은 거대한 밀밭에 불을 질러 헬라스의 곡창지대를 황폐한 불모지로 만들었습니다. 헛간은 불타고 곡물 창고는 약탈당했으며, 가축 떼 전체가 도살되거나 그들의 배로 끌려갔습니다.\n\n이것은 우리의 생존 그 자체에 대한 공격이었습니다. 단순히 약탈을 위한 것이 아니라 기근과 혼란을 야기하기 위한 계산된 작전이었습니다. 그들은 우리 군대와 도시를 굶주리게 하여, 내륙 평원조차 그들의 파괴적인 손길로부터 안전하지 않다는 것을 증명하려 하고 있습니다." # 15738485208981276254
  fortify_aegean.0016.a: "그들은 우리의 느림을 이용하고 있다. 더 빠른 부대를 창설하겠다." # 4607575899212066240
  fortify_aegean.0018.t: "성산의 신성 모독" # 7479388885024272429
  fortify_aegean.0018.desc: "누더기가 된 사제복을 걸치고 공포에 질린 얼굴을 한 피난민 수도사가 우리 신앙의 심장을 찌르는 소식을 전해왔습니다. 크레타 해적들이 성산 #bold 아토스#!의 해안에 상륙했다는 소식입니다.\n\n그들은 정복하러 온 것이 아니라, 더럽히러 왔습니다. 악마 같은 분노로 움직이며 신성한 정원과 통로를 휩쓸었고, 흩어져 있던 켈리아와 스케테를 덮쳤습니다. 그들은 수적으로 압도하여 소수의 경비병을 제압하고 대 라브라 자체를 습격했습니다. 그들은 신성한 유해함을 부수고 성인들의 유골을 바닥에 흩뿌렸습니다. 금박을 입힌 귀중한 성상들은 도끼질을 당해 산산조각 났으며, 천 년의 지혜가 담긴 대체 불가능한 사본들이 가득한 도서관은 불길에 휩싸였습니다.\n\n이것은 단순한 약탈이 아니었습니다. 이것은 가장 심각한 수준의 모독이며, 하나님 본인을 향한 순수하고 신성 모독적인 증오의 행위였습니다. 보고에 따르면 해적들은 가져갈 수 없는 것들을 불태우며 비웃었다고 합니다. 모든 정교회가 신앙의 수호자인 당신에게 이 혐오스러운 행위에 대한 응답을 기대하고 있습니다." # 14838582725433223248
  fortify_aegean.0018.a: "하나님께서 우리를 시험하셨으나, 우리는 부족함이 드러났습니다. 우리는 참회하고 재건해야 합니다." # 9231826923926025606
  fortify_aegean.0020.t: "제2의 도시에 가해진 모욕" # 7913248900442022629
  fortify_aegean.0020.desc: "북쪽에서 공포의 물결이 밀려오고 있습니다. 크레타의 위협이 충격적인 오만함을 드러내며 대도시 #bold 테살로니카#!를 감히 공격했습니다.\n\n전설적인 테오도시우스 성벽에 병력을 낭비하기에는 너무나 교활했던 해적들은 대신 훌륭하면서도 굴욕적인 해상 봉쇄를 단행했습니다. 그들의 함대는 테르마이코스만의 입구를 틀어막고, 도시의 코앞에서 재물과 곡물을 가득 실은 상선들을 나포했습니다. 주력 함대가 항구를 인질로 잡고 있는 동안, 소규모 약탈 부대는 서쪽에 상륙하여 대도시를 먹여 살리는 비옥한 평원을 불태우고 성벽 밖에 있는 여러 수도원을 약탈했습니다.\n\n며칠 동안 제국 제2의 도시 시민들은 지평선을 뒤덮은 연기와 해적들이 아무런 제지 없이 약탈하는 모습을 성벽 위에서 지켜봐야만 했습니다. 제국의 권위는 조롱거리가 되었고, 수호자인 성 데메트리오스에 대한 백성들의 믿음은 흔들리고 있습니다." # 14950167821705438648
  fortify_aegean.0020.a: "그들이 파도를 지배한다고? 나는 그들을 익사시킬 불의 바다를 만들 것이다!" # 2345775812250079499
  fortify_aegean.0022.t: "황제의 문턱에서" # 1030171076857522147
  fortify_aegean.0022.desc: "에게해의 드룬가리오스가 보낸 긴급 파견문이 소름 끼치는 소식을 전해왔습니다. 남쪽 섬들을 약탈하는 것에 더 이상 만족하지 못한 크레타의 위협이 제국의 목줄기인 헬레스폰토스를 타격했습니다.\n\n숨 막힐 정도로 대담한 양면 공격으로, 한 해적 함대가 부유한 섬 #bold 레스보스#!를 습격했습니다. 그들은 미틸레네 주변의 올리브 농장을 불태우고 무방비 상태의 해안 마을들을 약탈하여 배에 전리품을 가득 실었습니다. 하지만 이것은 기만책이었습니다. 크레타의 주력 함대는 다른 모든 목표를 우회하여 해협의 요충지이자 우리 해군의 주요 기지인 #bold 칼리폴리스#!로 직행했습니다.\n\n그들은 무시무시한 속도로 준비되지 않은 해군 공창을 덮쳐 수리 중인 선박들에 불을 지르고 우리 함대에 보급품을 공급하는 창고들을 약탈했습니다. 그들은 요새를 점령하려 하지 않았지만, 그럴 필요도 없었습니다. 그들은 우리 해군을 그들의 항구에서 타격할 수 있으며, 콘스탄티노폴리스로 향하는 중요한 항로를 위협할 수 있음을 증명했습니다. 해적들은 더 이상 성문 앞에 있는 것이 아니라, 문을 두드리고 있습니다." # 12253305610538247941
  fortify_aegean.0022.a: "감히 우리 함대에 손을 대다니? 그 오만함의 대가로 불타게 될 것이다!" # 16579045513392808335
  fortify_aegean.0024.t: "황금문의 신성 모독" # 12630223104859022709
  fortify_aegean.0024.desc: "공포가 엄습합니다. 한 세기 동안 들리지 않았던 경종이 도시 전체에 울려 퍼지니, 이는 순수한 공포의 소리입니다. 마르마라해의 짙은 새벽 안개를 틈타, 크레타 해적 함대가 불가능할 정도로 대담한 기동으로 우리 해군 순찰대를 지나쳐 잠입했습니다.\n\n그들은 해안 성벽에 직접 도전할 엄두는 내지 못했습니다. 대신 황금문 근처에 상륙하여 테오도시우스 성벽의 보호 구역 바로 밖에 있는 부유한 수도원들과 귀족들의 별장들을 휩쓸었습니다. 거대한 스투디오스 수도원은 샅샅이 뒤져졌고, 신성한 철학서들이 가득한 도서관은 재가 되었습니다. 그들은 아무런 제지 없이 약탈을 자행했으며, 그들의 횃불은 블라케르나이 궁전의 가장 높은 탑에서도 보일 정도였습니다.\n\n타그마타가 소집되어 출격했을 때 해적들은 이미 사라진 뒤였습니다. 그들은 보물과 포로, 성유물을 배에 가득 싣고 안개 속으로 항해하며 웃음소리를 바다 너머로 남겼습니다. 그들은 도시들의 여왕을 정복하지는 못했지만, 그보다 더 나쁜 짓을 저질렀습니다. 그에게 상처를 입히고 굴욕을 주었으며, 우리 제국 어디도 진정으로 안전하지 않다는 것을 증명했습니다. 그들은 하나님께서 선택하신 수도를 조롱거리로 만들었습니다." # 7824911821696017471
  fortify_aegean.0024.a: "그들이 내 집에 불을 질렀으니, 나는 그들의 집에 종말을 선사하겠다." # 101999607974323989
  fortify_aegean.0025.t: "바다가 내어준 전리품" # 4177583611985985941
  fortify_aegean.0025.desc: "감시병들의 보고는 틀리지 않았습니다. 당신의 함대가 수평선 너머로 돌아왔으며, 배들은 전리품으로 인해 수면 깊숙이 가라앉아 있습니다. 선장들의 보고는 매우 고무적입니다. 그들은 흩어진 양 떼를 덮치는 늑대처럼 에게해의 부유하지만 방비가 허술한 섬들을 덮쳤습니다. 룸의 수비대들은 추풍낙엽처럼 쓸려나갔고 그들의 마을은 재물을 바쳤습니다. 이제 이 승리의 결실이 이크리티시의 부두에 내려지고 있습니다. 비잔티움 노미스마타가 넘쳐나는 궤짝들, 반짝이는 비단 뭉치들, 그리고 금도금된 교회 기물들이 높이 쌓여 있습니다. 부유한 상인부터 비천한 농부까지, 비참한 포로들의 긴 행렬이 노예 시장으로 끌려가고 있습니다. 황제의 함대는 둔하고 무능했습니다. 그들의 약함은 우리의 힘이며, 그들의 부는 이제 우리의 것입니다. 알라께서 우리 선원들의 용기에 복을 내리셨습니다!" # 16859402707590430233
  fortify_aegean.0025.a: "진정으로 축복받은 승리로다!" # 14223194150447244732
