l_korean:
  great_project_type_anatolian_beacon_system: "아나톨리아 봉화 체계를 복구하십시오" # 5804302049478267634
  great_project_type_anatolian_beacon_system_desc: "제국의 국경은 피를 흘리는 상처와 같습니다. 끊임없는 약탈이 전원을 황폐화하여 번영하던 테마를 위험한 변경 지대로 바꾸어 놓았습니다. 이러한 위협에 대응하기 위해서는 소문보다 빠르게, 약탈자의 말보다 신속하게 움직여야 합니다.\n\n#bold 테오필로스 황제#의 시대에 시리아에서 자행되는 파괴적인 사라센의 약탈을 막기 위한 기발한 해결책이 고안되었습니다. 황제의 후원 아래, 위대한 학자이자 철학자인 #bold 수학자 레오#는 봉화 체계를 완성했는데, 이는 병참과 광학 공학의 승리였습니다. 이 빛의 동맥은 룰론의 변경 요새에서부터 대궁전의 파로스 등대까지 이어졌습니다. 제국의 국력이 쇠퇴하면서 이 체계는 사용되지 않게 되었으나, 그 효율성에 대한 기억은 여전히 남아 있습니다.\n\n이제 우리에게 이 제국 공학의 경이로움을 부활시킬 임무가 주어졌습니다. 우리는 탑을 재건하고 시야를 확보하여, 다시 한번 수도가 가장 멀고 위험한 국경을 굽어살필 수 있도록 할 것입니다." # 1834851122684378937
  great_project_type_tooltip_anatolian_beacon_system: "" # 17241709254077376921
  great_project_name_possessive_anatolian_beacon_system: "" # 17241709254077376921
  great_project_name_anatolian_beacon_system: "" # 17241709254077376921
  great_project_type_anatolian_beacon_system_contribution_survey: "산꼭대기를 조사하라" # 9970375807793485962
  great_project_type_anatolian_beacon_system_contribution_survey_desc: "봉화의 가치는 오직 시야가 확보될 때에만 빛을 발하는 법입니다. 우리는 측량사와 공병대로 구성된 부대를 타우루스산맥과 아나톨리아 고원 전역으로 파견해야 합니다. 그들은 매복과 험준한 지형이라는 위험을 무릅쓰고 가장 높은 봉우리들을 측량하며, 봉우리와 봉우리 사이의 가장 명확한 시야를 기록할 것입니다. 이 조사는 우리들의 끊어지지 않는 빛의 사슬을 만들기 위한 필수적인 첫걸음입니다." # 14865084957030760547
  great_project_type_anatolian_beacon_system_contribution_name_survey: "" # 17241709254077376921
  great_project_type_anatolian_beacon_system_contribution_frontier: "국경 봉화를 건설하라" # 6211028611397443882
  great_project_type_anatolian_beacon_system_contribution_frontier_desc: "경고의 첫 불꽃이 가장 중요한 법입니다. 이 고된 작업은 적대적인 킬리키아 국경을 따라 사슬의 첫 고리를 만드는 데 집중합니다. 이것들은 단순한 탑 그 이상이 될 것입니다. 룰론 요새와 같이 전략적으로 중요한 길목에 군사 공학자들이 건설하는 요새화된 주둔지가 될 것입니다. 이들은 침략군을 포착하는 경계의 첫 눈이자, 횃불을 밝히는 첫 손이 될 것입니다." # 12403761132359600809
  great_project_type_anatolian_beacon_system_contribution_name_frontier: "" # 17241709254077376921
  great_project_type_anatolian_beacon_system_contribution_pharos: "대궁전의 파로스" # 9802565988190517193
  great_project_type_anatolian_beacon_system_contribution_pharos_desc: "최종 연결 지점은 바로 이곳, 도시들의 여왕에 있어야 하오. 이 작업은 위대한 궁전의 전설적인 파로스 등대 꼭대기에 최종 수신국이자 지휘 본부를 건설할 것이오. 이 유리한 지점에서 신호가 수신되어 황실 조정으로 직접 중계될 것이며, 멀리서 반짝이는 빛 한 줄기를 즉각적인 첩보로 탈바꿈시킬 것이오." # 6778939008912823655
  great_project_type_anatolian_beacon_system_contribution_name_pharos: "" # 17241709254077376921
  great_project_type_anatolian_beacon_system_contribution_vigiles: "봉화 감시단(Vigiles) 창설" # 534674411709024908
  great_project_type_anatolian_beacon_system_contribution_vigiles_desc: "감시할 숙련되고 헌신적인 인물 없이는 탑도 무용지물입니다. 이 선택적이지만 필수적인 기여는 전문 병사들로 구성된 새로운 부대, 즉 봉화 감시병(Beacon Watch) 혹은 *비질레스(Vigiles)*를 창설하는 데 사용될 것입니다. 그들은 복잡한 신호 장비를 유지 보수하고, 온갖 악천후 속에서도 연료 보급을 관리하며, 고독한 밤을 지새우며 경계 근무를 서도록 훈련받을 것입니다. 그들의 전문성은 이 체계를 더욱 견고하게 만들고, 그 경보를 더욱 신뢰할 수 있게 할 것입니다." # 2009686491710717466
  great_project_type_anatolian_beacon_system_contribution_name_vigiles: "" # 17241709254077376921
  great_project_type_anatolian_beacon_system_contribution_semaphore: "신호기 통합" # 4361900345342308968
  great_project_type_anatolian_beacon_system_contribution_semaphore_desc: "단순한 봉화는 '위험'만을 알릴 수 있을 뿐입니다. 이 고급 업그레이드를 통해 각 감시 초소에 정밀한 물시계와 복잡한 신호판을 갖추게 될 것입니다. 이를 통해 봉화 감시단은 적군의 대략적인 규모, 이동 방향, 위협의 성격(약탈자, 공성군 등)을 나타내는 암호화된 메시지를 전달할 수 있게 됩니다. 이는 단순한 경보를 진정한 군사 정보로 탈바꿈시킬 것입니다." # 15573437750909042811
  great_project_type_anatolian_beacon_system_contribution_name_semaphore: "" # 17241709254077376921
  anatolian_beacon_system.0001.t: "산꼭대기를 측량하다" # 10936390298031356783
  anatolian_beacon_system.0001.desc: "주군이시여, 제국 전체가 제국 봉화 체계의 완성을 축하하는 지금, 당신께 특별한 영예가 돌아가야 마땅합니다. 탑을 쌓아 올린 석공들이나 마지막 연결 고리를 설계한 기술자들을 칭송하는 이들은 많으나, 궁정의 학자들과 전략가들은 이 위대한 업적이 진정 어디에서 시작되었는지 기억하고 있습니다.\n\n그 시작은 적대적이고 미지의 황무지를 측량하던 위험천만한 첫걸음이었습니다. 산봉우리와 골짜기를 탐사하며 목숨을 걸고 지도를 그려내어 이 모든 것을 가능하게 한 용감한 측량사들에게 자금을 지원한 것은 바로 당신의 선견지명과 후원이었습니다. 그들이 확립한 정밀한 시야가 없었다면 단 하나의 돌도 올바르게 놓일 수 없었을 것이며, 빛의 사슬은 만들어지기도 전에 끊어졌을 것입니다.\n\n이 위대한 업적이라는 거대한 태피스트리 속에서, 당신의 공로는 그 근간을 이루는 실입니다. 당신은 단순히 프로젝트의 일부분에 자금을 댄 것이 아니라, 이 거대한 설계 전체를 위한 토대를 마련하신 것입니다." # 8891029329346140182
  anatolian_beacon_system.0001.a: "탄탄한 기반은 모든 위대한 업적의 열쇠라네." # 13669839907009645898
  anatolian_beacon_system.0002.t: "경계의 유산" # 15577931389874022276
  anatolian_beacon_system.0002.desc: "주군이시여, 콘스탄티노플에서 축제의 봉화가 타오르는 동안, 새로운 봉화 체계에 대해 가장 진심 어린 감사를 표하는 이들은 국경의 병사들과 백성들입니다. 그들은 사슬의 강도가 첫 번째 고리에 달려 있다는 사실을 그 어떤 궁정 신하보다 잘 알고 있으며, 가장 위험한 땅에서 그 고리를 벼려낸 것은 바로 주군의 헌신적인 기여였습니다.\n\n적들의 눈앞에서, 주군의 후원은 킬리키아의 길목에 첫 번째 요새화된 탑들을 세웠으니, 이는 이 위대한 체계의 눈과도 같습니다. 이것들은 단순한 의례용 건축물이 아니라 적대적인 영토에 세워진 군사 시설이며, 제국의 결의를 보여주는 당당한 선언입니다. 이제 이 탑들로부터 경고의 첫 불꽃이 날아올 것이며, 제국은 방어를 준비할 귀중한 시간을 벌게 될 것입니다.\n\n다른 이들이 체계를 완성했을지 모르나, 주군께서는 그 방패를 만드셨습니다. 주군의 재물과 의지가 제국의 가장 취약한 영토를 지켜냈음을 역사가 기억할 것입니다." # 4099494123708660383
  anatolian_beacon_system.0002.a: "방패는 검만큼이나 중요하오." # 12700427516247307814
  anatolian_beacon_system.0003.t: "지휘의 유산" # 11152993008195276044
  anatolian_beacon_system.0003.desc: "주군이시여, 위대한 업적이 완성되었습니다. 이제 빛의 연쇄가 변방과 수도를 하나로 잇고 있습니다. 그 연쇄의 모든 고리가 경이롭지만, 가장 영광스러운 마지막 고리는 주군의 지혜와 후원에 대한 개인적인 증거로 남을 것입니다. 바로 대궁전의 파로스 등대 꼭대기에 자리한 위대한 수신 및 지휘 센터입니다.\n\n주군의 결정적인 기여가 있었기에 신호가 본국에 도달할 수 있었고, 멀리서 깜빡이던 희미한 빛은 바실레우스 폐하께 직접 전달되는 명확한 정보로 탈바꿈했습니다. 주군께서는 이 거대한 체계에 신경 중추와 제국 권력의 심장부를 연결하는 통로를 선사하셨습니다. 다른 이들이 제국의 눈과 귀를 만들었다면, 주군께서는 제국에 사고하는 지성을 선물하신 것입니다.\n\n역사가 기록하기를, 이 연쇄를 만든 손길은 여럿이었으나, 그 궁극적인 목적을 부여한 이는 바로 주군이셨다고 할 것입니다." # 12688232843736666538
  anatolian_beacon_system.0003.a: "정보는 그 무엇보다 날카로운 무기이다." # 8020772939263516672
  anatolian_beacon_system.0004.t: "헌신의 유산" # 16799681672593992537
  anatolian_beacon_system.0004.desc: "주군이시여, 봉화 체계의 탑들은 제국 공학의 경이로움으로서 드높게 서 있습니다. 그러나 건축가들은 위대한 업적이라 할지라도 이를 운용할 숙련된 손길이 없다면 무용지물이라는 사실을 잘 알고 있습니다. 이 진실을 꿰뚫어 보신 주군께서는 남다른 지혜로 '비질레스(Vigiles)', 즉 전문 봉화 감시대를 창설하는 데 자금을 지원하셨습니다.\n\n구조물이 육체를 제공한다면, 주군의 후원으로 훈련받고 무장한 이들은 그 살아있는 영혼입니다. 폭풍과 밤을 지새우며 고독한 경계를 서고, 귀중한 연료를 관리하며, 빛의 신호가 결코 꺼지지 않도록 보장하는 이들이 바로 그들입니다. 주군의 기여는 앞으로 수 세대에 걸쳐 이 체계 전체의 신뢰성과 회복력을 보장해 주었습니다.\n\n황제는 탑을 건설하라고 명할 수는 있으나, 그것을 작동하게 만드는 사람들에게 투자하는 것은 진정으로 현명한 통치자만이 할 수 있는 일입니다. 이 점에 있어 주군께서는 당신의 위대함을 증명하셨습니다." # 7361065442364792975
  anatolian_beacon_system.0004.a: "요새는 그곳을 지키는 감시병만큼만 강한 법입니다." # 5247017344725499530
  anatolian_beacon_system.0005.t: "천재의 유산" # 1555281467604577733
  anatolian_beacon_system.0005.desc: "주군이시여, 완성된 봉화 체계는 이제 제국 전역에 신속한 경보를 보낼 수 있는 경계의 방패가 되었습니다. 하지만 이 프로젝트를 단순한 경보 체계에서 진정한 국정 운영의 무기로 격상시킨 것은 주군의 선견지명 어린 기여였습니다. 수기 신호 체계의 통합을 지원함으로써, 주군께서는 빛에 목소리를 부여하셨습니다.\n\n과거에는 투박한 불길이 그저 '위험!'이라고 외칠 뿐이었으나, 이제 이 체계는 적군의 규모, 이동 방향, 의도와 같은 구체적인 정보를 속삭일 수 있습니다. 이는 당황하여 군대를 소집하는 것과 계산된 전략을 세우는 것 사이의 차이입니다. 주군의 후원은 단순히 프로젝트에 보탬이 된 것을 넘어, 그 효율을 열 배로 증폭시켰습니다.\n\n다른 이들이 제국에게 불을 볼 눈을 주었다면, 그 의미를 이해할 지성을 부여한 것은 바로 주군이셨음을 만천하가 알게 하소서." # 11868017044317024135
  anatolian_beacon_system.0005.a: "지식은 정밀하게 다루어져야 합니다." # 11924199748489800344
  anatolian_beacon_system.0006.t: "봉화 체계가 준비되었습니다!" # 342945719841571155
  anatolian_beacon_system.0006.desc: "주군이시여, 마지막 연결 고리가 제자리를 찾았습니다! 오늘 우리는 대궁전의 관측 갑판에서 놀라운 성공을 목격했습니다. 킬리키아 산맥의 제국 먼 변방에서 피어오른 봉화가 아나톨리아 전역의 봉우리를 거쳐 전달되었습니다. 한 시간도 채 되지 않아, 새로 완공된 파로스 기지에서 마지막 불빛을 수신했습니다.\n\n제 조상들과 저의 노력이 결실을 보았습니다. 수학자 레오가 완성했던 공학의 경이, 제국 봉화 체계가 완성되었습니다. 탑들은 준비를 마쳤고, 시야는 확보되었으며, 기반 시설은 이제 제 명령을 기다리는 잠자는 거인처럼 고요히 머물러 있습니다.\n\n궁정 사무국장은 언제든 체계를 완전히 가동할 준비를 할 수 있다고 확인해주었으나, 탑에 인원을 배치하고 연료를 비축하며 수비대를 최고 경계 태세로 유지하는 것은 제국 국고에 끊임없는 부담이 될 것이라고 경고합니다." # 5422582246495449607
  anatolian_beacon_system.0006.a: "어둠을 밝히는 빛, 내 명령에 따라 준비되다." # 9497340629873372024
  anatolian_beacon_system.0007.t: "빛이 꺼지다" # 14479240347430123830
  anatolian_beacon_system.0007.desc: "궁정 사무국으로부터 암울한 보고가 도착했습니다. 아나톨리콘 테마(Anatolikon theme)를 적에게 빼앗김에 따라, 제국 봉화 체계의 척추가 두 동강 나고 말았습니다. 신호 사슬은 회복 불가능할 정도로 끊어졌습니다.\n\n서쪽의 탑들은 더 이상 변방의 신호를 볼 수 없게 되었고, 변방의 봉화들은 이제 서로에게만 신호를 보낼 뿐, 그 경고는 적의 손에 넘어간 황량한 산맥 속에서 사라지고 있습니다. 공사는 중단되었고, 기술자들과 석공들은 적에 대한 두려움으로 초소를 버리고 떠났습니다.\n\n경계하는 제국이라는 꿈은 산산조각 났습니다. 쏟아부은 산더미 같은 금과 저와 제 조상들이 바친 수년의 노고가... 우리가 방어선을 지키지 못했다는 이유 하나로 모두 헛수고가 되었습니다. 미완성된 체계는 이제 외롭고 쓸모없는 탑들의 연속일 뿐, 우리의 실패를 증명하는 기념비가 되었습니다." # 4120566380497709340
  anatolian_beacon_system.0007.a: "이 굴욕을 좌시하지 않겠다!" # 13537586607960804518
  CILICIA_LOCATION_2_TOOLTIP: "킬리키아 관문을 장악하다" # 9827435339878319907
  rule_seljuk_raiders_bgp: "1066 셀주크 약탈자 (동로마 대규모 프로젝트 모드)" # 16693050491597936996
  setting_seljuk_raiders_bgp_border: "국경 약탈자" # 18019729747076039032
  setting_seljuk_raiders_bgp_border_desc: "동로마 제국과 국경을 접한 셀주크 봉신들만 약탈할 수 있습니다. (모드 기본 설정)" # 4876639505875079391
  setting_seljuk_raiders_bgp_border_seljuk: "국경 약탈자 + 셀주크" # 16547571934423611839
  setting_seljuk_raiders_bgp_border_seljuk_desc: "동로마 제국과 국경을 접한 셀주크와 그 봉신들만 약탈할 수 있습니다." # 15005887450661831086
  setting_seljuk_raiders_bgp_border_seljuk_plus: "전원 (거의)" # 14096267727624416995
  setting_seljuk_raiders_bgp_border_seljuk_plus_desc: "셀주크 제국 내 거의 모든 이들이 약탈할 수 있습니다." # 5167622837673721487
  setting_seljuk_raiders_bgp_border_off: "꺼짐" # 8927729592684634549
  setting_seljuk_raiders_bgp_border_off_desc: "1066년 셀주크 제국 및 그 봉신들의 약탈 비활성화 (바닐라 설정)" # 7057187049539460311
  rule_empire_requirements_bgp: "동로마 제국 대규모 프로젝트 제국 요구 조건 (동로마 대규모 프로젝트 모드)" # 1833082900348311154
  setting_empire_requirements_bgp_default: "진정한 로마인 전용" # 16283649320164109619
  setting_empire_requirements_bgp_default_desc: "진정한 로마인만 동로마 제국 대규모 프로젝트를 사용할 수 있습니다 (즉, 동로마 제국) (모드 기본 설정)" # 15855823825603347383
  setting_empire_requirements_bgp_pretenders: "진정한 로마인 + 참칭자" # 12094628486227429858
  setting_empire_requirements_bgp_pretenders_desc: "라틴 제국과 신성 로마 제국, 그리고 동로마 제국은 동로마 대역사 사업을 이용할 수 있습니다." # 16976050107079009771
  setting_empire_requirements_bgp_everyone: "모두" # 15239673800019336017
  setting_empire_requirements_bgp_everyone_desc: "(권장하지 않음) 동로마 대역사 사업의 위치와 관련된 영지를 보유한 인물은 누구나 이 사업을 이용할 수 있습니다. (문화 요구 사항 게임 규칙 설정도 원하는 대로 변경하십시오.)" # 6221452108779668120
  rule_difficulty_bgp: "모드 난이도 (동로마 대역사 사업 모드)" # 14293488012887504907
  setting_difficulty_bgp_default: "기본값" # 8341519292606584866
  setting_difficulty_bgp_default_desc: "원작자가 의도한 원래 난이도입니다. 도전보다는 역할극에 더 중점을 둡니다. ~보랏빛 생각에 배가 살살 아파오는군~" # 10626554693880177945
  setting_difficulty_bgp_harsh: "가혹함" # 3778929000785543346
  setting_difficulty_bgp_harsh_desc: "대역사 사업 비용이 증가하고 적이 더 많아지는 더 어려운 난이도입니다. ~그대는 진정한 로마인인가?~" # 5862878950033257399
  setting_difficulty_bgp_unfair: "불공정함" # 1744337692442217600
  setting_difficulty_bgp_unfair_desc: "완전히 불공정하고 다소 터무니없습니다. 무엇을 하는지 잘 알거나 도전을 즐기는 경우가 아니라면 이 설정을 선택하지 마십시오. ~길을 찾지 못하면 만들리라~" # 4992850553066170472
  anatolian_beacon_system_modifier: "감시의 봉화" # 16027400969859750111
  anatolian_beacon_system_modifier_desc: "황제의 칙령에 따라 봉화 체계가 활성화되었습니다. 국경을 따라 감시의 불길이 타오르고, 그 신호는 아나톨리아 전역의 산봉우리에서 산봉우리로 불과 빛의 사슬을 통해 전달됩니다. 준비 태세에 대한 소식은 대궁전까지 전달되어 콘스탄티노플조차 높은 경계 태세를 유지하게 합니다.\n\n이곳 국경의 지역 수비대는 사소한 침입이라도 즉시 포착되어 몇 시간 안에 산맥을 넘어 보고되고, 황제의 속도로 응징당할 것임을 알기에 항상 준비된 상태를 유지합니다." # 4451458784723404319
  building_bgp_byzantine_beacon_unlit: "잠든 봉화 탑" # 4568175025643662114
  building_bgp_byzantine_beacon_unlit_desc: "위엄 있는 산봉우리에 우뚝 솟은 돌 감시탑이 침묵을 지키고 있으며, 이는 제국의 공학 기술과 전략적 선견지명의 증거입니다. 위대한 제국 봉화 체계의 중요한 연결 고리로 지어졌으나, 현재는 잠들어 있고 인원이 배치되지 않았습니다.\n\n굴뚝에서는 연기가 피어오르지 않고, 성벽 위를 걷는 파수꾼도 없습니다. 이는 보안의 약속이자, 제국의 칙령이 내려져 다시 생명을 얻고 불길이 타오르기를 기다리는 잠자는 파수꾼입니다." # 9254364831396280959
  building_type_bgp_byzantine_beacon_unlit: "$building_bgp_byzantine_beacon_unlit$" # 6375401326598556361
  building_type_bgp_byzantine_beacon_unlit_desc: "$building_bgp_byzantine_beacon_unlit_desc$" # 6337825781776756
  building_bgp_byzantine_beacon_lit: "감시의 봉화 탑" # 16451571296998031522
  building_bgp_byzantine_beacon_lit_desc: "더 이상 침묵하지 않는 이 봉화 탑은 이제 완전히 인원이 배치되어 가동 중이며, 활성화된 제국 봉화 체계의 살아있는 신경 말단과 같습니다. 굴뚝에서는 연기가 흘러나오고, 정예 *비질레스(Vigiles)* 수비대가 주변 산봉우리의 빛의 사슬을 응시하며 끊임없이 경계를 서고 있습니다.\n\n아나톨리아 전역에 침략 경고를 보낼 거대한 불길을 즉시 피워 올릴 준비가 된 이 탑은 강력한 지역 요새 역할을 합니다. 이곳에서 피어오른 불꽃 하나는 한 시간 안에 대궁전의 긴급 보고가 될 것입니다." # 2735176987219799568
  building_type_bgp_byzantine_beacon_lit: "$building_bgp_byzantine_beacon_lit$" # 2417633056815327447
  building_type_bgp_byzantine_beacon_lit_desc: "$building_bgp_byzantine_beacon_lit_desc$" # 6449399686273218307
  activate_anatolian_beacons: "제국 봉화 점화" # 13695526666325208787
  activate_anatolian_beacons_desc: "조상들로부터 물려받은 공학 기술과 선견지명의 유산인 위대한 제국 봉화 체계가 아나톨리아 산맥 전역에서 침묵을 지키고 있습니다. 수 세대 동안 이 탑의 사슬은 갑작스러운 침략에 맞선 제국의 첫 번째이자 최고의 방어선이었습니다.\n\n탑들은 잠들어 있지만, 동쪽의 위협은 항상 존재합니다. 감시병을 배치하고 감시의 불길을 밝히라는 명령을 내릴 수 있습니다. 이는 제국을 고도의 준비 태세로 이끌어 국경 수비대에 힘을 실어주고 어떠한 침입에도 신속한 경고를 제공할 것입니다.\n\n그러나 이러한 준비 태세는 무거운 짐이며, 제국 국고는 상당한 지속 비용을 감당해야 할 것입니다." # 6541482212849770235
  activate_anatolian_beacons_tooltip: "제국 봉화 체계를 활성화하기 위한 월간 비용을 부담하여 국경 영지에 강력한 방어 보너스를 부여합니다." # 3598665522201257087
  activate_anatolian_beacons_effect_tooltip: "제국 봉화가 점화되고 체계가 완전히 가동됩니다.\n\n• 체계를 유지하기 위한 월간 비용을 지불하기 시작합니다.\n• 체계가 가동되는 동안 #P '제국 봉화 활성화'#! 인물 수정자를 획득합니다.\n• 국경 영지의 #P `잠든 봉화 탑`#!이 #P `감시의 봉화 탑`#!으로 업그레이드되어 강력한 방어 보너스를 제공합니다." # 18239149423566739742
  activate_anatolian_beacons_confirm: "아나톨리아가 지원을 요청합니다!" # 7675851699044125999
  deactivate_anatolian_beacons: "제국 봉화 소화" # 14192640457778987112
  deactivate_anatolian_beacons_desc: "제국 봉화는 거대한 위기의 시기에 밝게 타오르며 그 목적을 다했습니다. 이제 즉각적인 위협이 사라지고 국고가 지속적인 비용으로 신음하는 상황에서, 이러한 고도의 준비 태세가 여전히 필요한지 고려해야 할 때입니다.\n\n감시병을 물리고 불길을 끄라는 명령을 내릴 수 있습니다. 탑들은 다시 침묵에 빠질 것이며, 상당한 유지 비용이 국고에서 사라질 것입니다. 이는 국경을 갑작스러운 공격에 더 취약하게 만들겠지만, 제국의 경제적 건강을 위해 필요한 계산된 위험일 수 있습니다.\n\n체계는 그대로 남아, 필요할 경우 다시 깨어날 준비를 할 것입니다." # 10175590764763170264
  deactivate_anatolian_beacons_tooltip: "봉화 체계를 비활성화하여 월간 유지 비용을 끝내고, 재활성화될 때까지 강력한 방어 보너스를 제거합니다." # 16404607860020561679
  deactivate_anatolian_beacons_effect_tooltip: "제국 봉화가 꺼지고 체계가 잠들게 됩니다.\n\n• 더 이상 체계에 대한 월간 유지 비용을 지불하지 않습니다.\n• #P '제국 봉화 활성화'#! 인물 수정자를 잃습니다.\n• 국경 영지의 모든 #P `감시의 봉화 탑`#!이 #P `잠든 봉화 탑`#!으로 되돌아갑니다." # 4130615216775244512
  deactivate_anatolian_beacons_confirm: "경계의 불꽃을 잠재우라." # 7537818009531816285
