l_korean:
  pecheneg_invasion.0002.t: "위대한 소집" # 5932599929866756789
  pecheneg_invasion.0002.desc: "대지가 진동합니다. 사방에서 며칠째 말발굽 소리가 천둥처럼 울려 퍼지며 당신의 진영 근처 평원으로 모여들고 있습니다. 펠트와 가죽으로 만든 텐트의 바다가 지평선 너머까지 펼쳐져 있으니, 한 세대 동안 보지 못했던 규모의 부족 집결입니다.\n\n가장 강력한 보야르들과 족장들로 구성된 평의회가 방금 당신의 거대한 천막 안으로 들이닥쳤습니다. 그들의 얼굴은 열의와 야망으로 붉게 달아올라 있습니다. '부족들이 하나로 뭉쳤습니다!' 한 명이 밖의 끝없는 군대를 가리키며 선언합니다. '정찰병들의 보고에 따르면 로마인들은 그들의 석조 도시 안에서 살찌고 안주하고 있다고 합니다. 다뉴브 강 남쪽의 들판은 수확을 기다리고 있으며, 수도원들은 황금으로 가득 차 있습니다!'\n\n우두머리 족장이 앞으로 나서며 칼자루에 손을 얹습니다. '천신께서 우리에게 이 순간을 주셨습니다! 전사들은 안달이 났고, 그들의 창은 영광을 갈구하고 있습니다. 우리는 군세를 모았고, 이제 그 힘을 해방해야 합니다. 우리를 이끄소서, 대칸이시여! 우리를 승리로 이끌어 #bold 비잔티움 제국#!을 약탈하게 하소서!'" # 8114088816763462887
  pecheneg_invasion.0002.b: "천신께서 이를 원하신다! 영광과 황금을 위해 진격하자!" # 18005374746763752501
  pecheneg_invasion.0002.a: "어리석은 자들 같으니! 우리 백성을 저 성벽의 도시로 내몰 셈인가?" # 16420938966912745831
  pecheneg_invasion.0003.t: "다뉴브 강이 함락되다" # 7660219028998544509
  pecheneg_invasion.0003.desc: "피칠갑을 한 전령이 수도 한복판에서 말이 쓰러져 죽을 때까지 달려와 북쪽 국경에서 온 공포스러운 소식을 전했습니다. 야만인들에 대항하는 우리의 고대 방패였던 다뉴브 강이 뚫렸습니다.\n\n이것은 단순한 약탈이 아닙니다. 페체네그 부족들의 거대한 소집이 단 하나의 거대한 물결이 되어 들이닥쳤습니다. 우리 국경 수비대는 휩쓸려 나갔고, 흩어져 있던 감시 초소들은 경고를 보내기도 전에 불타버렸습니다. 이제 사람과 말로 이루어진 살아있는 폭풍이 강 남쪽으로 쏟아져 들어오고 있으며, 메뚜기 떼처럼 땅을 집어삼키는 파괴의 물결이 몰아치고 있습니다.\n\n도망친 마을 주민들과 소수의 생존한 정찰병들의 초기 보고는 믿기 힘들 정도입니다. 그들은 적어도 #bold 4만 명의 전사#!에 달하는 군세에 대해 이야기하고 있습니다. 그들의 유일한 목표는 궁극적인 보상인 도시들의 여왕 그 자체인 것 같습니다. 그들은 거대한 자연의 힘과 같으며, 지금 #bold 콘스탄티노폴리스#!를 향해 진군하고 있습니다! 이것은 전쟁이 아니라, 북쪽에서 천둥처럼 몰려오는 묵시록입니다." # 12400248048083140030
  pecheneg_invasion.0003.a: "종을 울려라! 타그마타를 소집하라! 황제께서 전쟁에 나서신다!" # 16589651787655858031
  pecheneg_horde: "페체네그 군세" # 1849780163841463754
  rule_pecheneg_invasion: "페체네그 침공 (동로마 위대한 대업 모드)" # 15999114870358953247
