l_korean:
  great_project_type_restore_patriarchal_seat_jerusalem: "예루살렘 총대주교좌 복구" # 655930938637454153
  great_project_type_restore_patriarchal_seat_jerusalem_desc: "예루살렘 도시는 그리스도교 세계의 심장이지만, 그 고대의 총대주교좌는 수 세기에 걸친 방치와 전쟁의 증거로서 폐허로 남아 있습니다. 우리가 이 도시를 차지하고 있음에도, 그 영적 권위는 과거의 영광에 비하면 그림자에 불과합니다.\n\n이 신성한 기관을 폐허 속에서 일으켜 세우는 것은 우리의 거룩한 의무입니다. 우리는 새로운 신앙의 중심지를 건설하는 기념비적인 과업에 착수할 것이며, 이는 완성까지 수년이 걸리겠지만 그 영광은 수 세기 동안 울려 퍼질 것입니다. 이는 우리의 경건함을 보여주는 결정적인 증거가 될 것이며, 진정한 신앙의 수호자로서 우리의 유산을 공고히 할 것입니다." # 11625800296891457326
  great_project_type_tooltip_restore_patriarchal_seat_jerusalem: "" # 17241709254077376921
  great_project_name_possessive_restore_patriarchal_seat_jerusalem: "" # 17241709254077376921
  great_project_name_restore_patriarchal_seat_jerusalem: "" # 17241709254077376921
  great_project_type_restore_patriarchal_seat_jerusalem_contribution_patriarchate_hostels: "순례자의 구역" # 4914902194524782281
  great_project_type_restore_patriarchal_seat_jerusalem_contribution_patriarchate_hostels_desc: "하나님을 위한 집을 짓기 전에, 먼저 그분의 신자들을 위한 집을 지어야 합니다. 이 과업은 도시로 몰려드는 수천 명의 지친 순례자들에게 안식처와 음식을 제공하기 위한 숙소, 구빈원, 주방으로 구성된 거대한 구역을 건설하는 데 집중할 것입니다. 이 성스러운 프로젝트의 토대는 자비와 박애여야 합니다." # 10821560774804468496
  great_project_type_restore_patriarchal_seat_jerusalem_contribution_name_patriarchate_hostels: "" # 17241709254077376921
  great_project_type_restore_patriarchal_seat_jerusalem_contribution_patriarchate_scriptorium: "대 필사실" # 11636988654168555233
  great_project_type_restore_patriarchal_seat_jerusalem_contribution_patriarchate_scriptorium_desc: "기억이 없는 신앙은 뿌리 없는 나무와 같습니다. 이 기여를 통해 위대한 도서관이자 작업장인 대 필사실을 세울 것입니다. 우리는 그리스도교 세계의 먼 곳까지 사절을 보내 성스러운 문헌들을 확보하고, 복음서와 교부들의 저작을 필사하는 성스러운 과업을 시작할 숙련된 필사자들을 모집할 것입니다." # 5702958812618414832
  great_project_type_restore_patriarchal_seat_jerusalem_contribution_name_patriarchate_scriptorium: "" # 17241709254077376921
  great_project_type_restore_patriarchal_seat_jerusalem_contribution_patriarchate_basilica: "성스러운 지혜의 대성당" # 3921485756213983179
  great_project_type_restore_patriarchal_seat_jerusalem_contribution_patriarchate_basilica_desc: "이제, 우리는 총대주교좌의 영적 심장을 세웁니다. 이 대성당은 성스러운 건축의 걸작이 될 것이며, 그 거대한 돔은 예루살렘의 스카이라인에 새로운 별로 떠오를 것입니다. 뛰어난 모자이크 장인과 화가들을 고용하여 내부를 그리스도의 생애 장면으로 장식할 것이며, 들어오는 모든 이들에게 경외심을 불러일으키는 예배의 장소를 만들 것입니다." # 11046836930478767033
  great_project_type_restore_patriarchal_seat_jerusalem_contribution_name_patriarchate_basilica: "" # 17241709254077376921
  great_project_type_restore_patriarchal_seat_jerusalem_contribution_patriarchate_palace: "총대주교 궁전" # 11926033455931138725
  great_project_type_restore_patriarchal_seat_jerusalem_contribution_patriarchate_palace_desc: "총대주교좌는 신앙의 중심지일 뿐만 아니라 권위의 중심지이기도 해야 합니다. 이 선택적 과업은 접견실, 집무실, 영주의 거처로 이루어진 총대주교 궁전을 건설할 것입니다. 이는 왕국의 영적 심장에 대한 우리의 권력과 행정적 통제를 가시적으로 보여주는 상징이 될 것입니다." # 4460289996253838335
  great_project_type_restore_patriarchal_seat_jerusalem_contribution_name_patriarchate_palace: "" # 17241709254077376921
  great_project_type_restore_patriarchal_seat_jerusalem_contribution_patriarchate_reliquary: "대 성유물함" # 14636181274063498404
  great_project_type_restore_patriarchal_seat_jerusalem_contribution_patriarchate_reliquary_desc: "총대주교좌의 영광을 완성하기 위해, 우리는 대 성유물함을 건설할 것입니다. 이 요새화된 보물 창고는 그리스도교 세계의 가장 성스러운 성유물들을 보관하기 위해 건설될 것입니다. 우리는 진정한 십자가의 조각, 사도들의 뼈, 그리고 다른 성스러운 유물들을 찾아내어 예루살렘을 전 세계가 인정하는 순례의 중심지로 만들 것입니다." # 2410763704166873331
  great_project_type_restore_patriarchal_seat_jerusalem_contribution_name_patriarchate_reliquary: "" # 17241709254077376921
  great_project_type_restore_patriarchal_seat_jerusalem_contribution_patriarchate_jewish_quarter: "유대인 구역 재정비" # 13936794255645239308
  great_project_type_restore_patriarchal_seat_jerusalem_contribution_patriarchate_jewish_quarter_desc: "유대인 공동체는 기억할 수 있는 시간보다 더 오래전부터 예루살렘의 일부였습니다. 이 선택적이지만 중요한 과업은 계몽된 관리의 실천입니다. 이는 도시의 유대인 구역 재정비를 지원하여 회당을 재건하고, 시장에 활력을 불어넣으며, 고대 도서관들을 확장할 것입니다. 이는 백성들 사이에 번영과 충성심을 증진할 것이며, 우리 도시로 학식 있는 이들을 끌어들일 것이 분명합니다." # 16497629878044779424
  great_project_type_restore_patriarchal_seat_jerusalem_contribution_name_patriarchate_jewish_quarter: "" # 17241709254077376921
  restored_patriarchate_seat_modifier: "복구된 예루살렘 총대주교좌" # 6591626504033719699
  restored_patriarchate_seat_modifier_desc: "고대의 예루살렘 총대주교좌가 폐허에서 일어나 과거의 영광을 되찾았습니다. 웅장한 대성당, 대 필사실, 그리고 활기찬 순례자의 구역을 갖춘 이 기념비적인 복합 단지는 이제 그리스도교 동방의 명실상부한 영적, 행정적 중심지로서 기능합니다. 순례자, 학자, 성직자들이 도시로 몰려들고 있으며, 도시는 신성한 은총과 권위의 아우라를 발산합니다." # 650740963048943886
  flourishing_jewish_quarter_modifier: "번영하는 유대인 구역" # 7889480885990281465
  flourishing_jewish_quarter_modifier_desc: "예루살렘의 유대인 구역은 계몽된 후원 덕분에 황금기를 맞이하고 있습니다. 새롭게 단장된 회당, 활기찬 시장, 잘 갖춰진 도서관들은 이곳을 상업과 학문의 활기찬 중심지로 만들었습니다. 이러한 번영은 도시 전체를 풍요롭게 하며 전 세계의 학식 있는 인재들을 끌어들입니다." # 11541509134851801422
  enlightened_patron_modifier: "계몽된 후원자" # 5986668099311259463
  enlightened_patron_modifier_desc: "수도에 사는 모든 주민의 복지에 투자하기로 한 나의 결정은 나에게 지혜롭고 정의롭다는 평판을 안겨주었습니다. 유대인 공동체의 지도자들은 깊은 감사를 표했으며, 나는 이 다양하고 성스러운 도시의 진정으로 위대한 관리자로 비치고 있습니다." # 248761566930102005
  founder_of_the_basilica_modifier: "대성당의 설립자" # 9414830310922866032
  founder_of_the_basilica_modifier_desc: "내 손으로 성스러운 지혜의 대성당을 세웠습니다. 설교와 기도 속에서, 나의 이름은 총대주교좌에 영적 심장을 부여한 자로 칭송받습니다. 이 기념비적인 경건함의 행위는 지상에서의 나의 유산을, 그리고 신의 뜻이라면 천국에서의 나의 자리를 확보했습니다." # 14564361681862306571
  patriarchal_seats_events.1001.t: "압제자의 손길" # 15503322762930570343
  patriarchal_seats_events.1001.desc: "성묘 교회 근처의 붐비는 시장을 변장한 채 걷던 중, 나는 역겨운 광경을 목격했다. 내 수행원 중 한 명인 덩치 크고 야만적인 사내가 가난하고 늙은 순례자를 잔인하게 위협하며 존재하지도 않는 '통행세'를 뜯어내려 하고 있었다. 노인은 가진 것이 아무것도 없다고 애원하지만, 경비병은 그를 바닥으로 밀쳐버리고는 칼자루에 손을 뻗는다.\n\n군중은 겁에 질려 물러서며 개입하려 하지 않는다. 내 피가 끓어오른다. 비록 나는 겸손을 실천하기 위해 이곳에 왔지만, 나는 여전히 그들의 주군이며 이 불의는 세상에서 가장 성스러운 도시인 이곳에서, 내 이름 아래 자행되고 있다. 내 안에서 솟구치는 분노는 물리적인 힘이 되어 표출을 요구한다. 내가 이 분노를 어떻게 다스리느냐가 이 순간을 정의할 것이다." # 13463558062529038141
  patriarchal_seats_events.1001.a: "이 야만적인 자는 내 분노를 맛보게 될 것이다!" # 3422111479620572339
  patriarchal_seats_events.1001.b: "나는 분노가 아닌 권위로 이 일을 처리해야 한다." # 6479904661961724196
  patriarchal_seats_events.1001.c: "기다림 끝에 내리는 처벌은 더욱 달콤할 것이다..." # 12746266837210160830
  patriarchal_seats_events.1002.t: "정원의 유혹" # 17719001143671245460
  patriarchal_seats_events.1002.desc: "나는 평화가 깃든 지역 수도원의 고요한 정원에서 오후를 보내며 사색에 잠기곤 한다. 그곳에서 나처럼 고독을 찾는 한 평신도 순례자를 발견했다. 그들은 거부할 수 없는 세속적인 매력을 지니고 있어, 이곳의 경건한 분위기와 극명한 대조를 이룬다.\n\n우리는 서로의 침묵을 존중하며 한마디도 나누지 않았지만, 오가는 눈빛은 결코 영적이지 않았다. 나의 명상 서약은 내 본능의 꿈틀거림을 막기에는 너무나 연약한 방패처럼 느껴진다. 이것은 영혼의 시험이 아니라 육체의 시험이다." # 1983277848082226812
  patriarchal_seats_events.1002.a: "나는 내 육체와 정신을 다스릴 것이다." # 5232321898517367977
  patriarchal_seats_events.1002.b: "그저 이 사람을 피하겠다." # 12286625826488627479
  patriarchal_seats_events.1002.c: "어쩌면 이것도 일종의 설교일지도 모르지..." # 14367934667265006335
  patriarchal_seats_events.1003.t: "용서에 대한 묵상" # 3752492106302620202
  patriarchal_seats_events.1003.desc: "나는 명상의 일환으로 비아 돌로로사를 걷기로 했다. 각 지점은 깊은 고통과 그만큼 깊은 은총의 순간을 상징한다. 그러나 궁극적인 용서의 길을 걷는 지금, 내 마음은 돌처럼 굳어 있다. 내 정신은 성경이 아닌 과거의 배신과 나에게 저질러진 잘못들에 대한 기억으로 향한다.\n\n이 길은 증오를 버릴 것을 요구하지만, 내 존재의 모든 부분은 복수를 갈망하고 있다. 이 성스러운 여정은 거울이 되어 내가 품은 복수의 독기를 직면하게 한다. 나는 이 신성한 땅 위에서 어떻게 내 영혼을 화해시킬지 결정해야 한다." # 7809784813395889886
  patriarchal_seats_events.1003.a: "나는 그 본보기를 따라 진심으로 용서하겠다." # 4825108210695768681
  patriarchal_seats_events.1003.b: "너무 고통스럽다. 기도에만 집중하겠다." # 11608305162450514876
  patriarchal_seats_events.1003.c: "이 길은 배신의 대가를 가르쳐 주는구나." # 5346083207380441399
  patriarchal_seats_events.1004.t: "단식의 규율" # 11983467235061438722
  patriarchal_seats_events.1004.desc: "내 영혼을 진정으로 시험하기 위해, 나는 내 식욕을 고려했을 때 가장 직접적인 시련을 선택했다. 바로 유대 광야에서의 긴 단식이다. 나는 예루살렘에서 나와 생존을 위한 최소한의 물과 음식만을 가지고 떠났다. 만족을 위한 것이 아닌, 오직 생존을 위한 양식이다.\n\n내리쬐는 태양과 아지랑이는 끊임없는 고통이지만, 진정한 시련은 뱃속을 파고드는 공허한 허기다. 내가 즐겼던 모든 연회의 기억이 돌아와 나를 조롱한다. 내 몸은 탐닉을 갈구하고, 내 영혼은 규율을 추구한다. 나는 이 내면의 전쟁을 어떻게 헤쳐 나갈지 결정해야 한다." # 8932482204921428183
  patriarchal_seats_events.1004.a: "기도를 통해 이 저급한 허기를 다스리겠다." # 16720548919943607548
  patriarchal_seats_events.1004.b: "시련을 견디되, 보급품을 신중히 배분하겠다." # 12021391577398157859
  patriarchal_seats_events.1004.c: "모든 훌륭했던 식사의 기억을 떠올리며 명상하겠다." # 13640570592701255723
  patriarchal_seats_events.1005.t: "보물의 시험" # 447819089039473690
  patriarchal_seats_events.1005.desc: "나는 조용히 관찰하며 순례자들이 성묘 교회에서 봉헌하는 모습을 지켜보았다. 부유한 상인들이 은화를 한 움큼씩 시주함에 넣으며 승인의 고개를 끄덕이게 하는 모습을 보았다. 그때, 가난한 과부 한 명이 눈에 띄었다. 그녀는 아무도 보지 않을 때까지 기다렸다가 조용히 작은 구리 동전 두 닢을 넣었다. 아마도 그녀가 가진 세상의 전부일 것이다.\n\n계산적인 내 마음은 그녀의 봉헌을 가치 없다고 치부해 버렸다. 그러나 과부의 헌금에 대한 비유가 머릿속에 울려 퍼진다. 그녀의 작은 희생이 다른 모든 이들의 봉헌을 합친 것보다 더 가치 있다는 이야기다. 이 단순하고도 단 하나의 행동은 내가 가치를 측정하는 근본적인 기준에 도전한다. 나는 이 교훈이 진정으로 무엇을 의미하는지 결정해야 한다." # 2668125406641583020
  patriarchal_seats_events.1005.a: "과부의 헌금 정신을 받아들이겠다." # 8859991036704011861
  patriarchal_seats_events.1005.b: "내 지위에 걸맞은 기부를 하겠다." # 10968946424449202808
  patriarchal_seats_events.1005.c: "알겠다... 내 재물을 하늘에 투자하리라!" # 17470768111377164351
  patriarchal_seats_events.1006.t: "정적의 무게" # 1035914983340869222
  patriarchal_seats_events.1006.desc: "나는 명상의 서원을 지키고자 조용한 수도원에 거처를 마련했다. 처음에는 목가적이었다. 의무도, 요구도 없이 오직 고요와 휴식뿐이었다. 그러나 수도사들을 지켜보며 그들의 삶이 결코 한가하지 않다는 것을 깨달았다. 기도를 알리는 종소리, 텃밭을 가꾸기 위한 종소리, 필사실에서 공부하기 위한 종소리가 울려 퍼진다. 그들의 삶은 깊은 규율과 끊임없고 목적 있는 행동으로 가득 차 있다.\n\n나의 정적은 갑자기 공허하게 느껴지며, 그들의 영적 집중력을 흉내 내는 얄팍한 모방에 불과한 것처럼 보인다. 나는 진정으로 명상하고 있는 것인가, 아니면 늘 그래왔듯 노력을 회피하고 있는 것인가? 수도원의 종소리는 나의 나태함을 비웃는 듯하며, 내 휴식의 본질에 대해 의문을 품게 한다." # 9623289583717822259
  patriarchal_seats_events.1006.a: "수도사들을 본받아 그들의 규율을 따르겠다." # 15256886084678752799
  patriarchal_seats_events.1006.b: "기도에 집중하되, 노동은 그들에게 맡기겠다." # 12167833499970664981
  patriarchal_seats_events.1006.c: "진정한 경건이란 완전한 정적 속에 있는 것이다." # 1920774018350343125
  patriarchal_seats_events.1007.t: "내면의 진실과 마주하기" # 11380761909431180088
  patriarchal_seats_events.1007.desc: "나의 명상은 고대 베데스다 연못으로 나를 이끌었다. 그곳은 기적을 기다리는 병자와 절망적인 이들로 가득한 쓸쓸한 곳이다. 그들을 지켜보며, 내 마음속의 계산적이고 익숙한 부분이 작동하기 시작한다. 영리한 거짓말이나 적절한 밀치기 한 번이면 누구보다 먼저 물가에 닿을 수 있음을 알겠다. 헛된 희망을 팔아 몇 줌의 동전을 챙길 방법도 보인다.\n\n하지만 처음으로, 이런 생각의 흐름이 역겹게 느껴진다. 진정한 고통과 신앙으로 둘러싸인 이곳에서, 내가 평생 능숙하게 엮어온 거짓과 반쪽짜리 진실의 그물망은 영혼을 갉아먹는 불경한 병처럼 느껴진다. 나는 선택의 기로에 섰다. 기만적인 본성에 매달릴 것인가, 아니면 이 거룩한 곳에서 그것을 씻어낼 것인가." # 7491736190465369390
  patriarchal_seats_events.1007.a: "내가 어떤 존재인지에 대한 고통스러운 진실을 받아들이겠다." # 10519164367837558141
  patriarchal_seats_events.1007.b: "이 가련한 영혼들을 위해 기부하겠다." # 7715651541270074128
  patriarchal_seats_events.1007.c: "진실이란 가장 설득력 있는 거짓말일 뿐이다." # 1836186919638553845
  patriarchal_seats_events.1008.t: "어둠 속의 공포" # 17115856379776794552
  patriarchal_seats_events.1008.desc: "나는 겟세마네 동산에서 홀로 밤을 지새우며 철야 기도를 하기로 했다. 고대 올리브 나무들은 길고 일그러진 그림자를 드리우고, 올리브 산의 침묵은 깊기만 하다. 궁극적인 공포와 궁극적인 결의가 공존하는 이곳에서, 나의 두려움은 더욱 증폭된다. 부러진 나뭇가지 하나에도 자객의 발소리처럼 들리고, 바람 한 점에도 공모자의 속삭임처럼 느껴진다.\n\n이야기에 따르면 이곳은 하나님의 아들조차 두려움을 느꼈던 곳이지만, 그분은 도망치지 않으셨다. 나의 본능은 성벽의 안전한 곳으로 돌아가, 어둠 속에서 내 마음이 만들어낸 공포로부터 숨고 싶어 한다. 오늘 밤은 내면의 적과의 싸움이 될 것이다." # 9806472979984435807
  patriarchal_seats_events.1008.a: "동이 틀 때까지 이 공포를 정면으로 마주하겠다." # 7716647372262052500
  patriarchal_seats_events.1008.b: "기도를 마치고 너무 늦기 전에 떠나겠다." # 8901827093781430496
  patriarchal_seats_events.1008.c: "나의 두려움은 비겁함이 아니라 지혜이다." # 9243280693478766381
  patriarchal_seats_events.1009.t: "성스러운 환영!" # 11317627472724267650
  patriarchal_seats_events.1009.desc: "씨름해야 할 큰 죄가 없었기에, 나는 성묘 교회 안에서 침묵 기도를 하며 시간을 보냈다. 오늘, 거룩한 무덤 그 자체인 에디쿨라 앞에 무릎을 꿇었을 때, 주변의 세계가 희미해지는 듯했다. 향 냄새, 다른 순례자들의 웅성거림, 흔들리는 촛불까지 모두 사라졌다.\n\n깊고 고요한 정적이 나를 감쌌고, 그 침묵의 중심에서 나는 찬란한 내면의 빛에 압도되었다. 그것은 눈으로 보는 광경이 아니라, 뼛속 깊이 느껴지는 온기였다. 그 순간, 나는 압도적인 평화와 명료함, 그리고 신성한 확신을 느꼈다. 두려움은 사라지고, 내가 올바른 길을 걷고 있다는 깊고 변치 않는 확신만이 남았다." # 6342726317899288355
  patriarchal_seats_events.1009.a: "나는 축복을 받았다." # 6561630717920675441
  patriarchal_seats_events.1010.t: "영혼의 정적" # 10408660676746752635
  patriarchal_seats_events.1010.desc: "명상을 하며 보낸 시간은 고요했고, 큰 영적 시련이나 심오한 유혹에 시달리지 않았다. 나는 올리브 산에서 해가 질 무렵 예루살렘의 전경을 내려다보며 많은 시간을 보냈고, 도시는 황금빛으로 물들었다.\n\n눈을 멀게 할 환영을 본 것도, 내면의 악마와 씨름한 것도 아니었다. 대신 나는 그저... 고요함을 찾았다. 궁정 음모의 끝없는 소용돌이, 영지에 대한 걱정, 끊임없이 요구되는 시간들, 그 모든 것이 물러가고 그 자리에 평온한 침묵이 남았다. 수천 가지 방향으로 흩어지던 내 영혼이 마침내 안정을 찾았다." # 9542531259194652005
  patriarchal_seats_events.1010.a: "나는 평화롭다." # 11854447400137016375
  patriarchal_seats_events.2001.t: "순례자의 발" # 14045158408890202963
  patriarchal_seats_events.2001.desc: "나는 시온 문 근처 광장에 모인 순례자들 사이에서 하루를 보냈다. 그곳은 신앙심 깊은 이들과 가난한 이들로 넘쳐났다. 지역 교회의 몇몇 자비로운 이들이 그들 사이를 다니며 작은 도움을 주고 있었지만, 역부족인 것이 분명했다. 그들을 지켜보며 나는 신앙의 진정한 대가를 보았다. 수백 마일을 걸어 피투성이가 되고 물집이 잡힌 채 헝겊으로 감싼 발들이 보였다.\n\n그리스도와 같은 겸손을 실천할 절호의 기회가 찾아왔다. 이 가련한 순례자들의 발을 씻겨주는 것은 내 신앙의 증거가 되겠지만, 길 위의 때와 질병을 생각하면 속에서부터 거부감이 든다." # 18115260356501187488
  patriarchal_seats_events.2001.a: "내가 직접 이 겸손한 봉사를 수행하겠다." # 5859640178854527890
  patriarchal_seats_events.2001.b: "자선을 통해 그들의 보살핌을 지원하겠다." # 15464559519002649933
  patriarchal_seats_events.2001.c: "\"이런 일은 하인들이나 할 법한 일이지, 내가 나설 자리가 아니다.\"" # 2618171861957314435
  patriarchal_seats_events.2002.t: "신의 노고" # 251075104778375881
  patriarchal_seats_events.2002.desc: "오늘 산책길에 새로 성벽을 쌓고 있는 작은 교구 교회를 지나치게 되었다. 작업은 더디고 고되기만 하며, 석공 장인은 지친 인부들을 다그치고 있다. 들판의 돌을 나르고 모르타르를 섞는 간단한 일조차 일손이 턱없이 부족한 것이 분명하다.\n\n여기 신을 섬길 기회가 있다. 금전이나 기도가 아닌, 내 이마에 흐르는 땀으로 섬길 기회 말이다. 내 손은 곱고, 이런 고된 노동을 생각하는 것만으로도 허리가 아파오지만, 헌신하라는 부름은 강렬하다. 마음을 겸허히 하는 것과 몸을 겸허히 하는 것은 완전히 다른 차원의 일이다." # 16767243487382532779
  patriarchal_seats_events.2002.a: "이 정직한 사내들과 함께 돌을 나르겠소." # 1067856664311272441
  patriarchal_seats_events.2002.b: "그들의 노력은 숭고하나, 그 방식은 비효율적이군." # 9273336707514616884
  patriarchal_seats_events.2002.c: "\"나의 땀보다는 나의 금이 신을 더 잘 섬길 것이다.\"" # 420936051597845506
  patriarchal_seats_events.2003.t: "부정한 종" # 13104118283350565830
  patriarchal_seats_events.2003.desc: "오늘 산책길은 도시 성벽 밖, 건강한 이들이라면 기피하는 황량한 곳으로 이어졌습니다. 저 앞 바위 너머에서 들려오는 소리, 나병 환자의 종소리가 내는 애처롭고도 뚜렷한 울림이 영혼까지 얼어붙게 합니다. 나무 딱딱이와 종을 든 채 형체를 알아볼 수 없도록 몸을 감싼 병자들의 작은 무리가 구걸하고 있습니다.\n\n다른 순례자들은 자선심과 공포가 뒤섞인 마음으로 멀찍이서 동전을 던져주며 그들을 피해 지나갑니다. 치유할 수 없고 서서히 스며드는 그들의 병에 대한 공포는 인간의 본능적인 것입니다. 그럼에도 가장 비천한 이들 속에서 고통받는 그리스도의 얼굴을 보라는 자비의 부름이 내 영혼을 강하게 울립니다." # 7541532226653851205
  patriarchal_seats_events.2003.a: "직접 다가가 자선을 베풀겠소." # 16129336887687367838
  patriarchal_seats_events.2003.b: "안전한 거리에서 관대한 제물을 바치도록 하겠다." # 10210348187647931426
  patriarchal_seats_events.2003.c: "신이시여, 저를 지켜주소서! 당장 이 더러운 곳을 떠나야겠어." # 16326532193634539998
  patriarchal_seats_events.2004.t: "정의의 저울" # 4650007911213871756
  patriarchal_seats_events.2004.desc: "평민들의 삶을 이해하고자, 나는 오늘 하루를 지역 치안 판사의 법정에서 벌어지는 일을 관찰하며 보냈다. 사건들은 사소했다. 닭 도둑질을 둘러싼 분쟁이나 이웃 간의 말다툼 같은 것들이었다. 그러던 중, 더 심각한 사건 하나가 제기되었다. 부유한 상인이 가난한 순례자를 값비싼 은제 성상을 훔쳤다는 혐의로 고발한 것이다.\n\n순례자는 자신의 결백을 맹세하며 상인이 빚을 갚지 않으려 수작을 부리는 것이라 주장했지만, 그에게는 아무런 지위도, 증인도 없었다. 상인의 지위에 휘둘린 치안 판사는 벌써 가혹한 판결을 내릴 준비가 된 듯 보였다. 나의 서원은 겸허히 관찰할 뿐, 개입하지 않는 것이었다. 그러나 나의 양심은 정의를 요구하고 있다. 침묵을 지키는 것은 공범이 되는 것과 다름없게 느껴진다." # 29974643632438018
  patriarchal_seats_events.2004.a: "내 정체를 밝히고 정당한 심문을 요구하겠노라!" # 2481518216937251943
  patriarchal_seats_events.2004.b: "순례자의 '벌금'을 은밀히 대신 지불하겠다." # 18323511594174847904
  patriarchal_seats_events.2004.c: "\"저는 이곳에 순례하러 왔을 뿐입니다. 간섭하지 않겠습니다.\"" # 7564207428130777061
  patriarchal_seats_events.2005.t: "오인된 신원" # 11737671831264370613
  patriarchal_seats_events.2005.desc: "시장 회랑의 그늘에서 쉬고 있자니, 먼지투성이가 된 나의 소박한 순례자 복장 때문에 영락없는 부랑자처럼 보일 테다. 값비싼 물건을 잔뜩 든 거드름 피우는 상인이 내 앞에 멈춰 섰다. 그는 내 눈조차 마주치려 하지 않은 채, 발끝으로 자신의 짐 보따리 하나를 툭 건드렸다.\n\n'이봐, 거기 너! 쓸모 있는 놈이라면 이 짐들을 자파 문 옆에 있는 내 가마까지 옮겨라.' 그는 마치 짐승에게 명령하듯 내뱉었다. 피가 거꾸로 솟는 기분이다. 수년간 군대를 지휘하며 굴복과 무조건적인 복종을 받아왔던 기억이 내 안에서 꿈틀거린다. 하지만 이번 은둔의 목적은 바로 그러한 오만을 떨쳐버리는 것. 어쩌면 이것이야말로 내가 지금까지 마주한 가장 진실된 시험일지도 모른다." # 5548102259957753740
  patriarchal_seats_events.2005.a: "자존심을 굽히고 복종하겠소." # 11105181936887040902
  patriarchal_seats_events.2005.b: "나는 짐꾼이 아니라 순례자일 뿐이오." # 5436954315862738590
  patriarchal_seats_events.2005.c: "이 어리석은 자에게 예의가 무엇인지 가르쳐줘야겠군!" # 5335511882170892893
  patriarchal_seats_events.2006.t: "조언 한마디" # 4039475271369443622
  patriarchal_seats_events.2006.desc: "평민들 사이에서 하루를 보내고 휴식을 취하고 있을 때, 한 젊은 순례자가 주저하며 다가왔습니다. \"실례합니다.\" 그가 입을 뗍니다. \"저와 다른 이들이 당신의 조용한 자선과 봉사를 보았습니다. 당신은 영주처럼 행동하지도 않고, 바리새인처럼 거드름을 피우지도 않습니다. 당신은 그저... #italic 봉사#할 뿐이지요. 당신의 신앙이 진실하다는 것을 우리는 알 수 있습니다. 제 영혼이 고통받고 있어, 당신의 조언을 구하고자 합니다.\"\n\n나는 깜짝 놀랐습니다. 몇 주 동안 의도적으로 나를 낮추고 하인처럼 행동했는데, 바로 그 #italic 덕분에# 이제 지혜의 원천으로 추앙받으며 사람들이 나를 찾아오고 있습니다. 이는 심오한 순간입니다. 내가 가진 지혜를 베풀 것인가, 겸손한 가장을 유지할 것인가, 아니면 나의 본모습을 드러낼 것인가?" # 17144998926596975519
  patriarchal_seats_events.2006.a: "물론이다, 얘야. 어디 한번 이야기해보자꾸나." # 5323406326020096792
  patriarchal_seats_events.2006.b: "저는 그대와 같은 평범한 순례자일 뿐입니다." # 802178862342717080
  patriarchal_seats_events.2006.c: "조언을 구하는가? 그렇다면 그대의 주군으로부터 얻을 수 있을 것이네." # 15952050671112113758
  patriarchal_seats_events.2007.t: "굶주린 아이" # 5744659037714129621
  patriarchal_seats_events.2007.desc: "긴 하루의 걷기와 기도를 마친 후, 나는 저녁 식사로 먹을 보잘것없는 빵 한 조각과 치즈 한 조각을 먹기 위해 조용한 구석을 찾았다. 한 입 베어 물기도 전에, 누더기를 걸친 작은 아이가 어디선가 나타났다. 아이는 아무 말도 하지 않았지만, 크고 퀭한 눈은 뼈저린 굶주림을 말해주듯 내 음식에 고정되어 있었다.\n\n나 역시 배가 고프고, 이것은 내일까지 버틸 유일한 식량이다. 내 앞의 선택은 고통스러울 정도로 단순하다. 나의 안락함인가, 아니면 이 아이의 생존인가. 이 가장 성스러운 도시에서, 신께서는 나에게 직접적이고 명확한 시험을 내리셨다." # 15189854181408996983
  patriarchal_seats_events.2007.a: "아이에게 내 모든 음식을 준다." # 4500265384072659548
  patriarchal_seats_events.2007.b: "아이와 식사를 나누겠다." # 4473319613616231463
  patriarchal_seats_events.2007.c: "나 먹을 것도 부족하다." # 1188858901406129474
  patriarchal_seats_events.2008.t: "비난" # 16073244326637894918
  patriarchal_seats_events.2008.desc: "성묘 교회의 붐비는 뜰에서 기도하던 중, 누더기를 걸친 광기 어린 남자가 나를 지목했다. 그는 떨리고 더러운 손가락으로 나를 가리키며 모두가 들을 수 있도록 소리치기 시작했다. '죄인이다! 가짜 순례자다!' 그가 광신적인 열정으로 목소리를 높이며 외쳤다. '이자는 겸손한 모습으로 너희들 사이에 섞여 있지만, 그 영혼은 죄로 검게 물들었다! 내가 보았다! 그 눈 뒤에 악마가 숨어 있다!'\n\n군중이 즉시 모여들었고, 그들의 얼굴에는 두려움과 병적인 호기심, 의심이 뒤섞여 있었다. 모두가 나를 쳐다보고 있었다. 지상에서 가장 성스러운 곳에서 공개적으로 거짓이라는 비난을 받는 것은 깊고 타오르는 수치다. 나의 진실한 경건함은 이제 광인의 헛소리로 인해 의심받게 되었다." # 2742418397638434326
  patriarchal_seats_events.2008.a: "다른 뺨을 내밀고 축복을 빌어주겠다." # 16493084662076128703
  patriarchal_seats_events.2008.b: "이건 미친 짓이다. 군중 속에서 물러나겠다." # 5028399509038247160
  patriarchal_seats_events.2008.c: "이 어리석은 자를 침묵시켜라! 나는 모욕당하지 않을 것이다!" # 2103880161337662773
  patriarchal_seats_events.2009.t: "과거의 얼굴" # 7611235719539658040
  patriarchal_seats_events.2009.desc: "도시의 부유한 구역을 지나던 중, 내 이름을 부르는 소리가 들렸다. 뒤를 돌아보니 이웃 나라의 하급 귀족이자 과거 궁중 행사에서 만난 적 있는 이였다. 그는 충격과 걱정이 가득한 얼굴로 나를 향해 달려왔다.\n\n'주군!' 그가 외쳤다. '무슨 일이 있었던 겁니까? 이런... 누더기를 걸치신 모습을 뵙다니! 산적이라도 만나셨습니까? 쿠데타로 폐위되신 겁니까? 무슨 일이 있었는지 말씀해 주십시오, 제가 돕겠습니다!'\n\n그는 분명 내가 끔찍한 불행을 겪었다고 생각하는 모양이다. 그를 바로잡는 것은 평범한 순례자로 살겠다는 나의 서약을 깨는 일이 될 것이다. 하지만 따뜻한 목욕과 훌륭한 식사, 그리고 내 신분에 걸맞은 익숙한 안락함을 제공하겠다는 그의 제안은 강력한 유혹이다." # 16219521010859947192
  patriarchal_seats_events.2009.a: "그의 추측에 맞춰 연기한다." # 17060356445489814104
  patriarchal_seats_events.2009.b: "그를 바로잡겠다. 나는 내 선택으로 이곳에 왔다." # 17275242350551497227
  patriarchal_seats_events.2009.c: "사람을 잘못 보셨소." # 4907604598968776837
  patriarchal_seats_events.2010.t: "총대주교의 부름" # 8445138485150977124
  patriarchal_seats_events.2010.desc: "나의 조용한 봉사는 생각만큼 눈에 띄지 않은 것이 아니었다. 가난한 구역을 샅샅이 뒤져 숨이 찬 전령이 나를 찾아냈다. 그는 예루살렘 총대주교가 직접 보낸 소환장을 가지고 있었다. 평민들 사이를 걷는 '경건한 귀족'에 대한 이야기가 그의 귀에 들어갔고, 그는 이 호기심 많은 인물을 만나고 싶어 하는 모양이다.\n\n이것은 딜레마를 안겨준다. 수락한다는 것은 이 겸손한 모습을 벗어던지고 다시 권력과 지위의 세계로 돌아가는 것이며, 어쩌면 내 여정의 이 단계를 끝내는 일이 될 수도 있다. 거절하는 것은 보이지 않는 봉사자의 길을 충실히 따르는 것이다. 나의 선택은 이 성스러운 도시에서 보낼 남은 시간의 성격을 결정할 것이다." # 16724372049488717830
  patriarchal_seats_events.2010.a: "총대주교와 식사를 하겠다." # 6697658018164980879
  patriarchal_seats_events.2010.b: "정중히 거절하겠다. 해야 할 일이 있다." # 6573545066702559665
  patriarchal_seats_events.2010.c: "물러나서 저녁 기도를 올리겠다." # 12492644272949633037
  patriarchal_seats_events.3001.t: "사막의 지혜" # 13943131367123390525
  patriarchal_seats_events.3001.desc: "다른 순례자들과 대화하던 중, 예루살렘 밖의 황량한 언덕 동굴에 사는 성스러운 은둔자에 대한 소문을 들었다. 사람들은 그가 수십 년 동안 고립된 채 메뚜기와 기도만으로 연명했다고 말한다. 어떤 이들은 그를 미친 사람이라 치부하지만, 또 다른 이들은 그가 세속적인 학문에 오염되지 않은, 신이 주신 깊은 지혜를 가지고 있다고 주장한다.\n\n나의 지적 호기심이 자극되었다. 총대주교와 공식적인 토론을 하는 것도 의미가 있지만, 신에 대한 지식 외의 모든 지식을 버린 사람과 내 지식을 시험해보는 것은... 거부할 수 없는 도전이다. 그를 찾아가겠다." # 14244334944199653476
  patriarchal_seats_events.3001.a: "그와 신앙의 본질에 관하여 토론을 벌이겠소." # 6998237544467663700
  patriarchal_seats_events.3001.b: "그에게 도전하지 않고, 그의 축복을 구하겠소." # 5204915199206139802
  patriarchal_seats_events.3001.c: "\"동굴 속 미치광이가 대체 무슨 지혜를 가질 수 있겠는가?\"" # 15701597397501076764
  patriarchal_seats_events.3002.t: "학구적인 수도승" # 10023223420387862513
  patriarchal_seats_events.3002.desc: "지적 도전을 찾아 떠난 나의 여정은 성 사바스 수도원의 도서관으로 이어졌다. 이곳은 고대 두루마리와 신학 논문들이 가득한 보물창고와도 같다. 나는 이곳에서 수도원의 수석 학자를 소개받았는데, 그는 엄격한 교리 논쟁으로 도시 전역에 명성이 자자한 수도사였다. 그의 시선은 날카롭고 손가락은 잉크로 얼룩져 있었으며, 그의 존재 전체가 신학적 진리를 탐구하는 데 바쳐진 듯했다.\n\n그는 수십 년간의 연구와 기도, 그리고 논쟁으로 연마된 엄청난 지성을 지니고 있었다. 이것이야말로 내가 찾던 도전이다. 성스러운 경전과 형식 논리의 장에서 펼쳐지는, 이 분야의 거장과 벌이는 지성의 결투. 나는 정식으로 토론을 요청할 것이다." # 16334340274344660930
  patriarchal_seats_events.3002.a: "교부들의 저술을 두고 그와 논쟁을 벌이겠다." # 10320541499571491891
  patriarchal_seats_events.3002.b: "논쟁은 하지 않겠소. 대신 그와 함께 학문을 닦기를 청하겠소." # 14361755941247576565
  patriarchal_seats_events.3002.c: "일개 수도사를 상대로 겨루는 것은 내 격에 맞지 않는다." # 7256527457852667085
  patriarchal_seats_events.3003.t: "본당 신부" # 16077743984586134308
  patriarchal_seats_events.3003.desc: "나의 지적 여정은 예루살렘 심장부에 있는 번화한 본당 교회로 향한다. 이곳에서 나는 주임 사제를 만난다. 그는 수도승과 같은 깊은 학식은 부족하지만, 수십 년간 신도들의 영적 필요를 돌보며 얻은 또 다른 종류의 지혜를 지닌 인물이다. 그는 추상적인 철학이 아니라 죄와 회개, 결혼, 그리고 임종 성사와 같은 복잡한 현실의 문제를 다룬다.\n\n그는 예배가 끝난 후 대중 토론을 열어 교회법과 사목적 의무에 관해 논하기로 하였다. 청중은 학식 있는 수도승들이 아니라 이 본당의 평범한 신도들이다. 이것은 순수한 지성이 아니라 실질적인 지식과 신자들과 소통할 수 있는 능력을 시험하는 자리가 될 것이다." # 6464562512647443286
  patriarchal_seats_events.3003.a: "그와 교회법에 관해 토론을 나누겠다." # 8418534142022718941
  patriarchal_seats_events.3003.b: "논쟁하지 않고, 그의 사역을 지켜보겠다." # 14221900761057516436
  patriarchal_seats_events.3003.c: "이 떠돌이 사제 따위가 신에 대해 무엇을 가르칠 수 있단 말인가?" # 13147729723855521764
  patriarchal_seats_events.3004.t: "원로들의 지혜" # 10761917468493349734
  patriarchal_seats_events.3004.desc: "나의 지적 호기심이 나를 예루살렘의 유대인 거주지로 이끌었다. 수 세기 동안 그들의 공동체는 풍부한 학문적 전통과 치열한 논쟁을 이어왔다. 은밀한 수소문 끝에 나는 토라와 탈무드에 정통하기로 이름난, 그들 중 가장 존경받는 랍비 한 명과의 만남을 주선했다.\n\n이것은 평범한 토론이 아닐 것이다. 그는 우리의 복음을 공유하지 않으며 우리의 메시아를 인정하지 않는다. 우리의 논쟁은 구약성경과 순수한 철학적 추론이라는 공통의 토대 위에서 펼쳐질 것이다. 그와 교류한다는 것은 기독교적 사고라는 익숙한 세계를 완전히 벗어나는 일이다. 이는 위험하고 어쩌면 불경스러운 제안일지도 모르나, 그토록 다른 관점으로부터 배울 수 있는 기회는 차마 외면하기 힘들 만큼 매혹적이다." # 8198928539020154411
  patriarchal_seats_events.3004.a: "그와 예언자들의 해석을 두고 토론하겠소." # 14765331395064626742
  patriarchal_seats_events.3004.b: "나는 논쟁하지 않고, 그의 전통에 대해 배우기를 청하겠다." # 8151331573273118684
  patriarchal_seats_events.3004.c: "비신자와 논쟁을 하겠다고? 이는 어리석은 짓이며, 이단에 가까운 행위다!" # 855402589728179506
  patriarchal_seats_events.3005.t: "카디의 논리" # 15079898718292243482
  patriarchal_seats_events.3005.desc: "다마스쿠스에서 온 카디에 대한 소식이 들려왔습니다. 그는 쿠란에 정통한 학식이 높은 판관으로, 현재 예루살렘의 알 아크사 모스크를 방문 중이라 합니다. 그는 논리학의 대가이며, 자신의 경전뿐만 아니라 고대 그리스 철학자들의 저작에도 정통하다고 알려져 있습니다.\n\n그와 같은 인물과 대화를 나누는 것은 나의 지적 수양에 있어 최고의 도전이 될 것입니다. 이는 알려진 세계에서 가장 거대한 신학적, 정치적 간극을 가로지르는 토론이 될 것입니다. 성공을 거두기 위해서는 지식뿐만 아니라 엄청난 외교적 수완이 필요할 것입니다. 작은 실수 하나가 한 개인에 대한 모욕을 넘어 신앙 전체에 대한 모욕으로 비칠 수 있기 때문입니다." # 5323611226365857931
  patriarchal_seats_events.3005.a: "신과 예언에 관한 공식적인 논쟁을 요청하겠소." # 15132795053321847327
  patriarchal_seats_events.3005.b: "그의 강의 중 하나에 은밀히 참석하겠소." # 13836787637675982764
  patriarchal_seats_events.3005.c: "나는 사라센 놈들과는 상종하지 않겠다!" # 3944236152828006530
  patriarchal_seats_events.4001.t: "베들레헴의 문" # 6253159391504277678
  patriarchal_seats_events.4001.desc: "나의 순례는 예루살렘에서 남쪽으로 향하는 짧은 여정과 함께 본격적으로 시작된다. 성스러운 도시의 위압적인 성벽이 내 뒤로 작아지고, 곧 먼지 날리는 길 위에 선다. 태양 빛을 머금은 유대의 언덕이 사방으로 굽이쳐 펼쳐진다. 풍경은 수 세기 전과 다를 바 없이 고풍스럽고 변함없어 보이며, 억센 올리브 나무 숲과 양 떼를 몰고 가는 양치기들이 드문드문 보일 뿐이다. 베들레헴으로 향하는 길을 걷고 있기에, 발걸음을 옮길 때마다 기대감이 차오른다.\n\n마을 안으로 들어서자 고요한 경외감이 밀려든다. 이곳은 예루살렘처럼 거대한 요새나 번화한 상업의 도시가 아니다. 이곳은 세상의 흐름을 바꾼 단 하나의 사건을 중심으로 세워진, 돌과 신앙으로 이루어진 소박한 마을이다. 현지인들의 얼굴은 그들의 조상을 내리쬐었던 것과 같은 태양에 그을려 있고, 공기 중에는 양의 울음소리나 아이를 부르는 어머니의 먼 목소리처럼 삶의 소박한 소리들이 가득하다.\n\n모든 순례자가 그러하듯, 나 또한 성탄 교회로 발길을 옮긴다. 입구부터가 겸손함을 가르치고 있다. 작고 낮은 돌문은 왕조차도 머리를 숙여야만 들어갈 수 있게 만든다. 내부의 바실리카는 거대하고 오래되었으며, 거대한 기둥들이 어둠 속으로 솟아 있다. 공기는 서늘하고 향료의 향기와 수천 년 동안 바쳐진 기도의 무게로 가득하다. 성인들과 천사들의 모자이크가 빛줄기 속에서 희미하게 반짝이고, 그 황금빛 눈동자는 경건하게 침묵하며 움직이는 수백 명의 신도들을 내려다본다.\n\n하지만 진정한 목적지는 그 아래에 있다. 나는 천천히 움직이는 신도들의 행렬에 합류하여, 주 제단 아래에 있는 동굴로 이어지는 좁은 돌계단을 내려간다. 공기는 서늘하고 묵직해지며, 위의 세상은 완전히 사라진다. 수십 개의 흔들리는 기름 등불이 밝히는 소박한 동굴, 이곳이 바로 모든 것의 중심이다. 대리석 바닥에는 14개의 꼭짓점을 가진 은색 별이 박혀 있고, 그 주위에는 라틴어로 다음과 같은 문구가 새겨져 있다. *'Hic de Virgine Maria Jesus Christus natus est'—여기서 예수 그리스도께서 동정 마리아에게서 나셨다.*\n\n무릎을 꿇고 차갑고 닳아버린 별의 금속을 만져본다. 이곳은 내 신앙이 탄생했다고 믿어지는 바로 그 장소다. 역사와 예언, 그리고 이 자리에서 바쳐진 수십억 번의 기도의 무게가 나를 짓누른다. 작고 신성한 이 동굴 안에서, 나의 작위, 의무, 야망과 같이 내 삶을 덮고 있던 거대하고 종종 부담스럽기만 했던 장막이 멀게 느껴지고 지극히 보잘것없게 느껴진다. 오직 고요함과 흔들리는 빛, 그리고 인류 역사상 가장 위대한 이야기의 시작점에 서 있다는 느낌만이 존재할 뿐이다." # 16080638036874497676
  patriarchal_seats_events.4001.a: "시작점에 서 있다는 것... 그것은 깊은 평화로다" # 14759964731382472533
  patriarchal_seats_events.4002.t: "성스러운 강으로" # 9810383691977343178
  patriarchal_seats_events.4002.desc: "유대의 언덕에서 느끼던 상대적인 서늘함은 사라지고, 이제 나의 길은 요르단 계곡의 깊고 숨 막히는 더위 속으로 이어진다. 공기는 짙고 무거우며, 풍경은 가차 없는 태양에 바싹 말라 있다. 여정은 고되고 인내심을 시험하지만, 마침내 목적지가 나타났을 때 그 경이로움은 배가 된다. 메마른 땅을 가로질러 굽이치는 생명의 녹색 띠가 보이기 때문이다.\n\n이곳이 바로 요르단 강이다. 내가 상상했던 거대하고 힘차게 흐르는 물줄기가 아니라, 빽빽한 갈대와 위성류 나무들이 늘어선 고요하고 거의 정체된 듯한 강이다. 하지만 이 소박한 물길은 지상에서 가장 신성한 곳 중 하나다. 다른 순례자들이 이미 이곳에 도착해 전통적인 세례 터에 모여 있다. 어떤 이들은 소리 내어 울고, 어떤 이들은 조용히 기도를 읊조린다. 그들의 눈은 수 세기 전 세례 요한이 주님의 오심을 선포하고 바로 이 물에서 그분께 세례를 베풀었던 그 물줄기에 고정되어 있다.\n\n그들의 본을 따라 먼지 묻은 겉옷을 벗고 강물 속으로 걸어 들어간다. 태양에 달궈진 피부에 닿는 물의 갑작스러운 서늘함은 충격적이며, 마치 영혼에 직접 전달되는 듯한 신체적 전율을 일으킨다. 물살은 부드럽고 고요하며 끊임없이 흐른다. 나는 눈을 감고 온몸을 물속에 담근다. 성스러운 물이 머리 위로 흐르게 두며, 숨이 멎을 듯한 단 한 순간 동안 세상의 모든 소리를 침묵시킨다.\n\n찬란한 햇살 아래로 숨을 몰아쉬며 물 밖으로 나오자, 세상이 새롭게 느껴진다. 머리카락과 수염에서 물이 흘러내리고, 물방울 하나하나가 나의 세속적인 짐들, 즉 불안과 사소한 불만, 그리고 오만을 조금씩 씻어내는 듯하다. 영혼을 짓누르던 무게가 가벼워진 기분이다. 마치 강물이 나의 죄를 가져가 하류로 흘려보내 성스러운 풍경 속으로 녹여버린 것만 같다. 나는 단순히 몸을 적신 것이 아니라, 정화되어 강에서 걸어 나온다." # 16118038510019730162
  patriarchal_seats_events.4002.a: "몸과 영혼이 깨끗하게 씻겨 나갔다." # 8594847630735581139
  patriarchal_seats_events.4003.t: "사나운 산" # 11341663248480803227
  patriarchal_seats_events.4003.desc: "나의 여정은 유대 광야의 심장부, 고대 도시 예리코를 굽어보는 삭막하고 험준한 산으로 향한다. 이곳은 '사나운 산'이라 불리며, 그리스도께서 40일간 금식하시고 악마에게 시험을 받으셨다고 전해지는 장소다. 멀리서 보아도 그 위압적인 모습은 숨이 막힐 지경이다. 태양에 그을린 가파른 절벽에는 수많은 동굴이 뚫려 있고, 그곳에서는 견딜 수 없는 열기와 황량함이 뿜어져 나오는 듯하다. 인간의 세상과는 의도적으로 단절된 듯한 느낌을 주는 곳이다.\n\n오르는 길은 험난하기 짝이 없다. 길이라기보다는 절벽 옆에 위태롭게 매달린 염소 길에 가깝다. 바람은 울부짖으며 눈을 찌르는 모래 알갱이를 실어 나르고, 정적은 멀리서 들려오는 맹금류의 울음소리에 의해서만 깨진다. 절벽에 바위 위의 따개비처럼 기적적으로 매달린 수도원이 이곳이 시련의 장소임을 알려준다. 이곳의 수도사들은 산만큼이나 거칠고 과묵한 사람들이며, 그들의 얼굴은 산 자체만큼이나 풍파에 찌들어 있다.\n\n그들은 나를 좁고 아찔한 벼랑 끝을 통해서만 접근할 수 있는 작은 석굴로 안내한다. 그들이 말하기를, 이곳이 바로 주님께서 금식하시며 시련을 겪으신 그 동굴이라 한다. 안으로 들어서니 공기는 고요하고 놀라울 정도로 서늘하다. 작게 뚫린 하나의 구멍으로 내려다보이는 아래쪽 계곡의 풍경은 숨이 막힐 정도로 아름답고도 두렵다. 세상의 모든 왕국과 영광이 마치 지도처럼 펼쳐져 있다. 유혹자의 속삭임이 들리는 듯하다. *'네가 만일 내게 엎드려 경배하면 이 모든 것을 네게 주리라.'*\n\n이곳에 서는 것은 유혹의 본질을 이해하는 것이다. 그것은 저속한 욕망이 아니라, 인간의 궁극적인 목적에 대한 시험이다. 나는 오랫동안 침묵 속에서 사색에 잠긴다. 이곳의 거칠고 사나운 아름다움은 천 년 전 이 황량한 동굴에서 견뎌낸 시련에 필요한 영적 강인함에 대해 경외심을 불러일으킨다. 나의 보잘것없는 여정에서 느낀 육체적 허기와 근육의 통증은 이곳에서 견뎌낸 고통에 비하면 어린아이의 투정처럼 느껴진다. 어떤 계시도, 바람에 실린 악마의 속삭임도 없었지만, 나 자신의 보잘것없음을 깊이 절감하게 되었고, 천 년 전 이 황량한 동굴에서 세워진 본보기에 부끄럽지 않게 살겠다는 강철 같은 결의를 다지게 되었다." # 15573311916131614023
  patriarchal_seats_events.4003.a: "이러한 결의가 서린 장소를 목격하는 것은 곧 마음이 강해지는 일이다." # 9759021022682078306
  patriarchal_seats_events.4004.t: "갈릴래아 호수" # 4913708120455008504
  patriarchal_seats_events.4004.desc: "유대 광야의 가혹한 황량함을 뒤로하고 북쪽으로 향하는 나의 여정은 놀라운 아름다움과 깊은 평화가 깃든 곳, 갈릴래아 호수로 이어진다. 이곳은 거창한 의미의 바다가 아니라, 하프 모양으로 넓게 펼쳐진 민물 호수로, 호숫가는 주변 언덕과 대비되어 푸른 녹음이 우거져 있다. 태양 아래 호수 물은 눈부시게 빛나는 푸른색을 띠고, 남쪽의 숨 막히는 열기에서 벗어난 공기는 신선하고 맑다. 카파르나움과 타브가의 어촌 마을들 사이에서 그리스도께서는 공적인 사역을 시작하셨다.\n\n나는 베드로와 안드레가 사용했을 법한 작은 어선을 빌려 고요한 물 위로 나아간다. 키를 잡은 백발의 어부는 조용하고 숙련된 경건함으로 성스러운 장소들을 가리킨다. '저기,' 그가 완만한 경사지를 가리키며 말한다. '주님께서 산상수훈을 설파하신 곳입니다.' 그는 작은 만을 가리킨다. '그리고 저곳에서, 그분께서는 빵 다섯 개와 물고기 두 마리로 오천 명을 먹이셨지요.'\n\n배가 평온한 수면을 미끄러지듯 나아갈 때, 나는 차갑고 맑은 물에 손을 담가본다. 이곳은 그리스도께서 걸으셨던 바로 그 물이며, 말씀 한마디로 폭풍을 잠재우시고 제자들에게 믿음의 본질을 가르치셨던 곳이다. 풍경 전체가 살아있는 복음 그 자체다. 이곳은 베들레헴이나 성묘 교회처럼 거대하고 단일한 사건이 일어난 장소가 아니다. 이곳은 가르침과 비유, 그리고 일상의 삶 속에 녹아든 기적의 장소다. 이곳에서 설파된 믿음은 어부와 농부, 그리고 평범한 사람들을 위한 것이었으며, 그 메시지는 물만큼이나 단순하고도 필수적인 것이었다.\n\n그물을 수선하는 남자들과 샘에서 물을 길어 오는 여인들이 있는 호숫가를 돌아보며, 나는 멀리 떨어진 신성한 신비가 아닌, 만질 수 있는 인간적인 이야기에 연결되어 있음을 느낀다. 이곳은 그분의 고향이었고, 이들은 그분의 사람들이었다. 이곳의 거룩함은 웅장한 교회나 황금 유물에 있는 것이 아니라, 호수의 평온한 아름다움과 그 기슭에서 가르치신 교훈의 영원한 기억 속에 있다. 이는 내 신앙의 서사시를 인간적이고 공감할 수 있는 규모로 끌어내려, 그 모든 것을 더욱 강력하게 만든다." # 3400795527220541848
  patriarchal_seats_events.4004.a: "그분이 걸으셨던 길을 걷는다는 것... 고요한 평화." # 15531372207768799628
  patriarchal_seats_events.4005.t: "겟세마네 동산" # 16207771335129665904
  patriarchal_seats_events.4005.desc: "오늘 저녁, 나의 길은 예루살렘 동쪽 성벽 바로 바깥, 올리브 산 기슭으로 향한다. 저무는 빛 아래, 고요하고 사색적인 작은 숲이 하나 있으니 바로 겟세마네 동산이다. 그 이름은 '기름 짜는 틀'을 뜻하며, 이곳에 여전히 서 있는 뒤틀리고 오래된 올리브 나무들은 역사상 가장 슬픈 밤 중 하나를 지켜본 침묵의 증인들이라고 한다. 나무껍질은 두껍고 뒤틀려 있으며, 나뭇가지들은 마치 관절염에 걸린 손가락처럼 하늘을 향해 뻗어 있어, 이 모든 것을 지켜볼 만큼 오래되었다는 사실을 쉽게 믿을 수 있다.\n\n이곳은 그리스도께서 최후의 만찬 이후 기도하러 오셨던 장소이다. 이곳에서 그분은 다가올 고난에 대한 두려움으로 피땀을 흘리며 '아버지여, 만일 가능하시다면 이 잔을 내게서 지나가게 하소서'라고 기도하며 동산에서의 고뇌를 겪으셨다. 이곳은 인간적인 거대한 두려움, 끔찍하고도 피할 수 없는 운명과 씨름하는 영혼의 장소이다. 이곳의 공기에는 영혼을 차분하게 하고 혀를 멈추게 하는 엄숙함이 깃들어 있다.\n\n어둠이 짙어지고 맞은편 언덕 위로 예루살렘의 불빛이 반짝이기 시작할 때, 나는 기도 이후에 벌어진 일들을 생각한다. 이곳은 배신의 장소이다. 유다가 입맞춤으로 다가왔고, 제자들이 두려움에 흩어졌으며, 인자가 성전 경비병들에게 체포된 곳이 바로 여기다. 따라서 이 동산은 두 가지 깊은 슬픔의 장소이다. 자신의 운명을 마주해야 하는 내면의 고뇌, 그리고 친구에게 배신당하는 외면의 고뇌가 그것이다.\n\n이 오래된 나무들 사이를 걸으며, 나는 영광이나 승리감은 느끼지 못하고 오직 깊고 슬픈 공감만을 느낀다. 이곳은 거창한 신학적 선언을 위한 장소가 아니라, 충성심과 두려움, 그리고 피할 수 없는 의무의 막중한 무게에 대해 조용히 성찰하기 위한 곳이다. 이 경험은 고양감을 주지는 않지만, 인간성을 깊이 일깨워준다. 의심과 공포를 이해하는 내 영혼의 한 부분을 건드려, 뒤이어 일어난 희생을 더욱더 중대하게 만든다." # 2172087205248992523
  patriarchal_seats_events.4005.a: "이 슬픔을 함께 나누는 것은 무겁지만, 반드시 짊어져야 할 짐이다." # 5889543435546095810
  patriarchal_seats_events.4006.t: "슬픔의 길" # 9419288387143338458
  patriarchal_seats_events.4006.desc: "오늘 나는 순례 중 가장 엄숙하고 중요한 도보 여정 중 하나를 시작한다. 나는 본시오 빌라도가 그리스도를 심판했던 안토니아 요새 터에서 시작하여, '비아 돌로로사', 즉 '슬픔의 길'이라 알려진 길을 따라 구시가지의 굽이치고 좁은 거리를 걷는다. 이는 그리스도께서 십자가를 지고 골고다 언덕으로 향하시던 전통적인 경로이다. 황량한 광야나 평온한 갈릴래아 호수와는 달리, 이곳은 살아 숨 쉬는 번화한 도시의 심장부를 통과하는 여정이다.\n\n이 길은 조용하고 사색적인 공간이 아니라, 인파의 압박과 상인들의 외침, 요리하는 불과 가축의 냄새로 가득 찬 곳이다. 이는 그리스도의 수난이 멀고 신화적인 사건이 아니라, 일상의 혼돈 속에서 펼쳐진 날것 그대로의 공개적인 광경이었음을 강력하게 상기시켜 준다. 전통적인 각 지점에서 나는 멈춰 선다. 그분께서 십자가의 무게를 이기지 못하고 처음 넘어지셨던 곳. 슬픔에 잠긴 어머니를 만나셨던 곳. 베로니카라는 여인이 그분의 얼굴에서 피와 땀을 닦아주었던 곳. 키레네 사람 시몬이 강제로 무거운 나무 십자가를 대신 짊어져야 했던 곳.\n\n각 지점은 고통과 겸손, 그리고 작고 찰나 같은 자비의 행위들이 모인 한 폭의 그림과 같다. 이 길을 걷는다는 것은 고난의 육체성을 마주하는 일이다. 몇 주간의 여행으로 내 다리도 아프지만, 밤새 심문을 받고 채찍질을 당한 뒤 자신의 처형 도구를 직접 짊어지고 이 길을 걸어야 했던 생각을 하면... 겸허해지면서도 두려운 마음이 든다. 무관심한 군중의 야유와 고통, 탈진까지... 모든 것이 믿을 수 없을 정도로 생생하게 다가온다.\n\n성묘 교회의 입구인 마지막 지점에 도착했을 때, 나는 감정적으로나 영적으로 완전히 소진된 상태였다. 이 길을 걷는 동안 순교에 대한 낭만적인 생각은 모두 사라졌고, 엄청난 은총으로 인내해낸 거대한 고통에 대한 본능적인 이해가 그 자리를 대신했다. 이것은 기쁨이 아닌, 바로 이 길 위에서 이루어진 희생에 대한 깊고 심오한 경외심을 심어주는 힘든 가르침이다." # 5093764706029609615
  patriarchal_seats_events.4006.a: "나는 그분의 고통의 길을 걸었다." # 15174606003785775730
  patriarchal_seats_events.4007.t: "골고다 언덕" # 17032468195217470962
  patriarchal_seats_events.4007.desc: "비아 돌로로사의 길은 나를 이곳, 성묘 교회로 인도했다. 이곳은 내 신앙의 가장 성스러운 두 장소 위에 세워진 거대하고 오래된 대성당이다. 이 성스러운 복합 건물 안에서 나의 첫 목적지는 가파르고 좁은 계단을 통해 올라갈 수 있는 작은 예배당이다. 이곳은 십자가가 세워졌던 바로 그 언덕, '해골의 장소'라 불리는 골고다의 전통적인 위치이다.\n\n이 공간은 화려하고 장식으로 가득 차 있어, 기념하는 잔혹한 사건과는 극명한 대조를 이룬다. 공기는 향의 달콤하고 묵직한 냄새로 가득하고, 금박을 입힌 성화들은 수백 개의 매달린 등불 아래서 반짝인다. 두 개의 주 제단이 이 성스러운 땅을 표시하고 있다. 정교회 제단 아래, 바닥에 박힌 은색 원판 중앙에는 구멍이 뚫려 있어 순례자들이 손을 뻗어 언덕의 살아있는 바위, 즉 십자가가 세워졌다고 믿어지는 자리를 직접 만져볼 수 있다.\n\n나는 울며 기도하는 사람들 사이에서 차례를 기다리며, 참을 수 없을 만큼 깊고 엄숙한 기분을 느낀다. 내 차례가 되어 나는 무릎을 꿇고 구멍 안으로 손을 뻗는다. 내 손가락이 거칠고 차가운 돌에 닿는다. 바로 여기다. 문자 그대로, 그리고 비유적으로 내 신앙의 기반이 되는 곳. 이곳은 육신을 입은 하느님께서 세상의 죄를 위해 희생되신 장소이다. 천 년 전의 사건이 단지 얇은 장막 너머에 있는 것처럼, 이곳에서는 시간조차 희미하게 느껴진다.\n\n나는 땅을 덮었던 어둠과 바위를 갈라놓았던 지진, 그리고 십자가 위에서 하신 말씀을 생각한다. *'아버지, 저들을 용서하여 주소서. 저들은 자기들이 하는 일을 알지 못하나이다.'* 이곳에 있다는 것은 단순히 이야기를 기억하는 것이 아니라, 구원의 바로 그 중심에 자신을 두는 것이다. 모든 인간의 죄라는 짓누르는 무게와, 그것을 사해준 끝없는 자비를 느끼는 것이다. 이 경험은 사고를 초월하여, 영혼을 뒤흔드는 심오한 경외심만을 남긴다." # 10010670261011756353
  patriarchal_seats_events.4007.a: "세상의 기초를 만진다는 것..." # 3212370701595321347
  patriarchal_seats_events.4008.t: "빈 무덤" # 13759200008599793153
  patriarchal_seats_events.4008.desc: "골고다의 침울한 예배당에서 내려와 거대한 바실리카의 중앙 원형 홀로 돌아왔습니다. 하늘을 향해 열린 웅장한 돔 아래, 이 거대하고 둥근 방의 중심에는 돌과 대리석으로 지어진 작고 화려한 구조물이 서 있습니다. 이것이 바로 그리스도께서 십자가형을 당하신 후 그 몸을 누이셨던 바위를 깎아 만든 무덤 위에 세워진 '작은 집', 에디쿨라입니다. 이곳이 바로 성묘입니다.\n\n주변의 공기는 슬픔이 아닌 기쁨과 전율로 가득 차 있습니다. 이곳은 죽음의 장소가 아니라, 죽음이 완전히 패배한 곳입니다. 다른 순례자들과 함께 줄을 서서 기다린 끝에, 저도 성스러운 구조물 안으로 들어갈 차례가 되었습니다. 허리를 낮추어 입구를 지나 첫 번째 전실인 천사의 예배당으로 들어서니, 무덤 입구를 막았던 거대한 돌의 파편이 보입니다. 기대감으로 가슴이 벅차오릅니다.\n\n다시 한번 허리를 숙여 내실인 무덤 내부로 들어섭니다. 공간은 아주 좁아 몇 사람만이 겨우 설 수 있을 정도입니다. 오직 부드럽게 일렁이는 촛불만이 향 연기가 소용돌이치는 방 안을 비추고, 경외심과 경이로움이 서린 순례자들의 얼굴을 밝힙니다. 방 한쪽에는 주님의 몸을 모셨던 돌 벤치를 보호하기 위해 대리석 판이 놓여 있습니다. 하지만 모든 숭배의 초점은 대리석 판 그 자체가 아니라 그 위에 있는 빈 공간입니다. 무덤은 비어 있습니다.\n\n*그분은 여기 계시지 않다. 말씀하신 대로 살아나셨느니라.* 천사의 말씀이 먼 옛날의 이야기가 아닌, 지금 이 순간 생생한 현실로 제 마음속에 울려 퍼집니다. 이 작고 비좁은 방은 세상에서 가장 중요한 장소입니다. 이곳은 역사가 회전하는 축입니다. 죽음에 대한 신의 승리를 증명하는 결정적인 증거이자, 모든 희망의 원천이며, 영원한 생명의 약속입니다. 골고다의 슬픔은 이 빈 공간의 순수하고 승리적인 영광에 의해 정복되었습니다. 이것은 끝이 아니라 모든 인류를 위한 새로운 시작이며, 저는 바로 그 근원에 서 있습니다." # 7990622575360697014
  patriarchal_seats_events.4008.a: "이 비어 있음 속에 모든 것이 존재합니다." # 12134254836190433234
  patriarchal_seats_events.4009.t: "다락방" # 16220999557849707140
  patriarchal_seats_events.4009.desc: "제 발걸음은 이제 구시가지 성벽 바로 바깥에 있는 시온 산으로 향합니다. 그곳은 교회 창립에 있어 매우 중요한 의미를 지닌 장소입니다. 이곳에는 '다락방'이라 불리는 최후의 만찬 기념 성당이 서 있습니다. 이 구조물은 아름다운 아치와 아치형 천장을 갖춘 소박하지만 아름다운 2층 건물로, 헌신적인 수도사들이 관리하고 있습니다. 웅장한 바실리카와는 다른 느낌을 줍니다. 이곳은 예배를 위한 곳이라기보다 모임을 위한 더 친밀한 장소입니다.\n\n이 단 하나의 방은 전통적으로 두 가지 중대한 사건의 배경으로 여겨집니다. 첫째, 이곳은 그리스도께서 배신당하기 전날 밤 제자들과 최후의 만찬을 나누신 곳입니다. 바로 이 방에서 그분은 제자들의 발을 씻겨 주시고, 서로 사랑하라는 계명을 주셨으며, *'이는 내 몸이니... 이는 내 피니라'*라고 말씀하시며 성찬례를 제정하셨습니다. 그들의 대화 소리가 귓가에 맴도는 듯하고, 걱정스러운 얼굴 위로 일렁이는 등불의 그림자가 보이며, 오직 그분만이 온전히 이해하셨던 다가올 비극의 무게가 느껴집니다.\n\n하지만 이 방은 큰 기쁨의 기억도 간직하고 있습니다. 부활과 승천 이후, 제자들이 두려움 속에 모여 기도하던 곳이 바로 이곳입니다. 오순절에 성령이 강림하신 곳도 바로 이 공간이었습니다. 그들의 머리 위로 불의 혀 같은 것이 나타났고, 그들은 모든 민족에게 복음을 전할 용기와 은총으로 충만해졌습니다. 이 방은 단순히 첫 성찬례의 장소일 뿐만 아니라, 살아 숨 쉬는 사명으로서 교회가 탄생한 바로 그곳입니다.\n\n방 한가운데 서서 저는 이곳 역사의 이중성에 압도됩니다. 이곳은 마지막 슬픈 작별의 장소이자, 새롭고 영광스러운 시작의 장소입니다. 이곳은 그리스도의 지상 사역에서 사도 시대로 넘어가는 전환점을 상징합니다. 이곳은 군중이 목격한 거대하고 단일한 기적의 현장이 아니라, 친밀한 공동체, 약속이 이루어지고 능력이 부여된 곳입니다. 이곳은 신앙이 개인적인 여정일 뿐만 아니라, 바로 이 방에서부터 세대를 거쳐 전해 내려온 공유된 사명이자 친교임을 강력하게 일깨워 줍니다." # 765963573052327440
  patriarchal_seats_events.4009.a: "여기서 위대한 사명이 시작되었습니다." # 10895565913227601185
  patriarchal_seats_events.4010.t: "승천" # 11151975926130125067
  patriarchal_seats_events.4010.desc: "순례의 마지막 여정을 위해 늦은 오후의 햇살을 받으며 올리브 산을 오릅니다. 정상에 서자, 성스러운 도시 예루살렘 전체가 마치 신의 손길로 그려낸 지도처럼 눈앞에 펼쳐집니다. 멀리 보이는 베들레헴의 언덕부터 내가 걸어온 고대의 성벽, 바위의 돔이 뿜어내는 황금빛 광채, 그리고 성묘 교회의 드넓은 지붕까지, 내가 방문했던 모든 성지가 하나의 장엄한 파노라마로 어우러져 있습니다.\n\n이 산의 가장 높은 곳에는 작고 소박한 예배당이 하나 서 있습니다. 이곳은 부활하신 그리스도께서 제자들과 사십 일을 함께하신 뒤, 하늘로 승천하시기 전 마지막 사명을 내리셨다고 전해지는 장소입니다. 예배당은 보잘것없지만, 그 안에는 심오하고도 기묘한 힘을 지닌 성유물이 보관되어 있습니다. 바로 그리스도께서 지상을 떠나 천상의 보좌로 돌아가시기 위해 발을 내디뎠을 때 남기셨다는, 그분의 발자국이 새겨진 돌판입니다.\n\n나는 그 돌 앞에 무릎을 꿇고 손가락으로 희미한 자국을 따라가 봅니다. 골고다와 달리 이곳은 슬픔으로 가득 차 있지 않습니다. 성묘 교회와 달리 이곳은 세상을 뒤흔드는 폭발적인 기적이 일어난 곳도 아닙니다. 이곳은 평온한 작별과 심오한 약속이 깃든 장소입니다. 제자들이 목을 길게 빼고 주님께서 구름 속으로 사라지는 모습을 지켜보며, 지상에 그분의 교회를 세워야 할 막중한 과업을 떠안았던 바로 그 자리입니다.\n\n이 높은 곳에서 아래 세상을 내려다보니 충만함이 느껴집니다. 나의 순례도 정점에 다다랐습니다. 나는 이 지상 이야기의 시작과 중간, 그리고 끝을 모두 보았습니다. 이제 그분께서 떠나신 자리에 서서, 나는 신앙의 여정이 결코 성지에서 끝나지 않는다는 사실을 다시금 깨닫습니다. 이곳은 그저 영혼을 재충전하는 장소일 뿐입니다. 제자들의 사명과 마찬가지로 진정한 과업은 산을 내려와 다시 세상으로 돌아가, 새로운 목적과 더 맑은 통찰을 품고 살아갈 때 시작됩니다. 그분께서 이 자리를 떠나 천상의 보좌로 돌아가셨듯, 나 또한 이 성지를 떠나 나의 지상 임무로 돌아갈 준비를 해야 합니다. 내가 보았던 모든 것으로 인해 나는 영원히 변화하였습니다." # 18391030121759795884
  patriarchal_seats_events.4010.a: "성지순례를 마쳤다. 이제 나의 의무가 무엇인지 분명해졌다." # 6619631021641564473
  patriarchal_seats_events.1111.t: "세계의 심장" # 6811179914524598783
  patriarchal_seats_events.1111.desc: "길고 고된 여정 끝에, 마침내 예루살렘에 도착했다. 도시는 눈을 어지럽히는 광경과 소리, 그리고 냄새가 뒤섞인 압도적인 태피스트리 그 자체였다. 공기는 향과 먼지로 가득하고, 거리 곳곳에서는 수십 가지 언어가 소란스럽게 울려 퍼지며, 골목마다 역사의 흔적이 서려 있는 듯했다. 현지 교회 당국이 마련해 준 숙소는 소박하지만 정갈했다.\n\n나의 조력자로 배정된 지혜로운 노수도사가 고개를 숙였다. \"세상의 중심에 오신 것을 환영합니다, 주군.\" 그의 목소리는 낮고 거친 속삭임처럼 들려왔다. \"이 도시는 신께 다가가는 여러 길을 품고 있으며, 각자의 길에는 그에 따른 시련과 보상이 따릅니다. 이제 주군께서 어떤 여정을 시작하실지 선택하실 차례입니다. 주군께서는 어떤 방식으로 깨달음을 구하시겠습니까?\"" # 6905185361441721279
  patriarchal_seats_events.1111.desc_alt: "격렬한 활동의 시간을 보낸 뒤, 나는 휴식과 성찰을 위해 숙소로 돌아왔다. 창밖으로 끊임없이 이어지는 도시의 활기는 이곳이 여전히 품고 있는 수많은 경험을 끊임없이 상기시킨다. 나를 보필하도록 임명된 늙은 수도사가 시원한 물이 담긴 주전자를 들고 기다리고 있다.\n\n'주군, 많은 것을 배우셨으나 성스러운 도시는 깊은 우물과도 같습니다.' 그가 말한다. '그 가르침은 하루 만에 다할 수 있는 것이 아니지요. 다른 길을 따라 수양을 계속하실 수도 있고, 마음이 평온하시다면 귀향길을 준비하실 수도 있습니다. 주군의 뜻은 어떠하십니까?'" # 15033350635625433261
  patriarchal_seats_events.1111.a: "내 영혼의 고요함 속에서 신을 찾으리라." # 10582891038726627978
  patriarchal_seats_events.1111.b: "나는 온유한 자들을 섬김으로써 신을 찾으리라." # 3625941926243675061
  patriarchal_seats_events.1111.c: "나는 정신을 갈고닦아 신을 찾으리라." # 10420110110560912348
  patriarchal_seats_events.1111.d: "그분의 발자취를 따라 걸으며 성지들을 순례하겠노라." # 8036864983318311462
  patriarchal_seats_events.1111.e: "나의 영혼은 충만하오." # 13782889767490798803
  patriarchal_seats_events.1112.t: "순례자의 작별" # 10849239550085431162
  patriarchal_seats_events.1112.desc: "이제 영적 수련을 끝낼 시간이 되었다. 성스러운 도시의 문이 내 뒤로 닫히고, 나는 집으로 향하는 긴 여정을 시작한다. 이곳에서 보낸 시간이 침묵의 기도였든, 겸허한 봉사였든, 학문적 토론이었든, 혹은 단순히 신성한 땅을 거니는 것이었든, 그 경험은 내 영혼에 지울 수 없는 흔적을 남겼다.\n\n세속적인 일들의 끝없는 소용돌이와 왕관과 의무의 무게는 이제 더 멀게만 느껴지며, 이 장소가 지닌 순수하고 영원한 엄숙함 앞에서 제자리를 찾은 듯하다. 이 지극히 성스러운 도시에서 보고 들은 것들과 깊은 가르침은 내 마음 깊은 곳의 무언가를 일깨웠다. 나는 이곳에 도착했을 때와는 다른 사람이 되어 영지로 돌아간다. 이 땅이 구현하는 진리를 다시금 되새기고, 앞으로 닥칠 시련을 견뎌낼 힘을 얻었으니 말이다." # 4245762597964746752
  patriarchal_seats_events.1112.a: "성스러운 도시를 내 마음속에 품고 가리라." # 4844197752832829343
  patriarchal_seats_events.0001.t: "순례자의 구역이 완성되었습니다" # 3907251310378729904
  patriarchal_seats_events.0001.desc: "주군이시여, 공사 감독관이 순례자 구역이 이제 완전히 운영되고 있다고 보고했습니다. 한때 잔해에 불과했던 곳이 이제는 지친 이들을 위한 안식처가 되었습니다. 주방의 불길은 밤낮으로 밝게 타오르고 있으며, 더 이상 경건한 순례자가 거리에서 잠을 청할 필요가 없습니다. 주군께서 베푸신 자선은 예루살렘에서 로마에 이르기까지 칭송받고 있습니다." # 16082604116622239166
  patriarchal_seats_events.0001.a: "신실한 자들이 이곳에서 안식을 취하게 하라." # 9684979397833631217
  patriarchal_seats_events.0002.t: "필사실이 설립되었습니다" # 6897789556995149844
  patriarchal_seats_events.0002.desc: "주군이시여, 필사실이 완공되었습니다. 서가에는 벌써 귀중한 필사본들이 채워지기 시작했습니다. 전당 안에서는 양피지 위를 바삐 움직이는 깃펜의 서걱거리는 소리가 들려옵니다. 우리 신앙의 지혜가 천 년의 세월을 견디기 위해 기록되는 소리입니다. 학자들은 벌써부터 늘어나는 장서에 접근할 수 있게 해달라며 청원을 올리고 있습니다." # 578514489681444028
  patriarchal_seats_events.0002.a: "그들의 노고에 축복이 있기를!" # 5249435320707927523
  patriarchal_seats_events.0003.t: "바실리카가 축성되었습니다" # 510826543267061127
  patriarchal_seats_events.0003.desc: "주군이시여, 최종 봉헌 의식이 완료되었습니다. 성스러운 지혜의 대성당이 완공되었으며, 예루살렘 전역에 울려 퍼지는 거대한 종소리는 신자들의 눈에 눈물을 맺히게 했습니다. 이제 총대주교좌는 주군과 같이 성스러운 도시에서 영적 수련을 하고자 하는 경건한 영주들을 맞이하기에 부족함이 없습니다." # 16287796970843615061
  patriarchal_seats_events.0003.a: "경건한 자들을 위한 집." # 7987926820323960278
  patriarchal_seats_events.0004.t: "총대주교 궁전이 건립되었습니다" # 70667940335008414
  patriarchal_seats_events.0004.desc: "주군이시여, 공사 감독관이 대성당 옆에 총대주교 궁전이 완공되었다고 보고했습니다. 그곳의 홀은 성직자와 청원자들로 북적이며, 총대주교는 이제 영적인 권위에 걸맞은 세속적 권위의 자리에서 정무를 보고 있습니다. 동방 교회의 통치 체계가 중앙집권화되고 강화되어, 왕국 전역에 안정과 권능의 기운을 불어넣고 있습니다. 이제 우리의 권위와 총대주교의 권위는 모두가 볼 수 있도록 하나로 묶였습니다." # 11165641768641866997
  patriarchal_seats_events.0004.a: "예루살렘의 존경받는 총대주교를 위한 거처" # 6242834216012299734
  patriarchal_seats_events.0005.t: "성유물함이 봉헌되었습니다" # 16247685008931785089
  patriarchal_seats_events.0005.desc: "주군이시여, 대성유물함이 봉헌되고 봉인되었습니다. 그 벽 안에 안치된 우리의 성유물들은 분명한 은총을 발하고 있습니다. 순례자들은 이제 성지뿐만 아니라 주군의 총대주교좌에 보관된 보물들에 대해서도 경외심을 담아 나지막이 이야기합니다. 신의 가호가 이 도시에 깃들어 있음이 분명합니다." # 5133567977455007347
  patriarchal_seats_events.0005.a: "신과의 연결 고리." # 1040036210043268419
  patriarchal_seats_events.0006.t: "유대인 거주구가 번영합니다" # 8821599757801260554
  patriarchal_seats_events.0006.desc: "주군이시여, 유대인 거주구의 보수 공사가 완료되었습니다. 이제 그곳은 상업과 학문의 활기 넘치는 중심지가 되었습니다. 그곳의 지도자들은 주군의 후원에 깊은 감사를 표했으며, 앞으로도 오랫동안 그들의 충성을 보장할 것입니다. 또한, 도서관과 아카데미가 복구됨에 따라 예루살렘은 유대 학문의 탁월한 중심지로 여겨지게 되었으며, 주군께서는 그들의 가장 뛰어난 학자들을 궁정으로 쉽게 초빙할 수 있게 되었습니다." # 571008282484078252
  patriarchal_seats_events.0006.a: "우리가 평화롭게 살기를." # 12402901008634645767
  patriarchal_seats_events.0007.t: "위대한 봉헌" # 10581251656399070850
  patriarchal_seats_events.0007.desc: "모든 작업이 끝났습니다. 오늘, 내 왕국의 귀족과 성직자들이 모인 가운데, 신의 지켜보는 눈 아래에서 성스러운 지혜의 대성당 종이 처음으로 울려 퍼집니다. 그 기쁜 소리가 도시 전역에 메아리치며 예루살렘 총대주교좌가 복구되었음을 선포합니다!\n\n가장 화려한 예복을 차려입은 총대주교가 성대한 행렬을 이끌고 대성당으로 들어섭니다. 성스러운 향의 향기가 공기를 가득 채우는 가운데, 그가 기도를 올리며 대제단을 봉헌합니다. 거대한 돔을 통해 들어오는 빛이 황금 모자이크를 비추고, 모자이크는 신성한 생명력을 띠고 반짝이는 듯합니다. 밖에서는 새로운 필사실이 신앙의 지식을 지킬 준비를 마쳤고, 순례자 구역은 기쁨에 넘치는 신자들로 인산인해를 이룹니다.\n\n이것은 단순한 건물이 아니라 하나의 선언입니다. 이것은 다시금 활기차게 고동치는 기독교 세계의 영적인 심장입니다. 내 이름은 이 영광스러운 업적과 함께 영원히 기억될 것이며, 그 유산은 돌과 신앙, 그리고 역사의 기록 속에 새겨질 것입니다." # 13535940736029595632
  patriarchal_seats_events.0007.a: "성지를 위한 새로운 새벽!" # 17467151492914659128
  patriarchal_seats_events.0008.t: "모든 노력이 수포로 돌아갔습니다" # 5468265981487886439
  patriarchal_seats_events.0008.desc: "먼지투성이가 된 전령이 옷은 찢어지고 얼굴은 공포에 질린 채 성지로부터 참담한 소식을 가져왔습니다. 예루살렘이 이교도들의 손에 떨어졌습니다.\n\n전령은 그 참상을 전하며 눈물을 흘립니다. 적들이 우리의 성스러운 노력을 짓밟았습니다. 그는 대성당의 미완성 벽들이 요새화를 위해 허물어지고, 필사실의 귀중한 필사본들이 약탈당하거나 불태워졌으며, 순례자 구역이 그들의 불경한 군인들을 위한 병영으로 변했다는 소식을 전합니다.\n\n수세대에 걸친 노력과 산더미 같은 금, 그리고 경건한 희망의 바다가 모두 산산조각 났습니다. 복구된 총대주교좌의 꿈은 이제 폐허가 되었으며, 이 가장 신성한 과업을 지켜내지 못한 우리의 실패를 보여주는 쓰라린 증거가 되었습니다. 이 신성모독의 무게가 납으로 된 수의처럼 내 영혼을 짓누릅니다." # 6687064275847218907
  patriarchal_seats_events.0008.a: "그들은 피와 불로 이 대가를 치르게 될 것이다!" # 3917270448006585274
  JERUSALEM_LOCATION_TOOLTIP: "주군께서 예루살렘을 통치하십니다" # 11075044900394710439
  spiritually_refreshed_modifier: "영적으로 재충전됨" # 8280441715433676665
  spiritually_refreshed_modifier_desc: "예루살렘 총대주교 도시에서 영적 수련을 즐겼습니다. 이 경험은 내 지위의 무게를 씻어내고 정신을 강건하게 해주었습니다." # 4239932990815909519
  spiritual_retreat_jerusalem: "예루살렘으로의 영적 수련" # 4604339936815404617
  spiritual_retreat_jerusalem_selection_tooltip: "성찰, 봉사, 연구를 통해 영적 쇄신을 추구하고자 예루살렘으로 개인적인 순례를 떠납니다.\n\n예상 보상:\n$BULLET_WITH_TAB$ [piety|E]를 획득하고, 상당한 [stress|E]를 해소하며, 고유한 [traits|E]나 수정치를 얻을 수 있습니다." # 10154502379445940891
  spiritual_retreat_jerusalem_desc: "세계의 중심인 성스러운 도시 예루살렘으로 여행을 떠나 영적 수련을 할 것입니다. 그곳, 기독교 세계의 가장 성스러운 장소들 속에서 나는 신앙을 재확인하고, 영혼의 짐을 덜어내며, 앞으로 다가올 시련을 견뎌낼 힘을 기를 것입니다. 이것은 내 생각과 신과 함께하는 개인적인 여정입니다." # 1059676384007498891
  spiritual_retreat_jerusalem_host_desc: "$BULLET_WITH_TAB$순례자는 [piety|E]를 획득하거나, [stress|E]를 해소하거나, 경험을 통해 깊은 변화를 겪을 수 있습니다." # 2117620097639201826
  spiritual_retreat_jerusalem_owner: "순례자" # 384073485693042227
  spiritual_retreat_jerusalem_province_desc: "이곳은 예루살렘이다. 무(無)보다 약간 더 가치 있고, 모든 것보다 조금 더 값진 곳이지." # 16730431204160062520
  spiritual_retreat_jerusalem_destination_selection: "영적 수양은 오직 예루살렘에서만 주최할 수 있다." # 767117214613813041
  jerusalem_first_phase: "영적 수양" # 8268292400932638016
  jerusalem_first_phase_desc: "길고 고된 여정 끝에 마침내 예루살렘에 도착했다. 소박한 숙소에서 이제 어떻게 수양을 계획하고 어떤 깨달음의 길을 걸을지 결정해야 한다." # 3144116378988005922
  spiritual_retreat_jerusalem_predicted_cost: "이 수양 비용에는 여행 경비, 예루살렘에서의 소박한 숙박비, 그리고 자선이나 학문적 탐구를 위한 잠재적 기회비용이 포함된다." # 12007259446171447048
  spiritual_retreat_jerusalem_guest_help_text: "이것은 개인적인 성찰을 위한 고독한 여정이다. 손님은 초대할 수 없다." # 12425376582953088623
  spiritual_retreat_jerusalem_guest_desc: "영적 수양은 지극히 개인적인 노력이며, 자신의 영혼과 신과 함께하는 고독한 시간이다. 나는 이 여정을 홀로 떠날 것이다." # 16209490052884710744
  spiritual_retreat_jerusalem_conclusion_desc: "수양이 끝났다. 긴 귀갓길은 성도에서 배운 교훈을 되새기는 시간이 될 것이다." # 15835784130265539757
  TRAVEL_NAME_FOR_spiritual_retreat_jerusalem: "영적 수양을 위해 예루살렘으로" # 13811816239154312534
  activity_filter_geographical_region_blocker: "이 장소는 선택할 수 없다." # 16538297139176915036
  nick_the_mathematician: "수학자" # 6927622173242748675
  nick_the_mathematician_desc: "이 명예로운 칭호는 당대 가장 뛰어난 지성을 가진 자에게 수여된다. 그의 명성은 단순한 숫자를 넘어 기하학, 철학, 역학을 아우른다. '수학자'가 된다는 것은 논리와 이성의 거장이자, 황제들이 앞다투어 찾는 박식가로 인정받음을 의미한다." # 2120238707348116246
  trait_historical_character_bgp_desc: "레오는 의심할 여지 없이 9세기 최고의 학자이자 박식가이다. 경이로울 정도로 폭넓은 지식을 갖춘 그는 수학, 철학, 의학, 천문학, 역학에 정통하다. 그의 명성은 제국의 국경을 넘어 아바스 칼리파 알 마문이 그를 바그다드로 초청했을 정도였으나, 레오는 조국에 대한 충성심으로 그 제안을 거절했다.\n\n테오필로스 황제의 후원 아래 레오는 제국에서 가장 진보된 기술적 경이로움의 설계자가 되었다. 국경에서 콘스탄티노폴리스까지 한 시간 안에 메시지를 전달할 수 있는 빛의 사슬인 제국 봉화 시스템을 완성한 것은 바로 그의 천재성이었다. 그는 또한 기계적으로 공중으로 들어 올릴 수 있는 '솔로몬의 옥좌'와 노래하는 기계 새가 달린 황금 나무를 포함하여 대궁전의 전설적인 자동 인형들을 제작했다.\n\n테살로니카 대주교를 역임한 후, 레오는 수도로 돌아와 카이사르 바르다스 치하에서 재건된 마그나우라 학교를 이끌며 제국 내 고전 학문과 과학적 탐구의 심오한 부흥을 일으키는 데 기여했다. 그는 단순히 숫자를 다루는 사람이 아니라, 비잔티움의 창의성과 지혜를 상징하는 살아있는 증거이다." # 27491127570502393
  trait_historical_character_bgp: "역사적 인물" # 12250128404061575085
  historical_character_bgp.mathematician: "레오는 의심할 여지 없이 9세기 최고의 학자이자 박식가이다. 경이로울 정도로 폭넓은 지식을 갖춘 그는 수학, 철학, 의학, 천문학, 역학에 정통하다. 그의 명성은 제국의 국경을 넘어 아바스 칼리파 알 마문이 그를 바그다드로 초청했을 정도였으나, 레오는 조국에 대한 충성심으로 그 제안을 거절했다.\n\n테오필로스 황제의 후원 아래 레오는 제국에서 가장 진보된 기술적 경이로움의 설계자가 되었다. 국경에서 콘스탄티노폴리스까지 한 시간 안에 메시지를 전달할 수 있는 빛의 사슬인 제국 봉화 시스템을 완성한 것은 바로 그의 천재성이었다. 그는 또한 기계적으로 공중으로 들어 올릴 수 있는 '솔로몬의 옥좌'와 노래하는 기계 새가 달린 황금 나무를 포함하여 대궁전의 전설적인 자동 인형들을 제작했다.\n\n테살로니카 대주교를 역임한 후, 레오는 수도로 돌아와 카이사르 바르다스 치하에서 재건된 마그나우라 학교를 이끌며 제국 내 고전 학문과 과학적 탐구의 심오한 부흥을 일으키는 데 기여했다. 그는 단순히 숫자를 다루는 사람이 아니라, 비잔티움의 창의성과 지혜를 상징하는 살아있는 증거이다." # 27491127570502393
  spiritual_retreat_jerusalem_name: "당신의 영적 수련" # 10699010588297265155
