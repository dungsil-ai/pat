l_korean:
  great_project_type_restore_knossos_palace: "크노소스 궁전 복구" # 15734424813890467707
  great_project_type_restore_knossos_palace_desc: "크레타섬에는 고대 미노아 문명의 중심지였던 크노소스의 웅장한 유적이 잠들어 있습니다. 이 전설적인 궁전을 복구하는 것은 공학적인 기념비적 위업이자 문화적 경외심을 보여주는 강력한 선언이 될 것입니다. 우리는 그 전당을 다시 세우고, 생동감 넘치는 프레스코화를 밝히며, 권력의 원천이었던 바다와 다시 연결할 것입니다. 이 계획은 우리 영토에 새로운 경이로움을 창조하고, 우리의 의지를 통해 재탄생한 지난 시대의 등불이 될 것입니다." # 5462483233991501608
  great_project_type_restore_knossos_palace_alt: "크노소스 궁전 복구" # 15734424813890467707
  great_project_type_restore_knossos_palace_alt_desc: "크레타섬에는 고대 미노아 문명의 중심지였던 크노소스의 웅장한 유적이 잠들어 있습니다. 이 전설적인 궁전을 복구하는 것은 공학적인 기념비적 위업이자 문화적 경외심을 보여주는 강력한 선언이 될 것입니다. 우리는 그 전당을 다시 세우고, 생동감 넘치는 프레스코화를 밝히며, 권력의 원천이었던 바다와 다시 연결할 것입니다. 이 계획은 우리 영토에 새로운 경이로움을 창조하고, 우리의 의지를 통해 재탄생한 지난 시대의 등불이 될 것입니다." # 5462483233991501608
  great_project_type_restore_knossos_palace_contribution_port: "해양왕의 항구 건설" # 14990456051491788628
  great_project_type_restore_knossos_palace_contribution_port_desc: "미노아의 힘은 바다에서 나왔습니다. 크노소스를 진정으로 복구하려면 부와 영향력의 원천인 바다와 다시 연결되어야 합니다. 이 기부금은 해안에 새로운 전용 항구를 건설하고 궁전과 직접 연결되는 석조 도로를 닦는 데 사용될 것이며, 수천 년 전처럼 무역품과 조공이 궁전 전당으로 흘러 들어오게 할 것입니다." # 10318004411405014350
  great_project_type_restore_knossos_palace_contribution_survey: "부지 조사 및 유적 확보" # 195803573983694067
  great_project_type_restore_knossos_palace_contribution_survey_desc: "크노소스 궁전은 현재 잔해로 뒤덮인 광활한 들판에 불과합니다. 본격적인 복구를 시작하기 전에 학자와 기술자를 파견하여 남은 유적을 조사해야 합니다. 그들은 무성한 잡초를 제거하고 토대를 분류하며, 허물어져 가는 구조물이 더 이상 붕괴하지 않도록 고정하여 숙련된 석공들을 위한 과거의 설계도를 발굴할 것입니다." # 17326484024848926210
  great_project_type_restore_knossos_palace_contribution_palace: "대궁전 재건" # 16425041462030145197
  great_project_type_restore_knossos_palace_contribution_palace_desc: "이것이 이 계획의 핵심이 될 것입니다. 조사 지도를 바탕으로, 우리의 가장 뛰어난 석공과 목수들이 토대부터 궁전을 다시 세울 것입니다. 거대 계단이 다시 솟아오르고, 옥좌의 방이 복원될 것이며, 아래로 갈수록 가늘어지는 상징적인 붉은 기둥들이 다시금 열주 전당의 지붕을 받쳐 옛 미노아 해양왕들에게 걸맞은 건축물을 완성할 것입니다." # 11425231315040796565
  great_project_type_restore_knossos_palace_contribution_frescoes: "프레스코화 채색" # 3910751200127653322
  great_project_type_restore_knossos_palace_contribution_frescoes_desc: "궁전은 단순한 석조물 그 이상이며, 하나의 예술입니다. 이 기부금을 통해 영지 내 최고의 장인들을 모아 한때 크노소스의 벽면을 장식했던 생생한 프레스코화를 재현할 것입니다. 유명한 황소 도약사부터 평화로운 푸른 돌고래와 신비로운 그리핀에 이르기까지, 이 그림들은 침묵하던 전당에 생명력을 불어넣고 미노아 문화의 부활을 찬양할 것입니다." # 13040451151922190437
  great_project_type_restore_knossos_palace_alt_contribution_labyrinth: "기술자의 어리석음: 미궁 건설" # 419023867565040606
  great_project_type_restore_knossos_palace_alt_contribution_labyrinth_desc: "우리 수석 건축가는 궁전의 가장 깊고 복잡한 원래 토대를 연구한 끝에, 마지막으로 기념비적인 추가 시설을 제안했습니다. 그것은 현대의 모든 원리를 거스르는 복잡한 거대 지하 미로, 즉 진정한 미궁의 설계안입니다. 그는 이것이 궁전의 '본래 정신'에 필수적이라고 주장합니다. 이를 건설하는 것은 막대한 비용이 들고 어쩌면 무모한 일이 될 것입니다... 석조술이 아닌 신화의 영역에 발을 들이는 것이니까요." # 4259066623078144023
  great_project_type_restore_knossos_palace_alt_contribution_port: "해양왕의 항구 건설" # 14990456051491788628
  great_project_type_restore_knossos_palace_alt_contribution_port_desc: "미노아의 힘은 바다에서 나왔습니다. 크노소스를 진정으로 복구하려면 부와 영향력의 원천인 바다와 다시 연결되어야 합니다. 이 기부금은 해안에 새로운 전용 항구를 건설하고 궁전과 직접 연결되는 석조 도로를 닦는 데 사용될 것이며, 수천 년 전처럼 무역품과 조공이 궁전 전당으로 흘러 들어오게 할 것입니다." # 10318004411405014350
  great_project_type_restore_knossos_palace_alt_contribution_survey: "부지 조사 및 유적 확보" # 195803573983694067
  great_project_type_restore_knossos_palace_alt_contribution_survey_desc: "크노소스 궁전은 현재 잔해로 뒤덮인 광활한 들판에 불과합니다. 본격적인 복구를 시작하기 전에 학자와 기술자를 파견하여 남은 유적을 조사해야 합니다. 그들은 무성한 잡초를 제거하고 토대를 분류하며, 허물어져 가는 구조물이 더 이상 붕괴하지 않도록 고정하여 숙련된 석공들을 위한 과거의 설계도를 발굴할 것입니다." # 17326484024848926210
  great_project_type_restore_knossos_palace_alt_contribution_palace: "대궁전 재건" # 16425041462030145197
  great_project_type_restore_knossos_palace_alt_contribution_palace_desc: "이것이 이 계획의 핵심이 될 것입니다. 조사 지도를 바탕으로, 우리의 가장 뛰어난 석공과 목수들이 토대부터 궁전을 다시 세울 것입니다. 거대 계단이 다시 솟아오르고, 옥좌의 방이 복원될 것이며, 아래로 갈수록 가늘어지는 상징적인 붉은 기둥들이 다시금 열주 전당의 지붕을 받쳐 옛 미노아 해양왕들에게 걸맞은 건축물을 완성할 것입니다." # 11425231315040796565
  great_project_type_restore_knossos_palace_alt_contribution_frescoes: "프레스코화 채색" # 3910751200127653322
  great_project_type_restore_knossos_palace_alt_contribution_frescoes_desc: "궁전은 단순한 석조물 그 이상이며, 하나의 예술입니다. 이 기부금을 통해 영지 내 최고의 장인들을 모아 한때 크노소스의 벽면을 장식했던 생생한 프레스코화를 재현할 것입니다. 유명한 황소 도약사부터 평화로운 푸른 돌고래와 신비로운 그리핀에 이르기까지, 이 그림들은 침묵하던 전당에 생명력을 불어넣고 미노아 문화의 부활을 찬양할 것입니다." # 13040451151922190437
  restore_knossos_labyrinth: "크노소스의 미궁" # 11590007659555542960
  restore_knossos_labyrinth_desc: "복원된 궁전의 햇빛 비치는 회랑 아래, 어두운 비밀이 형체를 갖추었습니다. 크노소스의 미궁은 마음을 가두기 위해 세워진 감옥으로, 빛과 희망, 그리고 그 깊은 곳에 던져진 모든 이를 집어삼키는 독창적이고 잔혹하게 뒤틀린 미로입니다. 그 존재 자체만으로도 섬의 방어력을 강화하는 끊임없고 무언의 위협이 되며, 가장 다루기 힘든 문제들에 대한 완벽한 해결책이 되어줍니다." # 14645603740665282159
  restore_knossos_palace.0001.t: "항구가 열리다" # 14181418223625197066
  restore_knossos_palace.0001.desc: "주군이시여, 새로이 명명된 크노소스 항구에 첫 상선들이 도착하는 것이 목격되었습니다. 궁전으로 향하는 길은 이미 지중해 전역에서 물자를 실어 나르는 수레들로 북적이고 있습니다. 궁전을 바다와 다시 연결함으로써, 우리는 유적을 복원했을 뿐만 아니라 크레타의 경제적 중심지로 부활시켰습니다." # 211643343064498724
  restore_knossos_palace.0001.a: "바다의 부는 우리의 것이다!" # 8065250555608430616
  restore_knossos_palace.0002.t: "부지 조사가 완료되다" # 13342208735827396621
  restore_knossos_palace.0002.desc: "주군이시여, 조사팀이 작업을 마쳤습니다. 끝없는 잔해들이 치워지자 고대 궁전 토대의 거대하고 경이로운 규모가 온전히 드러났습니다. 이제 우리는 안뜰과 회랑, 방들에 대한 상세한 지도를 확보했습니다. 과거가 발굴되었으니, 이제 그 위에 건설할 준비가 되었습니다." # 14933911531493083340
  restore_knossos_palace.0002.a: "위대한 유산을 위한 훌륭한 토대군." # 7583650093580372831
  restore_knossos_palace.0003.t: "궁전이 다시 솟아오르다" # 14600522494344918306
  restore_knossos_palace.0003.desc: "주군이시여, 오늘 크노소스의 언덕에서 뿔나팔 소리가 울려 퍼졌습니다! 마지막 기둥이 세워졌고 지붕 기와가 올려졌습니다. 대궁전의 주요 구조가 완성되었으며, 그 독특하고 당당한 건축 양식은 이미 경외감에 찬 현지인들을 불러모으고 있습니다. 이제 이 웅장한 중심 건축물은 마지막 장식만을 기다리고 있습니다." # 6368671439582796661
  restore_knossos_palace.0003.a: "내 왕관에 어울리는 보석이로군." # 12136164561621866009
  restore_knossos_palace.0004.t: "지나간 시대의 색채" # 2630783443695365768
  restore_knossos_palace.0004.desc: "주군이시여, 예술가들이 걸작을 완성했습니다. 이제 크노소스의 벽면은 붉은색, 푸른색, 금색의 선명한 색조로 노래합니다. 그 회랑을 걷는 것은 고대 미노아인들의 역동적이고 예술적인 열정에 둘러싸여 다른 시대로 이동하는 것과 같습니다. 궁전이 마침내 살아 숨 쉬는 듯합니다." # 7102738086146655833
  restore_knossos_palace.0004.a: "온 세상이 우리의 문화를 경탄하게 하라!" # 1346126148897008073
  restore_knossos_palace.0005.t: "미궁이 건설되다" # 6136039931897294547
  restore_knossos_palace.0005.desc: "주군이시여, 그것이... 끝났습니다. 미궁이 궁전 아래에 발굴 및 건설되었습니다. 장식 없는 단순한 석조 아치형 입구는 빛을 집어삼키는 듯합니다. 건축가는 설계가 '완벽'하다고 장담하지만, 이를 건설한 인부들은 그에 대해 말하기를 거부하며, 안으로 들어간 자는 누구도 안내자 없이는 길을 찾지 못합니다. 이것은 단순한 건축물 그 이상입니다. 어둠 속에서 답을 기다리는 질문과도 같습니다." # 15394737956153115132
  restore_knossos_palace.0005.a: "내가 무엇을 만든 것인가?" # 14638961459499008725
  restore_knossos_palace.0006.t: "크노소스가 재탄생하다!" # 7108251076162689005
  restore_knossos_palace.0006.desc: "위대한 과업이 끝났습니다! 한때 잊힌 폐허였던 크노소스 궁전이 이제 당당하고 완벽한 모습으로 서 있습니다. 붉은 기둥은 크레타의 태양 아래 빛나고, 회랑은 고대 프레스코화의 색채로 노래하며, 새로운 항구는 먼 땅에서 온 무역으로 북적입니다.\n\n귀하는 단순한 건물이 아니라, 알려진 모든 세상에서 회자될 문화와 권력의 상징을 부활시켰습니다. 이 기념비는 귀하의 선견지명과 과거의 영광에 대한 경의의 증거로 남을 것입니다." # 13616171202819811972
  restore_knossos_palace.0006.a: "천 년 동안 이어질 유산입니다." # 14256707634411975500
  restore_knossos_palace.0007.t: "야망의 폐허" # 5886178537182261657
  restore_knossos_palace.0007.desc: "크노소스의 야심 찬 계획이 굴욕적인 실패로 무너졌습니다. 작업장은 우리의 무능함을 보여주는 기념비가 되어 침묵에 잠겼습니다. 막대한 양의 금이 낭비되었고, 남은 것이라곤 완성되지 않은 기둥, 텅 빈 토대, 그리고 경쟁자들의 비웃음 섞인 속삭임뿐입니다.\n\n세상의 경이로움 대신, 우리는 크레타의 풍경에 비용만 많이 든 흉물을 만들고 말았습니다. 이 어리석은 짓은 앞으로 수년 동안 우리 통치에 오점으로 남을 것입니다." # 3328736592430282334
  restore_knossos_palace.0007.a: "그토록 많은 보물이 먼지와 수치심으로 변했구나." # 12877984811737336457
  restore_knossos_palace.0008.t: "미궁의 심장이 봉인되다" # 11882097094163073058
  restore_knossos_palace.0008.desc: "크노소스 궁전이 마침내 물리적 형태와 신화적 형태 모두 완성되었습니다. 겉으로 보기에 이곳은 예술과 건축의 경이로움이자 문화의 보석입니다. 하지만 그 아래에는 이 계획의 비밀스러운 심장이 자리 잡고 있습니다. 아무도 감히 입 밖으로 내지 못할 목적을 위해 건설된, 뒤틀리고 빛 한 점 없는 미궁 말입니다.\n\n이 궁전은 이제 더 이상 과거의 기념비가 아닙니다. 이제 미래를 위한 도구입니다. 활기찬 회랑에는 나의 궁정이 열릴 것이고, 어두운 복도에는 나의 적들이 머물게 될 것입니다. 오래된 신화의 속삭임에 토대가 마련되었고, 새로운 전설, 즉 나의 전설이 시작됩니다." # 3254664710351393890
  restore_knossos_palace.0008.a: "나의 적들이 그 깊은 곳을 알게 되리라." # 11036850288685083770
  restore_knossos_palace.0009.t: "형이 선고되다" # 16486071545873635018
  restore_knossos_palace.0009.desc: "명에 따라, 경비병들이 지하 감옥에서 죄수를 끌어냈습니다. 그들은 처형대나 낙인찍는 인도로 끌려간 것이 아니라, 궁전 아래 깊은 땅속, 미궁의 입구를 나타내는 장식 없는 석조 아치형 입구로 인도되었습니다.\n\n그들의 형벌은 신속한 죽음이 아니라, 내가 건설한 불가능한 복도에 맞서는 도전입니다. 이제 우리는 필멸자의 지혜나 순수한 의지가 미궁의 전리품이 되는 것을 거부하기에 충분한지 지켜볼 것입니다." # 10551399327796521447
  restore_knossos_palace.0009.a: "신께서 그 영혼에 자비를 베푸시길... 미궁은 그러지 않을 테니." # 7148294228829022821
  restore_knossos_palace.0010.t: "미궁에 버려지다" # 12172772255524456242
  restore_knossos_palace.0010.desc: "경비병들이 한밤중에 나를 찾아왔고, 그들의 침묵은 그 어떤 위협보다 공포스러웠습니다. 그들은 나를 안뜰로 데려가지 않았습니다... 대신 우리는 내려갔습니다. 궁전 아래의 차갑고 억압적인 어둠 속으로 계속해서 내려갔습니다.\n\n그들은 먼지와 절망의 냄새가 진동하는, 벌어진 아가리 같은 단순한 석조 아치형 입구 앞으로 나를 데려갔습니다. 경비병 중 한 명이 나를 앞으로 밀치며 엄숙하게 속삭였습니다. '주군께서 형을 선고하셨다. 살아남을 수 있다면 살아남아 보아라.'\n\n마지막 밀침과 함께 나는 어둠 속으로 비틀거리며 들어갔습니다. 뒤에서 무거운 돌문이 닫히는 소리가 내가 들은 마지막 소리였고, 이내 미궁의 압도적인 침묵이 나를 덮쳤습니다." # 793996205611333525
  restore_knossos_palace.0010.a: "난 이런 곳에서 죽지 않을 것이다!" # 1102899416625597417
  restore_knossos_palace.0010.b: "나가는 길이 분명 있을 거야... 반드시 있을 거야." # 8857969354086792129
  restore_knossos_palace.0010.c: "길을 잃었어... 이미 끝났어..." # 10195543535775003451
  restore_knossos_palace.0011.t: "어둠이 나를 삼키다" # 17718351033559615070
  restore_knossos_palace.0011.desc: "더 이상 갈 수가 없습니다. 살갗이 벗겨지고 탈진으로 떨리는 다리가 마침내 힘을 잃었습니다. 나는 또 다른 막다른 복도라는 것을 알면서도 기어 들어왔습니다. 며칠 전 배를 갉아먹던 허기는 사라지고, 그 자리를 공허하고 아픈 빈자리가 채웠습니다.\n\n나의 생각은 꺼져가는 촛불처럼 느려지고 흐릿해집니다. 이 돌무덤에 얼마나 오래 있었는지 모르겠습니다. 그저 미궁이 승리했다는 것만 알 뿐입니다. 나는 차가운 벽에 기대어 주저앉았습니다. 숨은 가빠지고, 평생 처음으로 다가오는 어둠을 기꺼이 받아들입니다." # 3873439513799791398
  restore_knossos_palace.0011.a: "나의 시련이 끝났구나..." # 4035626914106814511
  restore_knossos_palace.0012.t: "벽이 속삭이기 시작하다" # 13437019770888477642
  restore_knossos_palace.0012.desc: "벽들이 숨을 쉬고 있어. 내 주변에서 돌로 된 폐가 들이마시고 내뱉는 게 느껴져. 벽들이 내 이름을 속삭여... 아니, 그의 이름을 속삭이고 있어... 그가 이곳을 지었어. 그는 비밀을 알고 있어! 그들에게 경고해야 해!\n\n빛이다! 밝고 아름다운 빛이 내게 다가오고 있어! 그 속에서 형체들이 나타나는데, 길고 뒤틀린 모습이야. 천사들일까? 나를 출구로 인도하러 온 걸까? 그들에게 달려가겠어! 모든 걸 말해줄 거야! 속삭이는 벽에 대해 경고해야만 해!" # 4725375170982106471
  restore_knossos_palace.0012.a: "그들은 비밀을 알고 있어... 벽들이 알고 있다고!" # 17387438835522913458
  restore_knossos_palace.0013.t: "조롱하는 빛" # 3509214980232975107
  restore_knossos_palace.0013.desc: "빛이다! 기나긴 어둠 끝에, 긴 통로의 끝에서 진정한 빛이 보여. 오래전 묻어두었던 감정인 희망이 내 안에서 솟구치며, 지친 사지에 힘을 불어넣어. 나는 기어가다 비틀거리고, 이내 그곳을 향해 달려가. 승리의 무언의 함성으로 목이 따가울 정도야.\n\n나는 구멍을 뚫고 익숙한 복도로 튀어 나갔어... 고통스러울 정도로 익숙한 복도야. 밖이 아니야. 나는 궁전에 있어. 내가 던져졌던 바로 그 장식 없는 석조 아치길 앞에 서 있어. 탈출한 게 아니야. 그저 시작점으로 돌아왔을 뿐이지. 내 마지막 희망이 시들어 죽어가는군." # 9779824732038647064
  restore_knossos_palace.0013.a: "안 돼..." # 9883382999487518453
  restore_knossos_palace.0014.t: "자유의 공기" # 8609868175668734060
  restore_knossos_palace.0014.desc: "공기의 맛이 달랐어. 덜 텁텁했지. 나는 내가 발견한 거칠게 깎인 수직 통로를 따라 기어 올라갔어. 마지막 바위 위로 기어올라 복된 단단한 땅 위에 쓰러질 때 손가락에선 피가 흘렀지. 머리 위에는 돌 천장이 아니라, 영광스럽고 별이 박힌 밤하늘의 캔버스가 펼쳐져 있었어.\n\n나왔어. 살아있다고. 시원한 밤공기를 들이마시니 풀 내음과 자유가 폐부 깊숙이 차올라. 그들은 미궁이 내 끝이 될 거라 생각했겠지. 하지만 그곳은 나의 시련장이었어. 이제, 내가 그들의 끝이 되어주마." # 10388972149071032273
  restore_knossos_palace.0014.a: "나는 살아남았다!" # 3769789151358383608
  CHANDAX_LOCATION_1_TOOLTIP: "한닥스가 귀하의 영역 내에 있습니다" # 5246431893909422629
  rule_knossos_palace: "크노소스 궁전 (동로마 위대한 사업 모드)" # 3197454166280848743
  setting_bgp_knossos_off: "꺼짐" # 8927729592684634549
  setting_bgp_knossos_off_desc: "크노소스 궁전 재건 위대한 사업이 비활성화되었습니다. 뭐, 당연한 소리죠..." # 17348810604464318902
  setting_bgp_knossos_on: "켜짐" # 14367041983676599459
  setting_bgp_knossos_on_desc: "크노소스 궁전 재건 위대한 사업을 사용할 수 있습니다. 우스운 일이지만, 어쨌든 그렇습니다." # 4997860296236380599
  setting_bgp_knossos_on_alt: "켜짐 - 반전 있음!" # 1072196471483566670
  setting_bgp_knossos_on_alt_desc: "-켜짐- 설정과 동일하지만, 미궁이 100% 더 추가됩니다." # 17361388665157244358
  building_bgp_knossos_palace: "크노소스 궁전" # 15753975604257584327
  building_bgp_knossos_palace_desc: "전설적인 크노소스 궁전이 새롭게 재건되었습니다. 드넓은 홀과 상징적인 붉은 기둥은 우리의 부와 과거에 대한 경외심의 증거입니다. 낮에는 활기찬 프레스코화가 지나간 미노아 시대의 이야기를 들려주는 세계의 경이입니다. 하지만 이 문화적 경이의 빛나는 외관 아래에는 특수한 목적으로 건설된 비밀이 숨겨져 있습니다. 바로 크레타의 통치자를 불쾌하게 만든 자들을 기다리는 거대하고 뒤틀린 지하 미궁입니다. 전해 내려오는 이야기에 따르면 말이죠..." # 15547147493086714062
  building_type_bgp_knossos_palace: "$building_bgp_knossos_palace$" # 2956995676538599740
  building_type_bgp_knossos_palace_desc: "$building_bgp_knossos_palace_desc$" # 6306676759536436619
  bgp_send_to_labyrinth: "미궁형 선고" # 5948231671035806222
  bgp_send_to_labyrinth_desc: "[recipient.GetShortUIName]에게 뒤틀린 미궁의 회랑을 마주하도록 판결을 내립니다.\n\n그들은 크노소스 궁전 아래의 미로 속에 던져질 것이며, 오직 자신의 지혜와 한 줄기 희망만을 가질 수 있습니다. 이것은 건축물과 절망에 의한 시련이며, 그곳에서 돌아온 이는 거의 없습니다. 그들은 굶주림으로 죽을 수도 있고, 고독 속에서 정신을 잃을 수도 있으며, 순전한 운이나 교활함으로 출구를 찾아 당신의 손아귀에서 영원히 벗어날 수도 있습니다.\n\n그리고 어떤 이들은... 어둠 속에서 혼자가 아니라는 사실을 깨닫게 될지도 모릅니다.\n\n" # 11446734938229873772
  bgp_send_to_labyrinth_tooltip: "미궁형 선고" # 5948231671035806222
  sentenced_to_labyrinth: "미궁의 메아리" # 14729363242221476354
  sentenced_to_labyrinth_desc: "이 인물은 크노소스의 미궁에 던져졌습니다. 그들은 끊임없는 굶주림, 육체적 피로, 그리고 정신을 무너뜨리기 위해 설계된 장소 내에서의 고립이라는 독특한 공포로 인해 속이 텅 비어버렸습니다. 이 시련은 그들을 근본적으로 변화시켰으며, 깊고 불안한 트라우마를 남겼습니다." # 13469419615655995112
  exhausted_in_the_maze: "무너진 생존자" # 8324546954223016526
  exhausted_in_the_maze_desc: "그들은 어둠 속에서 죽지 않았습니다. 그들은 굶주림을 견디고 끝없는 석조 회랑을 걸어 마침내 빛으로 돌아가는 길을 찾아냈습니다. 하지만 그들이 찾은 빛은 자유가 아니었습니다. 그것은 그들 자신의 감옥으로 들어가는 입구였습니다. 이 마지막 잔혹한 반어법은 그들의 영혼에 남은 마지막 불씨마저 꺼뜨렸습니다. 그들은 속이 텅 빈 생존자이며, 육체는 지쳤고 저항하려는 의지는 완전히 사라졌습니다." # 6501344662780973215
