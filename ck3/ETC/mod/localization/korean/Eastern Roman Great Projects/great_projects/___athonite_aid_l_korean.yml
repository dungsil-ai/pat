  ATHONITE_AID_LOCATION_TOOLTIP: "이에리소스 남작령이 우리 영역 내에 있어야 합니다." # 9086719874422377919
  opinion_funded_holy_mountain: "아토스산 복원 자금 지원" # 5489280382292824293
  mount_athos_patronage_modifier: "아토스에 대한 황제의 후원" # 17024579010787050341
  contributor_capital_pious_investment: "경건한 투자" # 17316052796277848608
  chalkidike_holy_peninsula_modifier: "성스러운 반도" # 4174578714305620266
  athonite_aid_project_events.0001.t: "정교회의 등불" # 11136204524459792781
  athonite_aid_project_events.0001.desc: "아토스산의 대사업이 완료되었습니다! 본인의 후원 덕분에 성산은 요새화되었고, 수도원은 확장되었으며, 신성한 성상화들은 보존되었습니다. 정교회 세계 전역의 수도사들과 순례자들이 본인을 찬양하고 있으며, 본인의 이름은 신앙의 진정한 수호자이자 후원자로서 영원히 기억될 것입니다." # 6956403933115122331
  athonite_aid_project_events.0001.a: "신앙은 유용한 도구일 뿐, 그 이상도 이하도 아니다." # 9105790833420985572
  athonite_aid_project_events.0001.b: "테오토코스를 위하여!" # 8489699782980592576
  athonite_aid_project_events.0001.c: "기도가 울려 퍼지듯 기부금도 끊이지 않기를." # 10557314940154019963
  athonite_aid_project_events.0001.d: "우리 제국과 신앙을 위한 가치 있는 노력이군." # 9522975678865339398
  athonite_aid.1001.t: "성산을 위한 노동자들" # 16208394141475134651
  athonite_aid.1001.d: "귀하가 보낸 노동자들이 무사히 도착했다는 소식이 아토스산에서 전해졌습니다. 그들의 곡괭이와 삽 소리가 성산 전체에 울려 퍼지며 험난한 길을 닦고 무너져가는 벽을 재건하고 있습니다. 수도원장은 이 추가 인력 덕분에 건설 속도가 빨라졌다고 보고하며, 후원자를 위한 기도가 매일 드려지고 있습니다. 이 신성한 노력에 대한 기여는 귀하의 통치를 빛나게 하며, 수도사들은 귀하의 관대함을 인정하고 있습니다." # 17969194149928865777
  athonite_aid.1001.a: "그들의 손은 주님의 축복을 받았노라." # 603793422910070531
  athonite_aid.1002.t: "성산을 위한 자재" # 3331089813016337729
  athonite_aid.1002.d: "귀하의 영지에서 보낸 관대한 기부인 건축 자재를 실은 마차 행렬이 아토스산 기슭에 도착했습니다. 질 좋은 석재와 튼튼한 목재들이 수도사와 노새들에 의해 가파른 길을 따라 운반되어, 수도원의 견고한 벽과 화려한 돔을 세우는 데 사용될 예정입니다. 수도원장들은 이 지원에 대해 귀하의 이름을 축복하며, 이러한 관대함이 아토스의 연대기에 기록될 것이라고 선언했습니다. 수도사들은 귀하의 도량을 인정하고 있습니다." # 18413151307841309334
  athonite_aid.1002.a: "무형의 영원을 위한 유형의 희생이로다!" # 5492239908842027543
  athonite_aid.1003.t: "성산을 위한 예술" # 18063161904451630810
  athonite_aid.1003.d: "귀하가 후원한 숙련된 장인들과 성상화가들이 수도원을 아름답게 꾸미기 위해 아토스산에 도착했습니다. 곧 칙칙했던 예배당 벽면은 성인들의 생생한 프레스코화로 살아나고, 새로운 모자이크가 촛불 아래에서 반짝입니다. 수도사들은 이 장인들이 자신들의 성소를 진정으로 천국과 같은 모습으로 변화시키는 것을 보며 크게 기뻐하고 있습니다. 그들은 신성한 예술에 대한 귀하의 후원이 대대로 경건함을 고취할 것이라며 귀하를 기리는 기도를 올립니다. 이러한 행위는 분명히 인정받을 가치가 있습니다." # 10567919415336157680
  athonite_aid.1003.a: "천상의 예술을 후원하는 자여." # 11593053432576309259
  athonite_aid.1004.t: "성산의 수호자들" # 13252694463692072731
  athonite_aid.1004.d: "귀하의 지원으로 아토스산의 수도원들 사이에 새로운 석조 감시 초소가 세워졌습니다. 이 요새들은 해안을 따라 출몰하는 해적과 약탈자들로부터 성스러운 공동체를 보호할 것입니다. 순례자들과 수도사들은 이 탑들의 보호 아래 안식을 취하며, 수도원장은 귀하가 성산의 안전을 확보했다고 선언했습니다. 이 업적에 대한 이야기가 온 나라에 퍼져 귀하를 신앙의 진정한 수호자로 묘사하고 있습니다. 이러한 용맹한 공헌에 대해 귀하는 마땅한 보상을 받게 될 것입니다." # 15398238839460112075
  athonite_aid.1004.a: "유일한 참된 신앙의 보호자" # 1462755891252368951
  athonite_aid_vassal_rewards_tooltip: "[athonite_contributor.GetShortUIName](이)가 그 기여에 대한 보상을 받았으며, 그 수도가 번창합니다." # 12256440185396025
  athonite_contributor_county_blessing_modifier: "성산의 축복" # 17589967503269292014
  desc_athonite_contributor_county_blessing_modifier: "성산의 복구를 위해 이 백작령에서 바친 경건한 기여가 이 땅과 그 통치자에게 축복을 내렸습니다." # 13834281331556433496
  patron_of_mount_athos_modifier: "성산의 후원자" # 1615379041578570165
  patron_of_mount_athos_modifier_desc: "아토스산의 거룩한 수도원들을 지원하기 위해 조직한 나의 경건한 행동은 정교회 신앙의 진정한 보호자로서 나의 유산을 확고히 했습니다. 나의 이름은 앞으로 수 세대에 걸쳐 그들의 기도 속에서 기억될 것입니다." # 2873026134154538389
  athonite_generic_contribution_desc: "성산의 건설 작업을 돕기 위해 금화를 기부합니다." # 2169677100351250778
