l_korean:
  great_project_type_via_militaris_restoration: "비아 밀리타리스 복구" # 4063909724075142405
  great_project_type_via_militaris_restoration_desc: "비아 밀리타리스는 제국의 진정한 군사적 중추로, 콘스탄티노폴리스의 성문에서 발칸반도의 심장부로 직접 이어지는 거대한 도로입니다. 수 세기 동안 이곳은 군단과 황제들이 지나던 길이었습니다. 그러나 지금은 과거의 영광은 온데간데없고, 기능적인 고속도로라기보다는 지도 위의 선에 불과한 그림자일 뿐입니다. 구멍이 뚫리고 풀이 무성해진 이 도로는 산적들의 은신처가 되었고 통치의 걸림돌이 되었습니다. 이는 내륙 무역을 마비시키고, 트라키아와 그 너머의 주둔군을 안정적인 보급로로부터 고립시키며, 제국의 감시에서 벗어난 계곡들에서 불만이 싹트게 합니다. 이를 복구하기 위해서는 기념비적인 사업이 필요합니다. 도로와 이를 지원하는 감시 초소를 재건함으로써, 우리는 무역을 되살릴 뿐만 아니라 이 핵심 지역들에 대한 지배력을 강화할 것입니다. 황제의 칙령은 거침없이 전달될 것이며, 주둔군은 보급을 받고 세금은 막힘없이 흘러들어와 제국의 심장부가 수도와 하나 되어 고동치게 될 것입니다." # 2508837003981810826
