l_korean:
  great_project_type_convert_hagia_sophia: "하기아 소피아 개종" # 1055730527625840407
  great_project_type_convert_hagia_sophia_desc: "수 세기 동안 하기아 소피아는 나자렛 신앙의 가장 위대한 기념비이자, 외래의 찬탈자 신에게 바쳐진 건축의 걸작으로 서 있었습니다. 이는 우리 민족이 나약함과 슬픔의 신앙에 오랫동안 굴복해 왔음을 상징합니다. 이 건물이 현재의 형태를 유지하는 한, 우리의 복원은 완성될 수 없습니다.\n\n궁극적인 쇄신의 시간이 도래했습니다. 우리는 단순히 건물을 허무는 것에 그치지 않을 것입니다. 우리는 이를 되찾고, 정화하며, 변모시킬 것입니다. 우리는 그 암울한 성상과 슬픈 모자이크를 씻어내어 그 영혼 자체를 재창조할 것입니다. 거짓 신을 찬양하기 위해 지어진 저 거대한 돔은 이제 우리 도시의 새로운 팔라디움(Palladium)을 보호하게 될 것입니다. 이곳은 헬라스 세계의 새로운 심장이자, 팔라스 아테나의 신성한 지혜와 무력에 바쳐진 대사원이 될 것이며, 올림포스의 신들이 그들의 정당한 자리로 돌아왔음을 선포하는 증거가 될 것입니다." # 13630718492252566778
  great_project_type_tooltip_convert_hagia_sophia: "" # 17241709254077376921
  great_project_name_possessive_convert_hagia_sophia: "" # 17241709254077376921
  great_project_name_convert_hagia_sophia: "" # 17241709254077376921
  great_project_type_convert_hagia_sophia_contribution_purification: "위대한 정화" # 16345764682099473890
  great_project_type_convert_hagia_sophia_contribution_purification_desc: "이 신성한 공간은 수 세기 동안 외래의 찬탈자 신의 우상들로 벽이 장식되며 더럽혀져 왔습니다. 아테나가 이곳을 자신의 집이라 부를 수 있으려면, 이전 신앙의 모든 흔적을 씻어내야 합니다. 이 기부금은 외래의 성상을 제거하고, 모자이크를 철거하며, 십자가를 녹이는 잔혹하지만 필수적인 작업에 쓰일 것입니다. 천 년 동안 이어진 거짓 기도의 흔적을 공기 중에서조차 정화해야 합니다." # 12323260054538994747
  great_project_type_convert_hagia_sophia_contribution_name_purification: "" # 17241709254077376921
  great_project_type_convert_hagia_sophia_contribution_cella: "셀라(Cella)의 재건" # 10096353742206258036
  great_project_type_convert_hagia_sophia_contribution_cella_desc: "건물 내부는 이전 점령자들의 설교와 의식을 위해 설계되었습니다. 우리는 이를 우리 신들에게 맞게 다시 만들어야 합니다. 이 기부금은 내부 건축 구조를 변경하여 칸막이를 허물고 거대하고 탁 트인 셀라를 조성하며, 훗날 숭배용 동상이 세워질 거대한 중앙 연단을 건설하는 데 사용될 것입니다. 이는 신성한 공간 자체를 재구성하는 거대한 공학적 과업입니다." # 14646631642900096590
  great_project_type_convert_hagia_sophia_contribution_name_cella: "" # 17241709254077376921
  great_project_type_convert_hagia_sophia_contribution_statue: "콘스탄티노플의 팔라디움" # 12657607866116152452
  great_project_type_convert_hagia_sophia_contribution_statue_desc: "비어 있는 사원은 죽은 사원과 다름없습니다. 우리는 제국 최고의 예술가들에게 이 신성한 장소의 새로운 심장을 제작하도록 의뢰할 것입니다. 그것은 무장하고 경계하는 아테나 프로마코스(Athena Promachos)의 거대하고 상아와 금으로 장식된 숭배용 동상이 될 것입니다. 상아로 빚고 금으로 장식하며, 그 눈은 꿰뚫어 보는 듯한 보석으로 박힐 것입니다. 이것은 도시의 신성한 수호자이자 경외와 공포를 동시에 불러일으킬 새로운 팔라디움이 될 것입니다." # 13807287726486801255
  great_project_type_convert_hagia_sophia_contribution_name_statue: "" # 17241709254077376921
  great_project_type_convert_hagia_sophia_contribution_frescoes: "신화적 프레스코화" # 4459107264135314123
  great_project_type_convert_hagia_sophia_contribution_frescoes_desc: "사원의 텅 빈 벽은 신들에 대한 모욕이자 필멸자의 눈을 지루하게 할 뿐입니다. 이 기부금은 위대한 신화와 영웅 서사시를 묘사하는 웅장한 프레스코화를 그리는 데 쓰일 것입니다. 오디세우스의 지혜, 헤라클레스의 힘, 기간토마키아의 분노 등, 신성과 영웅주의가 담긴 이 생생한 이야기들이 과거의 암울하고 슬픈 성상들을 대체할 것입니다." # 16475839981161711652
  great_project_type_convert_hagia_sophia_contribution_name_frescoes: "" # 17241709254077376921
  great_project_type_convert_hagia_sophia_contribution_priests: "히에로판테스(Hierophants)의 성별" # 1381879041699342035
  great_project_type_convert_hagia_sophia_contribution_priests_desc: "사제 없는 사원은 단지 기념비일 뿐입니다. 마지막이자 가장 중요한 단계로, 우리는 이 웅장한 건축물에 걸맞은 새로운 헬라스 사제단을 설립해야 합니다. 이 기부금은 옛 방식의 학자들을 모집하고 훈련하여 아테나의 히에로판테스로 성별하는 데 사용될 것입니다. 그들은 새로운 의례를 정립하고 제사를 집전하며, 이 사원을 우리 신앙의 살아 숨 쉬는 중심지로 만들 것입니다." # 15820290553617064358
  great_project_type_convert_hagia_sophia_contribution_name_priests: "" # 17241709254077376921
  convert_hagia_sophia.0001.t: "사원이 정화되다" # 11601877134797942424
  convert_hagia_sophia.0001.desc: "주군이시여, 과업을 마쳤습니다. 위대한 교회는 이제 존재하지 않습니다. 마지막 모자이크 조각이 벽에서 긁어내어졌고, 마지막 십자가는 주조소로 보내졌습니다. 떨어지는 성상들의 소란은 이제 거대하고 텅 빈 홀 안의 메아리치는 침묵으로 바뀌었습니다. 우리는 건물에서 과거의 흔적을 완전히 씻어냈습니다. 이제 이곳은 진정한 신들의 각인을 기다리는 백지 상태의 캔버스가 되었습니다." # 5877525898206386834
  convert_hagia_sophia.0001.a: "잔혹하지만 필수적인 시작이군." # 1871990541950559271
  convert_hagia_sophia.0002.t: "셀라(Cella)의 재건" # 10096353742206258036
  convert_hagia_sophia.0002.desc: "주군이시여, 수석 건축가가 대성공을 보고했습니다. 위대한 건물의 내부는 완전히 탈바꿈했습니다. 한때 설교를 위한 공간이었던 곳은 이제 중앙의 신성한 형상 앞에서 침묵하며 경외감을 느끼도록 설계된 거대하고 탁 트인 홀이 되었습니다. 거대한 연단은 여신을 기다리고 있으며, 들어오는 모든 이들의 시선을 사로잡을 것입니다. 사원의 물리적 심장이 준비되었습니다." # 10755313676871920680
  convert_hagia_sophia.0002.a: "여신을 위한 걸맞은 옥좌로군." # 15799606839259200425
  convert_hagia_sophia.0003.t: "팔라디움이 도착하다" # 15152680151412473373
  convert_hagia_sophia.0003.desc: "주군이시여, 거대한 동상이 제막된 날은 수 세기 동안 회자될 것입니다. 거대한 베일이 벗겨지자 셀라 안에는 탄성이 울려 퍼졌습니다. 거대한 돔에서 쏟아지는 빛을 받은 아테나의 거대한 상아와 금빛 형상은 마치 신성한 생명력을 뿜어내는 듯합니다. 그녀의 매서운 시선은 이제 도시를 지켜보고 있으며, 이는 힘과 지혜의 실체적인 상징입니다. 여신께서 정당한 고향으로 돌아오셨습니다." # 6149298954805617351
  convert_hagia_sophia.0003.a: "과연 지혜의 여신답군!" # 9693133028313673976
  convert_hagia_sophia.0004.t: "벽이 새로운 이야기를 들려주다" # 12981909215804731942
  convert_hagia_sophia.0004.desc: "주군이시여, 사원 내부는 이제 눈부신 색채와 드라마의 향연입니다. 삭막했던 흰 벽은 우리 신성한 신화들의 숨 막히게 아름다운 갤러리로 변모했습니다. 거대한 돔 아래를 걷는 것은 신들과 영웅들에게 둘러싸여 우리 전승의 근원적인 투쟁과 위대한 탐험을 목격하는 것과 같습니다. 사원은 이제 단순한 예배당이 아니라 우리 민족 영혼의 도서관이 되었습니다." # 17933625105849810618
  convert_hagia_sophia.0004.a: "모두가 볼 수 있는 영광의 가르침이군." # 17988304621920601174
  convert_hagia_sophia.0005.t: "신전이 살아 숨 쉰다!" # 12934207761170947469
  convert_hagia_sophia.0005.desc: "나의 주군이시여, 한때 성 소피아였던 곳이 이제 진정으로 아테나의 대신전이 되었습니다. 오늘, 새로 임명된 히에로판테스들이 팔라디움 앞에서 첫 공식 제례를 올렸습니다. 불태운 제물과 성스러운 월계수의 향기가 역겨운 향 냄새를 완전히 몰아냈습니다. 신전은 살아 움직이며, 의식은 확립되었고 축제 일정도 정해졌습니다. 도시의 심장부에서 새로운 신앙의 시대가 시작되었습니다." # 6561735985315708725
  convert_hagia_sophia.0005.a: "드디어. 복원이 완료되었다." # 11856584236777184602
  convert_hagia_sophia.0006.t: "아테나의 강림" # 5819254155320127923
  convert_hagia_sophia.0006.desc: "오늘, 나는 새로 임명된 히에로판테스들이 흰 아마포를 두르고 첫 번째 대제례를 올리는 동안 재탄생한 신전의 문턱에 서 있었다. 불태운 제물과 성스러운 월계수의 향기가 거대한 홀을 가득 채우며, 천 년 동안 남아있던 이방의 향 냄새를 완전히 몰아냈다.\n\n상아와 황금으로 만들어진 거대한 팔라디움은 모든 빛을 빨아들이는 듯했고, 보석으로 장식된 눈은 이제 자신이 수호하는 도시를 향해 맹렬한 지혜를 쏟아내고 있었다. 한때 텅 비어있던 벽면은 이제 신화와 영웅담을 담은 생생한 태피스트리로 뒤덮였으며, 나자렛 사람의 슬픈 성상들을 대신하여 신들과 인간들의 영광스러운 업적이 자리 잡았다. 구 신앙의 애처로운 만가는 사라지고, 모든 것을 꿰뚫어 보는 팔라스 아테나를 찬양하는 서사적인 찬가로 대체되었다.\n\n이것은 단순한 개종이 아니라 복원이다. 오랫동안 잠들어 있던 우리 민족의 영혼에 돌과 황금으로 된 새로운 심장이 주어졌다. 내 이름은 먼지 쌓인 연대기에 기록되는 것에 그치지 않을 것이다. 이제 이 도시의 영혼 그 자체에 새겨졌으니, 이 신성한 신전의 돔만큼이나 웅장하고 영원한 유산이 될 것이다." # 7243646132219171090
  convert_hagia_sophia.0006.a: "거짓 신들의 시대는 끝났다! 새로운 올림포스가 솟아오른다!" # 5339656925335723360
  convert_hagia_sophia.0007.t: "개종이 실패했다!" # 15523150511637905036
  convert_hagia_sophia.0007.desc: "신전 개종 작업을 감독하던 공사 책임자가 창백해진 얼굴로 내 발치에 엎드렸습니다. 프로젝트가 무너져 내렸습니다.\n\n그는 성문 밖의 적이 아니라 내부의 부패를 이야기합니다. 작업은 일련의 '불길한 징조'로 얼룩졌습니다. 모자이크를 긁어내는 도중 화재가 발생하고, 이유 없이 비계가 무너졌으며, 프레스코화를 그리던 예술가들 사이로 기이한 역병이 돌았습니다. 나자렛 사람 사제들의 잔당이 속삭이는 말에 부추겨진 인부들은 이제 이 프로젝트가 그들의 죽은 신에게 저주받았다고 믿고 있습니다. 그들은 돌 하나라도 더 건드리기를 거부하며 떼를 지어 도망쳤습니다.\n\n그나마 진행되었던 작업도 약탈자들과 광신적인 파괴자들에 의해 망가지고 있습니다. 프로젝트는 폐허가 되었고, 어느 신도 만족시키지 못하고 누구에게도 영감을 주지 못하는, 반쯤 정화되고 반쯤 모독당한 껍데기만 남았습니다. 우리는 우리 신앙의 영광스러운 재탄생을 위한 기념비를 세우려 했으나, 결국 우리의 오만과 무능함을 증명하는 기념비를 세우고 말았습니다." # 7361427374961133023
  convert_hagia_sophia.0007.a: "분명 나자렛 사람의 소행이다!" # 13279518015359488490
  CONSTANTINOPLE_LOCATION_TOOLTIP: "콘스탄티노플을 보유함" # 15569149115926135269
  building_bgp_hagia_sophia_03: "아테나의 대신전" # 12794833448034552901
  building_bgp_hagia_sophia_03_desc: "거대한 돔에서 쏟아지는 빛을 받으며 콘스탄티노플의 거대한 팔라디움이 서 있습니다. 이는 결코 멈추지 않는 감시를 수행하는 아테나 프로마코스의 금상과 상아상입니다. 신전의 벽면은 신화와 영웅담을 담은 생생한 태피스트리로 장식되어, 신들과 고대의 위대한 영웅들의 시대를 초월한 이야기를 묘사합니다.\n\n히에로판테스들이 신성한 의식을 거행함에 따라 공기는 성스러운 월계수와 제물의 향기로 가득합니다. 이곳은 제국의 의심할 여지 없는 영적 심장이자 헬레니즘 신앙의 중심지이며, 신들의 위엄을 선포하는 비할 데 없는 웅장함의 기념비입니다." # 1923381517708623749
  building_type_bgp_hagia_sophia_03: "$building_bgp_hagia_sophia_03$" # 9158153898635851347
  building_type_bgp_hagia_sophia_03_desc: "$building_bgp_hagia_sophia_03_desc$" # 5676326896935198065
  bgp_temple_of_athena: "그리스-로마 신앙을 고수해야 합니다." # 9641191935912007793
