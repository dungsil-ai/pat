l_korean:
  great_project_type_theodosian_walls_maintenance: "테오도시우스 성벽 유지보수" # 13473079149850905365
  great_project_type_theodosian_walls_maintenance_desc: "전설적인 테오도시우스 성벽은 수 세기 동안 '도시들의 여왕'을 지켜왔으며, 수많은 정복자 지망생들을 물리친 끊이지 않는 보루와 성벽의 선이었습니다. 하지만 시간은 어떤 성벽도 홀로 이길 수 없는 적입니다. 모르타르는 부서지고, 탑은 가라앉으며, 대지 자체가 성벽에 대항하여 공모하고 있습니다.\n\n성벽을 방치하는 것은 재앙을 불러들이는 일입니다. 이 거대한 노력을 통해, 우리는 제국의 자원을 조직하여 성벽을 이전의 영광으로 복구하고, 상처를 꿰매며, 앞으로 수 세기 동안 난공불락의 방패로 서 있게 할 것입니다. 제국의 심장 그 자체가 여기에 달려 있습니다." # 11394790897864833595
  great_project_type_theodosian_walls_maintenance_contribution_gold: "황실 후원" # 12133267790511447551
  great_project_type_theodosian_walls_maintenance_contribution_gold_desc: "자재와 도구의 즉각적인 구매, 그리고 숙련된 노동자들의 임금 지급을 위해 제국 국고에 직접 기부하는 것입니다. 금은 이와 같은 거대한 작업의 원동력입니다." # 17748302588093755441
  great_project_type_theodosian_walls_maintenance_contribution_manpower: "테마의 노동력" # 11277605391978240833
  great_project_type_theodosian_walls_maintenance_contribution_manpower_desc: "금으로 석공을 고용할 수는 있지만, 프로젝트의 엄청난 규모는 노동자 군단을 필요로 합니다. 봉신들은 잔해를 치우고, 자재를 운반하며, 수석 건축가들을 지원하기 위해 노동력 징집병을 보낼 수 있습니다." # 10039188907349298171
  great_project_type_theodosian_walls_maintenance_contribution_stone: "채석장 확보" # 7096121271666907318
  great_project_type_theodosian_walls_maintenance_contribution_stone_desc: "복구 작업이 수 세기 동안 지속되도록 하기 위해서는 최고의 석재와 대리석이 필요합니다. 이 기여는 제국의 채석장에서 수도로 자재를 확보, 운영 및 운송하기 위한 중대한 노력을 나타냅니다." # 6253558003533222686
  great_project_type_theodosian_walls_maintenance_contribution_engineers: "수석 석공 및 기술자" # 7521727737114571046
  great_project_type_theodosian_walls_maintenance_contribution_engineers_desc: "성벽을 쌓는 데 사용된 고대의 기술은 엄격하게 보호되는 비밀입니다. 수석 석공, 건축가, 군사 기술자들에 대한 접근을 제공하면 작업의 품질과 속도가 획기적으로 향상될 것입니다." # 16886725881662744965
  great_project_type_theodosian_walls_maintenance_contribution_blessing: "신성한 축복" # 10397443371762961185
  great_project_type_theodosian_walls_maintenance_contribution_blessing_desc: "성벽은 단순한 돌덩이가 아닙니다. 그것은 도시에 대한 신의 보호의 상징입니다. 세계 총대주교의 공식적인 축복은 노동자들의 사기를 높이고 우리의 경건함에 대한 강력한 증거가 될 것입니다." # 12074269081327310579
  theodosian_walls_neglected_modifier: "방치된 테오도시우스 성벽" # 5707733166028987653
  theodosian_walls_neglected_modifier_desc: "한 세기 동안의 방치가 그 대가를 치르게 했습니다. 전설적인 테오도시우스 성벽의 모르타르는 먼지가 되었고, 성벽은 담쟁이덩굴로 뒤덮였으며, 외부 방어선에는 우려스러운 틈이 생겼습니다. 한때 제국의 자랑이었던 성벽은 이제 제국 쇠퇴의 상징이자, 백성들에게는 수치이며, 적들에게는 명백한 초대장이 되었습니다." # 1648938028781087050
  theodosian_walls_maintained_modifier: "잘 유지된 테오도시우스 성벽" # 8030955665263513453
  theodosian_walls_maintained_modifier_desc: "제국의 기념비적인 복구 노력 끝에, 테오도시우스 성벽은 지난 세기보다 더 강력하게 서 있습니다. 새롭게 강화된 그 위용은 '도시들의 여왕'에 감히 도전하려는 자들에게 강력한 억제력이 됩니다." # 16699298043404420653
  theodosian_walls_maintenance.0001.t: "명예로운 후원자" # 3564242789796002835
  theodosian_walls_maintenance.0001.desc: "프로젝트를 위한 나의 금 기부금이 콘스탄티노폴리스에 접수되었습니다.\n\n수석 건축가들은 나의 지원에 감사를 표하며, 나의 자금이 '도시들의 여왕'을 강화하는 데 필요한 자원을 확보하는 데 결정적인 역할을 할 것이라고 언급했습니다. 나의 관대함은 정식으로 기록되었습니다." # 2379037777305067623
  theodosian_walls_maintenance.0001.a: "제국의 영광을 위하여!" # 2238418587639873950
  theodosian_walls_maintenance.0002.t: "우리 노동자들이 수도에 도착하다" # 6412109953940174766
  theodosian_walls_maintenance.0002.desc: "내 영지에서 파견한 노동자 부대가 콘스탄티노폴리스에 도착했다는 소식이 전해졌다. 수석 건축가는 그들이 무사히 도착했음을 알리며, 내 백성들의 강인함과 정신력을 칭송했다.\n\n제국 감독관들은 이미 그들을 테오도시우스 성벽 보수 작업에 투입했다. 내가 보낸 인력은 분명 복구 작업을 앞당길 것이다." # 3741514041420734012
  theodosian_walls_maintenance.0002.a: "그들의 손길이 신속히 움직이기를." # 7615088109324306423
  theodosian_walls_maintenance.0003.t: "선적물 수령" # 14539540438006631966
  theodosian_walls_maintenance.0003.desc: "내 채석장에서 나온 석재와 대리석을 가득 실은 바지선들이 무사히 수도에 도착했다. 제국의 전갈에 따르면, 숙련된 석공들이 자재의 품질에 크게 기뻐하고 있다고 한다.\n\n수석 건축가는 도시의 미래 방어 시설이 세워질 기초를 마련해 준 것에 대해 감사를 표했다." # 12467217429228109163
  theodosian_walls_maintenance.0003.a: "석재의 기초이자, 충성의 기초로다." # 3186254729453810397
  theodosian_walls_maintenance.0004.t: "전문가들의 조력" # 14029317782039301750
  theodosian_walls_maintenance.0004.desc: "위대한 도시의 성벽을 유지하는 거대 프로젝트를 돕기 위해 내가 보낸 석공장과 기술자 팀이 수도에서 큰 존경을 받으며 환영받았다. 그들의 전문 지식은 매우 훌륭하고 가치 있는 것으로 증명되었다.\n\n내 영지의 지식은 이제 테오도시우스 성벽의 돌 하나하나에 새겨질 것이며, 이는 내 영지의 기술력을 증명하는 증거가 될 것이다." # 12138693938296809513
  theodosian_walls_maintenance.0004.a: "우리의 지식으로 제국을 보호하게 하소서." # 14603241549666992446
  theodosian_walls_maintenance.0005.t: "응답받은 기도" # 11809286825024077875
  theodosian_walls_maintenance.0005.desc: "테오도시우스 성벽 복구를 위한 축복을 구하려던 내 노력이 결실을 맺었다. 세계 총대주교께서 직접 성대한 예식을 거행하며 이 중대한 과업에 하나님의 은총을 간구하셨다. 수도에서 들려오는 소식에 따르면 노동자들의 사기가 다시 드높아졌다고 한다. 존경받는 총대주교께서는 우리의 힘이 단지 돌에서 나오는 것이 아니라 신앙에서 나온다는 사실을 영지에 상기시켜 준 것에 대해 감사를 표하셨다." # 4652428561013005705
  theodosian_walls_maintenance.0005.a: "하나님의 이름으로, 우리가 건설하노라." # 364020055122247855
  theodosian_walls_maintenance.0006.t: "돌에 새겨진 유산" # 9400396082094365358
  theodosian_walls_maintenance.0006.desc: "수년간의 끊임없는 노력과 엄청난 비용 끝에, 이 거대한 프로젝트가 마침내 완성되었다!\n\n채석장에서 공사 현장에 이르기까지, 망치와 정 소리가 잦아들었다. 그 자리에는 공학적 경이와 의지의 산물이 들어서 콘스탄티노폴리스의 풍경을 수놓으며 우리의 통치를 증명하고 있다.\n\n다가올 세대들은 이 업적을 바라보며 우리의 이름을 기억할 것이다. 이것은 우리의 권력과 통찰력, 그리고 우리가 영지에 가져온 번영의 상징이다." # 13584301832759656741
  theodosian_walls_maintenance.0006.a: "영원히 기억될 승리로다!" # 6280948800824640090
  theodosian_walls_maintenance.0007.t: "작업 중단" # 8466418872175403184
  theodosian_walls_maintenance.0007.desc: "내 칙령에 따라 거대 프로젝트의 작업이 중단되었다. 노동자들은 집으로 돌아갔고, 연장도 내려놓았다. 한때 콘스탄티노폴리스를 가득 채웠던 건설의 소음은 불안한 정적에 자리를 내주었다.\n\n텅 빈 국고 때문이든, 전쟁의 북소리 때문이든, 혹은 다른 더 시급한 문제 때문이든, 이 프로젝트의 웅대한 비전은 실현되지 못한 채 남을 것이다. 절반만 완성된 구조물들은 이제 버려진 야망의 기념비가 되어, 실현될 수 있었던 미래를 뼈아프게 상기시키고 있다." # 6682404368247432776
  theodosian_walls_maintenance.0007.a: "쓰라리지만 필요한 결정이었다." # 1688402080456610833
  theodosian_walls_maintenance.0008.t: "무너져가는 거인들" # 4648793645366836105
  theodosian_walls_maintenance.0008.desc: "콘스탄티노폴리스로부터 우려 섞인 보고들이 연달아 내 귀에 들어왔다. 소식은 명백했다. 수 세기 동안 제국의 방패였던 전설적인 테오도시우스 성벽이 위험천만하게 파손된 상태로 방치되고 있다는 것이다.\n\n기술자들은 거대한 석회암 블록 사이의 모르타르가 먼지로 변하고 있으며, 침입한 담쟁이덩굴이 고대의 돌들을 안쪽에서부터 벌려놓고 있다고 경고한다. 외벽의 전체 구역이 도시 수비대에 의해 안전하지 않은 것으로 간주되고 있으며, 요새 곳곳에 우려스러운 틈새가 나타나기 시작했다.\n\n이러한 쇠퇴는 비밀이 아니다. 성벽의 상태를 제국 몰락의 상징으로 여기는 민중들 사이에서 불안감이 커지고 있다. 적들에게 이것은 분명 약점의 징후이자, 점점 더 취약해지는 도시의 방어력을 시험해 보라는 초대장과 다름없을 것이다. 도시들의 여왕이 나날이 취약해지고 있다." # 6399697234783090004
  theodosian_walls_maintenance.0008.a: "성벽을 이전의 영광으로 복구해야만 한다!" # 16911154927852441134
  BYZANTION_LOCATION_1_TOOLTIP: "콘스탄티노폴리스가 귀하의 영역 내에 있습니다" # 7758421867093375865
