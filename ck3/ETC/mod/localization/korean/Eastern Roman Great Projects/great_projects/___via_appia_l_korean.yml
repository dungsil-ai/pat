l_korean:
  great_project_type_via_appia_restoration: "아피아 가도 복구" # 489923599414156015
  great_project_type_via_appia_restoration_desc: "'도로의 여왕'이라 불리는 아피아 가도는 한때 공화국과 제국의 주요 동맥이었습니다. 로마에서 브룬디시움 항구에 이르기까지, 이 길은 군단과 총독, 그리고 끝없는 상업의 물결을 실어 날랐습니다. 오늘날, 이 도로는 우리 국가의 서글픈 거울이 되었습니다. 무너진 다리, 산적들이 들끓는 언덕, 그리고 땅속으로 파묻힌 포석들이 뒤엉킨 구불구불한 오솔길에 불과합니다.\n\n이 350마일 길이의 경이로운 유산을 복구하는 것은 곧 이탈리아의 심장을 복구하는 일입니다. 이는 공학적 기술과 의지가 집약된 거대한 과업이자, 로마의 창의성이 돌아왔음을 세상에 알리는 선포가 될 것입니다. 완공되는 즉시, 군대와 교역품은 지난 5세기 동안 볼 수 없었던 속도로 우리 영토를 가로질러 흐르게 될 것입니다." # 10016301527846297738
