  neglected_via_appia_modifier_desc: "'도로의 여왕' 아피아 가도는 한때 최고의 위상을 자랑했으나, 서로마 제국 멸망 이후 수 세기 동안 방치되면서 참혹한 대가를 치렀습니다. 상징적인 검은 포석들은 농민들의 오두막을 짓기 위해 도난당하거나 땅속으로 완전히 파묻혔습니다. 아펜니노 협곡을 가로지르던 웅장한 다리들은 이제 잡초가 무성한 잔해로 변했습니다. 한때 제국의 주요 동맥이었던 이 길은 이제 산적들이 출몰하는 위험한 흙길이자, 지나간 시대의 쓰라린 기억일 뿐입니다." # 6846189263864480886
  neglected_via_appia_modifier: "방치된 아피아 가도" # 9798957697139348431
  restored_via_appia_modifier_desc: "'도로의 여왕'이 다시 군림합니다. 로마에서 브룬디시움까지, 끊김 없이 이어진 검은 돌의 띠가 곧고 바르게 뻗어 있으니, 이는 로마 공학의 부활을 증명하는 증거입니다. 군단과 상업은 수 세기 동안 볼 수 없었던 속도와 안전성으로 흐르며, 이탈리아의 중심부를 하나로 묶고 수도에서 바다까지 우리의 권세를 투사합니다. 이 도로는 더 이상 단순한 길이 아니라, 제국의 동맥입니다." # 15160143455172181301
  restored_via_appia_modifier: "복구된 아피아 가도" # 9393975793023814045
  funding_secure_appia_modifier: "도로의 수호자" # 9865298740599027172
  funding_secure_appia_modifier_desc: "아피아 가도를 따라 도적과 무법자들을 소탕하는 데 자금을 지원함으로써, 나는 질서와 정의를 가져온 자라는 명성을 얻었습니다. 여행자들은 감사의 마음을 담아 내 이름을 부르며, 나의 권위는 이 혼란스러운 땅에서 평화와 안전을 위한 힘으로 간주됩니다." # 16074529111190413150
  funding_node_of_capua_modifier: "카푸아의 후원자" # 5548741911687511515
  funding_node_of_capua_modifier_desc: "나의 후원으로 '제2의 로마'인 카푸아의 영광이 회복되었습니다. 이 장엄한 복구 소식은 이탈리아 전역에 퍼졌고, 나는 위대한 건설자이자 도시의 복구자로 칭송받고 있습니다. 이러한 영광스러운 업적은 가문과 내 이름의 위신을 크게 높여줍니다." # 14974649298620900818
  funding_bridges_of_beneventum_modifier: "교량의 거장" # 17993794757369342549
  funding_bridges_of_beneventum_modifier_desc: "나는 베네벤툼 근처의 거대한 교량들을 기적에 가까운 수준으로 재건하는 데 자금을 지원했습니다. 이제 내 이름은 고대 시대 이후로 볼 수 없었던 공학적 위업과 연관되어 불립니다. 이러한 통찰력과 역량에 대한 명성은 동료들과 봉신들의 존경을 이끌어냈습니다." # 4156629209122863833
  funding_pavers_guild_modifier: "포석공 길드의 후원자" # 15782015920644576738
  funding_pavers_guild_modifier_desc: "포석공 길드의 주요 후원자로서, 그들의 뛰어난 장인 정신과 물류 전문 지식이 이제 나의 수도에서도 발휘되고 있습니다. 아피아 가도를 위해 구축된 새로운 공법과 공급망이 이곳에도 적용되어, 나의 직할령 내에서 더 빠르고 효율적인 발전이 이루어지고 있습니다." # 4716017207973754468
  funding_rome_ascent_modifier: "공화국의 후계자" # 12558096139741626207
  funding_rome_ascent_modifier_desc: "로마 입구에 줄지어 있는 고대 무덤들의 복원을 지원함으로써, 나는 물리적으로나 상징적으로 나의 유산을 옛 위대한 영웅들의 유산과 결합시켰습니다. 원로원과 로마 시민들의 눈에 나는 단순한 통치자가 아니라, 그들의 영원한 영광을 이어받을 정당한 후계자입니다." # 6954940641662101509
  funding_gateway_brundisium_modifier: "동방 무역의 군주" # 18271961889288705811
  funding_gateway_brundisium_modifier_desc: "나의 투자로 동방으로 향하는 관문인 브룬디시움이 다시 열렸습니다. 동방의 향신료, 그리스의 포도주, 이집트의 곡물 등 활성화된 무역의 상당 부분이 이제 나의 수도로 직접 흘러들어와 영지를 풍요롭게 하고 금고를 무역의 이익으로 가득 채우고 있습니다." # 15974935225700078832
  restorer_of_the_via_appia_modifier: "아피아 가도의 복구자" # 17432339463467826669
  restorer_of_the_via_appia_modifier_desc: "'도로의 여왕'이 나의 의지에 따라 다시 군림하게 되었습니다. 복구된 제국의 동맥은 나의 권위가 직접적으로 확장된 결과입니다. 나의 군단은 수 세기 동안 볼 수 없었던 속도로 행군하고, 세금 징수원들은 새로운 안전 속에서 이동하며, 전령들은 지체 없이 나의 칙령을 전달합니다. 이 도로가 가져다주는 번영과 통제력은 나의 통치를 헤아릴 수 없을 정도로 강화하며, 이제 내 이름은 이탈리아의 풍경 그 자체에 영원히 새겨져 고대인들과 필적하는 유산이 되었습니다." # 10344519329645824254
  via_appia_events.0001.t: "아피아 가도가 확보됨" # 5884336946610142605
  via_appia_events.0001.desc: "주군이시여, 경로 확보를 맡은 대장들이 최종 보고서를 보내왔습니다. 주요 도적 소굴의 마지막 한 곳까지 불태워졌으며, 이제 정기 순찰대가 가도 전체를 순찰하고 있습니다. 약탈자의 매복이 도사리던 불길한 침묵은 안심할 수 있는 평온함으로 바뀌었습니다. 이제 우리의 기술자들과 일꾼들이 두려움 없이 작업을 진행할 수 있습니다." # 14644305904290781410
  via_appia_events.0001.a: "나의 공헌이 인정받았군." # 8741042328280279313
  via_appia_events.0002.t: "카푸아 거점이 복구됨" # 13321570017324355378
  via_appia_events.0002.desc: "주군이시여, 카푸아의 작업이 완료되었습니다. 이제 아피아 가도는 흠잡을 데 없는 새로운 포석 위로 도시를 가로지르며, 그 아래를 지나는 모든 이들에게 경외심을 불러일으키는 빛나는 재건된 아치에서 정점을 찍습니다. 상인들과 순례자들이 이미 도시로 몰려들고 있으며, 이곳은 다시 한번 위대한 가도의 자랑스럽고 북적이는 중심지 역할을 하고 있습니다." # 17695024615276745514
  via_appia_events.0002.a: "카푸아가 새롭게 빛나는구나!" # 8458076266771161777
  via_appia_events.0003.t: "베네벤툼의 교량들이 재건됨" # 8477062955942399082
  via_appia_events.0003.desc: "주군이시여, 수석 공학자가 기적에 가까운 업적을 이루었다는 소식을 전해왔습니다. 마지막 쐐기돌이 놓였으며, 베네벤툼 인근의 거대한 다리들이 다시금 온전한 모습을 갖추었습니다! 한때 여행자들이 위험한 우회로를 마주해야 했던 곳에, 이제는 넓고 평탄한 길이 협곡 위로 웅장하게 뻗어 있습니다. 이제 남부 아펜니노 산맥을 가로지르는 끊김 없는 통행이 현실이 되었습니다." # 7962366221609696340
  via_appia_events.0003.a: "공학의 경이로움이군!" # 9660361965141015201
  via_appia_events.0004.t: "도로가 포장되다" # 1233585263419370481
  via_appia_events.0004.desc: "주군, 포장공 길드의 보고에 따르면 비아 아피아의 마지막 구간 포장이 완료되었다고 합니다. 수도에서 바다에 이르기까지, 숙련된 솜씨로 깔린 검은 돌의 띠가 이제 끊김 없이 이어져 있습니다. 완벽하게 맞물린 판석 위로 마차 바퀴가 구르는 특유의 덜컹거리는 소리가 다시금 들려오니, 이는 수 세기 동안 이 땅에서 사라졌던 소리입니다." # 9921202324748177197
  via_appia_events.0004.a: "검은 돌의 길을 걷기 위해..." # 12673443474728926173
  via_appia_events.0005.t: "로마로부터의 부상이 복원되었습니다" # 17712219987700988747
  via_appia_events.0005.desc: "주군이시여, 첫 1마일의 공사가 완료되었습니다. 이제 비아 아피아를 통해 수도를 떠나는 것은 깊은 위엄을 느끼게 하는 경험이 되었습니다. 여행자들은 복원된 공화정 영웅들과 오래전 서거한 귀족들의 묘소 사이를 지나며, 찬란하게 빛나는 대리석을 통해 현재로 되살아난 영광스러운 과거를 떠올리게 됩니다. 우리의 통치는 고대인들의 영광과 직접적으로 연결되었습니다." # 1583311676964647331
  via_appia_events.0005.a: "의기양양한 출발." # 17255400377258823657
  via_appia_events.0006.t: "브룬디시움의 관문이 열리다" # 4094164945591575449
  via_appia_events.0006.desc: "주군이시여, 브룬디시움에서 영광스러운 소식을 실은 배가 도착했습니다. 항구가 복원되었으며, 두 개의 거대한 로마식 기둥이 다시 한번 해안가에 당당히 서서 모든 해상 항로의 등대 역할을 하고 있습니다. 이제 군단은 신속하게 승선할 수 있으며, 동방의 부는 부두에서 위대한 도로로 거침없이 흘러 들어옵니다. 제국의 두 절반이 다시 연결되었습니다." # 18047199780428607231
  via_appia_events.0006.a: "동방으로 향하는 관문이 열렸도다!" # 10584386558052150836
  via_appia_events.0007.t: "도로의 여왕이 재탄생하다" # 4423166724373410710
  via_appia_events.0007.desc: "브룬디시움의 수석 기술자로부터 승전보와 같은 보고가 도착했습니다. 마지막 포장석이 놓였습니다. 로마의 성문에서 아드리아해의 부두까지, 끊어지지 않은 단 하나의 검은 돌띠가 구제국의 심장과 바다를 연결합니다.\n\n수 세기 동안 침묵했던, 완벽하게 맞물린 #italic 바솔리#! 위를 구르는 쇠바퀴의 덜컹거림이 이제 아펜니노 언덕에 울려 퍼집니다. 치솟은 새 교량 위로, 그리고 한때 통과할 수 없었던 지형을 뚫고, 이 위대한 도로는 산과 협곡을 대수롭지 않은 불편함 정도로 여기며 곧고 정직하게 뻗어 나갑니다.\n\n이제 군단은 안토니누스 왕조 시대 이후 본 적 없는 속도로 수도에서 승선항까지 행군할 수 있으며, 이탈리아의 부는 안전한 단 하나의 동맥을 따라 흐릅니다. 우리는 단순히 도로를 포장한 것이 아닙니다. 우리는 상징을 부활시킨 것입니다. 비아 아피아는 로마의 질서와 야망이 고대의 중심지로 진정으로 돌아왔음을 지형 그 자체에 새겨넣은 선언입니다." # 4956052546984940627
  via_appia_events.0007.a: "모든 길은 다시 한번 로마로 통한다." # 16284168668603233032
