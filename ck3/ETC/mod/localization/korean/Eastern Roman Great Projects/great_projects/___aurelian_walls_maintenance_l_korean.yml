l_korean:
  great_project_type_aurelian_walls_maintenance: "아우렐리아누스 성벽 유지관리" # 7840701445370145816
  great_project_type_aurelian_walls_maintenance_desc: "위대한 아우렐리아누스 성벽은 로마의 피부와도 같으나, 현재 치욕스러울 정도로 퇴락한 상태에 놓여 있습니다. 수 세기 동안 이 19킬로미터에 달하는 벽돌과 석조 회랑은 불굴의 방패로서 버텨왔으나, 수 세대에 걸친 방치로 인해 허물어지고 말았습니다. 성벽의 전 구간이 비틀거리고 있으며, 탑들은 담쟁이덩굴에 뒤덮였고, 한때 막강했던 성문들은 방어 기능을 상실한 채 썩은 나무판자에 불과한 실정입니다.\n\n이것은 영광스러운 창조의 과업이 아니라, 냉철하고도 필수적인 의무입니다. 우리는 벌어진 틈을 메우고, 성문을 다시 주조하며, 상시 주둔군을 재건하고, 장기 공성전에 대비해 곡창을 채울 것입니다. 이 일을 수행하는 것은 도시의 자부심을 회복하고 안보를 보장하는 것이며, 다음과 같은 강력한 선언이 될 것입니다. 우리가 통치하는 한, 영원한 도시가 다시는 무방비 상태로 남겨지는 일은 없을 것입니다." # 770225748292323424
  great_project_type_aurelian_walls_maintenance_contribution_towers: "성벽과 탑 보수" # 10423442617065610600
  great_project_type_aurelian_walls_maintenance_contribution_towers_desc: "이것은 가장 중요하고도 노동 집약적인 작업입니다. 우리는 19킬로미터의 회랑을 보수하기 위해 석공과 인부들로 구성된 군단을 배치해야 합니다. 그들은 비계를 세우고, 부서진 응회암 블록과 떨어진 벽돌을 교체하며, 성벽을 집어삼킨 식생을 제거하여 세월의 흉터를 치유할 것입니다." # 16072741562073014536
  great_project_type_aurelian_walls_maintenance_contribution_gates: "성문 재주조" # 1004981920798778682
  great_project_type_aurelian_walls_maintenance_contribution_gates_desc: "성벽의 강도는 그 중 가장 취약한 지점에 의해 결정됩니다. 플라미니아, 핀치아나, 프라이네스티나와 같은 로마의 고대 성문들은 이제 썩어버린 껍데기에 불과합니다. 이 기부금은 철띠를 두른 참나무로 된 거대한 새 성문을 주조하고, 새로운 낙창과 강화된 경첩을 갖추어 그 어떤 침략자 앞에서도 굳건히 닫힐 수 있도록 하는 데 사용될 것입니다." # 1065587107906382436
  great_project_type_aurelian_walls_maintenance_contribution_urban_cohorts: "도시 군단 재건" # 16252345441369447284
  great_project_type_aurelian_walls_maintenance_contribution_urban_cohorts_desc: "요새화된 도시에는 지역 민병대뿐만 아니라 전문적인 주둔군이 필요합니다. 우리는 도시 그 자체의 방어를 맹세한 전담 부대인 고대의 도시 군단을 부활시켜야 합니다. 이 자금은 그들의 모집과 베테랑 장교들에 의한 훈련, 그리고 무기와 갑옷의 제작에 투입되어 로마에 다시 한번 영구적인 수호자를 선사할 것입니다." # 14238795017857524882
  great_project_type_aurelian_walls_maintenance_contribution_granaries: "공성전용 곡창 보충" # 84735707337316188
  great_project_type_aurelian_walls_maintenance_contribution_granaries_desc: "진정한 안보란 장기 공성전을 견뎌낼 수 있음을 의미합니다. 도시의 고대 곡창과 창고들은 비어 있으며, 먼지와 쥐들만이 가득합니다. 우리는 이 광대한 공간을 곡물, 염장 고기, 기름통, 그리고 예비 화살과 창으로 가득 채우기 위해 예산을 할당해야 합니다. 이를 통해 로마가 세상과 단절되더라도 스스로 먹고 싸울 수 있도록 보장할 것입니다." # 5409007393097470855
  great_project_type_aurelian_walls_maintenance_contribution_prefect: "성벽 장관직 신설" # 18261428088617300
  great_project_type_aurelian_walls_maintenance_contribution_prefect_desc: "이러한 퇴락이 방치된 이유는 성벽의 유지관리를 책임지는 단일 권한이 없었기 때문입니다. 우리는 '성벽 장관'이라는 상설 직책을 신설할 것입니다. 이 고위 관리는 주둔군을 관리하고, 지속적인 보수를 감독하며, 이 핵심적인 방어 시설이 다시는 무너지지 않도록 보장하는 유일한 책임을 맡게 될 것입니다." # 3760885548760703020
  aurelian_walls_neglected_modifier: "방치된 아우렐리아누스 성벽" # 11154492899172202460
  aurelian_walls_neglected_modifier_desc: "아우렐리아누스 황제의 위대한 성벽에는 세월의 깊은 흉터가 남아 있습니다. 성벽의 전 구간이 무너져 내렸고, 탑들은 담쟁이덩굴에 질식했으며, 성문은 견고한 방어구라기보다는 썩은 나무에 가깝습니다. 한때 끊어지지 않는 저항의 고리였던 것은 이제 구멍 뚫린 경계선이 되어, 힘의 흔적만을 보여줄 뿐 도시를 결연한 공격에 위험할 정도로 취약하게 만들고 있습니다." # 2820703723129525313
  aurelian_walls_maintained_modifier: "관리된 아우렐리아누스 성벽" # 6739094654666882064
  aurelian_walls_maintained_modifier_desc: "아우렐리아누스 성벽이 우리의 의지와 번영의 증거로서 다시 한번 당당히 서 있습니다. 회랑은 끊어짐이 없고, 탑에는 경계심 강한 파수꾼들이 배치되었으며, 성문은 견고한 철과 참나무로 주조되었습니다. 영원한 도시는 이제 진정한 보루가 되어, 가장 강력한 군대에도 맞서고 가장 긴 공성전도 견뎌낼 수 있습니다. 로마는 안전합니다." # 10056698869149101064
  aurelian_walls_maintenance.0001.t: "탑 보수 완료" # 2566410729178722259
  aurelian_walls_maintenance.0001.desc: "주군이시여, 수석 석공이 최종 보고서를 보내왔습니다. 비계가 철거되면서 한때 커다란 구멍이 뚫려 있던 자리에 매끄러운 벽돌 공사가 모습을 드러냈습니다. 탑들은 견고하고 정교하게 서 있으며, 기초는 강화되었고 흉벽은 정비되었습니다. 성벽의 물리적 구조가 다시 한번 온전해졌습니다." # 159261959988713027
  aurelian_walls_maintenance.0001.a: "만족스러운 힘의 과시로군." # 12312751830790528524
  aurelian_walls_maintenance.0002.t: "성문 재주조 완료" # 1746917701524169921
  aurelian_walls_maintenance.0002.desc: "주군, 도시 장관으로부터 승전보와 같은 소식이 도착했습니다. 새로운 성문 중 마지막 성문의 설치가 완료되었습니다. 무거운 철제 빗장이 거리에 울려 퍼지는 웅장한 소리와 함께 잠겼으니, 이는 로마인들이 오랫동안 듣지 못했던 안보의 소리입니다. 이제 도시의 입구는 취약점이 아니라 경외심을 불러일으키는 장벽이 되었습니다." # 15848109887559416397
  aurelian_walls_maintenance.0002.a: "참으로 든든한 소리로군" # 4059776925827201140
  aurelian_walls_maintenance.0003.t: "도시 군단 창설" # 4852035010809349549
  aurelian_walls_maintenance.0003.desc: "주군, 새로 창설된 도시 군단의 첫 부대가 순찰을 시작했습니다. 그들의 절도 있는 행진과 빛나는 갑옷은 이미 시민들에게 반가운 구경거리가 되었습니다. 이제 매일 밤 탑 위에는 봉화가 타오르며, 로마의 방어만을 전담하는 훈련된 병사들이 그곳을 지키고 있습니다." # 16145647627681601358
  aurelian_walls_maintenance.0003.a: "로마가 다시 한번 군사 도시가 되었구나." # 17220690130475389740
  aurelian_walls_maintenance.0004.t: "곡창 지대 비축 완료" # 11569255262186595735
  aurelian_walls_maintenance.0004.desc: "주군, 병참관의 보고입니다. 도시의 창고가 가득 찼습니다. 비축된 군량의 양은 로마가 수년간의 포위 공격도 견뎌낼 수 있을 정도입니다. 이제 백성들은 도시가 굶주리지 않을 것임을 알고 평안히 잠들 수 있을 것입니다." # 11514343709784304924
  aurelian_walls_maintenance.0004.a: "선견지명이야말로 가장 날카로운 무기지." # 7741377297342584329
  aurelian_walls_maintenance.0005.t: "성벽 장관 관직 신설" # 8637628910122006181
  aurelian_walls_maintenance.0005.desc: "주군, 성벽 장관이 공식적으로 임명되어 업무에 착수했습니다. 장관실은 이미 성벽의 건전성을 점검하고 향후 유지보수를 위한 예산을 책정하고 있습니다. 우리의 투자를 대대로 보호하기 위한 지휘 체계와 책임 소재가 마련되었습니다." # 14420783096501195229
  aurelian_walls_maintenance.0005.a: "관리의 유산이로군." # 401011528087882212
  aurelian_walls_maintenance.0006.t: "아우렐리아누스 성벽이 당당히 서다!" # 4012351362304939583
  aurelian_walls_maintenance.0006.desc: "최종 보고가 도착했으며, 대업이 완수되었습니다. 아우렐리아누스 성벽이 과거의 영광을 되찾았습니다. 로마의 모든 언덕에서 백성들은 이제 그들의 보금자리를 에워싼 견고한 벽돌과 석조의 고리를 볼 수 있습니다. 튼튼하고 새로운 성문이 길을 막고, 경계심 강한 군단이 흉벽을 순찰하며, 도시의 곡창은 가득 찼습니다.\n\n단순히 돌과 회반죽만이 복구된 것이 아닙니다. 도시의 자부심과 안정감이 되살아났습니다. 로마은 더 이상 취약한 유물이 아니라 살아있는 요새이며, 우리의 권력의 상징이자 그 성문에 감히 접근하려는 어떤 군대라도 막아낼 문명의 보루입니다. 세계의 심장이 다시 한번 안전해졌습니다." # 13323441816319728191
  aurelian_walls_maintenance.0006.a: "야만인들이 날뛰게 두어라. 우리는 준비되었다." # 16673776916124162218
  aurelian_walls_maintenance.0007.t: "로마의 수치" # 3815229831366599151
  aurelian_walls_maintenance.0007.desc: "아우렐리아누스 성벽을 복구하려던 거대한 계획이 수치스러운 실패로 끝났습니다. 막대한 자금이 아무런 성과 없이 낭비되었으며, 도시에서 들려오는 보고는 프로젝트가 완전히 난맥상에 빠졌음을 알리고 있습니다.\n\n석공들은 일터를 떠났고, 절반만 수리된 성벽 구간은 이전보다 더 불안정한 상태로 방치되었습니다. 한때 위풍당당했던 도시 군단은 훈련을 마치기도 전에 급료를 받지 못해 해산되었습니다. 이제 도시는 우리의 어리석음을 증명하는 증거가 되었고, 부식되어가는 성벽은 우리의 무능함을 알리는 공공 기념물이 되었습니다. 영원한 도시는 그 어느 때보다 취약해졌습니다." # 9719832303515158394
  aurelian_walls_maintenance.0007.a: "수치스러운 참사로군." # 776808640369061682
  aurelian_walls_maintenance.0008.t: "시간이라는 인내심 강한 포위군" # 4534158438668120759
  aurelian_walls_maintenance.0008.desc: "한 세기 전, 귀하의 조상은 로마에 큰 공을 세워 고대 성벽을 이전의 영광으로 복구했습니다. 하지만 시간은 결코 쉬지 않는 적입니다.\n\n수세대에 걸친 평화와 우선순위의 변화 속에서 경계심은 약해졌습니다. 한때 필수적이었던 성벽 장관직은 궁정의 총신들을 위한 편안한 한직으로 전락했습니다. 유지보수를 위한 예산은 서서히 더 시급한 허영을 위해 전용되었습니다. 백 번의 혹독한 겨울이 흔적을 남겼고, 군대라면 실패했을 곳에서 시간이라는 인내심 강한 포위군이 마침내 승리했습니다.\n\n순환이 돌아왔습니다. 성벽은 다시 한번 구멍 뚫린 경계가 되었고, 탑은 무너져 내리며 성문은 약해졌습니다. 로마는 다시 한번 취약해졌으며, 방패를 복구할 의지를 가진 지도자를 기다리고 있습니다." # 7058896091792419080
  aurelian_walls_maintenance.0008.a: "이제 그 임무가 나에게 주어졌구나." # 6800098503688955896
  ROME_LOCATION_1_TOOLTIP: "로마가 귀하의 영역 내에 있습니다" # 11085510371833299253
