l_korean:
  great_project_type_refortify_danubian_limes: "다뉴브 리메스 재건 - 모에시아" # 1042799024958348848
  great_project_type_refortify_danubian_limes_desc: "우리의 고대 방패인 다뉴브강이 무너졌습니다. 이 쇠락은 한때 제국의 자랑스러운 모에시아 속주였던 지역을 따라 가장 뚜렷하게 나타나고 있습니다. 전략적 요충지인 싱기두눔 요새부터 에우크시네 해 연안에 이르기까지, 제국의 이 핵심 동맥이 무방비로 노출되어 있습니다.\n\n본인은 제국의 위대한 테마들과 강력한 아르콘들에게 이 단일한 과업에 힘을 모을 것을 촉구했습니다. 이는 본인만의 노력이 아니라, 리메스 모에시아를 다시 일으키기 위한 단결된 노력이 될 것입니다. 우리의 공동 유산은 석재와 강철에 새겨질 것이며, 북부 국경의 심장부는 대대로 안전할 것입니다." # 11169418339660267640
  great_project_type_maintain_danubian_limes: "리메스 모에시아 유지" # 14937103028753777630
  great_project_type_maintain_danubian_limes_desc: "선조들의 위대한 업적이 방치되어 수치스럽게 변했습니다. 성벽은 무너지고, 도로는 잡초로 뒤덮였으며, 수비대는 나태해졌습니다. 우리가 행동하지 않는다면, 이 중요한 방패는 역사 속으로 영원히 사라질 것입니다.\n\n이것은 영광스러운 창조의 프로젝트가 아니라, 냉엄한 의무의 과업입니다. 우리는 국경에 재투자하여 부서진 것을 수리하고 잃어버린 경계심을 회복해야 합니다. 기초는 여전히 튼튼하기에 비용은 원래의 일부에 불과하겠지만, 제국의 생존을 위해 이 과업은 결코 덜 중요하지 않습니다." # 3949110740894201813
  great_project_type_rebuild_anastasian_wall: "아나스타시우스 성벽 재건" # 8133034895028493605
  great_project_type_rebuild_anastasian_wall_desc: "테오도시우스 성벽이 도시의 여왕을 지키고 있지만, 그 배후인 트라키아 심장부는 무엇이 지키고 있습니까? 오래전 아나스타시우스 황제는 외곽 방패 역할을 하기 위해 바다에서 바다까지 이어지는 거대한 성벽인 '장벽'을 쌓았습니다. 오늘날 그것은 풍경 속에 남은 유령 같은 흔적이자, 더 안전했던 시대의 무너져가는 기념비에 불과합니다.\n\n이를 재건하는 것은 거대한 사업입니다. 57킬로미터에 달하는 길이를 복구하기 위해 막대한 자원을 동원해야 할 것입니다. 하지만 완공되면 콘스탄티노폴리스로 이어지는 반도 전체가 요새가 되어, 서쪽의 어떤 위협으로부터도 깊은 완충 지대를 제공하고 수도의 곡창 지대를 영구히 확보하게 될 것입니다." # 6252359134269538391
  great_project_type_refortify_danubian_limes_contribution_imperial_quarries: "석재와 목재의 제국 십일조" # 6526593831795855469
  great_project_type_refortify_danubian_limes_contribution_imperial_quarries_desc: "본인은 마케도니아와 트라키아의 영주들에게 그들의 채석장에서 석재를, 숲에서 목재를 십일조로 바칠 것을 명했습니다. 그들의 기여가 필요한 물량의 대부분을 차지하겠지만, 제국 국고는 철을 제련하고 작업반에 필요한 수많은 도구를 제작하는 비용을 부담해야 합니다." # 3557097399538715961
  great_project_type_refortify_danubian_limes_contribution_annona_militaris: "테마 안노나 조직" # 5901678961656521586
  great_project_type_refortify_danubian_limes_contribution_annona_militaris_desc: "헬라스와 테살로니카 테마는 노동자 군대를 먹이는 데 필요한 곡물, 포도주, 가축을 공급하라는 명령을 받았습니다. 그들의 개별적인 기여를 하나의 기능적인 보급 체계, 즉 북쪽으로 끊임없이 흐르는 곡물의 강으로 엮어내기 위해서는 본인의 권위와 위신이 필요합니다." # 979812399167714877
  great_project_type_refortify_danubian_limes_contribution_vexillation_detachments: "타그마타 파견" # 16972451173749740745
  great_project_type_refortify_danubian_limes_contribution_vexillation_detachments_desc: "이 적대적인 국경 지대는 일반 노동자들만 있을 곳이 아닙니다. 제국 황실은 본인의 정예 타그마타 부대를 공병과 경비병으로 파견할 것입니다. 이 파견은 그들이 다른 원정에 참여할 수 없음을 의미하며, 임무가 끝날 때까지 그들을 보충하는 데는 큰 비용이 들 것입니다." # 2737926784458759844
  great_project_type_refortify_danubian_limes_contribution_corvee_labor: "부역 노동" # 867285776329698743
  great_project_type_refortify_danubian_limes_contribution_corvee_labor_desc: "본인은 파리스트리온의 스트라테고스에게 현지 주민들로부터 부역을 징집할 권한을 부여했습니다. 백성들은 자신들의 노고를 통해 스스로의 방어에 기여하게 되지만, 이는 테마 전체에 느껴질 부담이 될 것입니다. 국고는 아낄 수 있겠지만, 그들의 불평은 본인이 감당해야 할 정치적 대가가 될 것입니다." # 7308205926162488933
  great_project_type_refortify_danubian_limes_contribution_master_architect: "건축가 및 거장 건설자 후원" # 7840524470412686935
  great_project_type_refortify_danubian_limes_contribution_master_architect_desc: "이 정도 규모의 프로젝트를 일개 속주 총독에게 맡길 수는 없습니다. 본인의 궁정에서 유명한 건축가를 소환하거나 합당한 봉신으로부터 영입하여 공사 총책임자로 삼고, 이 거대한 과업에 그들의 천재성과 명성을 빌려야 합니다." # 16678464808086886683
  great_project_type_refortify_danubian_limes_contribution_imperial_sanction: "세계 총대주교의 축복 확보" # 4455948413663333865
  great_project_type_refortify_danubian_limes_contribution_imperial_sanction_desc: "이 대의 아래 제국을 하나로 묶기 위해서는 이것이 성스러운 과업으로 비춰져야 합니다. 세계 총대주교를 신앙, 외교, 또는 제국 국고에서의 상당한 기부를 통해 설득하여 축복을 받아내고, 이 위대한 복구가 모든 선량한 로마인의 정의로운 의무임을 선포하게 해야 합니다." # 201878261793890894
  great_project_type_refortify_danubian_limes_contribution_singidunum_fortress: "싱기두눔의 백색 요새" # 17362934741560354190
  great_project_type_refortify_danubian_limes_contribution_singidunum_fortress_desc: "새로운 리메스의 가장 서쪽 보루로서, 싱기두눔 요새는 표준 요새화 이상의 특별한 주의가 필요합니다. 이 선택적 사업은 우리의 가장 뛰어난 공병과 자재를 불균형할 정도로 많이 할당하여 성벽을 타의 추종을 불허하는 높이와 강도로 재건할 것입니다. 이를 통해 판노니아 분지에서 시작되는 측면 공격으로부터 국경 전체를 안전하게 보호하고, 우리 지배권의 난공불락의 닻을 내릴 수 있습니다." # 13412400704073411388
  great_project_type_refortify_danubian_limes_contribution_durostorum_citadel: "지휘 성채: 도로스토룸" # 10181554615491301069
  great_project_type_refortify_danubian_limes_contribution_durostorum_citadel_desc: "도로스토룸은 파리스트리온 테마의 수도이자 리메스 전체의 지정된 신경 중추입니다. 표준적인 요새화가 계획되어 있지만, 이 선택적 기부는 도시 내부에 새로운 제국 성채를 건설하는 자금을 지원할 것입니다. 이를 통해 우리 스트라테고스들이 더 높은 효율성과 보안으로 국경 전체의 방어를 지휘할 수 있는 강력한 지휘 본부를 구축하고, 우리의 전략적 역량을 공고히 할 것입니다." # 17526638412107651058
  great_project_type_refortify_danubian_limes_contribution_trajans_crossing: "제국 트라야누스 도하처" # 5127333452600349680
  great_project_type_refortify_danubian_limes_contribution_trajans_crossing_desc: "이 계획의 진정으로 야심 차고 전적으로 선택적인 구성 요소입니다. 기본적인 방어에 필수적인 것은 아니지만, 다뉴브강 자체를 가로지르는 꿈은 여전히 매혹적인 전망으로 남아 있습니다. 이 기부는 불가능에 도전하려는 기념비적이고 막대한 비용이 드는 노력을 나타냅니다. 고대의 교각 위에 트라야누스의 전설적인 다리를 재건하는 것입니다. 성공한다면 타의 추종을 불허하는 전략적 이점을 제공하겠지만, 엄청난 비용은 실패의 높은 위험을 반영합니다." # 3707662547149854488
  great_project_type_refortify_danubian_limes_contribution_tomis_port: "토미스 항구" # 4050306781888060587
  great_project_type_refortify_danubian_limes_contribution_tomis_port_desc: "요새화된 국경은 굶주리고 비용이 많이 드는 국경입니다. 상인 길드의 막대한 보조금을 받는 이 선택적 기부는 토미스의 거대한 항구를 완전히 복구하는 데 집중할 것입니다. 번창하는 항구는 프로젝트 비용을 상쇄하기 위해 관세로 국고를 채울 뿐만 아니라, 해로를 통해 파라두나본 전체에 보급품을 공급할 수 있게 하여 육로의 막대한 물류 부담을 완화하고 프로젝트의 전반적인 효율성을 향상시킬 것입니다." # 7490326884073879593
  great_project_type_rebuild_anastasian_wall_contribution_clear_traces: "수리반 소집" # 13184334422016714879
  great_project_type_rebuild_anastasian_wall_contribution_clear_traces_desc: "장성은 현재 수 세기 동안의 방치로 인해 가로막혀 있습니다. 우리는 성벽을 뒤덮은 가시 덤불을 제거하기 위해 도끼와 낫을 든 수천 명의 노동자를 파견해야 합니다. 그 후 기술자들이 뒤따라가 노동자들을 지휘하여 떨어진 잔해의 거대한 무게를 옮기고 성벽의 고대 기초를 완전히 드러낼 것입니다. 그래야만 재건 작업이 진정으로 시작될 수 있습니다." # 6384222961845816916
  great_project_type_rebuild_anastasian_wall_contribution_quarry_stone_and_bricks: "석재 채굴 및 벽돌 소성" # 7318466438625310894
  great_project_type_rebuild_anastasian_wall_contribution_quarry_stone_and_bricks_desc: "이 정도 규모의 성벽은 희망과 야망만으로 건설될 수 없습니다. 이 기부는 트라키아 언덕의 고대 채석장을 다시 여는 자금을 지원하며, 새로운 벽돌 공장에 공급하기 위해 거대한 점토 구덩이를 팔 것입니다. 복구된 성벽의 표면과 핵심에 필요한 산더미 같은 석재와 붉은 벽돌을 생산하기 위해 채석공, 마부, 가마지기 군단이 필요할 것입니다." # 14668515849966235308
  great_project_type_rebuild_anastasian_wall_contribution_organize_wall_guard: "성벽 수비대(비길레스) 조직" # 9179872666154922090
  great_project_type_rebuild_anastasian_wall_contribution_organize_wall_guard_desc: "방어자가 없는 성벽은 단지 긴 돌무더기에 불과합니다. 이 기부는 새로운 상설 주둔군인 *비길레스 아나스타시아니*의 창설 자금을 지원할 것입니다. 트라키아의 강인한 마을 주민과 농민들 중에서 모집된 이 군인 정착민들은 탑을 지키고 성벽을 순찰하며 성벽의 경계하는 눈과 귀 역할을 하도록 훈련받고 방어를 맹세할 것입니다." # 4789778667863419343
  great_project_type_rebuild_anastasian_wall_contribution_appoint_long_walls_count: "장성 백작 임명" # 4381306523493093481
  great_project_type_rebuild_anastasian_wall_contribution_appoint_long_walls_count_desc: "이 정도 규모의 프로젝트에는 단일하고 확고한 권위가 필요합니다. 우리는 신뢰할 수 있는 지휘관을 신설된 '장성 백작' 직위에 임명해야 합니다. 이 총독은 비길레스의 최고 지휘관이자 프로젝트의 수석 관리자, 그리고 성벽의 건설 및 방어와 관련된 모든 문제에 대한 최종 권한을 행사하여 프로젝트가 관료적 혼란에 빠지지 않도록 보장할 것입니다." # 10136488894740339795
  great_project_type_maintain_danubian_limes_contribution_muster_repair_crews: "수리반 소집" # 13184334422016714879
  great_project_type_maintain_danubian_limes_contribution_muster_repair_crews_desc: "우리 조상들의 위대한 업적이 방치로 인해 수치를 당했습니다. 우리는 떨어진 돌을 교체할 숙련된 석공, 무성한 도로를 청소할 노동자, 부서진 문을 수리할 목수를 파견해야 합니다. 이것은 대규모 징집이 아니라, 시간의 끈질긴 공성전을 되돌리기 위한 장인들의 표적 배치입니다." # 15084074130522233654
  great_project_type_maintain_danubian_limes_contribution_procure_repair_supplies: "수리 물자 조달" # 8591317496213517679
  great_project_type_maintain_danubian_limes_contribution_procure_repair_supplies_desc: "기초는 여전히 튼튼하지만, 그것들을 결합하는 모르타르는 먼지가 되었습니다. 이 기부는 망루 지붕을 위한 신선한 목재, 새로운 성문 부속품을 위한 철, 그리고 끝없는 수레 분량의 모르타르와 석회를 조달하는 데 자금을 할당할 것입니다. 이것은 우리 복구 작업의 힘줄을 제공하는 겸손하지만 필수적인 과업입니다." # 8529030640453698263
  great_project_type_maintain_danubian_limes_contribution_reform_limitanei: "국경 수비대 개편" # 5062519742121024868
  great_project_type_maintain_danubian_limes_contribution_reform_limitanei_desc: "국경의 '군인 농민'들은 그들 명칭의 앞부분을 잊어버렸습니다. 우리는 타그마타에서 베테랑 장교들을 보내 군사 기강을 다시 확립하고, 주둔군을 완편하며, 지속적인 순찰 체계를 재구축해야 합니다. 무관심이 아닌 경계심이 다시 한번 다뉴브강의 좌우명이 되어야 합니다." # 18134613685380702964
  great_project_type_maintain_danubian_limes_contribution_appoint_limes_curator: "리메스 관리관 임명" # 4068112617996274216
  great_project_type_maintain_danubian_limes_contribution_appoint_limes_curator_desc: "이러한 쇠퇴는 누구도 지켜보지 않았기에 발생했습니다. 역사가 반복되는 것을 막기 위해, 우리는 새로운 상설 직책인 리메스 관리관을 신설해야 합니다. 나에게 직접 보고하는 이 관리는 정기적인 유지보수를 감독하고, 국경의 대비 태세를 감사하며, 제국의 방패가 다시는 녹슬지 않도록 보장할 책임을 질 것입니다." # 9190238110349207650
  danubian_limes_modifier: "다뉴브 리메스" # 8901896402204456564
  danubian_limes_modifier_desc: "싱기두눔에서 에우크시누스 해안에 이르기까지, 서로 연결된 요새, 감시 초소, 군사 도로의 사슬이 경계를 늦추지 않고 서 있습니다. 복구된 국경인 리메스 모에시아는 우리의 힘을 투사하고, 기회주의적인 약탈자들을 저지하며, 대하 북쪽에서 오는 어떠한 조직적인 침공에 대해서도 강력한 방어선을 제공합니다." # 4962905568038136306
  white_fortress_modifier: "백색 요새" # 17990685836608302179
  white_fortress_modifier_desc: "싱기두눔의 빛나는 하얀 성벽이 하늘로 솟아올라 제국의 위엄을 깊이 있게 보여줍니다. 사바강과 다뉴브강의 합류 지점을 장악하고 있는 이 거대한 요새는 단순한 요새 그 이상입니다. 이곳은 리메스 전체를 지탱하는 난공불락의 서쪽 거점이며, 그 어떤 도전자가 힘을 시험하려 해도 당당히 맞설 것입니다." # 13933083518749614134
  durostorum_citadel_modifier: "두로스토룸 성채" # 6414821496695180627
  durostorum_citadel_modifier_desc: "리메스 모에시아의 심장은 두로스토룸에 있는 제국 성채의 안전한 성벽 안에서 고동칩니다. 이곳은 국경 방어의 신경 중추이자, 우리의 스트라테고스들이 주둔군을 지휘하고, 방어 체계를 조율하며, 타의 추종을 불허하는 효율성으로 적들의 음흉한 음모에 저항하는 본부입니다." # 258329476674132416
  trajans_crossing_modifier: "트라야누스의 도하처" # 6397850468513715171
  trajans_crossing_modifier_desc: "돌과 목재로 된 거대한 다리가 다뉴브강을 가로지르니, 이는 강의 위력에 맞서는 공학의 기적입니다. 우리 군대는 마치 마른 길을 걷듯 대하를 건널 수 있으며, 이는 우리 영토를 방어하고 야만인들의 심장부로 힘을 투사하는 데 있어 심대한 전략적 이점을 제공합니다." # 1769981243155239759
  golden_port_modifier: "황금 항구" # 7397760267834297165
  golden_port_modifier_desc: "토미스 항구는 활기찬 상업의 중심지입니다. 에우크시누스해 전역에서 온 배들이 항구를 가득 채우고, 세관에는 동전이 넘쳐납니다. 이 북적이는 시장은 북방의 부를 지역 경제로 직접 유입시켜 국경을 유지하고 왕국을 풍요롭게 합니다." # 10594020922830341854
  corvee_labor_modifier: "부역 동원" # 14985697424094119223
  corvee_labor_modifier_desc: "제국의 칙령에 따라, 우리 백성들이 국가 노동을 위해 징집되었습니다. 그들은 들판을 떠나 돌을 나르고 도랑을 파야 합니다. 그들이 미래의 안전이라는 약속을 위해 고군분투하는 동안, 우리의 땅은 방치되고 수면 아래에서는 불만이 조용히 끓어오르고 있습니다." # 17795306771350257453
  vexillation_detachments_modifier: "벡실라티오 파견대 배정" # 2387245365760387060
  vexillation_detachments_modifier_desc: "우리의 가장 정예인 근위대와 숙련된 군사 공병들이 국경의 특수 임무에 배정되었습니다. 그들의 전문 지식은 제국의 안보에 필수적이지만, 장기간의 부재는 우리의 핵심 군사 대비 태세에 상당한 부담을 줍니다. 손실을 보충하고 새로운 전문 연대를 조직하는 일은 이제 훨씬 더 많은 비용이 드는 일이 되었습니다." # 8312275571431823055
  neglected_limes_modifier: "방치된 다뉴브 리메스" # 13153359975051551997
  neglected_limes_modifier_desc: "시간은 무자비한 강물과 같습니다. 한때 당당히 서 있던 감시 초소들은 이제 무너져 내리고, 군사 도로에는 풀이 무성하며, 국경 주둔군은 병력이 부족하고 나태해졌습니다. 리메스가 제공하던 안보는 나날이 희미해지고 있습니다. 새로운 투자와 제국의 경계가 없다면, 이 위대한 방패는 곧 기억 이상의 의미를 갖지 못하게 될 것입니다." # 3630883170516128994
  anastasian_wall_restored_modifier: "아나스타시우스 성벽 복구" # 17494976677019960507
  anastasian_wall_restored_modifier_desc: "장벽이 돌과 결의의 57km 장벽으로 다시 섰습니다. 이것은 수도의 외부 방패 역할을 하며, 트라키아 반도 전체를 깊숙한 완충 지대로 변화시킵니다. 이제 침공하는 군대는 콘스탄티노폴리스의 성벽을 바라보기도 훨씬 전에 이 가공할 장애물을 극복해야 하며, 이는 제국이 방어력을 결집할 소중한 시간을 벌어줍니다." # 796332175830452685
  refortify_danubian_limes.0001.t: "보고: 토대가 마련되었습니다" # 275921328728988657
  refortify_danubian_limes.0001.desc: "주군, 전방 보급창에서 전령이 도착했습니다. 수레바퀴의 삐걱거림과 지친 황소들의 울음소리가 마침내 잦아들었습니다. 건설 현장 인근의 드넓은 들판은 이제 석공들을 기다리는, 정교하게 깎여 작은 산처럼 쌓인 석재들로 가득합니다. 그 옆으로는 갓 베어낸 재목들이 인공 숲처럼 늘어서 있으며, 나무 향기가 공기 중에 짙게 배어 있습니다.\n\n모든 십일조가 거두어졌고, 모든 자원이 파악되었습니다. 제국을 새롭게 건설할 원자재가 모두 준비되었습니다." # 8523081922198452399
  refortify_danubian_limes.0001.a: "훌륭하군." # 5861869771174454408
  refortify_danubian_limes.0002.t: "보고: 대업을 위한 보급이 완료되었습니다" # 14249029455075549757
  refortify_danubian_limes.0002.desc: "주군, 안노나의 로고테테스가 병참의 승전보를 전해왔습니다. 고대의 군사 보급 체계가 부활했으니, 이는 우리 조직력의 천재성을 입증하는 증거입니다. 강 위로는 바지선이, 도로 위로는 호위 호송대가 끊임없이 북쪽으로 흐르며 남부 테마에서 온 곡물과 포도주, 염장 고기를 실어 나르고 있습니다.\n\n단 한 명의 노동자도 굶주리지 않을 것이며, 단 한 명의 병사도 군량이 부족하지 않을 것입니다. 프로젝트의 배는 가득 찼고, 사기는 드높습니다." # 4956918542040538654
  refortify_danubian_limes.0002.a: "굶주린 병사는 싸우지 못하는 법이지." # 3583268310775499520
  refortify_danubian_limes.0003.t: "보고: 독수리들이 도착했습니다" # 13567319176749654215
  refortify_danubian_limes.0003.desc: "주군, 말을 달려 땀에 흠뻑 젖은 전령이 도착했습니다. 정예 공병 벡실라티오가 행군을 마치고 진영을 구축했습니다. 그들의 절도 있는 텐트 행렬은 건설 현장의 즐거운 혼돈과 극명한 대조를 이루며, 바람에 휘날리는 제국의 깃발은 지켜보는 모든 적에게 분명한 경고를 보내고 있습니다.\n\n이제 이 프로젝트는 제국 최고의 군사 전문가들의 감시 아래 놓였습니다." # 4108000788128970079
  refortify_danubian_limes.0003.a: "그들은 우리 방어의 살아있는 심장이다." # 4425021629418575915
  refortify_danubian_limes.0004.t: "보고: 개미떼가 개미집으로 몰려듭니다" # 18431713376081015366
  refortify_danubian_limes.0004.desc: "주군, 지역 스트라테고스들이 부역 징발이 완료되었음을 보고했습니다. 강을 따라 거대한 천막 도시가 형성되었고, 새벽부터 황혼까지 만 명의 노동자가 내는 소음이 공기를 가득 채우고 있습니다. 감독관들의 외침이 땅을 파는 곡괭이 소리와 나무를 베는 도끼 소리 위로 울려 퍼집니다.\n\n그들은 체념하면서도 단호한 정신으로 태양 아래 고군분투하고 있으며, 그들의 땀은 우리의 새로운 방패가 세워질 바로 그 땅을 성스럽게 하고 있습니다." # 5949837778803008640
  refortify_danubian_limes.0004.a: "필요한 요소로군." # 13298383879752636506
  refortify_danubian_limes.0005.t: "선구자들의 도착" # 2182817161290319900
  refortify_danubian_limes.0005.desc: "주군, 가장 숙련된 건축가들과 거장들이 주요 건설 현장에 도착했습니다. 그들의 수행단은 두루마리, 아스트롤라베, 그리고 복잡한 측정 장치들을 가득 싣고 왔습니다. 그들의 존재만으로도 조정의 회의론자들은 침묵했고, 기술자들에게는 새로운 목표 의식이 심어졌습니다.\n\n벌써부터 그들은 오직 그들만이 진정으로 이해할 수 있는 웅장한 몸짓을 섞어가며, 열정적으로 하중과 평형추에 대해 논하고 있습니다. 이 프로젝트는 이제 단순한 계획이 아니라, 예술가의 캔버스가 되었습니다." # 12946453272758433448
  refortify_danubian_limes.0005.a: "지식은 우리의 가장 날카로운 무기다." # 5460186871019671426
  refortify_danubian_limes.0006.t: "성스러워진 노역" # 270280614005562817
  refortify_danubian_limes.0006.desc: "주군, 총대주교의 인장이 찍힌 칙령이 모든 야전 예배당과 노동자 진영에서 낭독되었습니다. 성하께서는 이 과업을 '모든 기독교 세계를 위한 방패'이자 하느님 보시기에 의로운 일이라고 선포하셨습니다. 노동자들 사이에 새로운 활력이 샘솟고 있으며, 그들은 이제 자신의 노고를 세속적인 짐이 아닌 기도의 한 형태로 여기고 있습니다.\n\n그들이 들어 올리는 돌 하나하나가 봉헌이며, 그들이 파는 도랑 하나하나가 신앙의 증거입니다." # 9482341774644092316
  refortify_danubian_limes.0006.a: "하늘이 우리의 근면함에 미소 짓고 있군." # 16915688042514307949
  refortify_danubian_limes.0007.t: "백색의 도시가 우뚝 섰습니다!" # 11191312314642963923
  refortify_danubian_limes.0007.desc: "주군, 태양 빛이 너무나도 하얀 성벽에 반사되어 마치 순결한 대리석을 깎아 만든 것처럼 보입니다. 거대한 서부 요새가 완공되었으며, 그 성벽은 열두 명의 남자가 나란히 걸을 수 있을 만큼 넓습니다. 설계도를 본 공성 전문가들은 그 완벽함과 교차 사계, 그리고 거대한 저수조를 보고 눈물을 흘렸다고 합니다. 우리의 판노니아 측면은 이제 단순히 방어되는 수준을 넘어, 무적의 요새가 되었습니다." # 18300704646115590522
  refortify_danubian_limes.0007.a: "판노니아를 막아낼 우리의 방벽" # 1771872306584013748
  refortify_danubian_limes.0008.t: "리메스의 두뇌" # 14050992451990167089
  refortify_danubian_limes.0008.desc: "주군이시여, 이제 지휘 성채가 본성에서 분리되어 요새 안의 요새로서 우뚝 섰습니다. 견고한 성벽 안의 작전실—*스트라테기온(strategion)*—에는 지도들이 즐비하며, 전령들이 명령과 첩보 보고서를 품고 끝없이 질서 정연하게 오가고 있습니다. 이 신경 중추를 통해 우리 지휘관들은 위협에 대해 놀라운 속도와 협동력으로 대응할 수 있습니다. 이것은 단순한 성벽이 아닙니다. 이것은 병기입니다." # 16060580835282209668
  refortify_danubian_limes.0008.a: "거인의 어깨 위에서" # 15755093596078449748
  refortify_danubian_limes.0009.t: "대하에 다리가 놓였습니다!" # 7495310915803531348
  refortify_danubian_limes.0009.desc: "주군이시여, 불가능이 현실로 나타났습니다. 거대한 다리가 물살에 맞서 당당히 서 있으며, 석재와 목재로 이루어진 띠가 드넓은 수면을 가로지르고 있습니다. 이제 우리 군단은 소문보다 빠르게 행군하여 북부 땅 깊숙이 타격을 가하고, 적들이 집결하기도 전에 돌아올 수 있습니다. 이 거대한 강은 더 이상 국경이 아닙니다. 그것은 우리가 극복한 장애물일 뿐이며, 우리의 의지를 증명하는 증거입니다." # 14356053794782043243
  refortify_danubian_limes.0009.a: "위대한 트라야누스를 기리며!" # 5934166248607257518
  refortify_danubian_limes.0010.t: "에우크시누스 항구가 무역을 위해 개방되었습니다!" # 9945140528076949857
  refortify_danubian_limes.0010.desc: "주군이시여, 북방의 위대한 파로스가 다시 불을 밝혔습니다. 그 빛줄기는 에우크시누스해의 어둠을 가르며 안전과 상업의 등대 역할을 하고 있습니다. 이제 공기 중에는 톱밥과 진흙 냄새를 압도하는 이국적인 향신료, 송진 타르, 바다 소금의 향기가 감돕니다. 이것은 순수한 이익의 향기이며, 이제 우리 금고로 직접 흘러드는 황금의 물결입니다. 이는 리메스가 앞으로 수년 동안 제값을 톡톡히 해낼 것임을 보장합니다." # 6521293041831913081
  refortify_danubian_limes.0010.a: "영광과 부를 가져다주기를." # 7758167514934011384
  refortify_danubian_limes.0011.t: "다뉴브강의 정적" # 16906792045612866840
  refortify_danubian_limes.0011.desc: "여러 속주의 부와 한 세대의 땀을 소모한 수년간의 노고 끝에, 다뉴브강에 기묘한 정적이 찾아왔습니다. 망치 소리는 멈췄고, 감독관들의 외침은 잦아들었으며, 공사장의 먼지도 마침내 가라앉았습니다. 그 자리에는 완성된 웅장한 리메스 모에시아가 서 있습니다.\n\n서쪽의 거점에서 에우크시누스 해안에 이르기까지, 석재와 강철로 이루어진 빈틈없는 방패가 이제 영역을 수호합니다. 공포의 시대는 끝났습니다. 한때 처벌받지 않고 약탈을 일삼던 소부족장들은 이제 우리의 드높은 탑을 바라보며 감히 강을 건너려 하지 않습니다. 자신들이 직접 세운 성벽 뒤에서 안전해진 변방의 백성들은 공포의 맛을 잊기 시작했습니다.\n\n이것은 지도 위의 단순한 선 그 이상입니다. 이것은 영속성의 선언이며, 당신의 비전과 의지를 기리는 기념비입니다. 다른 왕들이 모래성을 쌓을 때, 당신은 역사의 조류를 막아낼 방벽을 세우셨습니다\"" # 9955310157761918502
  refortify_danubian_limes.0011.a: "그리고 이제... 그들은 평화를 누릴 것입니다." # 11673651647124044440
  refortify_danubian_limes.0012.t: "폐허가 된 꿈" # 1719003635223436196
  refortify_danubian_limes.0012.desc: "다뉴브강에서 망치 소리가 멈췄습니다. 승리가 아니라, 지치고도 결정적인 패배 속에서 말입니다.\n\n부러진 치아 배열처럼 반쯤 완성된 성벽들이 비바람에 노출된 채 서 있습니다. 한때 거대한 공사에 쓰일 예정이었던 방대한 목재 더미는 이제 빗속에서 썩어가고 있습니다. 채석장에는 결코 쌓이지 못할 깎아 놓은 석재들이 가득 차 있으며, 이는 결코 지켜지지 않을 약속의 기념비가 되었습니다. 임금을 받지 못하고 노고가 수포로 돌아간 수천 명의 노동자는 공허한 눈빛과 우리의 어리석음에 대한 비통한 이야기를 품고 마을로 돌아가 흩어졌습니다.\n\n조정의 속삭임은 이제 규탄의 함성으로 변했습니다. 그들은 낭비된 국고와 피폐해진 봉신들, 그리고 우리의 수단을 훨씬 능가했던 야망에 대해 이야기합니다. 한때 안보의 기대로 활기찼던 변방은 이제 그 어느 때보다 약해지고 취약해졌으며, 수호자들은 환멸을 느끼고 자원은 고갈되었습니다.\n\n이것은 나의 비전을 기리는 기념비가 아니라, 나의 가장 원대한 야망을 위한 거대하고 방대한 묘비입니다. 제국적 규모의 실패를 보여주는 증거입니다." # 914242899899055267
  refortify_danubian_limes.0012.a: "쓰라리고 값비싼 교훈이군." # 1240567486363728673
  refortify_danubian_limes.0013.t: "시간이라는 인내심 강한 포위군" # 4534158438668120759
  refortify_danubian_limes.0013.desc: "파리스트리온 테마에서 암울한 전령이 도착했습니다. 스트라테고스는 군대나 침공이 아니라, 훨씬 더 교활한 적인 방치에 대해 적어 보냈습니다.\n\n그의 보고에 따르면, 한때 경계심 강한 파수꾼들이 지키던 감시 초소들은 이제 새들의 둥지와 늑대들의 굴이 되었으며, 지붕들은 계절의 끈질긴 공세 아래 무너져 내리고 있습니다. 한때 군단병들의 행군 소리가 울려 퍼지던 거대한 군도는 이제 상인들에게 위험한 길이 되었고, 잡초들이 돌 틈을 비집고 올라와 돌을 들어 올리고 있습니다. 심지어 거대한 요새의 성벽조차 무사하지 못했는데, 현지의 지주들이 자신의 저택을 짓기 위해 몰래 석재를 훔쳐 가면서 자신들을 보호하는 방패를 약화시키고 있습니다.\n\n급료는 종종 연체되고 멀리 떨어진 조정으로부터 그 목적조차 잊힌 주둔군은 나태해졌습니다. 그들의 군기는 농경적 무관심으로 바뀌었습니다. 그들은 순찰보다 채소밭을 가꾸는 데 더 열중하고 있습니다. 한때 불꽃과 야망으로 벼려졌던 제국의 방패는 얇고 부서지기 쉬워졌습니다. 이 변방에서 오래전에 추방되었던 옛 공포가 강변의 백성들의 마음속으로 다시 스며들기 시작했습니다.\n\n리메스 모에시아는 이제 존재하지 않습니다. 그 자리에는 무너져가는 폐허의 줄기와 희미해져 가는 안보의 기억만이 남아 있을 뿐입니다." # 3469012350844535441
  refortify_danubian_limes.0013.a: "그리하여 조상들의 위대한 업적이 사라져가는구나..." # 16147660886988478867
  MOESIA_LOCATION_TOOLTIP: "모에시아가 당신의 영역 내에 있음" # 9091841302564813405
  VIDIN_LOCATION_TOOLTIP: "비딘이 당신의 영역 내에 있습니다" # 12982903660674446832
  SYRMIA_LOCATION_TOOLTIP: "시르미아가 당신의 영역 내에 있습니다" # 12262278329147753529
  MACVA_LOCATION_TOOLTIP: "싱기두눔이 당신의 영역 내에 있습니다" # 3709954711782316487
  SCYTHIA_MINOR_LOCATION_TOOLTIP: "소 스키티아가 당신의 영역 내에 있습니다" # 2745129549832838218
  BRYSIS_LOCATION_TOOLTIP: "브리시스가 당신의 영역 내에 있습니다" # 15288231727034321068
  refortify_danubian_limes.0014.t: "보고: 석공의 작업 완료" # 14163101098269278568
  refortify_danubian_limes.0014.desc: "주군이시여, 감독관의 보고입니다. 석공들은 마지막 돌을 놓았고 목수들은 마지막 못을 박았습니다. 가장 참혹했던 부패의 흔적들은 지워졌습니다. 무너져 내리던 성벽 구간은 이제 온전하고 매끄럽게 서 있으며, 성벽 사이의 도로는 잡초와 잔해가 제거되었습니다. 부서진 성문은 단단한 참나무로 교체되었습니다. 방치로 인한 물리적 상흔이 치유되었습니다." # 877038068128806249
  refortify_danubian_limes.0014.a: "그들의 노고를 치하하노라." # 13556277945141717024
  refortify_danubian_limes.0015.t: "보고: 회계 결산 완료" # 13303756048316724623
  refortify_danubian_limes.0015.desc: "주군이시여, 병참관이 수리 물자에 대한 최종 회계 보고를 제출했습니다. 모든 석회 통, 모든 철제 부속품 수레, 그리고 모든 목재 치수가 성공적으로 조달되어 사용되었습니다. 새로운 모르타르는 고대의 석재들 사이를 단단히 고정하고 있으며, 신선한 목재들이 감시탑 지붕을 지탱하고 있습니다. 병참 업무가 마무리되었으며, 우리의 국경은 물적으로 다시 온전해졌습니다." # 8587502981781971030
  refortify_danubian_limes.0015.a: "훌륭하군!" # 6724443968343265358
  refortify_danubian_limes.0016.t: "보고: 방패를 닦아내다" # 2632851529411495789
  refortify_danubian_limes.0016.desc: "주군이시여, 국경으로 파견된 장교들이 최종 보고를 제출했습니다. 변화가 완료되었습니다. '둔전병'에서 '농민'의 면모가 씻겨 나갔으며, 남은 것은 단련되고 경계심 강한 정예 병력뿐입니다. 무관심은 준비성으로 대체되었고, 갑옷과 정신 모두에서 녹이 닦여 나갔습니다. 리미타네이는 다시 한번 제대로 된 군대로 거듭났으며, 그들의 순찰은 리메스에서 지속적이고 든든한 존재감을 드러내고 있습니다." # 8704079837322569780
  refortify_danubian_limes.0016.a: "제국은 이 국경의 수호자들 덕분에 건재하도다." # 13760228537232329161
  refortify_danubian_limes.0017.t: "영역의 새로운 관직" # 9638284275109402042
  refortify_danubian_limes.0017.desc: "주군이시여, 새로운 리메스 관리관이 공식적으로 임명되어 국경에 집무실을 마련했습니다. 정기 점검과 의무 유지보수 예산에 관한 그의 첫 칙령이 이미 현지 주둔군에 전달되었습니다. 사상 처음으로 단일 권위자가 우리 방어선의 장기적인 온전함을 책임지게 되었습니다. 리메스가 다시는 이토록 수치스러운 상태에 빠지지 않도록 책임의 연쇄가 구축되었습니다." # 11627827281744901619
  refortify_danubian_limes.0017.a: "그곳엔 조직적인 관리가 절실했지." # 14808208917741257811
  refortify_danubian_limes.0018.t: "리메스 모에시아가 복구되었습니다!" # 4709056467428740029
  refortify_danubian_limes.0018.desc: "리메스 관리관으로부터 만족스러운 최종 보고가 도착했습니다. 마지막 수리팀이 해산되었고, 마지막 회계가 결산되었으며, 마지막 주둔군이 최종 점검을 통과했습니다. 모든 작업이 끝났습니다.\n\n한때 부패와 쇠락이 지배하던 곳에 이제 질서가 자리 잡았습니다. 도로는 깨끗하고, 성벽은 온전하며, 감시탑은 침묵 속에서 확고한 파수꾼으로 서 있습니다. 오랫동안 국경을 괴롭혔던 방치의 공기는 고요한 유능함으로 대체되었습니다. 바람에 흔들리는 잡초 소리 대신 순찰대의 행군 소리가 들려옵니다.\n\n우리는 새로운 불가사의를 건설한 것이 아니라, 영광스럽지는 않더라도 훨씬 더 중요한 과업인 조상의 유산을 기리는 일을 완수했습니다. 우리는 망가진 것을 가져다 다시 강하게 만들었습니다. 녹을 닦아내고 밝게 빛나는 제국의 방패는 이제 다시 한번 영역을 수호하기에 적합해졌습니다." # 2600975555720237975
  refortify_danubian_limes.0018.a: "이 의무를 다시는 소홀히 하지 않도록 하라." # 11915197139993454217
  refortify_danubian_limes.0019.t: "부패가 승리하리라" # 11690752900914155283
  refortify_danubian_limes.0019.desc: "변방에서 들려오는 보고서의 내용은 참담하기 그지없습니다. 리메스 모에시아를 복구하려던 노력은 관리 부실과 금화 낭비라는 절망적인 수렁 속에 무너져 내렸습니다.\n\n반쯤 수리된 성벽은 방치되어 이전보다 훨씬 더 위태로운 상태가 되었습니다. 수리 인부들은 임금도 받지 못한 채 넌더리를 내며 떠나갔습니다. 새로 임명된 장교들은 환멸에 빠진 주둔군의 기강을 세우지 못한 채, 임무가 명백한 실패로 끝났음을 인정하며 수도로 돌아왔습니다.\n\n우리에게는 선조들의 유산을 기리고 그들이 세운 방패를 고칠 마지막 기회가 주어졌었습니다. 하지만 우리는 실패했습니다. 우리는 밑 빠진 독에 물 붓듯 돈을 쏟아부었을 뿐이며, 우리의 무력함은 모두가 볼 수 있도록 천하에 드러났습니다. 이제 리메스는 단순히 방치된 방어선이 아닙니다. 그것은 이제 길게 늘어선 폐허의 줄기에 불과하며, 우리 자신의 무력함을 증명하는 기념비가 되었습니다. 이 쇠락은 이제 돌이킬 수 없습니다." # 4298478927238703632
  refortify_danubian_limes.0019.a: "관 뚜껑에 박는 마지막 못이로군." # 17339098122119615517
  refortify_danubian_limes.0020.t: "보고: 드러난 기반" # 8277420881781275574
  refortify_danubian_limes.0020.desc: "주군, 고된 초기 단계가 완료되었습니다. 한때는 거의 보이지 않던 언덕과 무성한 폐허의 선이었던 곳이 이제 트라키아 지형을 가로지르는 넓고 통행 가능한 흔적이 되었습니다. 아나스타시아 성벽의 원래 석조 기초가 완전히 드러나 석공들을 맞이할 준비가 되었습니다. 이제 우리의 웅대한 설계를 위한 깨끗한 도화지가 마련되었습니다." # 8398367059335120795
  refortify_danubian_limes.0020.a: "지저분한 작업이었지만, 해야만 하는 일이었다." # 16760219673079354098
  refortify_danubian_limes.0021.t: "보고: 벽돌과 석재의 산" # 17488243139365993576
  refortify_danubian_limes.0021.desc: "주군, 프로젝트 병참 장교로부터 온 전갈입니다. 필요한 자재의 마지막 분량이 건설 현장에 전달되었습니다. 정리된 흔적을 따라 깎아낸 석재로 이루어진 인공적인 산과 석공의 흙손을 기다리는 붉은 벽돌의 거대하고 질서 정연한 피라미드들을 볼 수 있습니다. 공기는 산업의 먼지로 가득하며, 이제 성벽을 하늘 높이 쌓아 올리는 데 필요한 모든 것을 갖추었습니다." # 16307283546023179042
  refortify_danubian_limes.0021.a: "필요한 모든 물자가 전달되었습니다." # 10620950399637547558
  refortify_danubian_limes.0022.t: "보고: 비길레스가 초소에 배치되다" # 10966521632052791432
  refortify_danubian_limes.0022.desc: "주군, 새로운 *비길레스*가 훈련을 마쳤습니다. 그들은 정규 코호트로 조직되어 완공된 성벽 구간의 근무지에 공식적으로 배치되었습니다. 이제 감시탑에는 깃발이 휘날리고, 밤낮으로 성벽 위에서 순찰대의 규칙적인 발소리가 들립니다. 이제 성벽에는 맹세한 수호자들이 생겼습니다." # 11956452881224413629
  refortify_danubian_limes.0022.a: "굳건히 서라, 제국의 병사들이여!" # 6338254377362538914
  refortify_danubian_limes.0023.t: "성벽의 지휘관" # 8063750208011948784
  refortify_danubian_limes.0023.desc: "주군, 선택하신 백작이 장성에 대한 권한을 공식적으로 부여받았습니다. 그들은 성벽의 중앙 요새에 본부를 세우고 공병들과 주둔군 지휘관들의 노력을 조율하기 위한 칙령을 내리기 시작했습니다. 이제 모든 노력이 단일화된 통합 지휘 체계 아래 운영되어 최대의 효율성을 보장합니다." # 7432289081788344017
  refortify_danubian_limes.0023.a: "명예로운 임무의 시작이군" # 15143706017032112155
  refortify_danubian_limes.0024.t: "장성이 다시 서다" # 13019503512237940546
  refortify_danubian_limes.0024.desc: "장성 백작으로부터 온 전갈은 밀랍이 아닌 승리감에 찬 자부심으로 봉인되어 있었습니다. 마지막 돌이 놓였습니다. 마지막 탑의 지붕이 씌워졌습니다. 에욱시네해에서 프로폰티스까지, 끊어지지 않은 석조와 벽돌의 띠가 이제 트라키아 반도를 수호합니다.\n\n아나스타시아 성벽이 다시 살아났습니다. 그것은 더 이상 지형 위의 유령이 아니라 가공할 현실입니다. 성벽의 흉벽은 눈이 닿는 곳보다 더 멀리 뻗어 있고, 성문은 훈련된 비길레스가 지키고 있으며, 그 존재는 수도의 곡창 지대에 깊은 안정감을 가져다줍니다. 이제 트라키아의 농부들은 신뢰할 수 있는 방패의 그림자 아래에서 밭을 일굽니다.\n\n'도시들의 여왕'으로 진격하는 어떤 군대도 더 이상 영광으로 가는 명확한 길을 갖지 못할 것입니다. 그들은 금각만을 보는 꿈을 꾸기도 전에, 먼저 이 거대한 장애물을 마주하여 57킬로미터에 달하는 저항의 석벽 위에서 그들의 야망과 힘을 산산조각 내야 할 것입니다." # 5475793473250800078
  refortify_danubian_limes.0024.a: "도시들의 여왕이 새로운 방패 뒤에서 편히 잠드는구나." # 18319018363230185890
  refortify_danubian_limes.0025.t: "장대한 폐허" # 15934911305141337347
  refortify_danubian_limes.0025.desc: "트라키아에서 들려오는 보고는 건설이 아니라 붕괴의 소식입니다. 장성을 재건하려는 야심 찬 프로젝트는 완전히 실패했습니다.\n\n지형을 가로질러 반쯤 완성된 성벽과 버려진 참호의 길고 슬픈 흉터가 우리 웅대한 설계의 무덤을 표시하고 있습니다. 채석된 석재의 산은 이제 목자들의 피난처 역할만 할 뿐이며, 한때 수백만 개의 벽돌을 구워냈던 가마는 식어버렸습니다. 임금을 받지 못한 새로 편성된 비길레스는 초소를 버리고 우리의 어리석음에 대한 이야기를 퍼뜨리며 시골로 흩어졌습니다.\n\n우리는 성벽이 아니라 우리 자신의 오만을 기리는 기념비를 위해 거금을 탕진했습니다. 이 프로젝트는 이제 지역 주민들에게 '장대한 폐허'라고 조롱 섞인 이름으로 불리고 있습니다. 안보를 제공하는 대신 우리는 무능함만을 증명했을 뿐이며, 수도의 심장부를 그 어느 때보다 무방비 상태로 남겨두었습니다." # 2321545716693353942
  refortify_danubian_limes.0025.a: "만대에 남을 어리석음." # 10470905835861375850
  rule_great_project_culture: "문화 요구 사항 (동로마 대형 프로젝트 모드)" # 16139958388196327852
  setting_bgp_byzantine_and_ancient_greek: "기본값" # 8341519292606584866
  setting_bgp_byzantine_and_ancient_greek_desc: "비잔티움 또는 고대 그리스 유산을 보유한 문화의 인물만이 동로마 대형 프로젝트를 활용할 수 있습니다." # 12846602184099834371
  setting_bgp_anyone: "모든 문화" # 3408268860491668523
  setting_bgp_anyone_desc: "모든 문화가 동로마 대형 프로젝트를 활용할 수 있습니다." # 16401133737319385510
  rule_paulician_heresy: "867년 파울리키아파 이단 전쟁 (동로마 대형 프로젝트 모드)" # 11466965686891396668
  setting_bgp_paulicians_on: "기본값" # 8341519292606584866
  setting_bgp_paulicians_on_desc: "867년에 파울리키아파 이단들이 봉기하여 동로마 제국 내에 그들의 영역을 구축하려 할 것입니다." # 9042651697809378299
