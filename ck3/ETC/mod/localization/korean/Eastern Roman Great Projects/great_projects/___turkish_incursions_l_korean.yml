l_korean:
  roaming_turkish_bands_modifier: "유랑하는 튀르크 무리" # 14303874436308675546
  roaming_turkish_bands_modifier_desc: "투르크 무리의 끊임없는 습격으로 인해 이 백작령은 위험천만한 국경 지대가 되었습니다. 지역 경제는 붕괴하고 발전은 중단되었으며, 습격자들을 제외한 모두에게 이 땅은 위험하고 적대적인 지형이 되었습니다." # 16043743846246702063
  fortified_frontier_modifier: "요새화된 국경" # 12591005108244130757
  fortified_frontier_modifier_desc: "제국의 집중적인 노력 끝에 이 백작령은 평정되었으며 강력하게 요새화되었습니다. 새로운 방어 시설이 모든 위협에 맞설 준비를 마쳤고, 제국의 권위는 확고해졌으며, 백성들은 한 세대 동안 겪어보지 못한 안보를 누리고 있습니다." # 16715364352101325106
  abandoned_project_modifier: "포기된 계획" # 5982054631151379652
  abandoned_project_modifier_desc: "국경을 평정하려던 거대한 계획이 완공되기도 전에 포기되었습니다. 자원은 낭비되었고, 그와 함께 희망도 사라졌습니다. 나의 봉신들은 이를 나약함과 우유부단함의 상징으로 여기며, 이는 나의 치세에 쉽게 잊히지 않을 오점으로 남을 것입니다." # 12384114356344202411
  great_project_type_fortify_armenia: "아르메니아 요새화" # 7272899768248985355
  great_project_type_fortify_armenia_desc: "아르메니아 국경은 오랫동안 제국의 옆구리에 난 피 흘리는 상처와도 같았습니다. 끊임없는 습격으로 농촌은 황폐해졌고, 번영하던 테마들은 위험한 접경지로 변했습니다. 이제 국가의 온 힘을 이 지역에 쏟아부어 요새를 복구하고 산길을 확보하며, 이 핵심적인 영토에 대한 제국의 권위를 다시 세워야 할 때입니다." # 10896585294231703865
  great_project_type_tooltip_fortify_armenia: "아르메니아 국경을 평정하기 위한 일련의 군사적, 민간적 계획들" # 15691876153361478723
  great_project_type_fortify_armenia_contribution_walls_of_melitene: "멜리테네 성벽 복구" # 873009965405915480
  great_project_type_fortify_armenia_contribution_walls_of_melitene_desc: "멜리테네는 카파도키아로 향하는 관문이자 동쪽으로부터의 침입을 막는 중요한 방벽입니다. 한때 위용을 자랑하던 고대의 성벽은 방치와 반복된 공성전으로 인해 훼손되었습니다. 방어 시설의 완전한 복구와 현대화에 자금을 지원함으로써, 우리는 멜리테네를 난공불락의 요새이자 지역 전체에 대한 통제력을 공고히 할 제국 힘의 상징으로 탈바꿈시킬 수 있습니다." # 4556240176928503368
  great_project_type_fortify_armenia_contribution_manzikert_garrison: "만지케르트 주둔군 창설" # 16572189957099651202
  great_project_type_fortify_armenia_contribution_manzikert_garrison_desc: "만지케르트 인근의 들판은 우리의 가장 큰 슬픔과 굴하지 않는 결의를 동시에 증명하는 신성한 땅입니다. 이곳을 무방비 상태로 두는 것은 재앙을 자초하는 일입니다. 우리는 이곳에 보급이 원활한 상비 주둔군을 창설해야 합니다. 이 병사들은 요새를 방어할 뿐만 아니라 주변 지역을 적극적으로 순찰하며 배회하는 무리들을 소탕하고, 오랫동안 사라졌던 제국의 법을 다시 세울 것입니다." # 3733701986308582138
  great_project_type_fortify_armenia_contribution_secure_passes: "산길 확보" # 13942461901652453971
  great_project_type_fortify_armenia_contribution_secure_passes_desc: "습격자들은 대군을 이끌고 진군하는 대신 타우루스와 아르메니아 고원의 수많은 무방비한 산길을 통해 물처럼 흘러들어옵니다. 우리는 이 산맥을 제 집처럼 잘 아는 현지 출신의 정예 아크리토이 부대에 자금을 지원할 것입니다. 그들은 감시 초소를 세우고 매복을 수행하며, 기존의 습격 경로를 매우 위험한 곳으로 만들 것입니다." # 13564473333564787348
  great_project_type_fortify_armenia_contribution_rebuild_farms: "농경지 재건 후원" # 16042764125074920754
  great_project_type_fortify_armenia_contribution_rebuild_farms_desc: "빵 없이는 요새가 버틸 수 없고, 보급 없이는 군대가 유지될 수 없습니다. 아르메니아의 농경지는 체계적으로 황폐해졌으며, 백성들은 도망치거나 칼날에 쓰러졌습니다. 우리는 귀환을 원하는 정착민들에게 제국 보조금을 지급하고 세금을 면제해주며, 마을과 운하, 물레방아의 재건을 지원할 것입니다. 번영하고 인구가 많은 농촌은 그 자체로 훌륭한 방어선이 됩니다." # 9186670484488867766
  great_project_type_fortify_armenia_contribution_patronize_monasteries: "현지 수도원 후원" # 16879213613298493541
  great_project_type_fortify_armenia_contribution_patronize_monasteries_desc: "이 혼란스러운 시기에 신앙은 종종 평민들의 마지막 방패가 됩니다. 아르메니아의 수도원들은 성소이자 지식의 저장고이며 공동체 생활의 중심지 역할을 해왔습니다. 후원을 통해 우리는 그들의 생존을 보장할 뿐만 아니라 백성들의 마음을 얻을 수 있습니다. 그들의 기도는 우리의 노력을 축복할 것이며, 그들의 영향력은 옥좌에 대한 충성심을 강화할 것입니다." # 9575346459925079775
  VASPURAKAN_LOCATION_1_TOOLTIP: "바스푸라칸 테마가 귀하의 영역 내에 있음" # 78023204186953004
  MESOPOTAMIA_LOCATION_2_TOOLTIP: "메소포타미아 군관구가 당신의 영역 내에 있습니다" # 8029820418355632767
  turkish_incursions_events.0001.t: "멜리테네의 성벽이 솟아오르다" # 1509213870302887099
  turkish_incursions_events.0001.desc: "당신의 관대한 후원이 결실을 맺었습니다. 제국의 공병들과 수많은 석공들이 지칠 줄 모르고 일한 끝에, 멜리테네에서 날아온 보고서는 매우 고무적입니다. 낡고 허물어져 가던 성벽은 철거되었고, 더 높은 성벽과 강화된 탑을 갖춘 현대적인 요새로 대체되었습니다.\n\n이제 이 도시는 제국의 결의를 보여주는 증거이자, 미래의 침략자들을 주저하게 만들 강력한 보루로 우뚝 섰습니다. 멜리테네의 백성들은 황제께서 자신들을 잊지 않으셨음을 확신하며 당신의 이름을 찬양하고 있습니다." # 3561098980346613036
  turkish_incursions_events.0001.a: "제국 위엄의 보루입니다." # 7303485963453271981
  turkish_incursions_events.0002.t: "만지케르트 주둔군이 집결하다" # 17403280438562825042
  turkish_incursions_events.0002.desc: "당신의 명령에 따라, 직업 군인들로 구성된 파견대가 만지케르트 요새에 도착했습니다. 성벽 높이 솟아오른 그들의 빛나는 군기는 주변 지역에 새로운 질서와 안보를 가져다주었습니다.\n\n더 이상 튀르크 무리들이 이 역사적인 들판을 마음대로 휘젓고 다니지 못할 것입니다. 주둔군 지휘관은 이미 공격적인 순찰을 시작했으며, 오랫동안 공포에 익숙해져 있던 현지 주민들은 마침내 안도의 한숨을 내쉴 수 있게 되었습니다. 교훈은 명확합니다. 제국의 권위가 돌아왔다는 것입니다." # 3946475346139411668
  turkish_incursions_events.0002.a: "질서가 회복되었습니다." # 14297071720841476897
  turkish_incursions_events.0003.t: "고갯길이 확보되다" # 7854923399635294990
  turkish_incursions_events.0003.desc: "당신의 국고로 자금을 지원받은 노련한 아크리토이들이 그 가치를 수백 번 증명해 냈습니다. 아르메니아 고원에 대한 그들의 해박한 지식 덕분에 매번 습격자들보다 한발 앞서 움직일 수 있었습니다. 이제 주요 경로에는 감시탑들이 파수꾼처럼 서 있으며, 매복 공격을 받은 전쟁 무리들의 불탄 잔해는 다른 이들에게 엄중한 경고가 되고 있습니다.\n\n튀르크인들 사이에서는 산맥이 더 이상 안전한 통로가 아니라는 소문이 빠르게 퍼지고 있습니다. 이 국경 전사들의 용맹함 덕분에 군관구로 유입되는 습격자들의 물결은 미미한 수준으로 줄어들었습니다." # 10673087248616492721
  turkish_incursions_events.0003.a: "그들의 용맹함은 잊히지 않을 것입니다." # 1551322997080358102
  turkish_incursions_events.0004.t: "땅이 회복되다" # 4360799655180602276
  turkish_incursions_events.0004.desc: "제국의 보조금 약속은 황폐해진 아르메니아의 농지에 다시 생기를 불어넣었습니다. 한때 불탄 들판과 버려진 마을뿐이었던 곳에 이제 새로운 정착지들이 뿌리를 내리고 있습니다. 새로운 아궁이에서 피어오르는 연기와 다시 돌아가는 물레방아 소리는 우리 부활의 강력한 상징입니다.\n\n생산적인 농민들의 귀환은 경제를 활성화할 뿐만 아니라 이 땅에 대한 우리의 지배력을 강화합니다. 인구가 많고 번영하는 농촌이야말로 안전한 국경의 진정한 토대입니다." # 2662469034322125910
  turkish_incursions_events.0004.a: "우리 힘의 근간은 땅에 있습니다." # 6292832911459125934
  turkish_incursions_events.0005.t: "교회의 축복" # 3919548368214786017
  turkish_incursions_events.0005.desc: "당신의 경건함은 헛되지 않았습니다. 당신의 후원으로 새로이 풍족해진 아르메니아의 수도원들은 혼란 속에서 희망의 등불이 되었습니다. 그들은 가난한 이들에게 자선을 베풀고, 병자를 돌보며, 실향민들에게 안식처를 제공합니다.\n\n그 대가로 수도원장들은 설교단에서 옥좌에 대한 충성을 설교하고, 수도사들은 당신의 과업 성공과 영혼의 안녕을 위해 매일 기도를 올립니다. 교회에 대한 당신의 지원은 백성들 사이에서 정의롭고 경건한 통치자로서의 명성을 확고히 해주었습니다." # 8588915519075585074
  turkish_incursions_events.0005.a: "우리의 경건함 그 자체가 보상입니다." # 4385652395400153674
  master_of_fortifications_modifier: "축성의 달인" # 12557332485371805042
  master_of_fortifications_modifier_desc: "멜리테네 성벽의 대규모 재건을 감독하면서 대규모 공학 및 병참에 대한 귀중한 통찰력을 얻었다. 이 교훈들은 분명 향후 건설 사업에 도움이 될 것이다." # 4711012011395761438
  frontier_commander_modifier: "국경 지휘관" # 285534141739385444
  frontier_commander_modifier_desc: "불안정한 지역에 상시 주둔군을 편성하면서 나의 군사적, 행정적 기술이 연마되었다. 국경지대에서 질서를 유지하고 권위를 투사하는 법에 대해 많은 것을 배웠다." # 2285052810466568964
  akritoi_patron_modifier: "아크리토이 후원자" # 15419245892081211794
  akritoi_patron_modifier_desc: "아크리토이에 대한 나의 후원은 단순히 안전한 통행로 확보 이상의 성과를 거두었습니다. 그들의 유격 전술과 국경 지대 전투를 연구하면서, 나는 매복의 기술과 개인적 용맹의 중요성을 새롭게 깨닫게 되었습니다." # 10062943479509199451
  imperial_reclaimer_modifier: "제국의 복구자" # 14438443766593147956
  imperial_reclaimer_modifier_desc: "황폐해진 농경지 재건을 후원함으로써, 나는 경제 회복에 대한 깊은 이해를 얻었습니다. 번영하는 농민층은 강한 국가의 초석이며, 나의 직할령 또한 이 지식으로부터 혜택을 입을 것입니다." # 4117672182274912083
  church_patronage_modifier: "교회 후원자" # 17755009209213470124
  church_patronage_modifier_desc: "지역 수도원들에 대한 나의 관대한 후원은 나에게 경건하고 자비로운 통치자라는 명성을 안겨주었습니다. 신자들의 기도가 나를 따르고, 성직자들은 경외심을 담아 나의 이름을 부릅니다." # 6307748381524922828
  turkish_incursions_events.1000.t: "아르메니아 국경이 확보되다" # 12925338646740196939
  turkish_incursions_events.1000.desc: "황실의 비단으로 묶인 최종 보고서가 궁전에 도착했습니다. 수년간의 끊임없는 노력과 막대한 비용 끝에, 대사업이 완료되었습니다. 한때 제국의 옆구리에 난 피 흘리는 상처였던 아르메니아 국경은 이제 지져지고 보호받게 되었습니다.\n\n멜리테네의 새로운 성벽은 그 어떤 침략자도 거부합니다. 만지케르트 주둔군은 우리의 권위를 널리 떨치고 있습니다. 강인한 아크리토이는 산길을 장악하여 무모한 자들을 위한 죽음의 함정으로 만들었습니다. 그 아래에서는 농부들이 밭으로 돌아오며 땅이 치유되고 있으며, 그들의 노고는 내가 관대하게 후원한 수도원들의 기도로 인해 이중으로 축복받고 있습니다.\n\n떠돌이 튀르크 무리들의 시대는 끝났습니다. 평화와 의심할 여지 없는 제국의 권위가 아르메니아로 돌아왔습니다." # 5038426127029365222
  turkish_incursions_events.1000.a: "제국 의지의 승리로다!" # 652513374230631990
  turkish_incursions_events.1001.t: "아르메니아 사업이 중단되다" # 11727322728639762398
  turkish_incursions_events.1001.desc: "부담이 너무 큽니다. 제국 국고에서는 금화가 빠져나가고, 군단은 다른 곳에 필요하며, 나의 의지는 흔들리기 시작합니다. 나는 아르메니아 안정을 위한 대사업을 중단한다는 포고령을 내릴 수밖에 없습니다.\n\n작업이 중단되었습니다. 절반만 지어진 멜리테네의 성벽은 이제 우리의 야망을 조롱합니다. 아르메니아 백성들에게 약속했던 안전은 깨졌고, 땅은 여전히 취약한 상태로 남았습니다. 나의 봉신들은 이 나약함을 잊지 않을 것이며, 이 실패의 무게가 내 영혼을 무겁게 짓누릅니다." # 8828772508902484707
  turkish_incursions_events.1001.a: "쓰라리지만, 어쩔 수 없는 일이지..." # 11162073944924676683
  CILICIA_LOCATION_1_TOOLTIP: "킬리키아 테마가 영역 내에 있음" # 1216271386220112186
  CHARSIANON_LOCATION_2_TOOLTIP: "카르시아논 테마가 영역 내에 있음" # 17571553776062283711
  CAPPADOCIA_LOCATION_3_TOOLTIP: "카파도키아 테마가 영역 내에 있음" # 790366351243141961
  great_project_type_fortify_anatolia: "아나톨리아 요새화" # 4616865488025381962
  great_project_type_fortify_anatolia_desc: "아나톨리아는 제국의 심장이지만, 그 방어선은 무너졌고 백성들은 튀르크 약탈자들의 끊임없는 위협 아래 고통받고 있습니다. 오래된 테마 제도는 한계점에 도달했으며, 대도시들은 더 이상 예전처럼 난공불락의 요새가 아닙니다.\n\n오직 제국의 일치단결된 노력, 즉 거대한 규모의 대사업만이 우리 심장부의 안전을 회복할 수 있습니다. 우리는 요새를 재건하고, 고대 도로를 복구하며, 에게해 해안부터 타우루스 산맥에 이르기까지 제국의 권위를 재확립해야 합니다. 이는 기념비적인 과업이 될 것이나, 제국의 존속이 여기에 달려 있습니다." # 7699407000373095925
  great_project_type_tooltip_fortify_anatolia: "아나톨리아의 핵심 지역을 확보하기 위한 대규모 사업을 시작합니다." # 11464315157712958697
  great_project_type_fortify_anatolia_confirm: "제국의 심장은 보호받아야 한다" # 15590993557747873798
  great_project_type_fortify_anatolia_contribution_kaisereia: "카이세레이아 재요새화" # 15693504595246548865
  great_project_type_fortify_anatolia_contribution_kaisereia_desc: "위대한 도시 카이사레이아는 카파도키아의 전략적 거점입니다. 고대 성벽의 완전한 재건을 지원함으로써, 우리는 동부 고원을 장악하고 현지 주민들의 충성심을 고취할 가공할 요새를 구축할 것입니다." # 15453445127300103350
  great_project_type_fortify_anatolia_contribution_cilician_gates: "킬리키아 관문 확보" # 13420224028684274104
  great_project_type_fortify_anatolia_contribution_cilician_gates_desc: "킬리키아 관문은 아나톨리아 고원과 남부를 잇는 역사적인 관문입니다. 수천 년 동안 군대들이 이 핵심 통로를 거쳐 행군해 왔습니다. 이 요충지를 장악하기 위해 일련의 새로운 요새와 감시 초소를 건설함으로써, 우리는 약탈자와 침략자들의 앞길을 효과적으로 차단할 수 있습니다." # 10794737673818950780
  great_project_type_fortify_anatolia_contribution_veteran_settlements: "퇴역 군인들에게 토지 하사" # 10325425740593164006
  great_project_type_fortify_anatolia_contribution_veteran_settlements_desc: "인구가 줄어든 아나톨리아의 토지는 약탈자들에게 무방비 상태나 다름없습니다. 중앙군 출신의 충성스러운 퇴역 군인들에게 토지를 하사함으로써, 우리는 농번기에는 농사를 짓고 전시에는 병사가 되는 둔전병 계층으로 변방을 다시 채울 수 있습니다. 단련된 이들은 자신들의 새로운 터전을 지키는 데 직접적인 이해관계를 가지게 될 것이며, 어떠한 침입에도 맞서는 강철 같은 방벽과 결의를 형성할 것입니다." # 14092767912096430516
  great_project_type_fortify_anatolia_contribution_roads: "로마 도로 복구" # 14075208351547214660
  great_project_type_fortify_anatolia_contribution_roads_desc: "우리 로마 조상들의 장대한 도로망은 관리가 소홀해져 황폐해졌고, 이로 인해 우리 군대의 이동이 늦어지고 상업이 위축되었습니다. 대대적인 투자를 통해 길을 닦고, 다리를 재건하며, 새로운 이정표를 세움으로써 우리 군단이 어떤 위협에도 신속하게 대응할 수 있도록 할 것입니다." # 6772683234984366395
  great_project_type_fortify_anatolia_contribution_watchtowers: "감시 초소망 구축" # 13969528905066062888
  great_project_type_fortify_anatolia_contribution_watchtowers_desc: "아나톨리아의 테마들은 광활하며, 약탈자들은 예고 없이 습격해 올 수 있습니다. 전략적 요충지인 산 정상마다 서로 연결된 감시 초소망을 구축함으로써, 우리는 봉화를 이용한 조기 경보 체계를 갖추고 수비대가 침입을 저지할 수 있는 귀중한 시간을 확보할 수 있습니다." # 21117209654331102
  turkish_incursions_events.0006.t: "굴하지 않는 카이사레이아" # 18314105904634910470
  turkish_incursions_events.0006.desc: "제국 국고에서 지출된 막대한 자금이 훌륭하게 사용되었습니다. 보고에 따르면 카이사레이아의 성벽은 완전히 복구되었으며 현대적인 기술로 개량되었습니다. 성탑은 더 높게 솟아 있고 성문은 철로 보강되었으며, 새로운 방벽 뒤에서 안전을 보장받은 백성들은 거리에서 귀하의 이름을 연호하고 있습니다." # 999754201419240929
  turkish_incursions_events.0006.a: "진정한 제국의 도시가 다시 태어났군!" # 9063957337144615197
  turkish_incursions_events.0007.t: "굳게 닫힌 관문" # 14087293026864559815
  turkish_incursions_events.0007.desc: "강력한 호위대의 보호를 받는 제국 공병들이 험난한 킬리키아 관문에서의 작업을 완료했습니다. 이제 새로운 석조 요새들이 통로의 고지대를 장악하고 있으며, 수비대는 상시 경계 태세를 갖추고 있습니다. 이곳을 통과하려는 적대 세력은 이제 죽음의 시련에 직면하게 될 것입니다. 아나톨리아로 향하는 관문은 이제 확고히 우리의 손아귀에 들어왔습니다." # 6717985496288279391
  turkish_incursions_events.0007.a: "이제 통과할 테면 해보라지." # 394014098076389682
  turkish_incursions_events.0008.t: "검과 쟁기" # 5535023443449771044
  turkish_incursions_events.0008.desc: "귀하의 칙령은 열렬한 환영을 받았습니다. 아나톨리아의 모든 테마에서 퇴역한 타그마타 대원들이 군화를 벗고 토지 문서를 받고 있습니다. 이들은 단순한 농부가 아닙니다. 이들은 자신의 집을 작은 요새처럼 짓고 아들들에게 검술을 가르치는 단련된 전사들입니다.\n\n변방의 인구가 다시 채워질 뿐만 아니라, 어떤 약탈자라도 재고하게 만들 정도로 군사화되고 있습니다. 무엇보다 중요한 것은, 황좌에 대한 이들의 충성심이 흔들림 없다는 점입니다." # 3022215729260846876
  turkish_incursions_events.0008.a: "노병들을 위한 새로운 보금자리로군." # 11358984824724748516
  turkish_incursions_events.0009.t: "제국의 동맥이 흐르다" # 1999342036745792251
  turkish_incursions_events.0009.desc: "아나톨리아의 옛 로마 도로가 다시 살아났습니다! 수많은 인부가 수십 년간 무성했던 잡풀을 제거하고, 무너져가는 다리를 수리하며, 새로이 포장했습니다. 이제 우리 군대는 놀라운 속도로 이동할 수 있으며, 상인과 순례자들이 안전하고 신뢰할 수 있는 제국 고속도로를 여행함에 따라 상업이 활성화되었습니다." # 5310848957114312913
  turkish_incursions_events.0009.a: "모든 길은 콘스탄티노폴리스로 통하며... 우리의 군단이 그 길을 행진하노라." # 13695677994385675897
  turkish_incursions_events.0010.t: "아나톨리아의 봉화" # 13446934930781100697
  turkish_incursions_events.0010.desc: "봉우리에서 봉우리로, 신호용 불꽃이 이제 준비를 마쳤습니다. 새로운 감시탑망이 완성되었으니, 이는 제국의 독창성을 보여주는 빛나는 사례입니다. 약탈대가 발견되는 즉시 연기와 불꽃의 사슬이 지역 전체에 경보를 울릴 것입니다. 오랫동안 약탈자들의 가장 강력한 무기였던 기습의 이점은 이제 그들에게서 사라졌습니다." # 149450552452039160
  turkish_incursions_events.0010.a: "그들이 오는 것을 보게 될 것이다." # 18124168938008404986
  master_builder_modifier: "건축의 거장" # 18114409179799048391
  master_builder_modifier_desc: "카이사레이아의 거대한 성벽 복구를 감독하면서 대규모 공학 및 도시 요새화에 대한 귀중한 통찰력을 얻었습니다." # 17379362338188986642
  guardian_of_the_pass_modifier: "관문의 수호자" # 4202029163686199066
  guardian_of_the_pass_modifier_desc: "킬리키아 관문을 확보하는 데 집중함으로써 전략적 요충지와 산악 지형에서의 방어전에 대한 이해를 높였습니다." # 15427048783021734767
  veteran_settler_modifier: "퇴역병의 정착자" # 18168253073858590653
  veteran_settler_modifier_desc: "국경 지대에 충성스러운 퇴역병들을 정착시킴으로써 영토를 확보하고 병사들의 충성을 얻었습니다. 이 경험을 통해 군 복무와 토지 소유 사이의 시너지 효과에 대해 많은 것을 배웠습니다." # 12938954505198158220
  road_warden_modifier: "도로 관리관" # 3108744783911798025
  road_warden_modifier_desc: "고대 도로를 복구하려는 기념비적인 노력 덕분에 병참에 대한 독특한 이해를 갖게 되었습니다. 행군하는 군대는 굶주린 군대이며, 이제 나는 군대에 보급을 유지하는 최선의 방법을 알고 있습니다." # 6555346603425484972
  vigilant_ruler_modifier: "경계심 강한 통치자" # 11270516362600523766
  vigilant_ruler_modifier_desc: "감시탑망을 조직하면서 정보와 조기 경보의 지대한 중요성을 깨달았습니다. 위협이 다가오는 것을 보는 것은 이미 절반은 승리한 것이나 다름없습니다." # 16200022830793628751
  turkish_incursions_events.2000.t: "아나톨리아는 안전하다" # 7368895447037289840
  turkish_incursions_events.2000.desc: "수년간의 끊임없는 노력과 막대한 비용 끝에 대업이 완성되었습니다. 제국의 중심지가 탈바꿈했습니다. 요새화된 도시들은 요지부동의 닻처럼 서 있고, 감시탑은 언덕을 지키며, 도로는 빠르고 안전해졌으며, 제국 수비대는 온 땅의 공포의 대상이 되었습니다.\n\n한때 이 땅을 괴롭혔던 튀르크 약탈자들은 이제 사냥당하고 쫓기는 처지가 되었으며, 그들이 손쉽게 약탈하던 시대는 끝났습니다. 아나톨리아 민중에게 평화와 안보의 새로운 시대가 밝았으니, 이 모든 것은 나의 비전과 결단력 덕분입니다." # 13231643599985430095
  turkish_incursions_events.2000.a: "시대를 초월한 승리로다!" # 14405431815826747000
  turkish_incursions_events.2001.t: "무너지는 아나톨리아의 꿈" # 15996824651065090327
  turkish_incursions_events.2001.desc: "국고는 비었고 의지는 꺾였습니다. 더 이상 아나톨리아를 요새화하려는 거대한 노력을 유지할 수 없습니다. 반쯤 완성된 성벽, 버려진 작업 캠프, 포장되지 않은 도로들은 이제 나의 실패를 상징하는 기념비로 남아 있습니다.\n\n소식은 들불처럼 번져나가고 적들은 기뻐합니다. 봉신들은 나의 나약함을 속삭이고, 안보에 대한 희망이 꺾인 아나톨리아 민중은 다시 절망에 빠집니다. 오늘은 제국에게 어두운 날이며, 나의 유산에 깊은 얼룩이 남은 날입니다." # 15030798856963658911
  turkish_incursions_events.2001.a: "뼈아픈 실패로군..." # 5389520978205125811
  SEBASTEIA_LOCATION_2_TOOLTIP: "세바스테이아 테마가 귀하의 영내에 있음" # 1399092108103513806
  CHALDIA_LOCATION_1_TOOLTIP: "칼디아 테마가 귀하의 영내에 있음" # 3947721269646976435
  great_project_type_fortify_pontus: "폰토스 요새화" # 14084278893059719444
  great_project_type_fortify_pontus_desc: "흑해의 독수리 둥지인 폰토스는 온갖 역경 속에서도 로마의 정체성을 끈질기게 고수하고 있습니다. 하지만 우리의 지배력은 위협받고 있습니다. 우리를 보호하는 고대의 산맥은 약탈자들의 통로가 되었고, 튀르크의 물결은 아르메니아 고원의 남쪽 국경까지 밀려오고 있습니다.\n\n이 중요하고 충성스러운 지역을 확보하기 위해, 우리는 대업을 시작해야 합니다. 거대한 요새 도시들을 재건하고, 해안선을 확보하며, 폰토스인들의 무용을 결집할 것입니다. 이 땅은 오랫동안 제국의 보루였습니다. 이제 그 토대를 강화할 때입니다." # 8135603189673962171
  great_project_type_tooltip_fortify_pontus: "폰토스 해안과 산악 국경을 확보하기 위한 대규모 프로젝트를 시작합니다." # 7426596889367943290
  great_project_type_fortify_pontus_confirm: "흑해 해안은 우리의 것이어야 한다" # 9591647974010586142
  great_project_type_fortify_pontus_contribution_trebizond: "트라페준타 성벽 재건" # 3417540628206641506
  great_project_type_fortify_pontus_contribution_trebizond_desc: "트라페준타는 단순한 도시가 아닙니다. 폰토스의 심장이자 영혼이며 상징입니다. 고대부터 건설과 재건을 반복해 온 전설적인 성벽은 이제 대대적인 보강이 절실합니다. 이 요새들에 대한 전면적인 개보수 자금을 지원함으로써, 우리는 에욱시노스의 여왕을 난공불락의 요새이자 제국 권력의 당당한 등대로 만들 것입니다." # 3118052650332454662
  great_project_type_fortify_pontus_contribution_theodosiopolis: "테오도시우폴리스 수비대 재배치" # 1258052693463825456
  great_project_type_fortify_pontus_contribution_theodosiopolis_desc: "요새 도시 테오도시우폴리스는 아르메니아 고원에서 내려오는 통로를 지키는 동부 국경 전체의 전략적 요충지입니다. 도시 자체는 방어할 만하지만, 수비대는 이름뿐인 수준입니다. 우리는 그곳에 독자적인 지휘 체계와 보급 부대를 갖춘 강력한 상비군 타그마를 새로 창설하여, 힘을 과시하고 동부의 어떠한 침략도 저지해야 합니다." # 17855727084536160575
  great_project_type_fortify_pontus_contribution_coastal_patrols: "해안 순찰대 창설" # 16645355153029395049
  great_project_type_fortify_pontus_contribution_coastal_patrols_desc: "폰토스의 부는 흑해 위를 항해하지만, 해적과 적의 약탈자들 또한 우리의 어선단과 상선을 노리고 항해합니다. 쾌속 순찰선으로 구성된 새로운 함대를 배치하고 주요 정박지를 요새화함으로써, 우리는 항로를 깨끗이 청소하고 상업을 보호하며 해안선이 취약점이 아닌 방패가 되도록 할 수 있습니다." # 13345742392728158149
  great_project_type_fortify_pontus_contribution_mountain_watch: "산악 감시단 자금 지원" # 12038054686654823697
  great_project_type_fortify_pontus_contribution_mountain_watch_desc: "폰토스 알프스는 우리의 가장 큰 방어선이지만, 사납고 독립적인 부족들과 숨겨진 통로들의 거처이기도 합니다. 지역 산악 부족들에게 넉넉한 자금과 무기, 그리고 제국 칙령을 제공함으로써, 우리는 그들을 '산악 감시단'으로 공식화할 수 있습니다. 이들은 모든 비밀 통로를 꿰고 있는 충성스러운 유격대가 되어, 침략자들이 산맥을 통과하는 길을 생지옥으로 만들 것입니다." # 7010555085609935978
  great_project_type_fortify_pontus_contribution_monasteries: "폰토스 수도원 후원" # 7472082426270952361
  great_project_type_fortify_pontus_contribution_monasteries_desc: "신앙은 폰토스의 결의를 지탱하는 근간입니다. 영광스러운 수멜라와 같은 고대부터 숭상받아 온 수도원들은 단순히 경건함의 중심지일 뿐만 아니라, 험준한 산맥 속 문명과 학문의 중심지이기도 합니다. 관대한 후원은 성직자들의 변치 않는 충성과 신자들의 끊임없는 기도를 이끌어낼 것이며, 신과 인간의 눈에 우리의 대의를 신성하게 만들 것입니다." # 7187847688998581196
  turkish_incursions_events.0011.t: "우뚝 선 에욱시노스의 여왕" # 2097433940659460630
  turkish_incursions_events.0011.desc: "뛰어난 공학 기술과 풍부한 제국의 황금이 기적을 일으켰습니다! 트라페준타 성벽이 완전히 복구되어 지난 한 세기 동안 어느 때보다 높고 견고하게 솟아올랐습니다. 성탑 위에는 황실의 깃발이 당당히 휘날리며 모든 적에게 분명한 메시지를 보냅니다. 이 도시는 굴복하지 않는다고 말입니다." # 6757089543543555352
  turkish_incursions_events.0011.a: "우리의 유산에 걸맞은 요새로군!" # 3837388119957387742
  turkish_incursions_events.0012.t: "동부의 방패에 병력이 배치됨" # 8598030678980861566
  turkish_incursions_events.0012.desc: "테오도시우폴리스에 새로운 타그마가 공식적으로 창설되었습니다. 규율 잡힌 수천 명의 병사들이 갑옷을 번뜩이며 거리를 행진하고 있으며, 요새는 더 이상 잠자는 거인이 아닌 경계심 강하고 강력한 보루가 되었습니다. 타그마의 존재는 고원 국경 전체를 안전하게 지켜주고 있으며, 지휘관은 현지의 튀르크 베이들이 이미 훨씬 더 '협조적'이라는 소식을 보내왔습니다." # 13125198991851429905
  turkish_incursions_events.0012.a: "동방의 무리들이 경계하게 하십시오." # 797993006628358243
  turkish_incursions_events.0013.t: "흑해는 우리의 것이다" # 13526574340447316259
  turkish_incursions_events.0013.desc: "새로운 순찰 함대가 출항하여 큰 성과를 거두었습니다. 이미 여러 해적 소굴이 불타 없어졌으며, 상선 선장들은 바닷길이 기억하는 한 그 어느 때보다 안전해졌다고 보고하고 있습니다. 연안 마을에서 바치는 어획물과 교역품 공물이 눈에 띄게 늘어났으며, 백성들은 제국의 방패에 감사하고 있습니다." # 211676554213832657
  turkish_incursions_events.0013.a: "안전한 바다는 번영하는 해안을 가져옵니다." # 16795555147215491440
  turkish_incursions_events.0014.t: "산에는 눈이 있다" # 7774084021324818485
  turkish_incursions_events.0014.desc: "산악 부족들에 대한 귀하의 후원은 큰 성공을 거두었습니다. 그들은 제국 산악 감시대로서의 새로운 역할을 열렬히 받아들였습니다. 그들은 고향 산천만큼이나 거칠고 다루기 힘들지만, 이제 그들의 충성심은 우리를 향하고 있습니다. 그들은 이미 여러 약탈 부대를 매복 공격했으며, 살아남은 소수에게 공포스러운 이야기를 들려주어 돌려보냈습니다. 이제 산길은 안전합니다." # 6853791447335337795
  turkish_incursions_events.0014.a: "적보다는 아군으로 두는 것이 낫습니다." # 9545187264762916020
  turkish_incursions_events.0015.t: "신실한 자들의 축복" # 9005426742886140035
  turkish_incursions_events.0015.desc: "폰토스의 위대한 수도원장들이 기쁨의 눈물을 흘리며 귀하의 기부금을 받았습니다. 귀하를 기리는 교회 종소리가 계곡 전체에 울려 퍼지고 있으며, 수도사들은 제국의 번영을 위한 일일 기도문에 귀하의 이름을 추가했습니다. 경건하고 현명한 통치자로서 귀하의 명성은 폰토스 백성들의 가슴속에 굳건히 자리 잡았습니다." # 6940807485829693940
  turkish_incursions_events.0015.a: "그들의 기도가 우리의 힘입니다." # 6198527352785856614
  pontic_warden_modifier: "폰토스의 수호자" # 7628800229199234836
  pontic_warden_modifier_desc: "트라페준타의 대규모 재요새화를 조직하면서 군수 지원과 대규모 방어 건축에 대한 깊은 이해를 얻었습니다." # 16734304428193491068
  shield_of_the_east_modifier: "동방의 방패" # 1075619100552856904
  shield_of_the_east_modifier_desc: "적대적인 국경 지대에 새로운 야전군을 창설하면서 군사 행정과 외교 능력을 연마했습니다." # 6571537780709717665
  admiral_of_the_euxine_modifier: "에욱시노스의 제독" # 3646271301151836870
  admiral_of_the_euxine_modifier_desc: "흑해에 집중함으로써 무역을 확보하고 해안선을 방어하는 데 있어 해상 순찰이 수행하는 중요한 역할에 대해 많은 것을 배웠습니다." # 12781720639613165115
  chief_of_the_highlanders_modifier: "고산지대인의 추장" # 1039777992929699198
  chief_of_the_highlanders_modifier_desc: "기개 높은 산악 부족들과 함께 일하며 비정규전과 비전통적인 군대를 강력한 자산으로 바꾸는 방법에 대한 귀중한 교훈을 얻었습니다." # 18048975636406634745
  blessed_ruler_modifier: "축복받은 통치자" # 9767323744524365323
  blessed_ruler_modifier_desc: "폰토스 수도원들에 대한 나의 관대한 후원 덕분에 경건하다는 명성을 얻었다. 신자들의 기도 덕분에 힘이 솟는 기분이다." # 14063559694197782242
  turkish_incursions_events.3000.t: "난공불락의 폰토스" # 11229259560846317517
  turkish_incursions_events.3000.desc: "대사업이 승리 속에 마무리되었습니다. 트라페준타의 강력한 성벽부터 테오도시우폴리스의 경계 태세를 갖춘 주둔군에 이르기까지, 폰토스는 진정한 요새로 탈바꿈했습니다.\n\n해로는 안전하며, 산길은 충성스러운 고지대인들이 감시하고 있고, 유서 깊은 수도원들의 축복이 우리의 통치를 신성하게 합니다. 남쪽의 약탈자들은 이제 탐욕이 아닌 두려움으로 우리 땅을 바라봅니다. 폰토스는 흑해의 보석으로서 영원히 우뚝 서 있으며, 백성들은 안전하고 그들의 미래는 나의 확고한 의지로 보장받을 것입니다." # 15575797820013166664
  turkish_incursions_events.3000.a: "이것을 나의 유산으로 삼으리라!" # 10144943416530426696
  pontic_bulwark_modifier: "폰토스의 방벽" # 4830983423719624549
  pontic_bulwark_modifier_desc: "기념비적인 제국 사업을 통해, 이 백작령은 철저히 요새화되고 군사화되었습니다. 이제 이 지역에서 제국 권력의 핵심 거점 역할을 수행합니다." # 3118263535804434363
  turkish_incursions_events.3001.t: "사라져가는 폰토스의 희망" # 2045210920660231527
  turkish_incursions_events.3001.desc: "제국 전령들이 폰토스에 암울한 소식을 전해왔습니다. 사업이 취소되었습니다. 자금은 바닥났고 국가의 관심은 다른 곳으로 돌려야만 합니다. 반쯤 완성된 감시 초소와 급료를 받지 못한 용병들은 우리가 어긴 약속의 증거입니다.\n\n안전한 미래를 꿈꿨던 트라페준타의 백성들은 이제 다시금 두려움에 떨며 산과 바다를 바라봅니다. 한때 희망과 함께 불렸던 나의 이름은 이제 어촌과 산골 마을에서 저주를 받고 있습니다. 이 실패는 내게 무거운 짐이 될 것입니다." # 6213906450679542230
  turkish_incursions_events.3001.a: "우리가 그들을 실망시키고 말았구나..." # 1062920087619810289
  great_project_type_fortify_syria: "시리아 요새화" # 9199232011375121877
  great_project_type_fortify_syria_desc: "기동력이 뛰어난 튀르크 무리들이 시리아의 변두리를 괴롭히고 있습니다. 황야에서 습격해 마을과 상단을 약탈하고, 우리 주둔군이 효과적으로 대응하기도 전에 사라져 버립니다. 현재의 방어망은 이러한 유목 전술에 대응하기에 부족하며, 광대한 제국 영토를 취약한 상태로 내버려 두고 있습니다. 이 재앙을 끝내기 위해 대사업을 착수해야 합니다. 이것은 요새, 성벽, 감시 초소로 구성된 새로운 방어망 건설에 집중하는 거대한 규모의 사업이 될 것입니다. 이 새로운 '시리아 리메스'는 약탈자들의 안전한 통행과 손쉬운 약탈을 차단하여, 제국의 권위가 백성들을 보호할 수 있게 할 것입니다. 그래야만 이 소중한 속주가 평화 속에서 번영할 수 있으며, 취약한 국경 지대를 제국을 위한 단단한 방패로 탈바꿈시킬 수 있습니다." # 8993927772987832164
  great_project_type_tooltip_fortify_syria: "시리아의 제국 권위와 방어 체계를 복구하기 위한 대사업을 시작합니다." # 8002620008990604470
  great_project_type_fortify_syria_confirm: "동방은 다시 로마의 땅이 되리라!" # 13773719556972163874
  great_project_type_fortify_syria_contribution_antioch: "안티오키아 강화" # 12435459695810888254
  great_project_type_fortify_syria_contribution_antioch_desc: "안티오키아는 시리아의 심장이자 지역 전체의 전략적 요충지입니다. 단순히 점유하는 것만으로는 부족합니다. 이곳을 다시 한번 제국 권력의 중심지로 만들어야 합니다. 이를 위해 거대한 성벽을 재건하고, 강력한 상비 야전군을 창설하며, 완전한 두카톤(공국)의 행정 체계를 복구하는 등 전면적인 군사 및 행정 개편이 필요합니다." # 13135909472525008773
  great_project_type_fortify_syria_contribution_edessa: "에데사 성채 보강" # 7455700546879713624
  great_project_type_fortify_syria_contribution_edessa_desc: "요새 도시 에데사(알루하)는 시리아 동쪽 끝의 방패로, 메소포타미아로 통하는 관문을 지키고 있습니다. 이곳의 거대한 성채를 난공불락으로 만들어야 합니다. 우리는 탑의 재건을 지원하고, 해자를 깊게 파며, 무기고를 확장하여 동쪽으로 세력을 투사할 수 있는 강력한 전방 기지를 구축할 것입니다." # 4620728198049431314
  great_project_type_fortify_syria_contribution_strata: "스트라타 디오클레티아나 복구" # 13000861052713408475
  great_project_type_fortify_syria_contribution_strata_desc: "'스트라타 디오클레티아나'로 알려진 고대 로마 도로망은 한때 동부 국경의 중추였으며, 팔미라에서 유프라테스까지 요새들을 연결하는 요새화된 고속도로였습니다. 비록 일부는 사막에 묻혔으나, 주요 간선을 복구하면 우리 군단이 엄청난 속도로 이동할 수 있게 되어 약탈자들을 차단하고 주둔군에 항상 보급이 이루어지도록 보장할 것입니다." # 6692035112546382558
  great_project_type_fortify_syria_contribution_melkites: "멜키트 공동체 지원" # 9977257848000255320
  great_project_type_fortify_syria_contribution_melkites_desc: "아랍인들이 '멜키트' 혹은 '황제의 사람들'이라 부르는 현지의 칼케돈파 기독교인들은 이민족의 통치 아래 수 세기 동안 정교회 신앙을 지켜왔습니다. 그들의 충성심은 갈고 닦이기를 기다리는 무기와도 같습니다. 그들의 총대주교들을 후원하고, 교회를 재건하며, 제국의 보호를 제공함으로써 시리아 전역에 충성스러운 눈과 귀, 그리고 손이 되어줄 연결망을 구축할 수 있습니다." # 3855067261272163633
  great_project_type_fortify_syria_contribution_ports: "레반트 항구 확보" # 7238085908420362629
  great_project_type_fortify_syria_contribution_ports_desc: "라오디케아에서 티레에 이르는 레반트의 항구들은 동방의 부가 유입되는 통로입니다. 또한 아랍 함대와 해적의 습격에 취약한 곳이기도 합니다. 항구를 요새화하고, 드로몬으로 구성된 새로운 순찰 함대를 건조하며, 모든 해상 무역에 대한 제국의 확고한 장악력을 확립하기 위해 대대적인 투자가 필요합니다." # 13653257797629674563
  turkish_incursions_events.0016.t: "다시 태어난 동방의 여왕" # 9669282548390034265
  turkish_incursions_events.0016.desc: "안티오크의 변화는 놀랍기 그지없습니다. 한때 무너져 내리던 성벽은 이제 완전하고 위풍당당하게 서 있습니다. 황제에게 충성하는 새로운 타그마 군단이 시리아의 태양 아래 군기를 빛내며 도시 밖 들판에서 훈련에 매진하고 있습니다. 복구된 방어 시설 덕분에 안전해진 시민들은 로마의 평화가 가져온 새로운 시대를 축하합니다. 안티오크는 다시 한번 진정한 제국의 도시가 되었습니다." # 17475064986350220663
  turkish_incursions_events.0016.a: "그 역사에 걸맞은 도시로군!" # 7424546681935313498
  turkish_incursions_events.0017.t: "메소포타미아의 방패" # 600004138632962298
  turkish_incursions_events.0017.desc: "에데사의 성채는 이제 돌과 강철로 이루어진 괴수와도 같습니다. 제국 공병들은 스스로의 한계를 뛰어넘었으며, 요새는 그 어느 때보다 강력해졌다고 전해집니다. 곡창은 가득 찼고, 무기고는 넘쳐나며, 수비대는 한시도 감시를 게을리하지 않습니다. 이 보루에서 우리 군대는 적의 영토 깊숙한 곳까지 타격을 가할 수 있습니다." # 14123711770484775156
  turkish_incursions_events.0017.a: "그들이 우리 성벽에 부딪혀 산산조각 나게 하라." # 5999559658928927713
  turkish_incursions_events.0018.t: "제국 가도가 살아나다" # 14086417588269711396
  turkish_incursions_events.0018.desc: "사막의 길이 뚫렸습니다! 수많은 노동자가 고대의 스트라타를 복구했습니다. 포장된 구간은 수리되었고, 우물이 파졌으며, 요새화된 감시 초소가 이제 경로를 지킵니다. 우리 군대는 이제 절반의 시간 만에 광활한 거리를 횡단할 수 있게 되었고, 속도에 의존하던 사막의 약탈자들은 갑작스럽게 구석에 몰려 노출되었습니다." # 69268359555889909
  turkish_incursions_events.0018.a: "우리 군단에게는 생명줄이요, 적들에게는 죽음의 함정이로다." # 15834814513100442452
  turkish_incursions_events.0019.t: "충성스러운 신자들" # 5093759745992161140
  turkish_incursions_events.0019.desc: "멜키트 교도들에 대한 귀하의 후원은 놀라운 결실을 맺었습니다. 시리아 전역의 정교회 공동체는 이제 귀하를 자신들의 구원자이자 진정한 군주로 우러러봅니다. 그들은 우리 수비대에 중요한 정보를 제공하고 적들에게 보급품이 돌아가지 않게 하며, 귀하의 안녕을 비는 그들의 기도 소리가 재건된 모든 교회에서 울려 퍼집니다. 그들의 충성심은 요동치는 땅에서 제국 권력의 닻이 되어줍니다." # 16116712727868607379
  turkish_incursions_events.0019.a: "하나님께서 황제의 사람들을 굽어살피시길." # 17167373878325727216
  turkish_incursions_events.0020.t: "황금 해안" # 17759134106982773094
  turkish_incursions_events.0020.desc: "새로운 레반트 함대가 바다를 깨끗이 청소했습니다. 파티마 왕조는 우리의 해군력을 경계하고 있으며, 해적 활동은 급감했습니다. 해로가 확보되면서 무역이 번창하고 있습니다. 먼 동방의 향신료, 유향, 비단이 다시 한번 우리 항구를 통해 제국 국고로 흘러 들어옵니다. 이 해안은 막대한 부와 권력의 원천입니다." # 9374759824754133075
  turkish_incursions_events.0020.a: "바다를 지배하는 자가 부를 지배한다." # 6925867457426698901
  doukas_of_antioch_modifier: "안티오크의 둑스" # 11324932916987258114
  doukas_of_antioch_modifier_desc: "안티오크의 군사 및 민정 행정을 복구하기 위한 나의 노력은 광대하고 복잡한 변방 속주를 통치하는 데 있어 귀중한 경험을 선사해주었습니다." # 14486937173547622264
  edessan_warden_modifier: "에데사의 수호자" # 12485779486657319448
  edessan_warden_modifier_desc: "동방의 위협으로부터 에데사의 거대한 성채를 지켜내며 공성술과 방어 요새 구축에 대한 숙련도를 높였습니다." # 15144722463720299626
  master_of_the_strata_modifier: "스트라타의 주인" # 4550837415735193014
  master_of_the_strata_modifier_desc: "고대 사막 도로를 재건함으로써 보급과 건조 지형에서의 신속한 군대 전개에 대해 비할 데 없는 통찰력을 얻었습니다." # 10469637065993056252
  defender_of_the_melkites_modifier: "멜키트파의 수호자" # 15079138186093178636
  defender_of_the_melkites_modifier_desc: "시리아의 정교회 공동체를 옹호함으로써 현지 주민들과 깊은 유대를 형성하고 민심을 얻는 것의 가치를 배웠습니다." # 6465501668578343370
  thalassocrat_of_the_levant_modifier: "레반트의 해상 통치자" # 5701173006404557831
  thalassocrat_of_the_levant_modifier_desc: "레반트 해안을 확보하는 데 집중한 결과, 해군력과 해상 무역, 그리고 경제적 번영 사이의 상호작용에 대해 깊이 이해하게 되었습니다." # 15997357237454768899
  turkish_incursions_events.4000.t: "시리아가 다시 로마의 품으로" # 5225852567588188476
  turkish_incursions_events.4000.desc: "마침내 완수되었습니다. 수 세대에 걸친 꿈이었던 대사업이 이제 현실이 되었습니다. 시리아는 이제 이름뿐만 아니라 실제로 제국에 복구되었습니다. 안티오크는 동방의 여왕으로서 빛나고, 에데사는 메소포타미아를 감시하며, 우리 군단은 고대 로마 도로 위를 신속하게 행군합니다.\n\n충성심이 확보된 현지 주민들은 수 세기 동안 알지 못했던 평화 속에서 살아가고 있습니다. 한때 이 땅을 마음대로 약탈하던 에미르와 술탄들은 이제 우리의 깃발만 보고도 벌벌 떱니다. 나의 비전과 의지로 빚어낸 새로운 팍스 로마나가 동방에 동텄습니다." # 8637864737732690769
  turkish_incursions_events.4000.a: "제국 왕관의 새로운 보석이로다!" # 13152005337869795604
  syrian_pax_romana_modifier: "시리아의 팍스 로마나" # 666995156890233765
  syrian_pax_romana_modifier_desc: "제국의 기념비적인 노력을 통해 이 백작령에 로마의 권위가 확고히 재확립되었습니다. 땅은 안전하고 백성은 충성스러우며, 황제의 평화 아래 경제가 번창하고 있습니다." # 4484441948859891892
  turkish_incursions_events.4001.t: "시리아의 꿈이 무너지다" # 10836792214661705543
  turkish_incursions_events.4001.desc: "보고를 부정할 수 없습니다. 국고는 바닥났고, 군대는 한계에 다다랐으며, 다투던 에미르들은 우리에 맞서 단결하고 있습니다. 시리아를 복구하려던 거대한 계획은 실패했습니다. 기술자들과 행정관들을 불러들이는 것 외에는 선택의 여지가 없습니다.\n\n절반만 복구된 성벽과 버려진 작업 캠프는 나의 어리석음을 증명하는 기념비로 남을 것입니다. 우리가 보호를 약속했던 현지 기독교인들은 이제 옛 주인들의 처분에 맡겨졌습니다. 이것은 뼈아픈 굴욕이며, 쉽게 씻기지 않을 나의 통치기의 오점입니다." # 7951748298643362062
  turkish_incursions_events.4001.a: "나의 야망이 능력을 넘어섰구나..." # 2077680515961107368
  syrian_fiasco_modifier: "시리아의 참사" # 13044494850571103214
  syrian_fiasco_modifier_desc: "시리아를 되찾으려던 나의 야심 찬 계획은 막대한 비용만 치른 채 실패로 돌아갔습니다. 자원은 낭비되었고, 우리의 약점은 만천하에 드러났습니다. 봉신들은 이를 무능과 과욕의 증거로 여기고 있습니다." # 1078021953001490468
  ANTIOCH_LOCATION_1_TOOLTIP: "안티오크 테마가 당신의 영역 내에 있음" # 16390771063372625613
  EDESSA_LOCATION_2_TOOLTIP: "에데사 테마가 당신의 영역 내에 있음" # 10709421221716166730
