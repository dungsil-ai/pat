l_korean:
  great_project_type_refortify_nisibis: "니시비스 요새화" # 14199006717849798175
  great_project_type_refortify_nisibis_desc: "메소포타미아 국경은 벌어진 상처와 같아, 적들이 아무런 저항 없이 말을 달릴 수 있는 건조한 평원입니다. 이 국경을 지키기 위해 우리는 단순히 순찰하는 것을 넘어, 상상할 수 없을 만큼 강력한 요새로 그곳을 단단히 고정해야 합니다.\n\n역사가 청사진을 제공합니다. 수 세기 동안 니시비스는 로마 제국의 동방을 지키는 깨지지 않는 방패였습니다. 사산 왕조 페르시아의 막강한 군대에 맞서 거듭된 재앙적인 포위 공격을 견뎌낸 전설적인 요새이자 '제국의 보루'였습니다. 율리아누스 황제 사후 조약에 의해 할양된 비극적인 상실은 동방 국경이 결코 완전히 회복하지 못한 상처였습니다.\n\n이제 이 도시는 과거의 그림자만 남아있습니다. 이제 이 오래된 잘못을 바로잡을 때가 왔습니다. 우리는 무너진 벽을 덧대어 고치는 것이 아니라, 옛 토대 위에 새로운 요새를 건설하는 기념비적인 노력을 통해 그 전설을 부활시킬 것입니다. 우리는 그 이름 자체가 제국의 위력을 상징하게 될 보루를 구축하여, 다가올 세대를 위해 우리의 동방 영토를 수호할 것입니다." # 12700168378095465029
  great_project_type_tooltip_refortify_nisibis: "" # 17241709254077376921
  great_project_name_possessive_refortify_nisibis: "" # 17241709254077376921
  great_project_name_refortify_nisibis: "" # 17241709254077376921
  great_project_type_refortify_nisibis_contribution_foundations: "관문을 확보하라" # 1663974764491882501
  great_project_type_refortify_nisibis_contribution_foundations_desc: "과거의 영광과 수많은 포위 공격의 폐허가 도시를 뒤덮고 있습니다. 건설을 시작하기 전에 우리는 무너진 벽과 붕괴된 수로의 잔해를 치워야 합니다. 이 기초 작업은 또한 우리 기술자들이 로마 시대의 원래 요새를 조사하여, 새로운 방어 시설이 고대의 검증된 강인한 기반 위에 세워지도록 보장할 것입니다." # 85057573103359991
  great_project_type_refortify_nisibis_contribution_name_foundations: "" # 17241709254077376921
  great_project_type_refortify_nisibis_contribution_walls: "외벽 재건" # 16444174042129431663
  great_project_type_refortify_nisibis_contribution_walls_desc: "이제 위대한 작업이 본격적으로 시작됩니다. 이 기여금은 막대한 양의 석재를 채석하고 도시 주위에 새로운 방어선을 구축하는 데 필요한 수많은 석공과 노동자들을 고용하는 데 사용될 것입니다. 우리는 단순히 낡은 벽을 수리하는 것이 아니라, 서로 맞물리는 탑과 요새화된 성문을 갖춘 더 두껍고 높은 새로운 외곽을 건설할 것입니다." # 12404776486031721525
  great_project_type_refortify_nisibis_contribution_name_walls: "" # 17241709254077376921
  great_project_type_refortify_nisibis_contribution_citadel: "성채 건설" # 708280872150882652
  great_project_type_refortify_nisibis_contribution_citadel_desc: "외벽이 도시를 보호하는 동안, 상주 수비대를 수용하고 최후의 저항 거점이 될 내부 성채가 필요합니다. 이 작업은 도시 내부에 전용 군사 요새를 건설하여, 정예 국경 군단을 위한 광범위한 막사, 무기고, 마구간, 훈련장을 완비할 것입니다." # 6031117108664266879
  great_project_type_refortify_nisibis_contribution_name_citadel: "" # 17241709254077376921
  great_project_type_refortify_nisibis_contribution_logistics: "전략적 곡물창고와 저수조" # 299191092923155258
  great_project_type_refortify_nisibis_contribution_logistics_desc: "요새는 칼날에 패배하기 훨씬 전에 굶주림과 갈증에 패배합니다. 니시비스가 가장 긴 포위 공격도 견뎌낼 수 있도록, 이 기여금은 수년간의 곡물을 저장할 거대한 지하 곡물창고와 신선한 물을 보장할 깊고 잘 보호된 저수조를 건설하는 데 사용되어, 도시를 거의 완전히 자급자족하게 만들 것입니다." # 3202027251147004053
  great_project_type_refortify_nisibis_contribution_name_logistics: "" # 17241709254077376921
  bulwark_of_mesopotamia_modifier: "메소포타미아의 보루" # 2867994870750082785
  bulwark_of_mesopotamia_modifier_desc: "니시비스 요새화라는 기념비적인 과업이 완료되었습니다. 뚫을 수 없는 새로운 성벽과 가공할 철의 성채는 이 도시를 제국 권력의 보루로 탈바꿈시켰습니다. 위협적인 철의 성채에는 대규모 정예 수비대가 주둔하고 있으며, 이 거대한 군사력의 상시는 주변 지역에 대한 흔들림 없는 충성과 절대적인 통제권을 보장합니다. 니시비스는 이제 제국 동방 방어의 흔들리지 않는 초석으로 우뚝 섰습니다." # 10599660961518548977
  refortify_nisibis.0001.t: "기초 정비 완료" # 4077638641453446663
  refortify_nisibis.0001.desc: "주군이시여, 니시비스의 수석 기술자가 도시 기초 정비라는 고된 작업이 완료되었다고 보고했습니다. 수 세기 동안 쌓인 잔해를 모두 치워내자 조상들의 뛰어난 석조 기술이 드러났습니다. 이제 우리는 건설을 위한 깨끗하고 견고한 기반을 갖추었으며, 새로운 요새화를 위한 마스터 플랜도 준비되었습니다." # 2757980758136371115
  refortify_nisibis.0001.a: "이 바위 위에 우리의 방패를 세우리라." # 4775007586846863485
  refortify_nisibis.0002.t: "니시비스의 성벽이 높이 솟아오르다" # 17991475590686485829
  refortify_nisibis.0002.desc: "주군이시여, 니시비스의 수석 석공으로부터 승전보가 도착했습니다! 외벽이 완성되어 메소포타미아 평원 위로 높이 솟아올랐습니다. 도시는 다시 한번 적들에게 단단한 돌로 된 위협적인 모습을 드러냈으며, 이는 이 중요한 국경을 사수하겠다는 우리의 의지를 명확히 선포하는 것입니다. 내부 작업은 아직 많이 남았지만, 도시는 다시 한번 요새가 되었습니다." # 13417520311206127278
  refortify_nisibis.0002.a: "웅장하고 위압적인 광경이로군!" # 8628219985000601045
  refortify_nisibis.0003.t: "성채에 수비대가 배치되다" # 10556601660470425931
  refortify_nisibis.0003.desc: "주군이시여, 동방의 총사령관께서 깊은 감사를 표해왔습니다. 니시비스 내의 철의 성채가 완공되어 최정예 국경 수비대원이 배치되었습니다. 병사들은 최신식 요새에 거주하며 적의 공격과 도시 내부의 정치로부터 안전해졌기에 사기가 하늘을 찌르고 있습니다. 니시비스는 이제 단순한 거점이 아니라 진정한 군사 본부가 되었습니다." # 7749175652237025762
  refortify_nisibis.0003.a: "이 보루에서 우리의 힘이 동쪽으로 뻗어 나갈 것이다." # 17745052329279998257
  refortify_nisibis.0004.t: "도시의 비축량이 가득 차다" # 16885543654827764438
  refortify_nisibis.0004.desc: "주군이시여, 니시비스의 병참장교가 새로운 전략 곡물창고가 가득 찼으며 거대한 저수조의 수위도 높다고 보고했습니다. 적들이 도시를 포위하더라도 이곳에서 약점을 찾지는 못할 것입니다. 수비대는 사막의 돌덩이만큼이나 굶기기 어려울 것입니다. 도시는 무기한의 포위 공격도 견뎌낼 준비가 되었습니다." # 16286978773538635718
  refortify_nisibis.0004.a: "인내와 준비가 우리의 가장 위대한 무기이다." # 4821333205720290026
  refortify_nisibis.0005.t: "니시비스가 건재하다!" # 14936934771729119234
  refortify_nisibis.0005.desc: "동부 국경의 지휘관으로부터 환희에 찬 전령이 도착했습니다. 마지막 주춧돌이 놓였고, 마지막 곡물 창고가 봉인되었습니다. 위대한 과업이 완수되었습니다. 니시비스가 다시 태어난 것입니다.\n\n이 도시는 더 이상 취약한 국경 마을이 아니라, 군사 공학의 걸작이 되었습니다. 새로운 성벽은 평원 위로 우뚝 솟아, 돌과 저항의 가파른 면모를 보여줍니다. 그 안에는 강력한 철의 성채가 수비대의 심장부 역할을 하며, 방대한 식량과 물 비축량은 도시를 포위 공격으로부터 난공불락으로 만듭니다. 이는 동부 사막을 막아내는 돌과 철의 방패이자, 뚫을 수 없는 보루입니다.\n\n수세대에 걸친 노력과 왕의 몸값에 달하는 금이 소모되었지만, 그 결과는 비할 데 없는 요새입니다. 나의 이름, 그리고 이 웅장한 설계에 기여한 내 조상들의 이름은 영원히 제국 동부 국경의 힘과 안보와 동의어가 될 것입니다." # 7797846599927816728
  refortify_nisibis.0005.a: "우리 성벽 위에서 적들이 스스로 무너지게 하라!" # 6153666181511855024
  refortify_nisibis.0006.t: "과업이 중단되다!" # 3678830918433978818
  refortify_nisibis.0006.desc: "니시비스의 요새화 작업을 감독하던 공사 책임자로부터 참담한 보고가 도착했습니다. 프로젝트는 끝났으나 영광스럽지 못합니다. 그는 왕국 내의 끊임없는 혼란과 치명적인 비용이 이 노력을 완전히 고갈시켰다고 적었습니다. 돌과 목재, 임금을 위해 필요했던 은의 강줄기가 말라버린 것입니다.\n\n일꾼들은 오래전에 자리를 떠났고, 지역의 부패는 남아있던 얼마 안 되는 자금마저 앗아갔습니다. 절반쯤 완성된 성벽은 이제 비바람에 노출되어 있고, 나무 비계는 햇볕 아래 썩어가고 있습니다. 우리의 힘을 상징하려던 것은 우리의 과욕을 증명하는 꼴이 되었고, 적들의 조롱을 부르는 뼈대만 남은 폐허가 되었습니다.\n\n새롭고 난공불락인 니시비스의 꿈은 죽었습니다. 소모된 재산은 완전히 사라졌고, 우리에게 남은 것은 웅장하고 값비싼 폐허뿐입니다. 이는 우리 자신의 어리석음을 기리는 기념비입니다." # 3689769863419830347
  refortify_nisibis.0006.a: "야망의 대가에 대한 쓰라린 교훈." # 456512964364144271
  NISIBIS_LOCATION_TOOLTIP: "당신은 니시비스(나시빈)를 보유하고 있습니다." # 3274826339584937374
