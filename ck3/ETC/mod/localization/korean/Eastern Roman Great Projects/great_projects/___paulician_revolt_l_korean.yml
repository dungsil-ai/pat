l_korean:
  paulician_leader: "크리소케이르" # 1041296860753742575
  paulician_army: "황금손의 추종자들" # 12778245722333006053
  paulician_invasion: "아나톨리아 파울리키아 전쟁" # 132679013860193970
  paulician_leader_1: "니케포로스" # 4784575346621787787
  great_project_type_paulician_heresy: "파울리키아 이단 처리" # 5238859620364106303
  great_project_type_paulician_heresy_desc: "크리소케이르와의 전쟁에서 승리하는 것은 시작일 뿐입니다. 파울리키아 이단은 수 세대 동안 동부 테마를 오염시켜 왔으며, 단순히 병사들을 죽이는 것만으로는 그 사상을 없앨 수 없습니다. 이 거대한 계획은 제국이 동원할 수 있는 모든 수단인 칼, 금화, 그리고 십자가를 사용하여 우리 땅에서 이단을 영구적으로 근절하려는 체계적인 노력을 의미합니다. 우리는 이단자들을 물리칠 뿐만 아니라 그들의 사회 전체를 뿌리 뽑을 것입니다." # 16126062819595001664
  great_project_type_paulician_heresy_contribution_paulician_local_leaders: "그들의 결속을 분쇄하라" # 12775806237907877202
  great_project_type_paulician_heresy_contribution_paulician_local_leaders_desc: "크리소케이르의 모든 추종자가 진실한 신자인 것은 아닙니다. 많은 이들이 개인적인 이익을 위해 그와 운명을 함께한 기회주의자나 지역 추장들입니다. 이 기부금은 이단 지도자에게 등을 돌리는 대가로 이들 하급 지도자들에게 금, 작위, 영지를 제공하여 매수하는 데 사용될 '재량 자금'을 마련합니다. 우리는 내부에서부터 그들의 반란을 무너뜨릴 것입니다." # 12583362819946143845
  great_project_type_paulician_heresy_contribution_paulician_resettlement: "이단의 이주" # 177361749043195395
  great_project_type_paulician_heresy_contribution_paulician_resettlement_desc: "파울리키아 공동체는 그들의 집결지에서 힘을 얻습니다. 이 기부금은 생포되거나 항복한 파울리키아 씨족들을 강제로 재정착시키는 어렵지만 필요한 과업인 '메타나스타시스'를 조직합니다. 그들을 트라키아나 펠로폰네소스와 같은 먼 땅으로 이주시킴으로써, 우리는 그들의 거주지를 분쇄하고 뿌리를 끊어내며 정교회 인구 사이에서 그들의 신앙을 희석시킬 것입니다." # 13503419251157049463
  great_project_type_paulician_heresy_contribution_paulician_forts: "국경 요새화 프로그램" # 11077863283124084542
  great_project_type_paulician_heresy_contribution_paulician_forts_desc: "이 이단이 다시는 일어나지 않도록 하려면, 우리는 물리적으로 그 땅을 지배해야 합니다. 이 기부금은 이전 이단 중심지 전역에 걸쳐 일련의 새로운 요새와 감시 초소를 건설하기 위한 기술자와 자재를 제공합니다. 이 수비대들은 도로를 감시하고 제국 법을 집행하며, 우리 권위의 영구적인 석조 기념물 역할을 할 것입니다." # 2548724055111977653
  great_project_type_paulician_heresy_contribution_paulician_conversion: "정교회 선교단" # 18299051486830808425
  great_project_type_paulician_heresy_contribution_paulician_conversion_desc: "이단에 정면으로 맞서야 합니다. 이 기부금은 평정된 영토로 수도사들과 열성적인 신학자들을 파견하는 데 자금을 지원합니다. 그들은 더럽혀진 교회를 다시 성별하고, 이단 서적을 불태우며, 파울리키아 설교자들과 공개 토론을 벌여 그들의 권위를 무너뜨리고 정교회의 유일한 진리를 강요하는 임무를 맡게 될 것입니다." # 5324703750674535097
  paulician_revolt.0001.t: "테프리케의 이단" # 9392039061434914317
  paulician_revolt.0001.desc: "세바스테이아 테마의 스트라테고스로부터 긴급한 전령이 도착했습니다. 그의 인장에는 공포가 서려 있습니다. 제국의 동쪽 변방에서 수년 동안 곪아 터지던 반란이 공개적인 전쟁으로 폭발했습니다.\n\n크리소케이르라는 이름의 카리스마 있고 무자비한 이단 지도자가 상상도 못 할 일을 저질렀습니다. 테프리케의 산악 요새에서 그는 독립적인 파울리키아 국가를 선포하고 스스로를 그 보호자로 자처했습니다. 검은 깃발 아래 싸우는 그의 군대는 이제 국경을 넘어 추종자들을 위해 주변 땅을 '해방'시키려 들이닥치고 있습니다.\n\n이들은 단순한 반란군이 아닙니다. 이들은 거룩한 십자가를 경멸하고, 우리의 신성한 성상에 침을 뱉으며, 기성 교회를 거부하는 사악한 이원론적 신조인 파울리키아 이단의 신봉자들입니다. 그들은 물질 세계를 창조한 타락하고 사악한 신과, 그 세계와 분리되어 멀리 떨어져 있는 선한 신에 대해 설교합니다.\n\n수십 년 전, 경건한 테오도라 황후는 제국에서 이 암적인 존재를 몰아내려 했습니다. 파울리키아인들은 집에서 쫓겨났고 그들의 지도자들은 처형되었습니다. 하지만 그들은 사라지지 않았습니다. 그들은 무법지대인 동부 국경 지대로 도망쳐 자신들을 박해한 제국에 대해 깊고 독한 증오심을 키웠습니다. 크리소케이르는 그 증오의 후계자이며, 우리 땅에서 자신의 백성을 위한 영구적인 터전을 마련하기 위해 돌아왔습니다.\n\n 이것은 단순한 약탈이 아닙니다. 아나톨리아의 영혼을 건 성전입니다." # 17667068549809760416
  paulician_revolt.0001.a: "이 신성 모독은 제국의 강철로 응징될 것이다!" # 9777277602219057352
  paulician_revolt.0001.b: "반란군으로 플레이하십시오!" # 8700371910759404049
  paulician_revolt.0002.t: "외교적 승리" # 8818522156041976299
  paulician_revolt.0002.desc: "제국 정보 장부의 한 항목에 최근 작전의 성공이 기록되어 있습니다. 동부 이단자들에 대한 비밀 작전을 위해 지정된 상당한 액수의 기부금이 비밀 채널을 통해 수령되고 확인되었습니다. 이 자금은 이단 지도부 내의 핵심 인물들이 서로 반목하게 하여 내부 갈등을 악화시키는 데 지출된 것으로 보고되었습니다. 자금의 출처는 그들의 '교묘하고 효과적인' 방식에 대해 공식적인 찬사를 받았습니다." # 14933812919307411891
  paulician_revolt.0002.a: "스스로 분쟁하는 집마다 서지 못할 것이다." # 16426039654346439718
  paulician_revolt.0003.t: "어려운 과업" # 2097076912180186403
  paulician_revolt.0003.desc: "동방의 총독들로부터 인구 이주의 까다로운 병참 업무를 지원한 것에 대해 감사의 인사를 받았습니다. 암울한 과업이긴 하나, 지역의 장기적인 안정을 보장하고 이단이 다시 기승을 부리는 것을 방지하기 위해 필요한 일로 여겨집니다. 이 불쾌하지만 필수적인 업무에 대한 저의 헌신이 높게 평가받고 있습니다." # 7546576703987595151
  paulician_revolt.0003.a: "안전한 미래를 위한 무거운 짐이군." # 1432659740318921405
  paulician_revolt.0004.t: "권력의 토대" # 6197031136421703731
  paulician_revolt.0004.desc: "이제 동방의 고갯길마다 망치 소리가 울려 퍼집니다. 전선에서 온 보고에 따르면 국경 요새화 계획이 예정보다 앞당겨 진행되고 있다고 합니다.\n\n물자와 자금의 중대한 기여 덕분에 기술자들이 새로운 요새의 토대를 닦기 시작했습니다. 이 새로운 거점들은 제국의 권위를 영구히 상기시키는 상징이 될 것이며, 앞으로 수 세대 동안 테마의 안전을 보장할 것입니다." # 13441015472438017937
  paulician_revolt.0004.a: "견고한 성벽이 충성스러운 백성을 만드는 법이지." # 5526333874316090366
  paulician_revolt.0005.t: "성스러운 노력" # 3231869285523047334
  paulician_revolt.0005.desc: "세계 총대주교께서 동방의 정교회 선교 활동을 지원한 것에 대해 감사를 표하셨습니다. 저의 기여가 교회가 파울리키아파 이단에 직접 맞서고, 잃어버린 땅에 참된 신앙의 빛을 되찾아오는 데 필요한 자원을 제공하는 데 결정적인 역할을 했다고 합니다. 저의 신심이 정당하게 인정받았습니다." # 4216968772732863775
  paulician_revolt.0005.a: "하나님께서 그들에게 힘을 주시기를." # 15984296534750810732
  paulician_revolt.0006.t: "동방의 평정" # 11187351808880277836
  paulician_revolt.0006.desc: "완전한 승리입니다. 동방 테마를 평정하기 위한 거대한 계획이 완료되었습니다. 한때 사악한 이단의 중심지였던 테프리케 요새는 이제 충성스러운 제국의 주둔지가 되었습니다. 파울리키아파의 지도자들은 죽거나 흩어졌고, 그 추종자들은 개종하거나 먼 땅으로 이주되었습니다. 새로운 요새들이 연이어 세워져, 느리지만 확실하게 정교회의 품으로 돌아오고 있는 백성들을 감시하고 있습니다. 이단이라는 암덩어리는 제거되었고, 아나톨리아의 영혼은 다시 한번 안전해졌습니다." # 3516184133687495245
  paulician_revolt.0006.a: "제국의 의지와 정교회 신앙의 승리로다!" # 443584589113863369
  paulician_revolt.0007.t: "이단의 존속" # 920107444737707261
  paulician_revolt.0007.desc: "동방을 평정하려던 야심 찬 계획이 실패했습니다. 전쟁은 끝났을지 모르나 이단은 남아 있으며, 이제 그 어느 때보다 반항적입니다. 파울리키아파를 개종시키고, 매수하고, 이주시지키려던 우리의 노력은 불충분했으며, 그들의 공동체는 폭풍을 견뎌냈습니다. 비록 그들의 세력은 꺾였을지언정 신앙은 존속되어, 우리 국경의 영구적인 불안정과 반란의 근원이 되었습니다. 우리는 패를 보여주었고, 결국 패배했습니다. 동방의 이단자들은 제국의 옆구리에 박힌 가시로 남게 되었습니다." # 10943236260519194012
  paulician_revolt.0007.a: "쓰라리고 수치스러운 실패로군." # 7940203651481062769
  paulician_stronghold_modifier: "파울리키아파 거점" # 3228450606763994163
  paulician_stronghold_modifier_desc: "이 백작령은 파울리키아파 이단의 중심지 역할을 합니다. 백성들은 적대적이며, 요새는 광신도들이 지키고 있고, 제국의 권위는 완전히 사라졌습니다." # 5874947849114090083
  paulicians_subdued_modifier: "진압된 파울리키아파" # 16530076858465474882
  paulicians_subdued_modifier_desc: "이 지역에서 파울리키아파 이단이 체계적으로 뿌리 뽑혔습니다. 제국의 권위가 완전히 회복되었고, 새로운 요새들이 땅을 감시하며, 백성들은 서서히 정교회의 품으로 돌아오고 있습니다. 이 땅은 다시 한번 안전하고 충성스러우며 번영하고 있습니다." # 9828788285906076103
  paulician_revolt.0009.t: "실패의 대가" # 7660296148132777635
  paulician_revolt.0009.desc: "동방의 취약한 평화가 산산조각 났습니다. 과거 파울리키아 이단을 단호하게 처리하지 못한 우리의 실패는 자비가 아니라 나약함으로 비춰졌으며, 그들에게 이용당할 기회가 되었습니다.\n\n우리의 원정이 지체된 수년 동안, 그들 사이에서 새롭고 무자비한 지도자들이 일어났습니다. 그들은 흩어진 이단 씨족들을 규합하고, 우리의 외적들과 동맹을 맺으며, 완전한 복수를 위한 전쟁을 위해 추종자들을 재무장시키는 데 시간을 할애했습니다.\n\n이것은 단순한 재기가 아닙니다. 국경에서 온 보고에 따르면, 우리가 처음 마주했던 오합지졸보다 훨씬 더 많은 수의 훈련된 광신도 무리가 있다고 합니다. 그들은 더 이상 요새 하나를 위해 싸우는 것이 아닙니다. 그들은 불꽃으로 아나톨리아를 정화하고 잿더미 위에서 왕국을 세우려 하고 있습니다.\n\n우리의 우유부단함이 서서히 끓어오르던 위협을 치명적인 위기로 번지게 했습니다. 이제 우리는 그 결과를 마주해야만 합니다." # 14024813016704403987
  paulician_revolt.0009.a: "무기를 들어라! 불과 강철로 우리의 실책을 바로잡을 것이다!" # 16191777555932850509
  bzn_defenders_of_paulicianism_decision: "파울리키아주의의 수호자" # 4656988539385598287
  bzn_defenders_of_paulicianism_decision_desc: "박해받고 이단이라는 낙인이 찍힌 채, 우리는 아나톨리아의 그늘 속에서 견뎌왔습니다. 이제 우리는 제국의 부패에 맞서고 우리의 단결을 선포하며, 참된 신앙의 수호자로서 당당히 섰습니다." # 14472794410009529752
  bzn_defenders_of_paulicianism_decision_confirm: "우리가 바로 참된 신앙이다." # 3956668759845177767
  bzn_defenders_of_paulicianism_decision_tooltip: "파울리키아주의를 공개적으로 옹호하여 신앙을 강화하고 비잔티움의 종교적 권위에 도전합니다." # 2376100490644388723
