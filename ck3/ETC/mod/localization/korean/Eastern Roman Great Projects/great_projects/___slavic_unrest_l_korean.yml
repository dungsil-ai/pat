l_korean:
  great_project_type_pacify_slavs: "남슬라브인 평정" # 3794610270370177878
  great_project_type_pacify_slavs_desc: "제국이 아나톨리아 전선에 집중하면서 유럽 테마 지역에 불안정이 초래되었습니다. 불가리아와 디라키움에서는 현지의 슬라브 및 블라크 추장들인 주판들이 백성들을 선동하여 제국의 조세에 저항하게 하고 있으며, 공개적인 반란의 위협이 고조되고 있습니다. 이 프로젝트는 정치적, 경제적 수단을 통해 지역을 안정시키기 위한 전략적 이니셔티브입니다. 지방 기반 시설에 자금을 투입하고 제국의 후원을 통해 불만을 잠재우며 현지 대귀족들의 충성을 확보할 것입니다. 이 노력은 막대한 비용이 드는 반란을 방지하고 중요한 서부 속주들을 제국의 품으로 다시 통합하는 것을 목표로 합니다." # 11817982311878195924
  great_project_type_tooltip_pacify_slavs: "불안한 발칸 속주들을 안정시키고 반란을 방지하기 위한 대규모 프로젝트를 시작합니다." # 10538895342990282901
  great_project_type_pacify_slavs_confirm: "폭풍이 몰아치기 전에 진압해야 합니다." # 7451597226288410698
  great_project_type_pacify_slavs_contribution_zupans: "주판 의회 소집" # 11211234062665479557
  great_project_type_pacify_slavs_contribution_zupans_desc: "슬라브 추장들, 즉 *주판*들은 철권으로 자신의 씨족들을 지배합니다. 그들을 모두 몰살하려 하기보다는 제국의 관용을 보여줄 때입니다. 우리는 그들을 사르디카와 같은 중립적인 도시에서 열리는 성대한 의회에 소집할 것입니다. 그들의 불만을 경청하고, 귀빈으로서 연회를 베풀며, 그들의 지역적 권위를 확인해주고 영광스러운 로마 작위를 수여할 것입니다. 위신으로 산 그들의 충성심은 가치 있는 도구가 될 것입니다." # 11430427318552002691
  great_project_type_pacify_slavs_contribution_ohrid: "오흐리드 대주교구의 권리 확인" # 17439215438995292740
  great_project_type_pacify_slavs_contribution_ohrid_desc: "슬라브 민족은 참된 신앙을 따르지만, 그들의 성직자들은 무질서하고 고립되어 있으며 로마 교황의 속삭임에 취약합니다. 우리는 그들의 경건함을 세계 총대주교청에 고정시켜야 합니다. 오흐리드 대주교구의 고대 권리를 재확인하는 제국의 금인칙서를 발행하고 주교들에게 관대한 자금을 지원함으로써, 발칸 교회를 반대의 근원에서 제국 지지의 기둥으로 바꿀 수 있습니다. 이는 세계 총대주교의 절대적인 권위에 타격이 되겠지만, 경건함과 통치술을 위해 필요한 조치입니다." # 12015464622197354846
  great_project_type_pacify_slavs_contribution_fortress: "발칸 요새 수리" # 3976304099271612822
  great_project_type_pacify_slavs_contribution_fortress_desc: "베오그라드에서 라리사에 이르기까지, 발칸의 고갯길을 지키는 요새들이 방치되어 무너져 내리고 있습니다. 현지 주민들은 북쪽의 페체네그 약탈자들과 현지 산적들에게 취약함을 느끼고 있습니다. 대규모 수리 프로그램을 시행함으로써 우리는 군사력을 강화할 뿐만 아니라 황제가 여전히 그들의 방패이자 보호자임을 백성들에게 보여줄 수 있습니다." # 16431515868922227173
  great_project_type_pacify_slavs_contribution_brigands: "산악 산적 토벌" # 4826783949108108069
  great_project_type_pacify_slavs_contribution_brigands_desc: "헤무스 산맥과 로도피 산맥은 도적과 산적들로 들끓고 있습니다. 이 야만적인 산악 씨족들은 자신의 힘 외에는 어떤 법도 존중하지 않으며, 상인과 제국 관리를 가리지 않고 약탈합니다. 그들은 무질서의 상징입니다. 우리는 베테랑 병사들을 파견하여 그들을 소탕하고, 산속의 근거지를 불태우며, 고갯길에 영구적인 감시 초소를 세워야 합니다." # 338990339983611054
  great_project_type_pacify_slavs_contribution_tax: "조세 부담 완화" # 18360280025851166316
  great_project_type_pacify_slavs_contribution_tax_desc: "과거 행정관들이 세금을 현물이 아닌 화폐로 징수하기로 한 결정은 시장 접근성이 거의 없는 내륙 농민들에게 파멸적인 결과를 초래했습니다. 이 정책은 민중의 분노를 사는 가장 큰 원인입니다. 우리의 자비심을 보여주기 위해, 불가리아와 마케도니아 테마가 다시 한번 세금의 일부를 곡물과 가축으로 납부할 수 있도록 허용하는 칙령을 내릴 것입니다. 이는 서민들의 부담을 덜어주고 우리 군대의 곡창을 채워줄 것입니다." # 10906540391952839976
  slavic_unrest.0001.t: "남슬라브 평정 - 충성 서약" # 16642237512626049968
  slavic_unrest.0001.desc: "유럽 테마의 불만을 해결하기 위해 소집된 회의는 큰 성공을 거두며 마무리되었습니다. 무장한 채 뚱한 반항심을 드러내며 도착했던 슬라브 주판들은 체계적으로 포섭되었습니다. 제국 의식의 장엄함에 매료되고 자신들의 목소리가 공식적으로 경청된 것에 만족한 그들은 새로운 로마 작위와 명예를 열렬히 받아들였습니다. 그들 중 가장 강력한 자들은 이제 자신의 야망이 반란이 아니라 오직 콘스탄티노폴리스의 제국 궁정만이 부여할 수 있는 위신과 연결되어 있다고 생각합니다. 반란의 즉각적인 위험은 사라졌고, 그 자리는 이기심과 허영심에 뿌리를 둔 새로운 충성심으로 대체되었습니다." # 10759243082038260473
  slavic_unrest.0001.a: "그들의 충성을 얻기 위해 지불할 작은 대가일 뿐입니다." # 4284208502819911371
  slavic_unrest.0002.t: "남슬라브 평정 - 오흐리드의 감사" # 14192913584383034730
  slavic_unrest.0002.desc: "오흐리드 대주교구에 자치권을 부여하는 제국의 금인칙서 발행은 열렬한 축하를 받았습니다. 오흐리드 시에서 불가르인의 대주교는 황제의 경건함과 지혜를 공개적으로 찬양하며, 통치자를 위대한 바실리우스 2세의 가치 있는 후계자라고 선언했습니다. 발칸 반도의 슬라브어권 교회 전역에서 이제 제국 보좌의 건강과 안정을 위한 기도가 드려지고 있습니다. 이 칙령으로 인해 콘스탄티노폴리스 세계 총대주교의 보편적 권위는 약간 약화되었지만, 강력한 발칸 교회의 충성심을 황제에게 직접적으로 확실히 묶어두었습니다." # 18038066680619937134
  slavic_unrest.0002.a: "충성스러운 교회는 강력한 토대입니다." # 7459462017180689149
  slavic_unrest.0003.t: "남슬라브 평정 - 감시 초소 수비 완료" # 14809198678779985484
  slavic_unrest.0003.desc: "요새 수리 계획이 성공적으로 마무리되었습니다. 다뉴브 국경부터 마케도니아의 산길에 이르기까지, 방벽은 드높게 솟아올랐고 성문은 보강되었습니다. 제국 수비대가 다시금 성벽에 배치되어, 그들의 존재만으로도 현지 주민들에게 새로운 안정감을 주고 있습니다. 이 핵심 거점들이 복구되고 병력이 배치됨에 따라, 적대적인 약탈자들은 유럽 테마를 공략하기 훨씬 더 어려운 목표로 여기게 될 것입니다. 길은 더 안전해졌고, 마을은 보호받고 있으며, 제국의 권위가 석재와 강철을 통해 다시 한번 그 위용을 드러내고 있습니다." # 10307049597776039633
  slavic_unrest.0003.a: "안전은 충성심을 낳는 법이다." # 9734270306435209989
  slavic_unrest.0004.t: "남슬라브 평정 - 고갯길의 평화" # 13783162452465740089
  slavic_unrest.0004.desc: "새로운 비글라 부대는 잔혹할 정도로 효율적임이 증명되었습니다. 그들의 방식은 가혹했으나 결과는 부인할 수 없습니다. 산적의 위협은 근절되었습니다. 그들의 우두머리들은 죽었고, 추종자들은 사방으로 흩어졌습니다. 법이 해내지 못한 것을 공포가 해냈습니다. 이제 상인들은 안전하게 길을 오가고, 마을 사람들은 깊은 잠에 듭니다. 가장 외진 계곡에서도 비글라의 존재는 제국 권위의 영향력과 힘을 상기시키는 냉혹하고도 지속적인 상징이 되었습니다." # 6059074730222801702
  slavic_unrest.0004.a: "질서가 회복되었다." # 16144142116436309491
  slavic_unrest.0005.t: "남슬라브 평정 - 가득 찬 곡창, 만족하는 백성" # 12061645340269996882
  slavic_unrest.0005.desc: "조세 개혁은 소작농들 사이에서 광범위한 안도와 감사를 불러일으켰습니다. 비록 이 속주들에서 국고로 유입되는 금화의 흐름은 더뎌졌으나, 우리 군 수비대는 이제 넘쳐나는 현지 곡창지대에서 보급을 받고 있습니다. 무엇보다 중요한 것은, 평민들이 이제 나를 멀리 있는 세금 징수원이 아니라 자신들의 곤경을 이해하는 자비로운 어버이로 여기게 되었다는 점입니다. 이러한 호의는 은화보다 더 가치 있는 법입니다." # 3982102714476738988
  slavic_unrest.0005.a: "배부른 소작농은 평화로운 소작농인 법이다." # 11878334338217402680
  arbiter_of_the_slavs_modifier: "슬라브의 중재자" # 5078017709749340925
  arbiter_of_the_slavs_modifier_desc: "발칸 공의회에서 자부심 강하고 반항적인 슬라브 추장들을 능숙하게 다룸으로써, 외교의 기술과 다루기 힘든 봉신들을 관리하는 법에 대해 많은 것을 배웠습니다." # 1903397625241420469
  light_of_the_balkans_modifier: "발칸의 빛" # 7283854781411999196
  light_of_the_balkans_modifier_desc: "발칸반도 교회에 대한 관대한 후원과 재조직을 통해, 나는 지극한 경건함과 지혜를 갖췄다는 명성을 얻었습니다." # 1592491851603223435
  warden_of_the_haemus_modifier: "헤무스의 감시자" # 11896632438181972504
  warden_of_the_haemus_modifier_desc: "발칸반도의 대규모 요새 복구 사업을 감독하며, 방어 전략과 요새화에 관한 귀중한 전문 지식을 습득했습니다." # 18343015305844502803
  scourge_of_the_brigands_modifier: "산적의 재앙" # 3458030309021480274
  scourge_of_the_brigands_modifier_desc: "산맥에서 산적 떼를 박멸하기 위한 무자비한 원정은 나의 무력을 연마시켰고, 적들에게는 적절한 공포를 심어주었습니다." # 2235737516242561858
  the_peoples_granary_modifier: "백성의 곡창" # 647627805163146183
  the_peoples_granary_modifier_desc: "발칸 소작농들의 조세 부담을 완화함으로써 그들의 사랑을 얻었으며, 속주 경제와 민심에 대한 깊은 이해를 증명해 보였습니다." # 379017470701371582
  slavic_unrest.1000.t: "발칸 테마가 평정되었습니다" # 4851763247182914218
  slavic_unrest.1000.desc: "반란의 속삭임이 잦아들었습니다. 대사업이 눈부신 성공을 거두었습니다. 우리의 지혜와 적시의 개입을 통해, 들끓던 발칸의 원망이라는 가마솥이 식었습니다. 이제 주판들은 충성스러운 궁신이 되었고, 성직자들은 황제에 대한 복종을 설교하며, 평민들은 안전과 번영 속에서 만족하고 있습니다.\n\n우리는 그들을 새로이 정복한 것이 아니라, 로마의 평화가 주는 이점을 일깨워 주었을 뿐입니다. 한때 약점의 근원이었던 발칸의 테마들은 이제 제국의 안정적이고 충성스러운 일부가 되었으며, 북방의 야만인들에 맞서는 방벽이 되었습니다." # 14986691152707587395
  slavic_unrest.1000.a: "지혜가 강철이 해내지 못한 일을 이루어냈습니다." # 324695550004799782
  slavic_unrest.1001.t: "반란의 불길" # 5041485227821336994
  slavic_unrest.1001.desc: "우리의 노력이 수포로 돌아갔습니다. 발칸반도를 회유하려던 대사업은 실패했습니다. 우리의 양보는 자비가 아닌 나약함으로 비춰졌습니다. 우리의 금은 받아들여졌으나, 우리의 권위는 조롱거리가 되었습니다. 주판들은 우리에게 대항하여 단결했고, 성직자들은 저항을 설교하며, 카리스마 넘치는 반란군에게 선동된 평민들은 쇠스랑을 갈고 있습니다.\n\n우리가 진압하려 했던 불안은 공개적인 반란의 불꽃이 되었습니다. 발칸 테마들은 우리 손을 떠났으며, 우리가 낭비한 자원들은 이제 남은 충성스러운 주둔군을 향해 진격하는 군대의 군자금으로 쓰이고 있습니다. 이것은 선의에서 비롯된 재앙입니다." # 8944322969138923470
  slavic_unrest.1001.a: "값비싼 교훈이 되겠군..." # 13126962877096238758
  slavic_unrest.0006.t: "산에서 들려오는 낮은 땅울림" # 7834821173332874336
  slavic_unrest.0006.desc: "발칸 반도의 충성스러운 총독으로부터 우려 섞인 서신이 도착했습니다, 나의 바실레우스여. 그는 군대나 반란에 대해 쓴 것이 아니라, 땅 위에 내려앉은 침묵, 즉 날카로운 시선과 차마 내뱉지 못한 말들로 가득 찬 침묵에 대해 썼습니다.\n\n그는 산골짜기의 공기가 마치 공유된, 무언의 분노로 가득 찬 듯 무겁게 느껴진다고 말합니다. 시장에서는 거래가 계속되고 있지만, 웃음소리는 사라졌습니다. 그는 이 가슴속에 품은 불만이 슬라브 민족의 마음속에서 조심스럽게 지펴지는 불길이며, 바람이 일기를 기다리고 있다고 우려합니다. 그는 우리에게 경계를 늦추지 말 것을 촉구하고 있습니다." # 9773561249748485376
  slavic_unrest.0006.a: "슬라브인들이라고? 그들이 단결할 일은 절대 없을 것이다." # 11915322468797140631
  slavic_unrest.0008.t: "다시 찾아온 정적" # 2421371364574397067
  slavic_unrest.0008.desc: "서쪽 산맥에서 들려오는 보고에 따르면 지역을 짓누르던 긴장감이 해소되었다고 합니다. 위협만 가하고 끝내 오지 않는 여름 폭풍처럼, 슬라브인들의 불만이라는 먹구름은 지나갔고 정치적 상황은 다시금 맑아졌습니다. 현지 추장들이 향후 행보에 대해 합의하지 못한 것으로 보이며, 조직적인 반란을 일으킬 기회의 창은 닫혔습니다. 결집할 깃발이 사라지자, 평민들은 다시 수확과 일상의 소박한 리듬으로 관심을 돌렸습니다. 당분간 이 땅에서 황제의 평화는 가장 강력한 힘으로 남을 것입니다." # 6215014621359912824
  slavic_unrest.0008.a: "평화란 강한 손으로 일궈낸 수확물이다." # 9749285758346710920
  slavic_unrest.0009.t: "슬라브 대봉기" # 11578241922237196419
  slavic_unrest.0009.desc: "서쪽에서 속삭이던 반란의 기운이 공개적인 저항의 함성으로 터져 나왔습니다. 세력이 걷잡을 수 없이 커지도록 방치되었던 스코페의 유력자 게오르기 보이테흐가 제국에 칼을 겨누었습니다. 그는 반란의 두뇌 역할을 하고 있지만, 그 심장은 다른 인물인 콘스탄틴 보딘 보이슬라블례비치에게서 찾았습니다. 냉소적이면서도 강력한 정치적 수단으로, 반란군들은 보딘을 오랫동안 잊혔던 불가리아 왕들의 후손으로 내세워 그들의\"차\"로 추대했습니다. 이 행위는 다뉴브강에서 핀두스 산맥에 이르기까지 불만 세력을 자극했습니다. 그들은 보이테흐라는 인물이 아니라, 그가 보딘의 머리에 씌운 왕관을 보고 보이테흐의 깃발 아래로 모여들고 있습니다. 그들의 요구는 금이나 자치권이 아닙니다. 그들은 발칸 반도에서 제국 통치의 유산을 지워버리고 그 잿더미 위에서 새로운 제국을 건설하려 합니다." # 4281208547826536506
  slavic_unrest.0009.a: "그렇다면 내가 그들의 이름을 역사에서 지워버리겠다." # 11995834676826835310
  slavic_unrest.0010.t: "진화된 불길" # 8749587871990951472
  slavic_unrest.0010.desc: "발칸 반도에서 온 파견 보고는 봉기가 끝났음을 확인해주었습니다. 수개월간의 잔혹한 전투 끝에 제국군은 반란군의 중추를 꺾어 놓았습니다. 반란 지도부는 사방으로 흩어졌고, 그들의 군대는 원래 있던 산비탈로 숨어들었습니다. 비록 피와 금화의 대가가 적지 않았으나 제국의 온전함은 보존되었습니다. 분쟁이 종결됨에 따라 서부 테마들은 다시금 제국의 확고한 통제하에 놓였지만, 전쟁의 상흔은 사라지는 데 수년이 걸릴 것이며 황폐함과 불신이라는 유산을 남겼습니다." # 9545453807186905443
  slavic_unrest.0010.a: "유감스럽지만, 필요한 일이었다." # 589285337567179429
  slavic_unrest.0011.t: "불가리아를 잃었다!" # 15184575930969083244
  slavic_unrest.0011.desc: "발칸 반도의 전쟁은 재앙으로 끝났습니다. 제국군은 참혹한 패배를 당했으며, 승리에 고무된 반란군에 의해 서부 테마에서 완전히 쫓겨났습니다. 우리의 붕괴 이후 그들은 독립을 선언했습니다. 뻔뻔스러운 의식 속에서 콘스탄틴 보딘은 새로 형성된 불가리아 왕국의 통치자로 즉위하여 제국 영토의 심장부에서 자신의 영토를 개척했습니다. 이제 스코페나 오흐리드 같은 주요 도시에는 더 이상 황제의 깃발이 휘날리지 않습니다. 오늘은 제국에게 어두운 날입니다. 연대기에 영원히 기록될 굴욕적인 타격입니다. 우리의 권위는 약해졌고, 적들은 대담해졌으며 신민들 사이에는 의심의 씨앗이 뿌려졌습니다." # 9811992942856731659
  slavic_unrest.0011.a: "이 수치는 잊히지 않을 것이며... 용서받지도 못할 것이다." # 9582303705894371920
  slavic_unrest.0012.t: "다시 태어난 왕국" # 6747309064172152068
  slavic_unrest.0012.desc: "황제의 군대가 패배했습니다! 외세의 멍에는 산산조각 났고, 그 긍지는 불가리아의 강철 앞에 꺾였습니다. 발칸 산맥의 봉우리부터 비옥한 다뉴브 평원까지, 자유의 소리가 울려 퍼집니다. 오랜 예속은 끝났습니다. 잿더미 속에서 이전보다 더 강하고 자랑스러운 새로운 왕국이 솟아올랐습니다!\n\n축하의 오흐리드 종소리가 울려 퍼지는 가운데, 원로 불가리아 보야르 사절단이 나의 새로운 왕좌로 다가옵니다. 그들의 지도자는 이 순간의 엄숙함이 새겨진 얼굴로 무릎을 꿇습니다. '위대한 통치자시여,' 그가 말을 시작합니다. '당신은 칼로 우리를 속박에서 구해내셨습니다. 당신은 이 왕국을 쟁취하셨습니다. 하지만 진정으로 통치하기 위해서는, 백성들이 당신을 해방자뿐만 아니라 우리 고대 영광의 정당한 후계자로 보아야 합니다.'\n\n그는 경외심 가득한 목소리로 말을 잇습니다. \"페타\"라는 이름은 모든 불가리아인에게 사랑받는 이름입니다. 그것은 우리의 황금기를 다스렸던 성스러운 통치자 페타르 1세의 경건함과 힘을 떠올리게 합니다. 이 이름을 취함으로써, 당신이 고생 끝에 얻은 유산을 그의 축복받은 유산과 결합하십시오. 콘스탄틴 보딘을 우리를 해방시킨 영웅으로 남게 하시고, 페타르를 우리 백성의 아버지가 될 통치자로 삼으소서.'" # 16767435692408378004
  slavic_unrest.0012.a: "현명한 제안이군. 백성들이 필요로 하는 통치자가 되겠다." # 13490084481348223324
  slavic_unrest.0012.b: "나는 콘스탄틴 보딘으로서 이 왕좌를 쟁취했다. 콘스탄틴 보딘으로서 다스릴 것이다." # 1802704096105307942
  slavic_unrest.0013.t: "차르가 선포되다!" # 11467646389782017095
  slavic_unrest.0013.desc: "수도의 광장은 인산인해를 이루고 있습니다. 화려한 예복을 입은 보야르들과 사슬 갑옷을 입은 병사들, 그리고 도시 구석구석에서 모여든 평민들이 이 광경을 목격하기 위해 모였습니다. 내가 궁전 발코니에 서자, 전령이 무거운 양피지 두루마리를 들고 앞으로 나옵니다.\n\n그의 목소리가 광장에 울려 퍼지며 오랜 예속의 종말과 새로운 시대의 서막을 알립니다. 그는 승리한 전투와 단결된 백성, 그리고 되찾은 운명에 대해 이야기합니다. 마침내 그는 자부심 넘치는 목소리로 불가리아 차르국의 부활을 선포하고, 나 [ROOT.Char.GetFirstNameNoTooltip](을)를 그 첫 번째 차르로 명명합니다!\n\n잠시 동안 정적이 흐릅니다. 그러더니 광장이 요동치기 시작합니다. 수천 명의 입에서 '차르! 차르! 차르!'라는 천둥 같은 함성이 터져 나오며, 그 소리의 파동이 돌벽마저 뒤흔듭니다. 긍지 높은 보야르들은 칼을 뽑아 높이 들어 경의를 표하고, 그들의 환호성이 소음 속에 뒤섞입니다.\n\n제1제국은 이제 기억일 뿐입니다. 새로운 제국은 살아 숨 쉬는 현실입니다. 불가리아 차르국이 다시 살아났습니다." # 16834450212422201240
  slavic_unrest.0013.a: "차르로서의 나의 의무가 이제 시작된다." # 9257604799650452885
  balkan_folly_modifier: "발칸의 어리석음" # 2469080168509604261
  balkan_folly_modifier_desc: "남슬라브족을 평정하려던 나의 원대한 계획은 처참하게 역효과를 냈으며, 방지하려던 반란을 오히려 부추기고 나를 나약하고 어리석게 보이게 만들었습니다." # 14753992697798090653
  smoldering_slavic_resentment_modifier: "들끓는 슬라브의 원한" # 17943114305336227296
  smoldering_slavic_resentment_modifier_desc: "현지 슬라브 민중은 멀리 떨어진 콘스탄티노폴리스에 의해 무시당하고 착취당한다고 느낍니다. 제국의 세무 공무원들은 의심의 눈초리를 받으며, 외부인은 지역 공동체에서 환영받지 못합니다. 이곳의 권위는 취약합니다." # 7369326115126328478
  restored_balkan_province_modifier: "회복된 발칸 속주" # 544296762533681919
  restored_balkan_province_modifier_desc: "이 속주는 성공적으로 평정되어 제국에 재통합되었습니다. 백성들은 충성스럽고, 지역 행정은 효율적이며, 이 땅은 제국 경제에 온전히 기여하고 있습니다." # 7819907486217262321
  georgi_voiteh_rebels: "게오르기 보이테흐의 반란군" # 7823047839803768207
  constantine_bodin_contingent: "보딘의 정예병" # 4251596476807313853
  loyalist_bulgarian_army: "충성파 군대" # 12156410768484629818
  bulgarian_independence_cb: "슬라브 대봉기" # 11578241922237196419
  nick_bodin: "보딘" # 13632063769151693361
  nick_bodin_desc: "세르비아의 크네즈이자 훗날의 왕인 미하일로 보이슬라블례비치의 아들인 콘스탄틴 보딘은 형제들 사이에서 기민하고 계산 빠른 왕자로 두각을 나타냈습니다." # 10471519323365459711
  petrilo: "페트릴로" # 9726003714278656677
  generated_rebel_leader_name: "페타르" # 7077737007476939292
  petar: "페타르" # 7077737007476939292
  VIDIN_LOCATION_1_TOOLTIP: "비딘 테마가 귀하의 영토 내에 있습니다" # 4378528587714779010
  BULGARIA_LOCATION_2_TOOLTIP: "불가리아 테마가 귀하의 영토 내에 있습니다" # 643666136866554980
  TURNOVO_LOCATION_3_TOOLTIP: "모에시아 테마가 귀하의 영토 내에 있습니다" # 2719415425695458388
  e_bulgaria: "불가리아 차르국" # 10773196119139716367
  e_bulgaria_adj: "불가리아" # 10473958699367931300
  empire_of_bulgaria_decision: "불가리아 차르국 형성" # 16207025795754103047
  empire_of_bulgaria_decision_desc: "옛 칸들과 차르들이 황제들의 숙적이었던 제1제국의 기억은 로마의 발꿈치 아래 짓밟혀 오랫동안 잊힌 것으로 여겨졌습니다. 수 세대 동안 우리 백성들은 흩어지고 우리 땅은 분열되어 이민족의 멍에 아래 신음했습니다. 그 예속의 시대는 이제 끝났습니다. 피와 확고한 의지를 통해 선조의 심장부를 되찾았으며 보야르들의 깃발이 다시 한번 결집했습니다. 이제 전장에서 쟁취한 결실을 공식화할 때입니다. 우리는 미천한 작위들을 내던지고 계승과 정복의 권리에 따른 우리의 왕관을 차지해야 합니다. 이 선언은 전 세계에 불가리아 제국이 부활했음을, 그리고 차르가 다시 이 땅을 통치함을 알릴 것입니다." # 494012246980794958
  empire_of_bulgaria_decision_tooltip: "남슬라브 땅이 불가르인의 철권 아래 하나의 차르국으로 통합됩니다" # 6226805842598972948
  empire_of_bulgaria_decision_effect_tooltip: "남슬라브 땅이 불가르인의 철권 아래 하나의 차르국으로 통합됩니다" # 6226805842598972948
  empire_of_bulgaria_decision_confirm: "불가리아 제국 선포" # 7613465094048503290
  title_bulgarian_tsar_male: "차르" # 4358253377175785688
  title_bulgarian_tsar_female: "차리나" # 3749445363252026030
  title_bulgarian_tsar: "차르국" # 3393529145639846724
  founded_empire_of_bulgaria_modifier: "불가리아의 중건자" # 15933981279510091660
