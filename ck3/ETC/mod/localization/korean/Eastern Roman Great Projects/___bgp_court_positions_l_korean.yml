l_korean:
  aurelian_walls_prefect_court_position: "아우렐리아누스 성벽 장관" # 9974340765027510444
  aurelian_walls_prefect_court_position_desc: "성벽 장관은 로마의 거대한 아우렐리아누스 성벽의 지휘, 유지 보수 및 보안을 담당하는 관리입니다. 유능한 장관은 도시의 방어 태세를 항상 최상으로 유지하고, 주둔군이 경계를 늦추지 않게 하며, 구조물을 견고하게 관리합니다." # 6260503407895950667
  court_position_drunkard_trait: "주정뱅이 특성" # 6763425359049313895
  aurelian_walls_prefect_employer_custom_effect_description: "장관의 능력은 통치자에게 다음과 같은 효과를 부여합니다:" # 18156441847794377220
  aurelian_walls_prefect_task_focus_fortifications: "요새화 집중" # 3384086789650862747
  aurelian_walls_prefect_task_focus_fortifications_desc: "장관은 성벽의 물리적 건전성을 최우선 과제로 삼으라는 명령을 받았습니다. 자원은 석공과 기술자들에게 집중되어 성벽, 탑, 성문의 지속적인 수리와 개선에 투입될 것입니다.\n\n이러한 집중적인 노동은 도시의 방어력을 크게 향상시키고 투자를 유도하겠지만, 병사들의 훈련과 주둔군의 일상적인 관리를 소홀히 하는 대가를 치르게 됩니다." # 17690907233656421614
  aurelian_walls_prefect_task_focus_maa: "무장병 훈련 집중" # 2092988866974528228
  aurelian_walls_prefect_task_focus_maa_desc: "이 지침에 따라 장관은 도시를 무술 학교로 변모시켜, 시설을 활용해 전문 무장병들을 엄격하게 훈련시킵니다. 이 정예 병사들은 성벽을 따라 계속되는 훈련을 통해 더욱 치명적인 전투 부대로 거듭날 것입니다.\n\n공격력에 대한 이러한 집중은 우리 주력군이 전장에서 더 강해짐을 의미하지만, 일상적인 성벽 유지 보수와 일반 주둔군의 준비 태세는 약화될 것입니다." # 10429315196725051153
  aurelian_walls_prefect_task_garrison: "주둔군 관리 집중" # 4879267276548354726
  aurelian_walls_prefect_task_garrison_desc: "이 과업은 장관이 직무의 행정적 의무에 집중하도록 합니다. 장관은 순찰 경로를 최적화하고, 보급 창고를 관리하며, 지역 징집병 주둔군이 완전한 병력을 유지하고 잘 훈련되도록 보장하여, 어떤 공성전이라도 공격자에게 막대한 비용과 시간이 드는 일이 되게 할 것입니다.\n\n이는 강력한 능동 방어를 구축하지만, 일반 병사에 대한 강조는 정예 병사의 전문 훈련을 희생시키고 새로운 건설 프로젝트에 대한 관심을 분산시킵니다." # 8505781907032289826
  aurelian_walls_prefect_1: "장관의 요새화 집중" # 4663665638883248214
  aurelian_walls_prefect_1_desc: "장관의 관심이 돌과 모르타르에 고정되면서, 아우렐리아누스 성벽은 그 어느 때보다 견고해졌습니다. 석공과 기술자들이 끊임없이 순찰하며 모든 균열을 메우고 모든 탑을 보강합니다. 그러나 기반 시설에 대한 이러한 확고한 집중은 병사들의 훈련이 소홀해졌음을 의미합니다. 도시는 그 자체로 강력한 요새이지만, 그곳에서 출격할 병사들은 야전을 치를 준비가 덜 되어 있습니다." # 11762278605066160786
  aurelian_walls_prefect_2: "장관의 훈련 집중" # 5115838774923971677
  aurelian_walls_prefect_2_desc: "도시는 엄격한 훈련장으로 변모했습니다. 장관의 감시 아래, 우리 무장병들은 끊임없이 훈련하며 그 기술을 날카롭게 갈고닦았습니다. 그러나 이러한 강도 높은 체계는 일상적인 업무에서 자원을 빼앗아 갔습니다. 성벽 유지 보수는 줄어들었고 일반 주둔군은 병력이 부족합니다. 우리의 전문 군대는 강력하지만, 도시의 정적인 방어력은 약화되었습니다." # 790157126711540459
  aurelian_walls_prefect_3: "장관의 주둔군 집중" # 9989086514780847931
  aurelian_walls_prefect_3_desc: "장관의 모든 관심은 병참과 인력에 쏠려 있습니다. 도시의 주둔군은 최대 병력을 유지하고 있으며, 보급 창고는 넘쳐나고, 모든 초병은 자신의 위치를 숙지하고 있습니다. 어떤 공격자라도 인간의 벽과 길고 비용이 많이 드는 공성전에 직면하게 될 것입니다. 그러나 내부 준비 태세에 대한 이러한 헌신은 새로운 건설을 감독할 시간을 거의 남기지 않습니다." # 11590151267645860536
  domestikos_of_the_walls_task_focus_fortifications: "요새화 집중" # 3384086789650862747
  domestikos_of_the_walls_task_focus_fortifications_desc: "도메스티코스는 거대한 테오도시우스 성벽의 물리적 유지 관리에 모든 노력을 기울여야 합니다. 숙련된 건축가와 기술자들은 외벽을 보강하고, 거대한 해자를 준설하며, 거의 200개에 달하는 탑의 구조적 건전성을 확보하는 임무를 맡게 될 것입니다. 이러한 정적 방어에 대한 집중은 정예 타그마타의 훈련에서 자원과 관심을 돌리게 됩니다." # 10171484962958590150
  domestikos_of_the_walls_task_focus_maa: "타그마타 훈련 집중" # 18401489634369737964
  domestikos_of_the_walls_task_focus_maa_desc: "도시의 훈련장에는 강철이 부딪히는 소리가 울려 퍼질 것입니다. 도메스티코스는 정예 타그마타와 바랑기안 근위대의 엄격한 훈련을 감독하여, 바실레우스의 철권이 더욱 치명적인 전쟁의 도구가 되도록 연마할 것입니다. 전문 병사들에 대한 이러한 집중은 성벽 자체의 일상적인 유지 보수를 희생시키며, 칼을 가는 대가로 도시의 방패는 방치되고 있습니다." # 3848422218846631236
  domestikos_of_the_walls_task_garrison: "주둔군 관리 집중" # 4879267276548354726
  domestikos_of_the_walls_task_garrison_desc: "이 임무는 도메스티코스가 도시의 방어 병력을 최대로 확보하도록 지시합니다. 주둔군 징집병은 완편 상태로 유지될 것이며, 블라케르나이의 무기고는 가득 채워지고, 순찰 경로는 최대의 경계 태세를 위해 최적화될 것입니다. 잘 관리된 주둔군은 침략자를 저지할 뿐만 아니라, 도시의 수많은 대중 사이의 질서를 보장합니다." # 7609897612373340725
  domestikos_of_the_walls_court_position: "성벽의 도메스티코스" # 2938196166555591551
  domestikos_of_the_walls_court_position_desc: "성벽의 도메스티코스는 콘스탄티노폴리스의 전설적인 테오도시우스 성벽의 지휘와 유지를 담당하는 명망 높은 군사 관직입니다. 이 관리는 '도시들의 여왕'을 지키는 궁극의 방패이며, 수비대를 지휘하기 위한 장군의 무력과 복잡한 3중 방어선을 유지하기 위한 거장 건축가의 관리력을 동시에 필요로 합니다. 그들의 기량은 수도 보안의 직접적인 척도가 됩니다." # 15741166984639558704
  theodosian_walls_domestikos_1: "도메스티코스의 요새화 집중" # 15595040922229360914
  theodosian_walls_domestikos_1_desc: "도메스티코스의 지휘 아래, 테오도시우스 성벽은 방어층이 세심하게 관리되어 더욱 위협적인 장애물이 되었습니다. 감히 '도시들의 여왕'을 공격하려는 군대는 절벽에 부딪히는 파도처럼 성벽 위에서 무너질 것입니다. 하지만 모든 시선이 성벽에 쏠리면서, 전문 군대인 타그마타의 훈련 예산이 삭감되었고 야전 준비 태세가 약화되었습니다." # 5540127696953542940
  theodosian_walls_domestikos_2: "도메스티코스의 훈련 집중" # 13751072171979612888
  theodosian_walls_domestikos_2_desc: "정예 타그마타는 무시할 수 없는 전력이며, 수도 내에서 도메스티코스의 강도 높은 훈련 체계를 통해 그들의 기술은 완벽하게 연마되었습니다. 우리의 상비군은 그 어느 때보다 치명적입니다. 그러나 이러한 전장 중심의 집중은 도시의 복잡한 방어 시설 유지에 소홀함을 불러왔고, 결연한 공성전 앞에 도시를 더 취약하게 만들었습니다." # 15765711188779161372
  theodosian_walls_domestikos_3: "도메스티코스의 주둔군 집중" # 5508977056387962012
  theodosian_walls_domestikos_3_desc: "도메스티코스가 도시의 방어 병력을 극대화했습니다. 주둔군은 완편되었고, 초병들은 경계를 늦추지 않으며, 보급 창고는 터져나갈 듯 가득 찼습니다. 도시는 그 어떤 긴 공성전도 견뎌낼 준비가 되었습니다. 도시 내부 보안에 대한 이러한 집중은 정예 야전군의 전문 훈련 부족으로 이어져, 회전에서의 날카로움을 다소 무디게 만들었습니다." # 12229687006832979229
