  uba_decisions.8000.desc: "$uba_decisions.2000.desc$" # 14213830960904078489
  uba_decisions.8000.academy: "...방대한 서적의 도서관." # 12440223371493376894
  uba_decisions.8000.academy.flavor: "$building_type_UBA_academy_01$ 건설을 고려하고 있습니다." # 13757527587204397340
  uba_decisions.8000.garden: "...살아있는 정원" # 3526716971520284314
  uba_decisions.8000.garden.flavor: "$building_type_UBA_garden_01$ 건설을 고려하고 있습니다." # 11327876016254041648
  uba_decisions.8000.hunting: "...야생 사냥터." # 2363591332481408951
  uba_decisions.8000.hunting.flavor: "$building_type_UBA_hunting_01$ 건설을 고려하고 있습니다." # 484109390162925246
  uba_decisions.8100.t: "건축 계획: $building_type_UBA_academy_01$" # 6763824799769422064
  uba_decisions.8100.desc: "지식의 계승을 보장하기 위해 방대한 도서관을 건설하겠습니다.\n\n이곳은 지식의 궁전이자 문화의 요람이 될 것입니다. 이곳에는 알렉산드리아 도서관을 능가하는 수많은 서적이 있을 것이며, 그 지식은 바그다드의 지혜의 궁전보다 더 위대할 것입니다." # 2032926449362539525
  uba_decisions.8100.a: "$uba_decisions.1100.a$" # 8808037058914094669
  uba_decisions.8100.a_tt: "$uba_decisions.2100.a_tt$" # 6201425305918770023
  uba_decisions.8200.t: "건축 계획: $building_type_UBA_garden_01$" # 8805794472278842984
  uba_decisions.8200.desc: "예술가의 꿈속 풍경을 재현할 놀라운 정원을 건설하겠습니다.\n\n이 기적 같은 정원은 계절이 바뀌어도 그 아름다움을 잃지 않도록 전 세계의 이국적인 꽃과 식물을 수집할 것이며, 바빌론과 페르시아의 고대 불가사의조차 이에 비하면 빛을 잃을 것입니다." # 15710374226936480741
  uba_decisions.8200.a: "$uba_decisions.1100.a$" # 8808037058914094669
  uba_decisions.8200.a_tt: "$uba_decisions.2100.a_tt$" # 6201425305918770023
  uba_decisions.8300.t: "건축 계획: $building_type_UBA_hunting_01$" # 3794333930363033118
  uba_decisions.8300.desc: "야생 사냥터를 건설하고 근처의 미개발지를 모두 에워싸겠습니다.\n\n사냥터 가장자리에는 사냥 시설이 설치될 것이며, 호화로운 별장까지 포함하여 사냥을 고급스러운 경험으로 만들 것입니다." # 4782433080664396040
