l_korean:
  uba_nomadic_decisions.0001.t: "건축 계획: 초원 위에서" # 11818557835111614424
  uba_nomadic_decisions.0001.desc: "이 초원의 건물은 이미 너무 작고 낡았어... 내 기대에 미치지 못하는군!\n\n이 땅을 다스릴 나의 신성한 권리를 부정할 자는 없으며, 이 건물은 그것을 영원히 증명할 것이다.\n\n이 웅장한 계획을 계속하기 위해 당장 찾을 수 있는 모든 장인을 불러 모아야겠어!" # 16386062968618615428
  uba_nomadic_decisions.0001.a: "지금 시작하라!" # 17826254662410414639
  uba_remove_decisions.0001.t: "경이로운 건축: 부지 정리" # 11106194868300911749
  uba_remove_decisions.0001.desc: "장인들이 한때 유명했던 이 건물을 철거할 준비를 마쳤다.\n\n아... 생각해보라, 더 위대한 건물이 그 자리를 대신할 것이다. 완성된다면 나의 권력과 영광을 보여주겠지!" # 6374224074740431864
  uba_remove_decisions.0001.a: "아쉬움이 남을지도 모르겠군." # 2554652780324591878
  uba_remove_decisions.0001.a.flavor: "이곳의 특수 건물은 철거될 것이다.\n\n후회된다면, 나중에 더 많은 비용을 들여 건물을 재건할 수 있다." # 4584452820940097103
  uba_decisions.0001.t: "경이로운 건축: 부지 선정" # 12897352618338271899
  uba_decisions.0001.desc: "[uba_building_locale.GetName]의 높은 곳에 서니 주변 풍경이 한눈에 들어오는군.\n\n둘러보던 중, 멀리 괜찮은 공터가 있다는 것을 깨달았다. 지형이 평탄하여 건설하기 쉽고, 교통도 비교적 편리하다. 적절한 장소인 것 같군." # 11164302144369765568
  uba_decisions.0001.a: "그럼 결정했다." # 6446797874537088804
  uba_decisions.0001.a_tt: "향후 건설 프로젝트의 부지로 [uba_building_locale.GetNameNoTooltip]을(를) 선택했다." # 2530664538186444991
  uba_decisions.0001.cancel: "좋은 생각이 아닌 것 같군." # 12415380519980180394
  uba_decisions.0001.cancel_tt: "당신은 [uba_building_locale.GetNameNoTooltip]에 건설하려던 생각을 조용히 포기했다." # 5555271753817327523
  uba_decisions.0999.t: "세계의 경이: [uba_building_province.GetNameNoTooltip]" # 16391600730666194856
  uba_decisions.0999.desc: "수십 년, 수 세기가 흐른 뒤, 나의 꿈은 마침내 현실이 되었다:\n\n[uba_building_province.GetName]의 위대한 경이는 이제 그 중요한 상징이 되어 수많은 관광객과 학자들을 불러 모으고 있다. 누가 이런 위대한 기적을 만들었는지 모르는 이는 없을 것이다!\n\n오늘날, 모두가 [ROOT.Char.GetDynasty.GetName]의 이름을 기억할 것이다." # 15208371315874137466
  uba_decisions.0999.a: "완성되었다." # 2565713411589481999
  uba_decisions.0999.a.flavor: "$trait_architect_desc$" # 4886750915547297863
  uba_decisions.0998.t: "$building_UBA_secret_05$：[uba_building_province.GetNameNoTooltip]" # 4498266621449635373
  uba_decisions.0998.desc: "수십 년, 수 세기가 흐른 뒤, 나의 꿈은 마침내 현실이 되었다:\n\n[uba_building_province.GetName]의 비밀 궁전이 이제 완성되었다... 그리고 그것은 나의 것이 될 것이다. 비밀 은신처는 또한 나의 음모의 중심지가 될 것이다.\n\n오늘날, 모두가 [ROOT.Char.GetDynasty.GetName]의 이름을 두려워할 것이다." # 1641886266109321164
  uba_decisions.1000.t: "건축 계획: $uba_building_decision_wall$" # 10605947321315260417
  uba_decisions.1000.desc: "나의 생애도 언젠가 끝을 맞이하겠지만, 내가 만든 이 건물은 내 뒤의 변화를 목격할 것이다. 다음 질문은 이것이다:\n\n무엇이 나를 세상에 기억될 만한 가치가 있게 만드는가?" # 13331320722203399065
  uba_decisions.1000.achievement: "나의 공적이면 충분히 답이 될 것이다." # 15619648607838809253
  uba_decisions.1000.achievement.flavor: "당신은 자신의 업적을 반영할 건물을 건설하는 것을 고려하고 있다." # 2288714469316379709
  uba_decisions.1000.wall: "나의 성벽은 대대로 내 백성을 보호할 것이다." # 3526695240798048905
  uba_decisions.1000.wall.flavor: "당신은 $building_type_UBA_wall_01$ 건설을 고려하고 있다." # 6443578286413966926
  uba_decisions.1000.test: "...그저 시험 중입니다." # 16625195050299553918
  uba_decisions.1000.test.flavor: "이곳에 시험용 건물을 건설하기로 결정하셨습니다." # 18268463993190506916
  uba_decisions.1000.back: "...아마도 좋은 생각은 아닌 것 같군요." # 17322311948144708765
  uba_decisions.1000.back.flavor: "그래서 당신은 조용히 이 생각을 포기했습니다." # 18128030817225678940
  uba_decisions.1000.cancel: "...아마도 다른 장소를 선택해야 할 것 같습니다." # 2601186815728396440
  uba_decisions.1000.cancel.flavor: "그래서 당신은 조용히 건설 계획을 포기했습니다." # 17873364380945080296
  uba_decisions.1001.t: "건축 계획: 역사에 기억되리라" # 13538105544297134649
  uba_decisions.1001.desc: "내가 역사에 기억되기를 #EMP 바라는#! 것이 아니라, 역사가 나를 #EMP 기억해야#! 하는 것이다!\n\n나의 업적은 수많은 보잘것없는 자들을 #EMP 넘어섰으며#!;\n나는 이 세상에 뚜렷한 족적을 #EMP 남겼다#!;\n그리고 나는 이 세상이 영원히 나의 이름을 기억하게 #EMP 만들 것이다#!:" # 6725621225180940045
  uba_decisions.1001.a: "\"나는 북해의 지고한 왕이자, 만 섬과 제도의 군주이다.\"" # 9485228238468974344
  uba_decisions.1001.tt: "당신은 $great_project_type_uba_construct_valhalla$ [great_project|E]를 시작할 수 있습니다." # 16550711935285611848
  uba_decisions.1001.a.flavor: "북방의 영역을 통일한 왕, 북해를 정복한 군주, 지고한 왕의 옥좌를 주조한 자." # 11878734999714952312
  uba_decisions.1001.b: "나는 우트르메르의 군주이자, 십자군을 지휘하는 사령관이다." # 10173422460810001287
  uba_decisions.1001.b.flavor: "\"나는 우리 주님의 성스러운 십자가를 바다에서 바다 끝까지 심었노라.\"" # 4478100978600242710
  uba_decisions.1001.b.tt: "당신은 $great_project_type_uba_construct_headquarter$ [great_project|E]를 시작할 수 있습니다." # 15639157841516845732
  uba_decisions.1010.t: "피와 금의 도시" # 13039942777122182761
  uba_decisions.1010.desc.pagan: "수년 동안 나는 칠해에서 수많은 부를 약탈하여 높은 성벽 안에 쌓아 올렸다. 이제 나는 이 보물들을 수용할 더 웅장한 도시가 필요하다.\n\n이 도시는 지상의 발할라를 닮아야 하며, 그곳에서 나는 모든 바이킹 전사들을 불러모아 나를 위해 싸우게 할 것이다. 칠해의 모든 #EMP 부#!와 #EMP 영광#!을 위해서. 그것이 오딘의 뜻이다.\n\n이 도시는 세상의 모든 보물을 차지하고 모을 것이며;\n이 도시는 음유시인들의 노래를 통해 전 세계에 명성을 떨칠 것이고;\n이 도시는 [ROOT.Char.GetHouse.GetBaseNameNoTooltip][ROOT.Char.GetTitleAsNameNoTooltip]이라는 이름으로 영원히 기억될 것이다!" # 18347316296060915955
  uba_decisions.1010.desc.else: "수년 동안 나는 칠해에서 수많은 부를 약탈하여 높은 성벽 안에 쌓아 올렸다. 이제 나는 이 보물들을 수용할 더 웅장한 도시가 필요하다.\n\n이 도시는 북해의 해안에 영원히 서서, #EMP 부#!와 #EMP 영광#!을 위해 나를 위해 싸울 수많은 영웅들을 불러모을 것이다.\n\n이 도시는 세상의 모든 보물을 차지하고 모을 것이며;\n이 도시는 음유시인들의 노래를 통해 전 세계에 명성을 떨칠 것이고;\n이 도시는 [ROOT.Char.GetHouse.GetBaseNameNoTooltip][ROOT.Char.GetTitleAsNameNoTooltip]이라는 이름으로 영원히 기억될 것이다!" # 7268354270683624891
  uba_decisions.1010.a: "북해 군주의 이름은 영원히 지속되리라." # 13127661750654551444
  uba_decisions.1010.a.flavor: "당신의 이름은 모두에게 칭송받을 것이며, 당신의 업적은 영원히 남을 것이다." # 1054248224137768447
  uba_decisions.1011.t: "십자군의 도시" # 9703938692522321180
  uba_decisions.1011.desc: "마침내, 진정으로 성스러운 땅이여! 아스칼론에서 오마르까지 황금 십자가가 빛나고, 이교도들은 성지에서 완전히 쫓겨났다.\n\n이 도시는 우트르메르에 영원히 서서, #EMP 신앙#!과 #EMP 영광#!을 위해 싸울 수많은 전사들을 불러모을 것이다.\n\n이 도시는 [ROOT.Char.GetFaith.HighGodName]의 이름과 함께 영원히 지속될 것이다!" # 16129710334228843481
  uba_decisions.1011.a: "신의 이름으로!" # 620682036202363887
  uba_decisions.1011.a.flavor: "우리에게가 아니라, 주여, 우리에게가 아니라 오직 주님의 이름에 영광을 돌리소서." # 8422732962947480116
  uba_decisions.1100.t: "건축 계획: $building_type_UBA_wall_01$" # 674460745697461604
  uba_decisions.1100.desc: "나는 내 백성을 영원히 보호할 튼튼한 성벽을 세우리라.\n\n영원한 수호자이자 불멸의 기념비로서, 이 성벽은 수많은 비바람과 전쟁을 견뎌내며 대대로 백성을 보호할 것이다." # 2820767082867153575
  uba_decisions.1100.a: "그것으로 충분하다." # 886435802842278738
  uba_decisions.1100.a_tt: "당신은 $great_project_type_uba_construct_wall$ [great_project|E]를 시작할 수 있다." # 6540515771931299895
  uba_decisions.1100.back: "$uba_decisions.1000.back$" # 10777709133793823816
  uba_decisions.1100.back.flavor: "$uba_decisions.1000.back.flavor$" # 15999321757731740733
  uba_decisions.1999.t: "건축 계획: 시험" # 4095840084958219831
  uba_decisions.1999.desc: "대상 위치에 시험용 건물을 건설한다" # 11469152403650887792
  uba_decisions.1999.a: "그것으로 충분하다." # 886435802842278738
  uba_decisions.1999.a_tt: "대상 위치에 시험용 건물을 건설한다" # 11469152403650887792
  uba_decisions.2000.t: "건축 계획: $uba_building_decision_diplomacy$" # 7225694816262283845
  uba_decisions.2000.desc: "내 생은 언젠가 끝을 맞이하겠지만, 내가 세운 이 건축물은 내 뒤에 남겨진 변화를 증명할 것이다.\n\n그 누구도 이 땅을 통치할 나의 신성한 권리를 부정할 수 없으며, 이 건축물은 그것을 영원한 표식으로 남길 것이다..." # 14679426289142040806
  uba_decisions.2000.colosseum: "...세상의 극장보다 더 나은 곳." # 11479597184747820145
  uba_decisions.2000.colosseum.flavor: "당신은 $building_type_UBA_colosseum_01$ 건설을 고려하고 있다." # 11897792961410638901
  uba_decisions.2000.palace: "...웅장한 궁전." # 7965060163040777538
  uba_decisions.2000.palace.flavor: "당신은 $building_type_UBA_palace_01$ 건설을 고려하고 있다." # 17961122216140513285
  uba_decisions.2000.reserve: "...숲 정원은 오직 나의 것이다." # 6613701937343340760
  uba_decisions.2000.reserve.flavor: "당신은 $building_type_UBA_reserve_01$ 건설을 고려하고 있다." # 16462451760465435146
  uba_decisions.2100.t: "건축 계획: $building_type_UBA_colosseum_01$" # 4819146157435935040
  uba_decisions.2100.desc: "나는 세상에 비할 데 없는 극장을 지어 대리석을 경이로운 기적으로 바꾸리라.\n\n연극과 음악의 예술은 그 비범한 매력으로 수천의 눈길을 사로잡을 것이며, 이 극장은 무대 위에서 수많은 웃음과 꿈을 뒷받침할 것이다." # 2324197477164290678
  uba_decisions.2100.a: "$uba_decisions.1100.a$" # 8808037058914094669
  uba_decisions.2100.a_tt: "웅장한 건설 프로젝트가 시작되려 하니, 적절한 위치를 선택해야겠다." # 11146395179694389371
  uba_decisions.2200.t: "건축 계획: $building_type_UBA_palace_01$" # 452865065504458490
  uba_decisions.2200.desc: "나는 내 통치의 위대함을 세상에 알릴 웅장한 궁전을 지으리라.\n\n궁전의 높은 성벽은 수십만 년의 흥망성쇠를 목격할 것이며, 웅장한 돔은 나의 영광과 꿈처럼 역사의 비바람 속에서도 영원히 서 있을 것이다." # 16322399350149772069
  uba_decisions.2200.a: "$uba_decisions.1100.a$" # 8808037058914094669
  uba_decisions.2200.a_tt: "$uba_decisions.2100.a_tt$" # 6201425305918770023
  uba_decisions.2300.t: "건축 계획: $building_type_UBA_reserve_01$" # 7764158463995648275
  uba_decisions.2300.desc: "나는 세상에 비할 데 없는 숲 정원을 지어 그 아름다움으로 온 세상을 놀라게 하리라.\n\n산과 강, 나무와 궁전, 정자가 서로 어우러져 세상에 보기 드문 호화로운 정원을 이룰 것이다." # 12407838304322251134
  uba_decisions.2300.a: "$uba_decisions.1100.a$" # 8808037058914094669
  uba_decisions.2300.a_tt: "$uba_decisions.2100.a_tt$" # 6201425305918770023
  uba_decisions.3000.t: "건축 계획: $uba_building_decision_martial$" # 9802337440469748834
  uba_decisions.3000.desc: "$uba_decisions.2000.desc$" # 14213830960904078489
  uba_decisions.3000.castle: "...난공불락의 요새." # 12649944445378292473
  uba_decisions.3000.castle.flavor: "$building_type_UBA_castle_01$ 건설을 고려하고 있습니다." # 17873939224466766820
  uba_decisions.3000.tower: "...웅장하고 높은 탑." # 12116152861264002284
  uba_decisions.3000.tower.flavor: "$building_type_UBA_tower_01$ 건설을 고려하고 있습니다." # 57505236390586381
  uba_decisions.3000.knight: "...최고의 영광을 누릴 군사 아카데미" # 17637790187587637230
  uba_decisions.3000.knight.flavor: "$building_type_UBA_knight_01$ 건설을 고려하고 있습니다." # 11498310677953220413
  uba_decisions.3100.t: "건축 계획: $building_type_UBA_castle_01$" # 2731531557046861247
  uba_decisions.3100.desc: "난공불락의 요새를 건설하여 나의 힘과 결의를 세상에 보여주리라.\n\n이 요새는 대대로 영주들의 영광과 백성들의 평온을 수호할 것이며, 수많은 기사와 장군들의 업적을 증명할 것이다." # 16637731272223541338
  uba_decisions.3100.a: "$uba_decisions.1100.a$" # 8808037058914094669
  uba_decisions.3100.a_tt: "$uba_decisions.2100.a_tt$" # 6201425305918770023
  uba_decisions.3200.t: "건축 계획: $building_type_UBA_tower_01$" # 17184922707890403525
  uba_decisions.3200.desc: "하늘 높이 솟은 탑을 건설하여 영토를 확실히 통제하리라.\n\n위압적인 탑은 잠재적인 침입자로부터 영지를 보호할 뿐만 아니라, 길을 오가는 이들에게 이정표가 되어줄 것이다." # 8614972112450783770
  uba_decisions.3200.a: "$uba_decisions.1100.a$" # 8808037058914094669
  uba_decisions.3200.a_tt: "$uba_decisions.2100.a_tt$" # 6201425305918770023
  uba_decisions.3300.t: "건축 계획: $building_type_UBA_knight_01$" # 9185234121577049949
  uba_decisions.3300.desc: "최고의 영광을 누릴 군사 아카데미를 건설하여 나의 군대를 위해 더욱 용맹한 전사들을 길러내리라.\n\n수많은 기사와 장교들이 이곳에서 전장으로 나아갈 것이며, 그 명성은 나의 적들을 공포에 떨게 할 것이다." # 18238782334400968721
  uba_decisions.3300.a: "$uba_decisions.1100.a$" # 8808037058914094669
  uba_decisions.3300.a_tt: "$uba_decisions.2100.a_tt$" # 6201425305918770023
