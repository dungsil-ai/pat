  uba_decisions.7000.holyland.flavor: "$building_type_UBA_holyland_01$ 건설을 고려하고 있습니다." # 16464923276381647956
  uba_decisions.7000.basins: "...저수지, 분지." # 17131210733168584021
  uba_decisions.7000.basins.flavor: "$building_type_UBA_basins_01$ 건설을 고려하고 있습니다." # 2367025450224344426
  uba_decisions.7100.t: "건축 계획: 교역소" # 14356998687094412897
  uba_decisions.7100.desc.market: "상인들이 모여 전 세계의 희귀한 보물을 수집할 시장을 건설하겠습니다.\n\n전 세계의 물품과 사람들이 거의 본 적 없는 화폐, 그리고 세상의 모든 부가 이곳에 모일 것입니다." # 1057737524388312142
  uba_decisions.7100.market: "$uba_decisions.1100.a$" # 8808037058914094669
  uba_decisions.7100.market_tt: "$uba_decisions.2100.a_tt$" # 6201425305918770023
  uba_decisions.7100.desc.port: "무역로의 보석이자 배들로 가득한 항구를 건설하겠습니다.\n\n이 항구는 도시와 통합되어 끊임없이 배들이 드나들 것입니다. 수많은 꿈을 실어 나르고 수많은 삶을 목격할 것입니다." # 17822611497189138731
  uba_decisions.7100.port: "$uba_decisions.1100.a$" # 8808037058914094669
  uba_decisions.7100.port_tt: "$uba_decisions.2100.a_tt$" # 6201425305918770023
  uba_decisions.7200.t: "건축 계획: $building_type_UBA_holyland_01$" # 15315018414543102587
  uba_decisions.7200.desc: "세상 그 누구도 상상하지 못한 길을 실천하겠습니다. 전 세계의 신도들이 이곳에 모일 수 있을 것입니다...\n\n...하지만 그들은 서로 싸우는 대신 서로를 존중할 것입니다. 신앙. 그들은 축복을 빌고, 고통을 없애며, 세상에 평화의 씨앗을 뿌릴 것입니다.\n\n어려운 일이겠지만, 우리는 시도해 볼 수 있습니다." # 13775464809611852548
  uba_decisions.7200.a: "$uba_decisions.1100.a$" # 8808037058914094669
  uba_decisions.7200.a_tt: "$uba_decisions.2100.a_tt$" # 6201425305918770023
  uba_decisions.7300.t: "건축 계획: $building_type_UBA_basins_01$" # 10892296683905167590
  uba_decisions.7300.desc: "홍수의 위협을 줄이고 인근 지역의 물을 보호하여 대대로 혜택을 줄 저수지를 건설하겠습니다.\n\n잘 정비된 저수지와 수로 체계는 물의 흐름을 정밀하게 제어하고 수자원을 극대화하여 내 영지를 더욱 번영하게 만들 것입니다." # 309500199631684730
  uba_decisions.7300.a: "$uba_decisions.1100.a$" # 8808037058914094669
  uba_decisions.7300.a_tt: "$uba_decisions.2100.a_tt$" # 6201425305918770023
