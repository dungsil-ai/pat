  uba_decisions.9000.hunting: "$uba_decisions.8000.hunting$" # 8551979263080456841
  uba_decisions.9000.hunting.flavor: "$uba_decisions.8000.hunting.flavor$" # 14656652794214884988
  uba_decisions.9100.t: "건축 계획: $building_type_UBA_yurt_01$" # 17487871674612800770
  uba_decisions.9100.desc: "칸에 걸맞은 왕실을 세워 초원의 명실상부한 권력의 중심지가 되리라. \n\n나의 명령은 그곳에서부터 퍼져나가, 나의 노예든 적이든 초원의 모든 부족이 내 발밑에 엎드리게 할 것이다." # 2860274960992024952
  uba_decisions.9100.a: "$uba_decisions.1100.a$" # 8808037058914094669
  uba_decisions.9100.a_tt: "$uba_decisions.2100.a_tt$" # 6201425305918770023
  uba_decisions.9200.t: "건축 계획: $building_type_UBA_pasture_01$" # 8010579972792051644
  uba_decisions.9200.desc: "염소, 양, 말, 낙타, 소와 같은 가축들이 초원에서 자유롭게 뛰놀 수 있는 풍요로운 목초지를 구획하겠다. \n\n더 나은 방목 방식과 관리로 더 큰 가축 떼를 거느릴 것이다..." # 17542274718449309071
  uba_decisions.9200.a: "$uba_decisions.1100.a$" # 8808037058914094669
  uba_decisions.9200.a_tt: "$uba_decisions.2100.a_tt$" # 6201425305918770023
  uba_vassalyn.1000.t: "거래: 할 것인가, 말 것인가?" # 13769912897472944092
  uba_vassalyn.1000.desc: "내 옷장이 움직이고 있다!\n\n심장이 거세게 뛰는 소리가 들리는 것 같다. 저게 뭐지? 암살자인가.\n\n도움을 청하려던 찰나, 옷장 안에서 기이하고도 섬뜩한 목소리가 들려왔다:\n\n\"친애하는 [ROOT.GetCharacter.GetFirstNameNoTooltip], #EMP [gold|E]#!가 필요한 게지?\" 네가 원하는 건 무엇이든 줄 수 있다. 그저 탁자 위에 있는 금화 주머니와 네 영혼의 아주 작은 조각을 내게 넘기기만 하면 된다...\"\n\n젠장, 옷장에 악마라도 들었단 말인가? 정체불명의 존재와 거래를 하다니, 제정신인가?" # 11638067530999942591
  uba_vassalyn.1000.a: "원하는 건 무엇이든 주겠다!" # 16679855092081672321
  uba_vassalyn.1000.a.flavor: "\"그냥 주머니를 거기에 두거라. 영혼은 나중에 와서 가져가마.\" 목소리가 대답했다." # 11239179528299226849
  uba_vassalyn.1000.back: "악마와는 거래하지 않겠다, 당장 꺼져라!" # 5418370965115674045
  uba_vassalyn.1000.back.flavor: "목소리는 즉시 사라졌다. 달려온 근위병들이 옷장을 샅샅이 뒤졌지만, 아무것도 발견하지 못했다." # 12257567058809528635
  uba_vassalyn.1000.cancel: "이건 환각임이 틀림없어!" # 12185007321772345389
  uba_vassalyn.1000.cancel.flavor: "기이한 소음을 무시했지만, 분명 불길한 징조였다." # 12426949943087518276
  uba_vassalyn.1001.t: "거래: 옷장 속의 목소리" # 7805155459937018585
  uba_vassalyn.1001.desc: "\"거래 성립이다.\" 목소리가 말했다. \"물러설 생각은 마라. 내가 네게 줄 것은 이 금화 주머니의 가치를 훨씬 뛰어넘을 테니.\"\n\n\"예를 들면, 마르지 않는 광산 같은 것 말이다.\"\n\n광산이라고? 어리석은 소리. 정말 그런 게 있었다면 진작에 발견되었겠지.\n\n\"믿든 말든 네 자유다. 하지만 선택해야 할 것이다. 무엇을 원하느냐? 보석인가, 아니면 금속인가? - 아, 참고로 약간의 수수료를 받는다... 걱정 마라, 영혼을 아주 조금 가져갈 뿐이니, 정말 아주 조금이다!\"" # 2614637871228873581
  uba_vassalyn.1001.again: "\"나쁘지 않지?\" \n\n\"무엇을 원하느냐? 보석인가, 아니면 금속인가? - 아, 참고로 약간의 수수료를 받는다... 걱정 마라, 영혼을 아주 조금 가져갈 뿐이니, 정말 아주 조금이다!\"" # 4651550464876294393
  uba_vassalyn.1001.a: "#EMP 보석#! 광맥 하나가 금화 주머니보다 훨씬 가치 있지." # 11815095156856340562
  uba_vassalyn.1001.a.flavor: "\"좋은 선택이다.\" 그 목소리는 내 생각을 읽고 있는 듯했다." # 5096348852111044561
  uba_vassalyn.1001.b: "#EMP 금속#! 광산을 가질 수만 있다면..." # 6377480542311289044
  uba_vassalyn.1001.b.flavor: "\"이를테면, 금 말인가? 하하하——\" 목소리가 섬뜩하게 웃었다." # 15243315149258337782
  uba_vassalyn.1001.c: "전부 다 원한다!" # 2306395774872642153
  uba_vassalyn.1001.c.flavor: "\"내 앞에서 잔꾀를 부리는 건 좋지 않은 생각이다.\"" # 18270019135865384394
  uba_vassalyn.1001.back: "아니, 악마와는 거래하지 않겠다! 경비병!" # 8640697483104937901
  uba_vassalyn.1001.back.flavor: "목소리는 한숨을 내쉬더니 사라졌다. 달려온 경비병이 옷장을 확인했지만, 아무것도 발견하지 못했다." # 14841408955303591198
  uba_vassalyn.1001.cancel: "아니, 이건 환각임이 분명해..." # 10330673650850289907
  uba_vassalyn.1001.cancel.flavor: "$uba_vassalyn.1000.cancel.flavor$" # 14632096679393092489
  uba_vassalyn.1100.t: "거래: 보석인가?" # 13090936928419063201
  uba_vassalyn.1100.desc: "그래, 만약 보석이 끝없이 공급된다면 난 그것들로 많은 일을 할 수 있을 거야. 영지민들의 마음을 사로잡거나, 기사와 시종들에게 보상을 하거나, 심지어 성 전체를 보석으로 뒤덮을 수도 있겠지...\n\n내가 막 말을 꺼내려는 찰나, 서투른 시종 하나가 문을 갑자기 열고 들어와 내 말을 가로막는다. 내가 그를 꾸짖기도 전에 그가 말하기 시작한다:\n\n\"주군, 방금 발견한 것이 있습니다...\"\n\n이 순간, 너는 시종이 무슨 말을 하는지 전혀 관심이 없다. 왜냐하면 그 목소리가 너에게 속삭이고 있기 때문이다:" # 7653601865363847457
  uba_vassalyn.1100.a: "#EMP 보석#!이라니!! 분명 네가 가장 좋아하는 것일 테지!" # 12218008026905696895
  uba_vassalyn.1100.a.flavor: "잠시 후, 너는 시종에게서 같은 대답을 듣게 되지만, 탁자 위에 있던 동전 주머니는 흔적도 없이 사라져 있다.\n\n분명 악마가 네 제안을 받아들인 것이다. 하지만 동전 주머니와 약간의 영혼을 끝없는 보석과 바꿀 기회라니, 이토록 좋은 거래는 #color_gray 다시#! 오지 않을 것이다." # 10930408064962511837
  uba_vassalyn.1100.b: "네가 #EMP 다이아몬드#!를 원할 줄 알았지!!" # 11414310070866594396
  uba_vassalyn.1100.b.flavor: "잠시 후, 너는 시종에게서 같은 대답을 듣게 되지만, 탁자 위에 있던 동전 주머니는 흔적도 없이 사라져 있다.\n\n분명 악마가 네 제안을 받아들인 것이다. 하지만 동전 주머니와 약간의 영혼을 끝없는 다이아몬드와 바꿀 기회라니, 이토록 좋은 거래는 #color_gray 다시#! 오지 않을 것이다." # 2265570432228978180
  uba_vassalyn.1100.c: "\"아니면 #EMP 옥#!을 더 선호하나?\"" # 15248609676222900836
  uba_vassalyn.1100.c.flavor: "$uba_vassalyn.1200.a.flavor$" # 13400210025527859183
  uba_vassalyn.1100.d: "\"#EMP 소금#!은 어떤가?\"" # 4605351110108296135
  uba_vassalyn.1100.d.flavor: "$uba_vassalyn.1200.a.flavor$" # 13400210025527859183
  uba_vassalyn.1100.z: "\"이봐, 정신 차려!\"" # 8863488970471268282
  uba_vassalyn.1100.z.flavor: "그 목소리가 너를 환각에서 현실로 끌어당긴다." # 5350916384272229362
  uba_vassalyn.1200.t: "거래: 금속인가?" # 3953738450553468406
  uba_vassalyn.1200.desc: "그래, 경이로운 금속들이지. 금광이나 은광이 있다면 나는 엄청난 부자가 될 거야. 철광이나 구리 광산이 있다면 가장 좋은 금속으로 무기를 제련할 수 있을 텐데...\n\n내가 막 말을 꺼내려는 찰나, 서투른 시종 하나가 문을 갑자기 열고 들어와 내 말을 가로막는다. 내가 그를 꾸짖기도 전에 그가 말하기 시작한다:\n\n\"주군, 방금 발견한 것이 있습니다...\"\n\n이 순간, 너는 시종이 무슨 말을 하는지 전혀 관심이 없다. 왜냐하면 그 목소리가 너에게 속삭이고 있기 때문이다:" # 6935314052947105900
  uba_vassalyn.1200.a: "그것은 #EMP 금#! 광산이다." # 3554255112850388369
  uba_vassalyn.1200.a.flavor: "잠시 후, 너는 시종에게서 같은 대답을 듣게 되지만, 탁자 위에 있던 동전 주머니는 흔적도 없이 사라져 있고, 몇 가지 물건들도 함께 자취를 감추었다.\n\n분명 악마가 네 제안을 받아들인 것이다." # 13479510414032583765
  uba_vassalyn.1200.b: "네가 #EMP 은#! 광산을 더 선호할 것 같군." # 12622645550543691695
  uba_vassalyn.1200.b.flavor: "$uba_vassalyn.1200.a.flavor$" # 13400210025527859183
  uba_vassalyn.1200.c: "너에게는 #EMP 구리#! 광산이 필요할 것 같군." # 3130242083283407663
  uba_vassalyn.1200.c.flavor: "$uba_vassalyn.1200.a.flavor$" # 13400210025527859183
  uba_vassalyn.1200.d: "이 #EMP 철광산#!이면 너를 만족시키기에 충분하겠지." # 1013809854383800068
  uba_vassalyn.1200.d.flavor: "$uba_vassalyn.1200.a.flavor$\n\n남겨진 이상한 쪽지에는 이렇게 적혀 있다: \"이것으로 $building_type_wind_furnace_01$ [buildings|E]을(를) 잠금 해제할 수 있다.\"" # 16269235371198919916
  uba_vassalyn.1200.z: "너는 속았다!" # 10613055451675288121
  uba_vassalyn.1200.z.flavor: "$uba_vassalyn.1100.z.flavor$" # 244786977875861114
  uba_vassalyn.1900.t: "거래: 탐욕" # 3608372980639053335
  uba_vassalyn.1900.desc: "\"아.\" 목소리가 한숨을 내쉬었다. \"이것이 네 선택인가? 탐욕스러운 인간들이여, 네 금으로는 그런 욕망을 사기에 부족하다는 것을 상기시켜 주지.\"\n\n\"물론, 네가 정녕 이것을 선택하겠다면, 더 많은 #EMP 대가#!를 치러야 할 것이다. 선택은 네 몫이다, 나의 친애하는 [ROOT.GetCharacter.GetFirstNameNoTooltip]여.\"" # 4858858713795532054
  uba_vassalyn.1900.a: "동의하겠다." # 218419531943684139
  uba_vassalyn.1900.a.flavor: "좋다,\" 목소리가 대답했다, \"네 뜻대로 하마." # 15822944112782473459
  uba_vassalyn.1900.z: "생각해 봤지만, 그만두겠다." # 6367935150000517208
  uba_vassalyn.1900.z.flavor: "\"좋다,\" 목소리가 대답했다." # 10233189702942934334
  uba_vassalyn.1901.t: "거래: 기적" # 10384701849685636805
  uba_vassalyn.1901.desc: "내가 막 말을 꺼내려는 찰나, 서투른 시종이 문을 갑자기 열어젖히며 내 말을 가로막았다. 내가 그를 꾸짖기도 전에 그가 말하기 시작했다:\n\n\"주군, 방금 발견했습니다...\"\n\n이 순간, 당신은 시종이 하는 말에 전혀 관심이 없다. 왜냐하면 다른 목소리가 당신에게 말을 걸고 있기 때문이다:" # 6907485581410135117
  uba_vassalyn.1901.a: "그것은 #EMP 기적의 광산#!이다." # 12509951769134268765
  uba_vassalyn.1901.a.flavor: "나중에 당신은 시종으로부터 같은 대답을 듣게 되지만, 탁자 위에 있던 금화 주머니는 흔적도 없이 사라졌고, 그와 함께 어떤 것들도 흔적 없이 사라져 버렸다.\n\n그리고 남겨진 기묘한 쪽지 하나: \"이것으로 $building_type_wind_furnace_01$ [buildings|E]이(가) 해금될 것이다\" - 대체 무슨 뜻일까?" # 9668618679453977551
  uba_vassalyn.1901.b: "이제 와서 물러나기엔 너무 늦었어.\"" # 14304608373036976130
  uba_vassalyn.1901.b.flavor: "나중에 당신은 시종으로부터 그들이 고품질 철광산을 발견했다는 소식을 듣게 되지만, 탁자 위에 있던 금화 주머니는 흔적도 없이 사라졌고, 그와 함께 어떤 것들도 흔적 없이 사라져 버렸다.\n\n그리고 남겨진 기묘한 쪽지 하나: \"이것으로 $building_type_wind_furnace_01$ [buildings|E]이(가) 해금될 것이다\" - 대체 무슨 뜻일까?" # 5340624446693769342
  uba_vassalyn.1902.t: "거래: 기적의 대가" # 11812172129412780966
  uba_vassalyn.1902.desc: "며칠 후, 나는 나를 보는 모든 이들이 자신도 모르게 웃음을 터뜨리는 것을 알아차렸다. 이유를 물어보면 그들은 화제를 돌리거나 이런저런 방식으로 대답을 피하려 했다. (심지어 그들은 여전히 웃고 있었다!)\n\n마침내 한 충직한 시종이 내 질문에 답해주겠다고 나섰다. 그가 말했다:\n\n'주군, 주군께서 서큐버스를 유혹하려다 결국 침대에서 걷어차였다는 이야기가 온 사방에 퍼져 있습니다... 이런 이야기가 하나뿐인 것도 아닙니다. 영지의 농부들조차 여러 가지 버전을 이야기할 수 있을 정도니, 하물며...'\n\n시종은 계속해서 설명을 이어갔지만, 나는 더 이상 들을 용기가 없었다." # 2491243099489205470
  uba_vassalyn.1902.a: "빌어먹을!" # 3619060091542086825
  uba_vassalyn.1902.a.flavor: "이제 당신은 그 작은 대가가 무엇이었는지 알게 되었다..." # 7862727428624684897
