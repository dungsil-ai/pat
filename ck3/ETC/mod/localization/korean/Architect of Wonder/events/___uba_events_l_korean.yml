  uba_decisions.4000.governor: "...옳고 그름을 판단하는 궁정." # 1189685793722662851
  uba_decisions.4000.governor.flavor: "$building_type_UBA_governor_01$ 건설을 고려하고 있습니다." # 8240597733548179574
  uba_decisions.4000.workshop: "...뛰어난 장인 정신이 깃든 공방." # 546046698445320633
  uba_decisions.4000.workshop.flavor: "$building_type_UBA_workshop_01$ 건설을 고려하고 있습니다." # 9669487771474125824
  uba_decisions.4000.parliament: "...함께 국사를 논하는 의회" # 18074775458588591913
  uba_decisions.4000.parliament.flavor: "$building_type_UBA_parliament_01$ 건설을 고려하고 있습니다." # 18269634317137678062
  uba_decisions.4100.t: "건축 계획: $building_type_UBA_governor_01$" # 4944785189480053134
  uba_decisions.4100.desc: "나의 통치 아래 공정함과 정의를 보장할 사법 궁정을 세우리라.\n\n심판이란 이 광활한 영토와 백성 모두에게 정의를 가져다주는 것이다. 이 체계는 세상이 끝날 때까지 지속될 것이다." # 2824080641815612048
  uba_decisions.4100.a: "$uba_decisions.1100.a$" # 8808037058914094669
  uba_decisions.4100.a_tt: "$uba_decisions.2100.a_tt$" # 6201425305918770023
  uba_decisions.4200.t: "건축 계획: $building_type_UBA_workshop_01$" # 1207596872744062103
  uba_decisions.4200.desc: "장인들이 모여들 공방을 건설하리라. 뛰어난 기술을 가진 장인들은 영토 번영의 증거이다.\n\n정교한 장비와 도구는 이곳의 명함이 되어, 장인의 도시로서 그 명성을 널리 떨치게 할 것이다." # 9182967380417513641
  uba_decisions.4200.a: "$uba_decisions.1100.a$" # 8808037058914094669
  uba_decisions.4200.a_tt: "$uba_decisions.2100.a_tt$" # 6201425305918770023
  uba_decisions.4300.t: "건축 계획: $building_type_UBA_parliament_01$" # 11312941494924285009
  uba_decisions.4300.desc: "포용적인 의회를 설립하여 나의 신하와 봉신들이 국사를 논의하도록 하리라.\n\n귀족, 성직자, 시민의 대표들이 함께 모여 국가의 모든 사안을 토론할 것이다. 이를 바탕으로 수립된 새로운 체계는 향후 수천 년 동안 나의 나라를 완전히 다르게 보이게 할 것이다." # 15124844382052305555
  uba_decisions.4300.a: "$uba_decisions.1100.a$" # 8808037058914094669
  uba_decisions.4300.a_tt: "$uba_decisions.2100.a_tt$" # 6201425305918770023
  uba_decisions.5000.t: "건축 계획: $uba_building_decision_intrigue$" # 7763399412883375751
  uba_decisions.5000.desc: "$uba_decisions.2000.desc$" # 14213830960904078489
  uba_decisions.5000.secret: "...알려지지 않은 은신처" # 3899067179355610706
  uba_decisions.5000.secret.flavor: "당신은 $building_type_UBA_secret_01$ 건설을 고려하고 있습니다." # 10794995861335101906
  uba_decisions.5100.t: "건축 계획: $building_type_UBA_secret_01$" # 8342646898260538888
  uba_decisions.5100.desc: "나는 숨겨져 있고 아무도 알 수 없는 궁전을 지어 그곳에서 그림자 속에 나의 제국을 건설할 것이다.\n\n외부인이 이 비밀을 절대 알지 못하게 할 것이다. 궁전 건설에 참여한 장인과 하인들조차 살아서 나갈 수 없을 것이다." # 10736156746022396778
  uba_decisions.5100.a: "$uba_decisions.1100.a$" # 8808037058914094669
  uba_decisions.5100.a_tt: "$uba_decisions.2100.a_tt$" # 6201425305918770023
