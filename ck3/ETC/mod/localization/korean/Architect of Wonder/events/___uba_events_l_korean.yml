  uba_decisions.6000.hospital: "...생명을 구하고 부상자를 치유하는 병원." # 3162467174241180691
  uba_decisions.6000.hospital.flavor: "당신은 $building_type_UBA_hospital_01$ 건설을 고려하고 있습니다." # 4274294732395978233
  uba_decisions.6000.university: "...가르치고 배우기 위한 대학." # 5648221593611015062
  uba_decisions.6000.university.flavor: "당신은 $building_type_UBA_university_01$ 건설을 고려하고 있습니다." # 6445717155547993224
  uba_decisions.6000.church: "...웅장하고 엄숙한 사원" # 15113050125583111796
  uba_decisions.6000.church.flavor: "당신은 $building_type_UBA_church_01$ 건설을 고려하고 있습니다." # 10742291108685200970
  uba_decisions.6100.t: "건축 계획: $building_type_UBA_hospital_01$" # 1632562218256775913
  uba_decisions.6100.desc: "나는 역병이 나의 통치와 신민을 해치지 못하도록 생명을 구하는 병원을 지을 것이다.\n\n경건하고 신성한 이들이 이곳에서 병자와 장애인을 돌보며, 고통받는 이들에게 희망을 줄 것이다." # 2842956839440913224
  uba_decisions.6100.a: "$uba_decisions.1100.a$" # 8808037058914094669
  uba_decisions.6100.a_tt: "$uba_decisions.2100.a_tt$" # 6201425305918770023
  uba_decisions.6200.t: "건축 계획: $building_type_UBA_university_01$" # 2105755034214741438
  uba_decisions.6200.desc: "나는 학자들이 모여들고 전 세계의 지식이 집대성될 대학을 지을 것이다.\n\n이곳은 지식의 궁전이자 문화의 요람이 될 것이다. 영감이 충돌하여 눈부신 불꽃을 일으키는 곳이 될 것이다." # 8409633312001365984
  uba_decisions.6200.a: "$uba_decisions.1100.a$" # 8808037058914094669
  uba_decisions.6200.a_tt: "$uba_decisions.2100.a_tt$" # 6201425305918770023
  uba_decisions.6300.t: "건축 계획: $building_type_UBA_church_01$" # 11615140274311505952
  uba_decisions.6300.desc: "나는 웅장한 사원을 지어 이 위대한 건축물을 신께 바칠 것이다.\n\n웅장한 사원은 각지의 신도들을 불러모아 경배하게 할 것이며, 그들은 그곳에서 신의 가호를 빌고 신의 시선을 느낄 것이다." # 2553522260291581684
  uba_decisions.6300.a: "$uba_decisions.1100.a$" # 8808037058914094669
