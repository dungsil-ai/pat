l_korean:
  decision_group_type_uba_flavor: "건물 관련 결정" # 14049266195839913794
  uba_unlock_pet_flavor_desc: " #EMP $uba_flavor_pet_decision$# 결정 활성화[decision|E]" # 8625881663286874997
  uba_flavor_pet_decision: "동물 입양" # 4353885722093459832
  uba_flavor_pet_decision_tooltip: "사랑스러운 반려동물... 아니면 군마를 입양하십시오!" # 12498180950724239577
  uba_flavor_pet_decision_effect: "입양할 동물을 선택하십시오." # 10114016050610325852
  uba_flavor_pet_decision_desc: "인생이 음모와 살육만으로 가득 찬 것은 아닙니다. 가끔은 다른 무언가가 필요하죠... 말동무가 되어줄 동물을 입양해보는 건 어떨까요?" # 13962181718499772567
  uba_flavor_pet_decision_confirm: "결정 내리기" # 10101971045946966162
  uba_unlock_hunt_flavor_desc: " #EMP $uba_flavor_hunt_decision$# 결정 활성화[decision|E]" # 9581485671906087847
  uba_flavor_hunt_decision: "사냥감 찾기" # 13533315760077636130
  uba_flavor_hunt_decision_tooltip: "사냥할 대상을 찾으십시오." # 5216284278341318595
  uba_flavor_hunt_decision_effect: "당신의 $master_of_hunt_court_position$에게 영지 내에서 적절한 사냥감을 찾도록 하십시오." # 4995806664337621581
  uba_flavor_hunt_decision_desc: "사냥 실력을 시험해 본 지 너무 오래되었습니다. 활이 한숨을 쉬는 소리가 들리는 것 같군요... 이제 활에 어울리는 가치 있는 상대를 찾아줄 때입니다." # 10197524670189711349
  uba_flavor_hunt_decision_confirm: "전령 파견" # 10767149300387918102
  uba_unlock_knight_flavor_desc: " #EMP $uba_flavor_knight_decision$# 결정 활성화[decision|E]" # 9929557961834448582
  uba_flavor_knight_decision: " $knight_culture_player_plural_no_tooltip$ 훈련" # 11478280522735123538
  uba_flavor_knight_decision_tooltip: " $knight_culture_player_plural_no_tooltip$를 위한 훈련 체계를 제공하십시오." # 17645510226187300244
  uba_flavor_knight_decision_effect: "당신의 $knight_culture_player_plural_no_tooltip$를 위한 종합적인 훈련 체계를 제공하십시오." # 3779040058076120428
  uba_flavor_knight_decision_desc: "내 $knight_culture_player_plural_no_tooltip$들이 훈련을 게을리하는 것 같다는 생각이 듭니다. $knight_culture_player$가 무예에도 능하지 않고 전술에도 밝지 않다면, 어떻게 전장에서 적을 이길 수 있겠습니까?" # 1551440920525051357
  uba_flavor_knight_decision_confirm: "훈련 시작" # 6515083038125669444
  uba_flavor_decisions.0011.t: "$uba_flavor_pet_decision$" # 11613070555044520453
  uba_flavor_decisions.0011.desc: "안뜰을 거닐며 어떤 동물이 가장 적합할지 고민합니다.\n\n모퉁이를 하나 더 돌고 나서야, 마침내 결심이 섰습니다 --" # 9291322575873407741
  uba_flavor_decisions.0011.a: "사랑스러운 고양이." # 11557330234385980637
  uba_flavor_decisions.0011.b: "영리한 개." # 7142392244390206395
  uba_flavor_decisions.0011.c: "용맹한 말." # 16889967700992033601
  uba_flavor_decisions.0011.rock: "길가의 돌멩이." # 17744312274030448360
  uba_flavor_decisions.0011.rock.tt: "알 수 없는 이유로, 갑자기 돌멩이도 훌륭한 반려동물이 될 수 있겠다는 생각이 든다..." # 14430351069045181285
  uba_flavor_decisions.0011.cancel: "아아, 지금은 아닌 것 같군." # 96329531557561034
  uba_flavor_decisions.0012.t: "$uba_flavor_hunt_decision$" # 2542551887294902810
  uba_flavor_decisions.0012.desc: "$master_of_hunt_court_position$이 열의에 차서 말한다. \"주군, 어떤 사냥감이든 말씀만 하십시오. 최선을 다해 찾아내겠습니다!\"\n\n나는 고개를 끄덕이며 결정을 내렸다." # 18410313968759922365
  uba_flavor_decisions.0012.a: "내 사냥용 활에 적합한 사냥감을 찾는다." # 4774993695729455269
  uba_flavor_decisions.0012.b: "내 사냥용 매에게 적절한 목표를 찾는다." # 9116702327476172194
  uba_flavor_decisions.0012.c: "[ROOT.Char.GetTitleAsNameNoTooltip]에게는 걸맞은 상대가 필요하다." # 1405759703641798966
  uba_flavor_decisions.0012.d: "[ROOT.Char.GetTitleAsNameNoTooltip]은 위험한 사냥감을 피하지 않는다." # 5518880424455326506
  uba_flavor_decisions.0012.cancel: "마음이 바뀌었으니, 이 일은 잊도록 하자." # 11663540397931741280
  uba_flavor_decisions.0021.t: "$uba_flavor_knight_decision$" # 3640093039355712160
  uba_flavor_decisions.0021.desc: "훈련장에 도착하니 [training_knight.GetFirstNameNoTooltip]와 다른 $knight_culture_player_plural_no_tooltip$들이 줄을 서서 내 명령을 기다리고 있다.\n\n\"주군, 모든 기사가 모여 명령을 기다리고 있습니다.\" [training_knight.GetFirstNameNoTooltip]가 말한다.\n\n오늘 훈련의 주제를 정해야겠군." # 9377660662642784822
  uba_flavor_decisions.0021.a: "간단한 대련이면 충분하다." # 14869731370287281100
  uba_flavor_decisions.0021.a.tt: "모든 기사(와 나 자신)가 $prowess$를 약간 얻는다." # 8789833439900275591
  uba_flavor_decisions.0021.b: "$knight_culture_player_plural_no_tooltip$에게 새로운 전술을 가르쳐야겠다." # 10324511508766238812
  uba_flavor_decisions.0021.b.tt: "모든 기사(와 나 자신)가 새로운 전술을 배운다." # 13348086069524588672
  uba_flavor_decisions.0021.cancel: "모두 해산!" # 17132384998165961865
