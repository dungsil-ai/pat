l_korean:
  building_kaifeng_palace_02: "제단과 사당" # 9576746664011959131
  building_kaifeng_palace_02_desc: "국가의 가장 중요한 일은 제사와 전쟁이다. 천지와 일월, 사직의 제단과 조묘를 소홀히 해서는 안 되며, 천자가 직접 제사를 지내고 다른 제사는 관리를 파견하여 거행해야 한다." # 11027216794891351994
  building_kaifeng_palace_03: "황실 정원" # 11078697069176775759
  building_kaifeng_palace_03_desc: "정자와 누각, 진귀한 꽃으로 둘러싸인 황실 정원은 황제가 휴식을 취하고 경치를 감상하며 심신을 수양하는 곳이다." # 546609571216293812
  building_kaifeng_palace_04: "명당" # 13336248497060624274
  building_kaifeng_palace_04_desc: "명당은 과거 황제가 하늘에 대제사를 올리고 조상에게 예배하며 제후를 접견하고 조서를 반포하던 곳으로, 매우 높은 상징적 의미를 지닌다." # 2234369090257178584
  building_kaifeng_palace_05: "황도" # 2272189877774353606
  building_kaifeng_palace_05_desc: "수도인 황도는 내성과 외성의 여러 겹 성벽으로 둘러싸여 있으며, 자금성, 황성, 내성, 외성 등으로 나뉜다. 이 성벽 안에서 강력하고 효율적인 통치가 이루어지며, 도시와 제국 전역의 번영을 보장한다." # 14932680578857948017
  has_game_rule_uba_history_special_buildings_on: "$rule_uba_history_special_buildings$이 활성화되었습니다." # 16984726760289627664
  building_forbidden_city_02: "내정" # 2345682943989054206
  building_forbidden_city_02_desc: "$building_type_forbidden_city_01_desc$\n\n이 구역은 황제의 사적인 생활 영역으로, 일상적인 국무를 처리하고 학문을 닦으며 요양하는 거처로 사용된다. 또한 황제의 후궁들이 거주하는 이른바 후궁들의 거처이기도 하다." # 15380178955695176998
  building_forbidden_city_03: "정원과 유원지" # 9027418770355826470
  building_forbidden_city_03_desc: "$building_type_forbidden_city_01_desc$\n\n자금성 내에는 황제의 여가와 즐거움을 위해 소규모 조경 시설이 곳곳에 배치되어 있다. 정자와 누각, 진귀한 꽃으로 꾸며진 이곳은 심신을 수양하는 장소이다." # 7808609857668813085
  building_forbidden_city_04: "내무" # 15679564989383222490
  building_forbidden_city_04_desc: "$building_type_forbidden_city_01_desc$\n\n황실 가족의 생활과 궁중 운영을 지원하는 자금성 내 부대시설이다. 여기에는 환관과 궁녀의 거처, 기록물과 보물을 보관하는 창고가 포함되어 자금성 전체의 일상적인 운영을 보장한다." # 7403903737736735032
  building_forbidden_city_05: "황궁" # 7498624489220826311
  building_forbidden_city_05_desc: "$building_type_forbidden_city_01_desc$\n\n높은 성벽, 성문, 망루, 해자로 이루어진 견고한 방어선은 빈틈없는 보안 체계로 둘러싸여 자금성 내부의 절대적인 안전을 보장한다.\n\n황권은 지고하며 침범할 수 없다." # 5642675755694792644
  building_type_palatium_magnum_01: "대궁전" # 6495565387334614437
  building_type_palatium_magnum_01_desc: "히포드롬 남동쪽에 위치한 궁전 단지는 [Glossary( 'Palatium Magnum', 'PALATIUM_MAGNUM_GLOSS' )]의 핵심부를 구성하며, 수십 개의 호화롭고 아름다운 궁전으로 이루어져 있다.\n\n다프네 궁전은 황제의 사저일 뿐만 아니라 궁궐 내 중요한 의식 장소이기도 했다. 콘시스토리움은 황제가 원로원과 토론하던 회의장이었으며, [Glossary( 'Chrysotriklinos', 'CHRYSOTRIKLINOS_GLOSS' )]는 알현실과 연회장의 기능을 겸하여 황제가 접견하고 국정을 논의하던 곳이었다. 그 아름답고 독특한 팔각형 모양은 방문하는 모든 이에게 깊은 인상을 남겼다. 황제의 옥좌는 대강당의 반원형 정점에 있는 성소에 놓였는데, 마치 교회처럼 보였고 실제로도 교회 양식으로 설계되었다...\n\n로마의 위용은 결코 무너지지 않을 것이기에, 이 궁전은 영원히 그 자리를 지킬 것이다." # 7162230476316409394
  building_palatium_magnum_01: "콘스탄티노폴리스 히포드롬" # 7228563144460607514
  building_palatium_magnum_01_desc: "이 [Glossary( 'Hippodrome', 'HIPPODROME_GLOSS' )]가 완공되었을 때, 이 도시는 아직 '비잔티움'이라 불렸다. 이 거대한 경기장은 콘스탄티누스 대제의 계획 일부로, 경기장의 소음 위로 황제만의 영광스러운 자리인 [Glossary( 'Kathisma', 'KATHISMA_GLOSS' )]가 마련되어 있었고, 그 뒤편으로는 다프네 궁전으로 이어지는 지름길이 있었다.\n\n히포드롬 북문 밖에는 검은 대리석이 깔린 [Glossary( 'Augustaion', 'AUGUSTAION_GLOSS' )] 광장이 있었다. 광장 끝에는 [Glossary( 'Milion Milestone', 'MILION_GLOSS' )]가 서 있었고, 히포드롬 앞 양옆에는 제욱시포스 목욕탕과 하기아 소피아가 자리 잡고 있었다.\n\n경기장 안에서는 U자형 트랙을 따라 말과 전차가 경주를 벌였는데, 이는 단순한 운동 경기가 아니었다. 황제와 귀족, 평민들에게 드문 공통의 화제를 제공하는 장이었다." # 17868965412567598902
  building_palatium_magnum_02: "내궁 단지" # 12321441985294835869
  building_palatium_magnum_02_desc: "제욱시포스 목욕탕, 안티오코스 궁전, 라우소스 궁전은 대궁전 북쪽의 궁전 단지를 구성했다. [Glossary( 'Baths of Zeuxippus', 'ZEUXIPPUS_GLOSS' )]는 한때 콘스탄티노폴리스에서 가장 인기 있는 공공 목욕탕이었으며, 재건된 대목욕탕은 다시금 번성했다.\n\n서쪽에는 영웅과 신화 속 인물들의 방대한 조각상 컬렉션으로 유명한 [Glossary( 'Palace of Antiochos', 'PALACE_ANTIOCHOS_GLOSS' )]와 라우소스 궁전이 있다. 콘스탄티노폴리스에서도 이처럼 많은 보물을 동시에 소장한 궁전은 드물었다.\n\n안티오코스와 라우소스 궁전 북쪽으로는 열주가 늘어선 [Glossary( 'Mese Avenue', 'MESE_GLOSS' )]가 도시 저편으로 뻗어 있었으며, 서쪽으로 조금만 가면 콘스탄티노폴리스 상업 및 정치 활동의 중심지인 원형의 [Glossary( 'Forum of Constantine', 'CONSTANTINI_GLOSS' )]가 있었다." # 14897344738194228782
  building_palatium_magnum_03: "콘스탄티노폴리스 대학" # 910868354472805549
  building_palatium_magnum_03_desc: "마그나우라 궁전은 한때 원로원의 의사당이었습니다. 서기 425년 테오도시우스 황제가 이곳에 [Glossary( '콘스탄티노플 대학', 'PANDIDAKTERION_GLOSS' )]을 설립했으며, 이는 세계 최대의 연구 중심지 중 하나로 학자들 사이에서 세계 최초의 대학으로 널리 인정받고 있습니다. 황실 도서관 또한 마그나우라 궁전 내에 위치했으며, 알렉산드리아 도서관의 유물들이 보관되어 있었다고 전해집니다.\n\n여러 차례의 재건을 거친 후, 대학은 다시금 유능하고 지식 있는 청년들을 양성하기 시작하여 제국에 유용한 인재를 공급하고 있습니다." # 7751645582149551876
  building_palatium_magnum_04: "해안 궁전 단지" # 12730314748636435323
  building_palatium_magnum_04_desc: "[Glossary( '부콜레온 궁전', 'BOUKOLEON_PALACE_GLOSS' )]으로 대표되는 해안 궁전 단지는 웅장한 외관과 정교한 조각으로 유명합니다. 더욱 놀라운 점은 궁전 자체가 해안 성벽의 일부를 구성하고 있다는 것입니다. 심지어 황제 전용 항구로 직접 이어지는 해안 문도 측면에 존재합니다.\n\n북쪽에는 유명한 등대 탑이 있습니다. 규모는 작지만 인접한 등대 성모 교회는 내부가 화려하게 장식되어 있습니다. 그 사이에는 테오필로스 황제가 건설한 더욱 웅장한 [Glossary( '네아 에클레시아', 'NEA_EKKLESIA_GLOSS' )]와 트리콘코스가 자리 잡고 있습니다. 네아 에클레시아와 해안 성벽 사이의 공터는 치카니온, 즉 마상 폴로 경기가 열리는 장소였습니다." # 7720984653604069022
  building_palatium_magnum_05: "콘스탄티노플 대궁전" # 18084261268069552081
  building_palatium_magnum_05_desc: "$building_type_palatium_magnum_01_desc$" # 168038265573032006
  PALATIUM_MAGNUM_GLOSS: "콘스탄티노플 대궁전은 서기 330년부터 1081년까지 비잔티움 황제들의 주 거처였습니다. 이곳은 거대한 궁전과 교회들이 모인 단지로, 때때로 #bold 성스러운 궁전#! 또는 #bold 사크룸 팔라티움#!이라 불리기도 했습니다.\n8세기가 넘는 기간 동안 대궁전은 단순한 황제의 거처를 넘어 제국의 행정 및 의례의 중심지였습니다." # 1687185358328466788
  HIPPODROME_GLOSS: "콘스탄티노플의 히포드롬은 로마의 키르쿠스 막시무스를 완전히 본떠 만들어졌습니다. 경기장은 수많은 기둥과 대리석 및 청동상들로 장식되었으며, 이집트에서 운송해 온 고대 오벨리스크가 중앙에서 우뚝 솟아 있었습니다. 경주로는 모래로 덮여 8대의 전차가 나란히 달릴 수 있을 만큼 넓었으며, 주변 관람석은 수만 명의 관중을 수용할 수 있었습니다." # 679538412775575780
  CONSTANTINI_GLOSS: "콘스탄티누스 광장은 콘스탄티노플의 상업 및 정치 활동의 중심지였습니다. 북쪽에는 제국 원로원 의사당이 있었고, 정문 앞의 수십 개의 넓은 대리석 계단은 고위 관료들이 군중에게 연설하는 공공 연단 역할을 했습니다. 광장 중앙에는 수십 미터 높이의 거대한 반암 기둥인 콘스탄티누스 기둥이 서 있었으며, 그 꼭대기에는 아폴로의 모습을 한 콘스탄티누스 대제의 청동상이 세워져 있었습니다." # 14205377051560263704
  ZEUXIPPUS_GLOSS: "제욱시포스 목욕탕은 콘스탄티노플 대궁전 북쪽, [Glossary( '아우구스테이온', 'AUGUSTAION_GLOSS' )]과 [Glossary( '히포드롬', 'HIPPODROME_GLOSS' )]의 북동쪽 모퉁이 사이에 위치했습니다. 목욕탕은 수많은 모자이크, 회화, 유색 대리석과 80개 이상의 조각상으로 장식되었으며, 호메로스, 헤시오도스, 플라톤, 아리스토텔레스, 율리우스 카이사르, 데모스테네스, 아이스키네스, 베르길리우스와 같은 역사적 인물뿐만 아니라 신들과 신화 속 영웅들을 묘사했습니다. 목욕탕은 서기 8세기 이후 다른 용도로 전용되었습니다." # 15832747024850684567
  PALACE_ANTIOCHOS_GLOSS: "안티오코스 궁전은 5세기 초에 건설되었습니다. 독특한 반원형 포르티코가 대리석으로 포장된 안뜰을 감싸고 있으며, 원형 홀 중앙에는 대리석으로 된 대형 수영장도 있었습니다. 거대한 육각형 앱스는 7세기에 히포드롬의 성 에우페미아 교회로 개조되었으며, 성녀의 생애와 순교를 묘사한 수십 점의 정교한 프레스코화로 유명합니다." # 4230885615084505067
  NEA_EKKLESIA_GLOSS: "네아 에클레시아는 [Glossary( '하기아 소피아', 'HAGIA_SOPHIA_GLOSS' )] 이후 바실리오스 1세 황제가 콘스탄티노플 수도에 건설한 최초의 대성당입니다. 이곳은 황금빛으로 빛나는 5개의 돔으로 구성된 독특한 지붕을 특징으로 하며, 중앙 돔은 그리스도에게, 나머지 4개의 작은 돔은 대천사 가브리엘, 엘리야 예언자, 성모 마리아, 성 니콜라오에게 봉헌되었습니다." # 15032906184606571051
  building_type_hagia_sophia_01_desc: "[Glossary( '하기아 소피아', 'HAGIA_SOPHIA_GLOSS' )]는 공학의 진정한 경이로움이며, 거대한 돔이 가장 인상적인 특징으로 돋보입니다.\n\n서기 537년 유스티니아누스 1세 황제에 의해 완공된 이곳은 현재 에큐메니칼 총대주교가 거주하며 기독교의 기념비로서 서 있습니다." # 12086587431155617379
  HAGIA_SOPHIA_GLOSS: "하기아 소피아는 상크타 소피아 또는 아야소피아로도 알려져 있습니다. 그리스어로 #bold 소피아#bold!는 #bold 거룩한 지혜#!를 의미하므로, 공식적으로는 #bold 신의 거룩한 지혜의 성전#!이라 불렸습니다. 이 이름은 예수 그리스도이신 하느님의 거룩한 지혜에 특별히 봉헌된 것입니다." # 17661753613257155630
  building_type_palatium_hill_01: "팔라티누스 언덕" # 1226307097409877912
  building_type_palatium_hill_01_desc: "플라비우스 궁전은 로마의 일곱 언덕 중 하나이자 도시에서 가장 오래된 지역인 팔라티누스 언덕 위에 자리 잡고 있습니다. '궁전(palace)'이라는 단어는 바로 이 언덕에서 유래되었습니다.\n\n로물루스가 이곳에 도시의 경계를 처음 표시한 이래로, 팔라티누스 언덕은 로마 정치 권력의 중심지였습니다. 웅장한 황실 궁전 단지가 재건되었고, 로마의 가장 초기 성소들이 다시금 빛을 발합니다. 이 높은 지대와 그 위의 궁전들은 영원히 키르쿠스 막시무스와 로마 시를 굽어볼 것입니다." # 15791590158155979705
  building_palatium_hill_01: "키르쿠스 막시무스" # 1793546588221176461
  building_palatium_hill_01_desc: "키르쿠스 막시무스는 팔라티누스 언덕과 아벤티누스 언덕 사이의 계곡에 위치하여 로마에서 가장 크고 웅장한 경기장 역할을 합니다.\n\n이 거대한 경기장은 로마 시민들의 열정이 집중되는 곳으로, 수십만 명을 수용할 수 있는 대리석 관람석을 갖추고 있습니다. 경주로 중앙에는 오벨리스크와 신전 모형들이 세워져 경기의 흐름을 지켜봅니다. 팔라티누스의 궁전들과 직접 연결되어 있어, 황제는 자신의 옥좌에 앉아 사람들의 환호와 함성 속에서 제국의 성대한 구경거리를 관람할 수 있습니다." # 2065773459203162780
  building_palatium_hill_02: "티베리우스 궁전" # 18232849964462461682
  building_palatium_hill_02_desc: "팔라티누스 언덕의 북서쪽에는 티베리우스 황제가 세우고 칼리굴라 황제가 확장한 궁전 별관이 자리 잡고 있습니다.\n\n도무스 티베리아나는 대체로 직사각형 형태를 띠고 있으며, 칼리굴라 치세에 확장된 구역은 카스토르와 폴룩스 신전까지 현관으로 삼을 정도로 뻗어 나갔습니다. 복도와 주랑, 안뜰이 미로처럼 층층이 쌓여 있고, 모자이크 바닥과 정교한 천장 장식으로 꾸며진 지하 통로인 크립토포르티쿠스가 여러 궁전을 연결하며 벽돌과 돌을 권력의 구체적인 표현으로 탈바꿈시킵니다." # 15556871119943619142
  building_palatium_hill_03: "팔라티누스 아카데미" # 17961749546667330914
  building_palatium_hill_03_desc: "한때 팔라티누스 언덕의 남서쪽 모퉁이에는 웅장한 신전들이 서 있었으나, 지금은 황제의 개인 도서관이자 학자들이 연구하는 장소가 되었습니다.\n\n아폴로 신전의 폐허 위에 세워진 중앙 대리석 궁전은 학문적 토론과 국가의 의사결정이 이루어지는 장소로 쓰이며, 북쪽과 남쪽에 위치한 두 개의 거대한 도서관은 그리스와 라틴 고전들을 소장하여 서로의 빛을 반사하며 찬란함을 더합니다." # 5958368123173524449
  building_palatium_hill_04: "셉티미우스 세베루스 궁전" # 6038238340213406122
  building_palatium_hill_04_desc: "팔라티누스 언덕의 남동쪽 모퉁이에 셉티미우스 세베루스 황제는 전례 없는 규모로 이 궁전을 건설했습니다. 거대한 건물을 지탱하기 위해 만든 거대한 아치형 기초는 마치 인공 산처럼 보이며, 그 시각적 압도감은 숨을 멎게 합니다.\n\n아피아 가도를 마주 보는 측면에는 셉티조디움이 궁전 복합체 앞에 서 있는데, 분수와 열주로 장식된 이 웅장한 3층 구조물은 로마의 통치자가 가진 비할 데 없는 권력을 모든 방문객에게 선포합니다." # 10206135385899372070
  building_palatium_hill_05: "도미티아누스 궁전" # 9743758136537049846
  building_palatium_hill_05_desc: "$building_type_palatium_hill_01_desc$" # 7313692562759574654
  building_type_madinat_al-salam_01: "원형 도시" # 8349017608875143081
  building_type_madinat_al-salam_01_desc: "엄격하게 질서 잡힌 원형 도시가 이곳에 서 있습니다. 완벽한 동심원 형태로 설계된 이 도시는 때때로 평화의 도시라는 뜻의 마디나트 알 살람이라 불립니다. 세 겹의 성벽이 도시를 에워싸고 있으며, 북쪽, 남쪽, 동쪽, 서쪽을 향한 네 개의 거대한 성문은 전 세계의 상인과 학자, 신자들을 맞이합니다.\n\n이 원들의 중심에는 정원으로 둘러싸인 거대한 돔형 건물이 있는데, 이는 군주의 궁전이자 거대한 성소로서 통치의 중심이자 세계의 중심입니다." # 9133662594639497187
  building_madinat_al-salam_01: "요새 지구" # 15271319086575320451
  building_madinat_al-salam_01_desc: "네 개의 웅장한 성문이 세계의 네 방위를 향하고 있으며, 복잡한 바비칸 구조물 안에는 수많은 마구간, 무기고, 훈련장, 검문소가 자리 잡고 있습니다.\n\n이곳은 도시의 제1 방어선입니다. 이중 성벽 사이의 원형 구역에는 해자와 도개교가 설치되어 있어 가장 긴 포위 공격도 견뎌낼 수 있습니다. 높은 석조 탑에는 전 지역을 조망할 수 있는 감시 초소가 갖춰져 있으며, 최정예 경비병들이 도시 내부로 향하는 필수 경로를 순찰하며 절대적인 보안을 유지합니다." # 2327893701217729474
  building_madinat_al-salam_02: "시장 지구" # 18231876254862607631
  building_madinat_al-salam_02_desc: "도시의 주요 동맥은 성문에서 시작하여 안쪽으로 끊임없이 뻗어 나갑니다. 이곳은 카라반과 물자가 모이는 집결지로, 정부 세무서와 대규모 창고, 대상 숙소가 자리 잡고 있습니다.\n\n아케이드가 교차하는 거리 아래로는 향신료와 향의 향기가 가득하며, 진열대에 전시된 비단과 보석은 눈을 즐겁게 합니다. 전 세계에서 들어오는 상품과 동전은 도시의 부가 강물처럼 마르지 않게 합니다." # 17294897286347698065
  building_madinat_al-salam_03: "학문 지구" # 478386048667086681
  building_madinat_al-salam_03_desc: "가로수길 양옆과 내성벽 뒤편에는 성소와 아카데미, 도서관으로 구성된 지구가 있어 주변 주민들에게 종교적 삶과 기초 교육을 제공합니다.\n\n글쓰기, 법률, 신학 이론의 기초 외에도 그리스, 페르시아, 인도에서 온 수도사와 학자들이 이곳에서 강연하며 지식을 구하는 이들에게 아낌없이 지식을 나눕니다. 약간의 가르침만으로도 지혜의 빛은 가장 밝은 불꽃보다 더 환하게 빛날 수 있습니다." # 3813501887727507971
  building_madinat_al-salam_04: "정원 지구" # 10547657147529196815
  building_madinat_al-salam_04_desc: "아름다운 정원이 도시의 심장부에 자리 잡아 시장의 번잡함으로부터 권력의 중심지를 격리합니다.\n\n현지의 전통적인 카나트와 개방형 수로 기술을 사용하여 강물을 도시로 끌어들입니다. 정원 내 식물 배치는 독창적으로 설계되어 기하학적 패턴으로 엄격하게 배열되었으며, 정밀한 수로를 가로지르는 맑은 강물이 모든 약초와 꽃, 과실수를 풍요롭게 합니다." # 2584415123229902401
  building_madinat_al-salam_05: "궁전 지구" # 6994801158281607552
  building_madinat_al-salam_05_desc: "$building_type_madinat_al-salam_01_desc$" # 11929075853986327541
  building_type_UBA_wall_01: "대성벽" # 9652521091000214784
  building_type_UBA_wall_01_desc: "$building_UBA_wall_03_desc$" # 2541010825355344759
  building_UBA_wall_01: "거대한 성벽" # 17772685569405526040
  building_UBA_wall_01_desc: "도시 전체를 둘러싼 석조 성벽과 탑은 내부의 시민과 귀족들에게 훌륭한 보호를 제공합니다." # 741723796052596384
  building_UBA_wall_02: "거대 요새" # 11291065006361267244
  building_UBA_wall_02_desc: "높이 솟은 요새는 수비대에게 도시를 방어하기 위한 훌륭한 위치를 제공하며, 병사들은 높은 지대의 안전한 곳에서 침입하는 적을 저격할 수 있습니다." # 604588082213020273
  building_UBA_wall_03: "전설의 요새" # 1032981650594467296
  building_UBA_wall_03_desc: "이 경외심을 불러일으키는 요새는 이 땅 최고의 일꾼과 장인들의 손에서 탄생했으며, 그들의 위대한 업적은 앞으로 수년간 수많은 사람을 전쟁으로부터 지켜줄 것입니다." # 12753731638730927413
  UBA_wanna_build_wall: "$building_type_UBA_wall_01$ 건설이 아직 시작되지 않았습니다" # 1755752742122139017
  building_type_UBA_valhalla_01: "피와 황금의 도시" # 13039942777122182761
  building_type_UBA_valhalla_01_desc: "\"통합된 북방의 왕, 북해의 군주, 궁극의 권좌를 벼려낸 자여.\" 시인들은 당신을 묘사할 더 적절한 구절을 찾기 위해 머리를 쥐어짜고 있습니다. 음유시인들의 노래 속에서 이 도시는 피의 바다 위로 솟아오른 황금으로 빚어진 곳이라 칭송받습니다. 이곳은 지상의 영웅들이 모이는 전당, \"미드가르드의 발할라\"로 불릴 것입니다." # 14691601582112244552
  building_UBA_valhalla_01: "영웅의 전당" # 1765544613673960121
  building_UBA_valhalla_01_desc: "이 장엄한 도시가 그 모습을 드러냈습니다. 중앙에는 용맹한 전사들이 모일 수 있는 엄숙한 전당이 세워졌습니다." # 1230111433632295016
  building_UBA_valhalla_02: "연회의 전당" # 3187909059594269087
  building_UBA_valhalla_02_desc: "용맹한 전사들이 이곳에 모여 신들과 함께 연회를 즐깁니다! 고기와 빵, 독한 술이 언제나 넘쳐납니다! 연회가 끝나면 그들은 영광스러운 전장으로 행군하여 적들의 살점을 찢고, 그들의 부와 생명, 그리고 모든 것을 빼앗을 것입니다." # 9680921866471717256
  building_UBA_valhalla_03: "발할라의 문" # 8182799955366866549
  building_UBA_valhalla_03_desc: "우리 전사들이 머나먼 바다 너머에서 새로운 강철과 제련 기술을 찾아냈습니다. 의심할 여지 없이 이는 신들의 축복입니다. 우리 전사들은 이 신성한 선물로 무장하고 자신의 신앙이 지닌 가치를 증명할 것입니다." # 4416215343782905314
  building_type_UBA_headquarter_01: "성기사단 본부" # 10820379813766152105
  building_type_UBA_headquarter_01_desc: "이 요새는 서구와 지중해의 건축 미학을 방어 구조와 결합하여 대지 위에 우뚝 솟아 있으며, 마치 새로운 시대의 여명을 상징하는 듯합니다. 웅장한 원형 홀은 넓고 밝으며, 벽면은 위대한 기사단들의 화려한 깃발과 문장으로 장식되어 기사들의 힘과 결의를 보여줍니다." # 16980754280181413896
  building_UBA_headquarter_01: "성묘 기사단" # 11950083040085807665
  building_UBA_headquarter_01_desc: "성지를 보호하기 위해 기사단의 거점이 될 요새가 세워졌습니다. 건축 양식은 기사단 그 자체처럼 검소하고 견고합니다. 기사들은 순례자들의 안전을 보장하고 주변 도로를 순찰할 것입니다." # 13107227818337842865
  building_UBA_headquarter_02: "구호 기사단" # 13467420366221937207
  building_UBA_headquarter_02_desc: "더 많은 기사단이 합류함에 따라 요새는 대규모로 확장되었습니다. 보강된 방어벽 너머로 완전히 기능하는 의무실과 예배당이 단지에 추가되었습니다. 이곳에서 무력 방어와 자비로운 치유는 함께 어우러집니다. 요새는 적의 공격을 막는 방패일 뿐만 아니라, 상처 입고 지친 여행자들의 안식처이기도 합니다." # 13767541554251931490
  building_UBA_headquarter_03: "성전 기사단" # 15268754776042597140
  building_UBA_headquarter_03_desc: "본부는 두꺼운 석벽과 높은 탑으로 둘러싸여 있으며, 중심부의 원형 홀은 진보된 아치 구조를 통해 전례 없는 개방감을 선사합니다. 이곳은 이 지역의 재정과 군사적 생명선을 통제하는 핵심 허브가 되어 막대한 부와 최정예 무력을 집결시키고 있습니다." # 16462012310465724605
