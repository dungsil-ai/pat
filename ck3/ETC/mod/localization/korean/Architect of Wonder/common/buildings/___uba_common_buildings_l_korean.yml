l_korean:
  unlocks_cereal_fields_and_farm_estates: "이 [holding|E]에는 #V $building_type_cereal_fields_01$#! 및 #V $building_type_farm_estates_01$#! 계열의 [buildings|E]을 건설할 수 있습니다" # 9826237276527610051
  unlocks_windmills_and_watermills: "이 [holding|E]에는 #V $building_type_windmills_01$#! 및 #V $building_type_watermills_01$#! 계열의 [buildings|E]을 건설할 수 있습니다" # 9452010257282618059
  building_type_uba_manor_01: "왕실 장원" # 12330730745224877599
  building_type_uba_manor_01_desc: "이 웅장한 영지는 왕실 가족만이 독점적으로 누리는 곳으로, 풍요로운 농지와 쾌적한 목초지, 아름다운 정원, 그리고 훌륭한 저장 시설을 갖추고 있습니다. 수많은 농민이 밤낮으로 일하며 군주에게 풍성한 수확물과 세금을 바칩니다." # 15630748236340180919
  building_uba_manor_01: "장원 본채" # 2540915370610771292
  building_uba_manor_01_desc: "이 거대한 저택은 장원의 중심 건물로, 호화로운 실내 장식과 넓은 방을 자랑합니다. 성보다 거주하기에 더 적합합니다. 군주 외에도 왕실의 다른 구성원들이 가끔 이곳에 머뭅니다." # 14369564184460818306
  building_uba_manor_02: "경작지" # 7395641389994081039
  building_uba_manor_02_desc: "이 들판은 곡물과 기타 작물을 재배하는 데 사용됩니다. 농민들의 부지런한 노동은 충분한 식량 생산을 보장하여 장원 거주자들의 필요를 충족시키고, 판매할 잉여 생산물을 만들어냅니다." # 854868059964518821
  building_uba_manor_03: "목초지" # 2829955935200317952
  building_uba_manor_03_desc: "이 광활한 초지는 이상적인 방목지를 제공합니다. 소, 양 및 기타 가축을 길러 장원에 유제품, 육류 및 기타 축산물을 공급합니다. 어려운 시기에는 건초를 생산하는 데 사용할 수도 있습니다." # 3444924441365216963
  building_uba_manor_04: "텃밭과 과수원" # 5975904071071282500
  building_uba_manor_04_desc: "넓은 텃밭과 과수원은 장원에 신선한 채소와 과일을 공급합니다. 거주자들의 식단 문제를 해결할 뿐만 아니라, 연회와 축제를 위한 식재료도 제공합니다." # 1573810829592020913
  building_uba_manor_05: "포도원과 와이너리" # 1035571008195956029
  building_uba_manor_05_desc: "이 포도원에서 생산된 고품질 포도는 와이너리에서 고급 와인으로 가공됩니다. 왕실 가족에게 즐거움과 축하의 음료를 제공합니다." # 10271137449149922710
  building_uba_manor_06: "우물과 방앗간" # 8587502318739027641
  building_uba_manor_06_desc: "우물은 깨끗한 식수를 제공하며, 방앗간은 곡물을 효율적으로 처리하여 장원의 농산물을 밀가루와 기타 식재료로 만듭니다." # 8730077476201383056
  building_uba_manor_07: "사냥터" # 7922062206660242446
  building_uba_manor_07_desc: "장원 외곽의 예비지는 사냥터로 지정되어 있습니다. 이 영토는 야생 동물이 풍부하여 왕실 가족과 손님들이 사냥과 여가 활동을 즐길 기회를 제공합니다." # 92545941857449378
  building_uba_manor_08: "창고와 지하실" # 5110766054500509675
  building_uba_manor_08_desc: "창고에는 곡물, 건초, 도구 및 기타 물자를 보관하며, 지하실은 와인과 기타 귀중한 식음료를 보관하는 데 사용됩니다." # 11787141639023076269
  building_type_uba_residence_01: "왕실 거처" # 10692622480575060085
  building_type_uba_residence_01_desc: "가장 호화롭고 웅장한 성이라 할지라도 당신만을 위해 지어진 이 궁전과는 비교할 수 없습니다. 책임의 무게에 짓눌릴 때, 이 아름다운 낙원으로 도피할 수 있다고 상상해 보십시오..." # 5713112058955427828
  building_uba_residence_01: "시골 저택" # 12364716837927751144
  building_uba_residence_01_desc: "화려한 저택보다 왕실의 권력과 위엄을 더 잘 보여주는 것이 무엇이겠습니까? 우리는 다른 누구보다 우월합니다!" # 2837226616464229227
  building_uba_residence_02: "안뜰과 정원" # 11269800042789808325
  building_uba_residence_02_desc: "다양한 야외 여가 및 축하 행사를 위한 멋진 열린 공간입니다. 정원에 심어진 아름다운 꽃들은 평온하고 즐거운 분위기를 자아냅니다." # 15275284375969680468
  building_uba_residence_03: "무기고" # 7476761562091568369
  building_uba_residence_03_desc: "시골에 있다고 해서 번잡함에서 벗어난 것이 안전을 보장하지는 않습니다. 특히 성난 농민 무리가 거주지로 다가올 때, 스스로를 지키기 위해서는 여전히 무기와 병사가 필요합니다..." # 5733906751705778966
  building_uba_residence_04: "마구간" # 11280818683519776306
  building_uba_residence_04_desc: "마구와 먹이 시설을 갖춘 소박한 마구간으로, 귀환 길에 활기 넘치는 말을 탈 수 있도록 보장합니다." # 9942524907769515202
  building_uba_residence_05: "도서관" # 12419872351417298661
  building_uba_residence_05_desc: "책, 필사본, 예술품을 소장한 도서관입니다. 학문과 사색에 몰두할 수 있는 조용한 공간을 제공합니다." # 4218102141260000370
  building_uba_residence_06: "예배당" # 12867650969186901507
  building_uba_residence_06_desc: "시끄러운 궁정 신하들과 성가신 농민들로부터 멀리 떨어져 있다고 해서, 신의 감시 어린 눈길을 피할 수 있는 것은 아닙니다." # 13881494692416130648
  building_uba_residence_07: "목욕탕" # 14610547313654176025
  building_uba_residence_07_desc: "로마 양식으로 지어진 목욕탕, 증기실, 마사지 시설을 갖춘 대형 목욕탕입니다. 정말 환상적입니다." # 11753900451521265799
  building_uba_residence_08: "갤러리와 전시실" # 1070331077933092776
  building_uba_residence_08_desc: "오, 수집품을 전시할 공간이 반드시 필요하겠지요. 그렇지 않다면 손님들이 당신의 예술품과 골동품 컬렉션을 보고 경외심에 찬 반응을 보이는 것을 어떻게 목격하겠습니까?" # 17973869110028110902
  building_type_uba_library_01: "도서관" # 12419872351417298661
  building_type_uba_library_01_desc: "이곳은 지식과 문화의 보고로, 시민들이 접근이 허용된 책들을 자유롭게 읽을 수 있는 곳입니다." # 17656576611906681417
  building_uba_library_01: "홀" # 8271955852847270828
  building_uba_library_01_desc: "이 웅장한 홀은 방문객들에게 넓고 편안한 공간을 제공합니다. 또한 방문객들이 읽을 수 있도록 소장 문서의 복제본을 전시하기도 합니다." # 1868516103938862742
  building_uba_library_02: "장서" # 9096471407872666235
  building_uba_library_02_desc: "세심하게 정리된 책장에는 풍부한 서적과 문서가 방대하게 소장되어 있습니다. 지식을 갈구하는 이들에게 이곳은 의심할 여지 없이 소중한 보물 창고입니다." # 14039859310486911630
  building_uba_library_03: "열람실" # 1938477070454310313
  building_uba_library_03_desc: "조용한 열람실은 독자들에게 쾌적한 환경을 제공하여, 학문과 심도 있는 연구, 그리고 독서의 즐거움에 집중할 수 있게 합니다." # 11085960935119539532
  building_uba_library_04: "필사가의 방" # 7990968813182770391
  building_uba_library_04_desc: "필사가는 필사라는 매우 단순한 방식으로 귀중한 필사본을 보존하고 복제하는 데 중요한 기여를 합니다." # 16423231372402610144
  building_uba_library_05: "화가의 방" # 2768953830119609464
  building_uba_library_05_desc: "그림에 능숙한 서기들이 삽화를 제작하는 임무를 맡아 책의 빈 공간을 적절한 예술 작품으로 채웁니다." # 7883001708924845280
  building_uba_library_06: "연구 및 학습실" # 7647451783675122247
  building_uba_library_06_desc: "연구실은 학자들이 깊이 있는 연구의 세계에 몰입하고 지식의 끝없는 경계를 탐구할 수 있도록 조용하고 편안한 환경을 제공합니다." # 12520356322805945146
  building_uba_library_07: "고문서 보관실" # 16846545876450639385
  building_uba_library_07_desc: "가장 오래되고 희귀한 필사본과 고문서들은 필사 및 복제 과정을 거친 후, 적절한 보존을 위해 고문서 보관실에 배치됩니다." # 4040763002271263535
  building_uba_library_08: "사서" # 10243292319057855458
  building_uba_library_08_desc: "전문 사서는 도서관에서 중요한 역할을 수행합니다. 이들은 보존, 분류, 목록화, 대출 및 반납 관리와 같은 업무를 책임집니다. 사서가 없다면 도서관은 제대로 기능할 수 없습니다." # 4026098570978259989
  building_type_uba_townhall_01: "시청" # 11581477686409054059
  building_type_uba_townhall_01_desc: "시청은 도시 행정 관리의 핵심으로, 행정, 입법, 사법 기능을 담당합니다. 이곳은 중요한 공공 서비스를 제공하며 시민들을 위한 의사결정의 중심지 역할을 합니다." # 2215252895759501107
  building_uba_townhall_01: "의회실" # 18377730908193489148
  building_uba_townhall_01_desc: "시민, 성직자, 귀족, 영주의 대표들이 이곳에 모여 도시의 일을 논의하고, 제안을 심의하며, 함께 결정을 내립니다." # 8757664703260122888
  building_uba_townhall_02: "시 법원" # 6628153387569277930
  building_uba_townhall_02_desc: "시민들은 자신의 이익과 정의를 위해 변론하고, 군주의 의지를 대변하는 판사들이 판결을 내립니다." # 6564301371470927049
  building_uba_townhall_03: "행정 사무국" # 3787814972196344934
  building_uba_townhall_03_desc: "시청의 다양한 계급의 관리들이 일상 업무를 처리하고 법률과 규정을 제정합니다. 이곳은 도시 의사결정의 중심지입니다." # 5648485416993098192
  building_uba_townhall_04: "세무서" # 4709185562854746671
  building_uba_townhall_04_desc: "두려움의 대상인 세무관들... 아니, 폐하의 세무관들이 폐하께 전달되어야 할 모든 동전이 확실히 폐하의 주머니로 들어오도록 할 것입니다." # 16784146254232779882
  building_uba_townhall_05: "시 기록 보관소" # 627421933509145376
  building_uba_townhall_05_desc: "모든 행정 기록, 법률 문서, 역사 문헌은 결국 이곳에 보존됩니다. 언젠가 그것들이 유용하게 쓰일 날이 올지도 모릅니다." # 13021995360508585729
  building_uba_townhall_06: "도시 경비대" # 5875225399866531795
  building_uba_townhall_06_desc: "경비대는 도시의 안전과 치안을 유지하며, 강도와 약탈자의 침입으로부터 시민들을 보호합니다." # 14166901829640283979
  building_uba_townhall_07: "시계탑" # 9063073956019422509
  building_uba_townhall_07_desc: "높이 솟은 시계탑은 시청의 상징입니다. 정교하고 독특한 시계는 시민들에게 시간을 알려줄 뿐만 아니라, 모든 방문객에게 도시의 영광을 보여줍니다." # 116626993135372607
  building_uba_townhall_08: "광장" # 18075132171911896120
  building_uba_townhall_08_desc: "시청을 둘러싼 광장은 도시 내에서 공개 행사, 중요한 축제, 그리고 모임을 주최하기에 이상적인 장소입니다." # 17595212666041066563
  UBA_townhall_effect_desc: "이 건물은 [domain_limit|E]을(를) #EMP 0.5#!만큼 증가시킵니다." # 16722262421114931465
  building_type_uba_temple_01: "예배당" # 18127998321680141826
  building_type_uba_temple_01_desc: "사람들이 기도하고 종교 의식에 참여할 수 있는 평온하고 엄숙한 건물입니다. 내부는 아름답게 장식되어 있으며, 신성한 분위기를 자아냅니다." # 14159113873514528742
  building_uba_temple_01: "대사원" # 17979485908484068502
  building_uba_temple_01_desc: "웅장함과 영광을 뿜어내는 높고 위엄 있는 공간입니다. 이곳에는 화려한 돔과 정교한 예술 장식이 자리하고 있어, 건물 내에서 가장 중요하고 엄숙한 구역임을 나타냅니다." # 1727339272890825223
  building_uba_temple_02: "기도실" # 13198344734976777076
  building_uba_temple_02_desc: "기도와 명상을 위해 마련된 조용하고 아늑한 공간입니다. 공기마저도 평온함과 경건함으로 가득 차 있습니다." # 12462921193760091633
  building_uba_temple_03: "수도원" # 4809211159640818694
  building_uba_temple_03_desc: "사원 옆에 위치한 소박하고 평화로운 건물로, 수도승이나 수녀들이 거주하며 기도하고 종교 활동에 전념하는 곳입니다." # 13636321760728788152
  building_uba_temple_04: "신학교" # 17423040209372023397
  building_uba_temple_04_desc: "사원 부속 학교로, 사제들과 신학도들이 종교 지식을 연구하고 탐구하는 곳입니다. 이곳에는 강의실, 도서관, 그리고 연구 시설이 갖추어져 있습니다." # 11088500355463463319
  building_uba_temple_05: "강당" # 12994578818372011662
  building_uba_temple_05_desc: "주로 다양한 종교적 모임을 개최하는 데 사용되지만, 의식, 축하 행사, 연설과 같은 비종교적 행사를 위해서도 자주 사용됩니다." # 17638935258937940474
  building_uba_temple_06: "묘지" # 4539243751984518883
  building_uba_temple_06_desc: "기억으로 가득하고 망자의 유해가 안식에 드는 평화롭고 엄숙한 땅은, 사랑하는 이들을 향한 사람들의 존경과 추모를 상징합니다." # 3766814544498979937
  building_uba_temple_07_desc: "종소리가 도시의 거리에 울려 퍼지며 종교 의식과 특별한 순간의 도래를 알리는, 종으로 장식된 높은 탑입니다." # 4316445206580587958
  building_uba_temple_08: "광장" # 18075132171911896120
  building_uba_temple_08_desc: "예배당 앞 광장은 건물들에 둘러싸여 시민들이 모여 사교와 여가를 즐기고 다양한 활동을 여는 장소로 활용되며, 도시의 활기와 문화를 여실히 보여줍니다." # 11050709413260675979
  UBA_temple_effect_desc: "$UBA_townhall_effect_desc$" # 13516569972576560895
  building_type_uba_bazaar_01: "순례자 시장" # 11893686179808149226
  building_type_uba_bazaar_01_desc: "이토록 먼 길을 걸어온 지친 순례자들에게, 지평선 너머로 보이는 시장은 의심할 여지 없는 하늘의 축복입니다." # 7801529611231454433
  building_uba_bazaar_01: "우물" # 2088581297079672675
  building_uba_bazaar_01_desc: "긴 여정을 견뎌낸 여행자들은 이곳에서 귀중한 식수를 보충하며 기력을 회복할 수 있습니다." # 11474283999293828785
  building_uba_bazaar_02: "음식 상인" # 8256584035423985415
  building_uba_bazaar_02_desc: "가판대 사이의 공기는 구운 고기와 말린 과일, 이국적인 향신료의 향기로 가득합니다. 맛있는 요리는 여행자들의 미각을 만족시킬 뿐만 아니라 그들의 영혼까지 치유합니다." # 2694620176329954295
  building_uba_bazaar_03: "여관과 마구간" # 14847803780060802202
  building_uba_bazaar_03_desc: "타향에서도 여행자들은 이곳에서 편안한 잠자리와 따뜻한 환대를 누릴 수 있습니다. 물론 말들도 적절한 보살핌을 받습니다." # 6070909855455210407
  building_uba_bazaar_04: "기념품 상인" # 9370421840407572956
  building_uba_bazaar_04_desc: "진열대에는 수많은 수공예품과 신기한 장신구들이 놓여 있지만, 상인들의 감언이설을 경계하십시오." # 17767204697982256014
  building_uba_bazaar_05: "선술집" # 17054290743438731816
  building_uba_bazaar_05_desc: "선술집은 언제나 좋은 술과 이야기로 가득합니다. 술은 여행자들의 혀를 부드럽게 만들고, 이어지는 이야기들은 방 안을 웃음소리로 채웁니다." # 13871106594424146996
  building_uba_bazaar_06: "성소" # 10656262394346773292
  building_uba_bazaar_06_desc: "고향의 사원들과 비교하면 이 건물은 평범해 보일지 모르지만, 여전히 많은 경건한 신도들을 불러 모읍니다." # 9799590115480821531
  building_uba_bazaar_07: "용병" # 17378522527219113230
  building_uba_bazaar_07_desc: "순례길은 결코 쉽지 않으며, 그들은 여행자들이 겪는 많은 문제를 해결하도록 도울 수 있습니다." # 10828194604927010084
  building_uba_bazaar_08: "무대" # 9923852493405848668
  building_uba_bazaar_08_desc: "이 임시 무대가 그리 화려하지는 않을지 몰라도, 이곳에서 펼쳐지는 춤과 연극, 음악은 진정한 예술 작품입니다." # 15707199084723016148
  building_type_uba_aqueduct_01: "수로" # 11200580545242010261
  building_type_uba_aqueduct_01_desc: "수자원에 대한 의존은 도시 발전의 잠재력을 제한합니다. 이 문제를 해결하기 위해서는 완전하고 합리적인 수리 체계가 필요합니다." # 15646917176172272506
  building_uba_aqueduct_01: "수원" # 7585761288497480618
  building_uba_aqueduct_01_desc: "지속적인 물 공급을 보장하는 것이 수리 체계 전체의 핵심입니다. 샘은 가장 흔한 수원이지만, 때로는 자연 수역이나 인공 저수지에서 물을 끌어오기도 합니다." # 3871201385465237159
  building_uba_aqueduct_02: "운하" # 10687846343265397359
  building_uba_aqueduct_02_desc: "수원은 종종 도시와 멀리 떨어져 있으며, 돌과 벽돌로 만들어진 이 운하들은 물을 하류로 효율적으로 운송합니다." # 143613721079190247
  building_uba_aqueduct_03: "수로교" # 6446516907859323462
  building_uba_aqueduct_03_desc: "적절한 경사와 고도 차이는 높은 곳에서 낮은 곳으로 물이 원활하게 흐르도록 합니다. 중력을 이용한 이 방식은 전체 상수도 체계를 효율적이고 안정적으로 만듭니다." # 6150671241171829127
  building_uba_aqueduct_04: "교량, 사이펀 및 터널" # 17071777213842329891
  building_uba_aqueduct_04_desc: "일부 수로는 지형 차이가 큰 지역을 통과하며, 공학자들의 지혜는 다음 구간의 관으로 물이 원활하게 흐를 수 있도록 보장합니다." # 7204369243034973758
  building_uba_aqueduct_05: "급수탑과 저수지" # 11331460093948176793
  building_uba_aqueduct_05_desc: "안정적인 수류와 균형 잡힌 수압, 그리고 안전한 수질을 유지하기 위해, 수로에서 끌어온 물은 먼저 급수탑으로 운송된 뒤 도시의 저수지와 침전조로 보내집니다." # 12359920567306794484
  building_uba_aqueduct_06: "파이프라인 시스템" # 11273721786173998487
  building_uba_aqueduct_06_desc: "물이 도시에 도달하면 복잡한 파이프라인 시스템으로 유도됩니다. 이 파이프들은 외부 환경의 방해로부터 보호하기 위해 보통 지하에 매설됩니다." # 626507811218768244
  building_uba_aqueduct_07: "급수 및 배수" # 13865202598574714742
  building_uba_aqueduct_07_desc: "세심하게 설계된 분배 시스템은 각 구역에 충분한 물을 공급하며, 한편으로 폐수는 적절한 처리를 위해 배수 시스템으로 수집됩니다." # 10018509526495578930
  building_uba_aqueduct_08: "정기 유지보수" # 12728367765491330189
  building_uba_aqueduct_08_desc: "이토록 복잡한 수력 시스템은 포괄적인 정기 유지보수가 필요합니다. 기술자, 일꾼, 그리고 병사로 구성된 여러 검사 팀이 시스템이 대부분의 시간 동안 정상적으로 작동하도록 보장합니다." # 14481358878394966253
  building_type_uba_joust_01: "기사 훈련장" # 9846648123544475915
  building_type_uba_joust_01_desc: "기사 훈련을 위해 건설된 전용 구역입니다. 수많은 청년들이 이곳에서 기사의 꿈을 위해 땀을 흘릴 것이며... 어쩌면 눈물과 피를 흘릴지도 모릅니다." # 4686560289742125965
  building_uba_joust_01: "토너먼트장" # 6987156630127121915
  building_uba_joust_01_desc: "기사들이 사용하는 탁 트인 공간으로, 이곳에서 맨손 격투, 무기 대련 및 기타 연습과 같은 일상적인 훈련을 수행합니다." # 3502806858496924362
  building_uba_joust_02: "궁술 훈련장" # 4596522453524609364
  building_uba_joust_02_desc: "이 구역은 궁술, 투창 또는 기타 원거리 무기 훈련을 위해 지정된 곳입니다. 표적을 설치할 때는 각별한 주의가 필요합니다!" # 2681416473848407267
  building_uba_joust_03: "마구간" # 2721306282045328788
  building_uba_joust_03_desc: "하루 동안의 마술 훈련이 끝나면, 기사들이 아끼는 말들은 마구간에 수용되어 숙련된 일꾼들의 보살핌을 받습니다." # 17467911189233210830
  building_uba_joust_04: "병영" # 17180096950048639704
  building_uba_joust_04_desc: "아무리 용맹한 기사라도 휴식은 필요한 법입니다. 하룻밤의 휴식은 그들이 다음 날 다시 활력을 되찾게 해줍니다!" # 2723504434767909651
  building_uba_joust_05: "무기고" # 7476761562091568369
  building_uba_joust_05_desc: "무기고는 기사들을 위한 다양한 장비가 보관되고 유지되는 곳입니다. 물건이 넘어지지 않도록 들어갈 때 각별히 주의하십시오." # 3418504115370907948
  building_uba_joust_06: "대장간" # 14505988969374450360
  building_uba_joust_06_desc: "대장장이는 기사들을 위한 무기와 갑옷을 제작하며, 장비에 대한 유지보수 및 수리 서비스를 제공합니다." # 4213036935180622215
  building_uba_joust_07: "의무실" # 7615033252034336590
  building_uba_joust_07_desc: "강도 높은 훈련은 필연적으로 부상을 동반하며, 의사들은 부상이 악화되지 않도록 보살핍니다... 뭐, 대부분의 경우에는 말이죠." # 10029217378927107902
  building_uba_joust_08: "기사의 전당" # 18027439282148806377
  building_uba_joust_08_desc: "이곳에서 기사와 지휘관들은 전술과 전략, 일상 업무를 논의합니다. 흥미진진한 기사 서임식 또한 이곳에서 열립니다." # 8190662903044277436
  building_type_uba_checkpoint_01: "검문소" # 9250055775858692803
  building_type_uba_checkpoint_01_desc: "마을이나 도시의 경계에 주로 위치한 검문소는 적에 대한 방어 거점이자 상업과 인구 이동을 통제하는 중요한 수단으로 기능했습니다." # 10409562731314275875
  building_uba_checkpoint_01: "임시 초소" # 11806472164917650853
  building_uba_checkpoint_01_desc: "소수의 병사가 간단한 목재 감시탑과 울타리를 지킵니다. 병사들은 이곳에서 통행자의 신원과 물품을 확인하여 위험 요소가 섞이지 않도록 합니다." # 2505018346595452800
  building_uba_checkpoint_02: "무기 저장고" # 13384036502238965975
  building_uba_checkpoint_02_desc: "작은 무기고는 활과 화살, 창과 같은 일반적인 무기를 보관하는 데 사용됩니다. 수량이 아주 많지는 않더라도 병사들의 전투 효율을 높이는 데 도움이 됩니다." # 7412198023458997905
  building_uba_checkpoint_03: "감시탑" # 9501353617961713189
  building_uba_checkpoint_03_desc: "감시탑을 높이고 보강하여 병사들이 더 높은 곳에서 멀리 다가오는 적을 경계할 수 있게 되었습니다." # 952995193318739490
  building_uba_checkpoint_04: "세금 징수소" # 12775464153709658776
  building_uba_checkpoint_04_desc: "영주들이 임명한 전문 세금 징수원들이 통행하는 상인과 물품에 세금을 부과합니다. 누구나 부러워할 만한 좋은 일자리입니다." # 12396470550087350690
  building_uba_checkpoint_05: "석벽" # 13043720646663609390
  building_uba_checkpoint_05_desc: "단순한 목재 울타리는 이제 튼튼한 석벽으로 대체되었으며, 방어력은 이전과 비교할 수 없을 정도입니다." # 9540612690440979173
  building_uba_checkpoint_06: "상업 검문소" # 5172510286519286265
  building_uba_checkpoint_06_desc: "이 검문소에는 통행하는 상인의 정보와 물품을 기록하기 위한 특별 상업 등록 구역이 있습니다. 압수된 불법 물품과 징수된 세금은 경비가 삼엄한 창고에 보관됩니다." # 16219141049125827248
  building_uba_checkpoint_07: "수비대 캠프" # 5382686887402433850
  building_uba_checkpoint_07_desc: "새로 설치된 작은 수비대 캠프는 더 많은 병사와 방어 장비를 수용할 수 있으며, 이곳의 방어력을 강화하는 데 사용됩니다." # 7838549830964219214
  building_uba_checkpoint_08: "국경 요새" # 2720004655027980923
  building_uba_checkpoint_08_desc: "높은 석벽과 감시탑, 튼튼한 요새 덕분에 이곳은 공격하기 매우 어렵습니다. 이 장소는 국경 방어의 핵심 요충지가 되었습니다." # 7974393406602009319
  building_type_uba_taxing_01: "세무서" # 4709185562854746671
  building_type_uba_taxing_01_desc: "농부와 시민, 상인들이 자발적으로 세금을 내게 하는 것은 쉬운 일이 아닙니다. 때로는 그들에게 약간의 '도움'을 줄 필요가 있습니다." # 9914381848498343055
  building_uba_taxing_01: "세금 징수관의 정자" # 8284745416156820946
  building_uba_taxing_01_desc: "내부 가구는 평범하지만, 세금 징수관과 그의 병사들은 이곳의 농민들이 군주를 '충분히' 존중하도록 확실히 할 것입니다." # 9237071475389101832
  building_uba_taxing_02: "세무 기록 보관소" # 15711429161405144299
  building_uba_taxing_02_desc: "서류함, 장부, 인장과 같은 물품들이 세무 행정과 기록 보관을 원활하게 하기 위해 기록 보관실에 보관되었습니다." # 8721411283599669630
  building_uba_taxing_03: "세무 금고" # 8032017136539725965
  building_uba_taxing_03_desc: "작은 금고는 징수된 세금과 농민들이 납부한 물품을 보관하는 저장소로 사용되었습니다. 이것들을 안전하게 지키는 것은 결코 쉬운 일이 아니었습니다." # 5308362311684985491
  building_uba_taxing_04: "토지 평가관" # 17150787706067517817
  building_uba_taxing_04_desc: "토지 평가관은 토지, 상품, 재산을 평가하여 납세자가 납부해야 할 세금의 기본 액수를 결정할 것입니다." # 16034762618080382803
  building_uba_taxing_05: "$building_tax_assessor_01$" # 8052995648267445711
  building_uba_taxing_05_desc: "$building_tax_assessor_01_desc$" # 12665536376869103541
  building_uba_taxing_06: "$building_tax_assessor_02$" # 5770256664666893285
  building_uba_taxing_06_desc: "$building_tax_assessor_02_desc$" # 967644793410416185
  building_uba_taxing_07: "$building_tax_assessor_03$" # 13164731604599272835
  building_uba_taxing_07_desc: "$building_tax_assessor_03_desc$" # 17934214021112905732
  building_uba_taxing_08: "세무 부서" # 4855220576260743383
  building_uba_taxing_08_desc: "\"세상에 피할 수 없는 것은 죽음과 세금, 이 두 가지뿐이다.\" -- 그리고 우리는 이 두 가지를 단 두 개의 선택지만 있는 객관식 문제로 바꾸어 놓았습니다." # 9435659590852246616
  building_type_uba_bathroom_01: "공공 목욕탕" # 4746736447530907654
  building_type_uba_bathroom_01_desc: "목욕탕은 몸을 씻고 질병을 예방하며 휴식을 취하는 용도뿐만 아니라, 지역 사회 전체에 열린 오락과 사교의 장으로도 활용될 수 있습니다." # 7554978873731463961
  building_uba_bathroom_01: "목욕탕" # 1490524381067365610
  building_uba_bathroom_01_desc: "방문객들이 간단히 몸을 씻고 청결을 유지할 수 있도록 여러 개의 개방형 욕조를 갖춘 기본적인 공공 목욕 시설입니다." # 17073811303623771355
  building_uba_bathroom_02: "탈의실" # 15176910328315281384
  building_uba_bathroom_02_desc: "이제 손님들은 서두를 것 없이 옷을 벗어 탈의실에 보관할 수 있게 되었으며, 이로써 옷을 둘 곳이 없어 겪던 번거로움을 덜게 되었습니다." # 60290141330571271
  building_uba_bathroom_03: "대욕탕" # 11247424011189154210
  building_uba_bathroom_03_desc: "대욕탕은 단순히 몸을 씻는 곳 이상의 용도로 자주 사용됩니다. 이곳은 모두가 솔직하고 허물없이 대화할 수 있는 사교의 장입니다." # 17974704526047822993
  building_uba_bathroom_04: "휴게실" # 12360559184110754976
  building_uba_bathroom_04_desc: "목욕탕은 몸을 씻는 것 외에도 편안한 휴게 공간을 제공합니다. 이곳에서 시간을 보내는 것도 좋은 선택이 될 것입니다." # 8029353462511791205
  building_uba_bathroom_05: "냉탕" # 5737690617536762256
  building_uba_bathroom_05_desc: "높은 수온에 익숙하지 않은 사람들도 시원한 물이 있는 냉탕에서 목욕을 즐길 수 있습니다. 아이들이 물놀이를 하기에도 아주 좋은 장소입니다." # 4021218463187328213
  building_uba_bathroom_06: "온탕" # 8577817949753631318
  building_uba_bathroom_06_desc: "온탕이 분명 좋기는 하지만, 매주 목욕탕에서 왜 그렇게 많은 땔감이 소비되는지 깊이 파고들지 않는 것이 좋습니다." # 5691647955502313082
  building_uba_bathroom_07: "마사지실" # 12299845138351717139
  building_uba_bathroom_07_desc: "전문가들이 이곳에서 편안한 물리 치료 서비스를 제공합니다. 제대로 된 마사지는 몸의 노폐물을 제거하여 질병을 예방할 수 있다고 합니다." # 1518874994828984135
  building_uba_bathroom_08: "개인 목욕탕" # 12538351020412097861
  building_uba_bathroom_08_desc: "부유하고 권력 있는 자들은 대개 자신의 본모습을 타인에게 보이고 싶어 하지 않는다. 대리석 조각상과 정교한 상감 세공으로 꾸며진 개인 욕실은 대중 목욕탕보다 훨씬 나은 선택임이 분명하다." # 7981231973859135271
  building_type_uba_herbal_01: "약초 정원" # 1459317471722879633
  building_type_uba_herbal_01_desc: "약초는 역병과 질병을 퇴치하는 데 핵심적인 요소다. 온갖 종류의 약초와 식물을 재배하고 연구하는 약초 정원은 질병에 대처하는 우리의 능력을 크게 향상해 줄 것이다." # 302669990302879233
  building_uba_herbal_01: "약초 밭" # 3552920892357205569
  building_uba_herbal_01_desc: "평화로운 들판을 감싼 소박한 나무 울타리다. 이곳에서는 치유사와 마을 사람들이 사용할 기본적인 약초와 향신료를 재배한다." # 16022439568324794242
  building_uba_herbal_02: "묘목장" # 10523600419251842040
  building_uba_herbal_02_desc: "묘목장은 어린 식물을 기르는 정원이자 재배 면적을 확장하는 데 필요한 기반 시설이다." # 10874842915236843907
  building_uba_herbal_03: "구획 재배" # 3546240066146081622
  building_uba_herbal_03_desc: "약초와 약용 식물을 그 성질에 따라 분류하고, 비슷한 성질을 가진 것끼리 같은 구획에 배치하여 재배한다." # 9034269983441505613
  building_uba_herbal_04: "관개 시설" # 9156646236146586045
  building_uba_herbal_04_desc: "기발한 운하와 파이프를 통해 상류의 물을 약초 정원으로 끌어오면, 농부들이 멀리서 물을 길어올리는 수고를 덜 수 있다." # 11599864875054043047
  building_uba_herbal_05: "건조실" # 6788656853124284615
  building_uba_herbal_05_desc: "식물을 건조하고 보관하기 위해 통풍이 잘되고 건조하게 유지되는 작업장이다. 건조된 약초는 보관이 쉽고 효능도 더 강해지는 경우가 많다." # 7028920242281934979
  building_uba_herbal_06: "약초 공방" # 13654611776974221039
  building_uba_herbal_06_desc: "약을 만드는 데 필요한 도구들은 보통 이곳에 보관된다. 약초사와 도제는 이곳에서 약초를 갈고 빻고 섞어 적절한 물약을 조제한다." # 13788243874914055053
  building_uba_herbal_07: "약초 도서관" # 11994696176131618722
  building_uba_herbal_07_desc: "도서관에는 약초의 재배와 활용에 관한 방대한 서적과 필사본이 소장되어 있으며, 학자와 의사들이 이를 연구할 수 있다." # 15100765656781168324
  building_uba_herbal_08: "유리 온실" # 8854259187110222649
  building_uba_herbal_08_desc: "유리로 지어진 이 경이로운 건물 내부는 외부보다 항상 따뜻하며, 덕분에 식물들이 더 빠르고 건강하게 자란다." # 6976922050387141393
  building_type_uba_private_01: "비밀의 집" # 7106508032754639615
  building_type_uba_private_01_desc: "복잡하게 얽힌 비밀 통로와 숨겨진 방으로 이루어진 비밀의 집은 찾기가 매우 어렵다. 이곳은 정보망의 중심지이자 음모자들이 작전을 계획하고 몸을 숨기는 은신처 역할을 한다." # 15953570180862559337
  building_uba_private_01: "은신처" # 9010560494300175162
  building_uba_private_01_desc: "흔적을 지우는 데는 큰 기술이 필요하지 않다. 때로는 지극히 평범한 집조차 추적자의 눈을 피할 완벽한 은신처가 되어준다." # 14598608387295321699
  building_uba_private_02: "안전 가옥" # 6079507459201544299
  building_uba_private_02_desc: "때때로 그림자 속에 머물러야 하는 이들에게 도시 구석이나 시골 외곽의 오두막은 훌륭한 선택지입니다." # 16126637340750939299
  building_uba_private_03: "비밀의 방" # 5479912291192715011
  building_uba_private_03_desc: "저택 뒤편 봉인된 나무 문 너머에는 무엇이 있을까요? 그리고 선반 위 붉은 책이 가진 특별한 상징은 무엇일까요? 몇몇 질문은 좋은 질문이지만, 마음속에 간직하는 것이 가장 좋습니다." # 16193642289085386294
  building_uba_private_04: "비밀 통로" # 8579978296076631236
  building_uba_private_04_desc: "비밀을 몇 가지 가진 사람에게 비밀 통로 하나쯤 있는 것은 그리 드문 일이 아닙니다. 특히 비밀 조직을 운영하려 한다면 더욱 그렇겠지요......" # 16464968550807630852
  building_uba_private_05: "훈련실" # 16693779655911380384
  building_uba_private_05_desc: "조직원들은 훈련실에서 정찰, 탈출, 전투에 관한 혹독한 훈련을 받을 수 있습니다. 향의 '도움'을 받으면 더욱 빠르게 기량을 발전시킬 수 있습니다." # 5152356035957882740
  building_uba_private_06: "회의실" # 4889780442524446254
  building_uba_private_06_desc: "회의실은 조직원들이 계획을 세우고 논의하는 곳입니다. 건물 구조는 벽 너머로 소리가 새어 나가지 않도록 교묘하게 설계되어, 외벽에 귀를 바짝 대더라도 안에서 무슨 일이 일어나는지 알아내기가 극히 어렵습니다." # 6007708752901304582
  building_uba_private_07: "정보실" # 7595130627387948419
  building_uba_private_07_desc: "곳곳에서 수집된 정보가 이곳으로 모여 전담 인원들에 의해 분석됩니다. 사소해 보이는 세부 사항 하나가 계획의 열쇠가 될 수 있습니다." # 2835753879543156026
  building_uba_private_08: "지휘부" # 17209707474823782491
  building_uba_private_08_desc: "모든 조직원이 지휘부로부터 지시를 받지만, 고위 간부들조차 그 정확한 위치는 알지 못할 수도 있습니다. \n\n#emphasis 진실은 향과 안개 속에 영원히 숨겨져 있을지도 모릅니다. #!" # 12688871449884764114
  building_type_uba_vineyard_01: "포도원" # 5487026144741926365
  building_type_uba_vineyard_01_desc: "독특한 테루아는 고품질의 포도를 길러냈고, 정교한 양조 과정은 자연의 선물을 훌륭한 와인으로 탈바꿈시켰습니다. 포도원에서 저장고에 이르기까지, 모든 단계마다 사람들의 노력이 응축되어 있습니다." # 10227565094188238099
  building_uba_vineyard_01: "포도원" # 5487026144741926365
  building_uba_vineyard_01_desc: "세심하게 고른 땅 위로 가지런한 포도나무 줄기가 뻗어 있습니다. 햇살과 비, 토양의 영양분은 각 포도 알에 테루아의 정수를 가득 채워줍니다." # 4415978867985950089
  building_uba_vineyard_02: "묘목장" # 10523600419251842040
  building_uba_vineyard_02_desc: "접목과 육종 기술을 사용하여 현지 환경에 더 잘 적응하고 품질이 뛰어난 포도 품종을 재배할 수 있으며, 이는 최고급 와인 양조를 위한 훌륭한 토대가 됩니다." # 11314102657644220616
  building_uba_vineyard_03: "포도 압착기" # 11815456874958758104
  building_uba_vineyard_03_desc: "잘 익은 포도를 정성껏 수확하여 즙을 짜낸 뒤 오크통에 담으면, 풍미 깊은 와인으로 변모할 준비가 끝납니다." # 1864835865282799597
  building_uba_vineyard_04: "양조장" # 8428746867216857416
  building_uba_vineyard_04_desc: "안정적인 온도와 습도를 유지하는 것이 와인 품질의 핵심입니다. 오크통 안에서 위대한 변화가 조용히 일어나고 있습니다." # 1096561816511126222
  building_uba_vineyard_05: "와인 저장고" # 9525841102733961873
  building_uba_vineyard_05_desc: "일정한 온도와 습도가 유지되는 와인 저장고는 와인을 보관하기에 이상적인 장소입니다. 이곳의 오크통은 와인에 더욱 복합적인 향과 맛을 더해주며, 시간이 흐름에 따라 독특한 색을 입혀 더욱 부드럽고 풍미 깊은 와인으로 숙성시킵니다." # 8639169631264450863
  building_uba_vineyard_06: "부티크 전시관" # 9859646454246871958
  building_uba_vineyard_06_desc: "가문의 문장이 새겨진 와인 병들이 오크 선반 위에 전시되어 있으며, 가장 뛰어난 완성품만이 이러한 영예를 누릴 수 있습니다." # 6095120821702733220
  building_uba_vineyard_07: "VIP 와인 시음실" # 14573580537037542560
  building_uba_vineyard_07_desc: "깔끔하고 화려한 이 홀은 귀빈들을 위한 와인 시음 장소입니다. 정교하고 화려한 장식과 세심한 서비스는 와인을 단순한 식탁 위의 별미를 넘어선 존재로 만듭니다." # 14898181957599671246
  building_uba_vineyard_08: "대형 와이너리" # 10788803429042635809
  building_uba_vineyard_08_desc: "포도 재배, 양조, 판매를 아우르는 대규모 와이너리입니다. 최신 설비와 풍부한 경험을 바탕으로 생산된 고급 와인은 전 세계적으로 명성이 높습니다." # 9772928706068249011
  building_type_uba_olive_01: "올리브 과수원" # 10575963933239020159
  building_type_uba_olive_01_desc: "지중해의 햇살과 따뜻한 기후가 올리브 나무를 길러냈습니다. 이 고대 수종은 맛있는 열매를 제공하여 땅을 비옥하게 할 뿐만 아니라, 풍부한 관련 산업을 파생시킵니다." # 12591425020910086361
  building_uba_olive_01: "올리브 과수원" # 10575963933239020159
  building_uba_olive_01_desc: "비탈진 언덕 위로 올리브 나무들이 무성하게 자라나고, 은빛이 도는 녹색 잎사귀들이 햇빛을 받아 반짝이며 아름다운 전원 풍경을 자아냅니다. 잘 익은 올리브는 식용뿐만 아니라 귀한 올리브유를 추출하는 데 쓰이며 그 활용도가 매우 넓습니다." # 8452336632147825101
  building_uba_olive_02: "전통 압착기" # 3039242029611320805
  building_uba_olive_02_desc: "신선한 올리브 열매를 압착 작업장에서 먼저 으깨어 페이스트 형태로 만든 뒤, 지렛대를 이용해 압착하여 엑스트라 버진 올리브유를 짜냅니다." # 15254465197581926986
  building_uba_olive_03: "올리브유 창고" # 4740963494869227274
  building_uba_olive_03_desc: "산도와 풍미에 따라 올리브유는 등급이 나뉩니다. 고품질의 올리브유는 본연의 맛과 품질을 유지하기 위해 도기 항아리에 보관됩니다." # 17970055176419674422
  building_uba_olive_04: "개량형 압착기" # 13428620743121696620
  building_uba_olive_04_desc: "더욱 진보된 압착 설비와 기술을 도입하여, 작업장에서 더 많은 고품질 올리브유를 생산할 수 있게 되었습니다." # 6473415107976434391
  building_uba_olive_05: "올리브 비누 공방" # 14262581821560623692
  building_uba_olive_05_desc: "올리브유는 비누를 만드는 데 이상적인 원료입니다. 천연 보습 성분이 피부를 부드럽게 세정하고 관리해 줍니다. 수제 올리브 비누는 세정 용도를 넘어 점차 삶의 질을 상징하는 중요한 물건이 되었습니다." # 11112926988647772772
  building_uba_olive_06: "향수 공방" # 2527470638458072083
  building_uba_olive_06_desc: "올리브유 특유의 향은 향수를 만드는 데 천연 베이스가 됩니다. 숙련된 조향사의 손을 거쳐 허브 향신료와 블렌딩된 올리브유는 신선하고 우아한 향기를 만들어냅니다." # 16166012756842762582
  building_uba_olive_07: "대형 압착 작업장" # 10373426603309783199
  building_uba_olive_07_desc: "황금빛 올리브유는 지중해 식단의 핵심입니다. 더 많은 압착기를 도입함으로써 올리브유 작업장은 생산 규모를 더욱 확대하고 생산량과 품질을 지속적으로 향상시킬 수 있습니다." # 12329785348497618222
  building_uba_olive_08: "올리브 장원" # 17595606241891068493
  building_uba_olive_08_desc: "$building_type_uba_olive_01_desc$" # 8621992068703437592
  building_type_uba_fur_01: "가죽 공방" # 17947454223307196319
  building_type_uba_fur_01_desc: "추운 지역에서 동물의 모피는 혹독한 추위를 견디기 위한 중요한 재료입니다. 사냥부터 가공까지, 방한용 소재에서 신분의 상징에 이르기까지 모피는 언제나 사람들의 삶과 밀접한 관련이 있었습니다." # 5356742620805852292
  building_uba_fur_01: "사냥터" # 11968937119412089178
  building_uba_fur_01_desc: "광활한 숲과 초원은 야생 동물의 보금자리이자 사냥꾼들이 먹잇감을 얻는 곳입니다. 허가받지 않은 밀렵은 엄격히 금지됩니다." # 1195082046431935670
  building_uba_fur_02: "야영지" # 11306927889361928072
  building_uba_fur_02_desc: "사냥꾼들은 야영지에서 전리품을 처리하며, 동물의 모피를 조심스럽게 벗겨내고 1차 세척을 진행합니다." # 1213979239445459441
  building_uba_fur_03: "생가죽 무두질" # 16193166864055788287
  building_uba_fur_03_desc: "무두질은 가공의 핵심 단계입니다. 피투성이가 된 가죽들이 이곳에서 세심하게 처리되지만, 그 냄새는 고약하기 짝이 없습니다." # 18031852290556926550
  building_uba_fur_04: "재단사 상점" # 12952243055873174522
  building_uba_fur_04_desc: "숙련된 장인들이 무두질한 가죽을 재단하고 바느질하여 다양한 가죽 의류를 만들며, 사람들에게 따뜻하고 튼튼한 보호 수단을 제공합니다." # 17071449437248478765
  building_uba_fur_05: "갑옷 제작소" # 6375383846440866006
  building_uba_fur_05_desc: "경화된 가죽과 아마포를 번갈아 덧대어 결합하면, 가죽으로도 튼튼하고 가벼운 가죽 갑옷을 만들 수 있습니다." # 5911132612279246817
  building_uba_fur_06: "조각 공방" # 3467176469865797516
  building_uba_fur_06_desc: "사냥으로 얻은 동물의 뿔, 뼈, 이빨 등의 재료를 정교하게 조각하여 다양한 예술품이나 실용적인 물건을 만듭니다." # 14898958797617456218
  building_uba_fur_07: "모피 공방" # 8764879325584412321
  building_uba_fur_07_desc: "모피는... 말 그대로 모피입니다. 이 화려한 동물 모피는 결국 일부 귀족들의 자랑스러운 수집품이 될 것입니다." # 5239753394113002924
  building_uba_fur_08: "모피 교역소" # 10743434035003841993
  building_uba_fur_08_desc: "고품질 모피와 가죽 제품은 상인들을 통해 여러 곳으로 판매되어 사람들의 방한복이 되거나, 영주의 금고 속 호화로운 수집품이 됩니다." # 7125750036973013723
  building_type_uba_piazza_01: "광장" # 5035000006383538699
  building_type_uba_piazza_01_desc: "광장은 시민들의 일상 활동, 교류, 상거래의 중심지이자 영주가 자신의 권위를 과시하는 중요한 장소입니다." # 15029267993384759816
  building_uba_piazza_01: "소광장" # 5796869302050861242
  building_uba_piazza_01_desc: "주택 앞의 공터는 시민들이 자발적으로 모이는 장소가 됩니다. 사람들은 이곳에서 물건을 거래하고, 정보를 교환하며, 드문 여가 시간을 즐깁니다." # 738422772114492749
  building_uba_piazza_02: "게시판" # 1055056915900301367
  building_uba_piazza_02_desc: "광장 앞에는 법령이나 기타 중요한 정보를 게시하기 위해 간단한 게시판이 설치되었습니다. 글을 읽을 줄 아는 이들에게 게시판의 문구는 때로는 잡을 수 없는 기회를 의미하기도 했습니다." # 5143548235148164374
  building_uba_piazza_03: "의례 장소" # 4176499995537555559
  building_uba_piazza_03_desc: "광장은 점차 경건한 시민들이 의례를 치르는 장소로 변모했습니다. 이곳에서 수많은 종교 의식과 축제가 열리며 광장은 더욱 활기를 띠게 되었습니다." # 17402290809439931433
  building_uba_piazza_04: "시장" # 2702392542409102674
  building_uba_piazza_04_desc: "광장 주변 지역은 점차 중요한 상업 구역이 되었습니다. 고정된 가판대와 상점들이 더 많은 상인과 손님을 끌어모으면서 시장은 더욱 확장되었습니다." # 3475397804892359185
  building_uba_piazza_05: "시 행정" # 14115969452676403968
  building_uba_piazza_05_desc: "새로운 시 행정 체계가 도입되었습니다. 이제 광장 주변을 경비병이 순찰하고 시 관리가 질서를 유지하며, 영주의 도시에 대한 통제력이 한층 강화되었습니다." # 529009411464001904
  building_uba_piazza_06: "축제와 기념행사" # 18392411241978906735
  building_uba_piazza_06_desc: "광장에서는 때때로 다양한 축제와 기념행사가 열리며, 시민들이 모여 여러 행사를 즐기는 중요한 장소가 되었습니다. 성대한 축제는 시민들의 삶을 풍요롭게 할 뿐만 아니라 영주의 위신을 높여줍니다." # 14973833615756339896
  building_uba_piazza_07: "기념비" # 9276640739031108084
  building_uba_piazza_07_desc: "어쩌면 중요한 사건이나 인물을 기리기 위함인지, 광장 중앙에 웅장한 기념비가 서 있습니다. 이 위엄 있는 광장은 평민뿐만 아니라 고귀한 신분의 사람들에게도 휴식을 취하기에 더할 나위 없이 좋은 장소입니다." # 11684505755237135275
  building_uba_piazza_08: "대광장" # 16156348622718444162
  building_uba_piazza_08_desc: "이제 이 광장은 열주와 화단으로 둘러싸여 있으며, 숙련된 조각가들이 만든 수많은 조각상과 분수, 대리석 기둥은 모든 방문객에게 잊을 수 없는 인상을 남길 것입니다. 도시의 맥박이 바로 이곳에서 고동칩니다." # 1808803306631499173
  building_type_uba_kiln_01: "가마" # 6068746580131932603
  building_type_uba_kiln_01_desc: "$building_type_dragon_kiln_01_desc$" # 10963147275989216425
  building_uba_kiln_01: "토가마" # 5000510432611300447
  building_uba_kiln_01_desc: "단순히 땅을 파거나 쌓아 올린 원시적인 형태의 가마입니다. 기본적인 도기만 구울 수 있으며, 주로 지역 주민들의 일상적인 필요를 충족하는 데 쓰입니다." # 13130205249745407385
  building_uba_kiln_02: "원형 가마" # 13224736859217033378
  building_uba_kiln_02_desc: "토가마보다 구조가 더 밀폐된 돔 형태의 가마로, 열을 집중시켜 온도를 높일 수 있어 더 단단하고 내구성이 좋은 도기를 구워낼 수 있습니다." # 17436414536352904449
  building_uba_kiln_03: "$building_dragon_kiln_01$" # 9170837239346914669
  building_uba_kiln_03_desc: "$building_dragon_kiln_01_desc$" # 506364497533005826
  building_uba_kiln_04: "$building_dragon_kiln_02$" # 16821810517693455221
  building_uba_kiln_04_desc: "$building_dragon_kiln_02_desc$" # 8259420863304054071
  building_uba_kiln_05: "$building_dragon_kiln_03$" # 8071291385750412297
  building_uba_kiln_05_desc: "$building_dragon_kiln_03_desc$" # 1367427660870127555
  building_uba_kiln_06: "표주박 가마" # 1885004292069155057
  building_uba_kiln_06_desc: "가마의 몸체가 표주박처럼 길게 이어져 있어 잔열을 완전히 활용할 수 있고 보온성이 뛰어납니다. 이러한 효율적인 가마 구조 덕분에 자기의 소성 성공률이 더욱 높아지고 연료비가 절감됩니다." # 1178482126562146259
  building_uba_kiln_07: "달걀형 가마" # 8651693824787012175
  building_uba_kiln_07_desc: "가마의 몸체가 오리알을 닮은 거대하고 배가 불룩한 하염가마로, 가마실과 연소실의 두 부분으로 구성됩니다. 이 가마는 강력하고 안정적인 열을 제공하며 고온, 중온, 저온에서 각각 자기를 구워낼 수 있습니다." # 3372083242038466493
  building_uba_kiln_08: "관요" # 11400432006821172251
  building_uba_kiln_08_desc: "관청의 감독하에 가장 뛰어난 장인들이 모여 최상의 원료로 자기를 생산하며, 오직 궁정에서 사용할 도자기만을 제작합니다." # 14469692219973553408
  building_type_uba_tea_01: "차밭" # 5138999200769068837
  building_type_uba_tea_01_desc: "$tgp_tea_ceremony_decision_desc$" # 10191047029913780135
  building_uba_tea_01: "야생 차밭" # 13935510837564385961
  building_uba_tea_01_desc: "언덕 곳곳에 찻잎이 흩어져 있고 채엽 규모는 작습니다. 생산된 차는 대부분 자가 소비용이며 품질이 일정하지 않습니다." # 12201815312572187804
  building_uba_tea_02: "소규모 차 농원" # 2905656186257651082
  building_uba_tea_02_desc: "차밭이 형태를 갖추기 시작하며 일꾼들이 가지치기와 관리를 수행합니다. 차 공방에는 찻잎을 1차 가공하기 위한 기본적인 솥과 건조 도구가 갖춰져 있습니다." # 6106244708859651538
  building_uba_tea_03: "차 농원" # 5138999200769068837
  building_uba_tea_03_desc: "차밭에 간작 농법을 도입하여 수확량을 최적화합니다. 차 생산이 비교적 안정적이며 인근 백작령으로도 판매되어 어느 정도 명성을 얻고 있습니다." # 7070449056364333696
  building_uba_tea_04: "차 솥 가공 공방" # 12062854000260233816
  building_uba_tea_04_desc: "차 농원 근처에 차 가공 공방이 설립되어 솥에 덖기, 비비기, 건조, 압착 등 복잡한 공정을 집중적으로 처리합니다." # 11610750310631378318
  building_uba_tea_05: "품종 차 농원" # 2596216010395664399
  building_uba_tea_05_desc: "우수한 차 품종 재배에 집중하며 토양과 수원을 세심하게 관리하고, 특정 풍미를 지닌 좋은 차를 선별하고 육종합니다." # 1042060317644873906
  building_uba_tea_06: "차 상인" # 15797842541236348231
  building_uba_tea_06_desc: "대규모 경작을 통해 완벽한 생산 및 판매 체계가 구축되었습니다. 차는 국내외로 유통되며 막대한 무역 이익으로 지역 재정을 충분히 지탱합니다." # 4684358158197194377
  building_uba_tea_07: "차 관리청" # 428806294415588143
  building_uba_tea_07_desc: "상업 세금의 일부인 차세가 상당한 수준에 이르렀습니다. 이에 따라 황실은 차 산업을 관리할 특별 위원을 임명하여 고품질의 안정적인 공급을 보장합니다." # 16142930036471124748
  building_uba_tea_08: "황실 차 농원" # 15468395943369455694
  building_uba_tea_08_desc: "이 농원에서 생산된 차는 오직 황실의 향유를 위한 것입니다. 차나무는 독보적으로 우수한 환경에서 자라며 채엽 기준은 엄격하고 가공 기술은 타의 추종을 불허하여 잎 하나하나가 최고의 보물입니다." # 7249033734497276159
  building_type_uba_silk_01: "$innovation_sericulture$" # 13318389964632909058
  building_type_uba_silk_01_desc: "$innovation_sericulture_desc$" # 3447140300360955865
  building_uba_silk_01: "뽕나무 덤불" # 11662076198256472180
  building_uba_silk_01_desc: "농가들은 집 주변의 작은 뽕나무 덤불에 의지해 소규모로 누에를 칩니다. 생산된 비단은 대부분 자급자족하거나 간단한 수공예 공방에서 사용됩니다." # 5643877545408797847
  building_uba_silk_02: "뽕나무 숲" # 1906209701043817078
  building_uba_silk_02_desc: "뽕나무를 심기 위해 전용 토지를 개간합니다. 안정적인 뽕잎 공급은 양잠 규모 확장의 토대가 됩니다." # 13407477573812471271
  building_uba_silk_03: "뽕나무 농원" # 16424812509082109713
  building_uba_silk_03_desc: "뽕나무 농원의 규모가 방대하며 뽕나무를 집중적으로 관리하여 더 높은 품질의 뽕잎을 생산합니다. 그에 따라 누에 사육 규모도 확장됩니다." # 7147789404208036400
  building_uba_silk_04: "잠실" # 10316407099549254828
  building_uba_silk_04_desc: "합리적으로 설계된 잠실은 온도와 습도를 효과적으로 조절하여 누에의 건강한 성장을 보장합니다. 고치와 생사 생산량이 더욱 증가합니다." # 7562785974367698014
  building_uba_silk_05: "실 뽑는 기계" # 602746654208861346
  building_uba_silk_05_desc: "실 뽑기란 고치를 삶아 길고 가는 실을 뽑아내는 과정으로, 비단 생산의 핵심 단계입니다. 효율적인 실 뽑는 기계는 생사의 품질과 수량을 크게 향상합니다." # 2024381102355213568
  building_uba_silk_06: "물레" # 254674821358260042
  building_uba_silk_06_desc: "물레는 생사를 꼬아 더 튼튼한 실로 만듭니다. 수력 물레의 등장은 방적 효율을 비약적으로 높였습니다. 이곳에서 평범한 생사가 비단 직물로 가공됩니다." # 7429431604409457219
  building_uba_silk_07: "베틀" # 18350682609143663211
  building_uba_silk_07_desc: "평범한 명주실이 직물이나 다른 비단 섬유로 가공됩니다. 주는 평직을 사용하여 두껍고 부드러운 질감을 내며, 단은 능직 교차 방식을 사용하여 매끄러운 촉감을 냅니다." # 7310908680578368280
  building_uba_silk_08: "염색 공방" # 15737773514973402336
  building_uba_silk_08_desc: "이곳에서 비단에 염색, 날염, 자수와 같은 복잡한 공정을 거쳐 정교한 문양과 화려한 색상을 지닌 아름다운 비단과 공단이 생산됩니다." # 17922592772184582026
