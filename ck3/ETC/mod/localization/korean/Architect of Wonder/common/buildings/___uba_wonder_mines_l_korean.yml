  building_type_UBA_wonderful_mines_01: "신비로운 광산" # 12191485373117603359
  building_type_UBA_wonderful_mines_01_desc: "이 땅에 묻힌 경이로운 보물을 진정으로 헤아릴 수 있는 자가 누구인가? 우리가 찾는 부는 어쩌면 바로 우리 발밑에 숨겨져 있을지도 모른다." # 15833127513668276870
  building_UBA_wonderful_mines_01: "신비로운 광산" # 12191485373117603359
  building_UBA_wonderful_mines_01_desc: "최근 발견된 기묘한 광산이다. 이 매장지에 채굴 가치가 있는지 아직 판명되지 않았다." # 4009969136165451422
  building_UBA_wonderful_mines_02: "기적의 광산: 철" # 11181474116226963168
  building_UBA_wonderful_mines_02_desc: "철을 생산하는 광산이다. 초기 광산 주변으로 수십 개의 마을이 세워졌다. 이 채굴 구역은 초기에는 철광석의 소규모 생산에 집중하며, 간혹 주석, 납 및 기타 금속 광석이 발견되기도 한다." # 10851083468028943171
  building_UBA_wonderful_mines_03: "기적의 광산: 구리" # 14985770939414539955
  building_UBA_wonderful_mines_03_desc: "다양한 금속을 생산하는 광산이다. 철, 주석, 납 및 기타 금속 외에도 광부들이 쉽게 접근할 수 있는 구리 광맥을 발견했으며, 곧 막대한 양의 구리 광석을 산출할 것이다." # 9912787771613019810
  building_UBA_wonderful_mines_04: "기적의 광산: 은" # 13698127786646027673
  building_UBA_wonderful_mines_04_desc: "정착민이 늘어남에 따라 사람들은 이 광산에 대해 더 깊이 이해하게 되었다. 이곳에는 상상할 수 있는 거의 모든 금속이 층을 이루어 명확히 구분되어 있으며 매장량도 엄청나다. 게다가 귀중한 은까지 이곳에서 발견되었다!" # 2742025485071199066
  building_UBA_wonderful_mines_05: "기적의 광산: 금" # 5862081598956073356
  building_UBA_wonderful_mines_05_desc: "여러 요인이 이곳이 다양하고 질 좋은 광석이 풍부한 기적의 금속 매장지임을 가리키고 있다. 금 발견 소식에 숙련된 기술자들이 대거 몰려들었고, 진정으로 중요한 채굴 현장을 건설하는 것이 가능해졌다." # 10082208605737391885
  building_UBA_wonderful_mines_06: "기적의 광산: 보석" # 9527858797769453474
  building_UBA_wonderful_mines_06_desc: "채굴 규모가 커짐에 따라 더 많은 광산 입구가 개방되고, 더 깊은 매장지에 도달하기 위해 거대한 수직 갱도가 굴착되고 있다. 노동자들이 대형 보석을 자주 발견함에 따라, 보석 추출량을 늘리기 위해 더 많은 기술자가 투입되고 있다." # 10416968923829021597
  building_UBA_wonderful_mines_07: "기적의 채굴 복합단지" # 18070553068225789959
  building_UBA_wonderful_mines_07_desc: "채굴량과 광물 자원의 종류가 지속적으로 증가함에 따라 정착지 근처에 다수의 제련소와 주조소가 설립되었고, 총 노동자 수는 수만 명에 육박하게 되었다. 또한 보석 채굴이 산업적 규모에 도달하여 전 세계의 장인과 상인들을 끌어모으고 있으며, 이는 상상할 수 없는 부를 가져다줄 것이다." # 14297150491679680316
  building_UBA_wonderful_mines_08: "채굴의 수도" # 5560516119306965918
  building_UBA_wonderful_mines_08_desc: "광산에서 끝없는 부가 계속해서 쏟아져 나오면서, 한때 무명이었던 이 마을은 이제 널리 이름을 떨치게 되었다. 시인들의 말처럼, 이곳의 이름은 이제 부와 동의어가 되었다." # 10216635478116002273
