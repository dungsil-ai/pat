  uba_building_decision_1: "#EMP 불가사의:#! 부지 계획" # 14194863903181087520
  uba_building_decision_1_tooltip: "독특하고 특별한 건물을 지을 장소를 지정하십시오." # 4559461033757635845
  uba_building_decision_1_effect: "이 거대한 건설 프로젝트에 적합한 장소를 선택하십시오" # 10439769392358708243
  uba_building_decision_1_desc: "인생은 눈 깜빡할 사이에 지나간다.\n내가 세상을 떠난 후, 과연 얼마나 많은 사람이 내 이름을 기억해 줄까? 모두가 나를 기억하게 하려면, 이 세상에 더 깊은 인상을 남겨야 한다. #EMP 위대한 건축물#!과 같은 흔적을 말이다." # 18085353154112628570
  uba_building_decision_1_confirm: "준비하라" # 13378240304061186436
  uba_building_decision_2: "#EMP 불가사의:#! 불가사의 선택" # 17021201895786868909
  uba_building_decision_2_tooltip: "지정된 장소에 독특하고 특별한 건물을 건설하십시오" # 7816340005887194467
  uba_building_decision_2_effect: "다음에 건설할 특별한 건물을 결정하십시오" # 4220033930264364352
  uba_building_decision_2_desc: "이제 가장 중요한 질문을 고민해야 한다:\n나는 어떻게 기억되고 싶은가?\n\n이 건물은 #bold [ROOT.Var('uba_building_location ').Province.GetName]#!을 근본적으로 변화시킬 것이다. 신중하게 결정해야 한다." # 5732634936659526375
  uba_building_decision_2_confirm: "작업을 시작하라!" # 8823625015854667009
  uba_building_decision_3: "[AoWs]부지 선택 취소" # 10229964541493448325
  uba_building_decision_3_tooltip: "특별한 건물을 위해 이전에 선택했던 장소를 취소합니다" # 9895043538017702894
  uba_building_decision_3_effect: "이전에 선택한 특수 건물 건설 위치를 취소합니다" # 9910690854048773895
  uba_building_decision_3_desc: "갑자기 깨달았습니다:\n#bold [ROOT.Var('uba_building_location').Province.GetName]#! 제가 구상한 계획에 적합한 장소가 아닐지도 모릅니다. 이전 결정을 철회하겠습니다. 아직 너무 늦은 것은 아니길 바랍니다." # 9898016148066580693
  uba_building_decision_3_confirm: "선택 취소" # 15134739211197610193
