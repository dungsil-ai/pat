  uba_building_decision: "불가사의 건설" # 13445680059978733801
  uba_building_decision_tooltip: "지정한 위치에 고유한 특수 건물 추가" # 8155723917153310493
  uba_building_decision_desc: "삶은 덧없는 순간일 뿐.\n내가 이 세상을 떠난 뒤, 얼마나 많은 이들이 내 이름을 기억할까? 사람들이 나를 기억하게 하려면, 나는 이 세상에 더 깊은 흔적을 남겨야 한다. 예를 들면...\n\n웅장한 불가사의 같은 것으로." # 14240877005735508120
  uba_building_decision_confirm: "계획 수립" # 6365107132088474215
  uba_remove_building_decision: "불가사의 건물을 위한 부지 정리" # 14477875993099805659
  uba_remove_building_decision_tooltip: "지정한 위치에서 특수 건물 제거" # 14972632210633377875
  uba_remove_building_decision_effect: "미래의 건설을 위한 공간을 마련하고자 지정된 위치에서 특수 건물을 제거한다." # 16150063009250827374
  uba_remove_building_decision_desc: "고유 건물을 보유하는 것이 항상 유리한 것은 아니다. 특히 더 위대한 건축물을 위한 공간을 만들고 싶을 때는 더욱 그렇다.\n\n- 아마 건축가들에게 돈을 주고 이 성가신 구조물을 철거하게 할 수 있을지도..." # 17213151867061003368
  uba_remove_building_decision_confirm: "공간 확보" # 1386030035897028876
  uba_nomadic_building_decision: "유목 불가사의 업그레이드" # 11618986124079069446
  uba_nomadic_building_decision_tooltip: "나의 유목 특수 건물 업그레이드" # 223211681162366548
  uba_nomadic_building_decision_effect: "해당 위치의 유목 특수 건물 업그레이드" # 8418588023645037652
  uba_nomadic_building_decision_desc: "이 땅은 #EMP 위대한#! [ROOT.Char.GetTitleAsNameNoTooltip]인 나의 것이다! 내 백성들은 나의 업적을 영원히 기억할 것이다... #EMP 그리고 나의 건축물들도. #!" # 16989049321203348180
  uba_nomadic_building_decision_confirm: "실행" # 13102732757968995949
  uba_decision_off: "건축가 결정 숨기기" # 4888312222767149807
  uba_decision_off_tooltip: "건축가 컬렉션 모드의 결정 숨기기" # 8377309093542311495
  uba_decision_off_effect: "건축가 컬렉션 모드의 결정이 숨겨지며, 다른 결정을 통해 다시 활성화할 수 있다." # 1047512095492514518
  uba_decision_off_desc: "영원한 건축물을 짓는다는 것이 비현실적이고 어리석은 생각임을 문득 깨달았다. 차라리 이 쓸모없는 건축가와 장인들을 해고하고, 절약한 돈을 더 가치 있는 곳에 쓰는 편이 낫겠다." # 7265353555952021127
  uba_decision_off_confirm: "건축가 해고" # 8525301287863245147
  uba_decision_on: "건축가 결정 보기" # 15876433093086715531
  uba_decision_on_tooltip: "건축가 컬렉션 모드의 결정 보기" # 16834225514950764344
  uba_decision_on_effect: "건축가 컬렉션 모드의 결정이 복구되며, 다른 결정을 통해 다시 숨길 수 있습니다." # 12129292919658986571
  uba_decision_on_desc: "영원히 남을 경이로운 건축물을 짓겠다는 생각이 머릿속을 떠나지 않는군!\n아마 그 건축가들을 다시 불러야 할 것 같네. 이제 그들에게 실현해달라고 할 더 좋은 아이디어가 떠올랐거든..." # 10065393975005683040
  uba_decision_on_confirm: "건축가를 부르라!" # 16569866304542917474
