l_english:
# 游牧建筑升级
uba_nomadic_decisions.0001.t:0 "Architectural Plans: On the Steppes"
uba_nomadic_decisions.0001.desc:0 "This building on the steppes is already a little too small and outdated... it cannot live up to my expectations!\n\nNo one can deny my divine right to rule this land, and this building will mark it forever.\n\nI must immediately summon any craftsmen I can find to continue this grand plan!"
uba_nomadic_decisions.0001.a:0 "Start now!"

uba_remove_decisions.0001.t:0 "Building Wonders: Clearing Site"
uba_remove_decisions.0001.desc:0 "The craftsmen are ready and ready to begin work on the demolition of this once famous building.\n\nAh... just think, an even greater building is about to take its place. Completed, showing my power and glory!"
uba_remove_decisions.0001.a:0 "Maybe I'll miss it."
uba_remove_decisions.0001.a.flavor:0 "The special building here will be demolished.\n\nIf you regret it, you can still spend more money to rebuild the building."

uba_decisions.0001.t: "Building Wonders: Choosing a Site"
uba_decisions.0001.desc: "Standing on the heights of [uba_building_locale.GetName], I can clearly see the surrounding scenery.\n\nWhile looking around, I suddenly realized that there was a nice open space in the distance: The terrain there is flat, easy for construction, and the transportation is relatively convenient. It seems to be a suitable location. "
uba_decisions.0001.a: "Then it's decided."
uba_decisions.0001.a_tt: "You have selected [uba_building_locale.GetNameNoTooltip] as the location for future construction projects"
uba_decisions.0001.cancel: "Probably not a good idea."
uba_decisions.0001.cancel_tt: "You silently gave up the idea of building in [uba_building_locale.GetNameNoTooltip]"

uba_decisions.0999.t: "Wonder of the world: [uba_building_province.GetNameNoTooltip]"
uba_decisions.0999.desc: "After decades and centuries, my dream has finally become a reality:\n\nThe great spectacle of [uba_building_province.GetName] has now become an important symbol of it, attracting people Countless tourists and scholars come here, and no one wants to know who created such a great miracle! \n\nNowadays, everyone will remember the name of [ROOT.Char.GetDynasty.GetName]."
uba_decisions.0999.a: "It's done."
uba_decisions.0999.a.flavor: "$trait_architect_desc$"

uba_decisions.0998.t: "$building_UBA_secret_05$：[uba_building_province.GetNameNoTooltip]"
uba_decisions.0998.desc: "After decades and centuries, my dream has finally become a reality:\n\n[uba_building_province.GetName]'s secret palace is now complete... and it will become mine. The secret hiding place is also the center of my stir-up. \n\nNowadays, everyone will fear the name of [ROOT.Char.GetDynasty.GetName]."

# 1000 工程
uba_decisions.1000.t:0 "Architectural Plan: $uba_building_decision_wall$"
uba_decisions.1000.desc:0 "My life will one day reach its end, but this building made by me will witness the changes behind me. The next question is:\n\nWhat makes me worthy of being remembered by the world?"
uba_decisions.1000.achievement:0 "My merits are sufficient to answer."
uba_decisions.1000.achievement.flavor:0 "You consider constructing a building. to reflect your achievements."
uba_decisions.1000.wall:0 "My walls will protect my people for generations to come."
uba_decisions.1000.wall.flavor:0 "You are considering building a $building_type_UBA_wall_01$."
uba_decisions.1000.test:0 "...just testing."
uba_decisions.1000.test.flavor:0 "You have decided to build a test building here"
uba_decisions.1000.back:0 "...Maybe this is not a good idea."
uba_decisions.1000.back.flavor:0 "So you silently gave up on this idea"
uba_decisions.1000.cancel:0 "...Maybe I should choose a different place."
uba_decisions.1000.cancel.flavor:0 "So you silently gave up the idea of building."
# 1001 成就建筑
 uba_decisions.1001.t:0 "Architectural Plan: Remembered by history"
 uba_decisions.1001.desc:0 "It's not that I #EMP DESIRE#! to be remembered by history, but rather that history #EMP should#! remember me!\n\nMy achievements #EMP have#! surpassed countless insignificant individuals;\nI #EMP have#! left a significant mark on this world;\nAnd I #EMP will#! make sure this world forever remembers my name:"
 uba_decisions.1001.a:0 ""I am the Supreme King of the North Sea, Lord of Mann and the Isles.""
 uba_decisions.1001.tt:0 "You can start a [great_project|E] of $great_project_type_uba_construct_valhalla$ ."
 uba_decisions.1001.a.flavor:0 "The King who unifies the Northern Realm, the Lord who conquers the North Sea, the one who forges the Supreme King's throne."
 uba_decisions.1001.b:0 "I am the Lord of Outremer, the Commander of the Crusades"
 uba_decisions.1001.b.flavor:0 ""I planted the holy cross of Our Lord from sea to sea.""
 uba_decisions.1001.b.tt:0 "You can start a [great_project|E] of $great_project_type_uba_construct_headquarter$ ."
 uba_decisions.1010.t:0 "The City of Blood and Gold"
 uba_decisions.1010.desc.pagan:0 "Over the years, I have plundered countless wealth from the Seven Seas, piling them within the high walls. Now, I require a more magnificent city to accommodate these treasures.\n\nThis city should resemble Valhalla on Earth, where I shall summon all Viking warriors to fight for me—for all the #EMP wealth#! and #EMP glory#! within the Seven Seas. It is the will of Odin.\n\nThis city will seize and gather all the treasures of the world;\nThis city will be renowned throughout the world in the songs of bards;\nThis city will be remembered for eternity with the name of [ROOT.Char.GetHouse.GetBaseNameNoTooltip][ROOT.Char.GetTitleAsNameNoTooltip]!"
 uba_decisions.1010.desc.else:0 "Over the years, I have plundered countless wealth from the Seven Seas, piling them within the high walls. Now, I require a more magnificent city to accommodate these treasures.\n\nThis city will forever stand on the shores of the North Sea, attracting numerous heroes to fight for me—for #EMP wealth#! and #EMP glory#!\n\nThis city will seize and gather all the treasures of the world;\nThis city will be renowned throughout the world in the songs of bards;\nThis city will be remembered for eternity with the name of [ROOT.Char.GetHouse.GetBaseNameNoTooltip][ROOT.Char.GetTitleAsNameNoTooltip]!"
 uba_decisions.1010.a:0 "The name of the Lord of the North Sea shall endure forever."
 uba_decisions.1010.a.flavor:0 "Your name shall be praised by all, and your deeds shall last for eternity."
 uba_decisions.1011.t:0 "The City of the Crusades"
 uba_decisions.1011.desc:0 "Finally, a genuinely holy land! The golden cross shines from Ascalon to Omar and the infidels have been truly cast out of the Holy Land.\n\nThis city shall stand forever in Outremer, attracting countless warriors to fight for it—to fight for #EMP Faith#! and #EMP Glory#!.\n\nThis city shall endure forever alongside the name of [ROOT.Char.GetFaith.HighGodName]!"
 uba_decisions.1011.a:0 "In the name of God!"
 uba_decisions.1011.a.flavor:0 "Non nobis Domine, non nobis, sed nomini tuo da gloriam."
# 1100 城墙
uba_decisions.1100.t:0 "Architectural Plan: $building_type_UBA_wall_01$"
uba_decisions.1100.desc:0 "I will build a strong wall that will protect my people for eternity.\n\nAs an eternal guardian and an immortal monument, it will use its His body has withstood countless winds, rains and wars, protecting generations of people. "
uba_decisions.1100.a:0 "That's it."
uba_decisions.1100.a_tt:0 "You can start a [great_project|E] of $great_project_type_uba_construct_wall$."
uba_decisions.1100.back:0 "$uba_decisions.1000.back$"
uba_decisions.1100.back.flavor:0 "$uba_decisions.1000.back.flavor$"
# 1999 测试
uba_decisions.1999.t:0 "Architectural Plan: Test"
uba_decisions.1999.desc:0 "Construct a test building at the target location"
uba_decisions.1999.a:0 "That's it."
uba_decisions.1999.a_tt:0 "Construct a test building at the target location"

# 2000 外交
uba_decisions.2000.t:0 "Architectural Plan: $uba_building_decision_diplomacy$"
  uba_decisions.2000.desc:0 "My life will one day reach its end, but this building of my own will bear witness to the changes in my wake.\n\nNo one can deny my divine right to rule this land, and this building will make it an eternal mark..."
  uba_decisions.2000.colosseum:0 "...better than the theater of the world."
  uba_decisions.2000.colosseum.flavor:0 "You are considering building a $building_type_UBA_colosseum_01$."
  uba_decisions.2000.palace:0 "...a magnificent palace."
  uba_decisions.2000.palace.flavor:0 "You are considering building a $building_type_UBA_palace_01$."
  uba_decisions.2000.reserve:0 "...the forest garden is mine alone."
  uba_decisions.2000.reserve.flavor:0 "You are considering building a $building_type_UBA_reserve_01$."
  uba_decisions.2100.t:0 "Architectural Plan: $building_type_UBA_colosseum_01$"
  uba_decisions.2100.desc:0 "I will build a theater unparalleled in the world, turning marble into wonderful miracles.\n\nThe art of drama and music attracts thousands of eyes with its extraordinary charm, and This theater supports countless laughter and dreams on the stage. "
  uba_decisions.2100.a:0 "$uba_decisions.1100.a$"
  uba_decisions.2100.a_tt:0 "A magnificent construction project is about to begin, and I needed to choose a suitable location."
  uba_decisions.2200.t:0 "Architectural Plan: $building_type_UBA_palace_01$"
  uba_decisions.2200.desc:0 "I will build a magnificent palace to show the world the greatness of my rule.\n\nThe high walls of the palace will witness the rise and fall of hundreds of thousands of years, while the magnificent dome will Like my glory and dreams, they will always stand in the wind and clouds of history."
  uba_decisions.2200.a:0 "$uba_decisions.1100.a$"
  uba_decisions.2200.a_tt:0 "$uba_decisions.2100.a_tt$"
  uba_decisions.2300.t:0 "Architectural Plan: $building_type_UBA_reserve_01$"
  uba_decisions.2300.desc:0 "I will build a forest garden that is unparalleled in the world, and the whole world will be amazed by its beauty.\n\nThe mountains, rivers, trees and palaces and pavilions complement each other, creating a luxurious garden that is rare in the world."
  uba_decisions.2300.a:0 "$uba_decisions.1100.a$"
  uba_decisions.2300.a_tt:0 "$uba_decisions.2100.a_tt$"
# 3000 军事
uba_decisions.3000.t:0 "Architectural Plan: $uba_building_decision_martial$"
  uba_decisions.3000.desc:0 "$uba_decisions.2000.desc$"
  uba_decisions.3000.castle:0 "...an impregnable fortress."
  uba_decisions.3000.castle.flavor:0 "You are considering building a $building_type_UBA_castle_01$."
  uba_decisions.3000.tower:0 "...a majestic and tall tower."
  uba_decisions.3000.tower.flavor:0 "You are considering building a $building_type_UBA_tower_01$."
  uba_decisions.3000.knight:0 "...the military academy of supreme glory"
  uba_decisions.3000.knight.flavor:0 "You are considering building a $building_type_UBA_knight_01$."
  uba_decisions.3100.t:0 "Architectural Plan: $building_type_UBA_castle_01$"
  uba_decisions.3100.desc:0 "I will build an impregnable fortress to show the world my strength and determination.\n\nThis fortress will protect the glory of generations of lords and the tranquility of the people, witnessing countless knights and "The general's achievements."
  uba_decisions.3100.a:0 "$uba_decisions.1100.a$"
  uba_decisions.3100.a_tt:0 "$uba_decisions.2100.a_tt$"
  uba_decisions.3200.t:0 "Architectural Plan: $building_type_UBA_tower_01$"
  uba_decisions.3200.desc:0 "I will build a tower soaring into the sky to ensure that the territory is under my control.\n\nA formidable tower will not only protect against potential intruders, but also provide Pedestrians guide the way."
  uba_decisions.3200.a:0 "$uba_decisions.1100.a$"
  uba_decisions.3200.a_tt:0 "$uba_decisions.2100.a_tt$"
  uba_decisions.3300.t:0 "Architectural Plan: $building_type_UBA_knight_01$"
  uba_decisions.3300.desc:0 "I will build a military academy of supreme glory to cultivate more brave warriors for my army.\n\nCountless knights and officers will go to the battlefield from here, and its reputation will make my The enemy is afraid."
  uba_decisions.3300.a:0 "$uba_decisions.1100.a$"
  uba_decisions.3300.a_tt:0 "$uba_decisions.2100.a_tt$"
# 4000 管理
uba_decisions.4000.t:0 "Architectural Plan: $uba_building_decision_stewardship$"
  uba_decisions.4000.desc:0 "$uba_decisions.2000.desc$"
  uba_decisions.4000.governor:0 "...a court that determines right from wrong."
  uba_decisions.4000.governor.flavor:0 "You are considering building a $building_type_UBA_governor_01$."
  uba_decisions.4000.workshop:0 "...A workshop of exceptional craftsmanship."
  uba_decisions.4000.workshop.flavor:0 "You are considering building a $building_type_UBA_workshop_01$."
  uba_decisions.4000.parliament:0 "...the parliament that discusses the country together"
  uba_decisions.4000.parliament.flavor:0 "You are considering building a $building_type_UBA_parliament_01$."
  uba_decisions.4100.t:0 "Architectural Plan: $building_type_UBA_governor_01$"
  uba_decisions.4100.desc:0 "I will establish a court of justice to ensure fairness and justice under my rule.\n\nJudgement is to bring justice to this vast territory and its people. Everyone. This system will last until the end of the world."
  uba_decisions.4100.a:0 "$uba_decisions.1100.a$"
  uba_decisions.4100.a_tt:0 "$uba_decisions.2100.a_tt$"
  uba_decisions.4200.t:0 "Architectural Plan: $building_type_UBA_workshop_01$"
  uba_decisions.4200.desc:0 "I will build a workshop where craftsmen gather. Craftsmen with outstanding skills are the proof of the prosperity of the territory.\n\nExquisite equipment and tools will become the business card of this place, making the city of crafts His reputation spread far and wide."
  uba_decisions.4200.a:0 "$uba_decisions.1100.a$"
  uba_decisions.4200.a_tt:0 "$uba_decisions.2100.a_tt$"
  uba_decisions.4300.t:0 "Architectural Plan: $building_type_UBA_parliament_01$"
  uba_decisions.4300.desc:0 "I will establish an inclusive parliament, allowing my subjects and vassals to discuss the affairs of the country.\n\nRepresentatives of the nobility, clergy, and citizens will gather together to discuss all aspects of the country. . And the new system established on this basis will make my country look so different in the next thousands of years."
  uba_decisions.4300.a:0 "$uba_decisions.1100.a$"
  uba_decisions.4300.a_tt:0 "$uba_decisions.2100.a_tt$"
# 5000 谋略
uba_decisions.5000.t:0 "Architectural Plan: $uba_building_decision_intrigue$"
  uba_decisions.5000.desc:0 "$uba_decisions.2000.desc$"
  uba_decisions.5000.secret:0 "...an unknown hideout"
  uba_decisions.5000.secret.flavor:0 "You are considering building a $building_type_UBA_secret_01$."
  uba_decisions.5100.t:0 "Architectural Plan: $building_type_UBA_secret_01$"
  uba_decisions.5100.desc:0 "I will build a hidden and unknowable palace, from which I will build my empire in the shadows...\n\nI will make sure that no outsider knows the secret. Even the craftsmen and servants who participated in the construction of the palace cannot leave alive. "
  uba_decisions.5100.a:0 "$uba_decisions.1100.a$"
  uba_decisions.5100.a_tt:0 "$uba_decisions.2100.a_tt$"
# 6000 学识
uba_decisions.6000.t:0 "Architectural Plan: $uba_building_decision_learning$"
  uba_decisions.6000.desc:0 "$uba_decisions.2000.desc$"
  uba_decisions.6000.hospital:0 "...a hospital that saves lives and heals the wounded."
  uba_decisions.6000.hospital.flavor:0 "You are considering building a $building_type_UBA_hospital_01$."
  uba_decisions.6000.university:0 "...a university for teaching and learning."
  uba_decisions.6000.university.flavor:0 "You are considering building a $building_type_UBA_university_01$."
  uba_decisions.6000.church:0 "...a magnificent and solemn temple"
  uba_decisions.6000.church.flavor:0 "You are considering building a $building_type_UBA_church_01$."
  uba_decisions.6100.t:0 "Architectural Plan: $building_type_UBA_hospital_01$"
  uba_decisions.6100.desc:0 "I will build a life-saving hospital to ensure that the plague cannot harm my rule and my subjects.\n\nHoly and pious people will care for the sick and disabled here, and let the suffering There is hope for those who suffer."
  uba_decisions.6100.a:0 "$uba_decisions.1100.a$"
  uba_decisions.6100.a_tt:0 "$uba_decisions.2100.a_tt$"
  uba_decisions.6200.t:0 "Architectural Plan: $building_type_UBA_university_01$"
  uba_decisions.6200.desc:0 "I will build a university where scholars gather, where knowledge from all over the world can be gathered.\n\nIt will be a palace of knowledge and a cradle of culture. A place where inspirations will collide, causing dazzling sparks."
  uba_decisions.6200.a:0 "$uba_decisions.1100.a$"
  uba_decisions.6200.a_tt:0 "$uba_decisions.2100.a_tt$"
  uba_decisions.6300.t:0 "Architectural Plan: $building_type_UBA_church_01$"
  uba_decisions.6300.desc:0 "I will build a magnificent temple, and I will dedicate this great building to God.\n\nA magnificent temple will attract believers from all over to come and pay homage, where they will pray for God’s protection and feel God’s gaze."
  uba_decisions.6300.a:0 "$uba_decisions.1100.a$"
  uba_decisions.6300.a_tt:0 "$uba_decisions.2100.a_tt$"
# 7000 旅行
  uba_decisions.7000.t:0 "Architectural Plan: $uba_building_decision_travel$"
  uba_decisions.7000.desc:0 "$uba_decisions.2000.desc$"
  uba_decisions.7000.market:0 "...a market where merchants gather."
  uba_decisions.7000.market.flavor:0 "You are considering building a $building_type_UBA_market_01$."
  uba_decisions.7000.port:0 "...a port crowded with boats."
  uba_decisions.7000.port.flavor:0 "You are considering building a $building_type_UBA_port_01$."
  uba_decisions.7000.holyland:0 "...a holy land of diverse faiths."
  uba_decisions.7000.holyland.flavor:0 "You are considering building a $building_type_UBA_holyland_01$."
  uba_decisions.7000.basins:0 "...a reservoir, a basin."
  uba_decisions.7000.basins.flavor:0 "You are considering building a $building_type_UBA_basins_01$."
  uba_decisions.7100.t:0 "Architectural Plan: Trading Post"
  uba_decisions.7100.desc.market:0 "I will build a market where merchants gather and collect rare treasures from all over the world.\n\nGoods from all over the world, currencies that few people have seen, and everything in the world Wealth will gather here."
  uba_decisions.7100.market:0 "$uba_decisions.1100.a$"
  uba_decisions.7100.market_tt:0 "$uba_decisions.2100.a_tt$"
  uba_decisions.7100.desc.port:0 "I will build a port full of ships, a jewel on the trade routes.\n\nThis port is integrated into the city, with a constant flow of ships. It carries countless Dreams have witnessed countless lives. "
  uba_decisions.7100.port:0 "$uba_decisions.1100.a$"
  uba_decisions.7100.port_tt:0 "$uba_decisions.2100.a_tt$"
  uba_decisions.7200.t:0 "Architectural Plan: $building_type_UBA_holyland_01$"
  uba_decisions.7200.desc:0 "I will practice a path that the world has never imagined. Believers from all over the world can gather here...\n\n...but they will not fight each other, but respect each other. Faith. They will pray for blessings, eliminate pain, and spread the seeds of peace in the world. \n\nThis may be difficult, but we can try."
  uba_decisions.7200.a:0 "$uba_decisions.1100.a$"
  uba_decisions.7200.a_tt:0 "$uba_decisions.2100.a_tt$"
  uba_decisions.7300.t:0 "Architectural Plan: $building_type_UBA_basins_01$"
  uba_decisions.7300.desc:0 "I will build a reservoir that will benefit for generations, reducing the threat of flooding while safeguarding water for nearby areas.\n\nA well-developed system of reservoirs and waterways can precisely control the flow of water and maximize the use of water resources to make my territory more prosperous."
  uba_decisions.7300.a:0 "$uba_decisions.1100.a$"
  uba_decisions.7300.a_tt:0 "$uba_decisions.2100.a_tt$"
# 8000 生活
uba_decisions.8000.t:0 "Architectural Plan: $uba_building_decision_lifestyle$"
  uba_decisions.8000.desc:0 "$uba_decisions.2000.desc$"
  uba_decisions.8000.academy:0 "...a vast library of books."
  uba_decisions.8000.academy.flavor:0 "You are considering building a $building_type_UBA_academy_01$."
  uba_decisions.8000.garden:0 "...a living garden"
  uba_decisions.8000.garden.flavor:0 "You are considering building a $building_type_UBA_garden_01$."
  uba_decisions.8000.hunting:0 "...a wild hunting ground."
  uba_decisions.8000.hunting.flavor:0 "You are considering building a $building_type_UBA_hunting_01$."
  uba_decisions.8100.t:0 "Architectural Plan: $building_type_UBA_academy_01$"
  uba_decisions.8100.desc:0 "I will build a vast library to ensure the inheritance of knowledge.\n\nIt will be a palace of knowledge and a cradle of culture. She has countless books, surpassing the Library of Alexandria; she The knowledge is greater than the Palace of Wisdom in Baghdad."
  uba_decisions.8100.a:0 "$uba_decisions.1100.a$"
  uba_decisions.8100.a_tt:0 "$uba_decisions.2100.a_tt$"
  uba_decisions.8200.t:0 "Architectural Plan: $building_type_UBA_garden_01$"
  uba_decisions.8200.desc:0 "I will build a stunning garden that will represent the landscape of an artist's dream.\n\nThis miraculous garden will collect exotic flowers and plants from all over the world, even if the seasons change. To detract from its beauty, even the ancient wonders of Babylon and Persia pale in comparison."
  uba_decisions.8200.a:0 "$uba_decisions.1100.a$"
  uba_decisions.8200.a_tt:0 "$uba_decisions.2100.a_tt$"
  uba_decisions.8300.t:0 "Architectural Plan: $building_type_UBA_hunting_01$"
  uba_decisions.8300.desc:0 "I will build a wild hunting ground and enclose all the undeveloped land nearby.\n\nHunting facilities will be set up on the edge of the hunting ground, even including a luxurious Villa, which makes hunting a luxury experience."
  uba_decisions.8300.a:0 "$uba_decisions.1100.a$"
  uba_decisions.8300.a_tt:0 "$uba_decisions.2100.a_tt$"
# 9000 游牧
 uba_decisions.9000.t:0 "Architectural Plan: $uba_building_decision_lifestyle$"
 uba_decisions.9000.desc:0 "$uba_decisions.2000.desc$"
 uba_decisions.9000.yurt:0 "...a royal court worthy of khan."
 uba_decisions.9000.yurt.flavor:0 "You are considering building a $building_type_UBA_yurt_01$."
 uba_decisions.9000.pasture:0 "...a abundant pasture."
 uba_decisions.9000.pasture.flavor:0 "You are considering building a $building_type_UBA_pasture_01$."
 uba_decisions.9000.hunting:0 "$uba_decisions.8000.hunting$"
 uba_decisions.9000.hunting.flavor:0 "$uba_decisions.8000.hunting.flavor$"
 uba_decisions.9100.t:0 "Architectural Plan: $building_type_UBA_yurt_01$"
 uba_decisions.9100.desc:0 "I will establish a royal court worthy of khan and become the undisputed center of power on the steppe. \n\nMy orders will come out from there, so that every tribe on the steppe, whether they are my slaves or my enemies, will prostrate themselves at my feet."
 uba_decisions.9100.a:0 "$uba_decisions.1100.a$"
 uba_decisions.9100.a_tt:0 "$uba_decisions.2100.a_tt$"
 uba_decisions.9200.t:0 "Architectural Plan: $building_type_UBA_pasture_01$"
 uba_decisions.9200.desc:0 "I will demarcate a abundant pasture where our livestock - goats, sheep, horses, camels and cattle - can run free in the grasslands. \n\nWith better grazing practices and better management, I will have larger herds..."
 uba_decisions.9200.a:0 "$uba_decisions.1100.a$"
 uba_decisions.9200.a_tt:0 "$uba_decisions.2100.a_tt$"

# Vassalyn's gift
uba_vassalyn.1000.t:0 "A Deal: do or not?"
uba_vassalyn.1000.desc:0 "My cabinet is moving!\n\nI can seem to hear my heart beating violently. What is that? An assassin.\n\nJust when I was about to shout for help, something inside the cabinet A strange and extremely weird voice came:\n\n"Dear [ROOT.GetCharacter.GetFirstNameNoTooltip], you want #EMP [gold|E]#!, right?" I can give you anything you want, and all you have to do is give me that bag of gold coins on the table with a little bit of your soul..."\n\nDamn it, is that the devil in the closet? I really should be with an unknown person. The guy with the bottom of his head makes a deal?"
uba_vassalyn.1000.a:0 "I'll give you whatever you want!"
uba_vassalyn.1000.a.flavor:0 ""Just leave the bag there, as for the souls, I'll come and take them afterwards." The voice replied."
uba_vassalyn.1000.back:0 "I will not make a deal with the devil, go back!"
uba_vassalyn.1000.back.flavor:0 "The voice disappeared immediately. The guards who arrived checked the cabinet for you, but found nothing."
uba_vassalyn.1000.cancel:0 "This must be an illusion!"
uba_vassalyn.1000.cancel.flavor:0 "You ignored the strange noise, but it was obviously a bad omen."

uba_vassalyn.1001.t:0 "A Deal: The Voice in the Cabinet"
uba_vassalyn.1001.desc:0 ""Deal," the voice said, "Don't think about going back on it, what I can give you will definitely exceed the value of this bag of gold coins. "\n\n"For example, an inexhaustible mine. "\n\nA mine? What a stupid idea. If it really existed, it would have been discovered long ago.\n\n"Believe it or not. But you have to make a choice, what do you want? Gemstones, or Metals? - and by the way, I charge a small handling fee... Don't worry, it's just a little bit of soul, really just a little bit! ""
 uba_vassalyn.1001.again:0 ""Not bad, isn't it?" \n\n"What do you want? Gemstones, or Metals? - and by the way, I charge a small handling fee... Don't worry, it's just a little bit of soul, really just a little bit! ""
uba_vassalyn.1001.a:0 "#EMP Gemstone#! A vein is worth far more than a bag of gold coins."
uba_vassalyn.1001.a.flavor:0 ""Good choice. "That voice seemed to know what I was thinking."
uba_vassalyn.1001.b:0 "If I could own an #EMP Metal#! mine..."
uba_vassalyn.1001.b.flavor:0 ""Like, gold? Hahaha——"That voice laughed a little scary"
uba_vassalyn.1001.c:0 "I want them all!"
uba_vassalyn.1001.c.flavor:0 ""It's not a good idea to show off your cleverness in front of me. ""
uba_vassalyn.1001.back:0 "No, I won't make a deal with the devil! Guard!"
uba_vassalyn.1001.back.flavor:0 "The voice sighed and then disappeared. The guard who came over checked the cabinet for you, but found nothing."
uba_vassalyn.1001.cancel:0 "No, this must be an illusion..."
uba_vassalyn.1001.cancel.flavor:0 "$uba_vassalyn.1000.cancel.flavor$"

 uba_vassalyn.1100.t:0 "A Deal: Gemstones?"
 uba_vassalyn.1100.desc:0 "Yes, if I could have an endless supply of gemstones, I could do many things with them. Like winning the hearts of people in my domain, rewarding my knights and attendants, or even decorating my castle from top to bottom with gemstones...\n\nJust as I'm about to speak, a clumsy attendant opens the door abruptly, interrupting me. Before I can reprimand him, he starts speaking:\n\n"Sir, we have just discovered..."\n\nAt this moment, you have no interest in hearing what your attendant is saying because the voice is speaking to you:"
 uba_vassalyn.1100.a:0 "#EMP Gemstones#!! It must be your favorite!"
 uba_vassalyn.1100.a.flavor:0 "Later, you receive the same response from the attendant, while the bag of coins on the table has vanished without a trace.\n\nClearly, the devil has taken your offer. But the chance to exchange a bag of coins and a little bit of soul for endless gemstones, such a good deal, is unlikely to happen #color_gray again#!."
 uba_vassalyn.1100.b:0 "I know you would like #EMPDiamonds#!!"
 uba_vassalyn.1100.b.flavor:0 "Later, you receive the same response from the attendant, while the bag of coins on the table has vanished without a trace.\n\nClearly, the devil has taken your offer. But the chance to exchange a bag of coins and a little bit of soul for endless diamonds, such a good deal, is unlikely to happen #color_gray again#!."
 uba_vassalyn.1100.c:0 ""Perhaps you'd prefer #EMP Jade#!?""
 uba_vassalyn.1100.c.flavor:0 "$uba_vassalyn.1200.a.flavor$"
 uba_vassalyn.1100.d:0 ""How about... #EMP salt#!?""
 uba_vassalyn.1100.d.flavor:0 "$uba_vassalyn.1200.a.flavor$"
 uba_vassalyn.1100.z:0 ""Hey, wake up!""
 uba_vassalyn.1100.z.flavor:0 "The voice pulls you back from your hallucination."

 uba_vassalyn.1200.t:0 "A Deal: Metals?"
 uba_vassalyn.1200.desc:0 "Yes, marvelous metals. If I had a gold mine or a silver mine, I would become incredibly wealthy. If I had an iron mine or a copper mine, I could forge weapons with the finest metals...\n\nJust as I'm about to speak, a clumsy attendant opens the door abruptly, interrupting me. Before I can reprimand him, he starts speaking:\n\n"Sir, we have just discovered..."\n\nAt this moment, you have no interest in hearing what your attendant is saying because the voice is speaking to you:"
 uba_vassalyn.1200.a:0 "That is a #EMP Gold#! mine"
 uba_vassalyn.1200.a.flavor:0 "Later, you receive the same response from the attendant, while the bag of coins on the table has vanished without a trace, and certain things have vanished without a trace with them.\n\nClearly, the devil has taken your offer."
 uba_vassalyn.1200.b:0 "I guess you would prefer a #EMP Silver#! mine"
 uba_vassalyn.1200.b.flavor:0 "$uba_vassalyn.1200.a.flavor$"
 uba_vassalyn.1200.c:0 "You probably need a #EMP Copper#! mine"
 uba_vassalyn.1200.c.flavor:0 "$uba_vassalyn.1200.a.flavor$"
 uba_vassalyn.1200.d:0 "This #EMP Iron mine#! would be enough to satisfy you."
 uba_vassalyn.1200.d.flavor:0 "$uba_vassalyn.1200.a.flavor$\n\nThere is also a strange note left behind: "This will unlock $building_type_wind_furnace_01$ [buildings|E].""
 uba_vassalyn.1200.z:0 "You've been deceived!"
 uba_vassalyn.1200.z.flavor:0 "$uba_vassalyn.1100.z.flavor$"


 uba_vassalyn.1900.t:0 "A Deal: Greed"
 uba_vassalyn.1900.desc:0 ""Ah." The voice let out a sigh. "Is this your choice? Greedy humans, I must remind you that your gold is not enough to buy such a desire."\n\n"Of course, if you have to choose this one, I will have to charge more #EMP cost! , the choice is yours, my dear [ROOT.GetCharacter.GetFirstNameNoTooltip].""
 uba_vassalyn.1900.a:0 "I agree."
 uba_vassalyn.1900.a.flavor:0 "Very well," the voice replied, "as you wish."
 uba_vassalyn.1900.z:0 "I thought about it, but never mind."
 uba_vassalyn.1900.z.flavor:0 ""Very well," the voice replied."

 uba_vassalyn.1901.t:0 "A Deal: Miracle"
 uba_vassalyn.1901.desc:0 "Just as I'm about to speak, a clumsy attendant opens the door abruptly, interrupting me. Before I can reprimand him, he starts speaking:\n\n"Sir, we have just discovered..."\n\nAt this moment, you have no interest in hearing what your attendant is saying because the voice is speaking to you:"
 uba_vassalyn.1901.a:0 "That is a #EMP miraculous mine#!"
 uba_vassalyn.1901.a.flavor:0 "Later, you receive the same response from the attendant, while the bag of coins on the table has vanished without a trace, and certain things have vanished without a trace with them.\n\nThere is also a strange note left behind: "This will unlock $building_type_wind_furnace_01$ [buildings|E]" - What does it mean?"
 uba_vassalyn.1901.b:0 "It's too late to back out now.""
 uba_vassalyn.1901.b.flavor:0 "Later, you learn from your attendant that they have discovered a high-quality iron mine, while the bag of coins on the table has vanished without a trace, and certain things have vanished without a trace with them.\n\nThere is also a strange note left behind: "This will unlock $building_type_wind_furnace_01$ [buildings|E]" - What does it mean?"

 uba_vassalyn.1902.t:0 "A Deal: The Price of Miracle"
 uba_vassalyn.1902.desc:0 "A few days later, I noticed that everyone who saw me would involuntarily burst into laughter. And when I asked for the reason, they would try to change the subject or avoid answering in various ways. (And they were still laughing!)\n\nFinally, a loyal attendant was willing to answer my question. He said:\n\n'Sir, there is a story circulating everywhere about you attempting to court a succubus but being kicked off the bed in the end... And there is not just one story like this, even the farmers in the territory can tell several different versions, not to mention...'\n\nMy attendant continued to explain, but I no longer had the courage to hear it."
 uba_vassalyn.1902.a:0 "Damn it!"
 uba_vassalyn.1902.a.flavor:0 "Now you know what that small price was..."

