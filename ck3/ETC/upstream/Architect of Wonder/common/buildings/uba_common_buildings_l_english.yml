# 特性

 unlocks_cereal_fields_and_farm_estates: "The #V $building_type_cereal_fields_01$#!, #V $building_type_farm_estates_01$#!lines of [buildings|E] can be constructed in this [holding|E]"
 unlocks_windmills_and_watermills: "The #V $building_type_windmills_01$#! and #V $building_type_watermills_01$#! lines of [buildings|E] can be constructed in this [holding|E]"

# 庄园线
 building_type_uba_manor_01: "Royal Manor"
 building_type_uba_manor_01_desc: "This magnificent estate is exclusively enjoyed by the royal family, featuring bountiful farmlands, pleasant pastures, exquisite gardens, and excellent storage facilities. Countless farmers toil day and night, offering abundant harvests and taxes to their monarch."
 building_uba_manor_01: "Manor House"
 building_uba_manor_01_desc: "This grand residence serves as the central building of the estate, boasting luxurious interior decorations and spacious rooms. It is more suitable for habitation compared to a castle. Besides the monarch, other members of the royal family occasionally stay here."
 building_uba_manor_02: "Crop Fields"
 building_uba_manor_02_desc: "These fields are used for cultivating grains and other crops. The diligent work of the farmers ensures plentiful food production, satisfying the needs of the estate's residents while generating surplus for sale."
 building_uba_manor_03: "Pastures"
 building_uba_manor_03_desc: "These expansive grasslands provide ideal grazing areas. They sustain cattle, sheep, and other livestock, supplying the estate with dairy products, meat, and other animal produce. In difficult times, they can also be used for hay production."
 building_uba_manor_04: "Kitchen Garden and Orchard"
 building_uba_manor_04_desc: "The vast kitchen garden and orchard supply the estate with fresh vegetables and fruits. Beyond meeting the dietary needs of the residents, they provide ingredients for banquets and feasts."
 building_uba_manor_05: "Vineyards and Winery"
 building_uba_manor_05_desc: "These vineyards yield high-quality grapes, which are processed into fine wines at the winery. They provide the royal family with indulgence and celebratory beverages."
 building_uba_manor_06: "Wells and Mill"
 building_uba_manor_06_desc: "Wells provide clean drinking water, while the mill efficiently processes grains, grinding the estate's agricultural produce into flour and other food ingredients."
 building_uba_manor_07: "Hunting Grounds"
 building_uba_manor_07_desc: "The reserved land on the outskirts of the estate is designated as hunting grounds. This territory is abundant in wildlife, offering opportunities for the royal family members and their guests to engage in hunting and recreational activities."
 building_uba_manor_08: "Warehouses and Cellars"
 building_uba_manor_08_desc: "Warehouses store grains, hay, tools, and other supplies, while cellars are used to preserve wine and other precious food and beverage items."

# 行宫线
 building_type_uba_residence_01: "Royal Residence"
 building_type_uba_residence_01_desc: "Even the most luxurious and magnificent castle cannot compare to this palace built exclusively for you. Just imagine, when you feel overwhelmed by the burden of responsibility, you can escape to this exquisite paradise..."
 building_uba_residence_01: "Country Mansion"
 building_uba_residence_01_desc: "What could better showcase the power and prestige of the royal family than a splendid mansion? We are superior to everyone else!"
 building_uba_residence_02: "Courtyards and Gardens"
 building_uba_residence_02_desc: "A marvelous open space for various outdoor leisure and celebratory activities. The beautiful flowers planted in the gardens also provide a serene and delightful atmosphere."
 building_uba_residence_03: "Armory"
 building_uba_residence_03_desc: "Being in the countryside, away from the hustle and bustle, does not mean you are safe. It means you still need weapons and soldiers to protect yourself, especially when a group of angry peasants is approaching your residence..."
 building_uba_residence_04: "Stables"
 building_uba_residence_04_desc: "A simple stable that includes stalls, harnesses, which feed facilities ensures that you can ride on spirited steeds during your return journey."
 building_uba_residence_05: "Library"
 building_uba_residence_05_desc: "A library that houses books, manuscripts, and artworks. It provides a quiet space conducive to learning and contemplation."
 building_uba_residence_06: "Chapel"
 building_uba_residence_06_desc: "Even when far away from noisy courtiers and bothersome peasants, it doesn't mean you can escape the watchful eye of God."
 building_uba_residence_07: "Baths"
 building_uba_residence_07_desc: "A large bathhouse equipped with bathing pools, steam rooms, and massage facilities, built in the Roman style. Absolutely fantastic."
 building_uba_residence_08: "Gallery and Cabinet Room"
 building_uba_residence_08_desc: "Oh, you certainly need a place to display your collections. How else would you witness the awe-inspiring reactions of guests to your art and antique collections?"

# 图书馆线
 building_type_uba_library_01: "Library"
 building_type_uba_library_01_desc: "This is a treasure trove of knowledge and culture, where citizens can freely read the books they are allowed to access."
 building_uba_library_01: "Hall"
 building_uba_library_01_desc: "This grand hall provides visitors with a spacious and comfortable space. It also displays replicas of some of the collection's documents for visitors to read."
 building_uba_library_02: "Book's Collection"
 building_uba_library_02_desc: "The meticulously arranged bookshelves showcase a vast collection of rich books and documents. For seekers of knowledge, this is undoubtedly a precious treasure trove."
 building_uba_library_03: "Reading Room"
 building_uba_library_03_desc: "The serene reading room creates a pleasant environment for readers, allowing them to focus on learning, in-depth research, and the enjoyment of reading."
 building_uba_library_04: "Scribe's room"
 building_uba_library_04_desc: "Scribes make important contributions to the preservation and reproduction of valuable manuscripts in a very simple form—copying."
 building_uba_library_05: "Painter's room"
 building_uba_library_05_desc: "Scribes skilled in painting are assigned the task of creating illustrations, filling the blank spaces in books with suitable artwork."
 building_uba_library_06: "Research and Study room"
 building_uba_library_06_desc: "The research room provides scholars with a quiet and comfortable environment to immerse themselves in the world of in-depth research and explore the boundless boundaries of knowledge."
 building_uba_library_07: "Antiquarian's room"
 building_uba_library_07_desc: "After being transcribed and reproduced, the oldest and rarest manuscripts and ancient documents are placed in the antiquarian's room for proper preservation."
 building_uba_library_08: "Librarian"
 building_uba_library_08_desc: "Professional librarians play an important role in the library. They are responsible for tasks such as preservation, classification, cataloging, and managing borrowing and returning. Without them, the library cannot function properly."

# 市政厅线
 building_type_uba_townhall_01: "City Hall"
 building_type_uba_townhall_01_desc: "The City Hall is the core of urban administrative management, responsible for functions such as administration, legislation, and judiciary. It provides important public services and serves as a decision-making center for citizens."
 building_uba_townhall_01: "Council Chamber"
 building_uba_townhall_01_desc: "Representatives of citizens, clergy, nobility, and lords gather here to discuss urban affairs, deliberate on proposals, and make decisions together."
 building_uba_townhall_02: "Municipal Court"
 building_uba_townhall_02_desc: "Citizens argue for their interests and justice, while judges who represented the monarch's will make judgments."
 building_uba_townhall_03: "Administrative Office"
 building_uba_townhall_03_desc: "Officials of various ranks in the City Hall handle daily affairs and develop laws and regulations. It is the central hub of urban decision-making."
 building_uba_townhall_04: "Tax Office"
 building_uba_townhall_04_desc: "The dreaded tax collectors... I mean, tax collectors of Your Majesty will ensure that every coin that should be delivered to you finds its way into your pockets."
 building_uba_townhall_05: "Municipal Archives"
 building_uba_townhall_05_desc: "All administrative records, legal documents, and historical literature will eventually be preserved here. Perhaps one day, they will prove useful."
 building_uba_townhall_06: "City Guard"
 building_uba_townhall_06_desc: "The guards maintain the safety and security of the city, protecting citizens from the invasion of robbers and marauders."
 building_uba_townhall_07: "Clock Tower"
 building_uba_townhall_07_desc: "The towering clock tower is the symbol of the City Hall. The exquisite and unique clock not only tells the time for the citizens but also showcases the glory of the city to every visitor."
 building_uba_townhall_08: "Piazza"
 building_uba_townhall_08_desc: "The square surrounding the City Hall is the ideal place for hosting public events, important celebrations, and gatherings within the city."
 UBA_townhall_effect_desc: "This building increases the domain limit by #EMP 0.5#!"

# 礼拜堂线
 building_type_uba_temple_01: "House of Worship"
 building_type_uba_temple_01_desc: "A serene and solemn building where people can pray and participate in religious ceremonies. The interior is beautifully decorated, emanating a sacred atmosphere."
 building_uba_temple_01: "Grand Temple"
 building_uba_temple_01_desc: "A towering and majestic space exuding grandeur and glory. It has magnificent domes and exquisite artistic decorations, representing the most important and solemn area within the building."
 building_uba_temple_02: "Prayer room"
 building_uba_temple_02_desc: "A quiet and cozy space dedicated to prayer and contemplation. Even the air is filled with a sense of tranquility and devotion."
 building_uba_temple_03: "Monastery"
 building_uba_temple_03_desc: "A simple and peaceful building adjacent to the temple, where monks or nuns reside, pray, and engage in religious activities."
 building_uba_temple_04: "Seminary"
 building_uba_temple_04_desc: "A school affiliated with the temple, where priests and theology students study and explore religious knowledge. It houses classrooms, a library, and research facilities."
 building_uba_temple_05: "Auditorium"
 building_uba_temple_05_desc: "Usually used to host various religious gatherings, but it is also frequently used for non-religious events such as ceremonies, celebrations, and speeches."
 building_uba_temple_06: "Cemetery" 
 building_uba_temple_06_desc: "A peaceful and solemn land, filled with memories and where the remains of the deceased are laid to rest, symbolizes people's respect and remembrance for their loved ones."
 building_uba_temple_07_desc: "A tall tower adorned with bells, whose chimes resonate through the city streets, announcing the arrival of religious ceremonies and special moments."
 building_uba_temple_08: "Piazza"
 building_uba_temple_08_desc: "The square in front of the chapel, surrounded by buildings, serves as a gathering place for citizens, socializing, leisure, and hosting various activities, showcasing the vibrancy and culture of the city."
 UBA_temple_effect_desc: "$UBA_townhall_effect_desc$"

# 集市线
 building_type_uba_bazaar_01: "Pilgrims' Bazaar"
 building_type_uba_bazaar_01_desc: "For the weary pilgrims who have trekked this far, a bazaar appearing on the horizon is undoubtedly a heavenly blessing."
 building_uba_bazaar_01: "Water well"
 building_uba_bazaar_01_desc: "After enduring a long journey, travelers can replenish themselves with precious fresh water here."
 building_uba_bazaar_02: "Food vendor"
 building_uba_bazaar_02_desc: "The air between the stalls is filled with the aroma of grilled meat, dried fruits, and exotic spices. The delicious cuisine not only satisfies the travelers' taste buds but also heals their souls."
 building_uba_bazaar_03: "Inn and stable"
 building_uba_bazaar_03_desc: "Even in a foreign land, travelers can enjoy comfortable beds and warm hospitality here—of course, their horses receive proper care as well."
 building_uba_bazaar_04: "Souvenir vendor"
 building_uba_bazaar_04_desc: "Shelves display an array of handicrafts and various curious trinkets, but beware of the merchants' persuasive words."
 building_uba_bazaar_05: "Tavern"
 building_uba_bazaar_05_desc: "The tavern is always filled with fine wine and stories. The wine loosens the tongues of travelers, and the subsequent tales fill the room with laughter."
 building_uba_bazaar_06: "Sanctuary"
 building_uba_bazaar_06_desc: "Compared to the temples of their homeland, this building may seem unremarkable, but it still attracts many devout worshippers."
 building_uba_bazaar_07: "Mercenaries"
 building_uba_bazaar_07_desc: "The pilgrimage road is far from easy, and they can help travelers resolve many troubles."
 building_uba_bazaar_08: "Stage"
 building_uba_bazaar_08_desc: "Perhaps this makeshift stage is not particularly exquisite, but the dances, dramas, and music performed here are genuine works of art."

# 水渠线
 building_type_uba_aqueduct_01: "Aqueduct"
 building_type_uba_aqueduct_01_desc: "The reliance on water resources limits the potential for urban development. We need a complete and reasonable hydraulic system to solve this issue."
 building_uba_aqueduct_01: "Sources"
 building_uba_aqueduct_01_desc: "Ensuring continuous water supply is key to the entire hydraulic system. Springs are the most common water sources, but sometimes we draw water from natural bodies or artificial reservoirs."
 building_uba_aqueduct_02: "Canals"
 building_uba_aqueduct_02_desc: "Water sources are often distant from cities, and these stone and brick canals efficiently transport water downstream."
 building_uba_aqueduct_03: "Aqueducts"
 building_uba_aqueduct_03_desc: "Suitable slopes and altitude differences ensure smooth water flow from high to low areas. This gravity-driven method makes the entire water supply system efficient and reliable."
 building_uba_aqueduct_04: "Bridgework, Siphons, and Tunnels"
 building_uba_aqueduct_04_desc: "Some aqueducts pass through areas with significant terrain differences, and engineers' wisdom ensures the smooth flow of water to the next section of pipes."
 building_uba_aqueduct_05: "Water Towers and Reservoirs"
 building_uba_aqueduct_05_desc: "To maintain stable water flow, balanced pressure, and safe water quality, water from the aqueducts is first transported to water towers and then sent to city reservoirs and settling tanks."
 building_uba_aqueduct_06: "Pipeline System"
 building_uba_aqueduct_06_desc: "Once water enters the city, it is guided into a complex pipeline system. These pipes are usually buried underground to protect them from external environmental disturbances."
 building_uba_aqueduct_07: "Water Supply and Drainage"
 building_uba_aqueduct_07_desc: "Carefully designed distribution systems ensure adequate water supply to each area; meanwhile, wastewater is collected into drainage systems for proper treatment."
 building_uba_aqueduct_08: "Regular Maintenance"
 building_uba_aqueduct_08_desc: "Such a complex hydraulic system requires comprehensive regular maintenance. Several inspection teams composed of engineers, workers, and soldiers ensure the system operates normally most of the time."


# 骑士训练场线
 building_type_uba_joust_01: "Knight Training Ground"
 building_type_uba_joust_01_desc: "A dedicated area constructed for training knights. Countless aspiring youths will shed sweat... perhaps tears and blood for their knightly dreams here."
 building_uba_joust_01: "Tournament Ground"
 building_uba_joust_01_desc: "An open space cleared for the use of knights, where they engage in daily training such as unarmed combat, weapon sparring, and other exercises."
 building_uba_joust_02: "Archery Range"
 building_uba_joust_02_desc: "This area is designated for archery, javelin throwing, or other long-range weapon training. Extreme caution is needed when setting up the targets!"
 building_uba_joust_03: "Stable"
 building_uba_joust_03_desc: "After a day of horsemanship training, knights' beloved horses are housed in stables and cared for by skilled workers."
 building_uba_joust_04: "Barrack"
 building_uba_joust_04_desc: "Even the bravest of knights need rest. A night's rest ensures they're re-energized for the following day!"
 building_uba_joust_05: "Armory"
 building_uba_joust_05_desc: "The armory is where various equipment for knights is stored and maintained. Take extreme care when entering to ensure nothing gets knocked over."
 building_uba_joust_06: "Blacksmith"
 building_uba_joust_06_desc: "Blacksmiths craft weapons and armor for knights and provide maintenance and repair services for their equipment."
 building_uba_joust_07: "Infirmary"
 building_uba_joust_07_desc: "Intensive training inevitably leads to injuries, and doctors ensure injuries don't worsen... well, most of the time."
 building_uba_joust_08: "Knight's Hall"
 building_uba_joust_08_desc: "Here, knights and commanders discuss tactics, strategies, and daily affairs—exciting knighthood ceremonies also take place here."

# 检查站线
building_type_uba_checkpoint_01: "Checkpoint"
 building_type_uba_checkpoint_01_desc: "Often located on the borders of villages or cities, checkpoints served as both a defense post against enemies and an important means of controlling commerce and population movement."
 building_uba_checkpoint_01: "Improvised Sentry Post"
 building_uba_checkpoint_01_desc: "A handful of soldiers manned a simple wooden sentry tower and wooden fence. Soldiers check the identities and goods of passersby here to ensure that no dangerous elements are mixed in."
 building_uba_checkpoint_02: "Arms Depot"
 building_uba_checkpoint_02_desc: "A small arsenal is used to store common weapons such as bows and arrows and spears. While the quantity may be better than nothing, it still helps to improve the combat effectiveness of the soldiers."
 building_uba_checkpoint_03: "Watchtower"
 building_uba_checkpoint_03_desc: "The watchtowers were raised and reinforced, allowing the soldiers to stand higher in order to keep an eye out for possible incoming enemies in the distance."
 building_uba_checkpoint_04: "Tax Station"
 building_uba_checkpoint_04_desc: "The nearby lords have appointed specialized tax collectors to tax merchants and goods in transit - an enviably good job."
 building_uba_checkpoint_05: "Stone Wall"
 building_uba_checkpoint_05_desc: "Simple wooden enclosures are now replaced by sturdy stone walls, and defenses are no longer comparable."
 building_uba_checkpoint_06: "Commerce Checkpoint"
 building_uba_checkpoint_06_desc: "The checkpoint has a special commerce registration area to record information and goods of merchants in transit. Confiscated illegal goods and taxes levied are stored in a guarded warehouse."
 building_uba_checkpoint_07: "Garrison Camp"
 building_uba_checkpoint_07_desc: "The newly set up small garrison camp is able to accommodate more soldiers and defense apparatus, which are used to strengthen the defense force of this place."
 building_uba_checkpoint_08: "Border Fortress"
 building_uba_checkpoint_08_desc: "Tall stone walls, watchtowers, and sturdy fortifications make this site vulnerable to attack. This site has become a key location for border defense."

# 税务线
 building_type_uba_taxing_01: "Tax Office"
 building_type_uba_taxing_01_desc: "Getting farmers, citizens and traders to pay their taxes willingly is not an easy task, sometimes we need to give them a little help."
 building_uba_taxing_01: "Tax Collector's Pavilion"
 building_uba_taxing_01_desc: "A simple building with mediocre interior furnishings, the tax collector and his soldiers will make sure that the peasants of this place respect their monarch "enough"."
 building_uba_taxing_02: "Tax's Archives"
 building_uba_taxing_02_desc: "Objects such as filing cabinets, ledgers, and seals were stored in the archive room to facilitate tax administration and record keeping."
 building_uba_taxing_03: "Tax's Vault"
 building_uba_taxing_03_desc: "A small vault was used as a depository for taxes collected and goods paid by farmers. It was no easy job to secure these things."
 building_uba_taxing_04: "Land Assessor"
 building_uba_taxing_04_desc: "A land assessor will value land, goods, and property to determine the base amount of taxes ...... taxpayers should pay."
 building_uba_taxing_05: "$building_tax_assessor_01$"
 building_uba_taxing_05_desc: "$building_tax_assessor_01_desc$"
 building_uba_taxing_06: "$building_tax_assessor_02$"
 building_uba_taxing_06_desc: "$building_tax_assessor_02_desc$"
 building_uba_taxing_07: "$building_tax_assessor_03$"
 building_uba_taxing_07_desc: "$building_tax_assessor_03_desc$"
 building_uba_taxing_08: "Tax Department"
 building_uba_taxing_08_desc: ""There are only two things in the world that are unavoidable, taxes and death."" -- and we turned these two things into a multiple-choice question with only two options."

# 浴场线
 building_type_uba_bathroom_01: "Public Bathhouse"
 building_type_uba_bathroom_01_desc: "A bathhouse can be used not only for cleansing the body, preventing disease, and relaxing, but also as a place of recreation and socialization open to the whole community."
 building_uba_bathroom_01: "The Bathhouse"
 building_uba_bathroom_01_desc: "A basic public bathing facility with several open baths for simple bathing and cleansing for visitors."
 building_uba_bathroom_02: "Locker Room"
 building_uba_bathroom_02_desc: "Guests can now unhurriedly shed their clothes and store them in the locker room, which saves them from the hassle of having nowhere to store their clothes."
 building_uba_bathroom_03: "Large Bath"
 building_uba_bathroom_03_desc: "A large bath is often used for more than just washing one's body; it's a social area where everyone can be open and honest."
 building_uba_bathroom_04: "Lounge"
 building_uba_bathroom_04_desc: "In addition to cleansing, the bathhouse offers a comfortable lounge area. It might be a good choice to spend time here as well."
 building_uba_bathroom_05: "Cold Pool"
 building_uba_bathroom_05_desc: "For those who are not accustomed to high water temperatures, they can still enjoy bathing in the cold pool with its cooler water. For children, it's also a great place to play in the water."
 building_uba_bathroom_06: "Hot Pool"
 building_uba_bathroom_06_desc: "While hot pools are certainly nice, it's not a good idea to delve into why the baths consume so much firewood on a weekly basis."
 building_uba_bathroom_07: "Massage Room"
 building_uba_bathroom_07_desc: "Professionals offer comfortable physical therapy services here. It is said that a proper massage can rid the body of impurities and thus prevent illness."
 building_uba_bathroom_08: "Private Bath"
 building_uba_bathroom_08_desc: "Those who are rich and powerful usually do not want others to see them in their natural state. A private bath complete with marble sculptures and intricate inlays is clearly a better choice than a large bath."

# 草药线
 building_type_uba_herbal_01: "Herbal Garden"
 building_type_uba_herbal_01_desc: "Herbs are key in the fight against plague and disease. An herb garden that grows and researches all types of herbs along with other plants will greatly improve our ability to deal with disease."
 building_uba_herbal_01: "Herbal Fields"
 building_uba_herbal_01_desc: "A simple wooden fence wraps around a peaceful field. A few basic herbs and spices are grown here for the use of healers and villagers."
 building_uba_herbal_02: "Nursery"
 building_uba_herbal_02_desc: "The nursery is the garden where the young plants are nurtured and the infrastructure we need to expand our growing area."
 building_uba_herbal_03: "Zoned Planting"
 building_uba_herbal_03_desc: "Herbs and medicinal plants are divided into types according to their nature, while those of similar nature are arranged to be cultivated in the same subdivision."
 building_uba_herbal_04: "Irrigation System"
 building_uba_herbal_04_desc: "Ingenious canals and pipes bring water from upstream into the herb garden, eliminating the need for farmers to rely on manpower to bring irrigation water from afar."
 building_uba_herbal_05: "Drying Room"
 building_uba_herbal_05_desc: "A dry and well-ventilated work shed is used for drying and storing plants. Herbs that have been dried are usually easier to preserve and more potent."
 building_uba_herbal_06: "Herbal Workshop"
 building_uba_herbal_06_desc: "The tools needed to make medicine are usually stored in the workshop, where the herbalist and his apprentice grind, pulverize, and mix the herbs and concoct the proper potions."
 building_uba_herbal_07: "Herbal Library"
 building_uba_herbal_07_desc: "The library contains a large collection of books on the cultivation and use of herbs, as well as manuscripts, which can be studied by scholars and physicians."
 building_uba_herbal_08: "The Glass Room"
 building_uba_herbal_08_desc: "The temperature inside this marvelous building constructed of glass is always quite a bit warmer than the outside world, and thanks to it, the plants all grow faster and better."

# 密室线
 building_type_uba_private_01: "Secret House"
 building_type_uba_private_01_desc: "A complex network of secret passages and hidden rooms make the Secret Room difficult to find, serving as both the center of the intelligence network and a place for conspirators to plan their operations and hideouts."
 building_uba_private_01: "Hideouts"
 building_uba_private_01_desc: "It doesn't take much skill to cover your tracks. Sometimes a perfectly ordinary house can make you disappear from the eyes of a tracker."
 building_uba_private_02: "Safe House"
 building_uba_private_02_desc: "For those who need to stay in the shadows from time to time, a cabin on the corner of a city or on the edge of the countryside is an excellent choice."
 building_uba_private_03: "Hidden Room"
 building_uba_private_03_desc: "What lies behind the sealed wooden doors at the back of the mansion? And what is the special symbolism of the red book on the shelf? Some of the questions are good ones, but it's best to keep them to yourself."
 building_uba_private_04: "Secret Passage"
 building_uba_private_04_desc: "Having one or more secret passages isn't all that unusual for someone with a few little secrets, especially if you're trying to run a secret organization ......"
 building_uba_private_05: "Training Room"
 building_uba_private_05_desc: "Members are able to undergo rigorous training in reconnaissance, escape and combat within the training room. With the "help" of incense, they were able to progress even more rapidly."
 building_uba_private_06: "Conference Room"
 building_uba_private_06_desc: "The conference room is where the members plan and discuss. The structure of the building has been cleverly designed so that it is extremely difficult to hear what is going on inside, even when pressed against the outer wall, so as not to be heard through the wall."
 building_uba_private_07: "Intelligence Room"
 building_uba_private_07_desc: "Intelligence from everywhere is summarized here and analyzed by dedicated personnel. Any seemingly useless detail can be the key to a plan."
 building_uba_private_08: "The Command"
 building_uba_private_08_desc: "Although every member receives instructions from the command, even senior members may not know its exact location. \n\n#emphasis The truth may remain forever hidden in the incense and mist. #!"

# 葡萄线
 building_type_uba_vineyard_01: "Vineyard"
 building_type_uba_vineyard_01_desc: "The unique terroir has nurtured high-quality grapes, and the exquisite winemaking process has transformed this gift of nature into a fine wine. From the vineyard to the cellar, every step condenses the people's efforts."
 building_uba_vineyard_01: "Vineyard"
 building_uba_vineyard_01_desc: "On carefully selected land, rows of neat grapevines spread out. The nourishment of sunlight, rain and soil makes each grape full of the essence of the terroir."
 building_uba_vineyard_02: "Nursery"
 building_uba_vineyard_02_desc: "Using grafting and breeding techniques, it is possible to cultivate grape varieties that are more adapted to the local environment and of better quality, laying a good foundation for brewing top-quality wines."
 building_uba_vineyard_03: "Grape press"
 building_uba_vineyard_03_desc: "Ripe grapes are carefully picked, pressed into juice, and poured into oak barrels, ready to be transformed into a full-bodied wine. "
 building_uba_vineyard_04: "Craft Brewery"
 building_uba_vineyard_04_desc: "Maintaining stable temperature and humidity is the key to wine quality. The great transformation is quietly taking place in the oak barrels."
 building_uba_vineyard_05: "Wine Cellar"
 building_uba_vineyard_05_desc: "A wine cellar with constant temperature and humidity is an ideal storage place for wine. Here, oak barrels give the wine more complex aromas and tastes, and time coats it with a unique color, making it more mellow and full-bodied."
 building_uba_vineyard_06: "Boutique Display Hall"
 building_uba_vineyard_06_desc: "Wine bottles with family crests are displayed on oak shelves, and only the most outstanding finished products can receive such an honor."
 building_uba_vineyard_07: "VIP Wine Tasting Room"
 building_uba_vineyard_07_desc: "The clean and splendid hall is a place for VIPs to taste wine. Exquisite and gorgeous decorations and meticulous service make wine not just a delicacy on the table."
 building_uba_vineyard_08: "Grand Winery"
 building_uba_vineyard_08_desc: "A large winery integrating grape planting, brewing and sales. Advanced equipment and rich experience make its fine wines famous all over the world."

# 橄榄线
 building_type_uba_olive_01: "Olive Grove"
 building_type_uba_olive_01_desc: "The Mediterranean sunshine and warm climate have nurtured olive trees. This ancient tree species not only provides delicious fruits, nourishes the land, but also derives a wealth of related industries."
 building_uba_olive_01: "Olive Grove"
 building_uba_olive_01_desc: "Patches of olive trees grow vigorously on the slopes, and the silvery-green leaves sparkle in the sun, forming a beautiful pastoral painting. Ripe olives can not only be eaten, but also extract precious olive oil, which has a wide range of uses."
 building_uba_olive_02: "Traditional Oil Pressing"
 building_uba_olive_02_desc: "Fresh olive fruits are first crushed into a paste in the oil pressing workshop, and then pressed with a lever to squeeze out the virgin olive oil."
 building_uba_olive_03: "Olive Oil Warehouse"
 building_uba_olive_03_desc: "According to different acidity and flavor, olive oil is divided into different grades. High-quality olive oil is stored in pottery jars to retain its original flavor and quality."
 building_uba_olive_04: "Improved Oil Pressing"
 building_uba_olive_04_desc: "By introducing more advanced oil pressing equipment and technology, the workshop can produce more high-quality olive oil."
 building_uba_olive_05: "Oil Soap Workshop"
 building_uba_olive_05_desc: "Olive oil is an ideal raw material for making soap. Its natural moisturizing ingredients can gently cleanse and care for the skin. Hand-made olive oil soap is not only used for cleaning, but also gradually becomes an important symbol of quality of life."
 building_uba_olive_06: "Perfume Workshop"
 building_uba_olive_06_desc: "The unique aroma of olive oil makes it a natural base for making perfumes. In the hands of experienced perfumers, olive oil can be blended with herbal spices to create a fresh and elegant fragrance."
 building_uba_olive_07: "Large Pressing Workshop"
 building_uba_olive_07_desc: "Golden olive oil is the core of the Mediterranean diet, and the introduction of more oil presses allows the oil pressing workshop to further expand its production scale and continuously improve output and quality."
 building_uba_olive_08: "Olive Manor"
 building_uba_olive_08_desc: "$building_type_uba_olive_01_desc$"

# 皮毛线
 building_type_uba_fur_01: "Leather Workshop"
 building_type_uba_fur_01_desc: "In cold regions, animal fur is an important material for resisting the severe cold. From hunting to processing, from cold protection materials to status symbols, fur has always been closely related to people's lives."
 building_uba_fur_01: "Hunting Ground"
 building_uba_fur_01_desc: "The vast forests and grasslands are the homes of wild animals, and also the places where hunters obtain prey. Unauthorized poaching is strictly prohibited."
 building_uba_fur_02: "Camp"
 building_uba_fur_02_desc: "Hunters will process their spoils in the camp, carefully peeling off the animal fur and performing preliminary cleaning."
 building_uba_fur_03: "Rawhide Tanning"
 building_uba_fur_03_desc: "Tanning is the key processing step. The bloody hides will be carefully treated here... but the smell is unpleasant."
 building_uba_fur_04: "Tailor's Shop"
 building_uba_fur_04_desc: "Skilled craftsmen will cut and sew the tanned leather into various leather garments, providing people with warm and solid protection."
 building_uba_fur_05: "Armor Maker's Shop"
 building_uba_fur_05_desc: "By alternately bonding hardened leather and linen cloth, leather can also be made into strong and lightweight leather armor."
 building_uba_fur_06: "Engraving Workshop"
 building_uba_fur_06_desc: "Animal horns, bones, teeth and other materials obtained from hunting can be carefully carved to make various exquisite handicrafts or practical items."
 building_uba_fur_07: "Fur Workshop"
 building_uba_fur_07_desc: "Fur is... the fur. These gorgeous animal furs will eventually become a proud collection of some nobles."
 building_uba_fur_08: "Fur Trading Station"
 building_uba_fur_08_desc: "High-quality furs and leather products will be sold to various places through merchants, either becoming people's cold-proof clothing, or becoming luxurious collections in the lord's treasury."

# 广场
 building_type_uba_piazza_01: "Plaza"
 building_type_uba_piazza_01_desc: "The plaza is the center of the citizens' daily activities, exchanges, and trade transactions, as well as an important place for the lord to show his authority."
 building_uba_piazza_01: "Small Plaza"
 building_uba_piazza_01_desc: "The open space in front of the houses becomes a place for citizens to gather spontaneously. People trade goods, exchange information, or enjoy their rare leisure time here."
 building_uba_piazza_02: "Bulletin Board"
 building_uba_piazza_02_desc: "A simple bulletin board was set up in front of the plaza to post ordinances and other important information. For those who were literate, the words on the bulletin board might also have meant unavailable opportunities."
 building_uba_piazza_03: "Ceremonial Site"
 building_uba_piazza_03_desc: "The plaza gradually became a venue used by devout citizens for ceremonies. Many religious ceremonies and festivals were held here and the square became more lively."
 building_uba_piazza_04: "The Bazaar"
 building_uba_piazza_04_desc: "The neighborhood of the square gradually became an important commercial area. Fixed stalls and stores attracted more traders and customers, and the bazaar expanded further."
 building_uba_piazza_05: "Municipal Administration"
 building_uba_piazza_05_desc: "New municipal management mechanisms have been implemented. Guards now patrol around the plaza where municipal officials maintain order, further strengthening the lord's control over the city."
 building_uba_piazza_06: "Festive Celebrations"
 building_uba_piazza_06_desc: "The plaza hosts various festivals and celebrations from time to time, and is an important place for citizens to gather as well as hold various events. The grand celebrations not only enrich the lives of the citizens, but also enhance the prestige of the lords."
 building_uba_piazza_07: "Memorial Column"
 building_uba_piazza_07_desc: "Perhaps in honor of some important event or person, a magnificent memorial column stands in the center of the square. This imposing square is a great place to relax even for the greats outside of the commoners."
 building_uba_piazza_08: "The Grand Plaza"
 building_uba_piazza_08_desc: "This square is now surrounded by colonnades and flowerbeds, and the countless sculptures, fountains, and marble columns created by expert sculptors will leave an unmistakable impression on every visitor. The pulse of the city beats here."

# 窑炉
 building_type_uba_kiln_01: "Kiln"
 building_type_uba_kiln_01_desc: "$building_type_dragon_kiln_01_desc$"
 building_uba_kiln_01: "Earthen Kiln"
 building_uba_kiln_01_desc: "A primitive style of kiln, simply dug out or piled up. It can only fire basic pottery, mostly to meet the daily needs of the local populace."
 building_uba_kiln_02: "Round Kiln"
 building_uba_kiln_02_desc: "A dome-shaped kiln whose structure is more enclosed than the earthen kiln, allowing for concentrated heat to increase temperature, firing pottery that is harder and more durable."
 building_uba_kiln_03: "$building_dragon_kiln_01$"
 building_uba_kiln_03_desc: "$building_dragon_kiln_01_desc$"
 building_uba_kiln_04: "$building_dragon_kiln_02$"
 building_uba_kiln_04_desc: "$building_dragon_kiln_02_desc$"
 building_uba_kiln_05: "$building_dragon_kiln_03$"
 building_uba_kiln_05_desc: "$building_dragon_kiln_03_desc$"
 building_uba_kiln_06: "Gourd Kiln"
 building_uba_kiln_06_desc: "The body of the kiln is enlarged and segmented like a gourd, allowing for full use of residual heat and achieving better heat retention. This efficient kiln structure further improves the firing success rate of porcelain and reduces fuel costs."
 building_uba_kiln_07: "Egg-Shaped Kiln"
 building_uba_kiln_07_desc: "A huge, wide-bellied down-draft kiln, whose body resembles a duck egg, composed of two parts: the kiln house and the kiln chamber. This kiln provides strong and stable heat and can fire porcelain at high, medium, and low temperatures separately."
 building_uba_kiln_08: "Imperial Kiln"
 building_uba_kiln_08_desc: "Under official supervision, the most exquisite craftsmen are gathered and the finest raw materials are used, producing porcelain exclusively for the court's use."

# 茶园
 building_type_uba_tea_01: "Tea Plantation"
 building_type_uba_tea_01_desc: "$tgp_tea_ceremony_decision_desc$"
 building_uba_tea_01: "Wild Tea Garden"
 building_uba_tea_01_desc: "Tea bushes are scattered across the hillside, and the scale of picking is small. The resulting tea is mostly for personal consumption, and the quality is inconsistent."
 building_uba_tea_02: "Small Tea Plantation"
 building_uba_tea_02_desc: "The tea garden is starting to take shape, with workers performing pruning and management. The tea workshop is equipped with basic panning and drying tools to process fresh leaves initially."
 building_uba_tea_03: "Tea Plantation"
 building_uba_tea_03_desc: "Intercropping methods are adopted in the tea fields to optimize yield. Tea production is relatively stable and is even sold to neighboring counties, gaining some renown."
 building_uba_tea_04: "Tea Panning Workshop"
 building_uba_tea_04_desc: "A tea panning and processing workshop has been established near the tea plantation, centralizing complex processes such as panning, rolling, drying, and pressing."
 building_uba_tea_05: "Cultivar Tea Plantation"
 building_uba_tea_05_desc: "The tea plantation focuses on cultivating superior tea varieties, paying close attention to soil and water sources, selecting and breeding fine teas with specific flavors."
 building_uba_tea_06: "Tea Merchants"
 building_uba_tea_06_desc: "The massive scale of cultivation has led to the establishment of a complete production and sales system. The tea is marketed both domestically and internationally, and the huge trade profits are sufficient to support local finances."
 building_uba_tea_07: "Tea Administration"
 building_uba_tea_07_desc: "The tea tax, as part of commercial taxation, has become quite considerable. Therefore, the imperial court has appointed special commissioners to manage the tea industry, ensuring high quality and stable supply."
 building_uba_tea_08: "Imperial Tea Plantation"
 building_uba_tea_08_desc: "The tea produced by this plantation is exclusively for the imperial family's enjoyment. The tea bushes thrive in uniquely superior environments, the picking standards are stringent, and the processing skills are unparalleled, making every single leaf an ultimate treasure."

# 蚕桑业
 building_type_uba_silk_01: "$innovation_sericulture$"
 building_type_uba_silk_01_desc: "$innovation_sericulture_desc$"
 building_uba_silk_01: "Mulberry Copse"
 building_uba_silk_01_desc: "Farm families rely on small mulberry groves around their homes to raise a small number of silkworms. The resulting silk is mostly used for self-sufficiency or simple handicraft workshops."
 building_uba_silk_02: "Mulberry Grove"
 building_uba_silk_02_desc: "Dedicated land is cleared for planting mulberry trees. A stable supply of mulberry leaves is the foundation for expanding the scale of sericulture."
 building_uba_silk_03: "Mulberry Plantation"
 building_uba_silk_03_desc: "The scale of the mulberry plantation is vast, and the mulberry trees are centrally managed, yielding higher-quality mulberry leaves. The scale of silkworm rearing expands accordingly."
 building_uba_silk_04: "Magnanery"
 building_uba_silk_04_desc: "Reasonably designed magnanerys effectively control temperature and humidity, ensuring the healthy growth of silkworms. Both cocoon and raw silk output increase further."
 building_uba_silk_05: "Reeling Machine"
 building_uba_silk_05_desc: "Reeling silk refers to boiling the cocoons and drawing out the long, fine filaments—a crucial step in silk production. Efficient reeling machines significantly boost both the quality and quantity of raw silk."
 building_uba_silk_06: "Spinning Wheel"
 building_uba_silk_06_desc: "The spinning wheel twists and winds the raw silk into stronger yarn. The advent of the water-powered spinning machine further vastly improved spinning efficiency. Unremarkable raw silk is processed here into silk fabrics."
 building_uba_silk_07: "Loom"
 building_uba_silk_07_desc: "Unremarkable silk threads are processed into fabrics and other silk textiles. Chou uses a plain weave, resulting in a thick and soft texture; Duan uses a twill interweaving process, resulting in a smooth feel."
 building_uba_silk_08: "Dyeing Workshop"
 building_uba_silk_08_desc: "Complex processes such as dyeing, printing, and embroidery are performed on the silk here, producing gorgeous silks and satins with exquisite patterns and vibrant colors."
