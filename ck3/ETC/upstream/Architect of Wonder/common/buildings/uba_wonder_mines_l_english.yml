 building_type_UBA_wonderful_mines_01:0 "Mysterious Mines"
 building_type_UBA_wonderful_mines_01_desc:0 "Who can truly fathom the marvelous treasures that lie buried in this land? Perhaps the wealth we seek is hidden beneath our very feet."
 building_UBA_wonderful_mines_01:0 "Mysterious Mines"
 building_UBA_wonderful_mines_01_desc:0 "A recently discovered peculiar mine. We have not yet determined if this deposit has any mining value."
 building_UBA_wonderful_mines_02:0 "Miraculous Mine: Iron"
 building_UBA_wonderful_mines_02_desc:0 "A mine that produces iron. Dozens of villages have been established around the initial mine. This mining area initially focuses on small-scale production of iron mine, with occasional findings of tin, lead, and other metal mines."
 building_UBA_wonderful_mines_03:0 "Miraculous Mine: Copper"
 building_UBA_wonderful_mines_03_desc:0 "A mine that produces various metals. In addition to iron, tin, lead, and other metals, miners have also discovered easily accessible copper veins, which will soon yield a large amount of copper mine."
 building_UBA_wonderful_mines_04:0 "Miraculous Mine: Silver"
 building_UBA_wonderful_mines_04_desc:0 "With the growth of settlers, people have gained a deeper understanding of this mine: it contains almost any metal imaginable, with clearly separated layers and enormous reserves. Moreover, precious silver has also been discovered here!"
 building_UBA_wonderful_mines_05:0 "Miraculous Mine: Gold"
 building_UBA_wonderful_mines_05_desc:0 "Various factors indicate that this is a miraculous metal deposit, rich in diverse and high-quality mines. Upon the news of the discovery of gold, qualified engineers flocked in large numbers, making the construction of a truly significant mining site possible."
 building_UBA_wonderful_mines_06:0 "Miraculous Mine: Gemstones"
 building_UBA_wonderful_mines_06_desc:0 "As the scale of mining grows, more mine entrances are being opened, and giant shafts are being excavated to access deeper deposits. Workers frequently discover large gemstones, prompting the introduction of more engineers to increase the gemstone extraction."
 building_UBA_wonderful_mines_07:0 "Miraculous Mining Complex"
 building_UBA_wonderful_mines_07_desc:0 "With the continuous increase in mining volume and the variety of mineral resources, multiple smelters and foundries have been established near the settlement, and the total workforce has approached tens of thousands. Additionally, gemstone mining has reached an industrial scale, attracting craftsmen and merchants from all over the world, which will bring unimaginable wealth."
 building_UBA_wonderful_mines_08:0 "The Capital of Mining"
 building_UBA_wonderful_mines_08_desc:0 "Endless wealth is continuously gushing out from the mines, making this once unknown town now famous far and wide. In the words of poets, its name has become synonymous with wealth."

