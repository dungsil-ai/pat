## 皇城
## 皇城 坛庙 都城（内外城）御苑 明堂
#  building_type_kaifeng_palace_01: "$building_kaifeng_palace_01$"
#  building_type_kaifeng_palace_01_desc: "$building_kaifeng_palace_01_desc$"
#  building_kaifeng_palace_01: "Imperial City"
#  building_kaifeng_palace_01_desc: "A strong and efficient government rule within these walls, ensuring that the city and the realm at large will prosper."
 building_kaifeng_palace_02: "Altars and Temples"
 building_kaifeng_palace_02_desc: "The most important matters of the state are sacrifice and warfare. the Altars of the Heaven and Earth, the Sun and Moon, the Land and Grain, with the Temples of Ancestors must not be neglected, requiring personal sacrifice by the Son of Heaven, with other sacrifices dispatched by officials."
 building_kaifeng_palace_03: "Imperial Garden"
 building_kaifeng_palace_03_desc: "Surrounded by pavilions, towers, and exotic flowers, the Imperial Garden is a place for the Emperor to rest, sightsee, and cultivate his character."
 building_kaifeng_palace_04: "Hall of Mingtang"
 building_kaifeng_palace_04_desc: "Hall of Mingtang were once places where the Emperor offered great sacrifices to Heaven, worshipped his ancestors, held court with the feudal lords, and promulgated decrees, holding extremely respected symbolic significance."
 building_kaifeng_palace_05: "Imperial Capital"
 building_kaifeng_palace_05_desc: "The capital is encircled by multiple layers of inner and outer walls, and simultaneously divided into the Forbidden City, Imperial City, Inner City, Outer City, and other parts. A strong and efficient government rule within these walls, ensuring that the city and the realm at large will prosper."
 has_game_rule_uba_history_special_buildings_on: "$rule_uba_history_special_buildings$ is enabled"

## 紫禁城
#  building_type_forbidden_city_01: "The Forbidden City"
#  building_type_forbidden_city_01_desc: "The Forbidden City is a vast imperial palace, consisting of almost a thousand separate buildings. The entire compound is surrounded by a high wall and a deep moat, protecting the ruling government and the many officials working tirelessly within."
#  building_forbidden_city_01: "Outer Court"
#  building_forbidden_city_01_desc: "$building_type_forbidden_city_01_desc$\n\nThe Golden Hall is the magnificent and solemn center of imperial ceremony, the core area where the Emperor holds major ceremonies such as enthronements and investitures, summons civil and military officials for court, and promulgates decrees."
 building_forbidden_city_02: "Inner Court"
 building_forbidden_city_02_desc: "$building_type_forbidden_city_01_desc$\n\nThis area is the private domain of the Emperor's life, serving as his residence for handling daily state affairs, studying, and recuperating. It is also the location of the so-called harems, the residences of the Emperor's consorts."
 building_forbidden_city_03: "Gardens and Reserves"
 building_forbidden_city_03_desc: "$building_type_forbidden_city_01_desc$\n\nSmall-scale landscaped scenes are scattered within the Forbidden City for the Emperor's leisure and enjoyment. Complete with pavilions, towers, and exotic flowers, it is a place for cultivating one's character."
 building_forbidden_city_04: "Internal Affairs"
 building_forbidden_city_04_desc: "$building_type_forbidden_city_01_desc$\n\nSupporting facilities within the Forbidden City that serve the life of the imperial family and the operation of the court. This includes the residences of eunuchs and palace maids, as well as storehouses for archives and treasures, ensuring the daily operation of the entire Forbidden City."
 building_forbidden_city_05: "Imperial Palace"
 building_forbidden_city_05_desc: "$building_type_forbidden_city_01_desc$\n\nThe solid defense line composed of towering walls, gate towers, corner towers, and the moat, is surrounded by a tight security system, ensuring absolute safety within the Forbidden City.\n\nImperial power is supreme and inviolable."

## 君堡大皇宫
 building_type_palatium_magnum_01: "The Palatium Magnum"
 building_type_palatium_magnum_01_desc: "The palace complex southeast of the Hippodrome constitutes the main part of the [Glossary( 'Palatium Magnum', 'PALATIUM_MAGNUM_GLOSS' )], encompassing dozens of luxurious and beautiful palaces.\n\nThe Daphne Palace, in addition to being the Emperor's private residence, was also an important ceremonial venue within the palace; the Consisterium was the hall where the Emperor held discussions with the Senate; the [Glossary( 'Chrysotriklinos', 'CHRYSOTRIKLINOS_GLOSS' )] combined the functions of a throne room and a banquet hall, serving as the place where the Emperor held audience and discussed state affairs. Its beautiful and unique octagonal shape deeply impressed every visitor; the Emperor's throne was set on a sanctuary at the semi-circular apex of the great hall, which looked like a church and was, in fact, designed in the style of a church...\n\nAnd so it will remain for all eternity, for surely nothing could ever topple the might of Rome."
 building_palatium_magnum_01: "The Hippodrome of Constantinople"
 building_palatium_magnum_01_desc: "When this [Glossary( 'Hippodrome', 'HIPPODROME_GLOSS' )] was completed, the city was still only called 'Byzantium.' This massive arena was part of the plan of Emperor Constantine the Great, featuring the Emperor's private marble [Glossary( 'Kathisma', 'KATHISMA_GLOSS' )]—a glorious seat for the Emperor above the clamor of the arena—behind which lay a shortcut leading to the Daphne Palace.\n\nOutside the north gate of the Hippodrome was the [Glossary( 'Augustaion', 'AUGUSTAION_GLOSS' )], paved with black marble. The [Glossary( 'Milion Milestone', 'MILION_GLOSS' )] stood at the far end of the square, while the great Baths of Zeuxippus and the Hagia Sophia were located on the two sides in front of the Hippodrome.\n\nInside the arena, horses and chariots raced against each other on the U-shaped track—these contests were not just simple athletic events; they provided the Emperor, nobles, and commoners with a rare common topic of conversation."
 building_palatium_magnum_02: "The Inner Palace Complex"
 building_palatium_magnum_02_desc: "The Baths of Zeuxippus, the Palace of Antiochos, and the Palace of Lausos constituted the palace complex on the northern side of the Great Palace. The [Glossary( 'Baths of Zeuxippus', 'ZEUXIPPUS_GLOSS' )] was once Constantinople's most popular public bath, and the rebuilt Great Bath once again thrived.\n\nTo the west are the [Glossary( 'Palace of Antiochos', 'PALACE_ANTIOCHOS_GLOSS' )] and the Palace of Lausos, famous for their extensive collections of statues of heroes and mythology—even in Constantinople, palaces housing so many treasures simultaneously were few.\n\nTo the north of the Palaces of Antiochos and Lausos, the [Glossary( 'Mese Avenue', 'MESE_GLOSS' )], guarded by colonnades, stretched into the distance of the city—a short distance to the west was the circular [Glossary( 'Forum of Constantine', 'CONSTANTINI_GLOSS' )], the primary center of commercial and political activity in Constantinople."
 building_palatium_magnum_03: "The University of Constantinople"
 building_palatium_magnum_03_desc: "The Magnaura Palace was once the seat of the Senate. It was here that Emperor Theodosius established the [Glossary( 'University of Constantinople', 'PANDIDAKTERION_GLOSS' )] in 425 AD, one of the world's largest research centers, and widely considered by scholars to be the world's first university. The Imperial Library was also located within the Magnaura Palace, said to house remnants from the Library of Alexandria.\n\nAfter undergoing several reconstructions, the university once again began to cultivate capable and knowledgeable youth, providing the empire with useful talent."
 building_palatium_magnum_04: "The Coastal Palace Complex"
 building_palatium_magnum_04_desc: "The Coastal Palace Complex, exemplified by the [Glossary( 'Boukoleon Palace', 'BOUKOLEON_PALACE_GLOSS' )], is renowned for its magnificent facade and exquisite carvings. Even more marvelous is that the palace itself forms part of the sea walls. There is even a sea gate on the side that leads directly to the Emperor's private harbor.\n\nTo its north is the famous Lighthouse Tower. Though small in scale, the adjacent Church of the Theotokos of the Lighthouse is extravagantly decorated inside. Between them is the more magnificent [Glossary( 'Nea Ekklesia', 'NEA_EKKLESIA_GLOSS' )] and the Triconchos built by Emperor Theophilos. The open space between the Nea Ekklesia and the sea walls was the venue for tzykanion, which means mounted polo."
 building_palatium_magnum_05: "The Great Palace of Constantinople"
 building_palatium_magnum_05_desc: "$building_type_palatium_magnum_01_desc$"

 PALATIUM_MAGNUM_GLOSS: "The Great Palace of Constantinople was the primary residence of the Byzantine Emperors between 330 and 1081 AD. It was a large complex of palaces and churches, sometimes referred to as the #bold Sacred Palace#! or #bold Sacrum Palatium#! .\nFor over eight centuries, the Great Palace was not merely the Emperor's residence but also the administrative and ceremonial center of the Empire."
 HIPPODROME_GLOSS: "The Hippodrome of Constantinople was modeled entirely after the Circus Maximus in Rome. The arena was dotted with many columns, and marble and bronze statues, with the ancient obelisk transported from Egypt towering in the center. The racetrack was covered with sand and wide enough to allow 8 chariots to race side-by-side, while the surrounding stands could accommodate tens of thousands of spectators."
 CONSTANTINI_GLOSS: "The Forum of Constantine was the primary center of commercial and political activity in Constantinople. To its north was the Imperial Senate House, and the dozens of wide marble steps in front of its gate served as a public forum for dignitaries to address the crowds. A massive porphyry column, the Column of Constantine, stood dozens of meters high in the center of the forum, topped by a bronze statue of Constantine the Great in the guise of Apollo."
 ZEUXIPPUS_GLOSS: "The Baths of Zeuxippus were located north of the Great Palace of Constantinople, situated between the [Glossary( 'Augustaion', 'AUGUSTAION_GLOSS' )] and the northeast corner of the [Glossary( 'Hippodrome', 'HIPPODROME_GLOSS' )]. The baths were decorated with numerous mosaics, paintings, colored marble, and over 80 statues, depicting historical figures such as Homer, Hesiod, Plato, Aristotle, Julius Caesar, Demosthenes, Aeschines, and Virgil, as well as gods and mythological heroes. The baths were repurposed for other uses after the 8th century AD."
 PALACE_ANTIOCHOS_GLOSS: "The Palace of Antiochos was built in the early 5th century. Its distinctive semi-circular portico enclosed a marble-paved courtyard, with a large marble swimming pool even located in the center of the round hall. The large hexagonal apse was converted into the Church of St. Euphemia in the Hippodrome in the 7th century, famous for its dozens of exquisite frescoes depicting the saint's life and martyrdom."
 NEA_EKKLESIA_GLOSS: "The Nea Ekklesia was the first grand church built by Emperor Basil I in the capital of Constantinople after the [Glossary( 'Hagia Sophia', 'HAGIA_SOPHIA_GLOSS' )]. It featured a distinctive roof composed of five domes shining with golden light—the central dome was dedicated to Christ, while the four smaller domes were dedicated to the Archangel Gabriel, the Prophet Elijah, the Virgin Mary, and Saint Nicholas."

 building_type_hagia_sophia_01_desc: "[Glossary( 'The Hagia Sophia', 'HAGIA_SOPHIA_GLOSS' )] is a true marvel of engineering, with a massive dome standing out as the most impressive feature.\n\nCompleted in AD 537 by emperor Justinian I, it now houses the Ecumenical Patriarch and stands as a monument to Christianity."
 HAGIA_SOPHIA_GLOSS: "Hagia Sophia, also known as Sancta Sophia or Ayasofya. #bold Sophia#bold! in Greek means #bold Holy Wisdom#!, therefore it was formally called the #bold Temple of God's Holy Wisdom#!. This name is specifically dedicated to the Holy Wisdom of God, who is Jesus Christ."

## 帕拉丁山
 building_type_palatium_hill_01: "The Palatine Hill"
 building_type_palatium_hill_01_desc: "The Flavian Palace sits upon the Palatine Hill—one of the Seven Hills of Rome and the oldest part of the city—it is from this very hill that the word 'palace' is derived.\n\nSince Romulus first marked the city's boundaries here, the Palatine Hill has been the center of Roman political power. The magnificent imperial palace complex has been reconstructed, and Rome's earliest sacred sites shine once more. This height and the palaces atop it will forever overlook the Circus Maximus and the city of Rome."
 building_palatium_hill_01: "The Circus Maximus"
 building_palatium_hill_01_desc: "The Circus Maximus is situated in the valley between the Palatine and Aventine hills, serving as Rome's largest and most magnificent arena.\n\nThis massive stadium was the focus of the Roman citizens' passions, with marble stands capable of holding hundreds of thousands. Obelisks and temple models stand at the center of the track, witnessing the shifting tides of the games. Directly connected to the palaces on the Palatine, the Emperor can sit upon his throne and attend the empire's grand spectacles amidst the cheers and clamor of the people."
 building_palatium_hill_02: "The Palace of Tiberius"
 building_palatium_hill_02_desc: "On the northwest side of the Palatine Hill sits the palace wing founded by Emperor Tiberius and expanded by Emperor Caligula.\n\nThe Domus Tiberiana is largely rectangular, while the expansion under Caligula extended further out, even converting the Temple of Castor and Pollux into its vestibule. A labyrinth of halls, porticos, and courtyards layers upon one another, while a cryptoporticus—an underground corridor with mosaic floors and exquisite ceiling decorations—connects the different palaces, turning brick and stone into a concrete expression of power."
 building_palatium_hill_03: "The Palatine Academy"
 building_palatium_hill_03_desc: "Majestic temples once stood on the southwest corner of the Palatine Hill, but now this area has become the site of the Emperor's private library and a place for scholars to study.\n\nThe central marble palace, built upon the ruins of the Temple of Apollo, serves as a venue for scholarly debate and state decision-making, while the two grand libraries to the north and south house enduring Greek and Latin classics, reflecting each other's brilliance."
 building_palatium_hill_04: "The Palace of Septimius-Severus"
 building_palatium_hill_04_desc: "On the southeast corner of the Palatine Hill, Emperor Septimius Severus constructed this palace on an unprecedented scale. To support the massive buildings, the foundations composed of giant vaults appear like man-made mountains, their visual impact taking one's breath away.\n\nOn the side facing the Appian Way, the Septizodium stands before the complex—a magnificent three-story structure featuring fountains and colonnades designed to declare to all visitors that the rulers of Rome possess unrivaled power."
 building_palatium_hill_05: "The Palace of Domitian"
 building_palatium_hill_05_desc: "$building_type_palatium_hill_01_desc$"

## 和平之城
 building_type_madinat_al-salam_01: "The Round City"
 building_type_madinat_al-salam_01_desc: "A strictly ordered circular city stands here, designed as a perfect set of concentric circles, and is sometimes called the Madinat al-Salam, the City of Peace. Three layers of walls encircle it, with four great gates pointing North, South, East, and West, welcoming merchants, scholars, and believers from all over the world.\n\nAt the center of these circles lies a massive domed building surrounded by gardens—the sovereign's palace and a grand sanctuary—this is the center of governance and the center of the world."
 building_madinat_al-salam_01: "Fortress District"
 building_madinat_al-salam_01_desc: "Four magnificent gates face the four corners of the world, with complex barbican structures housing numerous stables, armories, training grounds, and checkpoints.\n\nThis is the city's first line of defense. The circular zone between the double walls features a moat and drawbridges, sufficient to withstand the most prolonged sieges. High stone towers are equipped with observation posts overlooking the entire area, while the most elite guards patrol the mandatory paths into the city interior to ensure absolute security."
 building_madinat_al-salam_02: "Market District"
 building_madinat_al-salam_02_desc: "The city's main arteries start from the gates and extend continuously inward. This is the gathering place for caravans and supplies, housing government tax offices, large warehouses, and caravan serais.\n\nBeneath the streets of interlacing arcades, the aroma of spices and incense fills the air, and the silks and gems displayed on the shelves dazzle the eyes. Goods and coins from across the globe ensure that the city's wealth, like a river, never runs dry."
 building_madinat_al-salam_03: "Academy District"
 building_madinat_al-salam_03_desc: "On both sides of the avenues and behind the inner walls lies a district composed of sanctuaries, academies, and libraries, providing religious life and basic education for the surrounding residents.\n\nIn addition to the fundamentals of writing, law, and theological theory, monks and scholars from Greece, Persia, and India lecture here, selflessly sharing their knowledge with those who seek it. With just a little guidance, the light of wisdom can shine brighter than the most brilliant flame."
 building_madinat_al-salam_04: "Garden District"
 building_madinat_al-salam_04_desc: "Beautiful gardens are located at the heart of the city, isolating the bustle of the markets from the center of power.\n\nUsing local traditional qanat and open-channel techniques, river water is channeled into the city. The distribution of plants within the garden is ingeniously designed and strictly arranged in geometric patterns, ensuring that the clear river water crisscrossing through precise channels nourishes every herb, flower, and fruit tree."
 building_madinat_al-salam_05: "Palace District"
 building_madinat_al-salam_05_desc: "$building_type_madinat_al-salam_01_desc$"

## 城墙
 building_type_UBA_wall_01:0 "The Grand Wall"
 building_type_UBA_wall_01_desc:0 "$building_UBA_wall_03_desc$"
 building_UBA_wall_01:0 "Great Wall"
 building_UBA_wall_01_desc:0 "Stone walls and towers surround the entire city, providing excellent protection for the citizens and nobles within."
 building_UBA_wall_02:0 "Great Fortress"
 building_UBA_wall_02_desc:0 "Towering fortresses give defenders excellent positions for defending the city, and soldiers can snipe incoming enemies from the safety of higher ground."
 building_UBA_wall_03:0 "Fortress of Legend"
 building_UBA_wall_03_desc:0 "This awe-inspiring fortification came from the hands of the finest laborers and craftsmen in the land, and their great work will guard countless people from war for years to come."
 UBA_wanna_build_wall:0 "$building_type_UBA_wall_01$ has not yet been started"

### 成就建筑
 building_type_UBA_valhalla_01:1 "The City of Blood and Gold"
 building_type_UBA_valhalla_01_desc:0 ""The King of the Unified North, the Lord of the Northern Seas, the one who forges the throne of ultimate power." Poets wrack their brains, seeking more fitting verses to describe you. In the songs of the bards, this city is forged of gold, rising from the Sea of Blood. It shall be hailed as "Valhalla of Midgard," the earthly hall of heroes."
 building_UBA_valhalla_01:0 "Hall of Heroes"
 building_UBA_valhalla_01_desc:0 "This majestic city has taken shape. A solemn hall has been erected in the central position, where brave warriors can gather."
 building_UBA_valhalla_02:0 "Hall of Banquet"
 building_UBA_valhalla_02_desc:0 "Valiant warriors gather here to feast with the gods! Meat, bread, and strong spirits are always in abundance! After the feast, they will march to the glorious battlefield, tearing apart the flesh of their enemies, seizing their wealth, lives, and everything else."
 building_UBA_valhalla_03:0 "Gate of Valhalla"
 building_UBA_valhalla_03_desc:0 "Our warriors have found new steel and forging techniques beyond the distant oceans. Undoubtedly, it is a blessing from the gods. Our warriors will equip themselves with these divine gifts and prove the worth of their faith."

 building_type_UBA_headquarter_01:1 "The Holy Order Headquarters"
 building_type_UBA_headquarter_01_desc:0 "This fortress stands tall upon the land, blending Western and Mediterranean architectural aesthetics with defensive structures, as if symbolizing the dawn of a new era. The grand circular hall is spacious and bright, its walls adorned with the magnificent banners and heraldry of the great knightly orders, showcasing the power and resolve of the knights."
 building_UBA_headquarter_01:0 "Order of the Holy Sepulchre"
 building_UBA_headquarter_01_desc:0 "To protect the Holy Land, a fortress has been established as a stronghold for the order. The architectural style is austere and sturdy, much like the order itself. The knights will ensure the safety of pilgrims and patrol the surrounding roads."
 building_UBA_headquarter_02:0 "Order of the Knights Hospitaller"
 building_UBA_headquarter_02_desc:0 "With the arrival of more knightly orders, the fortress has undergone massive expansion. Beyond reinforced defensive walls, fully functional infirmaries and chapels have been added to the complex. Here, martial defense and merciful healing go hand in hand; the fortress is not only a shield against enemy attacks but also a haven for the wounded and weary traveler."
 building_UBA_headquarter_03:0 "Order of the Knights Templar"
 building_UBA_headquarter_03_desc:0 "The headquarters is surrounded by thick stone walls and high towers, culminating in a central circular hall that achieves unprecedented openness through advanced vaulted structures. It has become a core hub controlling the financial and military lifelines of the region, amassing vast wealth and the most elite martial forces."
