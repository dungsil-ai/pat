l_english:
# 剧场
 building_type_UBA_colosseum_01:1 "The Colosseum"
 building_type_UBA_colosseum_01_desc:0 "$building_UBA_colosseum_01_desc$"
 building_UBA_colosseum_01:0 "Small Theater"
 building_UBA_colosseum_01_desc:0 "News of a magnificent theater being built on this site is spreading - even if the theater hasn't actually begun construction yet. But nothing can stop people from enjoying the theater, and some small troupes have even begun performing in nearby open spaces."
 building_UBA_colosseum_02:0 "Amphitheater"
 building_UBA_colosseum_02_desc:0 "On days when there's a good show on, this little amphitheater is packed with spectators. Actors take center stage, stretching their vocal cords and chanting their lines - it makes the citizens proud of their little theater."
 building_UBA_colosseum_03:0 "Semi-Circular Theater"
 building_UBA_colosseum_03_desc:0 "The theater was further enlarged after the style of the Greek theaters, with the auditorium being raised using a coupon arch structure, allowing for more bleacher seats. And cleverly designed underground aqueducts provide water for performances along with clean drinking water."
 building_UBA_colosseum_04:0 "Colosseum"
 building_UBA_colosseum_04_desc:0 "The two semicircular theaters butt up against each other by means of a colonnade to form the so-called amphitheater. The stands were further enlarged and a canopy for shade was installed. In addition to traditional plays, the amphitheater began to host exciting athletic contests and novelty naval shows."
 building_UBA_colosseum_05:0 "Legendary Theater"
 building_UBA_colosseum_05_desc:0 "A grand gallery supported a grandstand large enough to hold tens of thousands of people, and the entrance was cleverly designed to avoid congestion and confusion, while beneath the stage were hidden rooms and aisles that housed props and livestock for performances. Countless grand spectacles were staged in it - today the theater is a true marvel that even true Romans would marvel at."
 UBA_colosseum_building:0 "Under construction $building_type_UBA_colosseum_01$"
 UBA_colosseum_finished:0 "Built $building_type_UBA_colosseum_01$"
 UBA_colosseum_unlocks_desc:0 "The #V $building_type_uba_piazza_01$#! lines of [buildings|E] can be constructed in any [holding|E]"

# 宫殿
 building_type_UBA_palace_01:1 "The Palace"
 building_type_UBA_palace_01_desc:0 "$building_UBA_palace_05_desc$"
 building_UBA_palace_01:0 "Spring Palace"
 building_UBA_palace_01_desc:0 "Spring Palace, royal bedchamber, was one of the first buildings to be completed. Its a major wing of the Grand Palace, and in addition to serving as the monarch's sleeping place, it also served as an important ceremonial site within the palace."
 building_UBA_palace_02:0 "Summer Palace"
 building_UBA_palace_02_desc:0 "The Summer Palace is located in the most scenic area. Nearby are hunting grounds for the monarch's exclusive use, complete with all the amenities. The palace itself is surrounded by all kinds of new and beautiful plants, with exotic flowers and herbs competing for attention. Only here can the monarch exclude the distractions of the world and find a haven of peace and comfort."
 building_UBA_palace_03:0 "Autumn Palace"
 building_UBA_palace_03_desc:0 "The Autumn Palace combines the roles of a throne room and a banquet hall. The monarch's throne sits atop a three-tiered dais, opulent and elegant, embellished with pearls and precious stones. The marble floor is covered with a fine brocade carpet, where the monarch will receive envoys from all parts of the world."
 building_UBA_palace_04:0 "Winter Palace"
 building_UBA_palace_04_desc:0 "The interior of this palace is warm even in the harshest and coldest of winters. The palace was equipped with a ballroom and a study, where people could spend a pleasant time, whether they were active or quiet. And the vast cellars ensured that its owners never had to worry about a lack of supplies."
 building_UBA_palace_05:0 "Sacred Palace"
 building_UBA_palace_05_desc:0 "It is not a single Palace, but an entire palace complex. It is grand and imposing, and includes the main hall, the chambers, the imperial gardens, as well as the library, the art gallery, and many other chambers. Its very existence is already proof of its owner's strength and wealth, and it will also witness an even more glorious future for this territory."
 UBA_palace_building:0 "Building under construction $building_type_UBA_palace_01$"
 UBA_palace_finished:0 "Completed $building_type_UBA_palace_01$"
 UBA_palace_unlocks_desc:0 "The #V $building_type_uba_residence_01$#! lines of [buildings|E] can be constructed in any [holding|E]"

# 林苑
 building_type_UBA_reserve_01:1 "The Reserve"
 building_type_UBA_reserve_01_desc:0 "$building_UBA_reserve_05_desc$"
 building_UBA_reserve_01:0 "Reserve"
 building_UBA_reserve_01_desc:0 "Large tracts of forests, mountains, and rivers are enclosed together in the monarch's private reserve. Ordinary people are restricted from entering this reserve to maximize the natural beauty of the area."
 building_UBA_reserve_02:0 "Monument"
 building_UBA_reserve_02_desc:0 "The image of the monarch became immortalized in stone, and countless legends have been celebrated by future generations because of this monument. Not only does this monument commemorate the great deeds of its commissioned builder, but anyone who holds it within the domain can claim guardianship over the legend."
 building_UBA_reserve_03:0 "Arboretum"
 building_UBA_reserve_03_desc:0 "The Botanical Gardens are planted with exotic flowers and plants from all over the world, not just for their ornamental value, but some of them can be used for medicine."
 building_UBA_reserve_04:0 "The House of Animals"
 building_UBA_reserve_04_desc:0 "Scattered among the mountains and forests were rare animals that the monarch had scavenged from all over the world for hunting pleasure. And some of the animals unsuitable for release into the wild are kept in the newly built Rare Animal Museum."
 building_UBA_reserve_05:0 "The Royal Forest Park"
 building_UBA_reserve_05_desc:0 "The magnitude of the expanded Imperial Forest Park is staggering. It is now a vast and stunning landscape: a magnificent, carefully crafted natural landscape, with several lavish palaces dotted around it. The views are breathtaking when viewed from above."
 UBA_reserve_building:0 "Under construction $building_type_UBA_reserve_01$"
 UBA_reserve_finished:0 "Completed $building_type_UBA_reserve_01$"
 UBA_reserve_unlocks_desc:0 "The #V $building_type_uba_manor_01$#! lines of [buildings|E] can be constructed in any [holding|E]"
# 要塞
 building_type_UBA_castle_01:0 "The Fortress"
 building_type_UBA_castle_01_desc:0 "$building_UBA_castle_05_desc$"
 building_UBA_castle_01:0 "Wall and Moat"
 building_UBA_castle_01_desc:0 "A tall wall with a moat is being built around the base of the fortress. Construction is still in progress, but it is already possible to visualize the grandeur of the fortress when it is complete."
 building_UBA_castle_02:0 "Bunkers and towers"
 building_UBA_castle_02_desc:0 "The main part of the fortress boasts a number of towers, which in turn are themselves surrounded by walls, bunkers, and a moat; the strong walls and bunkers allow the fortress to hold out until reinforcements arrive."
 building_UBA_castle_03:0 "Soldiers' camp."
 building_UBA_castle_03_desc:0 "After further construction, the fortress has more than doubled in size. The additional camps within are stationed with elite soldiers, while the best officers trained in the camps are sent to various parts of the territory to guide the soldiers in their training."
 building_UBA_castle_04:0 "Command Center"
 building_UBA_castle_04_desc:0 "This magnificent fortress has become the centerpiece of the region's defense strategy, and as such, the region's military hub."
 building_UBA_castle_05:0 "Magnificent Fortress"
 building_UBA_castle_05_desc:0 "This impregnable fortress has towering stone walls, a wide moat, and several thick towers. And it also served as a royal residence, a training camp, and a prison in addition to its original role as a military fortress."
 UBA_castle_building:0 "Under construction $building_type_UBA_castle_01$"
 UBA_castle_finished:0 "Built $building_type_UBA_castle_01$"
 UBA_castle_unlocks_desc:0 "The #V $building_type_uba_regimental_grounds_01$#!,#V $building_type_warrior_lodges_01$#!, #V $building_type_hillside_grazing_01$#! lines of [buildings|E] can be constructed in any [holding|E]"
# 瞭望塔
 building_type_UBA_tower_01:0 "The Pharos"
 building_type_UBA_tower_01_desc:0 "$building_UBA_tower_05_desc$"
 building_UBA_tower_01:0 "Lighthouse"
 building_UBA_tower_01_desc:0 "A towering tower was erected while giving directions to pedestrians and traveling ships at night."
 building_UBA_tower_02:0 "Lookout Tower"
 building_UBA_tower_02_desc:0 "A lookout was added to the lighthouse to provide a view of the surroundings and for watching for possible enemy advances."
 building_UBA_tower_03:0 "Tall Tower"
 building_UBA_tower_03_desc:0 "The tower was further raised and reinforced, with a series of outbuildings built up around the main part. From time to time, as permanent camps were built, soldiers in charge of area defense were stationed near the tower."
 building_UBA_tower_04:0 "Giant tower"
 building_UBA_tower_04_desc:0 "The towering towers were visible for miles, and everything on the land seemed within reach for the lookouts atop them."
 building_UBA_tower_05:0 "Grand Tower"
 building_UBA_tower_05_desc:0 "This towering, awe-inspiring tower is used to watch for attacks by potential intruders and is a highly defensive fortress in its own right. At the same time, it guides pedestrians to their bearings, faithfully performing the function of a lighthouse."
 UBA_tower_building:0 "Under construction $building_type_UBA_tower_01$"
 UBA_tower_finished:0 "Completed $building_type_UBA_tower_01$"
 UBA_tower_unlocks_desc:0 "The #V $building_type_uba_checkpoint_01$#! lines of [buildings|E] can be constructed in any [holding|E]"
# 军校
 building_type_UBA_knight_01:0 "The Military-academy"
 building_type_UBA_knight_01_desc:0 "$building_UBA_knight_05_desc$"
 building_UBA_knight_01:0 "Training Camp"
 building_UBA_knight_01_desc:0 "A site built specifically for training knights. Countless aspiring youths will sweat for their dreams here ...... There may also be tears and blood."
 building_UBA_knight_02:0 "Knight's School"
 building_UBA_knight_02_desc:0 "Anyone who aspires to be a knight - regardless of origin - will receive a complete military education here, where they will learn all about battlefield strategy, army organization and up-to-date knowledge of the technology of war."
 building_UBA_knight_03:0 "Jousting Ground"
 building_UBA_knight_03_desc:0 "After further construction, the military academy has more than doubled in size. A large open space has been planned as a training ground for the cadets, where they will become a qualified knight."
 building_UBA_knight_04:0 "Knight's Auditorium"
 building_UBA_knight_04_desc:0 "Life and memory are fleeting things, but the honor of knighthood will be passed on in the hearts of generations of knights."
 building_UBA_knight_05:0 "Glory Academy"
 building_UBA_knight_05_desc:0 "This academy has produced generations of outstanding knights. Anyone who aspires to become a knight - regardless of origin - will receive a complete military education here."
 UBA_knight_building:0 "Under construction $building_type_UBA_knight_01$"
 UBA_knight_finished:0 "Built $building_type_UBA_knight_01$"
 UBA_knight_unlocks_desc:0 "The #V $building_type_uba_joust_01$#! lines of [buildings|E] can be constructed in any [holding|E]"
# 法院
 building_type_UBA_governor_01:0 "The Court"
 building_type_UBA_governor_01_desc:0 "$building_UBA_governor_05_desc$"
 building_UBA_governor_01:0 "Magistracy"
 building_UBA_governor_01_desc:0 "Minor matters within the territory shouldn't bother the monarch, a few dedicated bureaucrats are more than enough."
 building_UBA_governor_02:0 "Local Court"
 building_UBA_governor_02_desc:0 "Magistrates were usually held by the local squires, who were empowered to take charge of the maintenance of local law and order, the administration of public affairs, and the collection of taxes and fines."
 building_UBA_governor_03:0 "Council of Magistrates"
 building_UBA_governor_03_desc:0 "As local officials appointed by the monarch, the magistrates were obliged to carry out central governmental orders and report to the lords on local governmental affairs; they also took into account the local people's sentiments, and formulated social policies in accordance with local conditions."
 building_UBA_governor_04:0 "Circuit Court"
 building_UBA_governor_04_desc:0 "The monarch sends traveling judges from the royal courts to travel around the country. The fair and reasonable trials of the circuit courts were also popular among the populace."
 building_UBA_governor_05:0 "Supreme Court"
 building_UBA_governor_05_desc:0 "This court is responsible for hearing all cases of importance and legal merit, and has power over all lower courts. The judges sit here to assist the monarch in the management of this vast territory."
 UBA_governor_building:0 "Building under construction $building_type_UBA_governor_01$"
 UBA_governor_finished:0 "Built $building_type_UBA_governor_01$"
 UBA_governor_unlocks_desc:0 "The #V $building_type_uba_taxing_01$#! lines of [buildings|E] can be constructed in any [holding|E]"
# 工坊
 building_type_UBA_workshop_01:0 "The Workshop"
 building_type_UBA_workshop_01_desc:0 "$building_UBA_workshop_05_desc$"
 building_UBA_workshop_01:0 "Junior Workshop"
 building_UBA_workshop_01_desc:0 "A group of craftsmen from nothing came here to set up their own workshop. Simple tools are stacked by the workbenches, and the artisans will use them to skillfully build tools."
 building_UBA_workshop_02:0 "Small Workshop"
 building_UBA_workshop_02_desc:0 "The workshop is filled with a wide variety of tools and equipment, where artisans show off their skills - making products that handle supplying the local area and even exporting to other regions."
 building_UBA_workshop_03:0 "Large Workshop"
 building_UBA_workshop_03_desc:0 "Every day in the workshop is full of creativity and challenges. Artisans experiment with new materials and apply new techniques to create something unique and good."
 building_UBA_workshop_04:0 "Complex Workshop"
 building_UBA_workshop_04_desc:0 "The workshop is a temple of art where artisans display their talents and utilize their skills to the fullest. The work not only amazes with its superior craftsmanship, but also reveals the creators' awareness of aesthetics."
 building_UBA_workshop_05:0 "Legendary Workshop"
 building_UBA_workshop_05_desc:0 "This is where artisans gather and the center of technological advancement in the Territory. Needing only tools, raw materials, ingenuity and sweat, the artisans have always been able to create unparalleled wonders."
 UBA_workshop_building:0 "Under construction $building_type_UBA_workshop_01$"
 UBA_workshop_finished:0 "Completed $building_type_UBA_workshop_01$"
 UBA_workshop_unlocks_desc:0 "The #V $building_type_wind_furnace_01$#! or #V $building_type_uba_kiln_01$#! lines of [buildings|E] can be constructed in any [holding|E]"
# 议会宫
 building_type_UBA_parliament_01:0 "The Parliament"
 building_type_UBA_parliament_01_desc:0 "$building_UBA_parliament_05_desc$"
 building_UBA_parliament_01:0 "Parliament Hall"
 building_UBA_parliament_01_desc:0 "The furnishings of the Parliament Hall are simple and dignified, with basic seating and discussion areas. Representatives from all parts of the territory were able to voice their opinions and conduct discussions around various topics here."
 building_UBA_parliament_02:0 "The House of Lords"
 building_UBA_parliament_02_desc:0 "The house of lords consists of representatives of noble and clerical origin. They are of high status and power, yet they are able to come together to voice their opinions on matters large and small of the territory."
 building_UBA_parliament_03:0 "The House of Commons"
 building_UBA_parliament_03_desc:0 "Most of the members of the house of commons come from the ranks of merchants, soldiers, citizens & farmers. Their voices come from the bottom and represent the interests and aspirations of the commoners."
 building_UBA_parliament_04:0 "Privy Council"
 building_UBA_parliament_04_desc:0 "Appointed by the monarch himself, the advisory officers of the Privy Council are responsible for advising the monarch on matters of great importance to the realm, and are almost always approved."
 building_UBA_parliament_05:0 "Palace of Parliament"
 building_UBA_parliament_05_desc:0 "This building, which stands in the center of the city, brings together representatives from all classes of nobles, citizens, and clergy. The House of Lords and Commons were opposed to each other, yet complemented each other, and a delicate balance of power and justice was struck."
 UBA_parliament_building:0 "Under construction $building_type_UBA_parliament_01$"
 UBA_parliament_finished:0 "Completed $building_type_UBA_parliament_01$"
 UBA_parliament_unlocks_desc:0 "The #V $building_type_uba_townhall_01$#! lines of [buildings|E] can be constructed in any [holding|E]"
# 医院
 building_type_UBA_hospital_01:0 "Large Hospital"
 building_type_UBA_hospital_01_desc:0 "$building_UBA_hospital_05_desc$"
 building_UBA_hospital_01:0 "Patient Hut"
 building_UBA_hospital_01_desc:0 "A modest setting, but a fledgling hospital facility. Doctors were able to admit and treat the sick in a fairly decent setting, and the sick were given a quiet place to heal."
 building_UBA_hospital_02:0 "Herbal Pharmacy"
 building_UBA_hospital_02_desc:0 "Herbs collected by herbalists from all over the world are processed to become more usable and storable medicinal products. In turn, doctors used them to provide herbal treatments to their patients."
 building_UBA_hospital_03:0 "Isolation Ward"
 building_UBA_hospital_03_desc:0 "Dangerous infectious patients are admitted to relatively separate isolation wards, where only the bravest doctors dare to go forward and tend to them. I hope they will be safe."
 building_UBA_hospital_04:0 "Extended Ward"
 building_UBA_hospital_04_desc:0 "The extension wards, temporarily set up in open spaces near the hospital in response to a possible plague, gradually became permanent wards, and they gave severely afflicted victims hope of survival."
 building_UBA_hospital_05:0 "Hospitals and Hospices"
 building_UBA_hospital_05_desc:0 "The hospices provided long-term care for those who were barely surviving, while a centrally located central hospital building provided nursing support for all hospices."
 UBA_hospital_building:0 "Under construction $building_type_UBA_hospital_01$"
 UBA_hospital_finished:0 "Completed $building_type_UBA_hospital_01$"
 UBA_hospital_unlocks_desc:0 "The #V $building_type_uba_bathroom_01$#!, $building_type_uba_herbal_01$#! lines of [buildings|E] can be constructed in any [holding|E]"
# 大学
 building_type_UBA_university_01:0 "The University"
 building_type_UBA_university_01_desc:0 "$building_UBA_university_05_desc$"
 building_UBA_university_01:0 "Faculty of Law"
 building_UBA_university_01_desc:0 "$building_type_generic_university_desc$\n\nThe Faculty of Law is the original academy, where scholars of grammar, rhetoric, and logic gathered to comment on ancient codes as well as present-day legal cases."
 building_UBA_university_02:0 "Faculty of Arts"
 building_UBA_university_02_desc:0 "$building_type_generic_university_desc$\n\nThe Faculty of Arts is a place for the study of literature and language. Here students learn languages and study all types of classic literature, including poetry and drama."
 building_UBA_university_03:0 "Faculty of Theology"
 building_UBA_university_03_desc:0 "$building_type_generic_university_desc$\n\nThe Faculty of Theology is one of the most important colleges in the university. Here, students study various theological texts and explore faith, morality, and the human soul."
 building_UBA_university_04:0 "Faculty of Philosophy"
 building_UBA_university_04_desc:0 "$building_type_generic_university_desc$\n\nThe Faculty of Philosophy is a place for the study of philosophical thought and discursive issues. Students study classic philosophical works from ancient and modern times. And admiring scholars exchange their knowledge, wisdom, and books here."
 building_UBA_university_05:0 "Faculty of Science"
 building_UBA_university_05_desc:0 "$building_type_generic_university_desc$\n\n Scholars and scientists from all over the world debated, researched, documented, and ultimately brought their knowledge together within the walls of the university. This prestigious university has become the most impressive academic center in this part of the world."
 UBA_university_building:0 "Under construction $building_type_UBA_university_01$"
 UBA_university_finished:0 "Completed $building_type_UBA_university_01$"
 UBA_university_unlocks_desc:0 "The #V $building_type_uba_library_01$#! lines of [buildings|E] can be constructed in any [holding|E]"
# 圣殿
 building_type_UBA_church_01:0 "Great Sanctuary"
 building_type_UBA_church_01_desc:0 "$building_UBA_church_05_desc$"
 building_UBA_church_01:0 "House of Prayer"
 building_UBA_church_01_desc:0 "A serene sanctuary, furnished with simplicity and dignity. The serene interior provides an excellent place for silent prayer for the faithful who come."
 building_UBA_church_02:0 "House of Contemplation."
 building_UBA_church_02_desc:0 "Tall colonnades hold up magnificent vaulted ceilings, and beautiful frescoes and ornamentation adorn the various elevations of the sanctuary. Amidst the sacred atmosphere created by incense and light, the faithful pray and meditate together."
 building_UBA_church_03:0 "House of Worship"
 building_UBA_church_03_desc:0 "The sanctuary is grand and stately, with a massive dome soaring high above the ground, and the entire building supported by stone pillars. The roof and facade are embellished by intricate and ornate sculpture and ornamentation. The faithful were able to immerse themselves in the solemnity of the atmosphere."
 building_UBA_church_04:0 "House of Praise"
 building_UBA_church_04_desc:0 "Filled with an air of sanctity and solemnity, this magnificent sanctuary is adorned inside and out with magnificent carvings and frescoes. And the sacred aura emanating from the precious relics enshrined on the altar is even more awe-inspiring."
 building_UBA_church_05:0 "Sacred Hall"
 building_UBA_church_05_desc:0 "A grand and magnificent sanctuary, with a soaring dome pointing straight up to the sky, and ornate decorations that make it seem extraordinarily holy. Pilgrims from all over the world would willingly come to this place, which would bring them one step closer to the gods they worshipped. And without fail, they marveled and were overwhelmed by this sanctuary. Everyone is convinced of one fact - that we are indeed favored by God."
 UBA_church_building:0 "Under construction $building_type_UBA_church_01$"
 UBA_church_finished:0 "Built $building_type_UBA_church_01$"
 UBA_church_unlocks_desc:0 "The #V $building_type_uba_temple_01$#! lines of [buildings|E] can be constructed in any [holding|E]"
# 市场
 building_type_UBA_market_01:0 "The Market"
 building_type_UBA_market_01_desc:0 "$building_UBA_market_05_desc$"
 building_UBA_market_01:0 "Little Market"
 building_UBA_market_01_desc:0 "Farmers, craftspeople, and vendors gather here in humble stalls with simple goods such as produce, handicrafts, and everyday items."
 building_UBA_market_02:0 "Trade Square"
 building_UBA_market_02_desc:0 "A wide variety of stalls are densely packed in this large, bustling market. Goods abound: spices, cloth, and crafts. People traveled between the crowded streets, picking out the goods of their choice."
 building_UBA_market_03:0 "Commercial Street"
 building_UBA_market_03_desc:0 "As the market expanded, the commercial streets were widened even further. Stores and storefronts abounded, offering a wide variety of goods and services that attracted merchants and travelers from far and wide."
 building_UBA_market_04:0 "Exchange"
 building_UBA_market_04_desc:0 "Improvements in warehousing have made it possible to trade large quantities of goods. It brings together merchants and chambers of commerce from all over the world, and bulk trade keeps money, goods and futures flowing."
 building_UBA_market_05:0 "Commercial center"
 building_UBA_market_05_desc:0 "The markets and storage facilities here are large and functional, bringing together merchants and travelers from all over. Merchants gather here, and stores abound. It has become the commercial center of the entire territory, and even the entire region."
 UBA_market_building:0 "Under construction $building_type_UBA_market_01$"
 UBA_market_finished:0 "Built $building_type_UBA_market_01$"
 UBA_market_unlocks_desc:0 "The #V $building_type_caravanserai_01$#! lines of [buildings|E] can be constructed in any [holding|E]"
# 港口
 building_type_UBA_port_01:1 "The Port"
 building_type_UBA_port_01_desc:0 "$building_UBA_port_05_desc$"
 building_UBA_port_01:0 "LIttle Harbor"
 building_UBA_port_01_desc:0 "A nondescript wharf nestled on the waterfront, but she provides ample space needed for countless merchants and fishermen to moor and buy and sell their goods, and many ships come and go daily. Travelers from far and wide sought the shelter of a haven in this harbor."
 building_UBA_port_02:0 "Trading Port"
 building_UBA_port_02_desc:0 "This port has provided countless merchants and fishermen with ample space needed to anchor and buy and sell goods. As it has grown in size, this port has become the center of trade and travel in this region. Ships from all over the coast and along the river come here to trade."
 building_UBA_port_03:0 "Commercial Port"
 building_UBA_port_03_desc:0 "Customs and revenue agencies provide the basic safeguards for trade activities at the port. Sound management facilities and operational mechanisms were also put in place to ensure efficiency and order in the port."
 building_UBA_port_04:0 "$building_common_tradeport_06$"
 building_UBA_port_04_desc:0 "$building_common_tradeport_06_desc$"
 building_UBA_port_05:0 "Grand Port"
 building_UBA_port_05_desc:0 "This large port offers a vast array of berths, docks, and some of the most accomplished sailors in the region. All travelers needing to make long journeys can find the goods they need here, and on the other hand, merchants, fishermen, and armies can buy the necessities they want here."
 UBA_port_building:0 "Building under construction $building_type_UBA_port_01$"
 UBA_port_finished:0 "Built $building_type_UBA_port_01$"
 UBA_port_unlocks_desc:0 "The #V $building_type_caravanserai_01$#! lines of [buildings|E] can be constructed in any [holding|E]"
# 圣城
 building_type_UBA_holyland_01:0 "The Holyland"
 building_type_UBA_holyland_01_desc:0 "$building_UBA_holyland_01_desc$"
 building_UBA_holyland_01:0 "Dream of Harmony"
 building_UBA_holyland_01_desc:0 ""Let our descendants forget about strife! The flag of peace shall henceforth fly high over this land!""
 building_UBA_holyland_02:0 "Seeds of Peace"
 building_UBA_holyland_02_desc:0 ""If the flower of hope can blossom in the fields of peace, what shall we water it with?"" \n "Love.""
 building_UBA_holyland_03:0 "Flower of Hope"
 building_UBA_holyland_03_desc:0 ""The different devotees all know how to listen only to the teachings of their respective gods, forgetting that we have all equally experienced that divine inspiration, that miracle of creation.""
 building_UBA_holyland_04:0 "Land of Harmony"
 building_UBA_holyland_04_desc:0 ""Faith is the only hope for the salvation of our souls, and human performance is the virtue and wisdom that will save us in this world.""
 building_UBA_holyland_05:0 "City of Dreams"
 building_UBA_holyland_05_desc:0 "Different devotees believe in different gods, but they all live harmoniously in the same city today. \n A temple stands in the city, a plurality of beliefs that make her as brilliant and beautiful as a rainbow. \n Compassion, tolerance, and fraternity constitute the greatest and smallest miracle of this world."
 UBA_holyland_building:0 "Under construction $building_type_UBA_holyland_01$"
 UBA_holyland_finished:0 "Completed $building_type_UBA_holyland_01$"
 UBA_holyland_unlocks_desc:0 "The #V $building_type_uba_bazaar_01$#! lines of [buildings|E] can be constructed in any [holding|E]"
# 水库
 building_type_UBA_basins_01:0 "The Reservoir"
 building_type_UBA_basins_01_desc:0 "$building_UBA_basins_05_desc$"
 building_UBA_basins_01:0 "Open Basins"
 building_UBA_basins_01_desc:0 "$building_kairouan_basins_01_desc$"
 building_UBA_basins_02:0 "Barrage Dams"
 building_UBA_basins_02_desc:0 "By building tall dykes, we can intercept the flow of water and create spectacular reservoirs. Not only do dams increase the amount of water stored and can support irrigation on a larger scale, they also reduce the threat of flooding to some extent."
 building_UBA_basins_03:0 "Mega Reservoirs"
 building_UBA_basins_03_desc:0 "The use of stones to further strengthen the dams of the reservoirs can significantly improve their stability and water storage capacity. A more reliable water supply provides a solid foundation for further development of water projects."
 building_UBA_basins_04:0 "Cisterna Basilica"
 building_UBA_basins_04_desc:0 "Advances in engineering technology have made it possible to build large underground water storage reservoirs. Supported by countless stone pillars, the huge underground space is not only capable of storing sufficient water to effectively cope with prolonged droughts, but also provides clean drinking water for urban residents and a strong guarantee for economic development and agricultural prosperity."
 building_UBA_basins_05:0 "Water Systems"
 building_UBA_basins_05_desc:0 "This water pivot integrates water storage, flood control and irrigation. A comprehensive system of reservoirs and waterways allows for precise control of water flow and maximizes the use of water resources. Water is not only the lifeblood of the city's inhabitants, but also the key to the territory's prosperity and resistance to natural disasters."
 UBA_basins_building:0 "Under construction $building_type_UBA_basins_01$"
 UBA_basins_finished:0 "Completed $building_type_UBA_basins_01$"
 UBA_basins_unlocks_desc:0 "The #V $building_type_uba_aqueduct_01$, $building_type_uba_qanats_01$, $building_type_uba_bathroom_01$#! lines of [buildings|E] can be constructed in any [holding|E]"
# 图书馆
 building_type_UBA_academy_01:1 "The Library"
 building_type_UBA_academy_01_desc:0 "$building_UBA_academy_05_desc$"
 building_UBA_academy_01:0 "Little Library"
 building_UBA_academy_01_desc:0 "The library has a rich collection of books, ranging from small deeds to theological masterpieces. A treasure trove of knowledge lies within its walls."
 building_UBA_academy_02:0 "Transcription House"
 building_UBA_academy_02_desc:0 "Dedicated scribes work throughout the day, copying and organizing various books and documents. And some would also be responsible for transcribing their work for potential authors."
 building_UBA_academy_03:0 "Translation House"
 building_UBA_academy_03_desc:0 "Enthusiastic people are educated here in ancient and foreign languages. It is by the countless scribes who are long in the tooth that we have been able to preserve the wisdom of the ancients."
 building_UBA_academy_04:0 "Forbidden House"
 building_UBA_academy_04_desc:0 "Less common books and documents are housed in the Forbidden Books Library, where strict confidentiality and security measures ensure that regular people have no access to these "dangerous" materials."
 building_UBA_academy_05:0 "Archives House"
 building_UBA_academy_05_desc:0 "The Great Library was voluminous, and the scribes burned to translate and preserve more of the great works of literature. Historical archives and documents were skillfully compartmentalized and brought together between uncounted shelves."
 UBA_academy_building:0 "Building under construction $building_type_UBA_academy_01$"
 UBA_academy_finished:0 "Built $building_type_UBA_academy_01$"
 UBA_academy_unlocks_desc:0 "The #V $building_type_uba_library_01$#! lines of [buildings|E] can be constructed in any [holding|E]"
# 花园
 building_type_UBA_garden_01:1 "The Garden"
 building_type_UBA_garden_01_desc:0 "$building_UBA_garden_05_desc$"
 building_UBA_garden_01:0 "Private Garden"
 building_UBA_garden_01_desc:0 "Large selected lots framed by stone walls. In this delightful place away from the world, the gardener tends the plants with care."
 building_UBA_garden_02:0 "Courtyard Garden"
 building_UBA_garden_02_desc:0 "The garden is beautifully laid out and adorned with fountains and sculptures in addition to well-manicured flowers and plants. In addition to personal relaxation, it can also be used for various social events."
 building_UBA_garden_03:0 "Magnificent Garden."
 building_UBA_garden_03_desc:0 "Wealthy and powerful people naturally need expensive and magnificent gardens. Under the care of a large group of gardeners, rare flowers, plants, and fruit trees from all over the world competed for attention."
 building_UBA_garden_04:0 "Royal Gardens"
 building_UBA_garden_04_desc:0 "Behind the flourishing beauty of the garden, hardworking gardeners and herbalists are trying to cultivate even better plants. Wonderful plants not only make this garden more wonderful, but also help to recover from diseases."
 building_UBA_garden_05:0 "Palace Garden"
 building_UBA_garden_05_desc:0 "This has become a stunning garden complex, where the gorgeous architecture and rare plants attract countless visitors from far and wide. Elaborately designed flower beds, sculptures and water features complement the spectacular palace and courtyard architecture, and it is every aristocrat's dream to own one of these gardens."
 UBA_garden_building:0 "Under construction $building_type_UBA_garden_01$"
 UBA_garden_finished:0 "Completed $building_type_UBA_garden_01$"
 UBA_garden_unlocks_desc:0 "The #V $building_type_uba_herbal_01$#!, #V $building_type_uba_olive_01$#!, #V $building_type_uba_vineyard_01$#!, #V $building_type_uba_tea_01$#!, #V $building_type_uba_silk_01$#! lines of [buildings|E] can be constructed in any [holding|E]"
# 秘宫
 building_type_UBA_secret_01:1 "The Secret-Palace"
 building_type_UBA_secret_01_desc:0 "$building_UBA_secret_05_desc$"
 building_UBA_secret_01:0 "Courtyard of Secret"
 building_UBA_secret_01_desc:0 "The shadowy palace lurks between deep mountains and dense forests, with entrances and exits hidden by dense vegetation, so that only very few people are aware of its existence. Unknown secrets lurk within that courtyard."
 building_UBA_secret_02:0 "Garden of Illusions"
 building_UBA_secret_02_desc:0 "Within the secret palace is a secretive garden that looks beautiful and alluring, but is actually full of danger. Visitors who are not careful will be mesmerized by the secret medicine, thus getting lost between the real and fake flowers, plants, trees and sculptures and decorations."
 building_UBA_secret_03:0 "Fortress of Labyrinth"
 building_UBA_secret_03_desc:0 "The interior of the castle is so intricately structured that it is difficult for anyone to figure out the layout on their own. The true route is cleverly hidden between errant forks in the road by deliberately designed lighting conditions, making it almost impossible to find the correct path without someone in the know to guide you."
 building_UBA_secret_04:0 "Dungeon of Desperation"
 building_UBA_secret_04_desc:0 "Those most wretched and unfortunate of prisoners are held in the dungeons within this heavy labyrinth, with all sorts of tight surveillance and other security measures outside their cells. Even if the guards were removed and the cells opened, these prisoners might not be able to find their way out."
 building_UBA_secret_05:0 "Throne of Shadows"
 building_UBA_secret_05_desc:0 "The sun is sinking in the west, the night is falling,\n and the king of the night is about to take the power of the earth. \n He is high above the throne and casts a lurid dark shadow."
 UBA_secret_building:0 "Building under construction $building_type_UBA_secret_01$"
 UBA_secret_finished:0 "Built $building_type_UBA_secret_01$"
 UBA_secret_unlocks_desc:0 "The #V $building_type_uba_private_01$#! lines of [buildings|E] can be constructed in any [holding|E]"
# 猎场
 building_type_UBA_hunting_01:1 "The Hunting-park"
 building_type_UBA_hunting_01_desc:0 "$building_UBA_hunting_01_desc$"
 building_UBA_hunting_01:0 "Hunting grounds"
 building_UBA_hunting_01_desc:0 "Large tracts of undeveloped land are designated as preserves, and unauthorized hunters are will be prohibited from entering to ensure that the owners of the hunting grounds always get enough game."
 building_UBA_hunting_02:0 "Kennels and Birdhouses"
 building_UBA_hunting_02_desc:0 "Hounds and falcons are good companions for hunters. They are entrusted to specialized care during the weekdays, while they become the hunter's helpers during the hunt."
 building_UBA_hunting_03:0 "Fences and Stables"
 building_UBA_hunting_03_desc:0 "$building_hunting_grounds_05_desc$"
 building_UBA_hunting_04:0 "Hunting Lodge"
 building_UBA_hunting_04_desc:0 "$building_legendary_hunting_lodge_desc$"
 building_UBA_hunting_05:0 "Royal Hunting Lodge"
 building_UBA_hunting_05_desc:0 "Functional buildings for both hunting and living are constructed on the edge of the hunting grounds. In addition to the regular hunting pavilions there is also a luxurious hunting palace with a spacious interior featuring living rooms, bedrooms and banqueting halls as well as fully equipped kitchens and recreational facilities."
 UBA_hunting_building:0 "Under construction $building_type_UBA_hunting_01$"
 UBA_hunting_finished:0 "Completed $building_type_UBA_hunting_01$"
 UBA_hunting_unlocks_desc:0 "The #V $building_type_horse_pastures_01$#!, #V $building_type_uba_fur_01$#! lines of [buildings|E] can be constructed in any [holding|E]"
# 牧场
 building_type_UBA_pasture_01:1 "The Pasture"
 building_type_UBA_pasture_01_desc:0 "$building_UBA_pasture_01_desc$"
 building_UBA_pasture_01:0 "Natural Pasture"
 building_UBA_pasture_01_desc:0 "Our grazing depends on the gifts of nature. The vast grasslands provide rich pasture and water, and our livestock - goats, sheep, horses, camels and cattle - run free on the grasslands."
 building_UBA_pasture_02:0 "Rotational Grazing"
 building_UBA_pasture_02_desc:0 "In order to chase better quality pasture and water, we adjust the ratio of the five animals according to the seasonal changes and the environmental characteristics of different pastures, and move the livestock to the most suitable areas for grazing, so as to keep the herd growing."
 building_UBA_pasture_03:0 "Water Maintenance"
 building_UBA_pasture_03_desc:0 "Water sources on the prairie are critical. We have begun to maintain and dredge natural water sources and dig simple wells to ensure adequate water for livestock even during the dry season."
 building_UBA_pasture_04:0 "Five Livestock Control"
 building_UBA_pasture_04_desc:0 "The pastures are divided into zones, and livestock rotate through the different zones to allow vegetation to recover and maintain the fertility of the pasture. We will also examine the carrying capacity of different pastures and the types of livestock suitable for grazing, so as to adjust the ratio of the five livestock to suit different environments."
 building_UBA_pasture_05:0 "Livestock Sheds."
 building_UBA_pasture_05_desc:0 "During periods of extreme weather or disease epidemics, these livestock pens provide shelter for livestock and reduce losses. The usual stockpile of hay and fodder also ensures that livestock populations are stabilized during periods of poor natural conditions."
 UBA_pasture_unlocks_desc:0 "$UBA_hunting_unlocks_desc$"
# 王庭
 building_type_UBA_yurt_01:0 "The Khan's Court"
 building_type_UBA_yurt_01_desc:0 "$building_UBA_yurt_05_desc$"
 building_UBA_yurt_01:0 "Yurt of Khan"
 building_UBA_yurt_01_desc:0 "The Khan's yurt was a well-sited, relatively permanent residence, and the center of power on the steppe. From here the Khan's orders are transmitted across the steppe, and here the Khan's vassals swear an oath of loyalty."
 building_UBA_yurt_02:0 "Gatherings of Tribes"
 building_UBA_yurt_02_desc:0 "As his power expanded, more representatives of the clans and warriors gathered around the Khan's tent. This place gradually became a meeting place for the clans, where important ceremonies were held from time to time, military campaigns were discussed, and tribute from vassals was received."
 building_UBA_yurt_03:0 "Camp of Kheshig"
 building_UBA_yurt_03_desc:0 "Stronger fortifications were constructed around the Khan's royal court, and the Khan's own guards were stationed in camps around the Great Tent, and were more than enough to dissuade any would-be rebels from disrespectful thoughts. Every tribe in the steppe will prostrate themselves at the Khan's feet."
 building_UBA_yurt_04:0 "Hall of Audience"
 building_UBA_yurt_04_desc:0 "The magnificent and ornate Hall of Audience has been completed, where envoys from vassal and tribute states are able to visit the Great Khan. Those who came were either shocked by the majesty and wealth of the Khan, or so frightened by the swords of his personal guards that they had no more thoughts of rebellion."
 building_UBA_yurt_05:0 "The Seat of the Khan"
 building_UBA_yurt_05_desc:0 "The royal court is the very center of undisputed power on the steppe. Strong fortifications, a massive military force, and a well-established administration allowed the Khan to effectively control the vast territories and numerous vassals under his rule. With an endless stream of envoys and tributes from all parts of the world, the Khan's authority reigned supreme."
 UBA_yurt_building:0 "Under construction $building_type_UBA_yurt_01$"
 UBA_yurt_finished:0 "Completed $building_type_UBA_yurt_01$"
 UBA_pasture_unlocks_desc:0 "$UBA_hunting_unlocks_desc$"