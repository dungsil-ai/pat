l_english:
# 决议组
 decision_group_type_uba: "Architect Decisions"
# 按钮UI本地化
  UBA_ESTABLISH_BUILDING_NAME_LABEL:0 "Name:"
  UBA_ESTABLISH_BUILDING_CAPITAL_LABEL:0 "Location:"
  UBA_ESTABLISH_BUILDING_CHANGE_CAPITAL:1 "Change Location"
  UBA_ESTABLISH_BUILDING_SELECT_CAPITAL:1 "Select Location"

# 建造奇观
  uba_building_decision:0 "Construct Wonder"
  uba_building_decision_tooltip:0 "Add a unique special building at the specified location"
  uba_building_decision_desc:0 "Life is but a fleeting moment.\nAfter I depart from this world, how many people will still remember my name? In order for people to remember me, I must leave a deeper mark on this world, such as...\n\nA Magnificent Wonder."
  uba_building_decision_confirm:0 "Making a plan"

# 拆除奇观
 uba_remove_building_decision:0 "Clear Ground for a Wonder Building"
 uba_remove_building_decision_tooltip:0 "Remove a special building from the designated location"
 uba_remove_building_decision_effect:0 "Remove special building from designated location to make space for future construction."
 uba_remove_building_decision_desc:0 "Having a unique building isn't always advantageous, especially when I want to make space for a greater construction.\n\n- Perhaps I could pay the architects to tear down this annoying structure..."
 uba_remove_building_decision_confirm:0 "Free up Space"

# 游牧升级
 uba_nomadic_building_decision:0 "Upgrade Nomadic Wonders"
 uba_nomadic_building_decision_tooltip:0 "Upgrade my nomadic special buildings"
 uba_nomadic_building_decision_effect:0 "Upgrade nomadic special buildings at the location"
 uba_nomadic_building_decision_desc:0 "This land belongs to me, the #EMP great#! [ROOT.Char.GetTitleAsNameNoTooltip]! My people will always remember my achievements... #EMP and my buildings. #!"
 uba_nomadic_building_decision_confirm:0 "Just do it"

# 开关决议
 uba_decision_off:0 "Hide Architects' Decisions"
 uba_decision_off_tooltip:0 "Hide decisions of Architect Collection MODs"
 uba_decision_off_effect:0 "The decisions of Architect Collection MODs will be hidden and can be enabled again through another decision"
 uba_decision_off_desc:0 "I suddenly realized that building an eternal building is an unrealistic and even stupid idea. Maybe I should get rid of these useless architects and craftsmen and spend the money saved in something more valuable. The place."
 uba_decision_off_confirm:0 "Dismissal of Architects"
 uba_decision_on:0 "Show Architects' Decisions"
 uba_decision_on_tooltip:0 "Show decisions of Architect Collection MODs"
 uba_decision_on_effect:0 "The decisions of Architect Collection MODs will be restored and can be hidden again through another decision"
 uba_decision_on_desc:0 "The idea of building a wonder that will last forever is still spinning in my head!\nI should probably call those architects back. Now I have even better ideas that I need them to realize..."
 uba_decision_on_confirm:0 "Call the Architects!"

# 选项要求
uba_no_nomad_tt: "You must don't have $government_is_nomadic$"
uba_cost_tt: "You must have at least [SCOPE.ScriptValue('uba_decision_cost')|0][gold_i]！"
uba_diplomacy_tt: "You must have [diplomacy|E][lifestyle_trait|E], [education_trait|E] or [GetTrait('architect').GetName( GetNullCharacter )][trait|E]"
uba_martial_tt: "You must have [martial|E][lifestyle_trait|E], [education_trait|E] or [GetTrait('architect').GetName( GetNullCharacter )][trait|E]"
uba_stewardship_tt: "You must have [stewardship|E][lifestyle_trait|E], [education_trait|E], [GetTrait('education_republican_knowledge_3').GetName( GetNullCharacter )] line's [traits|E], or [GetTrait('architect ').GetName( GetNullCharacter )][trait|E]"
uba_learning_tt: "You must have [learning|E][lifestyle_trait|E], [education_trait|E] or [GetTrait('architect').GetName( GetNullCharacter )][trait|E]"
uba_travel_tt: "You must have [GetTrait('lifestyle_traveler').GetName( GetNullCharacter )], [GetTrait('pilgrim').GetName( GetNullCharacter )], [GetTrait('lifestyle_hunter').GetName( GetNullCharacter )]or[GetTrait('architect').GetName( GetNullCharacter )][trait|E]"
uba_lifestyle_tt: "You must have [GetTrait('lifestyle_mystic').GetName( GetNullCharacter )], [GetTrait('lifestyle_herbalist').GetName( GetNullCharacter )], [GetTrait('lifestyle_gardener').GetName( GetNullCharacter )], [GetTrait('lifestyle_physician').GetName( GetNullCharacter )], [GetTrait('witch').GetName( GetNullCharacter )]or[GetTrait('architect').GetName( GetNullCharacter )][trait|E]"
uba_intrigue_tt: "You must have [intrigue|E][lifestyle_trait|E], [education_trait|E]"
uba_nomad_tt: "You must have [herd|E] or [GetTrait('nomadic_philosophy').GetName( GetNullCharacter )][trait|E]"
uba_cash_tt: "You must have...#color_yellow enough courage#! "
uba_wall_tt: "You must have...#color_yellow enough strength#! "

# 选项名称
uba_building_decision_diplomacy: "The Way of Diplomacy"
uba_building_decision_diplomacy_desc: "Diplomacy is the art of words, and my words can bring the hardest of hearts to their knees."
uba_diplomacy_tooltip: "$uba_building_decision_diplomacy_desc$"
uba_building_decision_martial: "The Way of Martial"
uba_building_decision_martial_desc: "Even in seemingly impossible military situations, I can turn defeat into victory."
uba_martial_tooltip: "$uba_building_decision_martial_desc$"
uba_building_decision_stewardship: "The Way of Stewardship"
uba_building_decision_stewardship_desc: "With a little skill, I can turn a failing business into a profitable one."
uba_stewardship_tooltip: "$uba_building_decision_stewardship_desc$"
uba_building_decision_learning: "The Way of Learning"
uba_building_decision_learning_desc: "There is almost no profound knowledge, sacred or secular, that I have never dabbled in."
uba_learning_tooltip: "$uba_building_decision_learning_desc$"
uba_building_decision_travel: "The Way of Travel"
uba_building_decision_travel_desc: "I have traveled countless roads and seen half of the world."
uba_travel_tooltip: "$uba_building_decision_travel_desc$"
uba_building_decision_lifestyle: "The Way of Life"
uba_building_decision_lifestyle_desc: "One must imagine Sisyphus happy."
uba_lifestyle_tooltip: "$uba_building_decision_lifestyle_desc$"
uba_building_decision_intrigue: "The Secret of Intrigue"
uba_building_decision_intrigue_desc: "I am a whisper in the wind, a shadow on the wall."
uba_intrigue_tooltip: "$uba_building_decision_intrigue_desc$"
uba_building_decision_nomad: "The Breath of Steppe"
uba_building_decision_nomad_desc: "The sky is like a vast dome, covering the entire landscape. Sheep and kine beholds the blast."
uba_nomad_tooltip: "$uba_building_decision_nomad_desc$"
uba_building_decision_cash: "The Wish of Wealth "
uba_building_decision_cash_desc: "$trait_avaricious_desc$\n\nHowever, at this moment, the cabinet behind me moved inappropriately..."
uba_cash_tooltip: "$uba_building_decision_cash_desc$"
uba_building_decision_wall: "The Miracle of Engineering"
uba_building_decision_wall_desc: "$trait_architect_desc$"
uba_wall_tooltip: "$uba_building_decision_wall_desc$"

## 旧版决议
 uba_building_decision_1:0 "#EMP Wonders:#! Planning the Site"
 uba_building_decision_1_tooltip:0 "Specify a location to build a unique and special building."
 uba_building_decision_1_effect:0 "Choose a suitable location for this major construction project"
 uba_building_decision_1_desc:0 "Life is only a blink of an eye.\nAfter I pass away, how many people will still remember my name? In order for everyone to remember me, I must leave a more profound impression on this world. Imprints like - #EMP a great building #!"
 uba_building_decision_1_confirm:0 "Be prepared"

 uba_building_decision_2:0 "#EMP Wonders:#! Choices of Wonders"
 uba_building_decision_2_tooltip:0 "Construct a unique and special building at a designated location"
 uba_building_decision_2_effect:0 "Determine what special building will be built next"
 uba_building_decision_2_desc:0 "Now, I must think about the most important question:\nHow do I want to be remembered?\n\nThis building will profoundly change #bold [ROOT.Var('uba_building_location ').Province.GetName]#!, I need to decide carefully."
 uba_building_decision_2_confirm:0 "Get to work!"

 uba_building_decision_3:0 "[AoWs]Undo Site Selection"
 uba_building_decision_3_tooltip:0 "Undo the previously selected location for a special building"
 uba_building_decision_3_effect:0 "Undo the previously selected location for the special building"
 uba_building_decision_3_desc:0 "I suddenly realized:\n#bold [ROOT.Var('uba_building_location').Province.GetName]#! It may not be a suitable location for the project I envisioned. I now revoke my previous decision. Maybe it's not too late."
 uba_building_decision_3_confirm:0 "Undo Selection"