l_english:
 aurelian_walls_prefect_court_position: "Prefect of the Aurelian Walls"
 aurelian_walls_prefect_court_position_desc: "The Prefect of the Walls is the official charged with the command, maintenance, and security of Rome's great Aurelian Walls. A competent Prefect ensures the city's defenses are always at their peak readiness, the garrisons are vigilant, and the structures are sound."
 court_position_drunkard_trait: "Drunkard Trait"
 aurelian_walls_prefect_employer_custom_effect_description: "Prefect's ability grants the ruler the following effects:"
 
 aurelian_walls_prefect_task_focus_fortifications: "Focus on Fortifications"
 aurelian_walls_prefect_task_focus_fortifications_desc: "The Prefect is ordered to make the physical integrity of the walls their foremost duty. Resources will be channeled to stonemasons and engineers for constant repair and improvement of the ramparts, towers, and gates.\n\nThis intensive labor will significantly improve the city's defenses and attract investment, but at the cost of neglecting the training of our soldiers and the day-to-day management of the garrison."

 aurelian_walls_prefect_task_focus_maa: "Focus on Men-at-Arms Training"
 aurelian_walls_prefect_task_focus_maa_desc: "Under this directive, the Prefect transforms the city into a martial academy, using its facilities to rigorously drill our professional Men-at-Arms. These elite soldiers will become a deadlier fighting force, honed by constant training along the ramparts.\n\nThis focus on offensive power means our core army will be stronger in the field, but it comes at the expense of routine wall maintenance and the readiness of the general garrison."

 aurelian_walls_prefect_task_garrison: "Focus on Garrison Management"
 aurelian_walls_prefect_task_garrison_desc: "This task directs the Prefect to focus on the administrative duties of their office. They will optimize patrol routes, manage supply depots, and ensure the local levy garrisons are at full strength and well-drilled, making any siege a costly and lengthy affair for an attacker.\n\nWhile this creates a formidable active defense, the emphasis on the rank-and-file comes at the expense of specialized training for our elite soldiers and diverts attention from new construction projects."
 
 aurelian_walls_prefect_1: "Prefect's Fortification Focus"
 aurelian_walls_prefect_1_desc: "With the Prefect's attention fixed on stone and mortar, the Aurelian Walls have never been stronger. Masons and engineers constantly patrol the circuit, mending every crack and reinforcing every tower. This unwavering focus on infrastructure, however, means the training of our soldiers has lapsed. While the city itself is a mighty fortress, the men who would sally forth from it are less prepared for open battle."
 
 aurelian_walls_prefect_2: "Prefect's Training Focus"
 aurelian_walls_prefect_2_desc: "The city has been turned into a rigorous training ground. Under the Prefect's watchful eye, our Men-at-Arms drill relentlessly, their skills honed to a razor's edge. This intense regimen, however, has drawn resources away from more mundane duties. The walls see less maintenance and the general garrison is understrength. Our professional army is formidable, but the city's static defenses have weakened."
 
 aurelian_walls_prefect_3: "Prefect's Garrison Focus"
 aurelian_walls_prefect_3_desc: "The Prefect's full attention is on logistics and manpower. The city's garrison is at maximum strength, its supply depots are overflowing, and every sentinel knows their post. Any attacker would face a wall of men and a protracted, costly siege. This dedication to internal readiness, however, leaves little time for overseeing new construction."
 
 domestikos_of_the_walls_task_focus_fortifications: "Focus on Fortifications"
 domestikos_of_the_walls_task_focus_fortifications_desc: "The Domestikos is to dedicate all efforts to the physical upkeep of the mighty Theodosian Walls. Master builders and engineers will be tasked with shoring up the Outer Wall, dredging the great moat, and ensuring the structural integrity of the nearly two hundred towers. This focus on static defense, however, diverts resources and attention from the training of our elite Tagmata."
 
 domestikos_of_the_walls_task_focus_maa: "Focus on Tagmata Training"
 domestikos_of_the_walls_task_focus_maa_desc: "The City's training fields will echo with the clang of steel. The Domestikos will oversee the rigorous drilling of the elite Tagmata and the Varangian Guard, honing the Basileus's mailed fist into an even deadlier instrument of war. This focus on our professional soldiers comes at the cost of routine maintenance on the walls themselves; the city's shield is being neglected in favor of sharpening its sword."
 
 domestikos_of_the_walls_task_garrison: "Focus on Garrison Management"
 domestikos_of_the_walls_task_garrison_desc: "This task directs the Domestikos to ensure the city's defensive manpower is at its absolute peak. The garrison levies will be kept at full strength, the armories of the Blachernae will be filled to the brim, and patrol routes will be optimized for maximum vigilance. A well-managed garrison not only deters invaders but also ensures order among the city's vast populace."
 
 domestikos_of_the_walls_court_position: "Domestikos of the Walls"
 domestikos_of_the_walls_court_position_desc: "The Domestikos of the Walls is a prestigious military office, charged with the command and upkeep of the legendary Theodosian Walls of Constantinople. This officer is the ultimate shield of the Queen of Cities, requiring the martial prowess of a general to command its defenders and the stewardship of a master architect to maintain its complex, triple-layered defenses. Their skill is a direct measure of the capital's security."
 
 theodosian_walls_domestikos_1: "Domestikos's Fortification Focus"
 theodosian_walls_domestikos_1_desc: "Under the Domestikos's directive, the Theodosian Walls have become an even more formidable obstacle, their layers of defense meticulously maintained. Any army daring to assault the Queen of Cities will break upon its ramparts like waves against a cliff. However, with all eyes on the walls, the professional Tagmata have had their training budgets cut and their readiness for field campaigns has suffered."
 
 theodosian_walls_domestikos_2: "Domestikos's Training Focus"
 theodosian_walls_domestikos_2_desc: "The elite Tagmata are a force to be reckoned with, their skills honed to perfection by the Domestikos's intense training regimen within the capital. Our professional army is deadlier than ever. This battlefield focus, however, has led to a lapse in the maintenance of the city's complex defenses, leaving them more vulnerable to a determined siege."
 
 theodosian_walls_domestikos_3: "Domestikos's Garrison Focus"
 theodosian_walls_domestikos_3_desc: "The Domestikos has maximized the city's defensive manpower. The garrison is at full strength, its sentinels are vigilant, and its supply depots are full to bursting. The city is ready to endure the longest of sieges. This focus on the city's internal security has left our elite field army with less specialized training, slightly dulling their edge in open battle."
 