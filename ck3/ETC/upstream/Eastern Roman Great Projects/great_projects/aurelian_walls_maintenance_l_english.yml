l_english:

 great_project_type_aurelian_walls_maintenance: "Aurelian Walls Maintenance"
 great_project_type_aurelian_walls_maintenance_desc: "The great Aurelian Walls, the very skin of Rome, have fallen into a state of disgraceful decay. For centuries, this nineteen-kilometer circuit of brick and stone stood as a defiant shield, but generations of neglect have allowed it to crumble. Whole sections of the rampart are teetering, the towers are choked with ivy, and the once-mighty gates offer little more than rotted wood for defense.\n\nThis is not a project of glorious creation, but one of sober, essential duty. We will mend the gaping holes, reforge the gates, re-establish a permanent city garrison, and stock the granaries for a long siege. To undertake this is to restore the city's pride and ensure its security, making a resounding statement: so long as we rule, the Eternal City shall never be left vulnerable again."
 great_project_type_tooltip_aurelian_walls_maintenance: ""
 great_project_name_possessive_aurelian_walls_maintenance: ""
 great_project_name_aurelian_walls_maintenance: ""
 
 great_project_type_aurelian_walls_maintenance_contribution_towers: "Repair the Walls and Towers"
 great_project_type_aurelian_walls_maintenance_contribution_towers_desc: "This is the primary and most labor-intensive task. We must deploy an army of masons and laborers to work on the nineteen-kilometer circuit. They will raise scaffolding, replace the crumbled tufa blocks and fallen bricks, and clear the battlements of the vegetation that has consumed them, mending the scars of time."
 great_project_type_aurelian_walls_maintenance_contribution_name_towers: ""
 great_project_type_aurelian_walls_maintenance_contribution_gates: "Reforge the Gates"
 great_project_type_aurelian_walls_maintenance_contribution_gates_desc: "A wall is only as strong as its weakest points. The ancient gates of Rome—the Flaminia, the Pinciana, the Praenestina—are now little more than rotten husks. This contribution will fund the forging of massive new gates of iron-banded oak, complete with new portcullises and reinforced hinges, ready to slam shut in the face of any invader."
 great_project_type_aurelian_walls_maintenance_contribution_name_gates: ""
 great_project_type_aurelian_walls_maintenance_contribution_urban_cohorts: "Re-establish the Urban Cohorts"
 great_project_type_aurelian_walls_maintenance_contribution_urban_cohorts_desc: "A fortified city needs a professional garrison, not just the local militia. We must revive the ancient Urban Cohorts, a dedicated force of soldiers sworn to the defense of the city itself. This will fund their recruitment, their training by veteran officers, and the forging of their arms and armor, giving Rome its own permanent guardians once more."
 great_project_type_aurelian_walls_maintenance_contribution_name_urban_cohorts: ""
 great_project_type_aurelian_walls_maintenance_contribution_granaries: "Restock the Siege Granaries"
 great_project_type_aurelian_walls_maintenance_contribution_granaries_desc: "True security means being able to endure a long siege. The city's ancient granaries and storehouses are empty, filled only with dust and rats. We must allocate funds to fill these vast chambers to the brim with grain, salted meat, barrels of oil, and reserves of arrows and spears, ensuring Rome can feed itself and fight back, even when cut off from the world."
 great_project_type_aurelian_walls_maintenance_contribution_name_granaries: ""
 great_project_type_aurelian_walls_maintenance_contribution_prefect: "Establish a Prefect of the Walls"
 great_project_type_aurelian_walls_maintenance_contribution_prefect_desc: "This decay was allowed to happen because no single authority was responsible for the walls' upkeep. We will create the permanent office of 'Prefect of the Walls,' a high-ranking official whose sole responsibility will be to manage the garrisons, oversee constant repairs, and ensure this vital defense is never again allowed to crumble."
 great_project_type_aurelian_walls_maintenance_contribution_name_prefect: ""

 aurelian_walls_neglected_modifier: "Neglected Aurelian Walls"
 aurelian_walls_neglected_modifier_desc: "The great walls of the Emperor Aurelian bear the deep scars of time. Whole sections of the rampart have crumbled, towers are choked with ivy, and its gates are more rotten wood than solid defense. What was once an unbroken ring of defiance is now a porous border, offering a mere suggestion of strength and making the city dangerously vulnerable to a determined assault."

 aurelian_walls_maintained_modifier: "Maintained Aurelian Walls"
 aurelian_walls_maintained_modifier_desc: "The Aurelian Walls stand proud once more, a testament to our will and prosperity. The circuit is unbroken, its towers manned by vigilant sentinels, and its gates forged of solid iron and oak. The Eternal City is now a true bastion, capable of defying the mightiest of armies and weathering the longest of sieges. Rome is secure."

 aurelian_walls_maintenance.0001.t: "The Towers are Repaired"
 aurelian_walls_maintenance.0001.desc: "My lord, the master mason has sent his final report. The scaffolding is coming down, revealing seamless brickwork where there were once gaping holes. The towers stand solid and true, their foundations reinforced and their battlements cleared. The physical structure of the wall is whole once more."
 aurelian_walls_maintenance.0001.a: "A satisfying display of strength."

 aurelian_walls_maintenance.0002.t: "The Gates are Reforged"
 aurelian_walls_maintenance.0002.desc: "My lord, a triumphant message from the city prefect. The last of the new gates has been installed. Their iron bolts slide home with a resounding boom that echoes through the streets, a sound of security the Romans have not heard in an age. The city's entrances are no longer vulnerabilities, but formidable barriers."
 aurelian_walls_maintenance.0002.a: "A most reassuring sound"

 aurelian_walls_maintenance.0003.t: "The Urban Cohorts are Established"
 aurelian_walls_maintenance.0003.desc: "My lord, the first of the newly-established Urban Cohorts have begun their patrol. Their disciplined march and gleaming armor are already a welcome sight for the citizenry. Watchfires now burn on the towers every night, manned by trained soldiers whose sole duty is the defense of Rome."
 aurelian_walls_maintenance.0003.a: "Rome is once again a military city."

 aurelian_walls_maintenance.0004.t: "Granaries are Stocked"
 aurelian_walls_maintenance.0004.desc: "My lord, a report from the quartermaster. The city's storehouses are now filled to capacity. The sheer quantity of provisions would allow Rome to withstand a siege for years on end. The people can sleep soundly, knowing their city will not starve."
 aurelian_walls_maintenance.0004.a: "Foresight is the sharpest weapon."

 aurelian_walls_maintenance.0005.t: "Prefect of the Walls Title Established"
 aurelian_walls_maintenance.0005.desc: "My lord, a Prefect of the Walls has been formally appointed and has taken up their duties. Their office is already conducting audits of the wall's integrity and setting budgets for future maintenance. A chain of command and accountability has been forged to safeguard our investment for generations to come."
 aurelian_walls_maintenance.0005.a: "A legacy of stewardship."
 
 aurelian_walls_maintenance.0006.t: "The Aurelian Walls Stand Proud!"
 aurelian_walls_maintenance.0006.desc: "The final report has arrived, and the great work is done. The Aurelian Walls have been restored to their former glory. From every hill in Rome, the people can see the unbroken ring of defiant brick and stone that now encircles their home. Strong new gates bar the way, vigilant cohorts patrol the battlements, and the city's granaries are full.\n\nMore than just stone and mortar has been restored—it is the city's pride and its sense of security. Rome is no longer a vulnerable relic but a living fortress, a symbol of our power and a bastion of civilization ready to defy any army that dares approach its gates. The heart of the world is secure once more."
 aurelian_walls_maintenance.0006.a: "Let the barbarians rage. We are ready."

 aurelian_walls_maintenance.0007.t: "Rome's Shame"
 aurelian_walls_maintenance.0007.desc: "The great project to restore the Aurelian Walls has collapsed into embarrassing failure. Vast sums have been squandered for nothing, and the reports from the city are of a project in utter disarray.\n\nThe masons have abandoned their posts, leaving half-repaired sections of the wall even more unstable than before. The once-proud Urban Cohorts have disbanded before they were even fully trained, their wages unpaid. The city is now a testament to our folly, its decaying walls a public monument to our incompetence. The Eternal City is more vulnerable than ever."
 aurelian_walls_maintenance.0007.a: "An embarrassing debacle."
 
 aurelian_walls_maintenance.0008.t: "The Patient Siege of Time"
 aurelian_walls_maintenance.0008.desc: "A century ago, your ancestor performed a great service to Rome, restoring its ancient walls to their former glory. But time is an enemy that never rests.\n\nThrough generations of peace and shifting priorities, the vigilance waned. The once-vital office of the Prefect of the Walls became a comfortable sinecure for court favorites. Budgets for maintenance were slowly diverted to more pressing vanities. A hundred harsh winters have left their mark, and the patient siege of time has finally succeeded where armies would have failed.\n\nThe circle has turned. The walls are once again a porous border, its towers crumbling and its gates weakened. Rome is vulnerable again, awaiting a leader with the will to restore its shield."
 aurelian_walls_maintenance.0008.a: "The duty falls to me now."

 
 ROME_LOCATION_1_TOOLTIP: "Rome is within your realm"

