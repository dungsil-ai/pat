l_english:

  roaming_turkish_bands_modifier: "Roaming Turkic Bands"
  roaming_turkish_bands_modifier_desc: "Constant raids by Turkic bands have turned this county into a perilous frontier. The local economy has collapsed, development has ceased, and the land has become dangerously hostile terrain for all but the raiders themselves."
  fortified_frontier_modifier: "Fortified Frontier"
  fortified_frontier_modifier_desc: "Following a concentrated Imperial effort, this county has been pacified and heavily fortified. New defenses stand ready against any threat, Imperial authority is unquestioned, and the people enjoy a security they have not known for a generation."
  abandoned_project_modifier: "Abandoned Project"
  abandoned_project_modifier_desc: "The great project to pacify the frontier has been abandoned before its completion. Resources have been squandered, and hope has been squandered along with them. My vassals see this as a sign of weakness and indecisiveness, a black mark on my reign that will not soon be forgotten."
 
  great_project_type_fortify_armenia: "Fortify Armenia"
  great_project_type_fortify_armenia_desc: "The Armenian frontier has long been a bleeding wound in the side of the Empire. Constant raids have devastated the countryside, turning prosperous themes into perilous borderlands. It is time to commit the full might of the state to this region, restoring its fortifications, securing its mountain passes, and reaffirming Imperial authority over these vital lands."
  great_project_type_tooltip_fortify_armenia: "A series of military and civil initiatives to pacify the Armenian frontier"
  great_project_name_fortify_armenia: ""
  great_project_name_possessive_fortify_armenia: ""

  great_project_type_fortify_armenia_contribution_walls_of_melitene: "Restore the Walls of Melitene"
  great_project_type_fortify_armenia_contribution_name_walls_of_melitene: ""
  great_project_type_fortify_armenia_contribution_walls_of_melitene_desc: "Melitene stands as the gateway to Cappadocia and a critical bulwark against incursions from the east. Its ancient walls, once formidable, have suffered from neglect and repeated sieges. By funding the complete restoration and modernization of its defenses, we can turn Melitene into an unbreachable fortress, a beacon of Imperial strength that will anchor our control over the entire region."
  great_project_type_fortify_armenia_contribution_manzikert_garrison: "Establish the Manzikert Garrison"
  great_project_type_fortify_armenia_contribution_name_manzikert_garrison: ""
  great_project_type_fortify_armenia_contribution_manzikert_garrison_desc: "The fields near Manzikert are hallowed ground, a testament to both our greatest sorrows and our enduring resolve. To leave it undefended is to invite disaster. We must establish a permanent, well-supplied garrison here. These soldiers will not only defend the fortress but actively patrol the surrounding lands, hunting down roaming bands and restoring Imperial law where it has long been absent."
  great_project_type_fortify_armenia_contribution_secure_passes: "Secure the Mountain Passes"
  great_project_type_fortify_armenia_contribution_name_secure_passes: ""
  great_project_type_fortify_armenia_contribution_secure_passes_desc: "The raiders do not march in great armies but flow like water through the countless unguarded passes of the Taurus and Armenian Highlands. We will fund elite contingents of locally-recruited Akritoi, men who know these mountains as their own backyard. They will establish watchtowers, lay ambushes, and make the traditional raiding routes impossibly hazardous."
  great_project_type_fortify_armenia_contribution_rebuild_farms: "Sponsor the Reconstruction of Farmlands"
  great_project_type_fortify_armenia_contribution_name_rebuild_farms: ""
  great_project_type_fortify_armenia_contribution_rebuild_farms_desc: "A fortress cannot stand without bread, nor an army without supply. The farmlands of Armenia have been systematically devastated, their people fled or put to the sword. We will offer Imperial grants and tax exemptions to colonists willing to return, funding the reconstruction of villages, irrigation canals, and mills. A prosperous and populated countryside is a defense in itself."
  great_project_type_fortify_armenia_contribution_patronize_monasteries: "Patronize the Local Monasteries"
  great_project_type_fortify_armenia_contribution_name_patronize_monasteries: ""
  great_project_type_fortify_armenia_contribution_patronize_monasteries_desc: "In these troubled times, faith is often the last shield of the common folk. The monasteries of Armenia have served as sanctuaries, repositories of knowledge, and centers of communal life. By offering our patronage, we not only ensure their survival but also win the hearts and minds of the people. Their prayers will bless our efforts, and their influence will reinforce loyalty to the Throne."
  
  VASPURAKAN_LOCATION_1_TOOLTIP: "Theme of Vaspurakan is within your realm"
  MESOPOTAMIA_LOCATION_2_TOOLTIP: "Theme of Mesopotamia is within your realm"

  turkish_incursions_events.0001.t: "The Walls of Melitene Rise"
  turkish_incursions_events.0001.desc: "Your generous sponsorship has borne fruit. Imperial engineers and legions of stonemasons have worked tirelessly, and the reports from Melitene are glowing. The old, crumbling walls have been torn down and replaced with modern fortifications, complete with higher curtain walls and reinforced towers.\n\nThe city now stands as a testament to Imperial resolve, a formidable bastion that will surely give any future aggressor pause. The people of Melitene celebrate your name, secure in the knowledge that their Emperor has not forgotten them."
  turkish_incursions_events.0001.a: "A bastion of Imperial might."
  turkish_incursions_events.0002.t: "The Manzikert Garrison Assembles"
  turkish_incursions_events.0002.desc: "Under your orders, a detachment of professional soldiers has arrived at the fortress of Manzikert. Their gleaming standards, raised high over the battlements, have brought a new sense of order and security to the surrounding countryside.\n\nNo longer will Turkic bands roam these historic fields with impunity. The garrison's commander has already begun aggressive patrols, and the local populace, long accustomed to fear, can finally breathe a sigh of relief. The lesson is clear: Imperial authority has returned."
  turkish_incursions_events.0002.a: "Order is restored."
  turkish_incursions_events.0003.t: "The Passes are Secured"
  turkish_incursions_events.0003.desc: "The hardened Akritoi, funded by your treasury, have proven their worth a hundred times over. Their intimate knowledge of the Armenian highlands has allowed them to outmaneuver the raiders at every turn. Watchtowers now stand sentinel over key routes, and the charred remains of ambushed warbands serve as a grim warning to others.\n\nWord spreads quickly among the Turks: the mountains are no longer safe passage. The flow of raiders into the theme has slowed to a trickle, thanks to the bravery of these frontier warriors."
  turkish_incursions_events.0003.a: "Their bravery will not be forgotten."
  turkish_incursions_events.0004.t: "The Land Recovers"
  turkish_incursions_events.0004.desc: "The promise of Imperial grants has brought life back to the desolate farmlands of Armenia. Where once there were only burnt fields and abandoned villages, new settlements are now taking root. The sight of smoke rising from new hearths and the sound of mills grinding once more is a powerful symbol of our renewal.\n\nThe return of a productive peasantry not only revitalizes the economy but also strengthens our hold on the land. A populated and prosperous countryside is the true foundation of a secure frontier."
  turkish_incursions_events.0004.a: "The foundation of our strength is the land."
  turkish_incursions_events.0005.t: "The Blessings of the Church"
  turkish_incursions_events.0005.desc: "Your piety has not gone unnoticed. The monasteries of Armenia, newly enriched by your patronage, have become beacons of hope amid the turmoil. They distribute alms to the needy, tend to the sick, and offer sanctuary to the displaced.\n\nIn return, the abbots preach loyalty to the throne from their pulpits, and the monks offer daily prayers for the success of your project and the health of your soul. Your support for the Church has solidified your reputation as a just and godly ruler among the people."
  turkish_incursions_events.0005.a: "Our piety is its own reward."

  master_of_fortifications_modifier: "Master of Fortifications"
  master_of_fortifications_modifier_desc: "Overseeing the massive reconstruction of Melitene's walls has granted me invaluable insight into large-scale engineering and logistics. These lessons will surely aid in future construction endeavors."
  frontier_commander_modifier: "Frontier Commander"
  frontier_commander_modifier_desc: "Establishing a permanent garrison in a volatile region has honed my military and administrative skills. I have learned much about maintaining order and projecting authority in the borderlands."
  akritoi_patron_modifier: "Akritoi Patron"
  akritoi_patron_modifier_desc: "My patronage of the Akritoi has yielded more than just secure passes. Studying their skirmishing tactics and frontier warfare has given me a new appreciation for the art of the ambush and the importance of personal valor."
  imperial_reclaimer_modifier: "Imperial Reclaimer"
  imperial_reclaimer_modifier_desc: "By sponsoring the reconstruction of the devastated farmlands, I have gained a deep understanding of economic revitalization. A prosperous peasantry is the bedrock of a strong state, and my own domains shall benefit from this knowledge."
  church_patronage_modifier: "Church Patronage"
  church_patronage_modifier_desc: "My generous patronage of the local monasteries has earned me a reputation as a pious and benevolent ruler. The prayers of the faithful follow me, and the clergy speaks my name with reverence."

  turkish_incursions_events.1000.t: "The Armenian Frontier is Secured"
  turkish_incursions_events.1000.desc: "The final reports arrive at the palace, bound in Imperial silk. After years of tireless effort and colossal expense, the Great Project is complete. The Armenian frontier, once a bleeding wound in the side of the Empire, has been cauterized and shielded.\n\nMelitene's new walls defy any aggressor. The Manzikert garrison projects our authority far and wide. The hardy Akritoi hold the mountain passes, turning them into deathtraps for the foolhardy. Below, the land heals as farmers return to their fields, their work doubly blessed by the prayers of the monasteries I so generously patronized.\n\nThe age of the roving Turkic bands is over. Peace, and unquestioned Imperial authority, have returned to Armenia."
  turkish_incursions_events.1000.a: "A triumph of Imperial will!"
  turkish_incursions_events.1001.t: "The Armenian Project is Abandoned"
  turkish_incursions_events.1001.desc: "The strain is too much. The Imperial treasury bleeds gold, our legions are needed elsewhere, and my will begins to falter. I have no choice but to issue the proclamation: the Great Project to stabilize Armenia is abandoned.\n\nWork grinds to a halt. The half-built walls of Melitene now mock our ambition. The promise of security I made to the people of Armenia has been broken, and the land remains vulnerable. My vassals will not forget this show of weakness, and the weight of this failure settles heavily upon my soul."
  turkish_incursions_events.1001.a: "A bitter, necessary evil..."
 
  CILICIA_LOCATION_1_TOOLTIP: "Theme of Cilicia is within your realm"
  CHARSIANON_LOCATION_2_TOOLTIP: "Theme of Charsianon is within your realm"
  CAPPADOCIA_LOCATION_3_TOOLTIP: "Theme of Cappadocia is within your realm"
 
  great_project_type_fortify_anatolia: "Fortify Anatolia"
  great_project_type_fortify_anatolia_desc: "Anatolia is the heart of the Empire, yet its defenses have crumbled and its people suffer under the constant threat of Turkic raiders. The old theme system is stretched to its breaking point, and the great cities are no longer the impregnable bastions they once were.\n\nOnly a concerted Imperial effort -a Great Project of immense scale- can restore security to our heartland. We must rebuild the fortifications, restore the ancient roads, and re-establish Imperial authority from the Aegean coast to the Taurus Mountains. It will be a monumental undertaking, but the survival of the Empire depends on it."
  great_project_type_tooltip_fortify_anatolia: "Begin a massive project to secure the vital regions of Anatolia."
  great_project_type_fortify_anatolia_confirm: "The Heart of the Empire Must Be Shielded"
  great_project_name_fortify_anatolia: ""
  great_project_name_possessive_fortify_anatolia: ""

  great_project_type_fortify_anatolia_contribution_kaisereia: "Refortify Kaisereia"
  great_project_type_fortify_anatolia_contribution_name_kaisereia: ""
  great_project_type_fortify_anatolia_contribution_kaisereia_desc: "The great city of Kaisereia is the strategic anchor of Cappadocia. By funding the complete reconstruction of its ancient walls, we will create a formidable fortress to command the eastern plateau and inspire loyalty in the local populace."
  great_project_type_fortify_anatolia_contribution_cilician_gates: "Secure the Cilician Gates"
  great_project_type_fortify_anatolia_contribution_name_cilician_gates: ""
  great_project_type_fortify_anatolia_contribution_cilician_gates_desc: "The Cilician Gates are the historic gateway between the Anatolian plateau and the south. For millennia, armies have marched through this vital pass. By building a new series of forts and watchtowers to command this chokepoint, we can effectively bar the door to raiders and invaders."
  great_project_type_fortify_anatolia_contribution_veteran_settlements: "Grant Lands to Veteran Soldiers"
  great_project_type_fortify_anatolia_contribution_name_veteran_settlements: ""
  great_project_type_fortify_anatolia_contribution_veteran_settlements_desc: "The depopulated lands of Anatolia are an open invitation to raiders. By offering land grants to loyal veterans from the central armies, we can repopulate the countryside with a class of soldier-farmers. These hardened men will have a personal stake in defending their new homes, creating a bulwark of steel and resolve against any incursion."
  great_project_type_fortify_anatolia_contribution_roads: "Restore the Roman Roads"
  great_project_type_fortify_anatolia_contribution_name_roads: ""
  great_project_type_fortify_anatolia_contribution_roads_desc: "The magnificent road network of our Roman ancestors has fallen into disrepair, slowing our armies and strangling commerce. A significant investment will allow us to clear the paths, rebuild bridges, and place new milestones, ensuring our legions can march swiftly to any threat."
  great_project_type_fortify_anatolia_contribution_watchtowers: "Establish Watchtower Networks"
  great_project_type_fortify_anatolia_contribution_name_watchtowers: ""
  great_project_type_fortify_anatolia_contribution_watchtowers_desc: "The themes of Anatolia are vast, and raiders can strike without warning. By constructing a network of interconnected watchtowers on strategic hilltops, we can use signal fires to create an early-warning system, giving our garrisons precious time to intercept any incursion."

  turkish_incursions_events.0006.t: "Kaisereia Stands Defiant"
  turkish_incursions_events.0006.desc: "The vast sums dispatched from the Imperial treasury have been put to excellent use. Reports confirm that the walls of Kaisereia have been fully restored and improved with modern techniques. Its towers stand taller, its gates are reinforced with iron, and the populace cheers your name in the streets, secure behind their new shield."
  turkish_incursions_events.0006.a: "A true Imperial city, reborn!"
  turkish_incursions_events.0007.t: "The Gates are Barred"
  turkish_incursions_events.0007.desc: "Imperial engineers, protected by a strong military escort, have completed their work in the treacherous Cilician Gates. New stone forts now command the heights of the pass, their garrisons ever-watchful. Any hostile force attempting to pass through will now face a deadly gauntlet. The gateway to Anatolia is now firmly in our grasp."
  turkish_incursions_events.0007.a: "Let them try to pass now."
  turkish_incursions_events.0008.t: "The Sword and the Plowshare"
  turkish_incursions_events.0008.desc: "Your edict has been met with enthusiasm. All across the Anatolian themes, veteran Tagmata are turning in their marching boots for land deeds. These are not simple farmers; they are hardened soldiers who build their homes like small forts and train their sons in the ways of the sword.\n\nThe countryside is not only being repopulated, but militarized in a way that will make any raider think twice. Crucially, their loyalty to the throne is unshakable."
  turkish_incursions_events.0008.a: "New homes for old soldiers."
  turkish_incursions_events.0009.t: "The Empire's Arteries Flow"
  turkish_incursions_events.0009.desc: "The old Roman roads of Anatolia live again! Legions of workers have cleared away decades of overgrowth, repaired crumbling bridges, and laid down fresh pavement. Our armies can now move with astonishing speed, and commerce is invigorated as merchants and pilgrims travel the secure and reliable Imperial highways."
  turkish_incursions_events.0009.a: "All roads lead to Constantinople... and our legions march upon them."
  turkish_incursions_events.0010.t: "The Beacons of Anatolia"
  turkish_incursions_events.0010.desc: "From peak to peak, the signal fires now stand ready. The new watchtower network is complete, a shining example of Imperial ingenuity. The moment a raiding party is spotted, a chain of smoke and fire will alert the entire region. The element of surprise, long the raiders' greatest weapon, has been stolen from them."
  turkish_incursions_events.0010.a: "We will see them coming."

  master_builder_modifier: "Master Builder"
  master_builder_modifier_desc: "Overseeing the restoration of Kaisereia's massive walls has granted me invaluable insight into large-scale engineering and urban fortification."
  guardian_of_the_pass_modifier: "Guardian of the Pass"
  guardian_of_the_pass_modifier_desc: "My focus on securing the Cilician Gates has honed my understanding of strategic chokepoints and defensive warfare in mountainous terrain."
  veteran_settler_modifier: "Settler of Veterans"
  veteran_settler_modifier_desc: "By settling loyal veterans on the frontier, I have secured the land and the loyalty of my soldiers. This experience has taught me much about the synergy between military service and land ownership."
  road_warden_modifier: "Road Warden"
  road_warden_modifier_desc: "The monumental effort to restore the ancient roads has granted me a unique grasp of logistics. A marching army is a hungry army, and I now know how best to keep it supplied."
  vigilant_ruler_modifier: "Vigilant Ruler"
  vigilant_ruler_modifier_desc: "Organizing the watchtower network has instilled in me the paramount importance of intelligence and early warnings. To see a threat coming is to be halfway to defeating it."

  turkish_incursions_events.2000.t: "Anatolia is Secure"
  turkish_incursions_events.2000.desc: "After years of tireless effort and colossal expense, the Great Project is complete. The heartland of the Empire has been transformed. Fortified cities stand as immovable anchors, watchtowers guard the hills, the roads are swift and secure, and the Imperial garrisons are feared throughout the land.\n\nThe Turkic raiders who once plagued these lands now find themselves hunted and harried, their time of easy plunder is over. A new era of peace and security dawns for the people of Anatolia, all thanks to my vision and resolve."
  turkish_incursions_events.2000.a: "A victory for the ages!"
  turkish_incursions_events.2001.t: "The Anatolian Dream Crumbles"
  turkish_incursions_events.2001.desc: "The coffers are empty, the will is gone. I can no longer sustain the great effort to fortify Anatolia. The half-finished walls, abandoned work camps, and unpaved roads now stand as monuments to my failure.\n\nThe news spreads like wildfire, and my enemies rejoice. My vassals whisper of my weakness, and the people of Anatolia, their hopes of security dashed, sink back into despair. This is a dark day for the Empire, and a deep stain on my legacy."
  turkish_incursions_events.2001.a: "A bitter failure..."
 
  SEBASTEIA_LOCATION_2_TOOLTIP: "Theme of Sebasteia is within your realm"
  CHALDIA_LOCATION_1_TOOLTIP: "Theme of Chaldia is within your realm"

  great_project_type_fortify_pontus: "Fortify Pontus"
  great_project_type_fortify_pontus_desc: "The Pontus, our eagle's nest on the Black Sea, tenaciously clings to its Roman identity against all odds. Yet our hold is threatened. The ancient mountains that shield us also serve as conduits for raiders, and the Turkic tide laps at our southern borders in the Armenian Highlands.\n\nTo secure this vital, loyal region, we must launch a Great Project. We will rebuild the great city-fortresses, secure the coastline, and harness the martial spirit of the Pontic people. This land has long been a bastion of the Empire; it is time we reinforced its foundations."
  great_project_type_tooltip_fortify_pontus: "Begin a major project to secure the Pontic coast and its mountain frontiers."
  great_project_type_fortify_pontus_confirm: "The Black Sea Coast Must Be Ours"
  great_project_name_fortify_pontus: ""
  great_project_name_possessive_fortify_pontus: ""

  great_project_type_fortify_pontus_contribution_trebizond: "Rebuild the Walls of Trebizond"
  great_project_type_fortify_pontus_contribution_name_trebizond: ""
  great_project_type_fortify_pontus_contribution_trebizond_desc: "Trebizond is not merely a city; it is the heart, soul, and symbol of the Pontus. Its legendary walls, built and rebuilt since antiquity, are in desperate need of reinforcement. By funding a complete overhaul of these fortifications, we will make the Queen of the Euxine an impregnable fortress, a defiant beacon of Imperial power."
  great_project_type_fortify_pontus_contribution_theodosiopolis: "Re-Garrison Theodosiopolis"
  great_project_type_fortify_pontus_contribution_name_theodosiopolis: ""
  great_project_type_fortify_pontus_contribution_theodosiopolis_desc: "The fortress-city of Theodosiopolis is the strategic linchpin of the entire eastern frontier, guarding the passes from the Armenian Highlands. While the city itself is defensible, its garrison is skeletal. We must establish a new, permanent and powerful Tagma there, complete with its own command structure and supply train, to project strength and deter any eastern aggression."
  great_project_type_fortify_pontus_contribution_coastal_patrols: "Establish Coastal Patrols"
  great_project_type_fortify_pontus_contribution_name_coastal_patrols: ""
  great_project_type_fortify_pontus_contribution_coastal_patrols_desc: "The wealth of Pontus sails upon the Black Sea, but so do pirates and enemy raiders, preying on our fishing fleets and merchant ships. By commissioning a new squadron of swift patrol ships and fortifying key anchorages, we can sweep the sea lanes clean, protecting our commerce and ensuring our coastline is a shield, not a vulnerability."
  great_project_type_fortify_pontus_contribution_mountain_watch: "Fund the Mountain Watch"
  great_project_type_fortify_pontus_contribution_name_mountain_watch: ""
  great_project_type_fortify_pontus_contribution_mountain_watch_desc: "The Pontic Alps are our greatest defense, but they are also home to fierce, independent clans and hidden passes. By providing generous funds, arms, and an Imperial charter to the local mountain clans, we can formalize them into a 'Mountain Watch' - loyal partisans who know every secret trail and will make any invader's passage through the mountains a living hell."
  great_project_type_fortify_pontus_contribution_monasteries: "Patronize the Pontic Monasteries"
  great_project_type_fortify_pontus_contribution_name_monasteries: ""
  great_project_type_fortify_pontus_contribution_monasteries_desc: "Faith is the bedrock of Pontic resolve. The ancient and revered monasteries, such as the glorious Sumela, are not just centers of piety but also of civilization and learning in the wild mountains. Generous patronage will earn us the unwavering loyalty of the clergy and the endless prayers of the faithful, sanctifying our cause in the eyes of God and man."

  turkish_incursions_events.0011.t: "The Queen of the Euxine Stands Tall"
  turkish_incursions_events.0011.desc: "Excellence in engineering and an abundance of Imperial gold have worked wonders! The Walls of Trebizond have been fully restored, rising higher and stronger than they have in a century. The banners of the Imperial Family fly proudly from its towers, a clear message to all our enemies: this city does not bow."
  turkish_incursions_events.0011.a: "A fortress worthy of our legacy!"
  turkish_incursions_events.0012.t: "The Shield of the East is Manned"
  turkish_incursions_events.0012.desc: "The new Tagma has been formally established at Theodosiopolis. Thousands of disciplined soldiers now march in its streets, their armor gleaming. The fortress is no longer a sleeping giant, but an alert and powerful bastion. Its presence secures the entire upland frontier, and its commander sends word that the local Turkic beys are already far more 'cooperative'."
  turkish_incursions_events.0012.a: "Let the eastern hordes beware."
  turkish_incursions_events.0013.t: "The Black Sea is Ours"
  turkish_incursions_events.0013.desc: "The new patrol fleet has put to sea with great effect. Several pirate dens have already been burned out, and merchant captains report that the sea lanes are safer than they have been in living memory. The tribute of fish and trade goods from the coastal towns has increased markedly, their people grateful for the Imperial shield."
  turkish_incursions_events.0013.a: "Secure seas bring prosperous shores."
  turkish_incursions_events.0014.t: "The Mountains Have Eyes"
  turkish_incursions_events.0014.desc: "Your patronage of the mountain clans has been a resounding success. They have eagerly accepted their new role as the Imperial Mountain Watch. While they remain as wild and unruly as their mountain homes, their loyalty is now directed towards us. They have already ambushed several raiding parties, sending the few survivors back with terrifying stories. The mountain passes are now secure."
  turkish_incursions_events.0014.a: "Better to have them with us than against us."
  turkish_incursions_events.0015.t: "The Blessings of the Faithful"
  turkish_incursions_events.0015.desc: "The abbots of the great Pontic monasteries have received your donations with tears of joy. Church bells ring out across the valleys in your honor, and the monks have added your name to their daily prayers for the prosperity of the Empire. Your reputation as a pious and wise ruler has been cemented in the hearts of the Pontic people."
  turkish_incursions_events.0015.a: "Their prayers are our strength."

  pontic_warden_modifier: "Warden of the Pontus"
  pontic_warden_modifier_desc: "Organizing the grand refortification of Trebizond has given me a profound understanding of logistics and large-scale defensive architecture."
  shield_of_the_east_modifier: "Shield of the East"
  shield_of_the_east_modifier_desc: "Establishing a new field army on a hostile frontier has honed my skills in military administration and diplomacy."

  admiral_of_the_euxine_modifier: "Admiral of the Euxine"
  admiral_of_the_euxine_modifier_desc: "By focusing on the Black Sea, I have learned a great deal about the crucial role of naval patrols in securing trade and defending a coastline."
  chief_of_the_highlanders_modifier: "Chief of the Highlanders"
  chief_of_the_highlanders_modifier_desc: "Working with the spirited mountain clans has taught me valuable lessons about irregular warfare and how to turn unconventional forces into a powerful asset."
  blessed_ruler_modifier: "Blessed Ruler"
  blessed_ruler_modifier_desc: "My generous patronage of the Pontic monasteries has earned me a reputation for piety. I feel strengthened by the prayers of the faithful."

  turkish_incursions_events.3000.t: "The Pontus is Unbreakable"
  turkish_incursions_events.3000.desc: "The Great Project is brought to its triumphant conclusion. From the mighty walls of Trebizond to the watchful garrisons of Theodosiopolis, the Pontus has been transformed into a veritable fortress.\n\nThe sea lanes are clear, the mountain passes are watched by our loyal highlanders, and the blessings of the revered monasteries sanctify our rule. The raiders to the south now look upon our lands with fear, not greed. The Pontus stands eternal, a jewel on the Black Sea, its people secure and its future guaranteed by my unwavering will."
  turkish_incursions_events.3000.a: "Let this be my legacy!"
  pontic_bulwark_modifier: "Pontic Bulwark"
  pontic_bulwark_modifier_desc: "Through a monumental Imperial project, this county has been thoroughly fortified and militarized. It now serves as a key bastion of Imperial power in the region."

  turkish_incursions_events.3001.t: "The Pontic Hope Fades"
  turkish_incursions_events.3001.desc: "The Imperial messengers carry grim news to the Pontus: the project is cancelled. The funds have run dry and the state's attention must be turned elsewhere. The half-finished watchtowers and unpaid mercenaries are a testament to our broken promises.\n\nThe people of Trebizond, who had dared to dream of a secure future, now look to the mountains and the sea with renewed fear. My name, once spoken with hope, is now cursed in the fishing villages and mountain hamlets. This failure will weigh heavily upon me."
  turkish_incursions_events.3001.a: "We have failed them..."

  great_project_type_fortify_syria: "Fortify Syria"
  great_project_type_fortify_syria_desc: "Swift-moving Turkic bands plague the Syrian countryside. Striking from the wilderness, they pillage villages and caravans, then vanish before our garrisons can effectively respond. The current network of defenses is inadequate for these nomadic tactics, leaving vast stretches of Imperial land vulnerable. To end this scourge, a Great Project must be undertaken. This will be an undertaking of immense scale, focused on the construction of a new defensive network of forts, walls, and watchtowers. This new 'Syrian Limes' will serve to deny the raiders safe passage and easy plunder, allowing Imperial authority to protect the populace. Only then can this valuable province prosper in peace, transforming the vulnerable frontier into a hardened shield for the Empire."
  great_project_type_tooltip_fortify_syria: "Begin a great project to restore Imperial authority and defenses in Syria."
  great_project_type_fortify_syria_confirm: "The Orient Shall Be Roman Again!"
  great_project_name_fortify_syria: ""
  great_project_name_possessive_fortify_syria: ""

  great_project_type_fortify_syria_contribution_antioch: "Strengthen Antioch"
  great_project_type_fortify_syria_contribution_name_antioch: ""
  great_project_type_fortify_syria_contribution_antioch_desc: "Antioch is the heart of Syria and the strategic key to the entire region. It is not enough to simply hold it; we must make it the center of Imperial power once more. This requires a complete military and administrative overhaul: rebuilding its vast walls, establishing a permanent and powerful field army, and restoring the administration of a full Doukaton (Duchy)."
  great_project_type_fortify_syria_contribution_edessa: "Reinforce the Citadel of Edessa"
  great_project_type_fortify_syria_contribution_name_edessa: ""
  great_project_type_fortify_syria_contribution_edessa_desc: "The fortress-city of Edessa (al-Ruha) is the easternmost shield of Syria, guarding the gateway to Mesopotamia. Its massive citadel must be made impregnable. We will fund the reconstruction of its towers, deepen its moats, and expand its armories to create a formidable forward base from which to project our power eastwards."
  great_project_type_fortify_syria_contribution_strata: "Restore the Strata Diocletiana"
  great_project_type_fortify_syria_contribution_name_strata: ""
  great_project_type_fortify_syria_contribution_strata_desc: "The ancient Roman road network known as the 'Strata Diocletiana' was once the spine of the eastern frontier, a fortified highway connecting forts from Palmyra to the Euphrates. Though parts are lost to the desert, restoring the main arteries will allow our legions to move with incredible speed, cutting off raiders and ensuring our garrisons are always supplied."
  great_project_type_fortify_syria_contribution_melkites: "Support the Melkite Communities"
  great_project_type_fortify_syria_contribution_name_melkites: ""
  great_project_type_fortify_syria_contribution_melkites_desc: "The local Chalcedonian Christians, whom the Arabs call 'Melkites' or 'Emperor's Men', have kept the Orthodox faith for centuries under foreign rule. Their loyalty is a weapon waiting to be sharpened. By patronizing their patriarchs, rebuilding their churches, and granting them Imperial protection, we can create a loyal network of eyes, ears, and hands across all of Syria."
  great_project_type_fortify_syria_contribution_ports: "Secure the Levantine Ports"
  great_project_type_fortify_syria_contribution_name_ports: ""
  great_project_type_fortify_syria_contribution_ports_desc: "The ports of the Levant, from Laodicea to Tyre, are conduits for the wealth of the East. They are also vulnerable to Arab fleets and pirate raids. A major investment is needed to fortify the harbors, build a new patrol fleet of dromons, and establish a firm Imperial grip on all maritime trade."

  turkish_incursions_events.0016.t: "The Queen of the East is Reborn"
  turkish_incursions_events.0016.desc: "The transformation of Antioch is staggering. Its walls, once crumbling, now stand complete and imposing. A new Tagma, loyal to the Emperor, drills in the fields outside the city, its standards gleaming in the Syrian sun. The citizens, secure behind their restored defenses, celebrate a new era of Roman peace. Antioch is once again a true Imperial city."
  turkish_incursions_events.0016.a: "A city worthy of its history!"
  turkish_incursions_events.0017.t: "The Shield of Mesopotamia"
  turkish_incursions_events.0017.desc: "The citadel of Edessa is now a monster of stone and steel. Imperial engineers have outdone themselves, and the fortress is said to be stronger than ever before. Its granaries are full, its armories overflowing, and its garrison is ever-watchful. From this bastion, our armies can strike deep into the lands of our enemies."
  turkish_incursions_events.0017.a: "Let them dash themselves against our walls."
  turkish_incursions_events.0018.t: "The Imperial Highway Lives"
  turkish_incursions_events.0018.desc: "The desert roads are clear! Legions of workers have restored the ancient Strata. Paved sections have been repaired, wells have been dug, and fortified watchposts now guard the route. Our armies can now cross vast distances in half the time, and the desert raiders who relied on their speed find themselves suddenly cornered and exposed."
  turkish_incursions_events.0018.a: "A lifeline for our legions, a deathtrap for our foes."
  turkish_incursions_events.0019.t: "The Loyal Faithful"
  turkish_incursions_events.0019.desc: "Your patronage of the Melkites has borne incredible fruit. The Orthodox communities across Syria now see you as their savior and true sovereign. They provide our garrisons with vital intelligence, deny supplies to our enemies, and their prayers for your health echo from every rebuilt church. Their loyalty is an anchor of Imperial power in a turbulent land."
  turkish_incursions_events.0019.a: "God bless the Emperor's Men."
  turkish_incursions_events.0020.t: "The Golden Coast"
  turkish_incursions_events.0020.desc: "The new Levantine fleet has swept the seas clean. The Fatimids are wary of our naval power, and pirate activity has plummeted. With the sea lanes secure, trade is booming. Spices, incense, and silk from the far east once again flow through our ports and into the Imperial treasury. The coast is a source of immense wealth and power."
  turkish_incursions_events.0020.a: "He who commands the sea, commands the wealth."

  doukas_of_antioch_modifier: "Doux of Antioch"
  doukas_of_antioch_modifier_desc: "My efforts in restoring the military and civil administration of Antioch have granted me invaluable experience in governing a vast and complex frontier province."
  edessan_warden_modifier: "Warden of Edessa"
  edessan_warden_modifier_desc: "Securing the great citadel of Edessa against eastern threats has honed my skills in siegecraft and defensive fortification."
  master_of_the_strata_modifier: "Master of the Strata"
  master_of_the_strata_modifier_desc: "Rebuilding the ancient desert roads has given me an unparalleled grasp of logistics and rapid military deployment in arid terrain."
  defender_of_the_melkites_modifier: "Defender of the Melkites"
  defender_of_the_melkites_modifier_desc: "By championing the Orthodox communities of Syria, I have fostered a deep bond with the local populace and learned the value of winning hearts and minds."
  thalassocrat_of_the_levant_modifier: "Thalassocrat of the Levant"
  thalassocrat_of_the_levant_modifier_desc: "My focus on securing the Levantine coast has given me a profound appreciation for the interplay between naval power, maritime trade, and economic prosperity."

  turkish_incursions_events.4000.t: "Syria is Roman Once More"
  turkish_incursions_events.4000.desc: "It is done. The Great Project, a dream of generations, is now reality. Syria is restored to the Empire not just in name, but in fact. Antioch shines as the Queen of the East, Edessa stands guard over Mesopotamia, and our legions march swiftly upon the ancient Roman roads.\n\nThe local populace, their loyalty secured, live in a peace they have not known for centuries. The emirs and sultans who once raided this land at will now tremble at the sight of our banners. A new Pax Romana has dawned in the Orient, forged by my vision and my will."
  turkish_incursions_events.4000.a: "A new jewel in the Imperial Crown!"
  syrian_pax_romana_modifier: "Syrian Pax Romana"
  syrian_pax_romana_modifier_desc: "Through a monumental Imperial effort, Roman authority has been firmly re-established in this county. The land is secure, the people are loyal, and the economy thrives under the Emperor's peace."
 
  turkish_incursions_events.4001.t: "The Syrian Dream Dies"
  turkish_incursions_events.4001.desc: "The reports are undeniable. The treasury is exhausted, the army is stretched thin, and the squabbling emirs are uniting against us. The grand project to restore Syria is a failure. I have no choice but to call our engineers and administrators home.\n\nThe half-restored walls and abandoned work camps will stand as monuments to my folly. The local Christians, whom we promised protection, are now at the mercy of their old masters. This is a bitter humiliation, a stain upon my reign that will not easily wash away."
  turkish_incursions_events.4001.a: "My ambition outstripped my grasp..."
  syrian_fiasco_modifier: "Syrian Fiasco"
  syrian_fiasco_modifier_desc: "My ambitious project to reclaim Syria has collapsed into a costly failure. Resources have been squandered, and our weakness has been laid bare for all to see. My vassals view this as a mark of incompetence and overreach."
 
  ANTIOCH_LOCATION_1_TOOLTIP: "Theme of Antioch is within your realm"
  EDESSA_LOCATION_2_TOOLTIP: "Theme of Edessa is within your realm"