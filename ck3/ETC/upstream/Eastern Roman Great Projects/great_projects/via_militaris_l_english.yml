l_english:
 great_project_type_via_militaris_restoration: "Restore Via Militaris"
 great_project_type_via_militaris_restoration_desc: "The Via Militaris is the true military spine of the Empire, the great road leading directly from the gates of Constantinople into the heart of the Balkans. For centuries, it was the path of legions and emperors. Now, however, it is a shadow of its former self—a line on a map more than a functional highway. Potholed and overgrown, the road has become a haven for brigands and a barrier to governance. It cripples inland commerce, isolates our garrisons in Thrace and beyond from reliable supply, and allows dissent to fester in valleys disconnected from Imperial oversight. A monumental undertaking is required to restore it. By rebuilding the road and its supporting watchtowers, we will not only revive trade but also strengthen our grip on these core provinces. The Emperor's writ will run unchallenged, our garrisons will be fed, and taxes will flow unimpeded, ensuring the heartland of the Empire beats as one with the capital."
