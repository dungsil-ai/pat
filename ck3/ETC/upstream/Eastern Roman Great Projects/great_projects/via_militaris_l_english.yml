 great_project_type_via_militaris_improvement_contribution_establish_road_magistracies_desc: "The road has been surveyed; now it must be governed. This contribution will fund the appointment of Curatores Viarum, Imperial magistrates responsible for collecting tolls, managing traffic, settling disputes, and ensuring the road is maintained to the highest Imperial standards."
 great_project_type_via_militaris_improvement_contribution_erect_milestones_desc: "The quarries provided the stone for the road's foundation; now they shall provide the marble for its glorification. We will fund the carving and placement of ornate milestones to mark every mile, as well as grander monuments and arches at key intersections to commemorate our great work and awe travelers."
 great_project_type_via_militaris_improvement_contribution_organize_maintenance_desc: "A great road is not built once, but maintained forever. This contribution will establish and fund permanent crews of laborers and engineers. Stationed along the Via Militaris, their sole task will be the perpetual upkeep of the road: repairing cracks, clearing drains, and ensuring our investment endures for centuries."
 great_project_type_via_militaris_improvement_contribution_subsidize_caravanserais_desc: "The laborers who built the road have been replaced by merchants who travel upon it. To encourage commerce, we will fund the construction of massive, state-subsidized caravanserais. These grand inns will offer safe lodging, vast marketplaces, and secure stables for the burgeoning merchant traffic."
 great_project_type_via_militaris_improvement_contribution_institute_patrols_desc: "Static outposts can only do so much. To ensure true safety, the Via Militaris must be actively patrolled. We will fund the creation of an elite corps of mounted route guards, the Vigiles Stratorum, who will ride the length of the road, protecting caravans from banditry and projecting Imperial authority into every corner of the land."
 great_project_type_via_militaris_improvement_contribution_toll_bridges_desc: "The bridges are critical arteries of traffic and commerce. By fortifying them with gatehouses and manning them with loyal toll-collectors, we not only improve their security but also turn them into a significant and reliable source of income for the Imperial treasury."
 great_project_type_via_militaris_improvement_contribution_expand_relay_network_desc: "The Imperial post is functional, but it can be faster. This contribution will fund the construction of dozens of new mutationes (relay stations) between the existing mansiones (overnight stops). By increasing the density of the network, we ensure messengers always have a fresh mount, dramatically increasing the speed at which information travels."
 great_project_type_via_militaris_improvement_contribution_breeding_programs_desc: "Our stud farms have proven their worth. It is time to specialize. This program will diversify our stables, focusing not only on heavy warhorses, but also on breeding lighter, faster horses for the Cursus Publicus and exceptionally strong, hardy mules for the merchant caravans that now flock to the Via Militaris."

