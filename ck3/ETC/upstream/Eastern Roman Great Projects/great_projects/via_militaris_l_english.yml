 bustling_via_militaris_modifier_desc: "The restoration of the Via Militaris was only the beginning. Through a flourishing of peace and targeted investment, the great road now thrums with ceaseless activity. Great caravans carrying silks from the East pass merchants hawking furs from the North, and the exchange of goods is matched only by the exchange of culture and ideas.\n\nNew settlements have blossomed into vibrant towns, and the torrent of gold and goods has made them centers of immense wealth. The constant presence of Imperial patrols and fortified outposts has made banditry a distant memory. This is no longer just a road; it is the vibrant, beating heart of a prosperous Empire.\n\n"
 bustling_via_militaris_modifier: "Bustling Via Militaris"
 via_militaris_broken_promises_modifier: "Broken Promises"
 via_militaris_broken_promises_modifier_desc: "I proclaimed a grand vision to the entire realm - a restored Via Militaris, a monument to my reign. Now, the project is abandoned, and my words have turned to ash. Instead of a road of stone, I have built a legacy of failure, and my name is now synonymous with grand pronouncements and pathetic results.\n\n"
 via_militaris_beograd_hub_modifier: "Beograd Hub"
 via_militaris_beograd_hub_modifier_desc: "Known to the Romans as Singidunum, this fortress-city is the northwestern anchor of the mighty Via Militaris. Legions muster here, supplies flow east, and the city stands as the Empire's unyielding bulwark on the Danubian frontier. To hold Beograd is to hold the gateway to both Pannonia and the Balkans.\n\n"

 via_militaris_patron_of_order_modifier: "Patron of Order"
 via_militaris_patron_of_order_modifier_desc: "My experience funding and overseeing the magistracies of the Via Militaris has given me a profound understanding of law and administration."

 via_militaris_prudent_planner_modifier: "Prudent Planner"
 via_militaris_prudent_planner_modifier_desc: "Organizing the permanent maintenance crews for the great road has taught me invaluable lessons in efficiency and long-term project management. I can now apply this knowledge to all my construction endeavors."

 via_militaris_vigilant_protector_modifier: "Vigilant Protector"
 via_militaris_vigilant_protector_modifier_desc: "My work establishing the highway patrols has honed my instincts for defense and security. My lands are safer for it."

 via_militaris_master_of_the_cursus_modifier: "Master of the Cursus"
 via_militaris_master_of_the_cursus_modifier_desc: "Expanding the Imperial relay network has left me with a web of contacts and a keen understanding of how information travels. Few secrets in this realm are beyond my reach."

 via_militaris_imperial_master_breeder_modifier: "Imperial Master Breeder"
 via_militaris_imperial_master_breeder_modifier_desc: "Overseeing the specialized breeding programs has made me an expert in animal husbandry. My stables produce the finest mounts, benefiting both my knights and my supply trains."


 # --- COUNTY MODIFIER LOCALIZATION ---

 via_militaris_patrons_landmark_modifier: "Patron's Landmark"
 via_militaris_patrons_landmark_modifier_desc: "A grand monument, funded by this county's ruler, stands as a testament to their contribution to the Via Militaris. It draws pilgrims and dignitaries alike, adding to the prestige and importance of this locale."

 via_militaris_flourishing_caravanserai_modifier: "Flourishing Caravanserai"
 via_militaris_flourishing_caravanserai_modifier_desc: "A massive, state-subsidized caravanserai operates in this county, a direct result of its ruler's investment. It has become a major hub for commerce, bringing significant wealth and growth to the region."

 via_militaris_fortified_toll_bridge_modifier: "Fortified Toll Bridge"
 via_militaris_fortified_toll_bridge_modifier_desc: "Thanks to the investment of its ruler, a critical bridge in this county has been fortified and manned. It now provides both enhanced defense and a steady stream of toll income."
