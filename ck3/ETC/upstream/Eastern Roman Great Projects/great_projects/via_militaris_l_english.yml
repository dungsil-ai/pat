 neglected_via_militaris_modifier_desc: "The once-mighty Via Militaris, the artery of the Empire, has fallen into a lamentable state of disrepair. Paving stones are looted, bridges have collapsed, and the road is choked with weeds that give cover to opportunistic bandits.\n\nCommerce along the route has dwindled, stifling growth and making it difficult to assert authority. Armies find their supply lines strained and their progress slowed to a crawl through the mud and rubble.\n\n"
 neglected_via_militaris_modifier: "Neglected Via Militaris"
 restored_via_militaris_modifier_desc: "By Imperial decree and with immense effort, the Via Militaris has been restored to its former glory. Paving stones have been relaid, bridges rebuilt, and garrisons established at regular intervals, rendering the road swift and safe for travelers.\n\nCommerce flows freely once again, bringing wealth and prosperity to the lands it touches. Imperial authority is unquestioned, and armies can now march with haste and full supply to defend the frontier. The road is a testament to renewed Imperial power and prosperity.\n\n"
 restored_via_militaris_modifier: "Restored Via Militaris"
 via_militaris_quarry_surplus_modifier: "Quarry Surplus"
 via_militaris_quarry_surplus_modifier_desc: "The re-opened Imperial quarries are producing a surplus of high-quality stone.\n\n"
 via_militaris_road_planner_modifier: "Road Planner"
 via_militaris_road_planner_modifier_desc: "This character's experience surveying the Via Militaris has made them an expert in large-scale logistical planning.\n\n"
 via_militaris_master_of_logistics_modifier: "Master of Logistics"
 via_militaris_master_of_logistics_modifier_desc: "Funding the paving of the Via Militaris has provided this character with invaluable lessons in military logistics.\n\n"
 via_militaris_beloved_patron_modifier: "Beloved Patron"
 via_militaris_beloved_patron_modifier_desc: "This character's generous funding of the laborers on the Via Militaris has earned them the love of the common folk.\n\n"
 via_militaris_fortification_expert_modifier: "Fortification Expert"
 via_militaris_fortification_expert_modifier_desc: "This character oversaw the construction of road outposts, granting them expertise in defensive structures.\n\n"
 via_militaris_information_network_modifier: "Information Network"
 via_militaris_information_network_modifier_desc: "By reorganizing the Cursus Publicus, this character has gained access to a faster flow of information.\n\n"
 via_militaris_master_breeder_modifier: "Master Breeder"
 via_militaris_master_breeder_modifier_desc: "This character's investment in Imperial stud farms has made them an expert in breeding fine warhorses.\n\n"
 
 via_militaris_events.0001.t: "A Surveyor's Reward"
 via_militaris_events.0001.desc: "Weeks after they set out, a dusty but triumphant retinue has arrived at court, led by the Master Surveyor charged with assessing the Via Militaris.\n\nOn the great council table, they unroll a series of enormous parchments. It is a work of breathtaking detail; a complete map of the ancient *strata* from the capital to the Adriatic coast.\n\n\"The bones of the old road are good, My Lord,\" the surveyor reports, his finger tracing a long, winding path. \"Centuries of neglect and brazen theft of stone have taken their toll, and many bridges have long since crumbled into the rivers they once spanned. But the Roman foundations are sound. The path is clear.\"\n\nFor the first time in an age, the full scope of the task is understood. With this knowledge, the true work of restoration can begin."
 via_militaris_events.0001.a: "My contribution is recognized."
 via_militaris_events.0002.t: "From the Imperial Quarries"
 via_militaris_events.0002.desc: "My funding has opened the Imperial Quarries, providing the stone needed to restore the great Via Militaris. For this service, I am granted a portion of the quarry's surplus, which will surely benefit my domain."
 via_militaris_events.0002.a: "My quarries fuel the Empire!"
 via_militaris_events.0003.t: "Paving the Way"
 via_militaris_events.0003.desc: "The strata of the Via Militaris are being paved anew thanks to my patronage. Organizing the logistics for such a monumental task has taught me much about the movement of men and materials, an experience worthy of the greatest commanders."
 via_militaris_events.0003.a: "A secure road is a secure Empire."
 via_militaris_events.0004.t: "Patron of the People"
 via_militaris_events.0004.desc: "By financing the army of laborers required for the Via Militaris, I have proven my piety and my dedication to the common person. The people see my generosity, and even God seems to smile upon this great work."
 via_militaris_events.0004.a: "To support the people is a holy act."
 via_militaris_events.0005.t: "Guarding the Road"
 via_militaris_events.0005.desc: "The road is vulnerable without protection. My funds have helped establish new outposts and watchtowers along the Via Militaris, securing it for travelers and merchants. My expertise in defensive works is now widely known."
 via_militaris_events.0005.a: "Our watchtowers will stand for ages."
 via_militaris_events.0006.t: "Bridging the Divide"
 via_militaris_events.0006.desc: "Where rivers once halted progress, magnificent new bridges now stand, a testament to my support for the restoration of the Via Militaris. Such feats of engineering will be spoken of for generations, a great monument to my name."
 via_militaris_events.0006.a: "A monument to our ingenuity!"
 via_militaris_events.0007.t: "The Cursus Publicus Reborn"
 via_militaris_events.0007.desc: "My contribution has helped restore the ancient Cursus Publicus, the imperial postal and intelligence service. By organizing this network of couriers and waystations, I have gained a unique insight into the flow of information... and secrets."
 via_militaris_events.0007.a: "Information will flow as fast as our couriers."
 via_militaris_events.0008.t: "The Imperial Stables"
 via_militaris_events.0008.desc: "A courier is only as fast as his mount. By establishing new imperial stud farms, I have ensured the Cursus Publicus is served by the finest and fastest horses in the Empire. My name is now associated with a superior breed of animal."
 via_militaris_events.0008.a: "The finest horses for the Empire!" 
 via_militaris_events.0009.t: "Order on the Road"
 via_militaris_events.0009.d: "Word reaches me that the *Curatores Viarum* I funded are now in place along the Via Militaris. Their diligent work brings Imperial law and efficient administration to every mile of the great road, ensuring it remains an asset to the realm for years to come."
 via_militaris_events.0009.a: "An efficient and just system."
 via_militaris_events.0010.t: "Written in Stone"
 via_militaris_events.0010.d: "The milestones and monuments are complete! At every mile, travelers will see markers bearing my name, and at key junctions, grand arches stand as a testament to my reign. My contribution to the glory of the Via Militaris has been written in stone for all to see."
 via_militaris_events.0010.a: "A legacy for the ages."
 via_militaris_events.0011.t: "An Enduring Work"
 via_militaris_events.0011.d: "The permanent maintenance crews have been established along the entire length of the Via Militaris. While others build for glory, I have built for eternity. This great road is now protected against the ravages of time, a testament to my foresight and prudence."
 via_militaris_events.0011.a: "A firm foundation for the future."
 via_militaris_events.0012.t: "The Flow of Commerce"
 via_militaris_events.0012.d: "The great caravanserais funded by my treasury are bustling with activity! Merchants from across the known world flock to these havens of safety and commerce. In the marketplaces, traders toast my name and my coffers swell with the proceeds of their flourishing business."
 via_militaris_events.0012.a: "Profit follows wise investment."
 via_militaris_events.0013.t: "The Emperor's Peace"
 via_militaris_events.0013.d: "The elite *Vigiles Stratorum* now keep a constant watch over the Via Militaris. Word spreads of their vigilance and martial prowess. Bandits flee before them and merchants travel without fear. My authority is felt along every inch of the great road."
 via_militaris_events.0013.a: "Safety through strength."
 via_militaris_events.0014.t: "The Tolls of Power"
 via_militaris_events.0014.d: "The Imperial bridges along the Via Militaris now serve a dual purpose. Fortified gatehouses control the flow of traffic, while my loyal toll-collectors ensure that every caravan contributes to the Imperial treasury. The road is not only secure, but immensely profitable."
 via_militaris_events.0014.a: "Every traveler shall pay their due."
 via_militaris_events.0015.t: "The Speed of Thought"
 via_militaris_events.0015.d: "The Cursus Publicus has been transformed! With new relay stations dotting the landscape, messages now fly across the Empire faster than ever before. No distant court is unreachable, no secret can be kept for long. The realm feels smaller, and my grasp on it all the more secure."
 via_militaris_events.0015.a: "Information is power."
 via_militaris_events.0016.t: "Superior Steeds"
 via_militaris_events.0016.d: "My ambitious plan to specialize the Imperial stud farms has been a resounding success. We now breed not only heavy chargers for my knights, but also swift coursers for my messengers and tireless mules for the merchants. The quality of our mounts is the envy of the world."
 via_militaris_events.0016.a: "The cavalry is the soul of the army."

 great_project_type_via_militaris_improvement: "Improve Via Militaris"
 great_project_type_via_militaris_improvement_desc: "The Via Militaris has been restored, its paved stones once again connecting the great cities of the Empire. But its restoration is merely the foundation upon which true prosperity can be built. A functional road is one thing; a bustling artery of commerce and power is another entirely.\n\nThis next great endeavor will transform the road from a simple highway into the thrumming heart of the realm. We will establish formal magistracies to manage it, fund the great caravanserais that shelter merchants, and institute patrols to guarantee safety. By adorning it with milestones and monuments, we will turn it into a symbol of Imperial might and prestige.\n\nWhen we are finished, the Via Militaris will not just be a road - it will be a monument to our vision, an engine of the economy, and the envy of the world."
