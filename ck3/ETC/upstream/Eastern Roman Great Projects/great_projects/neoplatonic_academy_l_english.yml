l_english:

 great_project_type_reestablish_neoplatonic_academy: "Re-establish the Academy of Athens"
 great_project_type_reestablish_neoplatonic_academy_desc: "For nearly a millennium, the Academy founded by Plato was a beacon of philosophy in the ancient world. In its final incarnation as the Neo-Platonic school, it was the last bastion of Hellenic thought until it was closed by imperial decree, its scholars scattered and its flame extinguished. To restore it would be a monumental act of cultural patronage.\n\nWe shall not only rebuild its hallowed halls but recall the great minds from their long exile, recover its lost library of esoteric texts, and secure its future with an imperial charter. We will relight a lamp of wisdom that has been dark for centuries, making Athens once more the philosophical heart of the world."
 great_project_type_tooltip_reestablish_neoplatonic_academy: ""
 great_project_name_possessive_reestablish_neoplatonic_academy: ""
 great_project_name_reestablish_neoplatonic_academy: ""

 
 great_project_type_reestablish_neoplatonic_academy_contribution_rebuild_academy_grove: "Rebuild the Academy Grove"
 great_project_type_reestablish_neoplatonic_academy_contribution_rebuild_academy_grove_desc: "The physical heart of the Academy has crumbled into ruin. We must dispatch master architects and masons to Athens to reclaim the site. They will rebuild the lecture halls, the residential quarters for the scholars, and the serene porticoes where philosophers can once again walk and debate among the olive groves of Academus."
 great_project_type_reestablish_neoplatonic_academy_contribution_name_rebuild_academy_grove: ""
 great_project_type_reestablish_neoplatonic_academy_contribution_recover_academy_texts: "Recover the Lost Texts"
 great_project_type_reestablish_neoplatonic_academy_contribution_recover_academy_texts_desc: "When the Academy was closed, its legendary library was looted and scattered. We must dispatch agents and scribes across the known world—to the scholarly cities of the East, the monasteries of the West, and the private collections of nobles—to track down, purchase, or copy the lost works of Plato, Plotinus, Iamblichus, and the other masters, reassembling this treasure of ancient wisdom."
 great_project_type_reestablish_neoplatonic_academy_contribution_name_recover_academy_texts: ""
 great_project_type_reestablish_neoplatonic_academy_contribution_recall_academy_philosophers: "Recall the Philosophers"
 great_project_type_reestablish_neoplatonic_academy_contribution_recall_academy_philosophers_desc: "A school is nothing without its teachers. The intellectual descendants of the last Neo-Platonists are scattered, practicing their philosophy in secret or in foreign courts. We will send out a formal summons across the Empire and beyond, offering generous stipends, safe passage, and the promise of royal protection to any scholar who would answer the call to return to Athens and teach at the reborn Academy."
 great_project_type_reestablish_neoplatonic_academy_contribution_name_recall_academy_philosophers: ""
 great_project_type_reestablish_neoplatonic_academy_contribution_establish_academy_charter: "Establish the Imperial Charter"
 great_project_type_reestablish_neoplatonic_academy_contribution_establish_academy_charter_desc: "The last Academy was closed by the whim of an Emperor; ours will be protected by it. We will issue a formal Imperial Charter for the Academy, granting it legal personhood and a permanent endowment from the state treasury for its expenses and stipends. This decree will protect it from the meddling of short-sighted priests and officials, securing its legacy for generations to come."
 great_project_type_reestablish_neoplatonic_academy_contribution_name_establish_academy_charter: ""


 academy_of_athens_modifier: "Neo-Platonic Academy of Athens"
 academy_of_athens_modifier_desc: "The flame of Hellenic wisdom, long thought extinguished, has been rekindled in Athens. The restored Academy serves as a brilliant beacon, attracting students, poets, and philosophers who seek to study the esoteric mysteries of the ancient masters. The city's renown for culture and profound learning grows with each passing year, and its ruler is hailed throughout the world as a true philosopher-king."

 reestablish_neoplatonic_academy.0001.t: "The Halls Stand Ready"
 reestablish_neoplatonic_academy.0001.desc: "My lord, a message from the chief architect in Athens. The reconstruction is complete. The new halls are pristine, their marble colonnades gleam in the Attic sun, and the grounds have been replanted. The physical shell of the Academy is ready, standing silent, awaiting the voices of scholars to fill it with life once more."
 reestablish_neoplatonic_academy.0001.a: "Now, to fill these halls with wisdom."

 reestablish_neoplatonic_academy.0002.t: "The Library Breathes Again"
 reestablish_neoplatonic_academy.0002.desc: "My lord, our agents have returned, their caravans laden with priceless codices and scrolls. The works of the great masters have been gathered from across the world. The shelves of the Academy's new library are now filled with the profound wisdom of the ancients, ready for study. The mind of the Academy has been restored."
 reestablish_neoplatonic_academy.0002.a: "A library worthy of Plato himself."

 reestablish_neoplatonic_academy.0003.t: "The Great Minds Assemble"
 reestablish_neoplatonic_academy.0003.desc: "My lord, it is happening. The first of the philosophers have begun to arrive in Athens, drawn by your summons from across the sea. The porticoes and lecture halls, so long silent, now echo with rigorous debate and esoteric discourse in a dozen different accents. The soul of the Academy lives again!"
 reestablish_neoplatonic_academy.0003.a: "Let the debates begin!"

 reestablish_neoplatonic_academy.0004.t: "The Academy's Future is Secure"
 reestablish_neoplatonic_academy.0004.desc: "My lord, the Imperial Charter has been drafted, sealed, and sent to Athens to be displayed in the Academy's great hall. The endowment has been formally allocated from the treasury. The Academy is no longer a mere project, but a permanent and protected institution of our realm, its future shielded by our authority."
 reestablish_neoplatonic_academy.0004.a: "Let the world marvel at our culture!"

 reestablish_neoplatonic_academy.0006.t: "The Light of Athens Rekindled"
 reestablish_neoplatonic_academy.0006.desc: "The silence of centuries has been broken. The Neo-Platonic Academy of Athens, once a fading memory, lives and breathes once more. Its halls are filled with the greatest minds of the age, its library contains the accumulated wisdom of a millennium, and its future is secured by our Imperial will.\n\nYou have done more than restore a building; you have re-lit a flame of inquiry and classical thought, creating a new center of learning for the entire world. Your name will be remembered alongside the philosopher-kings of old as a true patron of wisdom."
 reestablish_neoplatonic_academy.0006.a: "The pursuit of the One has begun anew."
 
 reestablish_neoplatonic_academy.0005.t: "The Light Gutters Out"
 reestablish_neoplatonic_academy.0005.desc: "The ambitious project to restore the Academy of Athens has ended in shameful failure. The funds have been squandered, the half-built halls lie abandoned, and the scholars who had dared to hope for a renaissance have returned to their exiles, utterly disillusioned.\n\nInstead of a beacon of wisdom, we have created a monument to our own intellectual vanity. The silence will now remain unbroken, a testament to our folly and a stain upon our reign."
 reestablish_neoplatonic_academy.0005.a: "A philistine's folly."

 ATTICA_LOCATION_1_TOOLTIP: "Attica is within your realm"
 
 adult_education_has_academy_of_athens_desc: "\n#P +++ Neo-Platonic Academy of Athens #!"
