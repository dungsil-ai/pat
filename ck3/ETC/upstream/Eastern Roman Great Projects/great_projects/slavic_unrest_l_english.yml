 empire_of_bulgaria_decision: "Form the Bulgarian Tsardom" 
 empire_of_bulgaria_decision_desc: "The memory of the First Empire - when the Khans and Tsars of old were the rivals of Emperors - was long thought lost, crushed beneath the Roman heel. For generations, our people were scattered and our lands divided, toiling under a foreign yoke. That age of servitude is now over. Through blood and unwavering will, our ancestral heartlands have been reclaimed and the banners of the boyars are united once more. It is time to formalize what has been won in battle. We must cast aside lesser titles and claim the crown that is ours by right of heritage and conquest. This proclamation will declare to the world that the Bulgarian Empire is reborn, and that a Tsar again rules these lands."    
 empire_of_bulgaria_decision_tooltip: "South Slavic lands are united to form one Tsardom, under the iron grip of the Bulgars"
