l_english:

 great_project_type_pacify_slavs: "Pacify the South Slavs"
 great_project_type_pacify_slavs_desc: "The Empire's focus on its Anatolian frontier has led to instability in the European themes. In Bulgaria and Dyrrachium, local Slavic and Vlach chieftains, the župans, are inciting their people to resist Imperial taxation, and the threat of open revolt looms. This project is a strategic initiative to pacify the region through political and economic means. It will direct funds towards provincial infrastructure and use Imperial patronage to soothe grievances and secure the loyalty of the local magnates. This effort seeks to avert a costly rebellion and re-integrate the vital western provinces into the Imperial fold."
 great_project_type_tooltip_pacify_slavs: "Begin a major project to stabilize the restless Balkan provinces and prevent rebellion."
 great_project_type_pacify_slavs_confirm: "We must quell the storm before it breaks."
 great_project_name_possessive_pacify_slavs: ""
 great_project_name_pacify_slavs: ""

 great_project_type_pacify_slavs_contribution_zupans: "Convene the Diet of the Župans"
 great_project_type_pacify_slavs_contribution_name_zupans: ""
 great_project_type_pacify_slavs_contribution_zupans_desc: "The Slavic chieftains, or *župans*, hold sway over their clans with an iron fist. Rather than attempting to exterminate them all, a display of Imperial magnanimity is in order. We shall summon them to a grand diet in a neutral city like Sardica. We will listen to their grievances, feast them as honored guests, and affirm their local authority, and bestow upon them honorable Roman titles. Their loyalty, once bought with prestige, will be a valuable tool."
 great_project_type_pacify_slavs_contribution_ohrid: "Confirm the Rights of the Ohrid Archbishopric"
 great_project_type_pacify_slavs_contribution_name_ohrid: ""
 great_project_type_pacify_slavs_contribution_ohrid_desc: "The Slavic peoples follow the True Faith, yet their clergy are disorganized, isolated, and susceptible to the whispers of the Roman Pope. We must anchor their piety to the Ecumenical Patriarchate. By issuing an Imperial Chrysobull that reaffirms the ancient rights of the Archbishopric of Ohrid and generously funding its bishops, we can turn the Balkan church from a source of opposition into a pillar of Imperial support. It is a blow to the absolute authority of the Ecumenical Patriarch, but a necessary act of piety and statecraft."
 great_project_type_pacify_slavs_contribution_fortress: "Repair the Balkan Fortresses"
 great_project_type_pacify_slavs_contribution_name_fortress: ""
 great_project_type_pacify_slavs_contribution_fortress_desc: "From Belgrade to Larissa, the fortresses that guard the Balkan passes are crumbling from neglect. The local populace feels vulnerable to Pecheneg raiders from the north and to local bandits. By undertaking a massive program of repairs, we not only strengthen our military hand but also demonstrate to the people that the Emperor is still their shield and protector."
 great_project_type_pacify_slavs_contribution_brigands: "Subdue the Mountain Brigands"
 great_project_type_pacify_slavs_contribution_name_brigands: ""
 great_project_type_pacify_slavs_contribution_brigands_desc: "The Haemus and Rhodope mountains crawl with bandits and brigands. These savage mountain clans respect no law but their own strength, preying on merchants and Imperial officials alike. They are a symbol of disorder. We must dispatch veteran soldiers to hunt them down, burn out their mountain nests, and establish permanent watchtowers in the passes."
 great_project_type_pacify_slavs_contribution_tax: "Ease the Tax Burden"
 great_project_type_pacify_slavs_contribution_name_tax: ""
 great_project_type_pacify_slavs_contribution_tax_desc: "The decision by past administrators to demand taxes in coin, rather than in kind, has been ruinous for the peasants of the interior who have little access to markets. This policy is the single greatest source of popular anger. To show our benevolence, we shall issue an edict allowing the themes of Bulgaria and Macedonia to once again pay a portion of their dues in grain and livestock. This will ease the burden on the common folk and fill our army's granaries."

 slavic_unrest.0001.t: "Pacify the South Slavs - Oaths of Fealty"
 slavic_unrest.0001.desc: "The synod convened to address the grievances of the European themes has concluded with resounding success. The Slavic župans, who had arrived armed and projecting sullen defiance, were methodically won over. Dazzled by the majesty of Imperial ceremony and gratified to have their voices formally heard, they have eagerly accepted new Roman titles and honors. The most powerful among them now see their ambitions tied not to rebellion, but to the prestige that only the Imperial court in Constantinople can bestow. The immediate danger of revolt has passed, replaced by a newfound loyalty rooted in self-interest and vanity."
 slavic_unrest.0001.a: "A small price to pay for their loyalty."
 slavic_unrest.0002.t: "Pacify the South Slavs - The Gratitude of Ohrid"
 slavic_unrest.0002.desc: "The issuance of the Imperial Chrysobull granting autonomy to the Archbishopric of Ohrid has been met with fervent celebrations. In the city of Ohrid, the Archbishop of the Bulgars has publicly lauded the Emperor's piety and wisdom, declaring the ruler a worthy successor to the great Basil II. Across the Slavic-speaking churches of the Balkans, prayers are now offered for the health and stability of the Imperial throne. While this decree has slightly diminished the universal authority of the Ecumenical Patriarch in Constantinople, it has decisively bound the loyalty of the powerful Balkan church directly to the Emperor."
 slavic_unrest.0002.a: "A loyal church is a strong foundation."
 slavic_unrest.0003.t: "Pacify the South Slavs - The Watchtowers are Manned"
 slavic_unrest.0003.desc: "The fortress repair program has been successfully concluded. From the Danube frontier to the mountain passes of Macedonia, defensive walls stand tall and gates have been reinforced. Imperial garrisons are once again stationed on the battlements, their presence providing a renewed sense of security to the local populace. With these key strongpoints restored and manned, hostile raiders will find the European themes a much more difficult target. The roads are safer, the towns are protected, and Imperial authority is visible once more in stone and steel."
 slavic_unrest.0003.a: "Safety fosters loyalty."
 slavic_unrest.0004.t: "Pacify the South Slavs - Peace in the Passes"
 slavic_unrest.0004.desc: "The new Vigla have proven to be brutally effective. Their methods were harsh, but the results are undeniable: the brigand menace has been exterminated. Their leaders are dead, their followers scattered to the winds. Fear has secured what laws could not. The roads are now safe for merchants, and villagers sleep soundly. In the most remote valleys, the presence of the Vigla serves as a stark and constant reminder of the reach and power of Imperial authority."
 slavic_unrest.0004.a: "Order has been restored."
 slavic_unrest.0005.t: "Pacify the South Slavs - Full Granaries, Content People"
 slavic_unrest.0005.desc: "The tax reforms have been met with widespread relief and gratitude among the peasantry. Though the flow of coin to the treasury has slowed from these provinces, our army garrisons are now supplied by overflowing local granaries. More importantly, the common folk now see me not as a distant tax collector, but as a benevolent father who understands their plight. This goodwill is more valuable than silver."
 slavic_unrest.0005.a: "A well-fed peasant is a peaceful peasant."

 arbiter_of_the_slavs_modifier: "Arbiter of the Slavs"
 arbiter_of_the_slavs_modifier_desc: "By skillfully managing the proud and rebellious Slavic chieftains at the Balkan Synod, I have learned much about the art of diplomacy and the management of fractious vassals."
 light_of_the_balkans_modifier: "Light of the Balkans"
 light_of_the_balkans_modifier_desc: "My generous patronage and reorganization of the Church in the Balkans has earned me a reputation for great piety and wisdom."
 warden_of_the_haemus_modifier: "Warden of the Haemus"
 warden_of_the_haemus_modifier_desc: "My oversight of the great fortress restoration project in the Balkans has given me valuable expertise in defensive strategy and fortification."
 scourge_of_the_brigands_modifier: "Scourge of the Brigands"
 scourge_of_the_brigands_modifier_desc: "My ruthless campaign to eradicate the bandit scourge from the mountains has sharpened my martial skills and instilled a healthy dose of fear in my enemies."
 the_peoples_granary_modifier: "The People's Granary"
 the_peoples_granary_modifier_desc: "By easing the tax burden on the Balkan peasantry, I have earned their love and demonstrated a keen understanding of provincial economics and popular sentiment."

 slavic_unrest.1000.t: "The Balkan Themes are Pacified"
 slavic_unrest.1000.desc: "The whispers of rebellion have fallen silent. The Great Project has been a resounding success. Through our wisdom and timely intervention, the simmering cauldron of Balkan resentment has been cooled. The župans are now loyal courtiers, the clergy preach obedience to the Emperor, and the common folk are content in their security and prosperity.\n\nWe have not conquered them anew, but reminded them of the benefits of Roman peace. The Balkan themes, once a source of weakness, are now a stable and loyal part of the Empire, a bulwark against the northern barbarians."
 slavic_unrest.1000.a: "Wisdom has accomplished what steel could not."
 slavic_unrest.1001.t: "The Flames of Rebellion"
 slavic_unrest.1001.desc: "Our efforts have been in vain. The Great Project to placate the Balkans has failed. Our concessions were seen not as benevolence, but as weakness. Our gold has been accepted, but our authority is mocked. The župans have united against us, the clergy preach defiance, and the common people, rallied by charismatic rebels, are sharpening their pitchforks.\n\nThe unrest we sought to quell has been ignited into open rebellion. The Balkan themes are lost to us, and the resources we squandered are now being used to fund an army that marches against our remaining loyal garrisons. This is a disaster born of good intentions."
 slavic_unrest.1001.a: "This will be a costly lesson..."
 slavic_unrest.0006.t: "A Low Rumbling from the Mountains"
 slavic_unrest.0006.desc: "A worrying letter from a loyal governor in the Balkans, My Basileus. He writes not of armies or rebellion, but of a silence that has fallen over the land a silence filled with sharp glances and words left unsaid.\n\nHe says the air in the mountain valleys feels heavy, as if with shared, unspoken resentment. In the marketplaces, trade continues, but the laughter has gone. He fears this brooding discontent is a fire being carefully tended in the hearts of the Slavic peoples, waiting for a wind to rise. He urges us to be vigilant."
 slavic_unrest.0006.a: "Slavs? They will never stand united."
 slavic_unrest.0007.t: ""
 slavic_unrest.0007.desc: ""
 slavic_unrest.0007.a: ""
 slavic_unrest.0008.t: "The Stillness Returns"
 slavic_unrest.0008.desc: "Reports from the western mountains indicate that the tension gripping the region has broken. Like a summer storm that threatens but never arrives, the dark clouds of Slavic discontent have passed over, leaving the political landscape clear once more. It appears the local chieftains were unable to agree on a path forward, and their window of opportunity for a coordinated revolt has closed. With no banner to rally to, the common folk have turned their attentions back to the harvest and the simple rhythm of their daily lives. For now, the Emperor's peace remains the most compelling force in these lands."
 slavic_unrest.0008.a: "Peace is a harvest cultivated by a strong hand."
 slavic_unrest.0009.t: "Great Slavic Revolt"
 slavic_unrest.0009.desc: "The whispered rebellion in the west has erupted into a roar of open defiance. Georgi Vojteh, a magnate of Skopje whose power had been allowed to grow unchecked, has turned his sword against the Empire. He serves as the mind of the rebellion, but has found its heart in another: Konstantin Bodin Vojislavljević. In a cynical but potent political move, the rebels have cast Bodin as a long-lost scion of the Bulgarian kings and crowned him their "Tsar." This act has galvanized malcontents from the Danube to the Pindus Mountains. They flock to Vojteh's banner, not for the man himself, but for the crown he has placed upon Bodin's head. Their demands are not for gold or autonomy; they seek to erase the legacy of Imperial rule in the Balkans and forge a new empire from its ashes."
 slavic_unrest.0009.a: "Then I will erase their names from history."
 slavic_unrest.0010.t: "The Fires Are Quenched"
 slavic_unrest.0010.desc: "A dispatch from the Balkans confirms that the uprising is over. After months of brutal fighting, Imperial forces have broken the back of the rebellion. The rebel leadership has been scattered to the winds, and their armies have melted back into the mountainsides from whence they came. The integrity of the Empire has been preserved, though the cost in blood and coin was not insignificant. With the conclusion of the conflict, the western themes are once again under firm Imperial control, but the scars of the war will likely take years to fade, leaving a legacy of devastation and mistrust."
 slavic_unrest.0010.a: "A necessary, if regrettable, business."
 slavic_unrest.0011.t: "Bulgaria is Lost!"
 slavic_unrest.0011.desc: "The war in the Balkans has ended in disaster. Imperial armies have suffered a catastrophic defeat, driven from the western themes entirely by a rebel army emboldened by victory. In the wake of our collapse, they have declared their independence. In a brazen ceremony, Konstantin Bodin has been crowned ruler of a newly-formed Bulgarian kingdom, carving his realm from the very heart of Imperial lands. The Emperor's banner no longer flies over the key cities of Skopje or Ohrid. This is a dark day for the Empire—a humiliating blow that will be recorded in the chronicles for all time. Our authority is weakened, emboldening our enemies and sowing the seeds of doubt among our subjects."
 slavic_unrest.0011.a: "This shame will not be forgotten... nor forgiven."
 
 slavic_unrest.0012.t: "A Realm Reborn"
 slavic_unrest.0012.desc: "The Emperor's armies are broken! The foreign yoke has been shattered, its pride humbled by Bulgarian steel. From the peaks of the Balkan Mountains to the fertile Danubian plains, the sound of freedom rings out. The long servitude is over; a new kingdom has risen from its ashes, stronger and prouder than before!\n\nAs the bells of Ohrid toll in celebration, a delegation of elder Bulgarian boyars approaches my new throne. Their leader, his face etched with the gravity of the moment, kneels. 'Great Ruler,' he begins, 'you have delivered us from bondage with your sword. You have won this kingdom. But to truly rule it, the people must see you not only as a liberator, but as the rightful heir to our ancient glory.'\n\nHe continues, his voice filled with reverence. 'The name "Petar" is beloved by all Bulgarians. It echoes the piety and strength of the sainted Ruler Petar I, who presided over our Golden Age. By taking this name, you bind your own hard-won legacy to his blessed one. Let Konstantin Bodin be the hero who freed us. Let Petar be the ruler who will be the father of our people.'"
 slavic_unrest.0012.a: "A wise suggestion. I will be the Ruler my people need."
 slavic_unrest.0012.b: "I won this throne as Konstantin Bodin. I will rule as Konstantin Bodin."
 
 slavic_unrest.0013.t: "A Tsar is Proclaimed!"
 slavic_unrest.0013.desc: "The grand square in the capital is a sea of people. Boyars stand in their finery, soldiers in their mail, and common folk from every corner of the city have gathered to bear witness. As I stand on the balcony of the palace, a herald steps forward, a heavy parchment scroll in his hand.\n\nHis voice rings out across the square, declaring an end to the long servitude and the dawn of a new age. He speaks of battles won, of a people united, and of a destiny reclaimed. Finally, with a voice full of pride, he proclaims the rebirth of the Bulgarian Tsardom and names me, [ROOT.Char.GetFirstNameNoTooltip], as its first Tsar!\n\nFor a heartbeat, there is only a stunned silence. Then, the square erupts. A thunderous roar of 'TSAR! TSAR! TSAR!' rises from a thousand throats, a wave of sound that shakes the very stones. The proudest boyars draw their swords and raise them high in salute, their cheers joining the cacophony.\n\nThe First Empire is a memory; the new one is a living, breathing reality. The Bulgarian Tsardom lives again."
 slavic_unrest.0013.a: "My duty, as a Tsar, now begins."
 
 balkan_folly_modifier: "Balkan Folly"
 balkan_folly_modifier_desc: "My grand project to pacify the South Slavs has backfired spectacularly, encouraging the very rebellion it was meant to prevent and making me appear weak and foolish."
 
 smoldering_slavic_resentment_modifier: "Smoldering Slavic Resentment"
 smoldering_slavic_resentment_modifier_desc: "The local Slavic populace feels ignored and exploited by distant Constantinople. Imperial tax collectors are viewed with suspicion, and outsiders are not welcome in the local communities. Authority here is fragile."
 restored_balkan_province_modifier: "Restored Balkan Province"
 restored_balkan_province_modifier_desc: "This province has been successfully pacified and reintegrated into the Empire. The people are loyal, the local administration is effective, and the land contributes fully to the Imperial economy."

