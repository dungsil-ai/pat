 refortify_danubian_limes.0014.t: "Report: The Mason's Work is Done"
 refortify_danubian_limes.0014.desc: "My lord, a report from the overseer. The masons have laid their last stone and the carpenters have driven their final nail. The most egregious signs of decay have been erased; sections of the wall that were crumbling now stand whole and seamless, the roads between them have been cleared of weeds and debris, and the splintered gates have been replaced with solid oak. The physical scars of neglect are healed."
 refortify_danubian_limes.0014.a: "Their efforts have been noted."
 
 refortify_danubian_limes.0015.t: "Report: Accounts Settled"
 refortify_danubian_limes.0015.desc: "My lord, the quartermaster has submitted the final accounts for the repair supplies. Every barrel of lime, every wagonload of iron fittings, and every cubit of timber has been successfully procured and put to use. The new mortar holds firm between ancient stones, and fresh timbers support the watchtower roofs. The logistical effort is concluded; our frontier is materially whole again."
 refortify_danubian_limes.0015.a: "Great work!"
 
 refortify_danubian_limes.0016.t: "Report: The Shield is Polished"
 refortify_danubian_limes.0016.desc: "My lord, the officers seconded to the frontier have submitted their final report. The transformation is complete. The 'farmer' has been purged from the 'soldier-farmer'; what remains is a core of hardened, vigilant troops. Apathy has been replaced by readiness, and the rust has been scoured from both armor and spirit. The Limitanei once again stand as a proper military force, their patrols a constant and reassuring presence on the Limes."
 refortify_danubian_limes.0016.a: "Empire stands because of these frontier defenders."
 
 refortify_danubian_limes.0017.t: "A New Office of the Realm"
 refortify_danubian_limes.0017.desc: "My lord, the new Curator of the Limes has been formally invested and has established their office on the frontier. Their first edicts, concerning regular inspections and mandatory maintenance budgets, have already been sent to the local garrisons. For the first time, a single authority is now responsible for the long-term integrity of our defenses. A chain of accountability has been forged to prevent the Limes from ever again falling into such a disgraceful state."
 refortify_danubian_limes.0017.a: "Some organization was sorely needed there."
 
 refortify_danubian_limes.0018.t: "The Limes Moesiae is Restored!"
 refortify_danubian_limes.0018.desc: "A final, satisfying report has arrived from the Curator of the Limes. The last repair crew has been dismissed, the last account has been settled, and the last garrison has passed its final inspection. The work is done.\n\nWhere rot and decay once held sway, there is now order. The roads are clear, the walls are whole, and the watchtowers stand as silent, steadfast sentinels. A quiet competence has replaced the air of neglect that so long plagued the frontier. The marching of patrols has replaced the rustling of weeds in the wind.\n\nWe have not built a new wonder, but have instead performed the far more vital, if less glorious, task of honoring our ancestors' legacy. We have taken what was broken and made it strong again. The shield of the Empire, scoured of its rust and polished bright, is once more fit to protect the realm."
 refortify_danubian_limes.0018.a: "Let this duty never again be shirked."
 
 refortify_danubian_limes.0019.t: "The Rot Prevails"
 refortify_danubian_limes.0019.desc: "The reports from the frontier make for grim reading. The effort to restore the Limes Moesiae has collapsed into a hopeless morass of mismanagement and wasted coin.\n\nThe half-mended walls have been abandoned, leaving them in an even more precarious state than before. The repair crews have departed in disgust, their wages unpaid. The newly appointed officers, unable to instill discipline in the disillusioned garrisons, have returned to the capital, their mission a demonstrable failure.\n\nWe were given a final chance to honor our forebears' legacy, to mend the shield they built. We have failed. We threw good coin after bad, and our weakness has been laid bare for all to see. The Limes is no longer a neglected defense; it is now nothing more than a sprawling line of ruins, a monument to our own futility. The decay is now irreversible."
 refortify_danubian_limes.0019.a: "The final nail in the coffin."
 
 refortify_danubian_limes.0020.t: "Report: The Foundations Exposed"
 refortify_danubian_limes.0020.desc: "My lord, the back-breaking initial phase is complete. What was once a barely perceptible line of hills and overgrown ruins is now a wide, passable scar across the Thracian landscape. The original stone foundations of the Anastasian Wall have been fully exposed and are ready for the masons. We now have a clean canvas for our grand design."
 refortify_danubian_limes.0020.a: "A dirty task, but it had to be done."
 
 refortify_danubian_limes.0021.t: "Report: A Mountain of Bricks and Stone"
 refortify_danubian_limes.0021.desc: "My lord, a dispatch from the project's quartermaster. The last of the required materials have been delivered to the construction sites. All along the cleared trace, one can see man-made mountains of cut stone and vast, orderly pyramids of ruddy bricks awaiting the masons' trowels. The air is thick with the dust of industry; we now have everything we need to raise the walls to the sky."
 refortify_danubian_limes.0021.a: "All the necessary supplies were delivered."
 
 refortify_danubian_limes.0022.t: "Report: The Vigiles Assume Their Posts"
 refortify_danubian_limes.0022.desc: "My lord, the new *Vigiles* have completed their training. They have been organized into regular cohorts and have formally taken up their duty stations in the completed sections of the wall. Banners now fly from the watchtowers, and the steady tread of patrols can be heard on the battlements both day and night. The wall now has its sworn protectors."
 refortify_danubian_limes.0022.a: "Stand fast, soldiers of the Empire!"
 
 refortify_danubian_limes.0023.t: "A Commander for the Wall"
 refortify_danubian_limes.0023.desc: "My lord, your chosen Count has been formally invested with authority over the Long Walls. They have established their headquarters at the wall's central fortress and have already begun issuing edicts to coordinate the efforts of the engineers and garrison commanders. The entire endeavor now operates under a single, unified command structure, ensuring maximum efficiency."
 refortify_danubian_limes.0023.a: "A start of an honorable duty"
 
 refortify_danubian_limes.0024.t: "The Long Walls Stand Anew"
 refortify_danubian_limes.0024.desc: "A dispatch from the Count of the Long Walls, sealed not with wax, but with triumphant pride. The final stone has been laid. The last tower has been capped. From the Euxine Sea to the Propontis, an unbroken ribbon of stone and brick now guards the Thracian peninsula.\n\nThe Anastasian Wall lives again. It is no longer a ghost on the landscape, but a formidable reality. Its battlements stretch farther than the eye can see, its gates are manned by disciplined Vigiles, and its presence brings a profound sense of security to the capital's breadbasket. The farmers of Thrace now till their fields in the shadow of a shield they can trust.\n\nAny army marching on the Queen of Cities will no longer have a clear path to glory. They must first face this mighty obstacle, shattering their ambitions and strength upon its fifty-seven kilometers of defiant stone, long before they can even dream of seeing the Golden Horn."
 refortify_danubian_limes.0024.a: "The Queen of Cities sleeps soundly behind her new shield."
 
 refortify_danubian_limes.0025.t: "The Long Ruin"
 refortify_danubian_limes.0025.desc: "The reports from Thrace are not of construction, but of collapse. The ambitious project to rebuild the Long Walls has utterly failed.\n\nAcross the landscape, a long, sad scar of half-finished walls and abandoned trenches marks the grave of our grand design. Mountains of quarried stone now serve only as shelter for shepherds, and the kilns that once fired millions of bricks have grown cold. The newly-formed Vigiles, their wages unpaid, have deserted their posts, melting back into the countryside with tales of our folly.\n\nWe have squandered a fortune not for a wall, but for a monument to our own hubris. The project is now derisively called 'The Long Ruin' by the local populace. Instead of providing security, we have only proven our own incompetence, leaving the capital's heartland more exposed than ever."
 refortify_danubian_limes.0025.a: "A folly for the ages."
 
