l_english:

 great_project_type_refortify_danubian_limes: "Refortify The Danubian Limes - Moesia"
 great_project_type_refortify_danubian_limes_desc: "The Danube, our ancient shield, is fractured. Nowhere is this decay more apparent than along the stretch that once formed the proud Imperial province of Moesia. From the strategic fortress of Singidunum down to the shores of the Euxine Sea, this vital artery of the Empire lies exposed.\n\nI have called upon the great themes and powerful archons of the realm to focus their combined might on this singular task. This will not be my endeavor alone, but a united effort to once again raise the Limes Moesiae. Our collective legacy will be etched in stone and steel, and the heartland of our northern frontier will be secure for generations to come."
 great_project_type_tooltip_refortify_danubian_limes: ""
 great_project_name_possessive_refortify_danubian_limes: ""
 great_project_name_refortify_danubian_limes: ""
 
 great_project_type_maintain_danubian_limes: "Maintain the Limes Moesiae"
 great_project_type_maintain_danubian_limes_desc: "The great work of our ancestors has been shamed by neglect. The walls crumble, the roads are overgrown, and the garrisons are complacent. If we do not act, this vital shield will be lost to history forever.\n\nThis is not a project of glorious creation, but one of sober duty. We must reinvest in the frontier, repairing what is broken and restoring the vigilance that has been lost. The cost will be a fraction of the original, as the foundations remain strong, but the task is no less critical for the survival of the realm."
 great_project_type_tooltip_maintain_danubian_limes: ""
 great_project_name_possessive_maintain_danubian_limes: ""
 great_project_name_maintain_danubian_limes: ""
 
 great_project_type_rebuild_anastasian_wall: "Rebuild the Anastasian Wall"
 great_project_type_rebuild_anastasian_wall_desc: "The Theodosian Walls protect the Queen of Cities, but what protects its Thracian heartland? Long ago, the Emperor Anastasius built a mighty wall from sea to sea, the 'Long Walls,' to serve as an outer shield. Today, it is naught but a ghostly trace on the landscape, a crumbling monument to a safer age.\n\nTo rebuild it is a colossal undertaking. It will require a vast mobilization of resources to restore its fifty-seven kilometer length. But upon its completion, the entire peninsula leading to Constantinople will become a fortress, granting us a deep buffer zone against any threat from the west and securing the capital's breadbasket for good."
 great_project_type_tooltip_rebuild_anastasian_wall: ""
 great_project_name_possessive_rebuild_anastasian_wall: ""
 great_project_name_rebuild_anastasian_wall: ""
 
 great_project_type_refortify_danubian_limes_contribution_imperial_quarries: "Imperial Tithe of Stone and Timber"
 great_project_type_refortify_danubian_limes_contribution_imperial_quarries_desc: "I have called upon the lords of Macedonia and Thrace to tithe stone from their quarries and timber from their forests. While their contributions form the bulk of what is needed, the Imperial Treasury must bear the cost of smelting the iron and forging the countless tools required by the work crews."
 great_project_type_refortify_danubian_limes_contribution_name_imperial_quarries: ""
 great_project_type_refortify_danubian_limes_contribution_annona_militaris: "Organize the Thematic Annona"
 great_project_type_refortify_danubian_limes_contribution_annona_militaris_desc: "The themes of Hellas and Thessalonika have been commanded to provide the grain, wine, and livestock necessary to feed our armies of laborers. My own authority and prestige are required to weave their individual contributions into a single, functional supply system—a river of grain flowing ever northward."
 great_project_type_refortify_danubian_limes_contribution_name_annona_militaris: ""
 great_project_type_refortify_danubian_limes_contribution_vexillation_detachments: "Secondment of the Tagmata"
 great_project_type_refortify_danubian_limes_contribution_vexillation_detachments_desc: "This hostile frontier is no place for common laborers alone. The Imperial household will dispatch my own elite Tagmata units to serve as engineers and guards. This secondment means they will be unavailable for other campaigns, and reinforcing them will be a costly affair until their duty is done."
 great_project_type_refortify_danubian_limes_contribution_name_vexillation_detachments: ""
 great_project_type_refortify_danubian_limes_contribution_corvee_labor: "Corvée Labor"
 great_project_type_refortify_danubian_limes_contribution_corvee_labor_desc: "I have authorized the Strategos of Paristrion to levy a corvée from the local populace. The people contribute to their own defense through their toil, but it is a burden that will be felt across the theme. While it spares my treasury, their grumbling will be a political cost I must bear."
 great_project_type_refortify_danubian_limes_contribution_name_corvee_labor: ""
 great_project_type_refortify_danubian_limes_contribution_master_architect: "Sponsor Architects and Master Builders"
 great_project_type_refortify_danubian_limes_contribution_master_architect_desc: "A project of this scale cannot be left to a provincial governor. I must summon a renowned architect—either from my own court or by poaching one from a deserving vassal—to serve as the master of works, lending their genius and reputation to this grand endeavor."
 great_project_type_refortify_danubian_limes_contribution_name_master_architect: ""
 great_project_type_refortify_danubian_limes_contribution_imperial_sanction: "Secure the Patriarch's Blessing"
 great_project_type_refortify_danubian_limes_contribution_imperial_sanction_desc: "To unify the realm behind this cause, it must be seen as holy work. The Ecumenical Patriarch must be convinced—through faith, diplomacy, or a significant donation from the Imperial coffers—to grant his blessing, proclaiming this great restoration as the righteous duty of all good Romans."
 great_project_type_refortify_danubian_limes_contribution_name_imperial_sanction: ""
 great_project_type_refortify_danubian_limes_contribution_singidunum_fortress: "White Fortress of Singidunum"
 great_project_type_refortify_danubian_limes_contribution_singidunum_fortress_desc: "As the westernmost bastion of the new Limes, the fortress of Singidunum requires special attention beyond the standard fortifications. This optional undertaking will allocate a disproportionate share of our finest engineers and materials to rebuild its walls to an unmatched height and strength. This ensures the entire frontier is safe from flanking attacks originating from the Pannonian basin, creating an unbreachable anchor for our dominion."
 great_project_type_refortify_danubian_limes_contribution_name_singidunum_fortress: ""
 great_project_type_refortify_danubian_limes_contribution_durostorum_citadel: "The Command Citadel: Durostorum"
 great_project_type_refortify_danubian_limes_contribution_durostorum_citadel_desc: "Durostorum is the capital of the Paristrion Theme and the designated nerve center for the entire Limes. While standard fortifications are planned, this optional contribution will fund the construction of a new Imperial Citadel within the city itself. This will establish a powerful seat of command from which our Strategoi can direct the defense of the whole frontier with greater efficiency and security, solidifying our strategic capabilities."
 great_project_type_refortify_danubian_limes_contribution_name_durostorum_citadel: ""
 great_project_type_refortify_danubian_limes_contribution_trajans_crossing: "The Imperial Trajanic Crossing"
 great_project_type_refortify_danubian_limes_contribution_trajans_crossing_desc: "A truly ambitious, and entirely optional, component of the Initiative. While not essential for a basic defense, the dream of spanning the Danube itself remains a tantalizing prospect. This contribution represents a monumental, very costly effort to attempt the impossible: to rebuild Trajan's legendary bridge upon its ancient piers. Success would provide an unrivaled strategic advantage, but the immense cost reflects the high risk of failure."
 great_project_type_refortify_danubian_limes_contribution_name_trajans_crossing: ""
 great_project_type_refortify_danubian_limes_contribution_tomis_port: "The Port of Tomis"
 great_project_type_refortify_danubian_limes_contribution_tomis_port_desc: "A fortified frontier is a hungry and expensive frontier. This optional contribution, heavily subsidized by the merchant guilds, will focus on the complete restoration of the great port of Tomis. A thriving port will not only fill our coffers with customs duties to offset the project's costs, but will also allow us to supply the entire Paradounavon by sea, easing the immense logistical strain on our land routes and improving the project's overall efficiency."
 great_project_type_refortify_danubian_limes_contribution_name_tomis_port: ""
 
 great_project_type_rebuild_anastasian_wall_contribution_clear_traces: "Muster the Repair Crews"
 great_project_type_rebuild_anastasian_wall_contribution_clear_traces_desc: "The Long Walls are currently choked by centuries of neglect. We must dispatch thousands of laborers with axes and billhooks to clear the thorny thickets that have consumed the battlements. Engineers will then follow, directing crews to shift the immense weight of fallen rubble and fully expose the wall's ancient foundations. Only then can the work of rebuilding truly begin.."
 great_project_type_rebuild_anastasian_wall_contribution_name_clear_traces: ""
 great_project_type_rebuild_anastasian_wall_contribution_quarry_stone_and_bricks: "Quarry Stone and Fire Bricks"
 great_project_type_rebuild_anastasian_wall_contribution_quarry_stone_and_bricks_desc: "A wall of this magnitude cannot be built with hope and ambition alone. This contribution will fund the reopening of ancient quarries in the Thracian hills, while vast clay pits will be dug to supply new brickworks. An army of quarrymen, carters, and kiln-tenders will be needed to produce the mountains of stone and ruddy bricks required for the facing and core of the restored wall."
 great_project_type_rebuild_anastasian_wall_contribution_name_quarry_stone_and_bricks: ""
 great_project_type_rebuild_anastasian_wall_contribution_organize_wall_guard: "Organize the Wall Guard (Vigiles)"
 great_project_type_rebuild_anastasian_wall_contribution_organize_wall_guard_desc: "A wall without defenders is merely a long pile of stones. This contribution will fund the establishment of a new permanent garrison force, the *Vigiles Anastasiani*. Recruited from the hardy townsfolk and farmers of Thrace, these soldier-settlers will be trained to man the towers, patrol the battlements, and serve as the wall's vigilant eyes and ears, sworn to its defense."
 great_project_type_rebuild_anastasian_wall_contribution_name_organize_wall_guard: ""
 great_project_type_rebuild_anastasian_wall_contribution_appoint_long_walls_count: "Appoint a Count of the Long Walls"
 great_project_type_rebuild_anastasian_wall_contribution_appoint_long_walls_count_desc: "A project of this scale requires singular, unwavering authority. We must appoint a trusted commander to the new office of 'Count of the Long Walls.' This governor will act as the supreme commander of the *Vigiles*, the chief administrator of the project, and the final authority on all matters pertaining to the wall's construction and defense, ensuring the project does not fall into bureaucratic chaos."
 great_project_type_rebuild_anastasian_wall_contribution_name_appoint_long_walls_count: ""
 
 great_project_type_maintain_danubian_limes_contribution_muster_repair_crews: "Muster the Repair Crews"
 great_project_type_maintain_danubian_limes_contribution_muster_repair_crews_desc: "The great work of our ancestors has been shamed by neglect. We must dispatch skilled masons to replace the fallen stones, laborers to clear the overgrown roads, and carpenters to mend the splintered gates. This is not a grand levy, but a targeted deployment of craftsmen to undo the patient siege of time."
 great_project_type_maintain_danubian_limes_contribution_name_muster_repair_crews: ""
 great_project_type_maintain_danubian_limes_contribution_procure_repair_supplies: "Procure Repair Supplies"
 great_project_type_maintain_danubian_limes_contribution_procure_repair_supplies_desc: "The foundations remain strong, but the mortar that binds them has turned to dust. This contribution will allocate funds to procure fresh timber for watchtower roofs, iron for new gate fittings, and endless wagonloads of mortar and lime. It is the humble but essential task of providing the sinews for our work of restoration."
 great_project_type_maintain_danubian_limes_contribution_name_procure_repair_supplies: ""
 great_project_type_maintain_danubian_limes_contribution_reform_limitanei: "Reform the Border Guard"
 great_project_type_maintain_danubian_limes_contribution_reform_limitanei_desc: "The 'soldier-farmers' of the frontier have forgotten the first half of their title. We must send veteran officers from the Tagmata to reinstill martial discipline, bring the garrisons back to full strength, and re-establish a regimen of constant patrols. Vigilance, not apathy, must once again become the watchword on the Danube."
 great_project_type_maintain_danubian_limes_contribution_name_reform_limitanei: ""
 great_project_type_maintain_danubian_limes_contribution_appoint_limes_curator: "Appoint a Curator of the Limes"
 great_project_type_maintain_danubian_limes_contribution_appoint_limes_curator_desc: "This decay happened because no one was watching. To prevent history from repeating itself, we must establish a new permanent office: a Curator of the Limes. This official, reporting directly to me, will be responsible for overseeing regular maintenance, auditing the frontier's readiness, and ensuring that the shield of the Empire is never again allowed to rust."
 great_project_type_maintain_danubian_limes_contribution_name_appoint_limes_curator: ""

 danubian_limes_modifier: "Danubian Limes"
 danubian_limes_modifier_desc: "From Singidunum to the shores of the Euxine, a chain of interconnected forts, watchtowers, and military roads stands vigilant. This restored frontier, the Limes Moesiae, projects our power, deters opportunistic raiders, and provides a formidable line of defense against any concerted invasion from north of the great river."
 white_fortress_modifier: "The White Fortress"
 white_fortress_modifier_desc: "The gleaming white walls of Singidunum soar into the sky, a profound statement of Imperial might. Dominating the confluence of the Sava and Danube, this massive fortress is far more than a simple fortification; it is an unbreachable western anchor for the entire Limes, daring any challenger to test its strength."
 durostorum_citadel_modifier: "The Durostorum Citadel"
 durostorum_citadel_modifier_desc: "The heart of the Limes Moesiae beats within the secure walls of the Imperial citadel at Durostorum. This is the nerve center of the frontier's defenses, the headquarters from which our Strategoi command the garrisons, coordinate defenses, and resist the insidious plots of our enemies with unmatched efficiency."
 trajans_crossing_modifier: "Trajan's Crossing"
 trajans_crossing_modifier_desc: "A great bridge of stone and timber spans the Danube, a miracle of engineering that defies the river's might. Our armies can cross the great river as if it were a dry road, granting us a profound strategic advantage in both the defense of our realm and the projection of our power into the barbarian heartlands."
 golden_port_modifier: "The Golden Port"
 golden_port_modifier_desc: "The port of Tomis is a vibrant nexus of commerce. Ships from across the Euxine Sea fill its harbor, and its customs houses overflow with coin. This bustling emporium funnels the wealth of the north directly into the local economy, sustaining the frontier and enriching the realm."
 corvee_labor_modifier: "Corvée Labor Levied"
 corvee_labor_modifier_desc: "By Imperial decree, our people have been levied for state labor. They are taken from their fields to haul stone and dig ditches, and while they toil for the promise of future security, our lands are neglected today and discontent quietly simmers beneath the surface."
 vexillation_detachments_modifier: "Vexillation Detachments Assigned"
 vexillation_detachments_modifier_desc: "Our finest household troops and most skilled military engineers have been assigned to special duty on the frontier. While their expertise is essential to Imperial security, their prolonged absence places a significant strain on our core military readiness. Replacing losses and raising new professional regiments is now a far more costly affair."
 neglected_limes_modifier: "Neglected Danubian Limes"
 neglected_limes_modifier_desc: "Time is a merciless river. The watchtowers that once stood proud are now crumbling, the military roads are overgrown, and the frontier garrisons are understrength and complacent. The security provided by the Limes is fading, day by day. Without renewed investment and Imperial vigilance, this great shield will soon be little more than a memory."
 anastasian_wall_restored_modifier: "Anastasian Wall Restored"
 anastasian_wall_restored_modifier_desc: "The Long Walls stand once more, a fifty-seven kilometer barrier of stone and resolve. It serves as the capital's outer shield, transforming the entire Thracian peninsula into a deep buffer zone. Any invading army must now overcome this formidable obstacle long before they can even gaze upon the walls of Constantinople itself, buying precious time for the Empire to rally its defenses."
 
 
 refortify_danubian_limes.0001.t: "Report: The Foundations are Gathered"
 refortify_danubian_limes.0001.desc: "My lord, a dispatch from the forward depots. The groaning of wagon wheels and the lowing of exhausted oxen has finally fallen silent. Vast fields near the construction sites are now covered in precisely cut stone, stockpiled into small hills that await the masons. Next to them, a man-made forest of fresh-cut timber lies ready, its scent hanging heavy in the air.\n\nEvery tithe has been collected, every resource accounted for. We have the raw material to build an empire anew."
 refortify_danubian_limes.0001.a: "Excellent work."

 refortify_danubian_limes.0002.t: "Report: The Great Work is Fed"
 refortify_danubian_limes.0002.desc: "My lord, the Logothete of the Annona sends word of a logistical triumph. The ancient military supply system has been reborn, a testament to our organizational genius. A constant stream of barges on the river and guarded convoys on the roads now flows northward, laden with grain, wine, and salted meat from the southern themes.\n\nNot a single worker will go hungry, nor will a single soldier want for rations. The project's belly is full, and its spirit is high."
 refortify_danubian_limes.0002.a: "Hungry soldier does not fight."

 refortify_danubian_limes.0003.t: "Report: The Eagles Have Landed"
 refortify_danubian_limes.0003.desc: "My lord, a courier has arrived, his horse lathered in sweat. The elite engineering vexillations have completed their march and established their camps. Their disciplined grid of tents stands in stark contrast to the joyous chaos of the construction sites, and their Imperial banners, snapping crisply in the wind, serve as a clear message to any watching foe.\n\nThe project is now under the watchful eye of the finest military minds in the Empire."
 refortify_danubian_limes.0003.a: "They are the living heart of our defense."

 refortify_danubian_limes.0004.t: "Report: The Ants Swarm the Anthill"
 refortify_danubian_limes.0004.desc: "My lord, the local Strategoi report that the corvée is fully levied. A veritable city of tents has sprung up along the river, and the air from dawn to dusk is filled with the din of ten thousand laborers. The foremen's calls echo over the sounds of pickaxes striking earth and axes felling trees.\n\nThey toil under the sun with a resigned but determined spirit, their sweat consecrating the very ground upon which our new shield will be built."
 refortify_danubian_limes.0004.a: "A necessary element."

 refortify_danubian_limes.0005.t: "Visionaries Arrive"
 refortify_danubian_limes.0005.desc: "My lord, the most skilled acrhitects and master builders have arrived at the primary construction site, their entourage laden with scrolls, astrolabes, and complex measuring devices. Their presence alone has silenced the court's doubters and instilled a new sense of purpose in the engineers.\n\nAlready, they speak of stresses and counterweights with a fiery passion, making grand gestures that only they can truly comprehend. The project is no longer just a plan; it is now an artist's canvas."
 refortify_danubian_limes.0005.a: "Knowledge is our sharpest weapon."
 
 refortify_danubian_limes.0006.t: "Work Made Holy"
 refortify_danubian_limes.0006.desc: "My lord, a decree sealed with the Patriarch's own sigil has been read aloud in every field chapel and workers' camp. His Holiness proclaims this endeavor a 'shield for all Christendom' and a righteous work in the eyes of God. A wave of renewed vigor has washed over the laborers, who now see their toil not as a worldly burden, but as a form of prayer.\n\nEvery stone they lift is an offering, every ditch they dig a testament to their faith."
 refortify_danubian_limes.0006.a: "Heavens are smiling at our diligence."
 
 refortify_danubian_limes.0007.t: "White City stands!"
 refortify_danubian_limes.0007.desc: "My lord, the sun glints off walls so white they appear carved from pristine marble. The great western fortress is complete, its battlements wide enough for a dozen men to walk abreast. Siege masters who have seen the plans are said to weep at its perfection, its interlocking fields of fire, and its colossal cisterns. Our Pannonian flank is no longer merely defended; it is invincible."
 refortify_danubian_limes.0007.a: "Our bulwark against Pannonia"

 refortify_danubian_limes.0008.t: "The Brain of the Limes"
 refortify_danubian_limes.0008.desc: "My lord, the command citadel now stands apart from the main fortress, a bastion within a bastion. Inside its secure walls, maps line the operations room—the *strategion*—and couriers come and go in an endless, orderly stream, carrying orders and intelligence reports. From this nerve center, our commanders can react to threats with unnerving speed and coordination. This is not just a wall; it is a weapon."
 refortify_danubian_limes.0008.a: "On shoulders of giants"
 
 refortify_danubian_limes.0009.t: "The Great River has been Bridged!"
 refortify_danubian_limes.0009.desc: "My lord, the impossible has been made manifest. The great bridge stands defiant against the current, a ribbon of stone and timber thrown across the water's expanse. Our legions now march with the speed of rumor, able to strike deep into the northern lands and return before our enemies can even muster. The great river is no longer a border; it is merely an obstacle we have surmounted, a testament to our will."
 refortify_danubian_limes.0009.a: "In honour of great Trajan!"
 
 refortify_danubian_limes.0010.t: "The Euxine Port is Open for Trade!"
 refortify_danubian_limes.0010.desc: "My lord, the great Pharos of the north is lit once more, its beam cutting through the darkness of the Euxine Sea as a beacon of safety and commerce. The scent of foreign spices, pine tar, and sea salt now hangs in the air, overwhelming the smell of sawdust and mud. It is the scent of pure profit, a golden stream now flowing directly into our coffers, ensuring the Limes will pay for itself for years to come."
 refortify_danubian_limes.0010.a: "May it bring glory and wealth."
 
 refortify_danubian_limes.0011.t: "A Silence on the Danube"
 refortify_danubian_limes.0011.desc: "After years of toil that have consumed the wealth of provinces and the sweat of a generation, a strange silence has fallen over the Danube. The ringing of hammers has ceased, the calls of foremen have faded, and the dust of construction has finally settled. In their place stands the Limes Moesiae, complete and magnificent.\n\nFrom the western anchor to the Euxine coast, a seamless shield of stone and steel now guards the realm. The age of fear is over. The petty chieftains who once raided with impunity now look upon our soaring towers and do not dare to cross. The people of the frontier, secure behind walls they helped to build, are beginning to forget the taste of fear.\n\nThis is more than a line on a map. It is a declaration of permanence, a monument to your vision and your will. While other kings build castles of sand, you have raised a bulwark against the tide of history.""
 refortify_danubian_limes.0011.a: "And now... they will have peace."
 
 refortify_danubian_limes.0012.t: "A Dream in Ruins"
 refortify_danubian_limes.0012.desc: "The ringing of hammers has ceased on the Danube. Not in triumph, but in weary, final defeat.\n\nHalf-finished walls, like rows of broken teeth, stand exposed to the elements. Vast piles of timber, once destined for mighty works, now lie rotting in the rain. The quarries sit choked with cut stone that will never be laid, monuments to a promise that will never be kept. The thousands of laborers, their wages unpaid and their toil for naught, have drifted away, returning to their villages with hollow eyes and bitter tales of our folly.\n\nThe whispers in my court have grown to a roar of condemnation. They speak of a squandered treasury, of bled-dry vassals, and of an ambition that far outstripped our means. The frontier, once buzzing with the prospect of security, is now weaker and more vulnerable than ever before, its defenders disillusioned and its resources spent.\n\nThis is not a monument to my vision, but a vast, sprawling tombstone for my grandest ambition. A testament to failure on an Imperial scale."
 refortify_danubian_limes.0012.a: "A bitter, costly lesson."
 
 refortify_danubian_limes.0013.t: "The Patient Siege of Time"
 refortify_danubian_limes.0013.desc: "A grim dispatch has arrived from the Paristrion Theme. The Strategos writes not of armies or invasions, but of a more insidious foe: neglect.\n\nHe reports that the watchtowers, once manned by vigilant sentinels, are now nests for birds and dens for wolves, their roofs collapsing under the patient siege of the seasons. The grand military roads, which once echoed with the tread of marching legions, have become treacherous paths for merchants, their stones pried up by grasping weeds. Even the walls of the great fortresses have not been spared, as local landowners quietly pilfer stone for their own manors, weakening the very shield that protects them.\n\nThe garrisons, their pay often late and their purpose forgotten by a distant court, have grown complacent. Their martial discipline has given way to agrarian apathy; they tend to their vegetable patches with more diligence than their patrols. The shield of the Empire, once forged in fire and ambition, has grown thin and brittle. The old fear, long banished from this frontier, is beginning to creep back into the hearts of my subjects along the river.\n\nThe Limes Moesiae is no more; in its place is a line of crumbling ruins and a fading memory of security."
 refortify_danubian_limes.0013.a: "So the great work of our ancestors fades..."
 
