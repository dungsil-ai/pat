 pecheneg_invasion.0002.t: "The Great Muster"
 pecheneg_invasion.0002.desc: "The ground trembles. From every direction, a thunder of hooves has been echoing for days, converging on the plains near your camp. A sea of felt and leather tents now stretches to the horizon, a gathering of the tribes on a scale not seen in a generation.\n\nA council of your most powerful Boyars and Chieftains has just stormed into your great tent, their faces flushed with fervor and ambition. 'The tribes are united!' one proclaims, gesturing to the endless host outside. 'Our scouts report the Romans are fat and content in their stone cities. Their fields south of the Danube are ripe for the taking, their monasteries heavy with gold!'\n\nThe lead chieftain steps forward, his hand resting on his sword. 'The Sky Father has given us this moment! The warriors are restless, their spears thirst for glory. We have gathered the horde, and it demands to be unleashed. Lead us, Great Khan! Lead us to victory and plunder against the #bold Byzantine Empire#!'"
 pecheneg_invasion.0002.b: "The Sky Father wills it! We ride for glory and gold!"
 pecheneg_invasion.0002.a: "Fools! You would dash our people against the City of Walls?"

 pecheneg_invasion.0003.t: "The Danube Has Fallen"
 pecheneg_invasion.0003.desc: "A blood-caked rider, his horse collapsing dead within the capital itself, has brought a message of pure terror from the northern frontier. The Danube, our ancient shield against the barbarians, has been breached.\n\nThis is no mere raid. A great muster of the Pecheneg tribes has descended in a single, unified wave. Our border garrisons were swept aside, the scattered watchtowers burned before they could even send a warning. Now, a living storm of men and horses pours south from the river, a tide of destruction that devours the land like locusts.\n\nInitial reports from fleeing villagers and the few surviving scouts are almost impossible to believe. They speak of a horde numbering at least #bold forty thousand warriors#! Their only goal appears to be the ultimate prize: the Queen of Cities itself. They are a force of nature, and they are marching on #bold Constantinople#!! This is not a war; this is an apocalypse thundering from the north."
 pecheneg_invasion.0003.a: "Sound the bells! Muster the Tagmata! The Emperor rides to war!"

