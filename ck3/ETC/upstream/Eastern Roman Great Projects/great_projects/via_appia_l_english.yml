 neglected_via_appia_modifier_desc: "The Via Appia, the Queen of Roads, once reigned supreme, but centuries of neglect since the fall of the Western Empire have taken a brutal toll. Its iconic black paving stones have been stolen for peasant hovels or swallowed whole by the earth. The magnificent bridges that once spanned the Apennine gorges now lie as rubble, choked with weeds. What was once the primary artery of the Empire is now a treacherous dirt track, a haunt for brigands and a bitter memory of a bygone age."
 neglected_via_appia_modifier: "Neglected Via Appia"
 restored_via_appia_modifier_desc: "The Queen of Roads reigns again. From Rome to Brundisium, an unbroken ribbon of black stone runs straight and true, a testament to Roman engineering reborn. Legions and commerce flow with a speed and security unseen for centuries, binding the Italian heartland together and projecting our power from the capital to the sea. The road is no longer a path, but an artery of the Empire."
 restored_via_appia_modifier: "Restored Via Appia"
 
 funding_secure_appia_modifier: "Guardian of the Roads"
 funding_secure_appia_modifier_desc: "By funding the extermination of bandits and brigands along the Via Appia, I have earned a reputation as a bringer of order and justice. Travelers speak my name with gratitude, and my authority is seen as a force for peace and security in these troubled lands."
 funding_node_of_capua_modifier: "Patron of Capua"
 funding_node_of_capua_modifier_desc: "My patronage has restored the splendor of Capua, the 'Second Rome.' News of this magnificent restoration has spread throughout Italy, and I am hailed as a great builder and a restorer of cities. Such glorious deeds significantly add to the prestige of my house and name."
 funding_bridges_of_beneventum_modifier: "Master of Bridges"
 funding_bridges_of_beneventum_modifier_desc: "I financed the near-miraculous reconstruction of the great bridges near Beneventum. My name is now associated with a feat of engineering not seen since the days of the ancients. This reputation for vision and competence has earned me the respect of my peers and vassals."
 funding_pavers_guild_modifier: "Patron of the Pavers' Guild"
 funding_pavers_guild_modifier_desc: "As the primary patron of the Pavers' Guild, their finest craftsmen and logistical expertise are now felt within my own capital. The new methods and supply chains established for the Appian Way are now being applied here, leading to faster and more efficient development within my personal domain."
 funding_rome_ascent_modifier: "Heir to the Republic"
 funding_rome_ascent_modifier_desc: "By funding the restoration of the ancient tombs lining the entrance to Rome, I have physically and symbolically tied my legacy to that of the great heroes of old. In the eyes of the Senate and the People of Rome, I am not merely a ruler, but the rightful heir to their timeless glory."
 funding_gateway_brundisium_modifier: "Lord of the Eastern Trade"
 funding_gateway_brundisium_modifier_desc: "My investment has reopened Brundisium, the gateway to the Orient. A significant portion of the revitalized trade—spices from the East, wine from Greece, and grain from Egypt—now flows directly towards my capital, enriching my domain and filling my coffers with the profits of renewed commerce."
 restorer_of_the_via_appia_modifier: "Restorer of the Via Appia"
 restorer_of_the_via_appia_modifier_desc: "The Queen of Roads reigns again, and it is by my will. This restored artery of the Empire is a direct extension of my authority; my legions march with a speed unseen for centuries, my tax collectors travel with newfound safety, and my couriers carry my edicts without delay. The prosperity and control this road brings strengthens my rule immeasurably, and my name is now forever etched into the very landscape of Italy itself—a legacy to rival the ancients."
 
 via_appia_events.0001.t: "The Appian Way is Secured"
 via_appia_events.0001.desc: "My lord, the captains charged with securing the route have sent their final report. The last of the major bandit dens has been burned out, and regular patrols now ride the length of the road's trace. The eerie silence of a predator's ambush has been replaced by a reassuring calm; our engineers and workers can now proceed without fear."
 via_appia_events.0001.a: "My contribution is recognized."
 
 via_appia_events.0002.t: "The Node of Capua is Restored"
 via_appia_events.0002.desc: "My lord, the work in Capua is finished. The Via Appia now runs through the city on a bed of flawless new paving stones, culminating in a gleaming, rebuilt arch that inspires awe in all who pass beneath it. Merchants and pilgrims are already flocking to the city, which once again serves as the proud and bustling heart of the great road."
 via_appia_events.0002.a: "Capua Shines Anew!"
 
 via_appia_events.0003.t: "The Bridges of Beneventum are Rebuilt"
 via_appia_events.0003.desc: "My lord, the master engineer sends word of a near-miraculous achievement. The final keystone has been placed, and the great bridges near Beneventum stand whole once more! Where travelers once faced perilous detours, a wide and level road now soars over the gorges. Uninterrupted travel through the southern Apennines is now a reality."
 via_appia_events.0003.a: "A marvel of engineering!"
 
 via_appia_events.0004.t: "The Road is Paved"
 via_appia_events.0004.desc: "My lord, the Pavers' Guild reports that the final section of the Via Appia is now paved. From the capital to the sea, a ribbon of expertly-laid black stone now runs unbroken. The unmistakable rumble of wagon wheels on perfectly mortared flagstones can be heard once more, a sound that has been absent from these lands for centuries."
 via_appia_events.0004.a: "To walk the road of black stone..."
 
 via_appia_events.0005.t: "The Ascent from Rome is Restored"
 via_appia_events.0005.desc: "My lord, the work on the first mile is complete. To leave the capital by the Via Appia is now an experience of profound gravitas. Travelers pass between the restored tombs of Republican heroes and long-dead nobles, their gleaming marble a reminder of a glorious past now made present. Our reign is tied directly to the glory of the ancients."
 via_appia_events.0005.a: "A Triumphal Departure."
 
 via_appia_events.0006.t: "The Gateway at Brundisium is Open"
 via_appia_events.0006.desc: "My lord, a ship has arrived from Brundisium with glorious news. The harbor is restored, and the two great Roman columns stand proud at the shoreline once more, a beacon for all seafaring traffic. Legions can now embark with speed, and the wealth of the East now flows unimpeded from the docks onto the great road itself. The two halves of the Empire are linked again."
 via_appia_events.0006.a: "The Gateway to the Orient is open!"
 
 via_appia_events.0007.t: "The Queen of Roads is Reborn"
 via_appia_events.0007.desc: "A triumphant dispatch has arrived from the chief engineer in Brundisium. The last paving stone has been laid. From the gates of Rome to the docks of the Adriatic, a single, unbroken ribbon of black stone now connects the heart of the old Empire to the sea.\n\nThe rumble of iron-shod wheels over perfectly fitted *basoli*, a sound silent for centuries, now echoes through the Apennine hills. Over soaring new bridges and through once-impassable terrain, the great road now runs straight and true, shrugging off mountains and gorges as if they were minor inconveniences.\n\nLegions can now march from the capital to the embarkation ports with a speed unseen since the days of the Antonines, and the wealth of Italy flows along a single, secure artery. We have not merely paved a road; we have resurrected a symbol. The Via Appia is a declaration, carved into the very landscape, that Roman order and ambition have truly returned to their ancient heartland."
 via_appia_events.0007.a: "All roads lead to Rome once more."
 
