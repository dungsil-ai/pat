 great_project_type_via_appia_restoration: "Restore Via Appia"
 great_project_type_via_appia_restoration_desc: "The Via Appia, the Queen of Roads, was once the primary artery of the Republic and the Empire. From Rome to the port of Brundisium, it carried legions, governors, and endless commerce. Today, it is a sad mirror of our state—a serpentine path of collapsed bridges, bandit-haunted hills, and paving stones swallowed by the earth.\n\nTo restore this 350-mile-long marvel is to restore the very heart of Italy. It will be a colossal effort of engineering and will, an announcement to the world that Roman ingenuity has returned. Upon its completion, armies and trade will flow through our lands with a speed unseen for five centuries."
