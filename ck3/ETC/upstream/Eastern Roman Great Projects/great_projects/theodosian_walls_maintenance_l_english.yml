l_english:

 great_project_type_theodosian_walls_maintenance: "Theodosian Walls Maintenance"
 great_project_type_theodosian_walls_maintenance_desc: "The legendary Theodosian Walls have guarded the Queen of Cities for centuries, an unbroken line of bastions and ramparts that have turned away countless would-be conquerors. Yet time is an enemy no wall can defeat alone. Mortar crumbles, towers settle, and the earth itself conspires against them.\n\nTo neglect them is to invite disaster. Through this grand endeavor, we shall organize the resources of the Empire to restore the walls to their former glory, patch their wounds, and ensure that they stand as an impregnable shield for centuries to come. The very heart of the Empire depends on it."
 great_project_type_tooltip_theodosian_walls_maintenance: ""
 great_project_name_possessive_theodosian_walls_maintenance: ""
 great_project_name_theodosian_walls_maintenance: ""
 
 great_project_type_theodosian_walls_maintenance_contribution_gold: "Imperial Patronage"
 great_project_type_theodosian_walls_maintenance_contribution_gold_desc: "A direct contribution to the Imperial treasury for the immediate purchase of materials, tools, and the payment of skilled laborers. Gold is the lifeblood of any such grand work."
 great_project_type_theodosian_walls_maintenance_contribution_name_gold: ""
 great_project_type_theodosian_walls_maintenance_contribution_manpower: "Labor from the Themes"
 great_project_type_theodosian_walls_maintenance_contribution_manpower_desc: "While gold can hire masons, the sheer scale of the project requires an army of laborers. Vassals can send levies of workers to clear debris, transport materials, and support the master builders."
 great_project_type_theodosian_walls_maintenance_contribution_name_manpower: ""
 great_project_type_theodosian_walls_maintenance_contribution_stone: "Securing the Quarries"
 great_project_type_theodosian_walls_maintenance_contribution_stone_desc: "The finest stone and marble are needed to ensure the restorations last for centuries. This contribution represents a major effort to secure, operate, and transport materials from the Empire's quarries to the capital."
 great_project_type_theodosian_walls_maintenance_contribution_name_stone: ""
 great_project_type_theodosian_walls_maintenance_contribution_engineers: "Master Masons and Engineers"
 great_project_type_theodosian_walls_maintenance_contribution_engineers_desc: "The ancient techniques used to build the Walls are a closely guarded secret. Providing access to master masons, architects, and military engineers will drastically improve the quality and pace of the work."
 great_project_type_theodosian_walls_maintenance_contribution_name_engineers: ""
 great_project_type_theodosian_walls_maintenance_contribution_blessing: "A Divine Blessing"
 great_project_type_theodosian_walls_maintenance_contribution_blessing_desc: "The Walls are not merely stone; they are a symbol of God's protection over the city. A formal blessing from the Ecumenical Patriarch will bolster the morale of the workers and serve as a powerful testament to our piety."
 great_project_type_theodosian_walls_maintenance_contribution_name_blessing: ""

 theodosian_walls_neglected_modifier: "Neglected Theodosian Walls"
 theodosian_walls_neglected_modifier_desc: "Century of neglect has taken it's toll. The mortar of the legendary Theodosian Walls turns to dust, ramparts are overgrown with ivy, and there are worrying gaps in the outer defenses. The walls that were once the pride of the Empire now stand as a symbol of Imperial decay, a shame to the people and a clear invitation to our enemies."

 theodosian_walls_maintained_modifier: "Well-maintained Theodosian Walls"
 theodosian_walls_maintained_modifier_desc: "Following a monumental effort of Imperial restoration, the Theodosian Walls stand stronger than they have in a century. Their renewed might serves as a powerful deterrent to any who would dare challenge the Queen of Cities."

 theodosian_walls_maintenance.0001.t: "An Honored Patron"
 theodosian_walls_maintenance.0001.desc: "My contribution of gold to the project has been received in Constantinople.\n\n The master builders express gratitude for my support, noting that my funds will be instrumental in securing the resources needed to strengthen the Queen of Cities. My generosity has been duly noted."
 theodosian_walls_maintenance.0001.a: "For the glory of the Empire!"

 theodosian_walls_maintenance.0002.t: "Our Laborers Reach the Capital"
 theodosian_walls_maintenance.0002.desc: "Word has reached me that the contingent of laborers I dispatched from my domain has arrived in Constantinople. Main architect has sent word of their safe arrival, commending the strength and spirit of my people.\n\nThe Imperial overseers have already put them to work on the Theodosian Walls. My contribution of manpower will surely hasten the restoration."
 theodosian_walls_maintenance.0002.a: "May their hands work swiftly."

 theodosian_walls_maintenance.0003.t: "Shipments Received"
 theodosian_walls_maintenance.0003.desc: "The barges laden with stone and marble from my quarries have successfully navigated their way to the capital. According to the Imperial missive, the master builders are overjoyed at the quality of the materials.\n\n Chief architect thanks me for providing the very foundation upon which the city's future defense will be built."
 theodosian_walls_maintenance.0003.a: "A foundation of stone, a foundation of loyalty."

 theodosian_walls_maintenance.0004.t: "My Experts Lend their Aid"
 theodosian_walls_maintenance.0004.desc: "The team of master masons and engineers I sent to aid the great project of maintaining the walls of our great city have been welcomed into the capital with great respect. Their expertise has proven to be most admirable and valuable.\n\nThe knowledge from my domain will now be etched into the very stones of the Theodosian Walls, a testament to my realm's skill."
 theodosian_walls_maintenance.0004.a: "Let our knowledge protect the Empire."

 theodosian_walls_maintenance.0005.t: "A Prayer Answered"
 theodosian_walls_maintenance.0005.desc: "My efforts to secure a blessing for the restoration of the Theodosian Walls have borne fruit. The Ecumenical Patriarch himself performed a great service, invoking God's favor upon the momentous task. Reports from the capital speak of renewed morale among the workers. Venerable Patriarch thanks me for reminding the realm that our strength comes not just from stone, but from faith."
 theodosian_walls_maintenance.0005.a: "In God's name, we build."
 
 theodosian_walls_maintenance.0006.t: "A Legacy in Stone"
 theodosian_walls_maintenance.0006.desc: "After years of tireless effort and staggering expense, the great project stands complete!\n\nFrom the quarries to the construction sites, the sounds of hammers and chisels have fallen silent. In their place is a marvel of engineering and will, a testament to our reign that now graces the landscape of Constantinople.\n\nGenerations to come will look upon this work and remember our name. It is a symbol of our power, our vision, and the prosperity we have brought to the realm."
 theodosian_walls_maintenance.0006.a: "A triumph to be remembered for eternity!"

 theodosian_walls_maintenance.0007.t: "The Work Ceases"
 theodosian_walls_maintenance.0007.desc: "By my own decree, the work on the great project has been halted. The laborers have been sent home, their tools laid down. The din of construction that once filled Constantinople has been replaced by an unnerving quiet.\n\nWhether due to an empty treasury, the drums of war, or other, more pressing matters, the grand vision for this project will go unrealized. The half-finished structures now stand as a monument to abandoned ambition, a stark reminder of what might have been."
 theodosian_walls_maintenance.0007.a: "A necessary, if bitter, decision."
 
 theodosian_walls_maintenance.0008.t: "The Crumbling Giants"
 theodosian_walls_maintenance.0008.desc: "A series of troubling reports from Constantinople have reached my ears. The news is undeniable: the legendary Theodosian Walls, the Empire's shield for centuries, are falling into a state of perilous disrepair.\n\nEngineers warn that the mortar between the great limestone blocks is turning to dust, while invasive ivy pries the ancient stones apart from within. Entire sections of the outer walls are now considered unsafe by the city garrison, and worrying gaps have begun to appear in the fortifications.\n\nThis decay is no secret. A sense of unease grows among the populace, who see the state of the walls as a symbol of Imperial decline. To our enemies, it is surely a sign of weakness—an invitation to test the city's increasingly fragile defenses. The Queen of Cities grows more vulnerable by the day."
 theodosian_walls_maintenance.0008.a: "We must restore them to their former glory!"

 
 BYZANTION_LOCATION_1_TOOLTIP: "Constantinople is within your realm"