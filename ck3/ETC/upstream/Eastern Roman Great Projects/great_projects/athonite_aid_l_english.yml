 athonite_aid_project_events.0001.t: "A Beacon of Orthodoxy"
 athonite_aid_project_events.0001.desc: "The Great Project on Mount Athos is complete! Thanks to my patronage, the holy mountain has been fortified, its monasteries expanded, and its sacred icons preserved. Monks and pilgrims from across the Orthodox world sing my praises, and my name will forever be remembered as a true defender and patron of the Faith."
 athonite_aid_project_events.0001.a: "Faith is a useful tool, nothing more."
 athonite_aid_project_events.0001.b: "For Theotokos!"
 athonite_aid_project_events.0001.c: "May the donations flow as freely as the prayers."
 athonite_aid_project_events.0001.d: "A worthy endeavor for our Empire and Faith."
 
 athonite_aid.1001.t: "Laborers for the Holy Mountain"
 athonite_aid.1001.d: "You receive word from Mount Athos that the laborers you sent have arrived in good order. Their pickaxes and shovels ring out across the Holy Mountain as they clear rugged paths and rebuild crumbling walls. The abbot reports that construction has accelerated thanks to these extra hands, and daily prayers are said for the benefactor. Such a contribution to this sacred endeavor reflects well on your rule, and the monks are acknowledging your generosity."
 athonite_aid.1001.a: "Their hands are blessed by the Lord."

 athonite_aid.1002.t: "Materials for the Holy Mountain"
 athonite_aid.1002.d: "Caravans laden with building materials arrive at the foot of Mount Athos - a generous donation from your domain. Blocks of fine stone and sturdy timber are carried up the steep paths by monks and mules, destined to erect robust walls and splendid domes for the monasteries. The abbots bless your name for this support, declaring that such generosity shall be remembered in Athos’s chronicles. Monks are recognizing your magnanimity."
 athonite_aid.1002.a: "Material sacrifice for the immaterial eternity!"

 athonite_aid.1003.t: "Artistry for the Holy Mountain"
 athonite_aid.1003.d: "Skilled artisans and iconographers, sponsored by you, have reached Mount Athos to beautify its monasteries. Soon, dull chapel walls come alive with vibrant frescoes of saints, and new mosaics glitter in the candlelight. The monks are overjoyed as these craftsmen transform their sanctuaries into something truly heavenly. They chant prayers in your honor, whose patronage of sacred art will inspire piety for generations to come. Such an act surely warrants recognition."
 athonite_aid.1003.a: "Patron of the heavenly art."

 athonite_aid.1004.t: "Defenders of the Holy Mountain"
 athonite_aid.1004.d: "With your backing, new stone watchtowers rise among the monasteries of Mount Athos. These fortifications will guard the holy community from pirates and raiders along the coast. Pilgrims and monks now take refuge under the protection of these towers, and the abbot proclaims that you have secured the very safety of the Holy Mountain. Tales of this deed spread through the realm, portraying you as a true protector of the faith. You are to be duly rewarded for such a valorous contribution."
 athonite_aid.1004.a: "Protector of the only true faith."

 athonite_aid_vassal_rewards_tooltip: "[athonite_contributor.GetShortUIName] is rewarded for their contribution, and their capital flourishes."
 athonite_contributor_county_blessing_modifier: "Holy Mountain's Blessing"
 desc_athonite_contributor_county_blessing_modifier: "The pious contribution made from this County towards the restoration of the Holy Mountain has blessed this land and its ruler."
 patron_of_mount_athos_modifier: "Patron of the Holy Mountain"
 patron_of_mount_athos_modifier_desc: "My pious actions in organizing aid for the holy monasteries of Mount Athos have secured my legacy as a true protector of the Orthodox faith. My name will be remembered in their prayers for generations to come."

