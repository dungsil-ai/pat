l_english:
 great_project_type_athonite_aid: "Patronage of the Holy Mountain"
 great_project_type_athonite_aid_desc: "The Holy Mountain of Athos, its venerable monasteries housing thousands of monks, stands as the spiritual heart of the Orthodox faith. These communities are vaults of sacred knowledge and fortresses of piety, yet time and turmoil take their toll. Foundations weaken, priceless manuscripts decay, and the monks face constant threats from pirates and raiders. This great project seeks to revitalize the Holy Mountain. It will channel funds, materials, and skilled artisans toward the restoration of its great lavras and smaller sketes. The undertaking will preserve invaluable texts and support iconographers in their divine work. By securing its communities and providing for them, this project ensures the Garden of the Mother of God continues to shine as a beacon of true faith."
 great_project_type_tooltip_athonite_aid: "As worldly empires rise and fall, the Holy Mountain endures - a bastion of unwavering faith against the tides of chaos. This aid is more than mere gold; it is an investment in the very soul of the Empire, ensuring that the light of Orthodoxy, guarded by the monks of Athos, continues to shine for a thousand years to come."
