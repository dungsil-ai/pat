 great_project_type_athonite_aid_contribution_athonite_aid_laborers_desc: "The holy mountain requires many hands for its renewal. We shall call upon pious laymen from across the realm, organizing them into brotherhoods of devout workers. They will offer their strength and skill in service to God, rebuilding walls, clearing paths, and raising new monastic cells."
 great_project_type_athonite_aid_contribution_athonite_aid_materials_desc: "The monasteries of Athos will be rebuilt with the finest materials our Empire can provide. Marble will be brought from the ancient quarries of Proconnesus and fine timber felled from the Macedonian hills. These blessed materials will form the very bones of the renewed holy mountain."
 great_project_type_athonite_aid_contribution_athonite_aid_artists_desc: "Faith is preserved not only in stone but in pigment and parchment. We will summon the most skilled icon painters and manuscript illuminators to the mountain. Their holy work will adorn the new chapels and fill the monastic libraries, creating treasures that will inspire the Orthodox faithful for centuries."
 great_project_type_athonite_aid_contribution_athonite_aid_towers_desc: "The peace of the holy mountain is threatened by godless pirates who prey on the coast. To safeguard the monks and their sacred work, we will construct a series of fortified watchtowers along the peninsula. These towers will stand as vigilant sentinels, protecting Athos from those who would defile it."

