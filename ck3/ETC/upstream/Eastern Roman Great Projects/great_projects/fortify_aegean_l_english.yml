l_english:

 great_project_type_fortify_aegean: "Fortify the Aegean Coast"
 great_project_type_fortify_aegean_desc: "The Emirate of Crete has turned our Sea of Islands into its personal hunting ground. Their state-sponsored corsairs choke our maritime trade, scar our coastal lands, and steal our people into bondage. This cannot be allowed to continue.\n\nThis grand undertaking is the Empire's answer: an unbreakable shield to defend our shores. We will construct a comprehensive network of coastal forts (`kastrons`), establish a revitalized professional fleet of swift Dromons to act as our sword, and restore the ancient beacon system to warn of any approaching threat.\n\nThis project will not just deter the corsairs; it will break them. It is an immense and costly endeavor, but one that will reclaim the seas for the Empire and restore prosperity and security to our shores."
 great_project_type_tooltip_fortify_aegean: ""
 great_project_name_possessive_fortify_aegean: ""
 great_project_name_fortify_aegean: ""
 
 great_project_type_fortify_aegean_contribution_aegean_forts: "Fund the Kastron Network"
 great_project_type_fortify_aegean_contribution_aegean_forts_desc: "Our primary effort must be the construction of many coastal forts and watchtowers, known as 'kastrons.' These stone fortifications will serve as defensible strongpoints for local garrisons and as safe havens for the civilian population when raiders are sighted."
 great_project_type_fortify_aegean_contribution_name_aegean_forts: ""
 great_project_type_fortify_aegean_contribution_aegean_fleet: "Rebuild the Dromon Fleet"
 great_project_type_fortify_aegean_contribution_aegean_fleet_desc: "A wall is useless if the enemy can simply sail around it. We must fund the shipyards of the capital and the naval themata to construct a new generation of swift dromons. These warships, equipped with siphons for liquid fire, are the sword that will hunt the corsairs down and burn their fleets to cinders."
 great_project_type_fortify_aegean_contribution_name_aegean_fleet: ""
 great_project_type_fortify_aegean_contribution_aegean_militia: "Establish the Vigla Patrols"
 great_project_type_fortify_aegean_contribution_aegean_militia_desc: "Forts need soldiers. This initiative will fund the training and arming of professional local militias, the 'Vigla.' Unlike levied farmers, these men will be dedicated coastal sentinels, trained to man the walls of the kastrons, operate siege equipment, and engage raiders until the Thema fleet arrives."
 great_project_type_fortify_aegean_contribution_name_aegean_militia: ""
 great_project_type_fortify_aegean_contribution_aegean_arsenals: "Establish Naval Arsenals"
 great_project_type_fortify_aegean_contribution_aegean_arsenals_desc: "A fleet and its forts are a hungry beast, demanding constant supplies of timber, pitch, iron, and weaponry. We will establish dedicated and fortified naval arsenals in key ports. These depots will ensure our ships can be repaired and our garrisons resupplied swiftly, maintaining our readiness for a long-term struggle."
 great_project_type_fortify_aegean_contribution_name_aegean_arsenals: ""
 great_project_type_fortify_aegean_contribution_aegean_beacons: "Restore the Beacon System"
 great_project_type_fortify_aegean_contribution_aegean_beacons_desc: "Speed is the raider's greatest weapon; knowledge will be ours. By restoring the ancient system of signal fires on every major island and headland, a warning lit in the south can reach the capital in mere hours. This network will give our fleets and garrisons precious time to react, turning ambushes into traps."
 great_project_type_fortify_aegean_contribution_name_aegean_beacons: ""

 cretan_raid_devastation_modifier: "Ravaged by Corsairs"
 cretan_raid_devastation_modifier_desc: "This county has been recently savaged by raiders from the Emirate of Crete. Villages have been burned, the harvest has been stolen or torched, and many citizens have been carried off into slavery. The local economy is shattered, and the people who remain live in constant terror."
 imperial_aegis_modifier: "Imperial Aegis"
 imperial_aegis_modifier_desc: "This county is protected by the Imperial Aegis - a network of forts, beacons, and naval patrols. The threat of piracy has been neutralized, allowing trade to flourish and the local populace to live in security. The sea is once again a highway for commerce, not a hunting ground for corsairs."
 
 fortify_aegean.0001.t: "The First Kastron is Garrisoned"
 fortify_aegean.0001.desc: "A report from the coast brings welcome news: the first of the great 'kastrons' has been completed. Its stone walls rise proudly over the sea, a defiant symbol of Imperial resolve. Local families, who had fled inland for fear of the Cretan raiders, are already returning to their villages under the fort's protective gaze.\n\nFor the first time in a generation, the people of this coast can look out at the sea with hope rather than dread. The fort is more than just stone and mortar; it is a sanctuary and a promise of the security to come."
 fortify_aegean.0001.a: "A stone shield for our people."

 fortify_aegean.0002.t: "The Dromons Take to the Sea"
 fortify_aegean.0002.desc: "The Admiral of the newly-commissioned Aegean squadron sends word from the naval shipyards. The first Dromons, sleek and menacing with their siphons for liquid fire polished and ready, have been launched for their sea trials. Their crews, hand-picked for skill and aggression, are eager to turn these vessels from parade pieces into corsair-hunters.\n\nThe shipwrights have done their work. Now the sailors will do theirs. This fleet is not just our shield; it is the spear we will hurl at the heart of the Cretan menace."
 fortify_aegean.0002.a: "Let them hunt. Let them burn."

 fortify_aegean.0003.t: "The Vigla Stand Watch"
 fortify_aegean.0003.desc: "The drills are complete. The Strategos in charge of training the new local militias reports that the first cohorts of the 'Vigla' are now active. These are not common levies dragged from their fields; they are professional, well-equipped soldiers dedicated solely to coastal defense.\n\nWhere once there were only panicked villagers, there are now disciplined sentinels on the walls of our new forts. They are the eyes, ears, and swords of their own communities, ready to hold the line until the Dromon fleet can close for the kill."
 fortify_aegean.0003.a: "They are the living heart of our wall."

 fortify_aegean.0004.t: "The Arteries of War"
 fortify_aegean.0004.desc: "My Logothete confirms that the new naval arsenals are now operational and fully stocked. Fortified depots in key ports now hold vast reserves of timber for repairs, pitch for waterproofing, and stores of arrows and Greek Fire for the fleets.\n\nBefore, a damaged ship was out of the fight for months, forced to limp back to the capital. Now, our squadrons can be repaired, rearmed, and resupplied close to their patrol routes, dramatically increasing their readiness and time at sea. This logistical backbone ensures our shield will never crack and our sword will never dull."
 fortify_aegean.0004.a: "An unglamorous, but utterly vital, victory."

 fortify_aegean.0005.t: "A Chain of Light"
 fortify_aegean.0005.desc: "Upon my command, the final leg of the great beacon system was tested last night. A signal fire lit on a southern island was relayed from peak to peak, a river of light flowing across the Aegean in the dark. The warning arrived at the Capital hours upon hours before even the swiftest ship could have made the journey.\n\nThe corsairs' greatest weapon has always been surprise—the ability to appear from the empty horizon and vanish before a response could be mustered. We have stolen that advantage from them. We now own the information, and with it, the initiative."
 fortify_aegean.0005.a: "Knowledge is our sharpest weapon."
 
 fortify_aegean.0006.t: "The Aegean is Secured!"
 fortify_aegean.0006.desc: "A messenger arrives from the coast, his face beaming with pride. The final stone has been laid, the last beacon has been lit, and the last dromon has joined the newly-formed Thema fleet. The Great Project is complete.\n\nAlready, the first reports flow in. Merchant convoys, heavy with grain and silk, now sail under the watchful gaze of our patrols. Fishermen cast their nets in waters that were, until recently, ruled by pirates. The smoke seen on the horizon is now from the hearth of a prosperous port, not a burning village.\n\nThis is a victory greater than any single battle, for it was not achieved with a single charge, but with years of labor, a mountain of gold, and an unbending Imperial will. The corsairs' favorite hunting ground has become their cage. The Sea of Islands belongs to the Empire once more."
 fortify_aegean.0006.a: "A testament to Imperial perseverance and will."
 
 fortify_aegean.0007.t: "Ashes on the Shore"
 fortify_aegean.0007.desc: "Disastrous news has arrived. In an act of unparalleled audacity, a massive Cretan fleet slipped past our patrols and fell upon the very headquarters of our Aegean defense project. The corsairs were not raiding for slaves or gold, but to strike at the heart of our ambition.\n\nThey have put the new shipyards to the torch, toppled the nearly-finished signal towers, and slaughtered the master engineers overseeing the work. Years of tireless effort, countless lives, and a mountain of treasure have been turned to smoke and rubble in a matter of hours.\n\nThe hope for a secure sea has been extinguished. The corsairs have sent a clear message: they do not just raid our shores; they will not allow us to challenge their mastery of the waves."
 fortify_aegean.0007.a: "They will pay for this insolence in blood and fire!"

