l_english:

 great_project_type_reinforce_sicily: "Reinforce Sicily"
 great_project_type_reinforce_sicily_desc: "Sicily is on the brink of collapse. Decades of intermittent warfare have shattered our authority, and now enemy hordes threaten to overrun our last remaining strongholds. The island, the vital stepping stone of the Mediterranean, is about to be lost to us forever.\n\nThis is not a matter of expansion, but of survival. Through this emergency directive, we will marshal every available resource - gold, ships, and veteran soldiers - to reinforce our beleaguered garrisons, drive the enemy from our shores, and reclaim what is rightfully ours. To fail now is to surrender the central sea itself."
 great_project_type_tooltip_reinforce_sicily: ""
 great_project_name_possessive_reinforce_sicily: ""
 great_project_name_reinforce_sicily: ""
 
 great_project_type_reinforce_sicily_contribution_syracuse_fort: "The Hexapylon Fortress"
 great_project_type_reinforce_sicily_contribution_syracuse_fort_desc: "Syracuse must serve as the anchor of our island-wide defense. This contribution funds and provides engineers for the monumental task of rebuilding its ancient Hexapylon fortress into a state-of-the-art citadel."
 great_project_type_reinforce_sicily_contribution_name_syracuse_fort: ""
 great_project_type_reinforce_sicily_contribution_sicily_troops: "The Expeditionary Force"
 great_project_type_reinforce_sicily_contribution_sicily_troops_desc: "Forts are meaningless without soldiers to man them. This provides a major contingent of veteran soldiers to be shipped to Sicily, tasked with clearing out enemy holdouts, garrisoning key towns, and training local militias."
 great_project_type_reinforce_sicily_contribution_name_sicily_troops: ""
 great_project_type_reinforce_sicily_contribution_sicily_navy: "Securing the Straits"
 great_project_type_reinforce_sicily_contribution_sicily_navy_desc: "Sicily is an island; to hold it is to command its waters. This contribution dispatches a fleet to patrol the Straits of Messina, hunt pirates, and ensure our armies remain supplied by sea."
 great_project_type_reinforce_sicily_contribution_name_sicily_navy: ""
 great_project_type_reinforce_sicily_contribution_sicily_war_chest: "The Sicilian War Chest"
 great_project_type_reinforce_sicily_contribution_sicily_war_chest_desc: "War is fueled by gold. This financial support will serve as the backbone of the entire operation, used to pay mercenaries, purchase grain for the troops, and forge weapons and armor for the garrisons."
 great_project_type_reinforce_sicily_contribution_name_sicily_war_chest: ""

 syracuse_reinforced_modifier: "Syracuse Reinforced"
 syracuse_reinforced_modifier_desc: "The ancient Hexapylon Fortress of Syracuse has been rebuilt and expanded. The city now serves as the impregnable heart of our strategic operations in Sicily."
 
 reinforce_sicily.0001.t: "Reinforce Sicily - A Generous Contribution"
 reinforce_sicily.0001.desc: "A missive from the capital confirms that assistance for the war in Sicily has been received. The Imperial court issued a formal declaration of thanks for a contribution of skilled minds dispatched to the front. The official document acknowledged that such expertise is considered vital for the difficult campaign ahead. The records show that this display of loyalty was duly noted by the throne."
 reinforce_sicily.0001.a: "For the good of the Realm."

 reinforce_sicily.0002.t: "Reinforce Sicily - A Martial Endeavor"
 reinforce_sicily.0002.desc: "A new entry is made in the Imperial annals concerning the war in Sicily. The record notes the arrival of troop reinforcements dispatched to the front lines. An accompanying decree offers the Crown's formal gratitude for the contribution, terming it a vital display of fealty. It further states that the commitment demonstrated by the provision of these warriors has been duly remembered by the throne."
 reinforce_sicily.0002.a: "May they bring us victory."

 reinforce_sicily.0003.t: "Reinforce Sicily - For the War Effort"
 reinforce_sicily.0003.desc: "A new court bulletin reports on the progress of the Sicilian campaign, specifically noting the role of naval forces. The document publicly offers thanks for naval assets contributed to the war effort. It further elaborates that such support is critical for maintaining maritime control, without which the land forces could not be sustained. The act is formally commended as a display of both wisdom and dutiful support."
 reinforce_sicily.0003.a: "An honor to serve."

 reinforce_sicily.0004.t: "Reinforce Sicily - A Loyal Donation"
 reinforce_sicily.0004.desc: "A message from the Imperial Treasury confirms the receipt of my financial aid for the war in Sicily. The note expresses formal thanks, stating that my gold provides the essential 'sinews of war' and will keep the armies supplied. My generosity has not gone unnoticed."
 reinforce_sicily.0004.a: "My wealth serves the Empire."

 reinforce_sicily.0005.t: "Reinforce Sicily - The Sicilian Dream Withers"
 reinforce_sicily.0005.desc: "The hard decision has been made: the grand project in Sicily is to be abandoned. The flow of gold has ceased, the Expeditionary Force is being recalled, and the half-finished walls of our new fortresses will be left to the wind and rain.\n\nThe cost was too great, the challenges too many. Letting Sicily fall back into chaos is a bitter pill to swallow, a clear signal to our enemies that our reach has exceeded our grasp. The island remains a thorn in our side."
 reinforce_sicily.0005.a: "A strategic failure we may one day regret."
 
 reinforce_sicily.0006.t: "Reinforce Sicily - Sicily Secured!"
 reinforce_sicily.0006.desc: "The final reports have come in: the great work in Sicily is done! The island, once a war-torn frontier, is now a bastion of my power. The enemy has been driven back, the fields are secure, and the new forts stand as silent, stone sentinels over the Mediterranean.\n\nFrom the mighty Hexapylon in Syracuse to the watchful fleets patrolling the coasts, Sicily is no longer a vulnerability, but a dagger pointed at the heart of my enemies. A new era of security and prosperity for the island begins today."
 reinforce_sicily.0006.a: "A righteous and masterful victory for the realm!"
 
 reinforce_sicily.0007.t: "Reinforce Sicily - Sicily's Final Stand"
 reinforce_sicily.0007.desc: "A desperate message arrives by fast galley, its sails shredded from a daring run through the enemy blockade. The seal of the Strategos in charge of Sicily is cracked open to reveal grim tidings.\n\nThe Saracen tide, which has already consumed nearly all of Sicily, is massing for a final, overwhelming assault. Their target is the great port of Syracuse—our last meaningful foothold on the island. The garrison is exhausted, the walls are battered, and the people live in fear of the inevitable siege.\n\nThe Strategos's plea is simple: if Syracuse falls, our presence on the island will be extinguished forever. The breadbasket of the old Empire will be lost, and the invaders will have an unsinkable fortress from which to launch raids against the mainland at will.\n\nThis is the final hour. To save Sicily, we cannot just send aid—we must launch a full-scale operation to reclaim the island."
 reinforce_sicily.0007.a: "They will have their war! We will not abandon Sicily!"

 SICILY_LOCATION_1_TOOLTIP: "Siracuse is within your realm"