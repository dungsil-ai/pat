 setting_bgp_knossos_on_alt_desc: "Same as the -ON- setting, but with 100% more Labyrinth."
 
 building_bgp_knossos_palace: "Knossos Palace"
 building_bgp_knossos_palace_desc: "The legendary Palace of Knossos stands renewed, its sprawling halls and iconic red columns a testament to our wealth and reverence for the past. By day, it is a wonder of the world, where vibrant frescoes tell tales of a bygone Minoan age. Yet beneath the gleaming facade of this cultural marvel lies a purpose-built secret: a vast, subterranean Labyrinth whose twisting corridors await those who displease the ruler of Crete. Or so the stories go..."
 building_type_bgp_knossos_palace: "$building_bgp_knossos_palace$"
 building_type_bgp_knossos_palace_desc: "$building_bgp_knossos_palace_desc$"
 
 bgp_send_to_labyrinth: "Sentence to the Labyrinth"
 bgp_send_to_labyrinth_desc: "Sentence [recipient.GetShortUIName] to face the twisting corridors of the Labyrinth.\n\nThey will be cast into the maze beneath the Palace of Knossos, given nothing but their wits and a sliver of hope. It is a trial by architecture and despair from which few return. They may perish from starvation, they may lose their mind to the solitude, or, through sheer luck or cunning, they may find an exit and escape your grasp forever.\n\nAnd some... some may find they are not alone in the dark.\n\n"
 bgp_send_to_labyrinth_tooltip: "Sentence to the Labyrinth"
 
 sentenced_to_labyrinth: "Echo of the Labyrinth"
 sentenced_to_labyrinth_desc: "This character was cast into the Labyrinth of Knossos. They have been hollowed out by relentless hunger, physical exhaustion, and the unique horror of isolation within a place designed to break the mind. The ordeal has fundamentally changed them, leaving behind a deep and unsettling trauma."
 
 exhausted_in_the_maze: "The Broken Survivor"
 exhausted_in_the_maze_desc: "They did not die in the darkness. They endured the hunger and walked the endless stone corridors until they found a way back to the light. But the light they found was not freedom; it was the entrance to their own cell. This final, cruel irony has extinguished the last embers of their spirit. They are a hollowed-out survivor, their body weary and their will to resist completely gone."