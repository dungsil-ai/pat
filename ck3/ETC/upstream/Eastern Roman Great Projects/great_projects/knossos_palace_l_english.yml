l_english:

 great_project_type_restore_knossos_palace: "Restore the Palace of Knossos"
 great_project_type_restore_knossos_palace_desc: "On the island of Crete lie the grand ruins of Knossos, the heart of the ancient Minoan civilization. To restore this legendary palace would be a monumental feat of engineering and a powerful statement of cultural reverence. We will raise its halls, illuminate its vibrant frescoes, and reconnect it to the sea that was the source of its power. This project will create a new wonder in our realm, a beacon of a bygone age reborn through our will."
 great_project_type_tooltip_restore_knossos_palace: ""
 great_project_name_possessive_restore_knossos_palace: ""
 great_project_name_restore_knossos_palace: ""
 
 great_project_type_restore_knossos_palace_alt: "Restore the Palace of Knossos"
 great_project_type_restore_knossos_palace_alt_desc: "On the island of Crete lie the grand ruins of Knossos, the heart of the ancient Minoan civilization. To restore this legendary palace would be a monumental feat of engineering and a powerful statement of cultural reverence. We will raise its halls, illuminate its vibrant frescoes, and reconnect it to the sea that was the source of its power. This project will create a new wonder in our realm, a beacon of a bygone age reborn through our will."
 great_project_type_tooltip_restore_knossos_palace_alt: ""
 great_project_name_possessive_restore_knossos_palace_alt: ""
 great_project_name_restore_knossos_palace_alt: ""
 
 great_project_type_restore_knossos_palace_contribution_port: "Establish the Sea-King's Port"
 great_project_type_restore_knossos_palace_contribution_port_desc: "The power of the Minoans came from the sea. To truly restore Knossos, it must be reconnected to its source of wealth and influence. This contribution will fund the construction of a new dedicated port on the coast and the establishment of a stone-paved road linking it directly to the palace, allowing trade and tribute to flow into its halls as it did millenia ago."
 great_project_type_restore_knossos_palace_contribution_name_port: ""
 great_project_type_restore_knossos_palace_contribution_survey: "Survey the Site and Secure the Ruins"
 great_project_type_restore_knossos_palace_contribution_survey_desc: "The Palace of Knossos is little more than a sprawling, rubble-choked field. Before any true restoration can begin, we must dispatch scholars and engineers to survey what remains. They will clear away the overgrowth, catalogue the foundations, and secure the crumbling structures against further collapse, unearthing the blueprint of the past for our master builders."
 great_project_type_restore_knossos_palace_contribution_name_survey: ""
 great_project_type_restore_knossos_palace_contribution_palace: "Rebuild the Grand Palace"
 great_project_type_restore_knossos_palace_contribution_palace_desc: "This will be the heart of the project. Using the survey maps, our finest masons and carpenters will raise the palace from its foundations. The Grand Staircase will rise once more, the Throne Room will be re-established, and the iconic, downward-tapering red columns will again support the roofs of its pillared halls, creating a structure worthy of the Minoan sea-kings of old."
 great_project_type_restore_knossos_palace_contribution_name_palace: ""
 great_project_type_restore_knossos_palace_contribution_frescoes: "Illuminate the Frescoes"
 great_project_type_restore_knossos_palace_contribution_frescoes_desc: "A palace is more than stone; it is art. This contribution will gather the finest artisans in the realm to recreate the vibrant frescoes that once adorned the walls of Knossos. From the famous bull-leapers to the serene blue dolphins and the mysterious griffins, these paintings will breathe life back into the silent halls and celebrate the rebirth of Minoan culture."
 great_project_type_restore_knossos_palace_contribution_name_frescoes: ""
 great_project_type_restore_knossos_palace_alt_contribution_labyrinth: "The Engineer's Folly: Construct the Labyrinth"
 great_project_type_restore_knossos_palace_alt_contribution_labyrinth_desc: "Our chief architect, after studying the deepest and most confounding of the palace's original foundations, has proposed a final, monumental addition. It is a design for a vast, subterranean maze of such complexity that it defies all modern principles—a true Labyrinth. He claims it is essential to the 'original spirit' of the palace. To build it would be an immense, costly, and perhaps unwise undertaking... an endeavor of myth, not masonry."
 great_project_type_restore_knossos_palace_alt_contribution_name_labyrinth: ""
 
