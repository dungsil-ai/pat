 restore_knossos_labyrinth: "Labyrinth of Knossos"
 restore_knossos_labyrinth_desc: "Beneath the sunlit halls of the restored palace, a dark secret has been given form. The Labyrinth of Knossos is a purpose-built prison of the mind, a twisting maze of such ingenious cruelty that it swallows light, hope, and any who are cast into its depths. Its mere existence is a constant, unspoken threat that bolsters the defenses of the island and serves as a perfect solution for the most intractable of problems."

 restore_knossos_palace.0001.t: "The Port is Open"
 restore_knossos_palace.0001.desc: "My lord, the first merchant ships have been spotted arriving at the newly-christened port of Knossos. The road to the palace is already busy with wagons carrying goods from across the Mediterranean. By reconnecting the palace to the sea, we have not only restored a monument, but have revived it as the economic heart of Crete."
 restore_knossos_palace.0001.a: "The wealth of the sea is ours!"

 restore_knossos_palace.0002.t: "The Site is Surveyed"
 restore_knossos_palace.0002.desc: "My lord, the survey team has completed its work. The endless rubble has been cleared, revealing the full, staggering scale of the ancient palace's foundations. We now possess detailed maps of its courts, corridors, and chambers. The past is unearthed; we are ready to build upon it."
 restore_knossos_palace.0002.a: "An excellent foundation for a grand legacy."

 restore_knossos_palace.0003.t: "The Palace Rises Again"
 restore_knossos_palace.0003.desc: "My lord, the horns sounded from the hills of Knossos today! The final column has been set and the roof tiled. The main structure of the Grand Palace is complete, its unique and imposing architecture already drawing crowds of awestruck locals. It stands as a magnificent centerpiece, awaiting only its final adornments."
 restore_knossos_palace.0003.a: "A worthy jewel in my crown."

 restore_knossos_palace.0004.t: "The Colors of a Bygone Age"
 restore_knossos_palace.0004.desc: "My lord, the artists have finished their masterwork. The walls of Knossos now sing with vibrant hues of red, blue, and gold. To walk its halls is to be transported to another time, surrounded by the athletic and artistic fervor of the ancient Minoans. The palace finally feels alive."
 restore_knossos_palace.0004.a: "Let the world marvel at our culture!"

 restore_knossos_palace.0005.t: "The Labyrinth Is Built"
 restore_knossos_palace.0005.desc: "My lord, it... is done. The Labyrinth has been excavated and constructed beneath the palace. The entrance, a simple, unadorned stone archway, seems to swallow the light. My architect assures me the design is 'perfect,' yet the workers who built it refuse to speak of it, and none who enter can find their way out without a guide. This is more than a structure; it is a question, waiting for an answer in the dark."
 restore_knossos_palace.0005.a: "What have I created?"
 
 restore_knossos_palace.0006.t: "Knossos is Reborn!"
 restore_knossos_palace.0006.desc: "The great work is finished! The Palace of Knossos, once a forgotten ruin, now stands proud and complete. Its red columns gleam in the Cretan sun, its halls sing with the colors of ancient frescoes, and its new port bustles with trade from distant lands.\n\nYou have resurrected not just a building, but a symbol of culture and power that will be spoken of throughout the known world. This monument will stand as a testament to your vision and your reverence for the glories of the past."
 restore_knossos_palace.0006.a: "A legacy to last a thousand years."

 restore_knossos_palace.0007.t: "A Ruin of Ambition"
 restore_knossos_palace.0007.desc: "The ambitious project at Knossos has collapsed into a humiliating failure. The worksite lies silent, a monument to our incompetence. Vast sums of gold have been squandered, leaving behind nothing but half-finished columns, hollow foundations, and the mocking whispers of our rivals.\n\nInstead of a wonder of the world, we have created a costly eyesore on the Cretan landscape. This folly will be a stain on our reign for years to come."
 restore_knossos_palace.0007.a: "So much treasure, turned to dust and shame."
 
 restore_knossos_palace.0008.t: "The Heart of the Maze is Sealed"
 restore_knossos_palace.0008.desc: "The Palace of Knossos is finally complete, in both its physical and mythical forms. On the surface, it is a cultural jewel, a marvel of art and architecture. But beneath it lies the project's secret heart: a twisting, lightless Labyrinth, constructed for a purpose none dare speak aloud.\n\nThe palace is no longer merely a monument to the past. It is now a tool for the future. Its vibrant halls will host my court, while its dark corridors will host my enemies. The whispers of the old myths have been given foundation, and a new legend begins—my legend."
 restore_knossos_palace.0008.a: "My enemies will know its depths."
 
 restore_knossos_palace.0009.t: "The Sentence is Passed"
 restore_knossos_palace.0009.desc: "As commanded, the guards have taken the prisoner from the dungeons. They were not led to the executioner's block nor the branding iron, but deep into the earth beneath the palace, to the unadorned stone archway that marks the Labyrinth's entrance.\n\nTheir sentence is not a swift death, but a challenge: to face the impossible corridors I have built. Now, we wait to see if mortal wit or sheer will is enough to deny the maze its prize."
 restore_knossos_palace.0009.a: "May God have mercy on their soul... the Labyrinth will not."
 
 restore_knossos_palace.0010.t: "Abandoned to the Maze"
 restore_knossos_palace.0010.desc: "The guards came for me in the dead of night, their silence more terrifying than any threat. They didn't lead me to the courtyard... instead, we descended. Down, down into the cold, oppressive darkness beneath the palace.\n\nThey brought me before a simple stone archway, a gaping maw that reeked of dust and despair. One of the guards shoved me forward, his voice a grim whisper: 'Lord has passed your sentence. Survive, if you can.'\n\nWith a final push, I stumbled into the blackness. The sound of a heavy stone door grinding shut behind me is the last thing I hear before the crushing silence of the maze closes in."
 restore_knossos_palace.0010.a: "I will NOT die in this place!"
 restore_knossos_palace.0010.b: "There must be a way out... there must be."
 restore_knossos_palace.0010.c: "Lost... already lost..."
 
 restore_knossos_palace.0011.t: "Darkness Claims Me"
 restore_knossos_palace.0011.desc: "I can go no further. My legs, scraped raw and trembling with exhaustion, finally give out. I have crawled into what I know is another dead-end corridor. The gnawing hunger in my stomach faded days ago, replaced by a hollow, aching emptiness.\n\nMy thoughts grow slow and dim, like a guttering candle. I don't know how long I have been in this stone tomb. I only know that it has won. I slump against the cold wall, my breath growing shallow, and for the first time in what feels like a lifetime, I welcome the encroaching darkness."
 restore_knossos_palace.0011.a: "My ordeal is over..."
 
 restore_knossos_palace.0012.t: "The Walls Begin to Whisper"
 restore_knossos_palace.0012.desc: "The walls are breathing. I can feel their stony lungs inhale and exhale around me. They whisper my name... no, they whisper HIS name... He built this place. He knows the secrets! I must warn them!\n\nA light! A bright, beautiful light is coming towards me! Figures are emerging from it, their shapes long and distorted. Are they angels? Are they coming to show me the way out? I will run to them! I will tell them everything! They must be warned about the whispering walls!"
 restore_knossos_palace.0012.a: "They know the secrets... the walls know!"
 
 restore_knossos_palace.0013.t: "The Mocking Light"
 restore_knossos_palace.0013.desc: "Light! After an age of darkness, I see a genuine light at the end of a long passage. Hope, a feeling I had long since buried, surges through me, giving strength to my weary limbs. I crawl, then stumble, then run towards it, my throat raw from a silent scream of triumph.\n\nI burst through the opening into a familiar hall... a painfully familiar hall. I am not outside. I am in the palace, standing before the very same unadorned stone archway I was thrown through. I have not escaped. I have only returned to the start. The last of my hope withers and dies."
 restore_knossos_palace.0013.a: "No..."
 
 restore_knossos_palace.0014.t: "Freedom's Air"
 restore_knossos_palace.0014.desc: "The air tasted different. Less stale. I followed it, clawing my way up a rough-hewn shaft I had discovered. My fingers bled as I scrambled over the last rock and collapsed onto blessed, solid earth. Above me, I see not a stone ceiling, but the glorious, spangled canvas of the night sky.\n\nI am out. I am alive. I breathe in the cool night air, the scent of grass and freedom filling my lungs. They thought the maze would be my end. Instead, it was my crucible. And now, I will be their end."
 restore_knossos_palace.0014.a: "I Have Survived!"

