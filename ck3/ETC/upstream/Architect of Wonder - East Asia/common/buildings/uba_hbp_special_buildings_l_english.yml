 building_type_huize_mines_01: "Huize Copper Mines"
 building_type_huize_mines_01_desc: "The Huize Copper Mine is located on the Southwest Plateau. The copper ore here is of extremely high grade, and the mining scale is vast, having a profound impact on the economic development of the southwestern region."
 building_huize_mines_01: "Huize Copper Pits"
