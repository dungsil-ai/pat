 building_type_rongxian_salt_01:0 "Rongxian Salt Wells"
 building_type_rongxian_salt_01_desc:0 "Rongxian has a history of well salt production spanning over a thousand years, with salt production dating back to the Eastern Han Dynasty. It is a famous deep-well salt production area in the Sichuan Basin. Artisans drill wells thousands of feet deep here, using a unique deep-drilling and pumping process to extract underground brine, which is then boiled to produce salt."
