 building_xiechi_salt_04:0 "Xiechi Salt Industry"
 building_xiechi_salt_04_desc:0 "$building_yanzhou_salt_04_desc$"

 building_type_lianghuai_salt_01:0 "Lianghuai Salt Field"
 building_type_lianghuai_salt_01_desc:0 "The Lianghuai region boasts a long coastline, and the practice of boiling seawater for salt has existed since the Western Han Dynasty. As the main production area for sea salt, it has been said, "Since ancient times, the profit from boiling salt has been paramount in the Southeast, with Lianghuai being the greatest," and "Lianghuai salt tax is the best under heaven.""
 building_lianghuai_salt_01:0 "Lianghuai Salt Field"
