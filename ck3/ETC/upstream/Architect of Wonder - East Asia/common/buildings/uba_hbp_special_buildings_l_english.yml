 building_type_sado_mines_01: "$building_sado_mines_02$" # 佐渡金山
 building_type_sado_mines_01_desc: "$building_sado_mines_01_desc$"
 building_sado_mines_01: "Sado Gold Pits"
 building_sado_mines_01_desc: "An old place of exile, few would have expected the distant island of Sado could secretly be hoarding such a wealth of gold beneath its surface."
 building_sado_mines_02: "Sado Gold Mine"
 building_sado_mines_02_desc: "The mining pits have been expanded, and engineers have been brought in to truly be able to ramp up the extraction of gold."
 building_sado_mines_03: "Large Sado Gold Mine"
 building_sado_mines_03_desc: "A village has sprung up around the many mining pits, and the workers find new gold veins regularly."
 building_sado_mines_04: "Sado Gold Mining Complex"
 building_sado_mines_04_desc: "The extraction of gold has reached a near-industrial scale, with the amount of workers now ranging in the thousands. Endless riches seemingly flow from the mines."

 building_type_iwami_mines_01: "$building_iwami_mines_02$"
 building_type_iwami_mines_01_desc: "The Iwami Silver Mine is perhaps the largest silver mine in Japan, with a truly immense output of silver. This mine provided the main hard currency for Japan's foreign trade, giving it a crucial status."
 building_iwami_mines_01: "Iwami Silver Pits"
 building_iwami_mines_01_desc: "$building_type_iwami_mines_01_desc$"
