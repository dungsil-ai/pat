 building_type_yanzhou_salt_01:0 "Yanchi Salt Field"
 building_type_yanzhou_salt_01_desc:0 "The green or white salt produced in the northwestern region is finely processed, inexpensive, and widely popular among the common people. Yanchi not only provides an essential living material but its related industries also serve as a major source of local fiscal revenue."
 building_yanzhou_salt_01:0 "Ancient Yanchi Salt Field"
 building_yanzhou_salt_01_desc:0 "$building_type_yanzhou_salt_01_desc$"
 building_yanzhou_salt_02:0 "Yanchi Salt Field"
 building_yanzhou_salt_02_desc:0 "People utilize the natural lake salt resources, collecting salt crystals crystallized on the lake banks through sun-drying and evaporation to meet the needs of nearby residents."
 building_yanzhou_salt_03:0 "Large Yanchi Salt Field"
 building_yanzhou_salt_03_desc:0 "Large-scale salt production technology was introduced, the salt field was further expanded, and production saw a significant increase."
 building_yanzhou_salt_04:0 "Yanchi Salt Industry"
 building_yanzhou_salt_04_desc:0 "Following the dramatic increase in table salt production, a salt monopoly agency was established here, responsible for the collection, storage, and transport of table salt."

 building_type_xiechi_salt_01:0 "Xiechi Salt Field"
 building_type_xiechi_salt_01_desc:0 "Xiechi, also known as Hedong Salt Lake, is rumored to have been formed when the blood of Chiyou, slain by the Yellow Emperor, turned into brine. The Xiechi Salt Field primarily produces Lu Salt, and the hundred-mile long salt lake is vast, grand, and spectacular."
 building_xiechi_salt_01:0 "Xiechi Salt Field"
