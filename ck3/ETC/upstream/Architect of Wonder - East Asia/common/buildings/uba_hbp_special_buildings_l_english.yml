l_english:
### 历史建筑
## 寺庙/古建筑
 building_giant_wild_goose_pagoda_02: "$building_yingtian_academy_03$"
 building_giant_wild_goose_pagoda_02_desc: "$building_yingtian_academy_03_desc$"

 building_type_daxiangguo_temple_01: "$building_daxiangguo_temple_01$"
 building_type_daxiangguo_temple_01_desc: "$building_daxiangguo_temple_01_desc$"
 building_daxiangguo_temple_01: "Daxiangguo Temple"
 building_daxiangguo_temple_01_desc: "The foremost Buddhist monastery in Kaifeng. Its vast scale and flourishing incense indicate its status as an important local center for Buddhist activity. Splendidly golden, resembling clouds and mist; thousands of carriages and riders, flowing like a dragon; constructed with such grandeur, worthy of praise and song."
 building_daxiangguo_temple_02: "$building_yingtian_academy_03$"
 building_daxiangguo_temple_02_desc: "$building_yingtian_academy_03_desc$"

 building_type_white_horse_temple_01: "$building_white_horse_temple_01$"
 building_type_white_white_horse_temple_01_desc: "$building_white_horse_temple_01_desc$"
 building_white_horse_temple_01: "White Horse Temple"
 building_white_horse_temple_01_desc: "The White Horse Temple is the "First Temple of China", being the earliest officially established monastery after Buddhism was introduced to the country. Its architecture is solemn and majestic, embodying the accumulation of Buddhist culture over centuries."
 building_white_horse_temple_02: "$building_yingtian_academy_03$"
 building_white_horse_temple_02_desc: "$building_yingtian_academy_03_desc$"

 building_type_xianshen_temple_01: "$building_xianshen_temple_01$"
 building_type_xianshen_temple_01_desc: "$building_xianshen_temple_01_desc$"
 building_xianshen_temple_01: "Zoroastrian Temple"
 building_xianshen_temple_01_desc: "A rare complex of Zoroastrian buildings in China, known for its unique exotic style and exquisite decoration. The glazed ridge ornaments and wooden carvings under the eaves incorporate elements of West Asian Persian style, testifying to the religious and cultural exchange along the Silk Road, and serving as a testament to the coexistence of different civilizations."

 building_type_wuhou_shrine_01: "$building_wuhou_shrine_01$"
 building_type_wuhou_shrine_01_desc: "$building_wuhou_shrine_01_desc$"
 building_wuhou_shrine_01: "Wuhou Shrine"
 building_wuhou_shrine_01_desc: "The Wuhou Shrine, Huiling Mausoleum, and Han Zhaolie Temple are shrines dedicated to commemorating the Shu Han heroes such as Liu Bei and Zhuge Liang. The shrine and temple halls are solemn, not only sacred sites for honoring wise rulers and virtuous ministers but also a spiritual symbol for literati throughout the ages to contemplate loyalty and integrity."

 building_type_confucian_temple_01: "$building_confucian_temple_01$"
 building_type_confucian_temple_01_desc: "$building_confucian_temple_01_desc$"
 building_confucian_temple_01: "Confucian Temple"
 building_confucian_temple_01_desc: "The place where successive dynasties offer sacrifices to Confucius, the Greatest Sage and Teacher. It is a symbol of Confucian thought and the national education system. The temple is modeled after the imperial palace, with a rigorous layout and towering halls. Emphasizing Confucianism and education, governing the country through culture, and upholding rites and ethics are the foundation of cultural tradition."

 building_type_dujiangyan_01: "$building_dujiangyan_01$"
 building_type_dujiangyan_01_desc: "$building_dujiangyan_01_desc$"
 building_dujiangyan_01: "Dujiangyan Irrigation System"
 building_dujiangyan_01_desc: "A great masterpiece of ancient hydraulic engineering, cleverly utilizing natural water flow for flood diversion, water intake, and irrigation. This project has ensured fertile lands for a thousand *li*, making the local region perpetually rich in produce."

 building_type_qingshui_temple_01: "$building_qingshui_temple_01$"
 building_type_qingshui_temple_01_desc: "$building_qingshui_temple_01_desc$"
 building_qingshui_temple_01: "Temples Complex of the Western Hills"
 building_qingshui_temple_01_desc: "The numerous monasteries in the suburbs of the Western Hills are famous for their clear springs, ancient trees, magnolias, and elegant environment. The pleasure of mountains and waters is fully realized here, often becoming a place where emperors traveled for leisure and to escape the summer heat."

 building_type_marco_polo_bridge_01: "$building_marco_polo_bridge_01$"
 building_type_marco_polo_bridge_01_desc: "$building_marco_polo_bridge_01_desc$"
 building_marco_polo_bridge_01: "Lugou Bridge"
 building_marco_polo_bridge_01_desc: "This stone bridge spanning the Lugou River is an important passage connecting the two banks. Its structure is sturdy, with beautifully carved railings and diverse sculptural forms. The 13th-century Venetian traveler Marco Polo highly praised it during his visit to China."

 building_type_yueyang_tower_01: "$building_yueyang_tower_01$"
 building_type_yueyang_tower_01_desc: "$building_yueyang_tower_01_desc$"
 building_yueyang_tower_01: "Yueyang Tower"
 building_yueyang_tower_01_desc: "This ancient city tower stands high above the western gate of Baling, overlooking Lake Dongting, facing Junshan Mountain, and backed by the Yangtze River to the north. It is famous because of Fan Zhongyan's Memorial to the Yueyang Tower and enjoys the reputation of "Dongting is the greatest water under heaven, and Yueyang is the greatest tower under heaven.""

 building_type_yellow_crane_tower_01: "$building_yellow_crane_tower_01$"
 building_type_yellow_crane_tower_01_desc: "$building_yellow_crane_tower_01_desc$"
 building_yellow_crane_tower_01: "Yellow Crane Tower"
 building_yellow_crane_tower_01_desc: "Jiangxia City is bordered by the great river to the west. On the corner of the south bank, a tower was built upon a rocky shoal, named the Yellow Crane Tower. It has been lauded in poems by many famous Chinese poets throughout history and enjoys the high reputation of being a peerless sight under heaven."

 building_type_stork_tower_01: "$building_stork_tower_01$"
 building_type_stork_tower_01_desc: "$building_stork_tower_01_desc$"
 building_stork_tower_01: "Stork Tower"
 building_stork_tower_01_desc: "The Stork Tower (Guanque Lou) is named after the storks that often perched on it. From its heights, one can overlook the Yellow River. Since ancient times, literati have ascended the tower to reflect on history and express their feelings; the popular five-character quatrain Ascending the Stork Tower by early Tang Dynasty poet Wang Zhihuan is famous throughout the world."

 building_type_prince_teng_pavilion_01: "$building_prince_teng_pavilion_01$"
 building_type_prince_teng_pavilion_01_desc: "$building_prince_teng_pavilion_01_desc$"
 building_prince_teng_pavilion_01: "Prince Teng Pavilion"
 building_prince_teng_pavilion_01_desc: "The Prince Teng Pavilion (Tengwang Ge) is located northwest of Nanchang City, on the eastern bank of the Gan River. It was built by Li Yuanying, the Prince Teng, who was then the Governor of Hongzhou, hence its name. While there are many beautiful waterside sights south of the Yangtze, the Prince Teng Pavilion is uniquely the foremost, known for its magnificence and unparalleled distinctiveness."

 building_type_penglai_pavilion_01: "$building_penglai_pavilion_01$"
 building_type_penglai_pavilion_01_desc: "$building_penglai_pavilion_01_desc$"
 building_penglai_pavilion_01: "Penglai Pavilion"
 building_penglai_pavilion_01_desc: "The Penglai Pavilion is situated on the Danya Mountain near the coast north of Penglai. Legend holds that it was here that the Eight Immortals feasted before demonstrating their respective magical treasures, stepping on the waves, and crossing the sea. This is the origin of the saying, The Eight Immortals cross the sea, each showing their special prowess."

 building_type_songling_mausoleum_01: "$building_songling_mausoleum_01$"
 building_type_songling_mausoleum_01_desc: "$building_songling_mausoleum_01_desc$"
 building_songling_mausoleum_01: "Songling Mausoleum"
 building_songling_mausoleum_01_desc: "The Songling Mausoleum are the mausoleums of successive Song Dynasty Emperors, imperial family members, famous generals, and meritorious officials. They pioneered the establishment of a dedicated mausoleum area, reflecting the strict hierarchy and rigid royal order of precedence."

 building_type_changgan_temple_01: "$building_changgan_temple_03$"
 building_type_changgan_temple_01_desc: "$building_changgan_temple_01_desc$"
 building_changgan_temple_01: "Changan Temple"
 building_changgan_temple_01_desc: "Changgansi Temple was first established during the Eastern Wu period and is a historic Buddhist monastery in the Jiangnan region. It enshrines Sarira (relics of the Buddha's bones) and is a place of pilgrimage for believers in the region."
 building_changgan_temple_02: "Tianxi Temple"
 building_changgan_temple_02_desc: "The monastery was renamed Tianxi Temple during the Song Dynasty and became one of the most important temples in Jinling City. Its scale was greatly expanded, its halls were magnificent, and its incense offerings flourished even more."
 building_changgan_temple_03: "Dabao'en Temple"
 building_changgan_temple_03_desc: "The monastery was rebuilt during the Ming Dynasty. The new temple was massive in scale, with architecture resembling a palace. The construction process was extremely meticulous, carried out entirely to the standards of the Imperial Palace.\n\nFurthermore, the Porcelain Tower of the Dabao'en Temple, located behind the main hall, was a wonder of world architectural history: nine stories, octagonal, splendidly golden, illuminated day and night, and visible even dozens of *li* away on the Yangtze River."

 building_type_foguang_temple_01: "$building_foguang_temple_01$"
 building_type_foguang_temple_01_desc: "$building_foguang_temple_01_desc$"
 building_foguang_temple_01: "Foguang Temple"
 building_foguang_temple_01_desc: "Foguang Temple is located on Mount Wutai and is one of the 'Ten Great Monasteries' of Wutai Mountain. Its halls are constructed with imposing wood and stone, inspiring reverence upon sight. The temple contains exquisite statues and murals, attracting numerous believers for worship, with flourishing incense offerings."

 building_type_qingcheng_mountain_temples_01: "$building_qingcheng_mountain_temples_01$"
 building_type_qingcheng_mountain_temples_01_desc: "$building_qingcheng_mountain_temples_01_desc$"
 building_qingcheng_mountain_temples_01: "Qingcheng Mountain Temples"
 building_qingcheng_mountain_temples_01_desc: "The temples and monasteries are spread throughout Qingcheng Mountain, giving rise to numerous high-ranking Daoists, earning it the title of the 'Abode of the Assembly of Immortals.' The temples are built along the cliff faces, deep, secluded, and profound, making it a blessed land for self-cultivation and spiritual refinement."

 building_type_daming_temple_01: "$building_daming_temple_01$"
 building_type_daming_temple_01_desc: "$building_daming_temple_01_desc$"
 building_daming_temple_01: "Daming Temple"
 building_daming_temple_01_desc: "The Qiling Pagoda was constructed within the temple to enshrine sarira, a pagoda nine stories high and magnificently grand, thus the temple was also known as Qiling Temple. Master Jianzhen, a prominent Vinaya scholar from Daming Temple, accepted an invitation from Japanese monks, after many perils, successfully traveled east to Japan to propagate the Dharma."

 building_type_tianshi_mansion_01: "$building_tianshi_mansion_01$"
 building_type_tianshi_mansion_01_desc: "$building_tianshi_mansion_01_desc$"
 building_tianshi_mansion_01: "Tianshi Mansion"
 building_tianshi_mansion_01_desc: "Legend holds that Zhang Daoling, the founder of the Zhengyi, once refined elixirs on Dragon-Tiger Mountain. When the elixir was perfected, a dragon and tiger appeared. The Tianshi Mansion complex is solemn and majestic, housing halls, talismans, and seals. It is the ancestral sanctuary of the Daoist Zhengyi."

 building_type_guoqing_temple_01: "$building_guoqing_temple_01$"
 building_type_guoqing_temple_01_desc: "$building_guoqing_temple_01_desc$"
 building_guoqing_temple_01: "Guoqing Temple"
 building_guoqing_temple_01_desc: "Guoqing Temple is located at the foot of Mount Tiantai. Initially named Tiantai Temple, its halls are solemn and its history is long. It is the ancestral sanctuary for both the Chinese Tiantai school of Buddhism and the Japanese Tendai school of Buddhism."

 building_type_puji_temple_01: "Temple of Mount Putuo"
 building_type_puji_temple_01_desc: "$building_puji_temple_01_desc$"
 building_puji_temple_01: "Monastery of the Unwilling Guanyin"
 building_puji_temple_01_desc: "It is recorded that during the Tang Dynasty, the Japanese monk Master Huie obtained a sacred statue of Guanyin from Mount Wutai, intending to take it back to his homeland. When the ship passed the waters off Mount Putuo, iron lotuses wound around the vessel. Believing that the Guanyin was unwilling to travel east, the statue was left on the mountain."
 building_puji_temple_02: "Baotuo Guanyin Temple"
 building_puji_temple_02_desc: "Mount Putuo, where Baotuo Guanyin Temple is located, is a special dojo dedicated to Guanyin. The Yuantong Hall in the temple is named after an alternative title for Guanyin. The monastery is grand in scale and flourishing with incense offerings."

 building_type_hanshan_temple_01: "$building_hanshan_temple_01$"
 building_type_hanshan_temple_01_desc: "$building_hanshan_temple_01_desc$"
 building_hanshan_temple_01: "Hanshan Temple"
 building_hanshan_temple_01_desc: "Hanshan Temple is located outside Gusu City. Legend holds it is named after the famous Tang Dynasty monk Hanshan. It became renowned throughout the world because of the Tang poet Zhang Ji's line, "The midnight chime reaches the traveler's boat.""

 building_type_palace_of_epang_01: "$building_palace_of_epang_03$"
 building_type_palace_of_epang_01_desc: "$building_palace_of_epang_03_desc$"
 building_palace_of_epang_01: "Epang Ruins"
 building_palace_of_epang_01_desc: "A sorrowful path through the Qin and Han eras, where ten thousand palace gates have all turned to dust."
 building_palace_of_epang_02: "Shanglin Garden"
 building_palace_of_epang_02_desc: "New orioles fly around Shanglin Garden, wishing to blend their song with the *xiaoshao* and phoenix *sheng* music."
 building_palace_of_epang_03: "Epang Palace"
 building_palace_of_epang_03_desc: "The Six Kings perished, the Four Seas unified, the Shu mountains were stripped bare, and the Epang Palace emerged."

 building_type_famen_temple_01: "$building_famen_temple_01$"
 building_type_famen_temple_01_desc: "$building_famen_temple_01_desc$"
 building_famen_temple_01: "Famen Temple"
 building_famen_temple_01_desc: "Famen Temple is not only an Imperial Monastery but also a globally revered Buddhist sanctuary. Within the temple stands a four-story square pavilion-style pagoda called the True Body Relic Pagoda. The underground palace beneath the pagoda enshrines a relic of the Buddha's finger bone and thousands of rare treasures, offered through the ritual establishment of a Tang Dynasty Esoteric Mandala."

 building_type_atsuta_jingu_01: "$building_atsuta_jingu_01$"
 building_type_atsuta_jingu_01_desc: "$building_atsuta_jingu_01_desc$"
 building_atsuta_jingu_01: "Atsuta Shrine"
 building_atsuta_jingu_01_desc: "Atsuta Shrine is sacred to the sun goddess, #EMP Amaterasu#!, and among the most hallowed Shintō sites. The shrine safeguards the Kusanagi-no-Tsurugi, one of the Three Sacred Treasures, giving it a revered status."

 building_type_hachimanguu_01: "$building_hachimanguu_01$"
 building_type_hachimanguu_01_desc: "$building_hachimanguu_01_desc$"
 building_hachimanguu_01: "Hachimangū Shrine"
 building_hachimanguu_01_desc: "Hachimangū is a shrine dedicated to the God of War, #EMP Hachiman-shin#!. He is the guardian deity of the warrior class, providing protection for long-lasting military fortune."

 building_type_shitenno_temple_01: "$building_shitenno_temple_01$"
 building_type_shitenno_temple_01_desc: "$building_shitenno_temple_01_desc$"
 building_shitenno_temple_01: "Shitennōji Temple"
 building_shitenno_temple_01_desc: "One of Japan's earliest Buddhist temples, built by Prince Shōtoku. Legend has it that Prince Shōtoku defeated the Mononobe no Moriya faction only after praying to the Four Heavenly Kings. Shitennōji Temple is considered a milestone of Japanese Buddhist culture and became the central location for the later Prince Shōtoku cult."

 building_type_zhaozhou_bridge_01: "$building_zhaozhou_bridge_01$"
 building_type_zhaozhou_bridge_01_desc: "$building_zhaozhou_bridge_01_desc$"
 building_zhaozhou_bridge_01: "Anji Bridge"
 building_zhaozhou_bridge_01_desc: "The Anji Bridge, also known as the Zhaozhou Bridge, is a masterpiece of Sui Dynasty stone arch bridge construction. Its structure is ingenious and its form is beautiful, remaining unshaken after centuries of wind and rain."

 building_type_daqin_temple_pagoda_01: "$building_daqin_temple_pagoda_01$"
 building_type_daqin_temple_pagoda_01_desc: "$building_daqin_temple_pagoda_01_desc$"
 building_daqin_temple_pagoda_01: "Da Qin Temple Pagoda"
 building_daqin_temple_pagoda_01_desc: "Da Qin Temple was originally named Jingjiao Temple, a Nestorian Christian church, before being converted into a Buddhist monastery. "Da Qin" is the name used by the Chinese to refer to the Roman Empire."

 building_type_anhakgung_palace_01: "$building_anhakgung_palace_02$"
 building_type_anhakgung_palace_01_desc: "$building_anhakgung_palace_02_desc$"
 building_anhakgung_palace_01: "Gwangbeop Temple"
 building_anhakgung_palace_01_desc: "A Buddhist temple built of wood by King Gwanggaeto. This temple's architecture is grand, its incense offerings are flourishing, and it is surrounded by extensively planted flowers and forests."
 building_anhakgung_palace_02: "Anhakgung Palace"
 building_anhakgung_palace_02_desc: "Anhakgung Palace was originally a royal palace built by Goguryeo, and has now been reconstructed. The palace is grand in scale, situated by mountains and near water."

building_type_songak_palace_01: "$building_songak_palace_01$"
 building_type_songak_palace_01_desc: "$building_songak_palace_01_desc$"
 building_songak_palace_01: "Songakgung Palace"
 building_songak_palace_01_desc: "Songakgung Palace is the capital of the kingdom, built by Mount Songak. Its palace architecture is grand and imposing, serving as the center for rulers to manage state affairs, hold grand ceremonies, and receive envoys."
 building_songak_palace_02: "Sungkyunkwan Academy"
 building_songak_palace_02_desc: "Sungkyunkwan is the nation's highest educational institution, as well as the center for Confucian education and cultural heritage. It teaches Confucian classics, cultivates pillars of the nation, and profoundly influences the kingdom's cultural development and political system."

 building_type_gyeongbokgung_palace_01: "$building_gyeongbokgung_palace_01$"
 building_type_gyeongbokgung_palace_01_desc: "$building_gyeongbokgung_palace_01_desc$"
 building_gyeongbokgung_palace_01: "Gyeongbokgung Palace"
 building_gyeongbokgung_palace_01_desc: "Gyeongbokgung Palace has a strict and symmetrical layout, serving as the core of the kingdom's ritual and political systems. It is magnificent, splendid, and massive in scale."
 building_gyeongbokgung_palace_02: "$building_songak_palace_02$"
 building_gyeongbokgung_palace_02_desc: "$building_songak_palace_02_desc$"

 building_type_izumo_taisha_uba_01: "$building_izumo_taisha_uba_01$"
 building_type_izumo_taisha_uba_01_desc: "$building_izumo_taisha_uba_01_desc$"
 building_izumo_taisha_uba_01: "Izumo Grand Shrine"
 building_izumo_taisha_uba_01_desc: "Izumo Grand Shrine is the sanctuary built by Amaterasu for #EMP Ōkuninushi#! as a condition for him yielding his country. It is an ancient and highly revered shrine with a long history."

 building_type_mireuk_temple_01: "$building_mireuk_temple_01$"
 building_type_mireuk_temple_01_desc: "$building_mireuk_temple_01_desc$"
 building_mireuk_temple_01: "Mireuksa Temple"
 building_mireuk_temple_01_desc: "The Baekje Dynasty devoted the full resources of the state to Buddhism, resulting in the construction of this magnificent monastery. The temple's architecture is grand and imposing, and it is famous for its massive stone pagoda of the Maitreya Buddha."

 building_type_chongrung_temple_01: "$building_chongrung_temple_01$"
 building_type_chongrung_temple_01_desc: "$building_chongrung_temple_01_desc$"
 building_chongrung_temple_01: "Chongrungsa Temple"
 building_chongrung_temple_01_desc: "An octagonal seven-story pagoda stands in the central courtyard of the temple, surrounded by three golden halls. This temple enjoys an honored status and its incense offerings are continuous."

 building_type_haein_temple_01: "$building_haein_temple_01$"
 building_type_haein_temple_01_desc: "$building_haein_temple_01_desc$"
 building_haein_temple_01: "Haeinsa Temple"
 building_haein_temple_01_desc: "Haeinsa Temple is situated on Gayasan Mountain and is one of the Three Jewel Temples of the Peninsula. The temple preserves precious sculptures, paintings, and Buddhist sutras."

 building_type_chongsheng_temple_01: "$building_chongsheng_temple_01$"
 building_type_chongsheng_temple_01_desc: "$building_chongsheng_temple_01_desc$"
 building_chongsheng_temple_01: "Chongsheng Temple"
 building_chongsheng_temple_01_desc: "Chongsheng Temple is the Buddhist center of the Southwest, known as the 'Buddha Capital,' famous throughout the world for its five great ritual vessels and the magnificent sight of its three pagodas standing side by side."

 building_type_chengtian_temple_01: "$building_chengtian_temple_01$"
 building_type_chengtian_temple_01_desc: "$building_chengtian_temple_01_desc$"
 building_chengtian_temple_01: "Chengtian Temple"
 building_chengtian_temple_01_desc: "Chengtian Temple was commissioned by the Empress Dowager of Western Xia, Empress Mozang. The temple often hosted imperial Dharma assemblies and various important Buddhist activities, where monks from various countries translated scriptures and delivered sermons."

 building_type_zhangye_temple_01: "$building_zhangye_temple_01$"
 building_type_zhangye_temple_01_desc: "$building_zhangye_temple_01_desc$"
 building_zhangye_temple_01: "Kassapa Tathagata Temple"
 building_zhangye_temple_01_desc: "Kassapa Tathagata Temple is also known as the 'Reclining Buddha Temple' because it enshrines a Nirvana statue of Shakyamuni Buddha. As an imperial monastery throughout history, it possesses a typical court architectural style."

 building_type_yongquan_temple_01: "$building_yongquan_temple_01$"
 building_type_yongquan_temple_01_desc: "$building_yongquan_temple_01_desc$"
 building_yongquan_temple_01: "Yongquan Temple"
 building_yongquan_temple_01_desc: "Located on Mount Gu in Fuzhou, the environment is serene and often shrouded in clouds and mist. It features the unique architectural layout of 'entering the mountain yet not seeing the temple, entering the temple yet not seeing the mountain.'"

 building_type_zhengding_longxing_temple_01: "$building_zhengding_longxing_temple_01$"
 building_type_zhengding_longxing_temple_01_desc: "$building_zhengding_longxing_temple_01_desc$"
 building_zhengding_longxing_temple_01: "Longxing Temple"
 building_zhengding_longxing_temple_01_desc: "A famous ancient Buddhist temple in the north. Its architectural layout is grand, with clear hierarchy and height variations, creating a majestic atmosphere. The temple also houses a giant bronze statue of the Thousand-Hand Guanyin with forty-two arms."

 building_type_qingzhou_longxing_temple_01: "$building_qingzhou_longxing_temple_01$"
 building_type_qingzhou_longxing_temple_01_desc: "$building_qingzhou_longxing_temple_01_desc$"
 building_qingzhou_longxing_temple_01: "Longxing Temple"
 building_qingzhou_longxing_temple_01_desc: "An important Buddhist monastery with a long history. It houses hundreds of Buddhist statues, all decorated with colorful paintings and gold leaf, with some even having figures and narrative scenes painted in various colors on their bodies or robes."

 building_type_kaiyuan_temple_01: "$building_kaiyuan_temple_01$"
 building_type_kaiyuan_temple_01_desc: "$building_kaiyuan_temple_01_desc$"
 building_kaiyuan_temple_01: "Kaiyuan Daoist Temple"
 building_kaiyuan_temple_01_desc: "During the Kaiyuan era of the Tang Dynasty, Emperor Xuanzong dreamed of a giant and desired to build a dojo. Coincidentally, Jingzhou reported the excavation of an iron-cast statue of the Heavenly Venerable. Xuanzong thus decreed the construction of a Daoist temple at the site where the statue was found, bestowing the name Kaiyuan Daoist Temple."

 building_type_stone_buddha_temple_01: "$building_stone_buddha_temple_01$"
 building_type_stone_buddha_temple_01_desc: "$building_stone_buddha_temple_01_desc$"
 building_stone_buddha_temple_01: "Stone Buddha Temple"
 building_stone_buddha_temple_01_desc: "The Stone Buddha Temple was the national protection temple of Balhae, named for a tall stone Buddha statue within the temple. The stone lantern pillar (Deung-jong) and the dragon turtle in the courtyard, both approximately six meters high, are renowned worldwide."

 building_type_sarira_temple_pagoda_01: "$building_sarira_temple_pagoda_01$"
 building_type_sarira_temple_pagoda_01_desc: "$building_sarira_temple_pagoda_01_desc$"
 building_sarira_temple_pagoda_01: "Sarira Temple Pagoda"
 building_sarira_temple_pagoda_01_desc: "Sarira Temple was established because of its pagoda. The Sarira Pagoda enshrines relics of the Buddha. This pagoda is imposing and serves as an important local Buddhist landmark."

 building_type_guangyou_temple_01: "$building_guangyou_temple_01$"
 building_type_guangyou_temple_01_desc: "$building_guangyou_temple_01_desc$"
 building_guangyou_temple_01: "Guangyou Temple"
 building_guangyou_temple_01_desc: "Guangyou Temple is massive in scale, reaching over two hundred halls and pavilions at its peak. The statue of Shakyamuni Buddha within the temple is the world's tallest and largest seated Shakyamuni statue housed inside a hall."

 building_type_gansheng_temple_01: "$building_gansheng_temple_01$"
 building_type_gansheng_temple_01_desc: "$building_gansheng_temple_01_desc$"
 building_gansheng_temple_01: "Gansheng Temple"
 building_gansheng_temple_01_desc: "Gansheng Temple houses the Daming Pagoda. The pagoda body is carved with seated Bodhisattvas, Vajra Warriors, and Apsaras, and wind bells hang from the eaves. This ancient pagoda is grand, stately, and stands majestically. On a clear day, it can be seen with the naked eye from a hundred miles away."

 building_type_baosheng_temple_01: "$building_baosheng_temple_01$"
 building_type_baosheng_temple_01_desc: "$building_baosheng_temple_01_desc$"
 building_baosheng_temple_01: "Baosheng Temple"
 building_baosheng_temple_01_desc: "An imperial temple commissioned for construction in Huining Prefecture. The temple's name carries the meaning of gathering treasure and achieving victory. This temple holds a noble status and is an important place for consecrating the Dharma and holding religious ceremonies."

 building_type_sevenstar_temple_01: "$building_sevenstar_temple_01$"
 building_type_sevenstar_temple_01_desc: "$building_sevenstar_temple_01_desc$"
 building_sevenstar_temple_01: "Seven Star Buddhist Temple"
 building_sevenstar_temple_01_desc: "A Buddhist grotto temple situated on the frontier of the Western Regions, located at a vital point on the Silk Road. Its grottoes feature exquisite murals and solemn statues, serving as a historical testament to the blending of ancient multiculturalism and the eastward and westward transmission of Buddhism."

 building_type_longmen_grottoes_01: "$building_longmen_grottoes_01$"
 building_type_longmen_grottoes_01_desc: "$building_longmen_grottoes_01_desc$"
 building_longmen_grottoes_01: "Longmen Grottoes"
 building_longmen_grottoes_01_desc: "On both banks of the Yi River, two mountains face each other, where tens of thousands of Buddhist statues were carved into the cliffs, creating a magnificent spectacle. Nine large statues were chiseled from the mountain rock, with the central Vairocana Buddha representing the pinnacle of the carving art of the time. "

 building_type_mogao_grottoes_01: "$building_mogao_grottoes_01$"
 building_type_mogao_grottoes_01_desc: "$building_mogao_grottoes_01_desc$"
 building_mogao_grottoes_01: "Mogao Grottoes"
 building_mogao_grottoes_01_desc: "A treasure trove of Buddhist cave art located at the western end of the Hexi Corridor. Its murals and painted sculptures span ten dynasties and nearly a millennium, with vast and exquisite content. "

 building_type_maijishan_grottoes_uba_01: "$building_maijishan_grottoes_uba_01$"
 building_type_maijishan_grottoes_uba_01_desc: "$building_maijishan_grottoes_uba_01_desc$"
 building_maijishan_grottoes_uba_01: "Maijishan Grottoes"
 building_maijishan_grottoes_uba_01_desc: "This grotto, first constructed in the 4th century, was mostly chiseled into the cliff face, known for its exquisite clay sculptures. The style of the statues is delicate and lifelike, continuously evolving across dynasties, reflecting the changes in Buddhist sculptural art over hundreds of years. "

 building_type_kumarajiva_temple_01: "$building_kumarajiva_temple_01$"
 building_type_kumarajiva_temple_01_desc: "$building_kumarajiva_temple_01_desc$"
 building_kumarajiva_temple_01: "Kumārajīva Temple"
 building_kumarajiva_temple_01_desc: "Built to commemorate the highly respected monk Kumārajīva from the Western Regions. This master translated Buddhist scriptures in the Central Plains and was indispensable to the spread of Buddhism and the establishment of the Chinese Buddhist Canon. Following his death, his disciples honored his last wish by enshrining his tongue relic in the Kumārajīva Temple Pagoda within the monastery."

 building_type_kongxiang_temple_01: "$building_kongxiang_temple_01$"
 building_type_kongxiang_temple_01_desc: "$building_kongxiang_temple_01_desc$"
 building_kongxiang_temple_01: "Kongxiang Temple"
 building_kongxiang_temple_01_desc: "This temple, first built in the 1st century AD, is famous throughout the world for Bodhidharma sacrificing himself for the Dharma and founding the Dhyana school of Buddhism. It is a pure dojo for monks to meditate, seek enlightenment, and pursue sudden realization."

 building_type_jinshan_temple_01: "$building_jinshan_temple_01$"
 building_type_jinshan_temple_01_desc: "$building_jinshan_temple_01_desc$"
 building_jinshan_temple_01: "Jinshan Temple"
 building_jinshan_temple_01_desc: "Jinshan Temple is also known as Longyou Temple. The monastery is built into the mountain, creating a magnificent sight. It is an important Dhyana Buddhist dojo in the Jiangnan region, with flourishing incense offerings."

 building_type_kumbum_temple_01: "$building_kumbum_temple_01$"
 building_type_kumbum_temple_01_desc: "$building_kumbum_temple_01_desc$"
 building_kumbum_temple_01: "Kumbum Monastery"
 building_kumbum_temple_01_desc: "This monastery has flourishing incense offerings and magnificent architecture, making it the most important center of Tibetan Buddhism in the Amdo region."

 building_type_yongning_temple_01: "$building_yongning_temple_01$"
 building_type_yongning_temple_01_desc: "$building_yongning_temple_01_desc$"
 building_yongning_temple_01: "Yongning Temple"
 building_yongning_temple_01_desc: "Yongning Temple is located near the mouth of the Amur River, expanded from a small temple dedicated to Avalokiteśvara. It was named Yongning to pray for the perpetual prosperity and peace of the Nurgan region and its people. The Yongning Temple Stele stands within the temple, and the local populace revered this stele as divine."

 building_type_fengguo_temple_01: "$building_fengguo_temple_01$"
 building_type_fengguo_temple_01_desc: "$building_fengguo_temple_01_desc$"
 building_fengguo_temple_01: "Fengguo Temple"
 building_fengguo_temple_01_desc: "First built during the Liao Dynasty, it is one of the imperial monasteries of the Liao. The temple is famous for its magnificent Hall of Seven Buddhas, which enshrines seven enormous Buddha statues, representing the Buddhist faith and architectural art of the Khitan people in the north."

 building_type_xuanzhong_temple_01: "$building_xuanzhong_temple_01$"
 building_type_xuanzhong_temple_01_desc: "$building_xuanzhong_temple_01_desc$"
 building_xuanzhong_temple_01: "Xuanzhong Temple"
 building_xuanzhong_temple_01_desc: "Xuanzhong Temple is the ancestral sanctuary of the Sukhavati school of Buddhism. From the Northern Wei to the Sui and Tang Dynasties, the three great patriarchs of the Chinese Sukhavati school resided here in succession. The belief in Amitābha's Sukhavati rapidly spread from this location to the Chinese populace, thus founding a school of thought that also spread to Korea and Japan."

 building_type_yuquan_temple_01: "$building_yuquan_temple_01$"
 building_type_yuquan_temple_01_desc: "$building_yuquan_temple_01_desc$"
 building_yuquan_temple_01: "Yuquan Temple"
 building_yuquan_temple_01_desc: "Yuquan Temple is one of the ancestral sanctuaries of the Pundarika school of Buddhism. Master Zhiyi founded the Pundarika school here. The temple environment is quiet and secluded, where monks practice asceticism, making it one of the famous Buddhist Chan monasteries in the southern regions."

 building_type_bezeklik_grottoes_01: "$building_bezeklik_grottoes_01$"
 building_type_bezeklik_grottoes_01_desc: "$building_bezeklik_grottoes_01_desc$"
 building_bezeklik_grottoes_01: "Ningrong Temple"
 building_bezeklik_grottoes_01_desc: "The Ningrong Temple or the Bezeklik Thousand Buddha Caves are located at the foot of the Flaming Mountains, a large-scale Buddhist grotto monastery on the Silk Road. The caves feature exquisite murals and solemn statues, and it served as the Buddhist center of the Gaochang region for a long time."

 building_type_guge_palace_01: "$building_guge_palace_01$"
 building_type_guge_palace_01_desc: "$building_guge_palace_01_desc$"
 building_guge_palace_01: "Guge Kingdom Citadel"
 building_guge_palace_01_desc: "The citadel is built into the mountain, creating an imposing sight. The architecture is divided into three tiers: upper, middle, and lower, sequentially housing the royal palace, temples, and residential quarters. The interior of the royal palace features painted murals on the ceilings and four walls, forming a distinct style."

 building_type_yellowemperor_mausoleum_01: "$building_yellowemperor_mausoleum_01$"
 building_type_yellowemperor_mausoleum_01_desc: "$building_yellowemperor_mausoleum_01_desc$"
 building_yellowemperor_mausoleum_01: "Mausoleum of the Yellow Emperor"
 building_yellowemperor_mausoleum_01_desc: "The Mausoleum of the Yellow Emperor, anciently known as Qiaoling, is the resting place of Xuanyuan Huangdi as recorded in the Records of the Grand Historian, located on Mount Qiao. It is a sacred place where successive dynasties offered sacrifices to their ancestors. The ancient cypress trees in front of the tomb are said to have been personally planted by the Yellow Emperor."

## 要塞
 building_type_baidi_fortress_01: "$building_baidi_fortress_01$"
 building_type_baidi_fortress_01_desc: "$building_baidi_fortress_01_desc$"
 building_baidi_fortress_01: "Baidi Fortress City"
 building_baidi_fortress_01_desc: "Baidi Fortress City is naturally easy to defend and hard to attack, making it a place of strategic military importance throughout history, renowned for defending the Three Gorges and safeguarding the regions of Ba and Chu. Gongsun Shu of the Western Han Dynasty used this place to establish a separatist regime, and Liu Bei of Shu Han retreated to Baidicheng Fortress to entrust his heir, thus ensuring the survival of the Han lineage. Poets throughout the ages have often ascended Baidicheng Fortress to leave behind verses, hence its reputation as the City of Poetry."

 building_type_diaoyu_fortress_01: "$building_diaoyu_fortress_01$"
 building_type_diaoyu_fortress_01_desc: "$building_diaoyu_fortress_01_desc$"
 building_diaoyu_fortress_01: "Diaoyu Fortress City"
 building_diaoyu_fortress_01_desc: "Diaoyu Mountain is adjacent to the Jialing River. Local legend has it that a giant god fished here, hence the name Diaoyu or "Fishing" Mountain. Diaoyucheng Fortress is strategically located near the mountains and the river, with perilous terrain that is easy to defend and hard to attack; it is also divided into inner and outer cities. The outer city wall is built with dressed stone on steep cliffs, inspiring fear in any invading enemy."

 building_type_taiyuan_fortress_01: "$building_taiyuan_fortress_01$"
 building_type_taiyuan_fortress_01_desc: "$building_taiyuan_fortress_01_desc$"
 building_taiyuan_fortress_01: "Jinyang Fortress City"
 building_taiyuan_fortress_01_desc: "Jinyang has been a key military stronghold in the north since ancient times, built upon the strategic terrain of the Taiyuan Basin. Its city walls are tall and sturdy, making it easy to defend and difficult to attack. Successive dynasties stationed troops here, serving as a vital barrier for controlling traffic between the Central Plains and the regions beyond the Great Wall, and for safeguarding the northern frontier."
 building_taiyuan_fortress_02: "Taiyuan Fortress City"
 building_taiyuan_fortress_02_desc: "Taiyuan is the new city built outside the former Jinyang City, and is smaller in scale. The urban planning is unique, with most streets being T-shaped rather than cross-shaped. Taiyuan is the final defensive line protecting the northern border of the Central Plains and must absolutely not be lost."

 building_type_shuri_castle_01: "$building_shuri_castle_01$"
 building_type_shuri_castle_01_desc: "$building_shuri_castle_01_desc$"
 building_shuri_castle_01: "Shuri Castle"
 building_shuri_castle_01_desc: "Shuri Castle integrates architectural features from China, Japan, and the Ryukyu Islands. It is the location of the capital and the royal palace of the Ryukyu Kingdom, serving not only as the political and diplomatic center of Ryukyu but also as a symbol of its unique culture."

 building_type_daming_fortress_01: "$building_daming_fortress_01$"
 building_type_daming_fortress_01_desc: "$building_daming_fortress_01_desc$"
 building_daming_fortress_01: "Daming Fortress City"
 building_daming_fortress_01_desc: "Wei, that is Daming! Daming Prefecture is an important fortress city on the North China Plain. Its city walls are vast, its planning is rigorous, and it is magnificent and grand, serving as a vital center for the economy, politics, and culture of the north."

 building_type_xiangyang_fortress_01: "$building_xiangyang_fortress_01$"
 building_type_xiangyang_fortress_01_desc: "$building_xiangyang_fortress_01_desc$"
 building_xiangyang_fortress_01: "Xiangyang Fortress City"
 building_xiangyang_fortress_01_desc: "Located on the banks of the Han River, the city is strongly fortified and has historically been a strategic necessity contested by military strategists. Its powerful defenses and important geographical location allowed it to play a crucial role in the wars of successive dynasties."

 building_type_beiting_fortress_01: "$building_beiting_fortress_01$"
 building_type_beiting_fortress_01_desc: "$building_beiting_fortress_01_desc$"
 building_beiting_fortress_01: "Beiting Fortress City"
 building_beiting_fortress_01_desc: "A major military and administrative center at the northern foot of the Tianshan Mountains, consisting of inner and outer city walls. This city controls the northern route of the Silk Road, serving as a critical gateway and transportation hub for the Western Regions."

## 书院
 building_type_yuelu_academy_uba_01: "$building_yuelu_academy_uba_01$"
 building_type_yuelu_academy_uba_01_desc: "$building_yuelu_academy_uba_01_desc$"
 building_yuelu_academy_uba_01: "Yuelu Academy"
 building_yuelu_academy_uba_01_desc: "This academy is situated on Mount Yuelu in Hunan. It is famous for its tranquil halls and rigorous teaching of Confucian classics, having nurtured many scholars."

 building_type_chenghao_academy_01: "$building_chenghao_academy_01$"
 building_type_chenghao_academy_01_desc: "$building_chenghao_academy_01_desc$"
 building_chenghao_academy_01: "Cheng Hao Academy"
 building_chenghao_academy_01_desc: "As the first academy founded by Cheng Hao, one of the founders of the Cheng-Zhu School of Neo-Confucianism, the Cheng Hao Academy was regarded by scholars as the origin of Neo-Confucianism and once held a very prominent status in history."

 building_type_shidong_academy_01: "$building_shidong_academy_01$"
 building_type_shidong_academy_01_desc: "$building_shidong_academy_01_desc$"
 building_shidong_academy_01: "Shidong Academy"
 building_shidong_academy_01_desc: "This private academy, located in Dongyang, attracted countless renowned scholars of the time for visits and lectures, leaving behind many poems and inscriptions. It was one of the main centers for academic exchange at the time."

 building_type_quanshan_academy_01: "$building_quanshan_academy_01$"
 building_type_quanshan_academy_01_desc: "$building_quanshan_academy_01_desc$"
 building_quanshan_academy_01: "Quanshan Academy"
 building_quanshan_academy_01_desc: "The famous Song Dynasty Neo-Confucian scholar Zhu Xi established Quanshan Academy here and promoted the academy system, directly boosting the development of academies in Quanzhou and quickly making Quanzhou one of the most flourishing regions for academy development in Fujian and even the entire country."

 building_type_ehu_academy_01: "Ehu Academy"
 building_type_ehu_academy_01_desc: "$building_ehu_academy_02_desc$"
 building_ehu_academy_01: "Renshou Temple"
 building_ehu_academy_01_desc: "An ancient temple located on Ehu Mountain, later renamed Ehu Temple after the mountain. The environment is secluded and quiet. Numerous devotees come here to worship the Buddha, and the incense offerings are continuous."
 building_ehu_academy_02: "Hall of Four Sages"
 building_ehu_academy_02_desc: "Ehu is famous throughout the world due to the celebrated Ehu Conference, which pioneered the system of academic discussions in academies. To commemorate this event, later generations established the Hall of Four Sages next to Ehu Temple, founded an academy."

 building_type_yingtian_academy_01: "$building_yingtian_academy_02$"
 building_type_yingtian_academy_01_desc: "$building_yingtian_academy_02_desc$"
 building_yingtian_academy_01: "Suiyang Academy"
 building_yingtian_academy_01_desc: "Although small in scale, Suiyang Academy offers a pure land of scholarship for those seeking knowledge."
 building_yingtian_academy_02: "Yingtian Academy"
 building_yingtian_academy_02_desc: "Academies have historically been mostly located in scenic mountain forests, but Yingtian Academy is uniquely situated in a bustling, prosperous city, and has historically produced a constant stream of talented individuals."
 building_yingtian_academy_03: "Imperial Academy"
 building_yingtian_academy_03_desc: "The establishment of schools in prefectures and counties began here, and schools across the realm look to this one for their rise. Gathering knowledge into a sea, then the nine rivers I swallow, the hundred valleys I honor; forging words into a blade, then floating clouds I cut, fine jade I carve."

 building_type_songyang_academy_01: "$building_songyang_academy_01$"
 building_type_songyang_academy_01_desc: "$building_songyang_academy_01_desc$"
 building_songyang_academy_01: "Songyang Academy"
 building_songyang_academy_01_desc: "Songyang Academy once served as both a Buddhist temple and a Daoist monastery, but was often a gathering place for famous Confucian scholars to lecture. It is one of the birthplaces of Neo-Confucianism during the Song Dynasty."

 building_type_ashikaga_academy_01: "$building_ashikaga_academy_01$"
 building_type_ashikaga_academy_01_desc: "$building_ashikaga_academy_01_desc$"
 building_ashikaga_academy_01: "Ashikaga Academy"
 building_ashikaga_academy_01_desc: "Ashikaga Academy is the oldest comprehensive school in Japan and was the de facto highest educational institution in the Kantō region during this period. It served as an important base for the spread of Confucianism in Japan."

 building_type_bailuzhou_academy_01: "$building_bailuzhou_academy_01$"
 building_type_bailuzhou_academy_01_desc: "$building_bailuzhou_academy_01_desc$"
 building_bailuzhou_academy_01: "Bailuzhou Academy"
 building_bailuzhou_academy_01_desc: "Located in Luling, it is a famous Neo-Confucian academy in the Jiangnan region. The scholarly atmosphere here is pure, and famous masters gather, cultivating countless talents. It is an important center for the dissemination of Confucian scholarship."

## 海港/市舶司
 building_type_quanzhou_seaport_01: "$building_quanzhou_seaport_01$"
 building_type_quanzhou_seaport_01_desc: "$building_quanzhou_seaport_01_desc$"
 building_quanzhou_seaport_01: "Quanzhou Seaport"
 building_quanzhou_seaport_01_desc: "Quanzhou's port attracts foreign merchants from far and wide. Traders are known to come from Arabia and Anatolia, Japan and Korea, and everything in-between. This influx of trade vessels ensures that local industries are booming and it has made Quanzhou the foremost shipbuilder in the region."

 building_type_hangzhou_seaport_01: "$building_hangzhou_seaport_01$"
 building_type_hangzhou_seaport_01_desc: "$building_hangzhou_seaport_01_desc$"
 building_hangzhou_seaport_01: "Hangzhou Seaport"
 building_hangzhou_seaport_01_desc: "Hangzhou Port benefits from river, sea, and canal access. Goods such as silk, tea, and porcelain from various regions converge here, reaching the four corners of the world via waterways. Merchants flock here, and commercial ships shuttle back and forth."

 building_type_xiuzhou_seaport_01: "$building_xiuzhou_seaport_01$"
 building_type_xiuzhou_seaport_01_desc: "$building_xiuzhou_seaport_01_desc$"
 building_xiuzhou_seaport_01: "Xiuzhou Seaport"
 building_xiuzhou_seaport_01_desc: "Huating in Xiuzhou is located at the mouth of the Yangtze River, with a dense network of waterways, offering advantages for boat and ship traffic. Relying on its developed water routes, the products of the LiangZhe circuits can continuously flow between the seaports and river ports."

 building_type_mingzhou_seaport_01: "$building_mingzhou_seaport_01$"
 building_type_mingzhou_seaport_01_desc: "$building_mingzhou_seaport_01_desc$"
 building_mingzhou_seaport_01: "Mingzhou Seaport"
 building_mingzhou_seaport_01_desc: "Mingzhou Port is situated at the confluence of three rivers, with deep water and a wide shore. Trade with Japan and Goryeo is particularly prosperous here. It is not only a key node for trade in the East China Sea but also a reception point for foreign envoys, showcasing the prestige of the Celestial Empire."

 building_type_guangzhou_seaport_01: "$building_guangzhou_seaport_01$"
 building_type_guangzhou_seaport_01_desc: "$building_guangzhou_seaport_01_desc$"
 building_guangzhou_seaport_01: "Guangzhou Seaport"
 building_guangzhou_seaport_01_desc: "Guangzhou has been the center of South China Sea trade since ancient times, where exotic spices, ivory, and jewels from overseas land. As the southern gateway for distant sea routes, its harbor has been lined with masts for centuries, witnessing the sustained prosperity of East-West commerce."

 building_type_mizhou_seaport_01: "$building_mizhou_seaport_01$"
 building_type_mizhou_seaport_01_desc: "$building_mizhou_seaport_01_desc$"
 building_mizhou_seaport_01: "Mizhou Seaport"
 building_mizhou_seaport_01_desc: "Banqiao Town, as the only maritime trade port in the north, already had a significant scale of sea transport trade during the Tang Dynasty and gradually became one of the important ports for maritime exchange with Goryeo and Japan."

 building_type_edo_port_01: "$building_edo_port_01$"
 building_type_edo_port_01_desc: "$building_edo_port_01_desc$"
 building_edo_port_01: "Edo Port"
 building_edo_port_01_desc: "Edo is the gateway to Kantō, and the lifeline for material transport and commercial trade in the Kantō region. Its port is busy, with ships moving back and forth, supporting Edo's prosperity."
 building_edo_port_02: "$building_edo_port_01$"
 building_edo_port_02_desc: "$building_edo_port_01_desc$"

 building_type_sakai_port_01: "$building_sakai_port_01$"
 building_type_sakai_port_01_desc: "$building_sakai_port_01_desc$"
 building_sakai_port_01: "Sakai Port"
 building_sakai_port_01_desc: "Sakai is located at the junction of three provinces and benefits from its seaport access. It is the freest and most prosperous autonomous city-port in Japan, attracting large gatherings of merchants and boasting highly developed trade."
 building_sakai_port_02: "$building_sakai_port_01$"
 building_sakai_port_02_desc: "$building_sakai_port_01_desc$"

 building_type_cheonghaejin_port_01: "$building_cheonghaejin_port_01$"
 building_type_cheonghaejin_port_01_desc: "$building_cheonghaejin_port_01_desc$"
 building_cheonghaejin_port_01: "Cheonghaejin Port"
 building_cheonghaejin_port_01_desc: "Cheonghaejin commands a vital point on the sea routes, making it crucial for controlling maritime trade and defending against pirate incursions, thus ensuring the security of sea lanes."

## 自然
 building_type_mount_tai_01: "$building_mount_tai_01$"
 building_type_mount_tai_01_desc: "$building_mount_tai_01_desc$"
 building_mount_tai_01: "Mount Tai"
 building_mount_tai_01_desc: "Mount Tai, also known as Mount Dai, is majestic and magnificent in form, with beautiful scenery. Due to its imposing grandeur, it is ranked as the chief of the Five Great Mountains. It is the most symbolically significant sacred mountain in China. Since ancient times, emperors have performed the Feng Shan ceremonies here to pray for peace and prosperity for the nation and to proclaim that the imperial mandate is received from Heaven.\n\nAs a bridge between Heaven and Earth, Mount Tai is also the dojo of the #EMP Great Emperor of the Eastern Peak#! — legend holds that this deity governs the good and evil of the mortal world and controls life and death under Heaven."

 building_type_huangguoshu_01: "$building_huangguoshu_01$"
 building_type_huangguoshu_01_desc: "$building_huangguoshu_01_desc$"
 building_huangguoshu_01: "Huangguoshu Waterfall"
 building_huangguoshu_01_desc: "The water flows down from a high cliff with immense force, enveloped in mist. The scenery here is magnificent, a masterpiece of nature's uncanny craftsmanship."

 building_type_wuxia_01: "$building_wuxia_01$"
 building_type_wuxia_01_desc: "$building_wuxia_01_desc$"
 building_wuxia_01: "Wuxia Gorge"
 building_wuxia_01_desc: "One of the Three Gorges of the Yangtze River, famous for its deep seclusion and picturesque beauty. The peaks on both banks are sheer like they were carved, and the river twists and flows, wrapped in clouds and mist, fully displaying the perilous grandeur and splendor of the Twelve Peaks of Mount Wu."

 building_type_mount_wuzhi_01: "$building_mount_wuzhi_01$"
 building_type_mount_wuzhi_01_desc: "$building_mount_wuzhi_01_desc$"
 building_mount_wuzhi_01: "Mount Wuzhi"
 building_mount_wuzhi_01_desc: "The highest peak on Hainan Island, shaped like five fingers, soaring straight into the clouds."

 building_type_mount_yonaha_01: "$building_mount_yonaha_01$"
 building_type_mount_yonaha_01_desc: "$building_mount_yonaha_01_desc$"
 building_mount_yonaha_01: "Mount Yonaha"
 building_mount_yonaha_01_desc: "The primary mountain peak on the Ryukyu Islands, majestic in form and richly forested. Legend holds that the celestial deity, #EMP Amamikyu#!, erected the Pillar of Heaven and Earth here, stabilizing the Ryukyu Islands she created."

 building_type_mount_kumgang_01: "$building_mount_kumgang_01$"
 building_type_mount_kumgang_01_desc: "$building_mount_kumgang_01_desc$"
 building_mount_kumgang_01: "Mount Kumgang"
 building_mount_kumgang_01_desc: "A famous mountain range in the eastern part of the Peninsula, renowned for its precipitous and picturesque peaks and unique rock formations."
 
building_type_mount_mogan_01: "$building_mount_mogan_01$"
 building_type_mount_mogan_01_desc: "$building_mount_mogan_01_desc$"
 building_mount_mogan_01: "Mount Mogan"
 building_mount_mogan_01_desc: "Named after the legend that Gan Jiang and Mo Ye, sent by King Helyu of Wu, forged the unique, a pair of married swords here. The landscape is picturesque, and the vegetation is lush and beautiful, making it a famous summer resort."

 building_type_jiuzhaigou_01: "$building_jiuzhaigou_01$"
 building_type_jiuzhaigou_01_desc: "$building_jiuzhaigou_01_desc$"
 building_jiuzhaigou_01: "Jiuzhaigou Valley"
 building_jiuzhaigou_01_desc: "A cluster of high-altitude lakes on the plateau, known for its emerald lakes, cascading waterfalls, colorful forests, and snowy peaks. Its water hues are brilliant, and the scenery is absolutely unique, resembling a fairyland—a masterpiece of nature's uncanny craftsmanship."

 building_type_mount_danxia_01: "$building_mount_danxia_01$"
 building_type_mount_danxia_01_desc: "$building_mount_danxia_01_desc$"
 building_mount_danxia_01: "Mount Danxia"
 building_mount_danxia_01_desc: "A famous region of red sandstone landforms in the Lingnan area, after which the Danxia landform type is named. The rocks have bizarre shapes and vibrant colors, creating magnificent scenery full of natural wonder and interest."

 building_type_mount_kailash_01: "$building_mount_kailash_01$"
 building_type_mount_kailash_01_desc: "$building_mount_kailash_01_desc$"
 building_mount_kailash_01: "Mount Kailash"
 building_mount_kailash_01_desc: "Mount Kailash is regarded as the center of the world and a sacred mountain by multiple religions, including Tibetan Buddhism, Hinduism, and Bon. The peak is perpetually snow-covered and uniquely shaped, serving as a sacred destination where countless pilgrims trek thousands of miles to perform the kora (circumambulation)."

 building_type_halong_bay_01: "$building_halong_bay_01$"
 building_type_halong_bay_01_desc: "$building_halong_bay_01_desc$"
 building_halong_bay_01: "Ha Long Bay"
 building_halong_bay_01_desc: "Ha Long Bay is located on the coast of Northern Vietnam, featuring captivating sea and mountain scenery with scattered islands in myriad forms."
 building_halong_bay_02: "$building_halong_bay_01$"
 building_halong_bay_02_desc: "The interior of Ha Long Bay is a natural safe harbor, with deep, calm waters, making it ideal for ship docking. It is not only an important trade gateway but also a natural fortress for naval assembly and defense against pirate attacks."

## 矿场
 building_type_tonglyushan_mines_01: "Tonglyushan Copper Mines"
 building_type_tonglyushan_mines_01_desc: "Tonglyushan Copper Mine is located in Hubei. The mountain is named for the color of its copper, and its mining history can be traced back to the pre-Qin period."
 building_tonglyushan_mines_01: "Tonglyushan Copper Pits"
