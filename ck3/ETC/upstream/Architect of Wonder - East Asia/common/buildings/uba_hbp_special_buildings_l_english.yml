 building_type_yanguan_salt_01:0 "Yanguan Salt Field"
 building_type_yanguan_salt_01_desc:0 "Benefiting from the vast tidal flats of Hangzhou Bay, the tidal bore continuously washes the north shore. Although the coastline is unstable, it has brought opportunities for the salt industry. Over several centuries, the Yanguan Salt Field continuously expanded its scale, ranking among the foremost sea-boiling salt fields in the country."
