  concept_com_international_situation_desc: "$concept_com_international_situations$(은)는 대국과 소국을 막론하고 [Concept('concept_country','$concept_countries$)] 모두의 지속적인 관심을 요구하는 복잡하고 장기적인 사건입니다. 이는 전략적 기회가 될 수도 있고, 지정학적 위기로 번질 수도 있습니다.\n\n$concept_com_international_situations$은(는) 보통 둘 이상의 [Concept('concept_com_situation_faction','$concept_com_situation_factions$)]가 관여하며, 각 진영은 고유한 [concept_com_situation_leader]를 가집니다. 일단 해결되면 이들은 $concept_journal$에서 제거됩니다." # 13149645444705378619
