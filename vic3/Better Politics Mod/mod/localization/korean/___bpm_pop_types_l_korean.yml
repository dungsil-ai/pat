l_korean:
  aristocrats_desc: "부유한 지주들, 오랜 연줄을 가진 구시대의 자산가들입니다. 이들은 오직 [GetBuildingType('building_manor_house').GetName] [Concept('concept_building', '$concept_buildings$')]에서만 일하며, 그곳에서 농장과 플랜테이션을 소유합니다. 이들은 수익의 일부를 [concept_investment_pool]에 기여합니다. 이들의 정치적 이익은 [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant]로 대변됩니다." # 15256084635241384198
  bureaucrats_desc: "정부 기능, 법 집행, 사회 기반 시설의 관리를 책임지는 고위 공무원들입니다.\n$TOOLTIP_DELIMITER$\n제도적으로는 [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetNameWithCountryVariant]가 이들을 대변하며, 정치적으로는 [Concept('concept_bpm_ig_is_mainstream_conservative', '보수주의')] 집단과 연대하는 경향이 있으나, 현상 유지를 지지하는 세력이라면 누구에게든 기울 수 있습니다." # 6828164372419907929
  capitalists_desc: "산업의 주역들, 새로운 시대를 위한 신흥 자산가들입니다. 이들은 오직 [GetBuildingType('building_financial_district').GetName] [Concept('concept_building', '$concept_buildings$')]에서만 일하며, 그곳에서 광산과 제조 시설을 소유합니다. 이들은 수익의 일부를 [concept_investment_pool]에 기여합니다. 이들의 제도적 이익은 [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant]로 대변되며, 정치적으로는 초기에는 [Concept('concept_bpm_ig_is_liberal', '자유주의')] 성향을 띠는 경향이 있으나, 시간이 흐름에 따라 점차 [Concept('concept_bpm_ig_is_mainstream_conservative', '보수주의')] 성향이 강해질 수 있습니다." # 3628635023600515567
  clergymen_desc: "성직자, 종교 학자, 수도승 및 그 외 평신도의 영적 필요를 돌보는 종교적·도덕적 지도자들입니다.\n$TOOLTIP_DELIMITER$\n대개 농촌 지역에 거주하며 정치색을 띠지 않고, [Concept('concept_bpm_institutional_ig', '제도적 이익 집단')]에 머무르는 경향이 있습니다." # 2136852743519268095
  clerks_desc: "#v [Concept('concept_sol', '생활 수준')] 10 초과#! (@impoverished! #bold #yellow 빈곤층#!#! ):\n정부, 기업, 사회 기반 시설 및 기타 기관에서 사소한 일상적 행정 및 재무 업무를 수행하는 하급 사무직 및 전문직 노동자들입니다.\n\n#v [Concept('concept_sol', '생활 수준')] 10 이하#! (@impoverished! #bold #yellow 빈곤층#!#! ):\n복잡한 업무는 적지만 급여도 낮은, 고단한 일상 행정 업무를 수행하는 하급 사무직 노동자들입니다.\n$TOOLTIP_DELIMITER$\n초기에는 [Concept('concept_politically_unaligned_aligned', '$concept_politically_unaligned$')] 상태이거나 [Concept('concept_bpm_institutional_ig', '제도적 이익 집단')]의 일부인 경우가 많지만, 수가 많아지면 노동자 기반 또는 [Concept('concept_bpm_ig_is_liberal', '자유주의')] [Concept('concept_bpm_ideological_ig', '이념적 이익 집단')]으로 분화하는 경향이 있습니다." # 6034771845255174412
  engineers_desc: "#v [Concept('concept_sol', '생활 수준')] 15 초과#! (@middling! #bold #yellow 중산층#!#! ):\n일상 운영에 필요한 고급 기계를 다루는 교육받은 노동자이자 숙련된 장인들로, 상류층으로부터 '노동 귀족'으로 인식될 만큼 충분한 부를 누립니다.\n\n#v [Concept('concept_sol', '생활 수준')] 15 이하#! (@middling! #bold #yellow 중산층#!#! ):\n일상 운영에 필요한 고급 기계를 다루는 교육받은 노동자들이지만, 그 중요성에도 불구하고 생계를 유지하기 위해 고군분투하는 이들입니다.\n$TOOLTIP_DELIMITER$\n대개 노동자 기반의 [Concept('concept_bpm_institutional_ig', '제도적')] 및 [Concept('concept_bpm_ideological_ig', '이념적')] [Concept('concept_interest_group', '이익 집단')]을 지지하는 경향이 있으나, [Concept('concept_bpm_ig_is_liberal', '자유주의')] 성향을 보일 때도 있습니다." # 10987299858005393598
  farmers_desc: "#v [Concept('concept_sol', '생활 수준')] 15 초과#! (@middling! #bold #yellow 중산층#!#! ):\n토지를 소유하고 주로 그곳에서 자급자족하며 식량, 환금 작물, 가축 등을 생산하는 소농, 목장주, 산업형 농부 및 기타 농장주들입니다.\n\n#v [Concept('concept_sol', '생활 수준')] 15 이하#! (@middling! #bold #yellow 중산층#!#! ):\n자신의 생존을 위해 밭작물을 생산하며 근근이 살아가는 영세 소농, 소작농 및 분익 농부들입니다.\n$TOOLTIP_DELIMITER$\n대부분 [Concept('concept_bpm_ig_is_mainstream_conservative', '보수주의')] 성향을 띠지만, [Concept('concept_bpm_ig_is_socialist', '사회주의')] 또는 [Concept('concept_bpm_ig_is_agrarian', '포퓰리즘')] [Concept('concept_interest_group', '이익 집단')]의 일원이 되기도 합니다." # 640858295177688390
  peasants_desc: "[Concept('concept_subsistence_building', '$concept_subsistence_buildings$')]에서만 발견되는 자급자족 농부들로, 주로 자신의 필요를 충족하기 위해 농산물과 단순 공산품을 생산합니다. 이들은 생존을 위해 [concept_subsistence_output]에 의존하며 [concept_market] 경제에서 제한적인 역할만을 수행합니다. 이들은 대개 [Concept('concept_politically_unaligned_aligned', '$concept_politically_unaligned$')] 상태입니다." # 8519610109454318686
  laborers_desc: "#v [Concept('concept_sol', '생활 수준')] 10 초과#! (@impoverished! #bold #yellow 빈곤층#!#! ):\n공장, 광산, 철도 또는 농장에서 항상 위험하거나 불안정한 일에 종사하며, 종종 생명이나 일자리를 잃는 일반적인 비숙련 노동자들입니다.\n\n#v [Concept('concept_sol', '생활 수준')] 10 이하#! (@impoverished! #bold #yellow 빈곤층#!#! ):\n안정적인 일자리가 없어 거리로 내몰리거나 끊임없이 일자리를 바꿔야 하는 일반적인 비숙련 노동자 및 농장 인부들입니다.\n$TOOLTIP_DELIMITER$\n종종 스스로를 안전하게 부양할 수 없어 정치에 참여하지 않는 경향이 있으나, 참여할 경우에는 [Concept('concept_bpm_ig_is_mainstream_conservative', '보수주의')] 성향을 띠거나 노동자 기반의 [Concept('concept_interest_group', '이익 집단')]을 지지합니다." # 2528845732660260664
  officers_desc: "대개 세습, 부, 혹은 공적을 통해 지위를 얻으며, 주로 육군과 해군에서 국가의 군사력을 지휘하고 관리하는 장교들입니다.\n$TOOLTIP_DELIMITER$\n제도적으로 이들의 이익은 [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant]에 의해 대변되며, 일반적으로 [Concept('concept_bpm_ig_is_hawkish', '강경파')] 또는 [Concept('concept_bpm_ig_is_patriotic', '애국적')]-[Concept('concept_bpm_ig_is_moderate_conservative', '보수적')] 성향의 집단에 기우는 경향이 있습니다." # 16558693493330917131
  academics_desc: "의사, 변호사, 연구원, 언론인, 교사 등 독립적이거나 고용된 형태의 교육받은 전문직 종사자들로, 특정 분야를 전문으로 하며 주로 그 일을 통해 생계를 유지합니다. 이러한 전문직 종사자들은 종종 부유층과 우호적인 관계를 맺는 경향이 있습니다.\n$TOOLTIP_DELIMITER$\n대개 온건한 [Concept('concept_bpm_ig_is_liberal', '자유주의')] 성향을 띠지만, 가장 [Concept('concept_radical', '급진화된')] 이들의 지도자나 교육자가 되기도 합니다." # 5637932537548463023
  shopkeepers_desc: "#v [Concept('concept_sol', '생활 수준')] 20 초과#! (@secure! #bold #yellow 안정적#!#! ):\n중산층 상류에 속하는 소상공인, 폭넓은 인맥을 가진 상인, 부유한 장인, 주식 중개인 또는 기타 부유한 사업가들입니다.\n\n#v [Concept('concept_sol', '생활 수준')] 20 미만#! (@secure! #bold #yellow 안정적#!#! ):\n보통의 상인, 영세 점주, 양조업자 또는 숙련된 장인들로, 대개 생계를 유지하기 위해 고군분투하며 새로운 거대 자본과 경쟁합니다.\n$TOOLTIP_DELIMITER$\n제도적으로 이들은 [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant]에 의해 대변되며, 위협을 느끼지 않는 한 일반적으로 온건한 [Concept('concept_bpm_ig_is_liberal', '자유주의')] 입장에 기우는 경향이 있습니다." # 897780320937977204
  slaves_desc: "노예제가 허용되는 국가에서 인격체가 아닌 재산으로 취급받으며 다양한 부문에서 강제 노동을 수행합니다. 그들의 신분으로 인해 정치 참여는 허용되지 않습니다." # 17817087667150580980
  soldiers_desc: "군사 기술자, 보병, 수병 또는 징집병처럼 국가 군사 인력의 대다수를 구성하는 평범하고 고생하는 군인들입니다.\n$TOOLTIP_DELIMITER$\n이들은 대개 [Concept('concept_politically_unaligned_aligned', '$concept_politically_unaligned$')] 상태이거나 정치 참여가 허용되지 않지만, 참여하게 될 경우 [Concept('concept_bpm_ig_is_patriotic', '애국적')] 성향과 [Concept('concept_bpm_ig_is_radical_liberal', '급진적')]/[Concept('concept_bpm_ig_is_actually_desiring_socialism', '사회주의적')] 집단을 선호합니다." # 7447970567217873658
  machinists_desc: "#v [Concept('concept_sol', '생활 수준')] 15 초과#! (@middling! #bold #yellow 보통#!#! ):\n기계를 다루는 육체 노동자, 농업 경영인 또는 독립적인 장인들로, 보통 안정적인 고용 상태와 적절한 교육을 받으며 육체 노동을 수행합니다.\n\n#v [Concept('concept_sol', '생활 수준')] 15 미만#! (@middling! #bold #yellow 보통#!#! ):\n안정적인 고용 상태이지만 스스로를 제대로 부양할 능력이 없는, 기본적인 기계를 다루는 숙련 노동자 및 장인들입니다.\n$TOOLTIP_DELIMITER$\n초기에는 고용 형태에 따라 [Concept('concept_bpm_ig_is_liberal', '자유주의')]나 [Concept('concept_bpm_ig_is_mainstream_conservative', '보수주의')] 성향을 띠는 경향이 있으나, 수가 많아지면 노동자 기반의 [Concept('concept_bpm_ideological_ig', '이익 집단')]으로, 농촌 지역인 경우 [GetInterestGroupVariant('ig_agrarian_populists',GetPlayer).GetNameWithCountryVariant]로 전환되는 경우가 많습니다." # 13407760946599212852
