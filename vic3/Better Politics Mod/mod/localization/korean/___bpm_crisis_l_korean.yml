l_korean:
  bpm_state_crisis.1.t: "위기!" # 9936355839328211968
  bpm_state_crisis.1.d: "국가의 전통적인 제도가 위협받고 있습니다. 국가에 충성하는 모든 [Concept('concept_interest_group', '이익 집단')]은 급진주의자들로부터 현행 제도를 보호하기 위해 협력하기로 합의했습니다. 그들은 국가의 생존을 보장하기 위해 극단적인 조치도 불사할 것입니다." # 2734111114170652462
  bpm_state_crisis.1.f: "“억압받는 자를 압제자로부터 방어하고, 그들을 착취하고 짓밟는 강자에 맞서 약자의 대의를 변호하는 것, 이것이야말로 이기심과 부패에 물들지 않은 모든 이들의 의무이다.” - 막시밀리앙 로베스피에르" # 1826595008962653195
  bpm_state_crisis.1.a: "짐이 곧 국가다!" # 13939373421037915734
  bpm_state_crisis.1.b: "국가는 곧 국민이다!" # 12806825203639427464
  je_bpm_crisis_of_the_state: "국가의 위기" # 13282770091162053774
  je_bpm_crisis_of_the_state_desc: "국가가 급진주의자들에 의해 위협받고 있습니다." # 16959977062289527753
  je_bpm_crisis_of_the_state_reason: "국가에 충성하는 모든 [Concept('concept_interest_group', '이익 집단')]은 급진주의자들의 커지는 위협으로부터 현행 제도를 보호하기 위해 협력하기로 합의했습니다." # 4202849148974875591
  bpm_extremist_tt: "이익 집단이 극단주의자임" # 11114397170570662530
  bpm_crisis_movement_radicalism: "급진주의를 묵인함" # 10760863784069410606
  bpm_crisis_movement_crackdown: "급진주의자 탄압" # 3535230289757227878
  je_bpm_crisis_of_the_state_goal: "위 조건들이 6개월 동안 유지되었습니다." # 8447646689604018166
  je_bpm_constitutional_restrictions: "법적 제한" # 1647016363344169341
  je_bpm_constitutional_restrictions_desc: "[GetPlayer.GetRuler.GetPrimaryRoleTitle]의 권력이 너무 막강합니다." # 7528051479062560021
  je_bpm_constitutional_restrictions_reason: "우리 국가의 대부분의 이익 집단은 [Country.GetRuler.GetPrimaryRoleTitle]의 권력이 지나치다는 점에 동의하고 있습니다. 그들은 [Country.GetRuler.GetPrimaryRoleTitle]의 권력을 제한하기 위한 법적 조치를 지지할 의사가 있습니다. 하지만 [Country.GetRuler.GetPrimaryRoleTitle]은 쉽게 권력을 내려놓으려 하지 않습니다.\n\n만약 우리가 [Country.GetRuler.GetPrimaryRoleTitle]을 설득하여 권력을 일부 양보하게 만들 수 있다면, 우리의 안건을 더 쉽게 통과시킬 수 있을 것입니다. 위협적인 혁명이나 [Country.GetRuler.GetHerHim]에 반대하는 강력한 운동이 있다면 [Country.GetRuler.GetPrimaryRoleTitle]을 설득할 수 있을 것입니다." # 17430689473747766603
  bpm_the_eternal_ruler_mod: "영원한 통치자" # 7413257050362457127
