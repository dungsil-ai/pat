  hog_regency.3.t: "$bpm_hog_title_default_contextless$의 성년 도달" # 10412191486529470721
  hog_regency.3.d: "$bpm_hog_title_default_contextless$의 성년 도달로 [SCOPE.sCharacter('hog_scope').GetFullName] 님이 이제 $bpm_hog_title_default_contextless$가 될 수 있습니다. [SCOPE.sCharacter('acting_hog_scope').GetFullName] 님은 더 이상 임시 $bpm_hog_title_default_contextless$ 역할을 수행하지 않습니다." # 6119176914301452749
  hog_regency.3.f: "[SCOPE.sCharacter('acting_hog_scope').GetFullNameNoFormatting] 님은 사제가 마지막 도유 의식을 거행하는 모습을 지켜보았습니다. 오늘과 어제의 $bpm_hog_title_default_contextless$ 사이의 차이는 [SCOPE.sCharacter('acting_hog_scope').GetSheHe]가 상상했던 것보다 훨씬 더 극명했습니다. [SCOPE.sCharacter('hog_scope').GetSheHe|U]는 이전보다 더 당당하게 서 있었고, 얼굴에는 숙련된 결의가 서려 있었습니다. [SCOPE.sCharacter('hog_scope').GetHerHis] 어깨 위에 놓인 예복은 마치 무게가 없는 듯 보였습니다.\n\n사제가 물러나자 팡파르가 울려 퍼졌고, 궁궐 밖에서는 대포 소리가 천둥처럼 울렸습니다.\n\n\"내가 여기서 약속한 것들을 수행하고 지키겠노라\" $bpm_hog_title_default_contextless$가 낭독했습니다. \"[SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')]이시여, 저를 도우소서.\"" # 14885693580743355121
  hog_regency.3.a: "$bpm_hog_title_default_contextless$ 폐하 만세!" # 17379284527436162716
