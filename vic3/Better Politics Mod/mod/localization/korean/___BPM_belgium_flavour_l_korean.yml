  ideology_dop_doctrinaire_democrat: "교조적 민주주의자" # 7036643265074576337
  ideology_dop_doctrinaire_democrat_desc: "#lore 이 집단은 깊은 민주적 온건주의 원칙을 신봉하며, 국가가 원활히 운영되도록 가장 뛰어난 시민들만이 투표권을 행사해야 한다고 주장합니다.#!" # 8606809946363655420
  ig_democrats_belgium: "민주주의자" # 8903635366652329608
