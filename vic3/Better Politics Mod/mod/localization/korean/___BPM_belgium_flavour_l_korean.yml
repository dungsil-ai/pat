  ideology_leader_anti_clericalist_desc: "#lore 이 지도자는 성직자 권위와 반대파의 영향력을 약화하고 파괴하고자 합니다.#!" # 653401063801051328
  ideology_leader_left_unionist: "좌파 연합주의자" # 15103756114794995186
  ideology_leader_left_unionist_desc: "#lore 이 지도자는 벨기에 국가를 저명한 세속주의적이고 분권주의적인 성격으로 통합하고자 합니다.#!" # 3738860918149508347
