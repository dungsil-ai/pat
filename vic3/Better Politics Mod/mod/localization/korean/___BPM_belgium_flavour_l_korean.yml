  has_passed_provincial_and_municipal_laws_tt: "국가 행정을 조직하는 #bold #blue 지방 자치#!#! 및 #bold #blue 지방 행정#!#! [Concept('concept_law', '법률')]을 통과시켰습니다. (#L #bold [GetLawType('law_federated').GetName] 또는 [GetLawType('law_devolved').GetName]을 제정했습니다.#!#!)" # 18188950705688937105
  has_passed_the_education_act_tt: "교육 체계를 수립하는 #bold #blue 초등 교육 기본법#!#!을 통과시켰습니다. (#L #bold [GetLawType('law_religious_schools').GetName] 또는 [GetLawType('law_public_schools').GetName]을 제정했습니다.#!#!)" # 11681154177685019198
  has_passed_the_law_on_jury_organization_tt: "사법 체계의 일부로서 배심원제를 성문화하고 조직하는 #bold #Blue 배심원 조직법#!#!을 통과시켰습니다. (#L #itaic [GetInstitutionType('institution_police').GetName]의 [concept_investment_level]이 3 이상입니다.#!#!)" # 3114544775179687619
  has_organized_the_army_tt: "[concept_army]를 재조직 및 성문화하고 정식 [Concept('concept_general', '참모부')]를 창설하는 #bold #blue 군 조직법#!#!을 통과시켰습니다. (#L #bold [GetLawType('law_professional_officers').GetName]을 제정했습니다.#!#!)" # 6311109583513623050
  has_reformed_the_electoral_law_tt: "유권자층을 실질적으로 변화시키는 #blue #bold 선거세#!#! [Concept('concept_law', '법률')] #blue #bold 개혁#!#!을 통과시켰습니다. (#L #bold [GetLawType('law_census_voting').GetName]을 제정했거나, #bold 교조적 선거세#! [concept_amendment]를 시행했거나, #bold 1831년 선거법#!#! [concept_amendment]을 폐지했습니다.#!#!)" # 16018373900557797391
  has_has_established_a_military_school_tt: "왕립 육군 사관학교를 군사 대학으로 조직하는 #bold #blue 육군 사관학교 조직 기본법#!#!을 통과시켰습니다. (#L #bold [GetLawType('law_repeatable_military_military_reform').GetName] [concept_bpm_repeatable_law]을 통과시켰습니다.#!#!)" # 16358059897732979255
