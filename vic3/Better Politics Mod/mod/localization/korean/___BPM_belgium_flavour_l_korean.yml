  bpm_amendment_1831_electoral_law: "1831년 선거법" # 18413180347443107089
  bpm_amendment_1831_electoral_law_desc: "1831년 선거법은 가톨릭 성향의 농촌 지역을 크게 우대하여, 다양한 도시 지역의 35~80플로린과 비교해 헌법상 최소 기준인 20플로린만을 요구합니다." # 9796318336911508752
  bpm_amendment_doctrinairean_1848_35_florins: "35플로린 선거권" # 17531644417109887617
  bpm_amendment_doctrinairean_1848_35_florins_desc: "선거법이 개정되어 국가 전체의 선거세 최소 기준이 35플로린으로 설정되었습니다." # 17067631780971305988
  bpm_amendment_doctrinairean_1848_50_florins: "선거법이 개정되어 국가 전체의 선거세 최소 기준이 50플로린으로 설정되었습니다." # 1574707232701615170
  bpm_amendment_doctrinairean_1848_60_florins: "60플로린 선거권" # 1463502867128058445
  bpm_amendment_doctrinairean_1848_60_florins_desc: "선거법이 개정되어 국가 전체의 선거세 최소 기준이 60플로린으로 설정되었습니다." # 12737603066222682958
  bpm_amendment_king_appointed_burgomasters: "국왕이 임명하는 시장" # 2056096036226100825
  bpm_amendment_king_appointed_burgomasters_desc: "선거인 중에서 시장을 임명할 수 있는 권한을 부여받은 국왕은 이 특권을 사용하여 자신의 측근들에게 권력을 실어주기 시작했습니다." # 16076957492838219964
