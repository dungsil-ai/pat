  bpm_consolidation_of_the_state_desc: "벨기에 국가 통합 진행도" # 10569796197594662854
  bpm_belgian_law_events.1.t: "지방 자치 및 지방 행정 법률" # 1253585408956750354
  bpm_belgian_law_events.1.federated: "#yellow 지방 자치체#!를 조직하는 법률이 #gold 1834년#!부터 논의와 수탁 과정을 거쳐 [ROOT.GetCountry.GetAdjective] 의회를 통과했습니다. 한 달 후, #yellow 지방#!을 조직하는 법률이 통과되었습니다.\n\n이 법률들은 지방 자치체에 광범위한 권한을 부여하여 지방세, 민병대, 경찰을 관리하고 학교, 교회, 단체에 대한 보조금을 지급할 수 있도록 했습니다.\n\n또한 #yellow 시장#!과 #yellow 시의원#!은 국왕이 지방 의회 의원 중에서만 임명하도록 규정되었습니다." # 5694561855271337349
  bpm_belgian_law_events.1.devolved: "#yellow 지방 자치체#!를 조직하는 법률이 #gold 1834년#!부터 논의를 거쳐 [ROOT.GetCountry.GetAdjective] 의회를 통과했습니다. 한 달 후, #yellow 지방#!을 조직하는 법률이 통과되었습니다.\n\n이 법률들은 지방 자치체에 광범위한 권한을 부여하여 지방세, 민병대, 경찰을 관리하고 학교, 교회, 단체에 대한 보조금을 지급할 수 있도록 했습니다.\n\n수많은 회기와 토론 끝에, 총리는 선거구 분할에 관한 수정안을 대가로 #gold 국왕#!에게 지방 의회 외부에서 #yellow 시장#!과 #yellow 시의원#!을 임명할 권한을 부여하는 수정안을 통과시키도록 많은 [GetInterestGroupVariant('ig_conservatives',GetPlayer).GetNameWithCountryVariant]를 설득했습니다. 이 수정안은 인구 12,000명 이상의 지방 자치체에 대한 선거구를 분할하여, 지방 의회에서 상당수의 자유주의자 대표들을 축출하는 결과를 낳았습니다." # 7479920158043683286
  bpm_consolidation_of_the_state_name: "벨기에 국가 통합" # 4038505070325314663
  bpm_belgian_law_events.1.f: "정부는 시장의 협력과 지원, 질서에 대한 헌신, 그리고 중요한 임무를 수행하는 데 있어서의 열의를 기대할 권리가 있습니다. 설령 시장이 정부에 직접적으로 반대하지 않더라도, 이 공무원의 단순한 타성만으로도 상급 기관의 조치를 방해하고 공공 질서를 어지럽힐 수 있습니다. 정부가 신뢰할 수 없는 사람을 어려운 상황에서 기용해야 한다고 기대할 수 있겠습니까?\n\n— 앙투안 에른스트, 1834년 7월 24일" # 7375927396419488893
  bpm_belgian_law_events.1.a: "드디어, 너무 오래 걸렸군!" # 3645909186667834325
  bpm_organizing_municipalities: "지방 자치 및 도 법률 시행" # 14849833867754667098
  bpm_codifying_elected_bureaucrats: "[GetLawType('law_elected_bureaucrats').GetName]의 [concept_bpm_codification]이(가) [concept_bpm_legal_level](으)로 설정되었습니다" # 7585474772791126242
  bpm_codifying_professional_army: "[GetLawType('law_professional_army').GetName]의 [concept_bpm_codification]이(가) [concept_bpm_legal_level](으)로 설정되었습니다" # 16176442218045950468
  bpm_funding_and_organizing_primary_schooling: "학교 교육의 설립 및 조직 자금 지원" # 7757822411218815655
  bpm_belgian_law_events.2.t: "초등 교육에 관한 기본법" # 18085619978279638019
  bpm_belgian_law_events.2.religious: "#gold 1834년#! 이래 수년간의 토론 끝에, #yellow 공립 초등 교육#!을 조직하고 확립하는 기본법이 방금 의회를 통과했습니다.\n\n이 법은 사립 학교가 이미 존재하지 않는 한, 모든 사람이 접근할 수 있는 초등학교를 각 지방 자치 단체에 최소 하나 이상 설립하도록 규정합니다. 교육 과정에는 읽기, 쓰기, 산수, 도량형, 현지어, 그리고 종교와 도덕이 포함됩니다.\n\n또한 이 법은 성직자가 운영하는 사립 학교에 대한 보조금을 제공하고 교회에 다양한 양보와 지원을 제공합니다." # 7107029498452834602
  bpm_belgian_law_events.2.public: "#gold 1834년#! 이래 수년간의 토론 끝에, #yellow 공립 초등 교육#!을 조직하고 확립하는 기본법이 방금 의회를 통과했습니다.\n\n이 법은 사립 학교가 이미 존재하지 않는 한, 모든 사람이 접근할 수 있는 초등학교를 각 지방 자치 단체에 최소 하나 이상 설립하도록 규정합니다. 교육 과정에는 읽기, 쓰기, 산수, 도량형, 현지어, 그리고 종교와 도덕이 포함됩니다.\n\n또한 이 법은 사립 학교에 대한 보조금을 제공하고 #yellow 지방 의회#!가 @academics! 교사를 임명할 수 있도록 하는 조항을 포함합니다." # 4564324023932394521
  bpm_belgian_law_events.2.f: "당신은 민중의 학교에서 종교의 영향력을 원하며, 그 중요성을 느끼고 있습니다. 하지만 당신의 바람은 아마 거기서 멈추지 않을 것입니다. 당신은 또한 민중의 가정과 가구 내에서도 종교의 영향력을 원합니다. 그렇다면 당신은 성직자에게 가정에 대한 지배권, 즉 가구에 대한 절대적인 권력을 부여하고 싶다는 의미입니까?\n\n— 폴 드보, 1842년 8월 9일" # 1757345240156099404
  bpm_belgian_law_events.2.a: "이 시대에 공교육을 확립하는 것이 이렇게 골치 아픈 일일 줄이야..." # 15310824010303370580
  bpm_belgian_law_events.3.t: "군대 조직법" # 10654444765962158550
  bpm_belgian_law_events.3.d: "우리의 #yellow 군대#!를 재조직하고 개혁하는 새로운 법안이 최근 의회를 통과했습니다.\n\n이 법은 전체 [Concept('concept_army', '군대')]를 재편하여 평시에 80,000명의 병력을 현역 및 예비군으로 확보합니다. 또한 각 부대의 구성과 조직 방식을 세부 사항까지 포함하여 전문화하고, 전문 참모진, 장교단 및 행정 서비스를 조직합니다." # 2293892153043858578
  bpm_belgian_law_events.3.f: "거의 모든 벨기에 지도자들은 무능하고 역량이 부족합니다. 자존심만 강한 새로운 국민들의 저항을 극복한 것은 위대한 승리입니다.\n\n— 오귀스탱-다니엘 벨리아르, 1831년" # 3234573936468281730
  bpm_belgian_law_events.3.a: "작은 국가의 위대한 승리!" # 739433509649682057
  ideology_leader_ultramontane: "울트라몽탄주의자" # 13348848126188004585
  ideology_leader_ultramontane_desc: "#lore 이 지도자는 깊고 자랑스러운 울트라몽탄주의자이며, 교황과 가톨릭에 대한 깊은 충성심을 바탕으로 공공 도덕의 보루로서 교회의 권한을 강화하고자 합니다.#!" # 5469694726426732570
  ideology_leader_unorthodox_unionist: "비정통 연합주의자" # 1321279943340370654
  ideology_leader_unorthodox_unionist_desc: "#lore 이 지도자는 연합주의 전통을 이어가면서도, 이해관계가 있는 이들과는 의견을 크게 달리합니다.#!" # 4589983129216431245
  bpm_belgian_nationbuilding_romanticism: "벨기에 국가 건설 낭만주의" # 12266685661984710352
  bpm_belgian_law_events.4.t: "배심원 조직법" # 16118700820204098885
  bpm_belgian_law_events.4.d: "의회에서 #yellow 배심원단#! 조직과 #yellow 형사 교정#! 개혁에 관한 새로운 법안이 통과되었습니다.\n\n배심원은 일정 수준의 [Concept('concept_taxes', '세금')]을 납부하는 벨기에 시민이거나, 시장, 시의원, 법학 박사, 공증인 등 특정 범주에 속하는 사람이어야 합니다.\n\n또한 이 법안은 배심원 재판의 본질을 훼손하는 범죄 교정 메커니즘을 도입합니다. 이는 검찰과 수사 법원이 정상 참작 사유나 정당화 사유를 인정하여 사건을 형사 재판소로 이송하는 방식으로 이루어집니다." # 3302887820949457657
  bpm_belgian_law_events.4.f: "#italic 배심원 제도는 모든 형사 사건과 정치 및 언론 관련 범죄에 대해 확립된다.#!\n\n— 1831년 2월 7일 벨기에 헌법 제98조" # 10048933898835626318
  bpm_belgian_law_events.4.a: "시민들 또한 법의 일부가 되어야 합니다." # 16809312477755717009
  bpm_grandeous_army_reorganization: "거대 군대 재편" # 4622884118771020637
  bpm_belgian_law_events.5.t: "육군사관학교 조직에 관한 유기적 법률" # 8332694717817478240
  bpm_belgian_law_events.5.d: "#gold 왕립 사관학교#!를 재편하고 그 목적과 조직을 규정하는 법안이 방금 의회를 성공적으로 통과했습니다.\n\n이 법안은 #gold 사관학교#!를 '#bold 정통 군사 대학#!'으로 정의하고, 내부 조직을 확립하며, 군인을 위한 교육 과정을 통해 적절한 교육을 보장하고, 다양한 임무와 권한을 [concept_government]로 이관합니다." # 2622950940815213379
  bpm_belgian_law_events.5.f: "교육은 규율과 명예심을 고취한다고들 한다. 이보다 더 진실한 말은 없으며, 우리의 견해로 볼 때 교육은 군 경력의 초기에만 필요할 뿐이다.\n\n— 프랑수아 조제프 리뱅, ‘#italic 벨기에의 군사 교육 및 훈련 기관#!’에서, 1872년" # 912269348718369492
  bpm_belgian_law_events.5.a: "매우 필요한 개혁입니다." # 12417923506111663562
  bpm_the_royal_military_academy: "학생 병사들의 적극적인 증원" # 13521051989708469585
  liberal_party_congress_happened_tooltip: "#gold 자유주의 의회#!가 소집되어 #yellow 자유당#!이 창당되었습니다." # 5813260747455252845
  bpm_weakened_impetum: "약화된 임페툼" # 13706732014814530278
  bpm_belgian_law_events.6.t: "선거 자격 요건을 확립된 최소치로 고정" # 7627495769336107397
  bpm_belgian_law_events.6.d: "최근 #yellow 하원#!에 선거 자격 개혁 법안이 상정되었습니다.\n\n5일 후, 해당 법안은 만장일치로 통과되었고, 일주일 뒤 #yellow 상원#!의 투표를 거쳐 시행되었습니다.\n\n이번 개혁으로 이전과 달리 농촌과 도시 지역의 구분 없이 전국적으로 선거세를 #gold 20 플로린#!으로 평준화하였으며, 이는 헌법상 최저 기준에 따라 확정되었습니다." # 14706571458264695855
  bpm_belgian_law_events.6.f: "이 법적 거짓의 결과가 무엇이었습니까? 그것은 지금까지 여러분이 오직 허울뿐인 대의 정부, 왜곡된 국민 대표를 가져왔음을 의미했습니다. 그것은 여러분이 남용과 특권, 그리고 불의의 정부를 가져왔음을 의미했습니다. 그것은 국가의 이익이 이 의회에서 단 한 번도 제대로 대변된 적이 없으며, 우리의 의회 역사가 우리의 혁명적 성과에 맞선 끊임없는 투쟁의 기록임을 의미했습니다.\n\n— 아델송 카스티오, 1848년 3월 3일" # 14385802780363679894
  bpm_belgian_law_events.6.a: "벨기에는 폭풍을 견뎌낼 것입니다!" # 11399883418346664022
  je_bpm_push_for_electoral_tax_equal_desc: "유럽은 요동치고 있으며, 혁명적이고 전복적인 목소리가 구대륙의 더 깊은 곳까지 닿고 있습니다. 이러한 목소리는 이곳에서도 점점 커지며 현 체제를 전복하려 하고 있습니다.\n\n이러한 움직임의 기세를 꺾기 위해서는 개혁이 필요합니다. [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant]가 도입한 자유주의 의회 강령의 제안은 전국적인 선거세를 헌법상 최소치(20플로린)로 낮추는 내용을 담고 있으며, 이는 혁명가들에 맞설 훌륭한 무기가 될 수 있을 것입니다.\n\n비록 많은 의원이 마음속으로는 이를 반대하고 있으나, 현 상황을 고려한다면 그들도 찬성표를 던지도록 설득할 수 있을 것입니다." # 10190337009883158688
  je_bpm_push_for_doctrinairean_desc: "가톨릭의 지배와, 많은 벨기에인이 자유를 위해 싸웠던 9월 혁명의 원칙과 이상을 배신할 위협이 매우 큽니다.\n\n우리는 이미 [GetInterestGroupVariant('ig_conservatives',GetPlayer).GetNameWithCountryVariant]와 자유주의 및 자유의 배신자들이 자신들의 구조와 영향력을 공고히 하기 위해 저지른 악명 높은 '반동적' 개혁과 그 도입 시도를 목격했습니다.\n\n이들에게 투표권을 허용하는 행위는 선거세를 인상하고 전국적으로 평준화하여, 도시 거주자들에게 농촌 지역 거주자들과 동등한 기회를 부여함으로써 반드시 저지해야 합니다." # 17729744165689814934
  je_bpm_push_for_electoral_tax_equal_name: "선거세 균등화" # 13367869834865464847
  je_bpm_push_for_doctrinairean_name: "교조주의적 조세 시행" # 14396962702636050757
  you_will_be_able_to_choose_the_minimum_tt: "@information! #brightyellow 교조주의자#! 중 누구도 선거세 인상액에 합의하지 못했으므로, #L #bold 선택#!#!할 수 있는 선택지 중 하나를 고를 수 있습니다." # 6593783598155275910
  bpm_law_effect_tt_repeatable_different_union_of_opposotions: "@information! #bold $je_bpm_unions_des_oppositions$#! [concept_journal_entry]가 활성화된 동안에는 #blue 다음 효과들이 다르게 적용됩니다.#!" # 3885723610244100519
  doctrinairean_igs_have_more_clout_than_right_unionists: "#brightyellow 교조주의자#! [Concept('concept_interest_group', '이익 집단')]가 #blue 우익 연합주의자#! [Concept('concept_interest_group', '이익 집단')]보다 더 많은 [concept_clout]를 보유하고 있습니다 (현재 [GetPlayer.MakeScope.ScriptValue('bpm_doctrinaire_igs_group_clout')|%] #v 대#! [GetPlayer.MakeScope.ScriptValue('bpm_right_unionist_interest_groups_clout')|%])" # 11762911522351149500
  bpm_belgian_law_events.7.t: "선거 자격 강화" # 11998209568381306116
  bpm_belgian_law_events.7.d: "선거 자격을 개혁하는 법안이 최근 #yellow 하원#!에 상정되었습니다.\n\n이 법안은 선거세를 #red 인상#!하여 전국적으로 동일하게 적용하려는 목적을 가지고 있어 많은 논란을 낳고 있습니다. 이는 많은 농촌 거주자의 투표권을 박탈하고 도시의 하층 중산층을 선거권 기준 밖으로 밀어낼 것입니다.\n\n최소 인상액에 관해 끊임없는 수정안과 제안이 오가고 있으며, 각 제안은 #brightyellow 교조주의자#!들에게 어느 정도 매력적으로 다가오고 있습니다." # 14081677705193121826
  information_this_is_a_radical_reform: "@information! 이 개혁은 인기가 없으며, 온건하지 않은 #brightyellow 교조주의자#!들 사이에서도 의구심을 사고 있습니다!" # 9640794052757145674
  warning_this_is_a_radical_reform: "@warning! 이 개혁은 매우 인기가 없으며, 가장 보수적인 #brightyellow 교조주의자#!들 사이에서도 그 유용성에 의문이 제기되고 있습니다!" # 3005287077136103072
  bpm_belgian_law_events.7.a: "최소 35플로린이면 품위를 유지할 수 있을 것이다." # 13106086194068214293
  bpm_belgian_law_events.7.b: "50플로린이면 확실히 돼지 같은 무리들을 정치에서 배제할 수 있을 것이다." # 11588961153684350789
  bpm_belgian_law_events.7.c: "최소 60플로린은 가혹하겠지만, 필요한 조치다." # 5769405420044741448
  ideology_leader_liberal_paternalistic: "자유주의적 온정주의" # 8544850396189627540
  ideology_leader_liberal_paternalistic_desc: "#lore 이 지도자는 자유주의자이자 온정주의자로, 자유주의의 원칙을 지키면서 국가 개입을 통해 평등한 기회를 보장하고자 한다.#!" # 14237234350781832459
  bpm_je_green_progress_complete: "#bold #green 진행률#!#!이 #variable 100%#!에 도달했습니다." # 10435388759879114919
  bpm_belgian_law_amendments.1.t: "지방 자치법 개정" # 13339196080954868791
  bpm_belgian_law_amendments.1.amendment_into_federated: "[GetInterestGroupVariant('ig_conservatives',GetPlayer).GetNameWithCountryVariant]가 도입하여 #gold 국왕#!에게 선거인 중에서 #yellow 시장#!을 임명할 권한을 부여하고 선거구 분할을 도입했던 특권들이 폐지되었습니다.\n\n소위 '반동법'이라 불리는 이 법들의 폐지는 모든 자유주의자에게 반동에 대한 자유와 진보의 승리로 여겨집니다." # 13292914910185993594
  bpm_belgian_law_amendments.1.amendment_into_devolved: "#yellow 지방 자치법#!과 관련하여 의회에서 몇 가지 변경 사항이 통과되었습니다. 이 법은 국왕에게 시 의회 외부의 선거인 중에서 시장을 임명할 권리를 부여합니다.\n\n이 개정안은 의회 통과에 난항을 겪었기에, 총리는 [GetInterestGroupVariant('ig_conservatives',GetPlayer).GetNameWithCountryVariant]를 설득하여 선거구 분할에 관한 또 다른 개정안을 도입하는 조건으로 찬성표를 얻어냈습니다.\n\n이 법은 인구 12,000명 이상의 지방 자치 단체를 더 작은 선거구로 분할하며, 이는 지방 자치 단체에서 상당수의 자유주의자 대표를 박탈하는 결과를 낳습니다.\n\n모든 분파의 자유주의자들이 이 '반동법'을 비판하고 항의하고 있습니다." # 841691938505962414
  bpm_belgian_law_amendments.1.f: "다른 곳에서도 같은 시기에 가톨릭교도들은 지방 분권 그 자체에도 위험이 있다는 것을 깨달았다. (...) 몇몇 도시는 자신들의 자치권을 울트라몽타니즘(교황 지상주의) 정서에 맞서는 방패로 사용했다. 어떤 곳에서는 기독교 학교에 대한 보조금을 거부하는 형태로, 어떤 곳에서는 예수회 기관 설립을 방해하는 형태로, 또 다른 곳에서는 온갖 방식으로 주립 대학을 장려하는 형태로 나타났다.\n\n— 귀스타브 달로, #italic 1830년 이후의 벨기에와 가톨릭당#!, 1845년" # 7345268857972609445
  bpm_belgian_law_amendments.1.a: "사소한 법률을 두고 이토록 거센 폭풍이라니..." # 679206314978072037
  Brabant: "브라반트" # 2075136386825357310
  bpm_belgian_law_amendments.2.t: "초등 교육에 관한 유기적 법률 개정" # 11865635474884842740
  bpm_belgian_law_amendments.2.amendment_into_public: "[concept_government]에 의해 #yellow 초등교육 유기법#!에 약간의 변화가 도입되었습니다. 이는 [GetInterestGroupVariant('ig_conservatives',GetPlayer).GetNameWithCountryVariant]의 성직자법에 대한 몇 가지 개정안을 통과시키는 데 성공했습니다.\n\n이 개정안들은 성직자의 권한을 상당히 약화시키고, 지방 자치 단체에 교사 임명권을 부여하는 위원회를 도입하며, 학교 조직을 변경합니다. 많은 반성직자주의자들이 완전한 세속화를 원했음에도 불구하고, 통합 과정에서 국가가 약화될 것을 우려하여 그들의 요구가 완전히 충족되지는 못했습니다." # 4077190296464384351
  bpm_belgian_law_amendments.2.amendment_into_religious: "초등교육 유기법의 타협안에 완전히 만족하지 못한 [GetInterestGroupVariant('ig_conservatives',GetPlayer).GetNameWithCountryVariant]은 지방 자치 단체에서의 성직자들의 공세 이후 법에 대한 여러 개정안을 통과시켰습니다.\n\n이 개정안들은 성직자들에게 국가 보조금을 독점적으로 지급하는 것을 포함하여 많은 양보를 제공하고, 교육 분야에서의 지방 자치 단체의 권한을 제한합니다.\n\n새로운 법에 반대하는 이들은 적극적으로 시위를 벌이고 있으며, 이미 이 법을 '종교적 반동'이라 부르며 반격을 시작했습니다." # 9700226295183171302
  bpm_belgian_law_amendments.2.f: "경쟁이 시작되었을 때 제가 국가 보조금을 받는 모든 기관에 회람을 보냈는데, 시메의 지방 행정 당국은 제게 주교 권한이 해당 대학을 관할하고 있으며, 경쟁을 통한 정부의 시설 검사를 반대한다고 통보했습니다. 그제야 저는 해당 대학이 주교에게 넘어갔다는 사실을 알게 되었습니다. 저는 지방 행정 당국에 검사를 거부할 경우 모든 보조금을 철회하겠다고 통보했습니다.\n\n— 샤를 로지에가 #L 총리#! 실뱅 반 드 웨이어에게, 1846년 1월 16일" # 12144724480867777187
  bpm_belgian_law_amendments.2.a: "이게 언제 끝날까?" # 3764178530608348347
  this_decentralization_not_considered_tt: "이 정도 수준의 지방 분권은 그 어떤 대표자도 고려하지 #bold #red 않습니다#!. (#italic #bold $je_bpm_unions_des_oppositions$#! [concept_journal_entry] 활성화됨#!)" # 7629584779962231395
  this_centralization_not_considered_tt: "이 정도 수준의 중앙 집권은 그 어떤 대표자도 고려하지 #bold #red 않습니다#!. (#italic #bold $je_bpm_unions_des_oppositions$#! [concept_journal_entry] 활성화됨#!)" # 2997875201216088863
  je_bpm_none_in_government: "#L 비어 있음#!" # 5071956173887271028
  je_bpm_belgium_government_homogenous_liberal: "[Concept('concept_bpm_belgium_homogenous', '동질적')] #bold #tooltippable;tooltip:[Country.GetTooltipTag],je_bpm_left_unionists_description_tooltip #yellow 자유주의자#!/#yellow 좌파 연합주의자#!#!#!" # 8897166063126586580
  je_bpm_belgium_government_homogenous_catholic: "[Concept('concept_bpm_belgium_homogenous', '동질적')] #bold #tooltippable;tooltip:[Country.GetTooltipTag],je_bpm_right_unionists_description_tooltip #blue 가톨릭교도#!/#blue 우파 연합주의자#!#!#!" # 13995152510075085110
  je_bpm_belgium_government_unionist_left: "[Concept('concept_bpm_belgium_dominant', '지배적')] #bold #tooltippable;tooltip:[Country.GetTooltipTag],je_bpm_left_unionists_description_tooltip #yellow 자유주의자#!/#yellow 좌파 연합주의자#!#!#!" # 8160467338787457788
  je_bpm_belgium_government_unionist_right: "[Concept('concept_bpm_belgium_dominant', '지배적')] #bold #tooltippable;tooltip:[Country.GetTooltipTag],je_bpm_right_unionists_description_tooltip #blue 가톨릭교도#!/#blue 우파 연합주의자#!#!#!" # 8543155510660805294
  je_bpm_belgium_government_unionist_mixed: "[Concept('concept_bpm_belgium_mixed', 'Mixed')]" # 4114386159791267696
  concept_bpm_belgium_dominant: "지배적 정부" # 7097848736831753769
  concept_bpm_belgium_dominant_desc: "일방적으로 지배적인 [concept_government]란 #yellow 자유주의자#!/#yellow 좌파 연합주의자#!이든 #blue 가톨릭교도#!/#blue 우파 연합주의자#!이든, 한쪽이 다른 쪽보다 훨씬 더 많은 [Concept('concept_bpm_minister', '장관')]을 보유하고 있으면서도, 정부가 단일 그룹으로만 구성되지는 않은 상태를 말합니다.\n\n이러한 정부는 양측 모두로부터 냉소와 적대감을 마주할 수 있는데, 한쪽은 충분한 승리를 거두지 못하고 다른 쪽은 지나치게 불리한 입장에 처하기 때문입니다." # 7205301597897410142
  concept_bpm_belgium_homogenous: "동질적 정부" # 1089703118395775851
  concept_bpm_belgium_homogenous_desc: "동질적인 [concept_government]란 모든 [Concept('concept_bpm_minister', '장관')]이 #yellow 자유주의자#!/#yellow 좌파 연합주의자#!이든 #blue 가톨릭교도#!/#blue 우파 연합주의자#!이든 상관없이 한쪽 측에 속해 있는 정부를 말합니다.\n\n그러나 이러한 정부는 [Concept('concept_law', '법')]과 정책을 수립하는 데 문제를 겪을 수 있습니다.\n\n이는 한쪽만을 대표하는 정부가 비록 사소하고 진심으로 우호적인 변화라 할지라도, 다른 쪽의 이익이나 사상을 해치는 변화를 도입하려 할 가능성이 높기 때문입니다. 만약 이러한 정부가 극복할 수 없는 장벽에 부딪히면, 사임할 수밖에 없게 됩니다." # 1475135692848772650
  concept_bpm_belgium_mixed: "혼합 정부" # 2117939333993509693
  concept_bpm_belgium_mixed_desc: "혼합 [concept_government]란 #yellow 자유주의자#!/#yellow 좌파 연합주의자#!와 #blue 가톨릭교도#!/#blue 우파 연합주의자#! 간의 [Concept('concept_bpm_minister', '장관')] 수 측면에서 현상 유지가 이루어지는 정부를 말합니다.\n\n이러한 정부는 한쪽으로 약간 치우칠 수 있지만, 이쪽이 상당한 우위를 점하기 시작하면 내각은 일방적으로 [Concept('concept_bpm_belgium_dominant', '지배적')]이라 불리게 됩니다.\n\n이러한 내각은 양측의 격차가 타협 정책을 더 이상 유지할 수 없을 정도로 커지지 않는 한, [Concept('concept_law', '입법')] 및 행동 측면에서 거의 문제를 겪지 않습니다." # 887014091461423645
  je_bpm_unions_des_oppositions: "반대파 연합(Unions des Oppositions)" # 16860378463096308882
  je_bpm_unions_des_oppositions_reason: "1828년, #yellow 자유주의#!와 #blue 가톨릭주의#!라는 두 가지 상반된 세력이 '연합 야당(Unions des Oppositions)'이라는 이름으로 힘을 합쳐 1830년 벨기에를 네덜란드의 지배로부터 해방했습니다. 1831년, 우리의 헌법이 제정되었고 그 순간부터 연합주의자들은 국가를 처음부터 건설하는 데 매진했습니다. 그러나 벨기에는 아직 완성과는 거리가 멉니다. 행정, 선거, 교육, 군대, 재정은 존재하지 않거나 불완전하기 때문에 많은 주의가 필요하며, 이를 조직하는 데는 시간이 걸릴 것입니다.\n\n현재 #bold #tooltippable;tooltip:[Country.GetTooltipTag],je_bpm_right_unionists_description_tooltip #blue 가톨릭주의자#!/#blue 우파 연합주의자#!#!#! 장관 수: [GetPlayer.MakeScope.ScriptValue('bpm_right_unionist_ig_government')|0]\n현재 #bold #tooltippable;tooltip:[Country.GetTooltipTag],je_bpm_left_unionists_description_tooltip #yellow 자유주의자#!/#yellow 좌파 연합주의자#!#!#! 장관 수: [GetPlayer.MakeScope.ScriptValue('bpm_left_unionist_ig_government')|0]\n[concept_government] 구성의 현재 상태: [SCOPE.GetRootScope.GetCountry.GetCustom('je_bpm_belgium_current_government_type')]\n\n[ROOT.GetCountry.GetName] [Concept('concept_country', '국가')]를 공고히 하기 위해서는 많은 #bold #blue 기본법#!#!을 도입해야 합니다. 이 법들의 개념, 초안, 세부 사항은 #yellow 좌파#!와 #blue 우파#! #gold 연합주의자#!들 사이에서 큰 논쟁과 다툼을 불러일으킵니다. 국가 통합 속도, 제정된 법률, 시행된 개혁에 따라 #yellow #bold 자유주의자#!/#yellow #bold 좌파 연합주의자#!#!의 @warning! #red #bold 불만#!#!도 커질 것이며, 이는 언젠가 전체 #v 연합 야당#!의 붕괴로 이어질 것입니다.\n\n#lore 우리 동료 시민들은 우리에게 완전한 사회적 권한을 부여했습니다. 그들은 우리에게 제헌 권력을 위임했고, 벨기에 국적의 토대를 마련할 책임을 맡겼습니다. 요컨대, 그들은 9월 혁명 전체를 우리에게 맡긴 것입니다.\n\n— 장 바티스트 노통브, 1831#!" # 22277109555436310
  je_bpm_doctrinaires_description_tooltip: "교조적 자유주의자 작업 중" # 5399302632947991594
  je_bpm_catholics_description_tooltip: "" # 17241709254077376921
  je_bpm_left_unionists_description_tooltip: "#yellow #bold 자유주의자#!#!는 전반적으로 몇몇 [Concept('concept_interest_group', '이익 집단')]으로 구성되어 있으며, 그 구성은 다음과 같습니다:\n  #v -#! [GetInterestGroupVariant('ig_liberals',GetPlayer).GetNameWithCountryVariant];\n  #v -#! [GetInterestGroupVariant('ig_national_liberals',GetPlayer).GetNameWithCountryVariant];\n  #v -#! [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant];\n  #v -#! [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant];\n  #v -#! [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant];\n\n또한 다음이 합류할 수 있습니다:\n  #v -#! [GetInterestGroupVariant('ig_reactionaries',GetPlayer).GetNameWithCountryVariant] (#italic 피에르-테오도르 베르하겐이 생존해 있을 경우#!)\n\n#v 연합 야당(Unions des Oppositions)#v의 일원으로서, 이들은 정책과 법률이 강력한 자유주의적 성격을 유지하도록 보장하는 동시에 정치적 스펙트럼의 양측이 동의할 수 있는 온건한 개혁을 도입하고자 합니다.\n\n#lore 주로 좌파 연합주의자로 구성된 벨기에 자유주의자들은 하원을 중심으로 의회에 많은 대표를 두고 있으며, 깊은 자유주의 원칙을 고수하는 광범위한 집단입니다. 이들은 연합, 국가 개입, 중앙집권화 및 지방 자치권에 대한 입장부터 종교와 군대에 대한 접근 방식에 이르기까지 거의 모든 문제에서 의견이 갈립니다.\n\n예를 들어, @ig_liberals! #yellow 교조주의자#!들은 보호무역주의와 개입주의를 선호하는 반면, @ig_national_liberals! #light_green 보수적 연합주의자#!들은 무역과 기업의 자유를 보장하고자 합니다. @intelligentsia! #brightyellow 지방 자유주의자#!들은 #blue 가톨릭교도#!와의 어떠한 협력도 불신하며, 나머지는 정치적 우파에 대해 상대적으로 화해적인 태도를 취합니다.#!" # 14334745884095235927
  je_bpm_right_unionists_description_tooltip: "#yellow #bold 가톨릭교도#!#!는 전반적으로 몇몇 [Concept('concept_interest_group', '이익 집단')]으로 구성되어 있으며, 그 구성은 다음과 같습니다:\n  #v -#! [GetInterestGroupVariant('ig_conservatives',GetPlayer).GetNameWithCountryVariant];\n  #v -#! [GetInterestGroupVariant('ig_market_liberals',GetPlayer).GetNameWithCountryVariant];\n  #v -#! [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetNameWithCountryVariant];\n  #v -#! [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant];\n  #v -#! [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant];\n\n또한 여기에는 그 어떤 진영에도 속하지 않는( #red #L 속하지 않음#!#! ) 풀뿌리 [Concept('concept_interest_group', '이익 집단')]가 포함됩니다:\n  #v -#! [GetInterestGroupVariant('ig_christian_democrats',GetPlayer).GetNameWithCountryVariant];\n  #v -#! [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant];\n  #v -#! [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetNameWithCountryVariant];\n\n#v 연합 야당(Unions des Oppositions)#v의 일원으로서, 이들은 정책과 법률이 자신들의 이익을 공고히 하고 종교적 도덕성을 보장하도록 하는 한편, 정치적 스펙트럼의 양측이 동의할 수 있는 온건한 개혁을 도입하고자 합니다.\n\n#lore 주로 우파 연합주의자로 구성된 벨기에 가톨릭교도들은 하원과 상원을 중심으로 의회에 많은 대표를 두고 있으며, 친국왕적이고 성직자 중심적인 자유주의 원칙을 고수하는 광범위한 집단입니다.\n\n이들은 여러 면에서 분열되어 있습니다. @ig_conservatives! #blue 우파 연합주의자#!들은 @ig_liberals! @ig_radicals! #yellow 자유주의자#!들과 잦은 분쟁에도 불구하고 연합주의에 대한 깊은 신념을 가지고 있는 반면, @rural_folk! @ig_christian_democrats! @ig_reactionaries! #purple 울트라몬탄(교황지상주의)#! 파벌은 자유주의자들을 불신합니다. @ig_market_liberals! #green 가톨릭 자유주의자#!들은 자유 무역과 자유방임 경제를 선호하지만, 대다수의 #blue 가톨릭교도#!들은 농산물 수입 및 특정 원자재에 대한 다양한 관세를 유지하는 것을 선호합니다.#!" # 6647398858841355349
  belgium_catholic_government_homogenous_tt: "현재 [concept_government]은(는) [Concept('concept_bpm_belgium_homogenous', '단일')] #bold #blue 가톨릭교도#!/#blue 우파 연합주의자#!입니다.#!" # 1211674366617058232
  belgium_liberal_government_homogenous_tt: "현재 [concept_government]은(는) [Concept('concept_bpm_belgium_homogenous', '단일')] #bold #yellow 자유주의자#!/#yellow 좌파 연합주의자#!입니다.#!" # 8946649676496493610
  bpm_belgian_law_amendments.3.t: "급진적 선거세 개정안" # 10884862994358778328
  bpm_belgian_law_amendments.3.d: "끔찍한 분위기와 점점 커지는 혁명의 위협 속에서 긴 협상과 논쟁 끝에, #gold 헌법#! 및 선거법 개정안이 #yellow 하원#!과 #yellow 상원#!을 통과했습니다.\n\n이 개정안은 이른바 선거세에 대한 헌법상 최소 기준을 수정하여, 이제 #yellow 10 플로린#!으로 확정되었습니다.\n\n이 변화는 중요하고 논쟁의 여지가 많으며, 농부, 장인, 더 부유한 노동자, 상인, 소상공인 등 완전히 새로운 유권자층을 정치에 도입하게 됩니다.\n\n누가 선출될 수 있는지에 대한 개정안이 이미 작성되고 토론되고 있습니다." # 2012677599185504573
  bpm_belgian_law_amendments.3.a: "벨기에를 위한 새로운 시대가 우리 앞에 열립니다!" # 6219559952897862652
  the_following_requirements_are_optional: "다음 요구 사항은 순전히 #L #bold #green 선택 사항#!#!#!입니다:" # 14054779701784347294
  has_made_leuven_a_corporate_body: "#bold #blue 루뱅 가톨릭 대학교에 법인격을 부여하는 법#!#!을 통과시켜, #gold C.U.L.#!을 재산 관리권은 없으나 민사상 주체로 만들었습니다. (#L #bold [GetLawType('law_repeatable_religion_promote_state_religion').GetName] [concept_bpm_repeatable_law]을(를) 통과시켰음#!#!)" # 17237103151445657018
  has_banned_holding_public_office_and_be_a_rep: "#bold #blue 의회 겸직 금지법#!#!을 통과시켜 모든 공직자가 입법자를 겸직하는 것을 금지했습니다. (#L #bold [GetLawType('law_repeatable_politics_anti_corruption_drive').GetName] [concept_bpm_repeatable_law]을(를) 통과시켰음#!#!)" # 13329850512931475984
  has_has_sucessfully_implemented_a_regulatory_bill: "#bold #blue 작업장, 공장, 시설의 경찰권 및 아동 노동에 관한 법#!#!을 추구하여 통과시켰으며, 벨기에 최초의 규정을 제정했습니다. (#L #bold 법안 초안을 성공적으로 재고하여 통과시켰음 — 사실상 [GetLawType('law_regulatory_bodies').GetName], [GetLawType('law_restricted_child_labor').GetName] 및 [GetLawType('law_token_time_regulations').GetName]을(를) 제정함#!#!)" # 12400891820776451154
  Charles_Louis: "샤를 루이" # 15985699241912250375
  Spilthoorn: "스필토른" # 12563802373284189872
  Kats: "카츠" # 10018387189422974155
  bpm_from_belgian_early_socialists: "초기 벨기에 사회주의-급진주의 연합" # 11042785941027733929
  je_bpm_establish_a_comission_of_inquiry_desc: "노동자의 삶은 잔혹하고 비참합니다. 노동이라는 개념과 얼마나 가까이 있든 간에, 이 사실은 누구나 알고 있습니다. 하지만 아동, 일반 노동자, 그리고 비교적 안정된 직업을 가진 이들의 노동 환경에 대한 진실을 온전히 아는 이는 아무도 없습니다.\n\n노동하는 사람들의 삶이라는 주제는 유산 계급, 학술 기관, 그리고 일반 대중 사이에서 점점 더 많은 관심을 받고 있습니다. 더불어 이들의 위생, 빈곤, 과로와 관련된 문제들은 특히 #bold #blue 초등 교육에 관한 유기적 법률#!#!이 도입된 이후 정부의 구체적인 관심을 끌기 시작했습니다.\n\n#yellow 에두아르 뒤크페티오#!는 오랫동안 프롤레타리아의 처우 개선을 위해 적극적으로 활동해 왔기에, 저명한 [GetIdeology('ideology_protectionist').GetName]인 #yellow 오귀스트 비셰르#! 및 그 외 여러 유능한 전문가들과 함께 위원회의 위원으로 임명되어야 합니다. 이 위원회의 목적은 아동 노동자, 일반 노동자, 작업장, 그리고 그 외 많은 것들의 생활 조건을 조사하는 것입니다." # 13802805735536849217
  bpm_belgian_law_events.8.t: "아동 노동 및 작업장 경찰 조사 위원회 설립" # 2337065041560043790
  je_bpm_establish_a_comission_of_inquiry_name: "산업 조사" # 18261589053078068931
  bpm_belgian_law_events.8.d: "오늘, 국왕의 칙령을 통해 #yellow 내무부 장관#!의 발의로 ‘#L 아동 노동 및 작업장 경찰에 관한 조사#!’라는 명칭의 위원회가 설립되었습니다.\n\n[SCOPE.sCharacter('bpm_member_of_the_inquiry').GetFullName]이 위원 중 한 명으로 참여한 이 위원회의 목표는 고용된 아동의 수, 노동 시간, 야간 근무, 일요일 휴무 여부, 그리고 규제의 타당성을 조사하여 최종적으로 결론과 조사 결과를 발표하는 것입니다.\n\n공장 및 작업장 소유주, 상공회의소, 광산 기사, 의사, 전문가 등에게 자문을 구하고 의견을 청취할 예정입니다." # 3941642706329015395
  bpm_belgian_law_events.8.f: "아동 노동에 관한 법률은 노동계급 아버지들로부터 자녀에 대한 자연스럽고 정당한 보호권을 대규모로 박탈하는 법입니다. 이는 그들을 자녀의 보호권을 적절히 행사할 자격이 없거나 무능하다고 선언하는 법이며, 노동계급 내의 아버지들은 냉혹하고 어머니들은 무자비하다고 공표하는 법입니다.\n\n— 발테르 프레르-오르방, 날짜 미상" # 3151512413323061064
  bpm_belgian_law_events.8.a: "그들이 무엇을 찾아낼지 두고 봅시다." # 13990497771158781220
  bpm_belgian_labor_events.1.t: "위원회의 조사 결과" # 17202852893170486126
  bpm_belgian_labor_events.1.d: "거의 5년이 지난 오늘, [SCOPE.sCharacter('bpm_member_of_the_inquiry').GetFullName]을 비롯한 위원회는 #yellow 아동 노동#!, #yellow 작업장 환경#!, #yellow 노동 시간#! 및 일반 노동자의 삶과 일에 영향을 미치는 기타 여러 문제에 대한 조사 결과와 정보를 발표했습니다.\n\n결과는 참담했습니다. 노동자의 1/4이 아동이며, 이들은 대개 매우 낮은 임금을 받으며 하루 12시간씩 일하고 교육은 거의 받지 못한 채 착취당하고 있었습니다.\n\n현재 아동의 의무적 일요일 휴무, 아동 노동에 대한 엄격한 제한, 모든 노동자를 위한 12시간 노동제, 그리고 다수의 노동 감독관 도입을 골자로 하는 법안이 기초되고 있습니다." # 3191153323639149349
  bpm_belgian_labor_events.1.f: "이 공장은 혐오스럽기 짝이 없습니다. 아이들은 춥고 습하며 더럽고 바람이 그대로 들어오는 열악한 헛간에서 일하고 있습니다. 아이들이 힘겨운 노동을 수행하는 창문 맞은편은 유리창이 상당수 깨져 있는 것이 눈에 띌 정도입니다.\n\n— 1843년 브뤼셀 중앙 공중보건위원회, 화학 성냥 공장 방문 중" # 6185027038642190940
  bpm_belgian_labor_events.1.a: "상공회의소의 의견을 듣기 위해 법안 초안을 제출하겠습니다." # 15075180476003851502
  bpm_belgian_labor_events.2.t: "상공회의소의 반응" # 9780027853595517660
  bpm_belgian_labor_events.2.d: "[concept_government] 위원회가 수행한 조사는 #yellow 상공회의소#!와 #yellow 관계 당국#!의 압도적인 반대로 거부되었습니다.\n\n대부분의 민간 기업가들은 경제적 이유를 들어 법안을 비판했습니다. 아동은 경쟁력과 경제적 이익을 보장하는데, 규제가 시행되면 이것이 심각하게 위협받을 수 있다는 것입니다. 다른 이들은 이 법안이 너무 포괄적이며 발전하는 산업에 가혹하다고 비판했습니다." # 14972079508370504345
  bpm_belgian_labor_events.2.f: "새로운 발명품들이 등장한 이 상황에서, 공장 착취로부터 아동을 분리하려는 것은 모두를 위한 비옥한 노동의 원천을 말라버리게 하는 것이며, 유사한 외국 생산품과의 투쟁과 적대감을 이겨낼 힘을 잃게 만드는 것입니다.\n\n— 1849년 리에주 상공회의소" # 111288692071566467
  bpm_belgian_labor_events.2.a: "더 이상 이 문제에 매달릴 필요는 없습니다. (역사적)" # 9395129319839405879
  bpm_belgian_labor_events.2.b: "신이시여, 이 불쌍한 영혼들을 도우소서..." # 9767969618307000075
  this_draft_bill_will_not_be_touched_any_further: "@information! 이 #gold 법안 초안#!은 폐기되며 더 이상 추진되지 않을 것입니다." # 12260797431315411755
  this_bill_will_brought_back_and_amended_tt: "@information! 이 #gold 법안 초안#!은 재검토를 위해 #gold 내무부#!로 반환될 것입니다." # 5878218393586362758
  this_bill_oponents_tt: "@warning! #red 개정된 법안은 가장 강력한 반대자들의 분노를 유발할 수 있습니다!#!" # 9142357895967425101
  bpm_belgian_labor_events.3.t: "새로운 온건 법안 초안" # 10812721005136387205
  bpm_belgian_labor_events.3.d: "리에주 상공회의소 등의 반대에 부딪혔던 법안 초안은 #gold 내무부#!로 반환된 후 광범위한 분석과 수정을 거쳤습니다.\n\n새롭고 더 온건한 법안 초안은 이제 광산과 특정 소규모 작업장에서의 아동 노동을 제한하고, 특정 시설 내 남성 노동 시간을 제한하며, 노동 감독관을 배치하고, 종교적 색채를 띤 다수의 다른 변경 사항을 도입할 것을 제안합니다.\n\n이 초안은 이제 범위가 넓어졌으며 노동자의 노동과 관련하여 국가가 취해야 할 구체적인 해결책과 조치를 명시하고 있습니다.\n\n이후 법안은 총리에게 제출되었고, 토론을 거쳐 [concept_government]의 승인을 받았습니다. 법안은 이제 #yellow 하원#!으로 송부될 것입니다." # 10869851232924644112
  bpm_belgian_labor_events.3.f: "노동자의 비행 원인은 그가 종종 방치되는 환경, 교육의 결여, 그리고 때때로 눈앞에서 보는 나쁜 본보기에서 기인합니다.\n\n— 1843년 샤를루아 상공회의소 보고서" # 427732115416427457
  bpm_belgian_labor_events.3.a: "항상 무슨 일이 생기는군요..." # 8381522368544040588
  bpm_you_must_now_pass_regulatory_bodies_to_implement_this_bill: "#bold #blue 작업장, 공장, 시설 경찰 및 아동 노동에 관한 법률#!#!을 통과시키려면 [GetLawType('law_regulatory_bodies').GetName]을 제정해야 하며, 이는 또한 #bold 온건 규제 조치#! [concept_amendment] 효과를 얻게 됩니다. 성공할 경우, [GetLawType('law_restricted_child_labor').GetName]과 [GetLawType('law_token_time_regulations').GetName]이 자동으로 통과됩니다." # 15154621759673340447
  bpm_you_will_receive_events_of_support: "@정보! 이후 [concept_law]에 찬성하는 다양한 집단의 의견을 담은 이벤트가 발생할 것입니다." # 2717269225509092456
  this_law_automatically_passed_if_you_pass_bill_tt: "이 [concept_law]는 #gold 산업 조사#! 버튼 스토리에서 [GetLawType('law_regulatory_bodies').GetName] 통과에 #green #L 성공#!#!할 경우 자동으로 통과됩니다. (#italic 이 요구 사항은 #bold $je_bpm_unions_des_oppositions$#! [concept_journal_entry]와 함께 자동으로 사라집니다!#!)" # 7417149561501681608
  bpm_amendment_modest_regulatory_measures: "온건한 규제 조치" # 14967978430631963984
  bpm_amendment_modest_regulatory_measures_desc: "규제를 개선하기 위한 지속적인 입법 노력에도 불구하고, 여전히 규제는 매우 온건하며 불만족스럽습니다." # 1475271572152874922
  bpm_je_belgium_unionism_is_collapsing: "#red #bold 노동조합주의의 개념이 완전히 붕괴했습니다!#!#!" # 540815427261689495
  bpm_je_belgium_unionism_weak: "노동조합주의의 개념에 균열이 생기기 시작했습니다." # 12171124900776733485
  bpm_je_belgium_union_safe_igs_united: "노동조합주의의 개념은 잘 유지되고 있습니다... 일단은 말이죠..." # 10145416613031486854
  bpm_belgian_labor_events.4.t: "급진 자유주의자들의 적극적인 지지 선언" # 2042426634309686171
  bpm_belgian_labor_events.4.d: "#yellow 하원#! 내의 소위 [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] 소속 의원들과 수많은 전문가들이 노동 계급의 삶을 개선하기 위해 매우 적극적인 행동을 시작했습니다.\n\n[GetLawType('law_regulatory_bodies').GetName] 도입의 필요성을 역설하는 길고 거센 신문 기사들, 의회 안팎에서 행해진 [SCOPE.sCharacter('bpm_ultraliberal_leader').GetFullName]의 연설을 비롯한 긴 연설들, 그리고 로비 활동은 점점 더 많은 대중을 설득하고 있으며 심지어 국회의원들의 결정에도 영향을 미치고 있습니다." # 16389146324268136522
  bpm_belgian_labor_events.4.f: "우리는 제조업자가 무분별하고 제동 장치 없는 잔혹한 운영보다는, 지성과 질서 의식을 갖추어 생산성을 두 배로 높이는 노동자를 두는 것이, 정치적 소요의 날에 자신이 첫 번째 희생자가 될 수 있는 상황을 피하는 데 더 낫다는 것을 이해하리라 생각합니다.\n\n— 브뤼셀 왕립 의학 아카데미, 1843년" # 17848519989001405083
  bpm_belgian_labor_events.4.a: "당신들 참 아름다운 사람들이군요..." # 9176208907616007748
  bpm_active_press_war: "급진 자유주의 언론의 적극적인 법안 지지 여론" # 5267845378267636620
  bpm_belgian_labor_events.5.t: "[SCOPE.sCharacter('bpm_doctrinaire_leader').GetFullName]이 법안에 대한 지지를 표명하다" # 3257827860233897933
  bpm_belgian_labor_events.5.d: "[GetInterestGroupVariant('ig_liberals',GetPlayer).GetNameWithCountryVariant]의 저명한 인사인 [SCOPE.sCharacter('bpm_doctrinaire_leader').GetFullName]은 법안에 대한 초기 회의적인 태도를 보였으나, 일부 의원들과 전문가들의 설득으로 생각을 바꾸어 연설을 통해 법안에 대한 찬성 의사를 밝혔습니다. 그가 항상 개입주의, 진보, 그리고 사람들의 노동과 존엄성을 보장하는 것을 강력히 지지해왔던 인물이었기에 이는 특히 쉬운 일이었습니다.\n\n로지에(Rogier)는 찬성 의사를 밝히는 것 외에도 산업 보호를 위해 완제품 수입에 관세를 부과할 것을 제안하며, 법안에 반대하는 일부 인물들을 조롱했습니다.\n\n아이러니하게도, 이 제안은 일부 플랑드르 제조업자들이 지지를 선언하게 만드는 계기가 되었습니다." # 12740148387144849828
  bpm_belgian_labor_events.5.f: "만약 사회주의자가 된다는 것이 노동 계급의 노동을 보장하고, 그들의 복지를 증진하며, 그들에게 새로운 자원을 창출하기 위한 조치를 취하는 것을 의미한다면, 모든 합리적인 사람은 스스로를 사회주의자라고 선언해야 할 것입니다... 프로젝트가 좋은가 나쁜가? 그것이 문제입니다. 만약 그것이 좋은 것이라면, 그것이 사회주의라 불리든 다른 무엇이라 불리든 간에 반드시 실행되어야 합니다.\n\n— 샤를 로지에(Charles Rogier), 1849년" # 3616212841219870773
  bpm_belgian_labor_events.5.a: "유일하게 따뜻한 심장을 가진 리에주 사람!" # 14184966405169700462
  bpm_belgian_labor_events.6.t: "작업장, 공장, 플랜트의 치안 유지 및 아동 노동에 관한 법률" # 15010562546265040644
  bpm_belgian_labor_events.6.d: "산업 및 광업 분야의 첫 규제를 도입하는 법안이 방금 의회를 통과했습니다.\n\n수개월간의 토론, 논쟁, 광기, 역동적인 변화, 그리고 영리한 정치 끝에, 이 법안은 #yellow 하원#!을 통과했습니다.\n\n그 후 [SCOPE.sCharacter('bpm_rogier_leader').GetLastName]와 [SCOPE.sCharacter('bpm_ducpiteux_leader').GetLastName]의 노력 덕분에 법안은 국왕에게 전달되어 서명되었으며, 그에 앞서 비교적 보수적인 상원이 도입한 일요일과 같은 종교적 휴일의 노동 제한을 포함하는 다수의 수정안이 추가되었습니다." # 14097752566152491
  bpm_belgian_labor_events.6.f: "우리는 제조업자가 무분별하고 제동 장치 없는 잔혹한 운영보다는, 지성과 질서 의식을 갖추어 생산성을 두 배로 높이는 노동자를 두는 것이, 정치적 소요의 날에 자신이 첫 번째 희생자가 될 수 있는 상황을 피하는 데 더 낫다는 것을 이해하리라 생각합니다.\n\n— 브뤼셀 왕립 의학 아카데미, 1843년" # 16929567832055048172
  bpm_belgian_labor_events.6.a: "정말 환상적이군요!" # 82564485722811047
  bpm_belgian_labor_events.7.t: "일부 가톨릭교도들이 법안을 승인하다" # 15483794631704738623
  bpm_belgian_labor_events.7.d: "[GetInterestGroupVariant('ig_conservatives',GetPlayer).GetNameWithCountryVariant] [concept_government]가 발의한 이 법안은 장관들과 몇몇 개별 의원들의 찬성에도 불구하고, 초기에는 나머지 의원들, 특히 #blue 가톨릭교도#!들로부터 폭넓은 지지를 얻지 못했습니다.\n\n하지만 법안을 지지하는 연설과 언론 보도가 법의 종교적 성격과 선함을 강조하면서, 그들 중 상당수가 법안을 지지하기 시작했습니다.\n\n가장 중요한 점은 #yellow 상원#! 의원들 중 점점 더 많은 이들이 찬성 의사를 밝히고 있다는 것입니다." # 18314907253104555002
  bpm_belgian_labor_events.7.a: "[SCOPE.sCharacter('bpm_ducpiteux_leader').GetLastName]은 아마 행복에 겨워 울고 있을 것입니다." # 4109658218554746395
  bpm_belgian_law_events.9.t: "루뱅 가톨릭 대학교에 법인격을 부여하는 법률" # 14686137772816332202
  bpm_belgian_law_events.9.d: "[SCOPE.sCharacter('bpm_mossieur_brabant').GetLastName] 씨와 #yellow 뒤뷔#! 씨가 수개월 전 제안했던 #gold C.U.L.#!에 법인격을 부여하는 법안 초안이 마침내 도입되어 시행되었습니다.\n\n법인격이 부여됨에 따라, 이제 이 대학은 기부금을 받고 자체 명의로 법적 행위를 수행할 수 있게 되었습니다. 다만 법안이 제안한 대로 재산 관리에는 광범위한 제한이 따릅니다.\n\n제안서가 제출되자마자 반연합주의 언론은 죽은 손(mortmain), 길드 복원, 교육의 자유 침해 등을 거론하며 들끓었고, 일부 시의회는 주로 그 막대한 자산 의혹에 대해 의회에 비판을 보냈습니다. 반면 [GetInterestGroupVariant('ig_liberals',GetPlayer).GetNameWithCountryVariant]은 이 법안을 불쾌하게 여기며 심각한 회의감을 표하고 있습니다." # 12819582737120523726
  bpm_belgian_law_events.9.f: "가톨릭당의 가장 극단적인 두 대표인 브라방 씨와 뒤뷔 씨는 루뱅 대학교를 민법상 실체로 확립하자는 유명한 제안을 의회에 제출했습니다. 이는 유치하기 짝이 없는 주장인데, 왜냐하면 이 대학교는 이미 잘 알려진 명의자들을 내세워 이 제안이 복구하려는 특권을 누리고 있었기 때문입니다.\n\n— 귀스타브 달로, #italic 1830년 이후의 벨기에와 가톨릭당#!, 1845년" # 17865092181539749511
  bpm_belgian_law_events.9.a: "거칠군." # 6227582882550284409
  bpm_belgian_law_events.10.t: "의회 겸직 금지법" # 13063720435195904465
  bpm_belgian_law_events.10.d: "공직과 의원직 겸직을 금지하는 의회 겸직 금지법이 방금 성공적으로 서명되었습니다.\n\n이 법은 원래 [concept_government]가 설계한 온건한 법안으로, 장군, 지방 주지사, 고문 및 기타 주요 공직자를 예외로 두어 공무원 수를 제한하고자 했습니다.\n\n그러나 #yellow 중앙 위원회#!는 이 규칙에 따라 [Concept('concept_bpm_minister', '장관')]을 제외한 #L 모든 공무원#!은 의원이 되어서는 안 된다고 명시했습니다.\n\n#yellow 중앙 위원회#!의 제안은 정부 측이 아닌 상당수 의원들의 찬성을 얻어 #green 60#! 대 #red 23#!으로 통과되었습니다." # 1301266706259238403
  bpm_belgian_law_events.10.f: "우리 의원들을 둘러보고 공직을 맡았던 모든 의원을 제거해 보십시오. 그러면 사업적 통찰력을 위해 얼마나 큰 공백을 만들었는지 알게 될 것입니다!\n\n— 펠릭스 드 메로드, 1848년 5월 20일" # 17822992154476068075
  bpm_belgian_law_events.10.a: "운이 없군..." # 16382042602925217790
  bpm_belgian_law_events.11.t: "의회 겸직 금지법 법안 초안" # 15244372003681953122
  bpm_belgian_law_events.11.d: "[SCOPE.sInterestGroup('bpm_government_ig_scope').GetNameWithCountryVariant]의 [concept_government]가 작성한 의회 겸직 금지법 법안 초안이 완전히 완성되고 다듬어졌습니다.\n\n이 법안은 장군, 고문, 지방 주지사 및 기타 주요 공무원을 제외하고 공무원 수를 대폭 줄이는 것을 목표로 합니다.\n\n[concept_government]가 초안 시행 절차를 시작하면, 분석과 자체 초안 작성을 위해 #yellow 중앙 위원회#!로 전달될 것입니다. [Concept('concept_bpm_minister', '장관')]들은 특히 유럽 전역에 혁명이 휘몰아치는 상황에서 이 법안이 아무 문제 없이 원활하게 통과될 것이라고 믿고 있습니다." # 16206341852904979129
  bpm_belgian_law_events.11.f: "저는 입법부 내에, 제 생각에 국가에 큰 이익이 되는 공무원들을 어느 정도 유지하고 싶습니다. (...) 그것은 우리에게 명확하고 공식적으로 인정받는 독립성과, 예외 없이 엄격한 도덕성을 규칙으로 삼는다는 보장, 그리고 더 이상 논란이 되지 않는 고려의 보장을 제공합니다.\n\n— 조제프 르보, 1848년 5월 20일" # 8679814984325514052
  bpm_belgian_law_events.11.a: "그렇다면 중앙 위원회는 이 법안에 대해 어떻게 생각할까?" # 6025468101464724475
  bpm_law_effect_tt_repeatable_you_need_to_prepare_the_bill_first: "[concept_journal_entry] 버튼을 통해 #bold #blue 의회 겸직 금지법#!#!을 먼저 준비 완료해야 #yellow 중앙 위원회#!로 보낼 수 있습니다!!" # 18255357377849823192
  bpm_this_law_effect_is_different_under_the_union: "@information! #blue 연합주의 시대에는 다음 효과가 다르게 적용됩니다.#!" # 693258053612085109
  bpm_belgian_law_events.12.t: "중앙 위원회의 법안" # 10273151140123205197
  bpm_belgian_law_events.12.d: "국가 공무원 수를 제한하는 [concept_government] 법안은 #yellow 중앙 위원회#!에 의해 철저히 분석되었습니다.\n\n우리의 온건한 법안에 대해 중앙 위원회는 그들만의 제안, 즉 매우 급진적인 제안을 보내왔습니다.\n\n그들은 직업과 관계없이 공직과 의원직 겸직을 금지하며, [Concept('concept_bpm_minister', '장관')]을 제외한 모든 경우를 금지합니다.\n\n이 법안은 내각에 큰 놀라움과 불안감을 안겨주었으며, 이제 그들은 이 프로젝트가 계획대로 끝나지 않을 수도 있다는 사실을 깨닫고 수세에 몰려 있습니다." # 17329028842226527702
  bpm_belgian_law_events.12.f: "우리는 가지치기를 제안하는데, 그들은 나무를 뿌리째 뽑아버리자고 제안합니다. 우리는 가지를 다듬자고 제안하는데, 그들은 나무를 밑동부터 베어버리자고 합니다.\n\n— 샤를 로지에, 1848년 5월 20일" # 13693590128092449042
  bpm_belgian_law_events.12.a: "오..." # 1797239446867028914
  bpm_passing_the_law_after_central_section_has_analysed_it: "중앙파가 독자적인 법안을 제안했습니다" # 11242516019858405170
  bpm_belgium_now_allowed_to_pass_the_repeatable: "@information! 이제 [GetLawType('law_repeatable_politics_anti_corruption_drive').GetName] 제정을 시작할 수 있습니다. 시작하면 초안은 분석을 위해 #yellow 중앙파#!에게 전달됩니다. @warning! 그들이 독자적인 법안을 제안할 수도 있습니다!" # 14186854865472148174
  je_bpm_parliamentary_incompatibilities_desc: "의회 내 공직자 수를 제한하는 법안에 대한 아이디어는 별다른 관심을 끌지 못했습니다. 왜냐하면 더 중요한 문제들은 차치하고라도, 국회의원 일부가 바로 공직자 자신이었기에 그들의 이익을 해칠 수 있었기 때문입니다.\n\n하지만 이제는 다릅니다. 절대 군주와 사회적 불의를 향한 유럽 민중의 분노가 유럽 전역으로 퍼지고 있으며, 우리나라도 소규모 소요 사태나 그에 관한 계획이 발생하고 있습니다.\n\n혁명가들의 기세를 꺾고 벨기에에 합리적인 근대화를 도입하는 것이 가장 바람직하므로, 중요한 인물들을 제외하고 누가 국회의원이 될 수 있는지 제한하는 #blue #bold 의원 겸직 금지#!#! 법안 초안 작성을 시작해야 합니다." # 15543835609016653562
  bpm_belgian_historical_events.1.t: "프리메이슨을 규탄하는 사목 서한" # 8473777849638874208
  bpm_belgian_historical_events.1.d: "#gold 1837년 12월 27일#!, #yellow 대주교#! [SCOPE.sCharacter('bpm_sterckx_bishop').GetFullName]는 다른 네 명의 주교와 함께 모든 가톨릭 사제에게 사목 서한을 발표했습니다.\n\n이 서한은 프리메이슨을 규탄하고 파문하며, 가톨릭 신자들이 그들에게 가입하는 것을 금지합니다.\n\n이 조치는 [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant]에게 집회의 자유에 대한 공격으로 간주되었으며, 심지어 [SCOPE.sCharacter('king_leopold').GetFullName]조차 주교들의 이러한 발의를 위험하다고 여겼습니다.\n\n그러나 이러한 규탄은 프리메이슨이 반성직주의와 완전히 동일시되는 신호탄이기도 했습니다." # 4006076941133838835
  bpm_belgian_historical_events.1.f: "신사 여러분, 우리는 우리의 사목적 돌봄을 받는 신자들 중 일부가 양심의 가책 없이 메이슨 협회에 가입하고 그 모임에 참석할 수 있다고 믿는 이들이 있다는 사실을 유감스럽게 확인했습니다.\n\n— 엥겔베르트 스터크스 대주교, 1837년 12월 28일" # 1810633840307564513
  bpm_belgian_historical_events.1.a: "제정신인가?" # 2983618256575669450
  bpm_belgian_historical_events.2.t: "폴 드보, 연합에 대한 지지 철회" # 7960813714704064828
  bpm_belgian_historical_events.2.d: "이른바 '급진파' 중 가장 유명한 인물 중 하나인 [SCOPE.sCharacter('bpm_paul_devaux_scope').GetFullName]은 런던 조약 서명 이후 얼마 지나지 않아 정부에 대한 지지를 철회했습니다.\n\n몇 달 후, 그는 정기간행물 '#yellow Revue Nationale#!'을 창간했고, 여기서 [concept_government]를 향한 다양한 공격을 시작하며 변화를 요구하고, 여러 정치인을 비판하고, 점점 더 가톨릭에 반대하는 입장을 취했습니다.\n\n그의 활동으로 인해 우리는 행정부 내의 친연합주의적 자유주의자들을 점점 더 잃어가고 있습니다." # 1070848130445168844
  bpm_belgian_historical_events.2.f: "극단적이고 이론적이거나 비정부적인 입장을 고수하는 것과는 대조적으로, 실용적인 야당은 자신들의 사상이 최대한 관철되도록 싸웁니다. 단순히 파괴만을 열망하는 것이 아니라, 타도한 자리에 무엇을 대신 세울지 알고 있습니다.\n\n— 폴 드보, 그의 #italic Revue Nationale#!에서, 1839년" # 12078778693123819777
  bpm_belgian_historical_events.2.a: "마지막 분열이기를 바랄 뿐..." # 13761250526428372110
  bpm_je_belgium_consolidation_progress_increase_tt: "벨기에 국가 통합의 #green 진척도#!가 #v 5%#! 증가합니다!!" # 11481442533584231267
  bpm_je_belgium_consolidation_progress_25_increase_tt: "벨기에 국가 통합의 #green 진척도#!가 #v 2.5%#! 증가합니다!!" # 12904105679807965908
  bpm_left_unionist_discontent_desc: "현재 좌파 연합주의자/자유주의자 불만도: [JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/50" # 17791425466310436771
  due_to_debates_left_unionists_dissatisfied: "우려스러운 성직자 중심의 결과나 [GetInterestGroupVariant('ig_conservatives',GetPlayer).GetNameWithCountryVariant]와의 논쟁으로 인해, #yellow #bold 자유주의자#!#!/#yellow #bold 좌파 연합주의자#!#! @warning! #red #bold 불만도#!#!가 #red #bold 5#!#!! 증가했습니다." # 9288703789857326741
  bpm_belgium_reason_little_reason_for_unionism: "더 많은 #blue #bold 유기적 법률#!#!이 통과되고 시간이 흐를수록 연합주의의 필요성은 줄어듭니다. 따라서 #yellow #bold 자유주의자#!#!/#yellow #bold 좌파 연합주의자#!#! @warning! #red #bold 불만도#!#!가 #red #bold 2#!#!! 증가했습니다." # 7108899724747605110
  BPM_VALUE_FROM_LIB_APPROVAL_BELOW_0: "[GetInterestGroupVariant('ig_liberals',GetPlayer).GetNameWithCountryVariant]의 [concept_approval]이 #v 0#! 미만이며, [concept_clout]에 의해 곱해짐" # 4135719406549597310
  je_bpm_parliamentary_incompatibilities_name: "가지치기" # 10318168088570422312
  bpm_left_unionist_discontent_name: "좌파 연합주의자/자유주의자 사이의 불만" # 11462263927199775811
  bpm_belgian_historical_events.3.t: "브뤼셀의 '소시에테 드 랄리앙스' 창설" # 7663482409851102638
  bpm_belgian_historical_events.3.d: "가톨릭교도들의 끊임없는 프리메이슨 공격과 [SCOPE.sCharacter('bpm_paul_devaux_scope').GetLastName]의 전향, 그리고 세속적인 [GetInterestGroupVariant('ig_reactionaries',GetPlayer).GetName]와 [GetInterestGroupVariant('ig_radicals',GetPlayer).GetName] 및 [GetInterestGroupVariant('ig_socialists',GetPlayer).GetName]의 지역 조직 간의 화해 분위기가 무르익으면서, 선거 및 정치적 플랫폼인 '#gold 소시에테 드 랄리앙스(Société de l'Alliance)#!'가 결성되었습니다.\n\n[SCOPE.sCharacter('bpm_eugene_defacqz_scope').GetLastName]가 이끄는 이 조직은 레 자미 필랑트로프(Les Amis Philanthropes), 레 자미 뒤 프로그레(Les Amis du Progrès), 레 브레 자미 드 뤼니옹(Les Vrais Amis de l'Union) 등 프리메이슨 지부들이 수개월간 노력한 끝에 창설되었습니다. 프리메이슨에 기원을 두고 있으나, 비회원도 가입이 허용됩니다." # 11317890172268874111
  bpm_belgian_historical_events.3.f: "화해를 시험대에 올리려면, 더 약한 의견이 다른 쪽의 과격한 행동을 막는 방벽 역할을 할 수 있도록 충분한 힘을 유지하게끔 항상 노력해야 합니다.\n\n— 폴 드보, 1845년 11월 20일" # 5180268543363389377
  bpm_belgian_historical_events.3.a: "가급적 그들이 사라지는 편이 낫다." # 14231591015525040312
  bpm_belgium_l_alliance_creation_effects_tt: "'#gold 소시에테 드 랄리앙스#!'의 창설로 [GetInterestGroupVariant('ig_radicals',GetPlayer).GetName], [GetInterestGroupVariant('ig_reactionaries',GetPlayer).GetName], [GetInterestGroupVariant('ig_socialists',GetPlayer).GetName] 및 [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]은 비록 분열되어 있기는 하나, 서로 연대하는 하나의 정치적 집단으로 행동하게 될 것입니다." # 10926117966279531249
  BPM_VALUE_FROM_CLOUT_AND_APPROVAL_OF_BUREAUCRATS: "[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]의 [concept_approval]에 [concept_clout]를 곱한 값" # 17608516417827258745
  BPM_VALUE_FROM_CLOUT_AND_APPROVAL_OF_PROFESSIONALS: "[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]의 [concept_approval]에 [concept_clout]를 곱한 값" # 16518948510351108218
  BPM_VALUE_FROM_GOVERNMENT_STATUS: "[concept_government]의 현재 구성 (#italic [Concept('concept_bpm_belgium_mixed', '혼합')]이 가장 빠르게 통합되며, [Concept('concept_bpm_belgium_homogenous', '동질')]이 가장 느림#!)" # 12474160615312767973
  BPM_VALUE_FROM_CURRENT_BUREAUCRACY: "@bur! [concept_bureaucracy]의 #green 초과#! 또는 #red 부족#! 상태" # 3223026440360907445
  BPM_VALUE_FROM_CURRENT_SOL: "[concept_country] [Concept('concept_pop', '인구')]의 현재 평균 [concept_sol]" # 871004569803189183
  BPM_VALUE_FROM_HAVING_PASSED_ECONOMIC_REPETEABLES: "[GetLawType('law_repeatable_economy_liberalization').GetName], [GetLawType('law_repeatable_economy_agricultural_investment').GetName] 또는 [GetLawType('law_repeatable_economy_public_works').GetName] [Concept('concept_bpm_repeatable_law', '반복 가능한 법률')] 중 하나가 활성화됨" # 1494321518617475816
  BPM_VALUE_FROM_LIBERAL_DISCONTENT: "@warning! #yellow #bold 자유주의자#!#!/#yellow #bold 좌파 연합주의자#!#!의 #red #bold 불만#!#!" # 10097654006192130747
  BPM_VALUE_FROM_ORGANIC_LAWS_INTRODUCED: "#blue #bold 유기적 법률#!#!, #blue #bold 개혁#!#! 및 그에 대한 #blue #bold 수정안#!#! 통과" # 5796843134572029545
  BPM_VALUE_FROM_UNIONISM_STILL_NEEDED: "독립이 보장되지 않았으며 연합주의가 여전히 필요함 (#italic #gold 런던 조약#!이 아직 양측 모두에 의해 서명되지 않음#!)" # 17420640432591251808
  Malou: "말루" # 17404988247488382612
  Dechamps: "데샹" # 1438974623074779193
  bpm_belgian_historical_events.4.t: "장 바티스트 노통브의 은퇴" # 6063118416491646346
  bpm_belgian_historical_events.4.d: "[SCOPE.sCharacter('bpm_jean_baptiste_nothomb').GetLastName]은 저명한 자유주의 정치인이었으나 [GetInterestGroupVariant('ig_conservatives',GetPlayer).GetNameWithCountryVariant]와 더 밀접한 관련이 있었으며, 벨기에 국가 건설을 위해 10년 넘게 헌신한 끝에 결국 은퇴했습니다.\n\n이는 [GetInterestGroupVariant('ig_liberals',GetPlayer).GetNameWithCountryVariant]의 불만이 커지고 그 자신 또한 #blue 가톨릭교도#!나 #yellow 자유주의자#! 어느 쪽과도 자신을 동일시할 수 없게 되어 정치적으로 고립되었기 때문입니다. 그는 비교적 젊지만 이미 경험이 풍부한 정치가이자 자신만의 [GetIdeology('ideology_leader_unorthodox_unionist').GetName] 성향을 가진 아돌프 데샹으로 교체되었습니다." # 12512719318184214512
  bpm_belgian_historical_events.4.f: "나를 이 자리에 앉힌 위기 속에서 나는 모든 친구를 잃었지만, 나의 원칙만큼은 잃지 않았다.\n\n— 장 바티스트 노통브, 1843년 3월 18일" # 6978901163222683353
  bpm_belgian_historical_events.4.a: "그가 평화롭게 오래 살기를 바란다." # 1088914795267017760
  bpm_belgian_historical_events.5.t: "자유주의 의회" # 10843292902889286248
  bpm_belgian_historical_events.5.d: "오늘, #yellow 자유주의 의회#!가 #gold 브뤼셀 시청#!에 모였습니다.\n\n#L 국민 의회#! 의원, #L 시장#!, #L 시의원#! 및 #L 지방 의원#!, #L 상공회의소#! 회원, #L 변호사#!, #L 의사#!, #L 귀족#!, #L 언론인#!, #L 하원 의원#!, #L 상원 의원#!, 그리고 [SCOPE.sCharacter('bpm_verheagen_scope').GetLastName], [SCOPE.sCharacter('bpm_paul_devaux_scope').GetLastName], #yellow 프레르-오르방#!, 렐리에브르, 피에르코와 같은 #L 젊은 정치인#!들을 포함하여 총 #v 384#!명의 대표자가 참석했습니다. 이 모든 이들을 대표하여 [SCOPE.sCharacter('bpm_eugene_defacqz_scope').GetFullName]가 의장을 맡았습니다.\n\n의회는 후보를 내기 위해 모든 주요 도시에 자유주의 협회를 창설할 것을 발표했으며, '벨기에식 자유주의' 강령을 채택했습니다. 이는 진보, 선거인 자격 요건을 낮추는 선거 개혁, 공교육의 세속화, '반동적 법률'의 폐지, 세속 권력의 독립, 그리고 노동 계급의 생활 조건 개선을 골자로 합니다." # 1809552975868255225
  bpm_belgian_historical_events.5.f: "우리 모두가 앞으로 나아갈 수 있도록 각자 보조를 맞추되, 단결된 대오 속에서, 굳건한 신념 아래, 이 지울 수 없는 좌우명을 새긴 깃발 아래 같은 속도로 행진합시다: 헌법, 오직 헌법뿐, 그러나 헌법 전체를!\n\n— 외젠 드파크, 1846년 7월 14일" # 12666353695794721377
  bpm_belgian_historical_events.5.a: "시작해 볼까..." # 9629301426872001490
  bpm_je_not_has_implemented_equal_reform: "#bold #blue 선거세#!#!가 헌법상 최소 수준으로 인하되지 #red #bold 않았습니다#!" # 13333082438413130661
  bpm_je_not_has_implemented_doctrinaire_reform: " #bold #brightyellow 교조주의자#!#!의 #bold #blue 선거세 개혁#!#! 제안을 이행하지 #red #bold 않았습니다#!" # 240857298004700703
  bpm_belgian_historical_events.6.t: "브뤼셀의 자유주의 분열과 자유주의 협회" # 4739040851630286890
  bpm_belgian_historical_events.6.d: "'#L 급진파#!' 파벌(일부 [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant]와 [GetInterestGroupVariant('ig_socialists',GetPlayer).GetNameWithCountryVariant]로 구성) 내에서 공화주의 및 친복지 성향이 강해짐에 따라, 저명한 정치인 [SCOPE.sCharacter('bpm_verheagen_scope').GetLastName]와 그의 지지자들은 #yellow 자유주의 의회#!의 후속 조치를 취하고 '연합(l'Alliance)'과 거리를 두기 위해 '브뤼셀 자유주의 협회(L'Association libérale de Bruxelles)'를 결성했습니다.\n\n이 협회는 의회 결의안을 준수하지만 교육 문제에 대해서는 침묵을 지키고 있습니다. 또한 감독 목적으로 행정 위원회를 설립했습니다.\n\n#gold 연합 협회#!의 지도자인 [SCOPE.sCharacter('bpm_eugene_defacqz_scope').GetLastName]는 곧 '#L 급진파#!'를 옹호하는 서한을 작성했으나, 이는 오히려 그의 입지를 좁히기 시작했습니다." # 2198993711930934156
  bpm_belgian_historical_events.6.f: "모든 자유주의 분파가 동의할 수 있는 유일한 주요 의제가 의제에서 삭제된 것으로 보입니다. 그 자리는 사회적, 인도주의적 문제들로 대체되었습니다. 우리는 원칙과 타협하지 않을 것입니다.\n\n— 피에르-테오도르 베르하겐, 1846년 10월 28일" # 12845342937194724823
  bpm_belgian_historical_events.6.a: "반벨기에적 계몽 절대주의자에서 헌법적 자유주의자로..." # 8797569257933695200
  bpm_successfully_consolidated_the_belgian_state: "벨기에 국가 통합 성공" # 2684802277960959533
  bpm_from_neccessary_union_des_oppositions_alliance: "필수적인 야당 연합(Unions des Oppositions)" # 3986902759533386514
  bpm_fom_opposition_to_unionism: "자유주의-가톨릭 연합에 대한 반대" # 10905454766705523786
  bpm_je_belgium_legacy_of_the_union: "#v 야당 연합#!의 유산은 향후 10년 정도 우리를 따라다닐 것입니다..." # 16506138827700137176
  bpm_liberal_party_core: "자유당의 핵심 교조주의자들" # 611916700660034300
  BPM_VALUE_FROM_THE_MOST_IMPORTANT_LAWS_HAVENT_BEEN_PASSED: "중요한 #bold #blue 기본법#!#!들이 아직 통과되지 않았습니다 (#italic #bold #blue 초등 교육 기본법#!#! 및 #bold #blue 지방 자치#!#! 및 #bold #blue 지방 행정#!#! [Concept('concept_law', '법률')]#!)" # 2108320639953005607
  bpm_je_bel_has_collapsed: "국가가 [Concept('concept_bpm_state_exhaustion', '피로')]로 인해 붕괴했습니다" # 14288126472731966156
  bpm_linen_industry_crisis: "아마 산업 위기" # 12329133200300845569
  bpm_belgian_historical_events.7.t: "아마 산업 위기" # 12329133200300845569
  bpm_belgian_historical_events.7.d: "쇠퇴하는 [GetCulture('flemish').GetName] #L 아마 산업#!에 대한 통계가 너무나 악화되어, [concept_government]는 조사 위원회를 구성했습니다.\n\n대부분의 가구는 생계를 유지할 수 없고, 실업률은 상승하고 있으며, 임금은 지속적으로 하락하고 있습니다. 기계화된 [GBR.GetCountry.GetAdjective] 섬유 산업과의 경쟁은 불가능한 것으로 판명되었으며, [PRU.GetCountry.GetAdjective] 섬유 제조업체들은 낮은 임대료 덕분에 [GetCulture('flemish').GetName] 업체들과 안전하게 경쟁할 수 있게 되었고, [FRA.GetCountry.GetAdjective]와의 무역은 높은 관세로 인해 어려움을 겪고 있습니다.\n\n게다가 우리의 더딘 무역 자유화와 서툰 기계화는 상황을 더욱 악화시켰습니다. [GetCulture('flemish').GetName] 지방은 심각한 위기를 겪고 있습니다." # 4205574140059032560
  bpm_belgian_historical_events.7.f: "그것은 국가 산업이 잠든 베개였다.\n\n— 에두아르 뒤크페티오, 1834년" # 8896736770335617512
  bpm_belgian_historical_events.7.a: "지금 즉시 조사 위원회를 구성하라!" # 18282753146836089998
  bpm_food_crisis_flemish: "심각한 식량 위기" # 14611898150052438098
  bpm_belgian_historical_events.8.t: "극심한 플랑드르 식량 위기" # 17005244888349368725
  bpm_belgian_historical_events.8.d: "[GetCulture('flemish').GetName] 아마 산업의 이전 문제들은 지금 벌어지고 있는 일에 비하면 아무것도 아니었다.\n\n끔찍한 흉작과 함께 대기근이 시작되었다.\n\n[concept_government]와 의회 전체의 대응은 거의 즉각적이었다.\n\n임시 회의가 소집되어 식량의 자유로운 반입이 도입되었고, 지자체에 200만 프랑이 대출되었으며, 지자체 기금이 조성되었습니다. 또한 공급 기관과 자선 위원회가 설립되었고, 감자 수입에 대한 보조금이 지급되는 등 수많은 조치가 취해졌다." # 10733231668774198068
  bpm_belgian_historical_events.8.f: "그것은 국가 산업이 잠든 베개였다.\n\n— 에두아르 뒤크페티오, 1834년" # 8896736770335617512
  bpm_belgian_historical_events.8.a: "끔찍한 소식이군." # 12509334230858389069
  bpm_belgian_historical_events.10.t: "무역 정책을 위한 투쟁" # 6097534511169638752
  bpm_belgian_historical_events.10.d: "전 세계가 자유 무역과 국가 간의 더욱 긴밀한 협력을 향해 나아가는 동안, 우리의 사랑하는 벨기에는 보호무역주의에 매달렸다. 안팎으로 관세, 어디에나 관세가 존재했다. 일부 산업가와 정치인들은 자유 무역을 위해 투쟁하기 시작했다.\n\n1846년, [SCOPE.sCharacter('bpm_scope_de_brouckere').GetLastName]가 이끄는 '#yellow 벨기에 상업 자유 협회#!'가 창설되었다. 1년 후, '경제학자 회의'가 개최되어 자체적인 강령을 발표했다. 몇 년 뒤, 귀스타브 드 몰리나리가 편집장을 맡은 '#yellow 벨기에 경제학자#!'가 창간되었다. 그들은 14만 장의 전단을 배포하고, 전국 각지에 위원회를 설치하며, 영국식 집회를 조직했다.\n\n보호무역주의자들은 #gold 헨트#!에 '#yellow 국가 노동 방어 협회#!'를 창설하고 #italic Le Travail#!과 #italic Le Travail National#!이라는 두 신문을 발행하며 대응했다. 무역 정책의 개념을 둘러싼 전쟁은 대체로 평온하게 진행되었고, 자유 무역주의자들이 서서히 우위를 점하고 있다." # 12265902109988223024
  bpm_belgian_historical_events.10.f: "내각은 시기적절하지 않은 관세법 개정으로 우리의 경제 시스템을 혼란에 빠뜨리지 않을 것이다.\n\n— 샤를 로지에, 1847년 8월 12일" # 7442041748367008955
  bpm_belgian_historical_events.10.a: "흥미롭군." # 9738541132076248136
  bpm_belgian_historical_events.11.t: "보수(가톨릭)당의 창당" # 1544320377892191996
  bpm_belgian_historical_events.11.d: "#gold 말린 제3차 회의#!가 열린 지 2년 후, #L 보수(가톨릭)당#!의 마지막 구성 요소인 '#yellow 서클 및 협회 연맹#!'이 설립되었다.\n\n그 강령은 아직 구체화되는 중이지만, 이를 구성하는 다양한 조직들은 헌법과 자신들의 자유민주주의적 개념을 진심으로 신봉하면서도 재정적, 성직자적 보수 개혁을 위해 노력하고 있다.\n\n이러한 건설은 50년대 가톨릭 신문과 서클의 등장으로 시작되었으며, '#yellow 헌법 및 보수 협회#!' 또한 설립되었다. 이후 '#yellow 보수 협회#!'가 결성되었고, '#yellow 연맹#!'에 앞서 말린에서 회의들이 개최되었다." # 9325875280604423535
  bpm_belgian_historical_events.11.f: "우리 국민의 나약함에 비할 것은 아무것도 없다. 가톨릭의 에너지가 남아 있는 유일한 곳은 성직자들뿐이다... 성직자 외에 '가톨릭' 당이 무엇인지 아는가? 그것은 겁쟁이들의 당이다.\n\n— 바르텔레미 뒤모르티에, 1852년" # 17180462101170639866
  bpm_belgian_historical_events.11.a: "양당제의 시작..." # 1313718896186676314
  je_bpm_unions_des_oppositions_lobby: "젊은 벨기에 국가는 합법적인 무정부 상태에 놓여 있다. 법률, 결속력, 조직적 구조, 교육이 부족하며, 이 모든 것은 시간이 흐르고 입법이 이루어짐에 따라 그 목적이 퇴색해가는 분열된 '야당 연합(Unions des Oppositions)'에 의해 토론되고 시행되어야 한다..." # 362389305933013484
