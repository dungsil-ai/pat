l_korean:
  ig_left_unionists: "좌파 연합주의자" # 3439858394951887178
  ig_left_unionists_desc: "좌파 연합주의자는 '야당 연합(Unions des Oppositions)'이라 불리는 더 넓은 동맹 내의 파벌입니다. 주로 이른바 '독트리네르(Doctrinaires)'로 구성된 이들은 개입주의, 지방 분권, 세속주의를 보완하여 자유주의적 헌법 해석 내에서 벨기에를 공고히 하고자 합니다. 현재는 화해적인 태도를 보이고 있으나, 심도 있는 개혁에 대한 필요성이 커지고 있어 분열이 발생할 가능성이 있습니다. 주요 인물로는 샤를 로지에와 조제프 르보가 있습니다." # 293053076051347794
  ig_doctrinaires_belgium: "독트리네르" # 3822773484100821091
  ig_doctrinaires_belgium_desc: "벨기에의 독트리네르는 자유당 내의 자유주의 파벌입니다. 이들은 전문적인 온건주의, 지방 분권, 사회정치적 개혁에 대한 적대감, 반성직주의를 특징으로 합니다. 동시에 경제 내 국가의 역할 문제에 대해서는 의견이 갈립니다. 이 파벌의 유명한 인물로는 샤를 로지에, 조제프 르보, 발테르 프레르오르방이 있습니다." # 12460380057851630256
  ig_right_unionists: "우파 연합주의자" # 4935643510482952913
  ig_right_unionists_desc: "우파 연합주의자는 '야당 연합'이라 불리는 더 넓은 동맹 내의 파벌입니다. 우익 자유주의와 가톨릭 사상을 대변하는 이들은 일반적으로 국왕, 교회, 마을의 상당한 권력을 보장하면서 벨기에 국가를 공고히 하려 합니다. 주요 인물로는 장바티스트 노통브, 아돌프 드샹, 바르텔레미 드 퇴가 있습니다." # 8425449367218195444
  ig_constitutionalists_belgium: "헌법주의자" # 5162634131054457982
  ig_constitutionalists_belgium_desc: "헌법주의자는 보수(가톨릭)당 내의 파벌로, 울트라몽탄주의자들과 달리 현행 헌법을 전적으로 유지하고자 합니다. 이들은 일반적으로 보수적이며 자치, 민족주의, 사회정치적 개혁에 대해 다양한 접근 방식을 취합니다. 잘 알려진 정치인으로는 샤를 뵈스트, 빅토르 자콥, 오귀스트 베르나르트가 있습니다." # 6970894999717822085
  ig_conservative_unionists: "보수 연합주의자" # 1247802163995221042
  ig_conservative_unionists_desc: "보수 연합주의자는 장기화된 '야당 연합'의 틀 안에서 국가를 발전시키고자 노력합니다. 이는 온건주의, 자유방임 경제, 국왕에게 집중된 중앙 권력이라는 이상에 기반합니다. 잘 알려진 인물로는 앙리 드 브루케르와 샤를 드 브루케르 형제가 있습니다." # 18385059004249618320
  ig_catholic_liberals: "가톨릭 자유주의자" # 10513971042427033388
  ig_catholic_liberals_desc: "자유방임 경제라는 개념은 '가톨릭 자유주의자(자유주의 가톨릭교도와는 다름)'라고 알려진 상당수의 가톨릭교도들에게도 수용되었습니다. 이들은 주로 자유주의 정책을 통한 경제 발전, 가톨릭 교회의 지위 유지, 온건주의를 신봉합니다. 대중적인 인물로는 쥘 다네탕과 쥘 말루가 있습니다." # 2278917449677850680
  ig_ultraliberals: "초자유주의자" # 734005770919153384
  ig_ultraliberals_desc: "모든 학파의 자유주의자가 '야당 연합'에 합류한 것은 아닙니다. 초자유주의자, 급진주의자, 혹은 진보주의자라 불리는 이들 중 일부는 가톨릭에 대한 불신으로 인해 가톨릭 교회에 맞서는 방어의 보루를 구축했습니다. 행정부와 프리메이슨 지부 내의 소규모 집단으로 존재하며, 연합에 대한 실망감이 커짐에 따라 그 세력이 서서히 성장하고 있습니다." # 7042468368754520891
  ig_orangists: "오랑주파" # 2076256143155821808
  ig_orangists_desc: "오랑주파는 벨기에를 네덜란드 왕국의 일부로 복원하려는 정치적, 사회적 운동입니다. 주로 도시 부르주아지로 구성되어 있으며 계몽적 절대주의, 자유 무역, 세속주의를 신봉하는 이들은 묘하게도 자유주의자들과 가까운 입장에 있습니다. 피에르테오도르 베르하겐이 이들 중 유명한 인물입니다." # 2113041310359387283
  ig_ultramontanes: "울트라몽탄주의자" # 10002555741263551751
  ig_ultramontanes_desc: "울트라몽탄주의자는 극도로 보수적인 가톨릭 정치인 집단으로, 높은 수준의 성직주의, 길드에 대한 향수, 국가의 지방 분권을 유지하려는 열망으로 구별됩니다. 때때로 이들은 헌법의 특정 조항에 의문을 제기하기도 합니다. 이들은 주로 풀뿌리 조직과 지방 행정부 내에 존재하는 국가 내의 소규모 세력입니다." # 2454234012655598217
  ig_provincial_liberals: "지방 자유주의자" # 15038437651127770540
  ig_provincial_liberals_desc: "지방 자유주의자는 연합주의라는 개념이 시대에 뒤떨어졌다고 판단하여 정부에 대한 지지를 철회한 독트리네르-자유주의 분파입니다. 이들은 연합을 끝내고 단일한 자유주의 내각 구성과 반성직주의 개혁을 요구합니다. 소규모 세력이기 때문에 도시 자치구에서만 실질적인 영향력을 발휘합니다. 폴 드보가 이들 중 유명한 인물입니다." # 9364389498706933958
  ig_brussels_liberals: "브뤼셀 자유주의자" # 12328461317535056888
  ig_brussels_liberals_desc: "브뤼셀 자유주의자는 자유주의 의회와 헌법의 이상을 옹호하는 자유주의 파벌이며, 교육 문제에 대해서는 침묵을 지키고 노동 계급의 처우 개선 필요성에 의문을 제기합니다. 이 파벌은 피에르 테오도르 베르하겐이 이끄는 브뤼셀 자유주의 협회와 밀접하게 연관되어 있습니다." # 6504336256669157704
  from_opposition_to_unionism: "연합주의에 대한 반대" # 3456047733220132019
  ig_lamennaisians: "라므네주의자" # 10848449021381512296
