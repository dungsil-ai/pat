  je_bpm_modernizers_lobby: "#v Better Politics Mod에 의해 추가됨#!\n유럽과 아메리카의 국가들을 바라보면, 우리의 제도가 점점 더 시대에 뒤떨어지고 위태로워졌다는 사실이 명백해졌습니다. 이러한 결함을 가장 먼저 인지한 이들은 우리의 지식인들이었으며, 그들 사이에서 미래에 대한 상반된 비전을 제시하는 두 파벌이 나타났습니다: 바로 $bpm_je_all_modernizers_tt$와 $bpm_je_all_anti_modernizers_tt$입니다." # 439248799614477744
