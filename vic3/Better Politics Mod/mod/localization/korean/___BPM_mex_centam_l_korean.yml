l_korean:
  je_bpm_central_republic: "중앙집권 공화국" # 3112980121458985348
  je_bpm_central_republic_reason: "\"칠법\"이라 알려진 새로운 헌법이 시행된 지 겨우 1년이 지났습니다. 멕시코시티의 보수 기득권층이 작성하고 비준한 이 문서는 주들의 자치권을 폐지하고 단일 공화국을 지향하며, 다양한 조정 기관을 도입했습니다.\n\n이 헌법은 자유주의자들과 외곽 주 및 영토의 주민들에게 매우 인기가 없습니다. 보수파는 자신들의 권력을 빼앗기기 전에 중앙집권제의 장점을 증명해 보여야 합니다." # 4491625259785437498
