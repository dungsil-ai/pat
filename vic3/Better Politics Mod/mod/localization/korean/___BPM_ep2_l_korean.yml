l_korean:
  hog_is_modernizer_or_mitogaku_tt: "$bpm_hog_title_default_contextless$는 [GetIdeology('ideology_modernizer_leader').GetName] 또는 [GetIdeology('ideology_mitogaku').GetName] [concept_ideology]를 보유함" # 13976880849738363329
  traditionalist_shogun_warning_present_tt: "$bpm_hog_title_default_contextless$는 [GetIdeology('ideology_traditionalist').GetName] [concept_ideology]를 #b 가지고 있지#! 않습니다" # 13224822972986392445
  hog_is_imperious_tt: "$bpm_hog_title_default_contextless$는 [GetCharacterTrait('imperious').GetName] 특성을 보유함" # 14564377179661659499
  iesada_stays_heir_tt: "[SCOPE.sCharacter('iesada_scope').GetFullName]은(는) [ROOT.GetCountry.GetNameNoFlag]의 $bpm_character_role_protege$로 남을 것입니다" # 9283799743210208649
  bpm_voting_end_bakufu: "@information! 막부가 주요 개혁을 단행하지 않는다면, 민주적 선거는 #b 도쿠가와 가문의 몰락#을 초래할 것입니다!!" # 10881145152235751406
  bpm_amendment_samurai_democracy: "사무라이 민주주의" # 14579894361131632481
  bpm_amendment_samurai_democracy_desc: "사무라이 계급만이 선거에서 투표할 수 있습니다." # 3819288018432252692
  modifier_former_shogun: "평화로운 퇴진" # 6334087890728906069
  modifier_preparing_for_revolt: "막부를 수호하라!" # 4580890445681256598
  shogun_is_democrat_or_loyalists_marginalized: "쇼군이 민주주의를 지지하거나 [SCOPE.sPoliticalMovement('loyalist_movement_scope').GetName]의 지지도가 5% 미만입니다." # 3824752115565885867
  loyalists_not_marginalized: "[SCOPE.sPoliticalMovement('loyalist_movement_scope').GetName]의 지지도가 5% 이상입니다." # 15251190351319369732
  je_tenpo_crisis_reason: "1830년에 선포된 덴포, 즉 '천상의 보호' 시대는 처음에는 그 상서로운 이름에 걸맞은 듯 보였습니다. 그러나 [GetGeographicRegion('geographic_region_honshu').GetName]의 악천후는 곧 쌀값 폭등과 전국적인 기근을 불러왔고, [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]의 부와 영향력 증대는 기존의 [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] 질서를 위협하고 있습니다.\n\n한편, 지평선 너머에서는 서구의 [Concept('concept_great_power','$concept_great_powers$')]들이 더욱 대담해지고 있으며, 그들의 상선과 포함은 우리 해안에 더욱 가까이 다가오고 있습니다.\n\n이러한 문제들을 해결하고자 개혁 성향의 명망가들이 막부에 자신들의 비전을 제시했습니다.\n\n#tooltippable;tooltip:tenpo_reformer_tt #b 개혁파 의제#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_lax')] [ROOT.GetCountry.GetNameNoFlag]가 [GetLawType('law_lax_edo_system').GetName]를 제정함\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_bureaucrats')] [ROOT.GetCountry.GetNameNoFlag]가 [GetLawType('law_hereditary_bureaucrats').GetName]를 #b 제정하지 않음#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_urbanization')] [ROOT.GetCountry.GetNameNoFlag]가 #v 3#! 단계의 [GetBuildingType('building_urban_center').GetName]을 보유한 [Concept('concept_state', '$concept_states$')] #v 3#!개 보유\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_government')] 모든 [concept_bpm_ig_is_liberal] [concept_interest_group]가 [concept_government]에 참여 중\n#tooltippable;tooltip:tenpo_hardliner_tt #b 강경파 의제#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_strict')] [ROOT.GetCountry.GetNameNoFlag]가 [GetLawType('law_strict_edo_system').GetName]를 제정함\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_social_control')] [ROOT.GetCountry.GetNameNoFlag]가 [GetLawType('law_shinsengumi').GetName]를 제정함\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_rural')] [ROOT.GetCountry.GetNameNoFlag]가 #v 40#! 단계의 [GetBuildingType('building_rice_farm').GetName]을 보유함\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_liberals_marginalized')] 모든 [concept_bpm_ig_is_liberal] [concept_interest_group]가 [concept_marginalized] 상태임\n#tooltippable;tooltip:tenpo_shared_tt #b 공통 의제#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_famine')] #b 어떠한#! 자국 소유 [GetCulture('japanese').GetName] [concept_homeland] [concept_state]도 [concept_famine]을 겪지 않음\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_gdp')] [ROOT.GetCountry.GetNameNoFlag]가 @gdp!#v [Country.MakeScope.Var('tenpo_gdp_goal').GetValue|k0]#! 이상의 [Concept('concept_gdp', '$concept_gdp_short$')]를 보유함\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_army_size')] [ROOT.GetCountry.GetAdjectiveNoFlag] 육군 [concept_power_projection]이 #v 500#!을 초과함\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_naval_size')] 소유 [Concept('concept_state', '$concept_states$')] 내에 #v 10#! 단계 이상의 [GetBuildingType('building_naval_fortification').GetName]을 보유함" # 6912222821245170692
