  je_caudillo_progress_from_armed_forces_in_opposition: "모든 [concept_bpm_ig_is_anti_democratic] [concept_interest_group]가 [concept_in_opposition] 상태" # 10749936643770548676
  je_caudillo_progress_from_loved_politician: "$POPULARITY_LOVED$ [concept_politician]이 [GetLawType('law_autocracy').GetName], [GetLawType('law_oligarchy').GetName], [GetLawType('law_technocracy').GetName], [GetLawType('law_party_single').GetName], [GetLawType('law_military_junta').GetName]에 반대함" # 3065303811825743414
