l_korean:
  je_south_american_national_identity_emergence_reason: "[ROOT.GetCountry.GetName]이 스페인으로부터 독립함에 따라 전국적으로 민족주의의 기운이 싹트고 있습니다. 우리 국가가 미래로 나아감에 따라, 지식인들은 독특하고도 유일하게 [SCOPE.sCulture('new_national_culture').GetName]인 새로운 정체성을 확립하고자 합니다.\n\n다음 조건들은 우리의 #bold 국가 정체성#!을 발전시키는 과정에 도움이 될 것입니다:\n• [concept_in_government] 상태이거나 높은 [concept_clout]를 보유한, [GetLawType('law_repeatable_culture_promote_patriotic_values').GetName]을(를) 지지하는 [Concept('concept_interest_group','$concept_interest_groups$')]\n• 높은 [concept_war_support]를 유지 중인 진행 중인 [Concept('concept_war','$concept_wars$')]\n• 높은 [concept_occupancy]를 기록 중인 [GetBuildingType('building_university').GetName], [GetBuildingType('building_art_academy').GetName] 및 [GetBuildingType('building_government_administration').GetName] 건물\n• 높은 국가 [concept_prestige]\n• 비-[SCOPE.sCulture('old_national_culture').GetName] [Concept('concept_homeland','$concept_homelands$')]을(를) 소유하지 않음\n• [GetLawType('law_repeatable_culture_promote_patriotic_values').GetName] 제정\n\n이 #bold 민족적 각성#!의 진행도는 다음 달에 #tooltippable;tooltip:[Country.GetTooltipTag],je_south_american_national_identity_emergence_special_tooltip [Country.MakeScope.Var('national_identity_progress_var_next').GetValue|+=]#!만큼 증가할 것으로 예상됩니다.\n\n@warning! 이 [concept_journal_entry]를 완료하면 [ROOT.GetCountry.GetName]은(는) #bold 더 큰 범민족적 야망#!을 추구할 수 없게 됩니다." # 6481345770472575609
  je_south_american_national_identity_emergence_special_tooltip: "이 수치는 다음 요소들에 의해 결정됩니다:\n#variable [Country.MakeScope.Var('national_identity_progress_from_igs').GetValue|+=]#!: [GetLawType('law_repeatable_culture_promote_patriotic_values').GetName]을(를) 지지하는 [Concept('concept_interest_group','$concept_interest_groups$')]의 [concept_clout]로부터\n#variable [Country.MakeScope.Var('national_identity_progress_from_wars').GetValue|+=]#!: 진행 중인 [Concept('concept_war','$concept_wars$')]로부터\n#variable [Country.MakeScope.Var('national_identity_progress_from_universities').GetValue|+=]#!: [GetBuildingType('building_university').GetName], [GetBuildingType('building_art_academy').GetName] 및 [GetBuildingType('building_government_administration').GetName] 건물로부터\n#variable [Country.MakeScope.Var('national_identity_progress_from_prestige').GetValue|+=]#!: [concept_prestige]로부터\n#variable [Country.MakeScope.Var('national_identity_progress_from_homelands').GetValue|+=]#!: 비-[Concept('concept_primary_cultures','$concept_primary_culture$')] [Concept('concept_homeland','$concept_homelands$')] 소유로부터\n#variable [Country.MakeScope.Var('national_identity_progress_from_law').GetValue|+=]#!: [GetLawType('law_repeatable_culture_promote_patriotic_values').GetName]로부터\n#variable [Country.MakeScope.Var('national_identity_progress_var_add').GetValue|+=]#!: 기타 효과로부터" # 5981199685129434420
  TRIGGER_POLITICAL_MOVEMENT_SUPPORT: "지지율은 $COMPARATOR$ #variable $NUM|%0$#!" # 16781337983492929431
  TRIGGER_POLITICAL_MOVEMENT_SUPPORT_NOT: "지지율은 #bold 아닐세#!$COMPARATOR$ #variable $NUM|%0$#!" # 5863234796284833519
