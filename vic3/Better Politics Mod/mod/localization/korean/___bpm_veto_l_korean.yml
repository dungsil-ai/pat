  bpm_law_voting_veto_tooltip: "[GetPlayer.GetCustom('bpm_law_voting_final_phase_vetoer')]는 다음 조건에서 [concept_law]를 #P 수락#!하도록 강제됩니다: #indent_newline:4 \n[GetPlayer.GetCustom('bpm_law_voting_executive_must_pass')]#!\n\n그렇지 않은 경우, [GetPlayer.GetCustom('bpm_law_voting_final_phase_vetoer')]는 법안 지지도가 0보다 크면 #P 수락#!할 수 있습니다.\n현재 #v 법안 지지도#!: [GetPlayer.MakeScope.ScriptValue('bpm_law_enactment_executive_approval')|v+=0] #indent_newline:4 \n[GetPlayer.MakeScope.GetScriptValueDesc('bpm_law_enactment_executive_approval')]#!\n\n#yellow 운동#!이나 #yellow 혁명#!은 [GetPlayer.GetCustom('bpm_law_voting_final_phase_vetoer')]를 설득하여 법안을 통과시킬 수 있습니다.\n\n만약 [GetPlayer.GetCustom('bpm_law_voting_final_phase_vetoer')]가 법안을 #N 거부#!하면, 이를 지지하는 이익 집단에서 급진파가 발생하며, [GetPlayer.GetCustom('bpm_law_voting_final_phase_vetoer')]는 [concept_popularity]를 잃게 됩니다." # 8130098622659357467
  bpm_law_voting_veto_tooltip_header: "[GetPlayer.GetCustom('bpm_law_voting_final_phase_vetoer')]는 다음 조건에서 [concept_law]를 #P 수락#!하도록 강제됩니다:" # 17561276383970281366
