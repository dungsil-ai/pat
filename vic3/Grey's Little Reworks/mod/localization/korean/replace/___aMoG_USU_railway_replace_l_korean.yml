l_korean:
  alert_low_market_access_alert_hint: "[GetBuildingType('building_port').GetName] 또는 [GetBuildingType('building_usu_railway_line').GetName]을 건설하여 [concept_infrastructure]를 늘리거나, [GetDecreeType('decree_road_maintenance').GetName]와 같은 [Concept('concept_decree', '$concept_decrees$')]를 시행하거나, [SCOPE.GetRootScope.GetState.GetName]를 해외 [concept_market_capital]에 연결할 충분한 [GetGoods('merchant_marine').GetName]가 [concept_market]에 있는지 확인하여 [SCOPE.GetRootScope.GetState.GetName]의 [concept_market_access]를 개선할 수 있습니다." # 12484354745794373771
  je_indian_famines_button_relief_kitchens_desc: "비용은 많이 들지만, 기근에 대처하는 가장 논리적이고 아마도 가장 효과적인 방법은 굶주리는 사람들에게 단순히 식량을 제공하는 것입니다.\n\n하지만 이러한 지출은 재무부의 훌륭한 관리들에게 호감을 사기 어려울 것이며, 구호 활동의 효과는 국가 역량과 지역 기반 시설에 의해 제한될 것입니다.\n\n#bold 철도#!\n[concept_famine]을 겪고 있는 [Concept('concept_state','$concept_states$')]에 [GetBuildingType('building_usu_railway_line').GetName]이 존재하면 이 조치의 효과가 두 배가 됩니다." # 8470610940704367983
  every_state_suffers_following_modifier: "[concept_famine]으로 고통받는 모든 [concept_state]는 다음 수정치를 얻습니다:\n([GetBuildingType('building_usu_railway_line').GetName]을 보유하면 개선됨):" # 2220088374091405049
  je_indian_famines_button_work_camps_desc: "우리는 정부 보조금으로 살아가는 의존적인 계층을 만들지 않을 것입니다. 빈곤층이 스스로 식량을 구매할 수 있도록 생계를 유지할 수 있는 노동 수용소를 설치하십시오.\n\n#bold 철도#!\n[concept_famine]을 겪고 있는 [Concept('concept_state','$concept_states$')]에 [GetBuildingType('building_usu_railway_line').GetName]이 존재하면 이 조치의 효과가 두 배가 됩니다." # 11340845624326304925
  je_indian_famines_button_epidemic_control_desc: "기아와 영양실조가 근본적인 원인이지만, 대부분의 빈곤층은 역병이나 콜레라와 같은 질병으로 목숨을 잃습니다.\n\n대규모 예방 접종 및 엄격한 검역 체계를 도입함으로써 사망률의 최악의 증가세를 일부 상쇄할 수 있습니다.\n\n#bold 철도#!\n[concept_famine]을 겪고 있는 [Concept('concept_state','$concept_states$')]에 [GetBuildingType('building_usu_railway_line').GetName]이 존재하면 이 조치의 효과가 두 배가 됩니다." # 2152497702352203165
  je_india_railway_status: "인도를 연결하는 거대한 $building_usu_railway_line$ 네트워크를 건설하십시오." # 17363643906577192865
  delhi_calcutta_line_complete_tt: "#tooltippable #tooltip:indian_railway_delhi_calcutta_tt #bold 델리-캘커타 노선#! #!#!에 있는 모든 [Concept('concept_state_region','$concept_state_regions$')]이 $building_usu_railway_line$을 보유함" # 6163882293305590084
  allahabad_bombay_line_complete_tt: "#tooltippable #tooltip:indian_railway_allahabad_bombay_tt #bold 알라하바드-봄베이 노선#! #!#!에 있는 모든 [Concept('concept_state_region','$concept_state_regions$')]이 $building_usu_railway_line$을 보유함" # 13603229418723899981
  bombay_madras_line_complete_tt: "#tooltippable #tooltip:indian_railway_bombay_madras_tt #bold 봄베이-마드라스 노선#! #!#!에 있는 모든 [Concept('concept_state_region','$concept_state_regions$')]이 $building_usu_railway_line$을 보유함" # 10275448680390550451
  gujarat_bombay_line_complete_tt: "#tooltippable #tooltip:indian_railway_gujarat_bombay_tt #bold 구자라트-봄베이 노선#! #!#!에 있는 모든 [Concept('concept_state_region','$concept_state_regions$')]이 $building_usu_railway_line$을 보유함" # 9796251297374743366
  grunderzeit_possible_tt: "#bold 유럽#! 내 모든 #bold 독일#! [Concept('concept_country', '$concept_countries$')]의 #v 75%#! 이상이 [GetTechnology('mutual_funds').GetName]을 연구 완료하고 최소 1단계 이상의 [GetBuildingType('building_usu_railway_line').GetName]을 보유함 (현재 [GetGlobalVariable('grunderzeit_countries_percent').GetValue|v%0])" # 10151978854832996753
  atocha_railway_possible_tt: "[ROOT.GetCountry.GetNameNoFormatting]이(가) $STATE_NEW_CASTILE$ [Concept('concept_state_region','$concept_state_region$')]에 $building_usu_railway_line$을 보유함" # 5728085893466830720
