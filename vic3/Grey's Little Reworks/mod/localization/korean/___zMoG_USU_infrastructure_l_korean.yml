  canal_dividends.1.t: "운하 사고" # 6832597753355282384
  canal_dividends.1.d: "상선 한 척이 부주의로 운하에 좌초되어 통행로를 막았으며, 완전히 제거될 때까지 통행을 더욱 위험하게 만들고 있습니다." # 18297102562489661576
  canal_dividends.1.f: "거대한 상선이 운하에 반쯤 기울어진 채로 누워 있고, 선체에는 운하 벽과의 충돌로 생긴 깊은 상처가 나 있으며, 그 짐들은 수로를 따라 쏟아져 있습니다. 고급 장신구와 이국적인 상품들이 물에 떠다니며, 외국에서 온 값비싼 상품들이 물에 흠뻑 젖어 망가졌습니다.\n\n물가에는 선장이 두 손으로 얼굴을 감싼 채 서 있고, 그의 모자는 운하에 떠 있습니다. 그의 옆에는 회사 보험 대리인이 물에 젖어 손상된 선적 목록을 들고 이 모든 상황을 파악하려 애쓰고 있으며, 운하 관리원은 이 잔해를 치우는 데 몇 달이 걸릴 수 있다고 설명하려 하고 있습니다." # 2380332253409717558
  canal_dividends.1.1: "$expedition_events.542.a$" # 5894607929830287442
