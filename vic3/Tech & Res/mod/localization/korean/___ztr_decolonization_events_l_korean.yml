  ztr_decolonization.60.a: "말라위는 자유로워야 하오, 아마도 그들의 자원까지는 아닐 것이오..." # 11450594275739455499
  ztr_decolonization.60.b: "이것이 최후통첩이 아니라면, 왜 우리는 그것을 무시해서는 안 되는가?" # 15910782034003249635
  ztr_decolonization.61.t: "에스와티니 탈식민화" # 10597813588663783706
