  ztr_decolonization.61.a: "스와질란드는 자유로워야 하오, 아마도 그들의 자원까지는 아닐 것이오..." # 18253768459165442692
  ztr_decolonization.61.b: "이것이 최후통첩이 아니라면, 왜 우리는 그것을 무시해서는 안 되는가?" # 15910782034003249635
  ztr_decolonization.62.t: "레소토 탈식민화" # 3277214981545970747
