  ztr_decolonization.62.b: "이것이 최후통첩이 아니라면, 왜 우리는 그것을 무시해서는 안 되는가?" # 15910782034003249635
  ztr_decolonization.63.t: "말리 탈식민화" # 17061184605426069134
  ztr_decolonization.63.d: "말리의 직할령들이 #gold_value 독립#을 요구하며 더 강력한 현지 통치 체제 복원을 바라고 있습니다. 그들의 요구는 최후통첩은 아니나, 온 세상이 우리를 주시하고 있습니다. 선택은 간단합니다. 적응하거나, 제국을 유지하거나입니다." # 10733385083818586702
  ztr_decolonization.63.a: "말리는 자유로워야 하네, 아마도 그들의 자원이 아니라면..." # 3795664978239127054
  ztr_decolonization.63.b: "이것이 최후통첩이 아니라면, 왜 우리는 그것을 무시해서는 안 되는가?" # 15910782034003249635
  ztr_decolonization.64.t: "보츠와나의 비식민지화" # 5570846091113068873
  ztr_decolonization.64.d: "보츠와나의 직할령들이 #gold_value 독립#!을 요구하며 더 강력한 지방 통치를 복원하고자 합니다. 그들의 요구는 최후통첩은 아니지만, 전 세계가 우리를 주시하고 있습니다. 선택은 간단합니다. 적응하거나, 제국을 유지하거나 둘 중 하나입니다." # 8078586526572726614
  ztr_decolonization.64.a: "보츠와나는 자유로워야 하오, 아마도 그 자원들은 제외하고 말이오..." # 14688085518154330410
  ztr_decolonization.64.b: "이것이 최후통첩이 아니라면, 왜 우리는 그것을 무시해서는 안 되는가?" # 15910782034003249635
  ztr_decolonization.65.t: "짐바브웨의 탈식민지화" # 13672560402271471714
  ztr_decolonization.65.d: "짐바브웨의 직할령들이 #gold_value 독립#을 요구하며 더 강력한 지역 통치를 복원하고자 합니다. 그들의 요구는 최후통첩은 아니지만, 온 세상이 우리를 주시하고 있습니다. 선택은 간단합니다. 적응하거나, 제국을 유지하거나입니다." # 10439286424580667284
  ztr_decolonization.65.a: "짐바브웨는 자유로워야 하오, 아마도 그 자원들은 제외하고서라도..." # 8670911782221520161
  ztr_decolonization.65.b: "이것이 최후통첩이 아니라면, 왜 우리는 그것을 무시해서는 안 되는가?" # 15910782034003249635
  ztr_decolonization.66.t: "마다가스카르 비식민지화" # 8615854973510544658
  ztr_decolonization.66.d: "마다가스카르의 직할령들이 더 강력한 현지 통치를 복원하고자 #gold_value 독립#을 요구하고 있습니다! 그들의 요구는 최후통첩은 아니지만, 온 세상이 우리를 주시하고 있습니다. 선택은 간단합니다. 적응하든지, 아니면 제국을 유지하든지 말입니다." # 9351135505283758134
  ztr_decolonization.66.a: "마다가스카르는 자유로워야 한다, 아마도 그 자원들은 아닐지라도..." # 678054661460260526
  ztr_decolonization.66.b: "이것이 최후통첩이 아니라면, 왜 우리는 그것을 무시해서는 안 되는가?" # 15910782034003249635
  ztr_decolonization.67.t: "에티오피아의 탈식민화" # 6039043848769120244
  ztr_decolonization.67.d: "에티오피아의 직할 영토들이 더 강력한 지역 통치를 복원하고자 #gold_value 독립#을 요구하고 있습니다. 그들의 요구는 최후통첩은 아니지만, 전 세계가 우리를 주시하고 있습니다. 선택은 간단합니다. 적응하거나, 제국을 유지하거나 둘 중 하나입니다." # 17474633534864811783
  ztr_decolonization.67.a: "에티오피아는 자유로워야 하오, 아마도 그 자원들은 아닐지라도..." # 4708877760262277468
  ztr_decolonization.67.b: "이것이 최후통첩이 아니라면, 왜 우리는 그것을 무시해서는 안 되는가?" # 15910782034003249635
  ztr_decolonization.100.t: "탈식민지의 바람" # 6103616958838657657
  ztr_decolonization.100.d: "국제적 압력의 증대와 민족주의의 부상, 그리고 경직된 식민 정책 속에서 우리의 [concept_subject]인 [SCOPE.sCountry('subject_scope').GetName]은 점점 더 많은 #i 독립#!을 요구하고 있습니다. 세계적인 흐름이 변화하고 있으며, 우리는 새로운 질서에 적응할지 아니면 우리의 [Concept('concept_decolonization','식민')] 제국을 유지하기 위해 갈등을 감수할지 결정해야 합니다." # 11201543386820651322
  ztr_decolonization.100.a: "그들이 원하는 것을 들어주어 #gold_value 독립#!을 허용하십시오. 우리는 새로운 세계에 적응해야 합니다." # 4201492438509934476
  ztr_decolonization.100.b: "갈등의 가능성이 있더라도 제국을 유지해야 합니다." # 545604398068535136
  ztr_decolonization.101.t: "유엔의 탈식민지 요구" # 4796037210950613593
  ztr_decolonization.101.d: "[Concept('concept_united_nations','$concept_united_nations$')] #blue_value 총회#!는 그들의 [Concept('concept_un_decolonization_encouraged','$concept_un_decolonization_encouraged$')] 결의안에 따라 [ROOT.GetCountry.GetName]에 [SCOPE.sCountry('un_demand_subject').GetName]을 식민 통치에서 해방할 것을 공식적으로 요구했습니다. 우리의 #n 악명#!은 국제 사회의 분노를 샀으며, 세계가 우리의 대응을 기다리고 있습니다." # 16753330502048099789
  ztr_decolonization.101.a: "결의안을 준수하고 독립을 승인하십시오." # 2305806833885400817
  ztr_decolonization.101.b: "유엔에 저항하십시오. 우리는 명령받지 않을 것입니다." # 7940652669794799681
  ztr_decolonization.1.t: "탈식민지의 시대" # 1323662695752781723
  ztr_decolonization.1.d: "오랫동안 세계의 자연스러운 상태로 여겨졌던 #v 구 식민 질서#!가 깊은 균열을 보이기 시작했습니다.\n\n[concept_subject] 영토에서 #p 민족 자결#! 운동이 힘을 얻고 있습니다. 식민지 관리들은 불안이 커지고 있다고 보고하며, 해외 제국을 유지하는 데 드는 도덕적, 물질적 비용이 해가 갈수록 증가하고 있습니다.\n\n이제 문제는 #i 식민 시대#!가 끝날 것인가가 아니라, 얼마나 신속하게, 그리고 어떤 대가를 치르며 끝날 것인가입니다." # 9867922843942638073
  ztr_decolonization.1.f: "#italic 외세 지배의 시대가 저물고 있습니다. 세계의 식민지화된 민족들은 더 이상 기다리지 않을 것입니다.#!" # 888938147578858703
  ztr_decolonization.1.a: "변화의 바람이 불어오고 있습니다." # 16698243727361451680
  ztr_decolonization_phases.1.t: "교육받은 원주민" # 12468798667807848899
  ztr_decolonization_phases.1.d: "우리 대학에서 교육받고 우리 언어에 능통한 [SCOPE.sCulture('native_culture_scope').GetName] 지식인이 [SCOPE.sState('decolonizing_state').GetName]에서 우리가 옹호한다고 주장하는 자유의 원칙을 인용하며 자치를 요구하는 논문을 발표했습니다. 이 저작물은 원주민 엘리트들 사이에서 유포되고 있으며, 그 논리는 반박하기 매우 곤란할 정도입니다.\n\n현지 행정부는 지침을 기다리고 있습니다: 그 사상들과 대화할 것인가, 아니면 더 넓은 대중에게 퍼지기 전에 침묵시킬 것인가." # 15362183575929911831
  ztr_decolonization_phases.1.a: "대화하십시오! 그들의 주장에는 답변할 가치가 있습니다." # 5896868571772179826
  ztr_decolonization_phases.1.b: "출판물이 퍼지기 전에 탄압하십시오." # 9761910160541340649
  ztr_decolonization_phases.2.t: "선교사와 양심" # 2865092051494988153
  ztr_decolonization_phases.2.d: "#v 선교사#!들이 [SCOPE.sCountry('missionary_subject').GetName]에서 돌아와 원주민들이 겪는 참혹한 상황, 즉 강제 노동, 질병, 조직적인 방치에 대한 보고서를 발표하여 우리 대중이 읽을 수 있도록 공개했습니다. 교회 회보와 대도시 신문에 재게재된 그들의 편지는 커지는 양심의 위기를 불러일으켰습니다.\n\n의회는 이러한 아우성을 무시할 수 없습니다. 노예제 폐지론자 단체와 인도주의 연맹은 공식적인 대응을 요구하고 있습니다." # 13330404714165759082
  ztr_decolonization_phases.2.a: "식민지 상황에 대한 공식 조사를 위임하십시오." # 10350084732074330312
  ztr_decolonization_phases.2.b: "보고서를 선교사들의 과장으로 치부하십시오." # 10143699050188586050
  ztr_decolonization_phases.3.t: "조국의 노래" # 3448632979839810999
  ztr_decolonization_phases.3.d: "[SCOPE.sState('songs_state').GetName]에서 문화 부흥의 움직임이 일고 있습니다. [SCOPE.sCulture('native_culture_scope').GetName] [Concept('concept_culture','$concept_cultures$')]의 민요와 전통 무용, 구전 역사가 시장 광장과 결혼식, 그리고 군인이 지나갈 때면 침묵이 흐르는 심야의 모임에서 새로운 열기로 공연되고 있습니다.\n\n외부인에게는 단순한 향수로 보이는 것이 식민지 행정부에게는 저항의 첫 번째 언어이며, 정치적 요구가 곧 구체화될 수 있는 공유된 정체성입니다." # 18298024522295995508
  ztr_decolonization_phases.3.a: "민속은 무해합니다: 그들이 노래하게 두십시오." # 17715434275077507030
  ztr_decolonization_phases.3.b: "이러한 체제 전복적 모임을 금지하십시오." # 10054780880121595758
  ztr_decolonization_phases.4.t: "시장의 속삭임" # 16863617314684408299
  ztr_decolonization_phases.4.d: "[SCOPE.sCountry('whispers_subject').GetName]에서 들어온 첩보에 따르면 지하 #v 민족주의 네트워크#!가 조용히 형성되고 있습니다. 시장에서의 비밀 회합, 무역 서신에 숨겨진 암호, 그리고 밀실에서 맹세한 연대의 서약 등이 그 증거입니다. 조직책을 한 명 체포할 때마다 두 명이 그 자리를 대신하는 듯합니다.\n\n운동은 아직 취약하지만, 시간이 지날수록 그 뿌리는 깊어지고 있습니다. 식민지 경찰은 결단을 권고합니다. 지금 온건파와 대화에 나서거나, 너무 늦기 전에 감시망을 강화하십시오." # 17313053551791170555
  ztr_decolonization_phases.4.a: "온건파와 비공식 대화를 시작하여 권리를 확대하십시오." # 9640404737571227369
  ztr_decolonization_phases.4.b: "감시망을 강화하십시오. 대화를 하기엔 너무 늦었습니다." # 6367044023334319427
  ztr_decolonization_phases.5.t: "정식 청원" # 9472156034110151821
  ztr_decolonization_phases.5.d: "[SCOPE.sCountry('petition_subject').GetName]의 #v 식민지 엘리트#! 대표단이 자치권을 요구하는 공식 청원서를 제출했습니다. 흠잡을 데 없는 법률적 언어로 작성된 이 청원서는 전시의 충성심, 경제적 기여, 그리고 [ROOT.GetCountry.GetName]가 옹호한다고 공언하는 민주주의 원칙을 거론하고 있습니다.\n\n이는 단순한 폭도들의 요구가 아닙니다. 지위가 높은 이들의 신중한 주장이며, 단순히 묵살할 수 없습니다. 이 요구를 들어주는 것은 선례가 될 것이며, 거부하는 것은 우리가 파트너로 삼아야 할 온건파를 급진화할 위험이 있습니다." # 1347746767650600689
  ztr_decolonization_phases.5.a: "점진적 개혁을 약속하십시오. 온건파를 우리 편으로 유지해야 합니다." # 2951176927842909778
  ztr_decolonization_phases.5.b: "청원을 거부하십시오." # 6482627460786825180
  ztr_decolonization_phases.6.t: "식민지 노동자 파업" # 10074622912201954802
  ztr_decolonization_phases.6.d: "[SCOPE.sState('strike_state').GetName]의 부두와 철도 야적장이 침묵에 잠겼습니다. 하역 인부, 광부, 철도 노동자들이 조직적인 파업을 위해 도구를 내려놓았습니다. 그들의 요구는 임금을 넘어섭니다. 그들은 정치적 대표성과 식민지 노동 체제의 종식을 원합니다.\n\n수출품은 부두에서 썩어가고 있습니다. 식민지 경제는 멈춰 서고 있으며, 파업 참가자들은 물러설 기미를 보이지 않습니다. 현지 수비대가 명령을 기다리고 있습니다." # 11470755914006959739
  ztr_decolonization_phases.6.a: "사태가 더 확산되기 전에 협상하십시오." # 16953172589877709495
  ztr_decolonization_phases.6.b: "경찰력을 투입하여 파업을 진압하십시오." # 10448164841288534085
  ztr_decolonization_phases.7.t: "국제 무대" # 2447126012217235586
  ztr_decolonization_phases.7.d: "[SCOPE.sCountry('intl_subject').GetName]의 대표단이 [Concept('concept_united_nations','$concept_united_nations$')] #blue_value 총회#!에서 [ROOT.GetCountry.GetName]의 식민 통치에 대한 규탄 연설을 했습니다. 전 세계의 대표들은 숨길 수 없는 동정심으로 귀를 기울였고, 국제 언론은 이 광경을 대서특필하고 있습니다.\n\n경쟁국들은 기회를 엿보고 있습니다. 식민지 문제는 순전히 국내 문제라는 안일한 허구는 무너지고 있으며, 우리의 평판이 위태로운 상황입니다." # 13146920901455308059
  ztr_decolonization_phases.7.a: "피해를 최소화하는 것이 필수적입니다." # 8703644222454316628
  ztr_decolonization_phases.7.b: "대표단을 외세의 간섭이라며 비난하십시오." # 12622697080973539945
  ztr_decolonization_phases.8.t: "원주민 언론" # 17303477339659059510
  ztr_decolonization_phases.8.d: "[SCOPE.sState('press_state').GetName]에서 자국어 신문 네트워크가 등장했습니다. 저렴한 종이에 인쇄되어 찻집, 독서실, 마을 광장을 통해 손에서 손으로 배포되고 있습니다. 그들의 사설은 민족, 존엄성, 독립을 언급하며 식민지 정책을 외과 수술처럼 정밀하게 분석합니다.\n\n식민지 검열관은 그 속도를 따라가지 못합니다. 탄압을 시도할 때마다 독자층은 늘어날 뿐이며, 더 날카롭고 대담하며 타협을 거부하는 새로운 세대의 자국 지식인들이 자신들의 발언대를 찾았습니다." # 2938928568323307794
  ztr_decolonization_phases.8.a: "언론이 안전판 역할을 할 수 있으니 용인하십시오." # 9684920613929869996
  ztr_decolonization_phases.8.b: "인쇄소를 폐쇄하고 편집자들을 체포하십시오." # 18100330469450275648
  ztr_decolonization_phases.9.t: "극단주의의 부상" # 7787782666610527179
  ztr_decolonization_phases.9.d: "[SCOPE.sState('extremism_state').GetName] 전역에 종교적 열풍이 불고 있습니다. 수년간의 외세 통치로 단련된 젊은이들이 독립을 위한 투쟁을 철저히 종교적인 관점에서 해석하는 급진적 설교자들에게 의지하고 있습니다. #v 이교도 점령군#!을 몰아내라는 외침은 매달 더 커지고 있으며, 이 운동은 온건한 정치적 담론의 잔재마저 압도하려 합니다.\n\n행정관들은 이것이 더 이상 단순한 민족주의의 문제가 아니라 #v 성전#!이 되어가고 있다고 경고합니다." # 12658142652035176189
  ztr_decolonization_phases.9.a: "사태가 악화되기 전에 반(反)극단주의 프로그램을 지원하십시오." # 12168613355223943214
  ztr_decolonization_phases.9.b: "성난 설교보다 더 시급한 현안들이 있습니다." # 2613615473561287807
  ztr_decolonization_phases.10.t: "분열된 사회" # 15512486392621547213
  ztr_decolonization_phases.10.d: "[SCOPE.sState('apartheid_state').GetName]에서는 우리의 식민 통치를 지탱하던 민족적 분열이 더욱 추악한 형태로 굳어지고 있습니다. 도시는 분리된 구역으로 나뉘었습니다. 공공 서비스, 직업 기회, 심지어 시장에 대한 접근성까지도 [SCOPE.sCulture('primary_culture_scope').GetName]와 얼마나 닮았느냐에 따라 결정됩니다. 국제 사회의 관찰자들이 주목하기 시작했으며, [ROOT.GetCountry.GetAdjective] 통치에 대한 비판이 거세지고 있습니다.\n\n우리는 선택의 기로에 서 있습니다. 길고 고통스러운 개혁의 길을 걷거나, 비판자들의 입을 막고 체제를 더욱 공고히 하는 것입니다." # 1005064041751530890
  ztr_decolonization_phases.10.a: "비판을 수용하고 늦기 전에 개혁을 시작한다." # 5734342692359063165
  ztr_decolonization_phases.10.b: "분리 정책을 강화한다. 질서는 유지되어야 한다." # 827803983350990190
  ztr_decolonization_phases.11.t: "인구 폭발" # 11194675320338952810
  ztr_decolonization_phases.11.d: "현대 의학이 [SCOPE.sState('boom_colonial_state').GetName]에 도달했고, 그 결과는 놀랍습니다. 기본적인 위생 시설이 보급되면서 영아 사망률이 급감했지만, 출생률은 여전히 높습니다. 인구를 억제하던 과거의 요인들이 사라졌음에도 대가족을 꾸리는 관습은 그대로 남아 있습니다.\n\n인구 통계학자들은 우리 식민지 영토 전역에서 인구가 급격히 증가할 것으로 예상하는 반면, [ROOT.GetCountry.GetAdjective] 본국은 이를 따라잡기 위해 고군분투하고 있습니다. 제국의 산술이 변화하고 있습니다. 먹여 살려야 할 입은 늘어나고, 미래가 없는 젊은이들은 많아지며, 식민지 행정부가 감당하도록 설계되지 않은 불균형이 커지고 있습니다." # 6428806919813583937
  ztr_decolonization_phases.11.a: "식민지에 산아 제한 조치를 시행한다." # 3848846941765192163
  ztr_decolonization_phases.11.b: "자연의 섭리에 맡긴다. 우리가 신의 역할을 할 수는 없다." # 1732538091524088462
  ztr_decolonization_phases.12.t: "속령 인구 급증" # 9629580577086023540
  ztr_decolonization_phases.12.d: "[SCOPE.sCountry('boom_subject').GetName]에서 극적인 인구 붐이 일어나고 있습니다. 공중 보건의 발전으로 사망률은 급격히 감소했지만, 출생률은 완고하게 높습니다. 인구는 지역 경제가 수용할 수 있는 속도보다 빠르게 증가하고 있으며, 이는 식민지 식량 공급에 부담을 주고 기반 시설을 압도하며, 미래가 없는 불안한 젊은 세대를 양산하고 있습니다.\n\n식민지 행정부 내 일부는 성장을 억제하기 위한 직접적인 개입을 주장하지만, 다른 이들은 그러한 조치가 오히려 우리가 방지하고자 하는 불안을 야기할 것이라고 경고합니다." # 6712007766227748076
  ztr_decolonization_phases.12.a: "인구를 통제하고 불안을 방지하기 위해 출산 제한을 시행한다." # 5019723630384611138
  ztr_decolonization_phases.12.b: "인구가 자유롭게 성장하도록 둔다." # 1530756051085536210
  colony_pop.2.t: "식민지 인구 구조 변화" # 10851206252757220102
  colony_pop.2.d: "우리 식민지 영토 전역에서 조용한 혁명이 진행 중입니다. 깨끗한 물 공급 프로그램, 기본적인 예방 접종 캠페인, 위생 개선과 같은 초기 공중 보건 조치들이 원주민 인구의 사망률을 낮추기 시작했습니다. 그 효과는 미미하지만 분명합니다. 영아기를 넘기는 아이들이 많아지고, 생산 연령에 도달하는 노동자가 늘어나며, 인구가 꾸준히 증가하고 있습니다.\n\n더 적고 분산된 인구를 다스리기 위해 설계된 식민지 기구는, 머지않아 자신이 통제하기 위해 만들어진 바로 그 사람들에 의해 압도당할지도 모릅니다." # 11482228472343155633
  ztr_decolonization_phases_11_a_effect_tt: "일부 [Concept('ztr_concept_colonial_state','$ztr_concept_colonial_states$')] 인구가 #v 20년#! 동안 약간 더 빠르게 성장합니다." # 13362463891256240059
  ztr_decolonization_phases_11_b_effect_tt: "일부 [Concept('ztr_concept_colonial_state','$ztr_concept_colonial_states$')] 인구가 #v 20년#! 동안 더 빠르게 성장합니다." # 3788454491996450320
  ztr_decolonization_phases_12_a_effect_tt: "일부 [concept_subject] 인구가 #v 20년#! 동안 약간 더 빠르게 성장하고 #gold_value 자유 열망#!이 #n 10#! 증가합니다." # 12958191390208927970
  ztr_decolonization_phases_12_b_effect_tt: "일부 [concept_subject] 인구가 #v 20년#! 동안 더 빠르게 성장합니다." # 15068891164592752221
  colony_pop_2_a_effect_tt: "일부 #v 식민지 주#! 인구가 #v 5년#! 동안 더 빠르게 성장합니다." # 10662780737091349664
  colony_pop_3_a_effect_tt: "일부 [concept_subject] 인구가 #v 20년#! 동안 더 빠르게 성장합니다." # 15068891164592752221
  ztr_decolonization.2.d_phase2: "#v 튀니지#! 유력 인사들의 또 다른 청원서가 식민지 사무국에 도착하여 더 큰 현지 대표성을 요구하고 있습니다. 총독은 이것이 특별한 주의를 기울일 필요가 없는 일상적인 문제라고 확언합니다. 마그레브에서의 우리의 입지는 여전히 확고합니다." # 8401528570358975939
  ztr_decolonization.3.d_phase2: "#v 알제리#! 시민 지도자들이 식민지 행정 개혁을 요구하는 각서를 제출했습니다. 부처는 이를 사소한 관료적 형식으로 간주합니다. #v 알제리#!는 오랫동안 제국의 필수적인 일부였습니다. 이러한 요청을 진지하게 고려할 이유는 없습니다." # 14632556170508168625
  ztr_decolonization.4.d_phase2: "#v 모로코#! 대표단이 보호령 체제 내에서 더 큰 #gold_value 자치권#!을 요구하는 청원을 올렸습니다. 수도의 관리들은 이를 영향력을 얻으려는 현지 엘리트들의 허세로 보고 있습니다. 술탄은 여전히 협조적이며, 보호령은 확고하게 장악되어 있습니다." # 3669837020482844620
  ztr_decolonization.5.d_phase2: "#v 리비아#!의 지역 유력 인사들이 행정 개혁과 더 큰 현지 참여를 요구하는 청원서를 전달했습니다. 식민지 관리들은 이 요청을 조용한 영토에서 나온 사소한 성가심일 뿐인 평범한 것으로 간주합니다. #v 리비아#! 지방은 여전히 잘 통제되고 있습니다." # 3405331151221524962
  ztr_decolonization.6.d_phase2: "#v 이집트#! 민족주의자들이 현행 협정의 개정을 요구하는 탄원서를 또다시 제출했습니다. 외무부는 이를 대중에게 어필하려는 카이로 정치인들의 일상적인 허세로 간주합니다. 수에즈 운하를 따라 형성된 우리의 전략적 이익은 여전히 완벽하게 안전합니다." # 18227444727113388470
  ztr_decolonization.7.d_phase2: "#v 수단#! 시민 지도자 위원회가 영토 행정에 있어 더 큰 발언권을 요구하는 청원을 올렸습니다. 관리들은 이를 제국의 먼 구석에서 나온 중요하지 않은 제스처로 봅니다. 앵글로-#v 이집트#! 협정은 심각한 도전 없이 유지되고 있습니다." # 14306476688091095531
  ztr_decolonization.8.d_phase2: "#v 아라비아#! 전역의 부족 지도자들이 우리의 보호령 체제로부터 더 큰 자치권을 요구하는 전갈을 보내왔습니다. 식민지 사무국은 시급성을 느끼지 못합니다. #v 아라비아#! 내륙은 항상 느슨하게 관리되어 왔기 때문입니다. 우리의 해안 및 전략적 위치는 위협받지 않고 있습니다." # 1801166360780528680
  ztr_decolonization.9.d_phase2: "#v 오만#!의 술탄이 우리의 조약 의무 범위와 그것이 #v 오만#!의 #gold_value 주권#!에 미치는 영향에 대해 의문을 제기했습니다. 우리 외교관들은 이를 일상적인 재협상 전술로 간주합니다. 관계는 여전히 원만하며 해안을 따라 형성된 우리의 영향력은 의심할 여지가 없습니다." # 3938336745110537811
  ztr_decolonization.10.d_phase2: "#v 예멘#! 지도자들이 아덴과 그 배후지에 대한 우리의 보호령 조건에 의문을 제기하는 공식 요청서를 보냈습니다. 식민지 사무국은 이를 표준적인 행정 질의로 취급합니다. 아덴 항은 여전히 중요하며 그곳에서의 우리의 입지는 확고합니다." # 14691204282304543364
  ztr_decolonization.11.d_phase2: "#v 휴전 오만#!의 셰이크들이 그들의 문제에 대한 우리의 자문 역할 범위에 대해 우려를 표명했습니다. 관리들은 이를 더 나은 조약 조건을 얻기 위한 전형적인 책략으로 치부합니다. 걸프 해안을 따른 협정은 여전히 우리의 이익에 잘 부합하고 있습니다." # 5696029523664676965
  ztr_decolonization.12.d_phase2: "#v 페르시아#! 관리들이 우리의 이권과 세력권 조건에 대해 항의를 재개했습니다. 외무부는 이를 주기적인 불평 의식으로 간주합니다. #v 페르시아#!에서의 우리의 상업적, 전략적 이익은 여전히 잘 보호받고 있습니다." # 14300972398396133534
  ztr_decolonization.13.d_phase2: "#v 버마#! 정치 협회들이 더 큰 입법 대표성을 요구하는 청원서를 제출했습니다. 식민지 관리들은 이를 랑군의 소수 목소리 큰 자들의 익숙한 선동으로 간주합니다. #v 버마#!의 행정은 기존 협정 하에 순조롭게 진행되고 있습니다." # 5137540171901267486
  ztr_decolonization.14.d_phase2: "#v 시암#! 외교관들이 우리의 치외법권 협정과 세력권 조건에 대해 이의를 제기했습니다. 외무부는 이를 방콕의 일상적인 허세로 봅니다. #v 시암#! 내 우리의 자문 지위와 조약상의 권리는 잘 확립되어 있습니다." # 4580090430851445452
  ztr_decolonization.15.d_phase2: "#v 라오스#!의 현지 관리들이 식민지 체제로부터 더 큰 자치권을 요구하는 마을 지도자들의 청원서를 전달했습니다. 총독부 사무국은 이를 사소한 지역 문제로 간주합니다. #v 라오스#!에 대한 보호령은 이미 해결된 문제입니다." # 11206592669792621470
  ztr_decolonization.16.d_phase2: "#v 베트남#! 지식인들이 식민지 교육 및 통치 체제의 개혁을 요구하는 청원서를 돌렸습니다. 하노이의 관리들은 이를 들뜬 도시 계층의 예상 가능한 선동으로 취급합니다. 인도차이나의 행정은 여전히 탄탄한 기반 위에 있습니다." # 972301816515012078
  ztr_decolonization.17.d_phase2: "#v 캄보디아#! 유력 인사들이 보호령 내에서 더 큰 왕실 권위의 회복을 청원했습니다. 최고 거주관은 이를 중대한 양보를 할 필요가 없는 사소한 조정 요청으로 간주합니다. #v 캄보디아#!에 대한 보호령 체제는 완벽하게 안정적입니다." # 4662329498380590772
  ztr_decolonization.18.d_phase2: "#v 인도 국민회의#!가 부왕 사무실에 또 한 차례의 헌법적 요구 사항을 제출했습니다. 식민지 행정부는 이를 민족주의적 수사의 익숙한 합창으로 간주합니다. #v 인도#!는 여전히 제국의 보석이며, #v 라지#!는 계속될 것입니다." # 2787705172158894246
  ztr_decolonization.19.d_phase2: "#v 한국#! 문화 협회들이 식민지 체제 내에서 교육 및 언어적 권리의 회복을 청원했습니다. 총독부 사무국은 이를 평정된 영토에서 나오는 관리 가능한 반대로 봅니다. #v 한국#!에 대한 우리의 행정은 확고하게 확립되어 있습니다." # 8749955689396655008
  ztr_decolonization.20.d_phase2: "#v 일본#! 외교관들이 자국 내 불평등 조약과 외국 이권 조건에 대해 공식적으로 항의했습니다. 외무부는 이를 야심 차지만 억제된 국가로부터 나오는 반복적인 형식으로 취급합니다. #v 일본#! 내 우리의 치외법권은 여전히 유효합니다." # 18065625367389983625
  ztr_decolonization.21.d_phase2: "#v 중국#! 관리들이 이권 조약의 개정과 조차지 반환 요구를 재개했습니다. 외무부는 이를 분열된 국가로부터 나오는 표준적인 외교적 허세로 봅니다. 우리의 이권과 조약 항구는 여전히 안전하며 수익성이 높습니다." # 8318729520654622605
  ztr_decolonization.22.d_phase2: "#v 아프가니스탄#!의 부족 지도자들이 국경 지역과 외교 정책에 대한 우리의 영향력에 항의하는 사절을 보냈습니다. 정치 담당관은 이를 일상적인 국경 지대의 허세로 간주합니다. #v 아프가니스탄#!의 완충국 지위와 통로에 대한 우리의 통제권은 변함없습니다." # 15197440301780746275
  ztr_decolonization.23.d_phase2: "#v 말레이#! 정치 협회들이 해협 식민지와 연방 주 행정에 대한 원주민의 더 많은 참여를 요구하는 청원을 제출했습니다. 싱가포르의 관리들은 이 요청을 시기상조이며 비현실적이라고 생각합니다. #v 말라야#!에서의 우리의 입지는 확고합니다." # 15347132348484735271
  ztr_decolonization.24.d_phase2: "#v 네팔#! 관리들이 우리 주재관의 권한 범위와 조약 관계 조건에 대해 의문을 제기했습니다. 외무부는 이를 사소한 외교적 조정 요청으로 간주합니다. 협력적인 완충국으로서 #v 네팔#!의 지위는 확고히 유지되고 있습니다." # 6468517232958743657
  ztr_decolonization.25.d_phase2: "#v 부탄#! 관리들이 대외 문제와 관련한 우리 조약 협정의 특정 조항에 대해 정중하게 의문을 제기했습니다. 정치 담당관은 이를 조용하고 협력적인 이웃 국가가 보내온 사소한 형식적인 절차로 간주합니다. #v 부탄#!과의 관계는 아무런 우려 없이 진행되고 있습니다." # 17973305209437763593
  ztr_decolonization.26.d_phase2: "#v 티베트#! 당국이 행정 및 종교 문제에 대한 우리의 간섭에 반대한다는 의사를 전달했습니다. 정치 사무소는 이를 외딴 고원 지대에서 온 중요하지 않은 항의로 간주합니다. #v 티베트#!에 대한 우리의 전략적 입지는 변함이 없습니다." # 10821397769209887495
  ztr_decolonization.27.d_phase2: "#v 뉴질랜드#! 정치인들이 왕실과의 헌법적 관계와 자치권의 범위에 대해 의문을 제기했습니다. 식민지청은 이를 익숙한 자치령의 태도로 간주합니다. 태평양 전역에 걸친 제국의 유대는 여전히 강력합니다." # 10546823382578796036
  ztr_decolonization.28.d_phase2: "#v 이라크#! 민족주의자들이 우리의 위임 통치 조건과 군사 주둔에 항의하는 각서를 제출했습니다. 고등판무관은 이를 바그다드 정치인들의 일상적인 불만으로 간주합니다. 메소포타미아와 그곳의 석유에 대한 우리의 전략적 이익은 여전히 잘 보호되고 있습니다." # 16072334799896740194
  ztr_decolonization.29.d_phase2: "#v 시리아#! 정치 지도자들이 위임 통치 당국에 #gold_value 자치#!를 향한 시간표를 청원했습니다. 고등판무관은 이를 다마스쿠스 엘리트들의 시기상조인 선동으로 간주합니다. #v 시리아#!에 대한 위임 통치는 중단 없이 본래의 목적을 수행하고 있습니다." # 6868522356762075218
  ztr_decolonization.30.d_phase2: "#v 레바논#! 정치인들이 위임 통치 행정부로부터 더 많은 자치를 요구하는 요청서를 제출했습니다. 관리들은 이를 베이루트의 파벌 정치인들 사이에서 흔히 있는 책략으로 간주합니다. #v 레바논#!에 대한 위임 통치 체제는 여전히 질서 정연하고 기능적입니다." # 6814919319003814924
  ztr_decolonization.31.d_phase2: "#v 트란스요르단#! 지도자들이 우리 위임 통치 하에서 에미레이트의 장기적인 지위에 대해 의문을 제기했습니다. 영국 주재관은 이를 즉각적인 조치가 필요 없는 정중한 외교적 문의로 간주합니다. 에미레이트는 여전히 안정적이고 협력적인 영토로 남아 있습니다." # 15163555708176489418
  ztr_decolonization.32.d_phase2: "#v 팔레스타인#!의 #v 아랍#! 및 #v 유대인#! 공동체 지도자들이 각각 위임 통치 당국에 상충하는 요구 사항을 청원했습니다. 고등판무관은 두 사안 모두 세심한 관료적 관리가 필요한 익숙한 불만 사항으로 처리합니다. 위임 통치 행정부는 계속해서 균형을 유지하고 있습니다." # 2151674505648613218
  ztr_decolonization.33.d_phase2: "#v 쿠르드#! 부족 지도자들이 위임 통치 체제 내에서 자신들의 독특한 행정적 지위를 인정해 달라고 청원했습니다. 관리들은 이를 후원을 바라는 산악 공동체로부터의 국지적인 요청으로 간주합니다. 더 넓은 위임 통치 체제에는 영향이 없습니다." # 17164998310967071629
  ztr_decolonization.34.d_phase2: "#v 케냐#! 정치 협회들이 토지 개혁과 입법 의회에서의 더 많은 대표성을 요구하는 청원서를 제출했습니다. 식민지 총독은 이를 나이로비의 교육받은 계층으로부터 나오는 관리 가능한 선동으로 간주합니다. 식민지 행정은 중단 없이 진행됩니다." # 11174913265967170118
  ztr_decolonization.35.d_phase2: "#v 나미비아#!의 지역 지도자들이 토지 불만 사항의 시정과 더 많은 정치적 인정을 청원했습니다. 영토 행정부는 이를 인구 밀도가 낮은 위임 통치 지역에서 오는 사소한 성가심으로 간주합니다. 해당 영토에 대한 우리의 권위는 의심의 여지가 없습니다." # 3042092762103257962
  ztr_decolonization.36.d_phase2: "#v 소말리아#! 부족 지도자들이 우리 보호령의 경계와 행정에 대해 이의를 제기했습니다. 식민지 관리들은 이를 다루기 힘든 국경 지역에서 오는 일상적인 부족의 불만으로 처리합니다. 보호령은 아프리카의 뿔을 따라 전략적 목적을 수행합니다." # 9815529796109415373
  ztr_decolonization.37.d_phase2: "#v 에리트레아#! 공동체 지도자들이 우리 행정 하에서 해당 영토의 미래 지위에 대한 명확한 설명을 청원했습니다. 식민지 관리들은 이를 특별할 것 없는 행정적 문의로 간주합니다. 해당 영토는 특별한 주의가 필요 없는 조용한 전초 기지로 남아 있습니다." # 17346440687494331696
  ztr_decolonization.38.d_phase2: "#v 차드#!의 전통 지도자들이 해당 영토 내 식민지 세금과 징병 규모에 관한 우려를 전달했습니다. 식민지 총독은 이를 광대하고 행정력이 미치기 어려운 지역에서 나오는 전형적인 불만으로 일축합니다. #v 차드#!은 여전히 조용한 오지로 남아 있습니다." # 11423346290351138458
  ztr_decolonization.39.d_phase2: "#v 니제르#!의 추장들이 자신들의 전통적인 토지와 무역로에 대한 식민지 당국의 권한 범위에 대해 우려를 제기했습니다. 부총독은 이를 사헬 지대에서 나오는 일상적인 웅성거림으로 간주합니다. 해당 영토는 주목할 만한 행정적 문제를 제시하지 않습니다." # 8695584073164395822
  ztr_decolonization.40.d_phase2: "#v 모리타니#!의 에미르들이 자신들의 영토와 무역망에 대한 우리의 행정 조건에 의문을 제기했습니다. 식민지 관리들은 이를 사막 변두리에서 오는 사소한 태도로 간주합니다. #v 모리타니#! 식민지는 여전히 우리의 조용한 감독 하에 확고히 유지되고 있습니다." # 1046582585265145702
  ztr_decolonization.41.d_phase2: "#v 세네갈#!의 4개 코뮌 구성원을 포함한 정치 인사들이 식민지 전역에 걸친 정치적 권리 확대를 청원했습니다. 총독은 이를 다카르의 익숙한 도시 정치로 간주합니다. 우리의 서아프리카 행정은 여전히 철저하게 확립되어 있습니다." # 10371651342220005924
  ztr_decolonization.42.d_phase2: "#v 기니#! 지역 사회 지도자들이 식민지 행정부에 더 큰 경제적 자유와 현지 대표권을 요구하는 청원을 제출했습니다. 코나크리의 관리들은 이를 사소한 지역 문제로 치부하고 있습니다. 이 식민지는 우리 서아프리카 연방의 생산적이고 질서 정연한 일부로 남아 있습니다." # 16419164146233771435
  ztr_decolonization.43.d_phase2: "#v 이보아르#!의 농장주와 추장들이 식민지 내 강제 노동 및 무역 독점 조건에 대해 이의를 제기했습니다. 식민지 총독은 이러한 불만을 생산적인 영토를 관리하는 과정에서 발생하는 일상적인 일로 간주합니다. #v 코트디부아르#!는 여전히 가치 있는 경제적 자산입니다." # 18283159682567011772
  ztr_decolonization.44.d_phase2: "#v 골드코스트#!의 지식인과 추장들이 헌법 개정과 더 큰 원주민 대표권을 요구하는 청원을 제출했습니다. 총독은 이를 아크라의 교육받은 엘리트층으로부터 예상할 수 있는 선동으로 간주합니다. 이 식민지는 서아프리카에서 가장 번영하고 안정적인 지역 중 하나로 남아 있습니다." # 13796157603388515911
  ztr_decolonization.45.d_phase2: "#v 토고#!의 지도자들이 위임통치 당국에 영토의 미래 지위에 관한 청원을 제출했습니다. 위임통치 위원은 이를 표준적인 외교적 대응이 필요한 일상적인 문의로 보고 있습니다. #v 토고#!에 대한 위임통치는 의도한 대로 계속 기능하고 있습니다." # 18136717356968415045
  ztr_decolonization.46.d_phase2: "#v 베냉#!의 전통 통치자들이 자신들의 역사적 왕국에 대한 식민지 당국의 권한 범위에 대해 의문을 제기했습니다. 식민지 행정부는 이를 해안의 조용한 지역에서 발생한 국지적인 우려 사항으로 간주합니다. 이 식민지는 심각한 행정적 어려움을 초래하지 않고 있습니다." # 15106371520974254772
  ztr_decolonization.47.d_phase2: "부르키나파소의 추장들이 지역 사회에 영향을 미치는 식민지 노동 모집 정책에 반대하는 청원을 제출했습니다. 부총독은 이러한 우려를 근대화에 대한 전형적인 저항으로 일축합니다. 이 영토는 해안 식민지를 위한 안정적인 노동력 공급지로 남아 있습니다." # 10159512708186034277
  ztr_decolonization.48.d_phase2: "#v 나이지리아#!의 라고스와 지역 의회 정치 지도자들이 헌법적 진보를 요구하는 각서를 제출했습니다. 총독은 이를 복잡한 식민지에서 발생하는 일상적인 정치 활동으로 간주합니다. 나이지리아는 우리의 간접 통치 시스템을 통해 확고하게 관리되고 있습니다." # 1810596599000073533
  ztr_decolonization.49.d_phase2: "#v 카메룬#! 대표들이 위임통치 당국에 영토 내 정치 발전 속도에 관한 청원을 제출했습니다. 위임통치 위원은 이를 표준적인 외교적 교류로 간주합니다. #v 카메룬#!의 행정은 기존 방침에 따라 계속되고 있습니다." # 1530591879969710395
  ztr_decolonization.50.d_phase2: "#v 중앙아프리카 공화국#!의 지역 지도자들이 식민 통치 하의 강제 노동과 조세에 대한 불만을 전달했습니다. 식민지 총독은 이를 외딴 내륙 영토에서 예상할 수 있는 불평으로 봅니다. 이 식민지는 조용한 행정 구역으로 남아 있습니다." # 44472102150755023
  ztr_decolonization.51.d_phase2: "#v 가봉#!의 지도자들이 자원이 풍부한 영토 행정에 더 큰 현지 참여를 요구하는 청원을 제출했습니다. 리브르빌의 식민지 관리들은 이를 대수롭지 않게 여깁니다. #v 가봉#!은 가치 있는 목재와 광물을 생산하는 작고 관리하기 쉬운 식민지로 남아 있습니다." # 11596611210085976120
  ztr_decolonization.52.d_phase2: "#v 콩고 공화국#!의 정치 단체들이 식민지 이권 및 원주민 권리 조건에 대해 우려를 제기했습니다. 식민지 총독은 이러한 불만을 관리 가능한 수준으로 간주합니다. 브라자빌은 우리 적도 영토를 위한 기능적인 행정 중심지로 남아 있습니다." # 11562031733041768524
  ztr_decolonization.53.d_phase2: "#v 콩고#!의 에볼루에(évolués)들이 정치적 권리와 차별적인 식민지 관행의 종식을 요구하는 청원을 제출했습니다. 행정부는 이를 소수 교육받은 계층의 시기상조인 야망으로 치부합니다. 광대한 #v 콩고#! 영토는 여전히 우리의 권한 하에 확고히 남아 있습니다." # 8392261328601705691
  ztr_decolonization.54.d_phase2: "#v 우간다#!의 왕국들과 정치 지도자들이 보호령 내에서 #gold_value 자치#!를 향한 더 명확한 경로를 요구하는 청원을 제출했습니다. 총독은 이를 캄팔라 정치권 내의 익숙한 세력 다툼으로 간주합니다. #v 우간다#!에 대한 보호령은 질서 정연하고 확고하게 자리 잡고 있습니다." # 15690656648209611615
  ztr_decolonization.55.d_phase2: "#v 르완다#!의 지도자들이 위임통치 영토의 미래와 행정 내 자신들의 역할에 대해 의문을 제기했습니다. 위임통치 위원은 이를 대수롭지 않은 문의로 취급합니다. 작은 고원 영토는 기존 구조를 통해 계속 통치되고 있습니다." # 6771122200737595184
  ztr_decolonization.56.d_phase2: "#v 탕가니카#!의 정치 단체들이 영토의 입법 의회에 더 큰 대표권을 요구하는 청원을 제출했습니다. 총독은 이를 협력적으로 관리되는 위임통치령에서 나온 소박한 요구로 간주합니다. 이 영토는 행정부에 즉각적인 우려를 야기하지 않습니다." # 9866343309209620672
  ztr_decolonization.57.d_phase2: "#v 앙골라#!의 시민 지도자들이 리스본에 식민지 노동법 개정과 더 큰 원주민 권리를 요구하는 청원을 제출했습니다. 식민지 부처는 이러한 요구를 사소한 관료적 문제로 간주합니다. #v 앙골라#!는 확고하게 관리되는 우리 해외 제국의 초석으로 남아 있습니다." # 5200416694677727550
  ztr_decolonization.58.d_phase2: "북로디지아 지도자들이 식민지 사무소에 토지 권리와 보호령의 미래에 관한 청원을 제출했습니다. 루사카의 관리들은 이를 구리 벨트 지역에서 발생하는 표준적인 정치적 선동으로 봅니다. #v 잠비아#!에 대한 보호령은 수익성 있고 안정적인 보유지로 남아 있습니다." # 11481817170113650632
  ztr_decolonization.59.d_phase2: "#v 모잠비크#! 지역 사회 지도자들이 강제 노동 및 통행법과 관련하여 식민지 행정부에 불만을 제출했습니다. 로렌수 마르케스의 관리들은 이를 일상적인 불평으로 일축합니다. #v 모잠비크#!는 우리 해외 제국의 확고한 영토로 남아 있습니다." # 6584680823657936035
  ztr_decolonization.60.d_phase2: "#v 말라위#!의 추장들이 식민지 총독에게 토지 개혁과 더 큰 원주민 대표권을 요구하는 청원을 제출했습니다. 행정부는 이를 블랜타이어 주변 교육받은 계층의 전형적인 선동으로 간주합니다. 니아살란드에 대한 보호령은 정착된 사안으로 남아 있습니다." # 14840271292645214145
  ztr_decolonization.61.d_phase2: "#v 스와지#! 군주제는 우리 보호령 하의 #v 에스와티니#!의 장기적 지위에 대해 외교적 의문을 제기했습니다. 고등판무관은 이를 조약 해석에 관한 일상적인 문제로 취급합니다. 작은 보호령은 안정적이며 우리의 영향권 내에 확고히 남아 있습니다." # 16284066520027427519
  ztr_decolonization.62.d_phase2: "#v 바소토#! 추장들이 토지 압박과 보호령 지위의 미래에 관해 고등판무관에게 청원을 제출했습니다. 관리들은 이를 작은 영토 내의 국지적인 우려로 보고 있습니다. #v 레소토#!는 여전히 조용하고 협조적인 보호령으로 남아 있습니다." # 934481670355409474
  ztr_decolonization.63.d_phase2: "#v 말리#! 공동체 지도자들이 식민지 조세와 전통 영토의 행정에 대한 우려를 제기했습니다. 부총독은 이를 내륙 지역에서 나오는 일상적인 불만으로 간주합니다. 광활한 #v 수단#! 영토는 여전히 우리의 확고한 권위 아래에 있습니다." # 6094605234494569622
  ztr_decolonization.64.d_phase2: "#v 보츠와나#!의 #v 츠와나#! 추장들이 토지 침범과 보호령의 미래 범위에 관해 고등판무관에게 청원했습니다. 관리들은 이를 조용한 영토에서 제기된 표준적인 행정 문의로 보고 있습니다. #v 베추아날란드 보호령#!은 여전히 최소한의 관심만을 필요로 합니다." # 17907609190762004433
  ztr_decolonization.65.d_phase2: "#v 짐바브웨#!의 아프리카 정치 단체들이 식민 정부에 토지 개혁과 원주민 투표권을 요구하는 청원을 제출했습니다. 총독은 이를 목소리 큰 소수 집단의 익숙한 선동으로 간주합니다. #v 남로디지아#!는 여전히 우리의 가장 발전되고 정착된 식민지 중 하나입니다." # 5225537290105584909
  ztr_decolonization.66.d_phase2: "#v 마다가스카르#! 정치 협회들이 헌법 개혁과 원주민의 더 큰 참여를 요구하는 청원을 제출했습니다. 총독은 이를 안타나나리보 정치권의 예측 가능한 활동으로 간주합니다. #v 마다가스카르#!는 여전히 확고하게 관리되는 해외 영토입니다." # 2761761834394043987
  ztr_decolonization.67.d_phase2: "#v 에티오피아#! 관리들이 우리의 영토 양보 조건과 주권 문제에 대한 간섭에 항의했습니다. 외무부는 이를 아디스아바바의 전형적인 허세로 취급합니다. #v 에티오피아#!에 대한 우리의 입장과 조약상의 권리는 여전히 확고합니다." # 9908732554177424771
  ztr_decolonization.2.d_phase3: "#v 튀니지#!의 #gold_value 독립#! 운동이 실질적인 동력을 얻고 있습니다. 튀니스에서 조직된 파업과 시위는 현상 유지가 어려울 수 있음을 행정부가 인정하게 만들었습니다. 변화의 바람이 마그레브 전역에 분명하게 불고 있습니다." # 14423010342035189775
  ztr_decolonization.3.d_phase3: "#v 알제리#!는 점점 더 통제하기 어려워지고 있으며, 민족주의 단체들이 영토 전역에서 지지를 결집하고 있습니다. 식민 행정부는 더 이상 이 운동을 소수 선동가의 소행으로 치부할 수 없습니다. #v 알제리#!와 본국 사이의 관계에서 근본적인 변화가 일어나고 있습니다." # 7435169159596971449
  ztr_decolonization.4.d_phase3: "#v 모로코#!의 #gold_value 독립#! 운동은 현지 엘리트들의 협력을 넘어설 정도로 성장했습니다. 카사블랑카와 페스에서 일어난 대규모 시위는 민심이 보호령에 대해 결정적으로 돌아섰음을 보여줍니다. 술탄의 협조를 더 이상 당연하게 여길 수 없습니다." # 3929739159502041059
  ztr_decolonization.5.d_phase3: "#v 리비아#!의 저항은 산발적인 부족의 반대를 넘어 조직적인 정치 운동으로 확대되었습니다. 식민 행정부는 트리폴리와 벵가지에서 질서를 유지하는 데 점점 더 큰 어려움을 겪고 있습니다. 이 북아프리카 영토에 대한 우리의 장악력은 예상보다 빠르게 약화되고 있습니다." # 18358149845727019065
  ztr_decolonization.6.d_phase3: "#v 이집트#! 민족주의는 기존의 체제가 유지될 수 없을 정도로 격화되었습니다. 카이로와 알렉산드리아의 대규모 시위는 매달 그 규모가 커지고 있습니다. 수에즈 운하를 따라 형성된 우리의 전략적 입지는 민중의 적대감으로 인해 점점 더 위태로워지고 있습니다." # 555300877192245017
  ztr_decolonization.7.d_phase3: "#v 수단#!의 정당들은 #gold_value 독립#! 요구를 중심으로 단결했으며, 그 지지는 하르툼을 넘어 빠르게 확산되고 있습니다. 행정부는 기존의 공동 통치 체제가 심각한 압박을 받고 있음을 인정합니다. 이제 문제는 변화가 올 것인가가 아니라 언제 올 것인가입니다." # 3417776366590753363
  ztr_decolonization.8.d_phase3: "#v 아라비아#! 민족주의자들은 부족의 경계를 넘어 대의를 찾았으며, 반식민주의 정서가 반도 전역으로 퍼지고 있습니다. 우리의 보호령 체제는 지역적 변화에 고무된 현지 통치자들에 의해 공공연히 도전받고 있습니다. #v 아라비아#!의 구질서는 분명히 무너지고 있습니다." # 3240505458238524803
  ztr_decolonization.9.d_phase3: "#v 오만#!의 술탄은 우리의 조약 특권을 직접적으로 위협하는 방식으로 #gold_value 주권#!을 주장하기 시작했습니다. 무스카트의 민심은 외국 영향력으로부터의 완전한 단절을 점점 더 지지하고 있습니다. #v 오만#! 문제에 대한 우리의 오랜 지배력은 미끄러지고 있습니다." # 329979163543897929
  ztr_decolonization.10.d_phase3: "#v 예멘#!의 아덴 주변 우리 주둔군에 대한 저항은 청원을 넘어 조직적인 정치 선동과 산발적인 폭력으로 확대되었습니다. 내륙 부족들은 보호령의 권위에 대한 반항을 더욱 대담하게 드러내고 있습니다. 남부 #v 아라비아#!에서 우리의 입지를 유지하는 것은 점점 더 비용이 많이 들고 논쟁적인 일이 되고 있습니다." # 2500563954660428945
  ztr_decolonization.11.d_phase3: "#v 트루셜#!의 셰이크들은 석유 부의 증가와 지역 민족주의에 고무되어 우리의 자문 체제로부터 더 큰 #gold_value 독립#!을 주장하고 있습니다. 걸프 지역 문제에 대한 우리의 전통적인 지배력은 새롭고 자신감 넘치는 도전에 직면했습니다. 구 조약 체제는 시대에 뒤떨어진 모습을 보이고 있습니다." # 12548233470316322336
  ztr_decolonization.12.d_phase3: "#v 페르시아#! 민족주의는 외국 이권의 국유화를 요구하는 대중 운동과 함께 극에 달했습니다. 테헤란 정부는 우리의 영향력에 대해 점점 더 강경한 태도를 보이고 있습니다. 한때 #v 페르시아#!에서 누렸던 우리의 압도적인 지위는 더 이상 쉽게 통제할 수 없는 세력들에 의해 침식되고 있습니다." # 18105232350144663979
  ztr_decolonization.13.d_phase3: "#v 버마#!의 #gold_value 독립#! 운동은 광범위한 대중의 지지를 받는 강력한 정치 세력으로 성장했습니다. 파업과 시민 불복종 운동은 랑군의 식민 행정부를 마비시키고 있습니다. #v 버마#!를 더 이상 과거의 방식대로 통치할 수 없다는 사실이 분명해지고 있습니다." # 12742551957358185311
  ztr_decolonization.14.d_phase3: "#v 시암#! 민족주의자들은 잔존하는 외국 조약 특권에 반대하는 여론을 성공적으로 결집했습니다. 방콕 정부는 완전한 #gold_value 주권#!을 회복하라는 엄청난 압박을 받고 있습니다. #v 시암#! 내 우리의 치외법권적 지위는 정치적으로 유지하기 불가능해지고 있습니다." # 3696464415410735279
  ztr_decolonization.15.d_phase3: "#v 라오스#!의 정치적 자각은 극적으로 성장했으며, #gold_value 독립#! 운동이 엘리트와 농촌 공동체 모두에서 지지를 얻고 있습니다. 10년 전만 해도 자연스러워 보였던 식민 체제는 이제 강요된 것처럼 느껴지며 취약해졌습니다. 보호령은 진정한 정통성의 위기에 직면해 있습니다." # 17545096474837457175
  ztr_decolonization.16.d_phase3: "#v 베트남#!의 저항은 전국적으로 깊은 뿌리를 둔 조직적인 #gold_value 독립#! 운동으로 격화되었습니다. 인도차이나의 식민지 행정부는 기존의 통제 방식이 실패하고 있음을 내밀히 인정하고 있습니다. #v 베트남#!의 #gold_value 자결권#! 문제는 더 이상 미룰 수 없습니다." # 14721227472354535255
  ztr_decolonization.17.d_phase3: "#v 캄보디아#!의 민족주의가 목소리를 내기 시작했으며, 새로운 세대는 보호령 체제를 넘어선 진정한 #gold_value 독립#!을 요구하고 있습니다. 왕실과 국민은 지속적인 외세의 통제에 맞서 점차 뜻을 같이하고 있습니다. #v 캄보디아#!에서 우리의 입지는 점점 더 위태로운 기반 위에 놓여 있습니다." # 123846630885662578
  ztr_decolonization.18.d_phase3: "#v 인도#!의 #gold_value 독립#! 운동은 어떠한 개혁으로도 억제할 수 없는 규모에 도달했습니다. 수백만 명이 시민 불복종 운동에 참여하고 있으며, #v 라지#!의 행정 기구는 저항의 무게를 견디지 못하고 휘청거리고 있습니다. 인도 아대륙은 되돌릴 수 없는 변화의 문턱에 서 있습니다." # 4579241866017526093
  ztr_decolonization.19.d_phase3: "#v 한국#!의 식민 통치에 대한 저항은 문화 수호 운동에서 국가 해방을 위한 조직적인 대중 운동으로 진화했습니다. 지하 조직과 국제적인 옹호 활동으로 인해 #v 한국#! 문제는 무시할 수 없는 사안이 되었습니다. 식민지 행정부는 질서 유지에 있어 점점 더 큰 어려움에 직면하고 있습니다." # 2144402404837909559
  ztr_decolonization.20.d_phase3: "#v 일본#!은 국제 여론을 성공적으로 활용하여 불평등 조약 체제에 도전하고 있으며, 완전한 #gold_value 주권#!을 향한 국내의 압력은 거세지고 있습니다. #v 일본#!의 부상하는 국력 앞에서 외국인의 조차지와 치외법권적 특권은 더 이상 유지하기 어렵게 되었습니다. 동아시아의 구질서는 변화하고 있습니다." # 7382944280830886945
  ztr_decolonization.21.d_phase3: "#v 중국#!의 민족주의는 모든 외국 조차지와 개항장의 폐지를 요구하는 강력한 운동으로 결집했습니다. 정부는 내부 분열이 어떠하든, 완전한 #gold_value 주권#! 회복에 대해서는 한목소리를 내고 있습니다. #v 중국#!에서 우리의 입지는 빠르게 유지 불가능한 상태가 되고 있습니다." # 18258332015147266554
  ztr_decolonization.22.d_phase3: "#v 아프가니스탄#!의 외세 영향력에 대한 저항은 경쟁하는 부족들을 통합하는 국가적 운동으로 굳어졌습니다. 산길과 국경 지역은 우리 군대와 요원들에게 점점 더 위험해지고 있습니다. #v 아프가니스탄#!에 영향력을 행사할 수 있는 우리의 능력은 계절이 지날수록 약화되고 있습니다." # 7216977483030209515
  ztr_decolonization.23.d_phase3: "#v 말레이#! 민족주의는 정치 정당들이 #gold_value 독립#!과 식민지 경제 착취의 종식을 요구하며 심각한 동력을 얻었습니다. 주석 광산과 고무 농장에서의 파업은 식민지 경제를 마비시켰습니다. #v 말레이#!에서의 안락한 체제는 진정한 위협에 처해 있습니다." # 2656897612546128820
  ztr_decolonization.24.d_phase3: "#v 네팔#!은 자국의 #gold_value 주권#!을 제한하는 조약 조건의 개정을 요구하는 데 있어 점점 더 단호해지고 있습니다. 네팔의 새로운 세대 지도자들은 기존의 협정을 제국주의의 유물로 간주합니다. 민족주의 정서가 고조됨에 따라 카트만두에서의 우리의 영향력은 쇠퇴하고 있습니다." # 14079830237505131332
  ztr_decolonization.25.d_phase3: "#v 부탄#!의 지도부는 우리의 독점적 영향력을 줄일 수 있는 대안적인 외교 관계를 모색하기 시작했습니다. 한때 유순했던 보호령은 조용하지만 확고하게 #gold_value 독립#!을 주장하고 있습니다. #v 부탄#! 문제에서 우리의 특권적 지위는 예상치 못한 도전에 직면했습니다." # 12933149011129735957
  ztr_decolonization.26.d_phase3: "#v 티베트#! 당국은 수도원 세력과 민중의 지지를 바탕으로 외세 간섭에 대한 저항을 강화했습니다. 고원 지역은 외부에서 영향력을 행사하거나 통제하기가 점점 더 어려워지고 있습니다. 중앙아시아의 전략적 계산은 우리에게 불리하게 변하고 있습니다." # 1749982211674603252
  ztr_decolonization.27.d_phase3: "#v 뉴질랜드#!의 정치권은 보다 독립적인 외교 정책과 진정한 #gold_value 주권#!을 반영하는 헌법적 관계를 추진하고 있습니다. 기존의 자치령 충성심은 뚜렷한 국가 정체성에 자리를 내어주고 있습니다. 이 태평양 국가와 제국을 묶어주던 끈은 눈에 띄게 느슨해지고 있습니다." # 11675116282344925107
  ztr_decolonization.28.d_phase3: "#v 이라크#! 민족주의는 외국 군대의 주둔과 위임통치 권한의 종식을 요구하는 광범위한 대중 운동으로 폭발했습니다. 바그다드와 바스라의 폭동은 행정부의 근간을 뒤흔들었습니다. 메소포타미아에서의 우리의 전략적 입지는 심각하고 지속적인 위협을 받고 있습니다." # 13275838330222770356
  ztr_decolonization.29.d_phase3: "#v 시리아#!의 위임통치에 대한 저항은 엘리트 정치에서 진정한 대중 운동으로 성장했습니다. 총파업과 시위가 놀라울 정도로 정기적으로 다마스쿠스를 마비시키고 있습니다. 위임통치 행정부는 현재 상황이 무기한 지속될 수 없음을 내밀히 인정하고 있습니다." # 17915880061836557241
  ztr_decolonization.30.d_phase3: "#v 레바논#!의 정치 파벌들은 위임통치 종식을 요구하는 데 전례 없는 단결을 보여주었습니다. 베이루트 거리에서는 헌병대가 통제하기 힘든 시위가 정기적으로 발생하고 있습니다. #v 레바논#!의 우리 행정부는 개혁만으로는 해결할 수 없는 정통성의 위기에 직면해 있습니다." # 9461136343174567972
  ztr_decolonization.31.d_phase3: "#v 트란스요르단#! 민족주의는 완전한 #gold_value 주권#!과 외국인 고문들의 철수를 요구하는 심각한 정치 세력으로 성숙했습니다. 에미르는 #gold_value 독립#!을 주장하라는 자국민의 엄청난 압력을 받고 있습니다. 영토 내에서의 우리의 존재는 점점 더 반감을 사고 있습니다." # 1457030814973440584
  ztr_decolonization.32.d_phase3: "#v 팔레스타인#!의 상황은 #v 아랍#!과 #v 유대#! 공동체 모두가 그들의 요구에 더욱 강경해지면서 악화되었습니다. 위임통치 당국은 화해할 수 없는 세력들 사이에 끼어 있으며, 각 세력은 더욱 절박해지고 있습니다. #v 팔레스타인#!을 통치하는 것은 고조되는 위기를 관리하는 작업이 되었습니다." # 9052391956681409528
  ztr_decolonization.33.d_phase3: "#v 쿠르드#! 민족주의는 부족 저항에서 자치나 #gold_value 독립#!을 요구하는 조직적인 정치 운동으로 진화했습니다. 무장 단체들이 산악 내륙의 상당 부분을 통제하고 있습니다. #v 쿠르드#! 영토에 대한 위임통치 당국의 권위는 점점 더 서류상으로만 존재하게 되었습니다." # 14430654947324426109
  ztr_decolonization.34.d_phase3: "#v 케냐#!의 정치 조직들은 토지 개혁과 #gold_value 독립#!을 위해 막대한 지지를 동원했습니다. 마우마우 봉기와 더 광범위한 저항 운동은 나이로비의 식민지 기득권층을 뒤흔들었습니다. #v 케냐#!의 정착민 식민지 모델은 근본적인 도전을 받고 있습니다." # 2120404524736398000
  ztr_decolonization.35.d_phase3: "#v 나미비아#!의 위임 통치에 대한 저항은 더욱 조직적이고 목소리가 커지고 있으며, 지도자들은 #gold_value 민족 자결권#!을 요구하고 있습니다. 해당 영토의 지위에 대한 국제적 압박은 현지의 어려움을 가중하고 있습니다. 이 광활한 영토에 대한 우리의 권위는 사방에서 도전을 받고 있습니다." # 17966614983607364032
  ztr_decolonization.36.d_phase3: "#v 소말리아#! 민족주의는 부족 간의 경계를 넘어 #gold_value 독립#!과 영토적 통합을 요구하는 운동과 함께 통합의 원동력으로 부상했습니다. 우리의 보호령은 이제 #v 소말리아#! 민족의 열망을 가로막는 장애물로 간주되고 있습니다. 아프리카의 뿔 지역에서 질서를 유지하는 일은 매달 더욱 어려워지고 있습니다." # 16553532887328493039
  ztr_decolonization.37.d_phase3: "#v 에리트레아#!의 정치 운동은 외국인 통치를 거부하며 #gold_value 민족 자결#!을 요구하는 방향으로 결집했습니다. 이 영토의 전략적 가치는 이제 이곳을 점유하는 데 드는 막대한 비용과 비교해야 할 처지입니다. #v 에리트레아#!의 미래에 대한 문제는 더 이상 미룰 수 없습니다." # 11993479884586319008
  ztr_decolonization.38.d_phase3: "#v 차드#!의 정치적 의식은 급격히 성장했으며, #gold_value 독립#! 운동은 영토 내의 다양한 공동체 전역에서 지지자를 얻고 있습니다. 식민 행정부는 이 외딴 지역에서 과거에는 불가능하다고 여겼던 저항에 직면했습니다. 우리의 주둔을 유지하는 비용은 증가하는 반면 그 정당성은 희미해지고 있습니다." # 12112049685436426369
  ztr_decolonization.39.d_phase3: "#v 니제르#!의 #gold_value 독립#! 운동은 예상치 못한 힘을 얻었으며, 지도자들은 민족과 지역을 넘어 지지를 결집하고 있습니다. 사헬 지역에서의 식민지 권위는 사상 처음으로 공개적인 도전을 받고 있습니다. 행정부는 변화하는 정치적 지형을 더 이상 무시할 수 없습니다." # 4198821130398465696
  ztr_decolonization.40.d_phase3: "#v 모리타니#! 민족주의자들은 #gold_value 독립#! 요구를 중심으로 영토 내의 다양한 공동체를 통합했습니다. 대중 정치가 자리를 잡으면서 협력적인 에미르들을 통해 통치하던 구체제는 무너지고 있습니다. 이 사막 영토에서의 우리의 입지는 더 이상 보장되지 않습니다." # 3505712667131285709
  ztr_decolonization.41.d_phase3: "#v 세네갈#!의 #gold_value 독립#! 운동은 과거의 '4개 코뮌' 정치를 넘어 영토 전체의 #gold_value 주권#! 요구로 성장했습니다. 다카르에 위치한 식민지 연방의 중추는 반식민주의 정서로 고동치고 있습니다. 우리의 서아프리카 체제는 그 근간부터 흔들리고 있습니다." # 13853508102896234946
  ztr_decolonization.42.d_phase3: "#v 기니#!의 #gold_value 독립#! 운동은 서아프리카에서 가장 전투적인 성격을 띠게 되었으며, 대규모 파업과 시위가 코나크리를 뒤흔들고 있습니다. 식민 행정부는 외국인 통치를 단호히 거부하는 주민들과 마주하고 있습니다. 상황은 근본적인 재평가를 요구하고 있습니다." # 4543823762272183864
  ztr_decolonization.43.d_phase3: "#v 코트디부아르#!의 #gold_value 독립#! 운동은 농장주들의 불만에서 시작되어 #gold_value 주권#!을 요구하는 광범위한 대중적 요구로 성장했습니다. 한때 우리의 주둔을 정당화하는 것처럼 보였던 식민지 경제는 이제 그에 대한 저항의 불씨가 되고 있습니다. 제국 내에서 이 영토의 미래는 불투명합니다." # 431953378202791148
  ztr_decolonization.44.d_phase3: "#v 가나#!의 #gold_value 독립#! 운동은 사하라 이남 아프리카에서 가장 진보적인 수준에 이르렀으며, 조직된 정당들은 즉각적인 #gold_value 자치#!를 요구하고 있습니다. #v 골드 코스트#!의 교육받은 엘리트층과 대중 기반은 멈출 수 없는 정치적 세력을 형성했습니다. 식민지 관리들은 사적으로 #gold_value 독립#!이 불가피하다는 점을 인정하고 있습니다." # 663847523575580233
  ztr_decolonization.45.d_phase3: "#v 토고#! 민족주의자들은 자신들의 대의를 위임 통치령과 #gold_value 민족 자결#!이라는 더 큰 문제와 성공적으로 연결했습니다. 국제적인 감시는 관리 당국에 가해지는 압력을 가중시키고 있습니다. #v 토고#!에 대한 위임 통치는 정당성 위기에 직면해 있습니다." # 10483001180505665576
  ztr_decolonization.46.d_phase3: "#v 베냉#!의 정치 운동은 식민지 착취에 대한 분노를 바탕으로 #gold_value 독립#!을 위한 광범위한 지지를 결집했습니다. 이 영토의 역사적 왕국들은 #gold_value 민족 자결#!을 위한 강력한 서사를 제공합니다. 우리의 행정부는 일상적인 조치로는 더 이상 관리할 수 없는 도전에 직면했습니다." # 11390246453049003115
  ztr_decolonization.47.d_phase3: "부르키나파소의 정치적 각성은 식민 행정부를 당혹스럽게 만들었으며, 강제 노동과 외국인 통치의 종식을 요구하는 운동이 일어나고 있습니다. 한때 순종적인 노동력 공급지였던 곳이 조직적인 저항의 중심지가 되었습니다. 식민 통치 하에서 이 영토의 미래는 심각하게 의심받고 있습니다." # 5169294562150542780
  ztr_decolonization.48.d_phase3: "#v 나이지리아#! 민족주의는 식민지의 지역적, 민족적 분열을 초월하는 강력한 힘으로 성장했습니다. 라고스, 이바단, 에누구의 정당들은 #gold_value 독립#!을 향해 점점 더 통합된 추진력을 조직하고 있습니다. 우리 아프리카 제국에서 가장 인구가 많은 영토가 우리의 손아귀에서 빠져나가고 있습니다." # 418614983961383328
  ztr_decolonization.49.d_phase3: "#v 카메룬#! 민족주의는 더욱 격화되었으며, 위임 통치로부터의 재통일과 완전한 #gold_value 독립#!을 요구하는 운동이 거세지고 있습니다. 두알라와 야운데에서 벌어지는 시위는 매달 그 규모가 커지고 더욱 과감해지고 있습니다. 위임 통치 체제는 결정적인 압박을 받고 있습니다." # 8856189422683354769
  ztr_decolonization.50.d_phase3: "#v 중앙아프리카 공화국#!의 정치 운동은 놀라운 힘을 얻어 영토 전역에서 식민지 권위에 도전하고 있습니다. 한때 이 지역을 반식민주의 정서로부터 격리했던 고립 상태는 무너졌습니다. 행정부는 스스로 통치하기로 결심한 주민들과 마주하고 있습니다." # 6469309457507344213
  ztr_decolonization.51.d_phase3: "#v 가봉#!의 정치 지도자들은 영토의 자원 부유함을 자급자족의 증거로 삼아 #gold_value 독립#!을 위한 지지를 결집했습니다. 작은 식민지의 교육받은 엘리트들은 국가들의 회의에서 한 자리를 요구하고 있습니다. 적도 아프리카에서 우리의 입지는 점점 더 큰 정당성 위기에 직면하고 있습니다." # 7967743154113295868
  ztr_decolonization.52.d_phase3: "#v 콩고 공화국#!의 #gold_value 독립#! 운동은 탄력을 받았으며, 브라자빌은 반식민주의 조직의 온상이 되었습니다. 노동자와 지식인들은 외국인 통치의 종식을 요구하며 힘을 합쳤습니다. 식민 행정부의 권위는 눈에 띄게 약화되고 있습니다." # 8779616286452571808
  ztr_decolonization.53.d_phase3: "#v 콩고#!는 식민 행정부를 압도할 위협이 되는 정치적 각성을 경험하고 있습니다. 광대한 영토 전역에서 #gold_value 독립#! 운동이 일어나고 있으며, 즉각적인 #gold_value 자치#!에 대한 요구는 매일 더욱 커지고 있습니다. 도전의 규모는 행정부가 직면했던 그 어떤 것과도 비교할 수 없습니다." # 4177181389120448508
  ztr_decolonization.54.d_phase3: "#v 우간다#!의 정치 운동은 왕국 간의 경쟁을 넘어 #gold_value 독립#!을 요구하는 단일 전선을 형성했습니다. 보호령 행정부는 부간다에서 북부 영토에 이르기까지 조직적인 저항에 직면해 있습니다. 한때 우리에게 매우 유용했던 간접 통치 체제는 이제 우리에게 불리하게 작용하고 있습니다." # 16471125465564304109
  ztr_decolonization.55.d_phase3: "#v 르완다#!의 정치적 지형은 #gold_value 독립#! 운동이 식민지 행정부와 전통적 권력 구조 모두에 도전함에 따라 급격히 변화하고 있습니다. 이 영토의 복잡한 사회적 역학 관계는 이미 긴장된 상황에 불안정성을 더하고 있습니다. 우리의 위임통치 권위가 근본적으로 의문시되고 있습니다." # 9361176539305908045
  ztr_decolonization.56.d_phase3: "#v 탄자니아#!의 #gold_value 독립#! 운동은 동아프리카에서 가장 조직적인 운동 중 하나로 부상했으며, 카리스마 넘치는 지도부가 폭넓은 지지를 결집하고 있습니다. 이 위임통치령의 주민들은 압도적으로 단결하여 #gold_value 자치#!를 요구하고 있습니다. 식민지 행정부는 사석에서 상황의 흐름이 명확해졌음을 인정하고 있습니다." # 10843172136297619661
  ztr_decolonization.57.d_phase3: "#v 앙골라#!의 #gold_value 독립#! 운동은 강제 노동과 경제적 착취에 대한 수십 년간의 분노에 힘입어 극적으로 성장했습니다. 무장 저항 단체들이 시골과 해외에서 결성되고 있습니다. 해당 영토를 유지하려는 리스본의 고집은 점점 더 폭력적인 도전에 직면해 있습니다." # 536104129052197945
  ztr_decolonization.58.d_phase3: "#v 잠비아#!의 #gold_value 독립#! 운동은 정치적 권리를 요구하는 구리 광부들과 도시 노동자들에 의해 엄청난 추진력을 얻었습니다. 식민지 행정부는 경제를 마비시키는 파업과 시민 불복종 운동에 직면해 있습니다. 이 보호령의 시대는 얼마 남지 않은 것으로 보입니다." # 2971958626891498610
  ztr_decolonization.59.d_phase3: "#v 모잠비크#!의 식민 통치에 대한 저항은 산발적인 농촌의 불만에서 조직적인 해방 운동으로 진화했습니다. 무장 단체들은 북부 국경을 따라 점점 더 효과적으로 활동하고 있습니다. 이 광활한 해안 영토에 대한 리스본의 통제력은 쉽게 대응할 수 없는 방식으로 도전을 받고 있습니다." # 15182761871014776205
  ztr_decolonization.60.d_phase3: "#v 말라위#!의 #gold_value 독립#! 운동은 #gold_value 자치#! 요구를 중심으로 이 영토의 다양한 공동체를 하나로 묶었습니다. 식민지 행정부는 감당할 수 없는 규모의 시민 불복종과 정치 조직화에 직면해 있습니다. 니아살란드의 보호령 체제는 정통성을 상실했습니다." # 15778840143251319456
  ztr_decolonization.61.d_phase3: "#v 스와지#! 군주국과 국민들은 완전한 #gold_value 주권#!과 보호령 지위의 종식을 요구하는 데 점점 더 단호해지고 있습니다. 지역 #gold_value 독립#! 운동은 변화의 때가 왔다는 확신을 심어주고 있습니다. 지리적 취약성에도 불구하고 이 작은 왕국에 대한 우리의 영향력은 희미해지고 있습니다." # 11066597210217894061
  ztr_decolonization.62.d_phase3: "#v 레소토#!의 지도자들은 대륙을 휩쓰는 탈식민지화의 물결에 고무되어 #gold_value 독립#! 운동을 강화했습니다. 산악 왕국의 국민들은 #gold_value 자치#!를 향한 열망으로 단결했습니다. 우리의 보호령 당국은 더 이상 외국인의 감독을 받아들이지 않는 주민들을 마주하고 있습니다." # 7627140213235177464
  ztr_decolonization.63.d_phase3: "#v 말리#!의 #gold_value 독립#! 운동은 이 영토의 풍부한 식민지 이전 역사와 성장하는 국가적 정체성 의식에서 힘을 얻었습니다. 바마코의 정치 조직들은 점점 더 효과적인 #gold_value 주권#! 쟁취 운동을 조정하고 있습니다. 식민지 행정부는 더 이상 이 거센 흐름을 막을 수 없습니다." # 17405131164477739198
  ztr_decolonization.64.d_phase3: "#v 보츠와나#!의 지도자들은 보호령이 부과한 #gold_value 주권#!의 제약을 거부하며 지속적인 #gold_value 독립#! 운동을 시작했습니다. 이 영토의 지식인 계층은 #gold_value 자결권#!을 위한 국제적인 지지를 구축했습니다. 보호자로서의 우리의 지위는 점령군으로 재정의되고 있습니다." # 14955644105751822915
  ztr_decolonization.65.d_phase3: "#v 짐바브웨#!의 아프리카인 다수는 정치적 권리와 정착민 소수 통치의 종식을 요구하는 강력한 운동을 조직했습니다. 이 식민지는 보안군이 통제하기 힘든 불안의 고조에 직면해 있습니다. #v 남로디지아#!의 구질서는 그 근간부터 흔들리고 있습니다." # 2472609831262913200
  ztr_decolonization.66.d_phase3: "#v 마다가스카르#!의 #gold_value 독립#! 운동은 식민 통치에 대한 광범위한 민중 저항으로 폭발했습니다. 1947년의 봉기는 진압되었을지 모르나, #gold_value 주권#!에 대한 근본적인 요구는 더욱 강해졌을 뿐입니다. 행정부는 더 이상 식민지 체제를 받아들이지 않을 주민들을 마주하고 있습니다." # 6512986161252884522
  ztr_decolonization.67.d_phase3: "#v 에티오피아#!의 외세 간섭에 대한 저항은 자랑스러운 군사 전통을 뒷받침으로 하는 확고한 국가적 운동으로 굳어졌습니다. 국제 여론은 점점 더 #v 에티오피아#!의 #gold_value 주권#!을 지지하고 우리의 입장을 비난하고 있습니다. 아프리카의 뿔 지역에서 우리의 존재와 영향력은 결연하고 유능한 적수를 마주하고 있습니다." # 12836636369935763027
  ztr_decolonization.2.d_phase4: "#v 튀니지#!는 공개적인 반란 직전에 있습니다. 무장 저항 세포들이 전국에서 활동하고 있으며, 식민지 행정부는 주요 도시 밖에서는 실질적인 통제력을 상실했습니다. 우리는 지금 양보할 것인가, 아니면 피비린내 나는 승산 없는 전쟁을 치를 것인가라는 냉혹한 선택에 직면해 있습니다." # 18418799470981876361
  ztr_decolonization.3.d_phase4: "#v 알제리#!는 전면적인 반란 상태에 빠졌습니다. #v 민족해방전선#!은 우리 군대를 한계점까지 몰아넣는 끊임없는 게릴라전을 수행하고 있습니다. #v 알제리#!를 유지하는 비용은 본국 자체를 찢어놓을 위협이 되고 있습니다." # 16712708584958187803
  ztr_decolonization.4.d_phase4: "#v 모로코#!는 보호령에 대해 공개적으로 반란을 일으켰습니다. 망명 중인 술탄은 완전한 #gold_value 독립#! 외에는 아무것도 받아들이지 않을 주민들을 결집하는 상징이 되었습니다. 우리의 군사적 입지는 무너지고 있으며, 지체되는 매일이 위기를 심화시키고 있습니다." # 17497206079766677580
  ztr_decolonization.5.d_phase4: "#v 리비아#!는 통치 불능 상태가 되었습니다. 무장 저항군이 광활한 시골 지역을 장악하고 있으며, 우리의 수비대는 끊임없는 공격에 직면해 있습니다. #v 리비아#!에서의 식민지 프로젝트는 실패했으며, 지속적인 저항은 이미 엄청난 인명 피해에 고통을 더할 뿐입니다." # 3983751294879271522
  ztr_decolonization.6.d_phase4: "#v 이집트#!는 필요하다면 무력을 사용해서라도 완전한 #gold_value 주권#!을 쟁취하려는 벼랑 끝에 서 있습니다. 군대와 국민은 외세의 영향력을 완전히 몰아내겠다는 결의로 뭉쳐 있습니다. 수에즈 운하를 따라 위치한 우리의 입지는 위태로운 상황이며, 작은 오판이라도 국제적인 위기를 촉발할 수 있습니다." # 9242305611947449249
  ztr_decolonization.7.d_phase4: "#v 수단#!은 붕괴하는 공동통치 행정부가 남긴 공백을 메우기 위해 경쟁하는 파벌들로 인해 위기에 처해 있습니다. 무장 단체들이 주 전체를 장악하고 있으며, 수도 자체가 불안에 휩싸여 있습니다. 우리는 결단력 있게 행동해야 하며, 그렇지 않으면 파멸적이고 무질서한 붕괴를 맞이할 위험이 있습니다." # 15000509462009408808
  ztr_decolonization.8.d_phase4: "#v 아라비아#!는 완전히 우리의 통제권 밖으로 벗어났습니다. 구식 보호령 체제는 민족주의와 석유가 가져온 자신감의 물결에 휩쓸려 사라졌습니다. 우리의 남은 거점들은 우리를 과거의 유물로 여기는 주민들로부터 무장 적대감을 마주하고 있습니다." # 16103355977033329595
  ztr_decolonization.9.d_phase4: "#v 오만#!의 술탄은 무장한 민중의 지지를 등에 업고 사실상 우리의 조약 관계를 파기했습니다. 무스카트에서 우리가 가진 영향력은 이제 서류상으로만 존재할 뿐이며, 이를 강제하려는 시도는 우리가 정당화할 수 없는 군사적 개입을 필요로 할 것입니다. 모든 것이 끝났습니다." # 4221650374968487211
  ztr_decolonization.10.d_phase4: "#v 예멘#!이 전쟁터로 변했습니다. 무장한 부족민들이 아덴 주변의 우리 거점을 포위했고, 주둔군은 점점 더 잘 무장된 저항 세력의 매일 같은 공격에 직면해 있습니다. #v 아라비아#!의 이 구석을 지키는 데는 이제 감당할 수 없는 생명과 재화가 소모되고 있습니다." # 7706607982621412157
  ztr_decolonization.11.d_phase4: "#v 휴전 오만#!이 적대적으로 돌아섰으며, 통치자들은 모든 조약 의무를 즉각 종료할 것을 요구하고 있습니다. 석유 부는 그들에게 요구 사항을 행동으로 뒷받침할 자신감과 자원을 제공했습니다. 만을 따라 형성된 우리의 모든 입지가 붕괴하고 있습니다." # 17678733546394902428
  ztr_decolonization.12.d_phase4: "#v 페르시아#!가 우리의 이권을 국유화했고, 우리의 외교적 항의는 묵살당하고 있습니다. 테헤란의 거리는 외국 영향력의 완전한 축출을 요구하는 군중으로 가득 찼습니다. 한때 #v 페르시아#!에서 누렸던 우리의 지배적인 지위는 완전히 파괴되었습니다." # 14215308873351260776
  ztr_decolonization.13.d_phase4: "#v 버마#!는 여러 전선에서 벌어지는 무장 봉기의 손아귀에 있습니다. 식민지 행정부는 고립된 도시 중심지만을 통제하고 있으며, 시골 지역은 저항군의 손에 넘어갔습니다. #v 버마#!에 대한 우리의 지배력은 사실상 끝났으며, 이제 현실을 직시해야 합니다." # 4314700466188317780
  ztr_decolonization.14.d_phase4: "#v 시암#! 정부는 일방적으로 남은 불평등 조약을 폐기했으며, 대중의 분노는 강제 집행 시도를 자살 행위로 만들고 있습니다. 국제 사회는 우리에게 어떠한 지원도 제공하지 않습니다. #v 시암#!에서의 우리의 입지는 거부할 수 없는 #gold_value 주권#!의 물결에 휩쓸려 사라졌습니다." # 1728551192286996018
  ztr_decolonization.15.d_phase4: "#v 라오스#!는 식민 통치에 맞서 공개적으로 반란을 일으켰습니다. 저항군이 시골 지역을 장악했고, 우리 군대는 모든 도로에서 매복 공격을 당하고 있습니다. 보호령은 회복의 전망 없이 우리의 힘을 갉아먹는 피 흘리는 상처가 되었습니다." # 10480848809022649110
  ztr_decolonization.16.d_phase4: "#v 베트남#!은 우리가 패배하고 있는 전면적인 민족 해방 전쟁에 휩싸였습니다. 저항군이 국가의 광대한 지역을 통제하고 있으며, 우리의 군사 작전은 영구적인 성과를 거두지 못하고 있습니다. 피와 재화의 대가는 끝이 보이지 않은 채 매일 늘어만 갑니다." # 11076122501158576528
  ztr_decolonization.17.d_phase4: "#v 캄보디아#!의 인구는 보호령에 맞서 통일된 민족 운동을 일으켰습니다. 왕실은 #gold_value 독립#!을 지지하고 나섰으며, 왕국 내 우리의 남은 권위는 무너지고 있습니다. 우리는 한 국가 전체의 의지에 맞서 우리의 입지를 유지할 수 없습니다." # 8056919087376869843
  ztr_decolonization.18.d_phase4: "#v 인도#!는 통치가 불가능합니다. #v 라지#!는 동시다발적인 대규모 봉기, 군사 반란, 그리고 아대륙 전역에 걸친 식민 행정의 완전한 붕괴에 직면해 있습니다. 역사상 가장 위대한 제국의 자산이 우리 손가락 사이로 빠져나가고 있으며, 그 무엇도 이를 막을 수 없습니다." # 13737753490141561966
  ztr_decolonization.19.d_phase4: "#v 한국#!은 억눌린 분노로 들끓고 있습니다. 지하 저항 조직들이 식민 행정부를 마비시켰고, 우리의 보안군은 매일 공격에 직면해 있습니다. 점령은 국제적인 스캔들이자 명예로운 출구가 없는 군사적 수렁이 되었습니다." # 2369393997089193563
  ztr_decolonization.20.d_phase4: "#v 일본#!은 완전한 #gold_value 주권#!을 요구할 군사적, 산업적 힘을 갖추었으며, 전 세계가 이를 알고 있습니다. 우리의 치외법권적 특권은 눈앞에서 갈기갈기 찢기고 있으며, 우리에게는 저항할 수단도 의지도 없습니다. #v 일본#!에서 서구 지배의 시대는 끝났습니다." # 15585426137390432629
  ztr_decolonization.21.d_phase4: "#v 중국#!의 혁명적 민족주의는 우리의 이권과 조계지를 포위된 거점으로 바꾸어 놓았습니다. 분노한 군중이 외국인 거주지를 에워쌌으며, 우리의 포함은 더 이상 대륙을 위협할 수 없습니다. 우리의 지위를 가져다주었던 굴욕의 세기가 보복당하고 있습니다." # 2494484236284070026
  ztr_decolonization.22.d_phase4: "#v 아프가니스탄#!은 우리의 영향력에 맞서 전면적인 부족 전쟁 상태에 돌입했습니다. 국경 너머로 힘을 투사하려는 모든 시도는 단결되고 전투 경험이 풍부한 인구의 맹렬한 저항에 부딪힙니다. 국경 지대는 제국 야망의 무덤이 되었습니다." # 9700119425222257531
  ztr_decolonization.23.d_phase4: "#v 말레이시아#!는 민족주의적 열망과 무자비한 게릴라 전술이 결합된 반란으로 뒤흔들리고 있습니다. 정글 전쟁은 대대와 예산을 소모하는 반면, 도시의 정치적 상황은 악화되고 있습니다. #v 말라야#!에서의 우리의 식민 사업은 총체적 붕괴에 직면했습니다." # 16605540441871830286
  ztr_decolonization.24.d_phase4: "#v 네팔#!은 우리의 조약 체계에 대한 거부를 분명히 하고 국경을 따라 군대를 동원했습니다. 산악 왕국의 맹렬한 무예 전통은 군사적 강압을 불가능하게 만듭니다. 히말라야에서의 우리의 영향력은 작지만 맹렬하게 자부심 넘치는 국가에 의해 깨졌습니다." # 1147695509845891412
  ztr_decolonization.25.d_phase4: "#v 부탄#!은 국경을 봉쇄하고 우리의 조약을 완전히 부정했습니다. 한때 우리에게 지렛대를 제공했던 산길은 이제 우리를 막기 위해 요새화되었습니다. 이 외딴 왕국은 지속적인 복종 대신 완전한 고립을 선택했으며, 우리는 그들의 마음을 돌릴 수단이 없습니다." # 3614502196444222170
  ztr_decolonization.26.d_phase4: "#v 티베트#!은 사실상 모든 외국인의 존재를 축출하고 외부의 간섭에 맞서 고원 지대를 봉쇄했습니다. 무장 저항과 불가능한 지형은 우리의 영향력을 회복하려는 모든 시도를 물류의 악몽으로 만듭니다. 세계의 지붕은 우리에게서 멀어졌습니다." # 14673287669538211468
  ztr_decolonization.27.d_phase4: "#v 뉴질랜드#!는 더 이상 제국 내에서 종속적인 헌법적 지위를 받아들이지 않겠다고 분명히 했습니다. 대중의 정서는 완전하고 무조건적인 #gold_value 주권#!을 요구합니다. 한때 자랑스럽게 제국의 깃발을 휘날렸던 태평양 자치령은 이제 스스로 독립적인 항로를 개척하고 있습니다." # 9665148516316291851
  ztr_decolonization.28.d_phase4: "#v 이라크#!은 우리의 위임 통치와 군사 주둔에 맞서 공개적인 반란 상태에 있습니다. 봉기가 시골 지역을 휩쓸었으며, 진압 비용은 재무부가 감당할 수 있는 수준을 넘어섰습니다. 우리의 군대는 수백만 명의 적대적인 인구에 직면해 있으며, 모든 폭탄은 더 많은 적을 만들어낼 뿐입니다." # 1707989865371344558
  ztr_decolonization.29.d_phase4: "#v 시리아#!는 위임 통치 하에서 통치가 불가능해졌습니다. 민족주의 세력이 도시 전체를 장악했고, 우리 군대는 가는 곳마다 무장 저항에 직면해 있습니다. 위임 통치는 완전히 실패했으며, 주둔을 연장하는 것은 유혈 사태를 심화시킬 뿐입니다." # 13006096146619074695
  ztr_decolonization.30.d_phase4: "#v 레바논#!의 인구는 위임통치에 맞서 무장 저항으로 단결했습니다. 베이루트 거리는 바리케이드로 가득 찼고, 헌병대는 사실상 해체되었습니다. 우리의 행정력은 이름뿐이며, 통제권을 재확립하려는 모든 시도는 전면적인 군사 점령을 필요로 할 것입니다." # 2049618001460102393
  ztr_decolonization.31.d_phase4: "#v 트란스요르단#!의 인구는 우리의 주둔에 반기를 들었으며, 에미르 본인이 즉각적인 철수를 요구하고 있습니다. 무장 단체들은 우리의 남은 전초기지를 거리낌 없이 공격합니다. 이 영토는 모든 면에서 우리에게서 멀어졌습니다." # 9977991194171963291
  ztr_decolonization.32.d_phase4: "#v 팔레스타인#!은 위임통치 해결의 희망이 사라진 채 혼란에 빠졌습니다. #v 아랍#!과 #v 유대#! 무장 단체들이 공개적인 전쟁을 벌이는 가운데 우리 군은 양측 모두에게서 피해를 입으며 그 사이에 끼어 있습니다. 위임통치는 재앙이 되었고, 이제 남은 유일한 문제는 어떻게 우리 스스로를 빠져나오느냐 하는 것입니다." # 12848584400625236223
  ztr_decolonization.33.d_phase4: "#v 쿠르디스탄#!은 위임통치 당국에 맞서 전면적인 무장 봉기를 일으켰습니다. 페슈메르가 전사들이 산악 통로를 장악했으며, 대도시 외곽의 행정은 붕괴했습니다. 우리는 지형을 손바닥 보듯 훤히 꿰뚫고 있으며 조국을 위해 끝까지 싸울 적을 마주하고 있습니다." # 975760935786901429
  ztr_decolonization.34.d_phase4: "#v 케냐#!는 식민지 보안 기구를 압도하는 광범위한 무장 저항으로 들끓고 있습니다. 비상 조치와 대규모 구금도 뿌리 깊은 불만에 기반한 이 운동을 진압하지 못했습니다. 식민지는 도덕적, 군사적 재앙이 되었습니다." # 12818309457439313977
  ztr_decolonization.35.d_phase4: "#v 나미비아#!의 저항 운동은 우리의 지속적인 위임통치에 대한 국제적 비난을 등에 업고 무기를 들었습니다. 게릴라 부대들은 광활한 사막 내륙에서 공격을 가하고 있으며, 우리 수비대는 한계에 다다랐습니다. 이 영토는 막대한 비용이 들고 방어할 수 없는 골칫덩이가 되었습니다." # 7508562604372949104
  ztr_decolonization.36.d_phase4: "#v 소말리아#!는 보호령에 맞서 무장 봉기를 일으켰습니다. 이제 민족 해방의 기치 아래 단결한 부족 민병대들이 영토 전역에서 우리 군을 공격합니다. 아프리카의 뿔은 적대적이고 통치 불가능한 최전선이 되었습니다." # 7082289856526036591
  ztr_decolonization.37.d_phase4: "#v 에리트레아#!의 해방 전사들은 우리 군이 진압할 수 없는 끈질긴 게릴라전을 펼치고 있습니다. 이 영토의 험준한 지형은 시간이 지날수록 강해지는 적에게 완벽한 은폐처를 제공합니다. 지속적인 점령은 고통을 연장할 뿐 아무런 목적도 달성하지 못합니다." # 16563183997225626937
  ztr_decolonization.38.d_phase4: "#v 차드#!는 광활하고 통치할 수 없는 영토 전역에서 무장 반란에 휩싸였습니다. 식민지군은 사하라 북부에서 열대 남부에 이르기까지 공격에 직면해 있으며, 보급로는 끊임없이 차단됩니다. 이 거대한 영토를 유지하는 비용은 감당할 수 없을 정도로 커졌습니다." # 13336628311999485063
  ztr_decolonization.39.d_phase4: "#v 니제르#!의 저항은 폭력적으로 변했으며, 무장 단체들이 사헬 전역의 식민지 시설과 수비대를 공격하고 있습니다. 광활한 영토를 치안 유지하기란 불가능하며, 우리 군은 위험할 정도로 과도하게 분산되어 있습니다. 지속적인 점령은 더 많은 유혈 사태와 굴욕만을 불러올 뿐입니다." # 15463618964569840100
  ztr_decolonization.40.d_phase4: "#v 모리타니#!의 인구는 식민 통치에 맞서 무장 저항으로 단결했습니다. 사막의 전사들은 우리의 전초기지를 습격하고 끝없는 모래 속으로 사라집니다. 이 영토는 군사적 악몽이며, 우리의 행정은 몇몇 해안 도시를 제외하고는 기능을 멈췄습니다." # 12625262577989452707
  ztr_decolonization.41.d_phase4: "#v 세네갈#!, 우리 서아프리카 제국의 심장부가 공개적인 반란 상태입니다. 다카르의 거리는 바리케이드로 막혔고, 식민지 연합의 행정 중심지는 저항의 진원지가 되었습니다. 만약 #v 세네갈#!이 함락된다면, 우리의 서아프리카 거점 전체가 함께 붕괴할 것입니다." # 7082409321427566972
  ztr_decolonization.42.d_phase4: "#v 기니#!는 협상의 여지조차 남기지 않을 정도로 식민 통치를 전면 거부했습니다. 영토 전체가 우리에게 맞서 동원되었고, 우리의 행정력은 농촌 지역에서 축출되었습니다. 무력을 동원해 #v 기니#!를 유지하려는 시도는 무익하고 잔인한 행위가 될 것입니다." # 18241698027392578457
  ztr_decolonization.43.d_phase4: "#v 코트디부아르#!는 저항의 불길에 휩싸였습니다. 플랜테이션 노동자, 도시 노동자, 농촌 공동체가 식민 통치에 대한 전면적인 거부에 동참했습니다. 한때 수익성이 높았던 이 영토의 경제적 이익은 이제 우리가 감당할 수 없는 군사 점령을 요구하고 있습니다." # 16137771555194109034
  ztr_decolonization.44.d_phase4: "#v 가나#!의 #gold_value 독립#! 운동은 막을 수 없는 흐름이 되었으며, 영토 전체가 즉각적인 #gold_value 주권#! 회복 요구를 위해 단결했습니다. 국제 사회는 우리의 지속적인 주둔을 비난하고 있으며, 우리 당국자들조차 대의가 사라졌음을 인정합니다. #v 골드 코스트#!는 우리의 동의 여부와 관계없이 자유를 얻을 것입니다." # 12073668043957196315
  ztr_decolonization.45.d_phase4: "#v 토고#!의 저항은 위임통치 당국을 압도했습니다. 무장 단체와 대규모 시민 불복종 운동은 이 영토를 통치 불가능한 상태로 만들었습니다. 국제 기구들은 우리의 철수를 요구하고 있으며, 우리에게는 잔류할 자원도 명분도 없습니다." # 9733230808704215364
  ztr_decolonization.46.d_phase4: "#v 베냉#!은 식민지 행정을 마비시키는 조직적인 저항으로 들끓고 있습니다. 전통적인 통치자들과 현대 민족주의자들이 우리의 지속적인 주둔에 맞서 강력한 동맹을 맺었습니다. 이 식민지는 방어 불가능한 상태가 되었습니다." # 6199161542163966935
  ztr_decolonization.47.d_phase4: "부르키나파소의 인구는 강제 노동과 식민지 착취에 맞서 격렬한 반란을 일으켰습니다. 모든 도로는 위험하고, 모든 수비대는 위협받고 있습니다. 한때 해안 식민지에 조용히 노동력을 공급하던 이 영토는 이제 단결되고 절박한 목소리로 자유를 요구합니다." # 3568961621778734846
  ztr_decolonization.48.d_phase4: "우리의 가장 중요한 아프리카 영토인 나이지리아가 폭력적인 격변의 벼랑 끝에 서 있습니다. 모든 지역의 #gold_value 독립#! 운동이 식민지 정부를 마비시켰고, 보안군은 질서를 유지할 수 없습니다. 나이지리아를 잃는다는 것은 우리 아프리카 제국의 종말을 의미할 것입니다." # 4942978667825490273
  ztr_decolonization.49.d_phase4: "#v 카메룬#!은 위임통치 당국에 맞선 무장 투쟁으로 빠져들었습니다. 해방 운동은 영토 전역에서 게릴라전을 벌이고 있으며, 국제적 압력은 우리의 철수를 요구합니다. 위임통치는 실패한 식민지 통치의 대명사가 되었습니다." # 5581352099650431754
  ztr_decolonization.50.d_phase4: "#v 중앙아프리카 공화국#!이 식민 지배의 억압에 맞서 총궐기했습니다. 무장 저항군이 내륙을 장악했고, 우리 수비대는 수도 주변의 좁아지는 방어선에 매달려 있습니다. 이 영토는 이름만 남았을 뿐 사실상 상실되었습니다." # 16331465945675192222
  ztr_decolonization.51.d_phase4: "#v 가봉#!의 #gold_value 독립#! 운동이 무장 투쟁으로 변질되어 자원 채굴 시설을 파괴하고 식민지 기반 시설을 공격하고 있습니다. 한때 우리의 전리품이었던 이 영토의 부가 이제는 우리를 몰아내는 저항의 불씨가 되고 있습니다. 계속된 점령은 더 이상 합리적인 명분이 없습니다." # 16731447635920495661
  ztr_decolonization.52.d_phase4: "#v 콩고 공화국#!이 공공연한 반란 상태에 빠졌습니다. 브라자빌 자체가 전장이 되었고, 우리의 행정력은 사실상 붕괴했습니다. 무장 세력이 지방을 장악했으며, 식민 통치의 기틀이 우리 눈앞에서 무너지고 있습니다." # 17236609541287190939
  ztr_decolonization.53.d_phase4: "#v 콩고#!가 파멸적인 위기 상황으로 치달았습니다. 광활한 영토가 우리 군이 도저히 진압할 수 없는 봉기로 뒤덮였습니다. 수십 년간의 착취가 모든 것을 집어삼킬 듯한 분노를 낳았고, 우리는 역사상 가장 폭력적인 탈식민화라는 현실에 직면했습니다." # 6546496066197337315
  ztr_decolonization.54.d_phase4: "#v 우간다#!가 보호령에 대한 무장 반란에 휩싸였습니다. 각 왕국과 정치 운동 세력이 결집하여 수단과 방법을 가리지 않고 우리 행정부를 축출하려 합니다. 우리 군은 수백만 명이 거주하는 적대적인 영토 전역에서 불가능한 과업을 수행해야 하는 처지입니다." # 358099411249630244
  ztr_decolonization.55.d_phase4: "#v 르완다#!는 #gold_value 독립#!을 향한 투쟁과 깊은 사회적 갈등이 얽히며 격렬한 혼란에 빠졌습니다. 위임 통치 당국은 지방에 대한 통제력을 상실했고, 치안 상황은 매일 악화되고 있습니다. 이 영토는 언제든 폭발할 수 있는 화약고와 같습니다." # 3601469013653066127
  ztr_decolonization.56.d_phase4: "#v 탄자니아#!의 #gold_value 독립#! 운동은 완전한 대중 동원을 이룩했습니다. 우리 행정부는 더 이상 외세의 지배를 용납하지 않으려는 수백만 명의 단결된 인구와 마주하고 있습니다. 이러한 압도적인 저항에 맞서 이 영토를 유지하려는 것은 자멸적인 어리석음에 불과합니다." # 6411903360163464449
  ztr_decolonization.57.d_phase4: "#v 앙골라#!에서 우리 군의 역량을 극한으로 몰아넣는 잔혹한 식민지 전쟁이 발발했습니다. 해방 운동 세력이 식민지의 광활한 영토 곳곳에서 동시다발적인 공세를 펼치고 있습니다. 이 전쟁은 승산이 없으며, 매일 이어지는 전투가 비극을 심화시킬 뿐입니다." # 3065465334604382870
  ztr_decolonization.58.d_phase4: "#v 잠비아#!의 구리 광산은 노동자들이 식민 지배에 반대하는 총파업에 합류하면서 가동이 중단되었습니다. 우리 존재의 경제적 토대가 내부로부터 파괴되었습니다. 무장 세력이 지방을 장악했고, 우리 행정부는 요새화된 구역 안에서만 겨우 명맥을 유지하고 있습니다." # 5487337546808416098
  ztr_decolonization.59.d_phase4: "#v 모잠비크#!는 우리 군이 이길 수 없는 해방 전쟁에 휩싸였습니다. 게릴라 전사들이 북부 주 전역에서 거리낌 없이 활동하고 있으며, 갈등은 매일 남쪽으로 확산되고 있습니다. 이 식민지 전쟁은 우리의 자원과 사기, 그리고 세계적인 위상을 갉아먹고 있습니다." # 17119606410403288147
  ztr_decolonization.60.d_phase4: "#v 말라위#!가 식민 당국에 대한 완전한 불복종을 선언했습니다. 대규모 시민 불복종과 산발적인 폭력 사태로 인해 보호령은 통치 불능 상태가 되었습니다. 우리 관리들은 더 이상 해당 영토를 통치하는 것이 불가능하다고 보고하고 있습니다." # 1148686531973559855
  ztr_decolonization.61.d_phase4: "#v 에스와티니#!의 군주와 국민은 우리의 보호령 지위를 무효라고 선언했습니다. 무장 청년 단체들이 국경을 순찰하고 있으며, 우리 대표들은 내륙에서 추방되었습니다. 이 작은 왕국은 지속적인 예속 대신 대결을 선택했습니다." # 3580477315886260778
  ztr_decolonization.62.d_phase4: "#v 레소토#!는 보호령 지위 유지에 반대하여 전 국민을 동원했습니다. 산악 통로에는 바리케이드가 설치되었고, 우리 행정부는 모든 구역에서 축출되었습니다. 이 내륙 왕국은 우리의 입지를 완전히 불가능하게 만들었습니다." # 1415979908427234127
  ztr_decolonization.63.d_phase4: "#v 말리#!의 광활한 영토 전역에서 무장 저항이 분출되었습니다. 팀북투에서 바마코에 이르기까지, 해방군은 점점 더 거세게 우리의 권위에 도전하고 있습니다. 식민 행정부는 내륙에 대한 통제력을 상실했으며, 철수만이 유일한 현실적인 선택지입니다." # 8846822577022506043
  ztr_decolonization.64.d_phase4: "#v 보츠와나#!의 인구는 영토의 작은 규모가 무색할 만큼 단호하게 보호령에 맞서 일어섰습니다. 조직적인 저항으로 통치가 불가능해졌으며, 국제 여론은 우리의 철수를 요구하고 있습니다. #v 베추아날란드 보호령#!은 끝났습니다." # 18279476565946364822
  ztr_decolonization.65.d_phase4: "#v 짐바브웨#!는 매달 더 격렬해지는 해방 전쟁에 휩싸였습니다. 게릴라군이 전국에서 활동하고 있으며, 정착민 정권은 극복할 수 없는 군사적 현실에 직면했습니다. 이 식민지는 혁명적 변화의 문턱에 서 있습니다." # 17889269000484725937
  ztr_decolonization.66.d_phase4: "#v 마다가스카르#!는 전면적인 반란 상태입니다. 섬의 인구는 식민 지배에 맞서 무장 저항으로 단결했으며, 우리 군은 수적으로 압도적인 적과 마주하고 있습니다. 이 거대한 섬은 우리의 식민지 야망을 위한 빠져나갈 수 없는 덫이 되었습니다." # 11913840654020738402
  ztr_decolonization.67.d_phase4: "#v 에티오피아#!는 고대하고 자랑스러운 문명의 분노를 담아 우리의 주둔에 맞서 총력전을 펼치고 있습니다. 수년간의 저항으로 단련된 #v 에티오피아#! 군은 파괴적인 효율성으로 우리의 거점을 타격합니다. 우리는 절대 굴복하지 않을 국가의 손에 굴욕적인 패배를 맞이할 위기에 처했습니다." # 11724067444987799089
