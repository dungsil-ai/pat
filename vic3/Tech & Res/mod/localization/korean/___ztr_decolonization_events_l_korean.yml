  ztr_decolonization.2.t: "튀니지 탈식민지화" # 8795162236981983838
  ztr_decolonization.2.d: "튀니지의 직할령들이 더 강력한 지방 통치를 복원하고자 #gold_value 독립#을 요구하고 있습니다! 그들의 요구는 최후통첩은 아니지만, 온 세상이 우리를 지켜보고 있습니다. 선택은 간단합니다. 적응하거나, 제국을 유지하거나 둘 중 하나입니다." # 18299660327658030518
