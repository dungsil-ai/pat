  ztr_je_chinese_communist_front_reason: "#v 청#!의 권위가 붕괴하면서 분열된 한족의 세계는 @equality_index! #N 공산주의#!와 같은 새로운 이념에 취약해졌습니다.\n\n각 #v 군벌#!은 이제 독자적인 지역 혁명 동력을 발전시키고 있지만, 더 넓은 위험은 #gold_value 중국#! 전역에서 공유되는 단일한 적색 압력 지표를 통해 추적됩니다.\n\n#v 군벌#!들이 #v 외교#!나 #v 강철#!로 단결하지 못한다면, 그들은 @equality_index! #N 공산주의#!에 하나씩 무너질 수 있습니다.\n\n상황이 악화되지 않는다면, #blue_value 민족주의#! #v 운동#!이 부상하여 #N 적색 위협#!에 맞서도록 지원받을 수 있습니다." # 17334564678372651269
  ztr_je_chinese_communist_front_status: "#N 공산주의자#!의 선동은 여전히 산발적이고 국지적이며 정치적으로 불완전합니다." # 14514814884101828452
