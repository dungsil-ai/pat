  je_decolonization_status_low: "식민 통치는 국제적으로 널리 용인되고 있으나, 변화의 초기 징후가 나타나고 있습니다." # 1599235697117350484
  je_decolonization_status_rising: "식민지 내 민족주의 운동이 탄력을 받고 있습니다. 국제 여론이 식민 통치에 반대하는 방향으로 기울고 있습니다." # 2187901485955437363
