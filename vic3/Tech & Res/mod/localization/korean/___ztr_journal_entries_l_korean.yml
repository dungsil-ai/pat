  je_un_votations_reason: "#blue_value 안전보장이사회#!가 30일간의 예비 토론 기간을 거쳐 #v UN 제안#!에 대한 투표를 시작했습니다.\n\n#bold 안건#!: #v [JournalEntry.GetCustom('ztr_un_vote_subject_name_je')]#!\n#p 제안#!: [JournalEntry.GetCustom('ztr_un_vote_proposal_name_je')]\n#n 현행 법률#!: [JournalEntry.GetCustom('ztr_un_vote_current_law_name_je')]\n\n투표 자격이 있는 모든 #blue_value UN 회원국#!은 투표할 수 있으며, 아무런 조치를 취하지 않는 국가는 기본적으로 중립으로 간주됩니다. 세션 종료 시 찬성표가 반대표보다 많으면 해당 제안이 채택됩니다." # 17758289177034362323
