  ztr_ottoman_already_accepted_help_tt: "[SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] 정부는 이미 외국 원조를 수락했습니다." # 10004682426725476057
  je_superpower_request_law_enactment: "원조 정렬 요건" # 176288197951536485
  je_superpower_request_law_enactment_reason: "[SCOPE.sCountry('superpower_law_requester').GetName]이 중재한 원조 패키지는 순수한 인도주의적 목적이 아닙니다. 그들의 외교관들은 [ROOT.GetCountry.GetName]이 #v 5년#! 이내에 [SCOPE.sLaw('superpower_alignment_law').GetName]을 제정하여 자국의 제도를 후원자의 모델에 더 가깝게 맞추기를 기대하고 있습니다.\n\n실패할 경우, 우리가 정치적 정렬을 받아들이지 않고 외국 자금만 수락했다는 신호로 간주될 것입니다." # 3203905226281094314
  je_superpower_request_law_enactment_goal: "#v 5년#! 이내에 [SCOPE.sLaw('superpower_alignment_law').GetName]을 제정하여 [SCOPE.sCountry('superpower_law_requester').GetName]의 조건을 충족하십시오." # 5199091580544277545
  je_superpower_request_law_enactment_status_pending: "[SCOPE.sCountry('superpower_law_requester').GetName]이 우리가 [SCOPE.sLaw('superpower_alignment_law').GetName]을 제정하기를 여전히 기다리고 있습니다. 원조는 계속되고 있지만, 그들의 인내심도 영원하지는 않을 것입니다." # 16951083571782641937
  je_superpower_request_law_enactment_status_enacting: "[ROOT.GetCountry.GetName]은(는) [SCOPE.sCountry('superpower_law_requester').GetName]의 원조에 따른 정치적 조건을 이행하기 위해 [SCOPE.sLaw('superpower_alignment_law').GetName]을(를) 제정하고 있습니다." # 4337936854678769943
  je_superpower_request_law_enactment_completed_desc: "[SCOPE.sLaw('superpower_alignment_law').GetName]을(를) 통과시키면 [SCOPE.sCountry('superpower_law_requester').GetName]의 기대를 충족하며 관계가 소폭 개선됩니다." # 6216876291377699656
  je_superpower_request_law_enactment_timeout_desc: "제시간에 [SCOPE.sLaw('superpower_alignment_law').GetName]을(를) 통과시키지 못하면 [SCOPE.sCountry('superpower_law_requester').GetName]과의 관계가 악화되고 원조 수정치가 조기에 철회될 것입니다." # 9388024215798077631
