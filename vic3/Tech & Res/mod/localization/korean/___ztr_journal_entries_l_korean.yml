  ztr_ottoman_iraq_foreign_aid_modifier_desc: "외국 자본으로 운영되는 하천 정비, 기반 시설, 지방 지원이 [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] 이라크를 안정시키는 데 기여하고 있습니다." # 5056412763990014817
  ztr_diplomatic_cooldown_tt: "최근 외교적 요청을 보냈습니다. 다음 요청을 하기 전까지 몇 년을 기다려야 합니다." # 2826440025315240454
