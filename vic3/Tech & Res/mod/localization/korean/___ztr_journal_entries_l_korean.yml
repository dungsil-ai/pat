  je_un_info_panel_reason: "[Concept('concept_united_nations','$concept_united_nations$')]은 전쟁을 지양하고 외교적 해결과 인권을 지향하는 국제 외교, 중재 및 정통성의 주요 장이 되었습니다.\n\n[ROOT.GetCountry.GetName]이(가) 조직 내에 머무르는 동안, 이 패널은 #blue_value 안전보장이사회#!의 현재 상임이사국들과 그 의제를 형성하는 주도적인 강대국들을 추적합니다.\n\n#v 현재 안전보장이사회 상임이사국#!:\n[SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_permanent_member_display_rank_1_type')][SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_permanent_member_display_rank_2_type')][SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_permanent_member_display_rank_3_type')][SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_permanent_member_display_rank_4_type')][SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_permanent_member_display_rank_5_type')][SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_permanent_member_display_rank_6_type')][SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_permanent_member_display_rank_7_type')][SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_permanent_member_display_rank_8_type')][SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_permanent_member_display_rank_9_type')][SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_permanent_member_display_rank_10_type')]\n\n#v 현재 UN 거버넌스#!:\n@un_voting_model! #v 투표 모델#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_voting_model_name')]\n@un_veto_right! #v 상임이사국 거부권#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_veto_right_name')]\n@un_member_selection! #v 상임이사국 선출#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_member_selection_name')]\n\n#v 현재 인권 선언#!:\n@un_decolonization! #v 탈식민지화#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_human_rights_decolonization_name')]\n@un_slavery! #v 노예제#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_human_rights_slavery_name')]\n@un_children_rights! #v 아동 권리#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_human_rights_children_name')]\n@un_women_rights! #v 여성 권리#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_human_rights_women_name')]\n\n#v 현재 UN 기구#!:\n@un_imf! #v IMF#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_institution_imf_name')]\n@un_wto! #v WTO#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_institution_wto_name')]\n@un_icc! #v ICC#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_institution_icc_name')]\n@un_unesco! #v UNESCO#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_institution_unesco_name')]" # 6524947597445818669
  je_decolonization: "탈식민지화의 바람" # 6103616958838657657
  je_decolonization_reason: "#v 식민 제국#!의 시대가 저물어가고 있습니다. 전 세계적으로 피지배 민족들은 자결권을 요구하고 있으며, 국제기구들은 제국 통치의 정통성에 의문을 제기하고 있고, 해외 영토를 유지하는 데 드는 비용은 점점 커지고 있습니다.\n\n[ROOT.GetCountry.GetName]은(는) 이러한 시대적 흐름을 신중하게 헤쳐 나가야 합니다. 저항하여 거세지는 반란과 국제적 비난에 직면할 것인지, 아니면 전환을 주도하여 가능한 한 영향력을 보존할 것인지 결정해야 합니다.\n\n#n 탈식민지화 압력#!은 식민 제국의 해체를 향한 국내외의 커지는 동력을 측정합니다. 압력이 높아질수록 피지배국들의 독립 열망은 커지며, 탈식민지화 이벤트의 영향력은 더욱 막대해집니다." # 17829965555905991498
