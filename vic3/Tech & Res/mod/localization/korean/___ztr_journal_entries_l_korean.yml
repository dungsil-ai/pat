  fusion_reactor_research: "핵융합로 연구" # 5937282453387013459
  fusion_reactor_purchase_cost: "핵융합 기술 라이선스" # 4064188452649345056
  fusion_reactor_can_construct_tt: "핵융합로를 위한 적절한 부지를 식별하고 조사했습니다." # 9887277940013167058
  fusion_reactor_purchase_relations_tt: "핵융합 기술을 구매하려면 핵융합 기술을 보유한 강대국과 좋은 관계를 유지해야 합니다." # 8367938849488346526
  fusion_energy_pioneer: "핵융합 에너지 선구자" # 16504773874580270867
  fusion_energy_pioneer_tt: "핵융합 에너지 시대를 개척하며, 우리 국가는 안정적인 #Z 핵융합 반응#!을 달성하고 세계 최초의 상업용 #gold_value 핵융합 발전소#!를 건설했습니다. 이 기념비적인 업적은 우리 국가를 기술 진보와 에너지 생산의 절대적인 최전선에 올려놓았으며, 화석 연료의 독점을 종식시켰습니다." # 3019886158442542699
  je_imf_modernization: "IMF 현대화 목표" # 16895322563950472156
  je_imf_modernization_reason: "#blue_value 국제통화기금(IMF)#!은 [ROOT.GetCountry.GetName]이(가) @developed_country! [Concept('concept_developed_country','$concept_developed_country$')] 지위를 획득하기 위해 충족해야 할 목표를 제시했습니다.\n\n우리는 [ROOT.GetCountry.GetName]이(가) @developed_country! [Concept('concept_developed_country','$concept_developed_countries$')] 대열에 설 수 있을 때까지 교육 수준을 높이고, 인구의 물질적 조건을 개선하며, 경제를 강화해야 할 것으로 예상됩니다." # 2425650483816580252
  je_imf_modernization_goal: "[ROOT.GetCountry.GetName]을(를) 위한 IMF 목표 달성: [Concept('concept_literacy','$concept_literacy$')] 개선, 평균 [Concept('concept_sol','$concept_sol$')] 제고, 그리고 @developed_country! [Concept('concept_developed_country','$concept_developed_country$')] 지위 획득." # 15254472384904479622
  je_imf_modernization_literacy_tt: "최소 #v 70%#!의 [Concept('concept_literacy','$concept_literacy$')]에 도달하십시오." # 1391390331480681266
  je_imf_modernization_sol_tt: "평균 [Concept('concept_sol','$concept_sol$')]을(를) 최소 #v 18#! 이상 달성하십시오." # 17685935939149434019
  je_imf_modernization_developed_tt: "최소 @money!#v 7#!의 [Concept('concept_gdp_per_capita','$1인당 GDP$')]를 보유하십시오." # 15182427314839848932
  je_imf_modernization_status_initial: "#blue_value IMF#! 검토 팀이 첫 번째 평가를 제출했습니다. [ROOT.GetCountry.GetName]은(는) 구조 개혁의 초기 단계에 머물러 있습니다. [Concept('concept_literacy','$concept_literacy$')]은(는) 낮고, [Concept('concept_sol','$Standards of Living$')]은(는 불안정하며, 경제는 현대적 제도를 유지할 만큼의 깊이를 갖추지 못했습니다. 앞으로 나아가야 할 길은 멉니다." # 3136701280617266412
  je_imf_modernization_status_early: "초기 개혁이 뿌리를 내리기 시작했습니다. 지방 소도시에는 학교가 들어서고, 기초적인 보건 기반 시설이 확충되고 있으며, 소규모 산업화로 인해 최초의 임금 노동 거점이 형성되고 있습니다. #blue_value IMF#!는 [ROOT.GetCountry.GetName]의 #v 고무적이지만 취약한 진전#!을 주목하고 있습니다." # 12654949127911601088
  je_imf_modernization_status_progressing: "[ROOT.GetCountry.GetName]은(는) 이제 확실하게 근대화의 길로 들어섰습니다. #blue_value IMF#!는 [Concept('concept_literacy','$concept_literacy$')]의 #positive_value 상당한 진보#!, 상승하는 [Concept('concept_sol','$concept_sol$')], 그리고 다변화되는 경제 기반을 인정하고 있습니다. 이러한 기세가 계속된다면, @developed_country! [Concept('concept_developed_country','$concept_developed_country$')] 지위 달성도 현실적인 범위 내에 있습니다." # 4259518806472032919
  je_imf_modernization_status_advanced: "[ROOT.GetCountry.GetName]은(는) 최종 임계점에 다다르고 있습니다. #blue_value IMF#!는 우리의 진척도를 #positive_value 거의 완료#! 단계로 분류했습니다: [Concept('concept_literacy','$concept_literacy$')] 수준은 높고, 생활 환경은 극적으로 개선되었으며, 경제는 현대적인 발전을 지속할 수 있을 만큼 충분한 부를 창출하고 있습니다. 목표 달성이 눈앞에 있습니다." # 2971344593484121076
  ztr_imf_request_technical_mission: "#blue_value IMF#! 기술 임무" # 17289247628011377800
  ztr_imf_request_technical_mission_desc: "#blue_value 국제통화기금#!에 경제 자문단, 제도 전문가 및 교육 전문가 파견을 공식 요청하여 [ROOT.GetCountry.GetName]의 근대화 계획을 지도받으십시오. 이들의 전문 지식은 적은 국고 비용으로 진보를 가속할 것입니다." # 3398545173608079797
  ztr_imf_technical_mission_cooldown_tt: "최근 #blue_value IMF#! 기술 사절단을 초청한 적이 없습니다 (5년의 재사용 대기시간)." # 3911310596807361692
  ztr_imf_technical_mission_cost_tt: "#blue_value 기술 사절단#!은 우리 [Concept('concept_gdp','GDP')]의 @money!#v 1%#!를 소모할 것입니다." # 9796067332625277685
  ztr_imf_launch_development_plan: "#gold_value 국가 개발 계획#! 시작" # 18330148753187008310
  ztr_imf_launch_development_plan_desc: "향후 20년간의 산업 우선순위, 인프라 확장, 제도 현대화를 골자로 하는 포괄적인 #gold_value 국가 발전 계획#!을 수립하고 공포하십시오. 이 계획은 건설과 생산성을 증대시키겠지만, 정치적 안정에는 부담을 줄 수 있습니다." # 4669122219909988906
  ztr_imf_seek_scholarships: "#v 해외 장학금#!을 모색하십시오" # 13138393553455546150
  ztr_imf_seek_scholarships_desc: "[ROOT.GetCountry.GetName]와 우호적인 관계를 유지하는 #v 열강#!들과 장학금 프로그램을 협상하십시오. 유망한 학생들을 해외로 파견하면 새로운 지식과 기술을 본국으로 전파할 수 있을 것입니다." # 17070546194284324662
  ztr_imf_scholarships_cooldown_tt: "최근 외국 장학 프로그램(3년의 재사용 대기시간)을 마련하지 않았습니다." # 8099959123184708693
  ztr_imf_scholarships_gp_relations_tt: "우리는 #v 열강#!과 최소한 #p 원만한#! 관계를 유지해야 합니다." # 17656932240292627323
  imf_modernization_commitment_modifier: "IMF 현대화 약속" # 5770792193025164119
  imf_modernization_commitment_modifier_desc: "#blue_value IMF#! 현대화 프레임워크는 국제적인 기술 지원의 기반과 소폭의 혁신 성과, 그리고 어느 정도의 국제적 인지도를 제공합니다." # 13486710360597618886
  imf_scholarship_fund_modifier: "대학 장학금 기금" # 12692091412752348154
  imf_scholarship_fund_modifier_desc: "정부 지원 대학 장학금은 재능 있는 졸업생들을 국내에 머물게 하여 국내 지식인 계층을 확대하고 있습니다." # 1219094678593852572
  imf_emigration_restriction_modifier: "두뇌 유출 통제" # 9189076485401577769
  imf_emigration_restriction_modifier_desc: "국경 제한과 출국 허가제는 교육받은 전문가들의 유출을 늦추지만, 지식인들을 억압하고 조용한 반감을 불러일으킵니다." # 17082225617127795166
  imf_brain_drain_modifier: "두뇌 유출" # 9824701386949178869
  imf_brain_drain_modifier_desc: "최고의 인재들이 계속해서 더 부유한 국가로 떠나고 있습니다. 졸업생들이 해외에서 더 나은 기회를 찾으면서 교육 역량이 약화됩니다." # 13292391110525486199
  imf_austerity_accepted_modifier: "IMF 긴축 프로그램" # 4943595283683155125
  imf_austerity_accepted_modifier_desc: "#blue_value IMF#!의 요구로 부과된 재정 규율은 국민에게 고통스럽지만, 국제 신용과 제도적 신뢰의 문을 열어줍니다." # 1777900706164717159
  imf_partial_austerity_modifier: "협상된 재정 조건" # 4516068257964274334
  imf_partial_austerity_modifier_desc: "#blue_value IMF#!와의 실용적인 타협을 통해 복지 지출 일부를 유지하면서도 국제적 신뢰를 유지하기에 충분한 재정 규율을 이행합니다." # 2273007746306408532
  imf_foreign_investment_modifier: "외국 자본 붐" # 14327128547345624675
  imf_foreign_investment_modifier_desc: "외국 자본의 물결이 산업과 인프라로 쏟아져 들어오며 생산 능력을 빠르게 확장하고 있습니다." # 3059753917710303139
  imf_joint_venture_modifier: "합작 투자 체계" # 5522933281563336307
  imf_joint_venture_modifier_desc: "의무적인 현지 파트너십 요건은 외국인 투자가 자본과 함께 지식과 기술을 이전하도록 보장합니다." # 2009420732726645003
  imf_nationalization_modifier: "경제 국유화" # 15311431904377877258
  imf_nationalization_modifier_desc: "외국인 투자자로부터 주요 산업의 통제권을 압수하여 국가적 자부심을 고취하고 국내 산업가들에게 힘을 실어주었으나, 생산 효율성 측면에서 대가를 치르게 되었습니다." # 5388995857123618624
  imf_rural_schools_modifier: "농촌 학교 건설" # 6064110995015358082
  imf_rural_schools_modifier_desc: "수백 개의 새로운 학교가 전국 농촌 지역에 문을 열어, 외딴 지역 사회에 처음으로 초등 및 중등 교육을 제공하고 있습니다." # 17906984785212349710
  imf_media_literacy_modifier: "대중 매체 문해력 캠페인" # 4680419067187630303
  imf_media_literacy_modifier_desc: "라디오 방송, 인쇄된 팸플릿, 순회 강연자들이 최소한의 비용으로 천천히 기초 문해력을 확산시키고 있습니다." # 9487488279975377018
  imf_religious_education_modifier: "종교 교육 네트워크" # 15177189500646151111
  imf_religious_education_modifier_desc: "교회, 모스크, 사원은 농촌 교육의 중추적인 역할을 수행하며 배움의 기회를 확대하고 #v 신앙심 깊은 자#! 이익 집단을 강화합니다." # 6185949585344432530
  imf_political_repression_modifier: "칙령에 의한 근대화" # 60043970763199761
  imf_political_repression_modifier_desc: "정부는 무력을 통해 근대화 계획에 대한 국내 반대 세력을 침묵시키기로 결정했으며, 국제적 명성을 희생하는 대신 안정을 얻었습니다." # 13755958745804294219
  imf_ig_repression_modifier: "정치적 탄압" # 6630152915237075396
  imf_ig_repression_modifier_desc: "국가 보안 기구가 이 파벌의 조직화 및 정책 영향력 행사 능력을 적극적으로 약화시키고 있습니다." # 3208918097152832228
  imf_political_cooperation_modifier: "개혁 연합" # 2870108643117834231
  imf_political_cooperation_modifier_desc: "개혁 과정에 반대 목소리를 포함하면 진전은 더뎌지지만 더 폭넓은 정치적 정통성이 구축됩니다." # 6372505059817232036
  imf_ig_cooperation_modifier: "개혁 연합에 포함됨" # 1935225653104582723
  imf_ig_cooperation_modifier_desc: "이 파벌은 근대화 과정에 참여하도록 초청받았으며 그들의 우려 사항이 다루어지고 있습니다." # 16502990416116812948
  imf_public_consultation_modifier: "공공 근대화 대화" # 1207580803449734747
  imf_public_consultation_modifier_desc: "근대화 방향에 대한 공개적인 대중 협의는 시민 참여를 활성화했지만 정부의 권위를 분산시켰습니다." # 6534773091784720151
  superpower_aid_modifier: "초강대국 원조" # 15356290543337900391
  superpower_aid_modifier_desc: "막대한 외국 원조가 우리의 근대화를 돕고 있지만, 정치적 조건이 따르지 않는 것은 아닙니다." # 2625316287171385040
  imf_technical_mission_modifier: "IMF 기술 사절단" # 10808783082624491470
  imf_technical_mission_modifier_desc: "#blue_value IMF#! 자문관 및 국제 전문가 팀이 국내 기관과 협력하여 교육 개혁을 가속화하고 현대적인 행정 관행을 확산시키고 있습니다." # 12437105167008089457
  imf_development_plan_modifier: "국가 개발 계획" # 2902977619978064044
  imf_development_plan_modifier_desc: "포괄적인 장기 계획이 우선순위 인프라와 산업에 자원을 집중시키고 있으나, 이러한 중앙 집중식 노력은 정치적 유연성을 저해합니다." # 10187191654818438718
  imf_foreign_scholarships_modifier: "해외 장학 프로그램" # 13041555353498859101
  imf_foreign_scholarships_modifier_desc: "촉망받는 학자들이 #v 열강#! 대학에서 유학하며 최첨단 지식을 습득하고 지속적인 학술 네트워크를 구축하고 있습니다." # 17127280929587776705
  ztr_demographic_stage_complete_tt: "다음 [Concept('concept_demographic_stages','인구 통계 단계')]를 향한 진행도 #v 30#!을 축적하십시오." # 16026503759814666505
