  ztr_je_two_chinas_accord: "두 개의 중국 협정" # 17963135863773334801
  ztr_je_two_chinas_accord_reason: "#n 공산주의 중국#!과 #blue_value 국민당 중국#! 모두가 분열된 중국 군벌들 사이에서 자리를 잡으면서, 남아있는 한족과 만주족의 거점은 매력적인 먹잇감이 되었습니다.\n\n이념적 적대감에도 불구하고, 두 경쟁하는 중국은 여전히 임시 협정을 맺을 수 있으며, 분할할 수 있는 주변 군벌들이 남아있는 한 외교적 공작을 조율하며 서로를 지원할 수 있습니다." # 11271466847901612676
