  je_decolonization_status_critical: "식민 질서가 붕괴하고 있습니다. 제국 전역의 피지배 민족들이 공개적으로 반란을 일으키고 있거나 그 직전의 상태입니다. 제국을 유지하는 것은 정치적으로나 경제적으로 더 이상 지속 불가능해졌습니다." # 4203626824244281090
