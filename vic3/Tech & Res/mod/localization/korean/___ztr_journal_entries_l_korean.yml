  ztr_je_russian_absolutism: "러시아 절대왕정의 마지막 날들" # 16706133583245643643
  ztr_je_russian_absolutism_reason: "[Concept('concept_autocracy','전제정치')] 통치 체제인 #v 차르#의 [ROOT.GetCountry.GetName] 지배는 오랫동안 그 정치 지형의 특징이었습니다. 그러나 근대화의 압력, 사회적 불안, 그리고 새로운 이념의 영향력이 이 절대주의 체제의 기반에 도전하고 있습니다. 개혁을 요구하는 목소리가 더욱 크고 조직적으로 커짐에 따라, 차르 정권이 변화하는 시대에 적응할 수 있을지, 아니면 제국을 휩쓰는 변화의 힘에 굴복할 운명인지에 대한 의문이 제기됩니다. [ROOT.GetCountry.GetName]이 취할 수 있는 세 가지 주요 경로가 있습니다:\n\n1.@autocracy_index! #v 보수주의적 경로#!, 현상 유지를 고수하고 반대파를 억압합니다.\n2.@individualist_index! #gold_value 자유주의적 경로#!, 변화에 대한 커져가는 요구를 달래기 위해 시의적절하게 온건한 개혁을 단행합니다.\n3.@equality_index! #negative_value 공산주의적 경로#!, 급진적인 변화와 세계 혁명을 수용하여 기존의 국내 및 국제 질서를 전복합니다.\n\n혁명적 경로의 영향력:\n#gold_value 자유주의적 경로#!: [ROOT.GetCountry.MakeScope.Var('russia_liberalist_path_var_total').GetValue|1].\n#negative_value 공산주의적 경로#!: [ROOT.GetCountry.MakeScope.Var('russia_sovietic_path_var').GetValue|1]." # 9059161221154924887
  ztr_tooltip_russian_order_wins: "#v 질서#! 진행률 표시줄을 완성하십시오" # 17039610554119934420
  ztr_tooltip_russian_revolution_wins: "#negative_value 혁명#! 진행 막대를 채우시오" # 2357181134116278493
  ztr_ask_a_government_liberal_petition: "#gold_value 자유주의자들#로부터 개혁안을 제안하십시오!" # 10723300757377998
  ztr_ask_a_government_liberal_petition_desc: "#gold_value 자유주의자# 세력의 지지를 얻고 추가적인 분열을 피하기 위해, 그들의 우려를 해소할 수 있는 개혁을 단행하는 것을 고려해야 합니다." # 12180572655079458800
  ztr_treaty_with_liberals: "#gold_value 자유주의자#들과 협력 조약을 체결하십시오!" # 4603520096175187585
  ztr_treaty_with_liberals_desc: "#gold_value 자유주의# 파벌과의 우호적인 관계 덕분에 우리는 타협점을 찾아 [ROOT.GetCountry.GetName]의 상황을 안정시키는 데 도움이 될 협력 조약을 체결할 수 있었습니다." # 6165943440896386085
  ztr_help_liberal_consensus: "#gold_value 자유주의자#들의 합의를 자극하시오!" # 2811401668500199351
  ztr_help_liberal_consensus_desc: "#gold_value 자유주의# 세력의 가치에 부합하는 정책을 장려함으로써, 우리는 #negative_value 공산주의# 세력의 커져가는 영향력에 맞서 싸우고 [ROOT.GetCountry.GetName]의 질서를 유지할 수 있습니다." # 9728758186064196064
  ztr_repress_soviet_movements: "#negative_value 공산주의자# 운동을 탄압하라" # 2856824601076373587
  ztr_repress_soviet_movements_desc: "[ROOT.GetCountry.GetName] 내에서 #negative_value 공산주의자#! 운동의 부상은 우리의 안정에 심각한 위협이 되고 있습니다. 우리는 이 집단들을 진압하고 질서를 유지하기 위해 단호한 조치를 취해야 합니다." # 740376290309519800
  ztr_je_russian_absolutism_government_petition: "자유주의자 합의 청원" # 11225720260612133055
  ztr_je_russian_absolutism_government_petition_status: "[SCOPE.gsInterestGroup('government_petition_ig').GetName]이 [SCOPE.sLaw('government_petition_law').GetName]의 통과를 청원하고 있습니다. #negative_value 공산주의자#!들에 대항하여 그들의 지지를 얻으려면, 우리는 그들의 요구를 진지하게 고려해야만 합니다." # 3216646127680842041
  ztr_je_russian_absolutism_government_petition_reason: "[SCOPE.gsInterestGroup('government_petition_ig').GetName]이 [SCOPE.sLaw('government_petition_law').GetName]의 통과를 청원하고 있습니다.\n\n[SCOPE.sLaw('government_petition_law').GetName]이 성공적으로 통과되면, #gold_value 자유주의자들#!은 크게 기뻐할 것이며, [ROOT.GetCountry.GetName]의 질서와 안정을 유지하려는 우리의 노력에 지지를 제공할 수도 있습니다." # 10438582578139570388
  ztr_tooltip_russia_loses_european_periphery: "[ROOT.GetCountry.GetName]은 유럽 통제 변방을 #negative_value 상실할# 것입니다." # 6403648657355501836
  research_center_can_construct_tt: "연구소를 위한 적절한 부지를 확인하고 측량했습니다." # 5608323372346021698
  fusion_reactor_decision: "핵융합로 연구 시작" # 13447182078875952030
  fusion_reactor_decision_desc: "고도의 #blue_value 핵물리학#!과 #blue_value 스마트 에너지 그리드#!가 등장함에 따라, 우리 과학자들은 별의 동력이 되는 #gold_value 제어 핵융합#!이 마침내 실현 가능할 것이라고 믿고 있습니다. #gold_value 핵융합 발전소#! 건설은 거대한 사업으로서 우리 국가의 에너지 공급에 혁명을 일으킬 것이지만, 에너지 시장을 파괴할 수도 있습니다. 그러나 우리는 여전히 이 과정을 안정화하고 상업적으로 실행 가능한 방법을 찾아야 합니다." # 7237558754773308429
  fusion_reactor_purchase_decision: "핵융합로 기술 구매" # 17805009584738936470
  fusion_reactor_purchase_decision_desc: "비록 우리에게 강대국과 같은 토착 연구 기반 시설은 부족하지만, 세계 최초의 #gold_value 핵융합 발전소#!는 상업적 핵융합 에너지의 실행 가능성을 이미 입증했습니다. 기술 파트너십과 관계를 활용하여 이 기술의 라이선스 및 이전을 협상할 수 있습니다. 비용은 막대하겠지만, 그 보상인 사실상 무제한의 #P 청정 에너지#!는 헤아릴 수 없을 만큼 큽니다." # 1166590245189466449
  je_fusion_reactor_research: "#gold_value 핵융합로#! 연구" # 15022951952782195833
  je_fusion_reactor_research_reason: "우리의 최고 물리학자들과 엔지니어들이 핵융합 에너지에 대한 철저한 연구와 실험을 수행하여 #blue_value 플라즈마#!를 안정화하고 순 에너지 이득을 달성하고 있습니다. 진척도는 우리 국가의 #v 경제#!, #v 과학적 역량#!, 그리고 #v 인구#!에 달려 있습니다." # 3370553474718546524
  je_fusion_reactor_research_goal: "#gold_value 핵융합로#! 연구 완료" # 10326727262031532775
  je_fusion_reactor_construction: "#gold_value 핵융합 발전소#! 건설" # 8511018404132830552
  je_fusion_reactor_construction_reason: "#gold_value 핵융합 발전소#! 부지가 선정됨에 따라, 이제 우리 국가 역사상 가장 야심 찬 건설 프로젝트를 진행할 수 있게 되었습니다. 이 시설은 태양을 움직이는 것과 동일한 과정인 핵융합의 힘을 이용하여 사실상 무한한 #P 청정 에너지#!를 생산할 것입니다. 이 시설의 완공은 우리 국가의 기술적 패권에 새로운 시대를 열 것입니다." # 1745768391631876615
  fusion_reactor.1.t: "안정적인 #gold_value 핵융합 반응#! 달성" # 13952117127048588719
  fusion_reactor.1.d: "수년간의 집중적인 연구와 고된 실험 끝에, 우리 과학자들은 안정적인 #Z 핵융합 반응#!을 성공적으로 달성했습니다. 플라즈마 물리학에서의 이 기념비적인 돌파구는 별을 움직이는 과정을 우리 국가에서 제어할 수 있음을 증명합니다. 이제 우리 국가에 사실상 무한한 #P 청정 에너지#!를 공급할 #gold_value 민간 핵융합로#!를 건설할 수 있게 되었습니다." # 6267783798527992713
  fusion_reactor.1.f: "우리는 원자를 길들였습니다. 이제 별의 힘을 이용할 것입니다." # 14390086685837756197
  fusion_reactor.1.a: "미래를 밝히자." # 3878123373046825073
  fusion_reactor.2.t: "#gold_value 핵융합 발전소#! 준공" # 1712954297507393457
  fusion_reactor.2.d: "우리 국가의 #gold_value 핵융합 발전소#!가 공식적으로 첫 플라즈마를 달성했습니다. 강력한 자기장 속에 초고온 수소 동위원소를 가두는 공학의 경이로움인 이 원자로는 사실상 무한한 #P 청정 에너지#!를 제공할 것을 약속합니다. 이 업적은 우리 국가를 기술 진보의 절대적인 최전선에 올려놓았습니다." # 7030961032701124623
  fusion_reactor.2.a: "별의 힘은 우리의 명령 아래 있습니다." # 7522954737523939040
  fusion_reactor.2.d_first: "세계 최고의 과학자, 고위 인사, 엔지니어들이 참석한 가운데, 우리 국가의 #gold_value 핵융합 발전소#!가 공식적으로 첫 플라즈마를 달성했습니다. 강력한 자기장 속에 초고온 수소 동위원소를 가두는 공학의 경이로움인 이 원자로는 사실상 무한한 #P 청정 에너지#!를 제공할 것을 약속합니다. 이 업적은 우리 국가를 에너지 생산의 선두주자로 만들었습니다." # 11579556384361485036
  fusion_reactor_global.t: "에너지의 새로운 시대" # 7124313575766278887
  fusion_reactor_global.d: "[SCOPE.sCountry('fusion_builder_country').GetName]가 세계 최초의 상업용 #gold_value 핵융합 발전소#!를 공식적으로 가동함에 따라 전 세계에서 보고가 쏟아지고 있습니다. 별의 힘을 이용하는 이 기념비적인 업적은 인류의 기술적 역량과 에너지 생산의 패러다임 전환을 의미하며, 화석 연료의 독점을 종식시켰습니다." # 15226822340535625164
  fusion_reactor_global.a: "#blue_value 미래#!가 여기에 있습니다." # 4620960619358074385
