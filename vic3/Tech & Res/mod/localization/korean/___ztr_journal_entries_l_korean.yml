  ztr_je_prc_created: "#v 중화인민공화국#!이 수립되었습니다." # 13065234870786154201
  ztr_je_chinese_communist_front_status_armed: "#N 공산주의자#! 세력이 이제 무장 기지를 유지하고 국가 건설에 맞설 수 있을 만큼 충분한 총체적 힘을 갖추었습니다." # 145179979595708879
