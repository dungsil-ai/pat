  je_ottoman_empire_collapse: "오스만 제국 쇠퇴" # 3065944229570634865
  je_ottoman_empire_collapse_reason: "[SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetName]은 부채, 지방의 소요, 군사적 음모, 열강의 침탈이라는 긴 위기로 접어들고 있습니다.\n\n[SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] #v 정부#!는 생존을 위해 충분히 빠르게 개혁하거나, 제국이 더 작은 계승 국가로 축소되는 것을 지켜봐야 합니다.\n\n이 상황에 참여하는 #v 열강#!은 [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] 이집트, 시리아, 이라크에서 지역 원조 임무를 후원하여 지방을 안정시키는 동시에, 제국이 끝내 분열될 경우를 대비한 미래의 외교적 개입 명분을 쌓을 수 있습니다." # 6475010502946898105
  je_ottoman_empire_collapse_goal: "[SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetName]은 붕괴 수치가 가득 차기 전에 개혁, 성장, 지정학적 회복을 통해 국가를 안정시켜야 합니다." # 7139674831132746036
  je_ottoman_empire_collapse_status: "숭고한 문(Porte)은 여전히 유지되고 있으나, 부채와 지방의 소요, 외세의 음모가 제국의 결속력을 꾸준히 갉아먹고 있습니다." # 3926699936654788442
  je_ottoman_empire_collapse_status_arab: "아랍 지방의 유지들은 오스만 제국의 권위를 점차 협상 가능하고 일시적이며, 노골적으로 불법적인 것으로 취급하고 있습니다." # 16853834400619901855
  je_ottoman_empire_collapse_status_army: "군대는 믿을 수 있는 국가의 도구가 아니라 파벌과 숙청, 그리고 대가를 받지 못한 충성심이 뒤엉킨 정치적 장이 되어가고 있습니다." # 14766000540502963723
  je_ottoman_empire_collapse_status_foreign: "유럽의 금융가, 이권 양도자, 외교관들은 [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective]의 지방들을 경쟁적인 영향권으로 노골적으로 분할하고 있습니다." # 6620304322592144978
  je_ottoman_empire_collapse_status_terminal: "제국은 종말 단계에 접어들었습니다. 모든 양보는 또 다른 요구를 불러오고, 이제 무력을 사용하려는 모든 시도는 국가 전체를 산산조각 낼 위협이 됩니다." # 14040841514883593609
  ztr_ottoman_collapse_request_egypt: "#v 이집트 원조#! 제공" # 5300378080480537713
  ztr_ottoman_collapse_request_egypt_desc: "[SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] 이집트의 관개, 치안, 농업 지원을 후원하십시오. 만약 제국이 나중에 붕괴한다면, 우리의 이집트 임무는 공식적인 영유권 주장으로 발전할 것입니다." # 10183128667523976464
  ztr_ottoman_collapse_request_egypt_cost_tt: "[SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] 정부가 수락한다면, 이 이집트 원조 임무는 국고에서 #n @money! 150만#!을 소모하게 됩니다. #n 거절할 경우, 그들은 더 이상 우리의 제안을 받아들이지 않을 것입니다#!." # 12072883920878042876
  ztr_ottoman_collapse_request_levant: " #v 시리아 원조#! 제안" # 7434153197297587298
  ztr_ottoman_collapse_request_levant_desc: "시리아, 레바논, 팔레스타인, 트란스요르단 지역의 구호 활동, 운송 사업, 반란 진압 조치를 지원합니다. 만약 제국이 추후 붕괴한다면, 우리의 시리아 임무는 영유권 주장의 근거가 될 것입니다." # 14036208451263283932
  ztr_ottoman_collapse_request_levant_cost_tt: "[SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] 정부가 수락한다면, 이 시리아 원조 임무는 국고에서 #n @money! 100만#!을 소모하게 됩니다. #n 거절할 경우, 그들은 더 이상 우리의 제안을 받아들이지 않을 것입니다#!." # 12022366117035299806
  ztr_ottoman_collapse_request_iraq: " #v 이라크 원조#! 제안" # 12961277534426499637
  ztr_ottoman_collapse_request_iraq_desc: "바그다드, 바스라, 모술 지역의 관개 시설, 통신, 행정 지원에 자금을 지원합니다. 만약 제국이 추후 붕괴한다면, 우리의 이라크 임무는 해당 지역들에 대한 영유권 주장이 될 것입니다." # 920500065899410236
  ztr_ottoman_collapse_request_iraq_cost_tt: "[SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] 정부가 수락한다면, 이 이라크 원조 임무는 국고에서 #n @money! 100만#!을 소모하게 됩니다. #n 거절할 경우, 그들은 더 이상 우리의 제안을 받아들이지 않을 것입니다#!." # 9981096387601979668
  ztr_ottoman_egypt_foreign_aid_modifier: "이집트 원조 임무" # 9555414394464077170
  ztr_ottoman_egypt_foreign_aid_modifier_desc: "외국인 기술자, 농업 신용 대출, 새로운 치안 유지 지원이 이집트를 안정시키고 농업 생산량을 높이는 데 기여하고 있습니다." # 7766352857307802998
