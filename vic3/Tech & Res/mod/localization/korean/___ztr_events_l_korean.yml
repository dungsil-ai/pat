  ztr_russian_revolution_polish_unrest.t: "폴란드 불안" # 4584528091931242156
  ztr_russian_revolution_polish_unrest.d: "#bold 변화의 바람#이 [ROOT.GetCountry.GetAdjective] 폴란드에 불고 있습니다. 오랫동안 수면 아래에서 끓어오르던 민족주의적 정서가 공개적인 시위로 분출되었습니다. 주민들은 이 지역에 대한 우리의 통치에 도전하며 더 큰 인정과 자치권을 요구하고 있습니다." # 15381813802274160073
  ztr_russian_revolution_polish_unrest_suppressed.option: "우리는 질서를 회복해야 합니다. 이 불안을 진압하시오." # 7055902339159331054
  ztr_russian_revolution_polish_unrest_appeased.option: "아마도 일부 양보는 그들을 진정시킬 수 있을 것입니다." # 3121475184996568739
  ztr_russian_revolution_order_positive_tt: "이는 제국 내 질서를 #positive_value 증가#시킬 것입니다!" # 12568610786142670054
  ztr_russian_revolution_order_negative_tt: "이는 제국 내 질서를 #negative_value 감소시킬 것입니다#!" # 15535565954348939773
  ztr_russian_revolution_poland_is_created_tt: "#blue_value 폴란드#! 가 생성될 것입니다." # 1600612364401386052
  ztr_russian_revolution_polish_ultimatum.t: "폴란드 최후통첩" # 8653890516382736576
  ztr_russian_revolution_polish_ultimatum.d: "폴란드의 불안이 고조되었습니다. 민족주의 지도자들이 대담한 최후통첩을 발표하며 자신들의 지위에 대한 즉각적인 조치를 요구하고 있습니다. 그들은 자치권을, 어쩌면 완전한 독립을 추구하고 있습니다. 거부하는 것은 거의 확실하게 전쟁을 의미하겠지만, 이 중요한 영토에 대한 통제권을 양보하는 것은 삼키기 힘든 쓴 약과 같습니다." # 4344028320000451762
  ztr_russian_revolution_polish_ultimatum.f: "바르샤바 총독으로부터 암호화된 전보가 도착했습니다. 내용은 다음과 같습니다. '폴란드 지도부가 즉각적인 주권을 요구하고 있습니다. 그들은 민병대를 동원했습니다. 그들은 우리의 내부 혼란을 자신들의 기회로 보고 있습니다. 거절은 명백한 선전포고가 될 것입니다. 폐하의 명령이 시급히 필요합니다. 지체할 수 없습니다.'" # 3567720991246528616
  ztr_russian_revolution_polish_ultimatum_reject.option: "이것은 참을 수 없는 모욕이오! 우리는 위협에 굴복하지 않을 것이오. 전쟁을 준비하시오." # 15545594856632250304
  ztr_russian_revolution_polish_ultimatum_accept.option: "그들에게 꼭두각시로서의 자치권을 부여하십시오. 그것은 불가피한 타협입니다." # 16578642881078336649
  ztr_russian_revolution_polish_ultimatum_independence.option: "그들을 놓아주시오. 폴란드는 우리 병사들의 피를 흘릴 가치가 없소." # 9495811160602012269
  ztr_russian_revolution_minorities_unrest.t: "#bold 소수 민족의 불안#!" # 1969517771339594139
  ztr_russian_revolution_minorities_unrest.d: "우리의 광대한 제국은 수많은 민족을 아우르고 있으며, 그들 모두가 우리의 문화나 언어를 공유하는 것은 아닙니다. 발트해에서 캅카스에 이르기까지 불만의 속삭임이 커지고 있습니다. 포용 정책이 없다면, 이 다양한 집단들은 소외되고 억압받는다고 느끼며, 우리의 비(非)러시아 영토 전반에 걸쳐 불안정을 부추기고 있습니다." # 16234959969880088867
  ztr_russian_revolution_minorities_unrest.option: "이는 우려스러운 전개입니다." # 14591751451523249539
  ztr_russian_revolution_minorities_unrest.f: "발트해 연안 지방에서부터 코카서스 산맥에 이르기까지, 지방 총독들로부터 오는 보고는 점점 더 심각해지고 있습니다. 지방 의회들은 문화 보존을 이야기하고 있으나, 그들의 말에는 분리주의의 날카로운 기운이 서려 있습니다. 이는 고립된 불만이 아니라, 제국의 다양한 민족들을 통합하는 데 있어 체계적인 실패가 있음을 보여줍니다. 그들은 자신들의 목소리가 닿지 않고 대변되지 못한다고 느끼고 있으며, 이는 선동가들이 기꺼이 이용하려는 위험한 감정입니다." # 2269774257406766593
  ztr_russian_revolution_peasant_unrest.t: "농민 소요" # 16420054691555141323
  ztr_russian_revolution_peasant_unrest.d: "우리 사회의 근간인 농민층이 균열을 보이고 있습니다. [Concept('concept_serfdom','$concept_serfdom')]의 족쇄에 묶여, 그들의 삶은 고된 노동과 역경뿐입니다. [SCOPE.gsInterestGroup('russia_peasants_scope').GetName]은 점점 더 불안해하며 자유와 토지를 요구하고 있습니다. 그들의 끓어오르는 분노는 시골 지역의 안정 자체를 위협하고 있습니다." # 4213278541349324078
  ztr_russian_revolution_peasant_unrest.option: "그들의 우려 사항을 다루어야 합니다." # 14388678982290927903
  ztr_russian_revolution_peasant_unrest.f: "각하, 귀족 출신 지방 관료들이 농민들이 거의 공개적인 반란 상태에 있다고 보고합니다. 그들은 의무 이행을 거부하고 있으며, 조직적인 토지 점거와 영지 공격에 대한 신빙성 있는 보고가 들어오고 있습니다. [SCOPE.gsInterestGroup('russia_peasants_scope').GetName]이 땅은 그것을 경작하는 자의 것이라고 설파하며 이 불길에 기름을 붓고 있습니다. 시골 지역의 전통적인 질서가 붕괴하고 있습니다." # 17538785455427964131
  ztr_russian_revolution_serfdom_outlawed.t: "농노제 폐지" # 11990324241050108308
  ztr_russian_revolution_serfdom_outlawed.d: "오랜 제도였던 [Concept('concept_serfdom','$concept_serfdom')]이 마침내 폐지되었습니다. 수백만 명의 농노들이 마침내 자유를 얻어, 그들이 묶여 있던 토지로부터 해방되었습니다. [SCOPE.gsInterestGroup('russia_peasants_scope').GetName]이 주도한 이 위대한 개혁은 우리 사회와 경제를 재편할 것을 약속합니다. 이는 분명히 [ROOT.GetCountry.GetName]의 질서를 유지하는 데 도움이 될 것입니다." # 1045000146222144408
  ztr_russian_revolution_serfdom_outlawed.option: "새로운 자유의 시대!" # 11733021872051709880
  ztr_russian_revolution_serfdom_outlawed.f: "황제의 칙령에 따라, 예로부터 내려오던 짐스럽고 구시대적인 농노제도가 이에 폐지되노라. 이는 위대한 국가를 근대화하고 평민들의 고통을 덜어주기 위한 필수적인 조치이자 중대한 진전이다. [SCOPE.gsInterestGroup('russia_peasants_scope').GetName]은 이를 정의의 승리로 환영하였다. 오늘부로 황제의 자비로운 인도 아래 자유와 진보라는 #bold [ROOT.GetCountry.GetAdjective]# 역사의 새로운 장이 시작되었음을 만천하에 알리는 바이다." # 8072236582706145923
  ztr_russian_revolution_liberals_not_with_us.t: "자유주의 야당" # 14572811962365563241
  ztr_russian_revolution_liberals_not_with_us.d: "[Concept('concept_autocracy','전제정치')]적인 #v 차르#의 통치는 [ROOT.GetCountry.GetName]의 정치 지형을 오랫동안 규정해 온 특징이었습니다. 그러나 근대화의 압력, 사회적 불안, 새로운 이념의 영향이 이 절대주의 체제의 근간에 도전하고 있습니다. 개혁을 요구하는 목소리가 더욱 크고 조직적으로 커짐에 따라, 차르 정권이 변화하는 시대에 적응할 수 있을지, 아니면 제국을 휩쓰는 변화의 힘 앞에 무너질 운명인지에 대한 의문이 제기됩니다. 이러한 맥락에서 [SCOPE.gsInterestGroup('russia_liberals_scope').GetName]은 다루기 힘든 세력으로 드러나고 있습니다. 그들은 근대화를 열망하지만, 그들이 주장하는 [ROOT.GetCountry.GetName]에 대한 비전은 우리가 부여할 준비가 되어 있지 않은 자유를 옹호하기에 우리의 비전과 충돌합니다." # 15839003474707207192
  ztr_russian_revolution_liberals_not_with_us.option: "그들의 비전은 우리의 비전이 아니지만, 우리는 그들을 우회할 수 있습니다." # 16138504595507089683
  ztr_russian_revolution_liberals_not_with_us.f: "[SCOPE.gsInterestGroup('russia_liberals_scope').GetName]은 참으로 답답한 역설입니다. 그들은 공장, 철도, 근대적 법률을 주장하며 진보의 언어를 구사합니다. 그러나 바로 그와 동시에, 그러한 개혁을 시행하는 데 필수적인 권위를 치명적으로 훼손할 의회와 자유를 요구합니다. 그들은 우리의 전제정치를 장애물로 여기며, 그것이 혼돈에 맞서는 유일한 방벽이라는 사실을 이해하지 못하고 있습니다." # 11739563202971522883
  ztr_russian_revolution_strange_proletariat.t: "이상한 프롤레타리아" # 7726088333853220680
  ztr_russian_revolution_strange_proletariat.d: "[ROOT.GetCountry.GetName]에서 새로운 계급이 출현하고 있습니다. 바로 #vindustrial proletariat#!입니다! 비록 그 규모는 작고 농민 계층에서 비롯되었으나, 이들은 #v Western Europe#!과는 다른 열정과 계급 의식을 보여줍니다. #v Marx#!는 성숙하고 수많은 노동 계급으로부터 공산 혁명이 일어날 것이라 상상했지만, 우리의 노동 계급은 아직 어리지만 벌써부터 불안하고 자각하고 있습니다. [SCOPE.gsInterestGroup('russia_bolsheviks_scope').GetName]가 이들을 선동하고 있으며, 급진적인 사상이 들불처럼 번지고 있습니다. 농민들의 땅에서 일어난 이 각성은 제국 자체를 뒤바꿀 수도 있습니다." # 17964080371468235972
  ztr_russian_revolution_strange_proletariat.option: "[ROOT.GetCountry.GetName]에서 기이하고 불타는 힘이 솟아오르고 있습니다." # 11389608361138398182
  ztr_russian_revolution_strange_proletariat.f: "장관님, 저희 산업 중심지에서 온 보고가 불안합니다. 마을에서 막 끌어들인 신규 공장 노동자들이 예상대로 행동하고 있지 않습니다. 그들은 놀라운 속도로 조직화하고 있습니다. 서구의 프롤레타리아와는 달리, 우리의 노동 계층은 규모는 작지만 독특하게 불안정하며, 농촌의 전통으로부터 단절되어 가장 극단적인 이념에 매우 민감하게 반응하고 있습니다. [SCOPE.gsInterestGroup('russia_bolsheviks_scope').GetName]이 이러한 에너지를 주도하여 산업적 불만을 국가에 대한 직접적인 정치적 위협으로 바꾸고 있습니다." # 2099362182938348058
  ztr_russian_revolution_intelligentsia_ambiguity.t: "#bold 인텔리겐치아의 요구#" # 11416556098017000372
  ztr_russian_revolution_intelligentsia_ambiguity.d: "[SCOPE.gsInterestGroup('russia_intelligentsia_scope').GetName]이 일련의 요구사항을 가지고 우리에게 접근했습니다. 그들은 자신들의 이익 집단 대다수가 군주제 권위보다 #negative_value 공산주의자#!들을 더 호의적으로 여긴다는 점을 지적하는 데는 관심이 없으며, [concept('concept_literacy','Education')]에 대한 더 많은 자금 지원, [concept('concept_innovation','Research')]에 대한 투자, 그리고 자유로운 사상 교환을 허용하기 위한 검열 및 전통주의 연쇄 조치들의 전반적인 완화를 추구하고 있습니다." # 11048736196317829493
  ztr_russian_revolution_intelligentsia_ambiguity.option: "그들의 요구는 막대하지만, #bold [ROOT.GetCountry.GetAdjective]# 상황에 비추어 볼 때 합리적입니다. 그들의 노력을 지원하십시오." # 7842372976171488684
  ztr_russian_revolution_intelligentsia_ambiguity_refuse.option: "우리는 이러한 사치품을 감당할 수 없으며, 저 #negative_value 공산주의자들#과 좋은 관계를 유지할 여력도 없습니다!" # 12931318615609683115
  ztr_russian_revolution_intelligentsia_ambiguity.f: "[SCOPE.gsInterestGroup('russia_intelligentsia_scope').GetName]의 청원은 명확한 거래를 제시합니다. 그들은 학교와 실험실을 건설할 국가 자금과 검열관의 펜을 가볍게 해줄 것을 요구합니다. 그들은 이것이 현대적이고 강력한 [ROOT.GetCountry.GetName]으로 가는 유일한 길이라고 주장합니다. 하지만 우리는 스스로에게 물어야 합니다. 이 새로운 대학들이 충성스러운 기술자와 과학자를 배출할 것인가, 아니면 우리 제국을 무너뜨리려는 바로 그 급진주의자들의 온상이 될 것인가? 그들은 미래로 가는 열쇠를 제공하지만, 그것은 판도라의 상자를 여는 것일 수도 있습니다." # 5951726501020922234
  ztr_russian_revolution_treaty_liberals.t: "자유주의자들과의 협약" # 12089844962371102762
  ztr_russian_revolution_treaty_liberals.d: "[SCOPE.gsInterestGroup('russia_liberals_scope').GetName]이 협력의 길을 제시하였습니다. 그들은 상당한 경제적 양보와 국가 근대화에 대한 명확한 약속을 대가로 정부를 지지하고 그들의 정치적 야망을 절제할 용의가 있습니다. 이 '조약'은 안정과 진보를 보장할 수 있으나, 우리의 경제 의제를 그들의 의제에 묶이게 할 것입니다." # 2578719236531071282
  ztr_russian_revolution_treaty_liberals_accept.option: "조약을 수락하겠소. 근대화가 무엇보다 중요하오." # 13028143072183963859
  ztr_russian_revolution_treaty_liberals_refuse.option: "우리는 그들의 요구에 인질로 잡혀 있지 않을 것입니다." # 495991779767351546
  ztr_russian_revolution_liberals_will_defend_status_quo_tt: "[SCOPE.gsInterestGroup('russia_liberals_scope').GetName]은 현상 유지를 #positive_value 지지#!할 것입니다." # 12079107760552653703
  ztr_russian_revolution_liberals_will_refuse_forever_status_quo_tt: "[SCOPE.gsInterestGroup('russia_liberals_scope').GetName]은 현상 유지에 #negative_value 반대할# 것입니다." # 2270670765346625702
  ztr_russian_revolution_treaty_liberals.f: "[SCOPE.gsInterestGroup('russia_liberals_scope').GetName]이 비록 조건이 많은 올리브 가지를 내밀었습니다. 그들은 '근대화 조약'을 제안합니다. 본질적으로, 우리가 그들의 경제 프로그램에 전적으로 헌신한다면, 그들은 자신들의 정치적 지지를 보장하고 경제 안정을 위해 영향력을 사용할 것입니다. 이는 산업 발전과 시장 개혁을 그 무엇보다 우선시한다는 것을 의미합니다. 이는 이해관계에 따른 동맹이며, 우리의 운명을 그들과 묶는 것입니다." # 12108337949561204722
  ztr_russian_revolution_petition.t: "#bold 산업가들의 청원#" # 13326978367500877678
  ztr_russian_revolution_petition.d: "[SCOPE.gsInterestGroup('government_petition_ig').GetName]이 정부에 공식적으로 청원했습니다. 경제 발전의 필요성을 언급하며, 그들은 우리가 [SCOPE.sLaw('government_petition_law').GetName]을 제정할 것을 요구하고 있습니다. 그들은 대안으로 [SCOPE.sLaw('government_petition_law_2').GetName]도 제안했지만, 그들의 메시지는 분명합니다. 현행 법률이 국가의 산업 잠재력을 저해하고 있다는 것입니다." # 3521028340437969392
  ztr_russian_revolution_petition.f: "존경하는 각료 회의에, 저희 [SCOPE.gsInterestGroup('government_petition_ig').GetName]의 대표들은 국가의 경제적 미래를 위하여 이 청원서를 공식적으로 제출합니다. 현행 법률 체계는 과거 시대에는 적합했을지 모르나, 이제는 [ROOT.GetCountry.GetName]의 산업 잠재력을 적극적으로 저해하고 있습니다. 따라서 저희는 정부가 지체 없이 [SCOPE.sLaw('government_petition_law').GetName]을 제정해 주시기를 간청합니다. 만약 이 주된 조치가 실현 불가능하다면, [SCOPE.sLaw('government_petition_law_2').GetName]이 부분적이지만 덜 바람직한 해결책이 될 것입니다." # 9695946921771547014
  ztr_russian_revolution_duma_role.t: "# 두마의 역할 #" # 2710278098576364981
  ztr_russian_revolution_duma_role.d: "조약 협상이 진행됨에 따라 #v Duma#!의 역할이 점점 더 중요해지고 있습니다. 이는 정부와 권력을 다투는 다양한 이익 집단 사이의 잠재적인 중재자로 여겨집니다. 순수 자유주의자들은 이를 자신들의 의제를 추진하기 위한 발판으로 보는 반면, 산업가들은 이를 자신들의 경제 개혁을 합법화하는 수단으로 간주합니다. 두마의 영향력은 [ROOT.GetCountry.GetAdjective]의 정치 지형과 제국을 추가적인 불안으로부터 구하는 미래를 결정할 수 있습니다." # 16837246992608062293
  ztr_russian_revolution_duma_role.option: "두마는 우리의 통치에서 중심적인 역할을 해야 합니다." # 6932893907331488555
  ztr_russian_revolution_duma_role_reject.option: "이러한 권력의 자유화는 위험합니다. 우리는 두마의 영향력을 제한해야 합니다." # 9350713220325485558
  ztr_russian_revolution_liberals_will_be_displeased_tt: "우리는 또다시 #golden_value 자유주의자#들의 지지를 잃을 위험에 처했습니다!" # 13833642417184159247
  ztr_duma_low_strata_question.t: "#low strata question#" # 13022885996835225700
  ztr_duma_low_strata_question.d: "#v 두마#!가 [ROOT.GetCountry.GetName] 내 하층 계급의 생활 수준에 관한 논쟁적인 사안인 '하층 계급 문제'를 논의하고 있습니다. 빈민을 돕는 것은 사회적 긴장을 완화하고 [SCOPE.gsInterestGroup('russia_bolsheviks_scope').GetName]의 영향력을 줄일 수 있겠지만, 우리는 #v 자유주의자#!들 사이에서 분열이 일어나고 있으며, [SCOPE.gsInterestGroup('russia_liberals_scope').GetName] 중 오직 소수만이 하층 계급을 돕고자 한다는 사실에 놀라움을 금치 못합니다." # 5446068824146178231
  ztr_duma_low_strata_question_refuse.option: "그들의 말이 맞습니다, 생산 수단의 근대화가 더 중요합니다." # 10962484619778133554
  ztr_duma_low_strata_question_accept.option: "우리는 안정과 더 높은 소비 수요를 보장하기 위해 빈민들의 삶을 개선해야 합니다." # 14411980263207142262
  ztr_duma_workers_rights_question.t: "노동자 권리 문제" # 11859547918897210177
  ztr_duma_workers_rights_question.d: "#v 두마#!가 [ROOT.GetCountry.GetName] 내 산업 노동자의 노동법 및 보호 조치에 관한 분열적인 쟁점인 '노동자 권리 문제'를 논의하고 있습니다. 일부는 이를 환경 개선과 불안정 감소를 위한 필수적인 조치로 보는 반면, 다른 이들은 이것이 산업 성장을 저해하고 노동 계급과 [SCOPE.gsInterestGroup('russia_liberals_scope').GetName] 간의 미묘한 세력 균형을 무너뜨릴 것을 우려하고 있습니다." # 6422690058364762044
  ztr_duma_workers_rights_question_refuse.option: "우리는 [SCOPE.gsInterestGroup('russia_liberals_scope').GetName]을 소외시킬 여유가 없습니다." # 8516685880798798803
  ztr_duma_workers_rights_question_accept.option: "노동자의 권리를 보호하는 것은 #v Order#!에 필수적이니, 즉시 [SCOPE.sLaw('russia_no_workers_rights_law_scope').GetName]를 제정하십시오." # 10967443666147982130
  ztr_russian_revolution_liberals_stop_supporting_us.t: "#bold 자유주의자들의 지지 철회#!" # 11055507411625828513
  ztr_russian_revolution_liberals_stop_supporting_us.d: "최근의 분쟁 이후, [SCOPE.gsInterestGroup('russia_liberals_scope').GetName]은 정부에 대한 지지를 철회하기로 결정했습니다. 그들은 우리의 의제 지원 거부에 실망했으며, 우리를 [ROOT.GetCountry.GetAdjective]의 근대화를 가로막는 장애물로 간주하고 있습니다. 이러한 지지 상실은 우리의 효과적인 통치 능력과 제국의 #v 질서# 유지를 위해 중대한 영향을 미칠 수 있습니다." # 1815628632525722178
  ztr_russian_revolution_liberals_stop_supporting_us.option: "이는 차질이긴 하나, 그들 없이도 모든 것을 감당할 수 있지 않겠습니까?" # 13369805919187963867
  ztr_russian_revolution_leader_for_soviet.t: "소련의 지도자" # 4925938213487629575
  ztr_russian_revolution_leader_for_soviet.d: "[SCOPE.gsInterestGroup('russia_bolsheviks_scope').GetName]은 이 격동의 시기를 헤쳐나갈 카리스마 넘치는 지도자를 찾고 있습니다. 그들은 볼셰비키, 멘셰비키, 좌익사회주의혁명당과 같은 내부의 다양한 분파들을 통합하고, 이들 이념 중 하나를 선택하여 [ROOT.GetCountry.GetName]의 기존 질서에 도전할 인물을 필요로 합니다. 그러한 지도자를 찾는 것은 그들의 영향력과 대중 동원 능력을 크게 강화할 수 있습니다.\n\n몇 달 후, #v 소비에트 대회#!가 개최될 것입니다." # 2569690375494719549
  ztr_russian_revolution_leader_for_soviet_lenin.option: "그들은 #negative_value 볼셰비키#! [SCOPE.sCharacter('soviet_leader_character_scope').GetFullName]가 이 임무에 적임자라고 생각합니까?" # 2373418884192539414
  ztr_russian_revolution_leader_for_soviet.option: "그들이 [SCOPE.sCharacter('soviet_leader_character_scope').GetFullName]가 우리가 필요로 하는 모든 자질을 갖추었다고 생각합니까?" # 14190421778900691290
  ztr_russian_revolution_first_soviet_congress.t: "#bold 제1차 소비에트 대회#" # 3524278693860634204
  ztr_russian_revolution_first_soviet_congress.d: "#v 제1차 소비에트 대회#!가 소집되어 [ROOT.GetCountry.GetName] 전역의 다양한 노동자, 병사, 농민 평의회 대표들을 한자리에 모았습니다. [SCOPE.gsInterestGroup('russia_bolsheviks_scope').GetName]와 [SCOPE.sCharacter('soviet_leader_character_scope').GetFullName]이 이끄는 이 집회는 우리가 면밀히 주시해야 할 순간입니다. 이 대회는 소비에트의 향후 행동과 전략의 방향을 설정하고, 기존 정부 구조에 도전할 가능성이 있습니다." # 12850657491336167097
  ztr_russian_revolution_first_soviet_congress.f: "동지 여러분, 오늘 우리는 #bold 제1차 소비에트 대회#를 위해 [ROOT.GetCountry.GetName]에 모인 역사적인 순간을 맞이했습니다. 우리는 오랫동안 현 체제 하에서 소외되고 억압받아 온 노동자, 병사, 농민들의 목소리를 대변합니다. 우리의 대회는 우리 국가의 새로운 미래를 만들어나가려는 우리의 집단적 힘과 결의의 증거입니다. 우리는 볼셰비키, 멘셰비키, 좌익 사회주의혁명당을 포함한 다양한 파벌들을 단결시켜 공동의 길을 개척해야 합니다." # 9409656555392238308
  ztr_first_soviet_congress_bolshevik.option: "#negative_value 볼셰비키#들이 이번 의회에서 주도권을 잡았습니다." # 14702145781425045181
  ztr_russian_communist_bolshevik_ideology_potential_tt: "#negative_value 볼셰비키#들은 잠재적인 @equality_index! #v 러시아 혁명#!을 이끌 것입니다." # 12768370512642466223
  ztr_first_soviet_congress_menshevik.option: "#v 멘셰비키#가 세력을 얻고 있는 듯합니다." # 11441818194661025229
  ztr_russian_communist_menshevik_ideology_potential_tt: "#v 멘셰비키#가 잠재적인 @equality_index! #v 러시아 혁명#!을 이끌 것입니다." # 11553271600432072552
  ztr_first_soviet_congress_left_sr.option: "#gold_value 농본주의 사회주의자들#이 이번 회의에서 자신들의 존재감을 드러내고 있습니다." # 11193407696149173400
  ztr_russian_communist_left_sr_ideology_potential_tt: "#gold_value 농본주의 사회주의자들#!은 잠재적인 @equality_index! #v 러시아 혁명#!을 이끌 것입니다." # 9380364212176049925
  ztr_russia_status_quo_path_wins.t: "현상 유지가 승리하다" # 18044072095178152345
  ztr_russia_status_quo_path_wins.d: "[ROOT.GetCountry.GetName]에서 안정과 전통의 세력이 승리를 거두었습니다. #v 차르 체제#와 그 지지자들은 새로운 세계의 격동적인 파도를 성공적으로 헤쳐나가며 권력을 유지하는 데 성공했습니다. 다양한 이익 집단들은 급진적인 변화보다 국가 통합을 우선시하며 기존의 틀 안에서 공존하는 방안을 찾아냈습니다. 현상 유지를 위한 이 승리는 [ROOT.GetCountry.GetName]이 현재의 경로를 계속 유지하며 세계 최대 제국으로서의 역할을 보존할 것임을 보장합니다." # 15109246774620924482
  ztr_russia_status_quo_path_wins_liberals.d: "[ROOT.GetCountry.GetName]에서 안정 세력이 승리했습니다. #v 차르 정권#과 그 지지자들은 혼란스러운 신세계의 파도를 성공적으로 헤쳐나가 권력을 유지하고 #v 근대화#의 길을 시작했습니다. 두마에서 개혁을 추진하기 위해 치열하게 싸웠던 [SCOPE.gsInterestGroup('russia_liberals_scope').GetName]은 비록 모든 목표를 달성하지는 못했지만, 협상 테이블에서의 자리를 확보했습니다. 현상 유지를 위한 이번 승리는 [ROOT.GetCountry.GetName]이 현 경로를 계속 유지하며 세계 최대 제국으로서의 역할을 보존할 것임을 보장합니다." # 982906869710356586
  ztr_russia_status_quo_path_wins.f: "동포 여러분, [ROOT.GetCountry.GetName]의 시민 여러분, 오늘 우리는 안정과 전통의 승리를 기념합니다. 전례 없는 도전과 변화에 대한 압력에 맞서, 위대한 우리 국가는 굳건히 버텨냈습니다. 충성스러운 이익 집단과 단결된 민중의 지지를 받는 차르 체제는 우리 제국의 근간을 성공적으로 보존했습니다. 우리는 분열 대신 단결을, 격변 대신 연속성을 선택했습니다. 현상 유지를 위한 이 승리는 [ROOT.GetCountry.GetName]이 세계에서 가장 크고 강력한 제국으로서 계속 번영할 것임을 보장합니다." # 1758258531395212347
  ztr_russian_status_quo_path_wins.option: "#v 차르# 만세! [SCOPE.sCharacter('russia_tsar_scope').GetFullName]와 제국이여 영원하라!" # 908101235422980579
  ztr_russian_status_quo_path_wins_liberals.option: "#v 황제 폐하# 만세! [SCOPE.sCharacter('russia_tsar_scope').GetFullName], 그리고 새로운 개혁의 시대가 도래했습니다." # 8700739009943971355
  russian_monarchy_can_survive_tt: "#v 군주제#가 혁명을 #positive_value 격파#했습니다." # 2261863646564731668
  russian_modernization_keep_going_tt: "#v 군주제#와 #v 자유주의자들#이 [ROOT.GetCountry.GetName]에서 혁명을 #positive_value 분쇄했습니다#!" # 17130962966951949342
  ztr_russian_revolution_liberals_wins.t: "자유주의 승리" # 14263569613304548351
  ztr_russian_revolution_liberals_wins.d: "수 주간의 파업, 청원, 대규모 시위 끝에 자유주의 세력이 [ROOT.GetCountry.GetName] 전역에서 주도권을 잡았습니다. [SCOPE.gsInterestGroup('russia_liberals_scope').GetName]은 헌법적 제약, 시민 자유, 가속화된 근대화를 골자로 하는 프로그램을 제시합니다. 영향력 있는 귀족들과 산업 지도자들은 조용히 그들의 지지를 표명하고 있습니다. 모든 시선은 왕좌에 쏠려 있습니다. [SCOPE.sCharacter('russia_tsar_scope').GetFullName]은 헌법 질서를 허용하기 위해 물러날 것인가, 아니면 저항하여 더 큰 화염을 감수할 것인가?" # 16483551244354155755
  ztr_russian_revolution_liberals_wins.f: "수도에서 온 보고에 따르면, 거대한 군중 위로 삼색기가 물결치고 있다고 합니다. 코트 차림의 변호사들이 공장 감독관 및 학생들과 나란히 행진하고 있습니다. 그들의 수사는 신중하고 거의 정중하지만, 목적의식으로 가득 차 있습니다. 한 연설가는 '우리는 국가를 파괴하고자 하는 것이 아니라, 국가를 문명화하고자 하는 것입니다.'라고 선언합니다. 궁전의 창문들은 여전히 닫혀 있습니다. 내부에는 잉크와 밀랍, 그리고 우유부단함의 냄새가 무겁게 감돌고 있습니다." # 6838426798771379834
  ztr_russian_revolution_liberals_wins_abdication.option: "#v 질서#를 위하여, 차르께서는 퇴위하시고 입헌 정부가 수립될 것입니다." # 12015348553241889281
  ztr_russian_revolution_liberals_wins_abdication_refused.option: "퇴위를 거부한다. 왕관은 양보하지 않는다." # 14991567822353479503
  ztr_russian_revolution_communists_wins.t: "공산주의 승리" # 33242438715016083
  ztr_russian_revolution_menshivik_wins.d: "소비에트 내부에서 멘셰비키가 주도권을 잡았습니다. 그들은 광범위한 연합과 단계적 전환을 선호하며, 대중의 대표성에 기반한 민주 사회주의 정부를 촉구합니다. [SCOPE.sCharacter('russia_communists_leader_scope').GetFullName]은 제헌 의회에 대한 즉각적인 선거, 노동조합에 대한 법적 보호, 그리고 [SCOPE.sCharacter('russia_tsar_scope').GetFullName]의 퇴위를 촉구합니다. [SCOPE.gsInterestGroup('russia_liberals_scope').GetName]과 도시 평의회들은 신중한 지지를 표명하고 있습니다." # 6954112954210385448
  ztr_russian_revolution_agro_socialist_wins.d: "마을과 장터에서 농업 사회주의 세력의 거대한 물결이 밀려오고 있습니다. 그들의 강령은 간결하고 명확합니다. 경작자에게 토지를, 코뮌에 신용을, 그리고 생산을 감독할 지역 소비에트를! [SCOPE.sCharacter('russia_communists_leader_scope').GetFullName]은 지주 질서를 해체하고 영지를 지체 없이 재분배할 것을 맹세합니다. 길을 닦기 위해, 그들은 [SCOPE.sCharacter('russia_tsar_scope').GetFullName]의 퇴위와 농민이 지지하는 혁명 정부의 수립을 요구합니다." # 16954498671293037269
  ztr_russian_revolution_bolshevik_wins.d: "볼셰비키가 공장과 병영에서 주도권을 장악했습니다. 그들의 구호는 타협이 없습니다: #v 모든 권력을 소비에트로#!, 억압의 종식, 그리고 산업과 토지의 즉각적인 통제입니다. [SCOPE.sCharacter('russia_communists_leader_scope').GetFullName]은 [SCOPE.sCharacter('russia_tsar_scope').GetFullName]의 퇴위, 낡은 제도의 해산, 그리고 노동자와 농민의 이름으로 통치할 혁명 평의회의 구성을 요구하고 있습니다." # 4064363779690605541
  ztr_russian_revolution_communists_wins.f: "공장 굴뚝에서 나오는 휘파람 소리가 성급한 나팔처럼 날카롭게 울려 퍼지는 가운데, 붉은 깃발들이 거리를 가득 메웁니다. 방직 공장과 수비대의 대표들이 연기가 자욱한 홀에 모여 연필로 휘갈겨 쓴 요구 사항들을 집계하고 있습니다. 연설은 더욱 짧아졌고, 요구는 더욱 날카로워졌습니다. 어딘가에서 전신기가 짤깍거립니다: '소비에트가 승인됨. 권위가 도전받고 있음. 귀하의 결정을 기다림.'" # 7777886475684662844
  ztr_russian_revolution_communists_wins_abdication.option: "퇴위하라. 권력을 소비에트와 그 각료 회의로 이양하라." # 2794712506421970707
  usa_west_coast_purchase.t: "서부 해안 제안" # 4339299157323138207
  usa_west_coast_purchase.d: "[SCOPE.sCountry('usa_scope').GetName]이 우리의 서부 영토 매입에 관심을 표명했습니다. 그들은 이 영토를 확보하는 것이 그들의 전략적 위치와 경제적 잠재력을 향상시킬 것이라 믿고 있습니다. 이 제안은 #v 예상 밖의#! 일이지만, [SCOPE.sCountry('usa_scope').GetName]과의 관계를 강화하고 그 대가로 귀중한 자원을 얻을 기회를 제공합니다." # 5175148571268425172
  usa_west_coast_purchase.f: "[SCOPE.sCountry('usa_scope').GetName]으로부터 공식적인 제안서가 도착했습니다. 그들의 외교관들은 우리의 서부 영토를 그들의 통제 하에 이양하는 것이 상호 이익이 된다는 점을 강조하며 공동 번영의 비전을 제시합니다. 그들은 경제 개발을 계획하고 있으며, 인프라 투자와 무역 기회 확대를 약속합니다. 제안은 관대하지만, 해당 지역에 대한 우리의 장기적인 전략적 이익에 대해서도 의문을 제기합니다." # 12164649281917056907
  usa_west_coast_purchase_accept.option: "협상으로든 전쟁으로든, 그들은 어쨌든 그것을 차지할 것입니다." # 12993106767674753934
  usa_west_coast_purchase_refuse.option: "이곳은 #bold [ROOT.GetCountry.GetAdjective]#의 영토이오, 저 야만인들에게 팔 수는 없소." # 1903829657584386253
  ztr_imf_conference.t1: "브레튼우즈 회의" # 11234830639816998068
  ztr_imf_conference.t2: "[SCOPE.sState('imf_conference_state').GetName] 회의" # 15873935525233189338
  ztr_imf_event.1.d: "[SCOPE.sCountry('imf_proposer').GetName]가 주최하는 이번 회의를 위해 전 세계가 [SCOPE.sState('imf_conference_state').GetName]에 모이고 있습니다.\n\n전 세계의 대표들이 국제 금융과 경제 협력의 미래를 논의하기 위해 소집되었습니다. 이번 회의는 국제통화기금(IMF) 및 세계은행과 같은 기구의 창설을 포함하여 세계 경제 안정을 위한 새로운 틀을 마련하는 것을 목표로 합니다.\n\n이러한 기구들을 통해 가난한 국가들은 금융 자원과 개발 지원에 접근할 수 있게 될 것이며, 부유한 국가들은 경제 정책을 조정하고 세계적인 성장을 촉진할 수 있는 발판을 마련하게 될 것입니다." # 15754035214860439651
  ztr_imf_event.1.a: "#b IMF#!는 세계 경제에 도움이 될 것입니다." # 7880538442432784944
  ztr_imf_event.1.b: "우리에게는 그리 필요한 일이 아닙니다." # 17773409748763701191
  ztr_imf_event.4.t: "IMF 현대화 프로그램" # 17100946535913628269
  ztr_imf_event.4.d: "#blue_value 국제통화기금#! 대표단이 [ROOT.GetCountry.GetName]에 대한 최신 검토를 마쳤습니다.\n\n그들의 결론은 단호합니다. 우리가 @developed_country! [Concept('concept_developed_country','$concept_developed_countries$')]의 일원으로 간주되려면 교육 시스템을 현대화하고, 국민의 생활 수준을 높이며, 경제의 기초를 강화해야 합니다." # 3102694638888217030
  ztr_imf_event.4.a: "우리는 스스로를 위해 #blue_value IMF#!의 목표를 따를 것입니다." # 3655067576972362141
  ztr_imf_event.5.t: "IMF 현대화 달성" # 7352002541912731841
  ztr_imf_event.5.d: "교육, 생활 수준, 경제 역량에 대한 지속적인 개혁 끝에 [ROOT.GetCountry.GetName]은 #blue_value 국제통화기금#!이 제시한 현대화 목표를 달성했습니다. 우리나라는 이제 지식을 흡수하고, 제도를 조정하며, 과학적 진보를 가속할 수 있는 훨씬 더 강력한 위치에 서게 되었습니다." # 11631990101812897775
  ztr_imf_event.5.a: "우리의 현대화는 이제 혁신과 진보의 원동력이 될 것입니다." # 16445374073791990350
  ztr_imf_modernization.10.t: "지식인의 탈출" # 10525285107644382385
  ztr_imf_modernization.10.d: "우리가 수년간 공들여 교육한 가장 뛰어난 졸업생들, 즉 의사와 엔지니어, 과학자들이 [ROOT.GetCountry.GetName]을 떠나 [SCOPE.sCountry('brain_drain_destination').GetName]과 같은 더 나은 국가나 다른 부유한 나라로 향하고 있습니다.\n\n임금 격차는 엄청납니다. 우리가 일 년 동안 지급하는 급여를 외국 고용주들은 한 달 만에 제시합니다. 개입이 없다면, 이러한 인재 유출은 우리가 현대화를 위해 필요로 하는 바로 그 기관들의 근간을 뒤흔들 것입니다." # 15915618920673008435
  ztr_imf_modernization.10.f: "교육 시스템의 첫 결실이 시스템을 개선할 수 있는 이들의 이민이라는 것은 참으로 씁쓸한 아이러니입니다." # 16437320655047482903
  ztr_imf_modernization.10.a: "국내 대학 장학금과 스타트업을 지원하여 졸업생들을 붙잡으십시오." # 2022781583444094388
  ztr_imf_modernization.10.b: "졸업생들에 대한 이민 통제와 출국 허가제를 시행하십시오." # 7718276499890478122
  ztr_imf_modernization.10.c: "우리는 외국 급여와 경쟁할 수 없습니다. 그들을 보내주십시오." # 16136629638493031408
  ztr_imf_modernization.11.t: "IMF의 재정 요구" # 10907028800860317549
  ztr_imf_modernization.11.d: "#blue_value 국제통화기금(IMF)#!이 [ROOT.GetCountry.GetName]의 재정 상태에 대한 검토를 마쳤으며, 결론은 냉혹합니다. 엄격한 긴축 조치를 시행하지 않는다면 추가적인 신용 및 제도적 지원은 보류될 것입니다.\n\n제안된 패키지에는 공공 부문 임금 삭감, 소비재 보조금 폐지, 그리고 @money!#v 국가 부채#!의 구조 조정이 포함되어 있습니다. 국민들은 고통받겠지만, 다른 선택지는 재정적 고립뿐입니다." # 8714349607188706698
  ztr_imf_modernization.11.f: "협정서의 서명은 항상 잉크로 쓰이지만, 그 대가는 항상 빵으로 치러집니다." # 1238008126925182924
  ztr_imf_modernization.11.a: "#blue_value IMF#! 긴축 패키지를 전면 수용하십시오." # 860252460387849422
  ztr_imf_modernization.11.b: "조건을 거부하십시오. 우리는 스스로 해결할 것입니다." # 11153774438102255597
  ztr_imf_modernization.11.c: "사회적 지출을 줄여 부분적으로 이행하도록 협상하십시오." # 16603615764430797032
  ztr_imf_modernization.12.t: "밀려드는 외국 자본" # 15259790922670734065
  ztr_imf_modernization.12.d: "[SCOPE.sCountry('imf_investor_country').GetAdjective] 자본이 #gold_value 자본 흐름#!의 형태로 [ROOT.GetCountry.GetName]의 산업과 인프라에 막대한 자금을 투입할 의사가 있음을 밝혔습니다.\n\n그들의 투자 은행은 공장, 철도, 항만 시설을 약속하지만, 그 조건에는 완전한 소유권, 이윤 송금, 원자재에 대한 우선 접근권이 포함되어 있습니다. 경제적 부양 효과는 엄청나겠지만, 우리 생산 기반에 대한 통제력을 잃게 될 위험도 그만큼 큽니다." # 16186586839393391714
  ztr_imf_modernization.12.f: "자본은 애국심도 인내심도 모릅니다. 수익이 가장 높은 곳으로 향하고, 그렇지 않으면 떠나버릴 뿐입니다." # 7950022214942459979
  ztr_imf_modernization.12.a: "제한 없이 [SCOPE.sCountry('imf_investor_country').GetAdjective] 자본을 환영하십시오." # 9253818345987121760
  ztr_imf_modernization.12.b: "국내 파트너십과의 #v 합작 투자#!를 요구하십시오." # 15890328479918491384
  ztr_imf_modernization.12.c: "기회를 받아들이되 국유화하십시오. 우리는 스스로의 미래를 건설할 것입니다." # 7667583214736288088
  ztr_imf_modernization.13.t: "지방에 빛을 밝히며" # 1870403517896141201
  ztr_imf_modernization.13.f: "자신의 법조차 읽지 못하는 국가는 소문과 전통에 의해 통치되기 마련입니다." # 15920157661243778492
  ztr_imf_modernization.13.a: "대규모 농촌 학교 건설 캠페인에 자금을 지원하십시오." # 447436138894498165
  ztr_imf_modernization.13.b: "라디오 및 인쇄 매체 문해력 캠페인을 시작하십시오." # 13309194823412951429
  ztr_imf_modernization.13.c: "마을에 이미 존재하는 종교 기관 네트워크에 교육을 위임하십시오." # 17752086515625753994
  ztr_imf_modernization.14.t: "근대화에 대한 반발" # 1850034147233330822
  ztr_imf_modernization.14.d: "개혁의 속도가 [ROOT.GetCountry.GetName]의 정치적 연합을 분열시켰습니다. 한때 근대화 의제를 용인했던 [SCOPE.gsInterestGroup('imf_disgruntled_ig').GetName]는 새로운 개혁이 그들의 기대에 미치지 못하자 적대적으로 돌아섰습니다.\n\n그들의 불만은 전통 산업의 대체부터 외세의 영향에 대한 문화적 불안까지 다양합니다. 이를 방치하면 그들의 반대가 개혁 과정을 완전히 마비시키거나, 더 나아가 위기를 초래할 수도 있습니다." # 7260032396252701218
  ztr_imf_modernization.14.f: "모든 혁명은, 설령 평화로운 혁명이라 할지라도, 그 자체의 적을 만들어냅니다." # 552240175969125049
  ztr_imf_modernization.14.a: "칙령을 통해 [SCOPE.gsInterestGroup('imf_disgruntled_ig').GetName]의 반대를 억압하십시오." # 10826000301975852693
  ztr_imf_modernization.14.b: "그들을 개혁 연합으로 포섭하고 그들의 우려를 해결하십시오." # 7696073579998401977
  ztr_imf_modernization.14.c: "공개 협의를 열고 국민들이 결정하게 하십시오." # 8780006155888449479
  ztr_imf_modernization.15.t: "개발 정상회담" # 2799723528190725766
  ztr_imf_modernization.15.d: "[SCOPE.sCountry('superpower_law_requester').GetName]은 인도주의적 의무와 전략적 이익을 모두 언급하며 [ROOT.GetCountry.GetName]을 주요 의제로 하는 국제 개발 회의를 소집했습니다.\n\n이 회의는 우리가 인프라, 교육, 제도적 역량을 아우르는 포괄적인 원조 패키지를 받을지 여부를 결정할 것입니다. 하지만 회의실의 모든 대표는 암묵적인 조건을 이해하고 있습니다. 이러한 규모의 원조에는 정치적 동조와 경제적 접근에 대한 기대가 따른다는 사실을 말입니다." # 3859221400823502599
  ztr_imf_modernization.15.f: "후원자의 손은 항상 열려 있지만, 결코 빈손은 아닙니다." # 8909846117861245210
  ztr_imf_modernization.15.a: "국제 원조 패키지와 그 조건을 수락하십시오." # 14621687707928103312
  ztr_imf_modernization.15.b: "남남 협력 대안을 제안하십시오." # 11034360126775887684
  ztr_imf_modernization.15.c: "경제적 자립을 선언하십시오. 우리는 외부의 간섭 없이 우리만의 길을 개척할 것입니다." # 16588536290416414148
  ztr_imf_modernization.20.t: "IMF 자문단 도착" # 9256375496493827822
  ztr_imf_modernization.20.d: "경제학자, 제도 개혁 전문가, 교육 전문가들로 구성된 #blue_value IMF#! 자문단이 [ROOT.GetCountry.GetName]에 도착했습니다.\n\n향후 10년 동안 그들은 우리 정부 부처, 대학, 기획 위원회에 파견되어 기술적 지원을 제공하고 조직적 지식을 전수할 것입니다. 그들의 존재는 [ROOT.GetCountry.GetName]이 근대화에 진지하다는 것을 세계에 알리는 신호입니다." # 16745966879087924921
  ztr_imf_modernization.20.f: "타인에게서 빌린 진보라 할지라도 스스로 만드는 법을 배우기만 한다면 그것 역시 진보입니다." # 12678865110846233617
  ztr_imf_modernization.20.a: "자문단을 환영하고 그들의 활동 자금을 지원하십시오." # 2006496503477222394
  ztr_arable_land.1.t: "질소의 필수성" # 13548480746427544937
  ztr_arable_land.1.d: "질소 고정 기술의 돌파구는 우리 조국에 독보적인 기회를 가져다주었습니다. 이전에는 너무 척박하거나 지력이 다해 경작이 불가능하다고 여겨졌던 광활한 토지가 이제 합성 비료를 통해 되살아날 수 있게 되었습니다.\n\n가장 인구가 밀집된 지역에 실업이 만연함에 따라, 정부는 대규모 토지 개간 사업을 승인했습니다. 절박한 처지의 수천 명의 노동자들이 화학 물질과 도구로 무장한 채, 조국을 먹여 살리고 당면한 과제를 해결하기 위해 흙에서 생명을 쥐어짜 내겠다는 희망을 품고 새로운 개척지로 향하고 있습니다." # 8879359525607519089
  ztr_arable_land.1.a: "농업 개척지를 확장하십시오." # 1744575505758482276
  ztr_arable_land_tt: "이는 우리 주들의 [concept_arable_land]를 적당히 #positive_value 증가#!시킵니다." # 4055658827961816114
  ztr_arable_land.2.t: "녹색 혁명" # 13296200629546456599
  ztr_arable_land.2.d: "고수확 곡물 품종의 개발, 관개 기반 시설의 확장, 그리고 교배 종자의 보급을 통해 우리는 농업의 패러다임 전환을 목격하고 있습니다.\n\n과학은 우리가 토양과 기후라는 자연적 한계를 극복할 수 있게 해주었습니다. 이전에는 너무 건조하거나 열대 기후라 집약 농업이 불가능하다고 여겨졌던 지역에서 이제 수확량이 세 배로 늘어나고 있습니다. 우리 국가가 생존의 과학을 받아들임에 따라 맬서스적 기근의 망령은 물러가고 있습니다." # 16411752595762232382
  ztr_arable_land.2.a: "우리는 스스로 섭리를 설계했습니다." # 16029742623245539684
  fusion_reactor_purchase.1.t: "핵융합 기술 요청" # 6290762396997051220
  fusion_reactor_purchase.1.d: "[SCOPE.sCountry('fusion_technology_requester').GetAdjective] 정부가 우리 수도에 공식 사절단을 파견했습니다.\n\n자국 내 핵융합 연구를 수행할 능력이 부족하고 에너지 수요가 급박한 그들은, 자국에 #gold_value 핵융합 발전소#!를 건설하는 데 필요한 설계도와 기술 지원을 구매하고자 합니다. 이는 전략 기술의 중대한 이전이 될 것이나, 동시에 그들의 감사와 막대한 재정적 보상을 확보할 수 있을 것입니다." # 15228900531953462219
  fusion_reactor_purchase.1.a: "인류의 발전을 위해 우리의 지식을 공유하겠습니다." # 7473590079732588734
  fusion_reactor_purchase.1.b: "이 기술은 너무나 위험하며 우리 국가 안보에 필수적입니다. 거절하십시오." # 5229538025924166878
  fusion_reactor_purchase.2.t: "핵융합 요청 수락" # 10769590682898467293
  fusion_reactor_purchase.2.d: "훌륭한 소식입니다! [SCOPE.sCountry('fusion_technology_seller').GetName]가 우리의 요청을 수락했습니다.\n\n그들의 엔지니어와 과학자들이 곧 우리 수도에 도착하여 우리만의 #gold_value 핵융합 발전소#! 건설을 시작할 것입니다. 비용은 막대하지만, 깨끗하고 무한한 에너지라는 약속은 그만한 가치가 있습니다." # 4709474850459422291
  fusion_reactor_purchase.2.a: "에너지의 새로운 시대가 시작됩니다!" # 1183269750979467047
  fusion_reactor_purchase.3.t: "핵융합 요청 거절" # 9170130811408785327
  fusion_reactor_purchase.3.d: "매우 실망스럽게도, [SCOPE.sCountry('fusion_technology_seller').GetName]가 핵융합 기술 구매 요청을 공식적으로 거절했습니다.\n\n그들은 안보 우려와 기술 독점의 전략적 중요성을 이유로 들었습니다. 우리는 에너지 수요를 충족할 다른 방법을 찾거나, 미래에 다시 시도해야 할 것입니다." # 12195514009632076745
  fusion_reactor_purchase.3.a: "이 모욕을 잊지 않겠습니다." # 17806065693453454545
  the_future_of_china.201.t: "중국의 르네상스인가?" # 12501821384256114936
  the_future_of_china.201.d: "군벌 시대가 공식적으로 종식됨에 따라, 중국은 갈림길에 서 있습니다. 관료적 연방주의라는 고대의 구조는 여전히 국가를 마비시키고 있으며, 세계와 이웃 국가들이 계속해서 전진하는 동안 국가를 하나로 묶기에는 너무나 취약합니다.\n\n수십 년이 지난 지금, 이는 [ROOT.GetCountry.GetName]을 자신들의 모습으로 재편하려는 세 가지 세력의 등장으로 이어졌습니다. 바로 해안가의 기업형 매판 자본가, 연방 협약을 옹호하는 지식인, 그리고 기술적 정체에 매달리는 보수적인 농촌 신사 계급입니다." # 4100849587019653450
  the_future_of_china.201.f: "새로운 시대는 굉음이 아닌, 수천 번의 조용한 권력 이동과 함께 시작됩니다." # 7809246583008562228
  the_future_of_china.201.a: "살아남기 위해 우리는 적응해야 합니다." # 7947762767092811149
  the_future_of_china.1.t: "매판의 부상" # 7709755862057317158
  the_future_of_china.1.d: "[ROOT.GetCountry.GetName] 외부의 상업과 부가 성장함에 따라 내륙보다 훨씬 부유한 해안 지방을 통제하는 기업들의 영향력도 커지고 있습니다.\n\n농업 및 산업 노동력의 저렴한 비용으로 부를 축적한 이들 기업은 점차 지방 총독들과 이해관계를 결합하고 있습니다.\n\n이는 지역 정치를 장악하고 중앙 정부에 더 많은 대표성을 요구하는 강력한 과두제 네트워크를 형성하고 있습니다." # 10445085339908415682
  the_future_of_china.1.f: "부는 권력을 사고, 권력은 더 많은 부를 삽니다." # 18228750792833468231
  the_future_of_china.1.a: "[ROOT.GetCountry.GetAdjective] 근대화의 원동력인 산업 및 농업 독점을 장려하십시오." # 17530701728303621138
  the_future_of_china.1.b: "지방의 이익을 위해 그들의 권력을 규제하십시오." # 15627675605528263296
  the_future_of_china.1.c: "이 서구의 지원을 받는 기업들을 탄압하십시오!" # 15858530674945624205
  the_future_of_china.2.t: "지방 자치 복합 기업" # 5324966187848500666
  the_future_of_china.2.d: "중앙 정부가 약화되는 동안 관독상판(관의 감독과 상인의 경영) 모델이 일부 해안 지방에 자리 잡으며 자율적인 근대화를 돕고 있습니다.\n\n사회 질서를 유지하면서도 이 모델은 중앙 정부가 더 자유롭고 덜 전통적인 경제로 개방하기로 결정하기 전까지는 중앙 정부의 권위를 인정하지 않습니다." # 12644579783941803626
  the_future_of_china.2.f: "국가가 사용하지만 지방이 관리하는 강철과 비단." # 639919572467784162
  the_future_of_china.2.a: "#negative_value 불안정#!을 피하며 해안 지방이 자율적으로 발전하도록 두십시오." # 5154601229276696649
  the_future_of_china.2.b: "그들이 마음대로 하게 둘 수는 없습니다. 해안과 내륙 사이의 균형을 무너뜨릴 위험이 있습니다." # 9043545372675734145
  the_future_of_china.3.t: "헌법 협약" # 12623797156308347092
  the_future_of_china.3.d: "[ROOT.GetCountry.GetName]의 어려운 상황을 고려하여, 지식인들과 진보적인 장군들은 지방 자치를 법적으로 수용하되 국가적 통합을 유지하기 위한 공식 협약을 초안하고 있습니다.\n\n그들의 목표는 경제 발전이 늦어지는 대가를 치르더라도 [ROOT.GetCountry.GetName]이 통합된 상태를 유지하도록 하는 것입니다." # 4836059880704389881
  the_future_of_china.3.f: "인정받는 연방주의를 통해서만 내전을 피할 수 있습니다." # 11068985549508431355
  the_future_of_china.3.a: "협약에 서명하십시오." # 1046577299869661486
  the_future_of_china.3.b: "매판들이 더 강력한 중앙집권적 무역권을 요구합니다." # 2722589398126933228
  the_future_of_china.4.t: "지방 자위대" # 196157260098882137
  the_future_of_china.4.d: "지역 군대가 잘 갖추어진 공식적인 자위대로 구체화되면서 연방 권력 균형을 공고히 하고 있습니다. 우리의 우선순위는 법을 통해 그들의 힘을 존중하고 [ROOT.GetCountry.GetName]의 이익을 위해 그들의 협력을 보장하는 것이어야 합니다." # 4130431019938559795
  the_future_of_china.4.f: "무장한 혼란보다는 무장한 평화가 낫습니다." # 9588440670485052960
  the_future_of_china.4.a: "실용적 연방주의를 향한 한 걸음." # 8236131914765877905
  the_future_of_china.4.b: "이제 그들은 지역 과두 세력을 위해 봉사할 것입니다." # 3925890705905139370
  the_future_of_china.5.t: "중체서용의 승리" # 17206749879392990838
  the_future_of_china.5.d: "최근 몇 년간 연방주의자와 산업가들을 넘어 [ROOT.GetCountry.GetName]을 위한 제3의 길을 제시하는 보수적 지식인 운동이 일어났습니다: \"서양의 지식은 실용을 위해, 중국의 지식은 근본으로 삼는다.\"\n\n이 운동은 세계의 나머지 부분과는 독립적인 유교적이고 고립주의적인 도덕을 요구하며, 농촌이든 도시든 인구의 삶을 개선할 수 있는 도구들과 결합하고자 합니다.\n\n농촌 신사 계급의 소수 의견임에도 불구하고, 이 운동은 주로 다가올 산업화를 두려워하는 소부르주아와 유학자들, 그리고 농촌 민중들 사이에서 지지를 얻고 있습니다." # 15055968992319026619
  the_future_of_china.5.f: "우리는 기차를 건설할 것이나, 기술 관료제는 받아들이지 않을 것입니다." # 17801162175270183488
  the_future_of_china.5.a: "우리의 고대 진리를 수호하십시오." # 10089661170518371351
  the_future_of_china.5.b: "원인은 원하면서 결과는 받아들이지 않으려는 것과 같습니다." # 5323624904775921745
  the_future_of_china.6.t: "상평창의 복구" # 11064743602245165026
  the_future_of_china.6.d: "천 년의 역사를 지닌 우리 사회의 생존을 보장하기 위해, 고대의 상평창 제도를 더 효율적인 물류 체계로 현대화해야 합니다. 농촌 인구에 대한 국가 통제를 확대하여 완전한 사회적 안정을 도모하는 한편, 트랙터나 콤바인과 같은 현대적인 농업 도구에 대한 접근성을 높여주어야 합니다." # 10345263965647905652
  the_future_of_china.6.f: "배가 부르면 반란을 일으키지 않는 법입니다." # 17875929610392977149
  the_future_of_china.6.a: "자비로운 정체." # 3059471088987307877
  the_future_of_china.6.b: "이 자본을 [ROOT.GetCountry.GetName]의 해안 전체를 연결할 철도에 투자하십시오." # 16566626657410034982
  the_future_of_china.6.c: "아무것도 투자하지 마십시오." # 8122754537876810617
  the_future_of_china.7.t: "외국의 상업적 이권" # 9876490002567626173
  the_future_of_china.7.d: "[ROOT.GetCountry.GetName] 시장의 막대한 잠재력은 [SCOPE.sCountry('foreign_investor').GetName]을 비롯한 외세의 탐욕스러운 시선을 계속해서 끌어들이고 있습니다.\n\n최근 바다 건너 중공업 및 금융 이권을 대표하는 [SCOPE.sCountry('foreign_investor').GetAdjectiveNoFormatting] 사절단이 우리 항구에 도착하여 매우 수익성 높은 계약과 기술 이전, 대규모 자본 투자를 제안했습니다.\n\n그러나 그들은 은과 기계를 대가로 포괄적인 투자 권리와 전통적인 무역 제한 조치의 중단을 요구하고 있습니다. 해안가의 기업들은 이를 현대화를 가속화하고 부를 축적할 절호의 기회로 보고 있지만, 전통주의 학자들은 외국 자본이 우리 내륙으로 침투하도록 내버려 두는 것은 우리 사회를 돌이킬 수 없이 타락시키고 국가의 근간을 흔드는 일이 될 것이라고 경고합니다." # 17783725041315036230
  the_future_of_china.7.f: "외국 은의 유혹은 해안 엘리트들이 무시하기에는 너무나 강력하지만, 농촌 신사들은 모든 새로운 증기선을 불길한 징조로 보고 있습니다." # 677349454195627834
  the_future_of_china.7.a: "조약을 작성하십시오. [SCOPE.sCountry('foreign_investor').GetName]이 우리의 현금 흐름과 미래를 뒷받침할 것입니다." # 9201771086132682900
  the_future_of_china.7.b: "[SCOPE.sCountry('foreign_investor').GetAdjectiveNoFormatting] 사절단을 추방하십시오. 우리에게는 그들의 은도, 소위 말하는 진보도 필요 없습니다." # 16299670216586748136
  the_future_of_china.8.t: "내륙의 농민 불안" # 15809836718164985168
  the_future_of_china.8.d: "[ROOT.GetCountry.GetAdjectiveNoFormatting] 내륙의 광범위한 지역에서 자발적인 파업과 조세 저항, 국지적 봉기가 발생했습니다. 해안으로 유입되는 외국 자본에 의해 권리를 박탈당하고 마비된 수도에 실망한 농민들은 취약하지만 불안정한 연합을 형성했습니다. 그들은 즉각적인 옛 도덕 질서로의 회귀와 산업 세금 감면, 그리고 '외세의 부패' 중단을 요구하고 있습니다.\n\n불만의 불길이 거세게 타오르고 있으며, 우리가 어떻게 질서를 회복하느냐에 따라 [ROOT.GetCountry.GetName] 내의 권력 균형은 영구적으로 바뀔 것입니다." # 18109749906720499136
  the_future_of_china.8.f: "천명이 메마른 흙처럼 우리 손가락 사이로 빠져나가고 있습니다." # 6339920448672447795
  the_future_of_china.8.a: "현대화된 대대를 파견하십시오, 질서는 쉽게 회복될 것입니다." # 1223815381490989734
  the_future_of_china.8.b: "그들의 요구를 수용하십시오, 내륙 지역이 고통받고 있습니다." # 525592460006838901
  the_future_of_china.100.t: "중화의 운명" # 6730073904444188368
  the_future_of_china.100.d: "수십 년 동안 중화는 성의 자치, 외국 상업의 간섭, 그리고 역사적으로 국가를 위협해 온 거대한 인구 압력 사이에서 위태로운 균형을 유지하며 갈림길에 서 있었습니다.\n\n국가적 분열을 성공적으로 막아냈던 관료적 연방주의와 군사적 지방 분권의 시대는 이제 막을 내렸습니다.\n\n해안 엘리트들의 초자본주의적 이사회실부터 개혁주의 성의 헌법 제정 의회, 그리고 기술 관료들의 침묵하는 알고리즘 홀에 이르기까지, 중국의 영혼을 위한 이념적 투쟁은 피할 수 없는 결론에 도달했습니다. 정치적 지형은 확고해졌고, 국가는 현대 시대를 위한 결정적인 형태를 갖추었습니다." # 17398483807287104255
  the_future_of_china.100.f: "잠자는 용은 단순히 깨어나는 것이 아니라, 변화하며 세계 무대에 길고 낯선 그림자를 드리웁니다." # 4417765368844970537
  the_future_of_china.100.a: "시장이 권한을 결정합니다. #gold_value 기업 연합#!은 끝없는 자본의 깃발 아래 국가를 매끄럽게 통합합니다." # 9345662310921578212
  the_future_of_china.100.b: "자치 속의 힘. #blue_value 중국 연합 성#!은 평화롭고 지속적인 연방 협약을 포용합니다." # 1810408273425138363
  the_future_of_china.100.c: "질서가 최우선입니다. #P 기술 유교 유토피아#!는 완벽하고 흔들림 없는 조화를 이룹니다." # 8335964003061677537
  the_future_of_china.100.cw1: "#gold_value 기업 연합#!이 패권을 선언하지만, 농업 내륙 지역은 우리의 상업적 명령을 격렬하게 거부합니다!" # 1570341023325116371
  the_future_of_china.100.cw2: "#blue_value 연방 헌법#!이 비준되지만, 해안 과두 세력은 싸움 없이 독점권을 포기하기를 거부합니다!" # 6570695087811483156
  the_future_of_china.100.cw3: "정체의 알고리즘은 복종을 요구하지만, 초자본주의 항구들은 공개적으로 반란을 일으키며 분리 독립합니다!" # 6395879199388957229
  ztr_communist_china.1.t: "내륙의 붉은 재" # 7961305300378283701
  ztr_communist_china.1.d: "#v 청나라 당국#!의 붕괴 이후, 지하 @intelligentsia! #gold_value 독서회#!, 상호부조 @rural_folk! #gold_value 농민회#!, 그리고 @trade_unions! #gold_value 노동 클럽#!이 [SCOPE.sState('ztr_ccp_target_state').GetName] 전역으로 퍼지기 시작했습니다. 그들의 구호는 파편화되어 있지만, 이미 토지 재분배, 노동자 위원회, 그리고 낡은 제국의 폐허에서 새로운 #v 중국#!이 탄생해야 한다고 이야기합니다. 그들이 정당이 되기 전에 이 세포 조직들을 진압할 수도 있고, 언젠가 주도권을 잡을 수 있는 세력으로 조용히 성장하도록 내버려 둘 수도 있습니다." # 1234012404927303741
  ztr_communist_china.1.inspired.d: "#v 청나라 권위#!의 붕괴 이후, 지하 @intelligentsia! #gold_value 독서회#!, 상호부조 @rural_folk! #gold_value 농민회#!, 그리고 @trade_unions! #gold_value 노동 클럽#!이 [SCOPE.sState('ztr_ccp_target_state').GetName] 전역으로 퍼지기 시작했습니다. 그들의 팸플릿은 지친 구질서가 규율 있는 혁명에 의해 전복될 수 있다는 증거로 [SCOPE.sCountry('ztr_ccp_inspiration_country').GetName]의 사례를 공개적으로 언급합니다. 그들이 정당이 되기 전에 이 세포 조직들을 진압할 수도 있고, 언젠가 주도권을 잡을 수 있는 세력으로 조용히 성장하도록 내버려 둘 수도 있습니다." # 4621132928324399406
  ztr_communist_china.1.f: "찻집과 시장 거리에서 '동지'라는 단어는 더 이상 외국에서 온 호기심 어린 속삭임이 아닙니다." # 6499841407623880534
  ztr_communist_china.1.a: "학습 모임이 퍼지기 전에 분쇄하십시오." # 8534300155046411973
  ztr_communist_china.1.b: "그들을 용인하고 누가 그들에게 끌리는지 지켜보십시오." # 16551528731433335152
  ztr_communist_china.1.c: "간부들이 농민을 조직할 여지를 주십시오." # 7433566815998882336
  ztr_communist_china.2.t: "중국 공산당" # 14919208618558720438
  ztr_communist_china.2.d: "[ROOT.GetCountry.GetName] 전역에 흩어져 있던 사회들이 조직화되기 시작했습니다. 이제 노동자, 교사, 급진적인 장교들 사이로 연락책들이 움직이고 있으며, 더 응집력 있는 지도부는 규율 있는 #negative_value 공산당#!만이 #v 포스트 청나라#!의 붕괴를 진정한 [concept_revolution]으로 바꿀 수 있다고 주장합니다. 이 운동은 여전히 취약하지만, 더 이상 형체 없는 상태는 아닙니다." # 12222432561303460545
  ztr_communist_china.2.inspired.d: "[ROOT.GetCountry.GetName] 전역에 흩어져 있던 사회들이 조직화되기 시작했습니다. 이제 노동자, 교사, 급진적인 장교들 사이로 전령들이 오가고 있으며, 그들의 문헌에서는 #negative_value 공산당#!이 혼란과 [concept_civil_war]를 이겨낼 수 있음을 증명한 [concept_country]로 [SCOPE.sCountry('ztr_ccp_inspiration_country').GetName]를 점점 더 많이 언급하고 있습니다. 운동은 여전히 취약하지만, 더 이상 형체 없는 집단이 아닙니다." # 1041963078630143339
  ztr_communist_china.2.f: "혁명은 기록과 경로, 그리고 규율을 유지하는 법을 배우는 순간부터 소문이 아닌 현실이 됩니다." # 4847768924287341489
  ztr_communist_china.2.a: "#v 조직가#!들을 체포하고 그들의 반사회적 통신망을 파괴하십시오." # 8556717264452024845
  ztr_communist_china.2.b: "그들을 애국적인 #n 통일전선#!으로 포섭하십시오. 우리의 이익을 위해 그들을 이용할 수 있습니다." # 983090550381278655
  ztr_communist_china.2.c: "그들이 #v 시골#! 속으로 사라지도록 도우십시오." # 1356335827061279261
  ztr_communist_china.3.t: "농촌 소비에트와 근거지" # 10118321505362854902
  ztr_communist_china.3.d: "[ROOT.GetCountry.GetName] 전역에서 #v 비밀 세포#!로 시작되었던 것들이 농촌 위원회와 즉석에서 조직된 #negative_value 소비에트#!로 굳건해졌습니다. 지역의 @landowners! #gold_value 지주#!들이 도전을 받고 있으며, 곡물 징수 체계는 재편되고 있고, 운동 세력은 경찰의 급습을 피해 내륙으로 퇴각함으로써 점점 더 오래 버틸 수 있게 되었습니다. 이대로 계속된다면, 공산주의자들은 머지않아 단순히 내부에서 선동하는 것을 넘어 #v 중국#! 그 자체를 대변한다고 주장할지도 모릅니다." # 4202131205199411454
  ztr_communist_china.3.inspired.d: "[ROOT.GetCountry.GetName] 전역에서 #v 비밀 세포#!로 시작되었던 것들이 농촌 위원회와 즉석에서 조직된 #negative_value 소비에트#!로 굳건해졌습니다. 지역의 @landowners! #gold_value 지주#!들이 도전을 받고 있으며, 곡물 징수 체계는 재편되고 있고, 공산주의 조직가들은 [SCOPE.sCountry('ztr_ccp_inspiration_country').GetName]처럼 자신들도 쇠락한 질서의 잔해 속에서 새로운 [concept_country]를 건설할 수 있다고 공공연히 주장합니다. 이대로 계속된다면, 그들은 머지않아 단순히 내부에서 선동하는 것을 넘어 #v 중국#! 그 자체를 대변한다고 주장할지도 모릅니다." # 10721082636793269014
  ztr_communist_china.3.f: "전선이 형성되기도 전에 지도가 바뀌고 있습니다." # 8484327145577798223
  ztr_communist_china.3.a: "근거지를 포위하고 굶주리게 하십시오." # 5110406517575364271
  ztr_communist_china.3.b: "더 폭넓은 #v 반군벌 통일전선#!을 인정하십시오. 우리는 더 이상 #v 군벌#!이 아니며, 중국 인민의 진정한 대표자입니다." # 15289648670249156126
  ztr_communist_china.3.c: "지금 즉시 #n 공산 전선#!을 무장시키고 우리 영토를 행진하게 하십시오." # 10392740481753522012
  ztr_communist_china.4.t: "중국 공산 전선" # 293736298725706402
  ztr_communist_china.4.d: "이제 #n 공산주의 운동#!은 [ROOT.GetCountry.GetName]이 중국을 통일하거나 경쟁하는 권위를 선포하도록 도울 수 있는 간부, 농촌의 지지, 그리고 충분한 무장 지원 세력을 갖추었습니다. 그들이 양지로 나오는 것이 허용된다면, 이는 곧 토론 단체에 머무르지 않고 중국의 #negative_value 무장 국가#!가 되어 @rural_folk! #gold_value 농민#!, @trade_unions! #gold_value 노동자#!, @intelligentsia! #gold_value 지식인#!, 그리고 미완의 상태로 붕괴해가는 구 제국을 대변한다고 주장할 것입니다." # 11254518593225434312
  ztr_communist_china.4.inspired.d: "이제 #n 공산주의 운동#!은 [ROOT.GetCountry.GetName]이 중국을 통일하거나 경쟁하는 권위를 선포하도록 도울 수 있는 간부, 농촌의 지지, 그리고 충분한 무장 지원 세력을 갖추었습니다. 그 지도자들은 [SCOPE.sCountry('ztr_ccp_inspiration_country').GetName]의 모습을 본떠 규율 잡히고, 반지주적이며, 구 질서의 모든 잔재에 가차 없는 #negative_value 혁명 중국#!을 건설하겠다고 공공연히 약속합니다. 그들이 양지로 나오는 것이 허용된다면, 이는 곧 토론 단체에 머무르지 않고 중국의 #negative_value 무장 국가#!가 될 것입니다." # 8761581089535347412
  ztr_communist_china.4.f: "전선은 누군가가 삐라 대신 포고문을 인쇄하기로 결심하는 순간 정부가 됩니다." # 13224121554589242903
  ztr_communist_china.4.a: "#n 공산 중국#!이 우리 인민과 함께하게 하십시오!" # 9977466873683590082
  ztr_communist_china.4.b: "마지막 초토화 작전을 개시하십시오. 상황이 우리의 통제를 #v 훨씬 벗어나고#! 있습니다." # 7070153391713276038
  ztr_tooltip_can_become_communist_chi_via_je: "[ROOT.GetCountry.GetName]은 #v 중화인민공화국#!의 일부가 될 것입니다." # 10547407128213672220
  ztr_tooltip_can_become_nationalist_chi_via_je: "[ROOT.GetCountry.GetName]은 #v 중화민국#!의 일부가 될 것입니다." # 4552412078007094652
  ztr_communist_china.5.t: "붉은 중국에 맞서는 민족주의자의 깃발" # 3572178296379862177
  ztr_communist_china.5.d: "#v 중국 공산당#!의 선포는 많은 중국 정치인과 장교, 그리고 지방 유력자들에게 구시대의 군벌 체제가 더 이상 지속될 수 없다는 확신을 심어주었습니다. 이제 [SCOPE.sCountry('ztr_ccp_nationalist_china').GetName]은(는) 새로운 #v 중국#!을 대변한다고 주장하며, 오직 단결된 반공 권위만이 국가 전체가 혁명 세력의 통치하에 놓이는 것을 막을 수 있다고 역설하고 있습니다. 우리는 [ROOT.GetCountry.GetName]이(가) 방관하며 독자적인 자치권을 유지할지, 아니면 세력 균형이 우리에게 불리하게 굳어지기 전에 국민당 진영에 합류할지 결정해야 합니다." # 5706486875782375241
  ztr_communist_china.5.f: "경쟁국인 중국이 붉은 깃발에 맞서 푸른 깃발을 내걸었습니다." # 13677388517552327752
  ztr_communist_china.5.a: "우리는 중립을 유지하며 투쟁이 전개되는 과정을 지켜봐야 합니다." # 8098313508356627119
  ztr_communist_china.5.b: "너무 늦기 전에 #v 민족주의 중국#!에 합류하십시오." # 10014356733418978562
  ztr_communist_china.6.t: "중국을 가로지르는 거래" # 17090635888889056313
  ztr_communist_china.6.d: "[SCOPE.sCountry('ztr_two_chinas_partner').GetName]에서 온 사절들이 냉혹하리만치 실용적인 제안을 가지고 도착했습니다. 우리 주변에 남은 중국의 군벌들은 단독으로 #n 공산 중국#!이나 #blue_value 국민당 중국#!에 맞서기에는 너무나 나약하지만, 두 통일 계획을 지연시키기에는 충분히 많은 수입니다. 그들은 즉각적으로 서로를 상대로 병력을 낭비하는 대신, 일시적인 협정을 제안합니다. [SCOPE.sCountry('ztr_two_chinas_communist_china').GetName]은 [SCOPE.sCountry('ztr_two_chinas_chi_target').GetName]을 상대로 움직이고, 그동안 [SCOPE.sCountry('ztr_two_chinas_nationalist_china').GetName]은 [SCOPE.sCountry('ztr_two_chinas_zfc_target').GetName]을 상대로 독자적인 외교전을 개시한다는 것입니다. 양측은 하찮은 #v 군벌#!들이 분할될 때까지 서로의 행보를 지지하기로 했습니다." # 13982462863503841754
  ztr_communist_china.6.f: "심지어 경쟁하는 깃발들조차 더 작은 이웃에게는 똑같은 그림자를 드리울 수 있습니다." # 4227346640449962773
  ztr_communist_china.6.a: "일단 #v 중국#!을 정리하기 전에 #v 군벌#!들을 먼저 분할하도록 합시다." # 10574245022122543428
  ztr_communist_china.6.b: "그들과는 어떠한 조약도 맺지 않겠다. #v 중국#!은 타협 없이 쟁취할 것이다." # 15613275093667949032
  ztr_communist_china.6.c: "우리는 [SCOPE.sCountry('ztr_two_chinas_second_target').GetName]을(를) 공격하는 편을 선호합니다." # 14254525615806352368
  ztr_ottoman_collapse.1.t: "동방 문제가 다시 불거지다" # 16836153860672022587
  ztr_ottoman_collapse.1.d: "[ROOT.GetCountry.GetAdjective] 생존을 위한 낡은 공식은 이제 한계에 다다랐습니다. 아랍의 유력자들은 마치 #v 숭고한 문#!이 여러 청구인 중 하나일 뿐인 것처럼 흥정을 벌이고, 장교들은 궁정의 무능함을 수군거리며, 모든 유럽 대사관은 철도와 석유, 운하, 그리고 '질서'에 대해 이야기하고 있습니다.\n\n우리는 다가올 폭풍에 맞설 국가의 형태를 결정해야 합니다." # 14807449695216669185
  ztr_ottoman_collapse.1.f: "제국은 수십 년 동안 쇠락하면서도 여전히 영원할 것처럼 보일 수 있지만, 어느 순간 모든 채권자와 장교, 그리고 지방의 유력자들이 제국이 무너진 이후의 날을 대비하기 시작합니다." # 7922881654501191158
  ztr_ottoman_collapse.1.a: "제국 헌법적 합의를 선포하십시오." # 10709445067571171645
  ztr_ottoman_collapse.1.b: "궁전과 주둔군, 그리고 오랜 충성심을 신뢰하십시오." # 9246147286974343131
  ztr_ottoman_collapse.1.c: "#v 유럽 자본#!으로 시간을 벌어들입니다." # 10087699636961008236
  ztr_ottoman_collapse.2.t: "[SCOPE.sState('arab_congress_state').GetCityHubName]에서 열린 아랍 회의" # 15740243945805863355
  ztr_ottoman_collapse.2.d: "#v 아랍#! 속령의 대표들이 행정 개혁, 지방 자치 상담, 아랍어 교육이라는 명분을 내세워 모였습니다.\n\n공식적으로 그들은 제국 내에서의 정의를 청원하고 있으나, 비공식적으로는 이미 많은 이들이 아랍 속령이 [SCOPE.sState('ztr_ottoman_capital_scope').GetCityHubName]와는 구별되는 별개의 정치적 실체인 것처럼 발언하고 있습니다." # 18420361630574349873
  ztr_ottoman_collapse.2.f: "청원이 의회가 되고, 의회가 신문이 되면, 지도는 이미 사람들의 머릿속에서 다시 그려지고 있는 셈입니다." # 16545601193747326066
  ztr_ottoman_collapse.2.a: "평의회, 학교, 지방 양보를 제안하십시오." # 4424663827051146393
  ztr_ottoman_collapse.2.b: "대표들을 체포하고 언론을 침묵시키십시오." # 2426306554199356652
  ztr_ottoman_collapse.2.c: "세금만 제때 들어온다면 지역 유지들이 통치하게 두십시오." # 5529815171568626981
  ztr_ottoman_collapse.3.t: "숭고한 문 앞의 채권자들" # 15261521332778932569
  ztr_ottoman_collapse.3.d: "외국 채권자들과 [ROOT.GetCountry.GetAdjective] 장관들은 이제 제국을 같은 언어로 논의합니다. 바로 체납금, 보증, 관세 수입, 그리고 행정적 감독입니다.\n\n외부의 감독을 수용하면 국고는 안정될지 모르나, 모든 양보는 우리 지방이 조각조각 저당 잡힐 수 있다는 사실을 유럽에 가르쳐 줄 뿐입니다." # 6494450373901604889
  ztr_ottoman_collapse.3.f: "부채는 현금으로만 상환되는 경우가 드뭅니다. 때로는 주권으로 상환되기도 합니다." # 9911010612590549626
  ztr_ottoman_collapse.3.a: "#v 유럽의 부채 관리 위원회#!를 수용하십시오." # 12611447860660893710
  ztr_ottoman_collapse.3.b: "지방에 긴급 징세를 부과하십시오." # 7791088698029965509
  ztr_ottoman_collapse.3.c: "채무 불이행을 선언하고 채권자들을 규탄하십시오." # 14569249469866823773
  ztr_ottoman_collapse.4.t: "장교 클럽" # 5111604427280414694
  ztr_ottoman_collapse.4.d: "병영, 살롱, 참모진 사이에서 장교들은 이제 군사 작전뿐만 아니라 통치권에 대해서도 토론하기 시작했습니다.\n\n일부는 체납금 지급과 전문적인 개혁을 요구하고, 다른 이들은 궁정, 부처, 그리고 지방의 부패를 비난합니다. 잘못 다루면 장교단은 제국의 미래를 둘러싼 투쟁에서 또 하나의 파벌이 될 수 있습니다." # 4015369663365915757
  ztr_ottoman_collapse.4.f: "조용히 복종하지 않는 군대는 곧 스스로 통치해야 한다고 상상하기 시작합니다." # 17447918603372934449
  ztr_ottoman_collapse.4.a: "체납금을 지급하고 가장 위험한 지휘관들을 교체하십시오." # 5000029901860220246
  ztr_ottoman_collapse.4.b: "의심스러운 고위 장교들을 숙청하십시오." # 15738531660027403446
  ztr_ottoman_collapse.4.c: "하급 장교와 경찰을 개혁하십시오." # 15839445521773292635
  ztr_ottoman_collapse.5.t: "외국인 투자 요구" # 3665973741979177495
  ztr_ottoman_collapse.5.d: "[SCOPE.sCountry('ztr_ottoman_collapse_requesting_power').GetName]에서 이제 제국 전역에 [Concept('concept_foreign_investment_rights','$concept_foreign_investment_rights$')]을 공식화할 것을 요구합니다.\n\n그들의 외교관들은 철도, 관세 보증, 질서 있는 발전을 이야기합니다. 우리 장관들은 다른 것을 듣고 있습니다. 바로 특혜 접근권, 법적 영향력, 그리고 #v 오스만#!의 무질서가 외국 자본을 위태롭게 한다는 주장을 할 권리에 대한 정중한 요구입니다." # 622727342121203920
  ztr_ottoman_collapse.5.f: "채권자는 처음에는 계약을 요구하고, 나중에는 그 계약에 대한 보증을 요구합니다." # 14924202858447397332
  ztr_ottoman_collapse.5.a: "그들의 재정 사절단을 수용하십시오." # 11102752533871449045
  ztr_ottoman_collapse.5.b: "그들은 그저 우리의 검은 황금을 원할 뿐입니다. 다른 곳에서나 찾으라고 하십시오!" # 17461294521165277781
  ztr_ottoman_collapse.6.t: "이집트를 위한 원조 제안" # 16433010945909118744
  ztr_ottoman_collapse.6.d: "[SCOPE.sCountry('ztr_ottoman_collapse_requesting_power').GetName]은(는) 공학자, 농업 신용 대출, 치안 지원으로 구성된 이집트 안정화 임무를 제안합니다.\n\n그들의 외교관들은 나일강과 운하 주변의 관개 시설과 공공 질서에 대해 이야기합니다. 하지만 모든 #v 오스만#! 장관은 그 이면에 숨겨진 더 깊은 의미를 이해하고 있습니다. #v 이집트#!에 자금을 지원하는 외세는 나중에 이집트를 감독할 권리를 얻었다고 주장할 것입니다." # 7860770402702684974
  ztr_ottoman_collapse.6.f: "이미 당신의 영토 지도를 연구하고 있는 강대국으로부터 오는 원조는 결코 공짜가 아닙니다." # 9471068592706339330
  ztr_ottoman_collapse.6.a: "그들의 원조 임무를 수락하십시오." # 7707475488650519487
  ztr_ottoman_collapse.6.b: "#v 이집트#!은(는) 제국의 다른 지역처럼 그들의 임무에 개방되지 않을 것입니다." # 1716394477668764268
  ztr_ottoman_collapse.7.t: "시리아를 위한 원조 제안" # 7473118164207832016
  ztr_ottoman_collapse.7.d: "[SCOPE.sCountry('ztr_ottoman_collapse_requesting_power').GetName]은(는) #v 레반트#! 전역에 걸친 구호 및 질서 유지 임무를 제안합니다.\n\n표면적으로는 교통 시설, 보조금, 혼란 방지 행정 등을 내세우고 있지만, 그 논리는 명백히 제국주의적입니다. 오늘 레반트를 안정시킬 권한을 가진 자는 내일 그 미래를 결정할 특별한 권리를 주장할 것입니다." # 12312186255937629591
  ztr_ottoman_collapse.7.f: "외세의 보호는 도로, 영사관, 고문관과 함께 시작되어 결국은 국기 게양으로 끝납니다." # 9844466591510456601
  ztr_ottoman_collapse.7.a: "그들의 원조 임무를 수락하십시오." # 7707475488650519487
  ztr_ottoman_collapse.7.b: "그들의 요구와 '도움'을 거부하십시오." # 17027543116277985738
  ztr_ottoman_collapse.8.t: "이라크를 위한 원조 제안" # 17002189617734726775
  ztr_ottoman_collapse.8.d: "[SCOPE.sCountry('ztr_ottoman_collapse_requesting_power').GetName]은(는) 우리의 #v 이라크#! 영토 내 하천 정비, 통신 시설, 지방 행정 지원에 자금을 대겠다고 제안합니다.\n\n골치 아픈 국경 지대에 대한 실질적인 지원으로 포장되었지만, 이 제안 역시 제국주의의 전형적인 교훈을 담고 있습니다. 투자는 의존을 낳고, 의존은 곧 후견국을 자처하게 만듭니다." # 3929463246935983305
  ztr_ottoman_collapse.8.f: "해당 지역은 먼저 조사단을 받고, 그다음 고문관을 받으며, 마지막에는 이제는 떠날 수 없다고 고집하는 후견인을 받게 됩니다." # 16132733126966095139
  ztr_ottoman_collapse.8.a: "그들의 원조 임무를 수락하십시오." # 7707475488650519487
  ztr_ottoman_collapse.8.b: "그들은 그저 우리의 검은 황금을 노릴 뿐입니다. 다른 곳이나 찾아보라고 하십시오!" # 6026942773772663828
  ztr_ottoman_collapse.90.t: "숭고한 문이 침묵에 잠기다" # 2993965730776801956
  ztr_ottoman_collapse.90.d: "오랜 #gold_value 오스만#!의 쇠퇴는 정치적 파국으로 막을 내렸습니다.\n\n지방들은 떨어져 나가고, 인접 민족들은 기회를 포착했으며, 유럽 열강들은 채권자, 고문관, 지역 후견인에서 이제는 영유권 주장자와 점령군으로 변모했습니다. 살아남은 영토는 과거의 #gold_value 오스만#! 질서보다 훨씬 더 좁고, 가혹하며, 제국답지 못한 모습으로 버텨야 할 것입니다." # 4134295384500225249
  ztr_ottoman_collapse.90.f: "제국은 단 한 번의 전투로 멸망하지 않습니다. 제국은 대개 중앙이 더 이상 변방을 통제할 수 없다는 믿음이 퍼질 때 사라집니다." # 5415898492907785556
  ztr_ottoman_collapse.90.a: "제국 시대는 끝났습니다." # 3528487357735252008
  ztr_ottoman_collapse.91.t: "문은 견뎌낸다" # 4801137343915721905
  ztr_ottoman_collapse.91.d: "쇠락의 관습에 맞서, [ROOT.GetCountry.GetName]은 제국의 붕괴를 막을 만큼 충분히 국가를 안정시켰습니다.\n\n제국은 여전히 통치하기 어렵고 포식자들에게 둘러싸여 있지만, 즉각적인 해체 위기는 개혁과 회복, 혹은 순전한 정치적 인내를 통해 물리쳐냈습니다." # 3017809237523497946
  ztr_ottoman_collapse.91.f: "생존이 곧 쇄신은 아니지만, 죽어가는 제국에게는 충분한 승리입니다." # 14939234527068279046
  ztr_ottoman_collapse.91.a: "이제 제국은 건재합니다." # 6753430959312321397
  ztr_ottoman_collapse.100.t: "동방 문제는 답을 요구한다" # 18376288972703045436
  ztr_ottoman_collapse.100.d: "[SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetName]은 눈에 띄게 약화된 단계에 접어들었으며, 모든 유럽 내각은 그 함의를 간파하고 있습니다.\n\n부채, 불안, 군사적 음모, 그리고 제국의 과도한 팽창은 낡은 #v 동방 문제#!를 지역 원조 임무, 특권적 영향력, 그리고 미래의 영유권 주장을 둘러싼 실질적인 경쟁으로 바꾸어 놓고 있습니다. 우리는 이 투쟁에 직접 뛰어들 수도 있고, 관망하며 다른 이들이 이득을 나누게 둘 수도 있습니다." # 10402199916451611071
  ztr_ottoman_collapse.100.f: "제국이 약해질 때, 중립 그 자체가 전략적 선택이 됩니다." # 3033967377284492561
  ztr_ottoman_collapse.100.a: "우리는 #v 동방 문제#!에 참여할 것입니다." # 17193072508938568643
  ztr_ottoman_collapse.100.b: "우리에게는 다른 우선순위가 있습니다." # 15506536947358600114
  ztr_ottoman_collapse.112.t: "우리의 이집트 원조 임무가 수락되었습니다" # 9889111725727156177
  ztr_ottoman_collapse.112.d: "[SCOPE.sCountry('ztr_ottoman_collapse_requested_target').GetName]이 우리의 #v 이집트#! 원조 임무를 수락했습니다. 이제 기술자, 보조금, 경찰 지원이 나일 계곡과 운하 접근로에 우리의 영향력을 결속시킬 것이며, #v 오스만#! 질서가 무너질 경우를 대비해 향후 개입을 위한 더 강력한 토대를 마련할 것입니다." # 18423369545112528165
  ztr_ottoman_collapse.112.a: "#v 이집트#!가 우리에게 문을 열고 있습니다." # 13295574171327021972
  ztr_ottoman_collapse.113.t: "숭고한 포르테가 우리의 이집트 원조 임무를 거부했습니다" # 5299021844528625707
  ztr_ottoman_collapse.113.d: "[SCOPE.sCountry('ztr_ottoman_collapse_requested_target').GetName]이 우리가 제안한 #v 이집트#! 임무를 거부했습니다. 당분간 나일강과 운하 문제는 정중한 지원 제안으로 해결되지 않을 것입니다." # 9069311806191646708
  ztr_ottoman_collapse.113.a: "그렇다면 문제는 여전히 미해결 상태로 남겠군요." # 9819583064622029782
  ztr_ottoman_collapse.114.t: "우리의 시리아 원조 임무가 수락되었습니다" # 12459294818010464683
  ztr_ottoman_collapse.114.d: "[SCOPE.sCountry('ztr_ottoman_collapse_requested_target').GetName]이 우리의 #v 시리아#! 원조 임무를 수락했습니다. 구호, 교통 공사, 행정 지원이 이제 시리아, 레바논, 팔레스타인, 트란스요르단에 우리의 영향력을 묶어둘 것입니다." # 15059630863435765269
  ztr_ottoman_collapse.114.a: "#v 시리아#! 문제가 우리 쪽으로 기울고 있습니다." # 17284624014712176888
  ztr_ottoman_collapse.115.t: "숭고한 포르테가 우리의 시리아 원조 임무를 거부했습니다" # 4331592688607881113
  ztr_ottoman_collapse.115.d: "[SCOPE.sCountry('ztr_ottoman_collapse_requested_target').GetName]이 우리의 #v 시리아#! 임무를 거부했습니다. 레반트 지역에서 결정적인 영향력을 원한다면, 외교만으로는 여전히 부족할지도 모릅니다." # 12064492810902680591
  ztr_ottoman_collapse.115.a: "그렇게 하도록 하지." # 9048479636758698442
  ztr_ottoman_collapse.116.t: "우리의 이라크 지원 임무가 수락되었습니다" # 10492163315962871492
  ztr_ottoman_collapse.116.d: "[SCOPE.sCountry('ztr_ottoman_collapse_requested_target').GetName]이(가) 우리의 #v 이라크#! 임무를 수락했습니다. 이제 바그다드, 바스라, 모술은 우리의 자금 지원 사업과 자문관을 받아들일 것이며, 해당 주들은 우리의 정치적 영향력 아래로 들어오게 될 것입니다." # 1605948118228767434
  ztr_ottoman_collapse.116.a: "수익성 있는 시작이군요." # 4286561233850930804
  ztr_ottoman_collapse.117.t: "숭고한 문이 우리의 이라크 지원 임무를 거부했습니다" # 3862887680724170397
  ztr_ottoman_collapse.117.d: "[SCOPE.sCountry('ztr_ottoman_collapse_requested_target').GetName]이(가) 우리의 #v 이라크#! 제안을 거부했습니다. 따라서 메소포타미아 문제는 해결되지 않은 채로 남았으며, 더 가혹한 수단을 불러올지도 모릅니다." # 14652857929801989188
  ztr_ottoman_collapse.117.a: "이 일을 기억할 것입니다." # 11943833676117585282
  ztr_un_event.10.t: "국제연합 투표 세션" # 3173547594989088766
  ztr_un_event.10.d: "[SCOPE.sCountry('ztr_un_vote_proposer_scope').GetName]의 주도로 #blue_value 안전보장이사회#!가 UN 제안에 대한 공식 투표를 개시했습니다. [Concept('concept_united_nations','$concept_united_nations$')]의 일원으로서, 우리는 투표권을 행사할 것을 요청받았습니다.\n\n#bold 안건#!: #v [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_vote_subject_name')]#!\n#p 제안#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_vote_proposal_name')]\n#n 현행 법률#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_vote_current_law_name')]\n\n우리는 UN 투표 세션 일지 항목을 통해 심의하고 투표할 수 있는 1년의 기간이 주어졌습니다." # 5844218196912543067
  ztr_un_event.10.a: "신중하게 사안을 검토하겠습니다." # 9050427579738252131
  ztr_un_event.10.b: "이 제안을 지지합니다." # 1954144070553106481
  ztr_un_event.10.c: "이 제안에 반대합니다." # 12587017061911369322
  ztr_un_event.20.t: "국제연합 거버넌스" # 16584707356897608774
  ztr_un_event.20.d: "안전보장이사회의 #blue_value 상임이사국#!으로서, 우리는 [Concept('concept_united_nations','$concept_united_nations$')]의 거버넌스 구조를 개혁할 권한이 있습니다. 현행 헌장은 총회의 공식 투표를 통해 개정될 수 있습니다.\n\n#bold 현행 UN 거버넌스:#!\n@un_voting_model! #v 투표 모델#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_voting_model_name')]\n@un_veto_right! #v 상임이사국 거부권#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_veto_right_name')]\n@un_member_selection! #v 상임이사국 선출#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_member_selection_name')]\n\nUN 헌장의 어떤 측면을 개혁하시겠습니까?" # 13992700054478598718
  ztr_un_event.20.a: "@un_voting_model! #v 투표 모델#! 개혁" # 6864619834764877202
  ztr_un_event.20.b: "@un_veto_right! #v 상임이사국 거부권#! 개혁" # 8157243094090445051
  ztr_un_event.20.c: "@un_member_selection! #v 상임이사국 선출#! 개혁" # 342714351854275715
  ztr_un_event.20.e: "현재로서는 개혁이 필요하지 않습니다." # 7452094756476848132
  ztr_un_event.21.t: "투표 모델 개혁" # 15958716596912165634
  ztr_un_event.21.d: "[Concept('concept_united_nations','$concept_united_nations$')]의 현행 @un_voting_model! #v 투표 모델#!은(는) #v [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_voting_model_name')]#!입니다.\n\n@un_voting_model! [Concept('concept_un_voting_model_one_country_one_vote','$concept_un_voting_model_one_country_one_vote$')]: 규모, 인구, 국력에 관계없이 모든 회원국이 정확히 한 표를 행사합니다. 가장 평등한 모델입니다.\n@un_voting_model! [Concept('concept_un_voting_model_weighted_by_prestige','$concept_un_voting_model_weighted_by_prestige$')]: 투표권은 국가의 위신에 비례합니다. 열강이 결의안에서 더 큰 영향력을 행사합니다.\n@un_voting_model! [Concept('concept_un_voting_model_security_council_only','$concept_un_voting_model_security_council_only$')]: 안전보장이사회 상임이사국만이 결의안에 투표할 수 있습니다. 과두제 모델입니다.\n@un_voting_model! [Concept('concept_un_voting_model_superpowers_only','$concept_un_voting_model_superpowers_only$')]: 세계에서 가장 순위가 높은 두 강대국만이 결의안의 운명을 결정합니다. 가장 제한적인 모델입니다.\n\n어떤 모델을 제안하시겠습니까?" # 3844890356667609537
  ztr_un_event.21.a: "제안: @un_voting_model! [Concept('concept_un_voting_model_one_country_one_vote','$concept_un_voting_model_one_country_one_vote$')]" # 11222267546113091715
  ztr_un_event.21.b: "제안: @un_voting_model! [Concept('concept_un_voting_model_weighted_by_prestige','$concept_un_voting_model_weighted_by_prestige$')]" # 358696320692555271
  ztr_un_event.21.c: "제안: @un_voting_model! [Concept('concept_un_voting_model_security_council_only','$concept_un_voting_model_security_council_only$')]" # 12610530106345992283
  ztr_un_event.21.e: "제안: @un_voting_model! [Concept('concept_un_voting_model_superpowers_only','$concept_un_voting_model_superpowers_only$')]" # 15859181946078855312
  ztr_un_event.21.f: "아닙니다, 변경안을 제안하지 않겠습니다." # 17106903256265713400
  ztr_un_event.22.t: "거부권 개혁" # 5223568929570755831
  ztr_un_event.22.d: "안전보장이사회 상임이사국은 현재 [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_veto_right_desc')] 결의안을 일방적으로 거부할 수 있는 권한을 가지고 있습니다.\n\n거부권은 성급한 결의안에 대한 안전장치인 동시에, 강대국이 다수의 희생을 감수하고 자국의 이익을 보호하기 위한 수단이기도 합니다.\n\n변경안을 제안하시겠습니까?" # 4759814484170753006
  ztr_un_event.22.a: "제안: @un_veto_right! [Concept('concept_un_veto_right_enabled','$concept_un_veto_right_enabled$')]" # 13169655858549714681
  ztr_un_event.22.b: "제안: @un_veto_right! [Concept('concept_un_veto_right_disabled','$concept_un_veto_right_disabled$')]" # 10197879033435148170
  ztr_un_event.22.c: "아닙니다, 변경안을 제안하지 않겠습니다." # 17106903256265713400
  ztr_un_event.23.t: "상임이사국 선출 방식 개혁" # 2917781659103557361
  ztr_un_event.23.d: "안전보장이사회 상임이사국을 선출하는 방식은 현재 #v [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_member_selection_name')]#!입니다.\n\n개혁이 통과되면 #n 현재의 모든 상임이사국은 지위를 박탈당하며#! 새로운 패러다임에 따라 새로운 이사국이 선출됩니다.\n\n@un_member_selection! [Concept('concept_un_member_selection_by_prestige','$concept_un_member_selection_by_prestige$')]: 위신이 가장 높은 국가에 상임이사국 의석을 부여합니다. 외교적, 문화적 성취를 보상합니다.\n@un_member_selection! [Concept('concept_un_member_selection_geographic_representation','$concept_un_member_selection_geographic_representation$')]: 세계의 모든 주요 지역이 대표성을 가질 수 있도록 의석을 배분합니다. 다양성과 공정성을 증진합니다.\n@un_member_selection! [Concept('concept_un_member_selection_by_military_power','$concept_un_member_selection_by_military_power$')]: 가장 강력한 군사력을 보유한 국가가 의석을 차지합니다. 하드 파워의 현실을 반영합니다.\n@un_member_selection! [Concept('concept_un_member_selection_strongest_country','$concept_un_member_selection_strongest_country$')]: 가장 강력한 국가가 의석을 차지합니다. 전반적인 국가적 중요도를 반영합니다.\n\n어떤 선출 모델을 제안하시겠습니까?" # 11809393972726147592
  ztr_un_event.23.a: "제안: @un_member_selection! [Concept('concept_un_member_selection_by_prestige','$concept_un_member_selection_by_prestige$')]" # 15935125425549419170
  ztr_un_event.23.b: "제안: @un_member_selection! [Concept('concept_un_member_selection_geographic_representation','$concept_un_member_selection_geographic_representation$')]" # 9776117347566870211
  ztr_un_event.23.c: "제안: @un_member_selection! [Concept('concept_un_member_selection_by_military_power','$concept_un_member_selection_by_military_power$')]" # 3045091683979761405
  ztr_un_event.23.e: "제안: @un_member_selection! [Concept('concept_un_member_selection_strongest_country','$concept_un_member_selection_strongest_country$')]" # 16673948495472135643
  ztr_un_event.23.f: "아닙니다, 변경안을 제안하지 않겠습니다." # 17106903256265713400
  ztr_un_event.25.t: "안전보장이사회 임명" # 10048121145268710983
  ztr_un_event.25.d: "국제연합 상임이사국 선출 절차 개혁에 따라, [ROOT.GetCountry.GetName]이(가) 안전보장이사회의 #gold_value 상임이사국#!으로 임명되었습니다.\n\n이 영예로운 지위는 결의안을 형성하고, 거부권이 유효한 경우 반대하는 제안을 일방적으로 차단할 수 있는 능력을 포함하여 국제 문제에서 우리에게 더 큰 영향력을 부여합니다." # 7555708790819830805
  ztr_un_event.25.a: "우리는 이 책임을 영광스럽게 짊어질 것입니다." # 3378011345259664190
  ztr_un_event.30.t: "인권 선언" # 8400103826029673719
  ztr_un_event.30.d: "안보리 상임이사국으로서, [ROOT.GetCountry.GetName]은(는) 시급한 인권 문제에 대해 구속력 있는 성명을 제안할 수 있습니다.\n\n이러한 성명은 일단 채택되면 국제법적 효력을 가지며 모든 UN 회원국의 행동을 규정합니다.\n\n#bold 현재 인권 성명:#!\n@un_decolonization! #v 탈식민지화#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_human_rights_decolonization_name')]\n@un_slavery! #v 노예제#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_human_rights_slavery_name')]\n@un_children_rights! #v 아동 권리#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_human_rights_children_name')]\n@un_women_rights! #v 여성 권리#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_human_rights_women_name')]\n\n어떤 주제를 다루어야 할까요?" # 2236758958934161571
  ztr_un_event.30.a: "@un_decolonization! #v 탈식민지화#! 다루기" # 236036596766352375
  ztr_un_event.30.b: "@un_slavery! #v 노예제#! 다루기" # 5900067541103797069
  ztr_un_event.30.c: "@un_children_rights! #v 아동 권리#! 다루기" # 8358146954582524122
  ztr_un_event.30.f: "@un_women_rights! #v 여성 권리#! 다루기" # 3963046114599143342
  ztr_un_event.30.e: "현재로서는 성명이 필요하지 않습니다." # 3529330874824471268
  ztr_un_event.31.t: "탈식민지화에 관한 성명" # 17428343642311468673
  ztr_un_event.31.d: "식민지 통치 문제는 우리 시대의 가장 중요한 쟁점 중 하나가 되었습니다. 전 세계적으로 피지배 민족들은 #v 민족 자결주의#!를 요구하고 있으며, 제국 통치의 정당성은 점점 더 큰 도전에 직면하고 있습니다.\n\n안전보장이사회는 다음 중 하나의 입장을 채택하여 국제적 대응을 형성할 수 있습니다:\n\n@un_decolonization! [Concept('concept_un_decolonization_encouraged','$concept_un_decolonization_encouraged$')]: 유엔은 탈식민지화를 적극적으로 추진하여 전 세계 식민지 피지배층의 [concept_liberty_desire]를 크게 높이고, 식민 지배국들이 [GetLawType('law_colonial_resettlement').GetName], [GetLawType('law_colonial_exploitation').GetName], 그리고 [GetLawType('law_frontier_colonization').GetName]을 [GetLawType('law_no_colonial_affairs').GetName](으)로 전환하도록 압박합니다.\n\n@un_decolonization! [Concept('concept_un_decolonization_conservative','$concept_un_decolonization_conservative$')]: 유엔은 식민지 통치 관행을 규탄하며, 회원국들이 [GetLawType('law_colonial_resettlement').GetName], [GetLawType('law_colonial_exploitation').GetName], [GetLawType('law_frontier_colonization').GetName]을 시행하지 못하도록 영구적으로 금지하고 [GetLawType('law_no_colonial_affairs').GetName](으)로 전환하도록 강제합니다.\n\n@un_decolonization! [Concept('concept_un_decolonization_neutral','$concept_un_decolonization_neutral$')]: 기존의 모든 성명은 폐기되며 현상 유지 상태로 돌아갑니다." # 13911358747398099719
  ztr_un_event.31.a: "제안: @un_decolonization! [Concept('concept_un_decolonization_encouraged','$concept_un_decolonization_encouraged$')]" # 13229825840243509109
  ztr_un_event.31.b: "제안: @un_decolonization! [Concept('concept_un_decolonization_conservative','$concept_un_decolonization_conservative$')]" # 4343555935254684655
  ztr_un_event.31.c: "제안: @un_decolonization! [Concept('concept_un_decolonization_neutral','$concept_un_decolonization_neutral$')]" # 7938929738152043499
  ztr_un_event.31.e: "아닙니다, 성명을 제안하지 않겠습니다." # 4367654416045866993
  ztr_un_event.32.t: "노예제에 관한 성명" # 215290910500794745
  ztr_un_event.32.d: "모든 형태의 노예제는 인류 문명에 남은 오점입니다. 많은 국가가 이 제도를 폐지했지만, 여전히 강제 노동, 부채 노예제, 동산 노예제를 허용하는 국가들이 존재합니다.\n\n안전보장이사회는 다음과 같은 확고한 성명을 발표할 수 있습니다:\n\n@un_slavery! [Concept('concept_un_slavery_illegal','$concept_un_slavery_illegal$')]: UN은 모든 형태의 노예제가 국제법상 불법임을 선언하며, 회원국들이 [GetLawType('law_colonial_slavery').GetName], [GetLawType('law_debt_slavery').GetName], [GetLawType('law_slave_trade').GetName], [GetLawType('law_legacy_slavery').GetName]을(를) 영구적으로 시행할 수 없도록 하고 [GetLawType('law_slavery_banned').GetName]로 나아가도록 압박합니다.\n\n@un_slavery! [Concept('concept_un_slavery_neutral','$concept_un_slavery_neutral$')]: 기존 성명을 모두 폐지합니다." # 1694964104947784375
  ztr_un_event.32.a: "제안: @un_slavery! [Concept('concept_un_slavery_illegal','$concept_un_slavery_illegal$')]" # 16986594385153909406
  ztr_un_event.32.b: "제안: @un_slavery! [Concept('concept_un_slavery_neutral','$concept_un_slavery_neutral$')]" # 9857808005866539931
  ztr_un_event.32.e: "아닙니다, 성명을 제안하지 않겠습니다." # 4367654416045866993
  ztr_un_event.33.t: "아동 권리에 관한 성명" # 8938589255567576409
  ztr_un_event.33.d: "아동 처우 문제는 산업 사회의 주요한 의제가 되었습니다. 공장은 저렴한 노동력을 요구하고, 개혁가들은 법적 보호를 촉구하며, 교육자들은 아동기가 노동이 아닌 학습을 위해 보장되어야 한다고 주장합니다.\n\n안전보장이사회는 다음 입장 중 하나를 채택할 수 있습니다:\n\n@un_children_rights! [Concept('concept_un_children_rights_negligible','$concept_un_children_rights_negligible$')]: UN은 공통의 최소 기준을 수립하지 않기로 결정하며, 회원국들이 현재의 아동 노동법을 그대로 유지하도록 허용합니다.\n\n@un_children_rights! [Concept('concept_un_children_rights_restricted_child_labor','$concept_un_children_rights_restricted_child_labor$')]: UN은 최소한의 아동 보호 기준을 수립하며, 회원국들이 [GetLawType('law_child_labor_allowed').GetName]을(를) 영구적으로 시행할 수 없도록 합니다.\n\n@un_children_rights! [Concept('concept_un_children_rights_compulsory_study','$concept_un_children_rights_compulsory_study$')]: UN은 학교 교육을 중심으로 하는 더 강력한 기준을 지지하며, 회원국들이 [GetLawType('law_restricted_child_labor').GetName]을(를) 영구적으로 시행할 수 없도록 하고 [GetLawType('law_compulsory_primary_school').GetName]로 나아가도록 합니다." # 13975648687013058132
  ztr_un_event.33.a: "제안: @un_children_rights! [Concept('concept_un_children_rights_restricted_child_labor','$concept_un_children_rights_restricted_child_labor$')]" # 2810679412407059487
  ztr_un_event.33.b: "제안: @un_children_rights! [Concept('concept_un_children_rights_compulsory_study','$concept_un_children_rights_compulsory_study$')]" # 15191889050622406585
  ztr_un_event.33.c: "제안: @un_children_rights! [Concept('concept_un_children_rights_negligible','$concept_un_children_rights_negligible$')]" # 5750849536864166463
  ztr_un_event.33.e: "아닙니다, 성명을 제안하지 않겠습니다." # 4367654416045866993
  ztr_un_event.34.t: "여성 권리에 관한 성명" # 9367446301074424511
  ztr_un_event.34.d: "여성의 정치적, 법적 지위가 전 세계적으로 점점 더 논의되고 있습니다. 전통적인 법적 위계는 여전히 많은 국가에서 여성의 완전한 자율성을 부정하고 있는 반면, 개혁가들은 시민적 평등이 이제 현대적 정통성과 뗄 수 없는 관계라고 주장합니다.\n\n안전보장이사회는 다음 중 하나의 입장을 채택할 수 있습니다:\n\n@un_women_rights! [Concept('concept_un_women_rights_negligible','$concept_un_women_rights_negligible$')]: 유엔은 공통된 국제 표준을 수립하는 것을 거부하며, 회원국들이 제한적인 여성 권리법을 유지하도록 허용합니다.\n\n@un_women_rights! [Concept('concept_un_women_rights_gender_equality','$concept_un_women_rights_gender_equality$')]: 유엔은 완전한 법적 평등을 기대되는 표준으로 인정하며, 회원국들에게 [GetLawType('law_no_womens_rights').GetName] 및 [GetLawType('law_women_own_property').GetName]을 영구적으로 비활성화하고 [GetLawType('law_women_in_the_workplace').GetName]을 향해 나아가도록 독려합니다." # 5801662695153065639
  ztr_un_event.34.a: "제안: @un_women_rights! [Concept('concept_un_women_rights_gender_equality','$concept_un_women_rights_gender_equality$')]" # 1259385838911508571
  ztr_un_event.34.b: "제안: @un_women_rights! [Concept('concept_un_women_rights_negligible','$concept_un_women_rights_negligible$')]" # 8437834893482169859
  ztr_un_event.34.e: "아닙니다, 성명을 제안하지 않겠습니다." # 4367654416045866993
  ztr_un_event.40.t: "유엔 기구" # 12546786539783128647
  ztr_un_event.40.d: "안전보장이사회의 #blue_value 상임이사국#!으로서, 우리는 더 넓은 유엔 주도의 국제 질서 내에서 주요 기구를 설립하기 위한 제안을 제출할 수 있습니다.\n\n#bold 현재 유엔 기구:#!\n@un_imf! #v IMF#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_institution_imf_name')]\n@un_wto! #v WTO#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_institution_wto_name')]\n@un_icc! #v ICC#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_institution_icc_name')]\n@un_unesco! #v UNESCO#!: [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_institution_unesco_name')]\n\n어떤 기구를 총회에 상정할까요?" # 15007441427246989756
  ztr_un_event.40.a: "@un_imf! #v IMF#! 창설 논의" # 10542349507847331645
  ztr_un_event.40.b: "@un_wto! #v WTO#! 창설 논의" # 17523815113576840527
  ztr_un_event.40.c: "@un_icc! #v ICC#! 창설 논의" # 15541829571585552474
  ztr_un_event.40.e: "@un_unesco! #v UNESCO#! 창설 논의" # 11594224844039325572
  ztr_un_event.40.f: "현재로서는 기구 설립 제안이 필요하지 않습니다." # 5288719618771970277
  ztr_un_event.41.t: "IMF 및 세계은행 설립" # 13176009621773311081
  ztr_un_event.41.d: "국제 통화 협력을 증진하고, 금융 안정성을 확보하며, 국제 무역을 촉진하고, 높은 고용률과 지속 가능한 경제 성장을 도모하며, 전 세계의 빈곤을 줄이기 위해 @un_imf! #v IMF#!를 설립하십시오. @un_imf! #v IMF#! 체제는 빈곤국에게는 구조화된 지원에 대한 접근성을 제공하고, 부유한 국가에게는 공통의 금융 구조를 제공할 것입니다." # 13749062836946626465
  ztr_un_event.41.a: "제안: @un_imf! [Concept('concept_un_institution_imf_established','$concept_un_institution_imf_established$')]" # 12438215995276829402
  ztr_un_event.41.b: "됐습니다, 이 기구는 제안하지 않겠습니다." # 17677111106784848341
  ztr_un_event.42.t: "세계무역기구 설립" # 2401731313940892484
  ztr_un_event.42.d: "@un_wto! #v WTO#!는 세계 상거래를 위한 공통 규칙을 공식화하고, 시장 접근을 저해하는 장벽을 낮추며, 국제 무역 경로의 효율성을 개선할 것입니다. 회원국들에게는 더 폭넓은 상업적 통합을 약속하지만, 징벌적 관세에 의존할 수 있는 자유 또한 줄어들게 됩니다.\n\n채택될 경우, 모든 UN 회원국은 더 자유주의적인 무역 체계로 편입될 것입니다." # 16170897714964165005
  ztr_un_event.42.a: "제안: @un_wto! [Concept('concept_un_institution_wto_established','$concept_un_institution_wto_established$')]" # 17770958125744086985
  ztr_un_event.42.b: "됐습니다, 이 기구는 제안하지 않겠습니다." # 17677111106784848341
  ztr_un_event.43.t: "국제형사재판소 설립" # 7054712192457635487
  ztr_un_event.43.d: "세계는 잔학 행위, 약탈적 전쟁, 민간인에게 가해지는 파괴가 일반적인 외교를 넘어 법적 책임을 져야 한다는 요구를 점점 더 높이고 있습니다. @un_icc! #v ICC#!는 UN 질서에 상설 사법 기구를 제공하여, 행동이 지나치게 잔혹하거나 무모해진 회원국들에게 평판 및 정치적 압력을 가할 것입니다.\n\n채택될 경우, 심각한 범죄자들은 주기적인 국제 조사를 받게 될 수 있습니다." # 13219109295740818199
  ztr_un_event.43.a: "제안: @un_icc! [Concept('concept_un_institution_icc_established','$concept_un_institution_icc_established$')]" # 15605751487673388551
  ztr_un_event.43.b: "됐습니다, 이 기구는 제안하지 않겠습니다." # 17677111106784848341
  ztr_un_event.44.t: "유네스코 설립" # 252475379844786975
  ztr_un_event.44.d: "과학 교류, 교육 정책, 문화 보존은 점점 더 국제적 위신과 장기적인 발전을 형성하고 있습니다. @un_unesco! #v UNESCO#!는 UN 시스템에 학교, 연구 협력, 국경을 초월한 문화 협력을 위한 전담 기구를 제공할 것입니다.\n\n채택될 경우, UN 회원국들은 작지만 지속적인 교육 및 혁신 혜택을 얻게 될 것입니다." # 13949563303223236585
  ztr_un_event.44.a: "제안: @un_unesco! [Concept('concept_un_institution_unesco_established','$concept_un_institution_unesco_established$')]" # 16953089414341359936
  ztr_un_event.44.b: "됐습니다, 이 기구는 제안하지 않겠습니다." # 17677111106784848341
  ztr_modern_individualism.1.t: "사회적 시장 경제의 탄생" # 16903135163260703302
  ztr_modern_individualism.1.d: "[ROOT.GetCountry.GetAdjective] 경제가 불과 한 세기 전에는 상상할 수 없었던 대규모 자동화와 생산성 수준에 도달함에 따라, 경제학자들 사이에서 새로운 경제 모델이 등장하고 있습니다. 그들은 이제 스미스보다 케인즈를 먼저 읽습니다. 총수요는 번영의 엔진이며, 자신이 생산한 물건을 살 수 없을 정도로 가난한 노동자는 공장이 감당할 수 없는 변칙적인 존재입니다.\n한때 고전적 개인주의의 기수였던 우리의 [SCOPE.gsInterestGroup('industrialist_ig_scope').GetName]는 조용히 그들의 신조를 다시 쓰고 있습니다. 그들은 여전히 사유 재산, 자유 무역, 기업의 존엄성을 믿지만, 교육받고 잘 먹는 인구야말로, 심지어 고령층이라 할지라도, 가장 이상적인 시장임을 깨닫게 되었습니다. 긴축과 빈민법의 시대는 세탁기, 자동차, 유급 휴가의 시대로 자리를 내어주고 있습니다.\n이것은 사회주의가 아니며, 결코 자선도 아닙니다. 이는 더 부유한 국가가 스스로를 #gold_value 산업 경제#!에서 #blue_value 소비 경제#!로 전환해야 하며, 이를 위해서는 임금과 여가 시간, 그리고 어느 정도의 사회적 보장이 갖추어진 사람들이 필요하다는 솔직한 인식입니다. 약간의 #v 복지#!는 문제가 되지 않을 것입니다." # 17281552270314260772
  ztr_modern_individualism.1.f: "작업장에서 세계의 쇼룸으로." # 306922477490869070
  ztr_modern_individualism.1.a: "임금을 잘 받는 노동자가 최고의 고객입니다. [GetLawType('law_old_age_pension').GetName]에 대한 토론을 시작합시다." # 10466388523777336566
  ztr_modern_individualism.1.b: "의도는 감사하지만, 당장 개혁을 단행할 시기는 아닙니다." # 177771903587594675
